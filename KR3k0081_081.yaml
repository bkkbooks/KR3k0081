body:
  text: 卷第八十一富貴第一史記蔡澤傳蔡澤干諸侯不遇而從唐舉相唐舉曰先生曷鼻臣肩魋顏蹙齃膝攣攣兩膝曲也吾聞聖人不相殆先生乎蔡澤知唐舉戲之乃曰富貴吾所自有吾所不知者壽也唐舉曰從今以往者四十三歲前漢項籍傳羽咸陽殺秦降王子嬰秦民失望韓生說羽曰關中阻山帶河四塞之地肥饒可都以伯羽曰富貴不歸故鄉如衣錦夜行韓生曰人謂楚人沐猴而冠果然羽聞之斬韓生前漢景十三王傳贊曰昔魯哀公有言寡人生於深宮之中長於婦人之手未嘗知憂未嘗知懼信哉斯言也雖欲不危亡不可得已是故古人以宴安為鴆毒亡德而富貴謂之不幸漢興至于孝平諸侯王以百數率多驕淫失道何則沉弱放恣之中居勢使然也夫唯大雅卓爾不群河間獻王近之矣前漢欒布傳孝文時為燕相至將軍布稱曰窮困不能辱身非人也富貴不能快意非賢也前漢賈山傳以為錢者無用器也而可以易富貴富貴者人主之操柄也令民為之是與人主共操柄不可長也後漢張衡傳衡曰且學非以要利而富貴萃之貴以行令富以施惠惠施令行故易稱以大業箋證史記蔡澤傳蔡澤者燕人也游學干諸侯小大甚衆不遇而從唐舉相曰吾聞先生相李兌曰百日之內持國秉有之乎曰有之曰若臣者何如唐舉孰視而笑曰先生曷鼻巨肩魋顏蹙齃膝攣集解攣兩膝曲也徐廣曰一作率索隱謂兩膝又攣曲也吾聞聖人不相殆先生乎蔡澤知唐舉戲之乃曰富貴吾所自有吾所不知者壽也願聞之唐舉曰先生之壽從今以往者四十三歲漢書項籍傳後數日羽乃屠咸陽殺秦降王子嬰燒其宮室火三月不滅收其寶貨略婦女而東秦民失望於是韓生産羽曰關中阻山帶河四塞之地肥饒可都以伯羽見秦皆已燒殘又懷思東歸曰富貴不歸故鄉如衣錦夜行韓生曰人謂楚人沐猴而冠果然羽聞之斬韓生漢書景十三王傳贊曰昔魯哀公有言寡人生於深宮之中長於婦人之手未嘗知憂未嘗知懼信哉斯言也雖欲不危亡不可得已是故古人以宴安為鴆毒亡德而富貴謂之不幸漢興至于孝平諸侯王以百數率多驕淫失道何則沈溺放恣之中居勢使然也自凡人猶繫于習俗而况哀公之倫乎夫唯大雅卓爾不群河間獻王近之矣漢書欒布傳孝文時為燕相至將軍布稱曰窮困不能辱身非人也富貴不能快意非賢也漢書賈山傳其後文帝除鑄錢令山復上書諫以為變先帝法非是又誦淮南王無大罪宜急令反國又言柴唐子為不善足以戒章下詰責對以為錢者亡用器也而可以易富貴富貴者人主之操柄也令民為之是與人主共操柄不可長也後漢書張衡傳且學非以要利而富貴萃之貴以行令富以施惠惠施令行故易稱以大業富第二後漢向長傳王莽大司空王邑欲薦之於莽固辭隱於家讀易至損益卦喟然歎曰吾巴知富不如貧貴不如賤但未知死何如生耳後漢千乘王陳敬王等論曰晏子稱夫人生厚而用利於是乎正德以幅之謂之幅利言人情須節以正其德亦由布帛須幅以成其度焉左傳云齊景公與晏子邶殿之邑六十晏子不受曰夫富如布帛之有幅焉為之度使無遷也夫人生厚而用利於是正德以幅之謂之幅利過則為敗吾不敢貪多所謂幅也明帝封諸子租歲不過二千萬馬后為言而不得也東觀明紀曰皇子之封皆減舊制嘗案輿地圖皇后在傍言巨鹿樂成廣平各數縣租榖百萬帝令滿二千萬止諸小王皆當略與楚淮陽相比什減三四我子不當與先帝子等者也賢哉豈徒儉約而已乎知驕貴之無猒嗜欲之難極也故東京諸侯鮮有致於禍敗者也後漢樊宏傳論曰昔楚頃襄王問陽陵君曰君子之富何如對曰假人不德不責食人不使不役親戚愛之衆人善之若乃樊重之折契止訟其庶幾君子之富乎新唐裴延齡傳是時陸贄為宰相帝素所信重極論其譎妄不可住帝以為排媢愈益厚延齡贄上疏列其狀具言延齡嘗奏句獲乾隱二千万緡請舍別庫為羡餘供天子私費故興作廣宣索多矣餘見子孫疏廣傳富事別集多載此唯録其有論議者數條而已他皆放此箋證後漢書向長傳向長字子平河內朝歌人也隱居不仕性尚中和好通老易貧無資食好事者更饋焉受之取足而反其餘王莽大司空王邑辟之連年乃至欲薦之於莽固辭乃止潛隱於家讀易至損益卦喟然歎曰吾已知富不如貧貴不如賤但未知死何如生耳後漢書孝明八王列傳論曰晏子稱夫人生厚而用利於是乎正德以幅之謂之幅利言人情須節以正其德亦由布帛須幅以成其度焉左傳云齊景公與晏子邶殿之邑六十晏子不受曰夫富如布帛之有幅焉為之度使無遷也夫人生厚而用利於是正德以幅之謂之幅利過則為敗吾不敢貪多所謂幅也明帝封諸子租歲不過二千萬馬后為言而不得也東觀明紀曰皇子之封皆減舊制嘗案輿地圖皇后在傍言巨鹿樂成廣平各數縣租穀百萬帝令滿二千萬止諸小王皆當略與楚淮陽相比什減三四我子不當與先帝子等者也賢哉豈徒儉約而已乎知驕貴之無猒嗜欲之難極也故東京諸侯鮮有至於禍敗者也後漢書樊宏陰識傳論曰昔楚頃襄王問陽陵君曰君子之富何如對曰假人不德不責食人不使不役親戚愛之衆人善之若乃樊重之折契止訟其庶幾君子之富乎新唐書裴延齡傳是時陸贄為宰相帝素所信重極論其譎妄不可任帝以為排媢愈益厚延齡贄上疏列其狀具言延齡嘗奏句獲乾隱二千萬緡請舍別庫為羡餘供天子私費故上之興作廣宣索多矣富擬王公第三史記穰侯傳范睢言宣太后專制穰侯擅權於諸侯涇陽君高陵君之屬太侈富於王室於是秦昭王悟乃免相國令涇陽之屬皆出關就封邑後漢陰興傳宣帝時陰子方者至孝有仁恩臘日晨炊而竈神形見家有黃羊因以祀之自是已後暴至巨富田有七百餘頃輿馬僕隸比於邦君子方常言我子孫必將彊大至誠三世而遂繁昌故後常以臘日祀竈而薦黃羊焉晉和嶠傳嶠家産豐富擬於王者然性至儉以是獲譏杜預以為嶠有錢癖晉陶侃傳媵妾數十家僮千餘珍奇寶貨富於天府新唐高力士傳封渤海郡公於來庭坊建佛祠興寧坊立道士祠珍樓寶屋國資所不逮箋證史記穰侯傳范睢言宣太后專制穰侯擅權於諸侯涇陽君高陵君之屬太侈富於王室於是秦昭王悟乃免相國令涇陽之屬皆出關就封邑穰侯出關輜車千乘有餘後漢書陰識傳附弟陰興宣帝時陰子方者至孝有仁恩臘日晨炊而竈神形見子方再拜受慶家有黃羊因以祀之自是已後暴至巨富田有七百餘頃輿馬僕隸比於邦君子方常言我子孫必將彊大至識三世而遂繁昌故後常以臘日祀竈而薦黃羊焉晉書和嶠傳嶠家産豐富擬於王者然性至吝以是獲譏於世杜預以為嶠有錢癖晉書陶侃傳然媵妾數十家僮千餘珍寶寶貨富於天府新唐書高力士傳加纍驃騎大將軍封渤海郡公於來廷坊建佛祠興寧坊立道士祠珍樓寶屋國資所不逮貪第四史記蔡澤傳善吾聞欲而不知足失其所以欲有而不知止失其所以有史記蔡澤傳翠鵠犀象其處勢非不遠死也而所以死者惑於餌也蘇秦智伯之智非不足以辟辱遠死也而所以死者惑於貪利不止也後漢王符傳貴忠篇曰夫鳥以山為埤而增巢其上魚以泉為淺而穿穴其中卒所以得者餌也貴戚願其宅吉而制為令名欲其門堅而造作鐵樞卒其所以敗者非若禁忌少而門樞朽也常苦崇財貨而行驕僭耳不上順天心下育人物而欲任其私智竊弄君威反戾天地欺誣神明居纍卯之危而圖太山之安為朝露之行而思傳世之功豈不惑哉後漢志桓帝之初京都童謠曰城上烏尾畢逋公為吏子為徒一徒死百乘車車班班入河間河間姹女工數錢以錢為室金為堂石上慊慊春黃梁梁下有懸鼓我乃擊之丞卿怒案此皆謂為政貪也城上烏尾畢逋者處高利獨食不與下共謂人主多聚斂也公為吏子為徒者言蠻吏將畔逆父既為軍吏其子又為卒徒往擊之也一徒死百乘車者言前一人往討胡既死矣後又遣百乘車往車班班入河間者言上將崩乘輿班班入河間迎靈帝也河間姹女工數錢一本作妖女以錢為室金為堂者靈帝既立其母永樂大后好聚樂雖積金錢慊慊常苦不足使人春黃梁而食之也梁下有懸鼓我欲擊之丞卿怒者言永樂主教靈帝使賣官受錢所祿非其人天下忠篤之士怨望欲擊懸鼓以求見丞卿主鼓者亦復諂順怒而止我也晉魯褒傳以貧素自立元康之後紀綱大壞褒傷時之貧鄙乃隱姓名而著錢神論以剌之其略曰錢之為體有乾坤之象內則其方外則其圓其積如山其流如川故能長久為世神寶親之如兄字曰孔方失之則貧弱得之則富昌無翼而飛無足而走解嚴毅之顏開難發之口錢多者處前錢少者居後處前者為君長在後者為臣僕君長者豐衍而有餘臣僕者窮竭而不足錢之為言泉也無遠不往無幽不至京邑衣冠疲勞講肆厭聞清淡對之睡寐見我家兄莫不驚視錢之所祐吉無不利何必讀書然后富貴由此論之謂為神物無德而尊無勢而熱排金門而入紫闥危可使安死可使活貴可使賤生可使殺是故忿爭非錢不勝幽滯非錢不拔怨讎非錢不解令問非錢不發諺曰錢無耳可使鬼九今之人惟錢而已故曰軍無財七不來軍無賞士不往仕無中人不如歸田雖有中人而無家兄不異無翼而欲飛無足而欲行蓋疾時者共傳其文箋證史記蔡澤傳應侯曰善吾聞欲而不知足失其所以欲有而不知止失其所以有先生幸教雎敬受命於是乃延入坐為上客史記蔡澤傳且夫翠鵠犀象其處勢非不遠死也而所以死者惑於餌也蘇秦智伯之智非不足以辟辱遠死也而所以死者惑於貪利不止也後漢書王符傳貴忠篇曰夫鳥以山為埤而增巢其上魚以泉為淺而穿穴其中卒所以得者餌也貴戚願其宅吉而制為令名欲其門堅而造作鐵樞卒其所以敗者非苦禁忌少而門樞朽也常苦崇財貨而行驕僣耳不上順天心下育人物而欲任其私智竊弄君威反戾天地欺誣神明居纍卵之危而圖太山之安為朝露之行而思傳世之功豈不惑哉後漢書五行志桓帝之初京都童謠曰城上烏尾畢逋公為吏子為徒一徒死百乘車車班班入河間河間姹女工數錢以錢為室金為堂石上慊慊舂懸粱梁下有懸鼓我欲擊之丞卿怒案此皆謂為政貪也城上烏尾畢逋者處高利獨食不與下共謂人主多聚斂也公為吏子為徒者言蠻夷將畔逆父既為軍吏其子又為卒徒往擊之也一徒死百乘車者言前一人往討胡既死矣後又遣百乘車往車班班入河間者言上將崩乘輿班班入河間迎靈帝也河間姹女工數錢一本作妖女以錢為室金為堂者靈帝既立其母永樂太后好聚金以為堂也石上慊慊舂黃粱者言永樂雖積金錢慊慊常若不足使人舂黃粱而食之也梁下有懸鼓我欲擊之丞卿怒者言永樂主教靈帝使賣官受錢所祿非其人天下忠篤之士怨望欲擊懸鼓以求見丞卿主鼓者亦復諂順怒而止我也晉書隱逸列傳魯褒傳魯褒字元道南陽人也好學多聞以貧素自立元康之後綱紀大壞褒傷時之貪鄙乃隱姓名而著錢神論以刺之其略曰錢之為體有乾坤之象內則其方外則其圓其積如山其流如川動靜有時行藏有節市井便易不患耗折難折象壽不匱象道故能長久為世神寶親之如兄字曰孔方失之則貧弱得之則富昌無翼而飛無足而走解嚴毅之顏開難發之口錢多者處前錢少者居後處前者為君長在後者為臣僕君長者豐衍而有餘臣僕者窮竭而不足詩云哿矣富人哀此煢獨錢之為言泉也無遠不往無幽不至京邑衣冠疲勞講肄厭聞清談對之睡寐見我家兄莫不驚視錢之所祐吉無不利何必讀書然後富貴由此論之謂為神物無德而尊無勢而熱排金門而入紫闥危可使安死可使活貴可使賤生可使殺是故忿爭非錢不勝幽滯非錢不拔怨讎非錢不解令問非錢不發諺曰錢無耳可使鬼凡今之人惟錢而已故曰軍無財士不來軍無賞士不往仕無中人不如歸田雖有中人而無家兄不異藏翼而欲飛無足而欲行蓋疾時者共傳其文折券第五史記孟嘗君傳孟嘗進馮歡而請之曰賓客臨文者三千餘人邑入不足以奉賓客故出息錢於薛民頗不與其息今客食恐不給願先生責之歡曰諾至薛召取孟嘗君錢者皆會得息錢十萬乃多釀酒買肥牛召諸取錢者殺牛置酒酒酣乃持券合之能與息者與為期貧不能與息者取其券而燒之曰孟嘗君所以貸錢者為民之無者以為本業也所以求息者為無以奉客也今富給者以要期貧窮者燔券書以捐之諸君彊飲食有君如此豈可負哉坐者皆起再拜孟嘗君聞怒而召歡曰聞先生具牛酒而燒券書何歡曰然不多具牛酒即不能畢會無以知其有餘不足有餘者為要期不足者誰守而責之十年息愈多急即以逃亡自捐之若急終無以償上則為君好利不愛士民下則有離上抵負之名非所以厲士民彰君聲也焚無用虛債之券捐不可得之虛計令薛民親君而彰君之善聲也君有何疑焉孟嘗君乃撫手而謝之前漢高祖紀高祖好酒常從王媼武負貰酒時飲醉臥武負王媼見其上常有怪高祖每酤留飲酒讎數倍及見怪歲竟此兩家常折券棄責後漢樊宏傳外孫何氏兄弟爭財重恥之以田二頃解其忿訟縣中稱美年八十餘終其素所假貸人間數百萬遺令焚削文契責家聞者皆慙爭往償之責音側界反諸子從勑竟不肯受箋證史記孟嘗君傳孟嘗君乃進馮歡而請之曰賓客不知文不肖幸臨文者三千餘人邑入不足以奉賓客故出息錢於薛薛歲不入民頗不與其息今客食恐不給願先生責之馮歡曰諾辭行至薛召取孟嘗君錢者皆會得息錢十萬乃多釀酒買肥牛召諸取錢者能與息者皆來不能與息者亦來皆持取錢之券書合之齊為會日殺牛置酒酒酣乃持券如前合之能與息者與為期貧不能與息者取其券而燒之曰孟嘗君所以貸錢者為民之無者以為本業也所以求息者為無以奉客也令富給者以要期貧窮者燔券書以捐之諸君彊飲食有君如此豈可負哉坐者皆起再拜孟嘗君聞馮歡燒券書怒而使使召歡歡至孟嘗君曰文食客三千人故貸錢於薛文奉邑少而民尚多不以時與其息客食恐不足故請先生收責之聞先生得錢即以多具牛酒而燒券書何馮歡曰然不多具牛酒即不能畢會無以知其有餘不足有餘者為要期不足者雖守而責之十年息愈多急即以逃亡自捐之若急終無以償上則為君好利不愛士民下則有離上抵負之名非所以厲士民彰君聲也焚無用虛債之券捐不可得之虛計令薛民親君而彰君之善聲也君有何疑焉孟嘗君乃拊手而謝之漢書高帝紀高祖好酒及色常從王媼武負貰酒時飲醉臥武負王媼見其上常有怪高祖每酤留飲酒讎數倍及見怪歲竟此兩家常折券棄負後漢書樊宏傳外孫何氏兄弟爭財重恥之以田二頃解其忿訟縣中稱美推為三老年八十餘終其素所假貸人間數百萬遺令焚削文契責家聞者皆慙爭往償之責音側界反諸子從勑竟不肯受貧第六史記滑稽傳東郭先生久待詔公車貧困譏寒衣敝履行雪中履有上無下足盡踐地道中人笑之及其拜為二千石佩青緺出宮門行謝主人故所以同官待詔者等比祖道於都門外榮華道路立名當世此所謂衣褐懷寶者也當其貧困時人莫省視至其貴也乃爭附之誠曰相馬失之瘦相士失之貧其此之謂邪緺音瓜後漢仲長統傳損益篇曰夫選用必取善士善士富者少而貧者多祿不足以供養安能不少營私門乎從而罪之是設機置穽以待天下之君子也餘見富貴欒布傳箋證史記滑稽列傳東郭先生久待詔公車貧困飢寒衣敝履不完行雪中履有上無下足盡踐地道中人笑之及其拜為二千石佩青緺出宮門行謝主人故所以同官待詔者等比祖道於都門外榮華道路立名當世此所謂衣褐懷寶者也當其貧困時人莫省視至其貴也乃爭附之諺曰相馬失之瘦相士失之貧其此之謂邪後漢書仲長統傳損益篇曰夫選用必取善士善士富者少而貧者多祿不足以供養安能不少營私門乎從而罪之是設機置穽以待天下之君子也不恥貧賤第七史記顏回傳一簞食一瓢飲在陋巷人不堪其憂回也不改其樂史記原憲傳孔子卒原憲遂亡在草澤中子貢相衛而結駟連騎排藜藿入窮閻過謝原憲憲攝敝衣冠見子貢恥之曰夫子豈病乎原憲曰無財者謂之貧學道而不能行者謂之病若憲貧也非病也子貢慙不懌而去史記魯仲連傳田單遂屠聊城歸而言魯連欲爵之魯連逃隱於海上曰吾與富貴而詘於人寧貧賤而輕杜肆志焉前漢揚雄傳不汲汲於富貴不戚戚於貧賤家産不過十金之無儋石之儲晏如也後漢范式傳遷荊州剌史友人南陽孔嵩家貧親老乃變名姓傭為新野縣阿畢街卒式行部到新野而縣選嵩為導騎迎式式見而識之呼嵩杷臂謂曰子非孔仲山邪昔與子俱曳長裾遊進帝學吾蒙國恩致位牧伯而子懷道隱身處於卒伍不亦惜乎嵩曰侯嬴長守於賤業晨門肆志於抱關子欲居九夷不患其陋貧者士之宜豈為鄉哉後漢吳祐傳祐年二十喪父居無捋石而不受贍遺常牧豕於長垣澤中行吟經書遇父故人謂曰卿二千石子而自業賤爭縱子無恥奈先君何祐辭謝而已守志如初後漢馮衍傳有大志不戚戚於貧賤晉桓彝傳少孤貧雖簞瓢處之晏如新唐王圭傳圭性沈淡志量隱正恬於所遇交不苟合餘見高尚其事皇甫謐傳箋證史記仲尼弟子列傳顏回傳孔子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂史記仲尼弟子列傳原憲傳孔子卒原憲遂亡在草澤中子貢相衛而結駟連騎排藜藿入窮閻過謝原憲憲攝敝衣冠見子貢子貢恥之曰夫子豈病乎原憲曰吾聞之無財者謂之貧學道而不能行者謂之病若憲貧也非病也子貢慙不懌而去終身恥其言之過也史記魯仲連傳聊城亂田單遂屠聊城歸而言魯連欲爵之魯連逃隱於海上曰吾與富貴而詘於人寧貧賤而輕世肆志焉漢書揚雄傳雄少而好學不為章句訓詁通而已博覽無所不見為人簡易佚蕩口吃不能劇談默而好深湛之思清靜亡為少耆欲不汲汲於富貴不戚戚於貧賤不修廉隅以徼名當世家産不過十金乏無儋石之儲晏如也後漢書范式傳舉州茂才四遷荊州刺史友人南陽孔嵩家貧親老乃變名姓傭為新野縣阿里街卒式行部到新野而縣選嵩為導騎迎式式見而識之呼嵩把臂謂曰子非孔仲山邪對之歎息語及平生曰昔與子俱曳長裾遊息帝學吾蒙國恩致位牧伯而子懷道隱身處於卒伍不亦惜乎嵩曰侯嬴長守於賤業晨門肆志於抱關子欲居九夷不患其陋貧者士之宜豈為鄙哉後漢書吳祐傳及年二十喪父居無擔石而不受贍遺常牧豕於長垣澤中行吟經書遇父故人謂曰卿二千石子而自業賤事縱子無恥奈先君何祐辭謝而已守志如初後漢書馮衍傳顯宗即位又多短衍以文過其實遂廢於家然有大志不戚戚於賤貧晉書桓寬傳桓寬字茂倫譙國龍亢人漢五更榮之九世孫也父皓官至郎中彝少孤貧雖簞瓢處之晏如性通朗早獲盛名新唐書王圭傳王圭字叔玠祖僧辨梁太尉尚書令父顗北齊樂陵郡太守世居郿性沈淡志量隱正恬於所遇交不茍合
