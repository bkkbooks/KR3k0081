body:
  text: 卷第二十九守官第一前漢王陵傳周勃為右丞相上問勃曰天下一歲決獄幾何勃謝不知問天下錢穀一歲出入幾何勃又謝不知汗出洽背媿不能對上亦問左丞相平平曰各有主者上曰主者為誰乎平曰陛下即問決獄責廷尉問錢穀責治粟內史上曰苟各有主者而君所主何事也平謝曰主臣陛下不知其駑下使待罪宰相宰相者上佐天子理陰陽下遂萬物之宜外填撫四夷諸侯內親附百姓使卿大夫各得任其職也上稱善前漢邴吉傳吉出逢清道群橫者死傷橫道吉過之不問掾史獨怪之吉前行逢人逐牛牛喘吐吉吉止駐使騎吏問逐牛行幾里矣掾史獨謂丞相前後失問或譏吉吉曰民鬭相殺傷長安令京兆尹職所當禁備逐捕歲竟丞相課其殿最奏行賞罰而已故牛喘此時氣失節恐有所傷害也三公典調和陰陽職當憂是以問之前漢朱博傳遷冀州剌史博本武吏不更文法及為剌史行部吏民數百人遮道自言官寺盡滿從事白請且留此縣錄見諸自言者事畢乃發欲以觀試博博心知之博出就車見自言者使從事明敕告吏民欲言縣丞尉者刺史不察黃綬各自詣郡欲言二千石墨綬長吏者行部還詣治所隋有內史納言是真宰相柳述為兵部尚書參軍機密又楊素為右僕射與高頴專掌新唐褚遂良傳遷諫議大夫兼知起居事太宗嘗問曰卿記起居大抵人君得觀之否遂良對曰今之起居古左右史也善惡必記戒人主不為非法未聞天子自觀史也太宗曰朕有不善卿必記邪遂良對曰守道不如守官臣職載筆君舉必書劉洎曰使遂良不記天下之人亦記之矣太宗以為然唐魏諅傳為起居舍人帝索起居注諅奏古置左右史書得失以存鑒誡陛下所為善旡畏不書如陛下所行錯忤臣縱不書不善天下之人亦記之帝曰不然我既嘗觀之諅曰向者取觀史氏為失職陛下一見則後來所書必有諱屈善惡不實不可以為史且後代何信哉乃止新唐段志玄傳文德皇后之葬志淵與宇文士及勒兵衛章武門太宗夜遣使至二將軍所志玄拒曰軍門不夜開使者示手詔志玄曰夜不能辨不納至曉太宗聞而歎曰此真將軍也周亞夫旡以加焉箋證漢書王陵傳上益明習國家事朝而問右丞相勃曰天下一歲決獄幾何勃謝不知問天下錢穀一歲出入幾何勃又謝不知汗出洽背媿不能對上亦問左丞相平平曰各有主者上曰主者為誰乎平曰陛下即問決獄責廷尉問錢穀責治粟內史上曰苟各有主者而君所主何事也平謝曰主臣陛下不知其駑下使待罪宰相宰相者上佐天子理陰陽順四時下遂萬物之宜外填撫四夷諸侯內親附百姓使卿大夫各得任其職也上稱善漢書丙吉傳吉又嘗出逢清道群鬭者死傷橫道吉過之不問掾史獨怪之吉前行逢人逐牛牛喘吐舌吉止駐使騎吏問逐牛行幾里矣掾史獨謂丞相前後失問或以譏吉吉曰民鬭相殺傷長安令京兆尹職所當禁備逐捕歲竟丞相課其殿最奏行賞罰而已宰相不親小事非所當於道路問也方春少陽用事未可大熱恐牛近行用暑故喘此時氣失節恐有所傷害也三公典調和陰陽職當憂是以問之卷七十四漢書朱博傳成帝即位大將軍王鳳秉政奏請陳咸為長史咸薦蕭育朱博除莫府屬鳳甚奇之舉博櫟陽令徙雲陽平陵三縣以高第入為長安令京師治理遷冀州刺史博本武吏不更文法及為刺史行部吏民數百人遮道自言官寺盡滿從事白請且留此縣錄見諸自言者事畢乃發欲以觀試博博心知之告外趣駕既白駕辦博出就車見自言者使從事明敕告吏民欲言縣丞尉者刺史不察黃綬各自詣郡師古曰丞尉職卑皆黃綬欲言二千石墨綬長吏者使者行部還詣治所通典職官隋有內史納言是真宰相柳述為兵部尚書參軍機密又楊素為右僕射與高熲專掌朝政新唐書褚遂良傳褚遂良貞觀中累遷起居郎博涉文史工隸楷遷諫議大夫兼知起居事帝曰卿記起居大抵人君得觀之否對曰今之起居古左右史也善惡必記戒人主不為非法未聞天子自觀史也帝曰朕有不善卿必記邪對曰守道不如守官臣職載筆君舉必書劉洎曰使遂良不記天下之人亦記之矣新唐書魏徵傳附魏徵謩字申之擢進士第俄為起居舍人帝索起居注謩奏古置左右史書得失以存覽戒陛下所為善無畏不書不善天下之人亦有以記之帝曰不然我既嘗觀之謩曰向者取觀史氏為失職陛下一見則後來所書必有諱屈善惡不實不可以為史且後代何信哉乃止卷九十七案魏徵魏徵五世孫仕文宗朝新唐書段志玄傳段志玄齊州臨淄人秦王即位累遷左驍衛大將軍封樊國公文德皇后之葬與宇文士及勒兵衛章武門太宗夜遣使至二將軍所士及披戶內使志玄拒曰軍門不夜開使者示手詔志玄曰夜不能辨不納比曙帝歎曰真將軍周亞夫何以加省官第二史記吳起傳起去魏之楚楚悼王聞起賢至則相楚捐不急之官前漢元帝紀五年夏有星孛乎參詔曰罷角抵上林宮館希御幸者齊三服官齊國舊有三服之官春獻冠幘縰為首服紈素為冬服綃為夏服縰與纚同音山爾反即今之方目紗也紈素今之絹也輕絹今之輕紗也前漢王吉上疏宜明選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂府省尚方明視天下以儉後漢光武紀詔曰夫張官置吏所以為人也今百姓遭難戶口耗少而縣官吏職所置尚繁其令司隸州牧各實所部省減吏員縣國不足置長吏可併合者一大司徒大司空二府於是條奏并省四百餘縣吏職減損十置其一晉王彪之傳簡文帝時眾官漸多彪之上疏曰職事之修在於省官朝風之澄在於并職官省則選清而得久職并則吏簡而俗靜選清則勝人久於其事事久則中才猶足有成云晉荀勗傳時又議省州郡縣半吏以赴農功勗議以為省吏不如省官省官不如省事省事不如清心昔蕭曹相漢載其清靜致畫一之歌此清心之本也漢文垂拱幾致刑錯此省事也光武并合吏員縣官國邑裁置十一此省官也魏太和中遣王人四出減天下吏員正始中亦并合郡縣此省吏也今必欲求之於本則宜以省事為先凡居位者使務思蕭曹之心以翼佐大化新唐盧懷慎上疏尚書云唐虞稽古建官惟百夏商官倍亦克用乂此省官也又云官不必備惟其才又云旡曠庶官天工人其代之此為官擇人也今京諸司員外官數十倍近古未有謂不必備則為有餘求其代工乃多不釐務而奉廩之費歲巨億万徒竭府藏豈致治意哉新唐辛替否傳上疏曰太宗陛下之祖撥亂立極得至治之體省官清吏舉天下職司旡虛授用天下財帛旡枉費賞必待功官必得才為無不成征旡不伏箋證史記吳起列傳吳起者衛人也好用兵嘗學於曾子田文既死公叔為相尚魏公主而害吳起吳起懼得罪遂去即之楚楚悼王素聞起賢至則相楚明法審令捐不急之官漢書元帝紀五年三月行幸雍祠五畤夏四月有星孛于參詔曰罷角抵上林宮館希御幸者齊三服官李斐曰齊國舊有三服之官春獻冠幘縰為首服紈素為冬服輕綃為夏服凡三如淳曰地理志曰齊冠帶天下胡公曰服官主作文繡以給袞龍之服地理志云襄邑亦有服官師古曰齊三服官李說是也縰與纚同音山爾反即今之方目紗也紈素今之絹也綃今之輕紗也襄邑自出文繡非三服也北假田官鹽鐵官常平倉漢書王吉傳是時宣帝頗修武帝故事宮室車服盛於昭帝吉上疏言得失曰宜明選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂府省尚方師古曰尚方主巧作明視天下以儉師古曰視讀曰示後漢書光武帝紀六月辛卯詔曰夫張官置吏所以為人也今百姓遭難戶口耗少而縣官吏職所置尚繁其令司隸州牧各實所部省減吏員縣國不足置長吏可合併者上大司徒大司空二府於是條奏并省四百餘縣吏職減損十置其一晉書王舒傳附子彪之彪之字叔武年二十鬚鬢皓白時人謂之王白鬚時眾官漸多而遷徙每速彪之上議曰職事之修在於省官朝風之澄在於并職官省則選清而得久職并則吏簡而俗靜選清則勝人久於其事事久則中才猶足有成卷七十六案王彪之是王舒次子晉書荀勗傳時又議省州郡縣半吏以赴農功勗議以為省吏不如省官省官不如省事省事不如清心昔蕭曹相漢載其清靜致畫一之歌此清心之本也漢文垂拱幾致刑措此省事也光武并合吏員縣官國邑裁置十一此省官也魏太和中遣王人四出減天下吏員正始中亦并合郡縣此省吏也今必欲求之於本則宜以省事為先凡居位者使務思蕭曹之心以翼佐大化舊唐書盧懷慎傳景龍中遷右御史臺中丞上疏以陳時政得失今略載其三篇其二曰臣聞尚書云唐虞稽古建官惟百夏商官倍亦克用乂此省官之義也又云官不必備惟其才又云無曠庶官天工人其代之此為官擇人之義也臣竊見京諸司員外官所在委積多者數餘十倍近古以來未之有也官不必備此則有餘人代天工多不釐務廣有除拜無所裨益俸祿之費歲巨億萬空竭府藏而已豈致理之基哉又新唐書盧懷慎傳遷右御史臺中丞上疏陳時政曰昔唐虞稽古建官惟百夏商官倍亦克用乂此省官也故曰官不必備惟其才無曠庶官天工人其代之此擇人也今京諸司員外官數十倍近古未有謂不必備則為有餘求其代工乃多不釐務而奉稟之費歲巨億萬徒竭府藏豈致治意哉新唐書辛替否傳辛替否字協時京兆萬年人景龍中為左拾遺時置公主府官屬而安樂府補授尤濫又盛興佛寺公私疲匱替否上疏曰臣請以有唐治道得失陛下所及見者言之太宗陛下之祖撥亂立極得至治之體省官清吏舉天下職司無虛授用天下財帛無枉費賞必待功官必得才為無不成征無不服侵官第三前漢游俠傳孔子曰天下有道政不在大夫百官有司奉法承令以脩所職失職有誅侵官有罰夫然故上下相順而庶事理焉魏衛臻傳上疏曰古制侵官之法非惡其勤事也誠以所益者小所墮者大也箋證漢書游俠傳古者天子建國諸侯立家自卿大夫以至于庶人各有等差是以民服事其上而下無覬覦孔子曰天下有道政不在大夫百官有司奉法承令以脩所職失職有誅侵官有罰夫然故上下相順而庶事理焉三國志魏志衛臻傳衛臻字公振陳留襄邑人也是時帝方隆意於殿舍臻數切諫及殿中監擅收蘭臺令史臻奏案之詔曰殿舍不成吾所留心卿推之何臻上疏曰古制侵官之法非惡其勤事也誠以所益者小所墮者大也曠官第四前漢曹參傳參代何為相國舉事旡所變更壹遵何之約束擇郡國吏長大取年長大者訥於文辭謹厚長者即召除為丞相史吏言文刻深欲務聲名輒斥去之日夜飲酒卿大夫以下吏及賓客見參不事事不事丞相之事來者皆欲有言至者參輒飲以醇酒度之欲有言復飲酒醉而後去前漢游俠陳遵傳入公府公府掾史率皆羸車小馬不上鮮明而遵獨極輿馬衣服之好門外車騎交錯又日出醉歸曹事數廢西曹以故事適之案舊法令而罰之適讀曰謫侍曹取詣寺舍白遵曰陳卿今日以某事適遵曰滿百乃相聞故事有百適者斥滿百西曹白請斥大司徒馬宮大儒優士謂西曹此人大度士奈何以小文責之迺舉遵能治三輔劇縣後漢左雄上封事帝感其言申下有司考其真偽詳所施行雄之所言皆明達政體而宦豎擅權終不能用自是選代交互令長月易迎新送舊勞擾旡已或官寺空曠旡人案事晉卓少希放達為吏部郎常飲酒廢職晉阮孚傳元帝以為參軍蓬髮飲酒不以王務嬰心為有司所按帝容之新唐長慶時權倖競進播賴其力至宰相專務將迎居位旡所裨益復失河北眾望不厭王播傳箋證漢書曹參傳至何且死所推賢唯參參代何為相國舉事無所變更壹遵何之約束擇郡國吏長大孟康曰取年長大者訥於文辭謹厚長者即召除為丞相史吏言文刻深欲務聲名輒斥去之日夜飲酒卿大夫以下吏及賓客見參不事事如淳曰不事丞相之事來者皆欲有言至者參輒飲以醇酒度之欲有言復飲酒醉而後去終莫得開說以為常漢書游俠傳陳遵陳遵字孟公杜陵人也遵放縱不拘操行雖異然相親友哀帝之末俱著名字為後進冠如淳曰為後進人士之冠首也並入公府公府掾史率皆羸車小馬不上鮮明而遵獨極輿馬衣服之好門外車騎交錯又日出醉歸曹事數廢西曹以故事適之師古曰案舊法令而罰之也適讀曰讁此下皆同侍曹輒詣寺舍白遵曰陳卿今日以某事適遵曰滿百乃相聞故事有百適者斥滿百西曹白請斥大司徒馬宮大儒優士又重遵謂西曹此人大度士奈何以小文責之迺舉遵能治三輔劇縣補郁夷令師古曰右扶風之縣後漢書左雄傳拜雄尚書再遷尚書令上疏陳事帝感其言申下有司考其真偽詳所施行雄之所言皆明達政體而宦豎擅權終不能用自是選代交互令長月易迎新送舊勞擾無已或官寺空曠無人案事晉書畢卓傳畢卓字茂世新蔡鮦陽人也父諶中書郎卓少希放達為胡母輔之所知太興末為吏部郎常飲酒廢職晉書阮籍傳附阮孚阮孚字遙集其母即胡婢也孚之初生其姑取王延壽魯靈光殿賦曰胡人遙集於上楹而以字焉初辟太傅府遷騎兵屬避亂渡江元帝以為安東參軍蓬髮飲酒不以王務嬰心時帝既用申韓以救世而孚之徒未能棄也為有司所按帝每優容之卷四十九案阮孚為阮籍侄曾孫新唐書王播傳王播字明敡其先太原人長慶初召為刑部尚書復領鹽鐵進中書侍郎同中書門下平章事時權幸競進播賴其力至宰相專務將迎居位無所裨益復失河北眾望不厭鬻爵第五史記秦本紀始皇十月蝗蟲從東方來蔽天天下疫百姓內粟千石拜爵一級吏記平準書桑弘羊為大司農丞筦諸會計事稍稍置均輸以通貨物矣始令吏得入穀補官郎至六百石前漢食貨志錯上疏曰方今之務莫若使民務農而已矣欲民務農在於貴粟貴粟之道在於使民以粟為賞罰今慕天下入粟縣官得以拜爵得以除罪如此富人有爵農民有錢粟有所澲夫能入粟以受爵皆有餘者也取於有餘以供上用則貧民之賦可損所謂損有餘補不足令出而民利者也文帝從錯之言令民入粟邊六百石爵上造稍增至四千石為五大夫萬二千石為大庶長各以多少級數為差前漢食貨志景帝時上郡以西旱復脩賣爵令而裁其價以招民裁減省也後漢孝安紀三公以國用不足奏令吏人入錢穀得為關內侯虎賁羽林郎五大夫官府吏緹騎營士各有差後漢孝靈紀初開西邸賣官自關內侯虎賁羽林入錢各有差山陽公載記曰時賣官二千石二千萬四百石四百萬其以德次應選者半之或三分之一於西園立庫貯之私令左右賣公卿公千萬卿五百萬後漢孝靈紀賣關內侯假金印紫綬傳世入錢五百萬後漢寔從兄烈歷郡守九卿靈帝時開洪都門榜賣官爵公卿州郡下至黃綬各有差其富者先入錢貧者到官而後倍輸或因常侍阿保別自通達是時段熲樊陵張溫等雖有功勤名譽然皆先輸貨財而後登公位烈時因傳母入錢五伯萬得為司徒烈於是聲譽衰減從容問其子鈞曰吾居三公於議者如何鈞曰大人少有英稱歷位卿守論者不謂不當為三公而今登其位天下失望烈曰何為然也鈞曰論者嫌其銅臭烈怒舉杖擊之後魏明帝孝宣二年初承喪亂之後倉廩虛罄遂班入粟之制輸粟八千碩賞散侯六千碩散伯四千碩散子三千碩散男職人輸七百碩賞一大階授以實官白人輸五百碩聽依第出身晉載記李雄傳雄意在招致遠方國用不足故諸將每進金銀珍寶多有以得官者丞相楊褒諫曰陛下為天下主當網羅四海何有以官買金邪雄遜辭謝之餘見納諫劉毅傳箋證史記秦始皇本紀四年十月庚寅蝗蟲從東方來蔽天天下疫百姓內粟千石拜爵一級史記平準書上以為式朴忠拜為齊王太傅而孔僅之使天下鑄作器三年中拜為大農列於九卿而桑弘羊為大農丞筦諸會計事稍稍置均輸以通貨物矣始令吏得入穀補官郎至六百石漢書食貨志於是上感誼言始開藉田躬耕以勸百姓鼂錯復說上曰方今之務莫若使民務農而已矣欲民務農在於貴粟貴粟之道在於使民以粟為賞罰今募天下入粟縣官得以拜爵得以除罪如此富人有爵農民有錢粟有所渫師古曰渫散也音先列反下同夫能入粟以受爵皆有餘者也取於有餘以供上用則貧民之賦可損所謂損有餘補不足令出而民利者也於是文帝從錯之言令民入粟邊六百石爵上造師古曰上造第二等爵也稍增至四千石為五大夫師古曰五大夫第九等爵萬二千石為大庶長師古曰大庶長第十八等爵也各以多少級數有差漢書食貨志孝景二年令民半出田租三十而稅一也其後上郡以西旱復修賣爵令而裁其賈以招民師古曰裁謂減省之也後漢書安帝紀三年三公以國用不足奏令吏人入錢榖得為關內侯虎賁羽林郎五大夫官府吏緹騎營士各有差後漢書靈帝紀光和元年初開西邸賣官自關內侯虎賁羽林入錢各有差山陽公載記曰時賣官二千石二千萬四百石四百萬其以德次應選者半之或三分之一於西園立庫以貯之私令左右賣公卿公千萬卿五百萬後漢書靈帝紀四年十二月是歲賣關內侯假金印紫綬傳世入錢五百萬後漢書崔駰傳附崔寔寔從兄烈有重名於北州歷位郡守九卿靈帝時開鴻都門榜賣官爵公卿州郡下至黃綬各有差其富者則先入錢貧者到官而後倍輸或因常侍阿保別自通達阿保謂傅母也是時段熲樊陵張溫等雖有功勤名譽然皆先輸貨財而後登公位烈時因傅母入錢五百萬得為司徒烈於是聲譽衰減久之不自安從容問其子鈞曰吾居三公於議者何如鈞曰大人少有英稱歷位卿守論者不謂不當為三公而今登其位天下失望烈曰何為然也鈞曰論者嫌其銅臭烈怒舉杖擊之通典食貨十一鬻爵後魏明帝孝昌二年初承喪亂之後倉廩虛罄遂班入粟之制輸粟八千碩賞散侯六千碩散伯四千碩散子三千碩散男職人輸七百碩賞一大階授以實官白人輸五百碩聽依第出身又魏書食貨志莊帝初承喪亂之後倉廩用罄遂班入粟之制輸粟八千石賞散侯六千石散伯四千石散子三千石散男職人輸七百石賞一大階授以實官白民輸五百石聽依第出身晉書載記李雄傳李雄字仲儁特第三子也母羅氏夢雙虹自門升天一虹中斷既而生蕩後羅氏因汲水忽然如寐又夢大虵繞其身遂有孕十四月而生雄雄身長八尺三寸美容貌少以烈氣聞每周旋鄉里識達之士皆器重之以永興元年僭稱成都王赦其境內建元為建興雄意在招致遠方國用不足故諸將每進金銀珍寶多有以得官者丞相楊褒諫曰陛下為天下主當網羅四海何有以官買金邪雄遜辭謝之考課第六前漢京房傳元帝永光建昭間西羌反日蝕又久青亡光陰霧不精房數上疏先言其將然近數月遠一歲其言屢中天子說之數召見問房對曰古帝王以功舉賢則萬化成瑞應著未世以毀譽取人故功業廢而致災異宜令百官各試其功災異可息詔使房作其事房奏功課吏法晉灼曰令丞尉治一縣崇教化亡犯法者輒遷有盜賊滿三日不覺者則尉事也令覺之自除二尉負其辠率相准如此法上令公卿朝臣與房會議溫室皆以房言煩碎令上下相司不可許上意鄉之時部剌史奏事京師上召見諸剌史令房曉以課事剌史復以為不可行唯御史大夫鄭洪光祿大夫周堪言善前漢京房傳上令房上弟子曉知考功課吏事者欲試用之房上中郎任良姚平願以為剌史試考功法臣得通籍殿中為奏事以防雍塞石顯五鹿充宗皆疾房欲遠之建言宜試以房為郡守元帝於是以房為魏郡太守居得以考功法治郡後漢馬嚴傳日食嚴上封事曰日者眾陽之長食者陰侵之兆書曰旡曠庶官天工人其代之言王者代天官人也故考績黜陟以明褒貶旡功不黜則陰盛陵陽魏劉劭傳明帝景龍中受詔作都官考課劭上疏曰百官考課王政之大較然而歷代不務是以治典闕而未補能否混而相蒙陛下神慮內鑒明詔外發臣得以輒作都官考課七十二條會明帝崩不施行魏衛臻傳蔣濟遺臻書曰漢祖遇亡虜為上將周武拔漁父為大師布衣廝養可登王公何必守文試而後用臻答曰古人遺智慧而任度量須考績而加黜陟今子同牧野於成康喻斷蛇於文景好不經之舉開拔奇之津將使天下馳騁而起矣晉杜預傳預受詔為黜陟之課其略曰臣聞上古之政因循自然虛己委誠而信順之道應神感心通而天下之理得逮至淳朴漸散彰美顯惡設官分職以頒爵祿及至未世不能紀遠而求於密微疑諸心而信耳目疑耳目而信簡書簡書愈繁官方愈偽法令滋章巧飾彌多昔漢之剌史亦歲終奏事不制算課而清濁粗舉魏氏考課即京房之遺意其文可謂至密然由於累細故歷代不能通也豈若申唐堯之舊去密就簡而易從也今科舉優劣莫若委任達官各考所統在官一年已後每歲言優者一人為上第劣者一人為下第因計偕以名問如此六者主者總集採案其六歲處優舉者超用之六歲處劣舉者奏免之其優多劣少者敘用之劣多優少者左遷之新唐盧懷慎傳上疏曰臣請都督剌史上佐畿令任未曲考不得遷若治有尤異或加錫車裘祿秩降使臨問璽書尉勉若公卿有闕則擢之以勵其能者其不職或貪暴免歸田里以明賞罰之信箋證漢書京房傳永光建昭閒西羌反日蝕又久青亡光陰霧不精房數上疏先言其將然近數月遠一歲所言屢中天子說之數召見問房對曰古帝王以功舉賢則萬化成瑞應著末世以毀譽取人故功業廢而致災異宜令百官各試其功災異可息詔使房作其事房奏考功課吏法晉灼曰令丞尉治一縣崇教化亡犯法者輒遷有盜賊滿三日不覺者則尉事也令覺之自除二尉負其辠率相准如此法上令公卿朝臣與房會議宮室師古曰宮室殿名也皆以房言煩碎令上下相司不可許上意鄉之時部刺史奏事京師上召見諸刺史令房曉以課事刺史復以為不可行唯御史大夫鄭弘光祿大夫周堪初言不可後善之漢書京房傳上令房上弟子曉知考功課吏事者欲試用之房上中郎任良姚平願以為刺史試考功法臣得通籍殿中為奏事以防雍塞石顯五鹿充宗皆疾房欲遠之建言宜試以房為郡守元帝於是以房為魏郡太守秩八百石居得以考功法治郡後漢書馬援傳附馬嚴嚴字威卿肅宗即位徵拜侍御史中丞其冬有日食之災嚴上封事曰臣聞日者陰陽之長食者陰侵之徵書曰無曠庶官天工人其代之尚書咎繇之詞言王者代天官人也故考績黜陟以明褒貶無功不黜明陰盛陵陽卷五十四案馬嚴是馬援兄之子蓋其侄也三國志魏志劉劭傳景初中受詔作都官考課劭上疏曰百官考課王政之大較然而歷代弗務是以治典闕而未補能否混而相蒙陛下以上聖之宏略愍王綱之弛頹神慮內鑒明詔外發臣奉恩曠然得以啟矇輒作都官考課七十二條會明帝崩不施行三國志魏志衛臻傳中護軍蔣濟遺臻書曰漢祖遇亡虜為上將周武拔漁父為太師布衣廝養可登王公何必守文試而後用臻答曰古人遺智慧而任度量須考績而加黜陟今子同牧野於成康喻斷虵於文景好不經之舉開拔奇之津將使天下馳騁而起矣晉書杜預傳泰始中守河南尹預以京師王化之始自近及遠凡所施論務崇大體受詔為黜陟之課其略曰臣聞上古之政因循自然虛己委誠而信順之道應神感心通而天下之理得逮至淳樸漸散彰美顯惡設官分職以頒爵祿弘宣六典以詳考察然猶倚明哲之輔建忠貞之司使名不得越功而獨美功不得後名而獨隱皆疇咨博詢敷納以言及至末世不能紀遠而求於密微疑諸心而信耳目疑耳目而信簡書簡書愈繁官方愈偽法令滋章巧飾彌多昔漢之刺史亦歲終奏事不制算課而清濁粗舉魏氏考課即京房之遺意其文可謂至密然由於累細以違其體故歷代不能通也豈若申唐堯之舊去密就簡則簡而易從也夫宣盡物理神而明之存乎其人去人而任法則以傷理今科舉優劣莫若委任達官各考所統在官一年以後每歲言優者一人為上第劣者一人為下第因計偕以名聞如此六載主者總集採案其六歲處優舉者超用之六歲處劣舉者奏免之其優多劣少者敘用之劣多優少者左遷之新唐書盧懷慎傳上疏陳時政曰臣請都督刺史上佐畿令任未四考不得遷若治有尤異或加賜車裘祿秩降使臨問璽書慰勉須公卿闕則擢之以勵能者其不職或貪暴免歸田里以明賞罰之信
