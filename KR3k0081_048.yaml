body:
  text: 卷第四十八知天文第一史記天官書曰昔之傳天數者高辛之前重黎於唐虞羲和有夏昆吾商巫咸周史佚萇洪於宋子韋鄭則裨竈在齊其公楚唐昧趙尹皋魏石申前漢志天文者序二十八宿步五星日月以紀吉凶之象聖王所以參政也易曰觀乎大文以察時變前漢天文志凡天文在圖籍昭昭可知者經星常宿中外官凡百一十八名積數七百八十三星皆有州國官宮物類之象前漢李尋傳獨好洪範災異又學天文月令陰陽前漢溫舒從祖父受歷數天文以為漢厄三七之間上封事以豫戒成帝時谷永亦言如此及王莽篡位欲章代漢之符著其語焉後漢郅惲傳明天文歷數王莽時寇賊群發惲乃仰占天象歎謂友人曰方今鎮歲熒惑並漢分翼軫之域去而復來漢必再受命福歸有德如有順天發策者必成大功後漢郅惲傳上書王莽曰臣聞神器有命不可虛獲上天垂戒欲悟陛下令就臣位劉氏享天永命陛下順節盛衰取之以天還之以天可謂知命矣天為陛下嚴父臣為陛下孝子即收擊詔獄劾以大逆猶以惲據經讖難即害之使黃門近臣脅惲令自告狂病恍忽不覺所言惲乃瞋目詈曰所陳皆天文聖意非狂人所能造會赦得出後漢李郃傳和帝即位分遣使者皆微服單行各至州縣觀採風謠使者二人當到益部投郃候舍時夏夕露坐郃問曰二君發京師時寧知朝廷遣二使邪二人驚相視曰不聞也問何以知之郃指星示云有二使星向益州分野故知之耳前書觜觿參益州之分野也後漢張衡傳衡善機巧尤致思於天文研覈陰陽妙盡琁機之正作渾夫儀著靈憲算罔論言甚詳明算罔論網絡天地而算之後漢襄楷傳論曰古人有云善言天者必有驗於人而張衡亦云天文歷數陰陽占候今所宜急也郎顗襄楷能仰占俯察參諸人事禍福吉凶既應引之教義亦明此蓋道術所以有補於時後人所當取鑒者也然而其敝好巫故君子不以專心焉吳吳範傳範言歲在甲午劉備當得益州後呂岱從蜀還遇之白帝說備部眾離落死亡且半事必不克權以難範範曰臣所言者天道也而岱所見者人事耳備卒得蜀晉天文志易曰天垂象見吉凶聖人象之此則觀乎天文以示時變者也尚書曰天聰明自我人聰明此則觀乎人文以成化者也是故政教兆於人理祥變應乎天文得失雖微罔不昭著晉郭璞傳妙於術算有郭公者客居河東精於卜筮璞從之受業公以青囊中書九卷與之遂洞五行天文卜筮之術攘災轉禍通致無方雖京房管輅不能過也璞門人趙載嘗竊青囊書未及讀而為火所焚新唐書天文志貞觀初淳風上言舜在璿璣玉衡以齊七政則渾天儀也周禮土圭正日景以求地中有以見日行黃道之驗也暨于周未此器及亡漢落下閎作渾儀其後賈逵張衡等亦各有之而推驗七曜並循赤道按冬至極南夏至極北而赤道常定於中國無南北之異蓋渾儀無黃道久矣太宗異其說因詔為之至七年儀成表裏三重下據準基狀如十字末樹鼇足以張四表一日六合儀有天經雙規金渾緯規金常規相結於四極之內列二十八宿十日十二辰經緯三百六十五度二曰三辰儀圓徑八尺有璿規月遊規列宿距度七曜所行轉於六合之內三曰四游儀玄樞為油以連結玉衡游筩而貫約矩規又玄極北樹北辰南矩地軸傍轉於內玉衡在玄樞之間而南北游仰以觀天之辰宿下以識器之晷度皆用銅帝稱善置於凝暉閣唐李淳風傳淳風每占候吉凶若節契然當時術家意有鬼神相之非學習所致然竟不能測箋證史記天官書昔之傳天數者高辛之前重黎於唐虞羲和有夏昆吾殷商巫咸周室史佚萇弘於宋子韋鄭則裨竈在齊甘公楚唐昧趙尹皋魏石申漢書藝文志天文者序二十八宿步五星日月以紀吉凶之象聖王所以參政也易曰觀乎天文以察時變師古曰賁卦之彖辭也漢書天文志凡天文在圖籍昭昭可知者經星常宿中外官凡百一十八名積數七百八十三星皆有州國官宮物類之象漢書李尋傳李尋字子長平陵人也治尚書與張孺鄭寬中同師寬中等守師法教授尋獨好洪範災異又學天文月令陰陽漢書路溫舒傳溫舒從祖父受歷數天文以為漢厄三七之間張晏曰三七二百一十歲也自漢初至哀帝元年二百一年也至平帝崩二百十一年上封事以豫戒成帝時谷永亦言如此及王莽歷位欲章代漢之符著其語焉後漢書郅惲傳郅惲年十二失母居喪過禮及長理韓詩嚴氏春秋明天文歷數王莽時盜賊群發惲乃仰占玄象歎謂友人曰方今鎮歲熒惑並在漢分翼軫之域爾雅曰中央鎮星東方歲星南方熒惑翼軫者南方鶉尾之宿楚之分野演孔圖曰卯金刀名為劉中國東南出荊州故為漢分也去而復來漢必再受命福歸有德如有順天發策者必成大功後漢書郅惲傳乃上書王莽曰臣聞神器有命不可虛獲上天垂戒欲悟陛下令就臣位轉禍為福上天垂戒謂鎮歲熒惑並在漢分也劉氏享天永命陛下順節盛衰取之以天還之以天可謂知命矣若不早圖是不免於竊位也且堯舜不以天顯自與故禪天下陛下何貪非天顯以自累也天為陛下嚴父臣為陛下孝子父教不敢廢子產不可拒惟陛下留神莽大怒即收繫詔獄劾以大逆猶以惲據經讖難即害之使黃門近臣脅惲令自告狂病恍惚不覺所言惲乃瞋目詈曰所陳皆天文聖意非狂人所能造遂繫須冬會赦得出後漢書方術列傳李郃傳李郃字孟節漢中南鄭人也和帝即位分遣使者皆微服單行各至州縣觀採風謠使者二人當到益部投郃候舍時夏夕露坐郃因仰觀問曰二君發京師時寧知朝廷遣二使邪二人默然驚相視曰不聞也問何以知之郃指星示云有二使星向益州分野故知之耳前書觜參益州之分野也後漢書張衡傳衡善機巧尤致思於天文陰陽歷算常好玄經安帝雅聞衡善術學公車特徵拜郎中再遷為太史令遂乃研覈陰陽妙盡璇璣之正作渾天儀著靈憲算罔論言甚詳明算罔論盖網絡天地而算之因名焉後漢書襄楷傳論曰古人有云善言天者必有驗於人而張衡亦云天文歷數陰陽占候今所宜急也郎顗襄楷能仰瞻俯察參諸人事禍福吉凶既應引之教義亦明此盖道術所以有補於時後人所當取鑒者也然而其敝好巫故君子不以專心焉三國志吳志吳範傳吳範字文則會稽上虞人也以治歷數知風氣聞於郡中及壬辰歲範又白言歲在甲午劉備當得益州後呂岱從蜀還遇之白帝說備部眾離落死亡且半事必不克權以難範範曰臣所言者天道也而岱所見者人事耳備卒得蜀晉書天文志上易曰天垂象見吉凶聖人象之此則觀乎天文以示變者也尚書曰天聰明自我民聰明此則觀乎人文以成化者也是故政教兆於人理祥變應乎天文得失雖微罔不昭著晉書郭璞傳璞好經術博學有高才而訥於言論詞賦為中興之冠好古文奇字妙於陰陽算歷有郭公者客居河東精於卜筮璞從之受業公以青囊中書九卷與之由是遂洞五行天文卜筮之術攘災轉禍通致無方雖京房管輅不能過也璞門人趙載嘗竊青囊書未及讀而為火所焚新唐書天文志星經歷法皆出於數術之學唐興太史李淳風浮圖一行尤稱精博後世未能過也貞觀初淳風上言舜在璿璣玉衡以齊七政則渾天儀也周禮土圭正日景以求地中有以見日行黃道之驗也暨于周末此器乃亡漢洛下閎作渾儀其後賈逵張衡等亦各有之而推驗七曜並循赤道按冬至極南夏至極北而赤道常定於中國無南北之異蓋渾儀無黃道久矣太宗異其說因詔為之至七年儀成表裏三重下據準基狀如十字末樹鼇足以張四表一曰六合儀有天經雙規金渾緯規金常規相結於四極之內列二十八宿十日十二辰經緯三百六十五度二曰三辰儀圓徑八尺有璿璣規月遊規列宿距度七曜所行轉於六合之內三曰四游儀玄樞為軸以連結玉衡游筩而貫約矩規又玄樞北樹北辰南矩地軸傍轉於內玉衡在玄樞之間而南北游仰以觀天之辰宿下以識器之晷度皆用銅帝稱善置於凝暉閣新唐書方技列傳李淳風李淳風岐州雍人淳風於占候吉凶若節契然當世術家意有鬼神相之非學習可致終不能測也又舊唐書李淳風傳淳風每占候吉凶合若符契當時術者疑其別有役使不因學習所致然竟不能測也天人相通第二史記樂書子貢間樂凡音由於人心天之與人有以相通如影之象形響之應聲故為善者天報之以福為惡者天與之以殃其自然者也史記微子世家熒惑守心心宋之分野景公憂之司星子韋曰可移於相景公曰相吾之股肱曰可移於民景公曰君者待民曰可移於歲景公曰歲飢民困吾誰為君子韋曰天高聽卑君有君人之言三熒惑宜有動於是候之果徙三度前漢鮑宣上書曰今日蝕於三始誠可畏懼小民正月朔日尚恐毀敗器物何況於日虧乎陛下深內自責避正殿舉直言求過失罷退外親及旁仄素餐之人拜孔光為光祿大夫發覺孫寵息夫躬過惡眾庶歙然莫不說喜天人同心人心說則天意解矣前漢鄒陽上書曰昔荊軻慕燕丹之義白虹貫日太子畏之應劭曰燕太子丹質於秦始皇過之無禮丹亡去厚養荊軻令西剌秦王精誠感天白虹為之貫日也師古曰精誠若斯太子尚畏而不信也太白食昴義亦如之衛先生為秦晝長平之事太白食昴昭王疑之蘇林曰白起為秦伐趙破長平軍欲遂滅趙遣衛先生說昭王益兵糧為應侯所害事用不成其精誠上達於天故太白為之食昴昴趙分也將有兵故太白食身食干歷之也如淳曰太白天之將軍夫精變天地而信不諭兩主豈不哀哉昴前漢稚圭傳上疏曰天人之際精祲有以相盪善惡有以相推事作乎下者象動乎上陰陽之理各應其感陰變則靜者動陽敝則明者晻水旱之災隨類而至前漢劉向上疏曰諸侯和於下天應報於上故周頌曰降福穰穰又曰飴我釐麰釐麰麥也始自天降此皆以和獲天助也前漢述天文志曰炫炫上天垂象著明日月周輝星辰垂精百官立法宮室混成降應王政景以燭形王政失於此星辰變於彼猶景之象形後漢魯恭傳上書今興發軍役以事戎夷萬民者天之所生天愛其所生猶父母愛其子一物有不得其所者則天氣為之舛錯況於人乎故愛人者必有天報昔太王重人命而去邠故獲上天之祐後漢郎顗傳易內傳曰人君奢侈多飾宮室其時旱其災火是故魯僖遭旱修政自勑下鍾鼓之縣休繕治之官雖則不寧而時兩自降由此言之天之應人敏於景響易中孚傳曰陽感天不旋日易中孚傳曰陽感天不旋日諸侯不旋時大夫不過朞鄭玄注云陽者天子為善一日天立應以善為惡一日天立應以惡諸侯為善一時天立應以善為惡一時天立應以惡大夫為善一歲天亦立應以善為惡一歲天亦立應以惡一說云不旋日立應之不過時三辰間不過朞從今旦至明旦也陽即指天于也後漢諒輔仕郡為五采掾時夏大旱大守自出祈禱山川連日而無所降輔乃自暴庭中慷慨咒曰輔為股肱不能進諫納忠薦賢退惡和調陰陽承順天意至令天地否隔萬物焦枯輔今敢自祈請若至日中不雨乞以身塞無狀於是積薪柴聚茭茅以自環搆火其傍將自焚焉未及日中而天雲晦合須臾澍雨一郡沾潤世以此稱其至誠新唐書宋務光傳神龍元年大水詔文武九品以上官直言極諫務光上書曰后王樂聞過罔不興拒諫罔不亂樂聞過則下情通下情通則政無缺此所以興也拒諫則群議壅群議壅則上孤立此所以亂也臣嘗觀天人相與之際有感必應其間甚密是以教失於此變生於彼易曰天垂象見吉凶聖人象之餘見災異董仲舒傳箋證史記樂書子貢問樂凡音由於人心天之與人有以相通如景之象形響之應聲故為善者天報之以福為惡者天與之以殃其自然者也史記宋微子世家三十七年楚惠王滅陳熒惑守心心宋之分野也景公憂之司星子韋曰可移於相景公曰相吾之股肱曰可移於民景公曰君者待民曰可移於歲景公曰歲饑民困吾誰為君子韋曰天高聽卑君有君人之言三熒惑宜有動於是候之果徙三度過惡免官遣就國眾庶歙然莫不說喜天人同心人心說則天意解矣漢書鮑宣傳宣復上書言陛下父事天母事地子養黎民即位已來父虧明母震動子訛言相驚恐今日蝕於三始如淳曰正月一日為歲之朝月之朝日之朝始猶朝也誠可畏懼小民正月朔日尚恐毀敗器物何况於日虧乎陛下深內自責避正殿舉直言求過失罷退外親及旁仄素餐之人徵拜孔光為光祿大夫發覺孫寵息夫躬過惡免官遣就國眾庶歙然莫不說喜天人同心人心說則天意解矣漢書鄒陽傳從獄中上書曰臣聞忠無不報信不見疑臣常以為然徒虛語耳昔荊軻慕燕丹之義白虹貫日太子畏之應劭曰燕太子丹質於秦始皇遇之無禮丹亡去厚養荊軻令西刺秦王精誠感天白虹為之貫日也如淳曰白虹兵象日為君為燕丹表可克之兆師古曰精誠若斯太子尚畏而不信也太白食昴義亦如之衛先生為秦畫長平之事太白食昴昭王疑之蘇林曰白起為秦伐趙破長平軍欲遂滅趙遣衛先生說昭王益兵糧為應侯所害事用不成其精誠上達於天故太白為之食昴昴趙分也將有兵故太白食昴食干歷之也如淳曰太白天之將軍夫精變天地而信不諭兩主豈不哀哉漢書匡衡傳宣帝崩元帝初即位是時有日蝕地震之變上問以政治得失衡上疏曰臣聞天人之際精祲有以相盪善惡有以相推事作乎下者象動乎上陰陽之理各應其感陰變則靜者動陽蔽則明者晻水旱之災隨類而至漢書楚元王傳更生見堪猛在位幾已得復進懼其傾危乃上封事諫曰諸侯和於下天應報於上故周頌曰降福穰穰師古曰此執競之篇祀武王之詩也穰穰多也音人羊反又曰飴我釐麰師古曰此思文之篇以后稷配天之詩也釐麰麥也始自天降此皆以和致和獲天助也漢書敘傳炫炫上天縣象著明日月周輝星辰垂精百官立法宮室混成降應王政景以燭形張晏曰王政失於此星辰變於彼猶景之象形三季之後厥事放紛舉其占應覽故考新述天文志第六後漢書魯恭傳和帝初立議遣車騎將軍竇憲與征西將軍耿秉擊匈奴恭上疏諫曰今乃以盛春之月興發軍役擾動天下以事戎狄誠非所以垂恩中國改元正時由內及外也萬民者天之所生天愛其所生猶父母愛其子一物有不得其所者則天氣為之舛錯况於人乎故愛人者必有天報昔太王重人命而去邠故獲上天之祐後漢書郎顗傳顗對曰易內傳曰人君奢侈多飾宮室其時旱其災火是故魯僖遭旱脩政自勑下鍾鼓之縣休繕治之官雖則不寧而時雨自降由此言之天之應人敏於影響易中孚傳曰陽感天不旋日易中孚傳曰陽感天不旋日諸侯不旋時大夫不過朞鄭玄注云陽者天子為善一日天立應以善為惡一日天立應以惡諸侯為善一時天立應以善為惡一時天立應以惡大夫為善一歲天亦立應以善為惡一歲天亦立應以惡一說云不旋日立應之不過時三辰間不過朞從今旦至明旦也陽即指天子也後漢書獨行列傳諒輔傳諒輔字漢儒廣漢新都人也仕郡為五官掾時夏大旱太守自出祈禱山川連日而無所降輔乃自暴庭中慷慨咒曰輔為股肱不能進諫納忠薦賢退惡和調陰陽承順天意至令天地否隔萬物焦枯百姓喁喁無所訴告咎盡在輔今郡太守改服責己為民祈福精誠懇到未有感徹輔今敢自祈請若至日中不雨乞以身塞無狀於是積薪柴聚茭茅以自環茭乾草也搆火其旁將自焚焉未及日中時而天雲晦合須臾澍雨一郡沾潤世以此稱其志誠新唐書宋務光傳宋務光字子產一名烈汾州西河人舉進士及第調洛陽尉遷右衛騎曹參軍神龍元年大水詔文武九品以上官直言極諫務光上書曰后王樂聞過罔不興拒諫罔不亂樂聞過則下情通下情通則政無缺此所以興也拒諫則群議壅群議壅則上孤立此所以亂也臣嘗觀天人相與之際有感必應其間甚密是以教失於此變生於彼易曰天垂象見吉凶聖人象之在德為瑞第三後漢竇武傳上疏諫曰間者有嘉禾芝草黃龍之見夫瑞生必於嘉士福至實由善人在德為瑞無德為災陛下所行不合天意不宜稱慶後漢光武紀是夏京師醴泉涌出飲之者固疾皆愈惟眇蹇者不廖又有赤草生於水崖郡國頻上甘露群臣奏言地祗靈應而朱草萌生孝宣帝每有嘉瑞輒以改元神爵五鳳甘露黃龍列為年紀蓋以感致神祇表彰德信是以化致升平稱為中興今天下清寧靈物仍降陛下請存損挹推而不居豈可使祥符顯慶沒而無聞宜令大史撰集以傳來世帝不納常自謙無德每郡國所上輒抑而不當故史官罕得記焉後漢何敞傳肅宗元和中京師及四方累有奇異鳥獸草木言事者以為祥瑞敞通經傳能為天官意甚惡之乃曰夫瑞應依德而至災異緣政而生故鸐鵒來巢昭公有乾侯之戹西狩獲麟孔子有兩楹之殯海鳥避風臧文祀之君子譏焉晉元帝紀乃備百官立宗廟社稷于建康時四方競上符瑞帝曰孤負四海之責未能思愆何徵祥之有新唐志正觀初白鵲巢於殿庭之槐樹其巢合歡如腰鼓左右稱賀太宗曰吾常笑隋文帝好言祥瑞瑞在得賢白鵲子何益於事命掇之送於野新唐志嘉禾神芝奇禽異獸蓋王化之虛美也春秋不書祥瑞自今已後所有祥瑞不得上聞箋證後漢書竇武傳時國政多失內官專寵李膺杜密等為黨事考逮永康元年上疏諫曰間者有嘉禾芝草黃龍之見夫瑞生必於嘉士福至實由善人在德為瑞無德為災陛下所行不合天意不宜稱慶後漢書光武帝紀中元元年是夏京師醴泉湧出飲之者固疾皆愈惟眇蹇者不瘳又有赤草生於水崖郡國頻上甘露群臣奏言地祗靈應而朱草萌生孝宣帝每有嘉瑞輒以改元神爵五鳳甘露黃龍列為年紀盖以感致神祗表彰德信是以化致升平稱為中興今天下清寧靈物仍降陛下情存損挹推而不居豈可使祥符顯慶沒而無聞宜令太史撰集以傳來世帝不納常自謙無德每郡國所上輒抑而不當故史官罕得記焉後漢書何敞傳敞性公正自以趣舍不合時務每請召常稱疾不應元和中辟太尉宋由府由待以殊禮是時京師及四方累有奇異鳥獸草木言事者以為祥瑞敞通經傳能為天官意甚惡之乃言於二公曰夫瑞應依德而至災異緣政而生故鸜鵒來巢昭公有乾侯之戹西狩獲麟孔子有兩楹之殯海鳥避風臧文祀之君子譏焉晉書元帝紀乃備百官立宗廟社稷於建康時四方競上符瑞帝曰孤負四海之責未能思愆何徵祥之有舊唐書五行志貞觀初白鵲巢于殿庭之槐樹其巢合歡如腰鼓左右稱賀太宗曰吾常笑隋文帝好言祥瑞瑞在得賢白鵲子何益於事命掇之送于野舊唐書憲宗紀上庚戍荊南獻龜二詔曰朕以寡昧纂承丕業永思理本所寶惟賢至如嘉禾神芝奇禽異獸蓋王化之虛美也所以光武形於詔令春秋不書祥瑞朕誠薄德思及前人自今已後所有祥瑞但令准式申報有司不得上聞妖不勝德第四史記封禪書帝太戊有桑榖生於廷一暮大拱懼伊陟曰妖不勝德太戍修德桑榖死新唐書河間元王孝恭傳輔公祏反寇壽陽詔孝恭為行軍元帥討之引兵趨九江李靖李勣黃君漢張鎮州盧祖尚皆稟節度將發大饗士桮水變為血坐皆失色孝恭自如徐曰禍福無基唯所召爾顧我不負於物無重諸君憂公祏禍惡貫盈今仗威靈以問罪桮中血乃賊以授首之祥乎盡欲罷眾心為安新唐書姚崇傳開元四年山東大蝗崇奏秉被蟊賊付畀炙火請夜設火坎其旁其焚且瘞乃出御史為捕使汴州剌史倪若水上言除天災者當以德崇對曰庸儒泥文不知變事固有違經而合道反道而適權者昔魏世山東蝗小忍不除至人相食且討蝗縱不能盡不愈於養以遺患乎箋證史記封禪書後八世至帝太戊有桑穀生於廷一暮大拱懼伊陟曰妖不勝德太戊脩德桑榖死又史記殷本紀帝雍已崩弟太戊立是為帝太戊帝太戊立伊陟為相亳有祥桑榖共生於朝一暮大拱帝太戊懼問伊陟伊陟曰臣聞妖不勝德帝之政其有闕與帝其脩德太戊從之而祥桑枯死而去新唐書宗室列傳河間元王孝恭輔公祏反寇壽陽詔孝恭為行軍元帥討之引兵趨九江李靖李勣黃君漢張鎮州盧祖尚皆稟節度將發大饗士桮水變為血坐皆失色孝恭自如徐曰禍福無基唯所召爾顧我不負於物無重諸君憂公祏禍惡貫盈今仗威靈以問罪桮中血乃賊臣授首之祥乎盡飲罷眾心為安新唐書姚崇傳開元四年山東大蝗民祭且拜坐視食苗不敢捕崇奏詩云秉彼蟊賊付畀炎火漢光武詔曰勉順時政勸督農桑去彼螟蜮以及蟊賊此除蝗誼也且蝗畏人易驅又田皆有主使自救其地必不憚勤請夜設火坎其旁且焚且瘞乃可盡古有討除不勝者特人不用命耳乃出御史為捕蝗使分道殺蝗汴州刺史倪若水上言除天災者當以德昔劉聰除蝗不克而害愈甚拒御史不應命崇移書謂之曰聰偽主德不勝祅今祅不勝德古者良守蝗避其境謂修德可免彼將無德致然乎今坐視食苗忍而不救因以無年刺史其謂何若水懼乃縱捕得蝗十四萬石時議者喧譁帝疑復以問崇對曰庸儒泥文不知變事固有違經而合道反道而適權者昔魏世山東蝗小忍不除至人相食後奏有蝗草木皆盡牛馬至相噉毛今飛蝗所在充滿加復蕃息且河南河北家無宿藏一不穫則流離安危繫之且討蝗縱不能盡不愈於養以遺患乎
