body:
  text: 卷第九十八四夷侵中國第一前漢文帝紀三年胸奴入居北地河南為寇前漢景帝紀六年胸奴入雁門至武泉入上郡取苑馬武泉雲中之縣也養鳥獸者通名為苑故謂牧馬處為苑前漢賈誼傳上疏曰天下之勢方倒縣凡天子者天下之首蠻夷者天下之足也今胸奴嫚娒侵掠而漢歲致金絮采繕以奉之夷狄徵令是主上之操也令號令也操音千高反天子共貢是臣下之禮也足反居上首顧居下倒縣如此莫之能解猶為國有人乎豈謂國有明智之人乎臣竊料胸奴之衆不過漢一大縣以天下之大困於一縣之衆甚為執事者羞之陛下何不試以臣為屬國之官以主胸奴行臣之計請必係單于之頸而制其命伏中行説而笞而背鄭氏曰説奄人也漢使送公主妻胸奴説不肯行強之因以漢事告胸奴也師古曰中行姓也説名也行音胡光反説讀曰悅中行説事具在胸奴傳前漢鼂錯傳云胡人衣食之業不著於地其勢易以擾亂邊竟何以明之胡人食肉飲酪衣皮毛非有城郭曰宅之歸居如飛鳥走獸於廣壄美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此胡人之生業而中國之所以離南畝也今使胡人數處轉牧行獵於塞下或當燕代或當上郡北地隴西以候備塞之卒卒少則入陛下不救則邊民絶望而有降敵之心救之少發則不足多發遠縣才至則胡又已去聚而不罷為費甚大罷之則胡復入如此連年則中國貧苦而民不安矣前漢胸奴傳懿王時王室遂衰戎狄交侵暴虐中國中國被其苦詩人疾而歌之曰靡室靡家獫允之故豈不日戒獫允孔棘新唐突厥傳贊曰唐興四夷有弗率者皆利兵移之蹶其牙犁其廷而後已惟吐蕃回紇號強雄為中國患最久贊普遂盡盜河隍薄王畿為東境犯京師掠近輔殘馘華人謀夫虓帥圜視共計卒不得要領晚節二姓自亡而唐亦衰焉夫外撫內寧惟聖人不讓玄宗有逸德而拓地太大務遠功忽近虞逆賊一奮中原封裂訖二百年不得復完而至陵夷然則內先自治釋四夷為外懼守成之良資也箋證漢書文帝紀三年五月胸奴入居北地河南為寇漢書景帝紀六年六月胸奴入雁門至武泉入上郡取苑馬武泉雲中之縣也養鳥獸者通名為苑故謂牧馬處為苑漢書賈誼傳上疏曰天下之勢方倒縣凡天子者天下之首何也上也蠻夷者天下之足何也下也今胸奴嫚娒侵掠至不敬也為天下患至亡己也而漢歲致金絮采繒以奉之夷狄徵令是主上之操也師古曰徵召也令號令也操謂主上之所操持也操音千高反天子共貢是臣下之禮也足反居上首顧居下倒縣如此莫之能解猶為國有人乎師古曰顛倒如此而不能解救豈謂國有明智之人乎臣竊料胸奴之衆不過漢一大縣以天下之大困於一縣之衆甚為執事者羞之陛下何不試以臣為屬國之官以主胸奴行臣之計請必係單于之頸而制其命伏中行説而笞其背舉胸奴之衆唯上之令鄭氏曰説奄人也漢使送公主妻胸奴説不肯行強之因以漢事告胸奴也師古曰中行姓也説名也行音胡剛反説讀曰悅中行説事具在胸奴傳漢書鼂錯傳胡人衣食之業不著於地其勢易以擾亂邊竟何以明之胡人食肉飲酪衣皮毛非有城郭田宅之歸居如飛鳥走獸於廣壄美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此胡人之生業而中國之所以離南畝也今使胡人數處轉牧行獵於塞下或當燕代或當上郡北地隴西以候備塞之卒卒少則入陛下不救則邊民絶望而有降敵之心救之少發則不足多發遠縣才至則胡又已去聚而不罷為費甚大罷之則胡復入如此連年則中國貧苦而民不安矣漢書胸奴傳至穆王之孫懿王時王室遂衰戎狄交侵暴虐中國中國被其苦詩人始作疾而歌之曰靡室靡家獫允之故豈不日戒獫允孔棘新唐書吐蕃傳贊曰唐興四夷有弗率者皆利兵移之蹶其牙犂其廷而後已惟吐蕃回鶻號強雄為中國患最久贊普遂盡盜河湟薄王畿為東境犯京師掠近輔殘馘華人謀夫虓帥圜視共計卒不得要領晚節二姓自亡而唐亦衰焉夫外撫內寧惟聖人不讓玄宗有逸德而拓地太大務遠功忽近虞逆賊一奮中原封裂訖二百年不得復完而至陵夷然則內先自治釋四夷為外懼守成之良資也夷狄攻夷狄第二前漢宣帝紀本始二年詔曰胸奴數侵邊又西伐烏孫烏孫昆彌及公主因國使者上書言昆彌願發國精兵擊胸奴三年校尉常惠將烏孫兵入胸奴右地大克獲封列侯前漢胸奴傳冒頓既立時東胡強聞冒頓殺父自立乃使使謂冒頓曰欲得頭曼時號千里馬冒頓問群臣皆曰此胸奴寶馬也勿豫冒頓曰奈何與人鄰國愛一馬乎遂與之東胡以為冒頓畏之使使謂冒頓曰欲得單于一閼氏冒頓復問左右左右皆怒曰東胡旡道乃求閼氏請擊之冒頓曰奈何與人鄰國愛一女子乎遂取所愛閼氏豫東胡東胡王愈驕西侵與胸奴中間有棄地莫居千餘里各居其邊為甌脫東胡使使謂冒頓曰胸奴所與我界甌脫外棄地胸奴不能至也吾欲有之冒頓問群臣或曰此棄地豫之冒頓大怒曰地者國之本也奈何豫人諸言與者皆斬之冒頓上馬令國中有後者斬遂東襲擊東胡東胡初輕冒頓不為備及以兵至大破滅東胡王虜其民衆畜産甌脫境上候望之處後漢光武紀南單于遣使貢獻又遣其左賢王擊破北胸奴卻地千餘里後漢宋意傳章和二年鮮卑擊破北胸奴而南單于乘此請兵北伐因欲還歸舊庭時竇太后臨朝議欲從之意上疏曰夫戎狄之隔遠中國幽處北極界以沙漠簡賤禮義無有上下強者為雄弱即屈服自漢興以來征伐數矣其所剋獲曾不補害光武皇帝躬服金革之難深昭天地之明故因其來降羈縻畜養邊人得生勞役休息於茲四十餘年矣今鮮卑奉順斬獲萬數中國坐享大功而百姓不知其勞漢興功烈於斯為盛所以然者夷虜相攻旡損漢兵者也新唐突厥默啜傳盧俌上疏曰臣聞以蠻夷攻蠻夷中國之長算故陳湯統西域而郅支滅常惠用烏孫而胸奴敗餘見中國征四夷朝錯傳箋證漢書本始二年詔曰胸奴數侵邊又西伐烏孫烏孫昆彌及公主因國使者上書言昆彌願發國精兵擊胸奴三年校尉常惠將烏孫兵入胸奴右地大克獲封列侯漢書胸奴傳冒頓既立時東胡強聞冒頓殺父自立乃使使謂冒頓曰欲得頭曼時號千里馬冒頓問群臣群臣皆曰此胸奴寶馬也勿豫冒頓曰奈何與人鄰國愛一馬乎遂與之頃之東胡以為冒頓畏之使使謂冒頓曰欲得單于一閼氏冒頓復問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人鄰國愛一女子乎遂取所愛閼氏豫東胡東胡王愈驕西侵與胸奴中間有棄地莫居千餘里各居其邊為甌脫服虔曰甌脫作土室以伺也師古曰境上候望之處若今之伏宿舍也甌音一侯反脫音土活反東胡使使謂冒頓曰胸奴所與我界甌脫外棄地胸奴不能至也吾欲有之冒頓問群臣或曰此棄地豫之於是冒頓大怒曰地者國之本也奈何豫人諸言與者皆斬之冒頓上馬令國中有後者斬遂東襲擊東胡東胡初輕冒頓不為備及冒頓以兵至大破滅東胡王虜其民衆畜産後漢書光武紀南單于遣使詣闕貢獻奉蕃稱臣又遣其左賢王擊破北胸奴卻地千餘里後漢書宋意傳章和二年鮮卑擊破北胸奴而南單于乘此請兵北伐因欲還歸舊庭時竇太后臨朝議欲從之意上疏曰夫戎狄之隔遠中國幽處北極界以沙漠簡賤禮義無有上下強者為雄弱即屈服自漢興以來征伐數矣其所剋獲曾不補害光武皇帝躬服金革之難深昭天地之明故因其來降羈縻畜養邊人得生勞役休息於茲四十餘年矣今鮮卑奉順斬獲萬數中國坐享大功而百姓不知其勞漢興功烈於斯為盛所以然者夷虜相攻無損漢兵者也舊唐書突厥默啜傳右補闕盧俌上疏曰臣聞以蠻夷攻蠻夷中國之長算故陳湯統西域而郅支滅常惠用烏孫而胸奴敗遣子入侍第三前漢康居國成帝時遣子侍漢然自以絶遂獨驕嫚不肯與諸國相望都護郭舜數上言宜歸其侍子以章漢家不通無禮之國前漢胸奴傳綏和元年烏珠留若鞮單于遣子右股奴王烏鞮牙斯入侍上下文具本傳後漢西域傳永平十六年明帝將帥北征胸奴取伊吾盧地置宜未都尉以屯田遂通西域于置諸國皆遣子入侍西域自絶六十五載乃復通焉後漢莎車國元帝時嘗為侍子長於京師慕樂中國亦復參其典法常勑諸子當世奉漢家不可負也後漢西域莎車國王賢傳二十一年冬車師前王鄯善焉耆等十八國俱遣子入侍獻其珍寶及得見皆流涕稽首願得都護天子以中國初定北邊未服皆還其侍子時賢自負兵強欲并兼西域攻擊益甚諸國間都護不出而侍子皆還大憂恐乃與燉煌太守檄願留侍子以示莎車言侍子見留都護尋出冀具息其兵裴遵以狀聞天子許之後漢車師前王永元二年竇憲破北胸奴車師震懾前後王各遣子奉貢入侍並賜印綬金帛後漢南胸奴傳元興元年重遣使詣燉煌貢獻辭以國貧未能備禮願請大使當遣子入侍時鄧太后臨朝亦不答其使但加賜而已後漢南胸奴傳建武二十六年秋南單于遣子入侍詔賜單于冠帶衣裳黃金璽盩緺綬又轉河東米牛羊以贍給之盩音戾蝸古蛙反晉焉耆國武帝太康中其王龍安遣子入侍晉龜茲國武帝太康中遣子入侍餘見四夷歸化孝明紀箋證漢書西域傳康居國成帝時康居遣子侍漢貢獻然自以絶遠獨驕嫚不肯與諸國相望都護郭舜數上言宜歸其侍子絶勿復使以章漢家不通無禮之國漢書胸奴傳車牙單于立四歲綏和元年死弟囊知牙斯立為烏珠留若鞮單于烏珠留單于立以第二閼氏子輿為右賢王遣子右股奴王烏鞮牙斯入侍後漢書西域傳永平十六年明帝乃命將帥北征胸奴取伊吾盧地置宜禾都尉以屯田遂通西域于置諸國皆遣子入侍西域自絶六十五載乃復通焉後漢書西域傳莎車國元帝時嘗為侍子長於京師慕樂中國亦復參其典法常勑諸子當世奉漢家不可負也後漢書西域傳莎車國王賢傳二十一年冬車師前王鄯善焉耆等十八國俱遣子入侍獻其珍寶及得見皆流涕稽首願得都護天子以中國初定北邊未服皆還其侍子厚賞賜之是時賢自負兵強欲并兼西域攻擊益甚諸國間都護不出而侍子皆還大憂恐乃與燉煌太守檄願留侍子以示莎車言侍子見留都護尋出冀且息其兵裴遵以狀聞天子許之後漢書西域傳車師前王居交河城後王居務塗谷永元二年大將軍竇憲破北胸奴車師震懾前後王各遣子奉貢入侍並賜印綬金帛後漢書南胸奴傳元興元年重遣使詣敦煌貢獻辭以國貧未能備禮願請大使當遣子入侍時鄧太后臨朝亦不答其使但加賜而已後漢書南胸奴傳建武二十六年秋南單于遣子入侍奉奏詣闕詔賜單于冠帶衣裳黃金璽盩緺綬盩音戾草名以戾草染綬因以為名則漢諸侯王制戾緑色緺古蛙反説文曰紫青色也又轉河東米糒二萬五千斛牛羊三萬六千頭以贍給之晉書四夷列傳焉耆國武帝太康中其王龍安遣子入侍晉書四夷列傳龜茲國武帝太康中其王遣子入侍遣子入質第四前漢西域傳樓蘭既降服貢獻胸奴聞發兵擊之於是樓蘭遣一子質胸奴一子質漢征和元年樓蘭王死國人來請質子在漢者欲立之質子常坐漢法宮刑故不遣報曰天子愛之不能遣其更立其次前漢西域傳大宛國王宛貴人殺昧蔡立母寡弟蟬封為王遣子入侍質於漢漢因使使賂賜鎮撫之又見夷狄前漢胸奴傳贊餘見四夷歸化西域傳贊後漢來歙傳歙責囂曰遣伯春委質是臣主之交信也今反欲用佞惑之言為族滅之計叛主負子違背忠信乎箋證漢書西域傳樓蘭既降服貢獻胸奴聞發兵擊之於是樓蘭遣一子質胸奴一子質漢征和元年樓蘭王死國人來請質子在漢者欲立之質子常坐漢法下蠶室宮刑故不遣報曰侍子天子愛之不能遣其更立其次當立者漢書西域傳大宛國王后歲餘宛貴人殺昧蔡立母寡弟蟬封為王遣子入侍質於漢漢因使使賂賜鎮撫之後漢書來歙傳歙素剛毅遂發憤質責囂曰國家以君知臧否曉廢興故以手書暢意足下推忠誠遣伯春委質是臣主之交信也今反欲用佞惑之言為族滅之計叛主負子違背忠信乎吉凶之決在於今日異端第五前漢董仲舒傳春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同是以上亡以持一統法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪辟之説滅息然後統紀可一而法度可明民知所從矣前漢武帝紀建元元年詔舉賢良方正直言極諫之士丞相綰衛綰也奏所舉賢良或治申商韓非蘇秦張儀之言亂國政請皆罷奏可後漢鄭康成傳時大將軍袁紹總兵冀州遣使要康成大會賓客紹客多豪俊見玄儒者未以通人許之競設異端百家互起玄依方辨對咸出問表皆得所未聞莫不嗟服後漢鄭康成傳論曰自秦焚六經聖文埃滅漢興諸儒頗修藝文及東京學者亦各名家而守文之徒滯固所稟異端紛紜互相詭激遂令經有數家家有數説章句多者或乃百餘万言學徒勞而少功後生疑而莫正康成括囊大典綱羅衆家刪裁繁誣刊改漏失自是學者略知所歸王父豫章君每考先儒經訓而長於康成常以為仲尼之門不能過也後漢徐防傳上疏曰伏見太學試博士弟子皆以意説不修家法私相容隱開生姦路每有策試輒興諍訟論議紛錯互相是非孔子稱述而不作又曰吾猶及史之闕文疾史有所不知而不肯闕也今不依章句妄生穿鑿以遵師為非義意説為得理輕侮道術寖以成俗誠非詔書實選本意改薄從忠三世常道後漢蔡雍傳雍七事表昔孝宣會諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致遠則泥君子故當志其大者小道如今諸子書也晉王述傳少以孝聞安貧守約不求聞達性沉靜每坐客馳辨異端競起而述處之恬如也箋證漢書董仲舒傳仲舒對曰春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同是以上亡以持一統法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪辟之説滅息然後統紀可一而法度可明民知所從矣漢書武帝紀建元元年冬十月詔丞相御使列侯中二千石二千石諸侯相舉賢良方正直言極諫之士丞相綰師古曰衛綰也奏所舉賢良或治申商韓非蘇秦張儀之言亂國政請皆罷奏可後漢書鄭康成傳時大將軍袁紹總兵冀州遣使要玄大會賓客紹客多豪俊並有才説見玄儒者未以通人許之競設異端百家互起玄依方辨對咸出問表皆得所未聞莫不嗟服後漢書鄭康成傳論曰自秦焚六經聖文埃滅漢興諸儒頗修藝文及東京學者亦各名家而守文之徒滯固所稟異端紛紜互相詭激遂令經有數家家有數説章句多者或乃百餘萬言學徒勞而少功後生疑而莫正鄭玄括囊大典綱羅衆家刪裁繁誣刊改漏失自是學者略知所歸王父豫章君每考先儒經訓而長於玄常以為仲尼之門不能過也後漢書徐防傳上疏曰伏見太學試博士弟子皆以意説不修家法私相容隱開生姦路每有策試輒興諍訟論議紛錯互相是非孔子稱述而不作又曰吾猶及史之闕文疾史有所不知而不肯闕也今不依章句妄生穿鑿以遵師為非義意説為得理輕侮道術寖以成俗誠非詔書實選本意改薄從忠三代常道專精務本儒學所先後漢書蔡雍傳雍上封事曰謹條宜所施行七事表左五事臣聞古者取士必使諸侯歲貢昔孝宣會諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致遠則泥君子故當志其大者論語子夏曰雖小道必有可觀者焉致遠恐泥鄭玄注云小道如今諸子書也泥謂滯陷不通晉書王述傳述字懷祖少孤事母以孝聞安貧守約不求聞達性沈靜每坐客馳辨異端競起而述處之恬如也
