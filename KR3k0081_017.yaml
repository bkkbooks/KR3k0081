body:
  text: 卷第十七恩澤下流第一史記三代年表黃帝策天命而治天下德澤深後世故其子孫皆復立為天子是天之報有德也人不知以為汜從布衣匹夫起耳夫布衣匹夫安能無故而起王天下乎前漢吾丘壽王傳周德始乎后稷長於公劉大於太王成於文武顯於周公德澤上昭天下漏泉無所不通漏言潤澤下霑如屋之漏前漢董仲舒傳制曰德潤四海澤臻草木前漢董仲舒對策曰德澤洋溢施乎方外延及群生前漢王褒傳聖王不遍窺望而視已明不單傾耳而聽已聰恩從祥風翱德與和氣遊後漢楊終傳上疏曰案春秋水旱之變皆應暴急惠不下流後漢郎顗傳王者則天之象因時之序宜開德發號爵賢命士流寬大之澤垂仁厚之德順助元氣含養庶類晉樂志改上邪曲為玄化言其時主修文武則天而行仁澤流洽天下喜樂也後漢郎顗傳易傳曰陽無德則旱陰僭陽亦旱陽無德者人君恩澤不施於人也陰僭陽者祿去公室臣下專權也箋證史記三代世表黃帝策天命而治天下德澤深後世故其子孫皆復立為天子是天之報有德也人不知以為汜從布衣匹夫起耳夫布衣匹夫安能無故而起王天下乎漢書吾丘壽王傳吾丘壽王字子贛趙人也汾陰得寶鼎武帝嘉之群臣皆上壽賀曰陛下得周鼎壽王獨曰非周鼎上聞之召而問之曰今朕得周鼎群臣皆以為然壽王獨以為非何也有説則可無説則死壽王對曰臣安敢無説臣聞周德始乎后稷長於公劉大於太王成於文武顯於周公德澤上昭天下漏泉師古曰昭明也漏言潤澤下霑如屋之漏無所不通漢書董仲舒傳制曰德潤四海澤臻屮木師古曰臻至也屮古草字也漢書董仲舒傳制曰德澤洋溢施呼方外延及群生漢書王褒傳上乃徵褒既至詔褒為聖主得賢臣頌其意褒對曰是以聖主不遍窺望而視已明不單頃耳而聽已聰恩從祥風翱德與和氣遊後漢書楊終傳建初元年大旱榖貴終乃上疏曰臣竊按春秋水旱之變皆應暴急惠不下流後漢書郎顗傳王者則天之象因時之序宜開發德號爵賢命士流寬大之澤垂仁厚之德順助元氣含養庶類晉書樂志下改上邪曲為玄化言其時主修文武則天而行仁澤流洽天下喜樂也後漢書郎顗傳四事易傳曰陽無德則旱陰僣陽亦旱陽無德者人君恩澤不施於人也陰僣陽者祿去公室臣下專權也恩澤均平第二前漢禮樂志歌云雲施稱民永受厥福言稱物平施其澤如雲前漢鮑宣上書諫曰陛下上為皇天子下為黎庶父母為天收養元元視之當如一合尸鳩之詩尸鳩曹國風之篇也其詩云尸鳩在桑其子七兮叔人君子其儀一兮言尸鳩之鳥養其子平均如一善人君子布德施惠亦當然也尸鳩拮鞠也箋證漢書禮樂志安世房中歌十七章其詩曰承帝明德師象山則雲施稱民永受厥福師古曰言稱物平施其澤如雲也稱音尺孕反漢書鮑宣傳宣以諫大夫從其後上書諫曰天下乃皇天之天下也陛下上為皇天子下為黎庶父母為天牧養元元視之當如一合尸鳩之詩師古曰尸鳩曹國風之篇也其詩云尸鳩在桑其子七兮淑人君子其儀一兮言尸鳩之鳥養其子七平均如一善人君子布德施惠亦當然也尸鳩拮鞠也拮音居黠反宋祁曰浙本無之詩二字赦宥第三前漢平帝紀元壽二年詔曰夫赦令者將與天下更始誠欲令百姓改行潔己全其性命也往者有司多舉奏赦前事纍增罪過誅陷亡辜殆非重信慎刑灑心自新之意也前漢丙吉傳望氣者言長安獄中有天子氣上遣使者分條中都官詔獄繫者亡輕重皆殺之郭禳夜到郡邸獄吉閉門不納曰皇曾孫在它人亡辜死者猶不可況親曾孫乎相守至天明不得入穰還劾奏吉武帝亦寤曰天使之也因赦天下郡邸獄繫者獨賴吉得生恩及四海矣後漢孝明紀詔曰昔歲五榖登衍今茲蠶麥善收其大赦天下方盛夏長養之時蕩滌宿惡以報農功晉刑法志劉頌上言曰周禮三赦三宥施於老幼悼耄黔黎不屬逮者此非為惡之所出故刑法逆舍而宥之至於自非此族犯罪則必刑而無赦此政之理也暨至後世以時嶮多難因赦解結權以行之又不以寬罪人也至今常以罪積獄繫赦以散之是以赦愈數而獄愈塞原其所由肉刑不用之故也新唐韋嗣立傳願陛下廓天地之量施雷雨之仁取垂拱以來罪無輕重所不赦者普皆原洗死者還官生者霑恩則天下膫然知向所陷罪非陛下意也新唐太宗紀正觀六年十二月慮囚縱死罪者歸其家七年九月縱囚來歸皆赦之箋證前漢書平帝紀元壽二年六月哀帝崩九月辛酉中山王即皇帝位謁高廟大赦天下詔曰夫赦令者將與天下更始誠欲令百姓改行潔己全其性命也往者有司多舉奏赦前事纍增罪過誅陷亡辜殆非重信慎刑灑心自新之意也漢書丙吉傳吉治巫蠱事連歲不決後元二年武帝疾往來長楊五柞宮望氣者言長安獄中有天子氣於是上遣使者分條中都官詔獄繫者亡輕重一切皆殺之內謁者令郭穰夜到郡邸獄吉閉門拒使者不納曰皇曾孫在他人亡辜死者猶不可况親曾孫乎相守至天明不得入穰還以聞因劾奏吉武帝亦寤曰天使之也因赦天下郡邸獄繫者獨賴吉得生恩及四海矣師古曰吉拒閉使者天子感寤乃普赦天下其郡邸繫獄者既因吉得生而赦宥之恩遂及四海也後漢書明帝紀十年四月戊子詔曰昔歲五穀登衍今茲蠶麥善收其大赦天下方盛夏長養之時蕩滌宿惡以報農功晉書刑法志及劉頌為廷尉頻表宜復肉刑不見省又上言曰周禮三赦三宥施於老幼悼耄黔黎不屬逮者此非為惡之所出故刑法逆舍而宥之至於自非此族犯罪則必刑而無赦此政之理也暨至後世以時嶮多難因赦解結權以行之又不以寬罪人也至今恆以罪積獄繁赦以散之是以赦愈數而獄愈塞如此不已將至不勝原其所由肉刑不用之故也新唐書韋嗣立傳上書極陳永淳後庠序隳散胄子衰缺又曰臣願陛下廓天地之量施雷雨之仁取垂拱以來罪無重輕所不赦者普皆原洗死者還官生者霑恩則天下瞭然知向所陷罪非陛下意也新唐書太宗本紀貞觀六年十二月辛未慮囚縱死罪者歸其家七年九月縱囚來歸皆赦之借赦第四後漢王符傳述赦篇曰凡療病者必知脈之虛實氣之所結然後為之方故疾可愈而壽可長也為國者必先知民之所苦禍之所起然後為之禁故姦可塞而國可安也今日賊良民之甚者莫大於數赦贖赦贖數則惡人昌而善人傷矣何以明之夫謹勑之人身不蹈非又有為吏正直不避強禦而姦禍之黨橫加誣言者皆知赦之不久故也善人君子被侵怨而能至闕庭自明者万無數人數人之中得省問者百不過一既對尚書而空遣去者復什六七矣其輕薄姦軌既陷罪法怨毒之家冀其辜戮以解畜憤而反一概悉蒙赦釋令惡人高會而誇吒老盜伏藏而過門孝子見讎而不得討遭盜者覩物而不敢取痛莫甚焉夫養稂莠者傷禾稼惠姦軌者賊良民書曰文王作罰刑茲無赦先王之制刑法也非好傷人肌膚斷人壽命也貴威姦懲惡除人害也故經稱天討有罪五刑五用哉詩刺彼宜有罪汝反脫之古者唯始受命之君承大亂之極寇賊姦軌難為法禁故不得不有一赦與之更新頤育萬民以成大化非以養姦活罪放縱天賊也夫性惡之民民之豺狼雖得放宥之澤終無改悔之心旦脫重梏夕還囹圄嚴明令尹不能使其斷絶何也凡敢為大姦者才必有過於衆而能自媚於上者也多散誕得之財奉以諂諛之辭以轉相驅非有第五公之廉直孰不為顧哉論者多曰久不赦則姦軌熾而吏不制宜數肆眚以解散之此未昭政亂之本源不察禍福之所生也後漢吳漢傳漢病篤車駕親臨問所欲言對曰唯願陛下慎無赦而已蜀後主傳評曰方國君繼體踰年改元而章武之三年則革稱建興考之古羊體理為違又國不置史行事多遺災異靡書諸葛亮雖達於為政凡此之類猶未有周焉然經載十二而年名不易軍旅屢興而赦不妄下不亦卓乎蜀孟光傳延熙九年秋大赦光於衆中責大將軍費禕曰夫赦者偏枯之物非明世所宜有也衰弊窮極必不得已然後權而行之耳今主上仁賢百僚稱職有何旦夕之危而數施非常之恩以惠姦宄之惡乎禕但顧謝踧踖而已北齊赦日武庫令設金雞及鼓於閶闔門外之右勒集因徒於闕前撾鼓千聲釋枷鎖焉違之新唐太宗皇后長孫氏傳從幸九成宮方屬疾疾稍亟太子欲請大赦泛度道人祓塞災會后曰死生有命非人力所支若修福可延吾不為惡使善無效我尚何求且赦令國大事佛老異方教耳皆上所不為豈以吾亂天下法箋證後漢書王符傳述赦篇曰凡療病者必知脈之虛實氣之所結然後為之方故疾可愈而壽可長也為國者必先知民之所苦禍之所起然後為之禁故姦可塞而國可安也今日賊良民之甚者莫大於數赦贖赦贖數則惡人昌而善人傷矣何以明之哉夫謹勑之人身不蹈非又有為吏正直不避強禦而姦猾之黨橫加誣言者皆知赦之不久故也善人君子被侵怨而能至闕庭自明者萬無數人數人之中得省問者百不過一既對尚書而空遣去者復什六七矣其輕薄姦軌既陷罪法怨毒之家冀其辜戮以解畜憤而反一概悉蒙赦釋令惡人高會而誇吒老盜服臧而過門孝子見讎而不得討遭盜者覩物而不敢取痛莫甚焉夫養稂莠者傷禾稼惠姦軌者賊良民書曰文王作罰刑茲無赦康誥之言也先王之制刑法也非好傷人肌膚斷人壽命也貴威姦懲惡除人害也故經稱天命有德五服五章哉天討有罪五刑五用哉詩刺彼宜有罪汝反脫之詩大雅也古者唯始受命之君承大亂之極寇賊姦軌難為法禁故不得不有一赦與之更新頤育萬物以成大化非以養姦活罪放縱天賊也夫性惡之民民之豺狼雖得放宥之澤終無改悔之心旦脫重梏夕還囹圄嚴明令尹不能使其斷絶何也凡敢為大姦者才必有過於衆而能自媚於上者也多散誕得之財奉以諂諛之辭以轉相驅誕猶虛也非有第五公之廉直孰不為顧哉謂第五倫也為司空性廉直也論者多曰久不赦則姦軌熾而吏不制宜數肆眚以解散之此未昭政亂之本源不察禍福之所生也後漢書吳漢傳二十年漢病篤車駕親臨問所欲言對曰臣愚無所知識唯願陛下慎無赦而已三國志蜀志後主劉禪傳評曰禮國君繼體踰年改元而章武之三年則革稱建興考之古義體理為違又國不置史注記無官是以行事多遺災異靡書諸葛亮雖達於為政凡此之類猶有未周焉然經載十二而年名不易軍旅屢興而赦不妄下不亦卓乎三國志蜀志孟光傳孟光字孝裕河南洛陽人延熙九年秋大赦光於衆中責大將軍費褘曰夫赦者偏枯之物非明世所宜有也衰弊窮極必不得已然後乃可權而行之耳今主上仁賢百僚稱職有何旦夕之危倒縣之急而數施非常之恩以惠姦宄之惡乎褘但顧謝踧踖而已隋書刑法志載北齊事曰赦日則武庫令設金雞及鼓於閶闔門外之右勒集囚徒於闕前撾鼓千聲釋枷鎖焉新唐書后妃列傳太宗文德順聖皇后長孫氏上太宗文德順聖皇后長孫氏河南洛陽人從幸九成宮方屬疾疾稍亟太子欲請大赦泛度道人祓塞災會后曰死生有命非人力所支若修福可延吾不為惡使善無效我尚何求且赦令國大事佛老異方教耳皆上所不為豈宜以吾亂天下法不傷生第五後漢孝章紀巡守勑侍御史司空曰方春所過無得有所伐殺車可以引避引避之騑馬可輟解輟解之詩云敦彼行葦牛羊勿踐履禮人君伐一草木不時謂之不孝俗知順人莫知順天其明稱朕意後漢鄧皇后紀詔曰凡供薦新味多非其節或鬱養強生或穿掘萌芽味無所至而夭折生長豈所以順時育物乎傳曰非其時不食自今當奉祠陵廟及給御者皆須時乃上凡所省二十三種後漢五行志後世聖人知恤民之憂思深大者必饗其樂勤仁育物使不夭折者必受其福故為之制禮以節之使夫上仁繼天統物不伐其功民物安逸若道自然莫知所謝箋證後漢書章帝紀乙丑勑侍御史司空曰方春所過無得有所伐殺車可以引避引避之騑馬可輟解輟解之夾轅者為服馬服馬外為騑馬詩云敦彼行葦牛羊勿踐履詩大雅也鄭玄注云敦敦然道旁之葦牧牛羊者無使踐履折傷之况於人乎禮人君伐一草木不時謂之不孝禮記孔子曰伐一樹殺一獸不以其時非孝也俗知順人莫知順天其明稱朕意後漢書鄧皇后紀和熹鄧皇后諱綏蔡雍曰諡法有功安人曰熹太傅禹之孫也七年正月初入太廟齋七日賜公卿百僚各有差庚戌謁宗廟率命婦群妾相禮儀與皇帝交獻親薦成禮而還因下詔曰凡供薦新味多非其節或鬱養強孰或穿掘萌芽味無所至而夭折生長豈所以順時育物乎傳曰非其時不食自今當奉祠陵廟及給御者皆須時乃上凡所省二十三種後漢書輿服志後世聖人知恤民之憂思深大者必饗其樂勤仁育物使不夭折者必受其福故為之制禮以節之使夫上仁繼天統物不伐其功民物安逸若道自然莫知所謝萬物得所第六前漢文帝紀元年三月詔曰方春和時草木群生之物皆有以自樂前漢楚元王傳向上封事諫曰臣聞舜命九官濟濟相讓和之至也衆賢和於朝則萬物和於野故蕭韶九成而鳳凰來儀擊石拊石百獸率舞前漢禮樂志青陽歌青陽開動根荄以遂膏潤并受跂行畢逮霆聲發榮壧處傾聽枯稿復産乃成厥命衆庶熙熙施及夭胎群生啿啿惟春之祺遂者言皆生出也凡有足而行者稱跂行也靁霆始發草木舒榮則蟄蟲處巖崖者莫不頃聽而起啿徒感反前漢司馬相如傳其遺札書言討禪事頌曰自我天覆雲之油油油油雲行貌甘露時雨厥壤可遊言雨霧滂沛其澤可以遊泳滋液滲漉何生不育滲漉謂潤澤下究故無生而不育也新唐蕡對策曰前所謂欲氣之和也在遂其性以導之者當納人於仁壽也夫欲人之仁壽也在立制度修教化夫制度立則財用省財用省則賦斂輕賦斂輕則人富矣教化修則爭競息爭競息則刑罰清刑罰清則人安矣既富矣則仁義興焉既安矣則壽考至焉仁壽之心感於下和平之氣應於上故災害不作休祥荐臻萬物咸遂矣箋證漢書文帝紀元年三月有司請立皇后皇太后曰立太子母竇氏為皇后詔曰方春和時草木群生之物皆有以自樂漢書楚元王傳附劉向上封事諫曰臣聞舜命九官濟濟相讓和之至也衆賢和於朝則萬物和於野故簫韶九成而鳳皇來儀擊石拊石百獸率舞師古曰韶舜樂名舉簫管之屬示其備也於韶樂九奏則鳳皇見其容儀擊鍾鳴磬而百獸相率來舞言感至和也漢書禮樂志青陽開動根荄以遂臣瓚曰春為青陽師古曰草根曰荄遂者言皆生出也荄音該膏潤并愛跂行畢逮孟康曰跂音岐師古曰并兼也逮及也凡有足而行者稱跂行也霆聲發榮壧處頃聽晉灼曰壧穴也謂蟄蟲驚聽也師古曰壧與巖同言靁霆始發草木舒榮則蟄蟲處巖崖者莫不頃聽而起頃讀曰傾枯稿復産乃成厥命衆庶熙熙施及夭胎群生啿啿惟春之祺如淳曰祺福也師古曰啿啿豐厚之貌也音徒感反祺音其青陽三漢書司馬相如傳相如既病免家居茂陵天子曰司馬相如病甚可往從悉取其書若不然後失之矣使所忠往正義姓所名忠也風俗通姓氏云漢書有諫大夫所忠氏而相如已死家無書問其妻對曰長卿固未嘗有書也時時著書人又取去即空居長卿未死時為一卷書曰有使者來求書奏之無他書其遺札書言封禪事奏所忠忠奏其書天子異之其書曰遂作頌曰自我天覆雲之油油李奇曰油油雲行貌甘露時雨厥壤可遊師古曰言雨霧滂沛其澤可以遊泳也滋液滲漉何生不育師古曰滲漉謂潤澤下究故無生而不育也新唐書劉蕡傳太和二年舉賢良方正能直言極諫蕡對曰臣前所謂欲氣之和也在遂其性以導之者當納人於仁壽也夫欲人之仁壽也在立制度修教化夫制度立則財用省財用省則賦斂輕賦斂輕則人富矣教化修則爭競息爭競息則刑罰清刑罰清則人安矣既富矣則仁義興焉既安矣則壽考至焉仁義之心感於下和平之氣應於上故災害不作休祥荐臻四方底寧萬物咸遂矣威信並行第七前漢薛宣傳出為臨淮太守政教大行會陳留郡有大賊上徙宣陳留盜賊禁止吏民重其威信前漢辛慶忌傳為國虎臣遭世承平胸奴西域親附重其威信前漢雋不疑傳擢為京兆尹京師吏民重其威信前漢段會宗傳五府舉為西域都護西域重其威信前漢王尊傳尊為益州剌史居部二歲懷來徼外蠻夷歸附其威信後漢耿純傳東郡濟陰盜賊群起遣李通王常擊之帝以純威信著於衛地遣使與大兵會東郡東郡聞純入界盜賊九千餘人皆詣純降大兵不戰而還璽書復以為東郡太守吏民悅服後漢彭修傳時賊張子林等數百人作亂郡言州請修守吳令修與太守俱出討賊賊望見車馬競交射之飛失雨集修障扞太守而為流失所中死太守得全賊素聞其恩信即殺弩中修者餘悉皆降散言曰自為彭君故降不為太守服也餘見道不拾遺田疇傳箋證漢書薛宣傳宣數言政事出為臨淮太守政教大行會陳留郡有大賊廢亂師古曰廢亂者政教不行也上徙宣為陳留太守盜賊禁止吏民敬其威信漢書辛慶忌傳慶忌居處恭儉食飲被服尤節約然性好輿馬號為鮮明唯是為奢為國虎臣遭世承平胸奴西域親附敬其威信漢書雋不疑傳雋不疑字曼倩勃海人也武帝崩昭帝即位而齊孝王孫劉澤交結郡國豪桀謀反欲先殺青州刺史不疑發覺收捕皆伏其辜擢為京兆尹賜錢百萬京師吏民敬其威信漢書段會宗傳段會宗字子松天水上邽人也竟寧中以杜陵令五府舉為西域都護騎都尉光祿大夫西域敬其威信漢書王尊傳王尊字子贛師古曰贛音貢涿郡陰陽人也涿郡太守徐明薦尊不宜久在閭巷上以尊為郿令遷益州刺史尊居部二歲懷來徼外蠻夷歸附其威信後漢書耿純傳耿純字伯山巨鹿宋子人也八年東郡濟陰盜賊群起遣大司空李通橫野大將軍王常擊之帝以純威信著於衛地東郡舊衛地也遣使拜太中大夫使與大兵會東郡東郡聞純入界盜賊九千餘人皆詣純降大兵不戰而還璽書復以為東郡太守吏民悅服後漢書彭修傳彭修字子陽會稽昆陵人也後州辟從事時賊張子林等數百人作亂郡言州請修守吳令修與太守俱出討賊賊望見車馬競交射之飛矢雨集修障扞太守而為流矢所中死太守得全賊素聞其恩信即殺弩中修者餘悉皆降散言曰自為彭君故降不為太守服也與民同甘苦第八史記燕世家昭王於齊破燕之後即位吊死問孤與百姓同其若燕國豐富士卒樂軼輕戰史記衛康叔世家文公初立輕賦平賊身自勞與百姓同苦以收衛民史記越世家吳王將伐齊子胥諫曰未可臣聞勾踐食不重味與百姓同苦樂此人不死必為國患吳有越腹心之疾齊與吳疥瘲也前漢薛廣德傳上幸甘泉郊泰畤禮畢因留射獵廣德諫曰陛下日撞亡秦之鍾聽鄭衛之樂今士卒暴露從官勞倦願陛下恩與百姓同憂樂天下幸甚箋證史記燕召公世家燕昭王於破燕之後即位卑身厚幣以招賢者燕王弔死問孤與百姓同甘苦二十八年燕國殷富士卒樂軼輕戰史記衛康叔世家衛康叔名封周武王同母少弟也戴公申元年卒齊桓公以衛數亂乃率諸侯伐翟為衛築楚邱正義括地志云城武縣有楚邱亭立戴公弟燬為衛君是為文公文公初立輕賦平罪索隱輕賦稅平斷刑也平或作卒卒謂士卒也罪字連下讀蓋亦一家之義爾身自勞與百姓同苦以收衛民史記越王勾踐世家居二年吳王將伐齊子胥諫曰未可臣聞勾踐食不重味與百姓同苦樂此人不死必為國患吳有越腹心之疾齊與吳疥瘲也索隱疥瘲音介鮮漢書薛廣德傳薛廣德字長卿沛郡相人也廣德為人溫雅有醞藉及為三公直言諫爭始拜旬日間上幸甘泉郊泰畤禮畢因留射獵廣德上書曰竊見關東困極人民流離陛下日撞亡秦之鐘聽鄭衛之樂臣誠悼之今士卒暴露從官勞倦願陛下亟反宮思與百姓同憂樂天下幸甚
