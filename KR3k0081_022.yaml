body:
  text: 卷第二十二寬刑第一後漢杜林傳群臣上合古者肉刑嚴重則人畏法令今害之也薄故姦宄不勝宜增科禁林奏曰周之五刑不過三千大漢初興詳覽失得故破觚為圓斫雕為朴蠲除苛政更立疏綱海內歡欣人懷寬德及至其後漸以滋章吹毛索疵詆欺無限果桃菜茹之饋集以成臧小事無妨於義以為大戮故國無廉士家無完行至於法不能禁令不能止上下相遁為弊彌深臣愚以為宜如舊制帝從之遁猶回避前漢高祖紀召諸縣豪傑曰父老苦秦苛法久矣誹謗者族耦語者棄市吾與父老約法三章耳殺人者死傷人及盜抵罪餘悉除去秦法吏民皆按堵如故前漢循吏傳漢興之初反秦之敝與民休息凡事簡易禁罔疏闊後漢劉寬傳典歷三郡溫仁多恕雖在倉卒未嘗疾言遽色嘗以為齊之以刑民免而無恥吏人有過但用蒲鞭罰之主辱而已終不加苦後漢鮑永傳遷楊州牧時南土尚多寇暴永以吏人痍傷之後乃緩其銜轡銜轡喻法律以控銜人也説苑曰理國譬若張琴大弦急則小弦絶矣故急於其銜轡者非千里之御也示誅強橫而鎮撫其餘百姓安之魏明帝紀詔曰有虞氏畫象而民弗犯周人刑錯而不用朕追望土世之風邈乎何相去之遠法令滋章犯者彌多刑罰愈衆而姦不可止往者按大辟之條多所蠲除思濟生民之命而郡國斃獄一歲之中尚過數百豈朕訓導不醇俾民輕罪將苛法猶存為之陷阱乎有司其議獄緩死務從寬簡箋證後漢書杜林傳杜林字伯山扶風茂陵人也十四年群臣上言古者肉刑嚴重則人畏法令今憲律輕薄故姦軌不勝宜增科禁以防其源詔下公卿林奏曰周之五刑不過三千大漢初興詳覽失得故破矩為圓斫雕為朴蠲除苛政更立疏網海內歡欣人懷寬德及至其後漸以滋章吹毛索疵詆欺無限果桃菜茹之饋集以成臧小事無妨於義以為大戮故國無廉士家無完行至於法不能禁令不能止上下相遁為敝彌深遁猶回避也臣愚以為宜如舊制不合翻移帝從之漢書高帝紀十一月召諸縣豪傑曰父老苦秦苛法久矣誹謗者族耦語者棄市吾與諸侯約先入關者王之吾當王關中與父老約法三章耳殺人者死傷人及盜抵罪餘悉除去秦法吏民皆按堵如故漢書循吏傳漢興之初反秦之敝與民休息凡事簡易禁罔疏闊後漢書劉寬傳典歷三郡溫仁多恕雖在倉卒未嘗疾言遽色常以為齊之以刑民免而無恥吏人有過但用蒲鞭罰之示辱而已終不加苦後漢書鮑永傳封為關內侯遷揚州牧時南土尚多寇暴永以吏人痍傷之後乃緩其銜轡銜轡喻法律以控御人也説苑曰理國譬若張琴大弦急則小弦絶矣故急於其銜轡者非千里之馭也示誅強橫而鎮撫其餘百姓安之三國志魏志明帝紀四年六月壬申詔曰有虞氏畫象而民弗犯周人刑錯而不用朕從百王之末追望上世之風邈乎何相去之遠法令滋章犯者彌多刑罰愈衆而姦不可止往者按大辟之條多所蠲除思濟生民之命此朕之至意也而郡國斃獄一歲之中尚過數百豈朕訓導不醇俾民輕罪將苛法猶存為之陷阱乎有司其議獄緩死務從寬簡輕刑第二前漢文帝詔曰蓋聞有虞之時畫衣冠異章服以為戮而民不犯何治之至也前漢雋不疑傳每行縣録囚徒還其母輒問不疑有所平反活幾何人反音幡幡奏使從輕即不疑多有所平反母喜笑為飲食言語異於他時或亡所出母怒為之不食故不疑為吏嚴而不殘前漢刑法志言上古用象刑是殺人者不死傷人者不刑是惠暴而寬惡也後漢黃香傳東平清河奏訞言卿仲遼等所連及且千人香科別據奏全活甚衆每郡國疑罪輒務求輕科每存憂濟後漢循吏傳初光武長於民間頗達情偽見稼穡艱難百姓病害至天下已定務用安靜解王莽之繁密還漢世之輕法吳顧雍傳權嘗咨問得失張昭因陳法令太稠刑罰微重宜有所蠲損權顧問雍雍對曰臣之所聞亦如昭所陳於是權乃議獄輕刑隋文帝開皇中大理掌固來曠上封事言大理官司恩寬帝以曠為忠直遣每朝於五品行中參見曠又告少卿趙綽濫免囚徒帝使信臣推驗初無阿曲帝又怒曠命斬之綽因固爭以為曠不合死帝乃拂衣入閣綽又矯言臣更不理曠自有他事未及奏聞帝命引入閣綽再拜請曰臣有死罪三臣為大理少卿不能制馭掌固使曠觸挂大刑死罪一也囚不合死而臣不能死爭死罪二也臣本無他事而謬言求人死罪三也帝解顏新唐蕭釣傳詔原死太常工為宮人通訊遺詔殺之且附律釣言禁當有漸雖附律工不應死帝曰如姬竊符朕以為戒今不濫工死然喜得忠言即宥二徙遠裔唐蕭瑀傳瑀兄子釣遷諫議大夫盧文操踰垣盜左藏庫物高宗以別駕職在糾繩身行盜竊命殺之釣進諫曰然恐天下聞之必謂陛下輕法律賤人命任喜怒貴財物遂特免其死餘見決獄寬平郭躬傳箋證漢書刑法志孝文即位十三年遂下令曰制詔御史蓋聞有虞氏之時畫衣冠異章服以為戮而民弗犯何治之至也漢書雋不疑傳雋不疑字曼倩勃海人也昭帝即位而齊孝王孫劉澤交結郡國豪桀謀反欲先殺青州刺史不疑發覺收捕皆伏其辜擢為京兆尹賜錢百萬京師吏民敬其威信每行縣録囚徒還其母輒問不疑有所平反活幾何人如淳曰反音幡幡奏使從輕也即不疑多有所平反母喜笑為飲食語言異於他時或亡所出母怒為之不食故不疑為吏嚴而不殘漢書刑法志殺人者不死傷人者不刑是惠暴而寬惡也故象刑非生於治古方起於亂今也後漢書黃香傳黃香字文強江夏安陸人也十二年東平清河奏訞言卿仲遼等所連及且千人香科別據奏全活甚衆每郡國疑罪輒務求輕科愛惜人命每存憂濟後漢書循吏列傳初光武長於民間頗達情偽見稼穡艱難百姓病害至天下已定務用安靜解王莽之繁密還漢世之輕法三國志吳志顧雍傳權嘗咨問得失張昭因陳聽采聞頗以法令太稠刑罰微重宜有所蠲損權默然顧問雍曰君以為何如雍對曰臣之所聞亦如昭所陳於是權乃議獄輕刑隋書刑法志大理掌固來曠上封事言大理官司恩寬帝以曠為忠直遣每旦於五品行中參見曠又告少卿趙綽濫免徒囚帝使信臣推驗初無阿曲帝又怒曠命斬之綽因固爭以為曠不合死帝乃拂衣入閣綽又矯言臣更不理曠自有他事未及奏聞帝命引入閣綽再拜請曰臣有死罪三臣為大理少卿不能制馭掌固使曠觸挂天刑死罪一也囚不合死而臣不能死爭死罪二也臣本無他事而妄言求入死罪三也帝解顏新唐書蕭瑀傳附蕭鈞鈞瑀從子有才譽永徽中纍遷諫議大夫盧文操跳堞盜庫財高宗以其職主幹當自盜罪死鈞曰囚罪誠死然恐天下聞謂陛下重貨輕法任喜怒殺人帝曰真諫議也詔原死太常工為宮人通訊遺詔殺之且附律鈞言禁當有漸雖附律工不應死帝曰如姬竊符朕以為戒今不濫工死然喜得忠言即宥工徙遠裔舊唐書蕭瑀傳瑀兄子鈞隋遷州刺史梁國公珣之子也永徽二年歷遷諫議大夫兼弘文館學士時有左武候別駕盧文操踰垣盜左藏庫物高宗以別駕職在糾繩身行盜竊命有司殺之鈞進諫曰文操所犯情實難原然恐天下聞之必謂陛下輕法律賤人命任喜怒貴財物臣之所職以諫為名愚衷所懷不敢不奏帝謂曰卿職在司諫能盡忠規遂特免其死罪措刑第三史記禮書古者堯舜之治天下也蓋殺一人刑二人而天下治傳曰威厲而不試刑措而不用前漢文帝紀贊曰海內豐富興於禮義斷獄數百幾致措刑前漢董仲舒策曰商人執五刑以督姦傷流膚以懲惡成康不式天下不犯囹圄空虛式用也成康之時刑措不式也前漢刑法志孝文即位躬修淵默勸趣農桑減省租賦而將相皆舊功臣少文多質懲惡亡秦之政論議務在寬厚恥言人之過失化行天下告訐之俗易吏安其官民樂其業畜積歲增戶口寖息風流篤厚禁罔疏闊選張釋之為廷尉罪疑者豫民是以刑罰大省至於斷獄四百有刑錯之風前漢刑法志孔子曰工欲善其事必先利其器文德者帝王之利器威武者文德之輔助也夫文之所加者深則武之所服者大德之所施者慱則威之所制者廣三代之盛至於刑措兵寢者其本末有序帝王之極功也新唐魏微傳帝即位四年歲斷死二十九幾至刑措前漢董仲舒傳至於成康之隆囹圄空虛餘見教化餘見執法徐有功傳餘見化民以德董仲舒傳箋證史記禮書古者帝堯之治天下也蓋殺一人刑二人而天下治傳曰威厲而不試刑措而不用漢書文帝紀贊曰孝文皇帝即位二十三年專務以德化民是以海內殷富興於禮義斷獄數百幾致刑措嗚呼仁哉漢書董仲舒傳制曰殷人執五刑以督姦傷肌膚以懲惡成康不式四十餘年師古曰式用也成康之時刑措不用天下不犯囹圄空虛漢書刑法志孝文即位躬修玄默勸趣農桑減省租賦而將相皆舊功臣少文多質懲惡亡秦之政論議務在寬厚恥言人之過失化行天下告訐之俗易吏安其官民樂其業畜積歲增戶口寖息風流篤厚禁罔疏闊選張釋之為廷尉罪疑者豫民師古曰從輕斷是以刑罰大省至於斷獄四百有刑錯之風漢書刑法志孔子曰工欲善其事必先利其器文德者帝王之利器威武者文德之輔助也夫文之所加者深則武之所服者大德之所施者博則威之所制者廣三代之盛至於刑錯兵寢者其本末有序帝王之極功也新唐書魏徵傳帝即位四年歲斷死二十九幾至刑措漢書董仲舒傳武王行大誼平殘賊周公作禮樂以文之至於成康之隆囹圄空虛省刑第四史記商本紀西伯獻洛西之地以請除炮烙之刑紂許之賜弓矢斧鉞使得征伐為西伯前漢萬石君傳慶出為齊國相齊國慕其家行不治而齊國大治不治言無所治罰後漢光武紀詔曰孔子云刑罰不中則民無所措手足其與二千石諸大夫博士議郎議省刑法後漢孝明紀論曰明帝善刑理法令分明日晏坐朝幽枉必達內外無幸曲之私在上無矜大之色斷獄得情號居前代十二故後之言事者莫不先建武永平之政十二十斷其二言少刑也後漢鍾離意傳意除瑕丘令吏有檀建者盜竊縣內意屏人問狀建叩頭服罪不忍加刑遣令長休建父聞之為建設酒謂曰吾聞無道之君以刃殘人有道之君以義行誅子罪命也遂令建進藥而死魏倉慈傳遷燉煌太守先是屬城獄訟衆猥縣不能決多集治下慈躬往省閲科簡輕重自非殊死但鞭杖遣之一歲決刑曾不滿十人晉懷帝紀永嘉元年春除三族刑箋證史記殷本紀西伯之臣閎夭之徒求美女奇物善馬以獻紂紂乃赦西伯西伯出而獻洛西之地以請除炮烙之刑紂乃許之賜弓矢斧鉞使得征伐為西伯漢書萬石君傳萬石君石奮其父趙人也慶於兄弟最為簡易矣然猶如此出為齊相齊國慕其家行不治而齊國大治師古曰不治言無所治罰後漢書光武帝紀二年三月乙未大赦天下詔曰頃獄多冤人用刑深刻朕甚愍之孔子云刑罰不中則民無所措手足其與中二千石諸大夫博士議郎議省刑法後漢書明帝紀論曰明帝善刑理法令分明日晏坐朝幽枉必達內外無幸曲之私在上無矜大之色斷獄得情號居前代十二十斷其二言少刑也故後之言事者莫不先建武永平之政後漢書鍾離意傳鍾離意字子阿會稽山陰人也後除瑕丘令吏有檀建者盜竊縣內意屏人問狀建叩頭服罪不忍加刑遣令長休建父聞之為建設酒謂曰吾聞無道之君以刃殘人有道之君以義行誅子罪命也遂令建進藥而死三國志魏志倉慈傳倉慈字孝仁淮南人也太和中遷燉煌太守郡在西陲以喪亂隔絶曠無太守二十歲大姓雄張遂以為俗前太守尹奉等循故而已無所匡革慈到抑挫權右撫恤貧羸甚得其理舊大族田地有餘而小民無立錐之土慈皆隨口割賦稍稍使畢其本直先是屬城獄訟衆猥縣不能決多集治下慈躬往省閲料簡輕重自非殊死但鞭杖遣之一歲決刑曾不滿十人晉書孝廉帝紀永嘉元年春正月癸丑朔大赦改元除三族刑酷刑第五史記商本紀紂乃重刑辟有炮烙之法膏銅柱下加之炭令有罪者行焉輒墮炭中妲己笑名曰炮烙之刑前漢景帝紀詔曰法令度量所以禁暴止邪也獄人之大命死者不可復生吏或不奉法令以貨賂為市朋黨比周以苛為察以刻為明令亡罪者失職朕甚憐之前漢杜周傳與減宣更為中丞者十餘歲周少言重遲而內深次骨前漢張湯傳與趙禹共定諸律令務在深文拘守職之吏前漢刑法志今之聽獄者求所以殺之古之聽獄者求所以生之與其殺不辜寧失有罪今之獄吏上下相驅以刻為明深者獲功名平者多患害諺曰鬻棺者欲歲之疫非憎人欲殺之利在於人死也今治獄吏欲陷害人亦猶此矣前漢酷吏傳時民朴畏罪自重而都獨先嚴酷致行法不避貴戚列侯宗室見都側目而視號曰蒼鷹後漢五行志和帝永元五年六月郡國三雨雹大如雞子是時和帝用酷吏周紆為司隸校尉刑誅深刻後漢第五倫傳倫常疾俗吏苛刻及為三公上疏曰陳留令劉豫冠軍令駟協並以刻薄之姿臨人宰邑專念掠殺務為嚴苦吏民愁怨莫不疾之而今之誼者友以為能違天心失經義誠不可不慎也後漢酷吏樊曄傳曄為天水太守政嚴猛好申韓法善惡立斷人有犯其禁者率不生出獄新唐酷吏傳序太宗定天下留心聽斷著令州縣論死三覆奏京師五覆奏獄已決尚芋然為徹膳止樂至晚節天下刑幾措是時州縣有良吏無酷吏武后乘高中懦庸盜攘天權畏下異己欲脅制群臣椔翦宗支故縱使上飛變構大獄時四方上變事者皆給公乘所在護送至京師於是索元禮來俊臣之徒揣后密旨紛紛並興澤吻磨牙噬紳纓若狗豚然至叛胔臭達道路冤血流離刀鋸忠鯁貴強之臣朝不保昏而后因以自肆不出幃闥而天命已遷猶慮臣下弗懲而六道使始出矣至載初右臺御史周矩諫后曰凶人告訐遂以為常推劾之吏以嶮責痛詆為功鑿空投隙相矜以殘泥耳籠首枷偰兼暴拉脅籤爪縣髮熏目號曰獄持晝禁食夜禁寐敲朴搖撼使不得瞑號曰宿囚人苟賒死何求不得陛下不諒試取告牒判無驗者使推其情有司必上下其手希合盛旨今舉朝脅息謂陛下朝與為密夕與為讎一罹攝逮便與妻子決且周以仁昌秦用刑亡惟陛下察之新唐索元禮傳元禮天性殘忍武后擢遊擊將軍為推使即洛州牧院為制獄作鐵籠囚首加以楔至腦裂死訊一囚窮根柢相牽聯至數百未能訖后數引見以張其威新唐來俊臣傳俊臣與其黨朱南山輩造告密羅織經一卷皆有條貫支節布置事狀新唐姚崇傳后自俊臣等誅遂無反者然則向論死得旡冤邪崇曰自垂拱後被告者類自誣當是時以告言為功故天下號曰羅織甚於漢之鉤黨箋證史記殷本紀紂乃重辟刑有炮烙之法集解駰案列女傳曰膏銅柱下加之炭令有罪者行焉輒墮炭中妲己笑名曰炮烙之刑漢書景帝紀五年九月詔曰法令度量所以禁暴止邪也獄人之大命死者不可復生吏或不奉法令以貨賂為市朋黨比周以苛為察以刻為明令亡罪者失職朕甚憐之師古曰職常也失其常理也漢書杜周傳義縱為南陽太守以周為爪牙薦之張湯為廷尉史使案邊失亡所論殺甚多奏事中意任用與減宣更為中丞者十餘歲周少言重遲師古曰遲謂性非敏速也而內深次骨漢書張湯傳張湯杜陵人也治陳皇后巫蠱獄深竟黨與上以為能遷太中大夫與趙禹共定諸律令務在深文拘守職之吏漢書刑法志孔子曰古之知法者能省刑本也今之知法者不失有罪末矣又曰今之聽獄者求所以殺之古之聽獄者求所以生之與其殺不辜寧失有罪今之獄吏上下相驅以刻為明深者獲功名平者多後患諺曰鬻棺者欲歲之疫非憎人欲殺之利在於人死也今治獄吏欲陷害人亦猶此矣漢書酷吏傳郅都郅都河東大陽人也是時民朴畏罪自重而都獨先嚴酷致行法不避貴戚列侯宗室見都側目而視號曰蒼鷹後漢書五行志和帝永元五年六月郡國三雨雹大如雞子是時和帝用酷吏周紆為司隸校尉刑誅深刻後漢書第五倫傳倫雖峭直然常疾俗吏苛刻及為三公黃帝長者屢有善政乃上疏褒稱盛美因以勸成風德曰陳留令劉豫冠軍令駟協並以刻薄之姿臨人宰邑專念掠殺務為嚴苦吏民愁怨莫不疾之而今之議者反以為能違天心失經義誠不可不慎也後漢書酷吏列傳樊曄傳樊曄字仲華南陽新野人也隗囂滅後隴右不安乃拜曄為天水太守政嚴猛好申韓法善惡立斷人有犯其禁者率不生出獄新唐書酷吏列傳序太宗定天下留心聽斷著令州縣論死三覆奏京師五覆奏獄已決尚芋然為徹膳止樂至晚節天下刑幾措是時州縣有良吏無酷吏武后乘高中懦庸盜攘天權畏下異己欲脅制群臣椔剪宗支故縱使上飛變構大獄時四方上變事者皆給公乘所在護送至京師稟於客館高者蒙封爵下者被賚賜以勸天下於是索元禮來俊臣之徒揣后密旨紛紛並興澤吻磨牙噬紳纓若狗豚然至叛胔臭達道路冤血流離刀鋸忠鯁貴強之臣朝不保昏而后因以自肆不出幃闥而天命已遷猶慮臣下弗懲而六道使始出矣至載初右臺御史周矩諫后曰凶人告訐遂以為常推劾之吏以嶮責痛詆為功鑿空投隙相矜以殘泥耳籠首枷楔兼暴拉脅籤爪縣髮熏目號曰獄持晝禁食夜禁寐敲撲撼搖使不得瞑號曰宿囚人苟賒死何求不得陛下不諒試取告牒判無驗者使推其情有司必上下其手希合盛旨今舉朝脅息謂陛下朝與為密夕與為讎一罹攝逮便與妻子決且周用仁昌秦用刑亡惟陛下察之新唐書酷吏