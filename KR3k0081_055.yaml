body:
  text: 卷第五十五明經第一前漢翟方進傳受春秋積十餘年經學明習以射策甲科為郎二三歲舉明經遷議郎前漢諸葛豐傳以明經為郡文學前漢儒林傳元帝好儒能通一經者皆復復謂蠲其役賦前漢韋賢傳少子元成復以明經歷位至丞相故鄒魯諺曰遺子黃金滿籯不如一經前漢貢禹傳以明經潔行著聞召為慱士前漢王嘉傳以明經射策甲科為郎前漢孫寶傳以明經為郡吏大夫張忠辟寶為屬欲令授子經前漢儒林傳太常孔臧等議曰太常擇民年十八以上儀狀端正者補博士弟子郡國縣官好文學恭長上肅政教順鄉里出入不悖所聞令相長丞上屬所二千石二千石謹察可者常與計偕聞謂聞其部屬有此人也令縣令相侯相長縣長丞縣丞也詣太常得受業如弟子一歲皆輒課能通一藝以上補文學掌故武帝時後漢儒林傳光武中興立五經博士各以家法教授後漢孝章紀詔曰蓋三代導人教學為本漢承暴秦褒顯儒術建立五經為置博士其後學者雖曰承師亦別名家孝宣皇帝以為去聖久遠學不厭博故遂立大小夏侯尚書後又立京氏易建武中復置顏氏嚴氏春秋大小戴禮博士此皆扶進微學尊廣道藝也後漢左雄傳陽嘉云年太學新成詔試明經者補弟子增甲乙之科員各十人後漢劉寵傳寵少受父業以明經舉孝廉除東平陵令後漢周榮傳肅宗時舉明經辟司徒袁安府安數與議論甚器之魏志明帝紀詔曰郎吏學通一經才任牧民博士課試擢其高帝者亟用其浮華不務道本者皆罷退之新唐選舉志曰唐制取士之科多因隋舊然其大要有三由學館者曰生徒由州縣者曰鄉貢皆升于有司而進退之其科之目有秀才有明經有俊士有進士有明法有明字有明算有一史有三史有開元禮有道舉有童子而明經之別有五經有三經有二經有學究一經有三禮有三傳有史科此歲舉之常選也其天子曰詔者曰制舉所以待非常之才焉箋證漢書翟方進傳方進讀經博士受春秋積十餘年經學明習徒衆日廣諸儒稱之以射策甲科為郎二三歲舉明經遷議郎漢書諸葛豐傳諸葛豐字少季琅邪人也以明經為郡文學漢書儒林傳元帝好儒能通一經者皆復師古曰蠲其徭賦也復音方目反漢書韋賢傳少子玄成復以明經歷位至丞相故鄒魯諺曰遺子黃金滿籯不如一經漢書貢禹傳貢禹字少翁琅邪人也以明經潔行著聞徵為博士漢書王嘉傳王嘉字公仲平陵人也以明經射策甲科為郎漢書孫寶傳孫寶字子嚴潁川鄢陵人也以明經為郡吏御史大夫張忠辟寶為屬欲令授子經漢書儒林傳太常臧博士平等議曰太常擇民年十八以上儀狀端正者補博士弟子郡國縣官有好文學敬長上肅政教順鄉里出入不悖所聞令相長丞上屬所二千石師古曰聞謂聞其部屬有此人也令縣令相侯相長縣長丞縣丞也二千石謂郡守及諸王相也劉攽曰所聞當屬上句讀之則亦不煩訓詁矣二千石謹察可者常與計偕詣太常得受業如弟子一歲皆輒課能通一藝以上補文學掌故缺後漢書儒林列傳及光武中興愛好經術未及下車而先訪儒雅採求闕文補綴漏逸於是立五經博士各以家法教授後漢書章帝紀三年十一月壬戌詔曰蓋三代導人教學為本漢承暴秦褒顯儒術建立五經為置博士其後學者精進雖曰承師亦別名家孝宣皇帝以為去聖久遠學不厭博故遂立大小夏侯尚書後又立京氏易至建武中復置顏氏嚴氏春秋大小戴禮博士此皆所以扶進微學尊廣道藝也後漢書左雄傳陽嘉元年太學新成詔試明經者補弟子增甲乙之科員各十人後漢書循吏列傳劉寵傳父丕博學號為通儒寵少受父業以明經舉孝廉除東平陵令後漢書周榮傳周榮字平孫廬江舒人也肅宗時舉明經辟司徒袁安府安數與論議甚器之三國志魏志明帝四年春二月壬午詔曰其郎吏學通一經才任牧民博士課試擢其高第者亟用其浮華不務道本者皆罷退之新唐書選舉志唐制取士之科多因隋舊然其大要有三由學館者曰生徒由州縣者曰鄉貢皆升于有司而進退之其科之目有秀才有明經有俊士有進士有明法有明字有明算有一史有三史有開元禮有道舉有童子而明經之別有五經有三經有二經有學究一經有三禮有三傳有史科此歲舉之常選也其天子自詔者曰制舉所以待非常之才焉對策高第第二前漢朝錯傳文帝時詔有司舉賢良文學士錯在選中上親策詔之時賈誼已死對策百餘人唯錯為高第前漢翟方進傳年十二三給事太守府號遲頓數為掾吏所詈辱方進自傷欲西至京師受經母憐其幼隨之長安織屨以給方進積十餘年經學明習徒衆日廣以射策甲科為郎後漢劉淑傳淑少學明五經五府連辟並不就永興二年种皓舉淑賢良方正辭以侯雨不問淑高名使輿病詣京師淑不得已而赴洛陽對策為天下第一拜議郎後漢蘇章傳少傅學能屬文安帝時舉賢良方正對策高第拜議郎後漢魯丕傳建初元年肅宗舉賢良方正大司農劉寬舉丕對策者百餘人唯丕在高第除為議郎晉郤詵傳纍遷雍州剌史武帝於東堂會送問詵曰卿自以為如何詵對曰臣舉賢良對策為天下第一猶桂林之一枝崑山之片玉帝笑侍中奏免官帝曰吾與之戲耳晉索靖傳靖該博經史兼通內緯舉賢良方正對策高第晉阮种傳詔舉賢良方正直言之士何曾舉种時种與郤詵及東平王康俱居上第即除尚書郎然毀譽之徒或言對者因緣假託帝乃使更延群士庭以問之种對曰奏帝親覽焉擢為第一轉中書郎唐裴洎云對策一唐崔沔云擢第不中者誦而覆試第一新唐張柬之傳以賢良召時年七十餘矣對策者千餘柬之為第一新唐書元稹幼孤母鄭賢而文親授書傳九歲工屬文十五擢明經判入等補挍書郎元和元年舉制科對策第一新唐元載傳天寶初下詔舉明莊老列文四子學者載策入高科新唐書崔沔舉賢良方正高第不中者誦訾之武后敕有司覆試對益工遂為第一餘見待詔金馬公孫傳箋證漢書鼂錯傳後詔有司舉賢良文學士錯在選中上親策詔之時賈誼已死對策者百餘人唯錯為高第漢書翟方進傳方進年十二三失父孤學給事太守府為小史號遲頓不及事數為掾史所詈辱方進自傷欲西至京師受經母憐其幼隨之長安織屨以給方進讀經博士受春秋積十餘年經學明習徒衆日廣諸儒稱之以射策甲科為郎後漢書黨錮列傳劉淑傳淑少學明五經遂隱居立精舍講授諸生常數百人州郡禮請五府連辟並不就永興二年司徒种皓舉淑賢良方正辭以疾桓帝聞淑高名切責州郡使輿病詣京師淑不得已而赴洛陽對策為天下第一拜議郎後漢書蘇章傳蘇章字孺文扶風平陵人也章少博學能屬文安帝時舉賢良方正對策高第為議郎後漢書魯恭傳附弟魯丕丕字叔陵性沉深好學孳孳不倦建初元年肅宗詔舉賢良方正大司農劉寬舉丕時對策者百有餘人唯丕在高第除為議郎晉書郤詵傳郤詵字廣基濟陰單父人也纍遷雍州刺史武帝於東堂會送問詵曰卿自以為何如詵對曰臣舉賢良對策為天下第一猶桂林之一枝崑山之片玉帝笑侍中奏免詵官帝曰吾與之戲耳不足怪也晉書索靖傳靖該博經史兼通高緯州辟別駕郡舉賢良方正對策高第晉書阮种傳是時西虜內侵災眚屢見百姓饑饉詔三公卿尹常伯牧守各舉賢良方正直言之士於是太保何曾舉种賢良時种與郤詵及東平王康俱居上第即除尚書郎然毀譽之徒或言對者因緣假託帝乃更延群士庭以問之詔曰种對曰謹竭愚以對策奏帝親覽焉又擢為第一轉中書郎箋證略箋證略新唐書張柬之傳張柬之字孟將襄州襄陽人少涉經史補太學生祭酒令狐德棻異其才便以王佐期之中進士第始調清源丞永昌元年以賢良召時年七十餘矣對策者千餘柬之為第一新唐書元稹傳元稹字微之河南河內人稹幼孤母鄭賢而文親授書傳九歲工屬文十五擢明經判入等補校書郎元和元年舉制科對策第一拜左拾遺新唐書元載傳元載字公輔鳳翔岐山人少孤既長嗜學工屬文天寶初下詔舉明莊老列文四子學者載策入高第新唐書崔沔傳崔沔字善冲京兆長安人事親篤孝有才章擢進士舉賢良方正高第不中者誦訾之武后敕有司覆試對益工遂為第一待詔金馬第三前漢公孫鴻傳曰元光年復召賢良文學菑川國復推上鴻時對策百餘人太常奏鴻第居下策奏天子擢鴻對為第一召入見容兒甚麗拜為慱士待詔金馬門武帝時相馬者東門京作銅馬法獻之立馬於魯班門外更名魯班門為金馬門前漢東方朔傳待詔公車奉祿薄久之朔紿騶諸儒因使待詔金馬門稍得親近前漢蕭望之傳會稽鄭朋陰欲附望之言車騎將軍高遣客為姦利郡國及言許史子弟罪過章視周堪堪之令朋侍詔金馬門前漢賈捐之傳元帝初即位上疏言得失召待詔金馬門前漢正褒傳宣帝時修武帝故事講輪六藝群書博盡奇異之好召能為楚辭九江被公召見誦讀益召高材劉向張子僑華龍柳褒等待詔金馬門箋證漢書公孫弘傳元光五年復徵賢良文學菑川國復推上弘弘謝曰前已嘗西用不能罷願更選國人固推弘弘至太常上策詔諸儒制曰時對者百餘人太常奏弘第居下策奏天子擢弘對為第一召入見容貌甚麗拜為博士待詔金馬門如淳曰武帝時相馬者東門京作銅馬法獻之立馬於魯班門外更名魯班門為金馬門漢書東方朔傳武帝初即位徵天下舉方正賢良文學材力之士待以不次之位四方士多上書言得失自衒鬻者以千數朔初來上書曰朔文辭不遜高自稱譽上偉之令待詔公車奉祿薄未得省見久之朔紿騶朱儒因使待詔金馬門稍得親近漢書蕭望之傳會稽鄭朋陰欲附望之上疏言車騎將軍高遣客為姦利郡國及言許史子弟罪過章視周堪堪白令朋待詔金馬門漢書賈捐之傳賈捐之字君房賈誼之曾孫也元帝初即位上疏言得失召待詔金馬門漢書王褒傳王褒宣帝時修武帝故事講論六藝群書博盡奇異之好徵能為楚辭九江被公召見誦讀益召高材劉向張子僑華龍柳褒等待詔金馬門召詣公車第四前漢風帝紀三年詔曰丞相御史與將軍列侯中二毛大內郡國舉賢良方正能直言極諫之士詣公車朕將覽焉前漢雋不疑傳暴勝之為直使者衣繡衣持斧至東海威振州郡勝之素聞不疑賢至渤海遣吏請與相見遂表薦不疑召詣公車拜為青州剌史前漢師丹傳丹廢歸鄉里數年王莽白太后召詣公車賜爵頌之侯前漢孔光傳元壽元年正月朔日有蝕之後十餘日傳太后崩九月召光詣公車問日蝕事前漢王莽傳莽奏起明堂辟雍靈臺為學者築舍萬區立樂經益博士員經各五人召天下通一藝教授十一人以上及有逸禮古書毛詩周官爾雅天文圖讖鍾律月令兵法史篇文字通知其意者皆詣公車網羅天下異能之士至者前後千數皆令記不廷中將令正乖謬一異說云後漢宮承傳勤學不倦經典既明乃歸家教授由是顯名三府更辟皆不應永平中召詣公車後漢馬融傳為人美辭貌有俊才陽嘉二年詔舉敦朴岑起舉融召詣公車對策拜議郎後漢楊彪傳少傳家學初舉孝廉州舉茂才辟公府皆不應熹平中以傳習舊聞公車召拜議郎後漢孝靈紀詔公卿出馬弩舉列將子孫及吏民有明戰陳之略者詣公車後漢淳于恭傳肅宗下詔美恭素行告郡賜帛二十匹遣詣公車除為議郎引見極日方以政事禮待甚優進對陳政皆本道德是故南面而治天下莫不以教化為大務立太學以教於國設庠序以化於邑漸民以仁摩民以義節民以禮後漢孝明紀為四姓小侯開立學校置五經師袁宏漢紀曰永平中崇尚儒學自皇大子諸王侯及功臣子弟莫不受經又為外戚樊氏郭氏陰氏馬氏諸弟子立學號四姓小侯置五經師以非列侯故曰小侯後漢儒林傳明帝時復為功臣子孫四姓末屬別立校舍搜選高能以受其業自期門羽林之士悉令通孝經章句胸奴亦遣子入學濟濟乎洋洋乎盛於永平矣後漢朱浮傳上書曰夫太學者禮義之宮教化所由興也陛下尊崇先聖垂意古典宮室未飾干戈未休而先建太學造立橫舍橫學也或作黌比日車駕親臨觀饗將以廣時雍之化顯勉進之功也尋博士之官為天下宗師使孔聖之言傳而不絶後漢任延傳君武威太守造立校官自掾吏子孫皆令詣學受業復其徭役章句既通悉顯拔榮進之郡遂有儒雅之士後漢循吏衛颯傳遷桂陽太守郡與交州接境頗染其俗不知禮則颯下車條庠序之教設婚姻之禮期年間邦俗從化颯奇立後漢應奉傳武陵蠻詹山等四千餘人反叛拜武陵太守到官慰納山等皆悉降散於是興學校舉仄陋政稱變俗後漢左雄傳上言宜崇經術繕修太學帝從之陽嘉元年太學新成詔試明經者補弟子增甲乙之科員各十人後漢鮑昱傳子德為南陽太守郡學久廢德乃修起橫舍備俎豆黻冕行禮奏樂又尊饗國老宴會諸儒百姓觀者莫不勸服魏志武帝紀令曰喪亂已來十有五年後生者不見仁義禮讓之風吾甚傷之其令郡國各修文學縣滿五百戶置校官選其鄉之俊造而教學之庶幾先王之道不廢而有益於天下晉范寧傳始解褐為餘杭令在縣敦學校養生徒潔己修禮志行之士莫不宗之風化大行自中興已來崇學敦教未有如寧者新唐儒學傳序高祖始受命鉏纇夷荒天下略定即詔有司立周公孔子廟于國學四時祠求其後議加爵土國學始置生七十二員取三品已上子弟若孫為之太學百四十員取五品已上四門學百三十員取七品已上郡縣三等上郡學置生六十員後漢和帝詔百官舉賢良方正恭薦中牟名士王方帝即召方詣公車禮之與公卿所舉同後漢少沈靜好典籍三公並辟皆不就桓帝初詔公卿郡國舉至孝獨行之士實以郡舉召詣公車病不對策拜為郎箋證漢書成帝紀三年冬十二月戊申朔日有蝕之夜地震未央宮殿下詔曰丞相御史與將軍列侯中二千石及歷郡國舉賢良方正能直言極諫之士詣公車朕將覽焉漢書雋不疑傳武帝末郡國盜賊群起暴勝之為直指使者衣繡衣持斧逐捕盜賊督課郡國東至海以軍興誅不從命者威振州郡勝之素聞不疑賢至勃海遣吏請與相見勝之遂表薦不疑徵詣公車拜為青州刺史漢書師丹傳丹於是廢歸鄉里者數年平帝即位新都侯王莽白太皇太后發掘傅太后丁太后冢奪其璽綬更以民葬之定陶隳廢其皇廟徵丹詣公車賜爵關內侯食故邑漢書孔光傳會元壽元年正月朔日有蝕之後十餘日傅太后崩是月徵光詣公車問日蝕事漢書王莽傳莽奏起明堂辟雍靈臺為學者築舍萬區作市常滿倉制度甚盛立樂經益博士員經各五人徵天下通一藝教授十一人以上及有逸禮古書毛詩周官爾雅天文圖讖鍾律月令兵法史篇文字通知其意者皆詣公車網羅天下異能之士至者前後千數皆令記說廷中將令正乖繆一異說云後漢書承宮傳承宮字少子琅邪姑幕人也少孤年八歲為人牧豕鄉里徐子盛者以春秋經授諸生數百人宮過息廬下樂其業因就聽經遂請留門下為諸生拾薪執苦數年勤學不倦經典既明乃歸家教授遭天下喪亂遂將諸生避地漢中後與妻子之蒙陰山肆力耕種禾黍將熟人有認之者宮不與計推之而去由是顯名三府更辟皆不應永平中徵詣公車後漢書馬融傳馬融將作大匠嚴之子嚴援兄余之子為人美辭貌有俊才初京兆摯恂以儒術教授隱於南山不應徵聘名重關西融從其遊學博通經籍永初二年大將軍鄧騭聞融名召為舍人非其好也遂不應命客於涼州武都漢陽界中會羌虜鶹颷起邊方擾亂米穀踴貴自關以西道殣相望融既飢困乃悔而歎息謂其友人曰古人有言左手據天下之圖右手刎其喉愚夫不為所以然者生貴於天下也今以曲俗咫尺之羞滅無資之軀殆非老莊所謂也故往應騭召四年拜為校書郎中忤鄧氏滯於東觀十年不得調因兄子喪自劾歸太后崩安帝親政陽嘉二年詔舉敦朴城門校尉岑起舉融徵詣公車對策拜議郎後漢書楊震傳附曾孫楊彪彪字文先少傳家學初舉孝廉州舉茂才辟公府皆不應熹平中以博習舊聞公車徵拜議郎後漢書靈帝紀中平元年詔公卿出馬弩舉列將子孫及吏民有明戰陳之略者詣公車後漢書淳于恭傳淳于恭字孟孫北海淳于人也善說老子清靜不慕榮名家有山田果樹人或侵盜輒助為收採又見偷刈禾者恭念其愧因伏草中盜去乃起里落化之建初元年肅宗下詔美恭素行告郡賜帛二十匹遣詣公車除為議郎引見極日訪以政事遷侍中騎都尉禮待甚優其所薦名賢無不徵用進對陳政皆本道德漢書董仲舒傳仲舒對曰是故南面而治天下莫不以教化為大務立太學以教於國設庠序以化於邑後漢書明帝紀九年是歲大有年為四姓小侯開立學校置五經師袁宏漢記曰永平中崇尚儒學自皇太子諸王侯及功臣子弟莫不受經又為外戚樊氏郭氏陰氏馬氏諸子弟立學號四姓小侯置五經師以非列侯故曰小侯後漢書儒林列傳其後復為功臣子孫四姓末屬別立校舍搜選高能以受其業自期門羽林之士悉令通孝經章句胸奴亦遣子入學濟濟乎洋洋乎盛於永平矣後漢書朱浮傳七年轉太僕浮又以國學既興宜廣博士之選乃上書曰夫太學者禮義之宮教化所由興也陛下尊敬先聖垂意古典宮室未飾干戈未休而先建太學造立橫舍橫學也或作黌義亦同比日車駕親臨觀饗將以弘時雍之化顯勉進之功也尋博士之官為天下宗師使孔聖之言傳而不絶後漢書循吏列傳任延傳拜武威太守河西舊少雨澤乃為置水官吏修理溝渠皆蒙其利又造立校官自掾吏子孫皆令詣學受業復其徭役章句既通悉顯拔榮進之郡遂有儒雅之士後漢書循吏列傳衛颯傳衛颯政有名迹遷桂陽太守郡與交州接境頗染其俗不知禮則颯下車修庠序之教設婚姻之禮期年間邦俗從化後漢書應奉傳先是武陵蠻詹山等四千餘人反叛執縣令屯結連年詔下公卿議四府舉奉才堪將帥永興元年拜武陵太守到官慰納山等皆悉降散於是興學校舉側陋政稱變俗後漢書左雄傳又上言宜崇經術繕修太學帝從之陽嘉元年太學新成詔試明經者補弟子增甲乙之科員各十人後漢書鮑永傳附子鮑昱子德修志節有名稱纍官為南陽太守時歲多荒災唯南陽豐穰吏人愛悅號為神父時郡學久廢德乃修起橫舍備俎豆黼冕行禮奏樂又尊饗國老宴會諸儒百姓觀者莫不勸服三國志魏志武帝紀八年秋七月令曰喪亂已來十有五年後生者不見仁義禮讓之風吾甚傷之其令郡國各修文學縣滿五百戶置校官選其鄉之俊造而教學之庶幾先王之道不廢而有以益於天下晉書范汪傳附子范寧寧崇儒抑俗率皆如此溫薨之後始解褐為餘杭令在縣興學校養生徒潔已修禮志行之士莫不宗之朞年之後風化大行自中興已來崇學敦教未有如寧者也新唐書儒學列傳上高祖始受命鉏纇夷荒天下略定即詔有司立周公孔子廟于國學四時祠求其後議加爵土國學始置生七十二員取三品以上子弟若孫為之太學百四十員取五品以上四門學百三十員取七品以上郡縣三等上郡學置生六十員中下以十為差上縣學置生四十員中下亦以十為差又詔宗室功臣子孫就祕書外省別為小學後漢書魯恭傳會詔百官舉賢良方正恭薦中牟名士王方帝即徵方詣公車禮之與公卿所舉同後漢書崔駰傳附孫崔實少沈靜好典籍父卒隱居墓側服竟三公並辟皆不就桓帝初詔公卿郡國舉至孝獨行之士實以郡舉徵詣公車病不對策除為郎待詔公車第五前漢谷永傳建始三年冬日食地震詔舉方正直言極諫之士劉慶忌舉永待詔公車前漢朱買臣傳買臣詣闕上書書久不報待詔公車糧用之上計吏卒更乞丐之後漢趙熹傳少有節操鄧奉反於南陽熹素與奉善數遺書切責之而讒者因言熹與奉合謀帝以為疑及奉敗帝得喜書乃驚曰趙熹真長者也即召熹引見賜鞍馬待詔公車後漢魯恭傳恭始乃為郡吏太傳趙熹聞而辟之肅宗集諸儒於白虎觀恭時以經明得召與其議熹復舉恭直言待詔公車拜中牟令後漢尹敏傳上疏陳洪範消災之術時世祖方草創天下未遑其事命待詔公車餘見待詔金馬東方朔傳又見貧門滑稽傳箋證漢書谷永傳建始三年冬日食地震同日俱發詔舉方正直言極諫之士太常陽城侯劉慶忌舉永待詔公車漢書朱買臣傳詣闕上書書久不報待詔公車糧用乏上計吏卒更乞丐之後漢書趙熹傳趙熹字伯陽南陽宛人也少有節操時鄧奉反於南陽熹素與奉善數遺書切責之而讒者因言熹與奉合謀帝以為疑及奉敗帝得熹書乃驚曰趙熹真長者也即徵熹引見賜鞍馬待詔公車後漢書魯恭傳恭乃始為郡吏太傅趙熹聞而辟之肅宗集諸儒於白虎觀恭特以經明得召與其議熹復舉恭直言待詔公車拜中牟令後漢書儒林列傳尹敏傳尹敏字幼季南陽堵陽人也堵音者少為諸生初習歐陽尚書後受古文兼善毛詩榖梁左氏春秋建武二年上疏陳洪範消災之術時世祖方草創天下未遑其事命敏待詔公車
