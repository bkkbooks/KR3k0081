body:
  text: 卷第十九舉賢受賞第一前漢武帝紀元朔元年詔曰十室之邑必有忠信三人並行厥有我師今或至闔郡而不薦一人且進賢受上賞蔽賢蒙顯戮古之道也其議不舉者罪有司奏議曰古者諸侯貢主一適謂之好德再適謂之賢賢三適謂之有功乃加九錫不貢主一則黜爵再則黜地三而黜爵地畢矣今詔書令二千石舉孝廉所以化元元移風易俗也不舉孝不奉詔當以不恭論不察廉不勝任也當免前漢陳平傳封平為戶牖侯平辭曰此非臣之功也上曰吾用先生計謀戰勝克敵非功而何平曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知新唐馬周傳至長安舍中郎將常何家貞觀五年詔百官言得失何武人不涉學周為條二十餘事皆當世所切太宗怪問何何曰此非臣所能家客馬周教臣言之客忠孝人也帝即召之聞未至遣使者四輩敦趣及謁見與語帝大悅詔直門下省明年拜監察御史奉使稱職帝以何得人賜帛三百匹餘見論功蕭何傳箋證漢書武帝紀元朔元年冬十一月詔曰夫十室之邑必有忠信三人並行厥有我師今或至闔郡而不薦一人且進賢受上賞蔽賢蒙顯戮古之道也其與中二千石禮官博士議不舉者罪有司奏議曰古者諸侯貢士一適謂之好德再適謂之賢賢三適謂之有功乃加九錫不貢士一則黜爵再則黜地三則黜爵地畢矣今詔書昭先帝聖緒令二千石舉孝廉所以化元元移風易俗也不舉孝不奉詔當以不敬論不察廉不勝任也當免漢書陳平傳遂會諸侯於陳還至雒陽與功臣剖符定封封平為戶牖侯世世勿絶平辭曰此非臣之功也上曰吾用先生計謀戰勝克敵非功而何平曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知新唐書馬周傳至長安舍中郎將常何家貞觀五年詔百官言得失何武人不涉學周為條二十餘事皆當世所切太宗怪問何何曰此非臣所能家客馬周教臣言之客忠孝人也帝即召之間未至遣使者四輩敦趣及謁見與語帝大悅詔直門下省明年拜監察御史奉使稱職帝以何得人賜帛三百匹諫諍受賞第二前漢梅福上書曰欲致天下之士民有上書求見者輒使詣尚書問其所言言可采取者秩以升斗之祿賜以一束之帛若此則天下之士發憤悶吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣夫以四海之廣然其雋桀指世陳政言成文章質之先聖而不繆施之當世合時務若此者亦亡幾人故爵祿束帛者天下之底石高祖所以厲世摩鈍也孔子曰工欲善其事必先利其器魏太祖破烏丸引兵還注時寒且旱二百里無水軍又乏食殺馬為糧鑿地得水既還問前諫者衆皆懼公厚賞之曰孤前行乘危以徼幸雖得之天所俟也猷不可以為常諸君之諫萬安之計是以相賞晉張實傳實下令國中曰比年飢旱殆由庶事有缺竊慕針誦之言以補不逮自今有面剌孤罪者酬以束帛翰黑陳孤過者答以筐篚謗言於市者報以羊米晉王沉傳豫州剌史下教曰自古賢聖樂聞誹謗之言聽輿人之論芻蕘有可録之事負薪有廊廟之語故也其宣下屬城及土庶若能舉遺逸於林藪黜姦佞於州國陳長吏之可否說百姓之所患興利除害損益昭然者給榖五百斛若達一至之言說剌史得失朝政寬猛剛柔得失者給榖千斛主簿陳廞褚䂮曰教命班下示以賞勸將恐拘介之士或憚賞而不言貪昧之人將慕利而妄舉堯舜周公所以能致忠諫者以其款誠之心著也冰炭不言而冷熱之質自明者以其有實也若好忠直如冰炭之自然則諤諤之臣將濟濟而盈庭逆耳之言不求而自至若德不足以配唐虞明不足以並周公實不可以同冰炭雖懸重賞忠諫之言未可致也昔魏絳由和成之功蒙女樂之賜管仲有興齊之勳而加上卿之禮功勳明著然後賞勸隨之未聞張重賞以待諫臣懸榖帛以求盡言也沉無以奪之遂從䂮議新唐杜正倫傳帝謂設宴謂曰我聞神龍可擾以馴然領有逆鱗嬰者死人君亦有之卿屬遂犯吾鱗裨闕失朕其慮危亡哉思卿至意故舉酒以相樂也新唐薛收傳上書諫王止畋獵王答曰覽所陳知成我者卿也明珠兼乘未若一言今賜黃金四十挺新唐李絳傳數論宦官橫肆方鎮進獻等事自知言切帝果怒曰卿告朕以人所難言者疾風知徑草卿當之矣翌日賜金紫親擇良笏與之且曰異時膺顧託南面當如此絳蝢首新唐柳公權傳帝稱漢文帝恭儉因舉袂曰此三濣矣學士皆賀獨公權無言帝問之對曰人主當進賢退不肖納諫諍明賞罰服浣濯之衣此小節耳非有益治道者異日與周墀同封論事不阿墀為惴恐公權益不奪帝徐曰公有諍臣風可屈居諫議大夫新唐高季輔傳數上書言得失辭誠切至帝賜鍾乳劑曰而進藥石之言朕以藥石相報新唐宗室傳長樂公主太宗敕有司裝賚視長公主而倍之魏徵曰制有等差渠可越也帝許之大悅賜錢帛新唐張元素傳正觀四年詔發卒治洛陽宮乾陽殿且東幸元素上書帝顧謂玄齡曰洛陽朝貢天下中朕營之意欲便四方百姓今元素言如此使後必往雖露坐庸何苦即詔罷役賜綵二百匹魏徵名梗挺聞元素言歎曰張公論事有回天之力可謂仁人之言哉餘見賜豫魏文公傳又見諫獵郅惲傳箋證漢書梅福傳福復上書曰今欲致天下之士民有上書求見者輒使詣尚書問其所言言可采取者秩以升斗之祿賜以一束之帛若此則天下之士發憤悶吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣師古曰爛然分明之貌也夫以四海之廣士民之數能言之類至衆多也然其傑指世陳政言成文章質之先聖而不繆施之當世合時務師古曰質正也若此者亦亡幾人故爵祿束帛者天下之底石高祖所以厲世摩鈍也師古曰底細石也音之履反又音秖孔子曰工欲善其事必先利其器師古曰論語載孔子之言也工以喻國政利器喻賢才三國志魏志武帝操注引曹瞞傳曰時寒且旱二百里無復水軍又乏食殺馬數千匹以為糧鑿地入三十餘丈乃得水既還科問前諫者衆莫知其故人人皆懼公皆厚賞之曰孤前行乘危以徼幸雖得之天所佐也故不可以為常諸君之諫萬安之計是以相賞後勿難言之又冊府元龜帝王部魏太祖為公時北征三郡烏丸大破之引兵自柳城還時寒且旱二百里無復水軍又乏食殺馬數千匹以為糧鑿地入三十餘丈乃得水既還科問前諫者衆莫知其故人人皆懼公皆厚賞之曰孤前行乘危以僥幸雖得之天所佐也顧不可以為常諸君之諫萬安之計是以相賞晉書張軌傳附子張實實字安遜學尚明察敬賢愛士下令國中曰忝紹前蹤庶幾刑政不為百姓之患而比年饑旱殆由庶事有缺竊慕針誦之言以補不逮自今有面刺孤罪者酬以束帛翰墨陳孤過者答以筐篚謗言於市者報以羊米晉書王沉傳王沉字處道太原晉陽人也遷尚書出監豫州諸軍事奮武將軍豫州刺史至鎮乃下教曰自古賢聖樂聞誹謗之言聽輿人之論芻蕘有可録之事負薪有廊廟之語故也自至鎮日未聞逆耳之言豈未明虛心故令言者有疑其宣下屬城及士庶若能舉遺逸於林藪黜姦佞於州國陳長吏之可否說百姓之所患興利除害損益昭然者給榖五百斛若達一至之言說刺史得失朝政寬猛令剛柔得適者給榖千斛主簿陳廞褚䂮曰今使教命班下示以賞勸將恐拘介之士或憚賞而不言貪賕之人將慕利而妄舉褚䂮復白曰堯舜周公所以能致忠諫者以其款誠之心著也冰炭不言而冷熱之質自明者以其有實也若好忠直如冰炭之自然則諤諤之臣將濟濟而盈庭逆耳之言不求而自至若德不足以配唐虞明不足以並周公實不可以同冰炭雖懸重賞忠諫之言未可致也昔魏絳由和戎之功蒙女樂之賜管仲有興齊之勳而加上卿之禮功德明著然後賞勸隨之未聞張重賞以待諫臣懸榖帛以求盡言也沉無以奪之遂從䂮議新唐書杜正倫傳杜正倫相州洹水人貞觀元年魏徵薦其才擢兵部員外郎帝為設宴具召四人者謂曰我聞神龍可擾以馴然頷有逆鱗嬰者死人君亦有之卿屬遂犯吾鱗裨闕失朕其慮危亡哉思卿至意故舉酒以相樂也新唐書薛收傳嘗上書諫王止畋獵王答曰覽所陳知成我者卿也明珠兼乘未若一言今賜黃金四十鋌新唐書李絳傳又數論宦官橫肆方鎮進獻等事自知言切且斥去悉取內署所上疏槀焚之以俟命帝果怒絳謝曰陛下憐臣愚處之腹心之地而惜身不言乃臣負陛下若上犯聖德旁忤貴幸因而獲罪乃陛下負臣於是帝動容曰卿告朕以人所難言者疾風知徑草卿當之矣遂繇司勳郎中進中書舍人翌日賜金紫親擇良笏與之且曰異時膺顧託南面當如此絳頓首新唐書柳公權傳公權字誠懸公綽弟也年十二工辭賦元和初擢進士第文宗復召侍書遷中書舍人充翰林書詔學士帝稱漢文帝恭儉因舉袂曰此三浣矣學士皆賀獨公權無言帝問之對曰人主當進賢退不肖納諫諍明賞罰服浣濯之衣此小節耳非有益治道者異日與周墀同對論事不阿墀為惴恐公權益不奪帝徐曰卿有諍臣風可屈居諫議大夫新唐書高馮傳高馮字季輔以字行德州蓨人貞觀初拜監察御史彈治不避權要進授太子右庶子數上書言得失辭誠切至帝賜鍾乳一劑曰而進藥石之言朕以藥石相報新唐書諸公主列傳長樂公主長樂公主下嫁長孫冲帝以長孫皇后所生故勑有司裝齎視長公主而倍之魏徵曰昔漢明帝封諸王曰朕子安得同先帝子乎然則長公主者尊公主矣制有等差渠可越也帝以語后后曰嘗聞陛下厚禮徵而未知也今聞其言乃納主於義社稷臣也妾於陛下夫婦之重有所言猶候顏色况臣下情隔禮殊而敢犯嚴顏陳忠言哉願許之與天下為公帝大悅因請齎帛四十匹錢四十萬即徵家賜之新唐書張玄素傳貞觀四年詔發卒治洛陽宮乾陽殿且東幸玄素上書帝顧房玄齡曰洛陽朝貢天下中朕營之意欲便四方百姓今玄素言如此使後必往雖露坐庸何苦即詔罷役賜綵二百匹魏徵名梗挺聞玄素言歎曰張公論事有回天之力可謂仁人之言哉政績受賞第三前漢循吏王成傳詔曰膠東相成勞來不怠流民自占八萬餘口治有異等之效其賜成爵關內侯前漢循吏黃霸傳下詔稱揚曰穎川太守霸宣布詔令百姓鄉化孝子弟弟正婦順孫日以衆多田者讓畔道不拾遺養視鰥寡瞻助貧窮獄或八年亡重罪因吏民鄉于教化興於行誼可謂賢人君子矣其賜爵關內侯黃金百斤前漢循吏召信臣傳南陽太守其化大行郡中莫不耕稼力田百姓歸之戶口增倍盜賊獄訟衰止史民親愛號曰召父荊州剌史奏信臣為百姓興利郡以豐富賜黃金四十斤遷河南太守治行常為第一復數增秩賜金後漢祭彤傳拜遼東太守彤之威聲暢於北方西自武威東盡玄菟及樂浪胡夷皆來內附野無風塵乃悉罷緣邊屯兵十二年召為太僕彤在遼東幾三十年衣無兼副顯宗既嘉其功又美彤清約賜錢百萬馬三匹衣被刀劍下至居室什物大小無不悉備帝每見彤常歎息以為可屬以重任後漢王渙傳鄧太后詔曰大司農朱邑右扶風尹翁歸政跡茂異孝宣嘉歎愍惜而以黃金百斤策賜其子故洛陽令王渙秉清修之節蹈羔羊之義盡心奉公務在惠民功業未遂不幸早世百姓追思為之立祠自非忠愛之至孰能若斯者乎今以渙子石為郎中以勸勞勤後漢郭賀傳拜荊州剌史有殊政百姓便之歌曰厥德仁明郭喬卿忠正朝廷上下平顯宗嗟歎賜以三公之服餘見賜豫蔡茂傳晉王宏初為汲郡太守撫百姓如家耕桑樹藝屋字阡陌莫不躬自教示曲盡事宜在郡有殊績武帝下詔稱之曰王宏勤恤百姓導化有方督勸開荒五千餘頃而熟田常課頃畝不減比年普飢人不足食而宏郡界獨無匱乏可課能矣其賜宏榖千斛晉武帝紀十年以京兆太守劉霄陽平太守梁柳有政績各賜榖千斛箋證漢書循吏傳王成王成不知何郡人也為膠東相治甚有聲宣帝最先褒之地節三年下詔曰蓋聞有功不賞有罪不誅雖唐虞不能以化天下今膠東相成勞來不怠流民自占八萬餘口治有異等之效其賜成爵關內侯漢書循吏傳黃霸黃霸字次公淮陽陽夏人也下詔稱揚曰潁川太守霸宣布詔令百姓鄉化師古曰鄉讀曰嚮下亦同孝子弟弟貞婦順孫日以衆多田者讓畔道不拾遺養視鰥寡贍助貧窮獄或八年亡重罪囚吏民鄉于教化興於行誼可謂賢人君子矣其賜爵關內侯黃金百斤漢書循吏傳召信臣召信臣舉高第遷上蔡長其治視民如子遷南陽太守信臣為人勤力有方略好為民興利務在富之其化大行郡中莫不耕稼力田百姓歸之戶口增倍盜賊獄訟衰止吏民親愛信臣號之曰召父荊州刺史奏信臣為百姓興利郡以殷富賜黃金四十斤遷河南太守治行常為第一復數增秩賜金後漢書祭彤傳彤字次孫早孤以至孝見稱建武十七年拜遼東太守永平元年偏何擊破赤山斬其魁帥持首詣彤塞外震讋彤之威聲暢於北方西自武威東盡玄菟及樂浪胡夷皆來內附野無風塵乃悉罷緣邊屯兵十二年徵為太僕彤在遼東幾三十年衣無兼副顯宗既嘉其功又美彤清約拜日賜錢百萬馬三匹衣被刀劍下至居室什物大小無不悉備帝每見彤常歎息以為可屬以重任後漢書循吏列傳王渙傳永初二年鄧太后詔曰昔大司農朱邑右扶風尹翁歸政迹茂異令名顯聞孝宣皇帝嘉歎愍惜而以黃金百斤策賜其子故洛陽令王渙秉清修之節蹈羔羊之義盡心奉公務在惠民功業未遂不幸早世百姓追思為之立祠自非忠愛之至孰能若斯者乎今以渙子石為郎中以勸勞勤後漢書蔡茂傳附郭賀拜荊州刺史引見賞賜恩寵隆異及到官有殊政百姓便之歌曰厥德仁明郭喬卿忠正朝廷上下平顯宗巡狩至南陽特見嗟歎賜以三公之服晉書良吏傳王宏王宏字正宗高平人魏侍中粲之從孫也魏時辟公府纍遷尚書郎歷給事中泰始初為汲郡太守撫百姓如家耕桑樹藝屋宇阡陌莫不躬自教示曲盡事宜在郡有殊績司隸校尉石鑒上其政術武帝下詔稱之曰今司隸校尉石鑒上汲郡太守王宏勤恤百姓導化有方督勸開荒五千餘頃而熟田常課頃畝不減比年普饑人不足食而宏郡界獨無匱乏可謂能矣其賜宏榖千斛晉書武帝紀十年夏四月以京兆太守劉霄陽平太守梁柳有政績各賜榖千斛有功不賞第四前漢宣帝地節三年春詔曰蓋聞有功不賞有罪不誅雖唐虞猶不能以化天下前漢張敞傳昌邑即位敞上書諫曰孝昭皇帝早崩無嗣大臣憂懼選賢聖承宗廟天下莫不拭目傾耳觀風聽化國輔大臣未褒而昌邑小輦先遷此過之大者也後漢傳變傳執金吾甄舉等謂趙忠曰傳南容前在東軍有功不侯故天下失望今將軍親當重任宜進賢理屈以副衆心忠遣弟城門校尉延致殷勤延謂變曰南容少答我常侍萬戶侯不足得也變正色拒之曰遇與不遇命也有功不論時也傳變豈求私賞哉後漢馮衍傳帝以衍為曲陽令誅斬劇賊郭勝等降五千餘人論功當封以讒毀故賞不行後漢杜喬傳時梁冀子弟五人及中常侍等以無功並封喬上書諫曰臣聞古之明君褒罰必以功過未世暗主誅賞各緣其私今梁氏一門宦者微孽並帶無功之紱裂勞臣之土其為乖濫胡可勝言夫有功不賞為善失其望姦回不語為惡肆其凶故陳資斧而人靡畏班爵位而物無勸苟遂斯道豈伊傷政為亂而已喪身亡國可不慎哉箋證漢書宣帝紀地節三年春三月詔曰蓋聞有功不賞有罪不誅雖唐虞猶不能以化天下漢書張敞傳昌邑王徵即位動作不由法度敞上書諫曰孝昭皇帝蚤崩無嗣大臣憂懼選賢聖承宗廟東迎之日唯恐屬車之行遲今天子以盛年初即位天下莫不拭目傾耳觀化聽風國輔大臣未褒而昌邑小輦先遷李奇曰挽輦小臣也此過之大者也後漢書傅燮傳趙忠為車騎將軍詔忠論討黃巾之功執金吾甄舉等謂忠曰傅南容前在東軍有功不侯故天下失望今將軍親當重任宜進賢理屈以副衆心忠納其言遣弟城門校尉延致殷勤延謂燮曰南容少答我常侍萬戶侯不足得也燮正色拒之曰遇與不遇命也有功不論時也傅燮豈求私賞哉後漢書馮衍傳馮衍字敬通京兆杜陵人也帝以衍為曲陽令誅斬劇賊郭勝等降五千餘人論功當封以讒毀故賞不行後漢書杜喬傳時梁冀子弟五人及中常侍等以無功並封喬上書諫曰臣聞古之明君褒罰必以功過末世暗主誅賞各緣其私今梁氏一門宦者微孽並帶無功之紱裂勞臣之土其為乖濫胡可勝言夫有功不賞為善失其望姦回不詰為惡肆其凶故陳資斧而人靡畏班爵位而物無勸苟遂斯道豈伊傷政為亂而已喪身亡國可不傎哉無功受賞第五前漢鮑宣上書諫曰汝昌侯傳商亡功而封夫官爵非陛下之官爵乃天下之官爵也陛下取非其官官非其人而望天說民服豈不難哉方陽侯孫寵宜陵侯息夫躬辨足以移衆彊可用獨立姦人之雄或世尤劇者也宜以時罷退及外親幼童未通經術者皆宜令休就師傳前漢車千秋傳千秋為高寢郎會衛太子為江充所譖敗久之千秋訟太子冤曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言是時上頗知太子惶恐無他意乃大感寤召見千秋至前千秋長八尺餘體貌甚麗武帝見而說之謂曰父子之間人所難言也公獨明其不然此高廟神靈使公教我公當遂為吾輔佐立拜千秋為大鴻臚數月遂代劉屈釐為丞相封富此侯千秋無他材能術學又無伐閲功勞特以一言寤意旬月取宰相封侯世未嘗有也前漢佞幸董賢傳上欲侯賢而未有緣會待詔孫寵息夫躬等告東平王雲后謁祠祀祝詛下有司治皆伏其辜上於是令躬寵為因賢告東平事者乃以其功下詔封賢為高安侯後漢杜喬傳梁冀子弟五人及中常侍等以無功並封喬上書諫曰陛下不急忠賢之禮而先左右之封傷善害德興長佞諛臣聞古之明君褒罰必以功過餘見有功不賞門後漢趙典傳時恩澤諸侯以無勞受封群臣不悅而莫敢諫典獨奏曰夫無功而賞勞者不勸上忝下降亂象干度宜一切削免爵土帝不從後漢楊震傳上疏曰高祖與群臣約非功臣不得封故經制父死子繼兄亡弟及伏見詔書封故朝陽侯劉護再從兄壞襲護爵為侯護同産弟威見在臣聞天子專封封有功諸侯專爵爵有德今壞無他功行但以配阿母女既位侍中又至封侯不稽舊制後漢陳蕃傳上疏諫曰諸侯上象四七高祖之約非功臣不侯而聞追録河南尹鄧萬世父遵之微功更爵尚書令黃先人之絶封近習以非義授邑右右以無功傳賞授位不料其任裂土莫紀其功至乃一門之內侯者數人故緯象失度陰陽謬序新唐鄭覃傳穆宗立不恤國事數荒昵覃廷對曰陛下新即位宜側身勤政而內耽宴嬉外盤游畋夫金繒所出固民膏血可使倡優無功濫被賜與願節用之箋證漢書鮑宣傳哀帝初大司空何武除宣為西曹掾甚敬重焉是時帝祖母傅太后欲與成帝母俱稱尊號封爵親屬丞相孔光大司空師丹何武大司馬傅喜始執正義失傅太后指皆免官丁傅子弟並進董賢貴幸宣以諫大夫從其後上書諫曰及汝昌侯傅商亡功而封夫官爵非陛下之官爵乃天下之官爵也陛下取非其官官非其人而望天說民服豈不難哉師古曰說讀曰悅方陽侯孫寵宜陵侯息夫躬辨足以移衆彊可用獨立姦人之雄或世尤劇者也宜以時罷退及外親幼童未通經術者皆宜令休就師傅漢書車千秋傳車千秋本姓田氏其先齊諸田徙長陵千秋為高寢郎會衛太子為江充所譖敗久之千秋上急變訟太子冤師古曰所告非常故云急變也曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言是時上頗知太子惶恐無他意乃大感寤召見千秋至前千秋長八尺餘體貌甚麗武帝見而說之師古曰說讀曰悅謂曰父子之間人所難言也公獨明其不然此高廟神靈使公教我公當遂為吾輔佐立拜千秋為大鴻臚數月遂代劉屈釐為丞相封富民侯千秋無他材能術學又無伐閲功勞特以一言寤意旬月取宰相封侯世未嘗有也漢書佞幸傳董賢董賢字聖卿雲陽人也上欲侯賢而未有緣會待詔孫寵息夫躬等告東平王雲后謁祠祀祝詛師古曰謁者后之名下有司治皆伏其辜上於是令躬寵為因賢告東平事者乃以其功下詔封賢為高安侯後漢書杜喬傳時梁冀子弟五人及中常侍等以無功並封喬上書諫曰陛下不急忠賢之禮而先左右之封傷善害德興長佞諛臣聞古之明君褒罰必以功過末世暗主誅賞各緣其私今梁氏一門宦者微孽並帶無功之紱裂勞臣之土其為乖濫胡可勝言夫有功不賞為善失其望姦回不詰為惡肆其凶故陳資斧而人靡畏班爵位而物無勸苟遂斯道豈伊傷政為亂而已喪身亡國可不慎哉後漢書趙典傳時恩澤諸侯以無勞受封群臣不悅而莫敢諫典獨奏曰夫無功而賞勞者不勸上忝下辱亂象干度宜一切削免爵土以存舊典帝不從後漢書楊震傳楊震字伯起弘農華陰人也元初四年徵入為太僕遷太常上疏曰臣聞高祖與群臣約非功臣不得封故經制父死子繼兄亡弟及以防篡也伏見詔書封故朝陽侯劉護再從兄瓌襲護爵為侯護同産弟威今猶見在臣聞天子專封封有功諸侯專爵爵有德今瓌無他功行但以配阿母女一時之間既位侍中又至封侯不稽舊制不合經義後漢書陳蕃傳時封賞踰制內寵猥盛蕃乃上疏諫曰夫諸侯上象四七垂耀在天下應分土藩屏上國上象四七謂二十八宿各主諸侯之分野故曰下應分土言皆以輔王室也高祖之約非功臣不侯而聞追録河南尹鄧萬世父遵之微功更爵尚書令黃先人之絶封近習以非義授邑左右以無功傳賞授位不料其任裂土莫紀其功至乃一門之內侯者數人故緯象失度陰陽謬序新唐書鄭覃傳覃以父蔭補弘文校書郎擢纍諫議大夫穆宗立不恤國事數荒昵吐蕃方彊覃與崔郾等廷對曰陛下新即位宜側身勤政而內耽宴嬉外盤游畋今吐蕃在邊徂候中國假令緩急臣下乃不知陛下所在不敗事乎夫金繒所出固民膏血可使倡優無功濫被賜與願節用之
