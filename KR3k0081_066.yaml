body:
  text: 卷第六十六禮第一史記禮書太史公曰洋洋美德乎宰制万物役使群眾豈人力也哉余至大行禮官觀三代損益乃知緣人情而制禮依人性而作儀其由來尚矣史記禮書太史公曰以財物為用以貴賤為文以多少為異以隆殺為要文貌煩情欲省禮之隆也文貌省情欲煩禮之殺也文貌情用相為內外表裡並行而雜禮之中流也君子上致其隆下盡其殺而中處其中步驟馳騁廣騖其外是以君子之性守宮庭也史記曰維三代之禮所損益各殊務然要以近情性通王道故禮因人質為之節文前漢禮樂志人性有男女之情妬忌之別為制婚姻之禮有交接長幼之序為制鄉飲之禮有哀死思遠之情為制喪祭之禮有尊尊奉上之心為制朝覲之禮哀有哭踊之節樂有歌舞之容正人足以副其誠邪人足以防其失故婚姻之禮廢則夫婦之道天而淫辟之罪多鄉飲之禮廢則長幼之序亂而爭鬭之獄蕃喪祭之禮廢則骨肉之恩薄而背死忘先者眾朝聘之禮廢則君臣之位失而侵陵之漸起故孔子曰安上治民莫善於禮移風易俗莫善於樂前漢禮樂志王者必因前王之禮有所損益即民之心稍稍制作至太平而大備周監於二代禮文尤具事為之制曲為之防故稱禮經三百威儀三千於是教化浹洽民用和睦災害不生禍亂不作囹圄空虛四十餘年孔子美之曰郁郁乎文哉吾從周及其衰也諸侯踰越法度惡禮制之害己去其篇藉遭秦滅學遂以亂亡漢興撥亂反正日不暇給猶命淑孫通制禮儀以正君臣之位高祖說而歎曰吾乃今日知為天子之貴也遂定儀法未盡備而通終至文帝時賈誼以為漢承秦之敗俗廢禮義捐廉恥夫立君臣等上下使綱紀有敘六親和睦此非天之所為人之所設也人之所設不為不立不修則壤漢興二十餘年宜定制度興禮樂然后諸侯軌道百姓素朴獄訟衰息乃草具其儀天子說焉而大臣絳灌之屬害之故其議遂寢至武帝即位進用英俊議立明堂制禮服以興太平會竇太后好黃老言不說儒術其事又廢前漢禮樂志成帝時犍為郡於水濱得磬十六枚議者以為善祥劉向因是說上宜興辟雍設庠序陳禮樂隆雅頌之聲盛揖讓之容以風化天下或曰不能具禮禮以養人為本如有過差是過而養人也刑罰之過或至於死傷今之刑非皋陶之法也而有司請定法削則削筆則筆救時務也至於禮樂則曰不敢是敢於殺人不敢於養人也為其俎豆筦絃之間小不備因是絕而不為是去小不備而就大不備大不備或莫甚焉前漢賈誼傳禮云禮云者貴絕惡於未萌而起教於微眇使民日遷善遠辠而不自知也前漢嚴安傳以故丞相史上書曰臣聞佳麗珍怪固順於耳目故養失於泰樂失於淫禮失於采教失於偽偽采淫泰非範民之道也采飾也采者文過其實範謂為之立法後漢章帝章和元年令小黃門持班固所上叔孫通漢儀十二篇勑褒曰此制散略多不合經今宜依禮條正使可施行於南宮東觀盡心集作褒既受命乃次序禮事依準舊典雜以五經讖記之文撰次天子至於庶人冠婚吉凶終始制度以為百五十篇其年十二月奏上帝以眾論難一故但納之不復令有司平奏前漢師丹傳為大子太傅哀帝欲為共皇立廟師丹議曰聖王制禮取法於天故尊卑之禮明則人倫之序正人倫之序正則乾坤得其位而陰陽順其節後漢荀爽傳曰昔者聖人建天地之中而謂之禮禮者所以興福祥之本止禍亂之原也人能枉欲從禮者則福歸之順情廢禮者則禍殃之推禍福之所應知興廢之所由來也魏袁渙傳為梁相常談曰世治則禮詳世亂則禮簡新唐禮樂志由三代而上治出於一而禮樂達於天下由三代而下治出於二而禮樂為虛名古者宮室車輿以為居衣裳冕弁以為服尊爵俎豆以為器金右絲竹以為樂以適郊廟以臨朝廷以事神而治民其歲時聚會以為朝覲聘問歡忻交接以為射鄉食享合眾興事以為師田學校下至閭里田畝吉凶哀樂凡民之事莫不一出於禮居處動作衣服飲食之間蓋其朝夕從事者無非乎此也此所謂治出於一而禮樂達於天下使天下安習而行之不知所以遷善遠罪而成俗也及三代已亡遭秦變古後之有天下者自天子百宮名號位序國家制度宮車服器一切用秦其間雖有欲治之主思所改作不能超然遠復三代之上而牽其時俗稍即以損益大抵安於苟簡而已其朝夕從事則以簿書獄訟兵食為急曰此為政也所以治民至於三代禮樂具其名物而藏於有司時出而用之郊廟朝廷曰此為禮也所以教民此所謂治出於二而禮樂為虛名新唐禮樂志王嵒上疏請刪去禮記舊文而益以今事詔付集賢院議學士張說以為禮記不刊之書去聖久遠不可改易而唐貞觀顯慶禮儀注前後不同宜加折哀以為唐禮乃詔集賢院學士徐堅李銳及施敬本撰述歷年未就而銳卒蕭嵩代銳為學士奏起居舍人王仲丘撰定為一百五十卷是為大唐開元禮由是唐之五禮之文始備而後世用之雖時小有損益不能過也箋證史記禮書太史公曰洋洋美德乎宰制萬物役使群眾豈人力也哉余至大行禮官觀三代損益乃知緣人情而制禮依人性而作儀其所由來尚矣史記禮書太史公曰以財物為用以貴賤為文以多少為異以隆殺為要文貌繁情欲省禮之隆也文貌省情欲繁禮之殺也文貌情欲相為內外表裏並行而雜禮之中流也君子上致其隆下盡其殺而中處其中步驟馳騁廣騖不外是以君子之性守宮庭也史記太史公自序維三代之禮所損益各殊務然要以近情性通王道故禮因人質為之節文漢書禮樂志人性有男女之情妬忌之別為制婚姻之禮有交接長幼之序為制鄉飲之禮有哀死思遠之情為制喪祭之禮有尊尊敬上之心為制朝覲之禮哀有哭踊之節樂有歌舞之容正人足以副其誠邪人足以防其失故婚姻之禮廢則夫婦之道苦而淫辟之罪多鄉飲之禮廢則長幼之序亂而爭鬭之獄蕃喪祭之禮廢則骨肉之恩薄而背死忘先者眾朝聘之禮廢則君臣之位失而侵陵之漸起故孔子曰安上治民莫善於禮移風易俗莫善於樂師古曰此孝經載孔子之言也漢書禮樂志王者必因前王之禮順時施宜有所損益即民之心稍稍制作至太平而大備周監於二代禮文尤具事為之制曲為之防故稱禮經三百威儀三千於是教化浹洽民用和睦災害不生禍亂不作囹圄空虛四十餘年孔子美之曰郁郁乎文哉吾從周及其衰也諸侯踰越法度惡禮制之害己去其篇籍遭秦滅學遂以亂亡漢興撥亂反正日不暇給猶命叔孫通制禮儀以正君臣之位高祖說而歎曰吾乃今日知為天子之貴也以通為奉常遂定儀法未盡備而通終至文帝時賈誼以為漢承秦之敗俗廢禮義捐廉恥今其甚者殺父兄盜者取廟器而大臣特以簿書不報期會為故至於風俗流溢恬而不怪以為是適然耳夫移風易俗使天下回心而鄉道師古曰鄉讀曰嚮類非俗吏之所能為也夫立君臣等上下使綱紀有序六親和睦此非天之所為人之所設也人之所設不為不立不修則壞漢興至今二十餘年宜定制度興禮樂然後諸侯軌道百姓素樸獄訟衰息迺草具其儀天子說焉而大臣絳灌之屬害之故其議遂寢至武帝即位進用英雋議立明堂制禮服以興太平會竇太后好黃老言不說儒術其事又廢漢書禮樂志至成帝時犍為郡於水濱得古磬十六枚議者以為善祥劉向因是說上宜興辟雍設庠序陳禮樂隆雅頌之聲盛揖攘之容師古曰攘古讓字以風化天下如此而不治者未之有也或曰不能具禮禮以養人為本如有過差是過而養人也師古曰過差猶失錯也刑罰之過或至死傷今之刑非皋陶之法也而有司請定法削則削筆則筆救時務也至於禮樂則曰不敢是敢於殺人不敢於養人也為其俎豆筦弦之間小不備因是絕而不為是去小不備而就大不備大不備或莫甚焉漢書賈誼傳禮云禮云者貴絕惡于未萌而起教于微眇使民日遷善遠辠而不自知也漢書嚴安傳嚴安者臨菑人也以故丞相史上書曰臣聞夫佳麗珍怪固順於耳目故養失而泰樂失而淫禮失而采如淳曰采飾也師古曰采者文過其實也教失而偽偽采淫泰非所以範民之道也師古曰範謂為之立法也後漢書曹褒傳章和元年正月乃召褒詣嘉德門令小黃門持班固所上叔孫通漢儀十二篇勑褒曰此制散略多不合經今宜依禮條正使可施行於南宮東觀盡心集作褒既受命乃次序禮事依準舊典雜以五經讖記之文撰次天子至於庶人冠婚吉凶終始制度以為百五十篇寫以二尺四寸簡其年十二月奏上帝以眾論難一故但納之不復令有司平奏漢書師丹傳師丹字仲公琅邪東武人也治詩事匡衡舉孝廉為郎元帝末為博士免成帝末年立定陶王為皇太子以丹為太子太傅哀帝即位為左將軍賜爵關內侯初哀帝即位成帝母稱太皇太后成帝趙皇后稱皇太后而上祖母傳太后與母丁后皆在國邸自以定陶共王為稱於是追尊定陶共王為共皇帝尊傅太后為共皇太后丁后為共皇后丹議獨曰聖王制禮取法於天故尊卑之禮明則人倫之序正人倫之序正則乾坤得其位而陰陽順其節後漢書荀淑傳附子荀爽延熹元年太常趙典舉爽至孝拜郎中對策陳便宜曰昔者聖人建天地之中而謂之禮禮者所以興福祥之本而止禍亂之源也人能枉欲從禮者則福歸之順情廢禮者則禍歸之推禍福之所應知興廢之所由來也三國志魏志袁渙傳遷為梁相渙每勑諸縣務存鰥寡高年表異孝子貞婦常談曰世治則禮詳世亂則禮簡新唐書禮樂志由三代而上治出於一而禮樂達於天下由三代而下治出於二而禮樂為虛名古者宮室車輿以為居衣裳冕弁以為服尊爵俎豆以為器金石絲竹以為樂以適郊廟以臨朝廷以事神而治民其歲時聚會以為朝覲聘問懽欣交接以為射鄉食饗合眾興事以為師田學校下至里閭田畮吉凶哀樂凡民之事莫不一出於禮由之以教其民為孝慈友悌忠信仁義者常不出於居處動作衣服飲食之間蓋其朝夕從事者無非乎此也此所謂治出於一而禮樂達天下使天下安習而行之不知所以遷善遠罪而成俗也及三代已亡遭秦變古後之有天下者自天子百官名號位序國家制度宮車服器一切用秦其間雖有欲治之主思所改作不能超然遠復三代之上而牽其時俗稍即以損益大抵安於苟簡而已其朝夕從事則以簿書獄訟兵食為急曰此為政也所以治民至於三代禮樂具其名物而藏於有司時出而用之郊廟朝廷曰此為禮也所以教民此所謂治出於二而禮樂為虛名新唐書禮樂志玄宗開元十年以國子司業韋縚為禮儀使以掌五禮十四年通事舍人王嵒上疏請刪去禮記舊文而益以今事詔付集賢院議學士張說以為禮記不刊之書去聖久遠不可改易而唐貞觀顯慶禮儀注前後不同宜加折衷以為唐禮乃詔集賢院學士右散騎常侍徐堅左拾遺李銳及太常博士施敬本撰述歷年未就而銳卒蕭嵩代銳為學士奏起居舍人王仲丘撰定為一百五十卷是為大唐開元禮由是唐之五禮之文始備而後世用之雖時小有損益不能過也五禮第二前漢刑法志書云天秩有禮天討有罪故聖人因天秩而制五禮因天討而作五刑秩序也有禮者天則進序之有罪者天則討治之五禮吉凶賓軍嘉五刑甲兵斧鉞刀鋸鑽鑿難也餘見禮唐禮儀志箋證漢書刑法志書云天秩有禮天討有罪師古曰此虞書咎繇謨之辭也秩序也言有禮者天則進序之有罪者天則討治之故聖人因天秩而制五禮師古曰五禮吉凶賓軍嘉因天討而作五刑不崇禮第三史記禮書孝文即位有司議欲定儀禮孝文好道家之學以為煩禮飾貌無益於治躬化謂何耳故罷去之晉阮籍傳雖不拘禮教性至孝母終裴楷往弔之籍散髮箕踞醉而直視楷哭畢便去或問楷凡弔者主哭客乃為弔籍既不哭君何為哭楷曰阮籍既方外之士故不崇禮典我俗中之人故以軌儀自居時人歎為兩得晉王濟傳帝常與濟碁而孫皓在側謂皓曰何以好剝人面皮皓曰見無禮於君者則剝之濟時申腳局下而皓譏之新唐李勉傳從肅宗於靈武擢監察御史時武臣崛興無法度大將菅崇嗣背問坐笑語譁縱勉劾不恭帝歎曰吾有勉乃知朝廷之尊餘見禮荀淑傳并禮樂志箋證史記禮書孝文即位有司議欲定儀禮孝文好道家之學以為繁禮飾貌無益於治躬化謂何耳故罷去之晉書阮籍傳籍雖不拘禮教然發言玄遠口不臧否人物性至孝母終正與人圍碁對者求止籍留與決賭既而飲酒二斗舉聲一號吐血數升及將葬食一蒸肫飲二斗酒然後臨訣直言窮矣舉聲一號因又吐血數升毀瘠骨立殆致滅性裴楷往弔之籍散髮箕踞醉而直視楷弔喭畢便去或問楷凡弔者主哭客乃為禮籍既不哭君何為哭楷曰阮籍既方外之士故不崇禮典我俗中之士故以軌儀自居時人嘆為兩得晉書王渾傳附子王濟帝嘗與濟奕棋而孫皓在側謂皓曰何以好剝人面皮皓曰見無禮於君者則剝之濟時伸腳局下而皓譏焉新唐書宗室宰相列傳李勉勉少喜學內沈雅外清整從肅宗於靈武擢監察御史時武臣崛興無法度大將管崇嗣背闕坐笑語譁縱勉劾不恭帝歎曰吾有勉乃知朝廷之尊進退以禮弟四前漢王吉等傳序曰若王吉貢禹兩龔之屬皆以禮讓進退後漢朱暉傳光武召暉拜為郎暉尋以病去卒業於太學性矜嚴進止必以禮諸傳稱其高後漢趙孝傳州郡辟召進退必以禮魏袁渙傳父滂為漢司徒當時諸公子多越法度而渙清淨舉動必以禮郡命為功曹郡中姦吏皆自引去餘見祿養劉平傳箋證漢書王貢兩龔鮑傳序若王吉貢禹兩龔之屬皆以禮讓進退云後漢書朱暉傳初光武與暉父岑俱學長安有舊故及即位求問岑時已卒乃召暉拜為郎暉尋以病去卒業於太學性矜嚴進止必以禮諸儒稱其高後漢書趙孝傳趙孝字長平沛國蘄人也州郡辟召進退必以禮舉孝廉不應三國志魏志袁渙傳袁渙字曜卿陳郡扶樂人也父滂為漢司徒當時諸公子多越法度而渙清靜舉動必以禮郡命為功曹郡中姦吏皆自引去禮刑弟五史記大史公後序夫禮禁未然之前法施已然之後法之所畢者易見而禮之所為禁者難知前漢刑法志言制禮以止刑猶隄之防溢水也今隄防陵遲禮制未立死刑過制生刑易犯此刑之所以蕃也前漢刑法志聖人既躬明哲之性必通天地之心制禮作教立法設刑動緣民情而則天象地故曰先王立禮則天之明因地之性也刑罰威獄以類天之震曜殺戮也書曰天秩有禮天罰有罪故聖人因天秩而制五禮因天罰而作五刑前漢賈誼傳上疏曰凡人之智能見已然不能見將然夫禮者禁於將然之前而法者禁於已然之後後漢陳寵傳上疏曰臣聞禮經三百威儀三千故甫刑大辟二百五刑之屬三千禮之所去刑之所取失禮則入刑相為表裡者也後漢公孫瓚傳上疏曰皇犧已來君臣道著張禮以導人設刑以禁暴吳志陸遜傳謝景善劉廙之先刑後禮之論遜呵景曰禮之長於刑久矣廙以細辯而詭先聖之教皆非也君今待東宮宣遵仁義以彰德旨若彼之談不須講也晉刑法志傳曰齊之以禮有恥且格刑之不可犯不若禮之不可踰晉刑法志熊遠奏曰禮以崇善法以閑非故禮有常典法有常防晉王猛傳猛為始平令鞭殺一吏百姓上書訟之有司劾奏檻車召下廷尉詔獄堅親問之曰為政之體德化為先蒞任未幾殺戮旡數何其酷也猛曰臣聞宰寧國以禮治亂邦以法陛下不以臣不才任臣以劇邑謹為明君揃除凶猾餘見視死如歸唐刑法志箋證史記太史公自序夫禮禁未然之前法施已然之後法之所為用者易見而禮之所為禁者難知漢書刑法志書云伯夷降典悊民惟刑師古曰周書甫刑之辭也悊知也言制禮以止刑猶隄之防溢水也今隄防陵遲禮制未立死刑過制生刑易犯饑寒並至窮斯濫溢豪桀擅私為之囊橐姦有所隱則狃而寖廣此刑之所以蕃也漢書刑法志聖人既躬明悊之性必通天地之心制禮作教立法設刑動緣民情而則天象地故曰先王立禮則天之明因地之性也刑罰威獄以類天之震曜殺戮也溫慈惠和以效天之生殖長育也書云天秩有禮天討有罪故聖人因天秩而制五禮因天討而作五刑漢書賈誼傳淮南濟北王皆為逆誅誼數上疏陳政事多所欲匡建其大略曰凡人之智能見已然不能見將然夫禮者禁於將然之前而法者禁於已然之後後漢書陳寵傳永元六年寵代郭躬為廷尉寵又鉤校律令條法溢於甫刑者除之曰臣聞禮經三百威儀三千故甫刑大辟二百五刑之屬三千禮之所去刑之所取失禮則入刑相為表裏者也後漢書公孫瓚傳公孫瓚字伯珪遼西令支人也乃上疏曰臣聞皇羲已來君臣道著張禮以導人設刑以禁暴卷一百三三國志吳志陸遜傳南陽謝景善劉廙之先刑後禮之論遜呵景曰禮之長於刑久矣廙以細辯而詭先聖之教皆非也君今侍東宮宜遵仁義以彰德音若彼之談不須講也晉書刑法志傳曰齊之以禮有恥且格刑之不可犯不若禮之不可踰晉書刑法志元帝為丞相時朝廷草創議斷不循法律人立異議高下無狀主簿熊遠奏曰禮以崇善法以閑非故禮有常典法有常防晉書載記王猛傳王猛字景略北海劇人也猛為始平令猛下車明法峻刑澄察善惡禁勒彊豪鞭殺一吏百姓上書訟之有司劾奏檻車徵下廷尉詔獄堅親問之曰為政之體德化為先莅任未幾而殺戮無數何其酷也猛曰臣聞宰寧國以禮治亂邦以法陛下不以臣不才任臣以劇邑謹為明君揃除凶猾任禮不任刑第六後漢卓茂傳為密令人常有言部亭長受其米肉遺者茂問曰亭長為從汝求乎為汝有事囑之而受乎將平居自以恩意遺之乎人曰往遺之耳茂曰遺之而受何故言邪人曰竊聞賢明之君使人不畏吏吏不取人今我畏吏是以遺之吏既卒受故來言耳茂曰汝為敝人矣凡人所以貴於禽獸者以有仁愛知相恭事也今鄰里長老尚致饋遺此乃人道所以相親況吏與民乎吏顧不當乘威力強請求耳凡人之生群居雜處故有經紀禮義以相交接汝獨不欲修之寧能高飛遠走不在人間邪亭長素善吏歲時遺之禮也人曰苟如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝何所措其手足乎一門之內小者可論大者可殺也且歸念之於是人納其訓吏懷其恩後漢秦彭傳遷山陽太守以禮訓人不任刑罰崇好儒雅敦明庠序每春秋享射輒修升降揖讓之儀乃為人設四誡以定六親長幼之禮箋證後漢書卓茂傳初辟丞相府史事孔光後以儒術舉為侍郎給事黃門遷密令密今洛州密縣也勞心諄諄視人如子人常有言部亭長受其米肉遺者茂辟左右問之曰亭長為從汝求乎為汝有事囑之而受乎將平居自以恩意遺之乎人曰往遺之耳茂曰遺之而受何故言邪人曰竊聞賢明之君使人不畏吏吏不取人今我畏吏是以遺之吏既卒受故來言耳茂曰汝為敝人矣凡人所以貴於禽獸者以有仁愛知相敬事也今鄰里長老尚致饋遺此乃人道所以相親况吏與民乎吏顧不當乘威力強請求耳凡人之生群居雜處故有經紀禮義以相交接汝獨不欲修之寧能高飛遠走不在人間邪亭長素善吏歲時遺之禮也人曰苟如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝何所措其手足乎一門之內小者可論大者可殺也且歸念之於是人納其訓吏懷其恩後漢書循吏列傳秦彭傳秦彭字伯平扶風茂陵人也建初元年遷山陽太守以禮訓人不任刑罰崇好儒雅敦明庠序每春秋饗射輒修升降揖讓之儀乃為人設四誡以定六親長幼之禮
