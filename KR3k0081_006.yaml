body:
  text: 卷第六臣擇君第一前漢陳平傳漢王召平而問曰吾聞先生事魏不遂事楚而去今又從吾遊信者固多心乎平曰臣事魏王魏王不用臣說故去事項王項王不信人臣聞漢王能用人故歸後漢馬援傳囂使援奉書洛陽世祖迎笑謂援曰卿遨遊二帝閒援謝曰當今之世非獨君擇臣也臣亦擇君矣巨與公孫述同縣少相善臣前至蜀述陛戟而後進臣臣今遠來陛下何知非剌客姦人而簡易若是帝復笑曰卿非剌客顧說客耳援曰天下反覆盜名字者不可勝數今見陛下恢廓大度同符高祖乃知帝王自有真也帝甚壯之後漢鄧禹傳更始立豪桀多薦舉禹禹不肯從及聞光武安集河北即杖策北渡追及於鄴光武見之甚歡禹曰但願明公威德加於四海禹傳效其尺寸垂功名於竹帛耳後漢鄧禹傳論曰夫變通之世君臣相擇斯最作事謀始之幾也鄧公嬴糧從步觸紛亂而赴光武可謂識所從會矣後漢馮異傳從兄孝及同郡丁淋呂晏並從光武因共薦異得召見異歸謂苗萌曰今將軍皆壯士屈起多暴橫獨有劉將軍所到不虜掠觀其言語舉止非庸人也可以歸身苗萌曰死生同命願從子計後漢王常傳常與王鳳等起兵號下江兵北至宜秋是時漢兵敗於小長安伯升齊武王縯字伯升即與光武及李通俱造常壁見常說以合從之利常大悟曰王莽篡弒百姓思漢故豪茶並起今劉氏復興即真主也乃時曉說其將帥曰民之謳吟思漢非一日也夫民所怨者天所去也民所思者天所與也舉大事必當下順民心上合天意今諸劉舉宗起兵觀其來議事者皆有深計大慮王公之才與之并合必成大功下江諸將皆謝曰無王將軍吾屬幾陷於不義即引兵與漢軍合於是諸部齊心同力鋭氣益壯魏郭嘉傳初北見袁紹謂紹謀臣辛評郭圖曰夫智者審於量主故百舉百全而功名可立也袁公徒欲效周公之下士而未知用人之機多端寡要好謀無決欲與共濟天下大難定霸王之業難矣遂去之新唐書贊曰于志寧諫太子承乾幾遭賊殺然未嘗懼知太宗之明雖匕首揕胸不愧也及武后立不敢出一言知高宗之昧雖死無益也箋證此文已見君疑於臣第四箋證後漢書馬援傳馬援字文淵扶風茂陵人也建武四年冬囂使援奉書洛陽援至引見於宣德殿世祖迎笑謂援曰卿遨遊二帝間今見卿使人大慙援頓首辭謝因曰當今之世非獨君擇臣也臣亦擇君矣家語曰君擇臣而任之臣亦擇君而事之臣與公孫述同縣少相善臣前至蜀述陛戟而後進臣臣今遠來陛下何知非刺客姦人而簡易若是東觀記曰援初到勑令中黃門引入時上在宣德殿南廡下袒幘坐故云簡易也帝復笑曰卿非刺客顧說客耳援曰天下反覆盜名字者不可勝數今見陛下恢廓大度同符高祖乃知帝王自有真也帝甚壯之後漢書鄧禹傳鄧禹字仲華南陽新野人也年十三能誦詩受業長安時光武亦游學京師禹年雖幼而見光武知非常人遂相親附數年歸家及漢兵起更始立豪傑多薦舉禹禹不肯從及聞光武安集河北即杖策北渡追及於鄴光武見之甚歡謂曰我得專封拜生遠來寧欲仕乎禹曰不願也光武曰即如是何欲為劉攽曰案文多一為字不然當云欲何為禹曰但願明公威德加於四海禹得效其尺寸垂功名於竹帛耳卷四十六後漢書鄧禹傳論曰夫變通之世君臣相擇斯最作事謀始之幾也幾者事之微也易訟卦曰君子以作事謀始鄧公贏糧徒步觸紛亂而赴光武方言曰贏擔可謂識所從會矣卷四十六後漢書馮異傳馮異字公孫潁川父城人也好讀書通左氏春秋孫子兵法漢兵起異以郡掾監五縣與父城長苗萌共城守為王莽拒漢光武略地潁川攻父城不下屯兵巾車鄉巾車鄉名在父城界異間出行屬縣間出猶微行行音下孟反為漢兵所執時異從兄孝及同郡丁綝呂晏並從光武因共薦異得召見異曰異一夫之用不足為彊弱有老母在城中願歸據五城以效功報德光武曰善異歸謂苗萌曰今諸將皆壯士屈起多暴橫獨有劉將軍所到不虜掠觀其言語舉止非庸人也可以歸身苗萌曰死生同命敬從子計後漢書王常傳王常字顏卿潁川舞陽人也王莽末為弟報仇亡命江夏久之與王鳳王匡等起兵雲杜緑林中聚衆數萬人以常為偏裨攻傍縣後與成丹張卬別入南郡藍口號下江兵續漢志曰南郡編縣有藍口聚王莽遣嚴尤陳茂擊破之常與丹卬收散卒入蔞溪劫略鍾龍間衆復振引軍與荊州牧戰於上唐大破之遂北至宜秋是時漢兵與新市平林衆俱敗於小長安各欲解去伯升聞下江軍在宜秋即與光武及李通俱造常壁曰願見下江一賢將議大事成丹張卬共推遣常伯升見常說以合從之利常大悟曰王莽篡弒殘虐天下百姓思漢故豪傑並起今劉氏復興即真主也誠思出身為用輔成大功伯升曰如事成豈敢獨饗之哉遂與常深相結而去常還具為丹卬言之丹卬負其衆皆曰大丈夫既起當各自為主何故受人制乎常心獨歸漢乃稍曉說其將帥曰往者成哀衰微無嗣故王莽得承間篡位既有天下而政令苛酷積失百姓之心民之謳吟思漢非一日也故使吾屬因此得起夫民所怨者天所去也民所思者天所與也舉大事必當下順民心上合天意功乃可成若負強恃勇觸情恣欲雖得天下必復失之以秦項之藝尚至夷覆况今布衣相聚草澤以此行之滅亡之道也今南陽諸劉舉宗起兵觀其來議事者皆有深計大慮王公之才與之并合必成大功此所以祐吾屬也下江諸將雖屈強少識然素敬常乃皆謝曰無王將軍吾屬幾陷於不義願敬受教即引兵與漢軍及新市平林合於是諸部齊心同力鋭氣益壯三國志魏志郭嘉傳郭嘉字奉孝潁川陽翟人也傅子曰嘉少有遠量漢末天下將亂自弱冠匿名迹密交結英雋不與俗接故時人多莫知惟識達者奇之年二十七辟司徒府初北見袁紹謂紹謀臣辛評郭圖曰夫智者審於量主故百舉百全而功名可立也袁公徒欲效周公之下士而未知用人之機多端寡要好謀無決欲與共濟天下大難定霸王之業難矣於是遂去之新唐書于志寧傳贊曰于志寧諫太子承乾幾遭賊殺然未嘗懼知太宗之明雖匕首揕胸不愧也及武后立不敢出一言知高宗之昧雖死無益也知臣莫若君第二前漢蕭何傳何事惠帝何病上親自臨視因問曰君即百歲後誰可代君對曰知臣莫若主帝曰曹參如何何頓首曰帝得之矣後漢王常傳光武帝於大會中指常謂群臣曰此家率下江諸將輔翼漢室心如金石真忠臣也吳志是儀傳儀為魯王傳盡忠不治産業不受施惠鄰家大起屋宅權曰儀儉必非也問果也家其見知信如此新唐長孫無忌傳太宗帝嘗從容曰朕聞君聖臣直人嘗苦不自知公宜面破朕得失無忌曰陛下神文聖武性與天道非臣等愚所及誠不見所失帝曰朕冀聞過公等力相護悅朕評公等可否以相規謂高士簾心術警悟臨難不易節所乏者骨鯁耳唐儉有辭善和解人酒杯流行發言可喜事朕二十年未嘗一言國家事楊師道性謹審自能無過不更事緩急非可倚岑文本敦厚文章論議其所長也謀常經遠自當不負於物劉泊堅不其言有益不輕然諾於人能自補闕馬周敏鋭而正評裁人物直道而行所任皆稱朕意褚遂良鯁亮有學術竭誠親於朕若飛鳥依人自加憐愛無忌應對機敏善避嫌求於古人未有其比總兵攻戰非所合也新唐長孫無忌傳帝以無忌為尚書高力士口陳以外戚位三公嫌太宗曰朕任官必以才不者雖親若襄邑王神符不妄授若才雖仇如魏徵不棄也新唐李靖傳高祖歎曰靖乃銑公祏之膏肓也古之韓白衛霍何以加新唐蕭瑀傳瑀輒言玄齡輩朋黨然特未反耳帝曰知臣莫若君朕雖不明寧頓懵臧否因為瑀曉解餘見人臣檀權齊世家又見臣難獨任高祖紀箋證漢書蕭何傳高祖崩何事惠帝何病上親自臨視何疾因問曰君即百歲後誰可代君對曰知臣莫若主帝曰曹參何如何頓首曰帝得之矣何死不恨矣後漢書王常傳常頓首謝曰臣蒙大命得以鞭策託身陛下始遇宜秋後會昆陽幸賴靈武輒成斷金伯升與常深相結故曰斷金易繫辭曰二人同心其利斷金更始不量愚臣任以南州謂以廷尉行南陽太守赤眉之難喪心失望謂赤眉入長安破更始以為天下復失綱紀聞陛下即位河北心開目明今得見闕庭死無遺恨帝笑曰吾與廷尉戲耳吾見廷尉不憂南方矣謂南陽也乃召公卿將軍以下大會具為群臣言常以匹夫興義兵明於知天命故更始封為知命侯與吾相遇兵中尤相厚善特加賞賜拜為左曹封山桑侯後帝於大會中指常謂群臣曰此家率下江諸將輔翼漢室心如金石真忠臣也是日遷常為漢忠將軍三國志吳志是儀傳是儀字子羽北海營陵人也本姓氏初為縣吏後仕郡郡相孔融嘲儀言氏字民無上可改為是乃遂改焉徐衆評曰古之建姓或以所生或以官號或以祖名皆有義體以明氏族故曰胙之以土而命之氏此先王之典也所以明本重始彰示功德子孫不忘也今離文柝字橫生忌諱使儀易姓忘本誣祖不亦謬哉教人易姓從人改族融既失之儀又不得也蜀相諸葛亮卒權垂心西州遣儀使蜀申固盟好奉使稱意後拜尚書僕射南魯二宮初立儀以本職領魯王傅為傅盡忠動輒規諫事上勤與人恭不治産業不受施惠為屋舍財足自容鄰家有起大宅者權出望見問起大室者誰左右對曰似是儀家也權曰儀儉必非也問果他家其見知信如此新唐書長孫無忌傳帝嘗從容問曰朕聞君聖臣直人常苦不自知公宜面攻朕得失無忌曰陛下神武聖文冠卓千古性與天道非臣等愚所及誠不見有所失帝曰朕冀聞過公等乃相諛悅朕當評公等可否以相規謂高士廉心術警悟臨難不易節所乏者骨鯁耳唐儉有辭善和解人酒杯流行發言可意事朕二十年未嘗一言國家事楊師道性謹審自能無過而懦不更事緩急非可倚岑文本敦厚文章論議其所長也謀常經遠自當不負於物劉洎堅正其言有益不輕然諾於人能自補闕馬周敏鋭而正評裁人物直道而行所任皆稱朕意褚遂良鯁亮有學術竭誠親於朕若飛鳥依人自加憐愛無忌應對機敏善避嫌求於古人未有其比總兵攻戰非所善也二十三年帝疾甚新唐書長孫無忌傳帝以無忌皇后兄又少相友眷倚日厚常出入臥內進尚書右僕射無忌亦自懼貴且亢后又數言之遂解僕射授開府儀同三司與房玄齡杜如晦尉遲敬德皆以元勳封一子郡公進冊司空知門下尚書省事無忌辭又因高士廉口陳以外戚位三公嫌議者謂天子以私后家帝曰朕任官必以才不者雖親若襄邑王神符不妄授若才雖仇如魏徵不棄也新唐書李靖傳靖將輕兵至丹陽公祏懼衆尚多不能戰乃出走禽之江南平置東南道行臺以為行臺兵部尚書賜物千段奴婢百口馬百匹行臺廢檢校揚州大都督府長史帝歎曰靖乃銑公祏之膏肓也古韓白衛霍何以加又御定淵鑑類函李靖字藥師蕭銑據江陵靖降之輔公祏據丹陽靖禽之帝歎曰靖乃銑公祏之膏肓也古韓白衛霍何以加參見卷五君不疑臣第三箋證君民相須第三前漢高后紀詔曰凡有天下治萬民者蓋之如天容之如地上有歡心以使百姓百姓欣然以事其上歡欣交通而天下治前漢武帝紀元狩元年夏詔曰朕聞咎繇對禹曰在知人知人則哲惟帝難之蓋君者心也民猶支體支體傷則心憯怚後漢劉陶傳上疏曰臣聞人非天地無以為生天地非人無以為靈是故帝非人不立人非帝不寧夫天之與帝帝之與人猶頭之與足相須而行也後漢皇甫規傳上書言梁冀曰夫君者舟也人者水也群臣乘舟者也將軍兄弟操揖者也若能平志畢力以度元元所謂福也如其怠弛將淪波濤可不慎乎家語孔子曰君者舟也人者水也水可載舟亦以覆舟君以此思危則可知也後漢官者列傳呂強傳上疏云尸子曰君如杅民如水杅方則水方杅圓則水圓吳駱統傳上疏曰財須民生彊賴民力威恃民勢福由民殖德俟民茂義以民行六者既備然後應天受祚保族宜邦書曰衆非后無能胥以寧后非衆無以辟四方推是言之則民以君安君以民濟不易之道也箋證漢書高后紀高皇后呂氏生惠帝佐高祖定天下父兄及高祖而侯者三人惠帝即位尊呂后為太后太后立帝姊魯元公主女為皇后無子取後宮美人子名之以為太子惠帝崩太子立為皇帝年幼太后臨朝稱制四年夏少帝自知非皇后子出怨言皇太后幽之永巷如淳曰列女傳周宣姜后脫簪珥待罪永巷後改為掖庭師古曰永長也本謂宮中之長巷也詔曰凡有天下治萬民者蓋之如天容之如地上有歡心以使百姓百姓欣然以事其上歡欣交通而天下治漢書武帝紀元狩元年夏四月赦天下丁卯立皇太子詔曰朕聞咎繇對禹曰在知人知人則哲惟帝難之蓋君者心也民猶支體支體傷則心憯怛後漢書劉陶傳劉陶字子奇一名偉潁川潁陰人濟北貞王勃之後陶為人居簡不修小節所與交友必也同志好尚或殊富貴不求合情趣苟同貧賤不易意同宗劉愷以雅德知名獨深器陶時大將軍梁冀專朝而桓帝無子連歲荒饑災異數見陶時游太學乃上疏陳事曰臣聞人非天地無以為生天地非人無以為靈書曰惟天地萬物父母惟人萬物之靈也是故帝非人不立人非帝不寧夫天之與帝帝之與人猶頭之與足相須而行也後漢書皇甫規傳皇甫規字威明安定朝那人也祖父稜度遼將軍父旗扶風都尉梁太后臨朝規舉賢良方正對策曰今大將軍梁冀河南尹不疑處周邵之任為社稷之鎮加與王室世為姻族梁商女為順帝后后女弟又為桓帝后冀即商子故曰代姻也今日立號雖尊可也可猶宜也實宜增修謙節輔以儒術省去遊娛不急之務割減廬第無益之飾夫君者舟也人者水也家語孔子曰夫君者舟也人者水也水可載舟亦以覆舟君以此思危則可知也群臣乘舟者也將軍兄弟操楫者也若能平志畢力以度元元所謂福也如其怠弛將淪波濤可不慎乎後漢書宦者列傳呂強傳呂強字漢盛河南成罪人也少以宦者為小黃門再遷中常侍為人清忠奉公靈帝時例封宦者以強為都鄉侯強辭讓懇惻固不敢當帝乃聽之因上疏陳事曰穀梁傳曰財盡則怨力盡則懟尸子曰尸子晉人也名佼秦相衛鞅客也鞅謀計未嘗不與佼規也商君被刑恐并誅乃亡逃入蜀作書二十篇十九篇陳道德仁義之紀一篇言九州險阻水泉所起也君如杅民如水杅方則水方杅圓則水圓杅碗屬也音于字亦作盂上之化下猶風之靡草三國志吳志駱統傳駱統字公緒會稽烏傷人也父俊官至陳相為袁術所害謝承後漢書曰俊字孝遠有文武才幹少為郡吏察孝廉補尚書郎擢拜陳相值袁術僭號兄弟忿爭天下鼎沸群賊並起陳與比界奸慝四布俊厲威武保疆境賊不敢犯養濟百姓災害不生歲獲豐稔後術軍衆饑困就俊求糧俊疾惡術初不應答術怒密使人殺俊統年二十試為烏程相民戶過萬咸歎其惠理權嘉之召為功曹行騎都尉妻以從兄輔女出為建忠郎將領武射吏三千人是時徵役繁數重以疫癘民戶損耗統上疏曰臣聞君國者以據疆土為彊富制威福為尊貴曜德義為榮顯永世胤為豐祚然財須民生彊賴民力威恃民勢福由民殖德俟民茂義以民行六者既備然後應天受祚保族宜邦書曰衆非后無能胥以寧后非衆無以辟四方推是言之則民以君安君以民濟不易之道也險阻第四史記蘇秦傳秦說惠王曰秦四塞之國被山帶渭東有關河西有漢中南有巴蜀北有代馬此天府也以秦士民之衆兵法之教可以吞天下稱帝而治秦王弗用前漢酈食其謂高祖曰願足下急復進兵收取滎陽據敖庾之粟塞成罪之險杜太行之道距飛狐之口守白馬之津以示諸侯形制之勢則天下知所歸矣前漢高祖紀田肯賀上曰陛下得韓信又治秦中秦形勢之國也帶河阻山縣隔千里持戟百萬秦得百二焉河山之險由地勢高順流而下易故天下於秦縣隔千里也地藝便利其以下兵於諸侯譬猶居高屋之上建瓴水也瓴盛水瓶也居高屋之上而幡瓶水言其向下之藝易也夫齊東有琅邪即墨之饒南有泰山之固西有濁河之限北有勃海之利地方二千里持戟百萬縣隔千里之外齊得十二焉秦得百二者萬人常諸侯百萬也齊得十二者二十萬人當諸侯百萬也所以言縣隔千里之外除去秦地而當乃與諸侯計利便也此來西秦也非親子弟莫可使王齊者上曰善前漢韓信傳信耳以兵數万欲東下井陘擊趙趙王成安君陳餘聞聚兵井陘口號稱二十萬廣武君李左車說成安君曰千里餽糧士有飢色樵蘇後爨師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在後願足下假臣奇兵三萬人從間路絶其輜車足下深溝高壘勿與戰彼前不得鬭退不得還吾絶其後野無所掠鹵不至十日兩將之頭可致戲下成安君儒者常稱義兵不用詐謀奇計箋證史記蘇秦列傳蘇秦者東周雒陽人也索隱蘇秦字季子蓋蘇忿生之後已姓也譙周云秦兄弟五人秦最少兄代代弟厲及辟鵠並為游說之士此下云秦弟代代弟厲未詳正義戰國策云蘇秦雒陽乘軒里人也藝文志云蘇子三十一篇在縱橫流敬王以子朝之亂從王城東遷雒陽故城乃號東周以王城為西周東事師於齊而習之於鬼谷先生出游數歲大困而歸於是得周書陰符伏而讀之期年以出揣摩曰此可以說當世之君矣求說周顯王顯王左右素習知蘇秦皆少之索隱謂王之左右素慣習知秦浮說多不中當世以為秦智說淺故少之劉氏云少謂輕之弗信乃西至秦秦孝公卒說惠王曰秦四塞之國被山帶渭東有關河西有漢中南有巴蜀北有代馬此天府也以秦士民之衆兵法之教可以吞天下稱帝而治秦王曰毛羽未成不可以高蜚文理未明不可以并兼方誅商鞅疾辨士弗用乃東之趙漢書酈食其傳酈食其陳留高陽人也師古曰食音異其音基好讀書家貧落魄無衣食業為里監門然吏縣中賢豪不敢役皆謂之狂生韓信方東擊齊漢王數困滎陽成罪計欲捐成罪以東屯鞏雒以距楚食其因曰臣聞之知天之天者王事可成不知天之天者王事不可成王者以民為天而民以食為天楚漢久相持不決百姓騷動海內搖蕩農夫釋耒紅女下機天下之心未有所定也願足下急復進兵收取滎陽據敖庾之粟師古曰敖庾即敖倉塞成罪之險杜太行之道距飛狐之口守白馬之津以示諸侯形制之勢則天下知所歸矣漢書高帝紀六年冬十二月會諸侯于陳楚王信迎謁因執之詔曰天下既安豪桀有功者封侯新立未能盡圖其功師古曰新立言新即帝位也圖謂謀而賞之身居軍九年或未習法令或以其故犯法大者死刑吾甚憐之其赦天下田田肯賀上曰甚善陛下得韓信又治秦中秦形勝之國也帶河阻山縣隔千里持戟百萬秦得百二焉應劭曰言河山之險與諸侯相縣隔絶千里也所以能禽諸侯者得天下之利百二也李斐曰山川之險由地勢高順流而下易故天下於秦縣隔千里也持戟百萬秦得百二焉蘇林曰百二得百中之二二萬人也秦地險固二萬人足當諸侯百萬人也師古曰縣隔千里李應得之秦得百二蘇說是也地藝便利其以下兵於諸侯譬猶居高屋之上建瓴水也如淳曰瓴盛水瓶也居高屋之上而幡瓴水言其向下之勢易也夫齊東有琅邪即墨之饒南有泰山之固西有濁河之限北有勃海之利地方二千里持戟百萬縣隔千里之外齊得十二焉應劭曰齊得十之二耳故愍王稱東帝後復歸之卒為秦所滅者利鈍之勢異也李斐曰齊有山河之限地方二千里是與天下縣隔也設有持戟百萬之衆齊得十中之二焉百萬十分之二亦二十萬也但文相避故言東西秦其勢敵也蘇林曰十二得十中之二二十萬人當百萬言齊雖固不如秦二萬乃當百萬也晉灼曰案文考義蘇說是也師古曰蘇晉之釋得其意也秦得百二者二萬人當諸侯百萬人也齊得十二者二十萬人當諸侯百萬也所以言縣隔千里之外者除去秦地而齊乃與諸侯計利便也此東西秦也非親子弟莫可使王齊者上曰善賜金五百斤漢書韓信傳漢王使酈生往說魏王豹豹不德乃以信遂左丞相擊魏魏王豹驚引兵迎信信遂虜豹定河東使人請漢王願益兵三萬人臣請以北舉燕趙東擊齊南絶楚之糧道西與大王會於滎陽漢王與兵三萬人遣張耳與俱進擊趙代破代禽夏說閼與李奇曰夏說代相也孟康曰閼與是邑名也在上黨隰縣師古曰說讀曰悅閼音一曷反與音豫信之下魏代漢輒使人收其精兵詣滎陽以距楚信耳以兵數萬欲東下井陘擊趙趙王成安君陳餘聞漢且襲之聚兵井陘口號稱二十萬廣武君李左車說成安君曰聞漢將韓信涉西河虜魏王禽夏說新喋血閼與今乃輔以張耳議欲以下趙此乘勝而去國遠鬭其鋒不可當臣聞千里餽糧士有飢色樵蘇後爨師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在後願足下假臣奇兵三萬人從間路絶其輜重足下深溝高壘勿與戰彼前不得鬭退不得還吾奇兵絶其後野無所掠鹵不至十日兩將之頭可致戲下師古曰戲讀曰麾又音許宜反願君留意臣之計必不為二子所禽矣成安君儒者常稱義兵不用詐謀奇計在德不在險第五史記吳起傳武侯浮西河而下顧而謂吳起曰美哉乎山河之固此魏之寶也起對曰在德不在險昔三苗氏左洞庭右彭蠡德義不修禹滅之夏桀左河濟右泰華伊闕在其南羊腸在其北修政不仁湯放之商紂左孟門右太行常山在其北大河經其南修政不德武王殺之由此觀之在德不在險若君不修德舟中之人盡為敵國也武侯曰善晉陸機傳或曰亂不極則治不形言帝王之因天時也古人有言曰天時不如地利易曰王侯設險以守其國言為國之恃險也又曰地利不如人和在德不在險言守險之在人也吳之興也參而由焉孫卿所謂合其參者也及其亡也恃險而已又孫卿所謂舍其參者也箋證史記吳起列傳吳起者衛人也好用兵嘗學於曾子吳起於是聞魏文侯賢欲事之文侯以吳起善用兵廉平盡能得士心乃以為西河守以拒秦韓魏文侯既卒起事其子武侯武侯浮西河而下中流顧而謂吳起曰美哉乎山河之固此魏國之寶也起對曰在德不在險昔三苖氏左洞庭右彭蠡德義不修禹滅之夏桀之居左河濟右泰華伊闕在其南羊腸在其北修政不仁湯放之殷紂之國左孟門右太行常山在其北大河經其南修政不德武王殺之由此觀之在德不在險若君不修德舟中之人盡為敵國也武侯曰善即封吳起為西河守甚有聲名晉書陸機傳陸機字士衡吳郡人也祖遜吳丞相父抗吳大司馬機身長七尺其聲如鍾少有異才文章冠世伏膺儒術非禮不動抗卒領父兵為牙門將年二十而吳滅退居舊里閉門勤學積有十年易曰湯武革命順乎天或曰亂不極則治不形言帝王之因天時也古人有言曰天時不如地利易曰王侯設險以守其國言為國之恃險也又曰地利不如人和在德不在險言守險之在人也吳之興也參而由焉孫卿所謂合其參者也及其亡也恃險而已又孫卿所謂舍其參者也恃險第六前漢陳勝傳贊曰賈誼過秦曰踐華為城因河為池據億文之城臨不測之川以為固良將徑弩守要害之處信臣精卒陳利兵而誰何天下已定始皇之心自以為關中之固金城千里子孫帝王萬世之業也後漢隗囂傳帝知囂欲持兩端不願天下統一於是稍黜其禮遣來歙說囂而囂將王元常以為天下成敗未可知不願專心內事元遂說囂曰今天下完富士馬最彊比收西河上郡東收三輔之地案秦舊跡表裡河山元謂以一丸泥為大王東封函谷關此万世一時也若計不及此且畜養士馬據隘自守曠日持久以待四方之變圖王不成其弊猶足以霸要之魚不可脫於淵神龍失藝還與蚯蚓同囂心然元計負其險隘欲專方面於是游士長者稍稍去之新唐竇靜傳靜請斷石嶺以為障塞制突厥之入餘見在德不在險吳起傳箋證漢書陳勝傳贊曰昔賈生之過秦曰踐華為城服虔曰斷華山為城晉灼曰踐登也師古曰晉說是也因河為池據億丈之城臨不測之川以為固良將徑弩守要害之處信臣精卒陳利兵而誰何師古曰問之為誰又云何人其義一也天下已定始皇之心自以為關中之固金城千里子孫帝王萬世之業也後漢書隗囂傳時關中將帥數上書言蜀可擊之狀帝以示囂因使討蜀以效其信囂乃遣長史上書盛言三輔單弱劉文伯在邊文伯盧芳字也未宜謀蜀帝知囂欲持兩端不願天下統一於是稍黜其禮正君臣之儀初囂與來歙馬援相善故帝數使歙援奉使往來勸令入朝許以重爵囂不欲東連遣使深持謙辭言無功德須四方平定退伏閭里五年復遣來歙說囂遣子入侍囂聞劉永彭寵皆已破滅乃遣長子恂隨歙詣闕以為胡騎校尉封鐫羌侯胡騎校尉武帝置秩二千石也鐫猶鐫鑿也而囂將王元王捷常以為天下成敗未可知不願專心內事元遂遻囂曰昔更始西都四方響應天下喁喁謂之太平一旦敗壞大王幾無所厝今南有子陽北有文伯江湖海岱王公十數而欲牽儒生之說棄千乘之基羇旅危國以求萬全此循覆車之軌計之不可者也今天水完富士馬最彊北收西河上郡東收三輔之地案秦舊迹表裏山河元請以一丸泥為大王東封函谷關此萬世一時也若計不及此且畜養士馬據隘自守曠日持久以待四方之變圖王不成其弊猶足以霸要之魚不可脫於淵神龍失藝即還與蚯蚓同囂心然元計雖遣子入質猶負其險厄欲專方面於是游士長者稍稍去之新唐書竇靜傳靜字元休在隋佐親衛以父得罪煬帝久不之進高祖入京師擢并州大總管府長史時突厥數為邊患糧道不屬靜表請屯田太原以省餽運議者以流亡未復不宜重困於是召入與裴寂蕭瑀封倫廷議寂等不能屈帝從之歲收粟十萬斛詔檢校并州大總管又請斷石嶺以為鄣塞制突厥之入偃武修文第七前漢禮樂志郊祀歌海內安寧興文匽武後漢光武紀初帝在兵閒久厭武事自隴蜀平後共警急未嘗復言軍旅皇太子嘗問攻戰之事帝曰昔衛靈公問陳孔子不對此非爾所及每旦視朝日仄乃罷數引公卿郎將講論經理夜分乃寐退功臣而進文吏戢弓矢而散馬牛雖道未方古斯亦止戈之武焉後漢賈復傳復知帝欲偃干戈修文德不欲功臣擁衆京師乃與高密侯鄧禹並剽甲兵敦儒學剽削也帝深然之遂罷左右將軍新唐高儉傳從獵洛陽苑帝射四發輒殪四矢顧笑曰天策長史不見上將擊賊邪對曰漢高以馬上得之不以馬上治之陛下神定四方豈復快心於一獸新唐魏徵傳帝本以兵定天下雖已治不忘經略四夷也故徵侍晏奏破陳舞則俯首不顧至慶善樂則諦玩旡斁舉有所諷矣新唐蕭俯傳穆宗初兩河底定俯與段文昌當國謂四方旡虞遂議太平事謂武不可黷勸帝偃革尚文箋證漢書禮樂志郊祀歌練時日一帝臨中壇四方承宇師古曰言天神尊者來降中壇四方之神各承四字也壇字或作袒讀亦曰壇字加示者神靈之耳下言紫壇嘉壇其義並同繩繩意變備得其所應劭曰繩繩謹敬更正意也孟康曰衆多也臣瓚曰爾雅繩繩戒也師古曰瓚說是也清和六合制數以五張晏曰此后土之歌也土數五海內安寧興文匽武師古曰匽古偃字後漢書光武帝紀初帝在兵間久厭武事且知天下疲耗思樂息肩左傳曰息肩于晉自隴蜀平後非警急未嘗復言軍旅皇太子嘗問攻戰之事帝曰昔衛靈公問陳孔子不對此非爾所及論語衛靈公問陳於孔子曰俎豆之事則嘗聞之矣軍旅之事未之學也每旦視朝日側乃罷數引公卿郎將講論經理夜分乃寐分猶半也皇太子見帝勤勞不怠承間諫曰陛下有禹湯之明而失黃老養性之福願頤愛精神優游自寧帝曰我自樂此不為疲也雖身濟大業兢兢如不及故能明慎政體總攬權綱量時度力舉無過事退功臣而進文吏戢弓矢而散馬牛雖道未方古斯亦止戈之武焉左傳曰於文止戈為武也後漢書賈復傳賈復字君文南陽冠軍人也少好學習尚書事舞陰李生李生奇之謂門人曰賈君之容貌志氣如此而勤於學將相之器也王莽末為縣掾迎鹽河東會遇盜賊等比十餘人皆放散其鹽復獨完以還縣縣中稱其信時下江新市兵起復亦聚衆數百人於羽山自號將軍更始立乃將其衆歸漢中王劉嘉以為校尉及光武於柏人因鄧禹得召見光武奇之禹亦稱有將帥節於是署復破虜將軍光武至信都以復為偏將軍及拔邯鄲遷都護將軍光武即位拜為執金吾封冠軍侯遷左將軍十三年定封膠東侯食郁秩壯武下密即墨梃胡觀陽凡六縣復知帝欲偃干戈修文德不欲功臣擁衆京師乃與高密侯鄧禹並剽甲兵敦儒學廣雅曰剽削也謂削除甲兵東觀記曰復闔門養威重受易經起大義帝深然之遂罷左右將軍新唐書唐儉傳唐儉字茂約并州晉陽人祖雍北齊尚書左僕射父鋻隋戎州刺史與高祖善貞觀初使突厥還太宗謂儉曰卿觀頡利可取乎對曰銜國威靈庶有成功四年李靖因襲破之儉脫身還歲餘為民部尚書從獵洛陽苑群豕突出于林帝射四發輒殪四豕一豕躍及鐙儉投馬搏之帝拔劍斷豕顧笑曰天策長史不見上將擊賊邪何懼之甚對曰漢祖以馬上得之不以馬上治之陛下神武定四方豈復快心於一獸新唐書魏徵傳徵奏引諸儒校集祕書國家圖籍粲然完整嘗以小戴禮綜彙不倫更作類禮二十篇數年而成帝美其書録置內府帝本以兵定天下雖已治不忘經略四夷也故徵侍宴奏破陳武德舞則俯首不顧至慶善樂則諦玩無斁舉有所諷切如此新唐書蕭俯傳俯字思謙恆子貞元中及進士第又以賢良方正對策異等拜右拾遺元和六年召為翰林學士凡三年進知制誥穆宗立楚薦之授中書侍郎同中書門下平章事進門下侍郎穆宗初兩河底定俯與段文昌當國謂四方無虞遂議太平事以為武不可黷勸帝偃革尚文又舊唐書蕭俯傳穆宗乘章武恢復之餘即位之始兩河廓定四鄙無虞而俯與段文昌屢獻太平之策以為兵以靜亂時已治矣不宜黷武勸穆宗休兵偃武
