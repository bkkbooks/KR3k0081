body:
  text: 卷第八十六禍福第一前漢賈誼為賦曰禍兮福所倚福兮禍所伏憂喜聚門吉凶同域彼吳強大夫差以敗粵棲會稽句踐伯世斯遊遂成卒被五刑傳説胥靡乃相武丁夫禍之與福何異糾纆禍福相為表裡如糾纆索相附會也糾絞也纆索也命不可説孰知其極前漢枚乘曰福生有基禍生有胎納其基絶其胎禍何自來納猶藏也前漢為善者天報之以福為惡者天報之以殃吳虞翻傳翻與少府孔融書并示以所著易注融答書曰觀象雲物察應寒溫原其禍福與神合契可謂探賾窮通者也新唐呂才傳曰祿命尚矣推索本原固不其然積善之家必有餘慶豈建祿而後吉乎積惡之家必有餘殃豈劫殺而後災乎皇天無親常與善人天人之交如影響有夏多罪天命勦絶宋景修德妖星退舍學也祿在其中不生當建學文王憂勤損壽非初值空亡云云箋證漢書賈誼傳禍兮福所倚福兮禍所伏憂喜聚門吉凶同域彼吳強大夫差以敗粵棲會稽句踐伯世斯遊遂成卒被五刑傅説胥靡乃相武丁夫禍之與福何異糾纆應劭曰禍福相為表裏如糾繩索相附會也臣瓚曰糾絞也纆索也師古曰纆音墨命不可説孰知其極漢書枚乘傳福生有基禍生有胎納其基絶其胎禍何自來師古曰納猶藏也何自來言無所從來也漢書吳王濞傳二月吳王兵既破敗走於是天子制詔將軍蓋聞為善者天報以福為非者天報以殃三國志吳志虞翻傳翻與少府孔融書并示以所著易注融答書曰聞延陵之理樂覩吾子之治易乃知東南之美者非徒會稽之竹箭也又觀象雲物察應寒溫原其禍福與神合契可謂探賾窮通者也新唐書呂才傳祿命篇曰漢宋忠賈誼譏司馬季主曰卜筮者高人祿命以悅人心矯言禍福以規人財王充曰見骨體知命祿見命祿知骨體此則言祿命尚矣推索本原固不其然積善之家必有餘慶豈建祿而後吉乎積惡之家必有餘殃豈祿殺而後災乎皇天無親嘗與善人天人之交如影響有夏多罪天命勦絶宋景修德妖星退舍學也祿在其中不生當建學文王憂勤損壽非初值空亡長平坑降卒非俱犯三刑南陽多近親非俱當六合高陽成湖不共河魁蜀郡炎火不盡災厄禍起於微第二前漢司馬相如傳諫獵書曰蓋明者遠見於未萌而知者避危於無形禍固多臧於隱微而發於人之所忽者也故鄙諺曰家絫千金坐不垂堂垂堂者近當邊外自恐墜墯耳言富人之子則自愛深也後漢齊武王縯傳論曰武王之破家厚士豈遊俠下客之為哉其慮將存乎配天之絶業而痛明堂之不祀也及其發舉大謀在倉卒擾攘之中使信先成於敵人赦岑彭於顯義若此足以見其度矣志高慮遠禍發所忽禍故多藏於隱微而發於人之所忽也嗚呼古人以蜂蠆為戒蓋畏此也後漢丁鴻傳和帝上封事曰間者月滿先節過望不虧此臣驕溢背君專功獨行也夫壞崖破巖之水源自涓涓干雲蔽日之木起於蔥青禁微則易救末者難人莫不忽於微細以致其大恩不忍誨義不忍割去事之後未然之明鏡也後漢陳忠傳上疏曰輕者重之端小者大之源故隄潰蟻孔氣泄針芒是以明者慎微智者識幾書曰小不可不殺詩云無縱詭隨以謹無良蓋所以崇本絶末鉤深之慮也箋證漢書司馬相如傳嘗從上至長楊獵是時天子方好自擊熊豕馳逐壄獸相如因上疏諫其辭曰蓋明者遠見於未萌而知者避危於無形禍固多藏於隱微而發於人之所忽者也故鄙諺曰家絫千金坐不垂堂張揖曰畏慎瓦墮中人也師古曰垂堂者近堂邊外自恐墜墮耳非畏慎瓦也言富人之子則自愛深也後漢書齊武王縯傳論曰大丈夫之鼓動拔起其志致蓋遠矣若夫齊武王之破家厚士豈遊俠下客之為哉其慮將存乎配天之産業而痛明堂之不祀也及其發舉大謀在倉卒擾攘之中使信先成於敵人赦岑彭以顯義若此足以見其度矣志高慮遠禍發所忽謂不用樊宏光武之言忽輕也司馬相如曰禍故多藏於隱微而發於人之所忽也嗚呼古人以蜂蠆為戒蓋畏此也後漢書丁鴻傳和帝即位遷太常永元四年代袁安為司徒是時竇太后臨政憲兄弟各擅威權鴻因日食上封事曰間者月滿先節過望不虧此臣驕溢背君專功獨行也夫壞崖破巖之水源自涓涓干雲蔽日之木起於䓤青禁微則易救末者難人莫不忽於微細以致其大恩不忍誨義不忍割去事之後未然之明鏡也後漢書陳寵傳附子陳忠自帝即位以後頻遭元二之厄百姓流亡盜賊並起郡縣更相飾匿莫肯糾發忠獨以為憂上疏曰臣聞輕者重之端小者大之源故隄潰蟻孔氣泄針芒是以明者隱微智者識幾書曰小不可不殺詩云無縱詭隨以謹無良蓋所以崇本絶末鉤深之慮也轉禍為福第三史記蘇秦傳蘇秦曰臣聞古之善制事者轉禍為福因改為成大王誠能聽臣計即歸燕之十城此所謂棄仇讎而立厚交者也夫燕秦俱事齊則大王號令天下莫敢不聽前漢李尋傳見時多災異説根曰書曰曆象日月星辰此言仰觀天文俯察地理觀日月消息候星辰行度察山川變動參人民謠俗以制法度考禍福舉錯勃逆咎敗將至徵兆為之先見明君恐懼修正側身博問轉禍為福不可救者即蓄備以待之故社稷無憂後漢漢辨士説陳康曰蓋聞上智不處危以僥幸中智能因危以立功下愚安於危以自亡危亡之至自人所由不可不察今京師敗亂四方雲擾公所聞也蕭王兵強士附河北歸命公所見也謝躬內背蕭王外失衆心公所知也公今據孤危之城待滅亡之禍義無所立節無所成不若開門內軍轉禍為福免下愚之敗收中智之功此計之至者也康然之於是康收劉慶乃躬妻子開門內漢等後漢周舉傳詔書以舉才學優深特下策問舉對曰昔武王入商出傾宮之女成湯遭災以六事剋己魯僖遇旱而自責祈雨皆以精誠轉禍為福新唐張廷圭傳開元初大旱詔求直言廷圭上疏曰古有多難興國隱憂啓聖蓋事危則志鋭情苦則慮深故能轉禍為福也箋證史記蘇秦傳蘇秦曰臣聞古之善制事者轉禍為福因敗為功大王誠能聽臣計即歸燕之十城燕無故而得十城必喜秦王知以己之故而歸燕之十城亦必喜此所謂棄仇讎而得石交者也夫燕秦俱事齊則大王號令天下莫敢不聽是王以虛辭附秦以十城取天下此霸王之業也漢書李尋傳是時多災異根輔政數虛已問尋尋見漢家有中衰厄會之象其意以為且有洪水為災乃説根曰書曰曆象日月星辰此言仰視天文俯察地理觀日月消息候星辰行伍揆山川變動參人民繇俗以制法度考禍福舉錯悖逆咎敗將至徵兆為之先見明君恐懼修正側身博問轉禍為福不可救者即蓄備以待之故社稷亡憂後漢書吳漢傳漢先令辨士説陳康曰蓋聞上智不處危以僥幸中智能因危以為功下愚安於危以自亡危亡之至在人所由不可不察今京師敗亂四方雲擾公所聞也蕭王兵強士附河北歸命公所見也謝躬內背蕭王外失衆心公所知也今公據孤危之城待滅亡之禍義無所立節無所成不若開門內軍轉禍為福免下愚之敗收中智之功此計之至者也康然之於是康收劉慶及躬妻子開門內漢等後漢書周舉傳詔書以舉才學優深特下策問舉對曰昔武王入殷出傾宮之女成湯遭災以六事剋己魯僖遇旱而自責祈雨皆以精誠轉禍為福新唐書張廷圭傳玄宗開元初大旱關中飢詔求直言廷圭上疏曰古有多難興國殷憂啓聖蓋事危則志鋭情苦則慮深故能轉禍為福也見禍於未萌第四前漢朝錯傳請諸侯之罪過削其支郡錯所更令三十章諸侯歡譁錯父聞之從穎川來謂錯曰上初即位公為政用事侵削諸侯疏人骨肉口讓多怨公何為也錯曰不如此天子不尊宗廟不安父曰劉氏安矣而鼂氏危遂飲藥死曰吾不忍見禍逮身後十餘日吳楚七國俱反以誅錯為名後漢鄭興子鄭衆傳建武中皇太子及山陽王荊因梁松以縑帛聘清衆欲為通義引籍出入殿中衆謂松曰大子儲君無交外之義漢有舊防蕃王不宜私通賓客犯禁觸罪不如守正而死大子及荊聞而奇之亦不強也及梁氏事敗賓客多坐之唯衆不染於辭箋證漢書鼂錯傳遷為御史大夫請諸侯之罪過削其支郡奏上上令公卿列侯宗室雜議莫敢難獨竇嬰爭之繇此與錯有隙錯所更令三十章諸侯歡譁錯父聞之從潁川來謂錯曰上初即位公為政用事侵削諸侯疏人骨肉口讓多怨公何為也錯曰固也不如此天子不尊宗廟不安父曰劉氏安矣而鼂氏危吾去公歸矣遂飲藥死曰吾不忍見禍逮身後十餘日吳楚七國俱反以誅錯為名後漢書鄭興傳附子鄭衆衆字仲師年十二從父受左氏春秋精力於學明三統歷作春秋難記條例兼通易詩知名於世建武中皇太子及山陽王荊因虎賁中郎將梁松以縑帛聘請衆欲為通義引籍出入殿中衆謂松曰太子儲君無外交之義漢有舊防蕃王不宜私通賓客遂辭不受松復風衆以長者意不可逆衆曰犯禁觸罪不如守正而死太子及荊聞而奇之亦不強也及梁氏事敗賓客多坐之唯衆不染於辭防患於未然第五中記蘇秦傳臣聞治之其未亂也為之其未有也患至而後憂之則無及已史記禮禁未然之前法施已然之後法之所為用者易見而禮之所為禁者難知前漢賈誼傳然而曰禮云禮云者責絶惡於未萌而起教於微眇使民日遷善遠罪而不自知也前漢徐樂傳賢主獨觀万化之原明於安危之機修之廟堂之上而銷未形之患也前漢辛慶忌傳何武上封事曰乃者大異並見未有其應加以兵革久寢春秋大災未至而豫禦之慶忌宜在爪牙官以備不虞其後拜為右將軍前漢霍光傳初霍氏奢侈茂陵徐生上疏曰霍氏泰盛陛下宜以時抑制無使至亡書三上其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直穾傍有積薪客謂主人更為曲穾遠徙其薪不者且有火患主人不應俄而家果失火鄰里共救之得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次坐而不録言曲穾者人謂主人曰鄉使聽客之言不費牛酒終亡火患今論功而請賓曲穾徙薪亡恩澤燋頭爛額為上客邪主人乃寤而請之今茂陵徐福數上書言霍氏且有變宜防絶之鄉使福説得行則國亡裂土出爵之費臣亡逆亂誅滅之敗往事既已而福獨不蒙其功唯陛下察之上乃賜福帛十匹後以為郎前漢王吉傳古者衣服車馬貴賤有章以褒有德而別尊卑今上下僭差人人自制是以貪財誅利不畏死亡周之所以能致治刑措而不用者以其禁邪於冥冥絶惡於未萌也前漢劉向傳夫明者起福於無形銷患於未然晉武帝紀制曰且知子者賢父知臣者明君子不肖則家亡臣不忠則國亂國亂不可以安也家亡不可以全也是故君子防其始聖人閉其端箋證史記蘇秦傳臣聞治之其未亂也為之其未有也患至而後憂之則無及已史記太史公自序太史公曰夫禮禁未然之前法施已然之後法之所為用者易見而禮之所為禁者難知漢書賈誼傳然而曰禮云禮云者貴絶惡于未萌而起教于微眇使民日遷善遠罪而不自知也漢書徐樂傳故賢主獨觀萬化之原明於安危之機修之廟堂之上而銷未形之患也漢書辛慶忌傳時數有災異丞相司直何武上封事曰乃者大異並見未有其應加以兵革久寢春秋大災未至而豫禦之慶忌宜在爪牙官以備不虞其後拜為右將軍諸吏散騎給事中歲餘徙為左將軍漢書霍光傳初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在人之右衆必害之霍氏秉權日久害之者多矣天下害之而又行以逆道不亡何待乃上疏言霍氏泰盛陛下即愛厚之宜以時抑制無使至亡書三上輒報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突遠徙其薪不者且有火患主人默然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次坐而不録言曲突者人謂主人曰鄉使聽客之言不費牛酒終亡火患今論功而請賓曲突徙薪亡恩澤燋頭爛額為上客邪主人乃寤而請之今茂陵徐福數上書言霍氏且有變宜防絶之鄉使福説得行則國無裂土出爵之費臣亡逆亂誅滅之敗往事既已而福獨不蒙其功唯陛下察之貴徙薪曲突之策使居焦晉灼爛之右上乃賜福帛十匹後以為郎漢書王吉傳吉意以為夫婦人倫大綱夭壽之萌也世俗嫁娶太早未知為人父母之道而有子是以教化不明而民多夭聘妻送女亡節則貧人不及故不舉子又漢家列侯尚公主諸侯則國人承翁主使男事女夫詘於婦逆高陽之位故多女亂古者衣服車馬貴賤有章以褒有德而別尊卑今上下僭差人人自制是以貪財誅利不畏死亡周之所以能致治刑措而不用者以其禁邪於冥冥絶惡於未萌也漢書楚元王傳附劉向夫明者起福於無形銷患於未然晉書武帝紀制曰且知子者賢父知臣者明君子不肖則家亡臣不忠則國亂國亂不可以安也家亡不可以全也是以君子防其始聖人間其端從微至著第六史記蘇秦傳曰臣聞堯無三夫之分舜無咫尺之地以有天下禹無百人之聚以王諸侯湯武之士不過三千車不過三百乘卒不過三萬立為天子誠得其道也前漢高祖紀諸侯王皆曰大王起於細微滅亂秦威動海內又以辟陋之地自漢中行威德誅不義立有功前漢董仲舒傳臣聞衆少成多積小致巨故聖人莫不以暗致明以微致顯是以堯發於諸侯舜興乎深山非一日而顯也蓋有漸以致之矣故堯兢兢日行其道而舜業業日致其孝善積而名顯德章而身尊此其寖明寖昌之道也前漢異姓諸侯王表漢亡尺上之階繇一劍之任五載而成帝業前漢張陳王周傳贊曰周勃為布衣時鄙朴庸人至登輔佐安國家難誅諸呂立孝文為漢伊周何其盛也前漢枚乘曰磨礱底厲不見其損有時而盡種樹畜養不見其益有時而大積德絫行不知其善有時而用棄義背理不知其惡有時而亡前漢循吏傳孝宣繇仄陋而登至尊興于閭閻知民事之囏難自霍光薨後始躬丙機後漢公孫述傳漢祖無前人之迹立錐之地起於行陳之中躬自奮擊晉孝武紀史臣曰少康一旅之衆所以闡帝圖成湯七十之基所以興王業新唐高駢傳詔曰卿起自禁軍從微至著始則囊錐露穎稍有知音尋則天驥呈才急於試效箋證史記蘇秦傳臣聞堯無三夫之分舜無咫尺之地以有天下禹無百人之聚以王諸侯湯武之士不過三千車不過三百乘卒不過三萬立為天子誠得其道也漢書高帝紀諸侯王皆曰大王起於細微滅亂秦威動海內又以辟陋之地自漢中行威德誅不義立有功平定海內功臣皆受地食邑非私之也漢書董仲舒傳臣聞衆少成多積小致巨故聖人莫不以暗致明以微致顯是以堯發於諸侯舜興呼深山非一日而顯也蓋有漸以致之矣故堯兢兢日行其道而舜業業日致其孝善積而名顯德章而身尊此其寖明寖䏆昌之道也漢書異姓諸侯王表是以漢亡尺土之階繇一劍之任五載而成帝業漢書張陳王周傳贊曰周勃為布衣時鄙朴庸人至登輔佐匡國家難誅諸呂立孝文為漢伊周何其盛也漢書枚乘傳磨礱底厲不見其損有時而盡種樹畜養不見其益有時而大積德絫行不知其善有時而用棄義背理不知其惡有時而亡漢書循吏傳及至孝宣繇仄陋而登至尊興于閭閻知民事之囏難自霍光薨後始躬萬機厲精為治五日一聽事自丞相已下各奉職而進後漢書公孫述傳昔秦失其守豪桀並起漢祖無前人之迹立錐之地起於行陳之中躬自奮擊兵破身困者數矣晉書孝武帝紀史臣曰少康一旅之衆所以闡帝圖成湯七十之基所以興王業靜河海於既泄補穹圓於已紊事異於斯則弗由也舊唐書高駢傳詔報駢曰省表具悉卿一門忠孝三代勳庸銘於景鍾煥在青史卿承祖父之訓襲弓冶之基起自禁軍從微至著始則囊錐露頴稍有知音尋則天驥呈才急於試效自秦州經略使授交趾節旄聯翩寵榮汗漫富貴未嘗斷絶僅二十年卿報國之功亦可悉數物極則反第七史記蔡澤傳語曰日中則移月滿則虧物盛則衰天地之常數也進退盈縮與時變化聖人之常道也後漢李固傳奏記曰窮高則危大滿則溢月盈則缺日中則移凡此四者自然之數也天地之心福謙忌盛是以賢達功遂身退全名養壽無有怵迫之憂箋證史記蔡澤傳蔡澤曰今主之親忠臣不忘舊故不若孝公悼王句踐而君之功績愛信親幸又不若商君吳起大夫種然而君之祿位貴盛私家之富過於三子而身不退者恐患之甚於三子竊為君危之語曰日中則移月滿則虧物盛則衰天地之常數也進退盈縮與時變化聖人之常道也後漢書李固傳固欲令商先正風化退辭高滿乃奏記曰夫窮高則危大滿則溢月盈則缺日中則移凡此四者自然之數也天地之心福謙忌盛是以賢達功遂身退全名養壽無有怵迫之憂小不能制大第八前漢東方朔傳語曰鼱鼩之襲狗音蹤劬小鼠也孤豚之咋虎咋音仕客反孤特之豚也至則靡耳何功之有靡碎滅也後漢馬援傳援又為書與囂將揚廣使曉勸於囂曰前披輿地圖見天下郡國百有六所奈何欲以區區二邦以當諸夏百有四乎箋證漢書東方朔傳語曰以管窺天以蠡測海以莛撞鐘豈能通其條貫考其文理發其音聲哉繇是觀之譬猶鼱鼩之襲狗服虔曰音蹤劬如淳曰鼱鼩小鼠也音精劬孤豚之咋虎師古曰孤豚孤特之豚也咋嚙也音仕客反至則靡耳何功之有師古曰靡碎滅也耳語辭後漢書馬援傳援又為書與囂將楊廣使曉勸於囂曰前披輿地圖見天下郡國百有六所奈何欲以區區二邦以當諸夏百有四乎
