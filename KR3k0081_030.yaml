body:
  text: 卷第三十課最第一前漢王成傳詔曰膠東相成勞來不怠流民自占八萬餘口治有異等之效其賜爵關內侯前漢朱邑傳遷北海太守以治行第一入為大司農前漢黃霸傳擢為揚州剌史外寬內明得吏民心戶口歲增治為天下第一前漢召信臣遷河南太守治行常為第一復數增秩賜金後漢李忠傳遷丹陽太守忠以丹陽越俗不好學嫁娶禮儀衰於中國乃為起學校習禮容春秋鄉飲選用明經郡中向慕之三公奏課為天下第一遷豫章太守魏梁習傳文帝踐阼復置并州復為剌史政治常為天下最魏杜畿傳魏國既建以畿為尚書事平更有令曰昔蕭何定關中寇恂平河內卿有其功間將授卿以納言之職顧念河東吾股肱郡充實之所足以制天下故且煩卿臥鎮之畿在河東十六年常為天下最晉解系傳父脩魏琅邪剌史考績為天下第一晉諸葛恢傳以政績第一詔曰賞罰黜陟所以明政道也會稽內史諸葛恢莅官三年政清人和為諸郡首宜進其位班以勸風教今增恢秩中二千石晉杜軫建寧令導以德政風化大行夷夏悅服又除他陽令為雍州十一郡最百姓生為立祠得罪者無怨言新唐盧從愿傳遷豫州剌史政嚴簡奏課為天下第一寶書勞問賜絹百匹遷中書侍郎新唐路嗣恭傳連徙神烏姑臧二縣考績為天下最玄宗以為可嗣漢魯恭因賜名箋證漢書循吏傳王成王成為膠東相治甚有聲宣帝最先褒之地節三年下詔曰蓋聞有功不賞有罪不誅雖唐虞不能以化天下今膠東相成勞來不怠流民自占八萬餘口治有異等之效其賜成爵關內侯漢書循吏傳朱邑朱邑字仲卿廬江舒人也遷補太守卒史舉賢良為大司農丞遷北海太守以治行第一入為大司農漢書循吏傳黃霸勝出復為諫大夫令左馮翊宋畸舉霸賢良勝又口薦霸於上上擢霸為揚州刺史霸以外寬內明得吏民心戶口歲增治為天下第一漢書循吏傳召信臣荊州刺史奏信臣為百姓興利郡以殷富賜黃金四十斤遷河南太守治行常為第一復數增秩賜金後漢書李忠傳六年遷丹陽太守是時海內新定南方海內江淮多擁兵據土忠到郡招懷降附其不服者悉誅之旬月皆平忠以丹陽越俗不好學嫁娶禮儀衰於中國乃為起學校習禮容春秋鄉飲鄭玄注曰春秋以禮會民於州序也選用明經郡中向慕之墾田增多三歲間流民占著者五萬餘口十四年三公奏課為天下第一遷豫章太守三國志魏志梁習傳梁習字子虞陳郡柘人也文帝踐阼復置并州復為刺史進封申門亭侯邑百戶政治常為天下最三國志魏志杜畿傳魏國既建以畿為尚書事平更有令曰昔蕭何定關中寇恂平河內卿有其功間將授卿以納言之職顧念河東吾股肱郡充實之所足以制天下故且煩卿臥鎮之畿在河東十六年常為天下最晉書解系傳解系字少連濟南著人也父脩魏琅邪太守梁州刺史考績為天下第一晉書諸葛恢傳諸葛恢字道明琅邪陽都人也太興初以政績第一詔曰賞罰黜陟所以明政道也會稽內史諸葛恢莅官三年政清人和為諸郡首宜進其位班以勸風教今增恢秩中二千石晉書良吏列傳杜軫杜軫字超宗蜀郡成都人也察孝廉除建寧令導以德政風化大行夷夏悅服秩滿將歸群蠻追送賂遺甚多軫一無所受去如初至又除池陽令為雍州十一郡最百姓生為立祠得罪者無怨言新唐書盧從愿傳盧從愿字子龔開元四年玄宗悉召縣令策於廷考下第者罷之從愿坐擬選失實下遷豫州刺史政嚴簡奏課為天下第一寶書勞問賜絹百匹召為工部侍郎遷尚書左丞中書侍郎新唐書路嗣恭傳路嗣恭字懿範京兆三原人始名劍客以世蔭為鄴尉席豫黜陟河朔表為蕭關令連徙神烏姑臧二縣考績為天下最玄宗以為可嗣漢魯恭因賜名祿第二前漢孝惠紀詔曰吏所以治民也能盡其治則民賴之故重其祿所以為民也一前漢董仲舒傳對策曰夫天亦有所分予予之齒者去其角傅其翼者兩其足是所受大者不得取小也古之所予祿者不食於力不動於末是亦受大者不得取小典天同意者也夫已受大又取小天不能足而況人乎餘見與民爭利後漢仲長統傳損益篇曰夫薄吏祿以豐軍用緣於秦征諸侯續以四夷漢承其業遂不改更危國亂家此之由也晉武帝紀泰始三年詔曰古者以德詔爵以庸制祿雖下士猶食上農外足以奉公忘私內足以養親施惠今在位者祿不伐耕非所以崇化之本也其議增吏奉賜王公以下帛各有差餘事非議論其祿備見別集此不載也他皆放此箋證漢書惠帝紀孝惠皇帝高祖太子也母曰呂皇后帝年五歲高祖初為漢王二年立為太子十二年四月高祖崩五月丙寅太子即皇帝位尊皇后曰皇太后賜民爵一級又曰吏所以治民也能盡其治則民賴之故重其祿所以為民也漢書董仲舒傳仲舒對曰夫天亦有所分予予之齒者去其角師古曰謂牛無上齒則有角其餘無角者則有上齒傅其翼者兩其足是所受大者不得取小也古之所予祿者不食於力不動於末師古曰末謂工商之業也是亦受大者不得取小與天同意者也夫已受大又取小天不能足而况人虖後漢書仲長統傳損益篇曰夫薄吏祿以豐軍用緣於秦征諸侯續以四夷漢承其業遂不改更危國亂家此之由也卷七十九案此昌言論之二是也晉書武帝紀泰始三年九月甲申詔曰古者以庸詔爵以庸制祿雖下士猶食上農外足以奉公忘私外足以養親施惠今在位者祿不代耕非所以崇化之本也其議增吏俸賜王公以下帛各有差爵祿第三前漢董仲舒策曰臣聞聖王之治天下也少則習之學長則材諸位爵祿以養其德刑罰以威其惡故民曉於禮義而恥犯其上也前漢梅福傳爵祿束帛者天下之底石高祖所以厲世摩鈍也孔子曰工欲善其事必先利其器至秦則不然張誹謗之罔以為漢歐除倒持泰阿授楚其柄故誠能勿失其柄天下雖有不順莫敢觸其鋒前漢王嘉傳因託傅太后遺詔下丞相御史益封賢二千戶嘉封還詔書因奏封事曰爵祿土地天之有也書云天命有德五服五章哉王者代天爵人尤宜慎之裂地而封不得其宜則眾庶不服感動陰陽箋證漢書董仲舒傳仲舒對曰臣聞聖王之治天下也少則習之學長則材諸位爵祿以養其德刑罰以威其惡故民曉於禮誼而恥犯其上漢書梅福傳王氏浸盛災異數見群下莫敢正言福復上書曰故爵祿束帛者天下之底石高祖所以厲世摩鈍也孔子曰工欲善其事必先利其器至秦則不然張誹謗之罔以為漢敺除倒持泰阿授楚其柄師古曰泰阿劍名歐冶所鑄也言秦無道令陳涉項羽乘間而發喻倒持劍而以把授與人也故誠能勿失其柄天下雖有不順莫敢觸其鋒漢書王嘉傳王嘉字公仲平陵人也會祖母傅太后薨上因託傅太后遺詔令成帝母王太后下丞相御史益封賢二千戶及賜孔鄉侯汝昌侯陽新侯國師古曰傅晏傅商鄭業也嘉封還詔書師古曰還謂郤上之於天子也因奏封事諫上及太后曰臣聞爵祿土地天之有也書云天命有德五服五章哉師古曰虞書咎繇謨之辭也王者代天爵人尤宜慎之裂地而封不得其宜則眾庶不服感動陰陽其害疾自深世祿第四史記管仲傳鮑叔既進管仲以身下之子孫世祿於齊有封邑者十餘世常為名大夫天下不多管仲之賢而多鮑叔能知人也前漢平當傳子晏以明經歷位大司徒封防鄉侯漢興唯韋平父子至宰相韋謂韋賢前漢奮長子建次甲次乙次慶甲乙史失其名皆以馴行孝謹官至二千石景帝曰石君及四子皆二千石人臣尊寵迺舉集其門凡號奮為萬石君後漢鄧騭傳鄧氏自中興後累世寵貴凡侯者二十九人公二人大將軍以下十三人中二千石十四人列校二十二人州牧郡守四十八人其餘侍中將大夫郎謁者不可勝數東京莫與為比後漢寇恂傳恂同產弟及兄子姊子以軍功封列侯者凡八人終其身不傳於後後漢耿恭傳耿氏自中興已後迄建安之末大將二人將軍九人卿十三人尚公主三人列侯十九人中郎將護羌校尉及剌史二千石數十百人遂與漢興衰云後漢馮勤傳魏人也曾祖父揚宣帝時為洪農大守有八子皆為二千石趙魏間榮之號曰萬石君焉後漢郭躬傳自弘後數世皆傳法律子孫至公者一人廷尉七人侯者三人剌史二千石侍中郎將者二十餘人侍御史正監平者甚眾後漢孔昱傳七世祖霸成帝時歷九卿封褒成侯自霸至昱爵位相係其卿相牧守五十三人列侯七人後漢竇融傳一公兩侯三公主四二千石一公大司空也兩侯安豐顯親也四二千石衛尉城門校尉護羌校尉中郎將新唐韋思謙傳父子並為宰相世罕其比新唐崔湜傳與弟液滌及從兄蒞並以文翰居要官每宴私自比東晉王謝謂人曰吾一門入仕歷官未嘗不為第一丈夫當先據要路以制人豈能默默受制於人也是故進趣不已至於敗晉戎以晉室方亂與時舒卷無謇諤之節自經典選未嘗進寒素退虛名但與時浮沉戶調門選而已箋證史記管晏列傳鮑叔既進管仲以身下之子孫世祿於齊有封邑者十餘世常為名大夫天下不多管仲之賢而多鮑叔能知人也漢書平當傳平當字子思祖父以訾百萬自下邑徙平陵子晏以明經歷位大司徒封防鄉侯漢興唯韋平父子至宰相師古曰韋謂韋賢也漢書萬石君石奮傳孝景即位以奮為九卿迫近憚之徙奮為諸侯相奮長子建次甲次乙次慶師古曰史失其名故云甲乙耳非其名皆以馴行孝謹官至二千石於是景帝曰石君及四子皆二千石人臣尊寵迺舉集其門凡號奮為萬石君後漢書鄧禹傳孫附鄧騭鄧氏自中興後累世寵貴凡侯者二十九人公二人大將軍以下十三人中二千石十四人列校二十二人州牧郡守四十八人其餘侍中將大夫郎謁者不可勝數東京莫與為比後漢書寇恂傳恂同產弟及兄子姊子以軍功封列侯者凡八人終其身不傳於後後漢書耿弇傳附侄耿恭耿氏自中興已後迄建安之末大將軍二人將軍九人卿十三人尚公主三人列侯十九人中郎將護羌校尉及刺史二千石數十百人遂與漢興衰云卷四十九耿恭耿弇也後漢書馮勤傳馮勤字偉伯魏郡繁陽人也曾祖父揚宣帝時為弘農太守有八子皆為二千石趙魏間榮之號曰萬石君焉後漢書郭躬傳郭氏自弘後數世皆傳法律子孫至公者一人廷尉七人侯者三人刺史二千石侍中郎將者二十餘人侍御史正監平者甚眾後漢書孔昱傳孔昱字元世魯國魯人也七世祖霸成帝時歷九卿封褒成侯自霸至昱爵位相係其卿相牧守五十三人列侯七人後漢書竇融傳竇氏一公兩侯三公主四二千石一公大司空也兩侯安豐顯親也四二千石衛尉城門校尉護羌校尉中郎將新唐書韋思謙傳附子韋嗣立嗣立字延構與承慶異母嗣立代承慶為鳳閣舍人黃門侍郎承慶亦代為天官侍郎及知政事父子並為宰相世罕其比新唐書崔仁師傳附孫崔湜湜字澄瀾與弟液澄從兄涖並以文翰居要官每宴私自比東晉王謝嘗曰吾一門入仕歷官未嘗不為第一丈夫當先據要路以制人豈能默默受制於人哉故進趣不已至於敗晉書王戎傳王戎字濬沖琅邪臨沂人也戎以晉室方亂慕蘧伯玉之為人與時舒卷無蹇諤之節自經典選未嘗進寒素退虛名但與時浮沉戶調門選而已世祿非人第五前漢魏相傳霍光薨上思其功德以其子禹為右將軍兄子樂平侯山復領尚書事相因平恩侯許伯奏封事言春秋譏世卿惡宋三世為大夫及魯季孫之專權皆危亂國家自後元已來祿去王室政繇家宰今光死子復為大將軍兄子秉樞機昆弟諸婿據權埶在兵官光夫人顯及諸女皆通籍長信宮或夜詔門出入驕奢放縱恐寖不制宜以損奪其權破散陰謀以固萬世之基全功臣之世前漢王吉傳又言舜湯不用三公九卿之世而舉皋陶伊尹不仁者遠今使俗吏得任子弟率多驕驁不通古今至於積功治人亡益於民此伐檀所為作也宜明選求賢除任子之令外家及故人可厚以財不宜居位箋證漢書魏相傳宣帝即位徵相入為大司農遷御史大夫四歲大將軍霍光薨上思其功德以其子禹為右將軍兄子樂平侯山復領尚書事師古曰山者去病之孫今言兄子此傳誤相因平恩侯許伯奏封事言春秋譏世卿惡宋三世為大夫及魯季孫之專權皆危亂國家自後元以來祿去王室政繇冢宰今光死子復為大將軍劉敞曰禹不為大將軍字之誤也兄子秉樞機昆弟諸壻據權埶在兵官光夫人顯及諸女皆通籍長信宮師古曰通籍謂禁門之中皆有名籍恣出入也或夜詔門出入驕奢放縱恐寖不制宜有以損奪其權破散陰謀以固萬世之基全功臣之世漢書王吉傳又言舜湯不用三公九卿之世而舉皋陶伊尹不仁者遠今使俗吏得任子弟率多驕驁不通古今至於積功治人亡益於民此伐檀所為作也宜明選求賢除任子之令外家及故人可厚以財不宜居位尸祿第六前漢韓王信傳代張安世為大司馬增世貴幼為忠臣事三主為人寬和自守以溫顏遜辭承上接下無所失意保身固寵不能有所建明前漢申屠嘉傳自嘉死後開封侯陶青桃侯劉舍及武帝時柏至侯許昌平棘侯薛澤武彊侯莊青翟商陵侯趙周皆以列侯繼踵谺谺廉謹谺谺持整貌谺音初角反為丞相備員而已無所能發明功名著於世者前漢萬石君傳慶為丞相是時漢方南誅兩越東擊朝鮮北逐匈奴西伐大宛中國多事天子巡守海內脩古神祠封禪興禮樂公家用少桑弘羊等致利王溫舒之屬峻法兒寬等推文學九卿更進用事事不關決於慶慶醇謹而已在位九歲無能有所正言嘗欲請治上近臣所忠九咸宣不能服反受其過贖罪所忠及咸宣二人前漢朱雲傳成帝時丞相故安昌侯張禹以帝師位特進甚尊重雲上書求見公卿在前雲曰今朝廷大臣上不能正主下亡以益民皆尸位素餐孔子所謂鄙夫不可與事君苟患失之亡所不至者也皆論語所載孔子之言也苟患失其寵祿則言行辟邪無所不至臣願賜尚方斬馬劍斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹前漢貢禹傳臣禹犬馬之齒八十一血氣衰竭耳目不聰明非復有能補益所謂素餐尸祿洿朝之臣也前漢鮑宣傳上書諫曰群臣幸得居尊官食重祿豈有肯加惻隱於細民助陛下流教化者邪志但在營私家稱賓客為姦利而已以苟容曲從為賢以拱默尸祿為智前漢車千秋傳贊曰車丞相履伊呂之列當軸處中括囊不言容身而已後漢梁商傳論曰夫宰相運動樞極感會天人中於道則易以興政乖於務則難乎御物商協回天之埶屬彫弱之明而正朝卹患未聞上術憔悴之音載謠人口雖輿粟盈門何救阻飢之厄永言終制未解尸官之尤尸官猶尸祿終制謂薄葬也後漢梁竦傳閉門自養以經籍為娛著書數篇名曰七序班固見而稱曰孔子著春秋而亂臣賊子懼梁竦作七序而竊位素餐者慚晉王雅傳雅素被優遣但獸慎而已無所辨正雖在孝武世亦不能犯顏廷爭凡所謀謨唯唯而已箋證漢書韓王信傳韓王信故韓襄王孽孫也長八尺五寸項梁立楚懷王燕齊趙魏皆已前王唯韓無有後故立韓公子橫陽君成為韓王欲以撫定韓地增少為郎諸曹侍中光祿大夫昭帝時至前將軍與大將軍霍光定策立宣帝益封千戶本始二年五將征匈奴增將三萬騎出雲中斬首百餘級至期而還神爵元年代張安世為大司馬車騎將軍領尚書事增世貴幼為忠臣事三主重於朝廷為人寬和自守以溫顏遜辭承上接下無所失意保身固寵不能有所建明卷三十三案以韓王信傳所記推之韓增為韓王信玄孫漢書申屠嘉傳申屠嘉梁人也嘉為人廉直門不受私謁自嘉死後開封侯陶青桃侯劉舍及武帝時柏至侯許昌平棘侯薛澤武彊侯莊青翟商陵侯趙周皆以列侯繼踵谺谺廉謹師古曰谺谺持整之貌也谺音初角反為丞相備員而已無所能發明功名著於世者漢書萬石君傳元鼎五年丞相趙周坐酎金免制詔御史萬石君先帝尊之子孫至孝其以御史大夫慶為丞相封牧丘侯是時漢方南誅兩越東擊朝鮮北逐匈奴西伐大宛中國多事天子巡狩海內脩古神祠封禪興禮樂公家用少桑弘羊等致利王溫舒之屬峻法兒寬等推文學九卿更進用事事不關決於慶慶醇謹而已在位九歲無能有所匡言嘗欲請治上近臣所忠九卿咸宣服虔曰咸音減損之減師古曰治所忠及咸宣二人不能服反受其過贖罪卷四十六案萬石慶萬石君之少子也漢書朱雲傳朱雲字游魯人也成帝時丞相故安昌侯張禹以帝師位特進甚尊重雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下亡以益民皆尸位素餐孔子所謂鄙夫不可與事君苟患失之亡所不至者也師古曰皆論語所載孔子之言也苟患失其寵祿則言行僻邪無所不至也臣願賜尚方斬馬劍斷佞臣一人以厲其餘師古曰尚方少府之屬官也作供御器物故有斬馬劍劍利可以斬馬也上問誰也對曰安昌侯張禹漢書貢禹傳元帝初即位徵禹為諫大夫數虛己問以政事是時年歲不登郡國多困禹奏言天子納善其忠乃下詔遷禹為光祿大夫頃之禹上書曰臣禹犬馬之齒八十一血氣衰竭耳目不聰明非復能有補益所謂素餐尸祿洿朝之臣也漢書鮑宣傳宣每居位常上書諫爭其言少文多實是時帝祖母傅太后欲與成帝母俱稱尊號封爵親屬丞相孔光大司空師丹何武大司馬傅喜始執正義失傅太后指皆免官丁傅子弟並進董賢貴幸宣以諫大夫從其後上書諫曰群臣幸得居尊官食重祿豈有肯加惻隱於細民助陛下流教化者邪志但在營私家稱賓客為姦利而已以苟容曲從為賢以拱默尸祿為智漢書公孫賀劉屈氂車千秋王訢楊敞蔡義陳萬年鄭弘傳贊曰車丞相履伊呂之列當軸處中括囊不言容身而去後漢書梁統傳附曾孫梁商商字伯夏雍之子也論曰順帝之世梁商稱為賢輔豈以其地居亢滿而能以愿謹自終者乎夫宰相運動樞極感會天人中於道則易以興政乖於務則難乎御物商協回天之埶屬彫弱之期而匡朝卹患未聞上術憔悴之音載謠人口雖輿粟盈門何救阻饑之厄永言終制未解尸官之尤尸官猶尸祿終制謂薄葬也後漢書梁統傳附子梁竦竦字叔敬少習孟氏易顯宗後詔聽還本郡竦閉門自養以經籍為娛著書數篇名曰七序班固見而稱曰孔子著春秋而亂臣賊子懼梁竦作七序而竊位素餐者慚卷六十四梁竦梁統次子也晉書王雅傳王雅字茂達東海剡人雅素被優遇一旦失權又以朝廷方亂內外攜離但慎默而已無所辯正雖在孝武世亦不能犯顏廷爭凡所謀謨唯唯而已
