body:
  text: 卷第七十八不受珍貢第一前漢賈捐之傳孝文時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里朕乘千里之馬獨先安之於是還馬與道里費後漢孝和紀舊南海獻龍眼荔支十里一置五里一候奔騰阻險死者繼路時臨武長汝南唐羌縣接南海乃上書陳狀帝下詔曰遠國珍羞本以薦奉宗廟苟有傷害豈愛民之本其勑太官勿復受獻由是遂省焉唐羌字伯游後漢孝順紀詔曰海內頗有災異朝廷修政太官減膳珍玩不御而桂陽太守文礱不惟竭忠宣暢本朝而遠獻大珠以求幸媚今封以還之後漢鄧皇后紀時方國貢獻競求珍麗之物自后即位悉令禁絶歲時但供紙墨而已晉武帝紀咸寧四年大醫司馬程據獻雉頭裘帝以奇伎異服典禮所禁焚之于殿前晉載記符堅傳大宛獻天馬千里駒皆汗血朱毛五色鳳膺麟身及諸珍異五百餘種堅曰吾思漢文之返千里馬咨嗟美詠今所獻馬其悉返之庶克念前王髣佛古人矣乃命群臣作天馬詩而遣之示無欲也新唐林邑國傳獻五色鸚鵡太宗異之詔李百藥為之賦又獻白鸚鵡情識辨惠善於應答太宗憫之並付其使令放還於林藪新唐高宗紀吐火羅獻金衣一領上不受新唐德宗紀詔禁天下不得貢珍禽奇獸新唐宣宗紀南蠻進犀牛詔還之新唐姚璹傳大食使者獻師子璹曰是獸非肉不食自碎葉至都所費廣矣陛下鷹犬且不蓄而厚資養猛獸哉有詔大食停獻箋證漢書賈捐之傳賈捐之字君房賈誼之曾孫也元帝初即位上疏言得失召待詔金馬門元帝初元元年珠崖又反發兵擊之諸縣更叛連年不定上與有司議大發軍捐之建議以為不當擊上使侍中駙馬都尉樂昌侯王商詰問捐之捐之對曰賴聖漢初興為百姓請命平定天下至孝文皇帝閔中國未安偃武行文則斷獄數百民賦四十丁男三年而一事時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里師行三十里朕乘千里之馬獨先安之師古曰安之言何所適往於是還馬與道里費而下詔曰朕不受獻也其令四方毋求來獻當此之時逸游之樂絶奇麗之賂塞鄭衛之倡微矣後漢書和殤帝紀舊南海獻龍眼荔支十里一置五里一候奔騰阻險死者繼路時臨武長汝南唐羌縣接南海乃上書陳狀帝下詔曰遠國珍羞本以薦奉宗廟苟有傷害豈愛民之本其勑太官勿復受獻由是遂省焉謝承書曰唐羌字伯游辟公府補臨武長縣接交州舊獻龍眼荔支及生鮮獻之驛馬晝夜傳送之至有遭虎狼毒害頓仆死亡不絶道經臨武羌乃上書諫曰臣聞上不以滋味為德下不以貢膳為功故天子食太牢為尊不以果實為珍伏見交址七郡獻生龍眼等鳥驚風發南州土地惡蟲猛獸不絶於路至於觸犯死亡之害死者不可復生來者猶可救也此二物升殿未必延年益壽帝從之章報羌即棄官還家不應徵召著唐子三十餘篇後漢書順帝紀永建四年五月壬辰詔曰海內頗有災異朝廷修政太官減膳珍玩不御而桂陽太守文礱不惟竭忠宣暢本朝而遠獻大珠以求幸媚今封以還之後漢書后紀鄧皇后紀是時方國貢獻競求珍麗之物自后即位悉令禁絶歲時但供紙墨而已晉書武帝帝紀咸寧四年十一月辛巳太醫司馬程據獻雉頭裘帝以奇技異服典禮所禁焚之於殿前晉書載記苻堅上先是梁熙遣使西域稱揚堅之威德并以綵繒賜諸國王於是朝獻者十有餘國大宛獻天馬千里駒皆汗血朱鬣五色鳳膺麟身及諸珍異五百餘種堅曰吾思漢文之返千里馬咨嗟美詠今所獻馬其悉返之庶克念前王髣佛古人矣乃命群臣作止馬詩而遣之示無欲也舊唐書林邑傳林邑國漢日南象郡之地在交州南千餘里其國延袤數千里貞觀初遣使貢馴犀四年其王范頭黎遣使獻火珠大如雞卵圓白皎潔光照數尺狀如水精正午向日以艾蒸之即火燃五年又獻五色鸚鵡太宗異之詔太子右庶子李百藥為之賦又獻白鸚鵡精識辨慧善於應答太宗憫之並付其使令放還於林藪舊唐書高宗本紀下開耀元年十二月吐火羅獻金衣一領上不受舊唐書德宗本紀上大歷十四年丙戌詔禁天下不得貢珍禽異獸銀器勿以金飾舊唐書宣宗本紀大中八年春正月陜州黃河清二月南蠻進犀牛詔還之新唐書姚思廉傳附孫姚璹璹字令璋少孤永徽中舉明經第補太子黃門郎以論撰勞進祕書郎稍遷中書舍人封吳興縣男武后時擢夏官侍郎坐從弟敬節叛貶桂州長史大食使者獻師子璹曰是獸非肉不食自碎葉至都所費廣矣陛下鷹犬且不蓄而厚資養猛獸哉有詔大食停獻以財助國第二前漢蕭何傳陳豨反上自將至邯鄲而韓信反上使使拜丞相為相國益封五千戶令卒五百人一都尉為相國衛諸君皆賀召平獨吊曰禍自此始矣今者淮陰新反於中有疑君心夫置衛衛君非以寵君也願君讓封勿受悉以家私財佐軍何從其計上說前漢卜式傳漢方事胸奴式上書願輸家財半助邊上使使問式欲為官乎式曰自小牧羊不習仕宦不願也使者曰家豈有冤欲言事乎式曰臣生與人亡所爭邑人貧者貸之不善者教之所居人皆從式式何故見冤使者曰苟子何欲式曰天子誅胸奴愚以為賢者宜死節有財者宜輸之如此而胸奴可滅也使者以聞上以語丞相弘弘曰此非人情不軌之臣不可以為化而亂法願陛下勿許上不報前漢杜緩傳元帝初即位榖貴民流永光中西羌反緩輒上書入錢榖以助用前後數百万前漢平帝紀元始二年大旱蝗青州尤甚民流亡安漢公四輔三公卿大夫吏民為百姓困乏獻其田宅者二百三十人以口賦貧民計口而紿田宅後漢王丹傳鄧禹西征關中軍糧乏丹率宗族上麥二千斛禹表丹領左馮翊稱疾不視事後漢黃香傳時被水年飢乃分奉祿嘗賜班贍貧者於是豐富之家各出義榖助官稟貸荒民獲全箋證漢書蕭何傳陳豨反上自將至邯鄲而韓信謀反關中呂后用何計誅信語在信傳上已聞誅信使使拜丞相為相國益封五千戶令卒五百人一都尉為相國衛諸君皆賀召平獨弔師古曰召讀曰邵召平者故秦東陵侯秦破為布衣貧種瓜長安城東瓜美故世謂東陵瓜從召平始也平謂何曰禍自此始矣上暴露於外而君守於內非被矢石之難而益君封置衛者以今者淮陰新反於中有疑君心夫置衛衛君非以寵君也師古曰恐其為變故守衛之願君讓封勿受悉以家私財佐軍何從其計上說漢書卜式傳時漢方事胸奴式上書願輸家財半助邊上使使問式欲為官乎式曰自小牧羊不習仕宦不願也使者曰家豈有冤欲言事乎式曰臣生與人亡所爭邑人貧者貸之不善者教之所居人皆從式式何故見冤使者曰苟子何欲師古曰言子苟如此輸財必有所欲式曰天子誅胸奴愚以為賢者宜死節有財者宜輸之如此而胸奴可滅也使者以聞上以語丞相弘弘曰此非人情不軌之臣不可以為化而亂法願陛下勿許上不報漢書杜周傳附孫杜緩緩少為郎本始中以校尉從蒲類將軍擊胸奴還為諫大夫遷上谷都尉鴈門太守父延年薨徵視喪事元帝初即位榖貴民流元光中宋祁曰元光當從南浙本作永光西羌反緩輒上書入錢榖以助用前後數百萬漢書平帝紀元始二年郡國大旱蝗青州尤甚民流亡安漢公四輔三公卿大夫吏民為百姓困乏獻其田宅者二百三十人張晏曰王莽為太傅孔光為太師王舜為太保甄豐為少傅是為四輔莽復兼大司馬馬宮為司徒王崇為司空是為三公以口賦貧民師古曰計口而給其田宅後漢書王丹傳王丹家纍千金隱居養志好施周急會前將軍鄧禹西征關中軍糧乏丹率宗族上麥二千斛禹表丹領左馮翊稱疾不視事免歸後漢書黃香傳黃香字文彊江夏安陸人也香家貧內無僕妾躬執苦勤盡心奉養遂博學經典究精道術能文章京師號曰天下無雙江夏黃童永元四年拜左丞延光元年遷魏郡太守郡舊有內外園田常與人分種收榖歲數千斛香曰田令商者不農王制仕者不耕伐冰食祿之人不與百姓爭利乃悉以賦人課令耕種時被水年飢乃分奉祿及所得賞賜班贍貧者於是豐富之家各出義榖助官稟貸荒民獲全薄賦第三前漢食貨志漢興約法省禁輕田租什五而稅一量吏祿度官用以賦於民才取足前漢昭帝紀元平元年春詔曰天下以農桑為本日者省用罷不急官減外繇耕桑者益衆而百姓未能家給朕甚愍焉其減口賦錢有司奏請減什三上許之前漢昭帝紀贊曰承孝武奢侈餘敝師旅之後海內虛耗戶口減半光知時務之要輕繇薄賦與民休息光霍光前漢食貨志言古者稅民不過什一其求易供使民不過三日其力易足後漢光武紀詔曰頃者師旅未解用度不足故行十一之稅今軍士屯田糧儲差積其令郡國收見田租三十稅一如舊制後漢陸康傳時靈帝欲鑄銅人康上諫曰臣聞先王治世貴在愛民省徭輕賦以寧天下除煩就約以崇簡易故萬姓崇化靈物應德晉載記慕容皓傳記室參軍封裕諫曰臣聞聖王之宰國也薄賦而藏於百姓分之以三等之田十一而稅之寒者衣之飢者食之使家給人足雖水旱而不為災者齊高帝初竟陵王子良上表曰宋文帝元嘉中皆責成群縣物價轉賤私貨則匹直六百官受則匹准五百所以每欲優人必為降落今入官好布匹下百餘其四人所送者猶依舊制昔為刻上今為刻下氓庶空儉豈不由之救人拯弊莫過滅賦略其目前小利取其長久大益無患人眥不殷國用不阜也新唐食貨志租庸調之法以人丁為本自開元以後天下戶籍久不更造丁口轉死田畝賣易貧富升降不實其後國家侈費無節而大盜起兵興財用益屈而租庸調法弊壞自代宗時始以畝定稅而斂以夏秋至德宗時楊炎遂作兩稅法夏輸無過六月秋稅無過十一月置兩稅使以總之量出制入戶無主客以居者為簿人無丁中以貧富為差商賈稅三十之一與居者均役田稅視大曆十四年墾畝之數為定遣黜陟使按比諸道丁産等級免鰥寡惸獨不濟者敢有加斂以枉法論議者以租庸調高祖太宗之法也不可輕改而德宗方信用炎不疑也魏武帝初平表紹鄴都令收田租畝粟四升戶絹二匹綿二斤餘不得擅興箋證漢書食貨志漢興接秦之敝諸侯並起民失作業而大饑饉凡米石五千人相食死者過半高祖乃令民得賣子就食蜀漢天下既定民亡蓋臧蘇林曰無物可蓋藏自天下不能具醇駟而將相或乘牛車上於是約法省禁輕田租什五而稅一量吏祿度官用以賦於民師古曰才取足漢書昭帝紀元平元年春二月詔曰天下以農桑為本日者省用罷不急官師古曰謂非要職減外繇師古曰繇讀曰徭耕桑者益壽而百姓未能家給朕甚愍焉其減口賦錢有司奏請減什三上許之漢書昭帝紀贊曰承孝武奢侈餘敝師旅之後海內虛耗戶口減半光知時務之要輕繇薄賦與民休息至始元元鳳之間胸奴和親百姓充實漢書食貨志董仲舒說上曰春秋它穀不書至於麥禾不成則書之以此見聖人於五穀最重麥與禾也今關中俗不好種麥是歲失春秋之所重而損生民之具也願陛下幸詔大司農使關中民益種宿麥令毋後時又言古者稅民不過什一其求易共師古曰共讀曰供次下亦同使民不過三日其力易足後漢書光武帝紀十二月壬辰大司空宋弘免癸巳詔曰頃者師旅未解用度不足故行什一之稅今軍士屯田糧儲差積其令郡國收見田租三十稅一如舊制景帝二年令人田租三十而稅一今依景帝故云舊制後漢書陸康傳陸康字季寧吳郡吳人也光和元年遷武陵太守轉守桂陽樂安二郡所在稱之時靈帝欲鑄銅人而國用不足乃詔調民田畝斂十錢而比水旱傷稼百姓貧苦康上疏諫曰臣聞先王治世貴在愛民省徭輕賦以寧天下除煩就約以崇簡易故萬姓從化靈物應德晉書載記慕容皓皓記室參軍封裕諫曰臣聞聖王之宰國也薄稅而藏于百姓分之以三等之田十一而稅之寒者衣之飢者食之使家給人足雖水旱而不為災者通典食貨五齊高帝初竟陵王子良上表曰宋文帝元嘉中皆責成郡縣又啓曰諸將賦所應納錢不限大小但令所在兼折布帛若雜物是軍國所須者聽隨價准直不必盡令送錢於公不虧其用在私實荷其渥昔晉氏初遷江左草創絹布所直十倍於今賦調多少因時增減永初中官布一匹直錢一千而人所輸聽為九百漸及元嘉物價轉賤私貨則匹直六百官受則匹准五百所以每欲優人必為降落今入官好布匹下百餘其四人所送者猶依舊制昔為刻上今為刻下氓庶空儉豈不由之救人拯弊莫過減賦略其目前小利取其長久大益無患人資不殷國用不阜也新唐書食貨志租庸調之法以人丁為本自開元以後天下戶籍久不更造丁口轉死田畝賣易貧富升降不實其後國家侈費無節而大盜起兵興財用益屈而租庸調法弊壞自代宗時始以畝定稅而斂以夏秋至德宗相楊炎遂作兩稅法夏輸無過六月秋輸無過十一月置兩稅使以總之量出制入戶無主客以居者為簿人無丁中以貧富為差商賈稅三十之一與居者均役田壄視大歷十四年墾田之數為定遣黜陟使按比諸道丁産等級免鰥寡惸獨不濟者敢有加斂以枉法論議者以租庸調高祖太宗之法也不可輕改而德宗方信用炎不疑也通典食貨四魏武初平袁紹鄴都令收田租畝粟四升戶絹二匹綿二斤餘不得擅興重斂第四史記商本紀厚賦稅以實鹿臺之錢鹿臺其大三里高千尺今在朝歌城中而盈巨橋之粟倉名鹿水之大橋前漢貨食志始皇遂并天下內興功作外攘夷狄收太半之賦發閭左之戎男子力耕不足糧餉女子紡績不足衣服竭天下之資財以奉其政猶未足以淡其欲也海內愁怨遂用潰畔後漢范升傳莽頻發兵役徵賦煩興升乃奏記邑曰朝以遠者不服為至念升以近者不悅為重憂後漢陸康傳靈帝欲鑄銅人而國用不足乃詔調民田畝斂十錢而比水旱傷稼百姓貧苦康上疏諫曰夫十一而稅周謂之徹徹者通也言其法度可通萬世而行也故魯宣稅畝而蝝災自生哀公增賦而孔子非之豈有聚奪民物以營無用之銅人捐捨聖戒自蹈亡王之法哉新唐食貨志古之善治其國而愛養斯民者必立經常簡易之法使上愛物以養其下下勉力以事其上上足而下不困故量人之力而授之田量地之産而取以給公上量其入而出之以為用度之數是三者常相須以濟而不可失失其一則不能守其二及暴君庸主縱其佚欲而苟且之吏從之變制合時以取寵於其上者故用於上者無節而取於下者無限民竭其力而不能供由是土愈不足而下愈困則財利之說興而聚斂之臣用記曰寧畜盜臣盜臣誠可惡然一人之害爾聚斂之臣用則經常之法壞而下不勝其弊焉唐之始時授人以口分世業田而取之以租庸調之法其用之也有節蓋其畜兵以府衛之制故兵雖多而無所損設官有常員之數故官不濫而易祿雖不及三代之盛時然亦可以為經常之法也及其弊也兵冗官濫為之大蠹自天寶以來大盜屢起方鎮數叛兵革之興纍世不息而用度之數不能節矣加以驕君昏主姦吏邪臣取濟一時屢更其制而經常之法蕩然盡矣由是財利之說興聚斂之臣進蓋口分世業之田壞而為兼并租庸調之法壞而為兩稅至於鹽鐵轉運屯田和糴鑄錢括苗榷利借商進奉獻助無所不為矣蓋愈煩而愈弊以至於亡矣新唐韋彤傳贊曰德宗敝政稅間架借商錢宮市為最甚順宗為太子欲極陳之懲王叔文之諫而止其畏如此區區之臣冒顏而關說難哉其享國日淺志不在民矣憲宗聞暴斂之令首於賊臣感憤太息愛人之至也及任程異皇甫鏄諫者不聽興利之臣敗君之德甚矣箋證史記殷本紀帝乙崩子辛立是為帝辛天下謂之紂集解駰案諡法曰殘義損善曰紂好酒淫樂嬖於婦人愛妲己妲己之言是從於是使師涓作新淫聲北里之舞靡靡之樂厚賦稅以實鹿臺之錢集解如淳曰新序曰鹿臺其大三里高千尺瓚曰鹿臺臺名今在朝歌城中正義括地志云鹿臺在衛縣西南二十二里而盈巨橋之粟集解服虔曰巨橋倉名許慎曰巨鹿水之大橋有漕粟也索隱鄒誕生云巨大橋器名也紂厚賦稅故因器而大其名漢書食貨志至於始皇遂并天下內興功作外攘夷狄收泰半之賦師古曰泰半三分取其二發閭左之戍男子力耕不足糧餉師古曰餉古餉字女子紡績不足衣服竭天下之資財以奉其政猶未足以淡其欲也師古曰淡古贍字也贍給也下同海內愁怨遂用潰畔後漢書范升傳范升字辨卿代郡人也王莽大司空王邑辟升為議曹史時莽頻發兵役徵賦繁興升乃奏記邑曰升聞子以人不間於其父母為孝臣以下不非其君上為忠朝以遠者不服為至念升以近者不悅為重憂後漢書陸康傳光和元年時靈帝欲鑄銅人而國用不足乃詔調民田畝斂十錢而比水旱傷稼百姓貧苦康上疏諫曰夫什一而稅周謂之徹徹者通也言其法度可通萬世而行也故魯宣稅畝而蝝災自生哀公增賦而孔子非之豈有聚奪民物以營無用之銅人捐捨聖戒自蹈亡王之法哉新唐書食貨志古之善治其國而愛養斯民者必立經常簡易之法使上愛物以養其下下勉力以事其上上足而下不困故量人之力而授之田量地之産而取以給公上量其入而出之以為用度之數是三者常相須以濟而不可失失其一則不能守其二及暴君庸主縱其佚欲而苟且之吏從之變制合時以取寵於其上故用於上者無節而取於下者無限民竭其力而不能供由是上愈不足而下愈困則財利之說興而聚斂之臣用記曰寧畜盜臣盜臣