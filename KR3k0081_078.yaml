呼曰武公遣我來曰何故勞百姓而築臺乎姑臧令辛巖以曾妖妄請殺之茂曰吾信勞人曾稱先君之令何謂妖乎箋證史記晉世家十年秦滅梁梁伯好土功治城溝集解賈逵曰溝塹也民力罷怨其衆數相驚曰秦寇至民恐惑秦竟滅之史記蒙恬列傳太史公曰吾適北邊自直道歸行觀蒙恬所為秦築長城亭障塹山堙谷通直道固輕百姓力矣夫秦之初滅諸侯天下之心未定痍傷者未瘳而恬為名將不以此時彊諫振百姓之急養老存孤務修衆庶之和而阿意興功此其兄弟遇誅不亦宜乎何乃罪地脈哉晉書張軌傳附子張茂茂字成遜虛靖好學不以世利嬰心太興三年推茂為大都督太尉涼州牧茂不從但受使持節平西將軍涼州牧歲餘茂築靈鈞臺周輪八十餘堵基高九仞武陵人閻曾夜叩門呼曰武公遣我來曰何故勞百姓而築臺乎姑臧令辛巖以曾妖妄請殺之茂曰吾信勞人曾稱先君之命何謂妖乎
