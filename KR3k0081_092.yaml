body:
  text: 卷第九十二封禪第一史記封禪書齊桓公既霸會諸侯於葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔旡懷氏封泰山禪云云宓犧封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黃帝封泰山禪亭亭顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪會稽湯封泰山禪云云周成王封泰山禪社首皆受命然後得封禪桓公曰寡人北伐山戎過孤竹西伐大夏涉流沙束馬縣車上卑耳之山南伐至召陵登熊耳山以望江漢兵車之會三而乘車之會六九合諸侯一正天下諸侯莫違我昔三代受命亦何以異乎管仲睹桓公不可家以辭因設之以事曰古之封禪鄗上之黍北里之禾所以為盛江淮之間一茅三脊所以為籍也東海致比目之魚西海致比翼之鳥然後物有不召而自至者十有五焉今鳳凰麒麟不來嘉榖不生而蓬蒿藜莠茂鴟梟數至而欲封禪毋乃不可乎公乃止史記封禪書其後百有餘年而孔子論述六藝傳略言易姓而王封泰山禪乎梁父者七十餘王矣其俎豆之禮不章蓋難言之史記封禪書秦即帝位三年東巡郡縣祠騶嶧山頌秦功業於是召從齊魯之儒生博士七十人至乎泰山下諸儒生或議曰古者封禪為蒲車惡傷山之土石草木掃地而祭席用葅秸言其易遵也始皇聞此議各乖異難施用由此絀儒生而遂除車道上自太山易至巔立石須秦始皇帝德明其得封也從陰道下禪於梁父其禮頗采太祝之祀雍上帝所用而封藏皆祕之世不得而記也前漢郊祀志武帝初即位尤重鬼神之祀漢興已六十餘歲矣天下又安縉紳之屬皆望天子封禪改正度也而上嚮儒術招賢良趙綰王臧等以文學為公卿欲議古立明堂城南以朝諸侯草巡狩封禪改曆服色事未就竇太后不好儒術使人微伺趙綰等姦利事按綰臧綰臧自殺諸所興為皆廢前漢郊祀志武帝自得寶鼎上與公卿諸生議封禪封禪用希曠絶莫知其儀體而群儒采封禪尚書周官王制之望祀射牛事齊人丁公曰封禪者古不死之名也秦皇帝不得上封陛下必欲上稍上稍漸也即旡風雨遂上封矣上於是乃令諸儒習射牛草材禪儀數年至且行天子既聞公孫卿及方士之言黃帝以上封禪皆致怪物與神通欲放黃帝以接神人蓬萊高世比德於九皇而頗采儒術以文之群儒既已不能辨明封禪事又拘於詩書古文而不敢騁上為封祠器視群儒群儒或曰不與古同徐偃又曰太常諸生行禮不如魯善周霸屬圖封事於是上黜偃霸而盡罷諸侯弗用三月乃東幸緱氏禮登中嶽太室從官在山上聞若有言萬歲云問上上不言問下下不言乃令祠官加增太室祠禁毋似其山天子至梁父禮祠地主令侍中儒者皮辨縉紳射牛行事封泰山下東方如郊祠泰一之禮封廣丈二尺高九尺其下則有玉牒書書祕禮畢天子獨與侍中奉車子侯子侯霍去病子也上泰山亦有封其事皆禁明日下陰道禪泰山下址東北肅然山如祭后土禮天子皆親拜見衣上黃而盡用樂焉江淮間一茅三脊為神藉五色土益雜封縱遠方奇獸飛禽及白雉諸物頗以加祠兕牛象犀之屬不用皆至泰山然后去封禪祠其夜若有光晝有白雲出封中天子從禪遠坐明堂群臣更上壽下詔改元封前漢倪寬傳先是司馬相如病死有遺書頌功德言符瑞足以封泰山上奇其書以問寬寬對曰陛下躬發聖德統揖群元宗祀天地薦禮百神精神所鄉徵兆必報天地並應符瑞昭明其封泰山禪梁父昭姓考瑞帝王之盛節也然享薦之義不著于經以為封禪告成合祛於天地神祇祗戒精專以接神明總百官之職各稱事宜而為之節文唯聖王所由制定其當非群臣之所能列今將舉大事優遊數年使群臣得人自盡終莫能成唯天子建中和之極兼總條貫金聲而玉振之以順成天慶垂萬世之基上然之乃自制儀采儒術以文焉後漢建武群臣上言宜封禪泰山詔不許虎賁中郎將梁松等求元封時故事議封禪所施用有司奏松上疏以為登封之禮告功皇天垂後旡窮以為萬民也令因舊封恐非重命之義受命中興宜當特異以明天意魏明帝時蔣濟請封禪帝雖拒濟議而實使高堂隆草封禪儀以天下未一不欲便行大禮會高堂隆卒不行蜀秦宓傳蜀本旡學土文翁遣相如東受七經還教吏民於是蜀學比於齊魯故地里志曰文公倡其教相如為之師漢家得士盛於其世仲舒之徒不達封禪相如制其禮天能制禮造樂移風易俗非禮所秩有益於世者乎晉武帝平吳太康九年衛瓘議封禪帝曰此盛德之事所未議也瓘等又奏至于再三詔報絶之宋文帝在位長久有意封禪詔學士山謙之章其儀注屬後魏師南逼其意乃息孝武大明元年十一月戊申太宰江夏王義恭表三請帝以文軌未一不從北齊有巡狩之禮並登封之儀竟不行隋開皇十四年群臣請封禪文帝命牛弘等創定其禮帝曰此事體大朕何德以堪之但當東狩因拜岱山新唐禮儀志自漢以來儒生學官論議不同而至於不能決則出於時君率意而行之爾隋文帝嘗令牛弘辛彥之等撰定儀注為壇泰山下設祭如南郊而已未嘗天山也唐太宗已平突厥而年榖屢豐群曰請封泰山太宗初頗非之已而遣杜正倫行太山上七十二帝壇迹以是歲四河大水而止其後房喬楊師道博採衆議奏上之遂著其禮將行而彗星見乃止高宗乾封元年封泰山為圓壇詔立登封降禪朝覲之碑名封祀壇曰舞鶴臺登封壇曰萬歲臺降禪壇曰景雲臺以紀瑞焉新唐禮樂志開元十二年四方治定歲屢豐稔群臣多言封禪中書令張説又固請乃下制以十三年有事泰山於是説與徐堅韋刊定儀注新唐志其非常祀天子有時而行之者曰封禪巡守視學耕藉拜陵文中子曰封禪非古也其秦漢之侈心乎蓋其曠世不常行而於禮旡所本故自漢以來儒生學官論議不同而至於不能決則出於時君率意而行之爾爾箋證史記封禪書秦繆公即位九年齊桓公既霸會諸侯於葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏封泰山禪云云虙羲封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黃帝封泰山禪亭亭顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪會稽湯封泰山禪云云周成王封泰山禪社首皆受命然後得封禪桓公曰寡人北伐山戎過孤竹西伐大夏涉流沙束馬懸車上卑耳之山南伐至召陵登熊耳山以望江漢兵車之會三而乘車之會六九合諸侯一匡天下諸侯莫違我昔三代受命亦何以異乎於是管仲睹桓公不可窮以辭因設之以事曰古之封禪鄗上之黍北里之禾所以為盛江淮之間一茅三脊所以為籍也東海致比目之魚西海致比翼之鳥然後物有不召而自至者十有五焉今鳳凰麒麟不來嘉榖不生而蓬蒿藜莠茂鴟梟數至而欲封禪毋乃不可乎於是桓公乃止史記封禪書其後百有餘年而孔子論述六藝傳略言易姓而王封泰山禪乎梁父者七十餘王矣其俎豆之禮不章蓋難言之史記封禪書秦始皇既并天下而帝即帝位三年東巡郡縣祠騶嶧山頌秦功業於是徵從齊魯之儒生博士七十人至乎泰山下諸儒生或議曰古者封禪為蒲車惡傷山之土石草木掃地而祭席用苴秸言其易遵也始皇聞此議各乖異難施用由此絀儒生而遂除車道上自泰山陽至巔立石頌秦始皇帝德明其得封也從陰道下禪於梁父其禮頗采太祝之祀雍上帝所用而封藏皆祕之世不得而記也漢書郊祀志武帝初即位尤敬鬼神之祀漢興己六十餘歲矣天下艾安縉紳之屬皆望天子封禪改正度也而上鄉儒術招賢良趙綰王臧等以文學為公卿欲議古立明堂城南以朝諸侯草巡狩封禪改曆服色事未就竇太后不好儒術使人微伺趙綰等姦利事按綰臧綰臧自殺諸所興為皆廢漢書郊祀志自得寶鼎上與公卿諸生議封禪封禪用希曠絶莫知其儀體而群儒采封禪尚書周官王制之望祀射牛事齊人丁公年九十餘曰封禪者古不死之名也秦皇帝不得上封陛下必欲上稍上師古曰稍漸也即無風雨遂上封矣上於是乃令諸儒習射牛草封禪儀數年至且行天子既聞公孫卿及方士之言黃帝以上封禪皆致怪物與神通欲放黃帝以接神人蓬萊高世比德於九皇而頗采儒術以文之群儒既已不能辨明封禪事又拘於詩書古文而不敢騁上為封祠器視群儒群儒或曰不與古同徐偃又曰太常諸生行禮不如魯善周霸屬圖封事於是上黜偃霸而盡罷諸儒弗用三月乃東幸緱氏禮登中嶽太室從官在山上聞若有言萬歲云問上上不言問下下不言乃令祠官加增太室祠禁毋伐其山天子至梁父禮祠地主至乙卯令侍中儒者皮辨縉紳射牛行事封泰山下東方如郊祠泰一之禮封廣丈二尺高九尺其下則有玉牒書書祕禮畢天子獨與侍中奉車子侯服虔曰子侯霍去病子也上泰山亦有封其事皆禁明日下陰道丙辰禪泰山下址東北肅然山如祭后土禮天子皆親拜見衣上黃而盡用樂焉江淮間一茅三脊為神藉五色土益雜封縱遠方奇獸飛禽及白雉諸物頗以加祠兕牛象犀之屬不用皆至泰山然后去封禪祠其夜若有光晝有白雲出封中天子從禪遠坐明堂群臣更上壽下詔改元為元封前漢倪寬傳及議欲放古巡狩封禪之事諸儒對者五十餘人未能有所定先是司馬相如病死有遺書頌功德言符瑞足以封泰山上奇其書以問寬寬對曰陛下躬發聖德統揖群元宗祀天地薦禮百神精神所鄉徵兆必報天地並應符瑞昭明其封泰山禪梁父昭姓考瑞帝王之盛節也然享薦之義不著于經以為封禪告成合祛於天地神祇祗戒精專以接神明總百官之職各稱事宜而為之節文唯聖主所由制定其當非群臣之所能列今將舉大事優遊數年使群臣得人自盡終莫能成唯天子建中和之極兼總條貫金聲而玉振之以順成天慶垂萬世之基上然之乃自制儀采儒術以文焉後漢書祭祀志上建武群臣上言宜封禪泰山詔不許虎賁中郎將梁松等求元封時封禪故事議封禪所施用有司奏松上疏爭之以為登封之禮告功皇天垂後無窮以為萬民也今因舊封竄寄玉牒故石下恐非重命之義受命中興宜當特異以明天意通典禮十四封禪魏明帝時中護軍蔣濟請封禪帝雖拒濟議而實使高堂隆草封禪儀以天下未一不欲便行大禮會高堂隆卒不行三國志蜀志秦宓傳蜀本無學士文翁遣相如東受七經還教吏民於是蜀學比於齊魯故地里志曰文翁倡其教相如為之師漢家得士盛於其世仲舒之徒不達封禪相如制其禮夫能制禮造樂移風易俗非禮所秩有益於世者乎通典禮十四封禪晉武帝平吳太康九年衛瓘議封禪帝曰此盛德之事所未議也瓘等又奏至於再三詔報讎之通典禮十四封禪宋文帝在位長久有意封禪詔學士山謙之草其儀注屬後魏師南逼其意乃息孝武大明元年十二月戊申太宰江夏王義恭表三請帝以文軌未一不從通典禮十四封禪北齊有巡狩之禮並登封之儀竟不行通典禮十四封禪隋開皇十四年群臣請封禪文帝命牛弘等創定其禮帝曰此事體大朕何德以堪之但當東狩因拜岱山新唐書禮儀志文中子曰封禪非古也其秦漢之侈心乎蓋其曠世不常行而於禮無所本故自漢以來儒生學官論議不同而至於不能決則出於時君率意而行之爾隋文帝嘗令牛弘辛彥之等撰定儀注為壇泰山下設祭如南郊而已未嘗升山也唐太宗已平突厥而年榖屢豐群臣請封泰山太宗初頗非之已而遣中書侍郎杜正倫行太山上七十二君壇迹以是歲兩河大水而止其後群臣言封禪者多乃命祕書少監顏師古諫議大夫朱子奢等集當時名儒博士雜議不能決於是左僕射房玄齡特進魏徵中書令楊師道博採衆議奏上之遂著於禮其他降禪朝覲皆不著至十五年將東幸行至洛陽而彗星見乃止高宗乾封元年封泰山為圓壇乃詔立登封降禪朝覲之碑名封祀壇曰舞鶴臺登封壇曰萬歲臺降禪壇曰景雲臺以紀瑞焉新唐書禮樂志玄宗開元十二年四方治定歲屢豐稔群臣多言封禪中書令張説又固請乃下制以十三年有事泰山於是説與右散騎常侍徐堅太常少卿韋縚祕書少監康子元國子博士侯行果刊定儀注新唐書禮樂志其非常祀天子有時而行之者曰封禪巡守視學耕藉拜陵文中子曰封禪非古也其秦漢之侈心乎蓋其曠世不常行而於禮無所本故自漢以來儒生學官論議不同而至於不能決則出於時君率意而行之爾養老第二前漢賈誼傳曰春秋入學坐國老執醬而親餽之所以明有孝也前漢賈山傳天子之尊四海之內其義莫不為臣然而養三老於太學親執醬而餽執爵而酳祝噎在前祝鯁在後公卿奉杖大夫進履舉賢以自輔弼求修正之士使直諫故以天子之尊尊養三老視孝也立輔弼之臣者恐驕也置直諫之士者恐不得聞其過也後漢明帝永平二年上始帥群臣躬養三老五更於辟雍行大射之禮後漢永平二年三雍初成拜榮為五更每大射養老禮畢帝輒引榮為弟子升堂執經後漢建初二年冬肅宗行享禮以恭為三老魏帝紀詔曰夫養老興教三代所以樹風化垂不朽也必有三老五更以崇至敬乞言納誨著在惇史然後六合承流下觀而化宜妙簡德行以充其選關內侯王祥履仁東義雅志淳固關內侯鄭小同溫恭孝友帥禮不忒其以祥為三老小同為五更車駕親率群司躬行古禮焉晉王祥傳天子幸太學命祥為三老祥南面几杖以師道自居天子北面乞言祥陳明王聖帝君臣政化之要以訓之魏高貴卿公甘露二并也北齊制仲春令辰陳蔡先禮先一日三老五更齊於國學皇帝進賢冠玄紗袍至辟雍入總章堂列宮懸王公以下多及國老庶老各定位後周武帝保定三年詔以太傳燕國公于謹為三老賜延年杖皇帝幸大學以食之三老入門皇帝迎拜門屏之間三老拜答設三老席於中楹南向太師晉國公宇文護升階設几於席三老升席南面憑几而坐大司寇楚國公豆盧寧升階正舄皇帝升立於斧扆之前西面有司進饌皇帝跪授醬豆親袒割牲箋證漢書賈誼傳曰春秋入學坐國老執醬而親餽之師古曰餽與饋同所以明有孝也漢書賈山傳天子之尊四海之內其義莫不為臣然而養三老於大學親執醬而餽執爵而酳祝䭇在前祝鯁在後公卿奉杖大夫進履舉賢以自輔弼求修正之士使直諫故以天子之尊尊養三老視孝也立輔弼之臣者恐驕也置直諫之士者恐不得聞其過也學問至於芻蕘者求善無饜也商人庶人誹謗已而改之從善無不聽也後漢書禮儀志上明帝永平二年三月上始帥群臣躬養三老五更於辟雍行大射之禮後漢書桓榮傳永平二年三雍初成拜榮為五更每大射養老禮畢帝輒引榮及弟子升堂執經自為下説後漢書伏恭傳建初二年冬肅宗行饗禮以恭為三老三國志魏志三少帝紀秋八月甲戌以驃騎將軍王昶為司空丙寅詔曰夫養老興教三代所以樹風化垂不朽也必有三老五更以崇至敬乞言納誨著在惇史然後六合承流下觀而化宜妙簡德行以充其選關內侯王祥履仁秉義雅志淳固關內侯鄭小同溫恭孝友帥禮不忒其以祥為三老小同為五更車駕親率群司躬行古禮焉晉書王祥傳天子幸太學命祥為三老祥南面几杖以師道自居天子北面乞言祥陳明王聖帝君臣政化之要以訓之聞者莫不砥礪及高貴鄉公之弒也朝臣舉哀祥號哭曰老臣無狀涕淚交流衆有愧色通典禮養老北齊制仲春令辰陳養老禮先一日三老五更齋於國學皇帝進賢冠玄紗袍至辟雍入總章堂列宮懸王公以下及國老庶老各定位又隋書禮儀志仲春令辰陳養老禮先一日三老五更齋於國學皇帝進賢冠玄紗袍至璧雍入總章堂列宮懸王公已下及國老庶老各定位通典禮養老後周武帝保定三年詔以太傅燕國公于謹為三老賜延年杖皇帝幸大學以食之三老入門皇帝迎拜門屏之間三老答拜設三老席於中楹南面太師晉國公宇文護升階設几於席三老升席南面憑几而坐大司寇楚國公豆盧寧升階正舄皇帝升立於斧扆之前西面有司進饌皇帝跪授醬豆親袒割牲三老食訖皇帝又親跪授爵以酳鄉飲酒第三前漢成帝紀鴻嘉二年博士行飲酒禮後漢明帝永平二年郡縣道行鄉飲酒于學校皆祀聖師周公孔子後漢伏湛傳徐異卿等據富平屬平原連攻之不下帝遣到平原即日歸降湛雖在倉卒造次必於文德以為禮樂政化之首顛沛猶不可違是歲奏行鄉飲酒禮遂施行之晉武帝紀太始六年幸辟雍行鄉飲酒之禮賜太常博士學生帛牛酒各有差餘見課最李忠傳箋證漢書成帝紀鴻嘉二年春行幸雲陽三月博士行飲酒禮有雉蜚集于庭歷階升堂而雊後集諸府又集承明殿後漢書明帝永平二年三月上始帥群臣躬養三老五更於辟雍行大射之禮郡縣道行鄉飲酒于學校皆祀聖師周公孔子牲以犬後漢書伏湛傳時賊徐異卿等萬餘人據富平富平縣名屬平原郡故城今棣州厭次縣也連攻之不下唯云願降司徒伏公帝知湛為青徐所信向遣到平原異卿等即日歸降護送洛陽湛雖在倉卒造次必於文德以為禮樂政化之首顛沛猶不可違是歲奏行鄉飲酒禮遂施行之晉書武帝紀泰始六年冬十一月幸辟雍行鄉飲酒之禮賜太常博士學生帛牛酒各有差
