body:
  text: 卷第三十四吏畏而愛第一後漢袁安傳舉孝廉除陰平長任境令所在吏人畏而愛之魏倉慈傳為長安令清約有方吏畏而愛之蜀馬忠傳曰忠為人寬濟有度量但詼啁大笑忿怒不形於色然處事能斷威恩並立蠻夷畏而愛之晉丁紹傳冀州剌史時境內羯賊為患紹捕而誅之號為嚴肅河北人畏而愛之餘見發摘姦伏法雄傳箋證後漢書袁安傳袁安建武初至成武令後舉孝廉除寬平長任城令所在吏人畏而愛之三國志魏志倉慈傳倉慈字孝仁淮南人也始為郡吏建安中太祖開募屯田於淮南以慈為綏集都尉黃初末為長安令清約有方吏民畏而愛之三國志蜀志馬忠傳馬忠字德信巴西閬中人也忠為人寬濟有度量但詼啁大笑忿怒不形於色然處事能斷威恩並立是以蠻夷畏而愛之晉書良吏丁紹丁紹字叔倫譙國人也遷徐州刺史士庶戀慕攀附如歸未之官復遷荊州刺史從車千乘南渡河至許時南陽王模為都督留紹啓轉為冀州刺史到鎮率州兵討破汲桑有功加寧北將軍假節監冀州諸軍事時境內羯賊為患紹捕而誅之號為嚴肅河北人畏而愛之民吏攀車第二後漢劉寵傳除東平陵令以仁惠為吏民所愛母矣棄官去百姓將送塞道車不得進乃輕服遁歸後漢弟五倫字伯魚拜會稽太守坐法召老小攀車叩馬啼呼相隨日才行數里不得前倫乃偽止亭舍陰東船去衆知復追之後漢侯霸傳為淮平大尹更始遣使召霸百姓老弱相攜號哭遮使者車或當道而臥願乞復留期年使者慮霸就詔臨淮必亂不敢授璽書具以狀聞會更始敗道不通晉應詹傳遷益州刺史領巴東監軍詹之出郡也士庶攀車號泣若戀所生箋證後漢書劉寵傳劉寵字祖榮東萊牟平人以明經舉孝廉除東平陵令以仁惠為吏民所愛母疾棄官去百姓將送塞道車不得進乃輕服遁歸後漢書第五倫傳第五倫字伯魚京兆長陵人也建武二十七年舉孝廉補淮陽國醫工長隨王之國光武召見甚異之二十九年從王朝京師隨官屬得會見詔以為扶夷長未到官追拜會稽太守永平五年坐法徵老小攀車叩馬啼呼相隨日裁行數里不得前倫乃偽止亭舍陰乘船去衆知復追之後漢書侯霸傳侯霸字君房河南密人也王莽初五威司命陳崇舉霸橫行遷隨宰後為淮平大尹政理有能名及王莽之敗霸保固自守卒全一郡更始元年遣使黃霸百姓老弱相攜號哭遮使者車或當道而臥皆曰願乞侯君復留期年使者慮霸就徵臨淮必亂不敢授璽書具以狀聞會更始敗道路不通晉書應詹傳應詹字思遠汝南南頓人遷益州刺史領巴東監軍詹之出郡也士庶攀車號泣若戀所生願留第三後漢寇恂傳頴川盜賊群起車駕南征恂從至頴川盜賊悉降百姓遮道曰願從陛下復借寇君一年乃留恂長社鎮撫吏人受納餘降後漢种皓傳梁州羌動以皓為刺史甚得百姓歡心被徵當遷吏人詣闕請留之太后歎曰未聞刺史得人心若是後漢宋均傳遷東海相在郡五年坐法免官而東海吏民思均恩化為之作歌詣闕乞還者數千人蜀董和傳益州牧劉璋轉和為巴郡都尉吏民老弱相攜乞留和者數千人璋聽留三年餘見民吏攀車侯霸傳又見廉潔鄧攸傳又見去思耿純傳箋證後漢書寇恂傳寇恂七年代朱浮為執金吾明年從車駕擊隗囂而潁川盜賊群起帝乃引軍還即日車駕南征恂從至潁川盜賊悉降而竟不拜郡百姓遮道曰願從陛下復借寇君一年乃留恂長社鎮撫吏人受納餘降後漢書种皓傳种皓字景伯河南洛陽人梁州羌動以皓為梁州刺史甚得百姓歡心被徵當遷吏人詣闕請留之太后歎曰未聞刺史得人心若是後漢書宋均傳宋均字叔庠南陽安衆人也永平元年遷東海相在郡五年坐法免官客授潁川而東海吏民思均恩化為之作歌詣闕乞還者數千人三國志蜀志董和傳漢末和率宗族西遷益州牧劉璋以為牛鞞江原長成都令然縣界豪強憚和嚴法説璋轉和為巴東屬國都尉吏民老弱相攜乞留和者數千人璋聽留二年還遷益州太守其清約如前去思第四史記召公世家召公巡行鄉邑有棠樹決獄政事其下自侯伯至庶人各得其所無失職者召公卒而民人思召公之政懷棠樹不敢伐歌詠之作甘棠之詩前漢何武傳其所居亦無赫赫名去後常見思前漢循吏傳王成黃霸朱邑龔遂召信臣等所居民富所去見思生有榮號死見奉祀此廩廩庶幾德讓君子之遺風矣後漢耿純傳從擊董憲道過東郡百姓老小數千隨車駕涕泣云願復得耿君帝謂公卿曰純年少被甲胃為軍吏且治郡乃能見思若此乎魏袁渙傳遷為梁相外溫柔而內能斷以病去官百姓思之蜀諸葛亮傳青龍二年春亮帥衆出武功分兵屯田為久駐之基其秋病卒黎庶追思以為口實至今梁益之民咨迷亮者言猶在耳雖甘棠之詠召公鄭人之歌子産無以遠譬也孟軻有云以逸道使民雖勞不怨以生道殺人雖死不怨信矣箋證史記燕召公世家召公之治西方甚得兆民和召公巡行鄉邑有棠樹決獄政事其下自侯伯至庶人各得其所無失職者召公卒而民人思召公之政懷棠樹不敢伐歌詠之作甘棠之詩漢書何武傳何武字君公蜀郡郫縣人也其所居亦無赫赫名去後常見思漢書循吏傳序王成黃霸朱邑龔遂鄭弘召信臣等所居民富所去見思生有榮號死見奉祀此廩廩庶幾德讓君子之遺風矣師古曰廩廩言有風采也後漢書耿純傳拜純為東郡太守居東郡四歲時發干長有罪純案奏圍守之奏未下長自殺純坐免以列侯奉朝請從擊董憲道過東郡百姓老小數千隨車駕涕泣云願復得耿君帝謂公卿曰純年少被甲胄為軍吏耳治郡乃能見思若是乎三國志魏志袁渙傳遷為梁相為政崇教訓恕思而後行外溫柔而內能斷以病去官百姓思之三國志蜀志諸葛亮傳青龍二年春亮帥衆出武功分兵屯田為久駐之基其秋病卒黎庶追思以為口實至今梁益之民咨述亮者言猶在耳雖甘棠之詠召公鄭人之歌子産無以遠譬也孟軻有云以逸道使民雖勞不怨以生道殺人雖死不忿信矣遺愛第五史記鄭世家鄭相子産卒鄭人皆哭泣悲之如亡親戚子産者鄭成公少子也為人仁愛人事君忠厚孔子嘗過鄭與子産如兄弟云及聞子産死孔子為泣曰古之遺愛也子産見愛有古人之遺風也後漢周嘉傳遷零陵太守視事七年卒零陵頌其遺愛吏民為立祠焉晉清惠亭侯京傳西土聞其薨也泣者盈路百姓為之樹碑長老見碑無不下拜其遺愛如此晉荀勗傳為安陽令勗有遺愛安陽生為立祠新唐崔彥昭傳徙河東先是沙陀諸部多犯法彥昭撫循有威惠三年境內大治耆老叩闕願留箋證史記鄭世家十三年定公卒子獻公蠆立獻公十三年卒子聲公勝立當是時晉六卿強侵奪鄭鄭遂弱聲公五年鄭相子産卒鄭人皆哭泣悲之如亡親戚子産者鄭成公少子也為人仁愛人事君忠厚孔子嘗過鄭與子産如兄弟云及聞子産死孔子為泣曰古之遺愛也集解賈逵云愛惠也杜預云子産見愛有古人遺風也後漢書獨行列傳周嘉傳周嘉字惠文汝南安城人也後太守寇恂舉為孝廉拜尚書侍郎稍遷零陵太守視事七年卒零陵頌其遺愛吏民為立祠焉晉書宣五王列傳武王駿字子臧幼聰惠駿有孝行及齊王攸出鎮駿表諫懇切以帝不從遂發病薨追贈大司馬加侍中假黃鉞西土聞其薨也泣者盈路百姓為之樹碑長老見碑無不下拜其遺愛如此晉書荀勗傳為安陽令轉驃騎從事中郎勗有遺愛安陽生為立祠新唐書崔彥昭傳崔彥昭字思文其先清河人淹貫儒術擢進士第纍進戶部侍郎繇河陽節度使徙河東先是沙陀諸部多犯法彥昭撫循有威惠三年境內大治耆老叩闕願留詔可立生祠第六史記萬石君傅慶為齊相舉齊國皆慕其家行不言而齊國大治為立石相祠前漢于定國傳其父于公為縣獄史郡決曹決獄平羅文法者于公所決皆不恨郡中為之生立祠號曰于公祠前漢欒布傳為燕相燕齊之間皆為立社號曰欒公社後漢韋彪傳族子義為廣都長甘陵陳二縣令甘陵仕陳州陳居民州政甚有績官曹無事牢獄空虛以兄順喪去官廣都為生立廟及卒三縣吏民為義舉哀若喪考妣後漢王堂傳永初中西羌寇巴郡為民患三府舉堂治劇拜巴郡太守堂馳兵赴賊斬虜千餘級巴庸清淨吏民生為立祠後漢張奐傳武威太守平均徭賦率厲散敗常為諸郡最河西由是而全其俗多妖忌凡二月五月産子及與父母同月生者悉殺之奐示以義方嚴加賞罰風俗遂攻百姓生為立祠後漢李憲傳淳于臨等攻殺安風令楊州牧歐陽歙遣兵不能克帝議欲討之廬江人陳衆為從事白歙請得喻降臨於是乘單車駕白馬往説而降之灊山人共生為立祠號曰白焉陳從事云後漢任延傳左轉睢陽令九真吏人生為立祠後漢童恢傳恢舉孝廉除須昌長化有異政吏人生為立祠晉良吏杜軫傳除池陽令為雍州十一郡最百姓生為立祠新唐仁傑為魏州刺史人吏為立生祠餘見遺愛苟勗傳又見臣不嚴而治盧鈞傳又見課最杜軫傳箋證史記萬石君列傳萬石君少子慶為太僕御出上問車中幾馬慶以策數馬畢舉手曰六馬慶於諸子中最為簡易矣然猶如此為齊相舉齊國皆慕其家行不言而齊國大治為立石相祠漢書于定國傳于定國字曼倩東海郯人也其父于公為縣獄史郡決曹決獄平羅文法者于公所決皆不恨師古曰羅罹也遭也郡中為之生立祠號曰于公祠漢書欒布傳欒布梁人也孝文時為燕相吳楚反時以功封為鄃侯蘇林曰鄃音輸清河縣也復為燕相燕齊之間皆為立社號曰欒公社後漢書韋彪傳附族子韋義族子義義字季節安帝西巡徵拜議郎義少與二兄齊名初仕州郡太傅桓焉辟舉理劇為廣都長甘陵陳二縣令甘陵故城在今貝州清河縣西北陳屬梁國今陳州政甚有績官曹無事牢獄空虛數上書順帝陳宜依古典考功黜陟徵集名儒大定其制又譏切左右貶刺竇氏言既無感而久抑不遷以兄順喪去官比辟公府不就廣都為生立廟及卒三縣吏民為義舉哀若喪考妣後漢書王堂傳王堂字敬伯廣漢郪人也初舉光祿茂才光祿舉之為茂才也遷穀城令治有名迹永初中西羌寇巴郡為民患詔書遣中郎將尹就攻討連年不剋三府舉堂治劇拜巴郡太守堂馳兵赴賊斬虜千餘級巴庸清靜吏民生為立祠後漢書張奐傳張奐字然明敦煌酒泉人也延熹元年鮮卑寇邊奐率南單于襲之斬首數百級明年梁冀被誅奐以故吏免官禁錮在家四歲復拜武威太守平均徭賦率厲散敗常為諸郡最河西由是而全其俗多妖忌凡二月五月産子及與父母同月生者悉殺之奐示以義方嚴加賞罰風俗遂改百姓生為立祠後漢書李憲傳憲餘黨淳于臨等猶聚衆數千人屯灊山攻殺安風令揚州牧歐陽歙遣兵不能尅帝議欲討之廬江人陳衆為從事白歙請得喻降臨曉喻其意而降之也於是乘單車駕白馬往説而降之灊山人共生為立祠號曰白馬陳從事云後漢書循吏列傳任延傳任延字長孫南陽宛人也建武初遣使貢獻封鹽水侯領南華風始於二守焉延視事四年徵詣洛陽以病稽留左轉雎陽令九真吏人生為立祠後漢書循吏列傳童恢傳童恢字漢宗琅邪姑幕人也弟翊字漢文名高於恢宰府先辟之翊陽喑不肯仕喑疾不能言也及恢被命乃就孝廉除須昌長化有異政吏人生為立碑晉書良吏杜軫傳杜軫字超宗蜀郡成都人也又除池陽令為雍州十一郡最百姓生為立祠舊唐書狄仁傑傳仁傑嘗為魏州刺史人吏為立生祠立祠第七前漢循吏傳朱邑屬其子曰我故為桐鄉吏其民愛我必葬桐鄉後世子孫奉嘗我不如桐鄉民其子葬之桐鄉民果立祠祠祭不絶前漢循吏傳元始四年詔書祀百辟卿土有益於民者蜀郡以文翁九江以召父應詔書歲時郡二千石率官屬行禮奉祠信臣冢而南陽亦為立祠前漢循吏傳文翁終於蜀吏民為立祠堂歲時祭祀不絶至今巴蜀好文雅文翁之化也後漢祭彤既死烏桓鮮卑每朝常過冢拜謁仰天號泣而去遼東吏人為立祠四時奉祭焉後漢侯霸傳霸薨追封諡鄉哀侯臨淮吏人共為立祠四時祭焉後漢許揚傳汝南舊有鴻郤陂成帝時毀敗之建武中太守鄧晨欲修復其功聞楊曉水脈召與議之因署楊為都水掾使典其事楊因高下形藝起塘四百餘里數年乃立塘堤堰水也百姓得其便纍歲大稔以病卒晨於都宮為楊起廟圖畫形像百姓思其功績皆祭祀之後漢王渙傳渙卒民思其德為立祠安陽亭西每食輒弦歌而薦之後漢宋登傳為汝陰令後卒汝陰人配社祠之蜀諸葛亮傳景耀六年春詔為亮立廟於沔陽襄陽記曰亮初亡所在各求為立廟朝議以禮秩不聽百姓遂因時節私祭之於道陌上習堅向充等共上表曰臣聞周人懷召伯之德甘棠為之不伐越王思范蠡之功鑄金以存其像自漢興已來小善小德而圖形立廟者多矣況亮德範遐邇勳蓋季世廟像闕而莫立使百姓巷祭戎夷野祀非所以存德念功臣愚以為宜因近其墓立之於沔陽蜀張嶷傳越嶲民夷聞嶷死無不悲泣為嶷立廟四時之旱輒祀之晉孔偷傳吳平入新安山中以稼穡讀書為務信著鄰里後忽捨去皆謂為神人而為卒立祠新唐呂諲在朝不稱任職及為荊州號令明賦斂鈞一其治尚威信民歌詠之荊人生構房祠餘見遺愛周嘉傳箋證漢書循吏傳朱邑朱邑字仲卿廬江舒人也少時為舒桐鄉嗇夫廉平不苛以愛利為行神爵元年卒天子閔惜初邑病且死屬其子曰我故為桐鄉吏其民愛我必葬我桐鄉後世子孫奉嘗我不如桐鄉民師古曰嘗謂蒸嘗之祭及死其子葬之桐鄉西郭外民果然共為邑起冢立祠歲時祠祭至今不絶漢書循吏傳召信臣召信臣字翁卿九江壽春人也元始四年詔書祀百辟卿士有益於民者師古曰百辟百官蜀郡以文翁九江以召父應詔書歲時郡二千石率官屬行禮奉祠信臣冢而南陽亦為立祠漢書循吏傳文翁文翁廬江舒人也少好學通春秋以郡縣吏察舉景帝末為蜀郡守仁愛好教化文翁終於蜀吏民為立祠堂歲時祭祀不絶至今巴蜀好文雅文翁之化也師古曰文翁學堂于今猶在益州城內後漢書祭遵傳附從弟祭彤彤字次孫早孤以至孝見稱光武初以遵故拜彤為黃門侍郎常在左右臨終謂其子曰吾蒙國厚恩奉使不稱微績不立身死誠慚恨義不可以無功受賞死後若悉簿上所得賜物若汝也皆為文簿而上之身自詣兵屯效死前行以副吾心既卒其子逢上疏具陳遺言帝雅重彤方更任用聞之大驚召問逢疾狀嗟嘆者良久焉烏桓鮮卑追思彤無已每朝賀京師常過冢拜謁仰天號泣乃去遼東吏人為立祠四時奉祭焉後漢書侯霸傳侯霸在位明察守正奉公不回十三年霸薨於是追封諡霸則鄉哀侯食邑二千六百戶子昱嗣臨淮吏人共為立祠四時祭焉後漢書方術列傳許楊傳許楊字偉君汝南平輿人也少好術數王莽輔政召為郎稍遷酒泉都尉及莽歷位楊乃變姓名為巫醫逃匿它界莽敗方還鄉里汝南舊有鴻郤陂成帝時丞相翟方進奏毀敗之建武中太守鄧晨欲修復其功聞楊曉水掾召與議之楊曰誠願以死效力晨大悅因署楊為都水掾使典其事楊因高下形勢起塘四百餘里數年乃立塘堤堰水也百姓得其便纍歲大稔後以病卒晨於都宮為楊起廟圖畫形像百姓思其功績皆祭祀之後漢書循吏列傳王渙傳王渙元興元年病卒百姓市道莫不咨嗟男女老壯皆相與賦斂致奠醊以千數民思其德為立祠安陽亭西每食輒弦歌而薦之後漢書儒林列傳宋登傳登少傳歐陽尚書教授數千人為汝陰令政為明能號稱神父卒於家汝陰人配社祠之三國志蜀志諸葛亮傳景耀六年春詔為亮立廟於沔陽襄陽記曰亮初亡所在各求為立廟朝議以禮秩不聽百姓遂因時節私祭之於道陌上言事者或以為可聽立廟於成都者後主不從步兵校尉習隆中書郎向充等共上表曰臣聞周人懷召伯之德甘棠為之不伐越王思范蠡之功鑄金以存其像自漢興已來小善小德而圖形立廟者多矣况亮德範遐邇勳蓋季世興王室之不壞實斯人是賴而蒸嘗止於私門廟像闕而莫立使百姓巷祭戎夷野祀非所以存德念功述追在昔者也今若盡順民心則瀆而無典建之京師又逼宗廟此聖懷所以惟疑也臣愚以為宜因近其墓立之於沔陽三國志蜀志張嶷傳張嶷字伯岐巴西郡南充國人也魏狄道長李簡密書請降徫將軍薑維率嶷等因簡之資以出隴西既到狄道簡悉率城中吏民出迎軍軍前與魏將徐質交鋒嶷臨陳隕身南土越巂民夷聞嶷死無不悲泣為嶷立廟四時水旱輒祀之晉書孔愈傳孔愈字敬康會稽山陰人也吳平愈遷于洛東還會稽入新安山中改姓孫氏以稼穡讀書為務信著鄉里後忽捨去皆謂為神人而為之立祠新唐書呂諲傳諲在朝不稱任職相反為荊州號令明賦斂均一其治尚威信故軍士用命闔境無盜賊民歌詠之自至德以來處方面數十人諲最有名荊人生構房祠圖像第八前漢趙充國傳初充國以功德與霍光等列畫未央宮成帝時西羌嘗有警上思將帥之臣追美充國乃召楊雄即充國圖畫而頌之後漢論曰承平中顯宗追感前世功臣乃圖畫二十八將於南宮雲臺其外又有王常李通竇融卓茂合三十二人故依其本弟係之篇未以志功臣之次云爾爾後漢延篤後遭黨事禁錮卒于家鄉里圖其形于屈原廟原抱忠正而死圖像而偶之後漢薑肱傳肱與徐稚俱詔不起桓帝乃下彭城使畫匠圖其形狀肱臥於幽暗以被韜面言或眩疾不欲出風工竟不得見之後漢酷吏陽球傳靈帝時拜尚書令奏罷鴻都文學曰伏承有詔勑中尚方為鴻都文學樂松江覽等三十二人圖象立贊以勸學者臣案松覽等皆出於微蔑斗筲小人依馮世戚附託權豪俯眉承睫徼進明時或獻賦一篇或鳥篆盈簡而位升郎中形圖丹青亦有筆不點牘辭不辨心假手請字妖偽百品莫不被蒙殊恩蟬蛻滓濁是以有識掩口天下嗟歎臣聞圖象之設以昭勸戒欲令人君動鑒得失未聞豎子小人詐作文頌而可妄竊天官垂象圖素者也後漢蔡雍傳雍遂死獄中搢紳諸儒莫不流涕鄭康成聞而歎曰漢世之事誰與正之兗州陳留聞皆畫像而頌焉魏倉慈傳為燉煌太守卒官吏民悲感如喪親戚圖畫其形思其遺像晉陸雲傳人有見煞者主名不立雲録其妻而無所問十許日遣出密令人隨後謂曰其去不出十里當有男子候之與語便縛來既而果然問之具服云與此妻通共煞其天聞妻得出欲與語憚近縣故遠相要侯於是一縣稱為神明雲乃去官百姓追思之圖畫形像配食縣社新唐書張公紀傳正觀十三年改封胡國公後四年詔旡忌孝恭如晦鄭公徵玄齡等並圖形凌煙閣後永徽六年遣使致祭新唐書郭子儀傳子儀既定河東河西帝勞曰用卿晚故至此乃賜錢券圖形凌煙閣餘見勸學高彪傳箋證漢書趙充國傳初充國以功德與霍光等列畫未央宮成帝時西羌嘗有警上思將帥之臣追美充國乃召黃門郎揚雄即充國圖畫而頌之師古曰即就也於畫側而書頌也後漢書朱祐景丹王梁杜茂馬成劉隆傅俊堅鐔馬武傳論曰中興二十八將前世以為上應二十八宿未之詳也永平中顯宗追感前世功臣乃圖畫二十八將於南宮雲臺其外又有王常李通竇融卓茂合三十二人故依其本第係之篇末以志功臣之次云爾後漢書延篤傳延篤字叔堅南陽犨人也少從潁川唐溪典受左氏傳後遭黨事禁錮永康元年卒于家鄉里圖其形于屈原之廟屈原楚大夫抱忠貞而死篤有志行文章故圖其像而偶之焉後漢書薑肱傳薑肱字伯淮彭城廣戚人也家世名族諸公爭加辟命皆不就後與徐稚爭俱徵不至桓帝乃下彭城使畫工圖其形狀肱臥於幽暗以被韜面韜藏也言感眩疾不欲出風工竟不得見之後漢書酷吏列傳陽球傳陽球字方正漁陽泉州人也泉州故城在今幽州雍奴縣南也初舉孝廉補尚書侍郎球有理姦才拜九江太守靈帝以球九江時有功拜議郎遷將作大匠坐事論頃之拜尚書令奏罷鴻都文學曰伏承有詔勑中尚方為鴻都文學樂松江覽等三十二人圖象立贊以勸學者臣聞傳曰君舉必書書而不法後嗣何觀左傳曹劌諫魯莊公之辭也案松覽等皆出於微蔑斗筲小人依憑世戚附託權豪俯眉承睫徼進明時或獻賦一篇或鳥篆盈簡八體書有鳥篆象形以為字也而位升郎中形圖丹青亦有筆不點牘辭不辨心假手請字妖偽百品莫不被蒙殊恩蟬蛻滓濁是以有識掩口天下嗟歎臣聞圖象之設以昭勸戒欲令人君動鑒得失未聞豎子小人詐作文頌而可妄竊天官垂象圖素者也後漢書蔡雍傳雍遂死獄中允悔欲止而不及時年六十一搢紳諸儒莫不流涕北海鄭玄聞而歎曰漢世之事誰與正之荊州陳留聞皆畫像而頌焉三國志魏志倉慈傳太和中遷燉煌太守數年卒官吏民悲感如喪親戚圖畫其形思其遺像晉書陸機傳附陸雲人有見殺者主名不立雲録其妻而無所問十許日遣出密令人隨後謂曰其去不出十里當有男子候之與語便縛來既而果然問之具服云與此妻通共殺其夫聞妻得出欲與語憚近縣故遠相要候於是一縣稱其神明郡守害其能屢譴責之雲乃去官百姓追思之圖畫形象配食縣社新唐書秦瓊傳秦瓊字叔竇以字顯齊州歷城人貞觀十三年改封胡國公後四年詔司徒趙國公無忌司空河間王孝恭司空萊國公如晦司空太子太師鄭國公齡司空梁國公玄齡開府儀同三司鄂國公敬德特進衛國公靖特進宋國公瑀輔國大將軍褒國公志玄輔國大將軍夔國公弘基尚書左僕射蔣國公通陜東道行臺右僕射鄖國公開山荊州都督譙國公紹荊州都督邳國公順德洛州都督鄖國公亮吏部尚書陳國公君集左驍衛大將軍郯國公公謹左領軍大將軍盧國公知節禮部尚書永興郡公世南戶部尚書渝國公政會戶部尚書莒國公儉兵部尚書英國公績并叔寶並圖形淩煙閣高宗永徽六年遣使致祭新唐書郭子儀傳帝得奏泣謂左右曰子儀固社稷臣也朕西決矣乘輿還子儀頓首謝罪帝勞曰用卿晚故至此乃賜鐵券圖形凌煙閣
