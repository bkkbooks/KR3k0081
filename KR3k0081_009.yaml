body:
  text: 卷第九養士第一史記孟嘗君傳孟嘗君在薛招致諸侯賓客及亡人有罪者皆歸孟嘗君舍業厚遇之以故傾天下之士食客數千人無貴賤一與文等史記魏公子傳為信陵君公子為人仁而下士士無賢不肖皆謙而禮交之不敢以其富貴驕士士以此方數千里爭往歸之致食客三千人當是時諸侯以公子賢多客不敢加兵史記呂不韋傳時魏有信陵君楚有春申君趙有平原君齊有孟嘗君皆下士喜賓客以相傾呂不韋以秦之彊羞不如亦招致士至食客三千人是時諸侯多辨上如荀卿之徒著書布天下呂不韋乃使其客人人著所聞集論以為八覽六論十二紀二十餘万言以為備天地万物古今之事號曰呂氏春秋布咸陽市門垂千金其上延諸侯游士賓客有能增損一字者豫千金前漢公孫弘傳至宰相封侯於是起客館開東閣以延賢人與參謀議前漢董伸舒傳夫不素養士而欲求賢譬猶不琢玉而求文采也故養土之大者莫大呼太學太學者賢士之所關也教化之本源也願陛下興太學置明師以養天下之士數考問以盡其材則英俊宜可得乎前漢賈山傳故地之美者善養禾君之仁者善養土前漢李尋對哀帝曰語曰何以知朝廷之衰人人自賢不務於通人故世陵夷通人謂薦達賢材也陵夷謂穨替也馬不伏歷不可以趨道士不素養不可以重國伏歷謂伏槽歷而秣之也趨讀曰趣後漢竇武傳古之士者善舉賢以功養士以禮後漢班固傳永平初東平王蒼以至戚輔政開東閣延英雄時固始弱冠奏記說蒼晉樂志改巫山高為平玉衡言景帝一萬國之殊風齊四海之乖心禮賢養土而纂洪業也晉金琨傳年二十六為司隸從事時石崇河南金谷澗中有別盧冠絶時輩引致賓客日以賦詩琨預其間文詠頗為當世所許新唐褚亮傳太宗為天策上將軍冠亂稍平乃鄉儒宮城西作文學館收聘賢才於是下教以大行以如晦等十八人並為學士凡分三番遞宿于閣下悉給珍膳每暇日訪以政事討論墳籍推略前載命閻立本圖象使亮為之贊題名字爵里號十八學士藏之書府以章禮賢之重方是時在選中者天下所慕向謂之登瀛洲箋證史記孟嘗君列傳孟嘗君名文姓田氏文之父曰靖郭君田嬰田嬰者齊威王少子而齊宣王庶弟也嬰卒諡為靖郭君而文果代立於薛是為孟嘗君孟嘗君在薛招致諸侯賓客及亡人有罪者皆歸孟嘗君孟嘗君舍業厚遇之索隱舍業者捨棄其家産業而厚事賓客也劉氏云舍音赦謂為之築舍立居業也以故傾天下之士食客數千人無貴賤一與文等史記信陵君列傳魏公子無忌者魏昭王少子而魏安釐王異母弟也昭王薨安釐王即位封公子為信陵君公子為人仁而下士士無賢不肖皆謙而禮交之不敢以其富貴驕士士以此方數千里爭往歸之致食客三千人當是時諸侯以公子賢多客不敢加兵史記呂不韋列傳呂不韋者陽翟大賈人也往來販賤賣貴家纍千金秦王立一年薨諡為孝文王太子子楚代立是為莊襄王莊襄王所養母華陽后為華陽太后真母夏姬尊以為夏太后莊襄王元年以呂不韋為丞相封為文信侯莊襄王即位三年薨太子政立為王集解徐廣曰時年十三尊呂不韋為相國號稱仲父秦王年少太后時時竊私通呂不韋不韋家僮萬人當是時魏有信陵君楚有春申君趙有平原君齊有孟嘗君皆下士喜賓客以相傾呂不韋以秦之彊羞不如亦招致士厚遇之至食客三千人是時諸侯多辨士如荀卿之徒著書布天下呂不韋乃使其客人人著所聞集論以為八覽六論十二紀二十餘萬言以為備天地萬物古今之事號曰呂氏春秋布咸陽市門懸千金其上延諸侯游士賓客有能增損一字者豫千金漢書公孫弘傳弘自見為舉首起徒步數年至宰相封侯於是起客館開東閣以延賢人與參謀議漢書董仲舒傳陛下親耕藉田以為農先夙寤晨興憂勞萬民思惟往古而務以求賢此亦堯舜之用心也然而未云獲者士素不厲也夫不素養士而欲求賢譬猶不瑑玉而求文采也宋祁曰景祐本瑑作琢當從此本故養士之大者莫大呼太學太學者賢士之所關也師古曰關由也教化之本原也今以一郡一國之衆對亡應書者是王道往往而絶也臣願陛下興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣漢書賈山傳孝文時言治亂之道借秦為諭名曰至言其辭曰文王之時豪俊之士皆得竭其智芻蕘採薪之人皆得盡其力此周之所以興也故地之美者善養禾君之仁者善養士漢書李尋傳哀帝初即位召尋待詔黃門使侍中衛尉傅喜問尋曰間者水出地動日月失度星辰亂行災異仍重尋對曰語曰何以知朝廷之衰人人自賢不務於通人故世陵夷師古曰通人謂薦達賢材也陵夷謂穨替也馬不伏歷不可以趨道士不素養不可以重國師古曰伏歷謂伏槽歷而秣之也趨讀曰趣竇武傳見後漢書卷九十九重廣會史此言後漢竇武傳云云今見竇武傳無是文未知何所據後漢書班彪傳附班固固字孟堅年九歲能屬文誦詩書及長遂博貫載籍九流百家之言無不窮究永平初東平王蒼以至戚為驃騎將軍輔政開東閣延英雄時固始弱冠奏記說蒼晉書樂志下漢時有短簫鐃歌之樂其曲有朱鷺思悲翁艾如張上之回雍離戰城南巫山高及魏受命改其十二曲使繆襲為詞述以功德代漢改巫山高為平玉衡言景帝一萬國之殊風齊四海之乖心禮賢養士而纂洪業也晉書劉琨傳劉琨字越石中山魏昌人漢中山靖王勝之後也琨少得朗之目與范陽祖納俱以雄豪著名年三十六為司隸事時征虜將軍石崇河南金谷澗中有別廬冠絶時輩引致賓客日以賦詩琨預其間文詠頗為當時所許新唐書褚亮傳褚亮字希明杭州錢塘人高祖湮父玠皆有名梁陳間初武德四年太宗為天策上將軍寇亂稍平乃鄉儒宮城西作文學館收聘賢才於是下教以大行臺司勳郎中杜如晦記室考功郎中房玄齡及于志寧軍咨祭酒蘇世長天策府記室薛收文學褚亮姚思太學博士陸德明孔頴達主簿李玄道天策倉曹參軍事李守素王府記室參軍事虞世南參軍事蔡允恭顏相時著作郎攝記室許敬宗薛元敬太學助教蓋文達軍咨典簽蘇勗並以本官為學士七年收卒復召東虞州録事參軍劉孝孫補之凡分三番遞宿于閣下悉給珍膳每暇日訪以政事討論墳籍推略前載無常禮之間命閻立本圖象使亮為之贊題名字爵里號十八學士藏之書府以章禮賢之重方是時在選中者天下所慕向謂之登瀛洲不能養士第二史記孟嘗君傳文謂其父嬰曰君用事相齊至今三王矣齊不加廣而君私家富纍萬金門下不見一賢者文聞將門必有將相門必有相今君後宮蹈綺縠而士不得短褐僕妾餘粱肉而士不厭糟糠文竊怪之前漢公孫弘傳其後李蔡嚴青翟趙周石慶公孫賀劉屈氂繼踵為丞相自蔡至慶丞相府客館丘墟而已至賀屈氂時壞以為馬廄車庫奴娌室矣不能進賢故不繕修其室前漢董仲舒傳夫不素養士而欲求賢譬猶不琢玉而求文采前漢贊曰蘇建嘗說責大將軍至尊重而天下之賢士大夫無稱焉願觀古名將所招選者青謝曰自魏其武安之厚賓客天子常切齒彼親待士大夫招賢黜不肖者人主之柄也人臣奉法遵職而已何與招士青衛青箋證史記孟嘗君列傳初田嬰有子四十餘人其賤妾有子名文文以五月五日生嬰告其母曰勿舉也其母竊舉生之索隱上舉謂初誕而舉之下舉謂浴而乳之生謂長養之也及長其母因兄弟而見其子文於田嬰田嬰怒其母曰吾令若去此子而敢生之何也文頓首因曰君所以不舉五月子者何故嬰曰五月子者長與戶齊將不利其父母索隱風俗通云俗說五月五日生子男害父女害母也文曰人生受命於天乎將受命於戶邪嬰默然文曰君用事相齊至今三王矣齊不加廣而君私家富纍萬金門下不見一賢者文聞將門必有將相門必有相今君後宮蹈綺縠而士不得裋褐索隱裋音豎豎褐謂褐衣而豎裁之以其省而便事也僕妾餘粱肉而士不厭糟糠今君又尚厚積餘藏欲以遺所不知何人索隱遺音唯季反猶言不知欲遺與何人也而忘公家之事日損文竊怪之漢書公孫弘傳凡為丞相御史六歲年八十終丞相位其後李蔡嚴青翟趙周石慶公孫賀劉屈氂繼踵為丞相自蔡至慶丞相府客館邱虛而已師古曰言不能進賢故不繕修其室屋也虛讀曰墟至賀屈氂時壞以為馬廄車庫奴婢室矣漢書董仲舒傳夫不素養士而欲求賢譬猶不瑑玉而求文采也宋祁曰景祐本瑑作琢當從此本漢書衛青傳贊曰蘇建嘗說責大將軍至尊重而天下之賢士大夫無稱焉師古曰言不為賢士大夫所稱譽願將軍觀古名將所招選者勉之哉師古曰勸令招賢薦士也青謝曰自魏其武安之厚賓客天子常切齒彼親待士大夫招賢黜不肖者人主之柄也人臣奉法遵職而已何與招士尊賢第三前漢谷永對策曰治天下者尊賢考功則治簡賢違功則亂後漢陳蕃傳遷樂安太守郡人周璆高潔之士前後郡守招命莫肯至唯蕃能致焉特為置一榻去則縣之後漢徐稚傳陳蕃為太守藩在郡不接賓客唯稚來特設一榻去則縣之後漢鄭康成傳國相孔融深重於康成屣履造門屣謂納履未正曳之而行言趨賢急也告高密縣為康成特立一鄉曰昔齊置士鄉越有君子軍皆異賢之意也吳越相攻越王勾踐乃中分其師為左右軍以其私卒君子六千人為中軍注云君子王所親近有志行者見國語今鄭君鄉宜曰鄭公鄉箋證漢書谷永傳建始三年冬日食地震同日俱發詔舉方正直言極諫之士太常陽城侯劉慶忌舉永待詔公車對曰治天下者尊賢考功則治簡賢違功則亂師古曰簡略也謂輕慢也後漢書陳蕃傳初仕郡舉孝廉除郎中遭母憂棄官行喪服闋刺史周景辟舉駕從事以諫爭不合投傳而去投棄也傳謂符也音丁戀反後公府辟舉方正皆不就太尉李固表薦徵拜議郎再遷為樂安太守時李膺為青州刺史名有威政屬城聞風皆自引去蕃獨以清績留郡人周璆高潔之士璆音仇又巨秋反前後郡守招命莫肯至唯蕃能致焉字而不名特為置一榻去則縣之後漢書徐稚傳徐稚字孺子豫章南昌人也家貧常自耕稼非其力不食恭儉義讓所居服其德屢辟公府不起時陳蕃為太守以禮請署功曹稚不免之既謁而退蕃在郡不接賓客唯稚來特設一榻去則縣之後漢書鄭玄傳鄭玄字康成北海內密人也八世祖崇哀帝時尚書僕射玄少為鄉嗇夫前書曰鄉有嗇夫掌聽訟收賦稅也得休歸常詣學官不樂為吏父數怒之不能禁遂造太學受業乃西入關因涿郡盧植事扶風馬融融門徒四百餘人升堂進者五十餘生會融集諸生考論圖緯聞玄善算乃召見於樓上玄因從質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣國相孔融深敬於玄屣履造門屣謂納履未正曳之而行言趨賢急也告高密縣為玄特立一鄉曰昔齊置士鄉越有君子軍皆異賢之意也吳越相攻越王勾踐乃中分其師為左右軍以其私卒君子六千人為中軍注云君子王所親近有至行者見國語今鄭君鄉宜曰鄭公鄉殺勢尊賢第四史記周公世家周公使其子伯禽代就封於魯周公戒伯禽曰我文王之子武王之弟成王之叔父我於天下亦不賤矣然我一沐三捉髮一飯三吐哺起以待土猶恐失天下之賢人子之魯慎無以國驕人史記孔子世家孔子由大司寇攝相事有喜色門人曰聞君子禍至不懼福至不喜孔子曰有是言也不曰樂其以貴下人乎前漢盧綰傳豨少時常稱慕魏公子及將守邊招致賓客常告過趙賓客隨之者千餘乘邯鄲官舍皆滿豨所以待客如布衣交皆出客下言屈己禮之不以富貴自尊大前漢當時為大吏戒門下客至亡貴賤亡留門者執賓主之禮以其貴下人後漢傳毅傳車騎將軍馬防外戚尊重請毅為軍司馬待以師友之禮後漢高彪傳昔周公旦父文兄武九命作伯以尹華夏猶揮沐吐餐垂接白屋故周道以隆天下歸德後漢李充傳充遷侍中大將軍鄧騭貴戚傾時無所下借以充高節每卑下之新唐宇文士及以本官撿校涼州都督時突厥數入寇士及欲立威以鎮耀邊鄙每出入盛陳兵衛又痛折節下士餘見師臣門阮籍傳箋證史記魯周公世家周公旦者周武王弟也周公恐天下聞武王崩而畔周公乃踐阼代成王攝行政當國於是卒相成王而使其子伯禽代就封於魯周公戒伯禽曰我文王之子武王之弟成王之叔父我於天下亦不賤矣然我一沐三握髮一飯三吐哺起以待士猶恐失天下之賢人子之魯慎無以國驕人史記孔子世家孔子生魯昌平鄉陬邑其先宋人也曰孔防叔防叔生伯夏伯夏生叔梁紇紇與顏氏女野合而生孔子孔子年五十六由大司寇行攝相事有喜色門人曰聞君子禍至不懼福至不喜孔子曰有是言也不曰樂其以貴下人乎漢書盧綰傳盧綰豐人也與高祖同里以陳豨事見疑而敗豨者宛句人也豨少時常稱慕魏公子師古曰謂信陵君無忌及將守邊招致賓客常告過趙師古曰因休告之假而過趙賓客隨之者千餘乘邯鄲官舍皆滿豨所以待客如布衣交皆出客下師古曰言屈已禮之不以富貴自尊大漢書鄭當時傳鄭當時字莊陳人也武帝即位當時稍遷為魯中尉濟南太守江都相至九卿為右內史以武安魏其時議貶秩為詹事遷為大司農當時為大吏戒門下客至亡貴賤亡留門下者宋祁曰卲本無下字執賓主之禮以其貴下人後漢書傅毅傳傅毅字武仲扶風茂陵人也少博學永平中於平陵習章句因作迪志詩建初中肅宗博召文學之士以毅為蘭臺令史拜郎中與班固賈逵共典校書毅追美孝明皇帝功德最盛而廟頌未立乃依清廟作顯宗頌十篇奏之清廟詩周頌篇名序文王之德也由是文雅顯於朝廷車騎將軍馬防外戚尊重請毅為軍司馬待以師友之禮後漢書高彪傳高彪字義方吳郡無錫人也家本單寒至彪為諸生遊太學有雅才而訥於言常從馬融欲訪大義融疾不獲見乃覆刺遺融書曰昔周公旦父文兄武九命作伯以尹華夏猶揮沐吐餐垂接白屋白屋匹夫也故周道以隆天下歸德後漢書李充傳李充字大遜陳留人也家貧兄弟六人同食遞衣和帝公車徵不行延平中詔公卿中二千石各舉隱士大儒務取高行以勸後進特徵充為博士時魯平亦為博士每與集會常歎服焉充遷侍中大將軍鄧騭貴戚傾時無所下借以充高節每卑敬之新唐書宇文士及傳宇文士及字仁人京兆長安人武德八年權檢校侍中兼太子詹事王即位拜中書令真食益州七百戶以本官檢校涼州都督時突厥數入寇士及欲立威以鎮耀邊鄙每出入盛陳兵衛又痛折節下士不尊賢第五史記晉世家襲滅虞虜虞公及其大夫井伯百里奚以媵秦穆姬穆姬獻公女送女曰媵以屈辱之前漢高祖紀酈食其求見沛公沛公方踞床使兩女子洗酈生曰足下必欲誅無道秦不宜踞見長者前漢鄒陽曰欲使天下寥廓之士籠於威重之權脅於位勢之貴回面汙行以事諂諛之人而求親近於左右則士有伏死堀穴巖藪之中耳安有盡忠信而趨闕下者哉後漢井丹傳建武未沛王輔等五王皆好賓客更遣請丹不能致信陽侯陰就光烈皇后弟也以外戚貴盛乃詭說五王求錢千萬約能致丹而別使人要劫之丹不得巳既至就故為設麥飯蔥葉之食丹推去之曰以君侯能供甘旨故來相過何其薄乎更置盛饌乃食後漢禰衡傳孔融既愛衡才數稱述於曹操操欲見之而衡數有恣言操懷忿而以其才名不欲殺之聞衡善擊鼓乃召為鼓史因大會賓客閲試音節諸史過者皆令脫其故衣更著岑牟單絞之服衡進至操前而止史訶之曰鼓史何不改裝衡於是先解衵衣次釋餘服祼身而立徐取岑牟單絞而著之畢復參撾而去顏色不怍操笑曰本欲辱衡衡反辱孤孔融退而數之曰正平大雅固當爾邪雅正也言大雅君子不當爾箋證史記晉世家晉復假道於虞以伐虢虞之大夫宮之奇諫虞君曰晉不可假道也虞公不聽遂許晉宮之奇以其族去虞其冬晉滅虢虢公醜奔周還襲滅虞虜虞公及其大夫井伯百里奚正義南雍州記云百里奚宋井伯宛人也以媵秦穆姬集解杜預曰穆姬獻公女送女曰媵以屈辱之漢書高帝紀沛公從碭北攻昌邑遇彭越越助攻昌邑未下沛公西過高陽酈食其為里監門蘇林曰監門門卒也曰諸將過此者多吾視沛公大度乃求見沛公沛公方踞床使兩女子洗酈生不拜長揖曰足下必欲誅無道秦不宜踞見長者漢書鄒陽傳景帝少弟梁孝王貴盛亦待士於是鄒陽枚乘嚴忌知吳不可說皆去之梁從孝王游陽為人有智略慷慨不苟合介於羊勝公孫詭之間勝等疾陽惡之孝王師古曰惡謂讒毀也孝王怒下陽吏將殺之陽客游以讒見禽恐死而負絫乃從獄中上書曰今欲使天下寥廓之士籠於威重之權脅於位勢之貴師古曰寥廓遠大之度也脅迫也回面汙行以事諂諛之人而求親近於左右則士有伏死堀穴巖藪之中耳師古曰堀與窟同澤無水曰藪安有盡忠信而趨闕下者哉後漢書逸民列傳井丹傳井丹字大春扶風郿人也少受業太學通五經善談論故京師為之語曰五經紛綸井大春紛綸猶浩博也建武末沛王輔等五王居北宮皆好賓客更遣請丹不能致信陽侯陰就光烈皇后弟也以外戚貴盛乃詭說五王求錢千萬約能致丹而別使人要劫之丹不得已既至就故為設麥飯葱葉之食丹推去之曰以君侯能供甘旨故來相過何其薄乎更致盛饌乃食後漢書文苑列傳禰衡傳禰衡字正平平原般人也少有才辨而氣尚剛傲好矯時慢物唯善魯國孔融及弘農楊修融亦深愛其才融既愛衡才數稱述於曹操操欲見之而衡素相輕疾自稱狂病不肯往而數有恣言操懷忿而以其才名不欲殺之聞衡善擊鼓乃召為鼓史因大會賓客閲試音節諸史過者皆令脫其故衣更著岑牟單絞之服次至衡衡方為漁陽參撾蹀躞而前容態有異聲節悲壯聽者莫不慷慨衡進至操前而止吏訶之曰鼓史何不改裝而輕敢進乎衡曰諾於是先解衵衣杜預注左傳曰衵近身衣也音女一反次釋餘服裸身而立徐取岑牟單絞而著之畢復參撾而去顏色不怍怍羞也操笑曰本欲辱衡衡反辱孤孔融退而數之曰正平大雅固當爾邪雅正也言大雅君子不當爾殺戮賢智第六史記微子世家王子比干者亦紂之親戚也見箕子諫不聽而為奴則曰君有過而不以死爭則百姓何辜乃直言諫紂紂怒曰吾聞聖人之心有七竅信有諸乎乃遂殺比干刳視其心史記孔子世家孔子既不得用於衛將西見趙簡子至於河而聞竇鳴犢舜華之死也臨河而歎曰美哉水洋洋乎丘之不濟此命也夫子貢曰何謂也孔子曰竇鳴犢舜華晉國之賢大夫也丘聞刳胎殺夭則騏驎不至郊竭澤涸漁則蛟龍不合陰陽覆巢毀卯則鳳皇不翔何則君子諱傷其類也夫鳥獸之於不義也尚知辟之而況乎丘哉後漢李業傳公孫述僭號素聞業賢召之若起則受公侯之位不起賜之藥業不從遂飲毒而死述聞業死大驚又恥有殺賢之名乃遣使吊祠賻贈百匹業子翬逃辭不受後漢范滂傳建寧二年大誅黨人急捕滂等滂白母曰仲慱孝恭足以供養滂從龍舒君歸黃泉存亡各得其所惟大人割不可忍之恩勿增感戚母曰汝今得與李杜齊名死亦何恨李膺杜密既有令名復求壽考可兼得乎後漢陳蕃傳李膺等以黨事下獄蕃因上疏極諫曰伏見李膺杜密范滂等正身旡點死心社稷以忠忤旨橫加考案或禁錮閉隔或死徒非所杜塞天下之口聾盲一世之人與秦焚書坑儒何以為異後漢襄楷傳上疏曰太原太守劉瓆南陽太守成瑨志除姦邪而陛下受閹豎之譖公遂加考逮臣聞殺旡罪誅賢者禍及三世黃石公三略曰傷賢者殃及三出蔽賢者身當其害達賢者福流子孫疾賢者名不全後漢志桓帝之未京都童謠曰茅田一頃中有井四方纖纖不可整嚼復嚼令年尚可後年鐃風俗通作譊案易曰拔茅茹以其彙征吉茅喻群賢也井者法也茅田一頃者言群賢衆多也中有井者言誰厄窮不失其法度也四方纖纖不可整者言姦慝大熾不可整元嚼復嚼者京都飲酒相強之辭也言食肉者鄙不恤王政徒耽宴飲歌呼而已也今年尚可者言但禁錮也後年鐃者陳竇被誅天下大壞後漢蔡雍傳卓重雍才學厚相遇待曰卓被誅雍在司徒王允坐殊不意言之而歎有動於色允勃然叱之曰董卓國之大賊所宜同忿而反相傷痛豈不共為逆哉即收付廷尉治罪雍陳辭謝乞黥首刖足繼成漢史士大夫多矜救之不能得太尉馬日磾馳往謂允曰雍曠世逸才多識漢事多續成後史為一代大典而所坐旡名旡乃失人望乎允曰昔武帝不殺司馬遷使作謗書流於後世凡史官記事善惡必書謂遷所著史記但是漢家不善之事皆為謗也即高祖善家令之言武帝算緍榷酤之類是也班固集云遷成一家之言至以身陷刑故微文刺言貶損當世非誼士也方今國祚中衰不可令佞臣執筆在幼君左右既旡益聖德復使吾黨蒙其訕議日磾退而告人曰王公其不長世乎善人國之紀也制作國之典也滅紀廢典其能久乎雍遂死獄中晉陳安斬魯馮曜聞馮死悲慟曰賢人者天下之望也害賢人是塞天下之情夫承平之君猶不敢乖臣妾之心況於四海乎新唐顏真卿傳會李希烈陷汝州盧杞奏曰真卿四方所信若往諭之可不勞師而定上從之朝廷羞色李勉以為失一元老貽朝廷羞其後果縊殺之箋證史記宋微子世家箕子者紂親戚也紂為淫泆箕子諫不聽人或曰可以去矣箕子曰為人臣諫不聽而去是彰君之惡而自說於民吾不忍為也乃被髮佯狂而為奴遂隱而鼓琴以自悲王子比干者亦紂之親戚也見箕子諫不聽而為奴則曰君有過而不以死爭則百姓何辜乃直言諫紂紂怒曰吾聞聖人之心有七竅信有諸乎乃遂殺王子比干刳視其心史記孔子世家孔子既不得用於衛將西見趙簡子至于河而聞竇鳴犢舜華之死也臨河而嘆曰美哉水洋洋乎丘之不濟此命也夫子貢趨而進曰敢問何謂也孔子曰竇鳴犢舜華晉國之賢大夫也趙簡子未得志之時須此兩人而後從政及其已得志殺之乃從政丘聞之也刳胎殺夭則麒麟不至郊竭澤涸漁則蛟龍不合陰陽覆巢毀卵則鳳皇不翔何則君子諱傷其類也夫鳥獸之於不義也尚知辟之而况乎丘哉後漢書李業傳李業字巨游廣漢梓潼人也少有志操元始中舉明經除為郎元始平帝年也會王莽居攝業以病去官杜門不應州郡之命終莽之世及公孫述僣號素聞業賢徵之欲以為博士業固疾不起數年述羞不致之乃使大鴻臚尹融持毒酒奉詔命以劫業若起則受公侯之位不起賜之以藥融譬旨曰方今天下分崩孰知是非而以區區之身試於不測之淵乎朝廷貪慕名德曠官缺位于今七年四時珍御不以忘君宜上奉知己下為子孫身名俱全不亦優乎今數年不起猜疑寇心凶禍立加非計之得者也業乃歎曰危國不入亂國不居論語孔子曰危邦不入亂邦不居天下有道則見無道則隱親於其身為不善者義所不從君子見危授命論語曰親於其身為不善者君子不入又曰君子見危授命見得思義何乃誘以高位重餌哉融見業辭志不屈復曰宜呼室家計之業曰以丈夫斷之於心久矣何妻子之為遂飲毒而死述聞業死大驚又恥有殺賢之名乃遣使弔祠賻贈百匹業子翬逃辭不受後漢書范滂傳范滂字孟博汝南征羌人也少厲清節為州里所服舉孝廉光祿四行漢官儀曰光祿舉敦厚質朴遜讓節儉此為四行也建寧二年遂大誅黨人詔下急捕滂等督郵吳導至縣抱詔書閉傳舍伏牀而泣傳驛舍也音知戀反滂聞之曰必為我也即自詣獄縣令郭揖大驚出解印綬引與俱亡曰天下大矣子何為在此滂曰滂死則禍塞何敢以罪纍君又令老母流離乎其母就與之訣滂白母曰仲博孝敬足以供養仲博滂弟也滂從龍舒君歸黃泉謝承書曰滂父顯故龍舒侯相也存亡各得其所惟大人割不可忍之恩勿增感戚母曰汝今得與李杜齊名死亦何恨李膺杜密既有令名復求壽考可兼得乎後漢書陳蕃傳九年李膺等以黨事下獄考實蕃因上疏極諫曰臣聞賢明之君委心輔佐亡國之主諱聞直辭伏見前司隸校尉李膺太僕杜密太尉掾范滂等正身無玷死心社稷以忠忤旨橫加考案或禁錮閉隔或死徙非所杜塞天下之口聾盲一世之人與秦焚書坑儒何以為異後漢書襄楷傳襄楷字公矩平原隰陰人也好學博古善天文陰陽之術桓帝時宦官專朝政刑暴濫又比失皇子災異尤數延熹九年楷自家詣闕上疏曰太原太守劉瓆南陽太守成瑨志除姦邪其所誅翦皆合人望而陛下受閹豎之譖乃遠加考逮三公上書乞哀瓆等不見採察而嚴被譴讓憂國之臣將遂杜口矣臣聞殺無罪誅賢者禍及三世黃石公三略曰傷賢者殃及三世蔽賢者身當其害達賢者福流子孫疾賢者名不全後漢書五行志桓帝之末京都童謠曰茅田一頃中有井四方纖纖不可整嚼復嚼今年尚可後年鐃風俗通作譊案易曰拔茅茹以其彙征吉茅喻群賢也井者法也茅田一頃者言群賢衆多也中有井者言雖厄窮不失其法度也四方纖纖不可整者言姦慝大熾不可整理嚼復嚼者京都飲酒相強之辭也言食肉者鄙不恤王政徒耽宴飲歌呼而已也今年尚可者言但禁錮也後年鐃者陳竇被誅天下大壞卷二十三案五行志為梁劉昭補并注後漢書蔡雍傳卓重雍才學厚相遇待及卓被誅雍在司徒王允坐殊不意言之而歎有動於色允勃然叱之曰董卓國之大賊幾傾漢室君為王臣所宜同忿而懷其私遇以忘大節今天誅有罪而反相傷痛豈不共為逆哉即收付廷尉治罪雍陳辭謝乞黥首刖足繼成漢史士大夫多矜救之不能得太尉馬日磾馳往謂允曰伯喈曠世逸才多識漢事當續成後史為一代大典且忠孝素著而所坐無名誅之無乃失人望乎允曰昔武帝不殺司馬遷使作謗書流於後世凡史官記事善惡必書謂遷所著史記但是漢家不善之事皆為謗也非獨指武帝之身即高祖善家令之言武帝算緍榷酤之類是也班固集云司馬遷著書成一家之言至以身陷刑故微文刺譏貶損當世非誼士也方今國祚中衰神器不固不可令佞臣執筆在幼主左右既無益聖德復使吾黨蒙其訕議日磾退而告人曰王公其不長世乎善人國之紀也制作國之典也滅紀廢典其能久乎雍遂死獄中晉書劉曜傳劉曜字永明元海之族子也少孤見養於元海幼而聰慧有奇度魯憑對安大哭曰吾不忍見陳安之死也安怒命斬之憑曰死自吾分懸吾頭於秦州通衢觀趙之斬陳安也遂殺之曜聞憑死悲慟曰賢人者天下之望也害賢人是塞天下之情夫承平之君猶不敢乖臣妾之心況於四海乎新唐書顏真卿傳李希烈陷汝州杞乃建遣真卿四方所信若往諭之可不勞師而定詔可公卿皆失色李勉以為失一元老貽朝廷羞嫉賢第七史記孔子世家楚昭王欲以書則地七百里封孔子楚令尹子西曰王之使使諸侯有如子貢者乎曰旡有王之輔相有如顏回者乎曰旡有王之將率有如子路者乎曰旡有王之官尹有如宰豫者乎曰旡有且楚之祖封於周號為子男五十里今孔丘述三王之法明周召之業王若用之則楚安得世世堂堂方數千里乎夫文王在豐武王在鎬百里之君卒王天下今孔丘得據土壤賢弟子為佐非楚之福也昭王乃止前漢公孫弘性意忌外寬內深諸常與有隙旡近遠雖陽與善後竟報其過殺主父偃徙董仲舒膠西皆公孫力也後漢襄楷傳注黃石公三略曰達賢者福流子孫疾賢者名不全新唐李逢吉傳逢吉性忌前險譎多端及得位務償好惡裴度討淮西逢吉慮成功密圖沮止箋證史記孔子世家使子貢至楚楚昭王興師迎孔子然後得免昭王興以書社地七百里封孔子集解服虔曰書籍也索隱古者二十五家為里里則各立社則書社者書其社之人名於籍蓋以七百里書社之人封孔子也故下冉求云雖纍千社而夫子不利是也楚令尹子西曰王之使使諸侯有如子貢者乎曰無有王之輔相有如顏回者乎曰無有王之將率有如子路者乎曰無有王之官尹有如宰豫者乎曰無有且楚之祖封於周號為子男五十里今孔丘述三王之法明周召之業王若用之則楚安得世世堂堂方數千里乎夫文王在豐武王在鎬百里之君卒王天下今孔丘得據土壤賢弟子為佐非楚之福也昭王乃止漢書公孫弘傳故人賓客仰衣食奉祿皆以給之家無所餘然其性意忌外寬內深師古曰意忌多所忌害也諸常與弘有隙宋祁曰南本常作嘗無近遠雖陽與善後竟報其過殺主父偃徙董仲舒膠西皆弘力也後漢襄揩傳注黃石公三略曰達賢者福流子孫疾賢者名不全新唐書李逢吉傳李逢吉字虛舟系出隴西父顏有錮疾逢吉自料醫劑遂通方書舉明經又擢進士第元和時拜門下侍郎同中書門下平章事詔禮部尚書王播署榜逢吉性忌刻險譎多端及得位務償好惡裴度討淮西逄吉慮成功密圖沮止
