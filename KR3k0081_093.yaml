body:
  text: 卷第九十三蝗不入境第一後漢卓茂傳為時天下大蝗河南二十餘縣皆被其災獨不入密縣界督郵言之太守不信自出案行見乃服焉後漢魯恭傳拜中牟令建初七年郡國螟傷稼犬牙緣界不入中牟後漢戴封傳遷西華令時汝穎有蝗災獨不入西華界時督郵行縣蝗忽大至督郵其日即去蝗亦頓除一境奇之後漢公沙穆傳遷洪農令縣界有螟蟲食稼百姓惶懼穆乃設壇謝曰百姓有過罪穆之由請以身禱於是暴雨既霽而螟蟲自銷百姓稱曰神明後漢宋均傳遷九江太守中元元年山陽楚沛多蝗其飛至九江界者輒東西散去由是名稱遠近後漢趙喜傳遷喜平原太守擢舉義行誅鋤姦惡後清州大蝗侵入平原界輒死歲屢有年百姓歌之箋證後漢書卓茂傳河南郡為置守令茂不為嫌理事自若數年教化大行道不拾遺平帝時天下大蝗河南二十餘縣皆被其災獨不入密縣界督郵言之太守不信自出案行見乃服焉後漢書魯恭傳拜中牟令建初七年郡國螟傷稼犬牙緣界不入中牟後漢書戴封傳遷西華令時汝穎有蝗災獨不入西華界時督郵行縣蝗忽大至督郵其日即去蝗亦頓除一境奇之後漢書公沙穆傳公沙穆字文乂北海膠東人也家貧賤自為兒童不好戲弄長習韓詩公羊春秋尤鋭思河洛推步之術遷洪農令縣界有螟蟲食稼百姓惶懼穆乃設壇謝曰百姓有過罪穆之由請以身禱於是暴雨既霽而螟蟲自銷百姓稱曰神明後漢書宋均傳遷九江太守中元元年山陽楚沛多蝗其飛至九江界者輒東西散去由是名稱遠近後漢書趙喜傳其年遷喜平原太守擢舉義行誅鋤姦惡後青州大蝗侵入平原界輒死歲屢有年百姓歌之外戶不閉第二史記鄭子産傳為相一年豎子不戲狎班白不提挈僮子不犁畔二年市不豫賈三年門不夜開道不拾遺後漢王渙傳除溫令境內清夷商人露宿於道其有放牛者輒云以屬稚子終無侵犯魏管輅傳時輅之鄰里外戶不閉無相偷竊者新唐魏徵傳曰即位四年戶闔不閉行旅不齎糧取給於道新唐田仁會傳五遷勝州都督境有夙賊依山剽行人仁會發騎捕格夷之城門夜開道旡冠迹箋證史記鄭子産傳為相一年豎子不戲狎班白不提挈僮子不犁畔二年市不豫賈三年門不夜關道不拾遺後漢書王渙傳州舉茂才除溫令縣多姦猾積為人患渙以方略討擊悉誅之境內清夷商人露宿於道其有放牛者輒云以屬稚子終無侵犯三國志魏志管輅傳當此之時輅之鄰里外戶不閉無相偷竊者新唐書魏徵傳曰即位四年東薄海南逾嶺戶闔不閉行旅不齎糧取給於道新唐書田仁會傳五遷勝州都督境有夙賊依山剽行人仁會發騎捕格夷之城門夜開道無寇盜謠語第三史記參為漢相國百姓歌之曰蕭何為法講若畫一曹參代之守而勿失載其清靜民以寧一史記衛子夫立為皇后后弟貴震天下天下歌之曰生男無喜生女無怒獨不見衛子夫霸天下前漢溝洫志史起為鄴令遂引漳水溉鄴以富魏之河內民歌之曰鄴有賢令兮為史公決漳水兮灌鄴旁終古舄鹵兮生稻梁前漢溝洫志趙中大夫白公復奏穿渠引涇水民得其饒歌之曰田於河所池陽谷口鄭國在前白渠起後舉鍤為雲決渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師百万之口前漢馮立傳為西河上郡立在職公廉與野王相代歌之曰大馮君小馮君兄弟繼踵相因循聰明聖智惠吏民政如魯衛德化均周公康叔猶二君前漢王尊王章傳贊曰自孝武置左馮翊右扶風京兆尹而吏民為之語曰前有趙張後有二王後漢漁陽太守開稻田八千餘頃勸民耕種以致豐富百姓歌曰桑無附枝麥秀兩岐張君為政樂不可支後漢廉范傳字叔度為蜀郡太守舊制禁民夜作以防火災范乃毀削先令但嚴使儲水而已百姓歌之曰廉叔度來何暮不禁火民安作平生無襦今五褲袴作協韻音則護反後漢黨錮傳遷魏郡太守人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之狗犬不驚足下生氂含哺鼓腹焉知凶災我嘉我生獨丁斯時善哉岑君於戲在茲後漢皇甫嵩傳嵩奏請冀州一年田租以贍飢民百姓歌曰天下大亂兮市為墟子兮妻失夫賴得皇甫兮復汝居後漢郭賀傳賀字喬卿為荊州剌史到官有殊政百姓歌曰厥德仁明郭喬卿忠正朝廷上下平後漢李燮傳拜京兆詔發西園錢君上封事遂止不發吏民愛敬乃謠曰我府君道教舉恩如春威如虎剛不吐弱不茹愛如母訓如父後漢杜詩傳遷南陽太守造作水排鑄為農器用力少見功多百姓便之時人方於召信臣故南陽為之語曰前有召父後有杜母蜀諸葛亮傳亮卒注百姓諺曰死諸葛走生仲達吳周瑜傳瑜少精意於音樂雖三爵之後其有闕誤瑜必知之知之必顧故時人謠曰曲復誤周郎顧吳王談傳字世容為成武令民服德化宿惡奔迸父老歌曰王世容治無雙省徭役盜賊空晉王祥傳為別駕時人歌之曰海沂之康實賴王祥邦國不空別駕之功晉裴秀傳秀年十餘歲時人謠曰後進領袖有裴秀晉諸葛恢字道明荀闓字道明蔡謨字道明有名譽號曰中興三明時人歌曰京師三明各有名蔡氏襦雅荀葛清晉束晢太康中大旱晢為邑人請兩三日歌曰束先生通神明請天三日甘雨零我黍以育我稷以生何以酬之報束先生新唐薛大鼎傳遷浩州刺史纍徙滄州賈流行里民歌曰新溝通舟楫利屬滄海魚鹽至昔徒行今騁驅美哉薛公德滂被新唐田仁會傳永徽年授平州刺史時旱自暴以祈而雨大至榖遂登人歌曰父母育我兮田使君挺精誠兮上天聞田中致雨兮山出雲倉廩實兮禮義申願君常在兮不患貧餘見貪後漢又見廉潔鄧攸傳又見殺戮賢智後漢志箋證史記曹相國世家參為漢相國出入三年卒諡懿侯子窋代侯百姓歌之曰蕭何為法顜若畫一曹參代之守而勿失載其清淨民以寧一集解徐廣曰顜音古項反一音較索隱漢書顜作講畫訓直又訓明言法明直若畫一也講亦作覯小顏云覯和也畫一言其法整齊也史記外戚世家衛子夫立為皇后后弟貴震天下天下歌之曰生男無喜生女無怒獨不見衛子夫霸天下漢書溝洫志於是以史起為鄴令遂引漳水溉鄴以富魏之河內民歌之曰鄴有賢令兮為史公決漳水兮灌鄴旁終古舄鹵兮生稻粱漢書溝洫志後十六歲太始二年趙中大夫白公復奏穿渠引涇水民得其饒歌之曰田於何所池陽谷口鄭國在前白渠起後舉臿為雲決渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口漢書馮立傳數年遷五原太守徙西河上郡立居職公廉治行略與野王相似吏民嘉美野王立相代為太守歌之曰大馮君小馮君兄弟繼踵相因循聰明賢知惠吏民政如魯衛德化鈞周公康叔猶二君漢書趙尹韓張兩王傳贊曰自孝武置左馮翊右扶風京兆尹而吏民為之語曰前有趙張後有三王後漢書張堪傳張堪字君遊南陽宛人也中郎將來歙薦堪召拜郎中三遷為謁者後領驃騎將軍杜茂營擊破胸奴於高柳拜漁陽太守捕擊姦猾賞罰必信吏民皆樂為用開稻田八千餘頃勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張君為政樂不可支後漢書廉范傳廉范字叔度為蜀郡太守舊制禁民夜作以防火災而更相隱蔽燒者日屬范乃毀削先令但嚴使儲水而已百姓為便乃歌之曰廉叔度來何暮不禁火民安作平生無襦今五褲作協韻音則護反後漢書岑熙傳遷魏郡太守招聘隱逸與參政事無為而化視事二年輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂含哺鼓腹焉知凶災我喜我生獨丁斯時美矣岑君於戲休茲後漢書皇甫嵩傳以黃巾既平故改年為中平嵩奏請冀州一年田租以贍飢民帝從之百姓歌曰天下大亂兮市為墟母不保子兮妻失夫賴得皇甫兮復安居後漢書郭賀傳賀字喬卿拜荊州剌史引見賞賜恩寵隆異及到官有殊政百姓便之歌曰厥德仁明郭喬卿忠正朝廷上下平藝文類聚人部三謳謠引續漢書李燮拜京兆詔發西園錢君上封事遂止不發吏民愛敬乃謠曰我府君道教舉恩如春威如虎剛不吐弱不茹愛如母訓如父後漢書杜詩傳七年遷南陽太守造作水排鑄為農器用力少見功多百姓便之又修治陂池廣拓土田郡內比室殷足時人方於召信臣故南陽為之語曰前有召父後有杜母三國志蜀志諸葛亮傳注引漢晉春秋曰楊儀等整軍而出百姓奔告宣王宣王追焉薑維令儀反旗鳴鼓若將向宣王者宣王乃退不敢逼於是儀結陳而去入谷然後發喪宣王之退也百姓為之諺曰死諸葛走生仲達或以告宣王宣王曰吾能料生不便料死也三國志吳志周瑜傳瑜少精意於音樂雖三爵之後其有闕誤瑜必知之知之必顧故時人謠曰曲有誤周郎顧藝文類聚人部三謳謠吳録曰王談字世容為成武令民服德化宿惡奔迸父老歌曰王世容治無雙省徭役盜賊空晉書王祥傳徐州刺史呂虔檄為別駕時人歌之曰海沂之康實賴王祥邦國不空別駕之功晉書裴秀傳秀年十餘歲時人為之語曰後進領袖有裴秀藝文類聚人部三謳謠諸葛恢字道明荀闓字道明蔡謨字道明有名譽號曰中興三明時人歌之曰京師三明各有名蔡氏儒雅荀葛清晉書束晢太康中郡界大旱晢為邑人請雨三日而雨注衆謂晢誠感為作歌曰束先生通神明請天三日甘雨零我黍以育我稷以生何以疇之報束長生新唐書薛大鼎傳趙郡王孝恭討輔公祐以大鼎為饒州道軍師引兵度彭蠡湖以功遷浩州刺史纍徙滄州無棣渠久塞大鼎浚治屬之海商賈流行里民歌曰新溝通舟楫利屬滄海魚鹽至昔徒行今騁駟美哉薛公德滂被新唐書田仁會傳永徽中為平州刺史歲旱自暴以祈而雨大至榖遂登人歌曰父母育我兮田使君挺精誠兮上天聞中田致雨兮山出雲倉廩實兮禮義申願君常在兮不患貧得士死力第四史記聶政傳嚴仲子剌韓相俠纍因自皮面決眼以死韓取尸暴於市購問有能言殺相俠纍者豫千金政姊榮伏尸哭曰是聶政者也市行者皆曰何敢來識之也榮曰妾其奈何畏歿身之誅終滅賢弟之名悲衣而死政之旁晉楚齊衛聞之皆曰嚴仲子亦可謂知入能得士矣前漢袁盎傳然盎亦以數直諫不得久居中調為隴西都尉仁愛士卒士卒皆爭為死前漢李陵傳陵將其步卒五千人出居延北行三十日至浚稽山止營舉圖所過山川地形使麾下騎陳步樂還以聞步樂召見道陵將率得士死力上甚説前漢遊俠原涉傳王莽末東方兵起諸王子弟多薦涉能得士死後漢郅壽傳壽為京兆尹雖威嚴而推誠下吏皆願效死莫有欺者後漢耿秉傳秉性勇壯而簡易於事軍行常自被甲在前休止不結營部然遠斥候明要誓有驚軍陳立成士卒皆樂為死後漢穎行軍仁愛士卒疾病者親自瞻省手為裡創在邊十餘年與將士同苦故皆樂為死戰新唐書房喬傳太宗以燉煌公徇渭北杖策上謁軍門一見如舊署渭北道行軍記室參軍征伐未嘗不從衆爭取怪珍玄齡獨收人物致幕府與諸將密相申結人人願盡死力王嘗曰漢光武得鄧禹門人益親今我有玄齡猶禹也箋證史記聶政傳嚴仲子剌韓相俠纍聶政直入上階刺殺俠纍左右大亂聶政大呼所擊殺者數十人因自皮面決眼自屠出腸遂以死韓取聶政尸暴於市購問莫知誰子於是韓縣購之有能言殺相俠纍者豫千金久之莫知也政姊榮伏尸哭極哀曰是軹深井里所謂聶政者也市行者諸將人皆曰此人暴虐吾國相王縣購其名姓千金夫人不聞與何敢來識之也榮應之曰妾其奈何畏歿身之誅終滅賢弟之名大驚韓市人乃大呼天者三卒於邑悲哀而死政之旁晉楚齊衛聞之皆曰嚴仲子亦可謂知人能得士矣漢書爰盎傳然盎亦以數直諫不得久居中調為隴西都尉仁愛士卒士卒皆爭為死漢書李陵傳陵於是將其步卒五千人出居延北行三十日至浚稽山止營舉圖所過山川地形使麾下騎陳步樂還以聞步樂召見道陵將率得士死力上甚説拜步樂為郎漢書遊俠原涉傳王莽末東方兵起諸王子弟多薦涉能得士死可用後漢書郅壽傳壽為京兆尹雖威嚴而推誠下吏皆願效死莫有欺者後漢書耿秉傳秉性勇壯而簡易於事軍行常自被甲在前休止不結營部然遠斥候明要誓有警軍陳立成士卒皆樂為死後漢書段熲傳熲行軍仁愛士卒疾病者親自瞻省手為裹創在邊十餘年未嘗一日蓐寢與將士同苦故皆樂為死戰新唐書房喬傳太宗以燉煌公徇渭北杖策上謁軍門一見如舊署渭北道行軍記室參軍公為秦王即授府記室封臨淄侯征伐未嘗不從衆爭取怪珍玄齡獨收人物致幕府與諸將密相申結人人願盡死力王嘗曰漢光武得鄧禹門人益親今我有玄齡猶禹也天子不得而臣第五後漢周黨傳建武中將妻子居澠池後被召不得已乃著短布單衣榖皮綃頭待見尚書及伏自言願守所志帝乃許焉博士范叔奏毀黨曰見帝廷黨不以禮屈伏而不謁皆大不恭詔曰自古明王聖主必有不臣之士伯夷叔齊不食周粟太原周黨不受朕祿亦各有志焉其賜帛三十匹黨遂隱居澠池而終邑人賢而祠之後漢王霸傳少有清節及王莽篡位棄冠帶絶交宦建武中召到尚書拜稱名不稱臣有司問其故霸曰天子有所不臣諸侯有所不友後漢杜林傳隗囂素聞林志節以為持書平後因疾告去囂復欲令強起遂稱篤囂意雖相望且欲優容之乃出令曰杜伯山天子所不能臣諸侯所不能友蓋伯夷叔齊恥食周粟今且從師友之位林雖拘於囂而終不屈節後漢郭太傳或問范滂曰郭林宗何如人滂曰隱不為親正不絶俗天子不得臣諸侯不得友吾不知其他禮記曰儒有天子下不事魏張臶字子明少遊太學後徙遁常山遷居任縣廣平太守盧育到官三日綱紀白承前致板謁臶育教曰張先生所謂上不事天子下不事諸侯者也豈此板可光飾哉但遣主薄奉書致羊酒之禮箋證後漢書周黨傳周黨字伯况太原廣武人也建武中徵為議郎以病去職遂將妻子居澠池復被徵不得已乃著短布單衣榖皮綃頭待見尚書及光武引見黨伏而不謁自陳願守所志帝乃許焉博士范升奏毀黨曰見帝廷黨不以禮屈伏而不謁皆大不敬書奏天子以示公卿詔曰自古明王聖主必有不賓之士伯夷叔齊不食周粟太原周黨不受朕祿亦各有志焉其賜帛四十匹黨遂隱居澠池著書上下篇而終邑人賢而祠之後漢書王霸傳王霸字儒仲太原廣武人也少有清節及王莽篡位棄冠帶絶交宦建武中徵到尚書拜稱名不稱臣有司問其故霸曰天子有所不臣諸侯有所不友後漢書杜林傳隗囂素聞林志節深相敬待以為持書平後因疾告去辭還祿食囂復欲令強起遂稱篤囂意雖相望且欲優容之乃出令曰杜伯山天子所不能臣諸侯所不能友蓋伯夷叔齊恥食周粟今且從師友之位須道開通使順所志林雖拘於囂而終不屈節後漢書郭太傳或問汝南范滂曰郭林宗何如人滂曰隱不違親貞不絶俗天子不得臣諸侯不得友吾不知其它禮記曰儒有上不臣天子下不事諸侯三國志魏志張臶傳時巨鹿張臶字子明潁川胡昭字孔明亦養志不仕臶少遊太學學兼內外後歸鄉里袁紹前後辟命不應移居上黨并州牧高幹表除樂平令不就徙遁常山門徒且數百人遷居任縣太祖為丞相辟不詣太和中詔求隱學之士能消災復異者郡纍上臶發遣老病不行廣平太守盧育到官三日綱紀白承前致版謁臶育教曰張先生所謂上不事天子下不友諸侯者也豈此版謁所可光飾哉但遣主薄奉書致羊酒之禮以文拜職第六前漢終軍傳少好學年十八選為博士弟子至府受遣太守聞其有異材召見軍甚奇之與交結軍揖太守而去至長安上書言事武帝異其文拜軍為謁者前漢司馬相如傳蜀人楊得意為狗監侍上上讀子虛賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦上驚乃召問相如相如曰有是然此乃諸侯之事未足觀請為天子遊獵之賦上令尚書給筆扎相如以子虛虛言也為楚稱烏有先生者烏有此事也為齊難亡是公者亡是人也欲明天子之義故虛籍此三人為辭以推天子諸侯之苑囿其卒章歸之於節儉因以風諫奏之天子後漢李尤少以文章顯和帝時賈逵薦尤有相如楊雄之風召詣東觀受詔作賦拜蘭臺令史魏濟上萬機論帝善之入為散騎常侍餘見著書班固傳箋證漢書終軍傳終軍字子雲濟南人也少好學以辨博能屬文聞於郡中年十八選為博士弟子至府受遺太守聞其有異材召見軍甚奇之與交結軍揖太守而去至長安上書言事武帝異其文拜軍為謁者給事中漢書司馬相如傳居久之蜀人楊得意為狗監侍上上讀子虛賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦上驚乃召問相如相如曰有是然此乃諸侯之事未足觀請為天子遊獵之賦上令尚書給筆札相如以子虛虛言也為楚稱烏有先生者烏有此事也為齊難亡是公者亡是人也欲明天子之義故虛藉此三人為辭以推天子諸侯之苑囿其卒章歸之於節儉因以風諫奏之天子天子大説後漢書李尤傳李尤字伯仁廣漢雒人也少以文章顯和帝時侍中賈逵薦尤有相如楊雄之風召詣東觀受詔作賦拜蘭臺令史三國志魏志蔣濟傳濟上萬幾論帝善之入為散騎常侍
