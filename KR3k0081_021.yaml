body:
  text: 卷第二十一刑法第一史記律書教笞不可廢於家刑罰不可捐於國誅伐不可偃於天下用之有巧拙行之有順逆耳前漢鼂錯對策曰其立法也非以苦民傷眾而為之機陷也以之興利除害尊主安民而救暴亂也前漢刑法志涿郡太守鄭昌上疏言聖王置諫爭之臣者非以崇德防逸豫之生也立法明刑者非以為治救衰亂之起也今明主躬垂明聽雖不置廷平獄將自正若開後嗣不若刪定律令律令一定愚民知所避姦吏無所弄矣今不正其本而置廷平以理其未也政衰聽怠則廷平將招權而為亂首矣前漢刑法志大刑用甲兵以六師誅暴亂其次用斧鉞斬刑中刑用刀鋸刀割鋸刖其次用鑽鑿鑽鑽去其髕骨鑿黥刑薄刑用鞭扑扑杖也大者陳諸原野小者致之市朝其所由來者上矣後漢郎顗傳王者之法譬猶江河當使易避而難犯後漢三公劾奏司隸校尉虞詡盛夏多拘繫無辜為吏人患詡上書自訟曰法禁者俗之隄防刑罰者人之銜轡禮記曰夫禮禁亂之所由生猶坊止水之所自來也故以舊防為無用壞之者必有水敗尸子曰刑罰者人之鞭策也後漢應劭傳初安帝時河間人尹次潁川人史玉皆坐殺人當死次兄初及玉母軍並詣官曹求代其命因縊而物故尚書陳忠議活次玉劭後追駮之曰殺人者死傷人者刑此百王之定制有法之成科高祖入關雖上約法然殺人者死亦旡寬降夫時化則刑重時亂則刑輕書曰刑罰時輕時重此之謂也今次玉公以清時釋其私憾阻兵安忍僵屍道路朝恩在寬幸至冬獄而初軍愚狷妄自投斃昔召忽親死子糾之難而孔子曰經於溝瀆人莫之知朝氏之父非錯刻峻遂能自隕其命班固亦云不如趙母指括以全其宗傳曰僕妾感慨而致死者非能義勇顧無慮耳夫刑罰威獄以類天之震耀殺戮也溫慈和惠以放天之生殖長育也是故春一草枯則為災秋一木華亦為異今殺旡罪之初軍而活當死之次玉其為枯華不亦然乎陳忠不詳制刑之本而信一時之仁遂廣引八議求生之端夫親故賢能功貴勤賓豈有次玉當罪之科哉若乃小大以情原心定罪此為求生非謂代死可以生也敗法亂政悔其可追劭凡為駮議三十篇皆此類也晉刑法志武帝詔曰夫刑者司理之官理者求情之機情者心神之使心感則情動於中而形於言暢於四支發於事業是故奸人心愧而面赤內怖而色奪論罪者務本其心審其情精其事近取諸身遠取諸物然后乃可以正刑晉杜預傳與車騎將軍賈充等定律令既成預為之注解乃奏之曰法者蓋繩墨之斷例非窮理盡性之書也故文約而例直聽省而禁簡例直易見禁簡難犯易見則人之所避難犯則幾於刑厝厝刑之本在於簡直故必審名分者必忍小理古之刑書銘之鍾鼎鑄之金石所以遠塞異端使無淫巧也今所注皆網羅法意格之以名分使用之者執名例以審趣舍伸繩墨之直去析薪之理也詔班于天下陳武帝令尚書刪定郎范果參定律令又令徐陵等知其事制律三十卷晉齊獻王收之子蕤上疏諫曰罪不相及惡止其身此先哲之鴻謨百王之達制也是故鯀既殛死禹乃嗣興二叔誅放而邢衛旡責逮乎戰國及至秦漢明恕之道寢猜嫌之情用乃立質任以御眾設從罪以發姦其所由來蓋三代之弊法耳隋文帝初令高穎等更定新律其形名有五新唐王志愔傳應正論曰刑賞二柄惟人主操之故曰以九役法者百姓也以死守法者有司也以道變法者君上也新唐刑法志序古之為國者議事以制不為刑辟懼民之知爭端也後世作為刑書惟恐不備俾民之知所避也其為法雖殊而用心則一蓋皆欲民之旡犯也然未知夫導之以德齊之以禮而可使民遷善遠罪而不自知也唐之刑書有四曰律令格式令者尊卑貴賤之等數國家之制度也格者百官有司之所常行之事也式者其所常守之法也凡邦國之政必從事於此三者其有所違及人之為惡而入于罪戾者一斷以律律之為書因隋之舊為十有二第一曰名例二曰衛禁三曰職制四曰戶婚五曰廄庫六曰擅興七曰賊盜八曰鬭訟九曰詐偽十曰雜律十一曰捕亡十二曰斷獄其用刑有五一曰笞笞之為言恥也凡過之小者捶撻以恥之漢用竹後世更以楚書曰扑作教刑是也二曰杖杖者持也可持以擊也書曰鞭作官刑是也三曰徒徒者奴也蓋奴辱之周禮曰其奴男子入于罪隸任之以事寘之圜土而教之量其罪之輕重有年數而捨四曰流書云流宥五刑謂不忍刑殺宥之于遠也五曰死乃古大辟之刑也自隋以前死刑有五曰罄絞斬梟裂而流徒之刑鞭笞兼用數皆踰百至隋始定為笞刑五自十至于五十杖刑五自六十至于百徒刑五自一年至于三年流刑三自一千里至于二千里死刑二絞斬除其鞭刑及梟首轘裂之酷又有議請減贖當免之法唐皆因之箋證史記律書故教笞不可廢於家刑罰不可捐於國誅伐不可偃於天下用之有巧拙行之有逆順耳漢書鼂錯傳錯對曰五伯之佐之為人臣也察身而不敢誣奉法令不容私盡心力不敢矜此可謂方正之士矣其立法也非以苦民傷眾而為之機陷也以之興利除害尊主安民而救暴亂也漢書刑法志時涿郡太守鄭昌上疏言聖王置諫爭之臣者非以崇德防逸豫之生也立法明刑者非以為治救衰亂之起也今明主躬垂明聽雖不置廷平獄將自正若開後嗣不若刪定律令律令一定愚民知所避姦吏無所弄矣今不正其本而置廷平以理其末也政衰聽怠則廷平將招權而為亂首矣漢書刑法志故聖人因天秩而制五禮因天討而作五刑大刑用甲兵張晏曰以六師誅暴亂其次用斧鉞韋昭曰斬刑也中刑用刀鋸韋昭曰刀割刑鋸刖刑也其次用鑽鑿韋昭曰鑽髕刑也鑿黥刑也師古曰鑽鑽去其髕骨也薄刑用鞭扑師古曰扑杖也大者陳諸原野小者致之市朝其所繇來者上矣師古曰繇讀與由同後漢書郎顗傳王者之法譬猶江河當使易避而難犯也後漢書虞詡傳三公劾奏詡盛夏多拘繫無辜為吏人患詡上書自訟曰法禁者俗之堤防刑罰者人之銜轡記曰夫禮禁亂之所由生猶坊止水之所自來也故以舊防為無用瓌之者必有水敗尸子曰刑罰者人之鞭策也後漢書應奉傳附應劭初安帝時河間人尹次潁川人史玉皆坐殺人當死次兄初及玉母軍並詣官曹求代其命因縊而物故尚書陳忠以罪疑從輕議活次玉劭後追駮之據正典刑有可存者其議曰殺人者死傷人者刑此百王之定制有法之成科高祖入關雖尚約法然殺人者死亦無寬降夫時化則刑重時亂則刑輕書曰刑罰時輕時重此之謂也今次玉公以清時釋其私憾阻兵安忍僵屍道路阻持也左傳曰衛州吁阻兵而安忍朝恩在寬幸至冬獄而初軍愚狷妄自投斃昔召忽親死子紏之難而孔子曰經於溝瀆人莫之知召忽齊大夫子紏齊襄公之庶子也子紏與小白爭國子紏被殺召忽其傅也遂死之論語孔子論召忽曰豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也鼂氏之父非錯刻峻遂能自隕其命班固亦云不如趙母指括以全其宗前書鼂錯為御史大夫改更律令諸侯諠譁錯父聞而非之曰劉氏安而鼂氏危矣遂飲藥而死史記曰趙母趙將馬服君趙奢之妻趙括之母也奢死趙欲以括為將母謂趙王曰王以為括如其父父子異心願王勿遣王曰吾計決矣括母曰王終將之即有不稱妾得無隨乎王許諾及括敗王以母先言竟不誅也而班固引之以為鼂錯贊詞傳曰僕妾感慨而致死者非能義勇顧無慮耳夫刑罰威獄以類天之震燿殺戮也溫慈和惠以放天之生殖長育也是故春一草枯則為災秋一木華亦為異今殺無罪之初軍而活當死之次玉其為枯華不亦然乎陳忠不詳制刑之本而信一時之仁遂廣引八議求生之端夫親故賢能功貴勤賓豈有玉次當罪之科哉若乃小大以情原心定罪此為求生非謂代死可以生也敗法亂政悔其可追劭凡為駮議三十篇皆此類也晉書刑法志武帝詔曰夫刑者司理之官理者求情之機情者心神之使心感則情動於中而形於言暢於四支發於事業是故奸人心愧而面赤內怖而色奪論罪者務本其心審其情精其事近取諸身遠取諸物然後乃可以正刑晉書杜預傳杜預與車騎將軍賈充等定律令既成預為之注解乃奏之曰法者蓋繩墨之斷例非窮理盡性之書也故文約而例直聽省而禁簡例直易見禁簡難犯易見則人知所避難犯則幾於刑厝厝刑之本在於簡直故必審名分審名分者必忍小理古之刑書銘之鍾鼎鑄之金石所以遠塞異端使無淫巧也今所注皆網羅法意格之以名分使用之者執名例以審趣舍伸繩墨之直去析薪之理也詔班于天下通典刑制中陳武帝令尚書刪定郎范杲參定律令又令徐陵等知其事制律三十卷卷一百六十四案會史此文大抵據通典引出又案范杲杲隋書作泉又隋書刑法志陳氏承梁季喪亂刑典踈闊及武帝即位思革其弊乃下詔曰朕始膺寶歷思廣政於是稍求得梁時明法吏令與尚書刪定郎范泉參定律令又勑尚書僕射沈欽吏部尚書徐陵兼尚書左丞宗元饒兼尚書右丞賀朗參知其事制律三十卷晉書宣五王列傳司馬蕤冏起義兵趙王倫收蕤及弟北海王寔繫廷尉當誅倫太子中庶子祖納上疏諫曰罪不相及惡止其身此先哲之弘謀百王之達制也是故鯀既殛死禹乃嗣興二叔誅放而邢衛無責逮乎戰國及至秦漢明恕之道寢猜嫌之情用乃立質任以御眾設從罪以發姦其所由來蓋三代之弊法耳通典刑制中隋文帝初令高熲等更定新律其刑名有五又隋書刑法志高祖既受周禪開皇元年乃詔尚書左僕射渤海公高熲上柱國沛公鄭譯上柱國清河郡公楊素大理前少卿平源縣公常明刑部侍郎保城縣公韓濬比部侍郎李諤兼考功侍郎柳雄亮等更定新律奏上之其刑名有五新唐書王志愔傳王志愔博州聊城人以剛鷙為治所居人吏畏讋呼為皁鵰遷大理正所著應正論以見志又言刑賞二柄惟人主操之故曰以力役法者百姓也以死守法者有司也以道變法者君上也新唐書刑法志古之為國者議事以制不為刑辟懼民之知爭端也後世作為刑書惟恐不備俾民之知所避也其為法雖殊而用心則一盖皆欲民之無犯也然未知夫導之以德齊之以禮而可使民遷善遠罪而不自知也唐之刑書有四曰律令格式令者尊卑貴賤之等數國家之制度也格者百官有司之所常行之事也式者其所常守之法也凡邦國之政必從事於此三者其有所違及人之為惡而入于罪戾者一斷以律律之為書因隋之舊為十有二第一曰名例二曰衛禁三曰職制四曰職婚五曰廄庫六曰擅興七曰賊偽八曰鬭訟九曰詐偽十曰雜律十一曰捕亡十二曰斷獄其用刑有五一曰笞笞之為言恥也凡過之小者捶撻以恥之漢用竹後世更以楚書曰扑作教刑是也二曰杖杖者持也可持以擊也書曰鞭作官刑是也三曰徒徒者奴也盖奴辱之周禮曰其奴男子入於罪隸任之以事置之圜土而教之量其罪之輕重有年數而捨四曰流書云流宥五刑謂不忍刑殺宥之于遠也五曰死乃古大辟之刑也自隋以前死刑有五曰罄絞斬梟裂而流徒之刑鞭笞兼用數皆踰百至隋始定為笞刑五自十至于五十杖刑五自六十至于百徒刑五自一年至于三年流刑三自一千里至于二千里死刑二絞斬除其鞭刑及梟首轘裂之酷又有議請減贖當免之法唐皆因之德刑第二前漢賈誼傳上疏曰世主欲民之善同而所以使民善者或異或道之以德教或歐之以法令道之以德教者德教洽而民氣樂歐之以法令者法令極而民風哀哀樂之感禍福之應也前漢谷永傳堯遭洪水天下分絕為十一州制遠之道微而旡乖畔之難者德厚恩深旡怨於下也秦居平土一夫大呼而海內崩析者刑罰深酷吏行殘賊也後漢崔寔政論蓋為國之法有似理身平則養疾則攻焉夫刑罰者治亂之藥石也德教者興平之梁肉也夫以德教除殘是以梁肉理疾也以刑罰理平是以藥石供養也晉武帝紀泰始四年春詔曰古設象刑而眾不犯今雖參夷而姦不絕何德刑相去之遠哉餘見任德不任刑董仲舒傳箋證漢書賈誼傳故世主欲民之善同而所以使民善者或異或道之以德教或敺之以法令師古曰道讀曰導敺與驅同下類此道之以德教者德教洽而民氣樂敺之以法令者法令極而民風哀哀樂之感禍福之應也漢書谷永傳建始三年冬日食地震同日俱發詔舉方正直言極諫之士太常陽城侯劉慶忌舉永待詔公車對曰堯遭洪水之災天下分絕為十二州制遠之道微而無乖畔之難者德厚恩深無怨於下也秦居平土一夫大呼而海內崩析者刑罰深酷吏行殘賊也後漢書崔駰傳附孫崔實論當世便事數十條名曰政論其辭曰蓋為國之法有似理身平則養疾則攻焉夫刑罰者治亂之藥石也德教者興平之粱肉也夫以德教除殘是以粱肉理疾也以刑罰理平是以藥石供養也晉書武帝紀泰始四年春詔曰古設象刑而眾不犯今雖參夷而姦不絕何德刑相去之遠哉任德不任刑第三前漢董仲舒傳王者欲有所為宜求其端於天天道之大者在陰陽陽為德陰為刑刑主殺而德主生是故陽常居大夏而以生育養長為事陰常居大冬積於空虛不用之處以此見天之任德不任刑也王者承天意以從事故任德教而不任刑刑者不可任以治世猶陰之不可任以成歲也為政而任刑不順於天故先王莫之肯為也前漢董仲舒傳武王行大誼平殘賊周公作禮樂以文之至於成康之隆囹圄空虛四十餘年此亦教化之漸而仁誼之流非獨傷肌膚之效也前漢酷吏傳孔子曰導之以政齊之以刑民免而旡恥導之以德齊之以禮有恥且格老氏稱上德不德是以有德下德不失德是以旡德法令滋章盜賊多有信哉是言也法令者治之具而非制治清濁之原也漢興破觚而為圜斲琱而為樸觚方也去嚴刑而從簡易抑巧偽而務敦厚也琱為刻鏤也號為罔漏吞舟之魚而吏治蒸蒸不至於姦蒸蒸純壹之貌也黎民艾安由是觀之在彼不在此言不在於嚴酷也前漢循吏黃霸為穎川守霸力行教化而後誅罰務在成就全安長吏前漢循吏龔遂傳宣帝即位渤海左右郡歲飢盜賊並起丞相御史舉遂上以為渤海太守謂遂曰渤海廢亂君欲何以息其盜賊遂對曰海瀕遐遠不霑聖化其民困於飢寒而吏不恤故使陛下赤子盜弄陛下之兵今欲使臣勝之邪將安之也勝謂以威力克而殺之安謂以德化撫而安之上曰選用賢良固欲安之也遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治臣願丞相御史且旡拘臣以文法得一切便宜從事上許焉至渤海界郡聞新大守至發兵以迎遂皆遣還移書勑屬縣悉罷逐捕盜賊吏諸持鉏釣田器者皆為良民吏毋得問持兵者迺為盜賊遂單車獨行至府郡中翕然盜賊亦皆罷民安土樂業後漢魯恭傳為中牟令恭專以德化為理不任刑罰後漢王暢傳暢拜南陽太守前後二千石逼懼帝鄉貴戚多不稱職暢深疾之下車奮厲威猛其豪黨有釁穢者莫不糾發諸受贓二千萬以上不自首實者盡入財物若其隱伏使吏發屋伐樹堙井夷竈豪右大震功曹張敞諫曰五教在寬著之經典湯去三面八方歸仁武王入商先去炮烙之刑高祖鑒秦唯定三章之法孝文感一緹縈蠲除肉刑卓茂文翁召父之徒皆疾惡嚴刻務崇溫厚仁賢之政流聞後世夫明哲之君網漏吞舟之魚然后三光明於上人物悅於下言之若迂其效甚近發屋伐樹將為嚴烈雖欲懲惡難以聞遠自中興以來功臣將相繼世而隆愚以為懇懇用刑不如行恩孳孳在姦未若禮賢舜舉辠陶不仁者遠隨會為政晉盜奔秦虞芮入境讓心自生化人在德不在用刑暢深納敞諫更崇寬政慎刑簡罰教化遂行後漢伏湛侯霸傳論曰中興以後居台相總權衡多矣其能以任職取名者豈非先遠業後小數哉哉遠業德禮小數名法故惠公造次急於鄉射之禮君防入朝先奏寬大之令夫器博者旡近用道長者其功遠蓋志士仁人所為根心者也君子以之得固貴矣以之失亦得矣新唐陳子昂傳上書諫曰臣聞古之善為天下者計大而不計小務德而不務刑圖其安則思其危謀其利則慮其害然后能長享福祿箋證漢書董仲舒傳王者欲有所為宜求其端於天天道之大者在陰陽陽為德陰為刑刑主殺而德主生是故陽常居大夏而以生育養長為事陰常居大冬而積於空虛不用之處以此見天之任德不任刑也王者承天意以從事故任德教而不任刑刑者不可任以治世猶陰之不可任以成歲也為政而任刑不順於天故先王莫之肯為也漢書董仲舒傳武王行大誼平殘賊周公作禮樂以文之至於成康之隆囹圄空虛四十餘年此亦教化之漸而仁誼之流非獨傷肌膚之效也漢書酷吏傳孔子曰導之以政齊之以刑民免而無恥導之以德齊之以禮有恥且格老氏稱上德不德是以有德下德不失德是以無德法令滋章盜賊多有信哉是言也法令者治之具而非制治清濁之源也漢興破觚而為圜斲琱而為樸孟康曰觚方也師古曰去嚴刑而從簡易抑巧偽而務敦厚也琱謂刻鏤也字與雕同號為罔漏吞舟之魚而吏治蒸蒸不至於姦師古曰蒸蒸純壹之貌也黎民艾安由是觀之在彼不在此師古曰言不在於嚴酷也漢書循吏傳黃霸霸力行教化而後誅罰務在成就全安長吏漢書循吏傳龔遂龔遂字少卿山陽南平陽人也宣帝即位久之勃海左右郡歲饑盜賊並起二千石不能禽制上選能治者丞相御史舉遂可用上以為勃海太守時遂年七十餘召見形貌短小宣帝望見不副所聞心內輕焉謂遂曰勃海廢亂朕甚憂之君欲何以息其盜賊以稱朕意遂對曰海瀕遐遠不霑聖化其民困於饑寒而吏不恤故使陛下赤子盜弄陛下之兵於潢池中耳今欲使臣勝之邪將安之也師古曰勝謂以威力克而殺之安謂以教化撫而安之上聞遂對甚說師古曰說讀曰悅答曰選用賢良固欲安之也遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治臣願丞相御史且無拘臣以文法得一切便宜從事上許焉加賜黃金贈遣乘傳至勃海界郡聞新太守至發兵以迎遂皆遣還移書勑屬縣悉罷逐捕盜賊吏諸持鉏鉤田器者皆為良民吏毋得問持兵者迺為盜賊遂單車獨行至府郡中翕然盜賊亦皆罷民安土樂業後漢書魯恭傳肅宗集諸儒於白虎觀恭特以經明得召與其議熹復舉恭直言待詔公車拜中牟令恭專以教化為理不任刑罰後漢書王龔傳附子王暢暢字叔茂少以清實為稱無所交黨太尉陳蕃薦暢由是復為尚書尋拜南陽太守前後二千石逼懼帝鄉貴戚多不稱職暢深疾之下車奮厲威猛其豪黨有釁穢者莫不紏發會赦事得散暢追恨之更為設法諸受臧二千萬以上不自首實者盡入財物若其隱伏使吏發屋伐樹堙井夷竈豪右大震功曹張敞奏記諫曰五教在寬著之經典湯去三面八方歸仁武王入殷先去炮烙之刑高祖鑒秦唯定三章之法孝文皇帝感一緹縈蠲除肉刑卓茂文翁召父之徒皆疾惡嚴刻務崇德厚仁賢之政流聞後世夫明哲之君網漏吞舟之魚然後三光明於上人物悅於下言之若迂其效甚近發屋伐樹將為嚴烈雖欲懲惡難以聞遠自中興以來功臣將相繼世而隆愚以為懇懇用刑不如行恩孳孳求姦未若禮賢舜舉皋陶不仁者遠論語子夏之辭也隨會為政晉盜奔秦虞芮入境讓心自生化人在德不在用刑暢深納敞諫更崇德政慎刑簡罰教化遂行後漢書伏湛侯霸宋弘傳論曰中興以後居台相總權衡多矣其能以任職取名者豈非先遠業後小數哉遠業謂德禮小數謂名法也故惠公造次急於鄉射之禮君房入朝先奏寬大之令夫器博者無近用道長者其功遠盖志士仁人所為根心者也君子以之得固貴矣以之失亦得矣舊唐書文苑傳陳子昂則天將事雅州討生羌子昂上書曰臣聞古之善為天下者計大而不計小務德而不務刑圖其安則思其危謀其利則慮其害然後能長享福祿又新唐書陳子昂傳上書以七驗諫止之曰善為天下者計大而不計小務德而不務刑據安念危值利思害願陛下審計之任刑不任德第四前漢禮樂志夫教化之比於刑法刑法輕是舍所重而急所輕也且教化所恃以為治也刑法所以助治也今廢所恃而獨立其所助非所以致太平也前漢酷吏傳延年母從東海來欲從延年臘因數責延年幸得備郡守專治千里不聞仁愛教化有以全安愚民顧乘刑罰多刑殺人欲以立威豈為民父母意哉母畢正臘謂延年我不意當老見壯子被刑戮也行以去女東歸掃除墓地耳遂去後歲餘果敗東海莫不賢智其母前漢董仲舒曰陽為德陰為刑云云今廢先王德教之官獨任執法之吏旡乃任刑之意歟餘見禮刑相表裡王猛傳箋證漢書禮樂志夫教化之比於刑法刑法輕是舍所重而急所輕也師古曰舍廢也且教化所恃以為治也刑法所以助治也今廢所恃而獨立其所助非所以致太平也漢書酷吏傳嚴延年嚴延年字次卿東海下邳人也其父為丞相掾延年少學法律丞相府歸為郡吏以選除補御史掾舉侍御史初延年母從東海內欲從延年臘師古曰建丑之月為臘祭因會飲若今之蜡節也到雒陽適見報囚因數責延年幸得備郡守專治千里不聞仁愛教化有以全安愚民顧乘刑罰多刑殺人師古曰顧反也乘因也欲以立威豈為民父母意哉母畢正臘謂延年我不意當老見壯子被刑戮也行矣去女東歸埽除墓地耳遂去後歲餘果敗東海莫不賢知其母漢書董仲舒傳今廢先王德教之官而獨任執法之吏治民毋乃任刑之意與師古曰與讀曰歟肉刑第五前漢刑法志孝文時太倉令淳于公有罪詔獄逮繫長安公旡男有五女當行罵其女曰生子不生男緩急非有益也有少女緹縈悲泣迺隨其父至長安上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖後欲改過自新其道亡繇也妾願沒入為官婢以贖父刑罪使得自新書奏天子天子憐悲其意遂下令曰有虞之時畫衣冠異章服以為戮而民不犯何治之至也今法有肉刑三而姦不止其咎安在非乃朕德之薄而教不明歟其除肉刑前漢刑法志禹承堯舜之後自以德衰而制肉刑湯武順而行之者以俗薄於唐虞故也今漢承衰周暴秦極敝之流俗已薄於三代而行堯舜之刑是猶以鞿而御駻突以繩縛馬口謂之鞿駻突惡馬也違救時之宜矣且除肉刑者本欲全人也今去髡鉗一等轉而入於大辟以死罔民失本惠矣故死者歲以萬數刑重之所致也是以罔密而姦不塞刑蕃而民愈嫚必世而未仁百年而不勝殘誠以禮樂闕而刑不正也後漢孔融傳獻帝時論者多欲復肉刑融乃建議曰古者敦龐善否不別吏端刑清政旡過失百姓有罪皆自取之未世陵遲風化壞亂政撓其俗法害其人故曰上失其道民散久矣而欲繩之以古刑投之以殘棄非所謂與時消息者也紂斮朝涉之脛天下謂為旡道夫九牧之地千八百君若各刖一人是下常有千八百紂也求俗休和弗可得已且被刑之人慮不念生志在思死類多趨惡莫復歸正夙沙亂齊伊戾禍宋趙高英布為世大患不能止人遂為非也適足絕人還為善耳雖忠如鬻權信如卞和智如孫臏冤若巷伯才若史遷達如子政一離刀鋸沒世不齒是太甲之思庸穆公之霸秦南睢之骨立衛武之初筵陳湯之都賴魏尚之守邊旡所復施也漢開改惡之路凡為此也故明德之君遠度深惟棄短就長不苟革其政者也朝廷善之卒不改焉魏陳群傳大祖復議肉刑群對曰臣父紀以為漢除肉刑而增加笞本興仁惻而死者更眾所謂名輕而實重者也名輕則易犯實重則傷民今以笞死之法易不殺之刑是重人支體而輕人軀命也時鍾繇與群議同多以為未可行太祖故且寢晉刑法志正始間天下旡事於是李勝曹羲下謐又追議肉刑卒不能決晉刑法志王導賀循紀瞻廋亮梅陶張嶷等議以肉刑之典由來尚矣肇自古先以及三代聖哲明王所未曾改也豈是漢文常主所能易者乎時蕭曹以沒絳灌之徒不能正其義逮班固深論其事以為外有輕刑之名內實殺人又死刑太重生刑太輕生刑縱於上死刑怨於下輕重失當故刑政不中也晉刑法志劉頌為廷尉頻表宜復肉刑不見省又上言曰臣昔上行肉刑遂寢不論臣竊以為議者拘孝文之小仁而輕違帝王之典刑未詳之甚莫過於此令死刑重故非命者眾生刑輕故罪不禁姦所以然者肉刑不用之所致也聖王之制肉刑遠有深理非徒懲其畏剝割之痛而不為也乃去其為惡之具亡者刖足亡所用復亡盜者截手旡所用復盜淫者割其勢理亦如之除惡塞源莫善於此非徒然也此等已刑之後便各歸家父母妻子共相養恤不流離於塗路今宜取死刑之限輕及三犯逃亡淫盜悉以肉刑代之疏上又不見省箋證漢書刑法志孝文即位十三年齊太倉令淳于公有罪當刑詔獄逮繫長安淳于公無男有五女當行會逮罵其女曰生子不生男緩急非有益也其少女緹縈自傷悲泣師古曰緹縈女名也緹音他弟反迺隨其父至長安上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖後欲改過自新其道亡繇也妾願沒入為官婢以贖父刑罪使得自新書奏天子天子憐悲其意遂下令曰制詔御史蓋聞有虞氏之時畫衣冠異章服以為戮而民弗犯何治之至也今法有肉刑三而姦不止其咎安在非乃朕德之薄而教不明與其除肉刑有以易之漢書刑法志禹承堯舜之後自以德衰而制肉刑湯武順而行之者以俗薄於唐虞故也今漢承衰周暴秦極敝之流俗已薄於三代而行堯舜之刑是猶以鞿而御駻突孟康曰以繩縛馬口謂之鞿晉灼曰鞿古羇字也如淳曰駻音捍突惡馬也師古曰馬絡頭曰羇也違救時之宜矣且除肉刑者本欲以全民也今去髡鉗一等轉而入於大辟以死罔民失本惠矣故死者歲以萬數刑重之所致也是以罔密而姦不塞刑蕃而民愈嫚必世而未仁百年而不勝殘誠以禮樂闕而刑不正也後漢書孔融傳論者多欲復肉刑融乃建議曰古者敦龐善否不別吏端刑清政無過失百姓有罪皆自取之末世陵遲風化壞亂政撓其俗法害其人故曰上失其道民散久矣而欲繩之以古刑投之以殘棄非所謂與時消息者也紂斮朝涉之脛天下謂為無道夫九牧之地千八百君若各刖一人是下常有千八百紂也求俗休和弗可得已且被刑之人慮不全生志在思死類多趨惡莫復歸正夙沙亂齊伊戾禍宋趙高英布為世大患不能止人遂為非也適足絕人還為善耳雖忠如鬻拳信如卞和智如孫臏冤如巷伯才如史遷達如子政一離刀鋸沒世不齒是太甲之思庸穆公之霸秦南雎之骨立衛武之初筵陳湯之都賴魏尚之守邊無所復施也漢開改惡之路凡為此也故明德之君遠度深惟棄短就長不苟革其政者也朝廷善之卒不改焉三國志魏志陳群傳陳群字長文潁川許昌人也祖父寔父紀叔父諶皆有盛名時太祖議復肉刑群對曰臣父紀以為漢除肉刑而增加笞本興仁惻而死者更眾所謂名輕而實重者也名輕則易犯實重則傷民今以笞死之法易不殺之刑是重人支體而輕人軀命也時鍾繇與群議同王朗及議者多以為未可行太祖深善繇群言以軍事未罷顧眾議故且寢晉書刑法志其後正始之間天下無事於是征西將軍夏侯玄河南尹李勝中領軍曹羲尚書丁謐又追議肉刑卒不能決晉書刑法志驃騎將軍王導太常賀循侍中紀瞻中書郎庾亮大將軍諮議參軍梅陶散騎郎張嶷等議以肉刑之典由來尚矣肇自古先以及三代聖哲明王所未曾改也豈是漢文常主所能易者乎時蕭曹已沒絳灌之徒不能正其義逮班固深論其事以為外有輕刑之名內實殺人又死刑太重生刑太輕生刑施於上死刑怨於下輕重失當故刑政不中也晉書刑法志及劉頌為廷尉頻表宜復肉刑不見省又上言曰臣昔上行肉刑從來積年遂寢不論臣竊以為議者拘孝文之小仁而輕違聖王之典刑未詳之甚莫過於此令死刑重故非命者眾生刑輕故罪不禁姦所以然者肉刑不用之所致也聖王之制肉刑遠有深理其事可得而言非徒懲其畏剝割之痛而不為也乃去其為惡之具使夫奸人無用復肆其志止奸絕本理之盡也亡者刖足無所用復亡盜者截手無所用復盜淫者割其勢理亦如之除惡塞源莫善於此非徒然也此等已刑之後便各歸家父母妻子共相養恤不流離於塗路今宜取死刑之限輕及三犯逃亡淫盜悉以肉刑代之疏上又不見省
