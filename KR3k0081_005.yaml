body:
  text: 卷第五君臣相遇第一前漢東方朔傳伊尹蒙恥辱負鼎俎和五味以干湯太公釣於渭之陽以見文王心合意同謀無不成計無不從誠得其君也前漢王褒聖主得賢臣頌及其遇明君遭聖主也運籌合上意諫爭即見聽進退得關其忠任職得行其術去卑辱奧渫而升本朝奧幽也渫狎也汙也言敝奧渫汙不章顯也離疏釋蹻而享膏梁離此疏食以繩為蹻即今之鞋蹻居路反剖符錫壤而光祖考傳之子孫以資說士談說之士傳以為資故世必有聖知之君而後有賢明之臣故虎嘯而風冽龍興而致雲冽列風貌也蟋蟀竢秋唫蜉蝤出以陰易曰飛龍在天利見大人詩曰思皇多士生此王國故世平主聖俊艾將自至若堯舜禹湯文武之君獲稷契辠陶伊尹呂望明明在朝穆穆布列聚精會神相得益章雖伯牙操遞鍾楚辭云奏伯牙之號鍾號鍾琴名逢門子彎烏號即逢蒙也烏號弓也猶未足以喻其意也故聖王必待賢臣而洪功業俊士亦俟明主而顯其德上下俱欲驩然交欣千載一合論說無疑翼乎如鴻毛遇順風沛乎如巨魚縱大壑其得意如此後漢爰延傳太史令上言客星經帝座帝密以問延延因上封事曰陛下以鄧萬有龍潛之舊封為通侯恩重公卿惠豐宗室昔光武與嚴光俱寢上天之異其夕即見夫以光武之聖德嚴光之高賢君臣道合尚降此變豈況陛下今所親幸以賤為貴魏陳思王植傳上疏曰天地協氣而萬物生君臣合德而庶政成五帝之世非皆智三季之未非皆愚用與不用知與不知也昔伊尹之為媵臣至賤也呂尚之處屠釣至陋也及其見舉於湯武周文誠道合志同淵謨神通豈復假近習之薦因左右之介哉書曰有不世之君必能用不世之臣用不世之臣必能立不世之功商周二王是矣蜀諸葛亮傳先主與亮情好日密關羽張飛等不悅大王曰孤之有孔明猶魚之有水也羽飛乃止晉載記王猛傳符堅聞猛名遣呂婆樓招之一見便若平生語及興廢大事異符同契若劉備之遇孔明也後堅謂曰卿昔螭蟠布衣朕龍潛弱冠朕奇卿於暫見擬卿為臥龍卿亦異朕於一言迴考槃之雅志豈不情契神交千載之會雖傳巖入夢姜公悟兆今古一時亦不殊也晉載記慕容暐傳使采琛聘于符堅還言於慕容評曰符堅機明好斷納善如流王猛有王佐之才銳於進取觀其君臣相得自謂千載一時桓溫不足為虞終為人患者其唯王猛乎新唐王珪傳太宗嘗曰正主御邪臣不可以致治正臣事邪主亦不可以致治唯君臣同德則海內安新唐屈突通傳贊曰屈突通盡節於隋而為唐忠臣何哉惟其一心故事兩君而無嫌也敬德之來太宗以赤心付之桑蔭不徙而大功立君臣相遇古人謂之千載顧不諒哉新唐房杜傳贊曰方君臣明良志計叶從相資以成固千載之遇蕭曹之勳不足進焉新唐魏徵傳帝或引至臥內訪天下事徵亦自以不世遇乃展盡成薀無所隱新唐馬思贊周之遇太宗顧不異哉由一介草茅言天下事若素宰于朝非王佐才疇以及茲其自視與築巖釣渭亦何以異夫帝銳於立事而周所建皆切一時以明佐聖故君宰間不膠漆而固恨相得晚宜矣新唐韓思上疏上下同心君臣一德箋證漢書東方朔傳東方朔字曼倩平原厭次人也先生曰接輿避世箕子被髮陽狂此二人者皆避濁世以全其身者也使遇明王聖主得賜清燕之閒寬和之色師古曰閒讀曰閑閑暇也發憤畢誠圖盡安危揆度得失上以安主體下以便萬民則五帝三王之道可幾而見也伊尹蒙恥辱負鼎俎和五味以干湯師古曰蒙冒也犯也太公釣於渭之陽以見文王心合意同謀無不成計無不從誠得其君也漢書王褒傳王褒字子淵蜀人也宣帝時修武帝故事講論六藝群書博盡奇異之好益州刺史因奏褒有軼材師古曰軼與逸同上迺徵褒既至詔褒為聖主得賢臣頌其意褒對曰及其遇明君遭聖主也運籌合上意諫諍即見聽進退得關其忠任職得行其術去卑辱奧渫而升本朝張晏曰奧幽也渫狎也汙也言敝奧渫汙不章顯也師古曰渫音先列反離疏釋蹻而享膏梁應劭曰離此疏食釋此木蹻也臣瓚曰以繩為蹻也師古曰蹻即今之鞋耳瓚說是也蹻音居略反剖符錫壤而光祖考傳之子孫以資說士師古曰談說之士傳以為資也故世必有聖知之君而後有賢明之臣故虎嘯而風冽龍興而致雲蟋蟀竢秋唫蜉蝤出以陰孟康曰蜉蝤渠略也師古曰蟋蟀今之促織也蜉蝤甲蟲也好叢聚而生也朝生而夕死蝤音由字亦作蝣其音同也易曰飛龍在天利見大人詩曰思皇多士生此王國故世平主聖俊艾將自至多也師古曰艾讀曰乂若堯舜禹湯文武之君獲稷契辠陶伊尹呂望明明在朝穆穆列布聚精會神相得益章雖伯牙操遞鍾逢門子彎烏號師古曰逢門善射者即逢蒙也烏號弓名也猶未足以喻其意也故聖主必待賢臣而弘功業俊士亦俟明主以顯其德上下俱欲驩然交欣千載壹合論說無疑翼乎如鴻毛遇順風沛乎如巨魚縱大壑其得意若此則胡禁不止曷令不行後漢書爰延傳爰延字季平陳留外黃人也清苦好學能通經教授性質愨少言辭縣令隴西牛述好士知人乃禮請延為廷掾後令史昭以為鄉嗇夫仁化大行人但聞嗇夫不知郡縣在事三年州府禮請不就桓帝時徵博士太尉再遷為侍中拜五官中郎將轉長水校尉遷魏郡太守徵拜大鴻臚帝以延儒生常特宴見時太史令上言客星經帝坐帝密以問延延因上封事曰臣聞天子尊無為上故天以為子位臨臣庶威重四海動靜以理則星辰順序意有邪僻則晷度錯違陛下以河南尹鄧萬有龍潛之舊封為通侯恩重公卿惠豐宗室昔光武皇帝與嚴光俱寢上天之異其夕即見夫以光武之聖德嚴光之高賢君臣合道尚降此變豈况陛下今所親幸以賤為貴以卑為尊哉三國志魏志陳思王植傳陳思王植字子建年十歲餘誦讀詩論及辭賦數十萬言善屬文三年徙封東阿五年復上疏求存問親戚因致其意曰臣聞天稱其高者以無不覆地稱其廣者以無不載詔報曰蓋教化所由各有隆弊非皆善始而惡終也事使之然植復上疏陳審舉之義曰臣聞天地協氣而萬物生君臣合德而庶政成五帝之世非皆智三季之末非皆愚用與不用知與不知也昔伊尹之為媵臣至賤也呂尚之處屠釣至陋也及其見舉於湯武周文誠道合志同玄謨神通豈復假近習之薦因左右之介哉書曰有不世之君必能用不世之臣用不世之臣必能立不世之功殷周二王是矣三國志蜀志諸葛亮傳諸葛亮字孔明琅邪陽都人也漢司隸校尉諸葛豐後也父珪字君貢漢末為太山郡丞亮早孤從父玄為袁術所署豫章太守玄將亮及亮弟均之官時先主屯新野徐庶見先主先主器之謂先主曰諸葛孔明者臥龍也將軍豈願見之乎先主曰君與俱來庶曰此人可就見不可屈致也由是先主遂詣亮凡三往乃見於是與亮情好日密關羽張飛等不悅先主解之曰孤之有孔明猶魚之有水也願諸君勿復言羽飛乃止晉書載記王猛傳王猛字景略北海劇人也家于魏郡少貧賤以鬻畚為業嘗貨畚于洛陽桓溫入關猛被褐而詣之一面談當世之事溫之將還賜猛車馬拜高官督護請與俱南猛還山諮師師曰卿與桓溫豈並世哉在此自可富貴何為遠乎猛乃止苻堅將有大志聞猛名遣呂婆樓招之一見便若平生語及廢興大事異符同契若玄德之遇孔明也堅曰卿昔螭蟠布衣朕龍潛弱冠屬世事紛紜厲士之際顛覆厥德朕奇卿於暫見儗卿為臥龍卿亦異朕於一言迴考槃之雅志豈不精契神交千載之會雖傅巖入夢姜公悟兆今古一時亦不殊也晉書載記慕容暐傳先是暐使其黃門侍郎梁琛聘于堅琛還言於評曰秦揚兵講武運粟陜東以琛觀之無久和之理兼吳王西奔必有觀釁之計深宜備之評曰不然秦豈可受吾叛臣而不懷和好哉琛曰鄰國相并有自來矣况今並稱大號理無俱存苻堅機明好斷納善如流王猛有王佐之才銳於進取觀其君臣相得自謂千載一時桓溫不足為慮終為人患者其唯王猛乎新唐書王珪傳太子已誅太宗召為諫議大夫帝嘗曰正主御邪臣不可以致治正臣事邪主亦不可以致治唯君臣同德則海內安新唐書屈突通等列傳贊曰屈突通盡節於隋而為唐忠臣何哉惟其一心故事兩君而無嫌也敬德之來太宗以赤心付之桑蔭不徙而大功立君臣相遇古人謂之千載顧不諒哉新唐書房玄齡杜如晦傳贊曰太宗以上聖之才取孤隋攘群盜天下已平用玄齡如晦輔政興大亂之餘紀綱彫弛而能興仆植僵使號令典刑粲然罔不完雖數百年猶蒙其功可謂名宰相玄齡身處要地不吝權善始以終此其成令名者諒其然乎方君臣明良志叶議從相資以成固千載之遇蕭曹之勛不足進焉新唐書魏徵傳或引至臥內訪天下事徵亦自以不世遇乃展盡底蘊無所隱凡二百餘奏無不剴切新唐書馬周傳贊曰周之遇太宗顧不異哉由一介草茅言天下事若素宦于朝明習憲章者非王佐才疇以及茲其自視與築巖釣渭亦何以異迹夫帝銳于立事而周所建皆切一時以明佐聖故君宰間不膠漆而固恨相得晚宜矣然周才不逮傅說呂望使後世未有述焉惜乎舊唐書韓思復傳韓思復京兆長安人也祖倫貞觀中為左衛率賜爵長山縣男思復少襲祖爵初為汴州司戶參軍為政寬恕不行杖罰開元初為諫議大夫時山東蝗蟲大起姚崇為中書令奏遣使分往河南河北諸道殺蝗蟲而埋之思復以為蝗蟲是天災當修德以禳之恐非人力所能翦滅上疏曰臣聞河南河北蝗蟲頃日更益繁熾經歷之處苖稼多損今漸翾飛河西游食至洛使命來往不敢昌言山東數州甚為惶懼且天災流行埋瘞難盡望陛下悔過責躬發使宣慰損不急之務召至公之人上下同心君臣一德持此誠實以答休咎君臣相須第二後漢陳蕃上疏諫曰湯武雖聖而興於伊呂桀紂迷惑亡在失人由此言之君為元首臣為股肱同體相須共成美惡者也蜀費詩傳先主為漢中王遺詩拜關羽為前將軍羽不肯受拜詩謂羽曰且王與君侯譬猶一體同休等戚禍福共之不宜計官號之高下爵祿之多少為意也新唐書虞世南傳虞世南越州餘姚人出繼叔陳中書侍郎寄之後故字伯施性沈靜寡欲與兄世基同受學于吳顧野王及陳滅與世基入隋煬帝為晉王與秦王俊交辟之大業中累至祕書郎秦王滅建德引為府參軍轉記室遷太子中舍人王踐祚拜員外散騎侍郎弘文館學士時世南已衰老屢乞骸骨不聽遷太子右庶子固辭改祕書監封永興縣子世南貌儒謹外若不勝衣而中抗烈論議持正太宗嘗曰朕與世南商略古今有一言失未嘗不悵恨其懇誠乃如此貞觀八年進封縣公帝每稱其五絕一曰德行二曰忠直三曰博學四曰文詞五曰書翰卒年八十一詔陪葬昭陵贈禮部尚書諡曰文懿帝手詔魏王泰曰世南於我猶一體拾遺補闕無日忘之蓋當代名臣人倫準的今其云亡石渠東觀中無復人矣後帝為詩一篇述古興亡既而歎曰鍾子期死伯牙不復鼓琴朕此詩將何所示邪新唐虞世南傳世南卒詔曰世南於我猶一體拾遺補闕無日忘之蓋當代名臣人倫準的新唐虞世南傳世南卒詔曰世南於我猶一體拾遺補闕無日忘之蓋當代名臣人倫準的新唐劉禕之傳房先敏貶衛州訴于相府禕之曰上從有司所奏后聞加禕之太中大夫后因曰君為元首臣為股肱以手足疾移於腹背尚為一體乎禕之引咎於己忠臣也餘見君臣相遇王珪傳箋證後漢書陳蕃傳九年李膺等以黨事下獄考實蕃因上疏極諫曰臣聞賢明之君委心輔佐亡國之主諱聞直辭故湯武雖聖而興於伊呂桀紂迷惑亡在失人由此言之君為元首臣為股肱同體相須共成美惡者也三國志蜀志費詩傳費詩字公舉犍為南安人也劉璋時為緜竹令先主攻緜竹時詩先舉城降成都既定先主為漢中王遣詩拜關羽為前將軍羽聞黃忠為後將軍羽怒曰大丈夫終不與老兵同列不肯受拜詩謂羽曰今漢王以一時之功隆崇於漢室然意之輕重寧當與君侯齊乎且王與君侯譬猶一體同休等戚禍福共之愚為君侯不宜計官號之高下爵祿之多少為意也新唐書房玄齡傳居宰相積十五年女為王妃男尚主自以權寵隆極累表辭位詔不聽頃之進司空仍總朝政玄齡固辭帝遣使謂曰讓誠美德也然國家相眷賴久一日去良弼如亡左右手顧公筋力未衰毋多讓新唐書虞世南傳虞世南越州餘姚人出繼叔陳中書侍郎寄之後故字伯施性沈靜寡欲與兄世基同受學于吳顧野王及陳滅與世基入隋煬帝為晉王與秦王俊交辟之大業中累至祕書郎秦王滅建德引為府參軍轉記室遷太子中舍人王踐祚拜員外散騎侍郎弘文館學士時世南已衰老屢乞骸骨不聽遷太子右庶子固辭改祕書監封永興縣子世南貌儒謹外若不勝衣而中抗烈論議持正太宗嘗曰朕與世南商略古今有一言失未嘗不悵恨其懇誠乃如此貞觀八年進封縣公帝每稱其五絕一曰德行二曰忠直三曰博學四曰文詞五曰書翰卒年八十一詔陪葬昭陵贈禮部尚書諡曰文懿帝手詔魏王泰曰世南於我猶一體拾遺補闕無日忘之蓋當代名臣人倫準的今其云亡石渠東觀中無復人矣後帝為詩一篇述古興亡既而歎曰鍾子期死伯牙不復鼓琴朕此詩將何所示邪新唐書劉褘之傳劉褘之字希美常州晉陵人父子翼字小心在隋為著作郎峭直有行褘之少與孟利貞高智周郭正一俱以文辭稱號劉孟高郭並直昭文館俄遷右史弘文館直學士上元中與元萬頃等偕召入禁中論次新書凡千餘篇高宗又密與參決時政以分宰相權時謂北門學士儀鳳中吐蕃寇邊帝訪侍臣所以置之討之之宜人人異謀褘之獨勸帝夷狄猶禽獸雖被馮陵不足校願戢威紓百姓之急帝內其言俄拜相王府司馬檢校中書侍郎帝謂曰卿家忠孝朕子賴卿以師矩冀蓬在麻不扶而挺也后既立王為帝以其參奉大議愈親之擢中書侍郎同中書門下三品賜爵臨淮縣男司門員外郎房先敏坐累貶衛州司馬訴于相府內史騫味道謂曰太后旨褘之曰乃上從有司所奏云后聞以味道歸非於上貶青州刺史加褘之太中大夫賜物百段后因曰君為元首臣為股肱以手足疾移於腹背尚為一體乎褘之引咎於己忠臣也君不疑臣第三前漢昭帝紀元鳳元年初然安父子與大將軍光爭權欲害之詐使人為燕王旦上書言光罪時上年十四覺其詐後有譖光者上輒怒曰大將軍國家忠臣先帝所屬敢有譖毀者坐之光由是得盡忠前漢鄒陽傳上書於梁王曰蘇秦相燕人惡之燕王王案劍而怒食以駛騠白圭顯於中山人惡之魏文侯文侯賜以夜光之璧何則兩主二臣剖心折肝相信豈移於浮辭哉駛騠俊馬敬重蘇秦更勝以珍味前漢鄒陽傳上書百里奚乞食於道路繆公委之以政甯戚飯牛車下桓公任之以國此二人者豈素宮於朝借譽於左右然後二主用之哉感於心合於行堅如膠漆昆弟不能離豈惑於眾口哉前漢金日磾傳既親近未嘗有過失上甚信愛之賞賜累千金出則參乘入侍左右貴戚多竊怨曰陛下妄得一胡兒反貴重之上聞愈厚焉前漢公孫鴻傳與公卿約議至上前皆皆其約以順上指汲黯庭詰弘曰齊人多詐而無情始為與臣等建此議今皆背之不忠上問鴻鴻謝曰夫知臣者以臣為忠不知臣者以臣為不忠上然鴻言後漢吳漢傳論曰吳漢自建武世常居上公之位終始倚愛之親諒由質簡而強力也昔陳平智有餘以見疑周勃質朴忠而見信夫仁義不足以布懷則智者以有餘為疑而神者以不足取信矣後漢班超傳超遣衛侯李邑護送烏孫使者賜大小昆吾以下錦帛李邑始到于寘而值龜茲攻疏勒恐懼不敢前因上書陳西域之功不可成又盛毀超擁愛妻抱愛子安樂外國無內顧心帝知超忠乃切責邑曰縱超擁愛妻抱愛子思歸之士千餘人何能盡與超同心乎令邑詣超受節度超即遣邑將烏孫侍子還京師徐幹謂超曰邑前親毀君欲敗西域今何不更遣它吏送侍子乎超曰是何言之陋也以邑毀超故今遣之內省不疚何卹人言魏程昱傳昱性剛戾與人多迕人有告昱謀反太祖賜待益厚蜀先主傳評曰先主之鴻毅寬厚知人待士蓋有高祖之風英雄之器焉及其舉國託孤於諸葛亮而心神無貳誠君臣之至公古今之盛軌也新唐長孫無忌傳或有言無忌權太盛者帝持表示無忌曰我與公君臣間無少疑使各懷所聞不言斯則蔽矣因普示群臣曰朕子幼無忌於我有大功視之猶子也新唐渾瑊傳瑊天性忠謹功高而志益下世方之金曰磾故帝終始信待輒私喜曰上不疑我故治蒲十六年常持軍猜間不能入君子賢之新唐劉文靖傳唐公踐天子位時多引貴臣共榻文靖諫曰今率士莫不臣帝座嚴尊屈與臣子均蓆此王導所謂太陽俯同萬物者也帝曰我雖應天受命宿昔之好何可忘公無嫌新唐尉遲敬德傳時諸將疑敬德且亂囚之屈突通曰敬德慓敢今執之猜貳已結不即殺後悔無及也王曰不然釋之引見臥內曰丈夫以氣相許小嫌不足置胸中我終不以讒害良士因賜之金曰必欲去以為汝資新唐李靖傳贊曰若靖闔門稱疾畏遠權逼功大而主不疑雖古哲人何以尚茲十四新唐杜如晦傳與玄齡共管朝政御史陳師合上拔士論陰諷剴如晦等帝曰玄齡如晦不以勳舊進特其才可與治天下者師合欲以此離間吾君臣邪斥嶺表新唐韋挺傳贊曰王者用人非難盡其才之為難觀太宗之責任也謀斯從言斯聽才斯奮洞然不疑故人臣未始遺力新唐蕭瑀傳瑀輒言玄齡如晦輩朋黨然特未反耳帝曰知臣莫若君朕雖不明寧頓懵臧否因為瑀解曉箋證漢書昭帝紀八月改始元為元鳳九月鄂邑長公主燕王旦與左將軍上官桀桀子票騎將軍安御史大夫桑弘羊皆謀反伏誅初桀安父子與大將軍光爭權欲害之詐使人為燕王旦上書言光罪時上年十四張晏曰武帝崩時八歲即位於今七歲今年十五師古曰此云初桀安父子與大將軍爭權詐為燕王上書蓋追道前年事耳非今歲也張說失之覺其詐後有譖光者上輒怒曰大將軍國家忠臣先帝所屬敢有譖毀者坐之光由是得盡忠漢書鄒陽傳鄒陽齊人也漢興諸侯王皆自治民聘賢吳王濞招致四方游士陽與吳嚴忌枚乘等俱仕吳皆以文辯著名久之吳王以太子事怨望稱疾不朝陰有邪謀陽奏書諫吳王不禸其言是時景帝少弟梁孝王貴盛亦待士於是鄒陽枚乘嚴忌知吳不可說皆去之梁從孝王游陽為人有智略忼慨不苟合介於羊勝公孫詭之間勝等疾陽惡之孝王師古曰惡謂讒毀也其下亦同孝王怒下陽吏將殺之陽客游以讒見禽恐死而負絫迺從獄中上書曰臣聞忠無不報信不見疑臣常以為然徒虛語耳白圭戰亡六城為魏取中山張晏曰白圭為中山將亡六城君欲殺之亡入魏文侯厚遇之還拔中山何則誠有以相知也蘇秦相燕人惡之燕王燕王按劍而怒食以駃騠孟康曰駃騠駿馬也生七日而超其母敬重蘇秦雖有讒謗而更食以珍奇之味師古曰食讀曰飼駃音決騠音題白圭顯於中山師古曰以拔中山之功而尊顯也人惡之於魏文侯文侯賜以夜光之璧何則兩主二臣剖心析肝相信豈移於浮辭哉師古曰不以浮說而移心漢書鄒陽傳故女無美惡入宮見妒士無賢不肖入朝見嫉昔司馬喜臏腳於宋卒相中山范雎拉脅折齒於魏卒為應侯此二人者皆信必然之畫捐朋黨之私挾孤獨之交故不能自免於嫉妒之人也是以申徒狄蹈雍之河徐衍負石入海不容於世義不苟取比周於朝以移主上之心故百里奚乞食於道路繆公委之以政甯戚飯牛車下桓公任之以國此二人者豈素宦於朝借譽於左右然後二主用之哉感於心合於行堅如膠桼昆弟不能離豈惑於眾口哉漢書金日磾傳金日磾字翁叔師古曰磾音丁奚反本匈奴休屠王太子也武帝元狩中票騎將軍霍去病將兵擊匈奴右地多斬首虜獲休屠王祭天金人單于怨昆邪休屠居西方多為漢所破師古曰昆音下門反召其王欲誅之昆邪休屠恐謀降漢休屠王後悔昆邪王殺之并將其將降漢封昆邪王為列侯日磾以父不降見殺與母閼氏弟倫俱沒入官輸黃門養馬時年十四矣久之武帝游宴見馬師古曰方於宴游之時而召閱諸馬後宮滿側日磾等數十人牽馬過殿下莫不竊視師古曰視宮人至日磾獨不敢日磾長八尺二寸容貌甚嚴馬又肥好上異而問之具以本狀對上奇焉即日賜湯沐衣冠拜為馬監遷侍中駙馬都尉光祿大夫日磾既親近未嘗有過失上甚信愛之賞賜累千金出則驂乘入侍左右貴戚多竊怨曰陛下妄得一胡兒反貴重之上聞愈厚焉漢書公孫弘傳常與主爵都尉汲黯請間師古曰求空隙之暇黯先發之弘推其後上常說師古曰說讀曰悅所言皆聽以此日益親貴嘗與公卿約議至上前皆背其約以順上指汲黯庭詰弘曰齊人多詐而無情始為與臣等建此議今皆背之不忠上問弘弘謝曰夫知臣者以臣為忠不知臣者以臣為不忠上然弘言左右幸臣每毀弘上益厚遇之弘為人談笑多聞後漢書吳漢傳吳漢字子顏南陽宛人也家貧給事縣為亭長王莽末以賓客犯法乃亡命至漁陽資用乏以販馬自業往來燕薊間所至皆交結豪傑論曰吳漢自建武世常居上公之位終始倚愛之親諒由質簡而彊力也子曰剛毅木訥近仁斯豈漢之方乎昔陳平智有餘以見疑周勃質朴忠而見信夫仁義不足以相懷則智者以有餘為疑而朴者以不足取信矣後漢書班超傳班超字仲升扶風平陵人徐令彪之少子也八年拜超為將兵長史假鼓吹幢麾以徐幹為軍司馬別遣衛候李邑護送烏孫使者賜大小昆彌以下錦帛前書曰烏孫國王先號昆莫名獵驕靡後書昆彌云後代取昆字靡彌聲相近音有輕重耳昆莫既死子孫爭國漢令立元貴靡為大昆彌烏就屠為小昆彌賜印綬故有大小昆彌之號焉李邑始到于寘而值龜茲攻疏勒恐懼不敢前因上書陳西域之功不可成又盛毀超擁愛妻抱愛子安樂外國無內顧心超聞之歎曰身非曾參而有三至之讒恐見疑於當時矣遂去其妻帝知超忠乃切責邑曰縱超擁愛妻抱愛子思歸之士千餘人何能盡與超同心乎令邑詣超受節度詔超若邑任在外者便留與從事超即遣邑將烏孫侍子還京師徐幹謂超曰邑前親毀君欲敗西域今何不緣詔書留之更遣他吏送侍子乎超曰是何言之陋也以邑毀超故今遣之內省不疚何卹人言三國志魏志程昱傳程昱字仲德東郡東阿人也長八尺三寸美鬚髯昱性剛戾與人多迕人有告昱謀反太祖賜待益厚三國志蜀志先主劉備傳評曰先主之弘毅寬厚知人待士盖有高祖之風英雄之器焉及其舉國託孤於諸葛亮而心神無貳誠君臣之至公古今之盛軌也機權幹略不逮魏武是以基宇亦狹然折而不撓終不為下者仰揆彼之量必不容已非唯競利且以避害云爾新唐書長孫無忌傳帝以無忌皇后兄又少相友眷倚日厚常出入臥內進尚書右僕射或有言無忌權太盛者帝持表示無忌曰我與公君臣間無少疑使各懷所聞不言斯則蔽矣因普示群臣曰朕子幼無忌於我有大功視之猶子也新唐書渾瑊傳渾瑊本鐵勒九姓之渾部也世為辠蘭都督瑊年十一善騎射肅宗即位瑊以兵趨行在十五年卒年六十四瑊好書通春秋漢書嘗慕司馬遷自敘著行紀一萹其辭一不矜大天性忠謹功高而志益下歲時貢奉必躬閱視每有賜予下拜跽受常若在帝前世方之金日磾故帝終始信待貞元後天子常恐藩侯生事稍桀驁則姑息之惟瑊有所奏論不盡從可輒私喜曰上不疑我故治蒲十六年常持軍猜間不能入君子賢之新唐書劉文靜傳劉文靜字肇仁自言系出彭城世居京兆武功父韶仕隋戰死贈上儀同三司文靜以死難子襲儀同倜儻有器略大業末為晉陽令與晉陽宮監裴寂善唐公踐天子位擢納言時多引貴臣共榻文靜諫曰今率土莫不臣而延見群下言尚稱名帝坐尊嚴屈與臣子均席此王導所謂太陽俯同萬物者也帝曰我雖應天受命宿昔之好何可忘公其無嫌新唐書尉遲敬德傳武德二年秦王戰柏壁金剛敗奔突厥敬德合餘眾守介休王遣任城王道宗宇文士及諭之乃與尋相舉地降引為右一府統軍從擊王世充會尋相叛諸將疑敬德且亂囚之行臺左僕射屈突通尚書殷開山曰敬德慓敢今執之猜貳已結不即殺後悔無及也王曰不然敬德必叛寧肯後尋相者邪釋之引見臥內曰丈夫以氣相許小嫌不足置胸中我終不以讒害良士因賜之金曰必欲去以為汝資新唐書李靖李勣傳贊曰唐興其名將曰英衛皆擢罪亡之餘遂能依乘風雲勒功帝籍蓋君臣之際固有以感之獨推期運非也若靖闔門稱疾畏遠權逼功大而主不疑雖古哲人何以尚茲勣之節見於黎陽故太宗勤勤於託孤誠有為也新唐書杜如晦傳杜如晦字克明京兆杜陵人祖果有名周隋間如晦少英爽喜書以風流自命內負大節臨機輒斷隋大業中預吏部選侍郎高祖平京師秦王引為府兵曹參軍徙陜州總管府長史進陜東道大行臺司勳郎中封建平縣男兼文學館學士天策府建為中郎王為皇太子授左庶子遷兵部尚書進封蔡國公食三千戶別食益州千三百戶俄檢校侍中攝吏部尚書總監東宮兵進位尚書右僕射仍領選與玄齡共筦朝政引士賢者下不肖咸得職當時浩然歸重監察御史陳師合上拔士論謂一人不可總數職陰剴諷如晦等帝曰玄齡如晦不以勳舊進特其才可與治天下者師合欲以此離間吾君臣邪斥嶺表新唐書韋挺傳贊曰王者用人非難盡其才之為難觀太宗之責任也謀斯從言斯聽才斯奮洞然不疑故人臣未始遺力天子高拱操成功致太平矣新唐書蕭瑀傳蕭瑀字時文後梁明帝子也九歲封新安王國除以女兄為隋晉王妃故入長安瑀愛經術善屬文性鯁急瑀素貴但中狹每燕見輒言玄齡輩朋黨盜權若膠固然特未反耳帝曰知臣莫若君朕雖不明寧頓懵臧否因為瑀曉解瑀以帝有所偏信帝積久亦不平君疑於臣第四史記王翦傳翦將兵六十萬人攻荊始皇自送至灞上王翦行請美田宅園池甚眾始皇曰將軍行矣何憂貧乎王翦曰為上大將軍有功終不得封侯故及大王之嚮臣臣亦及時以請園池為子孫業耳始皇大笑王翦既至關使使還請善田者五輩或曰將軍之乞貸亦已甚矣王翦曰不然秦王怛而不信人今空秦國甲士而專委我我不多請田宅為子孫業以自堅顧令秦王坐而疑我矣怛音麤一作粗前漢蕭何傳漢三年與項羽相距京索間上數使使勞苦丞相鮑生謂何曰今王暴衣露蓋數勞苦君者有疑君心為君計莫若遣君子孫昆弟能勝兵者悉詣君所上益信君何從其計漢王大說前漢蕭何傳上已聞誅信使使拜丞相為相國益封五千戶令卒五百人一都尉為相國衛諸君皆賀召平獨弔曰禍自此始矣上暴露於外而君守於內非被矢石之難而益君封置衛者以今者淮陰新反於中有疑君心夫置衛衛君非以寵君願君讓封勿受悉以家私財佐軍何從其計上說前漢陳平傳平降漢漢王與語而說之拜平為都尉使參乘典護軍絳灌等或讒平曰事魏王不容亡而歸楚歸楚不中竹仲反又亡歸漢今令護軍平使諸將金多者得善處金少者得惡處平反覆亂臣也漢王疑之召平而問曰吾聞先生事魏不遂事楚而去今又從吾遊信者固多心乎平曰臣事魏王魏王不用臣說故去事項王項王不信人臣聞漢王能用人故歸臣羸身來不受金無以為資大王所賜金具在請封輸官乞骸骨漢王乃謝厚賜拜為護軍中尉盡護諸將諸將乃不敢復言前漢陳平傳漢王曰天下何時而定乎平曰項羽骨鯁之臣亞父鍾離昧龍且之屬不過數人耳大王能出捐數萬斤金行反間間其君臣以疑其心項王為人意忌信讒必內相誅漢因舉兵破楚必矣漢王乃出黃金四萬斤予平恣所為不問出入平多以金縱反間於楚軍宣言諸將鍾離昧等為項王將功多矣然終不得列地而王欲與漢為一以滅項氏分王其地項王果疑之使使至漢漢為大牢之具舉進見楚使即陽驚曰以為亞父使迺項王使也復持云以惡草具進楚使使歸具以報項王果大疑亞父亞父欲急擊下滎陽城項王不肯聽臣父聞項王疑之迺大怒曰天下事大定矣君王自為之願乞骸骨歸歸未至彭城疽發背而死晉石苞傳苞為大司馬加侍中鎮淮南聞吳欲為寇築壘過水以自固帝謂羊祜曰苞果有不順乎祜深明之其子為郎上召之經日不至帝益疑欲討之隱其事先策免之苞詣闕後帝慚因謂曰卿子幾破卿門箋證史記王翦列傳王翦者頻陽東鄉人也少而好兵事秦始皇始皇問李信吾欲攻取荊於將軍度用幾何人而足李信曰不過用二十萬人始皇問王翦王翦曰非六十萬人不可始皇曰王將軍老矣何怯也李將軍果勢壯勇其言是也遂使李信及蒙恬將二十萬南伐荊王翦言不用因謝病歸老於頻陽李信攻平與蒙恬攻寢大破荊軍信又攻鄢郢破之於是引兵而西與蒙恬會城父荊人因隨之三日三夜不頓舍大破李信軍入兩壁殺七都尉秦軍走始皇聞之大怒自馳如頻陽見謝王翦曰寡人以不用將軍計李信果辱秦軍今聞荊兵日進而西將軍雖病獨忍棄寡人乎王翦謝曰老臣罷病悖亂唯大王更擇賢將始皇謝曰已矣將軍勿復言王翦曰大王必不得已用臣非六十萬人不可始皇曰為聽將軍計耳於是王翦將兵六十萬人始皇自送至灞上王翦行請美田宅園池甚眾始皇曰將軍行矣何憂貧乎王翦曰為大王將有功終不得封侯故及大王之嚮臣臣亦及時以請園池為子孫業耳始皇大笑王翦既至關使使還請善田者五輩或曰將軍之乞貸亦已甚矣王翦曰不然夫秦王怛而不信人今空秦國甲士而專委於我我不多請田宅為子孫業以自堅顧令秦王坐而疑我矣漢書蕭何傳漢三年與項羽相距京索閒上數使使勞苦丞相鮑生謂何曰師古曰鮑生當時有識之士姓鮑而為諸生也今王暴衣露蓋數勞苦君者有疑君心為君計莫若遣君子孫昆弟能勝兵者悉詣軍所上益信君於是何從其計漢王大說師古曰說讀曰悅漢書蕭何傳陳豨反上自將至邯鄲而韓信謀反關中呂后用何計誅信語在信傳上已聞誅信使使拜丞相為相國益封五千戶令卒五百人一都尉為相國衛諸君皆賀召平獨弔師古曰召讀曰邵召平者故秦東陵侯秦破為布衣貧種瓜長安城東瓜美故世謂東陵瓜從召平始也平謂何曰禍自此始矣上暴露於外而君守於內非被矢石之難而益君封置衛者以今者淮陰新反於中有疑君心夫置衛衛君非以寵君也師古曰恐其為變故守衛之願君讓封勿受悉以家私財佐軍何從其計上說師古曰說讀曰悅漢書陳平傳陳平陽武戶鄉牖人也師古曰陽武縣名屬陳留戶牖者其鄉名少時家貧好讀書治黃帝老子之術項羽略地至河上平往歸之從入破秦賜爵卿項羽之東王彭城也漢王還定三秦而東殷王反楚項羽迺以平為信武君將魏王客在楚者往擊殷降而還項王使項悍拜平為都尉賜金二十溢居無何師古曰無何猶言無幾時漢攻下殷項王怒將誅定殷者平懼誅迺封其金與印使使歸項王而平身間行杖劍亡平遂至脩武降漢因魏無知求見漢王漢王召入於是漢王與語而說之師古曰說讀曰悅問曰子居楚何官平曰為都尉是日拜平為都尉使參乘典護軍諸將盡讙師古曰讙囂而議也宋祁曰一本作譁注云譁囂而議曰大王一日得楚之亡卒未知高下而即與共載使監護長者漢王聞之愈益幸平遂與東伐項王至彭城為楚所敗引師而還收散兵至滎陽以平為亞將屬韓王信軍廣武絳灌等或讒平曰師古曰舊說云絳絳侯周勃也灌灌嬰也而楚漢春秋高祖之臣別有絳灌疑昧之文不可據也平雖美丈夫如冠玉耳其中未必有也孟康曰飾冠以玉光好外見中非所有也聞平居家時盜其嫂師古曰盜猶私也事魏王不容亡而歸楚歸楚不中又亡歸漢師古曰中音竹仲反今大王尊官之令護軍臣聞平使諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑之以讓無知問曰有之乎無知曰有漢王曰公言其賢人何也對曰臣之所言者能也陛下所問者行也今有尾生孝已之行如淳曰孝已高宗之子有孝行師古曰尾生古之信士一說即微生高而無益於勝敗之數陛下何暇用之乎今楚漢相距臣進奇謀之士顧其計誠足以利國家耳師古曰顧念也盜嫂受金又安足疑乎漢王召平而問曰吾聞先生事魏不遂事楚而去今又從吾遊信者固多心乎平曰臣事魏王魏王不能用臣說故去事項王項王不信人其所任愛非諸項即妻之昆弟雖有奇士不能用臣居楚聞漢王之能用人故歸大王臝身來不受金無以為資誠臣計畫有可采者願大王用之使無可用者大王所賜金具在請封輸官得請骸骨漢王乃謝厚賜拜以為護軍中尉盡護諸將諸將迺不敢復言漢書陳平傳其後楚急擊絕漢甬道圍漢王於滎陽城漢王患之請割滎陽以西和項王弗聽漢王謂平曰天下紛紛何時定乎平曰項王為人恭敬愛人士之廉節好禮者多歸之至於行功賞爵邑重之師古曰言愛惜之士亦以此不附今大王嫚而少禮士之廉節者不來然大王能饒人以爵邑士之頑頓耆利無恥者亦多歸漢如淳曰頑頓謂無廉隅也師古曰頓讀曰鈍耆讀曰嗜誠各去兩短集兩長天下指麾即定矣彼項王骨骾之臣亞父鍾離昧龍且周殷之屬師古曰昧音秣且音子閭反不過數人耳大王能出捐數萬斤金行反間間其君臣以疑其心項王為人意忌信讒必內相誅漢因舉兵而攻之破楚必矣漢王以為然乃出黃金四萬斤予平恣所為不問出入平既多以金縱反閒於楚軍宣言諸將鍾離昧等為項王將功多矣然終不得列地而王欲與漢為一以滅項氏分王其地項王果疑之使使至漢漢為太牢之具舉進師古曰舉鼎俎而來見楚使即陽驚曰以為亞父使迺項王使也復持去以惡草具進楚使服虔曰去肴肉更以惡草之具宋祁云浙本作菜草之具使歸具以報項王果大疑亞父亞父欲急擊下滎陽城項王不信不肯聽亞父亞父聞項王疑之迺大怒曰天下事大定矣君王自為之願乞骸骨歸宋祁曰乞當作賜歸未至彭城疽發背而死師古曰疽癱瘡也音千余反晉書石苞傳石苞字仲容渤海南皮人也雅曠有智局容儀偉麗不修小節故時人為之語曰石仲容姣無雙武帝踐祚遷大司馬進封樂陵郡公加侍中羽葆鼓吹自諸葛誕破滅苞便鎮撫淮南士馬彊盛邊境多務苞既勤庶事又以威惠服物淮北監軍王琛輕苞素微又聞童謠曰宮中大馬幾作驢大石壓之不得舒因是密表苞與吳人交通先時望氣者云東南有大兵起及琛表至武帝甚疑之會荊州刺史胡烈表吳人欲大出為寇苞亦聞吳師將入乃築壘遏水以自固帝聞之謂羊祜曰吳人每來常東西相應無緣偏爾豈石苞果有不順乎祜深明之而帝猶疑焉會苞子喬為尚書郎上召之經日不至帝謂為必叛欲討苞而隱其事遂下詔以苞不料賊勢築壘遏水勞擾百姓策免其官遣太尉義陽王望率大軍徵之以備非常又勑征東將軍琅邪王伷自下邳會壽春苞用掾孫鑠計放兵步出住都亭待罪帝聞之意解及苞詣闕以公還第苞自恥受任無效而無怨色苞在位稱為忠勤帝每委任焉泰始八年薨帝發哀於朝堂有六子越喬統浚崇以統為嗣統字弘緒歷位射聲校尉大鴻臚子順為尚書郎越字弘倫早卒喬字弘祖為尚書郎散騎侍郎帝既召喬不得深疑苞反及苞至有慚色謂之曰卿子幾破卿門苞遂廢之君戒於臣第五後漢馮勤傳帝賢勤欲令以善自終乃因讌見從之戒曰朱浮上不遠於君下陵轢同列竟以中傷至今死生吉凶未可知豈不惜哉新唐尉遲敬德傳累遷同州剌史嘗侍宴有班在其上者尉遲怒曰汝有何功合坐我上任城王道宗次其下因解喻之尉遲勃然擊道宗目幾至眇太宗不懌罷召讓之曰朕觀漢史嘗怪高祖時功臣少全者今視卿所為乃知韓彭夷戮非高祖過國之大事惟賞與罰橫恩不可數得勉自脩飭悔不可及新唐岑文本傳文本弟文昭任校書郎多交輕薄帝不悅謂文本曰卿弟多過朕將出之文本曰臣少孤母所鍾念者弟也不欲離左右今若外出母必憂是無老母也泣下嗚咽帝愍其意召文昭讓敕卒無過新唐魏徵傳帝謂無忌曰徵每諫我不從我發言輒不應阿哉徵曰臣以事有不可故諫若不從輒應恐遂行之帝王第即應須別陳論顧不得徵曰昔舜戒群臣爾無面從於有後言若面從方可別陳論此乃後言非稷禹所以事堯舜也帝大笑曰人言徵舉動疏慢我但見其嫵媚爾徵曰陛下導臣使言所以敢然若不受臣敢數批逆鱗哉箋證後漢書馮勤傳馮勤字偉伯魏郡繁陽人也曾祖父揚宣帝時為弘農太守有八子皆為二千石趙魏間榮之號曰萬石君焉兄弟形皆偉壯唯勤祖父偃長不滿七尺常自恥短陋恐子孫之似也東觀記偃為黎陽令乃為子伉娶長妻伉生勤長八尺三寸八歲善計計算術也初為太守銚期功曹薦於光武初未被用後乃除為郎中給事尚書拜勤尚書僕射職事十五年以勤勞賜爵關內侯遷尚書令拜大司農三歲遷司徒先是三公多見罪退帝賢勤欲令以善自終乃因讌見從容戒之曰朱浮上不忠於君下陵轢同列竟以中傷至今朱浮為大司空坐賣弄國恩免又為陵轢同列帝銜之惜其功不忍加罪死生吉凶未可知豈不惜哉人臣放逐受誅雖復追加賞賜賻祭不足以償不訾之身新唐書尉遲敬德傳出為襄州都督累遷同州刺史嘗侍宴慶善宮有班其上者敬德曰爾何功坐我上任城王道宗解喻之敬德勃然擊道宗目幾眇太宗不懌罷召讓曰朕觀漢史嘗怪高祖時功臣少全者今視卿所為乃知韓彭夷戮非高祖過國之大事惟賞與罰橫恩不可數得勉自脩飭悔可及乎敬德頓首謝新唐書岑文本傳岑文本字景仁鄧州棘陽人貞觀元年除祕書郎兼直中書省太宗既藉田又元日朝群臣文本奏藉田三元頌二篇文致華贍李靖復薦于帝擢中書舍人始為中書令有憂色母問之答曰非勳非舊責重位高所以憂也有來慶者輒曰今日受弔不受賀或勸其營產業文本歎曰吾漢南一布衣徒步入關所望不過祕書郎縣令耳今無汗馬勞以文墨位宰相奉稍已重尚何殖產業邪故口未嘗言家事既任職久賚錫豐饒皆令弟文昭主之文昭任校書郎多交輕薄帝不悅謂文本曰卿弟多過朕將出之文本曰臣少孤母所鍾念者弟也不欲離左右今若外出母必憂無此弟是無老母也泣下嗚咽帝愍其意召文昭讓敕卒無過新唐書魏徵傳後宴丹霄樓酒中謂長孫無忌曰魏徵王珪事隱太子我能棄怨用才無羞古人然徵每諫我不從我發言輒不即應何哉徵曰臣以事有不可故諫若不從輒應恐遂行之帝曰第即應須別陳論顧不得徵曰昔舜戒群臣爾無面從退有後言若面從可方別陳論此乃後言非稷卨所以事堯舜也帝大笑曰人言徵舉動疏慢我但見其嫵媚耳徵再拜曰陛下導臣使言所以敢然若不受臣敢數批逆鱗哉臣戒於若第六史記魯世家成王在豐天下以安周之官政未次序於是周公作周官官別其宜作立政以便百姓周公既致政成王恐其怠忽故以君臣立政為戒也前漢稚圭傳元帝時上疏曰治性之道必審己之所有餘而強其所不足蓋聰明疏通者戒於大察寡聞少見者戒於旌蔽勇猛剛強者戒於大暴仁愛溫良者戒於無斷湛靜安舒者戒於後時廣心浩大者戒於遺忘必審己之所當戒而齊之以義然後中和之化應而巧偽之徒不比周而望進唯陛下戒所以崇聖德新唐宋璟傳帝東巡泰山璟復為留守謂曰卿國元老宜以嘉謀以遺朕璟因一二極言手制荅曰所進當書之座右出入觀省以誡終身新唐崔植傳拜植為門下平章事穆宗問開元中治道最盛何致而然植曰玄宗在天后時身踐憂患既即位得姚崇宋璟此二人蚤夜孜孜納君於道璟嘗手寫尚書無逸為圖以獻勸帝出入觀省以自戒其後朽暗乃代以山水圖稍怠于勤今願陛下以無逸為元龜則天下幸甚新唐張蘊古傳太宗即位蘊古以人君之位誡慎為先乃上大寶箴太宗嘉之新唐元和初憲宗頗出遊略銳意用兵公綽欲因事諷諫獻大醫箴一篇憲宗嘉納新唐李德裕傳上丹扆六箴其一曰宵衣諷視朝希晚也二曰正服諷御服非法也三曰罷獻諷歛求怪珍也四曰納誨諷侮棄忠言也五曰辨邪諷任群小也六曰防微諷偽游輕出也辭皆明白婉切帝雖不能用猶敕韋處厚諄諄作詔厚謝其意餘見治亂在臣憲宗紀箋證史記魯周公世家周公旦者周武王弟也自文王在時旦為子孝篤仁異於群子及武王即位旦常輔翼武王用事居多武王九年東伐至盟津周公輔行十一年伐紂至牧野成王在豐天下已安周之官政未次序於是周公作周官官別其宜作立政集解孔安國曰周公既致政成王恐其怠忽故以君臣立政為戒也以便百姓漢書匡衡傳治性之道必審已之所有餘而彊其所不足蓋聰明疏通者戒於大察寡聞少見者戒於雍蔽勇猛剛彊者戒於大暴仁愛溫良者戒於無斷湛靜安舒者戒於後時師古曰湛讀曰沈廣心浩大者戒於遺忘必審己之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進唯陛下戒所以崇聖德新唐書宋璟傳宋璟邢州南和人七世祖弁為元魏吏部尚書璟耿介有大節好學工文辭舉進士中第調上黨尉為監察御史遷鳳閣舍人居官鯁正武后高其才睿宗立以吏部尚書同中書門下三品元宗開元初以雍州為京兆府復為尹進御史大夫坐小累為睦州刺史徙廣州都督廣人以竹茅茨屋多火璟教之陶瓦築堵列邸肆越俗始知棟梁利而無患災召拜刑部尚書四年遷吏部兼侍中累封廣平郡公後以開府儀同三司罷政事十二年東巡泰山璟復為留守帝將發謂曰卿國元老別方歷時宜有嘉謀以遺朕璟因一二極言手制答曰所進當書之坐右出入觀省以誡終身新唐書崔祐甫傳附從子崔植植字公修祐甫弟廬江令嬰甫子也祐甫病謂妻曰吾歿當以廬江次子主吾祀及卒護喪者以聞帝惻然召植使即喪次終服補弘文生博通經史於易尤邃元和中為給事中長慶初拜中書侍郎同中書門下平章事穆宗問貞觀開元中治道最盛何致而然植曰太宗資上聖興民間知百姓疾苦故厲精思治又以房元齡杜如晦魏徵王珪為之佐君明臣忠聖賢相維治致升平故其宜也元宗在天后時身踐憂患既即位得姚崇宋璟此二人蚤夜孜孜納君於道璟嘗手寫尚書無逸為圖以獻勸帝出入觀省以自戒其後朽暗乃代以山水圖稍怠於勤左右不復箴規姦臣日用事以至於敗昔高宗嘗問先臣祐甫開元天寶事先臣具道治亂所以然臣在童丱記其說今願陛下以無逸為元龜則天下幸甚貞觀政要初以貞觀二年自幽州今大興路總管府記室兼直中書省表上大寶箴易大傳曰聖人之大寶曰位蓋取此義箴誡也文義甚美可為規誡其詞曰太宗嘉之賜帛三百段仍授以大理寺丞按通鑑無與囚博戲之說唐史張蘊古無傳事見刑法志卷八案方括號文為元戈直集論下同又舊唐書張蘊古傳張蘊古相州洹水人也性聰敏博涉書傳善綴文能背碑覆局尤曉時務為州閭所稱自幽州總管府記室直中書省太宗初即位上大寶箴以諷其詞曰舊唐書柳公綽傳柳公綽字起之京兆華原人也公綽幼聰敏年十八應制舉登賢良方正直言極諫科授秘書省校書郎貞元元年也貞元四年復應制舉再登賢良方正科時年二十一制出授渭南尉公綽性謹重動循禮法慈隰觀察使姚齊梧奏為判官得殿中侍御史冬薦授開州刺史入為侍御史再遷吏部員外郎武元衡罷相鎮西蜀與裴度俱為元衡判官尤相善先度入為吏部郎中度以詩餞別有兩人同日事征西今日君先捧紫泥之句元和初憲宗頗出遊畋銳意用兵公綽欲因事諷諫五年十一月獻大醫箴一篇其辭曰憲宗深嘉之新唐書李德裕傳李德裕字文饒元和宰相吉甫子也少力於學既冠卓犖有大節不喜與諸生試有司以陰補校書郎河東張弘靖辟靖掌書記府罷召拜監察御史穆宗即位擢翰林學士帝為太子時已聞吉甫名由是顧德裕厚凡號令大典冊皆更其手數召見賚獎優華時帝昏荒數遊幸狎比群小聽朝簡忽德裕上丹扆六箴表言心乎愛矣遐不謂矣此古之賢人篤於事君者也夫迹疏而言親者危地遠而意忠者忤臣竊惟念拔自先聖徧荷寵私不能竭忠是負靈鑒臣在先朝嘗獻大明賦以諷頗蒙嘉採今日盡節明主亦猶是也其一曰宵衣諷視朝希晚也二曰正服諷服御非法也三曰罷獻諷歛求珍怪也四曰納誨諷侮棄忠言也五曰辨邪諷任群小也六曰防微諷偽遊輕出也辭皆明直婉切帝雖不能用其言猶敕韋處厚諄諄作詔厚謝其意
