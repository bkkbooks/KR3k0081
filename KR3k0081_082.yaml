body:
  text: 卷第八十二情性第一前漢董仲舒傳對策曰天令之謂命命非聖人不行質樸之謂性性非教化不成人欲之謂情情非制度不節是故王者上謹於承天意以順命也下務明教化民以成性也正法度之宜別上下之序以防欲也前漢董仲舒對策曰命者天之令也性者生之質也情者人之欲也或夭或壽或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也前漢宣元六王東平王傳詔書又勑傳相曰夫人之性皆有五常及其少長耳目牽於耆欲故王常銷而邪心作情亂其性利勝其義而不失厥家者未之有也前漢稚圭傳傳曰審好惡理情性而王道畢矣能盡其性然後能盡人物之性能盡人物之性可以贊天地之化前漢翼奉傳元帝初即位上封事曰治道要務在知下之邪正人誠鄉正雖愚必用若乃壞邪知益為害知下之行在於六情十二律而已故曰察其所繇省其進退參之六合五行則可以見人性知人情難用外察從中甚明故詩之為學情性而已五性不相害六情更興廢觀性以曆觀情以律明主所宜獨用難與二人共也張晏曰性謂五行也曆謂日也晉灼曰翼氏五性肝性靜靜行仁甲已主之心性躁躁行禮丙辛主之脾性力力行信戊癸主之肺性堅堅行義乙庚主之腎性智智行所丁壬主之也情謂廉固寬大公止姦邪陰固貪狼也律十二律也箋證漢書董仲舒傳天令之謂命命非聖人不行質樸之謂性性非教化不成人欲之謂情情非度制不節是故王者上謹於承天意以順命也下務明教化民以成性也正法度之宜別上下之序以防欲也脩此三者而大本舉矣漢書董仲舒傳臣聞命者天之令也性者生之質也情者人之欲也或夭或鄙或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也漢書宣元六王東平王傳詔書又勑傅相曰夫人之性皆有五常及其少長耳目牽於耆欲故五常銷而邪心作情亂其性利勝其義而不失厥家者未之有也漢書匡衡傳傳曰審好惡理情性而王道畢矣能盡其性然後能盡人物之性能盡人物之性可以贊天地之化漢書翼奉傳元帝初即位諸儒薦之徵待詔宦者署數言事宴見天子敬焉時平昌侯王臨以宣帝外屬侍中稱詔欲從奉學其術奉不肯與言而上封事曰臣聞之於師治道要務在知下之邪正人誠鄉正雖愚為用若乃懷邪知益為害知下之術在於六情十二律而已故曰察其所繇省其進退參之六合五行則可以見人性知人情難用外察從中甚明故詩之為學情性而已五性不相害六情更興廢觀性以曆觀情以律明主所宜獨用難與二人共也張晏曰性謂五行也曆謂日也晉灼曰翼氏五性肝性靜靜行仁甲己主之心性躁躁行禮丙辛主之脾性力力行信戊癸主之肺性堅堅行義乙庚主之腎性智智行敬丁壬主之也張晏曰情謂六情廉貞寬大公正姦邪盜賊貪狼也律十二律也立志第二史記吳起傳出衛郭門與其母訣齧臂而盟曰起不為卿相不復入衛前漢終軍傳初軍詣博士步入關關吏與軍繻繻帛邊也裂行自合以為者廁吏曰為復傳還當以合符軍曰大丈夫西游終不復傳還棄繻而去軍為謁者使行郡國建節東出關關吏識之曰此乃前棄繻生也前漢陳勝傳勝少與人傭耕放耕之壟上曰苟富貴無相忘傭者笑曰若為傭耕何富貴也勝太息曰嗟乎燕雀安知鴻鵠之志哉前漢陳平傳里中社平為宰分肉甚均里父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如此肉矣後漢郭丹傳慨然嘆曰丹不乘使者車終不出關既至京師常為都講諸儒咸敬重之更始二年三公舉丹賢能召為諫議大夫持節使歸南陽安集受降丹自去家十有二年果乘高車出關如其志焉後漢馬援常謂賓客曰丈夫為志窮當益堅老當益壯後漢陳蕃傳蕃年十五常閑處一室而庭宇蕪穢父友薛勤來候之謂蕃曰孺子何不埽恓以待賓客蕃曰大丈夫處世當埽除天下安事一室乎勤知其有清世志甚奇之後漢黨錮岑晊傳雖在閭里慨然有董正天下之志後漢范滂傳少厲清節為州里所服時冀州飢荒盜賊群起乃以滂為清詔使案察之滂登車攬轡慨然有澄清天下之志後漢逢萌給事縣為亭長時尉行過亭萌候迎拜謁既而擲楯歎曰大丈夫安能為人役哉遂去之長安學後漢郭林宗傳母欲使給事縣庭林宗曰大丈夫焉能處斗筲之役乎就學博通墳籍晉陶侃傳侃在州無事輒朝運百甓於齋外暮運於齋內人問其故答曰吾方致力中原過爾優逸恐不堪事其勵志勤力皆此類也晉王濬傳濬恢達有大志常起宅開門前路廣數十步人或謂之何太過濬曰吾欲使容長戟幡旗眾咸笑之濬曰東勝有言燕雀安知鴻鵠之志晉丁紹傳紹自以為才足為物雄當官莅政每事剋舉視天下之事若運於掌握遂慨然有黃正四海之志矣新唐劉蕡傳蕡明春秋能言古興亡事沈健于謀浩然有救世意餘見小人不知君子班超傳箋證史記吳起傳魯人或惡吳起曰起之為人猜忍人也其少時家累千金游仕不遂遂破其家鄉黨笑之吳起殺其謗己者三十餘人而東出衛郭門與其母訣齧臂而盟曰起不為卿相不復入衛遂事曾子漢書終軍傳初軍從濟南當詣博士步入關關吏予軍繻蘇林曰繻帛邊也舊關出入皆以傳傳煩因裂繻頭合以為符信也軍問以此何為吏曰為復傳還當以合符軍曰大丈夫西游終不復傳還棄繻而去軍為謁者使行郡國建節東出關關吏識之曰此使者乃前棄繻生也漢書陳勝傳勝少時嘗與人傭耕輟耕之壟上悵然甚久曰茍富貴無相忘傭者笑而應曰若為傭耕何富貴也勝太息曰嗟乎燕雀安知鴻鵠之志哉前漢書陳平傳里中社平為宰分肉甚均里父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如此肉矣後漢書郭丹傳郭丹字少卿南陽穰人也父稚成帝時為廬江太守有清名丹七歲而孤小心孝順後母哀憐之為鬻衣裝買產業後從師長安買符入函谷關乃慨然歎曰丹不乘使者車終不出關既至京師常為都講諸儒咸敬重之大司馬嚴尤請丹辭病不就王莽又徵之遂與諸生逃於北地更始二年三公舉丹賢能徵為諫議大夫持節使歸南陽安集受降丹自去家十有二年果乘高車出關如其志焉後漢書馬援傳遇赦因留牧畜賓客多歸附者遂役屬數百家轉游隴漢間常謂賓客曰丈夫為志窮當益堅老當益壯後漢書陳蕃傳陳蕃字仲舉汝南平輿人也祖河東太守蕃年十五嘗閑處一室而庭宇蕪穢父友同郡薛勤來候之謂蕃曰孺子何不洒埽以待賓客蕃曰大丈夫處世當埽除天下安事一室乎勤知其有清世志甚奇之後漢書黨錮列傳岑晊傳晊有高才郭林宗朱公叔等皆為友李膺王暢稱其有幹國器雖在閭里慨然有董正天下之志後漢書黨錮列傳范滂傳范滂字孟博汝南征羌人也少厲清節為州里所服舉孝廉光祿四行時冀州飢荒盜賊吳起乃以滂為清詔使案察之滂登車攬轡慨然有澄清天下之志後漢書逢萌傳逢萌字子康北海都昌人也家貧給事縣為亭長時尉行過亭萌候迎拜謁既而擲楯歎曰大丈夫安能為人役哉遂去之長安學通春秋經後漢書郭太傳郭太字林宗太原界休人也家世貧賤早孤母欲使給事縣廷林宗曰大丈夫焉能處斗筲之役乎遂辭就成皋屈伯彥學三年業畢博通墳籍善談論羨音制乃游於洛陽始見河南尹李膺膺大奇之遂相友善於是名震京師晉書陶侃傳侃在州無事輒朝運百甓於齋外暮運於齋外人問其故答曰吾方致力中原過爾優逸恐不堪事其勵志勤力皆此類也晉書王濬傳王濬字士治弘農湖人也家世二千石濬博涉墳典美姿貌不修名行不為鄉曲所稱晚乃變節疎通亮達恢廓有大志吳起宅開門前路廣數十步人或謂之何太過濬曰吾欲使容長戟幡旗眾咸笑之濬曰陳勝有言燕雀安知鴻鵠之志晉書良吏列傳丁紹傳紹自以為才足為物雄當官莅政每事克舉視天下之事若運於掌握遂慨然有董正四海之志矣新唐書劉蕡傳劉蕡字去華幽州昌平人客梁汴間明春秋能言古興亡事沈健于謀浩然有救世意志不可屈第三史記魯仲連傳太史公曰魯連有指意雖不合大義然余多其在布衣之位蕩然肆志不詘於諸侯談說於當世折卿相之權後漢樊英傳永建二年順帝策書備禮召之復固辭疾篤乃詔切責郡縣駕載上道英不得已到京稱病不肯起乃強輿入殿猶不以禮屈帝怒謂英曰朕能主君能殺君能貴君能賤君君何以嫚朕命英曰臣受命於天生盡其命天也死不得其命亦天也陛下焉能生臣焉能殺臣臣暴見君如見仇讎立其朝猶不肯可得而貴乎雖在布衣之列環堵之中晏然自得不易萬乘之尊又可得而賤乎陛下焉能貴臣焉能賤臣非禮之祿雖萬鍾不受也申其意雖簞食不厭也陛下焉能富臣焉能貧臣帝不能屈而重其名使出就太醫養疾後漢高獲傳與光武有舊師事司徒歐陽歙歙下獄當斷獲冠鐵冠帶鈇鑕詣闕請歙帝雖不赦而引見之謂曰重公朕欲用子為吏宜改常性獲對曰臣受性於父母不可改之於陛下出便辭去三公爭辟不應餘見不食闇君之祿杜林傳箋證史記魯仲連傳太史公曰魯連其指意雖不合大義然余多其在布衣之位蕩然肆志不詘於諸侯談說於當世折卿相之權後漢書樊英傳永建二年順帝策書備禮玄纁徵之復固辭疾篤乃詔切責郡縣駕載上道英不得已到京稱病不肯起乃強輿入殿猶不以禮屈帝怒謂英曰朕能生君能殺君能貴君能賤君能富君能貧君君何以慢朕命英曰臣受命於天生盡其命天也死不得其命亦天也陛下焉能生臣焉能殺臣臣見暴君如見仇讎立其朝猶不肯可得而貴乎雖在布衣之列環堵之中晏然自得不易萬乘之尊又可得而賤乎陛下焉能貴臣焉能賤臣非禮之祿雖萬鍾不受也申其志雖簞食不厭也陛下焉能富臣焉能貧臣帝不能屈而敬其名使出就太醫養疾月致羊酒後漢書高獲傳高獲字敬公汝南新息人也為人尼首方面少遊學京師與光武有舊師事司徒歐陽歙歙下獄當斷獲冠鐵冠帶鐵鑕詣闕請歙帝雖不赦而引見之謂曰敬公朕欲用子為吏宜改常性獲對曰臣受性於父母不可改之於陛下出便辭去三公爭辟不應志識淺近第四後漢馬援傳公孫述稱帝於蜀囂使援往觀之賓客皆樂留援曉之曰天下雌雄未定公孫不吐哺走迎國士與圖成敗反修飾邊幅如偶人形此子何足久留天下士乎遂辭歸謂囂曰子陽井底哇耳後漢隗囂傳將吏隱居穴處之徒穴處言所識不遠也箋證後漢書馬援傳是時公孫述稱帝於蜀囂使援往觀之賓客皆樂留援曉之曰天下雄雌未定公孫不吐哺走迎國士與圖成敗反修飾邊幅如偶人形此子何足久稽天下士乎因辭歸謂囂曰子陽井底蛙耳而妄自尊大不如專意東方後漢書隗囂傳而王之將吏隱居穴處之徒穴處言所識不遠也人人抵掌欲為不善之計中人可語上下第五後漢爰延傳遷為侍中帝游上林苑從容問延曰朕何如主也對曰陛下為漢中王帝曰何以言之對曰尚書令陳蕃任事則化中常侍黃門豫政則亂是以知陛下可與為善可與為非帝曰昔朱雲庭折欄檻今侍中面稱朕違謹聞闕矣蜀志後主傳評曰後主任賢相則為循理之君惑閹豎則為昏闇之后傳曰素絲無常唯所染之信矣哉新唐元稹傳因獻書曰三代之君仁且久者教之然也周成王本中才近管蔡則讒入任周召則善聞豈天聰明哉而克終于道者教也箋證後漢書爰延傳桓帝時徵博士太尉楊秉等舉賢良方正再遷為侍中帝游上林苑從容問延曰朕何如主也對曰陛下為漢中主帝曰何以言之對曰尚書令陳蕃任事則化中常侍黃門豫政則亂是以知陛下可與為善可與為非帝曰昔朱雲廷折欄檻今侍中面稱朕違敬聞闕矣三國志蜀志後主傳評曰後主任賢相則為循理之君惑閹豎則為昏闇之后傳曰素絲無常唯所染之信矣哉新唐書元稹傳因獻書曰伏見陛下降明詔脩廢學增胄子然而事有先於此臣敢昧死言之賈誼有言三代之君仁且久者教之然也周成王本中才近管蔡則讒入任周召則善聞豈天聰明哉而克終于道者教也矯情鎮物第六前漢高祖紀四年羽大怒伏弩射中漢王傷胸乃捫足曰虜中吾指傷胸而捫足者以安眾也前漢周勃子周亞夫傳吳楚兵乏糧飢欲退數挑戰終不出夜軍中驚內相攻擊擾亂至於帳下亞夫堅臥不起頃之復定前漢夏侯嬰傳平城為胡所圍七日不得通高帝使使厚遺閼氏冒頓乃開其圍一角高帝出欲馳嬰固徐行弩皆持滿外鄉故示閑暇所以固士卒心而令敵不測也卒以得脫晉謝安傳時符堅強盛安遣弟石及兄子玄等應機征計所在剋捷後堅帥眾號百萬次于淮肥京師震恐玄入問計安夷然無懼色答曰已別有旨既而寂然玄不敢復言乃令張玄重請安遂命駕出山墅親朋畢集方與玄圍棊賭別墅安常棊劣於玄是日玄懼便為敵手而又不勝安顧謂其甥羊曇曰以墅乞汝安遂遊陟至夜乃還指授將帥各當其任玄等既破堅有驛書至安方對客圍棊看書既意便攝放床上了無喜色棊如故客問之徐答曰小兒輩遂已破賊既罷還內過戶限心喜甚不覺屐齒之折其矯情鎮物如此箋證漢書高帝紀四年羽大怒伏弩射中漢王漢王傷胸乃捫足曰虜中吾指師古曰捫摸也傷胸而捫足者以安眾也捫音門中音竹仲反漢王病創臥張良彊請漢王起行勞軍以安士卒毋令楚乘勝漢書周勃傳附子周亞夫吳楚兵乏糧飢欲退數挑戰終不出夜軍中驚內相攻擊擾亂至於帳下亞夫堅臥不起頃之復定漢書夏侯嬰傳漢王即帝位燕王臧荼反嬰從擊荼明年從至陳取楚王信更食汝陰剖符世世勿絕從擊代至武泉雲中益食千戶因從擊韓信軍胡騎晉陽旁大破之追北至平城為胡所圍七日不得通高帝使使厚遺閼氏冒頓乃開其圍一角高帝出欲馳嬰固徐行弩皆持滿外鄉師古曰故示閑暇所以固士卒心而令敵不測也鄉讀曰嚮卒以得脫晉書謝安傳時苻堅強盛彊場多虞諸將敗退相繼安遣弟石及兄子玄等應機征討所在克捷拜衛將軍開府儀同三司封建昌縣公堅後率眾號百萬次于淮肥京師震恐加安征討大都督玄入問計安夷然無懼色答曰已別有旨既而寂然玄不敢復言乃令張玄重請安遂命駕出山墅親朋畢集方與玄圍棊睹別墅安常棊劣於玄是日玄懼便為敵手而又不勝安顧謂其甥羊曇曰以墅乞汝安遂游涉至夜乃還指授將帥各當其任玄等既破堅有驛書至安方對客圍玄看書既竟便攝放牀上了無喜色棊如故客問之徐答云小兒輩遂已破賊既罷還內過內限心喜甚不覺屐齒之折其矯情鎮物如此先人後己第七前漢文帝紀詔曰昔先王遠施不求其報望祀不祀其福右賢左戚先民後己至明之極也蜀志許靖傳字文休袁徽與荀彧書曰許文休自流宕已來與隱士相隨每有患急常先人後己與九族中外同其飢寒晉皇甫謐傳避亂荊州閉門閑居未常入城府蚕而後太耕而後食先人後己尊賢愛物南土咸宗重之箋證漢書文帝紀十四年春詔曰朕獲執犧牲珪幣以事上帝宗廟十四年于今歷日彌長以不敏不明而久撫臨天下朕甚自媿其廣增諸祀壇場珪幣昔先王遠施不求其報望祀不祈其福右賢左戚先民後已至明之極也三國志蜀志許靖傳許靖字文休汝南平輿人陳國袁徽以寄寓交州徽與尚書令荀彧書曰許文休英才偉士智略足以計事自流宕以來與隱士相隨每有患急常先人後已與九族中外同其飢寒晉書皇甫謐傳附子皇甫方回方回少遵父操兼有文才永嘉初博士徵不起避亂荊州閉戶閑居未嘗入城府蠶而後衣耕而後食先人後已尊賢愛物南土人士咸崇敬之太剛第八後漢虞詡傳詡好剌舉無所回容回曲也數以此忤權戚遂九見譴考三遭刑罰而剛正之性終老不屈新唐李翱傳翱性峭鯁論議無所屈仕不得顯官怫鬱無所發見宰相李逢吉面斥其過失新唐崔元翰傳竇參輔政用為知制誥詔令溫雅合於典謨然性太剛褊簡傲不能取容於時每發言論略無阿徇忤執政旨故掌誥二年而官不遷餘見志不可屈高獲傳箋證後漢書虞詡傳詡好刺舉無所回容回曲也數以此忤權戚遂九見譴考三遭刑罰而剛正之性終老不屈新唐書李翱傳翱性峭鯁論議無所屈仕不得顯官怫鬱無所發見宰相李逢吉面斥其過失逢吉詭不校翱恚懼即移病舊唐書崔元翰傳入朝為太常博士禮部員外郎竇參輔政用為知制誥詔令溫雅合於典謨然性太剛褊簡傲不能取容於時每發言論略無阿徇忤執政旨故掌誥二年而官不遷竟罷知制誥守比部郎中元翰苦心文章時年七十餘好學不倦既介獨耿直故少交游唯秉一操伏膺翰墨柔能制剛第九史記魯世家吳王夫差彊伐齊至繒徵百牢於魯季康子使子貢說吳王及太宰嚭以禮詘之吳王曰我文身不足責禮乃止魏徐奕傳太祖謂奕曰君之忠亮古人不過也然微太嚴昔西門豹佩韋以自緩夫能以柔弱制剛彊者望之於君也蜀譙周傳于時軍旅數出百姓彫瘁周與常書令陳祗論其利害退而書之謂之仇國論其辭曰因餘之國小而肇建之國大並爭於世而為仇敵因餘之國有高賢卿者問於伏愚子曰今國事未定上下勞心往古之事能以弱勝彊者其術何如伏愚子曰吾聞之處大無患者常多慢處小有憂者常思善多慢則生亂思善則生治理之常也故周人養民以少取多句踐卹眾以弱斃彊此其術也餘見勞而無功臧宮傳箋證史記魯周公世家七年吳王夫差彊伐齊至繒徵百牢於魯季康子使子貢說吳王及太宰嚭以禮詘之吳王曰我文身不足責禮乃止三國志魏志徐奕傳太祖征孫權徙為留府長史謂奕曰君之忠亮古人不過也然微太嚴昔西門豹佩韋以自緩夫能以柔弱制剛彊者望之於君也三國志蜀志譙周傳于時軍旅數出百姓彫瘁周與尚書令陳祇論其利害退而書之謂之仇國論其辭曰因餘之國小而肇建之國大並爭於世而為仇敵因餘之國有高賢卿者問於伏愚子曰今國事未定上下勞心往古之事能以弱勝彊者其術何如伏愚子曰吾聞之處大無患者恒多慢處小有憂者恒思善多慢則生亂思善則生治理之常也故周人養民以少取多句踐卹眾以弱斃彊此其術也泛愛第十前漢伍被傳被曰當今陛下臨制天下壹齊海內氾愛烝庶前漢汲黯傳面折不能容人之過合己者善待之不合者弗能忍見士亦以此不附焉後漢李通傳通從弟軼亦素好事乃共計議曰今四方擾亂新室且亡漢當更興南陽宗室獨劉伯升兄弟汎愛容眾可與謀大事通笑曰吾意也即遣軼往迎光武蜀張嶷傳嶷初見費禕為大將軍恣性汎愛待信新附太過嶷書戒之曰昔岑彭率師來歙杖節咸見害於剌客今明將軍宜鑒前事後禕果為魏降人郭脩所害晉軼少有才器聞於當世汎愛博納眾論美之唐高祖紀高祖七歲襲唐國公及長倜儻豁達任性真率寬仁容眾無貴賤咸得其歡心箋證漢書伍被傳被曰當今陛下臨制天下一齊海內氾愛蒸庶布德施惠漢書汲黯傳汲黯為人性倨少禮面折不能容人之過合己者善待之不合者弗能忍見士亦以此不附焉後漢書李通傳及下江新市兵起南陽騷動通從弟軼亦素好事乃共計議曰今四方擾亂新室且亡漢當更興南陽宗室獨劉伯升兄弟汎愛容眾可與謀大事通笑曰吾意也會光武避吏在宛通聞之即遣軼往迎光武三國志蜀志張嶷傳嶷初見費褘為大將軍姿性汎愛待信新附太過嶷書戒之曰昔岑彭率師來歙杖節咸見害於刺客今明將軍位尊權重宜鑒前事少以為警後褘果為魏降人郭脩所害晉書華軼傳華軼字彥夏平原人魏太尉歆之曾孫也祖表太中大夫父澹河南尹軼少有才氣聞於當世汎愛博納眾論美之舊唐書高祖紀高祖以周天和元年生於長安七歲襲唐國公及長倜儻豁達任性真率寬仁容眾無貴賤咸得其歡心
