body:
  text: 卷第八求賢第一前漢武帝元封五年詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里士或有負俗之纍而立功名夫泛駕之馬跅弛之士亦在御之而已其令州郡察吏民有茂材異等可為將相及使絶國者前漢武帝元光五年秋召吏民有明當世之務習先聖之術者縣次續食令與計偕前漢元帝永光元年詔丞相御史舉質朴敦厚遜讓有行者光祿弟郎從官師古曰始令丞相御史舉此四科人以棹用之而見在郎及從官又令光祿每歲依此科考校定其弟高下用知其人賢否前漢平帝紀詔曰天下通知逸經古記天文歷算鍾律小學史篇方術本草及以五經論語孝經爾雅教授者在所為駕一封軺傳以一馬駕軺車而乘傳遣詣京師至者數千人前漢鼂錯傳皇帝詔有司諸侯王三公九卿及主郡吏各帥其志以選賢良明於國家之大體通於人事之終始及能直言極諫者各有人數將以正朕之不逮二三大夫之行當此三道朕其嘉之故登大夫于朝親諭朕志大夫其上三道之要前漢鼂錯傳皇帝曰昔者大禹勤求賢士近者獻其明遠者通厥聰比善戮力以翼天子是以大禹能亡失德夏以長楙高帝親除大害去亂從並建豪英以為官師為諫爭輔天子之闕而翼戴漢宗前漢董仲舒傳陛下思惟往古而務以求賢此亦堯舜之用心也前漢董仲舒傳曰臣愚以為使諸列侯郡守二千召各擇其吏民之賢者歲貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也母以日月為功實試賢能為上前漢杜欽傳欽云達觀其所舉富觀其所豫窮觀其所不為乏觀其所不取近觀其所為遠觀其所主孔子曰視其所以觀其所由察其所安人焉廋哉取人之術也後漢光武側席幽人求之若不及後漢蔡雍傳雍七事表曰夫求賢之道未必一塗或以德顯或以言揚南史何點曰有人倫之鑒隋辛彥之曰惠政後漢王渙傳曰擢循吏之子以勸勞魏武帝紀令曰今天下尚未定此特求賢之急時也孟公綽為趙魏老則優不可以為滕薛大夫若必廉士而後可用則齊桓其何以霸世今天下得無有被褐懷玉而釣於渭濱者乎又得無盜嫂受金而未遇無知者乎二三子其佐我明楊庂陋唯才是舉吾得而用之晉武帝紀令諸郡中正以六條舉淹滯一曰忠恪匪躬二曰孝恭盡禮三曰友于兄弟四曰潔身勞謙五曰信義可復六曰學以為已唐賈至曰鄉舉未盡取人之道宜建學以庠序里選而晉王導傳進計曰古之王者莫不賓禮故老存問風俗虛己傾心以招俊乂況天下喪亂大業草創顧榮賀循此士之望未若引之以結人心二子既至則旡不來矣帝乃使導躬造循榮二人應命而至由是吳人風靡百姓歸心晉阮種傳夫賢才之畜於國由良工之須利器巧匠之待繩墨也器用利則斫削易而材不病繩墨設則曲直正而衆形得矣是以人主必勤求賢而佚以任之也晉載記姚興傳謂群臣曰古人有言關東出相關西出將三秦饒俊異汝穎多奇士吾跨據中原自流沙已東淮漢以北未嘗不傾巳招求冀輔不逮至於智效一官行著一善吾歷級而進之不使有後聞之歎卿等宜明揚仄陋助吾舉之梁喜對曰奉旨求賢不曾休倦未見儒亮大才王佐之器可謂世之乏賢興曰自古霸王之起也莫不將則韓吳相兼蕭鄧終不採將於往賢求相於曩哲卿自識拔不明求之不至耳奈何厚誙四海乎新唐李百藥子安期高宗屢引侍臣責以不進賢良衆皆莫對獨安期進曰臣聞聖帝明王莫不勞於求賢逸於任使設使堯舜苦己癯瘠不能用賢終亦王化不行餘見得賢門商本紀箋證漢書武帝紀夏四月詔曰朕巡荊揚輯江淮物會大海氣以合泰山上天見象增修封禪其赦天下所幸縣毋出今年租賦賜鰥寡孤獨帛貧窮者粟還幸甘泉郊泰畤大司馬大將軍青薨初置刺史部十三州名臣文武欲盡詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里士或有負俗之纍而立功名晉灼曰負俗謂被世譏論也師古曰纍音力瑞反夫泛駕之馬跅弛之士亦在御之而已師古曰在人所以制御之其令州郡察吏民有茂材異等應劭曰舊言秀才避光武諱稱茂材異等者超等軼群不與凡同也師古曰茂美也可為將相及使絶國者師古曰絶遠之國謂聲教之外漢書武帝紀秋七月大風拔木乙巳皇后陳氏廢捕為巫蠱者皆梟首八月螟師古曰食苗心之蠱也音莫經反徵吏民有明當時之務習先聖之術者縣次續食令與計偕漢書元帝紀永光元年春正月行幸甘泉郊泰畤赦雲陽徒賜民爵一級女子百戶牛酒高年帛行所過毋出租賦二月詔丞相御史舉質朴敦厚遜讓有行者光祿歲以此科第郎從官師古曰始令丞相御史舉此四科人以擢用之而見在郎及從官又令光祿每歲依此科考校定其第高下用知其人賢否也漢書平帝紀孝平皇帝元帝庶孫中山孝王子也母曰衛姬年三歲嗣立為王元壽二年六月哀帝崩九月辛酉中山王即皇帝位劉攽曰辛酉去哀帝崩六十四日謁高廟大赦天下帝年九歲太皇太后臨朝大司馬莽秉政五年春正月祫祭明堂諸侯王二十八人列侯百二十人宗室子九百餘人徵助祭禮畢皆益戶賜爵及金帛增秩補吏各有差詔曰宣明德化萬國齊同皆封為列侯徵天下通知逸經古記天文歷算鍾律小學史篇方術本草及以五經論語孝經爾雅教授者在所為駕一封軺傳師古曰以一馬駕軺車而乘傳傳音張戀反遣詣京師至者數千人漢書鼂錯傳詔有司諸侯王三公九卿及主郡吏師古曰主郡吏謂郡守也各帥其志以選賢良明於國家之大體通於人事之終始及能直言極諫者各有人數將以匡朕之不逮二三大夫之行當此三道張晏曰三道國體人事直言也師古曰二三大夫總謂當時受策者非止錯一人焉朕甚嘉之故登大夫於朝親諭朕志師古曰諭告也大夫其上三道之要漢書鼂錯傳皇帝曰昔者大禹勤求賢士施及方外四極之內舟車所至人迹所及靡不聞命以輔其不逮師古曰意所不及者取其言以自輔也近者獻其明遠者通厥聰比善戮力以翼天子師古曰比和也翼助也比音頻寐反是以大禹能亡失德夏以長楙師古曰楙美也高皇帝親除大害去亂從並建豪英以為官師為諫爭輔天子之闕而翼戴漢宗也漢書董仲舒傳陛下親耕藉田以為農先夙寤晨興憂勞萬民思惟往古而務以求賢此亦堯舜之用心也漢書董仲舒傳臣愚以為使諸列侯郡守二千石各擇其吏民之賢者歲貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也師古曰授之以官以使其材也遍得天下之賢人則三王之盛易為而堯舜之名可及也毋以日月為功實試賢能為上漢書杜周傳附杜欽欽字子夏少好經書家富而目偏盲故不好為吏上盡召直言之士詣白虎殿對策欽對曰臣聞天道貴信地道貴貞師古曰貞正也孝人行之所先也觀本行於鄉黨考功能於官職達觀其所舉富觀其所豫窮觀其所不為乏觀其所不取近觀其所為遠觀其所主孔子曰視其所以觀其所由察其所安人焉廋哉師古曰論語載孔子之言也廋匿也言視人之所用觀人之所從察人之所樂則可知其善惡無所匿其情也取人之術也後漢書逸民列傳光武側席幽人求之若不及國語曰越王夫人去笄側席而坐韋昭注云側猶特也禮憂者側席而坐前書公孫弘贊曰上方欲用文武求之如弗及後漢書蔡雍傳時頻有雷霆疾風傷樹拔木地震隕雹蝗蟲之害又鮮卑犯境役賦及民六年七月制書引咎誥群臣各陳政要所當施行雍上封事曰謹條宜所施行七事表左三事夫求賢之道未必一塗或以德顯或以言揚頃者立朝之士曾不以忠信見賞恆被謗訕之誅遂使群下結口莫圖正辭郎中張文前獨盡狂言聖聽納受以責三司臣子曠然衆庶解悅臣愚以為宜擢文右職以勸忠謇宣聲海內博開政路案會史録南史何點曰有人倫之鑒云云未見南史載不知何所出何點其人梁書有傳然亦未見人倫之鋻説也隋書儒林列傳辛彥之辛彥之隴西狄道人也祖世敘魏徵州刺史父靈輔周渭州刺史彥之九歲而孤不交非類博涉經史與天水牛弘同志好學後入關遂家京兆周太祖見而器之引為中外府禮曹賜以衣馬珠玉時國家草創百度伊始朝貴多出武人修定儀注唯彥之而已尋拜中書侍郎高祖受禪除太常少卿改封任城郡公進位上開府尋轉國子祭酒歲餘拜禮部尚書于時州牧多貢珍玩唯彥之所貢並供祭之物高祖善之顧謂朝臣曰人安得無學彥之所貢稽古之力也遷洛州刺史前後俱有惠政後漢書王渙傳王渙字稚子廣漢郪人也永初二年鄧太后詔曰夫忠良之吏國家所以為理也求之甚勤得之至寡洛陽令王渙秉清修之節蹈羔羊之義盡心奉公務在惠民功業未遂不幸早世百姓追思為之立祠自非忠愛之至孰能若斯者乎今以渙子石為郎中以勸勞勤三國志魏志武帝操十五年春下令曰自古受命及中興之君曷嘗不得賢人君子與之共治天下者乎及其得賢也曾不出閭巷豈幸相遇哉上之人不求之耳今天下尚未定此特求賢之急時也孟公綽為趙魏老則優不可以為滕薛大夫若必廉士而後可用則齊桓其何以霸世今天下得無有被褐懷玉而釣於渭濱者乎又得無盜嫂受金而未遇無知者乎二三子其佐我明揚仄陋唯才是舉吾得而用之晉書武帝紀武皇帝諱炎字安世文帝長子也咸熙二年五月立為晉王太子八月辛卯文帝崩太子嗣相國晉王位乙未令諸郡中正以六條舉淹滯一曰忠恪匪躬二曰孝敬盡禮三曰友于兄弟四曰潔身勞謙五曰信義可復六曰學以為已唐書賈曾傳附子賈至至字幼鄰擢明經坐小法貶嶽州司馬寶應初召復故官遷尚書左丞楊綰建請依古制縣令舉孝廉于刺史刺史升天子禮部詔有司參議多是綰言至議以為自晉後衣冠遷徙人多僑處因緣官族所在占籍今鄉舉取人未盡請廣學校增國子博士員十道大州得置大學館詔博士領之召置生徒使保桑梓者鄉里舉焉在流寓者庠序推焉晉書王導傳會三月上巳帝親觀褉乘肩輿具威儀敦導及諸名勝皆騎從吳人紀瞻顧榮皆江南之望竊覘之見其如此咸驚懼乃相率拜於道左導因進計曰古之王者莫不賓禮故老存問風俗虛己傾心以招俊乂况天下喪亂九州分裂大業草創急於得人者乎顧榮賀循此土之望未若引之以結人心二子既至則無不來矣帝乃使導躬造循榮二人皆應命而至由是吳會風靡百姓歸心焉晉書阮种傳阮种字德猷陳留尉氏人漢侍中胥卿八世孫也弱冠有殊操為嵇康所重康著養生論所稱阮生即种也太保何曾舉种賢良策种對曰夫賢才之畜於國由良工之須利器巧匠之待繩墨也器用利則斫削易而材不病繩墨設則曲直正而衆形得矣是以人主必勤求賢而佚以任之也晉書載記姚興下興如三原顧謂群臣曰古人有言關東出相關西出將三秦饒異汝潁多奇士吾應天明命跨據中原自流沙已東淮漢已北未嘗不傾已招求冀匡不逮然明不照下弗感懸魚至於智效一官行著一善吾歷級而進之不使有後門之歎卿等宜明揚仄陋助吾舉之梁喜對曰奉旨求賢弗曾休倦未見儒亮大才王佐之器可謂世之乏賢興曰自古霸王之起也莫不將則韓吳相兼蕭鄧終不採將於往賢求相於後哲卿自識拔不明求之不至奈何厚誣四海乎卷一百一十八舊唐書李百藥傳附子安期安期幼聰辨貞觀初纍轉符璽郎預修晉書成除主客員外郎永徽中遷中書舍人又與李義府等於武德殿內修書再轉黃門侍郎龍朔中為司列少常伯參知軍國有事太山詔安期為朝覲壇碑文安期前後三為選部頗為當時所稱時高宗屢引侍臣責以不進賢良衆皆莫對獨安期進曰臣聞聖帝明王莫不勞於求賢逸於任使設使堯舜苦己癯瘠不能用賢終亦王化不行取賢不拘門地第二前漢贊曰蕭何曹參皆起秦刀筆吏漢興依日月之末光擅功名位冠群后為一代之宗臣前漢贊曰婁恭脫挽輅而建金城之策叔孫舍抱鼓而立一王之儀前漢公孫弘傳起徒步數年至宰相封侯前漢王褒聖主得賢臣頌去卑辱奧泄而升本朝離疏釋蹻而享膏梁前漢梅福傳曰昔高祖聽言不求其能舉功不考其素陳平起於亡命而為謀主韓信拔於行陳而建上將故天下之士雲合歸漢後漢肅宗詔前世舉人貢士或起甽畝不繫閥閲言前代舉人務取賢人不拘門地也吳陸凱傳上疏曰商湯取士於商賈齊桓取士於車轅周武取士於負薪大漢取士於奴僕明王聖主取士以賢不拘卑賤故其功德洋溢名流竹素晉虞預上書曰高宗文王思佐發夢拔巖徒以為相載釣老而師之餘見任賢門孔子世家又見賢人衆多門兒寬箋證漢書蕭何曹參傳贊曰蕭何曹參皆起秦刀筆吏師古曰刀所以削書也古者用簡牒故吏皆以刀筆自隨也當時録録未有奇節師古曰録録猶鹿鹿言在凡庶之中也漢興依日月之末光師古曰漢初興故以日月為喻耳何以信謹守管籥參與韓信俱征伐師古曰高祖出征何每居守故言守管籥天下既定因民之疾秦法順流與之更始二人同心遂安海內淮陰黥布等已滅唯何參擅功名位冠群臣聲施後世為一代宗臣漢書酈陸朱劉叔孫傳贊曰高祖以征伐定天下而縉紳之徒騁其知辨並成大業語曰廊廟之材非一木之枝帝王之功非一士之略師古曰此語本出慎子信哉劉敬德挽輅而建金城之安叔孫通舍枹鼓而立一王之儀遇其時也漢書公孫弘傳先是漢常以列侯為丞相唯弘無爵上於是下詔曰朕嘉先聖之道開廣門路宣招四方之士蓋古者任賢而序位量能以授官勞大者厥祿厚德盛者獲爵尊故武功以顯重而文德以行褒其以高成之平津鄉戶六百五十封丞相弘為平津侯其後以為故事至丞相封自弘始也時上方興功業婁舉賢良師古曰婁古屢字弘自見為舉首起徒步數年至宰相封侯漢書王褒傳益州刺史因奏褒有軼材上乃徵褒既至詔褒為聖主得賢臣頌其意褒對曰及其遇明君遭聖主也運籌合上意諫諍即見聽進退得關其忠任職得行其術去卑辱奧泄而升本朝離疏釋蹻而享膏梁漢書梅福傳梅福字子真九江壽春人也少學長安明尚書榖梁春秋為郡文學補南昌尉後去官歸壽春是時成帝委任大將軍王鳳鳳專藝擅朝而京兆尹王章素忠直譏刺鳳為鳳所誅王氏浸盛災異數見群下莫敢正言福復上書曰昔高祖納善若不及從諫若轉圜師古曰不及恐失之也轉圜言其順易也聽言不求其能舉功不考其素師古曰直取其功不論其舊行及所從來也陳平起於亡命而為謀主韓信拔於行陳而建上將故天下之士雲合歸漢師古曰言四面而至後漢書章帝紀肅宗孝章皇帝諱炟顯宗第五子也母賈貴人永平三年立為皇太子少寬容好儒術顯宗器重之十八年八月壬子即皇帝位年十九建初元年三月甲寅山陽東平地震己巳詔曰明政無大小以得人為本夫鄉舉里選必纍功勞今刺史守相不明真偽茂才孝廉歲以百數既非能顯而當授之政事甚無謂也每尋前世舉人貢士或起甽畝不繫閥閲説文曰甽田中之溝音工犬反史記曰明其等曰閥積其功曰閲言前代舉人務取賢才不拘門地三國志吳志陸凱傳陸凱字敬風吳郡吳人也丞相遜族子也時徙都武昌揚土百姓泝流供給以為患苦又政事多謬黎元窮匱凱上疏曰臣聞有道之君以樂樂民無道之君以樂樂身樂民者其樂彌長樂身者不久而亡臣聞殷湯取士于商賈齊桓取士于車轅周武取士于負薪大漢取士于奴僕明王聖主取士以賢不拘卑賤故其功德洋溢名流竹素晉書虞預傳虞預字叔寧徵士喜之弟也本名茂犯明穆皇后母諱故改焉太興二年大旱詔求讜言直諫之士預上書諫曰大晉受命于今五十餘載自元康以來王德始闕臣愚謂為國之要在於得才得才之術在於抽引苟其可用讎賤必舉高宗文王思佐發夢拔巖徒以為相載釣老而師之聘賢第三史記商本紀伊尹處士湯使人聘迎之五反然后肯往從湯言素王及九主之事前漢兩龔傳大司空何武執金吾閻崇薦龔勝哀帝固已聞其名召為諫大夫引見勝薦龔舍及亢父寧壽濟陰侯嘉有詔皆召勝曰竊見國家召醫巫常為駕召賢者宜駕上曰大夫乘私車來邪勝曰唯唯有詔為駕龔舍侯嘉至皆為諫大夫寧壽稱疾不至前漢儒林傳武帝使使束帛加璧安車以蒲裏輪駕駟迎申公至上問治亂之事申公已八十餘老對曰為治者不至多言顧力行何如耳後漢嚴光傳齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車遣使聘之三反而後至後漢郎顗傳臣聞刳舟剡楫將欲濟江海也聘賢選佐將以安天下也昔唐堯在上群龍為用群龍喻賢臣也文武創德周召作輔是以能建天地之功增日月之耀後漢董卓傳順帝備玉帛以聘南陽樊英天子降寢殿設壇席尚書奉引延問失得急登賢之舉虛降己之禮於是處士鄙生忘其拘儒拂巾衽褐以企旌車之招矣晉皇甫謐傳時濟陰太守文立表以命士有贄為煩請絶其禮幣詔從之謐聞而歎曰夫束帛戔戔易之明義玄纁之贄自古之舊也故孔子稱夙夜疆學以待問席上之珍以待聘士於是乎三揖乃進明致之難也一讓而退明去之易也若湯之於伊尹文王之於太公或身即莘野或就載以歸唯恐禮之不重豈吝其煩費哉且一禮不備正女恥之況命士乎孔子曰賜也爾愛其羊我愛其禮棄之如何箋證史記殷本紀或曰伊尹處士湯使人聘迎之五反然後肯往從湯言素王及九主之事集解駰案劉向別録曰九主者有法君專君授君勞君等君寄君破君國君三歲社君凡九品圖畫其形索隱按素王者太素上皇其道質素故稱素王九主者三皇五帝及夏禹也或曰九主謂九皇也然按注劉向所稱九主載之七録名稱甚奇不知所憑據耳卷三漢書兩龔傳兩龔皆楚人也勝字君倩舍字君倩二人相友並著名節故世謂之楚兩龔少皆好學明經勝為郡吏舍不仕大司空何武執金吾閻崇薦勝哀帝自為定陶王固已聞其名徵為諫大夫引見勝薦龔舍及亢父寧壽濟陰侯嘉有詔皆徵勝曰竊見國家徵醫巫常為駕徵賢者宜駕上曰大夫乘私車來邪勝曰唯唯有詔為駕龔舍侯嘉至皆為諫大夫寧壽稱疾不至漢書儒林傳申公申公魯人也少與楚元王交俱事齊人浮丘伯受詩漢興高祖過魯申公以弟子從師入見于魯南宮呂太后時浮丘伯在長安楚元王遣子郢與申公俱卒學師古曰郢即郢客也元王薨郢嗣立為楚王令申公傅太子戊戊不好學病申公及戊立為王胥靡申公申公愧之歸魯退居家教終身不出門復謝賓客及代趙綰亦嘗受詩申公為御史大夫綰臧請立明堂以朝諸侯不能就其事乃言師申公於是上使使束帛加璧安車以蒲裹輪駕駟迎申公弟子二人乘軺傳從至見上上問治亂之事申公時已八十餘老對曰為治者不在多言顧力行何如耳師古曰顧念也力行謂勉力為行也後漢書嚴光傳嚴光字子陵一名遵會稽餘姚人也少有高名與光武同遊學及光武即位光乃變名姓隱身不見帝思其賢乃令以物色訪之以其形貌求之後齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車玄纁遣使聘之三反而後至後漢書郎顗傳顗又上書薦黃瓊李固并陳消災之術曰臣聞刳舟剡楫將欲濟江海也易曰高帝刳木為舟剡木為楫聘賢選佐將以安天下也昔唐堯在上群龍為用群龍喻賢臣也文武創德周召作輔是以能建天地之功增日月之耀者也後漢書左周黃列傳論曰古者諸侯歲貢士進賢順帝始以童弱反政而號令自出知能任使故士得用情天下喁喁仰其風采遂乃備玄纁玉帛以聘南陽樊英天子降寢殿設壇席尚書奉引延問失得急登賢之舉虛降己之禮於是處士鄙生忘其拘儒拘儒猶褊狹也拂巾衽褐以企旌車之招矣晉書皇甫謐傳濟陰太守蜀人文立表以命士有贄為煩請絶其禮幣詔從之謐聞而歎曰亡國之大夫不可與圖存而以革歷代之制其可乎夫束帛戔戔易之明義玄纁之贄自古之舊也故孔子稱夙夜強學以待問席上之珍以待聘士於是乎三揖乃進明致之難也一讓而退明去之易也若殷湯之於伊尹文王之於太公或身即莘野或就載以歸唯恐禮之不重豈吝其煩費哉且一禮不備貞女恥之況命士乎孔子曰賜也爾愛其羊我愛其禮棄之如何思賢第四史記趙世家簡子有臣曰周舍好直諫周舍死簡子每聽朝不悅大夫請罪簡子曰大夫無罪千羊之皮不如一狐之腋諸大夫朝徒聞唯唯不聞周舍之鄂鄂是以憂也前漢賈誼傳誼為長沙太傅後歲餘文帝思誼召之至入見乃拜誼為梁懷王太傅後漢嚴光傳光少有高名與光武同遊學及光武即位光乃變名姓隱身不見帝思其賢乃令以物色訪之蜀諸葛亮傳先主詣亮亮曰將軍既帝室之胄信義也者下四海總覽英雄思賢如渴箋證史記趙世家孔子聞趙簡子不請晉君而執邯鄲午保晉陽故書春秋曰趙鞅以晉陽畔趙簡子有臣曰周舍好直諫周舍死簡子每聽朝常不悅大夫請罪簡子曰大夫無罪吾聞千羊之皮不如一狐之腋諸大夫朝徒聞唯唯不聞周舍之鄂鄂是以憂也集解駰案韓詩外傳曰周舍立于門下三日三夜簡子使問之曰子欲見寡人何事對曰願為鄂鄂之臣墨筆操牘從君之過而日有記月有成歲有效也漢書賈誼傳誼以為漢興二十餘年天下和洽宜當改正朔易服色制度定官名興禮樂乃草具其儀法色上黃數用五為官名悉更奏之文帝謙讓未皇也然諸法令所更定及列侯就國其説皆誼發之于是天子議以誼任公卿之位絳灌東陽侯馮敬之屬盡害之乃毀誼曰雒陽之人年少初學專欲擅權紛亂諸事于是天子後亦疏之不用其議以誼為長沙王太傅後歲餘文帝思誼徵之至入見上方受釐坐宣室蘇林曰宣室未央前正室也應劭曰釐祭餘肉也漢儀注祭天地五畤皇帝不自行祠還致福釐音禧師古曰禧福也借釐字為之耳言受神之福也上因感鬼神事而問鬼神之本誼具道所以然之故至夜半文帝前席師古曰漸促近誼聽説其言也既罷曰吾久不見賈生自以為過之今不及也乃拜誼為梁懷王太傅後漢書嚴光傳嚴光字子陵一名遵會稽餘姚人也少有高名與光武同遊學及光武即位光乃變名姓隱身不見帝思其賢乃令以物色訪之卷一百十三三國志蜀志諸葛亮傳時先主屯新野徐庶見先主先主器之謂先主曰諸葛孔明者臥龍也將軍豈願見之乎先主曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之由是先主遂詣亮凡三往乃見因屏人曰將軍既帝室之胄信義著於四海總攬英雄思賢如渴得賢第五史記商本紀武丁即位思復興商而未得其佐夜夢得聖人名曰説以夢所見視群臣百吏皆非也乃使百工營求之野得説於傅險中是時説為胥靡築於傅險見於武丁武丁曰是也與之語果聖人舉以為相商國大治前漢鼂錯對策曰古之賢主莫不求賢以為輔翼故黃帝得力牧而為五帝先大禹得咎繇而為三王祖齊桓得管子而為五伯長前漢仲舒對曰堯受命以天下為憂而未以位為樂也故誅逐亂臣務求賢聖是以得舜禹稷卨咎繇衆聖輔德賢能佐職前漢主父偃傳是時徐樂嚴安亦俱上書言世務書奏上召見三人謂曰公皆安在何相見之晚也前漢梅福傳孝武皇帝好忠諫説至言出爵不待廉茂慶賜不須顯功是以天下布衣各厲志竭精以赴闕廷自衒鬻者不可勝數漢家得賢於此為盛前漢梅福傳士者國家之重器得士則重失士則輕前漢田儋傳弟橫懼誅而與五百餘人入海居島中高帝使使赦橫罪而召之橫乃與其客二人詣雒陽至尸鄉廄置橫謂其客曰陛下不過欲一見我面貌耳陛下在雒陽今斬吾頭馳三十里間形容尚未能敗遂白刎令客奉其頭從使者馳秦之高帝以王者禮葬橫既葬二客穿其冢旁皆自剄從之高帝聞而大驚以橫之客皆賢者吾聞餘尚五百人在海中使使召至聞橫死亦皆自殺乃知田橫兄弟能得士也前漢哀帝詔曰聖王之治以得賢為首後漢郎顗傳臣考之國典驗之聞見莫不以得賢為功失士為敗且賢者出處翔而後集魏杜恕傳曰官得其人則政平訟理政平故民富實訟理故囹圄空虛箋證史記殷本紀小乙崩子帝武丁立帝武丁即位思復興殷而未得其佐三年不言政事決定於冢宰以觀國風武丁夜夢得聖人名曰説以夢所見視群臣百吏皆非也於是乃使百工營求之野得説於傅險中是時説為胥靡築於傅險見於武丁武丁曰是也得而與之語果聖人舉以為相殷國大治漢書鼂錯傳錯對曰平陽侯臣窋孟康曰曹窋參子也汝陰侯臣竈如淳曰夏侯嬰子也潁陰侯臣何文潁曰灌嬰子廷尉臣宜昌隴西太守臣昆邪服虔曰公孫昆邪也師古曰昆讀曰混音下昆反所選賢良太子家令臣錯師古曰詔列侯九卿及郡守舉賢良故錯為窋等所舉昧死再拜言臣竊聞古之賢主莫不求賢以為輔翼故黃帝得力牧而為五帝先大禹得咎繇而為三王祖齊桓得管子而為五伯長漢書董仲舒傳仲舒對曰臣聞堯受命以天下為憂而未以位為樂也宋祁曰古本位字上有在字故誅逐亂臣務求賢聖是以得舜禹稷卨咎繇衆聖輔德賢能佐職漢書主父偃傳主父偃齊國臨災人也學長短縱橫術晚乃學易春秋百家之言元光元年乃西入關見衛將軍師古曰衛青衛將軍數言上上不省資用乏留久諸侯賓客多厭之乃上書闕下朝奏暮召入見所言九事其八事為律令一事諫伐胸奴是時徐樂嚴安亦俱上書言世務書奏上召見三人謂曰公皆安在何相見之晚也漢書梅福傳是時成帝委任大將軍王鳳鳳專藝擅朝而京兆尹王章素忠直譏刺鳳為鳳所誅王氏浸盛災異數見群下莫敢正言福復上書曰臣聞孝武皇帝好忠諫説至言師古曰説讀曰悅出爵不待廉茂慶賜不須顯功師古曰謂諫爭合意即得官爵不由薦舉及軍功也廉廉吏也茂茂材也是以天下布衣各厲志竭精以赴闕廷自衒鬻者不可勝數漢家得賢於此為盛漢書梅福傳士者國之重器得士則重失士則輕卷六十七案此文與上文相接續皆梅福之言漢書田儋傳田儋狄人也師古曰狄縣名也地理志屬千乘故齊王田氏之族也師古曰亦六國時齊也儋從弟榮榮弟橫皆豪桀宗強能得人漢滅項籍漢王立為皇帝彭越為梁王橫懼誅而與其徒屬五百餘人入海居島中韋昭曰海中山曰島師古曰音于老反高帝聞之以橫兄弟本定齊齊人賢者多附焉今在海中不收後恐有亂乃使使赦橫罪而召之橫謝曰臣亨陛下之使酈食其今聞其弟商為漢將而賢臣恐懼不敢詔請為庶人守海內中使還報高帝乃詔衛尉酈商曰齊王橫即至人馬從者敢動輒者致族夷師古曰族夷言平除其族乃復使使持節具告以詔意曰橫來大者王小者乃侯耳師古曰大者謂橫身小者其徒屬劉奉世曰黃帝唯召鳳耳故許之大者封王小亦不失為侯詳語意可知豈為其徒衆哉不來且發兵加誅橫乃與其客二人乘傳詣雒陽至尸鄉廄置應劭曰尸鄉在偃師城西臣瓚曰案廄置謂置馬以傳驛者橫謝使者曰人臣見天子當洗沐止留謂其客曰橫始與漢王俱南面稱孤今漢王為天子而橫乃為亡虜北面事之其愧固已甚矣又吾亨人之兄與其弟併肩而事主縱彼畏天子之詔不敢動輒我獨不愧於心乎且陛下所以欲見我不過欲一見我面貌耳陛下在雒陽今斬吾頭馳三十里間形容尚未能敗猶可知也遂自剄令客奉其頭從使者馳奏之黃帝黃帝曰嗟乎有以起布衣兄弟三人更王豈非賢哉為之流涕而拜其二客為都尉發卒二千以王者禮葬橫既葬二客穿其冢旁皆自剄從之黃帝聞而大驚以橫之客皆賢者吾聞其餘尚五百人在海中使使召至聞橫死亦皆自殺於是乃知田橫兄弟能得士也漢書哀帝紀建平元年二月詔曰蓋聞聖王之治以得賢為首後漢書郎顗傳顗又上書薦黃瓊李固并陳消災之術曰臣考之國典驗之聞見莫不以得賢為功失事為敗且賢者出處翔而後集論語色斯舉矣翔而後集三國志魏志杜畿傳附子杜恕恕字務伯太和中為散騎黃門侍郎恕推誠以質不治飾少無名譽及在朝不結交援專心向公每政有得失常引綱維以正言於是侍中辛毗等器重之時公卿以下大議損益恕以為古之刺史奉宣六條以清淨為名威風著稱今可勿令領兵以專民事俄而鎮北將軍呂昭又領冀州乃上疏曰國家以人擇官不為官擇人也官得其人則政平訟理政平故民富實訟理故囹圄虛空以賢為寶第六史記田敬仲完世家威王與魏王會田於郊魏王問曰王亦有寶乎威王曰無有梁王曰若寡人國小也尚有徑寸之珠照車前後各十二乘者十秋奈何以萬乘之國而無寶乎威王曰寡人之所以為寶與王異吾臣有檀子者使守南城則楚人不敢為寇東取泗上十二諸侯皆來朝吾臣有朌子者使守高唐則趙人不敢東漁於河吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門徙而從者七千餘家吾臣有種首者使備盜賊則道不拾遺將以照千里豈特十二乘哉梁惠王慙不懌而去前漢杜欽傳子業云竊見朱博忠信勇猛材略不世出誠國家雄俊之寶臣也宜召博置左右以填天下此人在朝則陛下可高枕而臥矣吳志制曰陸機文武奕葉將相連華而機以廊廟蘊才瑚璉摽器晉羅含傳大守謝尚與含為方外之好乃稱曰羅君章可謂湘中之琳琅晉褚陶傳陶嘗謂所親曰聖賢備在黃卷中捨此何求後為尚書郎張華見之謂陸機曰君兄弟龍躍雲津顧彥先鳳鳴朝陽謂東南之寶已盡不意復見褚生機曰公但未覩不鳴不躍者耳華曰故知延門之德不孤川嶽之寶不匱矣晉顧榮傳時南土之士未盡才用榮又言陸士光甘季思榮族兄公讓會稽楊彥明謝行言皆服膺儒教足為公望賀生沉潛青雲之士陶恭兄弟才幹雖少實事極佳凡此諸人皆南金也書奏皆納之箋證史記田敬仲完世家威王二十三年與趙王會平陸二十四年與魏王會田於郊魏王問曰王亦有寶乎威王曰無有梁王曰若寡人國小也尚有徑寸之珠照車前後各十二乘者十枚奈何以萬乘之國而無寶乎威王曰寡人之所以為寶與王異吾臣有檀子者索隱檀子齊臣檀姓子男子美稱大夫皆稱子檀子田朌也黔夫及種首皆臣名事悉具戰國策使守南城則楚人不敢為寇東取泗上十二諸侯皆來朝吾臣有朌子者使守高唐則趙人不敢東漁於河吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門集解賈逵曰齊之北門西門也言燕趙之人畏見侵伐故祭以求福徙而從者七千餘家吾臣有種首者使備盜賊則道不拾遺將以照千里豈特十二乘哉梁惠王慙不懌而去漢書杜周傳附杜欽之子杜業業有材能以列侯選復為太常數言得失不事權貴哀帝即位業復上書言陛下初即位謙讓未皇師古曰皇暇也宜蚤以義割恩安百姓心竊見朱博忠信勇猛材略不世出師古曰言其希有也誠國家雄俊之寶臣也宜徵博置左右以填天下此人在朝則陛下可高枕而臥矣晉書陸機傳制曰古人云雖楚有才晉實用之觀夫陸機陸雲實荊衡之杞梓挺圭璋於秀實馳英華於早年風鑒澄爽神情俊邁文藻宏麗獨步當時然其祖考重光羽楫吳運文武奕葉將相連華而機以廊廟蘊才瑚璉標器晉書文苑傳羅含羅含字君章桂陽耒陽人也高祖彥臨海太守父綏滎陽太守含幼孤為叔母朱氏所養少有志尚太守謝尚與含為方外之好乃稱曰羅君章可謂湘中之琳琅晉書文苑傳禇陶禇陶字季雅吳郡錢塘人也弱不好弄少而聰慧清淡間默以墳典自娛年十二作鷗鳥水磑二賦見者奇之陶嘗謂所親曰聖賢備在黃卷中捨此何求州郡辟不就吳平召補尚書郎張華見之謂陸機曰君兄弟龍躍雲津顧彥先鳳鳴朝陽謂東南之寶已盡不意復見禇生機曰公但未覩不鳴不躍者耳華曰故知延門之德不孤川嶽之寶不匱矣晉書顧榮傳顧榮字彥先吳國吳人也為南土著姓祖雍吳丞相父穆宜都太守榮機神朗悟弱冠仕吳為黃門侍郎太子輔義都尉吳平與陸機兄弟同入洛時人號為三俊元帝鎮江東以榮為軍司加散騎常侍凡所謀畫皆以咨焉榮既南州望士躬處右職朝野甚推敬之時帝所幸鄭貴嬪有疾以祈禱頗廢萬幾榮上箋諫曰時南土之士未盡才用榮又言陸士光貞正清貴金玉其質甘季思忠款盡誠膽幹殊快殷慶元質略有明規文武可施用榮族兄公讓明亮守節困不易操會稽楊彥明謝行言皆服膺儒教足為公望賀生沉潛青雲之士陶恭兄弟才幹雖少實事極佳凡此諸人皆南金也書奏皆納之
