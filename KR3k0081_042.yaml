body:
  text: 卷第四十二朝會第一前漢叔孫通傳漢王已并天下諸侯共尊為皇帝悉去秦儀法為簡易群臣飲爭功醉或妄呼拔劍擊柱上患之通與弟子百餘人為綿蕞野外立竹及茅索營之習禮儀其中也習之月餘乃令群臣習肄漢七年長樂宮成諸侯群臣朝十月漢時尚以十月為正於是皇帝輦出房百官執戟傳警傳聲而唱警引諸侯王已下以次奉賀莫不震恐御史執法舉不如儀者輒引去無敢歡譁失禮者高帝曰吾乃今日知為皇帝之貴也拜通為奉常前漢武帝五年春祠高祖于明堂以配上帝因朝諸侯王列侯受群國計若今之計帳前漢宣元六王東平思王宇傳來朝上疏求諸子及大史公書上以問王鳳對曰諸侯朝聘考文章正法度非禮不言今東平王來朝而求諸書非朝聘之義也諸子書或反經術非聖人或明鬼神信物怪太史公書有戰國從撗權譎之謀漢興之初謀臣奇策天官災異地形厄塞皆不宜在諸侯王不可豫前漢志異為濟南亭長以廉直稍遷至九卿上與湯既造白鹿皮幣問異異曰今王侯朝賀以蒼璧直數千而其皮薦反四十万本末不相稱天子不説後漢班固東都賦曰春王三朝會同漢京是日也天子受四海之圖籍膺万國之貢珍魏明帝紀詔曰古者諸侯朝聘所以敦睦親親協和万國也先帝著令不欲使諸王在京都者謂幼主在位母后攝政防微以漸關諸盛衰也朕惟不見諸王十有二載能不興思其令諸王及宗室公侯各將適子一人朝魏郭淮傳黃初元年奉使賀文帝踐祚而道路得疾故稽留及群臣歡會帝正色責之曰昔禹會諸侯於塗山防風後至便行大戮今普天同慶而卿最留遲何也淮對曰五帝先教導民以德夏后政衰始用刑辟今臣遭唐虞之世是以自知免於防風之誅也帝悅之晉禮志漢儀有正會禮正旦夜漏未盡十刻鍾鳴受賀公侯以下執贄來庭二千石以上升殿稱万歲然後作樂宴饗箋證漢書叔孫通傳漢王已并天下諸侯共尊為皇帝於定陶通就其儀號高帝悉去秦儀法為簡易群臣飲爭功醉或妄呼按劍擊柱上患之通知上益饜之與其弟子百餘人為綿蕞野外應劭曰立竹及茅索營之習禮儀其中也如淳曰謂以茅剪樹地為纂位尊卑之次也春秋傳曰置茅蕝師古曰蕞與蕝同並音子産反如説是習之月餘通曰上可試觀上使行禮曰吾能為此乃令群臣習肄會十月漢七年長樂宮成諸侯群臣朝十月師古曰適會七年十月而長樂宮新成也漢時尚以十月為正月故行朝歲之禮史家追書十月於是皇帝輦出房百官執戟傳警師古曰傳聲而唱警引諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不震恐御史執法舉不如儀者輒引去竟朝置酒無敢歡譁失禮者於是高帝曰吾乃今日知為皇帝之貴也拜通為奉常漢書武帝紀五年春三月還至太山增封甲子祠高祖于明堂以配上帝因朝諸侯王列侯受郡國計師古曰計若今之諸州計帳也漢書宣元六王傳東平思王宇後年來朝上疏求諸子及太史公書上以問大將軍王鳳對曰臣聞諸侯朝聘考文章正法度非禮不言今東平王幸得來朝不思制節謹度以防危失而求諸書非朝聘之義也諸子書或反經術非聖人或明鬼神信物怪太史公書有戰國從橫權譎之謀漢興之初謀臣奇策天官災異地形厄塞皆不宜在諸侯王不可豫漢書食貨志初異為濟南亭長以廉直稍遷至九卿上與湯既造白鹿皮幣問異異曰今王侯朝賀以倉璧直數千而其皮薦反四十萬本末不相稱天子不説後漢書班固傳春王三朝會同漢京是日也天子受四海之圖籍膺萬國之貢珍三國志魏志明帝紀太和五年乙酉皇子殷生大赦八月詔曰古者諸侯朝聘所以敦睦親親協和萬國也先帝著令不欲使諸王在京都者謂幼主在位母后攝政防微以漸關諸盛衰也朕惟不見諸王十有二載悠悠之懷能不興思其令諸王及宗室公侯各將適子一人朝三國志魏志郭淮傳黃初元年奉使賀文帝踐阼而道路得疾故計遠近為稽留及群臣歡會帝正色責之曰昔禹會諸侯於塗山防風後至便行大戮今溥天同慶而卿最留遲何也淮對曰臣聞五帝先教導民以德夏后政衰始用刑辟今臣遭唐虞之世是以自知免於防風之誅也帝悅之晉書禮志下漢儀有正會禮正旦夜漏未盡七刻鐘鳴受賀公侯以下執贄來庭二千石以上升殿稱萬歲然後作樂宴饗盟誓第二史記平原君傳秦之圍邯鄲趙使平原君求救合從於楚約與食客門下有勇力文武備具者二十人偕門不得十九人餘無可取者有毛遂者前自贊於平原君曰願君以遂備員而行矣平原君曰夫賢士之處世也譬若錐之處囊中其未立見今先生處勝門下三年左右未有所稱誦毛遂曰臣乃今日請處囊中耳平原君乃與毛遂偕平原君與楚合從言其利害日出而言之日中不決十九人謂毛遂曰先生上毛遂案劍歷階而上楚正叱曰胡不下毛遂案劍曰王之所以叱遂者以楚國之衆也今十步之內王不得恃楚國之衆也以楚之強天下弗能當白起小豎子耳興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗之惡焉合從者為楚非為趙也楚王曰唯唯誠若先生之言謹奉社稷而以從毛遂謂楚王之左右曰取雞狗馬之血來毛遂奉銅盤而跪進之楚王曰王當歃血而定從次者吾君次者遂遂定從於殿上毛遂左手持盤血而右手招十九人曰公相與歃此血於堂下公等録録所謂因人成事者也平原君已定從而歸曰勝不敢復相士勝相士多者千人寬者百數自以為不失天下之士今乃於毛先生而失之也史記吳起東遊出衛郭門與其母別齧指而盟曰起不為卿相不復入衛前漢王陵傳曰高后立諸呂為王王陵曰高皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王呂氏非約也後漢隗囂傳崔廣等共推囂為上將軍囂既立遣使聘請方望以為軍師望至説囂曰雖欲以漢為名其實旡所受命將何信於衆乎宜急立高廟稱臣奉祠所謂神道設教求助人神者也遂立廟邑東祀高祖太宗世宗囂等皆稱臣執事史奉璧而告祝畢有司坎于庭牽馬橾刀奉盤錯匙遂割牲而盟曰凡我同盟三十一將十六姓允承天道興輔劉宗如懷姦慮明神殛之吳志與蜀為盟曰且古建大事必先盟誓故周禮有司盟之官尚書有告誓之文漢之與吳雖信由中然分土裂境且有盟約云云晉祖逖傳時帝方柘定江南未遑北伐逖進説曰晉室之亂非上旡道而下怨叛也由藩王爭權自相誅滅遂使戎狄乘隙毒流中原帝乃以逖為奮威將軍豫州剌史渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈衆皆慨歎晉王羲之傳為會稽內史稱疾去郡於父母墓前自誓曰羲之不夭夙遭閔凶遂因人乏蒙國寵榮每仰詠老氏周任之誡常恐斯亡旡日是用寤寐永歎若墜深谷止足之分定之於今稽顙歸誠自今之後敢渝此心貪冒苟進是有旡尊之心而不子也子而不子天地所不覆載名教所不得容也信誓之誠有如皎日晉應詹傳為南平太守天門武陵溪蠻並反詹討降之時政令不一諸蠻怨望並謀背叛詹召蠻酋破銅券與盟由是懷詹數郡旡虞新唐書柳渾傳渾瑊與吐蕃會平涼是日帝語大臣以和我息師之便馬燧賀同今日已盟可百年旡慮患渾跪曰五帝旡誥誓三王旡盟詛蓋盟詛之興皆在季末今盛明之朝反以季末事行於夷狄夫夷狄人面獸心易以兵制難以信結臣竊憂之李晟繼言曰蕃戎多不情誠如渾言帝變色曰渾儒生未達邊事而大臣亦當爾耶皆頓首謝夜半邠寧節度使韓遊環飛奏吐蕃劫盟將校皆覆沒帝大驚即以其表示渾明日慰之曰卿儒士乃知軍戎萬里情乎箋證史記平原君列傳秦之圍邯鄲正義趙惠文王九年秦昭王十五年趙使平原君求救合從於楚約與食客門下有勇力文武備具者二十人偕平原君曰使文能取勝則善矣文不能取勝則歃血於華屋之下必得定從而還士不外索取於食客門下足矣得十九人餘無可取者無以滿二十人門下有毛遂者前自贊於平原君曰遂聞君將合從於楚約與食客門下二十人偕不外索今少一人願君即以遂備員而行矣平原君曰先生處勝之門下幾年於此矣毛遂曰三年於此矣平原君曰夫賢士之處世也譬若錐之處囊中其末立見今先生處勝之門下三年於此矣左右未有所稱誦勝未有所聞是先生無所有也先生不能先生留毛遂曰臣乃今日請處囊中耳使遂蚤得處囊中乃頴脫而出非特其末見而已平原君竟與毛遂偕十九人相與目笑之而未發也毛遂比至楚與十九人論議十九人皆服平原君與楚合從言其利害日出而言之日中不決十九人謂毛遂曰先生上毛遂按劍歷階而上謂平原君曰從之利害兩言而決耳今日出而言從日中不決何也楚王謂平原君曰客何為者也平原君曰是勝之舍人也楚王叱曰胡不下吾乃與而君言汝何為者也毛遂按劍而前曰王之所以叱遂者以楚國之衆也今十步之內王不得恃楚國之衆也王之命懸於遂手吾君在前叱者何也且遂聞湯以七十里之地王天下文王以百里之壤而臣諸侯豈其士卒衆多哉誠能據其勢而奮其威今楚地方五千里持戟百萬此霸王之資也以楚之強天下弗能當白起小豎子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡焉合從者為楚非為趙也吾君在前叱者何也楚王曰唯唯誠若先生之言謹奉社稷而以從毛遂曰從定乎楚王曰定矣毛遂謂楚王之左右曰取雞狗馬之血來毛遂奉銅盤而跪進之楚王曰王當歃血而定從次者吾君次者遂遂定從於殿上毛遂左手持盤血而右手招十九人曰公相與歃此血於堂下公等録録所謂因人成事者也平原君已定從而歸歸至於趙曰勝不敢復相士勝相士多者千人寡者百數自以為不失天下之士今乃於毛先生而失之也史記吳起列傳吳起者衛人也好用兵吳起殺其謗己者三十餘人而東出衛郭門與其母訣齧臂而盟曰起不為卿相不復入衛漢書王陵傳惠帝崩高后欲立諸呂為王問陵陵曰高皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王呂氏非約也後漢書隗囂傳崔廣等以為舉事宜立主以一衆心咸謂囂素有名好經書遂共推為上將軍囂既立遣使聘請平陵人方望以為軍師望至説囂曰足下欲承天順民輔漢而起今立者乃在南陽王莽尚據長安雖欲以漢為名其實無所受命將何以見信於衆乎宜急立高廟稱臣奉祠所謂神道設教求助人神者也囂從其言遂立廟邑東祀高祖太宗世宗囂等皆稱臣執事史奉璧而告祝畢有司穿坎于庭牽馬操刀奉盤錯匙遂割牲而盟曰凡我同盟三十一將十有六姓允承天道興輔劉宗如懷姦慮明神殛之三國志吳志孫權傳黃龍元年六月蜀遣衛尉陳震慶權踐位權乃參分天下豫青徐幽屬吳兗冀并涼屬蜀其司州之土以函谷關為界造為盟曰且古建大事必先盟誓故周禮有司盟之官尚書有告誓之文漢之與吳雖信由中然分土裂境宜有盟約晉書祖逖傳祖逖字士稚范陽遒人也時帝方拓定江南未遑北伐逖進説曰晉室之亂非上無道而下怨叛也由藩王爭權自相誅滅遂使戎狄乘隙毒流中原帝乃以逖為奮威將軍豫州刺史給千人廩布三千匹不給鎧仗使自招募仍將本流徙部曲百餘家渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈衆皆慨歎晉書王羲之傳王羲之字逸少司徒導之從子也時驃騎將軍王述少有名譽與羲之齊名而羲之甚輕之由是情好不協述先為會稽以母喪居郡境羲之代述止一弔遂不重詣述後檢察會稽郡辨其刑政主者疲於簡對羲之深恥之遂稱病去郡於父母墓前自誓曰維永和十一年三月癸卯朔九日辛亥小子羲之敢告二尊之靈羲之不夭夙遭閔凶不蒙過庭之訓母兄鞠育得漸庶幾遂因人乏蒙國寵榮進無忠孝之節退違推賢之義每仰詠老氏周任之誡常恐死亡無日憂及宗祀豈在微身而已是用寤寐永歎若墜深谷止足之分定之於今謹以今月吉辰肆筵設席稽顙歸誠告誓先靈自今之後敢渝此心貪冒苟進是有無尊之心而不子也子而不子天地所不覆載名教所不得容信誓之誠有如皎日晉書應詹傳應詹字思遠汝南南頓人魏侍中璩之孫也初辟公府為太子舍人遷南平太守王澄為荊州假詹督南平天門武陵三郡軍事天門武陵溪蠻並反詹討降之時政令不一諸蠻怨望並謀背叛詹召蠻酋破銅券與盟由是懷詹數郡無虞新唐書柳渾傳柳渾字夷曠一字惟深本名載梁僕射惔六世孫渾瑊與吐蕃會平涼是日帝語大臣以和戎息師之便馬燧賀曰今日已盟可百年無虜患渾跪曰五帝無誥誓三王無盟詛蓋盟詛之興皆在季末今盛明之朝反以季末事行於夷狄夫夷狄人面獸心易以兵制難以信結臣竊憂之李晟繼言曰蕃戎多不情誠如渾言帝變色曰渾儒生未達邊事而大臣亦當爾邪皆頓首謝夜半邠寧節度使韓遊環飛奏吐蕃劫盟將校皆覆沒帝大驚即以其表示渾明日慰之曰卿儒士乃知軍戎萬里情乎奉使第三史記陸賈楚人也以客從高祖定天下名有口辨士居左右常使諸侯時中國初定尉他平南越因王之高祖使賈賜尉他印為南越王令稱臣前漢藝文志從橫者流蓋出於行人之官孔子曰誦詩三百使於四方不能顓對雖多亦奚以為又曰使乎使乎言其當權事制宜受命而不受辭此其所長也及邪人為之則上詐諼而棄其信後漢來歙傳論曰世稱來君叔天下信士夫專使乎二國之間豈厭詐謀哉而能獨以信稱者良其誠心在乎使兩義俱安而已不私其功也晉樂志成帝臨軒遣使蔡謨議曰公侯大臣人臣所重是以命使之日御親臨軒此居謹事之意也古者天王饗下國之命及命將帥遣使臣皆有樂故詩序曰皇皇者華君遣使臣也皆作樂以歌之故謂臨軒遣使宜有金石之樂議奏從焉新唐宗室傳李希烈反遷江西節度使受命日不宿家箋證史記陸賈列傳陸賈者楚人也以客從高祖定天下名為有口辨士居左右常使諸侯及高祖時中國初定尉他平南越因王之索隱趙他為南越尉故曰尉他他音駝高祖使陸賈賜尉他印為南越王陸生卒拜尉他為越王令稱臣奉漢約漢書藝文志從橫家者流蓋出於行人之官孔子曰誦詩三百使於四方不能顓對雖多亦奚以為又曰使乎使乎言其當權事制宜受命而不受辭此其所長也及邪人為之則上詐諼而棄其信師古曰諼詐言也後漢書來歙傳來歙字君叔南陽新野人也論曰世稱來君叔天下信士夫專使乎二國之間豈厭詐謀哉而能獨以信稱者良其誠心在乎使兩義俱安而已不私其功也晉書禮志下咸康四年成帝臨軒遣使太常蔡謨議曰公侯大臣人君所重故御坐為起在輿為下言稱伯舅傳曰國卿君之二也是以命使之日御親臨軒百僚陪列此即敬事之意也古者天王饗下國之使及命將帥遣使臣皆有樂故詩序曰皇皇者華君遣使臣也皆作樂而歌之今命大使拜輔相比於下國之臣輕重殊矣輕誠有之重亦宜然故謂臨軒遣使宜有金石之樂議奏從焉新唐書太宗諸子傳曹王明附子産皋字子蘭李希烈反遷江西節度使受命日不宿家奉使異域第四前漢武帝紀元封五年詔曰求吏民有茂才異等可使絶國者前漢傳介子傳先是龜茲音丘慈樓蘭皆嘗殺漢使者元鳳中介子求使大宛因詔令責樓蘭龜茲國介子至樓蘭責其王教胸奴遮殺漢使大兵方至王苟不教胸奴胸奴使過至諸國何為不言王謝服言胸奴使屬過之欲反當至烏孫道過龜茲介子至龜茲復責其王王亦大罪介子從伏宛還到龜茲龜茲言胸奴使從烏孫還在此介子因率其吏士共誅斬胸奴使者還奏事詔拜介子為中郎遷平樂監前漢張騫傳建元中為郎時胸奴降者言胸奴破月氏王以其頭為飲器月氏遁而怨胸奴無與共擊之漢方欲事滅胡聞此言欲通使道必更胸奴中乃募能使者騫以郎應募使月氏前漢終軍傳南越與漢和親乃遣軍使南越説其王欲令入朝比內諸侯軍自請願受長纓必羈南越王面致之闕下軍遂往説越王越王聽許請舉國內屬天子大説則南越大臣印綬一用漢法以新改其俗前漢江充傳充因自請願使胸奴詔問其狀充對曰因變制宜以敵為師事不可豫圖充使胸奴還拜為直指繡衣使者後漢梁慬傳父諷歷州宰竇憲出征胸奴除諷為軍司馬令先齎金帛使北單于宣國威德其歸附者萬餘人後漢季恂傳持節使幽州宣布恩澤慰撫北狄所過皆圖寫山川屯田聚落百餘卷悉封奏上肅宗嘉之箋證漢書武帝紀元封五年詔曰其令州郡察吏民有茂材異等可為將相及使絶國者師古曰絶遠之國謂聲教之外漢書傅介子傳傅介子北地人也以從軍為官先是龜茲樓蘭皆嘗殺漢使者服虔曰龜茲音丘慈語在西域傳至元鳳中介子以駿馬監求使大宛因詔令責樓蘭龜茲國介子至樓蘭責其王教胸奴遮殺漢使大兵方至王苟不教胸奴胸奴使過至諸國何為不言王謝服言胸奴使屬過當至烏孫道過龜茲介子至龜茲復責其王王亦服罪介子從大宛還到龜茲龜茲言胸奴使從烏孫還在此介子因率其吏士共誅斬胸奴使者還奏事詔拜介子為中郎遷平樂監漢書張騫傳張騫漢中人也建元中為郎時胸奴降者言胸奴破月氏王以其頭為飲器韋昭曰飲器椑榼也晉灼曰飲器虎子屬也或曰飲酒之器也師古曰胸奴傳云以所破月氏王頭共飲血盟然則飲酒之器是也韋云椑榼晉云獸子皆非也椑榼即今之偏榼所以盛酒耳非用飲者也獸子褻器所以溲便者也椑音鼙月氏遁而怨胸奴無與共擊之師古曰無人援助也漢方欲事滅胡聞此言欲通使道必更胸奴中乃募能使者騫以郎應募使月氏卷六十一四漢書終軍傳南越與漢和親乃遣軍使南越説其王欲令入朝比內諸侯軍自請願受長纓必羈南越王而致之闕下軍遂往説越王越王聽許請舉國內屬天子大説賜南越大臣印綬一用漢法以新改其俗漢書江充傳江充字次倩趙國邯鄲人也充為人魁岸容貌甚壯帝望見而異之謂左右曰燕趙固多奇士既至前問以當世政事上説之充因自請願使胸奴詔問其狀充對曰因變制宜以敵為師事不可豫圖上以充為謁者使胸奴還拜為直指繡衣使者後漢書梁慬傳梁慬字伯威慬音勤北地弋居人也父諷荊州宰永元元年車騎將軍竇憲出征胸奴除諷為軍司馬令先齎金帛使北單于宣國威德其歸附者萬餘人後漢書李恂傳李恂後拜侍御史持節使幽州宣布恩澤慰撫北狄所過皆圖寫山川屯田聚落百餘卷悉封奏上肅宗嘉之使不辱命第五史記廉藺傳趙惠文王得楚和氏璧秦昭王聞之使人遺趙王書願以十五城請易璧趙王遣藺相如奉璧西入秦秦王坐章臺見相如相如奉璧奏秦王相如見秦王無意償趙城乃使從者衣褐懷璧從徑道亡歸于趙秦王用見藺相如相如曰臣令人持璧間歸至趙矣臣請就湯鑊左右或欲引相如去秦王因曰今殺相如終不能得璧而絶秦趙之歡不如因而厚遇之使歸趙相如既歸趙王以為使不辱於諸侯拜相如為士大夫前漢昭帝紀元始六年栘中監蘇武前使胸奴留單于庭十九歲乃還奉使全節以武為典屬國武傳贊曰孔子稱志士仁人有殺身以成仁無求生以害仁使於四方不辱君命蘇武有之矣後漢鄭衆傳時北胸奴遣使求和親顯宗遣衆持節使胸奴衆至北庭虜欲令衆拜衆不為屈單于大怒圍守閉之不與水火欲脅服衆衆拔刀自誓單于恐而止還京師新唐河間王孝恭傳漢陽郡王環始為郡公進王高祖使持幣遺突厥頡利可汗言和親事頡利始見環倨甚環開説示以厚幣乃大喜改容加禮因遣使隨入獻名馬後復聘頡利謂其下曰前環來悔不少屈之當使拜我環伺知之既見頡利即長揖頡利怒留不遣環意象自若不為屈虜知不可劫卒以禮遣新唐胡證傳太和公主降回鶻證為和親使次漠南虜人欲屈脅之且言使者必易胡服又欲主便道疾驅者證固不從以唐官儀自將訖不辱命箋證史記廉頗藺相如列傳趙惠文王時得楚和氏璧秦昭王聞之使人遺趙王書願以十五城請易璧趙王於是遂遣相如奉璧西入秦秦王坐章臺見相如相如奉璧奏秦王秦王大喜傳以示美人及左右相如視秦王無意償趙城乃使其從者衣褐懷其璧從徑道亡歸璧于趙秦王齋五日後乃設九賓禮於庭引趙使者藺相如相如至謂秦王曰誠恐見欺於王而負趙故令人持璧歸間至趙矣臣知欺大王之罪當誅臣請就湯鑊左右或欲引相如去秦王因曰今殺相如終不能得璧也而絶秦趙之歡不如因而厚遇之使歸趙相如既歸趙王以為賢大夫使不辱於諸侯拜相如為上大夫漢書昭帝紀始元六年栘中監蘇武前使胸奴留單于庭十九歲乃還奉使全節以武為典屬國又漢書蘇建傳附蘇武贊曰孔子稱志士仁人有殺身以成仁無求生以害仁使於四方不辱君命蘇武有之矣卷五十四案蘇武蘇建之中子也後漢書鄭興傳附子鄭衆贊字仲師永平初辟司空府以明經給事中再遷越騎司馬復留給事中是時北胸奴遣使求和親八年顯宗遣衆持節使胸奴衆至北庭虜欲令拜衆不為屈單于大怒圍守閉之不與水火欲脅服衆衆拔刀自誓單于恐而止乃更發使隨衆還京師新唐書宗室列傳漢陽郡王瓌漢陽郡王瓌始為郡公進王高祖使持幣遺突厥頡利可汗言和親事頡利始見瓌倨甚瓌開説示以厚幣乃大喜改容加禮因遣使隨入獻名馬後復聘頡利謂其下曰前瓌來悔不少屈之當使拜我瓌伺知之既見頡利即長揖頡利怒留不遣瓌意象自若不為屈虜知不可劫卒以禮遣新唐書胡證傳胡證字啓中河中河東人太和公主降回鶻以檢校工部尚書為和親使舊制行人有私覿禮縣官不能具召富人子納資於使而命之官證請儉受省費以絶鬻官之濫次漠南虜人欲屈脅之且言使者必易胡服又欲主便道疾驅者證固不從以唐官儀自將訖不辱命奉使稱旨第六前漢蓋寬饒傳為太中大夫使行風俗多所稱舉貶黜奉使稱旨擢為司隸校尉前漢杜周傳周遷御史案邊失亡所論殺甚衆奏事中上意任用師古曰以奏事當天子之意二前漢孔光傳成帝舉為博士數使録冤獄行風俗振贍流民奉使稱意由是蜀費褘傳褘使吳孫權性既滑稽嘲啁無方諸葛恪等才博果辨論難鋒至褘辭順義篤據理以答終不能屈權甚器之謂褘曰君天下淑德必當股肱蜀朝恐不能數來也還遷為侍中亮北住漢中請褘為參軍以奉使稱旨頻煩至吳箋證漢書蓋寬饒傳以寬饒為太中大夫使行風俗多所稱舉貶黜奉使稱意擢為司隸校尉漢書杜周傳義縱為南陽太守以周為爪牙薦之張湯為廷尉史使案邊失亡所論殺甚多奏事中意任用師古曰以奏事當天子之意旨故被任用也漢書孔光傳成帝初即位舉為博士數使録冤獄行風俗振贍流民奉使稱旨宋祁曰旨當作意越本作意由是知名三國志蜀志費褘傳亮以初從南歸以褘為昭信校尉使吳孫權性既滑稽嘲啁無方諸葛恪羊衛等才慱果辨論難鋒至褘辭順義篤據理以答終不能屈權甚器之謂褘曰君天下淑德必當股肱蜀朝恐不能數來也還遷為侍中亮北住漢中請褘為參軍以奉使稱旨頻煩至吳奉使死節第七前漢陳湯傳初元四年郅支遣使奉獻因求侍子願為內附漢議遣衛司馬谷吉送之御史大夫貢禹博士稚圭以為春秋之義許夷狄者不一而足言制節之不皆稱其所求今郅支單于鄉化未醇所在絶遠宜令使者送其子至塞而還吉上書言中國與夷狄有羈縻不絶之義今既養全其子十年德澤甚厚空絶而不送近從塞還示棄捐不畜使無鄉從之心棄前恩立後怨不便臣幸得建強漢之節承明聖之詔宣諭厚恩不宜敢桀若懷禽獸加無道於臣則必遲逃遠舍不敢近邊沒一使以安百姓國之計臣之願也願送至庭禹復爭以為吉往必為國取悔生事馮奉世以為可遣上許焉既至郅支單于怒竟殺吉等前漢朱建傳乃召其子拜為中大夫使胸奴單于無禮罵單于遂死胸奴中前漢伏隆傳時張步兄弟各擁強兵據齊地拜隆持節使青徐二州招降郡國隆移檄青徐群盜即時皆降張步遣使隨隆詣闕其冬拜隆光祿大夫復使於步即拜步為東萊太守而劉永亦遣使立步為齊王步欲留隆與共守二州隆不聽步遂執隆而受永封隆遣間使上書言吏人知步反畔心不附之願以時進兵無以臣隆為念臣隆得生到闕廷受誅有司此其大願若令沒身寇手以父母昆弟長纍陛下帝得隆奏召父湛流涕以示之曰隆可謂有蘇武之節後步遂殺之時人莫不憐哀焉新唐顏真卿傳盧杞專權忌真卿會李希烈陷汝州杞乃建遣真卿四方所信若往諭之可不勞師而定真卿見希烈宣詔旨希烈養子千餘拔刃爭進將食之真卿色不變希烈以身扞麾其衆退希烈僣稱帝使問儀式對曰老夫耄矣曾掌國禮所記諸侯朝覲耳希烈因發怒使閹奴等害真卿曰有詔真卿再拜奴曰宜賜卿死曰老臣無狀罪當死然使人何日從長安來奴曰從大梁來罵曰乃逆賊耳何詔云遂縊殺之箋證漢書陳湯傳初元四年遣使奉獻因求侍子願為內附漢議遣衛司馬谷吉送之御史大夫貢禹博士匡衡以為春秋之義許夷狄者不一而足師古曰言節制之不皆稱其所求也今郅支單于鄉化未醇所在絶遠宜令使者送其子至塞而還吉上書言中國與夷狄有羈縻不絶之義今既養全其子十年絶澤甚厚空絶而不送近從塞還示棄捐不畜使無鄉從之心棄前恩立後怨不便議者見前江乃始無應敵之數知勇俱困以致恥辱即豫為臣憂臣幸得建強漢之節承聖明之詔宣諭厚恩不宜敢桀若懷禽獸加無道於臣則單于長嬰大罪必遁逃遠舍不敢近邊沒一使以安百姓國之計臣之願也願送至庭上以示朝者禹復爭以為吉往必為國取悔生事不可許右將軍馮奉世以為可遣上許焉既至郅支單于怒竟殺吉等漢書朱建傳乃召其子拜為中大夫使胸奴單于無禮罵單于遂死胸奴中後漢書伏湛傳附子伏隆隆字伯文少以節操立名仕郡督郵建武二年詣懷宮光武甚親接之時張步兄弟各擁強兵據有齊地拜隆為太中大夫持節使青徐二州招降郡國隆移檄青徐群盜即時皆降張步遣使隨隆詣闕上書獻鰒魚其冬拜隆光祿大夫復使於步即拜步為東萊太守而劉永亦復遣使立步為齊王步欲留隆與共守二州隆不聽求得反命步遂執隆而受永封隆遣間使上書曰吏人知步反畔心不附之願以時進兵無以臣隆為念臣隆得生到闕廷受誅有司此其大願若令沒身寇手以父母昆弟長纍陛下帝得隆奏召父湛流涕以示之曰隆可謂有蘇武之節其後步遂殺之時人莫不憐哀焉新唐書顏真卿傳李希烈陷汝州杞乃建遣真卿四方所信若往諭之可不勞師而定既見希烈宣詔旨希烈養子千餘拔刃爭進諸將皆慢罵將食之真卿色不變希烈以身扞麾其衆退希烈僭稱帝使問儀式對曰老夫耄矣曾掌國禮所記諸侯朝覲耳希烈因發怒使閹奴等害真卿曰有詔真卿再拜奴曰宜賜卿死曰老臣無狀罪當死然使人何日長安來奴曰從大梁來罵曰乃逆賊耳何詔云遂縊殺之
