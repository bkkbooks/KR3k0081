body:
  text: 卷第七十七四民第一前漢貨殖傳管子曰古之四民不得新處士相與言仁誼於間宴工相與議技巧於官府商相與議財利於市井農相與謀稼穡於田壄朝夕從事不見異物而遷焉故其父兄之教不肅而成子弟之學不勞而能各安其居而樂其業甘其食而美其服雖見奇麗紛華非其所習辟猶戎翟之與于越不相入矣于越南方越名也辟讀曰譬是以欲寡而事節財足而不爭於是在民上者道之以德齊之以禮故民有恥而且恭貴誼而賤利此三代直道而行不嚴而治之大略也前漢食貨志聖王域民築城郭以居之制廬井以均之開市肆以通之設庠序以教之士農工商四人有業學以居位曰士闢土殖榖曰農作巧成器曰工通財鬻貨曰商前漢敘傳四民食力罔有兼業大不淫侈細不匱乏蓋均無貧遵王之法靡法靡度民肆其詐偪上并下荒殖其貨侯服玉食敗俗傷化後漢班固傳作兩都賦曰于斯之時都都相望邑邑相屬國藉十世之基家承百年之業士食舊德之名氏農服先疇之畎畝商修族世之所鬻工用高曾之規矩粲乎隱隱各得其所箋證漢書貨殖傳序管子云古之四民不得雜處士相與言仁誼於間宴師古曰間讀曰閑工相與議技巧於官府商相與語財利於市井農相與謀稼穡於田壄朝夕從事不見異物而遷焉故其父兄之教不肅而成子弟之學不勞而能各安其居而樂其業甘其食而美其服雖見奇麗紛華非其所習辟猶戎翟之與于越不相入矣孟康曰于越南方越名也師古曰于發語聲也戎蠻之語則然于越猶句吳耳辟讀曰譬是以欲寡而事節財足而不爭於是在民上者道之以德師古曰道讀曰導齊之以禮故民有恥而且敬貴誼而賤利此三代之所以直道而行不嚴而治之大略也漢書食貨志財者帝王所以聚人守位養成群生奉順天德治國安民之本也故曰不患寡而患不均不患貧而患不安蓋均亡貧和亡寡安亡傾師古曰論語載孔子之言是以聖王域民師古曰為邦域築城郭以居之制廬井以均之師古曰井田之中為屋廬開市肆以通之設庠序以教之士農工商四民有業學以居位曰士闢土殖穀曰農作巧成器曰工通財鬻貨曰商漢書敘傳四民食力罔有兼業大不淫侈細不匱乏蓋均無貧遵王之法靡法靡度民肆其詐偪上并下荒殖其貨師古曰荒大也侯服玉食敗俗傷化後漢書班彪傳附子班固乃上兩都賦盛稱洛邑制度之美以折西賓淫侈之論其辭曰于斯之時都都相望邑邑相屬國藉十世之基家承百年之業士食舊德之名氏農服先疇之畎畝商修族世之所鬻工用高曾之規矩粲乎隱隱各得其所抑商賈第二史記平準書桑弘羊為治粟都尉領大農盡代僅管天下鹽鐵桑羊以諸官各自市相與爭物故騰躍而天下賦輸或不償其僦費乃請置大農部丞數十人分部主郡國各往往縣置均輸鹽鐵官令遠方各以其物貴時商賈所轉販者為賦而相灌輸置準平于京師都受天下委輸召工官治車諸器皆仰給大農大農之諸官盡籠天下之貨物貴即賣之賤則買之如此富商大賈無所牟大利牟取也則反本而萬物不得騰踊故抑天下物名曰平準天子以為然許之前漢高祖紀八年令賈人無得衣錦繡綺縠絺紵罽操兵乘騎馬後漢桓譚傳上疏曰今富商大賈多放錢貨中家子弟為之保役趨走與臣僕等勤收稅與封君比入是以眾人慕效不耕而食至乃多通侈靡以淫耳目今可令諸商賈自相糾告若非身力所得皆以臧畀告者如此則專役一己不敢以貨與人事寡力弱必歸功田畝田畝脩則榖入多而地力盡矣餘見四民唐食貨志箋證史記平準書其明年元封元年卜式貶秩為太子太傅而桑弘羊為治粟都尉領大農盡代僅筦天下鹽鐵弘羊以諸官各自市相與爭物故騰躍而天下賦輸或不償其僦費索隱服虔謂載云僦言所輸物不足償其雇載之費也僦音子就反乃請置大農部丞數十人分部主郡國各往往縣置均輸鹽鐵官令遠方各以其物貴時商賈所轉販者為賦而相灌輸置平準于京師都受天下委輸召工官治車諸器皆仰給大農大農之諸官盡籠天下之貨物貴即賣之賤則買之如此富商大賈無所牟大利集解如淳曰牟取也則反本而萬物不得騰踊故抑天下物名曰平準天子以為然許之漢書高帝紀八年春三月行如雒陽令吏卒從軍至平城及守城邑者如淳曰平城左右諸城能堅守者皆復終身勿事爵非公乘以上毋得冠劉氏冠文穎曰即竹皮冠也賈人毋得衣錦繡綺縠絺紵罽操兵乘騎馬後漢書桓譚傳莽時為掌樂大夫更始立召拜太中大夫世祖即位徵待詔上書言事失旨不用後大司空宋弘薦譚拜議郎給事中因上疏陳時政所宜曰今富商大賈多放錢貨中家子弟為之保役中家猶中等也保役可保信也趨走與臣僕等勤收稅與封君比入收稅謂舉錢輸息利也東觀記曰中家子為之保役受計上疏趨走俯伏譬若臣僕坐而分利也是以眾人慕效不耕而食至乃多通侈靡以淫耳目今可令諸商賈自相糾告若非身力所得皆以臧畀告者如此則專役一己不敢以貨與人事寡力弱必歸功田畝田畝脩則榖入多而地力盡矣禁民二業第三後漢桓譚傳上疏曰理國之道舉本業而抑未利是以先帝禁人二業錮商賈不得宦為吏此所以卿并兼長廉恥也後漢劉般傳般上言郡國以官禁二業至有田者不得漁捕今濱江湖郡率少蠶桑民資漁採以助口實且以冬春閑月不妨農事夫漁獵之利為田除害有助榖食無關二業也箋證後漢書桓譚傳莽時為掌樂大夫更始立召拜太中大夫世祖即位徵待詔上書言事失旨不用後大司空宋弘薦譚拜議郎給事中因上疏陳時政所宜曰夫理國之道舉本業而抑末利是以先帝禁人二業錮商賈不得宦為吏高祖時令賈人不得衣絲乘車市井子孫不得宦為吏此所以抑并兼長廉恥也後漢書劉般傳劉般字伯興宣帝之玄孫也先是時下令禁民二業謂農者不得商賈也又以郡國牛疫通使區種增耕而吏下檢結多失其實百姓患之般上言郡國以官禁二業至有田者不得漁捕今濱江湖郡率少蠶桑民資漁採以助口實且以冬春閑月不妨農事夫漁獵之利為田除害有助穀食無關二業也移風俗第四前漢地理志凡民函五常之性其剛柔緩急音聲不同繫水土之風氣故謂之風好惡取舍動靜亡常隨君上之情欲故謂之俗孔子曰移風易俗莫善於樂言聖王在上統理人倫必移其本而易其未此混同天下壹之乎中和然后王教成也前漢律曆志作樂者諧八音蕩滌人之邪意全其正性移風財俗也前漢賈誼傳上疏曰大臣特以簿書不報期會之間以為大故至於俗流失世壞敗因恬而不知怪慮不動於耳目以為是適然耳夫移風易俗使天下回心而鄉道類非俗吏之所能為也俗吏之所務在於力筆筐篋而不知大體陛下又不自憂竊為陛下惜之適當也箋證漢書地理志凡民函五常之性而其剛柔緩急音聲不同繫水土之風氣故謂之風好惡取舍動靜亡常隨君上之情欲故謂之俗孔子曰移風易俗莫善於樂師古曰孝經載孔子之言言聖王在上統理人倫必移其本而易其末此混同天下壹之虖中和然後王教成也漢書律歷志聲者宮商角徵羽也所以作樂者諧八音蕩滌人之邪意全其正性移風易俗也漢書賈誼傳誼屬上疏陳政事多所慾匡建其大略曰大臣特以簿書不報期會之間以為大故師古曰特徒也言公卿大臣特以簿書期會為急不知正風俗厲行義也宋祁云注文姚本特以作徒以至於俗流失世壞敗因恬而不知怪慮不動于耳目以為是適然耳師古曰適當也謂事理當然夫移風易俗使天下回心而鄉道類非俗吏之所能為也師古曰鄉讀曰嚮俗吏之所務在於刀筆筐篋而不知大體陛下又不自憂竊為陛下惜之觀覽風俗第五前漢宣帝紀元康四年詔曰遣太中大夫彊等十二人循行天下存問鰥寡覽觀風俗察吏治得失舉茂材異倫之士前漢平帝紀元始四年遣太僕王惲等八人置副假節分行天下覽觀風俗前漢孔光傳成帝初即位舉為慱士數使錄冤獄行風俗振贍流民奉使稱意前漢王莽傳風俗使者八人還言天下風俗齊同詐為郡國造歌謠頌功德凡三萬言後漢周舉傳順帝詔遣八使巡行風俗皆選素有威名者乃拜舉為侍中與侍中杜喬分行天下其剌史二千石有臧罪顯明者驛馬上之墨綬以下便輒收舉其有清忠惠利為百姓所安宜表異者皆以狀上於是八使同時俱拜天下號曰八俊魏帝紀高貴鄉公遣待中持節分適四方觀風俗勞士民察冤枉失職者吳孫權傳遣光祿大夫周奕石偉巡行風俗察將吏清濁民所疾苦為黜陟之詔新唐太宗紀正觀八年遣大使分行四方延問疾苦觀風俗之得失晉徐邈傳為祠部郎時豫章太守范甯欲遣十五議曹下屬城採求風政并吏假還訊問官長得失邈與甯書曰誠是足下留意百姓故廣其視聽吾謂勸導以實不以文十五議曹欲何所敷宣邪庶事辭訟足下聽斷允塞則物理足矣上有務理之心則下之求理者至矣日昊少覽庶事無滯則吏慎其負而人聽不惑豈須邑至里詣飾其游聲哉非徒不足致益乃是蠶漁之所資又不可縱小吏為耳目也君子之心誰毀詣譽如有所譽必由歷試如有所毀必以著明自古以來欲為左右耳目者無非小人皆先因小忠而成其大不忠先藉小信而成其大不信遂使君子道消善人輿尸前吏所書可為深鑒足下選綱紀必得國士足以攝諸曹諸曹皆是良吏則足以掌文按又擇公方之人以為監司則清濁能否與事而明足下但平心居宗何取於耳目哉昔明德馬后未嘗顧與左右言可謂遠識況大丈夫而不能免此乎箋證漢書宣帝紀元康四年春正月詔曰朕惟耆老之人髮齒墮落血氣衰微亦亡暴虐之心今或罹文法拘執囹圄不終天命朕甚憐之自今以來諸年八十以上非誣告殺傷人佗皆勿坐遣太中大夫彊等十二人循行天下存問鰥寡覽觀風俗察吏治得失舉茂材異倫之士漢書平帝紀元始四年遣太僕王惲等八人置副假節分行天下覽觀風俗漢書孔光傳匡衡舉光方正為諫議大夫坐議有不合左遷虹長師古曰不合謂不合天子意也虹沛縣也音貢自免歸教授成帝初即位舉為博士數使錄冤獄行風俗振贍流民奉使稱旨宋祁曰旨當作意越本作意由是知名漢書王莽傳風俗使者八人還言天下風俗齊同詐為郡國造歌謠頌功德凡三萬言後漢書周舉傳周舉字宣光汝南汝陽人舉出為蜀郡太守坐事免大將軍梁商表為從事中郎甚敬重焉商至秋果薨商疾篤帝親臨幸問以遺言對曰人之將死其言也善臣從事中郎周舉清高忠正可重任也由是拜舉諫議大夫時連有災異帝思商言召舉於顯親殿問時詔遣八使巡行風俗皆選素有威名者乃拜舉為侍中與侍中杜喬守光祿大夫周栩前青州刺史馮羡尚書欒巴侍御史張綱荊州刺史郭遵大尉長史劉班並守光祿大夫分行天下其刺史二千石有臧罪顯明者驛馬上之墨綬以下便輒收舉其有清忠惠利為百姓所安宜表異者皆以狀上於是八使同時俱拜天下號曰八俊三國志魏志高貴鄉公髦高貴鄉公諱髦字彥士文帝孫東海定王霖子也正元元年冬十月壬辰遣侍中持節分適四方觀風俗勞士民察冤枉失職者三國志吳志孫休孫休字子烈權第六子四年夏五月大雨水泉涌溢秋八月遣光祿大夫周奕石偉巡行風俗察將吏清濁民所疾苦為黜陟之詔冊府元龜八年正月詔曰縣司主吏甚多黷貨之罪宜遣大使分行四方申諭朕心延問疾苦觀風俗之得失察政刑之苛弊晉書儒林列傳徐邈徐邈東莞姑幕人也邈姿性端雅勤行勵學博涉多聞以慎密自居及孝武帝始覽典籍招延儒學之士邈既東州儒素太傅謝安舉以應選年四十四始補中書舍人遷散騎常侍猶處西省前後十年邈轉祠部郎上南北郊宗廟迭毀禮皆有證據豫章太守范甯欲遣十五議曹下屬城採求風政并吏假還訊問官長得失邈與甯書曰知足下遣十五議曹各之一縣又吏假歸白所聞見誠是足下留意百姓故廣其視聽吾謂勸導以實不以文十五議曹欲何所敷宣邪庶事辭訟足下聽斷允塞則物理足矣上有理務之心則下之求理者至矣日昃省覽庶事無滯則吏慎其負而人聽不惑豈須邑至里詣飾其游聲哉非徒不足致益乃是蠶漁之所資又不可縱小吏為耳目也豈有善人君子而干非其事多所告白者乎君子之心誰毀誰譽如有所譽必由歷試如有所譽必以著明託社之鼠政之甚害自古以來欲為左右耳目者無非小人皆先因小忠而成其大不忠先藉小信而成其大不信遂使君子道消善人輿尸前史所書可為深鑒足下選綱紀必得國士足以攝諸曹諸曹皆是良吏則足以掌文案又擇公方之人以為監司則清濁能否與事而明足下但平心居宗何取於耳目哉昔明德馬后未嘗顧與左右言可謂遠識况大丈夫而不能免此乎採詩第六前漢食貨志孟春之月群居者將散行人振木鐸徇于路以采詩獻之大師比其音律以聞於天子故曰王者不窺牖戶而知天下前漢藝文志書曰詩言志歌詠言故哀樂之心感而歌詠之聲發誦其言謂之詩詠其聲謂之歌故古有采詠之官王者所以觀風俗知得失自考政也前漢藝文志自孝武立樂府而采歌謠於是有代趙之謳秦楚之風皆感於哀樂緣事而發亦可以觀風俗知厚薄云箋證漢書食貨志孟春之月群居者將散師古曰謂各趣農畮也行人振木鐸徇于路以采詩師古曰行人遒人也主號令之官鐸大鈴也以木為舌謂之木鐸徇巡也采詩采取怨刺之詩也獻之大師比其音律以聞於天子故曰王者不窺牖戶而知天下漢書藝文志書曰詩言志歌詠言師古曰虞書舜典之辭也在心為志發言為詩詠者永也永長也歌所以長言之故哀樂之心感而歌詠之聲發誦其言謂之詩詠其聲謂之歌故古有采詩之官王者所以觀風俗知得失自考正也漢書藝文志自孝武立樂府而采歌謠於是有代趙之謳秦楚之風皆感於哀樂緣事而發亦可以觀風俗知薄厚云禁民俗之非第七史記滑稽傳西門豹為鄴令到鄴會長老問之民所疾苦長老曰苦為河伯娶婦豹曰至河伯娶婦時願三老巫祝父老送女河上幸來告語之吾亦往送女至時豹呼河伯婦來視其好醜曰是女子不好煩大巫嫗為入報河伯得更求好女後日送之即使吏卒共抱大巫嫗投之河中有頃復投一弟子凡投三弟子豹簪筆磬折嚮河立待良久長老吏傍觀者皆驚恐從是以後不敢復言河伯娶婦後漢鄧訓傳訓為護羌校尉胡俗恥病死每疾臨困輒以刀自剌訓聞有困疾者輒拘持縛束不與兵刃使醫藥療治愈者非一大小咸悅後漢宋均傳均為九江太守浚遒縣有唐后二山民共祠之眾巫遂取百姓男女一以為公嫗歲歲改易既而不敢嫁娶前後守令莫敢禁均乃下書曰自今以後為山娶者皆娶巫家勿擾良民於是遂絕後漢賈彪傳補新息長小民困貧多不養子彪嚴為其制與殺人同罪數年間人養子者千數僉曰賈父所長生男名為賈子生女名為賈女後漢張奐傳拜武威太守其俗多妖忌凡二月五月產子及與父母同月生者悉殺之奐示以義方嚴加賞罰風俗遂改百姓生為立祠新唐李暠傳兼太原尹太原舊俗有僧徒以習禪為業及死不殮但以屍送近郊以飼鳥獸如是積年土人號其地為黃坑坑側有餓狗千數食死人肉因侵害幼弱遠近患之前後官吏不能禁止暠到官申明禮憲期不載犯發兵捕殺群狗其風遂革新唐書韓愈傳袁人以男女為隸過期不贖則沒入之愈至悉計庸得贖所沒歸之父母七百餘人因與約禁其為隸餘見絕淫祠第五倫傳箋證史記滑稽列傳魏文侯時西門豹為鄴令豹往到鄴會長老問之民所疾苦長老曰苦為河伯娶婦正義河伯華陰潼鄉人姓馮氏名夷浴於河中而溺死遂為河伯娶婦也以故貧豹問其故對曰鄴三老廷掾常歲賦歛百姓收取其錢得數百萬用其二三十萬為河伯娶婦與祝巫共分其餘錢持歸當其時巫行視人家女好者云是當為河伯婦即娉取洗沐之為治新繒綺縠衣閒居齋戒為治齋宮河上張緹絳帷女居其中為具牛酒飯食行十餘日共粉飾之如嫁女床席令女居其上浮之河中始浮行數十里乃沒其人家有好女者恐大巫祝為河伯取之以故多持女遠逃亡以故城中益空無人又困貧所從來久遠矣民人俗語曰即不為河伯娶婦水來漂沒溺其人民云西門豹曰至為河伯娶婦時願三老巫祝父老送女河上幸來告語之吾亦往送女皆曰諾至其時西門豹往會之河上三老官屬豪長者里父老皆會以人民往觀之者三二千人其巫老女子也已年七十從弟子女十人所皆衣繒單衣立大巫後西門豹曰呼河伯婦來視其好醜即將女絳帷中來至前豹視之顧謂三老巫祝父老曰是女子不好煩大巫嫗為入報河伯得更求好女後日送之即使吏卒共抱大巫嫗投之河中有頃曰巫嫗何久也弟子趣之復以弟子一人投河中有頃曰弟子何久也復使一人趣之復投一弟子河中凡投三弟子西門豹曰巫嫗弟子是女子也不能白事煩三老為入白之復投三老河中西門豹簪筆磬折正義簪筆謂以毛裝簪頭長五寸插在冠前謂之為筆言插筆備禮也磬折謂曲體揖之若石磬之形曲折也磬一片黑石凡十二片樹在虡上擊之其形皆中曲垂兩頭言人腰側似也嚮河立待良久長老吏傍觀者皆驚恐西門豹顧曰巫嫗三老不來還奈之何欲復使廷掾與豪長者一人入趣之皆叩頭叩頭且破額血流地色如死灰西門豹曰諾且留待之須臾須臾豹曰廷掾起矣狀河伯留客之久若皆罷去歸矣鄴吏民大驚恐從是以後不敢復言為河伯娶婦後漢書鄧禹傳附子鄧訓訓字平叔禹第六子也少有大志不好文學禹常非之顯宗即位初以為郎中建初三年拜訓謁者六年遷護烏桓校尉羌胡俗恥病死每病臨困輒以刀自刺訓聞有困疾者輒拘持縛束不與兵刃使醫藥療之愈者非一小大莫不感悅後漢書宋均傳宋均字叔庠南陽安眾人也父伯建武初為五官中郎將均以父任為郎時年十五遷九江太守郡多虎暴數為民患常募設檻穽而猶多傷害檻為機以捕獸穽謂穿地陷之均到下記屬縣曰夫虎豹在山黿鼉在水各有所托且江淮之有猛獸猶北土之有雞豚也今為民害咎在殘吏而勞勤張捕非憂恤之本也其務退姦貪思進忠善可一去檻穽除削課制其後傳言虎相與東游度江中元元年山陽楚沛多蝗其飛至九江界者輒東西散去由是名稱遠近浚遒縣有唐后二山民共祠之眾巫遂取百姓男女一以為公嫗以男為山公以女為山嫗猶祭之有尸主也歲歲改易既而不敢嫁娶前後守令莫敢禁均乃下書曰自今以後為山娶者皆娶巫家勿擾良民於是遂絕後漢書黨錮列傳賈彪傳賈彪字偉節潁川定陵人也少遊京師志節慷慨與同郡荀爽齊名初仕州郡舉孝廉補新息長小民困貧多不養子彪嚴為其制與殺人同罪城南有盜劫害人者北有婦人殺子者彪出案發就發處案驗也而掾吏欲引南彪怒曰賊寇害人此則常理母子相殘逆天違道遂驅車北行案驗其罪城南賊聞之亦面縛自首數年間人養子者千數僉曰賈父所長生男名為賈子生女名為賈女後漢書張奐傳張奐字然明敦煌酒泉人也永壽元年遷安定屬國都尉延熹元年鮮卑寇邊奐率南單于襲之斬首數百級明年梁冀被誅奐以故吏免官禁錮奐與皇甫規友善奐既被錮凡諸交舊莫敢為言唯規薦舉前後七上在家四歲復拜武威太守平均徭賦率厲散敗常為諸郡最河西由是而全其俗多妖忌凡二月五月產子及與父母同月生者悉殺之奐示以義方嚴加賞罰風俗遂改百姓生為立祠舊唐書李暠傳李暠淮安王神通玄孫清河王孝節孫也暠少孤事母甚謹睿宗時累轉衛尉少卿丁憂去職開元初授汝州刺史為政嚴簡州境肅然三遷黃門侍郎兼太原尹仍充太原已北諸軍節度使太原舊俗有僧徒以習禪為業及死不殮但以屍送近郊以飼鳥獸如是積年土人號其地為黃坑側有餓狗千數食死人肉因侵害幼弱遠近患之前後官吏不能禁止暠到官申明禮憲期不再犯發兵捕殺群狗其風遂革又新唐書宗室列傳孝節曾孫暠少孤事母孝始為枝江丞荊州長史四遷至黃門侍郎檢校太原以北諸軍節度使太原俗為浮屠法者死不葬以尸棄郊飼鳥獸號其地曰黃阬有狗數百頭習食胔頗為人患吏不敢禁暠至遣捕群狗殺之申厲禁條約不再犯遂革其風卷七十八案新唐書此載孝節曾孫暠云云舊唐書載為孝節孫新唐書韓愈傳袁人以男女為隸過期不贖則沒入之愈至悉計庸得贖所沒歸之父母七百餘人因與約禁其為隸先教而後罰第八前漢趙廣漢傳京兆尹以和顏接士知其能之所宜盡力與否其或負者輒先聞知風諭不改乃收捕之無所逃案之皋前漢王尊傳擢為安定太守到官出教告屬縣曰令長丞尉奉法守城為民父母抑彊扶弱宣恩廣澤甚勞苦矣太守以今日至府願諸君卿勉力正身以率下故行貪鄙能變更者與為治明慎所職毋以身試法箋證漢書趙廣漢傳趙廣漢字子都本始二年漢發五將軍擊匈奴徵廣漢以太守將兵屬蒲類將軍趙充國從軍還復用守京兆尹滿歲為真廣漢為二千石以和顏接士其尉薦待遇吏殷勤甚備如淳曰尉亦薦籍也師古曰尉薦謂安尉而薦達之事推功善歸之於下曰某掾卿所為非二千石所及行之發於至誠吏見者皆輸寫心腹無所隱匿咸願為用僵仆無所避廣漢聰明皆知其能之所宜盡力與否其或負者輒先聞知風諭不改乃收捕之師古曰風讀曰諷無所逃案之辠立具即時伏辜漢書王尊傳王尊字子贛以高第擢為安定太守到官出教告屬縣曰令長丞尉奉法守城為民父母抑彊扶弱宣恩廣澤甚勞苦矣太守以今日至府願諸君卿勉力正身以率下故行貪鄙能變更者與為治師古曰更改也有如此者太守乃共為治者也明慎所職毋以身試法
