body:
  text: 卷第五十崇儒術第一前漢藝文志儒家者流蓋出於司徒之官助人君順陰陽明教化游文於六經之中留意於仁義之際祖述堯舜憲章文武宗師仲尼以重其言於道最為高前漢武帝紀贊曰孝武初立卓然罷黜百家表章六經前漢儒林傳田蚡為丞相黜黃老刑名百家之言延文學儒者以百數而公孫弘以治春秋為丞相封侯天下學士靡然鄉風矣前漢稚圭傳六經者聖人所以通天地之心著善惡之歸明吉凶之分通人道之正使不悖於其本性者也故審六蓺之指則天下之理可得而和草木昆蟲可得而育此永永不易之道也及論語孝經聖人言行之要宜究其意前漢夏侯勝傳昌邑王嗣立數出勝當乘輿前諫曰天久陰而不雨以下有謀上者陛下出欲何之王怒謂勝為妖言縛以屬吏吏白大將軍霍光光不舉法是時光與張安世謀欲廢王光讓安世以為泄語安世實不言迺召問勝勝對言在洪範傳曰皇之不極厥罰常陰時則下人有伐上者故云光安世大驚以此益重經術後漢儒林謝該傳孔融上疏薦之曰雋不疑定北闕之前前書昭帝時有男子成方遂詣北闕自稱衛太子雋不疑叱從吏收縛昔蒯矉違命出奔輒距而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送下詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用經術明於大義也夏侯勝辯常陰之驗然後朝士益重儒術後漢儒林傳及光武中興愛好經術未及下車而先訪儒雅採求闕文補綴漏逸先是四方學士多懷協圖書遁逃林藪自是莫不抱負墳策雲會京師范升陳元鄭興社林衛宏劉昆桓榮之徒繼踵而集於是立五經博士各以家法授教後漢孔僖傳時帝東巡狩還過魯幸闕里以太牢祠孔子及七十二人作六代之樂大會孔氏男子二十以上者六十三人命儒者講論僖因自陳謝帝曰今日之會寧於卿宗有光榮乎對曰臣聞明王聖主莫不尊師而貴道今陛下親屈萬乘辱臨敝里此乃崇禮先師增煇聖德至於光榮非所敢承後漢賈逵傳拜逵為郎與班固並校秘書應對左右肅宗立降意儒術特好古文尚書左氏傳後漢樊準傳鄧太后臨朝儒學陵替準乃上疏曰臣聞賈誼有言人君不可以不學故雖大舜聖德孳孳為善成王賢主崇明師傅及光武受命中興群雄崩擾旌旗亂野東西誅戰然猶投戈講蓺息馬論道至孝明庶政萬機旡不簡心而垂情古典游意經蓺每饗射禮畢正坐自講諸儒並聽四方欣欣雖闕里之化矍相之事誠不足言晉范甯傳時以浮虛相扇儒雅日替甯以為其源始於王弼何晏二人之罪深於桀紂乃著論甯崇儒抑俗率皆如此新唐書儒學傳太宗身櫜鞬風纚露沐然銳情經術即王府開文學館召名儒十八人為學士與議天下事既即位殿左置弘文館悉引內學士番宿更休聽朝之間則與討古今道前王所以成敗或日昃夜艾未嘗少怠貞觀六年詔罷周公祠更以孔子為先聖顏氏為先師盡召天下惇師老德以為學官數臨幸觀釋菜命祭酒博士講論經義賜以束帛生能通一經者得置吏廣學舍千二百區三學益生員并置書筭二學皆有博士大抵諸生員至三千二百自玄武屯營飛騎皆給博士受經能通一經者聽入貢限四方秀艾挾策負素坌集京師文治煟然勃興於是新羅高昌百濟吐蕃高麗等群酋長並遣子弟入學鼓笥踵堂者凡八千餘人紆侈袂曳文履誾誾秋秋雖三代之盛所未聞也新唐書高智周傳拜壽州剌史其治尚文雅行部先見諸生質經義及政得失既乃錄獄訟考耕餉勤墮以為常新唐薛放傳穆宗嘗問朕欲學經與史何先放曰六經者聖人之言孔子所發明天人之極也史記道成敗得失亦足以鑒然謬於是非非六經比帝曰吾聞學者白首不能通一經安得其要乎對曰論語六經之菁華也孝經人倫之本也漢時論語首立於學官光武令虎賁士皆習孝經玄宗親為注訓蓋人知孝慈則氣感和樂也帝曰聖人以孝為至德要道信然箋證漢書藝文志儒家者流蓋出於司徒之官助人君順陰陽明教化者也游文於六經之中留意於仁義之際祖述堯舜憲章文武宗師仲尼以重其言於道最為高二漢書武帝紀贊曰孝武初立卓然罷黜百家表章六經漢書儒林傳及竇太后崩武安君田蚡為丞相黜黃老刑名百家之言延文學儒者以百數而公孫弘以治春秋為丞相封侯天下學士靡然鄉風矣漢書匡衡傳元帝崩成帝即位衡上疏戒妃匹勸經學威儀之則曰臣聞六經者聖人所以統天地之心著善惡之歸明吉凶之分通人道之正使不悖於其本性者也故審六蓺之指則天人之理可得而和草木昆蟲可得而育此永永不易之道也及論語孝經聖人言行之要宜究其意漢書夏侯勝傳夏侯勝字長公從始昌受尚書及洪範五行傳說災異後事蕳卿師古曰姓蕳名卿蕳音姦又從歐陽氏問為學精孰所問非一師也善說禮服徵為博士光祿大夫會昭帝崩昌邑王嗣立數出勝當乘輿前諫曰天久陰而不雨臣下有謀上者陛下出欲何之王怒謂勝為祅言縛以屬吏吏白大將軍霍光光不舉法是時光與車騎將軍張安世謀欲廢昌邑王光讓安世以為泄語安世實不言迺召問勝勝對言在洪範傳曰皇之不極厥罰常陰時則下人有伐上者惡察察言故云臣下有謀光安世大驚以此益重經術後漢書儒林列傳謝該傳謝該字文儀南陽章陵人也仕為公車司馬令以父母老託疾去官欲歸鄉里會荊州道斷不得去少府孔融上書薦之曰雋不疑定北闕之前前書昭帝時有男子成方遂詣北闕自稱衛太子丞相御史二千石至者立莫敢發言京兆尹雋不疑後到叱從吏收縛或曰是非未可知不疑曰諸君何患於衛太子昔蒯聵違命出奔輒距而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送下詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用經術明於大義也夏侯勝辯常陰之驗然後朝士益重儒術後漢書儒林列傳昔王莽更始之際天下散亂禮樂分崩典文殘落及光武中興愛好經術未及下車而先訪儒雅採求闕文補綴漏逸先是四方學士多懷挾圖書遁逃林藪自是莫不抱負墳策雲會京師范升陳元鄭興杜林衛宏劉昆桓榮之徒繼踵而集於是立五經博士各以家法教授八後漢書儒林列傳孔僖傳孔僖字仲和魯國魯人也元和二年春帝東宮狩還過魯幸闕里以太牢祠孔子及七十二弟子作六代之樂黃帝曰雲門堯曰咸池舜曰大韶禹曰大夏湯曰大濩周曰大武大會孔氏男子二十以上者六十三人命儒者講論僖因自陳謝帝曰今日之會寧於卿宗有光榮乎對曰臣聞明王聖主莫不尊師貴道今陛下親屈萬乘辱臨敝里此乃崇禮先師增煇聖德至於光榮非所敢承後漢書賈逵傳賈逵字景伯扶風平陵人也九世祖誼文帝時為梁王太傅永平中有神雀集宮殿官府冠羽有五采色帝異之以問臨邑侯劉復復不能對薦逵博物多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在岐宣帝威懷戎狄神雀仍集此胡降之徵也帝勑蘭臺給筆札使作神雀頌拜為郎與班固並校祕書應對左右肅宗立降意儒術特好古文尚書左氏傳後漢書樊宏傳附族曾孫樊準準字幼陵宏之族曾孫也父瑞好黃老言清靜少欲準少勵志行修儒術鄧太后臨朝儒學陵替準乃上疏曰臣聞賈誼有言人君不可以不學故雖大舜聖德孳孳為善成王賢主崇明師傅及光武皇帝受命中興群雄崩擾旌旗亂野東西誅戰不遑啟處然猶投戈講蓺息馬論道至孝明皇帝兼天地之姿用日月之明庶政萬幾無不簡心而垂情古典游意經蓺每饗射禮畢正坐自講諸儒並聽四方欣欣雖闕里之化矍相之事誠不足言孔子闕里人也禮記云孔子射於矍相之圃盖觀者如堵墻也晉書范汪傳附子范甯甯字武子少篤學多所通覽簡文帝為相將辟之為桓溫所諷遂寢不行故終溫之世兄弟無在列位者時以浮虛相扇儒雅日替甯以為其源始於王弼何晏二人之罪深於桀紂乃著論曰甯崇儒抑俗率皆如此新唐書儒學傳上太宗身櫜鞬風纚露沭然銳情經術即王府開文學館召名儒十八人為學士與議天下事既即位殿左置弘文館悉引內學士番宿更休聽朝之間則與討古今道前王所以成敗或日昃夜艾未嘗少怠貞觀六年詔罷周公祠更以孔子為先聖顏氏為先師盡召天下惇師老德以為學官數臨幸觀釋菜命祭酒博士講論經義賜以束帛生能通一經者得署吏廣學舍千二百區三學益生員并置書算二學皆有博士大抵諸生員至三千二百自玄武屯營飛騎皆給博士授經能通一經者聽入貢限四方秀艾挾策負素坌集京師文治煟然勃興於是新羅高昌百濟吐蕃高麗等群酋長並遣子弟入學鼓笥踵堂者凡八千餘人紆侈袂曳方履誾誾秩秩雖三代之盛所未聞也新唐書高智周傳高智周常州晉陵人拜荊州刺史其治尚文雅行部先見諸生質經義及政得失既乃錄獄訟考耕餉勤墮以為常新唐書薛放傳穆宗為太子拜侍讀及即位參贊機命帝嘗問朕欲學經與史何先放曰六經者聖人之言孔子所發明天人之極也史記道成敗得失亦足以鑒然謬於是非非六經比帝曰吾聞學者白首不能通一經安得其要乎對曰論語六經之菁華也孝經人倫之本也漢時論語首立於學官光武令虎賁士皆習孝經玄宗親為注訓盖人知孝慈則氣感和樂也帝曰聖人以孝為至德要道信然不崇儒術第二史記李斯傳臣請諸有文學詩書百家語者蠲除去之令到滿三十日弗去黥為城旦所不去者醫藥卜筮種樹之書若有欲學者以吏為師始皇可其議收去詩書百家之語以愚百姓使天下旡以古非今史記孔子世家景公說欲以尼谿田封孔子晏嬰進曰夫儒者滑稽而不可軌法倨傲自順不可以為下崇喪遂哀破產厚葬不可以為俗游說乞貸不可以為國自大賢之息周室既衰禮樂缺有間今孔子盛容飾繁登降之禮趨詳之節累世不能殫其學當年不能究其禮君欲用之以移齊俗非所以先細民也前漢陸賈傳賈時時前說稱詩書高帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治乎且湯武逆取而順守之文武並用長久之術也昔者夫差智伯極武而亡秦任刑法不變卒滅趙氏秦之先造父封趙後以為姓向使秦以并天下行仁義法先聖陛下安得而有之前漢儒林傳秦始皇兼天下燔詩書殺術士六學從此缺矣前漢儒林傳叔孫通作漢禮儀諸弟子共定者盛為選首然後喟然興於學然尚有干戈平定四海亦未皇庠序之事也孝惠高后時公卿皆武力功臣孝文時頗登用然孝文本好刑名之言及至孝景不任儒竇太后又好黃老術故諸博士具官待問未有進者前漢元帝紀壯大柔仁好儒見宣帝所用多文法吏以刑名繩下嘗侍燕從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以霸王道雜之奈何純任德教用周政乎且俗儒不達時宜好是古非今使人眩於名實不知所守何足委任迺歎曰亂我家者太子也前漢司馬遷傳大史公曰夫儒者以六藝為法六藝紅傳以千萬數累世不能通其學當年不能究其禮故曰博而寡要勞而少功前漢司馬遷傳贊曰是非頗繆於聖人論大道則先黃老而後六經序游俠則退處士而進姦雄述貨殖而崇埶利而羞賤貧此其所蔽也前漢稚圭傳調補平原文學學者多上書薦稚圭經明當世少雙不宜在遠方事下蕭望之梁丘賀問衡對詩諸大義其對深美望之奏衡經學精習說有師道可觀覽宣帝不甚用儒遣衡歸官而皇太子見衡對私善之前漢朱博傳博尤不愛諸生所至郡輒罷去議曹曰豈可復置謀曹邪文學儒吏時有奏記稱說云云博見謂曰如太守漢吏奉三尺律令以從事耳亡奈生所言聖人道何也言不能用且持此道歸堯舜君出為陳說之其折逆人如此晉傅休奕上疏曰夫儒學者王教之首也尊其道貴其業重其選猶恐化之不崇忽而不以為急臣懼日有陵遲而不覺也晉書裴頠傳頠深患時俗放蕩不尊儒術何晏阮籍口談浮虛不遵禮法尸祿耽寵仕不孝事至王衍之徒聲譽大盛位高勢重不以物務自嬰遂相放效風教陵遲乃著崇有之論以釋其蔽餘見崇儒術樊準傳箋證史記李斯列傳始皇三十四年置酒咸陽宮博士僕射周青臣等頌稱始皇威德齊人淳于越進諫始皇下其議丞相丞相謬其說絀其辭乃上書曰臣請諸有文學詩書百家語者蠲除去之令到滿三十日弗去黥為城旦所不去者醫藥卜筮種樹之書若有欲學者以吏為師始皇可其議收去詩書百家之語以愚百姓使天下無以古非今史記孔子世家景公問政孔子孔子曰君君臣臣父父子子他日又復問政於孔子孔子曰政在節財景公說將欲以尼谿田封孔子晏嬰進曰夫儒者滑稽而不可軌法倨傲自順不可以為下崇喪遂哀破產厚葬不可以為俗游說乞貸不可以為國自大賢之息周室既衰禮樂缺有間今孔子盛容飾繁登降之禮趨詳之節累世不能殫其學當年不能究其禮君欲用之以移齊俗非所以先細民也漢書陸賈傳陸賈楚人也以客從高祖定天下名有口辯賈時時前說稱詩書高帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治乎且湯武逆取而以順守之文武並用長久之術也昔者吳王夫差智伯極武而亡秦任刑法不變卒滅趙氏鄭氏曰秦之先造父封於趙城其後以為姓鄉使秦以并天下行仁義法先聖陛下安得而有之漢書儒林傳及至秦始皇兼天下燔詩書殺術士六學從此缺矣叔孫通作漢禮儀因為奉常諸弟子共定者咸為選首然後喟然興於學然尚有干戈平定四海亦未皇庠序之事也孝惠高后時公卿皆武力功臣孝文時頗登用然孝文本好刑名之言及至孝景不任儒竇太后又好黃老術故諸博士具官待問未有進者漢書元帝紀孝元皇帝宣帝太子也壯大柔仁好儒見宣帝所用多文法吏以刑名繩下大臣楊惲蓋寬饒等坐刺譏辭語為罪而誅嘗侍燕從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以霸王道雜之奈何純任德教用周政乎且俗儒不達時宜好是古非今使人眩於名實不知所守何足委任迺歎曰亂我家者太子也漢書司馬遷傳夫儒者以六藝為法六藝經傳以千萬數累世不能通其學當年不能究其禮故曰博而寡要勞而少功漢書司馬遷傳贊曰司馬遷據左氏國語采世本戰國策述楚漢春秋接其後事訖於大漢其言秦漢詳矣又其是非頗繆於聖人論大道則先黃老而後六經序遊俠則退處士而進姦雄述貨殖則崇埶利而羞賤貧此其所蔽也漢書匡衡傳衡射策甲科以不應令除為太常掌故調補平原文學學者多上書薦衡經明當世少雙今為文學就官京師後進皆欲從衡平原衡不宜在遠方事下太子太傅蕭望之少府梁邱賀問衡對詩諸大義其對深美望之奏衡經學精習說有師道可觀覽宣帝不甚用儒遣衡歸官而皇太子見衡對私善之漢書朱博傳博尤不愛諸生所至郡輒罷去議曹曰豈可復置謀曹邪文學儒吏時有奏記稱說云云博見謂曰如太守漢吏奉三尺律令以從事耳亡奈生所言聖人道何也師古曰言不能用且持此道歸堯舜君出為陳說之其折逆人如此晉書傅玄傳傅玄字休奕北地泥陽人也武帝為晉王以玄為散騎常侍及受禪進爵為子加駙馬都尉帝初即位廣納直言開不諱之路玄及散騎常侍皇甫陶共掌諫職玄復上疏曰夫儒學者王教之首也尊其道貴其業重其選猶恐化之不崇忽而不以為急臣懼日有陵遲而不覺也晉書裴秀傳附子裴頠頠深患時俗放蕩不尊儒術何晏阮籍素有高名於世口談浮虛不遵禮法尸祿耽寵仕不事事至王衍之徒聲譽太盛位高勢重不以物務自嬰遂相放效風教陵遲乃著崇有之論以釋其蔽曰求遺書第三前漢武帝紀五年詔曰其令禮官勸學講議洽聞舉遺興禮以為天下先前漢鼂錯傳孝文時天下亡治尚書者獨聞齊有伏生故秦慱士治尚書年九十餘老不可召迺詔太常使人受之太常遣錯受尚書伏生所還因上書稱說詔以為太子舍人門大夫前漢藝文志成帝時以書頗散亡使謁者陳農求遺書於天下後漢儒林傳和帝詔高才生受古文尚書毛詩榖梁左氏春秋雖不亡學官然皆擢高第為講郎給事近署所以羅網遺逸博存眾家後漢儒林傳光武中興愛好經術未及下車先訪儒雅採求闕文補綴漏逸晉儒林傳漢祖勃興救焚振溺粗修禮律未遑俎豆逮及孝武崇尚文儒爰及東京斯風不墜於是旁求蠹簡博訪遺書創甲乙之科擢賢良之舉莫不紆青拖紫服冕乘軒新唐令狐德棻傳武德初時大亂後經籍散亡祕書因缺始請帝重購求天下遺書置吏補錄不數年圖典略備箋證漢書武帝紀五年夏六月詔曰蓋聞導民以禮風之以樂今禮壞樂崩朕甚閔焉故詳延天下方聞之士咸薦諸朝其令禮官勸學講議洽聞舉遺興禮以為天下先漢書鼂錯傳孝文時天下亡治尚書者獨聞齊有伏生故秦博士治尚書年九十餘老不可徵迺詔太常使人受之太常遣錯受尚書伏生所還因上書稱說詔以為太子舍人門大夫師古曰初為舍人又為門大夫漢書藝文志至成帝時以書頗散亡使謁者陳農求遺書於天下四後漢書儒林列傳建初中大會諸儒於白虎觀考詳同異連月乃罷肅宗親臨稱制如石渠故事又詔高才生受古文尚書毛詩榖梁左氏春秋雖不立學官然皆擢高第為講郎給事近署所以網羅遺逸博存眾家後漢書儒林列傳及光武中興愛好經術未及下車而先訪儒雅採求闕文補綴漏逸晉書儒林列傳漢祖勃興救焚拯溺粗修禮律未遑俎豆逮于孝武崇尚文儒爰及東京斯風不墜於是傍求蠹簡博訪遺書創甲乙之科擢賢良之舉莫不紆青拖紫服冕乘軒新唐書令狐德棻傳方是時大亂後經籍亡散祕書湮缺德棻始請帝重購求天下遺書置吏補錄不數年圖典略備
