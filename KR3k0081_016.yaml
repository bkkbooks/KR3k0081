body:
  text: 卷第十六權第一前漢賈誼傳屠牛坦一朝屠十二牛而芒刃不頓者所排擊剝割皆衆理解也至於髖髀之所非斤則斧也夫仁義恩厚人主之芒刃也權藝法制人主之斤斧也今諸侯王皆衆髖髀也釋斤斧之用而欲嬰之以芒刃臣以為不鈌則折髖音寬髀音必反言其骨大須斤斧前漢劉賈傳贊曰朝錯為國遠慮禍反及身母為權首將受其咎豈謂錯哉此逸周書之言贊引之後漢虞延等論曰孔子稱可與立不可與權權也者反常者也將從反常之事必資非常之會使夫舉無違妄志行名全後漢崔實政論且濟時救世之術豈必體堯蹈舜然後乃理哉期於補綻決壞枝拄邪傾隨形裁割要措斯世於安寧之域而已故聖人執權遭時定制後漢王霸傳光武聞王郎兵在後及至呼沱河候吏還白無船不可濟官屬大懼光武令霸往視之霸恐驚衆欲且前阻水還即詭曰水堅可渡官屬皆喜遂前比至河河冰亦合光武謂官屬曰王霸權以濟事殆天瑞也魏賈詡傳察孝廉為郎疾病去官西還至汧道遇叛氐同行數十人皆為所執詡曰我段公外孫也汝別埋我我家必厚贖之時太尉段熲昔久為邊將威震西土故詡假以懼氐氐果不敢害與盟而送之其餘悉死詡實非段甥權以濟事咸此類也箋證漢書賈誼傳誼數上疏陳政事多所欲匡建其大略曰屠牛坦一朝解十二牛蘇林曰孔子時人也師古曰坦屠牛者之名也事見管子而芒刃不頓者師古曰芒刃謂刃之利如毫芒也頓讀曰鈍所排擊剝割皆衆理解也至於髖髀之所非斤則斧夫仁義恩厚人主之芒刃也權藝法制人主之斤斧也師古曰髀股骨也髖髀上也言其骨大故須斤斧也髖音寬髀音陛又音必爾反今諸侯王皆衆髖髀也釋斤斧之用而欲嬰以芒刃臣以為不缺則折漢書馮王燕王吳王傳贊曰古者諸侯不過百里山海不以封蓋防此矣鼂錯為國遠慮禍反及身毋為權首將受其咎豈謂錯哉師古曰此逸周書之言贊引之者謂錯適當此言耳後漢書馮魴虞延鄭弘周章傳論曰孔子稱可與立未可與權權也者反常者也將從反常之事必資非常之會使夫舉無違妄志行名全後漢書崔駰傳附孫崔實實字子真一名台字元始論當世便事數十條名曰政論其辭曰且濟時拯世之術豈必體堯蹈舜然後乃理哉期於補綻決壞枝柱邪傾綻音直莧反禮記曰衣裳綻裂紉針請補綴柱音陟主反隨形裁割要措斯世於安寧之域而已故聖人執權遭時定制後漢書王霸傳王霸字元伯潁川潁陽人也光武即南馳至下曲陽傳聞王郎兵在後從者皆恐及至滹沱河候吏還白河水流澌無船不可濟官屬大懼光武令霸往視之霸恐驚衆欲且前阻水還即詭曰冰堅可度官屬皆喜光武笑曰候吏果妄語也遂前比至河河冰亦合乃令霸護度未畢數騎而冰解光武謂霸曰安吾衆得濟免者卿之力也霸謝曰此明公至德神靈之祐雖武王白魚之應無以加此光武謂官屬曰王霸權以濟事殆天瑞也三國志魏志賈詡傳賈詡字文和武威姑臧人也察孝廉為郎疾病去官西還至汧道遇叛氐同行數十人皆為所執詡曰我段公外孫也汝別埋我我家必厚贖之時太尉段熲昔久為邊將威震西土故詡假以懼氐氐果不敢害與盟而送之其餘悉死詡實非段甥權以濟事咸此類也權變第二史記蘇秦傳太史公曰蘇秦兄弟三人皆遊説諸侯以顯名其術長於權變史記張儀傳太史公曰三晉多權變之士夫言從衡強秦者大抵皆三晉之人也前漢武帝元朔元年春詔曰朕聞天地不變不成施化陰陽不變物不暢茂易曰通其變使民不倦詩云九變復貫知言之選朕嘉唐虞而樂商周據舊以鑒新其赦天下與民更始前漢鼂錯對策曰竊聞戰不勝者易其地民貧窮者變其業前漢嚴安上書曰臣聞鄒子曰政教文質者所以云救也當時則用過則舍之有易則易之故守一而不變者未睹治之至也魏賈詡傳荀攸賈詡庶乎算旡遺策經達權變其良平之亞與箋證史記蘇秦列傳太史公曰蘇秦兄弟三人皆遊説諸侯以顯名其術長於權變史記張儀列傳太史公曰三晉多權變之士夫言從衡強秦者大抵皆三晉之人也漢書武帝紀元朔元年十二月江都王非薨春三月甲子立皇后衛氏詔曰朕聞天地不變不成施化陰陽不變物不暢茂易曰通其變使民不倦詩云九變復貫知言之選朕嘉唐虞而樂殷周據舊以鑒新師古曰追觀舊迹以知新政而為鑒戒其赦天下與民更始漢書鼂錯傳竊聞戰不勝者易其地民貧窮者變其業漢書嚴安傳以故丞相史上書曰臣聞鄒子曰師古曰鄒衍之書也政教文質者所以云救也當時則用過則舍之師古曰非其時則廢置也有易則易之師古曰可變易者則易也故守一而不變者未睹治之至也三國志魏志荀彧荀攸賈詡傳評曰荀攸賈詡庶乎算無遺策經達權變其良平之亞歟重規沓矩第三前漢董仲舒傳道之大原出于天天不變道亦不變是以禹繼舜舜繼堯三聖相受而守一道亡救弊之政也故不言其所損益也由是觀之繼治世者其道同繼亂世者其道變前漢曹參傳惠帝怪相國不治事乃謂窋曰女歸試私問乃父曰高帝新棄群臣帝富於春秋君為相國日飲旡所請事何以憂天下窋從其所諫參參怒而笞之二百曰天下事非乃所當言也至朝時帝讓參曰與窋胡治乎乃者我使諫君也參謝曰陛下自察聖武孰與高皇帝上曰朕乃安敢望先帝參曰陛下觀參孰與蕭何賢上曰君似不及也參曰陛下言之是也且高皇帝與蕭何定天下法令既明具陛下垂拱參等守職遵而勿失不亦可乎惠帝曰善百姓歌之曰蕭何為法講若畫一曹參代之守而勿失載其清靖民以寧一載猶乘也前漢楚元王傳宣帝循武帝故事招選名儒俊材置左右更生以通達能屬文辭與王褒張子僑等並進對蜀薑維等評曰蔣琬方整有威重費禕寬濟而博愛咸承諸葛之成規因循而不革是以邊境為無虞邦家和一然猶未盡治小之宜居靜之理也箋證漢書董仲舒傳仲舒復對曰道之大原出于天天不變道亦不變是以禹繼舜舜繼堯三聖相受而守一道亡救弊之政也故不言其所損益也繇是觀之繼治世者其道同繼亂世者其道變漢書曹參傳惠帝怪相國不治事以為豈少朕與師古曰言豈以我為年少故也與讀曰歟乃謂窋曰女歸試私從容問乃父曰黃帝新棄群臣帝富於春秋君為相國日飲無所請事何以憂天下然無言吾告女也窋既洗沐歸時間自從其所諫參師古曰間謂空隙也自從其所猶言自出其意也參怒而笞之二百曰趣入侍天下事非乃所當言也至朝時帝讓參曰與窋胡治乎乃者我使諫君也師古曰乃者猶言曩者參免冠謝曰陛下自察聖武孰與高皇帝上曰朕乃安敢望先帝參曰陛下觀參孰與蕭何賢上曰君似不及也參曰陛下言之是也且高皇帝與蕭何定天下法令既明具陛下垂拱參等守職遵而勿失不亦可乎惠帝曰善君休矣師古曰且令出休息參為相國三年薨諡曰懿侯百姓歌之曰蕭何為法講若畫一曹參代之守而勿失載其清靖民以寧一師古曰載猶乘也漢書楚元王傳附劉向向字子政本名更生年十二以父德任為輦郎既冠以行修飭擢為諫大夫是時宣帝循武帝故事招選名儒俊材置左右更生以通達能屬文辭與王褒張子僑等並進對三國志蜀志蔣琬費褘薑維傳評曰蔣琬方整有威重費褘寬濟而博愛咸承諸葛之成規因循而不革是以邊境無虞邦家和一然猶未盡治小之宜居靜之理也往鑒不遠第四前漢武帝紀詔曰朕嘉唐虞而樂商周據舊以鑒新追觀舊迹以知新政而為鑒戒也前漢賈誼傳上疏言太子事曰前車覆後車誠夫三代所以長久者其已事可知也然而不能相若是不法聖智也秦世之所以亟絶者其轍迹可見也然而不避是後車又將覆也前漢房嘗宴見問上曰幽厲之君何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而用之邪將以為賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢必治任不肖必亂必然之道也幽厲何不覺寤而更求賢曷為卒任不肖以至於是上曰臨亂之君各賢其臣令皆覺寤天下安得危亡之君房曰齊桓公秦二世亦嘗聞此君而非笑之然則任豎刀趙高政治日亂盜賊滿山何不以幽厲卜之而覺寤乎上曰唯有道者能以往知來耳後漢陳蕃傳中官乘勢犯法二郡太守劉瓆成瑨考案其罪官官怨恚有司遂奏瓆瑨罪當棄市蕃上疏曰梁氏五侯毒偏海內天啓聖意收而戮之明鑒未遠覆車如昨而近習之權復相扇結新唐魏徵傳夫監形之美惡必就止水監政之安危必取亡國詩曰殷鑒不遠在夏后之世臣願當今之動靜以隋為鑒則存亡治亂可得而知忍所以危則安矣思所以亂則治矣思所以亡則存矣箋證漢書武帝紀元朔元年十二月江都王非薨春三月甲子立皇后衛氏詔曰朕聞天地不變不成施化陰陽不變物不暢茂易曰通其變使民不倦詩云九變復貫知言之選朕嘉唐虞而樂殷周據舊以鑒新師古曰追觀舊迹以知新政而為鑒戒其赦天下與民更始漢書賈誼傳又曰前車覆後車誡夫三代之所以長久者其已事可知也然而不能從者是不法聖智也秦世之所以亟絶者其轍迹可見也然而不避是後車又將覆也漢書京房傳京房字君明東郡頓丘人也房嘗宴見師古曰以間宴時而入見天子問上曰幽厲之君何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而用之邪將以為賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢必治任不肖必亂必然之道也幽厲何不覺寤而更求賢曷為卒任不肖以至於是上曰臨亂之君各賢其臣令皆覺寤天下安得危亡之君房曰齊桓公秦二世亦嘗聞此君而非笑之然則任豎刁趙高政治日亂盜賊滿山何不以幽厲卜之而覺寤乎上曰唯有道者能以往知來耳後漢書陳蕃傳時小黃門趙津南陽大猾張汜等奉事中官乘藝犯法二郡太守劉瓆成瑨考案其罪雖經赦令而並竟考殺之宦官怨恚有司承旨遂奏瓆瑨罪當棄市蕃乃獨上疏曰梁氏五侯毒遍海內天啓聖意收而戮之天下之議冀當小平明鑒未遠覆車如昨而近習之權復相扇結新唐書魏徵傳又上疏曰夫監形之美惡必就止水監政之安危必取亡國詩曰殷鑒不遠在夏后之世臣願當今之動輒以隋為鑒則存亡治亂可得而知思所以危則安矣思所以亂則治矣思所以亡則存矣卷九十七有備無患第五史記孔子世家齊乃使使告魯為好會會於夾谷魯定公且以乘車好往孔子攝相事曰臣聞有文事者必有武備有武事者必有文備古者諸侯出疆必具官以從請具左右司馬定公曰諾具左右司馬會齊侯夾谷也魏志王觀出為南陽涿郡太守涿北接鮮卑數有寇盜觀令邊民十家已上屯居築京候守禦有備寇鈔以息晉載記序古者帝王乃生奇類淳維伯禹之苗裔豈異類哉其風俗險詖性靈馳突前史載之詳備軒帝患其干紀所以徂征武王竄以荒服同乎禽獸而於露寒之野候月覘風覩隙揚埃乘間騁暴邊城不得緩帶百姓靡有室家然則燕築造陽之郊秦塹臨洮之險登天山絶地脈苞玄菟款黃河亦以防夷狄之亂中華其備預如此新唐盧俌上疏曰邊州剌史不可不慎擇得其人而任之搜乘以千里訓兵屯田積粟謹設烽燧精飾戈矛來則懲而禦之去則備而守之此又古之善經也新唐元和元年制歲時有豐歉榖價有輕重將備水旱之制在權聚斂之術應天下州府每年所稅地十數內宜十分取二分均充常平倉及義倉也新唐邢君牙傳吐蕃歲犯邊君牙劭耕講戰以為備戎不能侵箋證史記孔子世家定公十年春及齊平索隱及與也平成也謂與齊和好故云平夏齊大夫犂鉏言於景公曰魯用孔丘其勢危齊乃使使告魯為好會會於夾谷魯定公且以乘車好往孔子攝相事曰臣聞有文事者必有武備有武事者必有文備古者諸侯出疆必具官以從請具左右司馬定公曰諾具左右司馬會齊侯夾谷三國志魏志王觀傳王觀字偉臺東郡廩丘人也文帝踐阼入為尚書郎廷尉監出為南陽涿郡太守涿北接鮮卑數有寇盜觀令邊民十家已上屯居築京候時或有不願者觀乃假遣朝吏使歸助子弟不與期會但勑事訖各還於是吏民相率不督自勸旬日之中一時俱成守禦有備寇鈔以息晉書載記序古者帝王乃生奇類淳維伯禹之苖裔豈異類哉反首衣皮飱羶飲湩而震驚中域其來自遠天未悔禍種落彌繁其風俗險詖性靈馳突前史載之亦以詳備軒帝患其干紀所以徂征武王竄以荒服同乎禽獸而於露寒之野候月覘風覩隙揚埃乘間騁暴邊城不得緩帶百姓靡有室家孔子曰微管仲吾其被髮左袵矣此言能教訓卒伍整齊車甲邊場既伏境內以安然則燕築造陽之郊秦塹臨洮之險登天山紀一作絶地脈苞玄莬款黃河所以防夷狄之亂中華其備豫如此舊唐書突厥列傳上中宗即位默啜又寇靈州鳴沙縣右補闕盧俌上疏曰朔方之安危邊域之勝負地方千里制在一賢其邊州刺史不可不慎擇得其人而任之搜乘訓兵屯田積粟謹設烽燧精飾戈矛來則懲而禦之去則備而守之此又古之善經也舊唐書食貨志元和元年正月制歲時有豐歉榖價有重輕將備水旱之虞在權聚斂之術應天下州府每年所稅地丁數內宜十分取二分均充常平倉及義倉新唐書邢君牙傳邢君牙瀛州樂壽人吐蕃歲犯邊君牙劭耕講戰以為備戎不得侵不能預備第六前漢充國歎曰本用吾言羌虜得至是邪師古曰言豫防之可無今日之寇也往者舉可先行羌者吾舉辛武賢丞相御史復白遣義渠安國竟沮敗羌金城湟中榖斛八錢吾謂耿中丞糴三百萬斛榖羌人不敢動矣耿中丞請糴百萬斛乃得四十萬斛耳義渠再使且費其半失此二策羌人致敢為逆失之豪釐差以千里前漢韓安國傳安國為材官將軍屯漁陽捕生口虜言胸奴遠去即上言方佃作時請且罷屯罷屯月餘胸奴大入上谷漁陽安國壁乃有七百餘人出與戰安國傷入壁胸奴虜略千餘人及畜産去晉江統傳時關隴屢為氐羌所擾統深惟四夷亂華宜杜其萌乃作徙戎論帝不能用未及十年而夷狄亂華時服其深識箋證漢書趙充國傳時羌降者萬餘人矣充國度其必壞欲罷騎兵屯田以待其敝作奏未上會得進兵璽書中郎將卬懼使客諫充國曰誠令兵出破軍殺將以傾國家將軍守之可也即利與病又何足爭一旦不合上意遣繡衣來責將軍將軍之身不能自保師古曰繡衣謂御史充國歎曰是何言之不忠也本用吾言羌虜得至是邪師古曰言豫防之可無今日之寇也往者舉可先行羌者吾舉辛武賢丞相御史復白遣義渠安國竟沮敗羌金城湟中榖斛八錢吾謂耿中丞服虔曰耿壽昌也為司農中丞糴二百萬斛榖羌人不敢動矣耿中丞請糴百萬斛乃得四十萬斛耳義渠再使且費其半失此二册羌人故敢為逆失之豪釐差以千里漢書韓安國傳安國為材官將軍屯漁陽捕生口虜言胸奴遠去即上言方佃作時師古曰安國上奏也佃治田也音與田同請且罷屯罷屯月餘胸奴大入上谷漁陽安國壁乃有七百餘人出與戰安國傷入壁胸奴虜略千餘人及畜産去晉書江統傳江統字應元陳留圉人也襲父爵除山陰令時關隴屢為氐羌所擾統深惟四夷亂華宜杜其萌乃作徙戎論帝不能用未及十年而夷狄亂華時服其深識安不忘危第七前漢賈誼傳進言者皆曰天下已安已治矣臣獨以為未也曰安且治者非愚則諛皆非事實知治亂之體也夫抱火厝之積薪之下而寢其上火未及燃因謂之安方今之藝何以異此前漢主父偃諫伐胸奴曰司馬法曰國雖大好戰必亡天下雖平忘戰必危天下既平天子大凱春搜秋獮諸侯春振旅秋治兵所以不忘戰也前漢賈誼傳曰安者非一日而安也危者非一日而危也皆以積漸然不可不察也前漢劉向傳延陵制度泰奢向上疏諫曰臣聞易曰安不忘危存不忘亡是以身安而國家可保也後漢馮異傳六年春異朝京師賜以珍寶衣服錢帛詔曰倉卒無蔞亭豆粥呼沱河麥飯厚意久不報異謝曰臣聞管仲謂桓公曰願君無忘射釣臣無忘檻車齊國賴之臣今亦願國家無忘河北之難小臣不敢忘巾車之恩後漢馬融廣成頌曰宜幸廣成講武校獵是以明德耀乎中夏威靈暢乎四荒蓋安不忘危治不忘亂道在乎茲斯固帝王之所以曜神武而折遐衝者也新唐則天欲季冬講武有司稽緩延入孟春王方慶上疏曰謹按禮記月令孟冬之月天子命將帥講武習射御角力此乃三時務農一時講武以習射御角校才力蓋王者常事安不忘危也孟春之月是不可也新唐陳子昂傳諫曰善為天下者計大而不計小務德而不務刑據安念危值利思害願陛下審計之箋證漢書賈誼傳誼數上疏陳政事多所欲匡建其大略曰進言者皆曰天下已安已治矣臣獨以為未也曰安且治者非愚則諛皆非事實知治亂之體者也夫抱火厝之積薪之下而寢其上火未及燃因謂之安方今之藝何以異此漢書主父偃傳主父偃上書闕下朝奏暮召入見所言九事其八事為律令一事諫伐胸奴曰司馬法曰國雖大好戰必亡天下雖平忘戰必危師古曰司馬穰苴善用兵著書言兵法謂之司馬法一説司馬古主兵之官有軍陳用兵之法天下既平天子大愷應劭曰大愷周禮還師振旅之樂也春搜秋獮諸侯春振旅秋治兵所以不忘戰也漢書賈誼傳又曰安者非一日而安也危者非一日而危也皆以積漸然不可不察也漢書楚元王傳附劉向延陵制度泰奢向上疏諫曰臣聞易曰安不忘危存不忘亡是以身安而國家可保也師古曰易下繫之辭後漢書馮異傳六年春異朝京師引見帝謂公卿曰是我起兵時主簿也為吾披荊棘定關中既罷使中黃門賜以珍寶衣服錢帛詔曰倉卒無蔞亭豆粥呼沱河麥飯厚意久不報異稽首謝曰臣聞管仲謂桓公曰願君無忘射釣臣無忘檻車齊國賴之史記管仲將兵遮莒道射桓公中釣後魯桎梏管仲而送於齊齊以為相説苑曰管仲桎梏檻車中非無愧也自裁也新序曰齊桓公與管仲飲酒酣管仲上壽曰願君無忘出奔於莒也臣亦無忘束縛於魯也此云射釣檻車義亦通臣今亦願國家無忘河北之難小臣不敢忘巾車之恩謂光武獲異於巾車而赦之後漢書馬融傳元初二年上廣成頌以諷諫其辭曰宜幸廣成講武校獵是以明德耀乎中夏威靈暢乎四荒蓋安不忘危治不忘亂道在乎茲斯固帝王之所以曜神武而折遐衝者也舊唐書王方慶傳聖德二年一日則天欲季冬講武有司稽緩延入孟春方慶上疏曰謹按禮記月令孟冬之月天子命將帥講武習射御角力此乃三時務農一時講武以習射御角校才力蓋王者常事安不忘危之道也孟春之月不可以稱兵新唐書陳子昂傳垂拱初詔問群臣調元氣當以何道子昂因是勸后興明堂太學即上言善為天下者計大而不計小務德而不務刑據安念危值利思害願陛下審計之治亂由己第八前漢文帝紀二年詔曰朕獲保宗廟以微眇之身託于士民君王之上天下治亂在豫一人唯二三執政猶吾股肱也前漢賈誼傳上疏曰天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器亡以異在天子之所置之湯武置天下於仁義禮樂而德澤洽禽獸草木廣裕德被蠻貊四夷纍子孫數十世此天下所共聞也秦王置天下於法令刑罰德澤亡一有而怨毒盈於世下憎惡之如仇讎禍幾及身子孫誅絶此天下之所共見也新唐李絳傳帝又問玄宗開元時致治天寶則亂何一君而相反耶絳曰治生於憂危亂生於放肆箋證漢書文帝紀二年十一月癸卯晦日有食之詔曰朕獲保宗廟以微眇之身託于士民君王之上天下治亂在豫一人唯二三執政猶吾股肱也漢書賈誼傳誼數上疏陳政事多所欲匡建其大略曰夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器亡以異在天子之所置之湯武置天下于仁義禮樂而德澤洽禽獸草木廣裕德被蠻貊四夷纍子孫數十世此天下所共聞也秦王置天下于法令刑罰德澤亡一有而怨毒盈于世下憎惡之如仇讎禍幾及身子孫誅絶此天下之所共見也新唐書李絳傳李絳字深之帝又問玄宗開元時致治天寶則亂何一君而相反邪絳曰治生於憂危亂生於放肆治亂在臣第九前漢傳喜傳傅太后始與政事喜數諫之由是傳太后不欲令喜輔政上於是賜喜黃金百斤上將軍印綬以光祿大夫養病何武唐林皆上書言喜行義修潔忠誠憂國內輔之臣也今以寢病一旦遣歸衆庶失望皆曰傅氏賢子以論議不合於定陶太后故退百寮莫不為國恨之忠臣社稷之衛魯以季友治亂楚以子玉輕重魏以無忌折衝項以范增存亡故楚跨有南土帶甲百萬鄰國不以為難子玉為將則文公側席而坐及其死也君臣相慶百萬之衆不如一賢故秦行千金以間廉頗漢散萬金以疏亞父喜立於朝陛下之光輝傅氏之廢興也上亦自重之明年正月乃拜喜為大司馬封高武侯前漢京房傳嘗宴見問上曰幽厲之君何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而用之邪將以為賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢必治任不肖必亂必然之道也前漢劉向傳曰正臣進者治之表也正臣陷者亂之機也乘治亂之機未知孰任而災異數見此臣所以寒心者也前漢陸賈傳呂太后時王諸呂諸呂擅權欲危劉氏右丞相陳平患之賈曰天下安注意相天下危注意將將相和則士豫附士豫附天下雖有變則權不分權不分為社稷計在兩君掌握耳君何不交歡太尉絳侯深相結平用其計晉李密傳司空張華問之曰安樂公何如密曰可次齊桓華問其故對曰齊桓得管仲而霸用豎刀而亡劉安樂公得諸葛亮而抗魏任黃皓而喪國是知成敗一也新唐崔群傳是時皇甫鏄言利幸於帝陰藉左右求宰相群數言其佞邪不可用既入對及開元天寶事群因推言其極曰安危在出令存亡繫所任昔玄宗少歷屯險更民間疾苦故初得姚崇宋璟盧懷慎輔以道德蘇顧李元紘孜孜守正則開元為治其後安于逸樂遠正士昵小人故宇文融以言利進李林甫楊國忠怙寵朋邪則天寶為亂願陛下以開元為法以天寶為戒社稷之福也餘見進善退惡劉向傳又見獨斷代宗紀箋證漢書傅喜傳傅喜字稚遊河內溫人也傅太后始與政事喜數諫之由是傅太后不欲令喜輔政上於是用左將軍師丹代王莽為大司馬賜喜黃金百斤上將軍印綬以光祿大夫養病大司空何武尚書令唐林皆上書言喜行義修潔忠誠憂國內輔之臣也今以寢病一旦遣歸衆庶失望皆曰傅氏賢子以論議不合於定陶太后故退百寮莫不為國恨之忠臣社稷之衛魯以季友治亂楚以子玉輕重魏以無忌折衝項以范增存亡故楚跨有南土帶甲百萬鄰國不以為難子玉為將則文公側席而坐及其死也君臣相慶百萬之衆不如一賢故秦行千金以間廉頗漢散萬金以疏亞父喜立於朝陛下之光輝傅氏之廢興也上亦自重之明年正月乃徙師丹為大司空而拜喜為大司馬封高武侯漢書京房傳房嘗宴見師古曰以間宴時而入見天子問上曰幽厲之君何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而用之邪將以為賢也上曰賢之房曰然則今何