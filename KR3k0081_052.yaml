body:
  text: 卷第五十二好學第一南史裴昭明云自立則不如一經南史賀琛云必以明經致責前漢夏侯勝云明經取青紫知拾芥史記伯夷傳且七十子之徒仲尼獨薦顏淵為好學然回也屢空糟糠不厭而卒蚤夭天之報施善人其何如哉南史王儉北游肇趙送皆手不釋書北史游棣曰童牧願學南史何遜云稱論賢士之文唐楊瑒云明經當責之大義前漢儒林傳高皇帝誅項籍引兵圍魯魯中諸儒尚講誦習禮弦歌之音不絶豈非聖人遺化好學之國哉前漢董仲舒孝景時為博士下帷講誦弟子莫見其面蓋三年不窺園其精如此前漢兒寬傳治尚書事歐陽生以郡國選詣博士受業孔安國貧無資用嘗為弟子都養時行賃作帶經而鉏休息輒讀誦其精如此都凡衆也養主紿烹炊前漢夏侯勝傳丞相御史劾奏勝非詔書黃霸阿縱勝不舉劾俱下獄勝霸既久繫霸欲從勝受經勝辭以罪死霸曰朝聞道夕死可矣勝賢其言遂受之繫再更冬講論不怠前漢劉向傳向為人簡易無威儀廉靖樂道而交接世俗專積思於經術晝誦書傳夜觀星宿或不寐達旦前漢地理志魯地俗儉嗇愛財趨商賈好訾毀多巧僞喪祭之禮文備實寡然其好學猶愈於它俗後漢桓榮傳榮初遭蒼卒與族人桓元卿同飢厄而榮講誦不息元卿嗤榮曰但自苦氣力何時復始用乎榮笑不應及拜為太常元卿嘆曰我農家子豈意學之為利乃若是哉晉何曾荀顗博物洽聞南史劉顯博涉多通南史許懋云經笥南史庾肩唐許景先云論文唐李玄南史劉杳云博綜群書南史江淹北史平鑒云不為章句之學後漢朱穆傳耽學鋭意講誦或時思至不自知亡失衣冠顛隊阮岸後漢王充傳受業太學師事班彪好博覽而不守章句家貧無書常游洛陽市肆閲所賣書一見輒能誦憶遂博通衆流百家之言後漢高鳳傳以農畝為業而專精誦讀晝夜不息妻嘗之田曝麥於庭令鳳護雞時天暴雨而鳳持竿誦經不覺潦水流麥妻旋怪問鳳方悟之蜀向明傳少時雖涉獵文學自去長史優游無事垂三十年乃更潛心典籍孜孜而倦年踰八十猶手自校書刊定謬誤積聚篇卷於時最多開門接賓誘納後進但講論古義不干時事以是見稱蜀郤正傳正少以父死母嫁單煢隻立而安貧好學博覽墳籍弱冠能屬文北史李文博云商略古今如指掌南史賀瑒云將來儒宗南史任昉云藏書南史障倕云暗寫遣書南史劉述之云辨今書與古之差謬南史裴子野云博識辨遠夷所出唐慮若虛北史祖瑩云博物晉皇甫謐傳或勸謐修名廣交諡以為非聖人孰能兼存出處居田里之中亦可以樂堯舜之道何必崇接世利事官鞅掌然後為名乎乃作玄守論以答之其辭甚美遂不仕耽靚典籍忘寢與食時人謂之書淫魏時舉辟皆不行其後鄉親勸令應命謐為釋勸論以道志焉武帝頻下詔敦逼不已謐上疏自稱草莽臣不肯應自表就帝借書帝送一車書與之謐雖羸疾而披閲不怠晉束哲傳少游國學或問博士曹志曰當今好學者誰乎志曰束廣微好學不倦人莫及也晉王歡安貧樂道專精耽學不營産業常丐食誦詩雖家無斗儲意怡如也其妻患之或焚毀其書而求改嫁歡笑而謂之曰卿不聞朱買臣妻邪時聞者多哂之歡守志彌固遂為通儒晉石勒傳勒雅好文學雖在軍旅常令儒生讀史書而聽之每以其意論古帝王善惡朝賢儒生聽者莫不歸美焉嘗使人讀漢書聞酈食其勸立六國後大驚曰此法當失何得遂成天下至留侯乃諫曰賴有此耳其天姿英達如此新唐李密傳感厲讀書聞包愷在緱山往從之以蒲韉乘牛挂漢書一帙角上行且讀楊素適見于道按轡躡其後曰何書生勤如此密識素問所讀曰項羽傳因與語奇之新唐竇威傳家世貴子弟皆喜武力獨威尚文諸兄詆為書癡箋證南史裴松之傳附孫裴昭明昭明歷郡皆清勤常謂人曰人生何事須聚畜一身之外亦復何須子孫若不才我聚彼散若能自立則不如一經南史賀瑒傳附從子賀琛琛字國寶幼孤伯父瑒授其經業一聞便通義理瑒異之常曰此兒當以明經致貴漢書夏侯勝傳勝每講授常謂諸生曰士病不明經術經術苟明其取青紫如俯拾地芥耳史記伯夷列傳或曰天道無親常與善人若伯夷叔齊可謂善人者非耶積仁潔行如此而餓死且七十子之徒仲尼獨薦顏淵為好學然回也屢空糟糠不厭而卒蚤夭天之報施善人其何如哉南史王曇首傳附孫王儉儉字仲寶生而僧綽遇害為叔父僧虔所養四歲襲爵豫寧縣侯幼篤學手不釋卷又南齊書王儉傳王儉字仲寶琅琊臨沂人也幼有神彩專心篤學手不釋卷未見何遜梁書南史皆有傳但未見會史此語也楊瑒兩唐書皆有傳但亦無是文說或據楊瑒奏議之文改也漢書儒林傳及高皇帝誅項籍引兵圍魯魯中諸儒尚講誦習禮弦歌之音不絶豈非聖人遺化好學之國哉漢書董仲舒傳董仲舒孝景時為博士下帷講誦弟子傳以久次相授業或莫見其面蓋三年不窺園其精如此漢書兒寬傳兒寬千乘人也治尚書事歐陽生以郡國選詣博士受業孔安國貧無資用嘗為弟子都養師古曰都凡衆也養主給烹炊者也貧無資用故供諸弟子烹炊也養弋向反時行賃作帶經而鉏休息輒讀誦其精如此漢書夏侯勝傳於是丞相義御史大夫廣明師古曰蔡義田廣明劾奏勝非議詔書毀先帝不道及丞相長史黃霸阿縱勝不舉劾俱下獄有司遂請尊孝武帝廟為世宗廟奏盛德文始五行之舞天下世世獻納以明盛德武帝巡狩所幸郡國凡四十九皆立廟如高祖太宗焉勝霸既久繫霸欲從勝受經勝辭以罪死霸曰朝聞道夕死可矣勝賢其言遂授之繫再更冬講論不怠漢書楚元王傳附劉向向為人簡易無威儀廉靖樂道不交接世俗專積思於經術晝誦書傳夜觀星宿或不寐達旦漢書地理志魯地俗儉嗇愛財趨商賈好訾毀多巧僞喪祭之禮文備實寡然其好學猶愈於它俗後漢書桓榮傳初遭倉卒與族人桓元卿同飢厄而榮講誦不息元卿嗤榮曰但自苦氣力何時復施用乎榮笑不應及為太常元卿歎曰我農家子豈意學之為利乃若是哉語義未盡詳明箋證略語義未盡詳明箋證略語義未盡詳明箋證略語義未盡詳明箋證略語義未盡詳明箋證略語義未盡詳明箋證略後漢書朱暉傳附孫朱穆穆字公叔年五歲便有孝稱父母有病輒不飲食差乃復常及壯耽學鋭意講誦或時思至不自知亡失衣冠顛隊坑岸後漢書王充傳王充字仲任會稽上虞人也其先自魏郡元城徙焉充少孤鄉里稱孝後到京師受業太學師事扶風班彪好博覽而不守章句家貧無書常游洛陽市肆閲所賣書一見輒能誦憶遂博通衆流百家之言後漢書逸民列傳高鳳傳高鳳字文通南陽葉人也少為書生家以農畝為業而專精誦讀晝夜不息妻嘗之田曝麥於庭令鳳護雞時天暴雨而鳳持竿誦經不覺潦水流麥妻還怪問鳳方悟之三國志蜀志向朗傳向朗字巨達襄陽宜城人也朗少時雖涉獵文學然不治素檢以吏能見稱自去長史優游無事垂三十年乃更潛心典籍孜孜不倦年踰八十猶手自校書刊定謬誤積聚篇卷於時最多開門接賓誘納後進但講論古義不干時事以是見稱三國志蜀志郤正傳郤正字令先河南偃師人也少以父死母嫁單煢隻立而安貧好學博覽墳籍弱冠能屬文語義未盡詳明箋證略語義未盡詳明箋證略語義未盡詳明箋證略語義未盡詳明箋證略語義未盡詳明箋證略語義未盡詳明箋證略語義未盡詳明箋證略晉書皇甫謐傳皇甫謐居貧躬自稼穡帶經而農遂博綜典籍百家之言沉衆寡欲始有高尚之志以著述為務自號玄晏先生著禮樂聖真之論後得風痺疾猶手不輟卷或勸謐修名廣交謐以為非聖人孰能兼存出處居田里之中亦可以樂堯舜之道何必崇接世利事官鞅掌然後為名乎作玄守論以答之遂不仕耽玩典籍忘寢與食時人謂之書淫時魏郡召上計掾舉孝廉景元初相國辟皆不行其後鄉親勸令應命謐為釋勸論以通志焉其後武帝頻下詔敦逼不已謐上疏自稱草莽臣謐辭切言至遂見聽許歲餘又舉賢良方正並不起自表就帝借書帝送一車書與之謐雖羸疾而披閲不怠晉書束晳傳束晳字廣微陽平元城人漢太子太傅疏廣之後也彥博學多聞與兄璆俱知名少游國學或問博士曹志曰當今好學者誰乎志曰陽平束廣微好學不倦人莫及也晉書儒林列傳王歡傳王歡字君厚樂陵人也安貧樂道專精耽學不營産業常丐食誦詩雖家無斗儲意怡如也其妻患之或焚毀其書而求改嫁歡笑而謂之曰卿不聞朱買臣妻邪時聞者多哂之歡守志彌高遂為通儒晉書載記石勒傳下勒雅好文學雖在軍旅常令儒生讀史書而聽之每以其意論古帝王善惡朝賢儒士聽者莫不歸美焉嘗使人讀漢書聞酈食其勸立六國後大驚曰此法當失何得遂成天下至留侯諫乃曰賴有此耳其天資英達如此新唐書李密傳李密額鋭角方瞳子産白明徹煬帝見之謂宇文述曰左仗下黑色小兒為誰曰蒲山公李寬子密帝曰此兒顧眄不常無入衛它日述諭密曰君世素貴當以才學顯何事三衛間哉密大喜謝病去感厲讀書聞包愷在緱山往從之以蒲韀乘牛挂漢書一帙角上行且讀越國公楊素適見于道按轡躡其後曰何書生勤如此密識素下拜問所讀曰項羽傳因與語奇之新唐書竇威傳竇威字文蔚岐州平陸人家世貴子弟皆喜武力獨威尚文諸兄詆為書癡博覽百家第二史記甘茂列傳事下蔡史舉學百家之說因張儀樗里子而求見秦惠王惠王卒武王立使甘茂定蜀還以茂為左丞相後漢崔駰傳發以佞巧幸於莽母師氏能通經學百家之言莽賜號義成夫人金印紫綬文軒丹轂顯於新世後漢蘇伯況傳善圖緯能通百家之言後漢馬嚴傳少孤好擊劍習騎射後從楊太伯講學專心墳典能通春秋左氏因覽百家群言遂交結英賢京師大人咸器異之晉范平少篤學精五經兼覽百氏學者宗焉晉皇甫謐字士安年二十不好學遊蕩無度咸以為癡嘗得瓜果輒進所後叔母任氏任氏曰孝經云三牲之養猶為不孝汝年二十目不存教心不入道無以慰我因歎曰昔孟母三徙以成仁曾父烹豕以存教豈我君不卜鄰教有所闕何爾魯鈍之甚修身篤學自汝得之於我何有因對之流涕謐乃感激就學勤力不殆居貧躬自稼穡帶經而農遂博綜典籍百家之言晉杜夷傳少而恬洎居甚貧窘不營産業博覽經籍百家之書算歷圖緯靡不畢究晉徐廣傳世好學至廣尤為精純百家數術無不研覽新唐蔣乂傳結髮志學老而不厭雖甚寒暑卷不釋于前故能通百家學尤明前世沿革家藏書至萬五千卷餘見好學王充傳又見學無常師班固傳箋證史記甘茂列傳甘茂者下蔡人也事下蔡史舉先生學百家之說因張儀樗里子而求見秦惠王王見而說之使將而佐魏章略定漢中地惠王卒武王立張儀魏章去東之魏蜀侯輝相壯反秦使甘茂定蜀還而以甘茂為左丞相後漢書崔駰傳崔駰字亭伯涿郡安平人也高祖父朝昭帝時為幽州從事諫刺史無與燕刺王通及刺王敗擢為侍御史生子舒歷四郡太守所在有能名舒小子篆王莽時為郡文學以明經徵詣公車太保甄豐舉為步兵校尉篆辭曰吾聞伐國不問仁人戰陳不訪儒士此舉奚為至哉遂投劾歸莽嫌諸不附己者多以法中傷之時篆兄發以佞巧幸於莽位至大司空母師氏能通經學百家之言莽寵以殊禮賜號義成夫人金印紫綬文軒丹轂顯於新世後漢書蘇竟傳蘇竟字伯况扶風平陵人也平帝世竟以明易為博士講書祭酒王莽置六經祭酒秩上卿每經各一人竟為講尚書祭酒善圖緯能通百家之言後漢書馬援傳附兄子馬嚴嚴字威卿父余王莽時為揚州牧嚴少孤而好擊劍習騎射後乃白援從平原楊太伯講學專心墳典能通春秋左氏因覽百家群言遂交結英賢京師大人咸器異之大人長者之稱也晉書儒林列傳范平傳范平字子安吳郡錢塘人也其先銍侯馥避王莽之亂適吳因家焉平研覽墳索遍該百氏姚信賀邵之徒皆從受業吳時舉茂才纍遷臨海太守政有異能孫晧初謝病還家敦悅儒學吳平太康中頻徵不起年六十九卒晉書皇甫謐傳皇甫謐字士安幼名靜安年二十不好學游蕩無度或以為癡嘗得瓜果輒進所後叔母任氏任氏曰孝經云三牲之養猶為不孝汝今年餘二十目不存教心不入道無以慰我因歎曰昔孟母三徙以成仁曾父烹豕以存教豈我居不擇鄰教有所闕何爾魯鈍之甚也修身篤學自汝得之於我何有因對之流涕謐乃感激就鄉人席坦受書勤力不怠居貧躬自稼穡帶經而農遂博綜典籍百家之言晉書儒林列傳杜夷傳杜夷字行齊廬江灊人也世以儒學稱為郡著姓夷少而恬泊操尚貞素居甚貧窘不營産業博覽經籍百家之書算歷圖緯靡不畢究晉書徐廣傳徐廣字野民東莞姑幕人侍中邈之弟也世好學至廣尤為精純百家數術無不研覽新唐書蔣乂傳蔣乂字德源常州義興人徙家河南結髮志學老而不厭雖甚寒暑卷不釋于前故能通百家學尤明前世沿革家藏書至萬五千卷不讀非聖之書第三前漢楊雄傳自有大度非聖哲之書不好也後漢周變傳十歲就學能通詩論及長專精禮易不讀非聖之書不修賀問之好新唐柳公綽幼性質嚴重起居皆有禮法屬文典正不讀非聖書箋證漢書揚雄傳上揚雄字子雲蜀郡成都人也自有大度非聖哲之書不好也後漢書周燮傳周燮字彥祖汝南安城人十歲就學能通詩論及長專精禮易不讀非聖之書不修賀問之好新唐書柳公綽傳柳公綽字寬京兆華原人始生三日伯父子華曰興吾門者此兒也因小字起之幼孝友性質嚴重起居皆有禮法屬文典正不讀非聖書不為章句之學第四後漢馬援傳有太志常受齊詩意不能守章句乃辭況欲就邊郡田牧況曰汝大才當晚成艮工不示人以朴宜從所好後漢盧植傳少與鄭康成俱事馬融能通古今學好研精而不守章句後漢班固傳博貫載籍所學不為章句舉大義而已晉徐邈傳在西省侍帝雖不口專章句然開釋文義探明指趣撰正五經音訓學者宗之晉張賓傳少好博學經史不為章句豁達有大節新唐鄭覃傳穆宗坐延英論詩工否覃曰孔子所刪三百篇是已其非雅正者烏足為天子導哉夫風大小雅皆下剌上之變非上化下為之故王者采詩以考風俗得失若陳後主隋煬帝特能詩之章解而不知王術故卒歸於亂章什諓諓願陛下不取也餘見好學王充傳箋證後漢書馬援傳援年十二而孤少有大志諸兄奇之嘗受齊詩意不能守章句東觀記曰受齊詩師事潁川蒲昌乃辭況欲就邊郡田牧況曰汝大才當晚成良工不示人以朴且從所好從其所請也後漢書盧植傳盧植字子幹涿郡涿人也少與鄭玄俱事馬融能通古今學好研精而不守章句後漢書班彪傳附子班固固字孟堅年九歲能屬文誦詩書及長遂博貫載籍九流百家之言無不窮究所學無常師不為章句舉大義而已晉書儒林列傳徐邈傳徐邈年四十四始補中書舍人在西省侍帝雖不口傳章句然開釋文義標明指趣撰正五經音訓學者宗之晉書載記張賓傳張賓字孟孫趙郡中丘人也父瑤中山太守賓少好學博涉經史不為章句闊達有大節新唐書鄭珣傳附子鄭覃覃以父蔭補弘文校書郎擢纍擢議大夫帝坐延英論詩工否覃曰孔子所刪三百篇是已其非雅正者烏足為天子道哉夫風大小雅皆下刺上之變非上化下為之故王者采詩以考風俗得失若陳後主隋煬帝特能詩之章解而不知王術故卒歸於亂章什諓諓願陛下不取也子傳父學第五前漢王吉兼通五經好梁丘賀說易令子駿受焉陳咸薦駿賢父子經明行修宜顯以厲俗前漢劉歆傳歆於河平中受詔與父向領校祕書講六藝傳記諸子詩賦數術方技無所不究向死後哀帝初即位王莽舉歆宗室有材行為侍中復領五經卒父前業歆乃集六藝群書種別為七略後漢鄭興傳興好古學尤明左氏而賈逵自傳其父業故有鄭賈之學後漢陳元傳元少傳父業為之訓詁鋭精覃思至不與鄉里通以父任為郎為學者所宗後漢張酺傳酺少從父充受尚書能傳其業後漢鄭衆傳年十二從父受左氏春秋情力於學其後作春秋刪十九篇八年卒官子安世亦傳家業後漢躬少傳父業講受徒衆常數百人後漢楊賜傳少傳家學篤志博聞常退居隱約教授門徒不答州郡禮命後漢徐防傳祖父宣為講學大夫以易教受王莽父憲亦傳其業防少習父祖業後漢薛漢傳父子以章句著名少傳其父業晉王隱傳世寒素父銓有述作之志每私録晉事及功臣行狀未就而卒隱不交勢援受父遺業西都舊事多所諳究晉韋逞母宋氏家世以儒學稱父授以周官音義謂之曰吾家世學周官傳業相繼此又周公所制經紀典誥百官惣於此矣吾今無男可傳汝可受之勿令絶世屬天下亂遂以仕符堅為太常堅幸其太學問博士經典時博士盧壺對曰廢學既久書傳零落比年綴撰周官禮注未有其師竊見韋逞母宋氏傳其父業得周官音義今年八十視聽無闕自非此母無可以傳受於是就宋氏家立講堂置生員百二十人隔絳紗慢而受業號宋氏為宣文君賜侍婢十人周官學復行於世時稱韋氏宋母焉餘見著書司馬遷傳箋證漢書王吉傳初吉兼通五經能為騶氏春秋以詩論語教授好梁丘賀說易令子駿受焉駿以孝廉為郎左曹陳咸薦駿賢父子經明行修宜顯以厲俗漢書楚元王傳附劉歆歆字子駿少以通詩書能屬文召見成帝待詔宦者署為黃門郎河平中受詔與父向領校祕書講六藝傳記諸子詩賦數術方技無所不究向死後歆復為中壘校尉哀帝初即位大司馬王莽舉歆宗室有材行為侍中太中大夫遷騎都尉奉車光祿大夫貴幸復領五經卒父前業歆乃集六藝群書種別為七略後漢書鄭興傳興好古學尤明左氏周官長於歷數自杜林桓談衛宏之屬莫不斟酌焉世言左氏者多祖興而賈逵自傳其父業故有鄭賈之學後漢書陳元傳陳元字長孫蒼梧廣信人也父欽習左氏春秋元少傳父業為之訓詁鋭精覃思至不與鄉里通以父任為郎建武初元與桓談杜林鄭興俱為學者所宗後漢書張酺傳酺少從祖父充受尚書能傳其業東觀記曰充與光武同門學光武即位求問充充已死後漢書鄭興傳附子鄭衆衆字仲師年十二從父受左氏春秋精力於學明三統歷作春秋難記條例兼通易詩知名於世其後受詔作春秋刪十九篇八年卒官子安世亦傳家業後漢書郭躬傳躬少傳父業講授徒衆常數百人後漢書楊震傳附孫楊賜賜字伯獻少傳家學篤志博聞常退居隱約教授門徒不答州郡禮命後漢書徐防傳徐防字謁卿沛國銍人也祖父宣為講學大夫以易教授王莽父憲亦傳宣業防少習父祖學後漢書儒林列傳薛漢傳薛漢字公子淮陽人也世習韓詩父子以章句著名漢少傳父業晉書王隱傳王隱字處叔陳郡陳人也世寒素父銓陰陽令少好學有著述之志每私録晉事及功臣行狀未就而卒隱以儒素自守不交勢援博學多聞受父遺業西都舊事多所諳究晉書烈女列傳韋逞母宋氏韋逞母宋氏不知何郡人也家世以儒學稱宋氏幼喪母其父躬自養之及長授以周官音義謂之曰吾家世學周官傳業相繼此又周公所制經紀典誥百官品物備於此矣吾今無男可傳汝可受之勿令絶世屬天下喪亂宋氏諷誦不輟其後為石季龍徙之于山東宋氏與夫在徙中推鹿車背負父所授書到冀州依膠東富人程安壽壽養護之逞時年少宋氏晝則樵採夜則教逞然紡績無廢壽每歎曰學家多士大夫得無是乎逞遂學成名立仕苻堅為太常堅嘗幸其太學問博士經典乃憫禮樂遺闕時博士盧壼對曰廢學既久書傳零落比年綴撰正經粗集唯周官禮注未有其師竊見太常韋逞母宋氏世學家女傳其父業得周官音義今年八十視聽無闕自非此母無可以傳授後生於是就宋氏家立講堂置生員百二十人隔絳紗幔而受業號宋氏為宣文君賜侍婢十人周官學復行於世時稱韋氏宋母焉藏書第六前漢景十三王傳河閒獻王德修學好古實事求是求真是也從民得善書必為好寫與之留其真加金帛賜以招之繇是四方道術之人不遠千里或有先祖舊書多奉以奏獻王者故得書多與漢朝等是時淮南王安亦好書所招致率多浮辨獻王所得書皆古文先秦舊書周官尚書禮禮記禮者禮經禮記者諸儒記禮之說孟子老子之屬皆經傳說記七十子之徒所論其學舉六藝立毛氏詩左氏春秋博士修禮樂被服儒者晉張華傳華雅愛書籍身死之日家無餘財唯有文史溢于几篋嘗徙居載書三十乘祕書監摯虞撰定官書皆資華之本以取正焉天下奇祕出所布者悉在華所內是博物洽聞餘見好學向明傳又見博覽百家蔣乂傳又見不讀非聖之書柳公綽傳箋證漢書景十三王傳河間獻王德以孝景前二年立修學好古實事求是師古曰務得事實每求真是也從民得善書必為好寫與之留其真加金帛賜以招之繇是四方道術之人不遠千里或有先祖舊書多奉以奏獻王者故得書多與漢朝等是時淮南王安亦好書所招致率多浮辨獻王所得書皆古文先秦舊書周官尚書禮禮記師古曰禮者禮經也禮記者諸儒記禮之說也孟子老子之屬皆經傳說記七十子之徒所論其學舉六藝立毛氏詩左氏春秋博士修禮樂被服儒術造次必於儒者晉書張華傳華性好人物誘進不倦至於窮賤候門之士有一介之善者便咨嗟稱詠為之延譽雅愛書籍身死之日家無餘財惟有文史溢于几篋嘗徙居載書三十乘祕書監摰虞撰定官書皆資華之本以取正焉天下奇祕世所希有者悉在華所由是博物洽聞世無與比
