body:
  text: 卷第五十九小人預政第一前漢佞幸董賢傳明年匈奴單于來朝怪賢年少以問譯上令譯報曰大司馬年少以大賢居位單于迺起拜賀漢得賢臣前漢佞幸石顯傳顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位民歌之曰牢邪石邪五鹿客邪印何纍纍綬若若邪言其兼官據埶也後漢劉玄傳更始其所授官爵者皆群小賈豎或有膳夫庖人長安為之語曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯炊亨為養後漢仲長統傳理亂篇曰信任親愛者盡佞寬容說之人也寵貴隆豐者盡后妃姬妾之家也使餓狼守庖廚飢虎牧牢豚遂至熬天下之脂膏斲生人之骨髓怨毒旡聊禍亂並起後漢郎顗傳有貌旡實佞人也有實旡貌道人也寒溫為實清濁為貌今三公皆令色足恭外厲內荏以虛事上旡佐國之實故清濁效而寒溫不效也晉裴楷傳帝嘗問曰朕應天順時海內更始天下風聲何得何失楷對曰陛下受命四海承風所以未比德於堯舜者但以賈充之徒尚在朝耳晉趙王倫傳倫僣即帝位同黨咸超階越次不可勝紀奴卒廝役亦加以爵位每朝會貂蟬盈坐時諺曰貂不足狗尾續晉陸納傳時王道子以少年專政委任群小納望闕而歎曰好家居纖兒欲撞壞之邪新唐王叔文傳贊曰叔文沾沾小人竊天下柄與陽虎取大弓春秋書為盜旡以異宗元等橈節從之徼幸一時貪帝病昏抑太子之明規權遂私故賢者疾不肖者媢一僨而不復宜哉彼若不傅匪人自勵材猷不失為名卿才大夫惜哉新唐書皇甫鏄傳鏄以吏道進既由聚斂句剝為宰相至雖市道皆嗤之崔群裴度以聞帝怒不聽度乃表罷政事極論鏄姦邪苛刻天下怨之將食其肉且言天下安否繫朝廷朝廷重輕在輔相今承宗削地程權赴闕韓弘輿疾討賊非力能制之顧朝廷處置能服其心也若相鏄則四方解矣請授以浙西觀察使其辭切至帝以天下略平亦欲崇臺沼官觀自娛樂鏄與程异知帝意故數貢羡財陰佐所欲又賂吐突承璀為奧援故帝排眾論決任之反以度為朋黨不內其言鏄乃益以巧媚自固新唐書鄭綮傳綮每以詩謠託諷中人有誦之天子前者昭宗意其有所蘊未盡因有司上班薄遂署其側曰可禮部侍郎同中書門下平章事綮本善詩其語多俳諧故使落調世共號鄭五歇後體至是省史走其家上謁綮笑曰諸君誤矣人皆不識字宰相亦不及我史言不妄俄聞制詔下歎曰萬一然笑殺天下人既視事宗戚詣慶搔首曰歇後鄭五作宰相事可知矣固讓不聽立朝儼然旡復故態自以不為人所瞻望纔三月以疾乞骸拜太子少保致仕卒新唐畢諴傳贊曰懿僖以來王道日失厥序腐尹塞朝賢人遁逃四方豪英各附所合而奮天子塊然所與者惟佞愎庸奴乃欲鄣橫流支已顛寧不殆哉觀綮村輩不次而用捭豚臑拒貙牙趣亡而已一韓偓不能容況賢者乎餘見贖罪貢禹傳箋證漢書佞幸傳董賢董賢字聖卿雲陽人也父恭為御史任賢為太子舍人哀帝立賢隨太子官為郎師古曰東宮官屬隨例遷也二歲餘賢傳漏在殿下師古曰傳漏奏時刻為人美麗自喜哀帝望見說其儀貌識而問之曰是舍人董賢邪因引上與語拜為黃門郎繇是始幸明年匈奴單于來朝宴見群臣在前單于怪賢年少以問譯師古曰傳語之人也上令譯報曰大司馬年少以大賢居位單于迺起拜賀漢得賢臣漢書佞幸傳石顯石顯字君房濟南人顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位民歌之曰牢邪石邪五鹿客邪印何纍纍綬若若邪言其兼官據埶也後漢書劉玄傳趙萌專權威福自己郎吏有說萌放縱者更始怒拔劍擊之自是無復敢言萌私忿侍中引下斬之更始救請不從時李軼朱鮪擅命山東王匡張卬橫暴三輔其所授官爵者皆群小賈豎或有膳夫庖人長安為之語曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯公羊傳曰炊烹為養後漢書仲長統傳理亂篇曰信任親愛者盡佞寬容悅之人也寵貴隆豐者盡后妃姬妾之家也使餓狼守庖廚飢虎牧牢豚遂至熬天下之脂膏斲生人之骨髓怨毒無聊禍亂並起後漢書郎顗傳易傳曰有貌無實佞人也有實無貌道人也寒溫為實清濁為貌今三公皆令色足恭外厲內荏以虛事上無佐國之實故清濁效而寒溫不效也晉書裴秀傳附從弟裴楷帝嘗問曰朕應天順時海內更始天下風聲何得何失楷對曰陛下受命四海承風所以未比德於堯舜者但以賈充之徒尚在朝耳晉書趙王倫傳滿奮崔隨樂廣進璽綬於倫乃僭即帝位大赦改元建始諸黨皆登卿將並列大封其餘同謀者咸超階越次不可勝紀至於奴卒廝役亦加以爵位每朝會貂蟬盈坐時人為之諺曰貂不足狗尾續晉書陸曄傳附曄弟陸玩子陸納納字祖言少有清操貞厲絕俗時會稽王道子以少年專政委任群小納望闕而歎曰好家居纖兒欲撞壞之邪新唐書韋執誼王叔文等傳贊曰叔文沾沾小人竊天下柄與陽貨取大弓春秋書為盜無以異宗元等橈節從之徼幸一時貪帝病昏抑太子之明規權遂私故賢者疾不肖者媢一僨而不復宜哉彼若不傅匪人自勵材猷不失為名卿才大夫惜哉新唐書皇甫鎛傳皇甫鎛涇州臨涇人鏄以吏道進既由聚歛句剝為宰相至雖市道皆嗤之崔群裴度以聞帝怒不聽度乃表罷政事極論鏄姦邪苛刻天下怨之將食其肉且言天下安否繫朝廷朝廷輕重在輔相今承宗削地程權赴闕韓弘輿疾討賊非力能制之顧朝廷處置能服其心也若相鎛則四方解矣請授以浙西觀察使其辭切至帝以天下略平亦欲崇臺沼宮觀自娛樂鏄與程异知帝意故數貢羡財陰佐所欲又賂吐突承璀為奧援故帝排眾論決任之反以度為朋黨不內其言鎛乃益以巧媚自固新唐書鄭綮傳鄭綮字蘊武及進士第綮每以詩謠託諷中人有誦之天子前者昭宗意其有所蘊未盡因有司上班簿遂署其側曰可禮部侍郎同中書門下平章事綮本善詩其語多俳諧故使落調世共號鄭五歇後體至是省史走其家上謁綮笑曰諸君誤矣人皆不識字宰相亦不及我史言不妄俄聞制詔下歎曰萬一然笑殺天下人既視事宗戚詣慶搔首曰歇後鄭五作宰相事可知矣固讓不聽立朝侃然無復故態自以不為人所瞻望纔三月以疾乞骸拜太子少保致仕卒新唐書畢諴崔彥昭劉鄴陸扆鄭綮朱朴韓偓傳贊曰懿僖以來王道日失厥序腐尹塞朝賢人遁逃四方豪英各附所合而奮天子塊然所與者惟佞愎庸奴乃欲鄣橫流支已顛寧不殆哉觀綮朴輩不次而用捭豚臑拒貙牙趣亡而已一韓偓不能容况賢者乎不使小人預政第二後漢張綱傳漢安元年選遣八使徇行風俗而綱獨埋其輪於洛陽都亭曰豺狼當路安問狐狸遂奏曰太將軍冀河南尹不疑蒙外戚之援荷國厚恩以芻蕘之資居阿衡之任不能敷揚五教翼讚日月而專為封豕長蛇肆其貪叨多樹諂諛以害忠良誠天威所不赦大辟所宜加也魏志程昱傳昱孫曉為黃門侍郎時校事放橫曉上疏曰近觀秦漢初旡校事之官干與庶政昔武皇帝大業草創眾官未備而軍旅勤苦民心不安乃有小罪不可不察故置校事取其一切耳然檢御有方不至縱恣也其後漸蒙見任轉相因仍遂令上察宮廟下攝眾司官旡局業職旡分限隨意任情唯心所適法造於筆端不依科詔獄成於門下不顧覆訊其選官屬以謹慎為粗疏以謥調為賢能其治事以刻暴為公嚴以循理為怯弱外則託天威以為聲勢內則聚群姦以為腹心大臣恥與分勢含忍而不言小人畏其鋒芒鬱結而旡告曹恭公遠君子近小人國風託以為剌衛獻公舍大臣與小臣謀定姜謂之有罪縱令校事有益於國以禮義言之況姦回暴露而復不罷是袞闕不補迷而不反也於是遂罷校事官吳陸抗傳時何定弄權閹官預政抗上疏曰臣聞開國承家小人勿用靖譖庸回唐書攸戒是以雅人所以怨剌仲尼所以歎息也春秋巳來爰及秦漢傾覆之釁未有不由斯者也小人不明理道所見既淺雖使竭情盡節猶不足任況其姦心素篤而憎愛移易哉今委以聰明之任假以專制之威而冀雍熙之聲作肅清之化立不可得也新唐李甘傳舒元輿既作相注亦求入中書甘唱於朝曰宰相者代天理物先德望而後文藝注乃何人敢茲叨竊白麻若出吾必壞之會李訓亦惡注之所求相注之事竟寢箋證後漢書張晧傳附子張綱綱字文紀少明經學雖為公子而厲布衣之節漢安元年選遣八使徇行風俗皆耆儒知名多歷顯位唯綱年少官次最微餘人受命之部而綱獨埋其車輪於洛陽都亭曰豺狼當路安問狐狸前書京兆督郵侯文之辭遂奏曰大將軍冀河南尹不疑蒙外戚之援荷國厚恩以芻蕘之資居阿衡之任不能敷揚五教翼讚日月而專為封豕長蛇肆其貪叨左傳申包胥曰吳為封豕長蛇薦食上國也甘心好貨縱恣無底多樹諂諛以害忠良誠天威所不赦大辟所宜加也三國志魏志程昱傳附孫程曉曉嘉平中為黃門侍郎時校事放橫曉上疏曰近觀秦漢雖官名改易職司不同至於崇上抑下顯分明例其致一也初無校事之官干與庶政者也昔武皇帝大業草創眾官未備而軍旅勤苦民心不安乃有小罪不可不察故置校事取其一切耳然檢御有方不至縱恣也此霸世之權宜非帝王之正典其後漸蒙見任復為疾病轉相因仍莫正其本遂令上察高廟下攝眾司官無局業職無分限隨意任情唯心所適法造於筆端不依科詔獄成於門下不顧覆訊其選官屬以謹慎為粗疏以謥詷為賢能其治事以刻暴為公嚴以循理為怯弱外則託天威以為聲勢內則聚群奸以為腹心大臣恥與分勢含忍而不言小人畏其鋒芒鬱結而無告曹恭公遠君子近小人國風託以為刺衛獻公舍大臣與小臣謀定姜謂之有罪縱令校事有益於國以禮義言之尚傷大臣之心况姦橫暴露而復不罷是袞闕不補迷而不返也於是遂罷校事官三國志吳志陸遜傳附子陸抗時何定弄權閹官預政抗上疏曰臣聞開國承家小人勿用靖譖庸回唐書攸戒是以雅人所以怨刺仲尼所以歎息也春秋已來爰及秦漢傾覆之釁未有不由斯者也小人不明理道所見既淺雖使竭情盡節猶不足任況其姦心素篤而憎愛移易哉苟患失之無所不至今委以聰明之任假以專制之威而冀雍熙之聲作肅清之化立不可得也舊唐書李甘傳李甘字和鼎長慶末進士擢第又制策登科太和中累官至侍御史鄭注入翰林侍講舒元輿既作相注亦求入中書甘唱於朝曰宰相者代天理物先德望而後文藝注乃何人敢茲叨竊白麻若出吾必壞之會李訓亦惡注之所求相注之事竟寢避賢者路第三前漢公孫鴻傳後淮南衡山謀反鴻病甚自以為旡功而封侯居宰相位宜佐明主填撫國家使人由臣子之道今諸侯有畔逆之計此大臣奉職不稱也恐病死旡以塞責刀上書曰願歸侯乞骸骨避賢者路前漢王尊傳為安定太守出教勑掾功曹各自底厲助太守為治其不中用趣自避退毋久妨賢前漢石慶上書曰臣幸得待罪丞相疲駑毋以輔治城郭倉廩空虛民多流亡罪當服斧鑕上不忍致法願歸丞相侯印乞骸骨歸避賢者路箋證漢書公孫弘傳後淮南衡山謀反治黨與方急弘病甚自以為無功而封侯居宰相位宜佐明主填撫國家師古曰填音竹刃反使人由臣子之道而諸侯有畔逆之計此大臣奉職不稱也恐病死無以塞責乃上書曰願歸侯乞骸骨避賢者路漢書王尊傳初元中舉直言遷虢令轉守槐里兼行美陽令事後上行幸雍過虢尊供張如法而辦以高第擢為安定太守到官出教告屬縣曰令長丞尉奉法守城為民父母又出教勑掾功曹各自底厲助太守為治其不中用趣自避退毋久妨賢師古曰趣讀曰促漢書萬石君傳慶慙不任職上書曰臣幸得待罪丞相疲駑無以輔治城郭倉廩空虛民多流亡罪當伏斧質上不忍致法願歸丞相侯印乞骸骨歸避賢者路卷四十六案萬石慶乃萬石君少子也妨塞賢路第四前漢鮑宣傳上書諫曰竊見孝成帝時外親持權人人牽引所私以充塞朝廷妨賢人路濁亂天下晉文苑傳王況字彥伯有俊才出於寒素為時豪所抑仕郡文學掾鬱鬱不得志乃作釋時論其辭曰東野丈人觀時以居隱耕汙腴之墟有冰氏之子者出自沍寒之谷過而問塗丈人曰子奚自曰自洇陰之鄉奚適曰欲適煌煌之堂丈人曰入煌煌之堂者必有赫赫之光今子困於寒而欲求諸熱旡得熱之方冰子瞿然曰胡為其然也丈人曰融融者皆趣熱之士其得爐冶之門者惟挾炭之子茍非斯人不如其己冰子曰吾聞宗廟之器不要華林之木四門之賓何必冠蓋之族前賢有解韋索而佩朱韍舍徒擔而乘丹轂由此言之何恤而旡祿惟先生告我塗之速也丈人曰嗚呼子聞得之若是不知時之在彼吾將釋子夫道有安危時有險易才有所應行有所適英奇奪於從橫之世賢智顯於霸王之初當危難則騁權譎以良圖值制作則展儒道以暢攄是則袞龍出於褞褐卿相起於匹夫故有朝賤而夕貴先卷而後舒當斯時也豈計門資之高卑論勢位之輕重乎今則不然上聖下明時隆道寧群后逸豫宴安守平百辟君子弈世相生公門有公卿門有卿多士豊於貴族爵命不出閨庭四門穆穆綺襦是盈仍叔之才皆為老成賤有常辱貴有常榮眾塗圯塞投足何錯於是冰子釋然乃悟曰富貴人之所欲貧賤人之所惡僕少長於孔顏之門久處於清夜之路不謂熱勢自共遮錮恭承明誨服我初素箋證漢書鮑宣傳董賢貴幸宣以諫大夫從其後上書諫曰竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷妨賢人路濁亂天下晉書文苑傳王沉王沉字彥伯寬平人也少有俊才出於寒素不能隨俗沉浮為時豪所抑仕郡文學掾鬱鬱不得志乃作釋時論其辭曰東野丈人觀時以居隱耕汙腴之墟有冰氏之子者出自沍寒之谷過而問塗丈人曰子奚自曰自涸陰之鄉奚適曰欲適煌煌之堂丈人曰入煌煌之堂者必有赫赫之光今子困於寒而欲求諸熱無得熱之方冰子瞿然曰胡為其然也丈人曰融融者皆趣熱之士其得爐冶之門者惟挾炭之子茍非斯人不如其己冰子曰吾聞宗廟之器不要華林之木四門之賓何必冠蓋之族前賢有解韋索而佩朱韍舍徒擔而乘丹轂由此言之何恤而無祿惟先生告我塗之速也丈人曰嗚呼子聞得之若是不知時之在彼吾將釋子夫道有安危時有險易才有所應行有所適英奇奮於縱橫之世賢智顯於霸王之初當厄難則騁權譎以良圖值制作則展儒道以暢攄是則袞龍出於縕褐卿相起於匹夫故有朝賤而夕貴先卷而後舒當斯時也豈計門資之高卑論勢位之輕重乎今則不然上聖下明時隆道寧群后逸豫宴安守平百辟君子奕世相生公門有公卿門有卿指禿腐骨不簡蚩儜多士豐於貴族爵命不出閨庭四門穆穆綺襦是盈仍叔之子皆為老成賤有常辱貴有常榮眾塗圯塞投足何錯於是冰子釋然乃悟曰富貴人之所欲貧賤人之所惡僕少長於孔顏之門久處於清寒之路不謂熱勢自共遮錮敬承明誨服我初素
