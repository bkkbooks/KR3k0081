body:
  text: 卷第八十五知人第一史記管夷吾傳少時常與鮑叔牙游鮑叔知其賢管仲貧困常欺鮑叔鮑叔終善遇之不以為言已而鮑叔事齊公子小白管仲事公子糾及小白立為桓公公子糾死管仲囚焉鮑叔遂進管仲管仲既用任政於齊齊桓公以霸九合諸侯一正天下管仲之謀也管仲曰吾始困時常與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗與鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗二戰三走鮑叔不以我為怯知我有老母也公子糾敗用忽死之吾幽囚受辱鮑叔不以我為無恥知我不羞小節而恥功名不顯於天下也生我者父母知我者鮑子也鮑叔既進管仲以身下之子孫世祿於齊有封邑者十餘世常為名大夫天下不多管仲之賢而多鮑叔能知人也前漢薛宣傳谷永上疏曰帝王之德莫大於知人知人則百僚任職天工不曠故皋陶曰知人則哲能官人前漢兒寬傳初梁相褚大通五經為博士時寬為弟子及御史大夫缺詔褚大大自以為御史大夫至洛陽聞兒寬為之褚大笑及至與寬議封禪於上前大不能及退而服曰上誠知人前漢張安世傳元帝初即位詔列侯舉茂材勃舉陳湯湯有罪勃坐削戶二百會薨故賜諡曰繆侯後湯立功西域世以勃為知人前漢張良等傳贊曰呂后問宰相高祖曰陳平智有餘王陵少戇可以佐之安劉氏者必勃也又問其次云過此以後非乃所及終皆如言聖矣夫後漢鄧禹傳時任使諸將多訪於禹禹每有所舉者皆當其才光武以為知人後漢宋洪傳字元矩為鄢陵令亦有名跡拔同郡韋著扶風法真稱為知人後漢第五倫傳倫遷蜀郡太守蜀地肥饒人吏富實掾史家資多至千萬皆鮮車怒馬以財貨自達恕馬謂馬之肥壯其氣憤恕也倫悉簡其豐贍者遣還之更選孤貧志行之人以處曹任於是文職修理所舉吏多至九卿二千石時以為知人後漢仲長統傳并州剌史高幹袁紹甥也素貴有名招致四方遊士士多歸附統過幹訪以當時之事統曰君有雄志而無雄才好士而不能擇人所以為君深戒也幹雅自多不納其言無幾幹以并州叛卒至於敗并冀之士皆以是異統異其有知人之鑒也魏陳群傳群薦廣陵陳矯丹陽載乾太祖皆用之後吳人叛乾忠義死難矯遂為名臣世以群為知人魏王修傳初修識高柔於弱冠異王基於童幼終皆遠至世稱其知人蜀志龐統字士元少時朴鈍未有識者潁川司馬徽情雅有知人鑒統弱冠往見徽徽共語自晝至夜稱統當為南州士之冠冕由是漸顯吳志顧邵傳初錢唐丁諝出於役伍陽羡張秉生於庶民烏程吳粲雲陽商禮起乎微賤邵皆拔而友之為立聲譽諝至典軍中郎秉雲陽太守禮零陵太守粲太子少傅世以邵為知人晉羊祜傳從甥王衍徵詣祜陳事辭甚俊辨祜不然之衍拂衣而起祜顧謂賓客曰王夷甫方以盛名處大位然敗俗傷化必此人也晉江統傳東海王越為兗州牧以統為別駕委以州事與統書曰昔王子師為豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪應此者不統舉郤鑒為賢良阮修為直言程收為方正時以為知人晉桓彝傳有人倫識鑒拔才取士或出於無聞或得之孩抱時人方之許郭晉王戎傳戎有人倫鑒識嘗目山濤如璞玉渾金人皆欽其寶莫知名其器王衍神姿高徹如瑤林瓊樹自然是風塵表物謂裴頠拙於用長苟勗工於用短陳道寧繌繌如束長竿族第敦有高名戎惡之敦每候戎輒託疾不見敦後果為逆亂新唐劉文靜傳高祖為唐公鎮太原文靜察有大志又見秦王謂寂曰唐公子非常人也豁達神武漢高帝魏太祖之徒歟殆天啓之也新唐王圭傳時圭與房喬李靖溫彥博戴胄魏文正同輔政太宗以圭善人物且知言因謂曰卿標鑒通晤為朕言喬等材且自謂孰與諸子賢對曰孜孜奉國知無不為臣不如喬兼資文武出將入相臣不如靖敷奏詳明出納惟允臣不如彥博濟繁治劇衆務必舉臣不如胄以諫諍為心恥君不及堯舜臣不如文正至激濁揚清嫉惡好善臣於數子有一日之長帝稱善而喬等亦以為盡己所長謂之確論新唐李光顏傳元和九年討蔡時諸鎮兵環蔡十餘屯相顧不肯前獨光顏先敗賊始裴度宣慰諸軍還為憲宗言光顏勇而義必立功新唐書裴垍傳李吉甫始執政以情謂垍曰吾落魄遠裔更十年始相天子比日人物吾慒不及知且宰相職當進賢任能君精鑒為我言之垍即崖略疏三十許人吉甫籍以薦于朝天下翕然稱得人餘見薦賢自代邴吉傳又見名浮於行郭太傳箋證史記管仲傳管仲夷吾者潁上人也少時常與鮑叔牙游鮑叔知其賢管仲貧困常欺鮑叔鮑叔終善遇之不以為言已而鮑叔事齊公子小白管仲事公子糾及小白立為桓公公子糾死管仲囚焉鮑叔遂進管仲管仲既用任政於齊齊桓公以霸九合諸侯一匡天下管仲之謀也管仲曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗三戰三走鮑叔不以我為怯知我有老母也公子糾敗召忽死之吾幽囚受辱鮑叔不以我為無恥知我不羞小節而恥功名不顯於天下也生我者父母知我者鮑子也鮑叔既進管仲以身下之子孫世祿於齊有封邑者十餘世常為名大夫天下不多管仲之賢而多鮑叔能知人也漢書薛宣傳月餘御史大夫于永卒谷永上疏曰帝王之德莫大於知人知人則百僚任職天工不曠故皋陶曰知人則哲能官人漢書兒寬傳初梁相褚大通五經為博士時寬為弟子及御史大夫缺徵褚大大自以為御史大夫至洛陽聞兒寬為之褚大笑及至與寬議封禪於上前大不能及退而服曰上誠知人漢書張安世傳元帝初即位詔列侯舉茂材勃舉太官獻丞陳湯湯有罪勃坐削戶二百會薨故賜諡曰繆侯後湯立功西域世以勃為知人漢書張良陳平王陵周勃傳贊曰始呂后問宰相高祖曰陳平智有餘王陵少戇可以佐之安劉氏者必勃也又問其次云過此以後非乃所及終皆如言聖矣夫後漢書鄧禹傳時任使諸將多訪於禹禹每有所舉者皆當其才光武以為知人後漢書宋弘傳子則字元矩為鄢陵令亦有名將拔同郡韋著扶風法真稱為知人後漢書第五倫傳倫在職四年遷蜀郡太守蜀地肥饒人吏富實掾史家資多至千萬皆鮮車怒馬以財貨自達怒馬謂馬之肥壯其氣憤怒也倫悉簡其豐贍者遣還之更選孤貧志行之人以處曹任於是爭賕抑絶文職修理所舉吏多至九卿二千石時以為知人後漢書仲長統傳并州刺史高幹袁紹甥也素貴有名招致四方遊士士多歸附統過幹幹善待遇訪以當時之事統謂幹曰君有雄志而無雄才好士而不能擇人所以為君深戒也幹雅自多不納其言統遂去之無幾幹以并州叛卒至於敗并冀之士皆以是異統異其有知人之鑒也三國志魏志陳群傳群封還教以為模逵穢德終必敗太祖不聽後模逵皆坐姦宄誅太祖以謝群群薦廣陵陳矯丹陽戴乾太祖皆用之後吳人叛乾忠義死難矯遂為名臣世以群為知人三國志魏志王修傳初修識高柔於弱冠異王基於幼童終皆遠至世稱其知人三國志蜀志龐統傳龐統字士元襄陽人也少時朴鈍未有識者潁川司馬徽清雅有知人鑒統弱冠往見徽徽採桑於樹上坐統在樹下共語自晝至夜徽甚異之稱統當為南州士之冠冕由是漸顯三國志吳志顧邵傳初錢唐丁諝出於役伍陽羡張秉生於庶民烏程吾粲雲陽殷禮起乎微賤邵皆拔而友之為立聲譽秉遭大喪親為制服結絰邵當之豫章發在近路值秉疾病時送者百數邵辭賓客曰張仲節有疾苦不能來別恨不見之暫還與訣諸君少時相待其留心下士惟善所在皆此類也諝至典軍中郎秉雲陽太守禮零陵太守粲太子少傅世以邵為知人晉書羊祜傳從甥王衍嘗詣祜陳事辭甚俊辨祜不然之衍拂衣而起祜顧謂賓客曰王夷甫方以盛名處大位然敗俗傷化必此人也晉書江統傳東海王越為袞州牧以統為別駕委以州事與統書曰昔王子師為豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪應此者不統舉高平郗鑒為賢良陳留阮修為直言濟北程收為方正時以為知人晉書桓寬傳有人倫識鑒拔才取士或出於無聞或得之孩抱時人方之許郭晉書王戎傳戎有人倫鑒識嘗目山濤如璞玉渾金人皆欽其寶莫知名其器王衍神姿高徹如瑤林瓊樹自然是風塵表物謂裴頠拙於用長荀勖工於用短陳道寧繌繌如束長竿族弟敦有虛名戎惡之敦每候戎輒託疾不見敦後果為逆亂新唐書劉文靜傳高祖為唐公鎮太原文靜察有大志深自結既又見秦王謂寂曰唐公子非常人也豁達神武漢高祖魏太祖之徒歟殆天啓之也新唐書王圭傳時圭與玄齡李靖溫彥博戴胄魏徵同輔政帝以圭善人物且知言因謂曰卿標鑒通晤為朕言玄齡等材且自謂孰與諸子賢對曰孜孜奉國知無不為臣不如玄齡兼資文武出將入相臣不如靖敷奏詳明出納惟允臣不如彥博濟繁治劇衆務必舉臣不如胄以諫諍為心恥君不及堯舜臣不如徵至激濁揚清疾惡好善臣於數子有一日之長帝稱善而玄齡等亦以為盡已所長謂之確論新唐書李光顏傳元和九年討蔡當此時諸鎮兵環蔡十餘屯相顧不肯前獨光顏先敗賊始裴度宣慰諸軍還為憲宗言光顏勇而義必立功新唐書裴垍傳李吉甫始執政以情謂垍曰吾落魄遠裔更十年始相天子比日人物吾懵不及知且宰相職當進賢任能君精鑒為我言之垍即崖略疏三十許人吉甫籍以薦于朝天下翕然稱得人士遇知己第二史記晏平仲傳越石父賢在縲紲中晏子出遭之塗解左驂贖之載歸弗謝入閨久之越石父請絶晏子戄然攝衣冠謝曰嬰雖不仁免子於厄何子求絶之速也石父曰不然吾聞君子詘於不知己而信於知己者方吾在縲紲中彼不知我也夫子既以感寤而贖我是知己知己而無禮固不如在縲紲之中晏子於是延入為上客後漢符融少為都官吏恥之委去後遊太學師事少府李膺膺風性高簡每見融輒絶它賓客聽其言論融幅巾奮褎談辭如雲膺每捧手歎息郭林宗始入京師時人莫識融一見嗟服因以介於李膺由是知名謝承書曰融見林宗便與之交又紹介於膺以為海之明珠未耀其光鳥之鳳皇羽儀未翔膺與林宗相見待以師友之禮遂振名天下融之致也晉石苞傳雅曠偉麗見吏部郎許允求為小縣尹謂苞曰卿是我輩人當相引在朝廷何欲小縣乎苞還歎息不意允之知己乃如此也前漢鄒陽傳明月之珠夜光之璧以暗投人於道衆莫不按劍相眄者何則無因而至前也蟠大根柢輪囷離奇而為萬乘器者以左右先為之容也故無因而至前雖出隨珠知璧柢怨結而不見德有人先游則枯木朽株樹功而不忘今夫天下布衣窮居之士身在貧羸雖蒙堯舜之術挾伊管之辨懷龍逢比干之意而素無根柢之容雖竭精神欲開忠於當世之君則人主必襲按劍相眄之跡矣是使布衣之士不得為枯木朽株之資也餘見知人管夷吾等傳箋證史記晏平仲傳越石父賢在縲紲中晏子出遭之塗解左驂贖之載歸弗謝入閨久之越石父請絶晏子戄然攝衣冠謝曰嬰雖不仁免子於厄何子求絶之速也石父曰不然吾聞君子詘於不知己而信於知己者方吾在縲紲中彼不知我也夫子既以感寤而贖我是知己知己而無禮固不如在縲紲之中晏子於是延入為上客後漢書符融傳符融字偉明陳留浚儀人也少為都官吏恥之委去後遊太學師事少府李膺膺風性高簡每見融輒絶它賓客聽其言論融幅巾奮褎談辭如雲膺每捧手歎息郭林宗始入京師時人莫識融一見嗟服因以介於李膺由是知名古人相見必因紹介介因也言因此人以相接見也謝承書曰融見林宗便與之交又紹介於膺以為海之明珠未耀其光鳥之鳳皇羽儀未翔膺與林宗相見待以師友之禮遂振名天下融之致也晉書石苞傳石苞字仲容渤海南皮人也雅曠有智局容儀偉麗見吏部郎許允求為小縣允謂苞曰卿是我輩人當相引在朝廷何欲小縣乎苞還嘆息不意允之知已乃如此也漢書鄒陽傳臣聞明月之珠夜光之璧以暗投人於道衆莫不按劍相眄者何則無因而至前也蟠木根柢輪囷離奇而為萬乘器者以左右先為之容也故無因而至前雖出隨珠和璧秪怨結而不見德有人先游則枯木朽株樹功而不忘今夫天下布衣窮居之士身在貧羸雖蒙堯舜之術挾伊管之辨懷龍逢比干之意而素無根柢之容雖竭精神欲開忠於當世之君則人主必襲按劍相眄之迹矣是使布衣之士不得為枯木朽株之資也託六尺之孤第三前漢賈誼傳上設廉恥禮義以遇其臣而臣不以節行報其上者則非人類也故化成俗定則為人臣者主耳忘身國耳忘家公耳忘私利不苟就害不苟去唯義所在云云彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存夫將為我危故吾得與之皆安顧行而忘利守節而仗義故可以託不御之權可以寄六尺之孤此厲廉恥行禮誼所致也可託權柄不須復制御也六尺之孤夫能自立者也後漢詔曰高密侯禹東平王蒼寬博有謀並可以受六尺之託謂年十五已下臨大節而不撓其以禹為太傳蒼為驃騎將軍新唐李綱傳每聽政必詔綱與房喬王圭侍坐嘗言曰託六尺之孤寄百里之命古人為難綱以為易故發言陳事毅然不可奪箋證漢書賈誼傳上設廉恥禮義以遇其臣而臣不以節行報其上者則非人類也故化成俗定則為人臣者主耳忘身國耳忘家公耳忘私利不苟就害不苟去唯義所在上之化也故父兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上守圄扞敵之臣誠死城郭封疆故曰聖人有金城者比物比志也彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存夫將為我危故吾得與之皆安顧行而忘利守節而仗義故可以託不御之權可以寄六尺之孤此厲廉恥行禮誼之所致也應劭曰言念主忘身憂國忘家如此可託權柄不須復制禦也六尺之孤未能自立者也主上何喪焉此之不為而顧彼之久行故曰可為長太息者此也後漢書明帝紀夏四月丙辰詔曰高密侯禹元功之首東平王蒼為博有謀並可以受六尺之託六尺謂年十五以下大節謂大事撓屈也音女孝反臨大節而不撓其以禹為太傅蒼為驃騎將軍新唐書李綱傳貞觀四年復為少師以足疾賜步輿聽乘至閣問以政事詣東宮太子承乾為拜每聽政必詔綱與房玄齡王圭侍坐嘗言曰託六尺之孤寄百里之命古人為難綱以為易故發言陳事毅然不可奪不待其招而往第四史記商本紀伊尹名阿衡欲干湯而無由乃為有莘氏媵臣負鼎俎以滋味說湯致於王道後漢王霸傳光武霸曰不自知量貪慕威德願充行伍光武曰夢想賢士共成功業豈有二哉遂從擊破王尋王邑新唐房喬傳補隰城尉顧中原方亂慨然有憂天下志太宗以燉煌公徇渭北杖策上謁軍門一見如舊箋證史記殷本紀伊尹名阿衡阿衡欲奸湯而無由乃為有莘氏媵臣負鼎俎以滋味說湯致于王道後漢書王霸傳漢兵起光武過潁陽霸率賓客上謁曰將軍興義兵竊不自知量貪慕威德願充行伍光武曰夢想賢士共成功業豈有二哉遂從擊破王尋王邑於昆陽還休鄉里新唐書房玄齡傳補隰城尉漢王諒反坐纍徙上郡顧中原方亂慨然有憂天下志會父疾綿十旬不解衣及喪勺飲不入口五月太宗以燉煌公徇渭北杖策上謁軍門一見如舊署渭北道行軍記室參軍
