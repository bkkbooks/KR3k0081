body:
  text: 卷第五十六宰相之器第一前漢何武傳武初為郡吏時事太守何壽壽知武有宰相器以同姓故厚之前漢蕭望之傳宣帝察望之經明持重論議有餘材任宰相欲試其政事復以為左馮翊後漢寇恂傳恂經明行修名重朝廷所得秩奉厚施朋友故人及從吏士常曰吾因士大夫以致此其可獨享之乎時人歸其長者以為有宰相器後漢龐參傳入為大鴻臚虞詡薦參有宰相器能魏崔琰傳琰從弟林少無名望雖姻族猶多輕之而琰常曰此所謂大器晚成者也終必遠至涿郡孫禮盧毓始入軍府琰又名之曰孫疏亮亢烈剛簡能斷盧清警明理百鍊不銷皆公才也後林禮毓咸至鼎輔魏崔林傳景初元年司徒司空並缺散騎侍郎孟康薦林曰切見司隸校尉崔林牧守州郡所在而治及為外司萬里肅齊誠台輔之妙器袞職之良才也蜀志評曰許靖夙有名譽既以篤厚為稱又以人物為意雖行事舉動未悉允當蔣濟以為大較廊廟器也晉王祥傳初呂虔有佩刀工相之以為必登三公可服此刀虔謂祥曰苟非其人刀或為害卿有公輔之量故以相與祥固辭彊之乃受新唐書天后謂狄仁傑曰安得一奇士用之仁傑曰陛下求文章資歷今宰李嶠蘇味道足矣豈文士齷齪不足與天下之務哉后曰然仁傑曰荊州長史張柬之雖老宰相材也新唐武元衡傳遷御史中丞嘗對延英帝目送之曰是真宰相器新唐書柳公綽傳公綽仁而勇於陵方重總沈懿皆有大臣風才堪宰相而用不至果時有不幸邪餘見社稷之臣溫大雅傳箋證漢書何武傳何武字君公蜀郡郫縣人也初武為郡吏時事太守何壽壽知武有宰相器以其同姓故厚之漢書蕭望之傳宣帝察望之經明持重論議有餘材任宰相欲詳試其政事復以為左馮翊後漢書寇恂傳恂經明行修名重朝廷所得秩奉厚施朋友故人及從吏士常曰吾因士大夫以致此其可獨享之乎時人歸其長者以為有宰相器後漢書龐參傳龐參字仲達河南緱氏人也初仕郡未知名河南尹龐奮見而奇之舉為孝廉拜左校令永建元年遷度遼將軍四年入為大鴻臚尚書僕射虞詡薦參有宰相器能三國志魏志崔琰傳琰從弟林少無名望雖姻族猶多輕之而琰常曰此所謂大器晚成者也終必遠至涿郡孫禮盧毓始入軍府琰又名之曰孫疏亮亢烈剛簡能斷盧清警明理百鍊不消皆公才也後林禮毓咸至鼎輔三國志魏志崔林傳景初元年司徒司空並缺散騎侍郎孟康薦林曰夫宰相者天下之所瞻效誠宜得秉忠履正本德杖義之士足為海內所師表者竊見司隸校尉崔林稟自然之正性體高雅之弘量論其所長以比古人忠直不回則史魚之儔清儉守約則季文之匹也牧守州郡所在而治及為外司萬里肅齊誠台輔之妙器袞職之良才也三國志蜀志許靖麋竺孫乾簡雍伊籍秦宓傳評曰許靖夙有名譽既以篤厚為稱又以人物為意雖行事舉動未悉允當蔣濟以為大較廊廟器也晉書王覽傳初呂虔有佩刀工相之以為必登三公可服此刀虔謂祥曰苟非其人刀或為害卿有公輔之量故以相與祥固辭彊之乃受祥臨薨以刀授覽曰汝後必興足稱此刀新唐書張柬之傳長安中武后謂狄仁傑曰安得一奇士用之仁傑曰陛下求文章資歷今宰相李嶠蘇味道足矣豈文士齷齪不足與成天下務哉后曰然仁傑曰荊州長史張柬之雖老宰相材也新唐書武元衡傳武元衡字伯蒼曾祖載德則天皇后之族弟德宗欽其才召拜比部員外郎歲內三遷至右司郎中以詳整任職擢為御史中丞常對延英帝目送之曰是真宰相器新唐書孔穆崔柳楊馬傳贊曰公綽仁而勇於陵方重總沈懿皆有大臣風才堪宰相而用不至果時有不幸邪將相之器第二後漢賈復傳復少好學習尚書事舞陰李生李生奇之謂門人曰賈君之容貌志氣如此而勤於學將相之器也晉王導傳年十四陳留高士張公見而奇之謂其從兄敦曰此兒容貌志氣將相之器也箋證後漢書賈復傳賈復字君文南陽冠軍人也少好學習尚書事舞陰李生李生奇之謂門人曰賈君之容貌志氣如此而勤於學將相之器也晉書王導傳王導字茂弘光祿大夫覽之孫也導少有風鑒識量清遠年十四陳留高士張公見而奇之謂其從兄敦曰此兒容貌志氣將相之器也國器第三前漢稚圭傳楊興說高曰稚圭將軍與參事議觀其所有貢之朝廷必為國器後漢鄭康成傳樂安國淵任嘏時並童幼康成稱淵為國器嘏有道德後漢史弼傳史弼遭患義夫獻寶亦何疑焉於是議者乃息刑竟歸田里稱病閉門不出數為公卿所薦議郎何休又訟弼有幹國之器宜登台相新唐衛次公傳舉進士禮部侍郎潘炎異之曰國器也高其弟餘見薦舉韓安國箋證漢書匡衡傳史高以外屬為大司馬車騎將軍領尚書事前將軍蕭望之為副望之名儒有師傅舊恩天子任之多所貢薦高充位而已與望之有隙長安令楊興說高曰匡衡材智有餘經學絕倫但以無階朝廷故隨牒在遠方將軍誠召置莫府學士歙然歸仁與參事議觀其所有貢之朝廷必為國器後漢書鄭玄傳玄質於辭訓通人頗譏其繁其門人山陽郗慮至御史大夫東宮王基清河崔琰著名於世又樂安國淵任嘏時並童幼玄稱淵為國器嘏有道德後漢書史弼傳史弼字公謙陳留考城人也陶丘洪曰昔文王牖里閎散懷金史弼遭患義夫獻寶亦何疑焉於是議者乃息刑竟歸田里稱病閉門不出數為公卿所薦議郎何休又訟弼有幹國之器宜登台相新唐書衛次公傳衛次公字從周河中河東人舉進士禮部侍郎潘炎異之曰國器也高其第器量第四前漢高祖紀高祖為人寬仁愛人意豁如也常有大度不事家人生產作業後漢郭太傳太始至南州過袁奉高不宿而去從叔度累日不去或以問太太曰奉高之器譬之泛濫雖清而易挹叔度之器汪汪若千頃之陂澄之不清撓之不濁不可量也蜀黃權傳曰先主薨問至魏群臣咸賀而權獨否文帝察權有局量欲試驚之遣左右詔權未至之間累催相屬馬使奔馳交錯於道官屬侍從莫不碎魄而權舉止顏色台若晉謝安傳遷吏部尚書簡文帝崩溫入赴山陵止新亭大陳兵衛將移晉室呼安及王坦之欲於坐害之坦之甚懼問計於安安神色不變曰晉柞存亡在此一行既見溫坦之流汗到執手板安從容就席坐定謂溫曰安聞諸侯有道守在四鄰明公何須壁後置人邪遂笑語移日坦之與安初齊名至是方知坦之之劣新唐高祖為唐公鎮太原文靜察其大志深自結既又見秦王謂寂曰唐公子非常人也豁達神武漢高帝魏太祖之徒歟新唐蕭銑傳曰景珍曰羅川令故梁裔也寬仁大度有武皇遺風餘見長者劉寬傳箋證漢書高帝紀高祖為人隆準而龍顏美須髯寬仁愛人意豁如也常有大度不事家人生產作業後漢書郭太傳初太始至南州過袁奉高不宿而去從叔度累日不去或以問太太曰奉高之器譬之泛濫雖清而易挹叔度之器汪汪若千頃之陂澄之不清撓之不濁不可量也三國志蜀志黃權傳黃權字公衡巴西閬中人也先主薨問至魏群臣咸賀而權獨否文帝察權有局量欲試驚之遣左右詔權未至之間累催相屬馬使奔馳交錯於道官屬侍從莫不碎魄而權舉止顏色自若晉書謝安傳頃之徵拜侍中遷吏部尚書中護軍簡文帝疾篤溫上疏薦安宜受顧命及帝崩溫入赴山陵止新亭大陳兵衛將移晉室呼安及王坦之欲於坐害之坦之甚懼問計於安安神色不變曰晉祚存亡在此一行既見溫坦之流汗沾衣倒執手板安從容就席坐定謂溫曰安聞諸侯有道守在四鄰明公何湏壁後置人邪溫笑曰正自不能不爾耳遂笑語移日坦之與安初齊名至是方知坦之之劣新唐書劉文靜傳劉文靜字肇仁自言系出彭城世居京兆武功大業末為晉陽令與晉陽宮監裴寂善高祖為唐公鎮太原文靜察有大志深自結既又見秦王謂寂曰唐公子非常人也豁達神武漢高祖魏太祖之徒歟新唐書蕭銑傳蕭銑後梁宣帝曾孫也銑少貧傭書事母孝煬帝以外戚擢為羅川令大業十三年岳州校尉董景珍等謀反隋且推景珍為王景珍曰吾素微雖假名號眾不厭羅川令故梁裔也寬仁大度有武皇遺風大器晚成第五後漢馬授少孤有大志諸兄奇之嘗受齊詩意不能守章句乃辭況欲就邊郡田牧東觀記曰援以況出為河南太守次兩兄為史京師見家用不足乃辭況欲就邊郡畜牧也況曰汝大才當曉成良工不示人以朴且從所好魏崔琰傳琰從弟林少無名望雖姻族猶多輕之而琰常曰此所謂大器晚成者也終必遠至箋證後漢書馬援傳援年十二而孤少有大志諸兄奇之嘗受齊詩意不能守章句東觀記曰受齊詩師事潁川蒲昌乃辭況欲就邊郡田牧東觀記曰援以況出為河南太守次兩兄為吏京師見家用不足乃辭況欲就邊郡畜牧也況曰汝大才當曉成良工不示人以朴且從所好從其所請也三國志魏志崔琰傳琰從弟林少無名望雖姻族猶多輕之而琰常曰此所謂大器晚成者也終必遠至國士之風第六前漢韓信傳信亡蕭何追之謂上曰信國士無雙為國家之奇士前漢賈誼傳上疏曰豫讓事中行之君智伯伐而滅之移事智伯及趙滅智伯豫讓釁面吞炭必報襄子五起而不中人問豫子豫子曰中行眾人畜我我故眾人事之智伯國士遇我我故國士報之此一豫讓也反君事讎行若狗彘已而抗節致忠行出乎列士人主使然也故主上遇其大臣如遇犬馬彼將犬馬自為也如遇官徒彼將官徒自為也吳孫登傳上疏曰范慎華融矯矯壯節有國士之風吳呂蒙傳評曰呂蒙勇而有謀斷識軍計譎郝普禽關羽最其妙者初雖輕果妄殺終於克己有國士之量豈徒武將而已乎吳凌統傳遷為校尉雖在軍旅親賢接士輕財重義有國士之風蜀趙雲傳評曰關羽張飛皆稱万人之敵為世虎臣羽報故曹公飛義釋嚴顏並有國士之風晉武陔傳父周陔與二弟並總角知名同郡劉公榮有知人之鑒嘗造周見其三子曰皆國士出箋證漢書韓信傳何聞信亡不及以聞自追之人有言上曰丞相何亡上怒如失左右手居一二日何來謁上且怒且喜罵何曰若亡何也何曰臣非敢亡追亡者耳上曰所追者誰也曰韓信上復罵曰諸將亡者以數十公無所追追信詐也何曰諸將易得至如信國士無雙師古曰為國家之奇士漢書賈誼傳天下初定制度疏闊誼數上疏陳政事多所欲匡建其大略曰豫讓事中行之君智伯伐而滅之移事智伯及趙滅智伯豫讓釁面吞炭必報襄子五起而不中人問豫子豫子曰中行眾人畜我我故眾人事之智伯國士遇我我故國士報之故此一豫讓也反君事讎行若狗彘已而抗節致忠行出虖列士人主使然也故主上遇其大臣如遇犬馬彼將犬馬自為也如遇官徒彼將官徒自為也三國志吳志孫登傳孫登字子高權長子也年三十三卒臨終上疏曰范慎華融矯矯壯節有國士之風三國志吳志周瑜魯肅呂蒙傳評曰呂蒙勇而有謀斷識軍計譎郝普禽關羽最其妙者初雖輕果妄殺終於克己有國士之量豈徒武將而已乎三國志吳志凌統傳凌統字公績吳郡餘杭人也權以統為承烈都尉與周瑜等拒破曹公於烏林遂攻曹仁遷為校尉雖在軍旅親賢接士輕財重義有國士之風三國志蜀志關羽張飛馬超黃忠趙雲傳評曰關羽張飛皆稱萬人之敵為世虎臣羽報效曹公飛義釋嚴顏並有國士之風晉書武陔傳武陔字元夏沛國竹邑人也父周魏衛尉陔沉敏有器量早獲時譽與二弟韶叔夏茂季夏並總角知名雖諸父兄弟及鄉閭宿望莫能覺其優劣同郡劉公榮有知人之鑒常造周周見其三子焉公榮曰皆國士也量才授職第七前漢董仲舒傳臣愚以為使諸列侯郡守二千石各擇其吏民之賢者歲貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也徧得天下之賢人則三王之盛易為而堯舜之名可及也毋以日月為功實試賢能為上量材而授官錄德而定位則廉恥殊路賢不肖異處矣前漢兩龔傳守右扶風數月上知勝非撥煩吏乃復還勝光祿大夫龔勝龔舍前漢薛宣傳宣守馮翊頻陽縣北當上郡西河為數郡湊多盜賊其令平陵薛恭本縣孝者功次稍遷未嘗治民職不辨而粟邑縣小辟在山中民謹樸易治令鉅鹿尹賞久郡用事吏為樓煩長舉茂材遷在粟宣即以令奏賞與恭換縣時令條有材不稱職得改之二人視事數月而兩縣皆治宣因移書勞免之曰昔孟公綽優於趙魏而不宜縢薛故或以德顯或以功舉君子之道焉可憮也憮同也兼也音誣師古曰論語載子夏之言謂行業不同所守各異唯聖人為體能備之魏武帝紀評曰漢未天下大亂雄豪並起而袁紹虎眎四州彊盛莫敵太宗運籌演謀鞭鞭宇內擥申商之法術該韓白之奇策官方授材各因其器矯情任筭不念舊惡終能總御皇機克成洪葉者其惟明略最優也抑可謂非常之人超世之傑矣吳陸抗傳上疏曰方今殊才雖少然或冠冕之冑少漸道教或清苦立節資能足用自可隨才授職抑出群小然後俗化可清庶政無穢也吳顧雍傳為丞相其所選用文武將吏各隨能所任心無適莫蜀楊洪傳始洪為李嚴功曹嚴未至犍為而洪已為蜀郡洪迎門下書佐何祗有才策功幹舉郡吏數年為廣漢太守時洪亦在蜀郡是以西土咸服諸葛亮能盡時人之器新唐裴垍傳為學士時引李絳崔群與同列及相又擢韋貫之裴度知制誥李夷簡御史中丞皆踵躡為輔相號名臣自它選任罔不精明人無異言士大夫不以垍年少柄用為嫌故元和之治百度脩舉稱朝旡幸人箋證漢書董仲舒傳仲舒對曰臣愚以為使諸列侯郡守二千石各擇其吏民之賢者歲貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也徧得天下之賢人則三王之盛易為而堯舜之名可及也毋以日月為功實試賢能為上量材而授官錄德而定位則廉恥殊路賢不肖異處矣漢書兩龔傳兩龔皆楚人也勝字君賓舍字君倩二人相友並著名節故世謂之楚兩龔守右扶風數月上知勝非撥煩吏乃復還勝光祿大夫漢書薛宣傳上徙宣為陳留太守盜賊禁止吏民敬其威信入守左馮翊滿歲稱職為真又頻陽縣北當上郡西河為數郡湊多盜賊其令平陵薛恭本縣孝者功次稍遷未嘗治民職不辦而粟邑縣小辟在山中民謹樸易治令鉅鹿尹賞久郡用事吏為樓煩長舉茂材遷在粟宣即以令奏賞與恭換縣師古曰時令條有材不稱職得改之二人視事數月而兩縣皆治宣因移書勞勉之曰昔孟公綽優於趙魏而不宜滕薛故或以德顯或以功舉君子之道焉可憮也蘇林曰憮同也兼也晉灼曰憮音誣師古曰論語載子夏之言謂行業不同所守各異唯聖人為能體備之蕭該曰學林云此傳直用憮字以當誣字耳憮有空之義可借與誣字通用三國志魏志武帝操評曰漢末天下大亂雄豪並起而袁紹虎眎四州彊盛莫敵太祖運籌演謀鞭撻宇內擥申商之法術該韓白之奇策官方授材各因其器矯情任算不念舊惡終能總御皇機克成洪業者惟其明略最優也抑可謂非常之人超世之傑矣三國志吳志陸遜傳附陸抗時何定弄權閹官預政抗上疏曰方今見吏殊才雖少然或冠冕之胄少漸道教或清苦自立資能足用自可隨才授職抑黜群小然後俗化可清庶政無穢也三國志吳志顧雍傳顧雍字元歎吳郡吳人也雍為人不飲酒寡言語舉動時當代孫邵為丞相平尚書事其所選用文武將吏各隨能所任心無適莫三國志蜀志楊洪傳楊洪字季休犍為武陽人也始洪為李嚴功曹嚴未至犍為而洪已為蜀郡洪迎門下書佐何祗有才策功幹舉郡吏數年為廣漢太守時洪亦尚在蜀郡是以西土咸服諸葛亮能盡時人之器用也新唐書裴垍傳垍為學士時引李絳崔群與同列及相又擢韋貫之裴度知制誥李夷簡御史中丞皆踵躡為輔相號名臣自它選任罔不精明人無異言士大夫不以垍年少柄用為嫌故元和之治百度修舉稱朝無幸人兼才第八史記冉求傳求問聞斯行諸子曰行之子路問聞斯行諸子曰有父兄在如之何其聞斯行之子華怪之敢問問同而答異孔子曰求也退故進之由也兼人故退之前漢杜延年傳延年為人安和備於諸事久典朝政上任信之魏劉劭傳時詔書博求眾賢夏侯惠薦劭曰伏見劉劭深忠篤思體周於數是以群才大小咸取所同而斟酌焉故性實之士服其平和良正清淨之人慕其玄虛退讓文學之士嘉其推步詳密法理之士明其分數精比意思之士知其沉深篤固文章之士愛其著論屬辭制度之士貴其化略較要策謀之士贊其明思通微凡此諸論皆取適己所長而舉其支流者也臣數聽其清談覽其篤論實為朝廷奇其器量以為若此人者宜輔翼機事納謀幃幄當與國道俱隆非世俗所常有也晉虞䡢傳王導常謂䡢曰孔愉有公才而無公望丁潭有公望而無公才兼之者其在卿乎晉阮裕傳極骨氣不及逸少簡秀不如真長韶潤不如仲祖思致不如商浩而兼有諸人之美新唐張行成傳太宗嘗謂群臣朕為人主兼行相將事豈不是奪公等名舜禹湯武得稷高伊呂而四海安漢高祖有蕭曹韓彭而天下寧茲事朕皆兼之行成退上疏曰有隋失道天下沸騰陛下撥亂反正拯人塗炭何周漢君臣所能比數雖然盛德含光規模宏遠左右文武誠旡將相相奚用大庭廣眾與之量校損万乘之尊與臣下爭功哉帝嘉納之唐虞世南傳大宗常稱世南有五絕一曰德行二曰忠直三曰慱學四曰文辭五曰書翰新唐吳筠傳所著文賦深詆釋氏亦為通人所譏然詞理宏通文彩煥發每製一篇人皆傳寫雖李白之放蕩杜甫之壯麗能兼之者其惟筠乎餘見政事以經對薛宣傳箋證史記仲尼弟子列傳冉求冉求字子有復問子路仁乎孔子對曰如求求問曰聞斯行諸集解包氏曰賑窮救乏之事也子曰行之子路問聞斯行諸子曰有父兄在如之何其聞斯行之子華怪之敢問問同而答異孔子曰求也退故進之由也兼人故退之漢書杜周傳附子杜延年延年為人安和備於諸事久典朝政上任信之三國志魏志劉劭傳劉劭字孔才廣平邯鄲人也時詔書博求眾賢散騎侍郎夏侯惠薦劭曰伏見常侍劉劭深忠篤思體周於數凡所錯綜源流宏遠是以群才大小咸取所同而斟酌焉故性實之士服其平和良正清靜之人慕其玄虛退讓文學之士嘉其推步詳密法理之士明其分數精比意思之士知其沉深篤固文章之士愛其著論屬辭制度之士貴其化略較要策謀之士贊其明思通微凡此諸論皆取適己所長而舉其支流者也臣數聽其清談覽其篤論漸漬歷年服膺彌久實為朝廷奇其器量以為若此人者宜輔翼機事納謀幃幄當與國道俱隆非世俗所常有也晉書虞潭傳附兄子䡢䡢字思行潭之兄子也王導常謂䡢曰孔愉有公才而無公望丁潭有公望而無公才兼之者其在卿乎五晉書阮籍傳附族弟阮裕裕字思曠以德業知名有以問王羲之羲之曰此公近不驚寵辱雖古之沉冥何以過此又云裕骨氣不及逸少簡秀不如真長韶潤不如仲祖思致不如殷浩而兼有諸人之美新唐書張行成傳張行成宇內立定州義豐人帝嘗謂群臣朕為人主兼行將相事豈不是奪公等名舜禹湯武得稷卨伊呂而四海安漢高祖有蕭曹韓彭而天下寧茲事朕皆兼之行成退上疏曰有隋失道天下沸騰陛下撥亂反正拯人塗炭何周漢君臣所能比數雖然盛德含光規模宏遠左右文武誠無將相材奚用大庭廣德與之量校損萬乘之尊與臣下爭功哉帝嘉納之舊唐書虞世南傳太宗後頗好獵世南上疏諫太宗以是益親禮之嘗稱世南有五絕一曰德行二曰忠直三曰博學四曰文辭五曰書翰舊唐書吳筠傳吳筠魯中之儒士也少通經善屬文舉進士不第性高潔不奈流俗乃入嵩山依潘師正為道士筠在翰林時特承恩顧繇是為群僧之所嫉驃騎高力士素奉佛嘗短筠于上前筠不悅乃求還山故所著文賦深詆釋氏亦為通人所譏然詞理宏通文彩煥發每製一篇人皆傳寫雖李白之放蕩杜甫之壯麗能兼之者其唯筠乎
