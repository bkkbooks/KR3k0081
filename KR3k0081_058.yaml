body:
  text: 卷第五十八君子進得其時第一前漢倪寬傳贊曰公孫弘卜式倪寬皆以鴻漸之翼困於燕爵遠迹羊豕之間非遇其時焉能致此位乎前漢王褒聖主得賢臣頌曰及其遇明君遭聖主也運籌合上意諫諍即見聽進退得關其忠任職得行其術云云前漢東方朔傳曰伊尹蒙恥辱負鼎俎以干湯太公釣於渭之陽以見文王謀無不成計無不從誠得其君也箋證漢書公孫弘卜式兒寬傳贊曰公孫弘卜式兒寬皆以鴻漸之翼困於燕爵遠迹羊豕之間非遇其時焉能致此位乎漢書王褒傳上乃徵褒既至詔褒為聖主得賢臣頌其意褒對曰及其遇明君遭聖主也運籌合上意諫諍即見聽進退得關其忠任職得行其術漢書東方朔傳伊尹蒙恥辱負鼎俎和五味以干湯太公釣於渭之陽以見文王心合意同謀無不成計無不從誠得其君也君子藏器待用第二前漢魏相傳魏相字弱翁與丙吉相善時吉為光祿大夫豫相書曰朝廷已深知弱翁治行方且大用矣願少慎事自重臧器于身相為霽威嚴居部二歲召為諫大夫復為河南太守宣帝即位召相為大司農遷御史大夫晉載記王猛傳猛謹重嚴毅氣度雄遠細事不干其慮自不參其神契晷不與交通是以浮華之士咸輕之猛攸然自得不以屑懷遂隱于華陰山懷佐世之志希龍顏之主斂翼待時候風雲而後動箋證漢書魏相傳魏相字弱翁濟陰定陶人也相與丙吉相善時吉為光祿大夫豫相書曰朝廷已深知弱翁治行方且大用矣願少慎事自重臧器于身相心善其言為霽威嚴居部二歲徵為諫大夫復為河南太守數年宣帝即位徵相入為大司農遷御史大夫卷七十四金晉書載記王猛傳王猛字景略北海劇人也猛瓌姿偉博學好兵書謹重嚴毅氣度雄遠細事不干其慮自不參其神契略不與交通是以浮華之士咸輕而笑之猛悠然自得不以屑意少遊於鄴都時人罕能識也惟徐統見而奇之召為功曹遁而不應遂隱于華陰山懷佐世之志希龍顏之主斂翼待時候風雲而後動君子無求於世第三史記莊周傳楚威王聞莊周賢使使厚幣迎之許以為相莊周笑曰千金重利卿相尊位也子獨不見郊祭之犧牛乎養食之數歲衣以文繡以入太廟當是之時雖欲為孤豚豈可得乎子亟去無污我我寧遊戲污瀆之中自快無為有國者所羈終身不仕以快吾志焉後漢仲長統傳常以為凡遊帝王者欲以立身揚名耳而名不常存人生易滅優遊偃仰可以自娛欲卜居清曠以樂其志論之曰使居有良田廣宅背山臨流溝池環布竹木周布場圃築前果園樹後舟車足以代步涉之艱使令足以息四體之役養親有兼珍之膳妻奴無苦身之勞良朋萃止則陳酒肴以娛之嘉時吉日則亨羔豚以奉之蹰躇畦苑遊戲平林濯清水追涼風釣遊鯉弋高鴻諷於舞雩之下詠歸高堂之上安身閨房思老氏之玄虛呼吸精和求至人之仿佛與達者數子論道講書俯仰二儀錯綜人物彈南風之雅操發清商之妙曲逍遙一世之上睥睨天地之間不受當時之責永保性命之期如是則可以凌霄漢出宇宙之外矣豈羡夫入帝王之門哉晉謝安傳安寓居會稽與王羲之及高陽許詢桑門支遁遊處出則漁弋山水入則言詠屬文無處世意晉阮修傳常步行以百錢挂杖頭至酒店便獨酣暢雖當世富貴而不肯顧家無擔石之儲晏如也晉阮藉傳著大人先生傳其略曰世之所謂君子惟法是修惟禮是克手執圭壁足履繩墨行欲為目前檢言欲為無窮則少稱鄉黨長聞鄰國上欲圖三公下不失九州牧獨不見群虱之處禈中逃乎深縫匿乎壞絮自以為吉宅也行不敢離縫際動不敢出禈襠自以為得繩墨也然炎丘火流焦邑滅都群虱處於褲中而不能出也君子之處域內何異夫虱之處褲中乎此亦籍之胸懷本趣也晉葛洪傳為散騎常侍領大著作洪固辭不就遂將子姪俱行至廣州止羅浮山練丹在山著述不輟其自序曰洪體之進趣之才偶好無為之業假令奮翅則能凌厲青霄騁足則能追風躡景猶欲戢徑翮於鷦鷃之群藏逸迹於跛驢之伍豈況大塊稟我以尋常之短羽造化假我以至駑之蹇足自卜者當不能者止又豈效力蒼蠅而慕沖天之舉策跛鱉而追飛免之軌肴嫫母之篤陋求媒楊之美談推沙礫之賤質索千金於和肆哉是以望絶榮華之塗而志安乎窮圯之域藜藿有八珍之甘蓬蓽有藻梲之樂也故權貴之家雖咫尺弗從也今著內篇外篇自號抱朴子晉庾峻傳祖乘蘇林曰高才而退讓慈和泛愛清淨寡欲不營常世惟修德行而已餘見好學皇甫謐傳又見知幾張翰傳箋證史記莊周傳楚威王聞莊周賢使使厚幣迎之許以為相莊周笑謂楚使者曰千金重利卿相尊位也子獨不見郊祭之犧牛乎養食之數歲衣以文繡以入太廟當是之時雖欲為孤豚豈可得乎子亟去無污我我寧遊戲污瀆之中自快無為有國者所羈終身不仕以快吾志焉後漢書仲長統傳統性俶儻敢直言不矜小節默語無常時人或謂之狂生每州郡命召輒稱疾不就常以為凡遊帝王者欲以立身揚名耳而名不常存人生易滅優遊偃仰可以自娛欲卜居清曠以樂其志論之曰使居有良田廣宅背山臨流溝池環布竹木周布場圃築前果園樹後舟車足以代步涉之難使令足以息四體之役養親有兼珍之膳妻孥無苦身之勞良朋萃止則陳酒肴以娛之嘉時吉日則烹羔豚以奉之蹰躇畦苑遊戲平林濯清水追涼風釣遊鯉弋高鴻諷於舞雩之下詠歸高堂之上安神閨房思老氏之玄虛呼吸精和求至人之仿佛與達者數子論道講書俯仰二儀錯綜人物彈南風之雅操發清商之妙曲消搖一世之上睥睨天地之間不受當時之責永保性命之期如是則可以陵霄漢出宇宙之外矣豈羡夫入帝王之門哉晉書謝安傳謝安字安石尚從弟也少有重名初辟司徒府除佐著作郎並以疾辭寓居會稽與王羲之及陰陽許詢桑門支遁遊處出則漁弋山水入則言詠屬文無處世意晉書阮籍傳附從子阮修修字宣子好易老善清言常步行以百錢挂杖頭至酒店便獨酣暢雖當世富貴而不肯顧家無儋石之儲晏如也晉書阮籍傳籍嘗於蘇門山遇孫登與商略終古及栖神道氣之術登皆不應籍因長嘯而退至半嶺聞有聲若鸞鳳之音響乎巖谷乃登之嘯也遂歸著大人先生傳其略曰世之所謂君子惟法是修惟禮是克手執圭璧足履繩墨行欲為目前檢言欲為無窮則少稱鄉黨長聞鄰國上欲圖三公下不失九州牧獨不見群蝨之處褌中逃乎深縫匿乎壞絮自以為吉宅也行不敢離縫際動不敢出褌襠自以為得繩墨也然炎丘火流焦邑滅都群蝨處於褌中而不能出也君子之處域內何異夫蝨之處褌中乎此亦籍之胸懷本趣也晉書葛洪傳葛洪字稚川丹陽句容人也干寶深相親友薦洪才堪國史選為散騎常侍領大著作洪固辭不就以年老欲煉丹以祈遐壽遂將子姪俱行至廣州刺史鄧嶽留不聽去洪乃止羅浮山煉丹嶽表補東莞太守又辭不就嶽乃以洪兄子望為記室參軍在山積年優遊間養著述不輟其自序曰洪體乏進趣之才偶好無為之業假令奮趐則能陵厲玄霄騁足則能追風躡景猶欲戢徑翮於鷦鷃之群藏逸迹於跛驢之伍豈况大塊稟我以尋常之短羽造化假我以至駑之蹇足自卜者審不能者止又豈敢力蒼蠅而慕沖天之舉策跛鱉而追飛兔之軌飾嫫母之篤陋求媒陽之美談推沙礫之賤質索千金於和肆哉夫僬僥之步而企及夸父之蹤近才所以躓礙也要離之羸而強赴扛鼎之勢秦人所以斷筋也是以望絶於榮華之塗而志安乎窮圮之域藜藿有八珍之甘蓬篳有藻梲之樂也故權貴之家雖咫尺弗從也今為此書粗舉長生之理故豫所著豫言黃白之事名曰外篇其餘駮難通釋名曰外篇大凡內外一百一十六篇雖不足藏諸名山且欲緘之金匱以示識者自號抱朴子因以名書晉書庾峻傳庾峻字山甫潁川鄢陵人也祖乘才學洽聞漢司徒辟有道徵皆不就峻少好學有才思嘗遊京師聞魏散騎常侍蘇林老疾在家往候之林嘗就乘學見峻流涕良久曰尊祖高才而性退讓慈和泛愛清靜寡欲不營當世惟修德行而已慎所習第四前漢李尋等傳贊曰幽贊神明通合天人之道者莫著乎易春秋然子貢猶云夫子之文章可得而聞也夫子之言性與天道不可得而聞已矣漢興推陰陽言災異者孝武時有董仲舒夏侯始昌昭宣則眭孟夏侯勝元成則京房翼奉劉向谷永哀平則李尋田終術此其納説時君著明者也察其所言仿佛一端假經設誼依託象類或不免乎億則屢中仲舒下吏夏侯囚執眭孟誅戮李尋流放此學者之大戒也魏三少帝紀齊王八年尚書何晏奏曰善為國者必先治其身治其身者慎其所習所習正則其身正其身正則不令而行所習不正其身不正其身不正則雖令不從是故為人君者所與遊必擇正人所觀覽必察正象放鄭聲而勿聽遠佞人而勿近然後邪心不生而正道可廣也箋證漢書眭兩夏侯京翼李傳贊曰幽贊神明通合天人之道者莫著乎易春秋然子贛猶云夫子之文章可得而聞夫子之言性與天道不可得而聞已矣漢興推陰陽言災異者孝武時有董仲舒夏侯始昌昭宣則眭孟夏侯勝元成則京房翼奉劉向谷永哀平則李尋田終術此其納説時君著明者也察其所言仿佛一端假經説誼依託象類或不免乎億則屢中仲舒下吏夏侯囚執眭孟誅戮李尋流放此學者之大戒也三國志魏志齊王芳八年春二月朔日有蝕之夏五月分河東之汾北十縣為平陽郡秋七月尚書何晏奏曰善為國者必先治其身治其身者慎其所習所習正則其身正其身正則不令而行所習不正則其身不正其身不正則雖令不從是故為人君者所與遊必擇正人所觀覽必察正象放鄭聲而弗聽遠佞人而弗近然後邪心不生而正道可弘也君子不欺於暗第五後漢侯瑾傳少孤貧性篤學常傭作為資暮還輒㸐柴以讀書㸐古然字常以禮自牧獨處一房如對嚴賓焉後漢張湛傳矜嚴好禮動止有則居處幽室必自修整雖遇妻子若嚴君焉後漢楊震傳遷東萊太守道經昌邑故所舉荊州茂材王密為昌邑令謁見至夜懷金十斤以遺震震曰故人知君君不知故人何也密曰暮夜無知者震曰天知神知我知子知何謂無知密愧而出箋證後漢書文苑列傳侯瑾傳侯瑾字子瑜敦煌人也少孤貧依宗人居性篤學恆傭作為資暮還輒㸐柴以讀書㸐古然字常以禮自牧獨處一房如對嚴賓焉後漢書張湛傳張湛字子孝扶風平陵人也矜嚴好禮動止有則居處幽室必自修整雖遇妻子若嚴君焉後漢書楊震傳震少好學受歐陽尚書於太常桓郁明經博覽無不窮究年五十乃始仕州郡大將軍鄧隲聞其賢而辟之舉茂才四遷荊州刺史東萊太守當之郡道經昌邑故所舉荊州茂才王密為昌邑令謁見至夜懷金十斤以遺震震曰故人知君君不知故人何也密曰暮夜無知者震曰天知神知我知子知何謂無知密愧而出君子愛人以德第六後漢荀彧傳董昭等欲共進操爵國公九錫備物密以訪彧彧曰曹公本興義兵以康振漢朝君子愛人以德不宜如此事遂寢晉王祥傳武帝為晉王祥與荀顗往謁顗謂祥曰相王尊重今便當拜也祥曰相國魏之宰相吾等魏之三公公王相去一階而已班例大同安有天子三司而輒拜人者損魏朝之望虧晉王之德君子愛人以禮吾不為也及入顗遂拜而祥獨長揖箋證後漢書荀彧傳十七年董昭等欲共進操爵國公九錫備物密以訪彧彧曰曹公本興義兵以匡振漢朝雖勳庸崇著猶秉忠貞之節君子愛人以德不宜如此事遂寢晉書王祥傳王祥字休徵琅邪臨沂人及武帝為晉王祥與荀顗往謁顗謂祥曰相王尊重何侯既已盡敬今便當拜也祥曰相國誠為尊貴然是魏之宰相吾等魏之三公公王相去一階而已班例大同安有天子三司而輒拜人者損魏朝之望虧晉王之德君子愛人以禮吾不為也及入顗遂拜而祥獨長揖君子不合小人第七史記孟軻傳天下方務於合從連衡以攻伐為賢而孟軻述三代唐虞之德是以所如者不合史記司馬季王傳曰騏驥不能與罷驢為駟而鳳皇不能與志雀為群而賢者亦不與不肖者同列前漢賈誼傳自諭曰鳳皇紂于干仞兮覽德輝而下之見細德之險微兮遙增擊而去之三後漢陳元傳時議之左氏傳博士范升奏以為左氏淺末不宜立元聞之乃詣闕上疏曰夫至音不合衆聽故百牙絶絃至寶不同衆好故卞和泣血仲尼聖德而不容於世況於竹帛餘文其為雷同者所排固其宜也後漢崔駰傳作達旨曰今子韞犢六經服膺道術然下不步卿相之廷上不登王公之門進不黨以讚己退不瀆於庸人獨師友道德合符曩真抱景時立與士不群蓋高樹靡陰獨木不林後漢傳燮傳上疏曰邪正之人不宜共國亦猶冰炭不可同器箋證史記孟子列傳孟軻鄒人也天下方務於合從連衡以攻伐為賢而孟軻乃述唐虞三代之德是以所如者不合退而與萬章之徒序詩書述仲尼之意作孟子七篇史記日者列傳司馬季主者楚人也司馬季主曰騏驥不能與罷驢為駟而鳳皇不與燕雀為群而賢者亦不與不肖者同列漢書賈誼傳誼為長沙王太傅誼既以適去意不自得及渡湘水為賦以弔屈原誼追傷之因以自諭其辭曰鳳皇翔于千仞兮覽德輝而下之見細德之險微兮遙增擊而去之後漢書陳元傳建武初元與桓談杜林鄭興俱為學者所宗時議欲立左氏傳博士范升奏以為左氏淺末不宜立元聞之乃詣闕上疏曰夫至音不合衆聽故伯牙絶弦至寶不同衆好故卞和泣血仲尼聖德而不容於世况於竹帛餘文其為雷同者所排固其宜也後漢書崔駰傳少遊太學與班固傅毅同時齊名常以典籍為業未遑仕進之事時人或譏其太玄靜將以後名失實駰擬揚雄解嘲作達旨以答焉其辭曰今子韞櫝六經服膺道術歷世而遊高談有日俯鉤深於重淵仰探遠乎九乾窮至賾於幽微測潛隱之無源然下不步卿相之廷上不登王公之門進不黨以讚己退不黷於庸人獨師友道德合符曩真抱景特立與士不群蓋高樹靡陰獨木不林後漢書傅燮傳傅燮少師事太尉劉寬再舉孝廉聞所舉郡將喪乃棄官行服後為護軍司馬與左中郎皇甫嵩俱討賊張角燮素疾中官既行因上疏曰夫邪正之人不宜共國亦猶冰炭不可同器小人不知君子第八前漢敘傳和氏之璧韞於荊石隋侯之珠臧於蚌蚌呼歷世莫視不知其將含景耀吐英精曠千載而流夜光也應龍潛於潢汙魚黿媟之不覩其能奮靈德合風雲超忽荒而躆皓蒼也故夫泥蟠而天飛者應龍之神也先賤而後貴者和隋之珍也時暗而久章者君子之真也師古曰時暗有時而暗也前漢賈誼傳自諭曰謂隨夷溷兮隨卞隨湯時廉士湯以天下讓而不受夷伯夷也餓于首陽之下溷濁也音胡困反謂跖蹻廉跖秦大寇也楚之大寇為莊蹻蹻音居略反莊周曰盜跖柳下惠之弟蓋寓言莫邪為鈍兮莫邪吳大夫也作寶劍因以冠名鉛刀為銛世俗謂利徹音弋占反後漢班超傳超與母至洛陽家貧常為官傭書以供養久勞苦嘗輟業投筆歎曰大丈夫無它志略猶當效傅介子張騫立功異域以取封侯安能久事筆硯間乎左右皆笑之超曰小子安知壯士或新唐魏元忠傳上封事曰知已難而所遇罕士之懷琬琰就煨塵抱棟幹困溝壑者悠悠之人直覩此士之貧賤安知其方略哉故漢拜韓信舉軍驚笑蜀用魏延群臣觖望此富貴者易為善貧賤者難為功也新唐裴潾以道自任悉心事上疾黨附不為權近所持前漢東方朔傳曰以管窺天以蠡測海蠡瓠飄也音來奚反以莛撞鐘謂稿莛也音徒丁反豈能通其條貫考其文理發其音聲哉餘見立志陳勝并王濬傳箋證漢書敘傳賓又不聞和氏之璧韞於黃石師古曰和古和字也韞亦藏也音於粉反隋侯之珠臧於蚌蛤呼歷世莫視不知其將含景耀吐英精曠千載而流夜光也應龍潛於潢汙魚黿媟之不覩其能奮靈德合風雲超忽荒而躆皓蒼也故夫泥蟠而天飛者應龍之神也先賤而後貴者和隋之珍也時暗而久章者君子之真也師古曰時暗有時而暗也漢書賈誼傳誼為長沙王太傅誼既以適去意不自得及渡湘水為賦以弔屈原誼追傷之因以自諭其辭曰謂隨夷溷兮應劭曰隨卞隨湯時廉士湯以天下讓而不受夷伯夷也不食周粟餓于首陽之下師古曰溷濁也音胡困反謂跖蹻廉李奇曰跖秦大盜也楚之大盜為莊蹻師古曰跖音之石反蹻音居略反莊周云盜跖柳下惠之弟蓋寓言也莫邪為鈍兮應劭曰莫邪吳大夫也作寶劍因以冠名鉛刀為銛晉灼曰世俗謂利為銛徹師古曰音弋占反後漢書班超傳班超為人有志不修細節然內孝謹居家常執勤苦不恥勞辱有口辨而涉獵書傳永平五年兄固被召詣校書郎超與母隨至洛陽家貧常為官傭書以供養久勞苦嘗輟業投筆歎曰大丈夫無他志略猶當效傅介子張騫立功異域以取封侯安能久事筆研間乎左右皆笑之超曰小子安知壯士志哉新唐書魏元忠傳魏元忠宋州宋城人為太學生跌蕩少檢久不調盩厔人江融曉兵術元忠從之遊盡傳所學儀鳳中吐蕃數盜邊元忠上封事洛陽宮言命將用兵之要曰志士在富貴與貧賤皆思立功名以傳于後然知已難而所遇罕士之懷琬琰就煨塵抱棟幹困溝壑者悠悠之人直覩此士之貧賤安知其方略哉故漢拜韓信舉軍驚笑蜀用魏延群臣觖望此富貴者易為善貧賤者難為功也新唐書裴潾傳裴潾本河東聞喜人潾以道自任悉心事上疾黨附不為權近所持漢書東方朔傳語曰以管窺天以蠡測海服虔曰管音管張晏曰蠡瓠瓢也師古曰管古管字蠡音來奚反瓢音平遙反以莛撞鐘文頴曰謂稿莛也師古曰音徒丁反豈能通其條貫考其文理發其音聲哉
