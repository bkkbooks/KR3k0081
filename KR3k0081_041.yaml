body:
  text: 卷第四十一忍恥立功第一史記魯仲連傳吾聞之規小節者不能成榮名惡小恥者不能立大功昔者管夷吾射桓公中其鉤篡也維公子糾不能死怯也束縳桎梏辱也鄉使管子幽囚而不出身死而不反於齊則亦名不免為辱人賤行矣故管子不恥身在縲紲之中而恥天下之不治不恥不死公子糾而糾威之不信於諸侯故兼三行之過而為五霸首名高天下而光燭鄰國曹子為魯將三戰三北而亡地五百里鄉使曹子計不反顧刎頸而死則亦名不免為敗軍禽將矣曹子棄三北之恥而退與魯君計桓公朝天下會諸侯曹子以一劍之任枝桓公之心於壇坫之上顏色不變辭氣不悖三戰之所亡一朝而復之天下震動諸侯驚駭威加吳越若此二士者非不能成小廉而行小節也為殺身亡軀絕世滅後功名不立非智也故去慼忿之怨立終身之名棄忿悁之節定累世之功是以業與三王爭流而名與天壤相弊也前漢韓信傳信為楚王召辱己少年令出跨下者以為中尉告諸將相曰此壯士也方辱我時寧不能死死之無名故忍而就此就成也成今日之功前漢季布欒布田叔傳贊曰以項羽之氣而以季布之勇顯名楚身履軍搴旗者數矣可謂壯士及至困厄奴僇苟活而不變何也彼自負以有受辱不羞欲有所用其未足也故終為漢名將賢者誠重其死夫婢妾賤人感概而自殺非能勇也其畫无俚之至耳俚聊也賴也此為其計畫無所聊賴至於自殺耳箋證史記魯仲連列傳魯連乃為書約之矢以射城中遺燕將書曰吾聞之規小節者不能成榮名惡小恥者不能立大功昔者管夷吾射桓公中其鉤篡也遺公子糾不能死怯也束縛桎梏辱也若此三行者世主不臣而鄉里不通鄉使管子幽囚而不出身死而不反於齊則亦名不免為辱人賤行矣臧獲且羞與之同名矣况世俗乎故管子不恥身在縲紲之中而恥天下之不治不恥不死公子糾而恥威之不信於諸侯故兼三行之過而為五霸首名高天下而光燭鄰國曹子為魯將三戰三北而亡地五百里鄉使曹子計不反顧議不還踵刎頸而死則亦名不免為敗軍禽將矣曹子產三北之恥而退與魯君計桓公朝天下會諸侯曹子以一劍之任枝桓公之心於壇坫之上顏色不變辭氣不悖三戰之所亡一朝而復之天下震動諸侯驚駭威加吳越若此二士者非不能成小廉而行小節也以為殺身亡軀絕世滅後功名不立非智也故去感忿之怨立終身之名棄忿悁之節定累世之功是以業與三王爭流而名與天壤相弊也漢書韓信傳項羽死高祖襲奪信軍徙信為楚王都下邳信至國召所從食漂母賜千金及下鄉亭長錢百曰公小人為德不竟師古曰言晨炊蓐食召辱己少年令出跨下者以為中尉告諸將相曰此壯士也方辱我時寧不能死死之無名故忍而就此師古曰就成也成今日之功漢書季布欒布田叔傳贊曰以項羽之氣而季布以勇顯名楚身履軍搴旗者數矣可謂壯士及至困厄奴僇苟活而不變何也師古曰僇古戮字也奴僇謂髡鉗為奴而賣之也彼自負其材受辱不羞欲有所用其未足也故終為漢名將賢者誠重其死夫婢妾賤人感概而自殺非能勇也其畫無俚之至耳張晏曰言其計畫道理無所至故自殺耳蘇林曰俚賴也言其計畫無所成賴晉灼曰揚雄方言曰俚聊也許慎曰賴也此為其計畫無所聊賴至於自殺耳師古曰晉說是也事寡而功多第二前漢王褒傳夫賢者國家之器用也所任賢則趨舍省而功施普器用利則用力少而就效眾故工人之用鈍器也勞筋苦骨終日矻矻及至巧冶鑄干將之樸清水淬其鋒越砥歛其咢水斷蛟龍陸剸犀革忽若彗汜畫塗彗帚也汜灑地也塗泥也如以帚埽汜灑之地以力畫泥中言其易如此則使離婁督繩公輸削墨雖崇臺五增延袤百丈而不溷者工用相得也庸人之御駑馬亦傷吻敝策而不進於行匈喘膚汗人極馬倦及至駕齧䣛驂乘旦良馬低頭口至䣛故曰齧䣛駕則旦至故曰乘旦音食證反王良執靶韓哀附輿世本韓哀作御韓哀韓文侯也時已有御此復言作者加其精巧也縱馳騁騖忽如景靡亂馳曰騖景靡者如光景之徙靡也過都越國蹶如列塊如經歷一塊言疾之甚追奔電逐遺風周流八極萬里一息何其遼哉人馬相得也故服絺綌之涼者不苦盛暑之鬱燠襲貂狐之煖者不憂至寒之悽愴何則有其具者易其備賢人君子亦聖王之所以易海內也是以嘔喻受之嘔喻和悅貌開寬裕之路延天下英俊也前漢杜鄴傳昔文侯寤大雁之獻而父子益親魏文侯廢太子擊立擊弟訢封擊於中山三年不往來擊以趙倉唐進大雁於文侯應對以禮文侯感寤廢訢而召立擊父子更親也陳平共壹飯之饌而將相加驩陳平用陸賈說以五百金為絳侯具食是也所接雖在楹階俎豆之間其於為國折衝厭難豈不遠哉厭一葉反前漢陳平傳人有上書告楚王韓信反高帝問諸將諸將曰亟發兵阬豎子耳高帝默然以問平平曰人之上書言信反人有聞知者乎曰未有曰信知之乎曰弗知平曰陛下兵精孰與楚上曰不能過也平曰陛下將用兵有能敵韓信者乎上曰莫及也平曰今兵不如楚精將弗及而舉兵擊之是趣之戰也竊為陛下危之古者天子巡狩會諸侯南方有雲夢陛下第出偽游雲夢會諸侯於陳陳楚之西界信聞天子以好出游其勢必郊迎謁而陛下因禽之特一力士之事耳高帝迺發使告諸侯會陳吾將南游雲夢上因隨以行行至陳楚王信果郊迎道中高帝豫具武士見信即執縳之語在信傳後漢杜詩傳拜南陽太守以誅暴立威信而政治清平善用計略省愛民役造作水排鑄為農器用力少見功多百姓便之新唐薛仁貴傳時九姓眾十餘萬令驍騎數十來挑戰仁貴發三矢輒殺三人於是虜氣懾皆降仁貴慮為後患悉坑之轉討磧北餘眾擒偽葉護兄弟三人而還軍中歌曰將軍三箭定天山壯士長歌入漢關九姓遂衰箋證漢書王褒傳上迺徵褒既至詔褒為聖主得賢臣頌其意褒對曰夫賢者國家之器用也所任賢則趨舍省而功施普師古曰趨讀曰趣普博也器用利則用力少而就效眾故工人之用鈍器也勞筋苦骨終日矻矻及至巧冶鑄干將之樸清水焠其鋒越砥斂其咢水斷蛟龍陸剸犀革忽若彗汜畫塗師古曰彗帚也汜汜灑地也塗泥也如以帚埽汜灑之地以刀畫泥中言其易宋祁曰別本注文只一汜字如此則使離婁督繩公輸削墨雖崇臺五增延袤百丈而不溷者工用相得也庸人之御駑馬亦傷吻敝策而不進於行匈喘膚汗人極馬倦及至駕齧䣛驂乘旦孟康曰良馬低頭口至䣛故曰齧䣛張晏曰駕則旦至故曰乘旦師古曰乘音食證反王良執靶韓哀附輿應劭曰世本韓哀作御師古曰宋衷云韓哀韓文侯也時已有御此復言作者加其精巧也然則善御者耳非始作也縱馳騁騖忽如景靡師古曰亂馳曰騖景靡者如光景之徙靡也過都越國蹶如歷塊師古曰如經歷一塊言其速疾之甚塊音口內反追奔電逐遺風周流八極萬里一息何其遼哉人馬相得也故服絺綌之涼者不苦盛暑之鬱燠襲貂狐之煗者不憂至寒之悽愴何則有其具者易其備賢人君子亦聖王之所以易海內也是以嘔喻受之應劭曰嘔喻和悅貌開寬裕之路以延天下英俊也漢書杜鄴傳杜鄴字子夏本魏郡繁陽人也鄴見音前與平阿有隙即說音曰昔文侯寤大鴈之獻而父子益親師古曰魏文侯廢太子擊立擊弟訢封擊於中山三年不往來擊以趙倉唐進大鴈於文侯應對以禮文侯感寤廢訢而召立擊父子更親也陳平共壹飯之籑而將相加驩師古曰陳平用陸賈說以五百金為絳侯具食是也共讀曰供宋祁曰籑景本作饌舊本作籑聲類曰饌字或作籑所接雖在楹階俎豆之間其於為國折衝厭難豈不遠哉師古曰厭音一葉反漢書陳平傳漢六年人有上書告楚王韓信反高帝問諸將諸將曰亟發兵阬豎子耳高帝默然以問平平固辭謝平曰人之上書言信反人有聞知者乎曰未有曰信知之乎曰弗知平曰陛下兵精孰與楚上曰不能過也平曰陛下將用兵有能敵韓信者乎上曰莫及也平曰今兵不如楚精將弗及而舉兵擊之是趣之戰也竊為陛下危之上曰為之奈何平曰古者天子巡狩會諸侯南方有雲夢陛下第出偽游雲夢會諸侯於陳陳楚之西界信聞天子以好出游其勢必郊迎謁而陛下因禽之特一力士之事耳高帝以為然迺發使告諸侯會陳吾將南游雲夢上因隨以行行至陳楚王信果郊迎道中高帝豫具武士見信即執縛之語在信傳後漢書杜詩傳七年遷南陽太守性節儉而政治清平以誅暴立威善於計略省愛民役造作水排鑄為農器排音蒲拜反冶鑄者為排以吹炭令激水以鼓之也排當作古字通用也用力少見功多百姓便之新唐書薛仁貴傳薛仁貴絳州龍門人少貧賤以田為業時九姓眾十餘萬令驍騎數十來挑戰仁貴發三矢輒殺三人於是虜氣懾皆降仁貴慮為後患悉坑之轉討磧北餘眾禽偽葉護兄弟三人以歸軍中歌曰將軍三箭定天山壯士長歌入漢關九姓遂衰勞而無功第三後漢臧宮傳宮乃與馬武上書欲征匈奴詔報曰黃石公記曰柔能制剛弱能制強柔者德也剛者賊也弱者人之助也強者怨之歸也故曰有德之君以所樂樂人無德之君以所樂樂身樂人者其樂長樂身者不久而亡舍近而謀遠者勞而無功舍遠謀近者逸而有終逸政多忠臣勞政多亂人故曰務廣地者荒務廣德者強有其有者安貪人有者殘殘滅之政多成必敗今國無善政災變不息百姓驚惶人不自保而復欲遠事邊外乎孔子曰吾恐季孫之憂不在顓臾且北狄尚強而屯田警備傳聞之事常多失實誠能舉天下之半以滅大寇豈非至願苟非其時不如息人自是諸將莫敢復言兵事者後漢王梁傳為河南尹梁穿渠引榖水注洛陽城下東寫鞏川及渠成而水不流七年有司劾奏之梁慚懼上書乞骸骨餘見贖罪劉向傳箋證後漢書臧呂傳臧呂字君翁潁川郟人也二十七年宮乃與楊虛侯馬武上書詔報曰黃石公記曰柔能制剛弱能制彊即張良於下邳圯所見老父出一編書者柔者德也剛者賊也弱者仁之助也彊者怨之歸也故曰有德之君以所樂樂人無德之君以所樂樂身樂人者其樂長樂身者不久而亡舍近謀遠者勞而無功舍遠謀近者逸而有終逸政多忠臣勞政多亂人故曰務廣地者荒務廣德者彊有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復欲遠事邊外乎孔子曰吾恐季孫之憂不在顓臾且北狄尚彊而屯田警備傳聞之事恒多失實誠能舉天下之半以滅大寇豈非至願苟非其時不如息人自是諸將莫敢復言兵事者後漢書王梁傳王梁字君嚴漁陽安陽人也歐陽歙為河南尹梁穿渠引穀水注洛陽城下東寫鞏川及渠成而水不流七年有司劾奏之梁慙懼上書乞骸骨以功覆過第四史記伯夷傳管仲富擬於公室有三歸反玷齊人不以為侈前漢陳湯傳甘延壽與湯共誅郅支單于囚隸收繫按驗劉向上疏曰郅支單于囚殺使者吏士以百數事暴揚外國西域謢都延壽副校尉湯承聖指出百死入絕域遂下康居屠五重城搴歙侯之旗斬郅支之首而延壽湯不煩漢士不費斗糧比於貳師功德百之貳師李廣利言威武勤勞則大於方叔吉甫列功覆過則優於齊桓貳師近事之功則高於安遠長羅安遠侯鄭吉長羅侯常惠而大功未著小惡數布臣竊痛之宜除過勿治尊寵爵位以勸有功吳朱據傳拜五官郎中補侍御史是時選曹尚書暨豔疾貪汙在位欲沙汰之據以為天下未定宜以功覆過棄瑕取用舉清厲濁足以沮勸若一時貶黜懼有後咎豔不聽卒敗吳呂範傳拜揚州牧其居處服飾奢靡然勤事奉法故權悅其忠不怪其侈餘見使功不如使過竇憲傳箋證史記管仲列傳管仲富擬於公室有三歸反坫正義三歸三姓女也婦人謂嫁曰歸齊人不以為侈漢書陳湯傳湯素貪所鹵獲財物入塞多不法司隸校尉移書道上繫吏士按驗之湯上疏言臣與吏士共誅郅支單于幸得禽滅萬里振旅宜有使者迎勞道路今司隸反逆收繫按驗是為郅支報讎也上立出吏士令縣道具酒食以過軍既至論功石顯匡衡以為延壽湯擅興師矯制幸得不誅如復加爵土則後奉使者爭欲乘危徼幸生事於蠻夷為國招難漸不可開元帝內嘉延壽湯功而重違衡顯之議議久不決故宗正劉向上疏曰郅支單于囚殺使者吏士以百數事暴揚外國傷威毀重群臣皆閔焉陛下赫然欲誅之意未嘗有忘西域都護延壽副校尉湯承聖指倚神靈總百蠻之君㩜城郭之兵出百死入絕域遂蹈康居屠五重城搴歙侯之旗斬郅支之首而延壽湯不煩漢士不費斗糧比於貳師功德百之故言威武勤勞則大於方叔吉甫列功覆過則優於齊桓貳師近事之功則高於安遠長羅師古曰安遠侯鄭吉長羅侯常惠也而大功未著小惡數布臣竊痛之宜以時解縣通籍除過勿治尊寵爵位以勸有功三國志吳志朱據傳朱據字子範吳郡吳人也黃武初徵拜五官郎中補侍御史是時選曹尚書暨豔疾貪汙在位欲沙汰之據以為天下未定宜以功覆過棄瑕取用舉清厲濁足以沮勸若一時貶黜懼有後咎豔不聽卒敗三國志吳志呂範傳呂範字子衡汝南西陽人也拜揚州牧其居處服飾於時奢靡然勤事奉法故權悅其忠不怪其侈使功不如使過第五後漢索盧放傳更始時使者督行郡國太守有事當就斬刑放前言曰今天下所苦毒王氏歸心皇漢者實以聖政寬仁也而傳車所過未聞恩澤太守受誅但恐天下惶懼各生疑變夫使功者不如使過願以身代太守之命遂前就斬使者義而赦之若秦穆赦孟明而用之霸西戎後漢竇憲傳齊殤王子都鄉侯暢來弔國憂暢素行邪僻與鄧疊親屬數往來京師因疊母元自通長樂宮得幸太后被詔召詣上東門憲懼見幸分宮省之權遣客剌殺暢而歸罪於暢弟利侯剛乃使考剛等後事發覺大后怒閉憲於內宮憲懼誅自求擊匈奴以贖死會南單于請兵北伐乃拜憲車騎將軍金印紫綬官屬依司空將精騎萬餘與北單干戰于稽落山大破之虜眾降者前後二十餘万人憲登燕然山刻石勒功紀漢威德拜憲大將軍封武陽侯前漢朱博傳博為左馮翊長陵大姓尚方禁姓尚方少時嘗盜人妻見斫創著其頰博召見問禁是何等創也禁叩頭服狀博笑曰大丈夫固時有是言情欲之事人所不免馮翊欲洒卿恥洒先禮反抆拭羽禁抆拭磨也能自效不禁且喜且懼對曰必死博因親信之以為耳目禁晨夜發起部中盜賊及它伏姦有功效前漢張敞傳與光祿勳楊惲厚善後惲坐大逆誅公卿奏惲黨友不宜處位等比皆免比音必寐反例也而敞奏獨寢不下天子惜敞故留所奏事不出敞使賊捕掾絮舜有所案驗舜以敞劾奏當免不肯為敞竟事私歸其家人或諫舜舜曰吾為是公盡力多矣今五日京兆耳安能復案事敞聞舜語即捕吏收舜繫獄乃棄舜市會立春行冤獄使者奏敞賊殺不辜夫子薄其罪即敞前坐楊惲不宜處位奏免為庶人敞免奏既下詣闕上印綬便出闕下亡命而冀州部中有大賊天子思敞功效使使者即家召敞敞身被重劾及使者至妻子家室皆泣惶懼而敞笑曰吾身亡命今使者來此天子欲用我也即裝隨使者天子引見敞拜為冀州剌史前漢王嘉傳哀帝初立上疏曰昔魏尚坐事繫文帝感馮唐之言遣使節赦其辠拜為雲中太守匈奴忌之武帝擢韓安國於徒中拜為梁內史骨肉以安言梁孝王得免罪張敞為京兆尹有罪當免黠吏知而犯敞敞收殺之亡命數十日宣帝召敞拜為冀州剌史卒獲其用前世非私此三人貪其材器有益於公家也魏高柔傳柔為管長縣中素聞其名姦吏數人皆自引去柔教曰昔邴吉臨政吏嘗有非猶尚容之況此諸吏於吾未有失乎其召復之咸還皆自礪咸為佳吏新唐李靖傳蕭銑據江陵詔靖安輯從數童騎道金州會蠻賊鄧世洛兵數万屯山谷間廬江王瑗討不勝靖為瑗謀擊卻之進至峽州阻銑兵不得前帝謂逗留詔都督許紹斬靖紹為請而免開州蠻冉肇則寇夔州趙郡王孝恭戰未利靖率兵八百破其屯要險設伏斬肇則俘獲五千帝謂左右曰朕聞使功不如使過靖果然因手敕勞曰既往不咎向事吾久已忘之新唐鄭從讜傳邊多虞河東節度使康傳圭遣大將伊釗張彥球蘇弘軫引兵拒之戰數負傳圭斬軫以徇彥球所部反攻傳圭殺之劫府庫為亂朝廷以為憂乃拜從讜河東節度使從讜既視事姦無庾情乃推捕反賊誅其首惡以彥球本善意且才可任釋不問而付以兵曠無餘猜故得其死力渠凶宿狡不敢發發又輒得箋證後漢書索盧放傳索盧放字君陽索盧姓也東郡人也以尚書教授千餘人初署郡門下掾更始時使者督行郡國太守有事當就斬刑放前言曰今天下所以苦毒王氏歸心皇漢者實以聖政寬仁故也而傳車所過未聞恩澤太守受誅誠不敢言但恐天下惶懼各生疑變夫使功者不如使過若秦穆赦孟明而用之霸西戎願以身代太守之命遂前就斬使者義而赦之後漢書竇融傳附曾孫竇憲齊殤王子都鄉侯暢來弔國憂章帝崩也暢素行邪僻與步兵校尉鄧疊親屬數往來京師因疊母元自通長樂宮得幸太后被詔召詣上東門憲懼見幸分宮省之權遣客刺殺暢於屯衛之中而歸罪於暢弟利侯剛乃使侍御史與青州刺史雜考剛等後事發覺太后怒閉憲於內宮憲懼誅自求擊匈奴以贖死會南單于請兵北伐乃拜憲車騎將屯兵宿衛之所軍金印紫綬官屬依司空明年將萬餘騎出滿夷谷度遼將軍鄧鴻及緣邊義從羌胡八千騎與左賢王安國萬騎出陰陽塞皆會涿邪山憲分遣副校尉閻盤司馬耿夔耿譚將左谷蠡王師子右呼衍王須訾等精騎萬餘與北單于戰於稽落山大破之虜眾崩潰眾降者前後二十餘萬人憲秉遂登燕然山去塞三千餘里刻石勒功紀漢威德拜憲大將軍封武陽侯漢書朱博傳以高第入守左馮翊長陵大姓尚方禁師古曰姓尚方名禁少時嘗盜人妻見斫創著其頰府功曹受賂白除禁調守尉博聞知以它事召見視其面果有瘢博辟左右問禁是何等創也禁自知情得師古曰言其得被斫之情狀叩頭服狀博笑曰大丈夫固時有是師古曰言情欲之事人所不免馮翊欲洒卿恥抆拭用禁師古曰抆拭摩也洒音先禮反抆音文粉反能自效不禁且喜且懼對曰必死師古曰言盡死力也博因敕禁毋得泄語有便宜輒記言師古曰不令泄抆拭之言而外有便宜之事為書記以言於博因親信之以為耳目禁晨夜發起部中盜賊及它伏姦有功效漢書張敞傳與光祿勳楊惲厚善後惲坐大逆誅公卿奏惲黨友不宜處位等比皆免師古曰比例也音必寐反而敞奏獨奏不下師古曰天子惜敞故留所奏事不出敞使賊捕掾絮舜有所案驗舜以敞劾奏當免不肯為敞竟事私歸其家人或諫舜舜曰吾為是公盡力多矣今五日京兆耳安能復案事敞聞舜語即部吏收舜繫獄乃棄舜市會立春行冤獄使者出舜家載尸并編敞教自言使者使者奏敞賊殺不辜天子薄其罪欲令敞得自便利即先下敞前坐楊惲不宜處位奏免為庶人敞免奏既下詣闕上印綬便從闕下亡命數月京師吏民解弛枹鼓數起而冀州部中有大賊天子思敞功效使使者即家在所召敞敞身被重劾及使者至妻子家室皆泣惶懼而敞獨笑曰吾身亡命為民郡吏當就捕今使者來此天子欲用我也即裝隨使者詣公車天子引見敞拜為冀州刺史漢書王嘉傳哀帝初立欲匡成帝之政多所變動嘉上疏曰昔魏尚坐事繫文帝感馮唐之言遣使持節赦其辠拜為雲中太守匈奴忌之武帝擢韓安國於徒中拜為梁內史骨肉以安師古曰言梁孝王得免罪也張敞為京兆尹有罪當免黠吏知而犯敞敞收殺之其家自冤使者覆獄劾敞賊殺人上逮捕不下會免亡命數十日宣帝徵敞拜為冀州刺史卒獲其用前世非私此三人貪其材器有益於公家也三國志魏志高柔傳太祖平袁氏以柔為管長縣中素聞其名姦吏數人皆自引去柔教曰昔邴吉臨政吏嘗有非猶尚容之况此諸吏於吾未有失乎其召復之咸還皆自勵咸為佳吏新唐書李靖傳蕭銑據江陵詔靖安輯從數輕騎道金州會蠻賊鄧世洛兵數萬屯山谷間廬江王瑗討不勝靖為瑗謀擊郤之進至荊州阻銑兵不得前帝謂逗遛詔都督許紹斬靖紹為請而免開州蠻冉肇則寇夔州趙郡王孝恭戰未利靖率兵八百破其屯要險設伏斬肇則俘禽五千帝謂左右曰使功不如使過靖果然因手敕勞曰既往不咎向事吾久已忘之新唐書鄭從讜傳從讜字正求及進士第僖宗立召為刑部尚書沙陀都督李國昌間邊多虞河東節度使康傳圭遣大將伊釗張彥球蘇弘軫引兵拒之戰數負傳圭斬軫以徇彥球所部反攻傳圭殺之劫府庫為亂朝廷以為憂帝欲大臣臨制乃拜從讜檢校司徒以宰相秩復為河東節度兼行營招討使從讜既視事姦無廋情乃推捕反賊誅其首惡以彥球本善意且才可任釋不問而付以兵曠無餘猜故得其死力渠凶宿狡不敢發發又輒得釋囚拜職第六史記秦本紀晉獻公滅虞虢虜虞君與其大夫百里傒以為秦繆公夫人媵於秦百里傒亡秦楚鄙人執之繆公聞其賢以五羖皮贖之釋其囚與語國事謝曰臣亡國之臣何足問繆公曰虞君不用子故亡非子罪也固問語三日大悅授之國政前漢王嘉傳昔魏尚坐事繫文帝感馮唐之言遣使赦其罪拜雲中太守匈奴忌之武帝擢韓安國於徒中拜為梁內史骨肉以安後漢崔烈拜太尉子鈞少交馬英豪有名稱為西河太守獻帝初鈞與袁紹俱起兵山東董卓以是收烈付郿獄錮之鋃鐺鐵鎖卓既誅拜烈城門校尉晉向雄傳太守劉毅嘗以非罪笞雄及吳奮代毅為太守又以少譴繫雄於獄司隸鍾會於獄中辟雄為都官從事新唐屈突通傳通仕隋聞京師平家盡沒乃留顯和保潼關率兵將如洛既行而顯和來降文靜遣竇琮段志玄精騎追及於稠乘通結陣拒之顯和呼其眾曰京師陷諸君皆家關西何為復東眾皆捨兵通知不免遂下馬東南向再拜號泣曰臣力屈兵敗不負陛下遂被禽送長安帝勞曰何相見晚邪泣曰通不能盡人臣之節故至此為本朝羞帝曰忠臣也釋之授兵部尚書箋證史記秦本紀五年晉獻公滅虞虢虜虞君與其大夫百里傒以璧馬賂於虞故也既虜百里傒以為秦繆公夫人媵於秦百里傒亡秦走宛楚鄙人執之繆公聞百里傒賢欲重贖之恐楚人不與乃使人謂楚曰吾媵臣百里傒在焉請以五羖羊皮贖之楚人遂許與之當是時百里傒年已七十餘繆公釋其囚與語國事謝曰臣亡國之臣何足問繆公曰虞君不用子故亡非子罪也固問語三日繆公大說授之國政號曰五羖大夫漢書王嘉傳哀帝初立欲匡成帝之政多所變動嘉上疏曰昔魏尚坐事繫文帝感馮唐之言遣使持節赦其辠拜為雲中太守匈奴忌之武帝擢韓安國於徒中拜為梁內史骨肉以安後漢書崔駰傳附從孫崔烈寔從兄烈有重名於北州歷位郡守九卿烈後拜太尉鈞少交結英豪有名稱為西河大守獻帝初鈞與袁紹俱起兵山東董卓以是收烈付郿獄錮之鋃鐺鐵鎖卓既誅拜烈城門校尉晉書向雄傳雄初仕郡為主簿事太守王經及經之死也雄哭之盡哀市人咸為之悲後太守劉毅嘗以非罪笞雄及吳奮代毅為太守又以少譴繫雄於獄司隸鍾會於獄中辟雄為都官從事新唐書屈突通傳屈突通其先蓋昌黎徒何人後家長安仕隋為虎賁郎將聞京師平家盡沒乃留顯和保潼關率兵將如洛既行而顯和來降文靜遣竇琮段志玄精騎追及於稠桑通結陣拒之琮縱其子產往諭使降通大呼曰昔與汝父子今則讎也命左右射之顯和呼其眾曰京師陷諸君皆家關西何為復東眾皆捨兵通知不免遂下馬東南向再拜號哭曰臣力屈兵敗不負陛下遂被禽送長安帝勞曰何相見晚邪泣曰通不能盡人臣之節故至此為本朝羞帝曰忠臣也釋之授兵部尚書
