body:
  text: 卷第五十四通經第一杜佑云佑少嘗讀書而性且蒙固不達術數之藝不姓章句之學所慕通典實採群言徵諸人事將施有政前漢韋賢傳自孟至賢賢為人質朴少欲篤志於學兼通禮尚書以詩教授號稱鄒魯大儒前漢夏侯勝傳每講授常謂諸生曰士病不明經術經術苟明其取青紫如俯拾地芥耳草芥橫在地上者俯而拾之言其易而必得也青紫卿大夫之服也學經不明不如歸耕前漢儒林傳嚴彭祖遷太子太傅廉直不事權貴或說曰天時不勝人事君以不修小禮曲意亡貴人左右之助經誼雖高不至宰相願少自勉強彭祖曰凡通經術固當修行先王之道何可委曲從俗苟求富貴乎後漢逸民井丹傳字太春少受業太學通五經善談論京師為之語曰五經紛綸井太春後漢儒林戴憑傳正旦朝賀百僚畢會帝令群臣能說經者更相難詰義有不通輒奪其席以益通者憑遂重坐五十餘席故京師為之語曰解經不窮戴侍中新唐鄭餘慶傳餘慶後生內謁必引見諄諄教以經義務成就儒學新唐啖助傳贊曰啖助在唐名治春秋托訕三家不本所承自用名學憑私臆決尊之曰孔子意也趙陸從而倡之遂顯于時嗚呼孔子沒乃數千年助所推著果其意乎其未可必也以未可必而必之則固持一己之固而倡茲世則誣誣與固君子所不取助果謂可乎徒令後生穿鑿詭辨詬前人捨成說而自為紛紛助所階也餘見勸學左雄傳箋證通典食貨序佑少嘗讀書而性且蒙固不達術數之藝不好章句之學所纂通典實采群言徵諸人事將施有政漢書韋賢傳韋賢字長孺魯國鄒人也其先韋孟家本彭城自孟至賢五世賢為人質朴少欲篤志於學兼通禮尚書以詩教授號稱鄒魯大儒漢書夏侯勝傳始勝每講授常謂諸生曰士病不明經術經術苟明其取青紫如俯拾地芥耳師古曰地芥謂草芥之橫在地上者俯而拾之言其易而必得也青紫卿大夫之服也俯即俯字也學經不明不如歸耕漢書儒林傳嚴彭祖字公子東海下邳人也以高第入為左馮翊遷太子太傅廉直不事權貴或說曰天時不勝人事君以不修小禮曲意亡貴人左右之助經誼雖高不至宰相願少自勉彊彭祖曰凡通經術固當修行先王之道何可委曲從俗苟求富貴乎後漢書逸民列傳井丹傳井丹字大春扶風郿人也少受業太學通五經善談論故京師為之語曰五經紛綸井大春紛綸猶浩博也後漢書儒林列傳戴憑傳拜憑虎賁中郎將以侍中兼領之正旦朝賀百僚畢會帝令群臣能說經者更相難詰義有不通輒奪其席以益通者憑遂重坐五十餘席故京師為之語曰解經不窮戴侍中新唐書鄭餘慶傳餘慶少砥礪行已完潔後生內謁必引見諄諄教以經義務成就儒學新唐書儒學列傳啖助傳贊曰啖助在唐名治春秋托訕三家不本所承自用名學憑私臆決尊之曰孔子意也趙陸從而唱之遂顯于時嗚呼孔子沒乃數千年助所推著果其意乎其未可必也以未可必而必之則固持一己之固而倡茲世則誣誣與固君子所不取助果謂可乎徒令後生穿鑿詭辨詬前人捨成說而自為紛紛助所階已不通經第二史記梁孝王世家太后曰不通經術知古今之大禮不可為三公及左右近臣少見之人如從管中窺天也前漢儒林傳孔臧等議其不事學若下材及不能通一藝輒罷之餘見通經餘見不崇儒朱慱傳又見通經夏侯勝傳并戴憑傳又見辭賦枚皋傳箋證史記梁孝王世家太后聞之立起坐餐氣平復故曰不通經術知古今之大禮不可以為三公及左右近臣少見之人如從管中窺天也漢書儒林傳其不事學若下材及不能通一藝輒罷之講論第三前漢劉向傳會初立榖梁春秋召更生受榖梁講論五經於石渠前漢朱雲傳五鹿充宗貴幸為梁丘易自宣帝時善梁丘氏說元帝好之欲考其異同令充宗與諸易家論充宗乘貴辨口諸儒莫能與抗皆稱疾不敢會有薦雲者召入攝𡺌登堂抗首而請音動左右既論難連拄五鹿君故諸儒為之語曰五鹿嶽嶽朱雲折其角嶽嶽長角之貌後漢楊終傳終上言宣帝博召群儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壞大體宜如石渠故事永為後世則於是詔諸儒於白虎觀論考同異焉後漢班固傳天子會諸儒講論五經作白虎通德論令固撰集其事章帝時詔諸王諸儒會白虎觀講議五經同異新唐藝文傳序太宗身橐鞬風纚露沐然鋭情經術即王府開文學館召名儒十八人為學士與議天下事既即位殿左置弘文館悉引內學士番宿更休聽朝之間則與討古今道前王所以成敗或日以夜艾木嘗少怠正觀六年詔罷周公祠更以孔子為先聖顏氏為先師盡召天下惇師老德以為學官數臨幸觀釋菜命祭酒博士講論經義賜以束帛箋證漢書楚元王傳附劉向會初立榖梁春秋徵更生受穀梁講論五經於石渠師古曰三輔舊事云石渠閣在未央大殿北以臧呂書漢書朱雲傳是時少府五鹿充宗貴幸為梁丘易自宣帝時善梁丘氏說元帝好之欲考其異同令充宗與諸易家論充宗乘貴辨口諸儒莫能與抗皆稱疾不敢會有薦雲者召入攝𡺌登堂抗首而請音動左右既論難連拄五鹿君故諸儒為之語曰五鹿嶽嶽朱雲折其角師古曰嶽嶽長角之貌後漢書楊終傳終又言宣帝博徵群儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壞大體宜如石渠故事永為後世則於是詔諸儒於白虎觀論考同異焉後漢書班固傳下天子會諸儒講論五經作白虎通德論令固撰集其事章帝建初四年詔諸王諸儒會白虎觀講議五經同異新唐書儒學傳上太宗身櫜鞬風纚露沭然鋭情經術即王府開文學館召名儒十八人為學士與議天下事既即位殿左置弘文館悉引內學士番宿更休聽朝之間則與討古今道前王所以成敗或日昃夜艾未嘗少怠貞觀六年詔罷周公祠更以孔子為先聖顏氏為先師盡召天下惇師老德以為學官數臨幸觀釋菜命祭酒博士講論經義賜以束帛論文第四蜀志秦宓傳夫虎生而文炳鳳生而五色豈以五采自飾畫哉天性自然也蓋河洛由文興六經由文起君子懿文德采藻其何傷晉張輔傳論班固司馬遷云遷之著述辭約而事舉敘三千年事惟五十萬言班固敘二百年事乃八十萬言煩省不同不如遷一也良史述事善足以獎勸惡足以監誡人道之常中流小事亦無取焉而班皆書之不如二也毀貶朝錯傷忠臣之道不如三也遷既造創固又因循難易益不同矣又遷為蘇秦張儀范雎蔡澤作傳逞辭流離亦足以明其大才故述辨士則辭藻華靡敘實録則隱核名撿此所以遷稱良史也晉夏侯湛傳湛作周詩成以示潘嶽嶽曰此文非徒溫雅乃別見孝悌之性新唐許景先傳張說曰許舍人之文雖之峻峰激流嶄絶之勢然屬詞豐美得中和之氣新唐楊炯傳勃與楊炯盧照鄰駱賓王皆以文章齊名天下稱王楊盧駱四傑炯嘗曰吾愧在盧前恥居王後議者謂然新唐韓愈傳贊曰唐興乘五代剖分王政不綱文弊質窮䵷俚混并天下已定治荒剔蠹討究儒術以興典憲薰以涵浸殆百餘年其後文章稍稍可述至貞元元和閒愈遂以六經之文為諸儒倡障隄未流反刓以撲划僞以真然愈之才自視司馬遷楊雄至班固以下不論也當其所得粹然一出於正刊落陳言橫騖別驅汪洋大肆要之無抵捂聖人者其道蓋自比孟軻以荀況楊雄為未淳寧不信然至進諫陳謀排難恤孤矯拂偷末皇皇於仁義可謂篤道君子矣自晉訖隋老佛皓行聖道不斷如帶諸儒倚天下正議助為怪神愈獨喟然引聖爭四海之惑雖蒙訕笑跲而復奮始若未之信卒大顯於時昔孟軻拒楊墨去孔子才二百年愈排二家乃去千餘歲撥衰反正功與齊而力倍之所以過況雄為不少矣自愈沒其言大行學者仰之如泰山北斗云餘見辭賦左思傳箋證三國志蜀志秦宓傳秦宓字子産廣漢綿竹人也或謂宓曰足下欲自比於巢許四皓何故揚文藻見瓌頴乎宓答曰夫虎生而文炳鳳生而五色豈以五采自飾畫哉天性自然也蓋河洛由文興六經由文起君子懿文德采藻其何傷晉書張輔傳張輔字世偉南陽西鄂人漢河間相衡之後也又論班固司馬遷云遷之著述辭約而事舉敘三千年事唯五十萬言班固敘三百年事乃八十萬言煩省不同不如遷一也良史述事善足以獎勸惡足以監誡人道之常中流小事亦無取焉而班皆書之不如二也毀貶朝錯傷忠臣之道不如三也遷既造創固又因循難易益不同矣又遷為蘇秦張儀范雎蔡澤作傳逞辭流離亦足以明其大才故述辨士則辭藻華靡敘實録則隱核名檢此所以遷稱良史也晉書夏侯湛傳初湛作周詩成以示潘嶽嶽曰此文非徒溫雅乃別見孝弟之性新唐書許景先傳許景先常州義興人張說曰許舍人之文雖乏峻峰激流然詞旨豐美得中和之氣又舊唐書許景先傳張說嘗稱曰許舍人之文雖無峻峰激流嶄絶之勢然屬詞豐美得中和之氣亦一時之秀也新唐書文藝王助傳勃與楊炯盧照鄰駱賓王皆以文章齊名天下稱王楊盧駱四傑炯嘗曰吾愧在盧前恥居王後議者謂然新唐書韓愈傳贊曰唐興承五代剖分王政不綱文弊質窮䵷俚混并天下已定治荒剔蠹討究儒術以興典憲薰醲涵浸殆百餘年其後文章稍稍可述至貞元元和間愈遂以六經之文為諸儒倡障隄末流反刓以朴剗僞以真然愈之才自視司馬遷揚雄至班固以下不論也當其所得粹然一出於正刊落陳言橫騖別驅汪洋大肆要之無抵牾聖人者其道蓋自比孟軻以荀況揚為未淳寧不信然至進諫陳謀排難恤孤矯拂偷末皇皇於仁義可謂篤道君子矣自晉汔隋老佛顯行聖道不斷如帶諸儒倚天下正議助為怪神愈獨喟然引聖爭四海之惑雖蒙訕笑跲而復奮始若未之信卒大顯於時昔孟軻拒楊墨去孔子才二百年愈排二家乃去千餘歲撥衰反正功與齊而力倍之所以過況雄為不少矣自愈沒其言大行學者仰之如泰山北斗云不尚浮辭第五前漢鮑宣傳為諫大夫常上書諫爭其言少文多實後漢孝明紀曰先帝詔書禁人上書言聖而間者章奏頗夕浮辭自今若有過稱虛譽尚書皆宜抑而不省示不為諂子蚩也後漢孝章詔建武詔書曰堯試臣以職不直以言語筆扎後漢孝安紀詔曰朕遵奉大業而陰陽差越變異並見間令公卿郡國舉賢良方正而所對皆循尚浮言無卓爾異聞其百寮及郡國吏人有道術明習災異陰陽之度琁璣之數者各使指變以聞晉庚翼少有經綸大略社乂商浩並才名冠世而翼不之重也每語人曰此輩宜束之高閣候天下太平然后議其所任耳新唐書薛登上疏曰古之取士考素行之原詢鄉邑之譽崇禮議明節義以敦朴為先雕文為後故人崇勸讓士去輕浮新唐薛登又言願陛下降明制頒峻科斷無當之游言收實用之良策文試效官武閲守禦新唐薛登傳又曰文帝納李諤之言詔禁文章浮詞時泗州剌史司馬幼之表不典實得罪由是風俗稍改煬帝始置進士等科後生復相馳競趁速趨時緝綴小文名曰策學不指實為本而以浮虛為貴方今本士尤乖其本新唐韋貫之傳改禮部侍郎所取士折浮華先行實于時流競為息新唐書鄭覃傳經術該深諄篤守正帝尤重之箋證漢書鮑宣傳為諫大夫宣每居位常上書諫爭其言少文多實後漢書明帝紀六年夏四月甲子詔曰先帝詔書禁人上事言聖而間者章奏頗多浮詞自今若有過稱虛譽尚書皆宜抑而不省示不為諂子蚩也後漢書章帝紀五年夏五月辛亥詔曰建武詔書又曰堯試臣以職不直以言語筆札書舜典曰朕其試哉又曰歷試諸艱札簡也後漢書安帝紀二年秋七月戊辰詔曰朕以不德遵奉大業而陰陽差越變異並見萬民饑流羌貊叛戾夙夜克己憂心京京詩小雅曰憂心京京爾雅曰京京憂也間令公卿郡國舉賢良方正遠求博選開不諱之路冀得至謀以鑒不逮而所對皆循尚浮言無卓爾異聞其百僚及郡國吏人有道術明習災異陰陽之度璇璣之數者各使指變以聞晉書庾亮傳附弟庾翼翼字稚恭風儀秀偉少有經綸大略京兆杜乂陳郡殷浩並才名冠世而翼弗之重也每語人曰此輩宜束之高閣俟天下太平然後議其任耳新唐書薛登傳薛登常州義興人天授中纍遷左補闕時選舉濫甚乃上疏曰比觀舉薦類不以才馳聲假譽互相推引非所謂報國求賢者也古之取士考素行之原詢鄉邑之譽崇禮讓明節義以敦朴為先雕文為後故人崇勸讓士去輕浮願陛下降明制頒峻科斷無當之游言收實用之良策文試效官武閲守禦新唐書薛登傳乃上疏曰隋文帝納李諤之言詔禁文章浮詞時泗州刺史司馬幼之表不典實得罪由是風俗稍改煬帝始置進士等科後生復相馳競赴速趨時緝綴小文名曰策學不指實為本而以浮虛為貴方今舉士尤乖其本新唐書韋貫之傳改禮部侍郎所取士抑浮華先行實于時流競為息新唐書鄭覃傳覃於經術該深諄篤守正帝尤重之圖籍第六前漢蕭何傳高祖至咸陽諸將皆爭走金帛財物之府分之何獨先入收秦丞相御史律令圖書藏之沛公具知天下厄塞戶口多少強弱處民所疾苦者以何得秦圖書也前漢張蒼傳蕭何為相國而蒼乃自秦時為柱下御史明習天下圖書計籍又善用算律歷故令蒼以列侯居相府領主郡國上計者後漢班固傳兩都賦曰春王三朝會同漢京是時也天子受四海之圖籍膺萬國之貢珍內撫諸夏外接百蠻晉應詹傳與陶侃破杜韜於長沙賊中金寶溢目詹一無所取唯收圖書莫不歎之晉裴秀傳拜司空以職在地官以禹貢山川地名從來久遠多有變易後世說者或強牽引漸以暗昧於是甄擲舊文疑者則闕古有名而今無者皆隨事注列作禹貢地域圖十八篇奏之藏於祕府晉載記皇甫真傳從慕容評攻拔鄴都珍貨充溢真一無所取唯在恤人物收圖籍而已新唐書賈耽傳耽圖海內華夷廣三丈從三丈三尺以寸為百里并撰古今郡國縣道四夷迷其中國本之禹貢外夷本班固漢書古郡國題以墨今州縣以朱刊落疏舛多所釐正帝善之賜豫加等箋證漢書蕭何傳沛公至咸陽諸將皆爭走金帛財物之府分之何獨先入收秦丞相御史律令圖書臧之沛公具知天下厄塞戶口多少彊弱處民所疾苦者以何得秦圖書也漢書張蒼傳是時蕭何為相國而蒼乃自秦時為柱下御史明習天下圖書計籍又善用算律歷故令蒼以列侯居相府領主郡國上計者後漢書班固傳春王三朝會同漢京是日也天子受四海之圖籍膺萬國之貢珍內撫諸夏外接百蠻晉書應詹傳應詹字思遠汝南南頓人魏侍中璩之孫也與陶侃破杜韜於長沙賊中金寶溢目詹一無所取唯收圖書莫不歎之晉書裴秀傳詔曰夫三司之任以翼宣皇極弼成王事者也其以秀為司空秀儒學洽聞且留心政事當禪代之際總納言之要其所裁當禮無違者又以職在地官以禹貢山川地名從來久遠多有變易後世說者或彊牽引漸以暗昧於是甄擲舊文疑者則闕古有名而今無者皆隨事注列作禹貢地域圖十八篇奏之藏於祕府晉書載記皇甫真傳皇甫真字楚季安定朝那人也後從慕容評攻拔鄴都珍貨充溢真一無所取唯存恤人物收圖籍而已新唐書賈耽傳賈耽字敦詩滄州南皮人耽嗜觀書老益勤尤悉地理四方之人又圖海內華夷廣三丈從三丈三尺以寸為百里并撰古今郡國縣道四夷述其中國本之禹貢外夷本班固漢書古郡國題以墨今州縣以朱刊落疏舛多所釐正帝善之賜豫加等
