body:
  text: 卷第十一任賢第一史記孔子世家齊景公適魯問孔子曰昔秦穆公國小處辟其霸何也對曰秦國雖小其志大處雖僻行中正身舉五羖爵之大夫起纍細之中與語三月授之以政以此取之雖王可也其霸小也前漢元帝紀永光初詔曰五帝三皇任賢使能以登至平後漢孝章紀詔曰朕思遲直士惻席異聞其先至者各以發憤吐悶略聞子大夫之志矣皆欲置於左右顧聞省納建武詔書又曰堯試臣以職不直以言語筆扎今外官多爌並可以補任後漢王渙傳廣漢太守陳寵辟渙為功曹寵風聲大行入為大司農和帝問曰在郡何以為理寵曰臣任功曹王渙以簡賢選能主簿鐔顯拾遺補闕臣奉宣詔書而巳後漢王堂傳遷汝南太守搜才禮士不苟自專乃教掾史曰古人勞於求賢逸於任使故能化清於上事緝於下其憲章朝右簡核才職委功曹陳蕃康政理務拾遺補闕任主簿應嗣庶循名責實察言觀效焉郡內稱治魏徐宣傳桓範薦宣曰臣聞帝王用人度世授才爭奪之時以策略為先分定之後以忠義為首吳張昭傳孫策創業命昭為長史撫軍中郎將文武之事一以委昭昭每得北方士大夫書疏專歸美於昭昭欲默而不宣則懼有私宣之則恐非宜進退不安策聞之歡笑曰昔管子相齊一則仲父二則仲父而桓公為霸者宗今子布賢我能用之其功名獨不在我乎新唐魏文正傳上疏曰昔齊桓公問於管仲曰何如而害霸乎曰不能知人害霸也知而不能用害霸也用而不能信害霸也既信而又使小人參之害霸也新唐魏徵傳太宗問何道而明何失而暗徵曰君所以明兼聽也所以暗偏信也堯舜氏闢四門雖有共工不能塞也秦二世以信趙高天下潰叛而不得聞梁武帝信朱异侯景向關而不得聞新唐劉蕡對策曰堯禹之為君而天下大治者以能任九官四嶽十二牧不失其舉不二其業不侵其職居官惟其能左右惟其賢新唐魏玄同傳臣聞國之用人如人用財貧者止糟糠富者餘梁肉故當衰弊之乏則磨策朽鈍以馭之太平多士則遴柬髦俊而使之箋證史記孔子世家齊景公與晏嬰來適魯景公問孔子曰昔秦穆公國小處辟其霸何也對曰秦國雖小其志大處雖辟行中正身舉五羖爵之大夫起纍紲之中與語三日授之以政以此取之雖王可也其霸小矣漢書元帝紀永光元年三月詔曰五帝三王任賢使能以登至平後漢書章帝紀夏五月辛亥詔曰朕思遲直士側席異聞遲猶希望也音持二反側席謂不正坐所以待賢良也其先至者各以發憤吐悶略聞子大夫之志矣皆欲置於左右顧問省納建武詔書又曰堯試臣以職不直以言語筆札書舜典曰朕其試哉又曰歷試諸艱札簡也今外官多曠並可以補任後漢書王渙傳王渙為太守陳寵功曹當職割斷不避豪右寵風聲大行入為大司農和帝問曰在郡何以為理寵頓首謝曰臣任功曹王渙以簡賢選能主簿鐔顯拾遺補闕臣奉宣詔書而已後漢書王堂傳王堂字敬伯廣漢郪人也遷汝南太守搜才禮士不苟自專乃教掾史曰古人勞於求賢逸於任使故能化清於上事緝於下其憲章朝右簡核才職委功曹陳蕃匡政理務拾遺補闕任主簿應嗣庶循名責實察言觀效焉郡內稱治三國志魏志徐宣傳徐宣字寶堅廣陵海西人也桓範薦宣曰臣聞帝王用人度世授才爭奪之時以策略為先分定之後以忠義為首二三國志吳志張昭傳張昭字子布彭城人也漢末大亂徐方士民多避難揚土昭皆南渡江孫策創業命昭為長史撫軍中郎將升堂拜母如比肩之舊文武之事一以委昭昭每得北方士大夫書疏專歸美於昭昭欲默而不宣則懼有私宣之則恐非宜進退不安策聞之歡笑曰昔管子相齊一則仲父二則仲父而桓公為霸者宗今子布賢我能用之其功名獨不在我乎新唐書魏徵傳是歲大雨穀洛溢毀宮寺十九漂居人六百家徵陳事曰昔齊桓公問管仲曰吾欲使酒腐於爵肉腐於俎得無害霸乎管仲曰此固非其善者然無害霸也公曰何如而害霸曰不能知人害霸也知而不能用害霸也用而不能任害霸也任而不能信害霸也既信而又使小人參之害霸也新唐書魏徵傳帝曰忠良異乎曰良臣稷契咎陶也忠臣龍逄比干也良臣身荷美名君都顯號子孫傳承流祚無疆忠臣已嬰禍誅君陷昏惡喪國夷家秪取空名此其異也帝曰善因問為君者何道而明何失而暗徵曰君所以明兼聽也所以暗偏信也堯舜氏闢四門明四目達四聰雖有共鯀不能塞也靖言庸違不能惑也秦二世隱藏其身以信趙高天下潰叛而不得聞梁武帝信朱异侯景向關而不得聞新唐書劉蕡傳太和二年舉賢良方正能直言極諫帝引諸儒百餘人于廷策蕡對曰臣聞堯禹之為君而天下大治者以能任九官四嶽十二牧不失其舉不二其業不侵其職居官唯其能左右唯其賢新唐書魏玄同傳魏玄同字和初定州鼓城人上疏言選舉法弊曰臣聞國之用人如人用財貧者止糟糠富者餘粱肉故當衰敝乏賢則磨策朽鈍以馭之太平多士則遴柬髦俊而使之不能任賢第二前漢楚元王傳向上封事治亂榮辱之端在所信任信任既賢在於堅固而不移詩云我心匪石不可轉也言守善篤也易曰渙汗其大號言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也用賢未能三旬而退是轉石也論語曰見不善如探湯今二府奏邪讇不當在位歷年而不去故出令則如反汗用賢則如轉石去佞則如拔山如此望陰陽之調不亦難乎後漢郎顗傳上章曰欲德不用厥異常陰夫賢者化之本雲者雨之具得賢而不用猶久陰而不雨也後漢張衡賦曰斥西施而弗御兮羈要裊以服箱並喻不能用賢餘義見退善進惡門晉華談傳剌史嵇紹舉談秀才將行陳總餞之因問曰思賢之主以求才為務進取之士以功名為先何仲舒不敘武帝之朝賈誼失分漢文之時此吳晉之滯論可辨此理而後別談曰夫聖人在上物無不理百揆之職非賢不居故山林無匿景衡門不栖遲至承統之王或是中才或復凡人居聖人之器是以其教日頽風俗漸弊又中才之君所資者偏物以類感必於其黨黨言雖非彼以為是以所授有顏冉之賢所用有廊廟之器居官者日冀元凱之功在上者日庶堯舜之義彼豈知其政漸毀哉朝雖有求賢之名而無知才之實言雖當彼以為誣策雖奇彼以為妄誣則毀己之言入妄則不忠之責生豈故為哉淺明不見深理近才不覩遠體也是以言不用計不施恐死亡之不假何論功名之立哉故上官昵而屈原放宰嚭寵而伍員戮豈不哀哉若仲舒抑於孝武賈誼失於漢文蓋復是其輕者耳故白起有云非得賢之難用之難非用之難信之難得賢而不能用用而不能信功業豈可得而成哉新唐魏元忠傳曰昔漢文帝不知魏尚賢而囚之知李廣才而不能用乃歎其生不逢時夫以廣之才天下旡雙時方歲事胸奴而卒不任故近不知尚廣之賢而遠想廉頗李牧馮唐是以知其有而不能用也箋證漢書楚元王傳附劉向更生見堪猛在位幾已得復進懼其傾危乃上封事諫曰故治亂榮辱之端在所信任信任既賢在於堅固而不移詩云我心匪石不可轉也師古曰此邶柏舟之詩也言守善篤也易曰渙汗其大號師古曰此易渙卦九五爻辭也言王者渙然大發號令如汗之出也言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也師古曰踰時三月也用賢未能三旬而退是轉石也論語曰見不善如探湯師古曰論語載孔子之言探湯言其除難無所避也今二府奏佞讇不當在位歷年而不去如淳曰二府丞相御史也師古曰讇古諂字故出令則如反汗用賢則如轉石去佞則如拔山如此望陰陽之調不亦難乎後漢書郎顗傳順帝時災異屢見陽嘉二年正月公車徵顗乃詣闕拜章曰臣聞天垂妖象地見災符所以譴告人主又曰賢德不用厥異常陰夫賢者化之本雲者雨之具也得賢而不用猶久陰而不雨也後漢書張衡傳載其思玄賦曰斥西施而弗御兮羈要裊以服箱斥遠也西施越之美女也要音於皎反裊音奴了反呂氏春秋曰要裊古之駿馬也服駕也箱車也言踈遠美女又以駿馬駕車並喻不能用賢也劉攽曰案要裊古良馬當作裊從馬晉書華談傳太康中刺史嵇紹舉談秀才將行別駕陳總餞之因問曰思賢之主以求才為務進取之士以功名為先何仲舒不仕武帝之朝賈誼失分漢文之時此吳晉之滯論可辨此理而後別談曰夫聖人在上物無不理百揆之職非賢不居故山林無匿景衡門不棲遲至承統之主或是中才或復凡人居聖人之器處兆庶之上是以其教日頽風俗漸弊又中才之君所資者偏物以類感必于其黨黨言雖非彼以為是以所授有顏冉之賢所用有廟廊之器居官者日冀元凱之功在上者日庶堯舜之義彼豈知其政漸毀哉朝雖有求賢之名而無知才之實言雖當彼以為誣策雖奇彼以為妄誣則毀己之言入妄則不忠之責生豈故為哉淺明不見深理近才不覩遠體也是以言不用計不施恐死亡之不暇何論功名之立哉故上官昵而屈原放宰嚭寵而伍員戮豈不哀哉若仲舒抑于孝武賈誼失于漢文蓋復是其輕者耳故白起有云非得賢之難用之難非用之難信之難得賢而不能用用而不能信功業豈可得而成哉新唐書魏元忠傳魏元忠宋州宋城人為太學生跌蕩少檢久不調盩厔人江融曉兵術元忠從之游盡傳所學儀鳳中吐蕃數盜邊元忠上封事洛陽宮言命將用兵之要曰昔漢文帝不知魏尚賢而囚之知李廣才而不用乃歎其生不逢時夫以廣之才天下無雙時方歲事胸奴而卒不任故近不知尚廣之賢而遠想廉頗李牧馮唐是以知其有而不能用也賢人衆多第三前漢倪寬傳贊曰是時漢興六十餘年海內艾安府庫充實而四夷未賓制度多闕上方欲用文武求之如弗及始以蒲輪迎枚生見主父而歎息群士慕嚮異人並出卜式拔於芻牧桑羊擢於賈豎衛青奮於奴僕日磾出於降虜斯亦曩時版築飯牛之明已漢之得人於茲為盛儒雅則公孫弘董仲舒兒寬篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚罪應對則嚴助朱買臣歷數則唐都洛下閎協律則李延年運籌則桑弘羊奉使則張騫蘇武將率則衛青霍去病受遺則霍光金曰磾其餘不可勝紀是以興造功業制度遺文後世莫及孝宣承統纂修洪業亦講論六藝招選茂異而蕭望之梁丘賀夏侯勝韋元成嚴彭祖尹更始以儒術進劉向王褒以文章顯將相則張安世趙充國魏相丙吉于定國杜延年治民則黃霸王成龔遂召信臣韓延壽尹翁歸趙廣漢嚴延年張敞之屬皆有功跡見述於世參其名臣亦其次也前漢酈食其陸賈等贊曰高祖以征伐定天下而縉紳之徒騁其知辨並成大業語曰廊廟之材非一木之枝帝王之功非一士之略信哉前漢梅福傳高祖納善若不及從諫若轉圜聽言不求其能舉功不考其素陳平起於亡命而為謀主韓信拔於行陳而建上將故天下之士雲合歸漢爭進奇異知者竭其策愚者盡其慮勇士極其節怯夫勉其死合天下之知并天下之威是以舉秦如鴻毛取楚若拾遺此高祖所以亡敵於天下也後漢李固上疏曰氣之清者為神人之清者為賢養身者以練神為寶安國者以積賢為道後漢黃瓊傳論曰順帝始以童弱反政而號令自出知能任使故士得用情遂乃備玉帛以聘樊英延問失得急登賢之舉虛降己之禮於是處士鄙生忘其拘儒拂巾衽褐以企旌車之招矣至乃英能承風俊乂咸事若李固周舉之淵謨鴻深左雄黃瓊之政事堅固桓焉楊厚以儒學進崔瑗馬融以文章顯吳祐蘇章种皓欒巴牧民之良幹龐參虞詡將帥之宏規王龔張皓虛心以推士張綱杜喬直道以糾違郎顗陰陽詳密張衡機術特妙東京之士於茲盛焉向使廟堂納其高謀疆場宣其智力帷幄容其謇辭舉厝稟其成式則武宣之軌豈其遠而詩云靡不有初鮮克有終可為恨哉後漢蔡雍傳曰今大漢君臣穆穆守之以平濟濟多士端委縉綖鴻漸盈階振鷺充庭譬猶鍾山之玉泗濱之石纍圭壁不為之盈採浮磬不為之索易曰鴻漸于陸鴻水鳥也漸出于陸喻君子仕進於朝詩曰振振鷺鷺于下注云鷺白鳥也喻潔白之士群集君之朝也山海經曰黃帝取密山之玉策投之中山之陽尚書曰泗濱浮磬注云水中見石可以為磬言鍾山多玉泗水多石喻漢多賢人索盡也音所格反蜀先主傳進圍成都璋出降先主復領益州牧諸葛亮為股肱法正為謀主關羽張飛馬超為瓜牙許靖麋笁簡雍為賓友及董和黃權李嚴等本璋之所授用也吳益費觀等又璋之婚親也彭羡又璋之所排擯也劉巴者宿昔之所忌恨也皆處之顯任盡其器能有志之士無不競勸新唐鄭從讜傳沙陀為亂朝庭以為憂帝欲大臣臨制乃拜從讜檢校司徒以宰相秩復為河東節度兼行營招討使詔自擇參佐從讜即表長安令王調自副兵部員外郎劉崇龜司勳員外郎趙崇為節度觀察府判官劉崇魯推官李渥掌書記崔澤支使皆一時選京師士人比太原為小朝庭言得才多也箋證漢書公孫弘卜式兒寬傳贊曰是時漢興六十餘載海內艾安師古曰艾讀曰乂府庫充實而四夷未賓制度多闕上方欲用文武求之如弗及始以蒲輪迎枚生見主父而歎息群士慕嚮異人並出卜式拔於芻牧弘羊擢於賈豎衛青奮於奴僕日磾出於降虜斯亦曩時版築飯牛之朋已師古曰版築傅說也飯牛寧戚也已語終辭也飯音扶晚反漢之得人於茲為盛儒雅則公孫弘董仲舒兒寬篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯宋祁曰南本令作律文章則司馬遷相如滑稽則東方朔枚罪應對則嚴助朱買臣歷數則唐都洛下閎協律則李延年運籌則桑弘羊奉使則張騫蘇武將率則衛青霍去病受遺則霍光金日磾其餘不可勝紀是以興造功業制度遺文後世莫及孝宣承統纂修洪業亦講論六藝招選茂異而蕭望之梁邱賀夏侯勝韋玄成嚴彭祖尹更始以儒術進劉向王褒以文章顯將相則張安世趙充國魏相丙吉于定國杜延年治民則黃霸王成龔遂鄭弘召信臣師古曰召讀曰邵韓延壽尹翁歸趙廣漢嚴延年張敞之屬皆有功德見述於世參其名臣亦其次也師古曰次於武帝時漢書酈陸朱劉叔孫傳贊曰高祖以征伐定天下而縉紳之徒騁其知辨師古曰縉紳儒者之服也並成大業語曰廊廟之材非一木之枝帝王之功非一士之略師古曰此語本出慎子信哉漢書梅福傳京兆尹王章素忠直譏刺鳳為鳳所誅王氏浸盛災異數見群下莫敢正言福復上書曰昔高祖納善若不及從諫若轉圜師古曰不及恐失之也轉圜言其順易也聽言不求其能舉功不考其素師古曰直取其功不論其舊行及所從來也陳平起於亡命而為謀主韓信拔於行陳而建上將故天下之士雲合歸漢爭進奇異知者竭其策愚者盡其慮勇士極其節怯夫勉其死合天下之知并天下之威是以舉秦如鴻毛取楚若拾遺此高祖所以亡敵於天下也後漢書李固傳李固字子堅漢中南鄭人時太山盜賊屯聚歷年郡兵常千人追討不能制固到悉罷遣歸農但選留任戰者百餘人以恩信招誘之未滿歲賊皆弭散遷將作大匠上疏陳事曰臣聞氣之清者為神人之清者為賢養身者以練神為寶安國者以積賢為道後漢書左周黃列傳論曰順帝始以童弱反政而號令自出知能任使故士得用情天下喁喁仰其風采遂乃備玄纁玉帛以聘南陽樊英天子降寢殿設壇席尚書奉引延問失得急登賢之舉虛降己之禮於是處士鄙生忘其拘儒拘儒猶褊狹也拂巾衽褐以企旌車之招矣至乃英能承風俊乂咸事若李固周舉之淵謨弘深左雄黃瓊之政事貞固桓焉楊厚以儒學進崔瑗馬融以文章顯吳祐蘇章种皓欒巴牧民之良幹龐參虞詡將帥之宏規王龔張鷎晧虛心以推士張綱杜喬直道以糾違郎顗陰陽詳密張衡機術特妙東京之士於茲盛焉向使廟堂納其高謀疆場宣其智力帷幄容其蹇辭舉厝稟其成式則武宣之軌豈其遠而而語辭也論語曰豈不爾思室是遠而詩云靡不有初鮮克有終可為恨哉後漢書蔡雍傳間居玩古不交當世感東方朔客難及揚雄班固崔駰之徒設疑以自通揚雄作解嘲班固作答賓戲崔駰作達旨乃斟酌群言韙其是而矯其非作釋誨以戒厲云爾今大漢紹陶唐之洪烈蕩四海之殘災君臣穆穆守之以平濟濟多士端委縉綎端委禮衣也左傳曰太伯端委以持周禮說文曰縉赤白色也綎系綬也音它丁反鴻漸盈階振鷺充庭易曰鴻漸于陸鴻水鳥也漸出於陸喻君子仕進於朝詩曰振振鷺鷺于下注云鷺白鳥也喻潔白之士群集君之朝也譬猶鍾山之玉泗濱之石纍圭璧不為之盈採浮磬不為之索山海經曰黃帝取密山之玉策投之鍾山之陽尚書曰泗濱浮磬注云水中見石可以為磬言鍾山多玉泗水多石喻漢多賢人索盡也音所洛反三國志蜀志先主劉備十九年夏雒城破進圍成都數十日璋出降蜀中殷盛豐樂先主置酒大饗士卒取蜀城中金銀分賜將士還其帛先主復領益州牧諸葛亮為股肱法正為謀主關羽張飛馬超為爪牙許靖糜竺簡雍為賓友及董和黃權李嚴等本璋之所授用也吳一費觀等又璋之婚親也彭羡又璋之所排擯也劉巴者宿昔之所忌恨也皆處之顯任盡其器能有志之士無不競勸新唐書鄭餘慶傳附孫鄭從讜從讜字正求及進士第補校書郎遷纍左補闕沙陀都督李國昌間邊多虞入據振武雲朔等州南略太谷河東節度使康傳圭遣大將伊釗張彥球蘇弘軫引兵拒之戰數負傳圭斬軫以徇彥球所部反攻傳圭殺之劫府庫為亂朝廷以為憂帝欲大臣臨制乃拜從讜檢校司徒以宰相秩復為河東節度兼行營招討使詔自擇參佐從讜即表長安令王調自副兵部員外郎劉崇龜司勳員外郎趙崇為節度觀察府判官前進士劉崇魯推官左拾遺李渥掌書記長安尉崔澤支使皆一時選京師士人比太原為小朝廷言得才多也伐國得賢第四前漢韓信傳信禽趙王歇信乃令軍毋斬廣武君有生得之者購千金頃之有縳而至戲下者信解其縳東鄉坐西鄉對而師事之於是問廣武君曰僕欲北攻燕東伐齊何若有功廣武君辭曰臣聞亡國之大夫不可以圖存敗軍之將不以語勇若臣者何足以權大事乎信曰僕聞之百里奚居虞而虞亡之秦而秦伯非愚於虞而智於秦也用與不用聽與不聽耳向使成安君聽子計僕亦禽矣云云晉習鑿齒傳襄陽陷於符堅堅素聞其名與道安俱輿而致焉既見與語大悅之賜遺甚厚又以其蹇疾與諸鎮書昔晉氏平吳利在二陸今破漢南獲士裁一人有半耳箋證漢書韓信傳於是漢兵夾擊破虜趙軍斬成安君泜水上禽趙王歇信乃令軍毋斬廣武君有生得之者購千金頃之有縛而至戲下者信解其縛東鄉坐西鄉對而師事之於是問廣武君曰僕欲北攻燕東伐齊何若有功廣武君辭曰臣聞亡國之大夫不可以圖存敗軍之將不可以語勇若臣者何足以權大事乎信曰僕聞之百里奚居虞而虞亡之秦而秦伯師古曰百里奚本虞臣也後事於秦遂為大夫穆公用其言以取霸伯讀曰霸非愚於虞而智於秦也用與不用聽與不聽耳向使成安君聽子計僕亦禽矣晉書習鑿齒傳習鑿齒字彥威襄陽人也宗族富盛世為鄉豪鑿齒少有志氣博學洽聞以文筆著稱荊州刺史桓溫辟為從事江夏相袁喬深器之數稱其才於溫是時溫覬覦非望鑿齒在郡著漢晉春秋後以腳疾遂廢于里巷及襄陽陷於符堅堅素聞其名與道安俱輿而致焉既見與語大悅之賜遺甚厚又以其蹇疾與諸鎮書昔晉氏平吳利在二陸今破漢南獲士裁一人有半耳敵國有賢第五前漢辛慶忌傳何武上封事曰虞有宮之奇晉獻不寐晉獻公欲伐虞以宮之奇在寢不家衛青在位淮南寢謀故賢人立朝折衝厭難勝於亡形魏徐奕傳太祖乃以奕為中尉手令曰昔楚有子王文公為之側席而坐汲黯在朝淮南為之折謀詩稱邦之司直君之謂與晉載記符堅傳引群臣議伐東南權翼曰紂之無道天下離心八百諸侯不謀而至武王猶曰彼有人焉回師止旆三仁誅放然後奮戈牧野今晉道雖微未聞喪德君臣和睦上下同心謝安桓沖江表偉才可謂晉有人焉臣聞師克在和今晉和矣未可圖也堅少子中山公詵又諫曰季梁在隨楚人憚之宮奇在虞晉不窺兵國有人焉故也及誅之不用而亡不淹歲晉有謝安桓沖而陛下伐之臣竊惑焉晉張重華傳石季龍使王擢麻秋孫伏都等攻抱牢侵寇不息涼州振動張耽薦主簿謝艾於重華曰韓信之舉非舊名也穰苴之任非舊將也呂蒙之進非舊勳也魏延之用非舊德也謝艾文武兼資兵略明識若授以斧鉞必能禦侮以艾為中堅將軍擊秋大破之季龍聞而歎曰吾以偏師定九州不以九州之力困於抱牢真所謂彼有人焉未可圖也新唐裴度傳韋處厚上疏曰臣聞汲黯在朝淮南寢謀正木處魏諸侯息兵王霸之理以一士止百萬之師一賢制千里之難裴度元勳文武兼備宜用之此語今新唐書無之疑編者自撰箋證漢書辛慶忌傳辛慶忌字子真少以父任為右校丞時數有災異丞相司直何武上封事曰虞有宮之奇晉獻不寐應劭曰晉獻公欲伐虞以宮之之奇在寢不寐衛青在位淮南寢謀故賢人立朝折衝厭難勝於亡形師古曰厭抑也未有禍難之形豫勝之也厭音一葉反三國志魏志徐奕傳徐奕字季才東莞人也太祖征漢中魏諷等謀反太祖歎曰諷所以敢生亂心以吾爪牙之臣無遏姦防謀者故也桓階曰徐奕其人也太祖乃以奕為中尉手令曰昔楚有子玉文公為之側席而坐汲黯在朝淮南為之折謀詩稱邦之司直君之謂與晉書載記苻堅傳下堅引群臣會議曰吾統承大業垂二十載芟夷逋穢四方略定惟東南一隅未賓王化吾每思天下不一未嘗不臨食輟餔今欲起天下兵以討之左僕射權翼進曰臣以為晉未可伐夫以紂之無道天下離心八百諸侯不謀而至武王猶曰彼有人焉回師止斾三仁誅放然後奮戈牧野今晉道雖微未聞喪德君臣和睦上下同心謝安桓沖江左偉才可謂晉有人焉臣謂師克在和今晉和矣未可圖也堅少子中山公詵有寵于堅又諫曰臣聞季良在隨楚人憚之宮奇在虞晉不窺兵國有人焉故也及謀之不用而亡不淹歲前車之覆軌後車之明鑒陽平公國之謀主而陛下違之晉有謝安桓沖而陛下伐之是行也臣竊惑焉晉書張軌傳附曾孫張重華重華字泰臨駿之第二子也寬和懿重沉毅少言父卒時年十六西平公假涼王赦其境內尊其母嚴氏為太王太后居永訓宮所生母馬氏為王太后居永訓宮輕賦斂除關內省園囿以恤貧窮遣使奉章於石季龍季龍使王擢麻秋孫伏都等侵寇不輟金城太守張沖降于秋於是涼州振動重華掃境內使其征南將軍裴恆禦之恆壁于廣武欲以持久弊之牧府相司馬張耽言於重華曰臣聞國以兵為彊以將為主且韓信之舉非舊名也穰苴之信非舊將也呂蒙之進非舊勳也魏延之用非舊德也蓋明王之舉舉無常人才之所能則授以大事今彊寇在郊諸將不進人情騷動危機稍逼主簿謝艾兼資文武明識兵略若授以斧鉞委以專征必能折衝禦侮以艾為中堅將軍配步騎五千擊秋大破之季龍聞而歎曰吾以偏師定九州今以九州之力困於枹罕真所謂彼有人焉未可圖也卷八十六案新唐書裴度傳長慶四年王庭湊屠元翼之家敬宗羞惋歎宰輔非其人使凶賊熾肆學士韋處厚上疏曰臣聞汲黯在朝淮南寢謀干木處魏諸侯息兵王霸之理以一士止百萬之師一賢制千里之難裴度元勳巨德文武兼備
