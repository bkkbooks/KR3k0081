body:
  text: 卷第九十一奢僭第一史記禮書周衰禮廢樂壞大小相踰管仲之家兼備三歸循法守正者見侮於世奢溢僭差者謂之顯榮自子夏門人之高第也猶云出見紛華盛麗而說入聞孔子之道而樂二者心戰未能自決而況中庸以下漸漬於失教被服於成俗乎前漢梁孝王傳孝王太后少子愛之賞賜不可勝道得賜天子旌旗從千乘萬騎出稱警入䟆擬於天子前漢淮南厲王長傳廷尉雜奏長廢先帝法不聽天子詔居處無度為黃屋蓋擬天子擅為法令不用漢法前漢賈誼傳上疏曰今民賣僮者為之繡衣絲履偏諸緣內之間中是古天子后服所以廟而不宴者也而庶人得以衣婢妾白榖之表薄紈之表緁以偏諸美者黼繡是古天子之服今富人大賈嘉會召客者以被牆古者以奉一帝一后而節適今庶人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也且帝之身自衣皂綈而富民墻屋被文繡天子之后以緣其領庶人孽妾緣其履此臣所謂舛也夫百人作之不能衣一人欲天下亡寒胡可得也一人耕之十人聚而食之欲天下亡飢不可得也飢寒切於民之肌膚欲其亡為姦邪不可得也國已屈矣盜賊直須時耳然而獻計者曰母動為大耳夫俗至大不恭也至亡等也至冒上也進計者猶曰母為可為長太息者此也間賣奴婢闌為大耳好為夫語者前漢韓安國傳梁王以至親故得自置相二千石出入游戲僭於天子天子聞之心不善太后知帝弗善乃怒梁使者弗見案責王所謂安國為梁使見大長公主而泣曰梁王父兄皆帝王而所見者大故出稱䟆入言警車旗皆帝所賜即以嫮鄙小縣驅馳國中欲夸諸春令天下知太后帝愛之也今梁使來輒案責之梁王恐日夜涕泣思慕不知所為何梁王之忠孝而太后不恤也長公主具以告帝心乃解前漢貢禹傳云今大夫僭諸侯諸侯僭天子天子過天道其日久矣承衰救亂矯復古化在於陛下前漢元后傳人以侍中太僕音為御史大夫而五侯群弟爭為奢侈賂遺珍寶四面而至後庭姬妾各數十人僮僕以千百數羅鍾磬舞鄭女作倡優狗馬馳逐大治第室起土山漸臺洞門高廓閣道連屬彌望其奢僭如此前漢陳萬年傳子咸為南陽太守其治放嚴延年其廉不如所居調發屬縣所出食物以自奉養奢侈玉食然操持掾史郡中長吏皆令間門自斂不得踰法公移敕書曰即各欲求索自快是一郡百太守也何得然哉下吏畏之豪強執服執讀曰慹音之涉反後漢馬防傳防兄弟貴盛奴婢各千人已上資産巨億皆買京師膏諛美田又大起第觀連閣臨道彌亙街路多聚聲樂曲度比諸郊廟賓客奔奏剌史守令多出其家後漢董卓傳卓為太師位在諸侯王上乃引還長安百官迎路拜揖卓遂僭擬車服乘金華青蓋爪畫兩轓時人號竿摩車言其服飾近天子也魏爽飲食車服擬於乘輿尚方珍玩充牣其家箋證史記禮書周衰禮廢樂壞大小相踰管仲之家兼備三歸循法守正者見侮於世奢溢僭差者謂之顯榮自子夏門人之高第也猶云出見紛華盛麗而說入聞夫子之道而樂二者心戰未能自決而况中庸以下漸漬於失教被服於成俗乎漢書梁孝王傳明年漢立太子梁最親有功又為大國居天下膏腴地北界泰山西至高陽四十餘城多大縣孝王太后少子愛之賞賜不可勝道於是孝王築東苑方三百餘里廣雎陽城七十里大治宮室為復道自宮連屬於平臺三十餘里得賜天子旌旗從千乘萬騎出稱警入言䟆擬於天子漢書淮南厲王劉長傳王至長安丞相張蒼典客馮敬行御史大夫事與宗正廷尉雜奏長廢先帝法不聽天子詔居處無度為黃屋蓋擬天子擅為法令不用漢法卷四十四漢書賈誼傳今民賣僮者為之繡衣絲履偏諸緣內之間中是古天子后服所以廟而不宴者也而庶人得以衣婢妾白榖之表薄紈之裏緁以偏諸美者黼繡是古天子之服今富人大賈嘉會召客者以被牆古者以奉一帝一后而節適今庶人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也且帝之身自衣皂綈而富民牆屋被文繡天子之后以緣其領庶人孽妾緣其履此臣所謂舛也夫百人作之不能衣一人欲天下亡寒胡可得也一人耕之十人聚而食之欲天下亡飢不可得也飢寒切于民之肌膚欲其亡為姦邪不可得也國已屈矣盜賊直須時耳然而獻計者曰毋動為大耳夫俗至大不敬也至亡等也至冒上也進計者猶曰毋為可為長太息者此也間賣奴婢闌為大耳好為夫語者漢書韓安國傳梁王以至親故得自置相二千石出入游戲僭於天子天子聞之心不善太后知帝弗善乃怒梁使者弗見案責王所為安國為梁使見大長公主而泣曰梁王父兄皆帝王而所見者大故出稱䟆入言警車旗皆帝所賜即以嫮鄙小縣驅馳國中欲夸諸侯令天下知太后帝愛之也今梁使來輒案責之梁王恐日夜涕泣思慕不知所為何梁王之忠孝而太后不恤也長公主具以告太后太后喜曰為帝言之言之帝心乃解而免冠謝太后曰兄弟不能相教乃為太后遺憂漢書貢禹傳今大夫僭諸侯諸侯僭天子天子過天道其日久矣承衰救亂矯復古化在於陛下漢書元后傳自是公卿見鳳側目而視郡國守相刺史皆出其門又以侍中太僕音為御史大夫列于三公而五侯群弟爭為奢侈賂遺珍寶四面而至後庭姬妾各數十人僮奴以千百數羅鍾磬舞鄭女作倡優狗馬馳逐大治第室起土山漸臺洞門高廊閣道連屬彌望百姓歌之曰五侯初起曲陽最怒壞決高都連竟外杜土山漸臺西白虎其奢侈如此漢書陳萬年傳附子咸子咸為南陽太守其治放嚴延年其廉不如所居調發屬縣所出食物以自奉養奢侈玉食然操持掾史郡中長吏皆令閉門自斂不得踰法公移敕書曰即各欲求索自快是一郡百太守也何得然哉下吏畏之豪彊執服執讀曰慹音之涉反令行禁止然亦以次見廢後漢書馬防傳防兄弟貴盛奴婢各千人已上資産巨億皆買京師膏腴美田又大起第觀連閣臨道彌亙街路多聚聲樂曲度比諸郊廟賓客奔湊四方畢至京兆杜篤之徒數百人常為食客居門下剌史守令多出其家後漢書董卓傳卓諷朝廷使光祿勳宣璠持節拜卓為太師位在諸侯王上乃引還長安百官迎路拜揖卓遂僭擬車服乘金華青蓋爪畫兩轓時人號竿摩車言其服飾近天子也三國志魏志曹爽傳爽飲食車服擬於乘輿尚方珍玩充牣其家妻妾盈後庭又私取先帝才人七八人及將吏師工鼓吹良家子女三十三人皆以為伎樂宮室壯麗第二前漢高祖紀蕭何治未央宮立東闕北闕前殿武庫大倉上見其壯麗甚怒謂何曰天下胸胸勞苦數歲成敗未可知是何治宮室過度也何曰天下方未定故可因以就宮室且夫天子以四海為家非令壯麗亡以重威且亡令後世有以加也前漢賈傳秦起咸陽而西至雍離宮三百鍾鼓帷帳不移而具又為阿房之殿殿高數十仞東西五里南北千步從車羅騎四馬騖馳旌旗不橈為宮室之麗至於此晉謝安傳宮室毀壞安欲繕之尚書令王彪之等以外寇為諫安不從竟獨決之宮室用成皆仰模玄象合體辰極而役無勞怨新唐鄭注傳文宗時言秦雍災當興役厭之帝嘗詠杜甫曲江辭有宮殿千門語意天寶時環江有觀榭宮室聞注言即詔兩神策治曲江昆明作紫雲樓采霞亭詔公卿得列舍堤上新唐薛收傳王入觀隋宮室且歎煬帝無道殫人力以事奢侈收進曰峻宇雕墻商辛以滅土階茅茨唐堯以昌始皇興阿房而秦禍速文帝罷露臺而漢祚永後主曾不是察奢虐是矜死一夫之手為後世笑何此之能保哉新唐蘇世長傳侍宴披香殿酒酣進曰此煬帝作耶何雕麗底此帝曰卿好諫似直然詐也豈不知此殿我所營乃詭云煬帝邪對曰臣但見傾宮鹿臺非受命聖人所為者天下厭隋之侈以歸有道陛下宜刈奢淫復朴素帝咨重其言新唐封倫傳素營仁壽宮規構鴻侈宮成文帝怒曰素殫百姓力為吾掊怨天下素大懼倫曰母恐皇后至自當免明日帝果勞素曰公知吾夫婦老無以自娛樂而盛飾此宮邪因大悅素退問何料而知倫曰上節儉故始見必怒然雅聽后言后婦人惟侈麗是好后悅則帝安矣素曰吾不及也新唐馬周傳上疏曰伏見大安宮在宮城右墻宇門闕方紫極為卑小東宮皇太子居之而在內大安至尊居之反在外太上皇雖志清儉愛惜人力陛下不敢違而蕃夷朝見四方觀聽有不足焉臣願營雉堞門觀務從高顯以稱萬方之望則大孝昭矣箋證漢書高祖紀二月至長安蕭何治未央宮立東闕北闕前殿武庫太倉上見其壯麗甚怒謂何曰天下胸胸勞苦數歲成敗未可知是何治宮室過度也何曰天下方未定故可因以就宮室且夫天子以四海為家非令壯麗亡以重威且亡令後世有以加也漢書賈山傳孝文時言治亂之道借秦為諭名曰至言其辭曰秦非徒如此也起咸陽而西至雍離宮三百鍾鼓帷帳不移而具又為阿房之殿殿高數十仞東西五里南北千步從車羅騎四馬騖馳旌旗不橈為宮室之麗至於此使其後世曾不得聚廬而託處焉晉書謝安傳是時宮室毀壞安欲繕之尚書令王彪之等以外寇為諫安不從竟獨決之宮室用成皆仰模玄象合體辰極而役無勞怨新唐書鄭注傳文宗時又言秦雍災當興役厭之帝嘗詠杜甫曲江辭有宮殿千門語意天寶時環江有觀榭宮室聞注言即詔兩神策治曲江昆明作紫雲樓采霞亭詔公卿得列舍堤上新唐書薛收傳王入觀隋宮室且嘆煬帝無道殫人力以事夸侈收進曰峻宇雕墻殷辛以亡土階茅茨唐堯以昌始皇興阿房而秦禍速文帝罷露臺而漢祚永後主曾不是察奢虐是矜死一夫之手為後世笑何此之能保哉新唐書蘇世長傳侍宴披香殿酒酣進曰此煬帝作邪何雕麗底此帝曰卿好諫似直然詐也豈不知此殿我所營乃詭云煬帝邪對曰臣但見傾宮鹿臺非受命聖人所為者陛下武功舊第才蔽風雨時以為足今天下猒隋之侈以歸有道陛下宜刈奢淫復朴素帝咨重其言新唐書封倫傳素營仁壽宮表為土工監規構鴻侈宮成文帝怒曰素殫百姓力為吾掊怨天下素大懼倫曰毋恐皇后至自當免明日帝果勞素曰公知吾夫婦老無以自娛樂而盛飾此宮邪因大悅素退問何料而知倫曰上節儉故始見必怒然雅聽后言后婦人惟侈麗是好后悅則帝安矣素曰吾不及也卷一百新唐書馬周傳周上疏臣伏見大安宮在宮城右牆宇門闕方紫極為卑小東宮皇太子居之而在內大安至尊居之反在外太上皇雖志清儉愛惜人力陛下不敢違而蕃夷朝見四方觀聽有不足焉臣願營雉堞門觀務從高顯以稱萬方之望則大孝昭矣卷九十八非法服第三史記趙昭王世家夫有高世之功者負遺俗之纍有獨智之慮者任驁民之怨今吾將胡服騎射以教百姓而世必議寡人奈何肥義曰臣聞疑事無功疑行無名王既定負遺俗之慮殆無顧天下之議矣夫論至德者不和於俗成大功者不謀於衆昔者舜舞有苗禹袒裸國非以養欲而樂志也務以論德而約功也愚者暗成事智者覩未形則王何疑焉王曰吾不疑胡服也吾恐天下笑我也狂夫之樂智者哀焉愚者所笑賢者察焉世有順我者胡服之功未可知也雖驅世以笑我胡地中山吾必有之於是遂胡服矣魏志楊阜傳阜常見明帝著被縹綾半褎阜問帝曰禮何法服也帝默然不答自是不法服不以見阜前漢楊王孫傳家業千金厚自奉養生亡所不致及病且終先令其子曰吾欲裸葬以反吾真必亡易吾意其子欲默而不從重廢父命欲從之心又不忍乃往見王孫友人祁侯祁侯與王孫書曰死者亡知則巳若其有知是戮尸地下將裸見先人切為王孫不取也王孫報曰古之聖王緣人情不忍其親故為制禮今則越之吾是以裸葬將以矯世也且夫死者終生之化而物之歸者也歸者得至化者得變是物各反其真也反真冥冥亡形亡聲乃合道情夫飾外以華衆厚葬以鬲真使歸者不得至化者不得變是使物各失其所也且吾聞之精神者天之有也形骸者地之有也精神離形各歸其真故謂之鬼鬼之為言歸也其尸塊然獨處豈有知哉裡以幣帛鬲以棺槨支體絡束口含玉石欲化不得鬱為枯臘千載之後棺槨朽腐乃得歸土就其真宅繇是言之焉用久客祁侯曰善遂羸葬後漢王暢傳為南陽太守郡中豪族多以奢靡相尚暢常布衣皮褥車馬羸敗以矯其敝晉武帝紀四年太醫司馬程據獻雉頭裘帝以奇技異服典禮所禁焚之于殿前箋證史記趙昭王世家夫有高世之功者負遺俗之纍有獨智之慮者任驁民之怨今吾將胡服騎射以教百姓而世必議寡人奈何肥義曰臣聞疑事無功疑行無名王既定負遺俗之慮殆無顧天下之議矣夫論至德者不和於俗成大功者不謀於衆昔者舜舞有苗禹袒祼國非以養欲而樂志也務以論德而約功也愚者暗成事智者覩未形則王何疑焉王曰吾不疑胡服也吾恐天下笑我也狂夫之樂智者哀焉愚者所笑賢者察焉世有順我者胡服之功未可知也雖驅世以笑我胡地中山吾必有之於是遂胡服矣三國志魏志楊阜傳阜常見明帝著被縹綾半褎阜問帝曰此於禮何法服也帝默然不答自是不法服不以見阜漢書楊王孫傳楊王孫者孝武時人也學黃老之術家業千金厚自奉養生亡所不致及病且終先令其子曰吾欲裸葬以反吾彥必亡易吾意死則為布囊盛尸入地七尺既下從足引脫其囊以身親土其子欲默而不從重廢父命欲從之心又不忍乃往見王孫友人祁侯祁侯與王孫書曰竊聞王孫先令裸葬令死者亡知則巳若其有知是戮尸地下將裸見先人竊為王孫不取也王孫報曰蓋聞古之聖王緣人情不忍其親故為制禮今則越之吾是以裸葬將以矯世也且夫死者終生之化而物之歸者也歸者得至化者得變是物各反其真也反真冥冥亡形亡聲乃合道情夫飾外以華衆厚葬以鬲真使歸者不得至化者不得變是使物各失其所也且吾聞之精神者天之有也形骸者地之有也精神離形各歸其真故謂之鬼鬼之為言歸也其尸塊然獨處豈有知哉裹以幣帛鬲以棺槨支體絡束口含玉石欲化不得鬱為枯臘千載之後棺槨朽腐乃得歸土就其真宅繇是言之焉用久客祁侯曰善遂羸葬後漢書王暢傳為南陽太守郡中豪族多以奢靡相尚暢常布衣皮褥車馬羸敗以矯其敝晉書武帝紀四年十一月辛巳太醫司馬程據獻雉頭裘帝以奇技異服典禮所禁焚之於殿前矯世厲俗第四魏志評曰田疇抗節王修忠正足以矯俗晉劉實傳以世多進趣謙遜道廢乃著崇讓論以矯之箋證三國志魏志袁渙張範涼茂國淵田疇王修邴原管寧傳評曰袁渙邴原張範躬履清蹈進退以道蓋是貢禹兩龔之匹涼茂國淵亦其次也張承名行亞範可謂能弟矣田疇抗節王修忠貞足以矯俗管寧淵雅高尚確然不拔張臶胡昭闔門守衛不營當世故并録焉晉書劉實傳以世多進趣廉遜道闕乃著崇讓論以矯之
