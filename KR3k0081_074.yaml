body:
  text: 卷第七十四赦小過第一前漢平帝紀元壽二年詔曰選舉者其歷職更事有名之士則以為難保廢而弗舉甚謬於赦小過舉賢材之義諸有臧及內惡未發而薦舉者皆勿案驗令士厲精鄉進不以小疵妨大材前漢東方朔傳曰水至清則無魚人至察則無徒冕而前旒所以蔽明黈纊充耳所以塞聰明有所不見聰有所不聞舉大德赦小過無求備於一人之義也前漢馮唐傳上問唐曰公何以言吾不能用頗牧也唐對曰愚以為陛下法太明賞太輕罰太重且雲中守尚坐上功首虜差六級陛下下之吏削其爵繇此言之陛下雖得李牧不能用也文帝說是日令唐持節赦魏尚復以為雲中守後漢岑彭傳彭說朱鮪曰公雖嬰城固守將何待乎鮪曰大司徒被害時鮪預其謀又諫更始無遣蕭王北伐誠自知罪深彭還具言於帝帝曰夫建大事者不忌小怨鮪今若降官爵可保況誅罰乎河水在此吾不食言指河以為信言其明白也彭復往告鮪鮪見其誠即許降後漢班超傳初班彼召以戊巳校尉任尚為都護與超交代尚謂超曰宜有以請之超曰塞外吏士本非孝子順孫皆以罪過徙補邊屯而蠻夷懷鳥獸之心難養易敗今君性嚴急宜蕩佚簡易寬小過總大綱而已尚私謂所親曰我以班君當有奇策今所言平平耳尚至數年而西域反亂如超所戒箋證漢書平帝紀元壽二年六月哀帝崩九月辛酉中山王即皇帝位謁高廟大赦天下帝年九歲太皇太后臨朝大司馬莽秉政百官總己以聽於莽詔曰及選舉者其歷職更事有名之士則以為難保廢而弗舉甚謬於赦小過舉賢材之義諸有臧及內惡未發而薦舉者皆勿案驗師古曰有臧謂以臧貨致罪令士厲精鄉進師古曰鄉讀曰嚮不以小疵妨大材漢書東方朔傳朔上書陳農戰彊國之計因自訟獨不得大官欲求試用其言專商鞅韓非之語也指意放蕩頗復詼諧辭數萬言終不見用朔因著論設客難已用位卑以自慰諭其辭曰詩云禮義之不愆何恤人之言師古曰逸詩也愆過也恤憂也故曰水至清則無魚人至察則無徒師古曰徒衆也冕而前旒所以蔽明黈纊充耳所以塞聰如淳曰黈音工苟反謂以玉為瑱用黈纊縣之也師古曰如說非也黈黃色也纊綿也以黃綿為丸用組懸之於冕垂兩耳旁示不外聽非玉瑱之縣也明有所不見聰有所不聞舉大德赦小過無求備於一人之義也漢書馮唐傳復問唐曰公何以言吾不能用頗牧也唐對曰愚以為陛下法太明賞太輕罰太重且雲中守尚坐上功首虜差六級陛下下之吏削其爵罰作之繇此言之陛下雖得李牧不能用也臣誠愚觸忌諱死罪文帝說是日令唐持節赦魏尚復以為雲中守而拜唐為車騎都尉後漢書岑彭傳岑彭字君然南陽棘陽人也光武即位拜彭廷尉歸德侯如故行大將軍事與大司馬吳漢大司空王梁建義大將軍朱祐右將軍萬修執金吾賈復驍騎將軍劉植揚化將軍堅鐔積射將軍侯進偏將軍馮異祭遵王霸等圍洛陽數月朱鮪等堅守不肯下帝以彭嘗為鮪校尉令往說之鮪在城上彭在城下相勞苦歡語如平生彭因曰公雖嬰城固守將何待乎鮪曰大司徒被害時鮪與其謀又諫更始無遣蕭王北伐誠自知罪深彭還具言於帝帝曰夫建大事者不忌小怨鮪今若降官爵可保况誅罰乎河水在此吾不食言指河以為信言其明白也彭復往告鮪鮪從城上下索曰必信可乘此上彭趣索欲上鮪見其誠即許降後漢書班超傳初超被徵以戊巳校尉任尚為都護與超交代尚謂超曰君侯在外國三十餘年而小人猥承君後任重慮淺宜有以誨之超曰年老失智任君數當大位豈班超所能及哉必不得已願進愚言塞外吏士本非孝子順孫皆以罪過徙補邊屯而蠻夷懷鳥獸之心難養易敗今君性嚴急水清無大魚察政不得下和宜蕩佚簡易寬小過總大綱而已超去後尚私謂所親曰我以班君當有奇策今所言平平耳尚至數年而西域反亂以罪被徵如超所戒論功不録小過第二前漢陳湯傳湯誅郅支單于丞相御史亦惡其矯制劉向上疏曰論大功者不録小過舉大美者不疵細瑕晉王濬平吳之後至京師有司奏濬表既不列前後所被七詔月日又赦後違詔不受王渾節度大不恭付廷尉科罪詔曰濬前受詔徑造秣陵後乃下受渾節度詔書稽留所下不至便令與不受詔同責未為經通濬不即表上被渾宣詔此可責也濬有征伐之勞不足以一眚掩之有司又奏濬赦後燒賊船輒勑付廷尉禁推詔曰勿推拜濬輔國大將軍領步兵校尉封為襄陽縣侯賜絹萬匹晉石苞傳詔以苞為司徒有司奏苞前有折撓不堪其任不宜擢用詔曰昔鄧禹撓於關中而終輔漢室豈以一眚而掩大德哉於是就位晉武悼楊皇后傳太子妃賈氏妬忌帝將廢之后言於帝曰賈公閭有勳社稷賈妃親是其女正復妬忌之間不足以一眚掩其大德后又數戒厲妃妃不知后之助己因以致恨謂后構之於帝忿怨彌深新唐侯君集傳初君集平高昌云云配反罪人不以聞又私取珍寶婦女將士因亦盜人不能制及還京師有司劾之詔君集詣獄簿對中書侍郎岑文本諫曰高昌之罪議者以其遐遠欲置度外唯陛下奮獨見之明授決勝之略君集得指期平殄今推勞將帥從征之人悉蒙重賞未踰數日更以屬吏天下聞之謂陛下録過遺功無以勸後且古之出師克敵有重賞不勝蒙顯戮當其有功也雖貪財縱欲尚蒙爵邑其無功也雖勤躬潔己不免鈇鉞故曰記人之功忘人之過宜為君者也昔利廣利貪不愛卒陳湯盜所收康居財物二主皆赦其罪封侯賜金夫將帥之臣廉慎少而貪沒多軍法曰使智使勇使貪使愚故智者樂立其功勇者好行其志貪者邀趨其利愚者不計其死是以前聖使人必收所長而棄所短云云帝寤釋不問新唐薛萬徹傳萬徹在軍中任氣不能下人或有上書言狀者帝愛其功直加讓勗而已即為焚書新唐趙憬傳獻審官六議其二曰故廣任用明殿最舉大節略小瑕隨能試事用人之大要也新唐韋思謙及進士第纍調應城令負殿不得進官吏部尚書高季父曰豫始得此一人豈以小疵棄大德邪擢授監察御史箋證漢書陳湯傳初中書令石顯嘗欲以姊妻延壽延壽不取及丞相御史亦惡其矯制皆不與湯湯素貪所鹵獲財物入塞多不法司隸校尉移書道上繫吏士按驗之湯上疏言臣與吏士共誅郅支單于幸得禽滅萬里振旅宜有使者迎勞道路今司隸反逆收繫按驗是為郅支報讎也上立出吏士令縣道具酒食以過軍既至論功石顯匡衡以為延壽湯擅興師矯制幸得不誅如復加爵土則後奉使者爭欲乘危徼幸生事於蠻夷為國招難漸不可開元帝內嘉延壽湯功而重違衡顯之議師古曰重難也議久不決故宗正劉向上疏曰論大功者不録小過舉大美者不疵細瑕晉書王濬傳濬至京都有司奏濬表既不列前後所被七詔月日又赦後違詔不受渾節度大不敬付廷尉科罪詔曰濬前受詔徑造秣陵後乃下受渾節度詔書稽留所下不至便令與不受詔同責未為經通濬不即表上被渾宣詔此可責也濬有征伐之勞不足以一眚掩之有司又奏濬赦後燒賊船百三十五艘輒勑付廷尉禁推詔曰勿推拜濬輔國大將軍領步兵校尉封為襄陽縣侯邑萬戶封子彝楊鄉亭侯邑千五百戶賜絹萬匹晉書石苞傳時鄴奚官督郭廙上書理苞帝詔曰前大司馬苞忠允清亮才經世務幹用之績所歷可紀宜掌教典以贊時政其以苞為司徒有司奏苞前有折撓不堪其任以公還第已為弘厚不宜擢用詔曰昔鄧禹撓於關中而終輔漢室豈以一眚而掩大德哉於是就位晉書后妃列傳武悼楊皇后太康九年后率內外夫人命婦躬桑于西郊賜帛各有差太子妃賈氏妬忌帝將廢之后言于帝曰賈公閭有勳社稷猶當數世宥之賈妃是其親女正復妬忌之間不足以一眚掩其大德后又數誡厲妃妃不知后之助己因以致恨謂后構之於帝忿怨彌深新唐書侯君集傳侯君集豳州三水人以材雄稱少事秦王幕府從征討有功擢纍左虞候車騎將軍封全椒縣子預誅隱太子尤力王即位拜左衛將軍進封潞國公高昌不臣拜交河道行軍大總管出討高昌平君集刻石紀功還初君集配沒罪人不以聞又私取珍寶婦女將士因亦盜人不能制及還京師有司劾之詔君集詣獄簿對中書侍郎岑文本諫曰高昌之罪議者以其遐遠欲置度外唯陛下奮獨見之明授決勝之略君集得指期平殄今推勞將帥從征之人悉蒙重賞未踰數日更以屬吏天下聞之謂陛下録過遺功無以勸後且古之出師克敵有重賞不勝蒙顯戮當其有功也雖貪財縱欲尚蒙爵邑其無功也雖勤躬潔己不免鈇鉞故曰記人之功忘人之過宜為君者也昔李廣利貪不愛卒陳湯盜所收康居財物二主皆赦其罪封侯賜金夫將帥之臣廉慎少而貪沒多軍法曰使智使勇使貪使愚故智者樂立其功勇者好行其志貪者邀趨其利愚者不計其死是以前聖使人必收所長而棄所短陛下宜申宥君集俾復朝列以勸有功帝寤釋不問新唐書薛萬均傳附弟薛萬徹萬徹與萬均歸高祖授車騎將軍武安縣公事隱太子萬徹在軍中任氣不能下人或有上書言狀者帝愛其功直加讓勗而已即為焚書新唐書趙憬傳趙憬字退翁渭州隴西人憬精治道常以國本在選賢節用薄賦斂寬刑罰懇懇為天子言之又陳前世損益當時之變獻審官六議一議相臣曰中外知其賢者用之能者任之責材之備為不可得二議庶官曰臣嘗謂拔十得五賢愚猶半陛下曰何必五也十二可矣故廣任用明殿最舉大節略小瑕隨能試事用人之大要也新唐書韋思謙傳韋思謙名仁約以近武后父諱為嫌遂以字行八歲喪母以孝聞及進士第纍調應城令負殿不得進官吏部尚書高季輔曰豫始得此一人豈以小疵棄大德邪擢監察御史無求備於人第三前漢張敞傳為婦畫眉長安中傳張京兆眉撫有司以奏敞上問之對曰臣聞閨房之內夫婦之私有過於畫眉者上愛其能弗備責也後漢王符傳實貢篇曰國以賢興以諂衰君以忠安以佞危此古今之常論而時所共知也然衰國危君繼踵不絶者豈時無忠信正直之士哉誠苦其道不得行耳夫十步之閒必有茂草十室之邑必有忠信是故亂商有三仁小衛多君子今以大漢之廣土土民之繁庶朝廷之清明上下之修正而官無善吏位無良臣此豈時之無賢諒由取之乖實夫志道者少與逐俗者多疇是以朋黨用私背實趍華其貢士者不復依其質幹準其才行但虛造聲譽妄生羽毛略計所舉歲且二百覽察其狀則德侔顏冉詳核厥能則鮮及中人皆總務升官自相推達夫士者貴其用也不必求備故四友雖美能不相兼三仁齊致事不一節高祖佐命出自立秦光武得士亦資暴莽況太平之時而云無士乎夫明君之詔也若聲忠臣之和也如嚮長短大小清濁疾徐必相應也且攻玉以石洗金以鹽濯錦以魚浣布以灰夫物故有以賤理貴以配化好者矣智者棄短取長以致其功今使貢士必核以實其有小疵勿強衣飾出處默語各因其方則蕭曹周韓之倫何足不致吳鄧良竇之屬企踵可待魏志武帝紀初平十九年令曰夫有行之士未必能進取進取之士未必能有行也陳平豈篤行蘇秦豈守信邪而陳平定漢業蘇秦濟弱燕由此言之士有偏短庸可廢乎有司明思此義則事無遺滯官無廢業矣吳呂蒙傳權與陸遜論周瑜魯肅及蒙曰公瑾周瑜字雄烈膽略兼人遂破孟德開柘荊州邈焉難繼公瑾昔要子敬肅字來東致達於孤孤與宴語便及大略帝王之業此一快也後孟德因獲劉琮之藝張言方率數十萬衆水步俱下孫普請諸將咨問所宜無適先對至子布文表俱言宜遣使修檄迎之子敬即駮言不可勸孤急呼公瑾付任以衆逆而擊之此二快也且其決計策意出張蘇遠矣後雖勸吾借劉備地是其一短不足以損其二長也周公不求備於一人故孤志其短而貴其長常以比方鄧禹也又子明少時孤謂不辭劇易果敢有膽而已及身長大學問開益籌略奇至可以次於公瑾但言議英發不及之耳圖取關羽勝於子敬子敬答孤書云帝王之起皆有驅除羽不足忌此子敬內不能辨外為大言耳孤亦恕之不苟責也然其作軍屯營不失令行禁止部界無廢負路無拾遺其法亦美矣吳諸葛恪傳與陸遜書曰君子不求備於一人自孔氏門徒大數三千其見異者七十二人至于子張子路子貢等七十之徒亞聖之德然猶各有所短師僻由唁賜不受命豈況下此而無所闕且仲尼不以數子之不備而引以為友不以人所短棄其所長也晉袁甫傳嘗詣中領軍何勗自言能為劇縣勗曰唯欲宰縣不為臺閣職何也甫曰人各有能譬繒中之好莫過錦錦不可以為幍榖中之美莫過稻稻不可以為虀是以聖王使人必以器苟非周才何能悉長黃霸馳名於州郡而息譽於京邑庭尉之才不為三公自昔然也勗善之新唐侯君集傳岑文本上疏見論功不録小過門餘見赦小過東方朔傳又見求賢魏武紀箋證漢書張敞傳張敞字子高本河東平陽人也敞為人敏疾賞罰分明見惡盜取時時越法縱舍有足大者其治京兆略循趙廣漢之迹方略耳目發伏禁姦不如廣漢然敞本治春秋以經術自輔其政頗雜儒雅然敞無威儀時罷朝會過走馬章臺街使御吏驅自以便面拊馬又為婦畫眉長安中傳張京兆眉憮應劭曰憮大也孟康曰憮音詡北方人謂媚好為詡畜蘇林曰憮音嫵師古曰本以好媚為稱何說於大乎蘇音是宋祁曰憮音嫵媚之嫵嫵音舞有司以奏敞上問之對曰臣聞閨房之內夫婦之私有過於畫眉者上愛其能弗備責也然終不得大位後漢書王符傳王符乃隱居著書三十餘篇以譏當時失得不欲章顯其名故號曰潛夫論實貢篇曰國以賢興以諂衰君以忠安以佞危此古今之常論而時所共知也然衰國危君繼踵不絶者豈時無忠信正直之士哉誠苦其道不得行耳夫十步之間必有茂草十室之邑必有忠信是故亂殷有三仁小衛多君子今以大漢之廣土士民之繁庶朝廷之清明上下之修正而官無善吏位無良臣此豈時之無賢諒由取之乖實夫志道者少與逐俗者多疇是以朋黨用私背實趨華其貢士者不復依其質幹準其才行但虛造聲譽妄生羽毛略計所舉歲且二百覽察其狀則德侔顏冉詳核厥能則鮮及中人皆總務升官自相推達夫士者貴其用也不必求備故四友雖美能不相兼三仁齊致事不一節高祖佐命出自亡秦光武得士亦資暴莽况太平之時而云無士乎夫明君之詔也若聲忠臣之和也如響長短大小清濁疾徐必相應也且攻玉以石洗金以鹽濯錦以魚浣布以灰夫物固有以賤理貴以醜化好者矣智者棄短取長以致其功今使貢士必核以實其有小疵勿彊衣飾出處語默各因其方則蕭曹周韓之倫何足不致吳鄧梁竇之屬企踵可待孔子曰未之思也夫何遠之有三國志魏志武帝操建安十九年十二月公至孟津天子命公置旄頭宮殿設鐘虡乙未令曰夫有行之士未必能進取進取之士未必能有行也陳平豈篤行蘇秦豈守信邪而陳平定漢業蘇秦濟弱燕由此言之士有偏短庸可廢乎有司明思此義則士無遺滯官無廢業矣三國志吳志呂蒙傳孫權與陸遜論周瑜魯肅及蒙曰公瑾雄烈膽略兼人遂破孟德開拓荊州邈焉難繼君今繼之公瑾昔要子敬來東致達於孤孤與宴語便及大略帝王之業此一快也後孟德因獲劉琮之勢張言方率數十萬衆水步俱下孤普請諸將咨問所宜無適先對至子布文表俱言宜遣使修檄迎之子敬即駁言不可勸孤急呼公瑾付任以衆逆而擊之此二快也且其決計策意出張蘇遠矣後雖勸吾借玄德地是其一短不足以損其二長也周公不求備於一人故孤忘其短而貴其長常以比方鄧禹也又子明少時孤謂不辭劇易果敢有膽而已及身長大學問開益籌略奇至可以次於公瑾但言議英發不及之耳圖取關羽勝於子敬子敬答孤書云帝王之起皆有驅除羽不足忌此子敬禸不能辦外為大言耳孤亦恕之不苟責也然其作軍屯營不失令行禁止部界無廢負路無拾遺其法亦美也三國志吳志諸葛恪傳諸葛恪字元遜赤烏中魏司馬宣王謀欲攻恪權方發兵應之望氣者以為不利于是徙恪屯於柴桑與丞相陸遜書曰楊敬叔傳述清論以為方今人物雕盡守德業不能復幾宜相左右更為輔車上熙國事下相珍惜又疾世俗好相謗毀使已成之器中有損纍將進之徒意不歡笑聞此喟然誠獨高節愚以為君子不求備于一人自孔氏門徒大數三千其見異者七十二人至于子張子路子貢等七十之徒亞聖之德然猶各有所短師僻由唁賜不受命豈况下此而無所闕且仲尼不以數子之不備而引以為友不以人所短棄其所長也晉書袁甫傳淮南袁甫字公胄亦好學與談齊名以詞辨稱嘗詣中領軍何勗自言能為劇縣勗曰唯欲宰縣不為臺閣職何也甫曰人各有能有不能譬繒中之好莫過錦錦不可以為幍榖中之美莫過稻稻不可以為虀是以聖王使人必先以器苟非周材何能悉長黃霸馳名於州郡而息譽於京邑廷尉之材不為三公自昔然也勗善之犯而不校第四後漢卓茂傳初辟丞相府史嘗出行有人認其馬茂問曰子亡馬幾何時對曰月餘日矣茂有馬數年心知其謬默解與之挽車而去顧曰若非公馬幸至丞相府歸我他日馬主別得亡者乃詣府送馬叩頭謝之茂性不好爭如此論曰夫厚性寬中近於仁犯而不校鄰於恕率斯道也怨悔曷其至乎後漢劉寬傳嘗行有人失牛者乃就寬車中認之寬無所言下駕步歸有頃認者得牛而送還叩頭謝曰隨所刑罪寬曰物有相類士容脫誤幸勞見歸何為謝之州里服其不校校報也曾子曰犯而不發蜀志蔣琬傳東曹掾楊戲素性簡略琬與言論時不應答或欲則戲於琬曰公與戲語而不見應戲之慢上不亦甚乎琬曰人心不同各如其面面從後言古人之所戒也戲欲贊吾是也則非其本心欲反吾言則顯吾之非是以默然是戲之快也又督農楊敏曾毀琬曰作士憒憒誠非及前人或以自琬主者請推治敏琬曰吾實不如前人無可推也主者重據聽不推則乞問其憒憒之狀琬曰苟其不如則士不當理士不當理則憒憒矣復何問邪後敏坐士繫獄衆人猶懼其必死琬心無適莫得免重罪其好意存道皆此類也吳志鍾離收傳躬自墾田種稻二十餘畝臨孰縣民有識認之收曰本以田荒故墾之耳遂以稻與縣人縣長聞之召民繫獄欲繩以法牧為之請長曰君慕承宮自行義事僕為民主當以法率下何得寢公憲而從君邪收曰此是郡界緣君意顧故來暫住今以少稻而殺此民何心復留遂出裝還山陰長白往止之為釋繫民民慚懼率妻子舂所取稻得六十斛米送還牧牧間門不受民輸置道旁莫有取者牧由此發名晉隱逸郭翻傳翻少有志操以漁釣射獵為娛居貧無業欲墾荒田先立表題經年無主然後乃作稻將孰有認之者悉推與之縣令聞而詰之以稻還翻翻不受五晉隱逸朱沖傳少有至行間靜寡欲好學而貧常以耕藝為士鄰人失犢認沖犢以歸後得犢於冰下大慚以犢還沖沖竟不受箋證後漢書卓茂傳習詩禮及歷算究極師法稱為通儒性寬仁恭愛鄉黨故舊雖行能與茂不同而皆愛慕欣欣焉初辟丞相府史事孔光光稱為長者時嘗出行有人認其馬茂問曰子亡馬幾何時對曰月餘日矣茂有馬數年心知其謬默解與之挽車去顧曰若非公馬幸至丞相府歸我他日馬主別得亡者乃詣府送馬叩頭謝之茂性不好爭如此論曰夫厚性寬中近於仁犯而不校鄰於恕率斯道也怨悔曷其至乎後漢書劉寬傳劉寬字文饒弘農華陰人也寬嘗行有人失牛者乃就寬車中認之寬無所言下駕步歸有頃認者得牛而送還叩頭謝曰慙負長者隨所刑罪寬曰物有相類事容脫誤幸勞見歸何為謝之州里服其不校校報也論語曰曾子曰犯而不校三國志蜀志蔣琬傳延熙元年詔琬曰明年就加為大司馬東曹掾楊戲素性簡略琬與言論時不應答或欲搆戲於琬曰公與戲語而不見應戲之慢上不亦甚乎琬曰人心不同各如其面面從後言古人之所誡也戲欲贊吾是邪則非其本心欲反吾言則顯吾之非是以默然是戲之快也又督農楊敏曾毀琬曰作事憒憒誠非及前人或以白琬主者請推治敏琬曰吾實不如前人無可推也主者重據聽不推則乞問其憒憒之狀琬曰苟其不如則事不當理事不當理則憒憒矣復何問邪後敏坐事繫獄衆人猶懼其必死琬心無適莫得免重罪其好惡存道皆此類也三國志吳志鍾離牧傳鍾離牧字子幹會稽山陰人漢魯相意七世孫也少爰居永興躬自墾田種稻二十餘畝臨熟縣民有識認之牧曰本以田荒故墾之耳遂以稻與縣人縣長聞之召民繫獄欲繩以法牧為之請長曰君慕承宮自行義事續漢書曰宮字少子琅邪人嘗在蒙陰山中耕種禾黍臨孰人就認之宮便推與而去由是發名位至左中郎將侍中僕為民主當以法率下何得寢公憲而從君邪牧曰此是郡界緣君意顧故來暫住今以少稻而殺此民何心復留遂出裝還山陰長自往止之為釋繫民民慙懼率妻子舂所取稻得六十斛米送還牧牧閉門不受民輸置道旁莫有取者牧由此發名晉書隱逸列傳郭翻郭翻字長翔武昌人也伯父訥廣州刺史父察安城太守翻少有志操辭州郡辟及賢良之舉家于臨川不交世事惟以漁釣射獵為娛居貧無業欲墾荒田先立表題經年無主然後乃作稻將熟有認之者悉推與之縣令聞而詰之以稻還翻翻遂不受晉書隱逸列傳朱冲朱冲字巨容南安人也少有至行間靜寡欲好學而貧常以耕藝為事鄰人失犢認冲犢以歸後得犢於林下大慙以犢還冲冲竟不受
