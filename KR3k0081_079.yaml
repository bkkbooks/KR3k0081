body:
  text: 卷第七十九不與民爭利第一前漢食貨志昭帝詔郡國舉賢良文學之士問以民所疾苦教化之要皆對願罷鹽鐵酒攉均輸官毋與天下爭利視以儉節然後教化可興前漢公孫賀等傳贊曰所謂鹽鐵議者起始元中召文學賢良問以治亂皆對願罷郡國鹽鐵酒榷均輸務本抑末毋與天下爭利然後教化可興御史大夫桑羊以為此迺所以安邊竟制四夷國家大業不可廢也當時相詰難頗有其議文至宣帝時桓寬推衍鹽鐵之議增廣條目極其論難者數萬言即今之所行鹽鐵論亦欲以究治亂成一家之法焉前漢食貨志元帝即位天下大水二年齊地飢榖石三百餘民多餓死琅邪郡人相食在位諸儒多言鹽鐵官及北假田官常平倉可罷毋與民爭利上從其議後漢黃香傳遷魏郡太守郡舊有內外園田常與人分種收榖歲數千斛香曰田令商者不農王制仕者不耕伐冰食祿之人不與百姓爭利伐冰解見馮衍傳乃悉以賦人課令耕種後漢劉翊傳陽翟黃綱特程夫人權力求占山澤以自營植沖拂召翊問曰程氏貴盛在帝左右不聽則恐見怨與之則奪民利為之奈何翊曰名山大澤不以封蓋為民也明府聽之則被佞幸之名矣拂從翊言遂不與之晉載記石季龍傳下書曰朕不能上和乾象下濟黎元以致星虹之變其令解西山之禁蒲葦魚鹽除歲供之外皆無所固公侯卿牧不得規占山澤奪百姓之利唐德宗紀詔王公卿士不得與民爭利唐懿宗紀廉州珠池與人共利近聞本道禁斷遂絕通商宜令本州任百姓採取不得止約餘見與民爭利董仲舒傳箋證漢書食貨志昭帝即位六年詔郡國舉賢良文學之士問以民所疾苦教化之要皆對願罷鹽鐵酒榷均輸官毋與天下爭利視以儉節然後教化可興漢書公孫劉車王楊蔡陳鄭傳贊曰所謂鹽鐵議者起始元中徵文學賢良問以治亂皆對願罷郡國鹽鐵酒榷均輸務本抑末毋與天下爭利然後教化可興御史大夫弘羊以為此迺所以安邊竟制四夷國家大業不可廢也師古曰竟讀曰境當時相詰難頗有其議文至宣帝時汝南桓寬次公師古曰次公者寬之字治公羊春秋舉為郎至廬江太守丞博通善屬文推衍鹽鐵之議增廣條目極其論難著數萬言師古曰即今之所行鹽鐵論十卷是也亦欲以究治亂成一家之法焉漢書食貨志元帝即位天下大水關東郡十一尤甚二年齊地饑穀石三百餘民多餓死琅邪郡人相食在位諸儒多言鹽鐵官及北假田官常平倉可罷孟康曰北假地名也毋與民爭利上從其議皆罷之後漢書黃香傳延光元年遷魏郡太守郡舊有內外園田常與人分種收榖歲數千斛香曰田令商者不農王制仕者不耕伐冰食祿之人不與百姓爭利伐冰解見馮衍傳乃悉以賦人課令耕種後漢書獨行列傳劉翊傳劉翊字子相潁川潁陰人也家世豐產常能周施而不有其惠种拂臨郡引為功曹翊以拂名公之子拂暠之子也乃為起焉拂以其擇時而仕甚敬任之陽翟黃綱恃程夫人權力求占山澤以自營植拂召翊問曰程氏貴盛在帝左右不聽則恐見怨與之則奪民利為之奈何翊曰名山大澤不以封盖為民也明府衛之則被佞倖之名矣若以此獲禍貴子申甫則自以不孤也申甫拂之子拂從翊言遂不與之晉書載記石季龍上于時大旱白虹經天季龍下書曰朕在位六載不能上和乾象下濟黎元以致星虹之變其令百寮各上封事解西山之禁蒲葦魚鹽除歲供之外皆無所固公侯卿牧不得規占山澤奪百姓之利舊唐書德宗本紀上大歷十四年七月己卯詔王公卿士不得與民爭利諸節度觀察使於揚州置迴易邸並罷之舊唐書懿宗本紀建中元年七月茶藥宜令諸道一任商人興販不得禁止往來廉州珠池與人共利近聞本道禁斷遂絕通商宜令本州任百姓採取不得止約與民爭利第二前漢董仲舒傳對策曰夫天亦有所分予予之齒者去其角傅其翼者兩其足是所受大者不得取小也古之所予祿者不食於力不動於未是亦受大者不得取小與天同意者也夫已受大又取小天不能足而況人虖此民之所以囂囂苦不足也身寵而載高位家溫而食厚祿因乘富貴之資力以與民爭利於下民安能如之哉是故眾其奴婢多其牛羊廣其田宅博其產業畜其積委務此而亡已以迫蹴民民日削月朘寖以大窮富者奢侈羡溢貧者窮急愁苦窮急愁苦而上不救則民不樂生民不樂生尚不避死安能避罪此刑罰之所以蕃而姦邪不可勝者也故受祿之家食祿而已不與民爭業然後利可均布而民可家足此上天之理而亦大古之道天子之所宜法以為制大夫之所當循以為行也故公儀子相魯之其家見織帛怒而出其妻食於舍而茹葵慍而拔其葵曰吾已食祿又奪園夫紅女利虖夫皇皇求財利常恐乏匱者庶人之意也皇皇求仁義常恐不能化民者大夫之意也易曰負者乘致冠至乘車者君子之位也負擔者小人之事也此言居君子之位而為庶人之行者其患禍必至也前漢哀帝綏和二年詔曰制節謹度以防奢淫為政所先百王不易之道也諸侯王列侯公主吏二千石及豪富民多畜奴婢田宅亡限與民爭利百姓失職重困不足其議限列有司條奏諸王列侯得名四園中列侯在長安及公主名田縣道關內侯吏民名田皆無得過三十頃諸侯王奴婢二百人列侯公主百人關內侯吏民三十人年六十以上十歲以下不在數中賈人皆不得名田為吏犯者以律論諸名田畜奴婢過品皆沒入縣官前漢貢禹傳欲令近臣自諸曹侍中以上家亡得私販賣與民爭利犯者輒免官削爵不得仕宦新唐書蘇良嗣傳尚方監裴匪躬案諸苑建言鬻果蔬儲利佐公上良嗣曰公儀休一諸侯相拔葵去織未聞天子賣果蔬與人爭利遂止箋證漢書董仲舒傳仲舒復對曰夫天亦有所分予予之齒者去其角師古曰謂牛無上齒則有角其餘無角者則有上齒傅其翼者兩其足師古曰傅讀曰附附著也言鳥不四足是所受大者不得取小也古之所予祿者不食於力不動於末是亦受大者不得取小與天同意者也夫已受大又取小天不能足而况人虖此民之所以囂囂苦不足也身寵而載高位家溫而食厚祿因乘富貴之資力以與民爭利於下民安能如之哉是故眾其奴婢多其牛羊廣其田宅博其產業畜其積委務此而亡已以迫蹴民民日削月朘寖以大窮富者奢侈羡溢貧者窮急愁苦窮急愁苦而上不救則民不樂生民不樂生尚不避死安能避罪此刑罰之所以蕃而姦邪不可勝者也故受祿之家食祿而已不與民爭業然後利可均布而民可家足此上天之理而亦太古之道天子之所宜法以為制大夫之所當循以為行也故公儀子相魯師古曰公儀休之其家見織帛怒而出其妻食於舍而茹葵慍而拔其葵曰吾已食祿又奪園夫紅女利虖師古曰紅讀曰工古之賢人君子在列位者皆如是是故下高其行而從其教民化其廉而不貪鄙及至周室之衰其卿大夫緩於誼而急於利亡推讓之風而有爭田之訟故詩人疾而刺之曰節彼南山惟石巖巖赫赫師尹民具爾瞻師古曰小雅節南山之詩也爾好誼則民鄉仁而俗善爾好利則民好邪而俗敗由是觀之天子大夫者下民之所視效遠方之所四面而內望也近者視而放之遠者望而效之豈可以居賢人之位而為庶人行哉夫皇皇求財利常恐乏匱者庶人之意也皇皇求仁義常恐不能化民者大夫之意也易曰負且乘致寇至師古曰此易解卦六三爻辭也乘車者君子之位也負擔者小人之事也此言居君子之位而為庶人之行者其患禍必至也漢書哀帝紀綏和二年詔曰河間王良喪太后三年為宗室儀表益封萬戶又曰制節謹度以防奢淫為政所先百王不易之道也諸侯王列侯公主吏二千石及豪富民多畜奴婢田宅亡限與民爭利百姓失職重困不足其議限列師古曰令條列而為限禁有司條奏諸王列侯得名田國中列侯在長安及公王名田縣道關內侯吏民名田皆無得過三十頃諸侯王奴婢二百人列侯公主百人關內侯吏民三十人年六十以上十歲以下不在數中賈人皆不得名田為吏犯者以律論諸名田畜奴婢過品皆沒入縣官漢書貢禹傳自禹在位數言得失書數十上又欲令近臣自諸曹侍中以上家亡得私販賣與民爭利犯者輒免官削爵不得仕宦新唐書蘇世長傳附子蘇良嗣良嗣高宗時為周王府司馬垂拱初遷冬官尚書拜納言封溫國公留守西京賞遇尤渥尚方監裴匪躬案諸苑建言鬻果蔬儲利佐公上良嗣曰公儀休一諸侯相拔葵去織未聞天子賣果蔬與人爭利遂止輕利重義第三史記魏世家惠王數被於軍旅卑體厚幣以招賢者鄒衍淳于髡孟軻皆至梁梁惠王曰叟不遠千里辱幸至弊邑之庭將何以利吾國孟軻曰君不可以言利若是夫君欲利則大夫欲利大夫欲利則庶人欲利上下爭利國則危矣為人君仁義而已矣何以利為史記陳世家楚莊王為夏徵舒殺靈公率諸侯伐陳謂陳曰無驚吾誅徵舒而巳已誅徵舒因縣陳群臣畢賀時申叔使齊來還獨不賀莊王問其故對曰鄙語有之牽牛徑人田田主奪之牛徑則有罪矣奪之牛不亦甚乎今王徵兵諸侯以義伐之以利其地何以令天下是以不賀莊王曰善乃復君陳如故是為成公孔子讀史記至楚復陳曰賢哉楚莊王輕千乘之國而重一言前漢公孫洪傳元始中修功臣後下詔曰漢興已來股肱在位身行儉約輕財重義未有若公孫弘者也位在宰相封侯而為布被脫粟之飯奉祿以給故人賓客無有所餘可謂減於制度而率下篤俗也前漢成帝紀永始四年詔曰聖王明禮制以序尊卑異車服以章有德雖有其財而無其尊不得踰制故民興行上義而下利前漢楊敞傳惲受父財五百万及身封侯皆以分宗族後母無子財亦數百万死皆予惲惲盡復分後母昆弟再受訾千餘万皆以分施其輕財好義如此後漢朱雋傳少孤母嘗販繒為業雋好義輕財時同郡周規辟公府當行假郡庫錢百万以為冠幘費而後倉卒督責規家貧無以備雋乃竊母繒帛為規解對母深恚責之雋曰小損當大益必然埋也後漢李固傳奏記曰春秋褒儀父以開義路貶無駭以閉利門夫義路閉則利門開利門開則義路閉也吳朱桓傳輕財貴義兼以彊識與人一面數十年不忘部曲萬口妻子盡識之愛養吏士贍獲六親俸祿產業皆與共分餘見國士之風凌統傳箋證史記魏世家三十三年秦孝公卒商君亡秦歸魏魏怒不入三十五年與齊宣王會平阿南集解駰按地理志沛郡有平阿縣也惠王數敗於軍旅卑禮厚幣以招賢者鄒衍淳于頔孟軻皆至梁梁惠王曰寡人不佞兵三折於外太子虜上將死國以空虛以羞先君宗廟社稷寡人甚醜之叟不遠千里辱幸至弊邑之廷將何以利吾國孟軻曰君不可以言利若是夫君欲利則大夫欲利大夫欲利則庶人欲利上下爭利國則危矣為人君仁義而已矣何以利為史記陳杞世家成公元年冬楚莊王為夏徵舒殺靈公率諸侯伐陳謂陳曰無驚吾誅徵舒而已巳誅徵舒因縣陳而有之群臣畢賀申叔時使於齊來還獨不賀莊王問其故對曰鄙語有之牽牛徑人田田主奪之牛徑則有罪矣奪之牛不亦甚乎今王以徵舒為賊弒君故徵兵諸侯以義伐之已而取之以利其地則後何以令於天下是以不賀莊王曰善乃迎陳靈公太子午於晉而立之復君陳如故是為成公孔子讀史記至楚復陳曰賢哉楚莊王輕千乘之國而重一言漢書公孫弘傳元始中脩功臣後下詔曰漢興以來股肱在位身行儉約輕財重義未有若公孫弘者也位在宰相封侯而為布被脫粟之飯奉祿以給故人賓客無有所餘可謂減於制度而率下篤俗者也漢書成帝紀永始四年六月甲午霸陵園門闕災出杜陵諸未嘗御者歸家詔曰迺者地震京師火災婁降朕甚懼之有司其悉心明對厥咎朕將親覽焉又曰聖王明禮制以序尊卑異車服以章有德雖有其財而無其尊不得踰制故民興行上義而下利漢書楊敞傳附子楊惲惲字子幼以忠任為郎補常侍騎惲母司馬遷女也初惲受父財五百萬及身封侯皆以分宗族後母無子財亦數百萬死皆予惲惲盡復分後母昆弟再受訾千餘萬皆以分施其輕財好義如此後漢書朱傳朱字公偉會稽上虞人也少孤母常販繒為業以孝養致名為縣門下書佐好義輕財鄉閭敬之時同郡周規辟公府當行假郡庫錢百萬以為冠幘費而後倉卒督責規家貧無以備乃竊母繒帛為規解對母既失產業深恚責之曰小損當大益初貧後富必然理也後漢書李固傳李固字子堅漢中南鄭人少好學常步行尋師不遠千里出為廣漢雒令至白水關解印綬還漢中杜門不交人事歲中梁商請為從事中郎乃奏記曰春秋褒儀父以開義路貶無駭以閉利門夫義路閉則利門開利門開則義路閉也三國志吳志朱桓傳朱桓字休穆吳郡吳人也桓性護前恥為人下每臨敵交戰節度不得自由輒嗔恚憤激然輕財貴義兼以彊識與人一面數十年不忘部曲萬口妻子盡識之愛養吏士贍護六親俸祿產業皆與共分重利輕義第四前漢地理志周人之失巧偽趨利貴財賤義高富下貧憙於商賈不好仕宦新唐書魏徵傳帝遣使者至西域立葉護可汗未還又遣使齎金帛諸國市馬徵曰今立可汗未定即詣諸國市馬彼必以為意在馬不在立可汗可汗得立必不懷恩諸蕃聞之以中國薄義重利未必得馬而先失義矣魏文帝欲求市西域大珠蘇則以為惠及四海則不求自至求而得之不足貴也箋證漢書地理志周人之失巧偽趨利貴財賤義高富下貧憙為商賈不好仕宦新唐書魏徵傳帝遣使者至西域立葉護可汗未還又遣使齎金帛諸國市馬徵曰今立可汗未定即詣諸國市馬彼必以為意在馬不在立可汗可汗得立必不懷恩諸蕃聞之以中國薄義重利未必得馬而先失義矣魏文帝欲求市西域大珠蘇則以為惠及四海則不求自至求而得之不足貴也見得思義第五後漢鍾離意傳意為尚書時交阯太守張恢坐臧千金伏法以資物簿入大司農簿文記也詔班賜群后意得珠璣悉以委地而不拜賜帝怪而問其故對曰臣聞孔子忍渴於盜泉之水曾參回車於勝母之閭惡其名也勝母邑名也曾子不入水名盜泉仲尼不飲此臧穢之寶誠不敢拜帝嗟嘆曰清乎尚書之言乃更以庫錢三十萬賜意後漢樂羊子妻傳羊子常行路得遺金一餅還以與妻妻曰妾聞志士不飲盜泉之水廉者不受嗟來之食況拾遺求利以污其行乎羊子大慚乃損金於野餘見辭爵位陳蕃傳箋證後漢書鍾離意傳顯宗即位徵為尚書時交阯太守張恢坐臧千金徵還伏法以資物簿入大司農簿文記也詔班賜群臣意得珠璣悉以委地而不拜賜帝怪而問其故對曰臣聞孔子忍渴於盜泉之水曾參回車於勝母之閭惡其名也說苑曰邑名勝母曾子不入水名盜泉仲尼不飲醜其名也尸子又載其言也此臧穢之寶誠不敢拜帝嗟歎曰清乎尚書之言乃更以庫錢三十萬賜意後漢書列女傳樂羊子妻河南樂羊子之妻者不知何氏之女也羊子嘗行路得遺金一餅還以與妻妻曰妾聞志士不飲盜泉之水論語撰考讖曰水名盜泉仲尼不漱廉者不受嗟來之食况拾遺求利以污其行乎羊子大慙乃捐金於野而遠尋師學一年見利忘義第六前漢酈商等傳贊曰當孝文時以酈寄為賣友夫賣友者謂見利而忘義也若寄父為功臣而又執劫雖摧呂祿以安祉稷誼存君親可也前漢蒯通傳說信曰天與弗取反受其咎時至弗行反受其殃願足下孰圖之信曰漢遇我厚吾豈可見利而眥恩乎箋證漢書樊酈滕灌傅靳周傳贊曰當孝文時天下以酈寄為賣友夫賣友者謂見利而忘義也若寄父為功臣而又執劫師古曰周勃等劫其父而令寄行說雖摧呂祿以安社稷誼存君親可也漢書蒯通傳蒯通知天下權在信欲說信令背漢乃先微感信曰僕嘗受相人之術相君之面不過封侯又危而不安相君之背貴而不可言信曰何謂也通因請間曰天下初作難也天下之士雲合霧集魚鱗雜襲今劉項分爭使人肝腦塗地流離中野不可勝數蓋聞天與弗取反受其咎時至弗行反受其殃願足下孰圖之信曰漢遇我厚吾豈可見利而背恩乎棄本逐未弟七史記太史公自序維幣之行以通農商其極則玩巧并兼茲殖爭於機利去本趨未作平準書以觀事變史記貨殖傳夫用貧求富農不如工工不如商剌繡文不如經市門此言未業貧者之資也前漢食貨志文帝即位躬修儉節思安百姓時民近戰國皆背本趨未賈誼說上曰管子曰倉廩實而知禮節民不足而可治者未之嘗聞古之人曰一夫不耕或受之飢一女不織或受之寒生之有時而用之亡度則物力必屈古之治天下至孅至悉也故其畜積足恃今皆本而趨未食者甚眾是天下之大殘也餘見勸農文帝二年詔并成帝詔又見奢侈王符傳箋證史記太史公自序維幣之行以通農商其極則玩巧并兼茲殖爭於機利去本趨末作平準書以觀事變第八史記貨殖列傳凡編戶之民富相什則卑下之伯則畏憚之千則役萬則僕物之理也夫用貧求富農不如工工不如商刺繡文不如倚市門此言末業貧者之資也漢書食貨志文帝即位躬脩儉節思安百姓時民近戰國皆背本趨末賈誼說上曰筦子曰倉廩實而知禮節師古曰筦與管同管子管仲之書也民不足而可治者自古及今未之嘗聞古之人曰一夫不耕或受之饑一女不織或受之寒生之有時而用之亡度則物力必屈古之治天下至孅至悉也故其畜積足恃今背本而趨末食者甚眾是天下之大殘也
