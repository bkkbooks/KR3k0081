body:
  text: 卷第八十貨殖第一前漢貨殖傳子貢既學仲尼退而仕衛發貯鬻財曹魯之間七十子之徒賜最為饒而顏淵簞食瓢飲在于陋巷子貢結駟運騎束帛之幣聘享諸侯所至國君旡不分庭與之亢禮然孔子賢顏淵而譏子貢曰回也其庶乎屢空賜不受命而貨殖焉億則屢中前漢殖貨傳至於蜀卓宛孔齊之刀間公擅山川銅鐵魚鹽市井之入運其籌策上爭王者之利下錮齊民之業錮亦謂專取之皆陷不軌奢僭之惡傷化敗俗大亂之道也前漢張禹傳為人謹厚內殖貨財家以田為樂及富貴多買田至四百頃皆涇渭溉灌極膏腴上賈後漢李通傳李通世以貨殖著姓後漢樊宏傳父重字君雲世善農稼好貨殖性溫厚有法度三世共財故能上下戮力財利歲倍至乃開廣田土三百餘頃所起廬舍皆有重堂高閣陂渠灌注蜀麋竺傳祖世貨殖僮客萬人資産巨萬新唐杜黃裳傳贊曰昔子貢孔堂高第而貨殖韓安國漢名宰而資貪黃裳亦以受餉見疵至於忠烈嶢然則不可掩已新唐裴延齡傳贊曰裴延齡引經誼惑其主以不忠為忠德宗倚延齡韋渠牟等商天下成敗自謂明而卒陷不明君臣回沈可不戒哉憲宗鋭於立功而皇甫鏄以聚斂取宰相夫宰相者乃天下選彼暫勞一功烏足勝任哉中興之不終有為而然箋證漢書貨殖傳子贛既學於仲尼退而仕衛發貯鬻財曹魯之間七十子之徒賜最為饒而顏淵簞食瓢飲在於陋巷子贛結駟連騎束帛之幣聘享諸侯所至國君無不分庭與之亢禮然孔子賢顏淵而譏子贛曰回也其庶乎屢空賜不受命而貨殖焉意則屢中師古曰意讀曰億漢書貨殖傳至於蜀卓宛孔齊之刁間公擅山川銅鐵魚鹽市井之入運其籌策上爭王者之利下錮齊民之業師古曰錮亦謂專取之也皆陷不軌奢僭之惡又况掘冢搏掩犯姦成富曲叔稽發雍樂成之徒師古曰姓曲名叔姓稽名發姓雍名樂成也稽音工奚反猶復齒列師古曰身為罪惡尚復與良善之人齊齒並列傷化敗俗大亂之道也漢書張禹傳張禹字子文河內軹人也禹為人謹厚內殖貨財家以田為業宋祁曰晏本業作樂及富貴多買田至四百頃皆涇渭溉灌極膏腴上賈師古曰賈讀曰價後漢書李通傳李通字次元南陽宛人也世以貨殖著姓後漢書樊宏傳樊宏字靡卿南陽湖陽人也世祖之舅其先周仲山甫封于樊因而氏焉為鄉里著姓父重字君雲世善農稼好貨殖重性溫厚有法度三世共財子孫朝夕禮敬常若公家其營理産業物無所棄課役童隸各得其宜故能上下戮力財利歲倍至乃開廣田土三百餘頃其所起廬舍皆有重堂高閣陂渠灌注三國志蜀志麋竺傳麋竺字子仲東海朐人也祖世貨殖僮客萬人資産巨億搜神記曰竺嘗從洛歸未達家數十里路傍見一婦人從竺求寄載行可數里婦謝去謂竺曰我天使也當往燒東海麋竺家感君見載故以相語竺因私請之婦曰不可得不燒如此君可馳去我當緩行日中火當發竺乃還家遽出財物日中而火大發新唐書杜裴李韋傳贊曰杜黃裳善謀裴垍能持法李藩鯁挺韋貫之忠實皆足穆天縡經國體撥衰奮王菑攘四方憲宗中興寧不謂得人而致然邪昔子貢孔堂高第而貨殖韓安國漢名宰而資貪黃裳亦以受餉見疵至於忠烈默然則不可掩已新唐書白裴等傳贊曰裴延齡引經誼惑其主以不忠為忠德宗倚延齡韋渠牟等商天下成敗自謂明而卒陷不明君臣回沈可不戒哉憲宗鋭於立功而皇甫鎛以聚斂取宰相夫宰相者乃天下選彼暫勞一功烏足勝任哉中興之不終有為而然儲畜第二史記平準書漢興七十餘年之間國家旡事非遇水旱之災則人給家足都鄙廩庾皆滿而府庫餘貨財京師之錢纍巨萬貫朽而不可校太倉之粟陳陳相因充溢露積於外至腐敗不可食前漢食貨志賈誼曰夫積貯者天下之大命也苟粟多而財有餘何為而不成以攻則取以守則固以戰則勝懷敵附遠何招而不至今歐民而歸之農皆著於本歐亦驅字著音直略反使天下各食其力末技游食之民轉而緣南畝則畜積足而人樂其所矣前漢食貨志鼂錯說上曰聖王在上而民不凍飢者非能耕而食之織而衣之也為開其資財之道也故堯禹有九年之水湯有七年之旱而國亡捐瘠者以畜積多而備先具也又曰夫寒之於衣不待輕暖飲之於食不待甘旨飢寒至身不顧廉恥人情一日不再食則飢終歲不製衣則寒夫腹飢不得食膚寒不得衣雖慈父不能保其子君安能以有其民哉明主知其然也故務民於農桑薄賦斂廣畜積以實倉廩備水旱故民可得而有也前漢志曰民三年耕則餘一年之畜衣食足而知榮辱廉讓生而爭訟息故三載考績三考黜陟餘三年食進業曰登再登曰平餘六年食三登曰太平二十七歲遺九年食然後至德流洽禮樂成焉上農工諸事業曰登前漢梁孝王傳府庫金錢且百巨萬珠玉寶器多於京師前漢地理志宋地湯止毫故其民猶有先王遺風重厚多君子好稼穡惡衣食以致畜藏後漢孝章紀詔曰王者八政以食為本故古者急耕稼之業致耒耟之勤節用儲畜以備凶災是以歲雖不登而人旡飢色後漢仲長統傳損益篇曰夫人待君子然後化理國待畜積乃無憂患君子非自農桑以求衣食者也蓄積非撗賦斂以取優饒者也奉祿誠厚則割剝貿易之罪乃可絶也蓄積誠多則兵寇水旱之災不足苦也故由其道而得之民不以為奢由其道而取之民不以為勞魏董卓傳築郿塢高與長安城埒積榖為三十年儲云事成雄據大下不成守此足以畢老晉羊祜傳吳石城守去襄陽七百餘里每為邊害祜患之竟以詭計令吳罷守於是戍邏減半分以墾田八百餘頃大獲其利祜之始至也軍無百日之糧及至季年有十年之積唐太宗正觀二年初詔天下州郡並置義倉新唐周上疏曰自古以來國之興亡不由積畜多少唯在百姓苦樂也且以近事驗之隨家貯洛口倉而李密因之積布帛東都而王世充據之西京府庫亦為國家之用向使洛口東都無粟帛則王世充李密未能必聚大衆但貯積者固有國之常事要當人有餘力而後收之豈人勞而強斂之以資冠邪新唐書韋嗣立傳嗣立建言今廩帑耗竭旡一歲之儲假遇水旱人須賑給不時軍興士待資裝陛下何以具之伏見營立寺觀纍年不絶鴻侈繁麗務相矜勝大抵費常千萬以上轉徙木石廢功害農新唐崔融上疏曰文王曰帝王富其人霸王富其地理國若不足亂國若有餘古人有言帝王藏於天下諸侯藏於百姓農夫藏於庾商賈藏於篋箋證史記平準書漢興七十餘年之間國家無事非遇水旱之災民則人給家足都鄙廩庾皆滿而府庫餘貨財京師之錢纍巨萬貫朽而不可校集解如淳曰校數也太倉之粟陳陳相因充溢露積於外至腐敗不可食漢書食貨志賈誼說上曰夫積貯者天下之大命也苟粟多而財有餘何為而不成以攻則取以守則固以戰則勝懷敵附遠何招而不至今毆民而歸之農皆著於本師古曰毆亦驅字著音直略反使天下各食其力末技游食之民轉而緣南畝則畜積足而人樂其所矣漢書食貨志鼂錯復說上曰聖王在上而民不凍饑者非能耕而食之織而衣之也為開其資財之道也故堯禹有九年之水湯有七年之旱而國亡捐瘠者以畜積多而備先具也夫寒之於衣不待輕暖饑之於食不待甘旨饑寒至身不顧廉恥人情一日不再食則饑終歲不製衣則寒夫腹饑不得食膚寒不得衣雖慈母不能保其子君安能以有其民哉明主知其然也故務民於農桑薄賦斂廣畜積以實倉廩備水旱故民可得而有也漢書食貨志民三年耕則餘一年之畜師古曰畜讀曰蓄其下並同衣食足而知榮辱廉讓生而爭訟息故三載考績孔子曰苟有用我者期月而已可也三年有成成此功也師古曰論語載孔子之言也用謂使為政期月可以易俗三年乃得成功也三考黜陟餘三年食進業曰登鄭氏曰進上百工之業也或曰進上農工諸事業名曰登再登曰平餘六年食三登曰泰平二十七歲遺九年食然後王德流洽禮樂成焉宋祁曰邵本王德作至德漢書文三王傳梁孝王武於是孝王築東苑方三百餘里廣雎陽城七十里擬於天子師古曰擬比也音擬招延四方豪桀自山東游士莫不至齊人羊勝公孫詭鄒陽之屬公孫詭多奇邪計初見日王賜千金官至中尉號曰公孫將軍多作兵弩弓數千萬而府庫金錢且百巨萬珠玉寶器多於京師漢書地理志宋地房心之分壄也今之沛梁楚山陽濟陰東平及東郡之高昌壽張皆宋分也周封微子於宋今之雎陽是也昔堯作游成陽如淳曰作起也成陽在定陶今有堯冢靈臺師古曰作游者言為宮室遊止之處也舜漁靁澤師古曰漁捕魚也靁古雷字湯止于亳故其民猶有先王遺風重厚多君子好稼穡惡衣食以致畜藏後漢書章帝紀元和元年二月甲戌詔曰王者八政以食為本尚書洪範八政一曰食是為政本故古者急耕稼之業致耒耜之勤節用儲蓄以備凶災是以歲雖不登而人無飢色後漢書仲長統傳損益篇曰夫人待君子然後化理國待蓄積乃無憂患君子非自農桑以求衣食者也蓄積非橫賦斂以取優饒者也奉祿誠厚則割剝貿易之罪乃可絶也蓄積誠多則兵寇水旱之災不足苦也故由其道而得之民不以為奢由其道而取之民不以為勞三國志魏志董卓傳築郿塢高與長安城埒積榖為三十年儲云事成雄據天下不成守此足以畢老晉書羊祜傳吳石城守去襄陽七百餘里每為邊害祜患之竟以詭計令吳罷守於是戍邏減半分以墾田八百餘頃大獲其利祜之始至也軍無百日之糧及至季年有十年之積舊唐書太宗本紀貞觀二年初詔天下州縣並置義倉新唐書馬周傳馬周字賓王博州茌平人周上疏曰自古以來國之興亡不由積蓄多少在百姓苦樂也且以近事驗之隋貯洛口倉而李密因之積布帛東都而王世充據之西京府庫亦為國家之用向使洛口東都無粟帛王世充李密未能必聚大衆但貯積者固有國之常要當人有餘力而後收之豈人勞而強斂之以資寇邪新唐書韋嗣立傳嗣立字延構中宗景龍中拜兵部尚書同中書門下三品時崇飾觀寺用度百出嗣立建言今廩帑耗竭無一歲之儲假遇水旱人須賑給不時軍興士待資裝陛下何以具之伏見營立寺觀纍年不絶鴻侈繁麗務相矜勝大抵費常千萬以上轉徙木石廢功害舊唐書崔融傳崔融齊州全節人初應八科舉擢第纍補黃門丞兼直崇文館學士中宗在春宮制融為侍讀兼侍屬文東朝表疏多成其手聖歷中則天幸嵩嶽見融所撰啓母廟碑深加歎美長安二年再遷鳳閣舍人三年兼修國史時有司表稅關市融深以為不可上疏諫曰文王曰帝王富其人霸王富其地理國若不足亂國若有餘古人有言帝王藏於天下諸侯藏於百姓農夫藏於庾商賈藏於篋無儲畜第三前漢武帝紀元狩三年有司請收銀錫造白金及皮弊以足用時國用不足見餘貨志前漢魏相傳王法必本於農而務積聚量入制用以備凶災亡六年之畜尚謂之急元鼎三年平原勃海太山東郡溥被災害民餓死於道路二千石不豫慮其難使至於此晉食貨志王赧云季徙都西周九鼎淪沒二南堙盡貸於百姓無以償之乃上曾臺以避其責周人為王所居為逃責臺晉王導傳時帑藏空竭庫子惟有綀數千端鬻之不售而國用不給導乃與朝賢俱制綀布單衣於是士人翕然競服之綀遂踊貴端至一金其為時所慕如此新唐劉蕡對策曰臣前所謂國廩罕蓄本乎冗食尚繁者臣謹按春秋藏孫辰告糴于齊春秋譏其無九年之蓄一年不登而百姓飢臣願斥游墮之人以篤其耕殖省不急之費以贍黎元則廩蓄不乏矣箋證漢書武帝紀元狩四年冬有司言關東貧民徙隴西北地西河上郡會稽凡七十二萬五千口縣官衣食振業用度不足請收銀錫造白金及皮幣以足用應劭曰時國用不足以白鹿皮為幣朝覲以薦璧又造銀錫為白金見食貨志初算緡錢漢書魏相傳臣謹案王法必本於農而務積聚量入制用以備凶災亡六年之畜尚謂之急元鼎二年平原渤海太山東郡溥被災害民餓死於道路二千石不豫慮其難使至於此賴明詔振救乃得蒙更生晉書食貨志王赧云季徙都西周九鼎淪沒二南堙盡貸於百姓無以償之乃上層臺以避其責周人謂王所居為逃責臺者也晉書王導傳導善於因事雖無日用之益而歲計有餘時帑藏空竭庫中惟有綀數千端鬻之不售而國用不給導患之乃與朝賢俱制綀布單衣於是士人翕然競服之綀遂踊貴乃令主者出賣端至一金其為時所慕如此新唐書劉蕡傳文宗即位思洗元和宿恥太和二年舉賢良方正能直言極諫帝引諸儒百餘人于廷蕡對曰臣誠不佞有正國致君之術無位而不得行有犯顏敢諫之心無路而不得達臣前所謂國廩罕蓄本乎冗食尚繁者臣謹按春秋臧孫辰告糴于齊春秋譏其無九年之蓄一年不登而百姓飢臣願斥游惰之人以篤耕殖省不急之賦以贍黎元則廩蓄不乏矣富國強兵第四乂記伯夷傳管仲既相齊以區區之齊在海濱通貨積財富國彊兵與俗同好惡故其稱曰倉廩實而知禮節衣食足而知榮辱晉載記王猛傳猛宰政公平流放尸素拔幽滯顯賢材外修兵革內崇儒學勸課農桑於是兵強國富垂及升平猛之力也新唐第五琦傳少以吏幹進頗能言彊國富民術箋證史記管仲傳管仲既任政相齊以區區之齊在海濱通貨積財富國彊兵與俗同好惡故其稱曰倉廩實而知禮節衣食足而知榮辱上服度則六親固四維不張國乃滅亡下令如流水之原令順民心晉書載記王猛傳猛宰政公平流放尸素拔幽滯顯賢才外修兵革內崇儒學勸課農桑教以廉恥無罪而不刑無才而不任庶績咸熙百揆時敘於是兵強國富垂及升平猛之力也新唐書第五琦傳第五琦字禹圭京兆長安人少以吏幹進頗能言彊國富民術不事生産第五前漢高祖常有大度不事家人生産作業前漢董仲舒傳及去位歸居終不問家産業以修學著書為事前漢李廣傳得賞賜輒分其戲下飲食與士卒共之家無餘財終不言生産事前漢朱買臣家貧好讀書不治産業常艾薪樵賣以給食後漢齊武王縯傳縯性剛毅慷慨有大節自王莽篡漢常憤憤懷復社稷之慮不事家人居業傾身破産交結天下後漢侯霸傳霸矜嚴有威容家纍千金不事産業篤志好學後漢郭丹傳范遷有清行代丹為司徒有宅數畝田不過一頃復推與兄子其妻常謂曰君有四子而無立錐之地可餘奉祿以為後世業遷曰吾備位大臣而蓄財求利何以示後世魏滿寵傳遷為太尉寵不治産業家無餘財詔曰賜田十頃榖五百斛錢二十萬以明清忠儉之節焉蜀巴代法正為尚書令躬履清儉不治産業晉阮放性清約不營産業為吏部郎不免饑寒王導庾亮以其名士常供給衣食新唐書綰儉約未嘗問生事祿稟分姻舊隨多寡輒盡新唐書張鎬傳鎬起布衣二朞至宰相居身廉不殖資産善待士性簡重論議有體在位雖淺而天下之人推為舊德云餘見慱覽百家杜夷傳又見好學王歡傳箋證漢書高帝紀高祖為人隆準而龍顏美須髯左股有七十二黑子寬仁愛人意豁如也常有大度不事家人生産作業漢書董仲舒傳及去位歸居終不問家産業以修學著書為事漢書李廣傳廣歷七郡太守前後四十餘年得賞賜輒分其戲下飲食與士卒共之家無餘財終不言生産事漢書朱買臣傳朱買臣字翁子吳人也家貧好讀書不治産業常艾薪樵賣以給食擔束薪行且誦書後漢書齊武王縯傳齊武王縯字伯升光武之長兄也性剛毅慷慨有大節自王莽篡漢常憤憤懷復社稷之慮不事家人居業傾身破産交結天下雄俊後漢書侯霸傳侯霸字君房河南密人也族父淵以宦者有才辨任職元帝時佐石顯等領中書號曰大常侍成帝時任霸為太子舍人霸矜嚴有威容家纍千金不事産業篤志好學師事九江太守房元治榖梁春秋為元都講後漢書郭丹傳以河南尹范遷有清行代為司徒遷字子廬沛國人初為漁陽太守以智略安邊胸奴不敢入界及在公輔有宅數畝田不過一頃復推與兄子其妻嘗謂曰君有四子而無立錐之地可餘奉祿以為後世業遷曰吾備位大臣而蓄財求利何以示後世三國志魏志滿寵傳景初二年以寵年老徵還遷為太尉寵不治産業家無餘財詔曰君典兵在外專心憂公有行父祭遵之風賜田十頃榖五百斛錢二十萬以明清忠儉約之節焉三國志蜀志劉巴傳建安二十四年先主為漢中王巴為尚書後代法正為尚書令躬履清儉不治産業又自以歸附非素懼見猜嫌恭默守衛退無私交非公事不言晉書阮籍傳附族弟阮放放素知名而性清約不營産業為吏部郎不免饑寒王導庾亮以其名士常供給衣食新唐書楊綰傳綰儉約未嘗問生事祿稟分姻舊隨多寡輒盡新唐書張鎬傳鎬起布衣二朞至宰相居身廉不殖資産善待士性簡重論議有體在位雖淺而天下之人推為舊德云積而能散第六史記齊太公世家武王將代紂散鹿臺之錢發巨橋之粟以振貧民史記齊太公世家頃公弛苑囿薄賦斂振孤問疾虛即聚以救民民亦大說前漢楚元王傳德寬厚好施生家産過百萬則以振昆弟賓客飲食曰富民池怨也前漢公孫洪傳弘身食一肉脫粟飯故人賓客仰衣食奉祿皆以給之家無所餘前漢循吏傳朱邑身為列卿居處儉節祿賜以共九族鄉黨家亡餘財後漢馬援傳處田牧至有牛馬羊數千頭榖數萬斛既而歎曰凡殖貨財産貴其能施賑也否則守錢虜耳乃盡散以班昆弟故舊後漢折像傳感多藏厚亡之義乃散金帛資産周施親疏或諫像曰君三男兩女孫息盈前當增益産業何為單竭乎像曰昔鬭子文有言我乃逃禍非避富也吾門戶殖財日久盈滿之咎道家所忌今世將衰子又不才不仁而富謂之不幸牆隙而高其崩必疾也智者聞之咸服焉魏甄皇后傳後天下兵亂加以饑饉百姓皆賣金銀珠玉寶物時后家大有儲榖頗以買之后年十餘歲白母曰今世亂而多買寶物匹夫無罪懷璧為罪不如以榖振給親族鄰里廣為恩惠也舉家稱善即從后言魏溫恢傳父恕為涿郡太守卒恢年十五送喪還歸鄉里內足於財恢曰世方亂安以富為一朝盡散振施宗族州里高之比之郇越晉石苞子石崇傳緑珠死崇曰吾不過流徒交廣耳及車載詣東市崇乃歎曰奴輩利吾家財牧者答曰知財致害何不早散之崇不能答晉汜騰傳屬天下兵亂去官閉門不出歎曰生於亂代貧乃可以免散家財宗族灌園琴書自適箋證史記齊太公世家居二年紂殺王子比干囚箕子武王將伐紂卜龜兆不吉風雨暴至群公盡懼唯太公彊之勸武王武王於是遂行十一年正月甲子誓於牧野伐商紂紂師敗績紂反走登鹿臺遂追斬紂明日武王立于社群公奉明水衛康叔封布采席師尚父牽牲史佚策祝以告神討紂之罪散鹿臺之錢發巨橋之粟以振貧民封比干墓釋箕子囚遷九鼎修周政與天下更始史記齊太公世家十一年晉初置六卿賞鞍之功齊頃公朝晉欲尊王晉景公晉景公不敢受乃歸歸而頃公弛苑囿薄賦斂振孤問疾虛積聚以救民民亦大說漢書楚元王傳德寬厚好施生每行京兆尹事多所平反罪人家産過百萬則以振昆弟賓客食飲曰富民之怨也漢書公孫弘傳弘身食一肉脫粟飯故人賓客仰衣食奉祿皆以給之家無所餘漢書循吏傳朱邑傳身為列卿居處儉節祿賜以共九族鄉黨家亡餘財後漢書馬援傳因處田牧至有牛馬羊數千頭穀數萬斛既而歎曰凡殖貨財産貴其能施賑也否則守錢虜耳乃盡散以班昆弟故舊身衣羊裘皮褲後漢書折像傳國有資財二億家僮八百人像幼有仁心不殺昆蟲不折萌芽能通京氏易好黃老言及國卒感多藏厚亡之義乃散金帛資産周施親疏或諫像曰君三男兩女孫息盈前當增益壽業何為坐自殫竭乎像曰昔鬭子文有言我乃逃禍非避富也吾門戶殖財日久盈滿之咎道家所忌今世將衰子又不才不仁而富謂之不幸牆隙而高其崩必疾也智者聞之咸服焉三國志魏志文昭甄皇后傳文昭甄皇后中山無極人明帝母漢太保甄邯後也世吏二千石父逸上蔡令后三歲失父後天下兵亂加以饑饉百姓皆賣金銀珠玉寶物時后家大有儲穀頗以買之后年十餘歲白母曰今世亂而多買寶物匹夫無罪懷璧為罪又左右皆饑乏不如以穀振給親族鄰里廣為恩惠也舉家稱善即從后言三國志魏志溫恢傳溫恢字曼基太原祁人也父恕為涿郡太守卒恢年十五送喪還歸鄉里內足於財恢曰世方亂安以富為一朝盡散振施宗族州里高之比之郇越晉書石苞傳附石子崇緑珠泣曰當效死於官前因自投于樓下而死崇曰吾不過流徙交廣耳及車載詣東市崇乃歎曰奴輩利吾家財收者答曰知財致害何不早散之崇不能答晉書隱逸列傳泛騰傳泛騰字無忌敦煌人也舉孝廉除郎中屬天下兵亂去官還家太守張閟造之閉門不見禮遺一無所受歎曰生於亂世貴而能貧乃可以免散家財五十萬以施宗族柴門灌園琴書自適
