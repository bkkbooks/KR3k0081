body:
  text: 卷第四十七任德不任兵第一史記周本紀穆王將征犬戎祭公諫曰不可先王耀德不觀兵夫兵戢而時動動則威觀則玩玩則無震是故周文公之頌曰載戢干戈載櫜弓矢先王之於民也茂正其德武王致戎於商牧非務武也勤恤民隱而除其害也王不從後漢陳禪傳北匈奴入遼東追拜禪遼東太守胡憚其威強退還數百里禪不加兵但使吏卒往曉慰之單于隨使還郡禪於學行禮為說道義以感化之單于懷服遺以胡中珍貨而去後漢鄭太傳義兵起卓乃會公卿議大發卒討之群僚莫敢忤旨太恐其眾多益橫凶強難制獨曰夫政在德不在眾也魏裴潛傳時代郡大亂以潛為太守烏丸王及其大人凡三人各自稱單于專制郡事前太守莫能治正太祖欲授潛精兵以鎮討之潛辭曰單于自知放橫內不自安今多將兵往必懼而拒境少將則不見憚宜以計謀圖之不可以兵威迫也遂單騎之郡單于驚喜潛撫之以靜單于以下脫帽頓顙悉還前後所掠婦女器械財物潛案誅郡中大吏與單于為表裡者郝溫郭端等十餘人北邊大震百姓歸心晉阮种傳問戎蠻猾夏對曰臣聞王者之伐有征無戰懷遠以德而不聞以兵夫兵凶器而戰危事也兵興則傷農眾集則費積農傷則人匱積費則國虛前漢趙充國傳兵至罕地令軍母燔聚落芻牧田中罕羌聞之喜曰漢果不擊我矣豪靡忘使人來言願得還復故地充國以聞未報靡忘來自歸充國賜飲食遣還諭種人護軍以下皆爭之曰此反虜不可擅遣充國曰諸君但欲便文自營非為公家忠計也語未卒璽書報令靡忘以贖論後罕更不煩兵而下餘見仁義之兵羊祜傳又見勞而無功臧宮傳箋證史記周本紀穆王即位春秋已五十矣穆王將征犬戎祭公謀父諫曰不可先王耀德不觀兵夫兵戢而時動動則威觀則玩玩則無震是故周文公之頌曰載戢干戈載櫜弓矢我求懿德肆于時夏允王保之先王之於民也茂正其德而厚其性阜其財求而利其器用明利害之鄉以文修之使之務利而辟害懷德而畏威故能保世以滋大商王帝辛大惡于民武王以致戎于商牧是故先王非務武也勤恤民隱而除其害也後漢書陳禪傳會北匈奴入遼東追拜禪遼東太守胡憚其威彊退還數百里禪不加兵但使吏卒往曉慰之單于隨使還郡禪於學行禮為說道義以感化之單于懷服遺以胡中珍貨而去後漢書鄭太傳鄭太字公業河南開封人司農眾之曾孫也義兵起卓乃會公卿議大發卒討之群僚莫敢忤旨公業恐其眾多益橫凶彊難制獨曰夫政在德不在眾也三國志魏志裴潛傳裴潛避亂荊州劉表待以賓禮時代郡大亂以潛為代郡太守烏丸王及其大人凡三人各自稱單于專制郡事前太守莫能治正太祖欲授潛精兵以鎮討之潛辭曰代郡戶口殷眾士馬控弦動有萬數單于自知放橫日久內不自安今多將兵往必懼而拒境少將則不見憚宜以計謀圖之不可以兵威迫也遂單車之郡單于驚喜潛撫之以靜單于以下脫帽稽顙悉還前後所略婦女器械財物潛案誅郡中大吏與單于為表裏者郝溫郭端等十餘人北邊大震百姓歸心晉書阮种傳是時西虜內侵災眚屢見百姓饑饉詔三公卿尹常伯牧守各舉賢良方正直言之士於是太保何曾舉种賢良又問戎蠻猾夏對曰臣聞王者之伐有征無戰絕遠以德不聞以兵夫兵凶器而戰危事也兵興則傷農眾集則廢積農傷則人匱積費則國虛漢書趙充國傳兵至罕地令軍毋燔聚落芻牧田中罕羌聞之喜曰漢果不擊我矣豪靡忘使人來言願得復還故地充國以聞未報靡忘來自歸充國賜飲食遣還諭種人護軍以下皆爭之曰此反虜不可擅遣充國曰諸君但欲便文自營非為公家忠計也語未卒璽書報令靡忘以贖論後罕竟不煩兵而下兵不血刃第二魏鍾會傳姜維降會上言曰仁育群生義征不譓殊俗向化無思不服師不踰時兵無血刃萬里同風九州共貫吳孫權傳趙咨使魏魏帝問曰吳王何等主也咨對曰聰明仁智雄略之主也帝問其狀咨曰納魯肅於凡品是其聰也拔呂蒙於行陣是其明也獲其禁而不害是其仁也取荊州而兵不血刃是其智也據三州虎視於天下是其雄也屈身於陛下是其略也晉侃斬默等默在中原數與石勒等戰賊畏其勇聞侃討之兵不血刃而擒也晉王濬傳遷益州刺史武帝謀伐吳詔濬造船於蜀其木柹蔽江而下吳建平太守吳彥取流柹以呈孫皓曰晉必有攻吳之計宜增兵建平不下終不敢渡皓不從太康元年濬發自成都吳人於江險磧要害之處並以鐵鎖橫截之又作鐵錐長丈餘暗置江中以逆拒船濬乃作大筏先行筏過鐵錐錐著後不去又作火炬長十餘丈大數十圍灌以麻油在船前遇鎖燃炬燒之須臾融液斷絕於是船無所礙濬自發蜀兵不血刃攻無堅城皓遣兵禦之望旗而散用薛瑩胡沖計送降文於濬晉載記赫連勃勃傳勃勃謂王買德曰朕將進圖長安卿試言方略買德曰宜置遊兵斷其去來之路然後杜潼關塞崤陝絕其水陸之道陛下聲檄長安申布恩澤三輔父老皆壺漿以迎王師矣義真獨坐空城逃竄無所一旬之間必面縳麾下所謂兵不血刃不戰而自定也勃勃善之晉載記禿髮傉檀傳史臣曰傉檀承累捷之銳藉二昆之資摧呂氏筭無遺策取姑臧兵不血刃武略雄圖此蹤前烈新唐魏元忠上封事曰周亞夫堅壁以挫吳楚司馬懿閉營而困諸葛亮此皆全軍制勝不戰而卻敵箋證三國志魏志鍾會傳劉禪詣艾降遣使勑維等令降於會維至廣漢郪縣令兵悉放器仗送節傳於胡烈便從東道詣會降會上言曰陛下聖德侔蹤前代翼輔忠明齊軌公旦仁育群生義征不譓殊俗向化無思不服師不踰時兵無血刃萬里同風九州共貫三國志吳志孫權傳劉備帥軍來伐至巫山秭歸權以陸遜為督督朱然潘璋等以拒之遣都尉趙咨使魏魏帝問曰吳王何等主也咨對曰聰明仁智雄略之主也帝問其狀咨曰納魯肅於凡品是其聰也拔呂蒙於行陣是其明也獲于禁而不害是其仁也取荊州而兵不血刃是其智也據三州虎視於天下是其雄也屈身於陛下是其略也晉書陶侃傳侃斬默等默在中原數與石勒等戰賊畏其勇聞侃討之兵不血刃而擒也晉書王濬傳羊祜雅知濬有奇略乃密表留濬於是重拜益州刺史武帝謀伐吳詔濬修舟艦濬造船於蜀其木柹蔽江而下吳建平太守吳彥取流柹以呈孫皓曰晉必有攻吳之計宜增建平兵建平不下終不敢渡皓不從太康元年正月濬發自成都率巴東監軍廣武將軍唐彬攻吳丹陽剋之擒其丹陽監盛紀吳人於江險磧要害之處並以鐵鎖橫截之又作鐵錐長丈餘暗置江中以逆距船先是羊祜獲吳間諜具知情狀濬乃作大筏數十亦方百餘步縛草為人被甲持杖令善水者以筏先行筏遇鐵錐錐輒著筏去又作火炬長十餘丈大數十圍灌以麻油在船前遇鏁燃炬燒之須臾融液斷絕於是船無所礙濬自發蜀兵不血刃攻無堅城夏口武昌無相支抗於是順流鼓棹徑造三山皓遣游擊將軍張象率舟軍萬人禦濬象軍望旗而降皓聞濬軍旌旗器甲屬天滿江威勢甚盛莫不破膽用光祿勳薛瑩中書令胡冲計送降文於濬晉書載記赫連勃勃傳赫連勃勃字屈孑匈奴右賢王去卑之後劉元海之族也劉裕滅泓入于長安遣使遺勃勃書請通和好約為兄弟既而勃勃還統萬裕留子義真鎮長安而還勃勃聞之大悅謂王買德曰朕將進圖長安卿試言取之方略買德曰宜置游兵斷其去來之路然後杜潼關塞崤陜斷其水陸之道陛下聲檄長安申布恩澤三輔父老皆壺漿以迎王師矣義真獨坐空城逃竄無所一旬之間必面縛麾下所謂兵不血刃不戰而自定也勃勃善之晉書載記禿髮傉檀傳史臣曰傉檀承累捷之銳藉二昆之資摧呂氏算無遺策取姑臧兵不血刃武略雄圖比蹤前烈新唐書魏元忠傳魏元忠宋州宋城人為太學生跌蕩少檢久不調盩厔人江融曉兵術元忠從之游盡傳所學儀鳳中吐蕃數盜邊元忠上封事洛陽宮言命將用兵之要曰周亞夫堅壁以挫吳楚司馬懿閉營而困諸葛亮此皆全軍制勝不戰而郤敵以寡擊眾第三史記蘇秦傳臣聞越王句踐戰敝卒三千人禽夫差於干遂武王卒三千人革車三百乘制紂於牧野豈其士卒眾哉前漢高祖紀曰彭越勤勞魏民卑下士卒常以少擊眾數破楚軍其以魏故地王之前漢李廣傳貳師將三萬騎出酒泉擊右賢王於天山召陵欲使為貳師將輜重陵自請曰臣所將屯邊者皆荊楚勇士奇材劍客也願得自當一隊上曰將惡相屬邪吾發軍多毋騎予女陵對無所事騎臣願以少擊眾步兵五千人涉單于庭上壯而許之魏張既傳涼州盧水胡伊健妓妾治元多等反河西大擾帝憂之乃召鄒歧以既代之斬首獲生以萬數詔曰卿踰河歷險以勞擊逸以寡勝眾功過南仲勤踰吉甫此勳非但破胡乃永寧河右使吾長無西顧之念矣晉謝玄傳字幼度符堅強盛邊境被侵朝廷求文武良將可禦者安以幼度應舉累大破堅將及堅自率眾號百萬而涼州之師始達咸陽蜀漢順流幽并係至堅進屯壽陽列陣臨肥水幼度軍不得渡幼度使謂符融曰君遠涉吾境而臨水為陣是不欲速戰諸君稍卻令將士得周旋僕與諸軍緩轡而觀之不亦樂乎堅曰但卻軍令得過而我以鐵騎數十萬向水逼而殺之符融亦為然遂麾使卻陳眾因亂不能止於是幼度與從弟琰桓伊等以情銳八千涉渡肥水進決戰肥水南堅中流矢臨陣斬融堅眾潰自相蹈藉投水死者不可勝計肥水為之不流餘眾棄甲宵遁聞風聲鶴唳以為王師已至草行露宿重以飢凍死者十七八獲堅乘輿雲母車儀服器械軍資珍寶山積牛馬騾驢駱駝十餘萬詔加幼度都督七州軍幼度上疏欲平河北朝議以征役既久宜還鎮幼度於道疾卒新唐馬磷傳肅宗委以東討以百騎破賊五千眾從李光弼攻洛陽史朝義眾十萬陣北邙山旗鎧照日諸將冘疑未敢擊璘率部士五百薄賊屯出入三反眾披靡賊遂潰光弼曰吾用其三十年未見以少擊眾捷如馬將軍者箋證史記蘇秦列傳說魏襄王曰臣聞越王勾踐戰敝卒三千人禽夫差於干遂武王卒三千人革車三百乘制紂於牧野豈其士卒眾哉漢書高帝紀下令曰魏相國建城侯彭越勤勞魏民卑下士卒常以少擊眾數破楚軍其以魏故地王之漢書李廣傳天漢二年貳師將三萬騎出酒泉擊左賢王於天山召陵欲使為貳師將輜重陵召見武臺師古曰未央宮有武臺殿叩頭自請曰臣所將屯邊者皆荊楚勇士奇材劍客也力扼虎射命中願得自當一隊到蘭干山南以分單于兵毋令專鄉貳師軍上曰將惡相屬邪吾發軍多毋騎予女陵對無所事騎臣願以少擊眾步兵五千人涉單于庭上壯而許之三國志魏志張既傳張既字寬容馮翊高陵人也文帝即王位初置涼州以安定太守鄒岐為刺史張掖張進執郡守舉兵拒岐黃華麴演各逐故太守舉兵以應之既進兵為護羌校尉蘇則聲勢故則得以有功既進爵都鄉侯涼州盧水胡伊健妓妾治元多等反河西大擾帝憂之曰非既莫能安荊州乃召鄒岐以既代之斬首獲生以萬數帝甚悅詔曰卿踰河內險以勞擊逸以寡勝眾功過南仲勤踰吉甫此勳非但破胡乃永寧河右使吾長無西顧之念矣晉書謝尚傳附謝玄玄字幼度少頴悟與從兄朗俱為叔父安所器重于時苻堅彊盛邊境數被侵寇朝廷求文武良將可以鎮禦北方者安乃以玄應舉與賊大戰破之斬其偽將都督顏因復進擊又破之追之戰于君川復大破之詔遣殿中將軍慰勞進號冠軍加領徐州刺史還于廣陵以功封東興縣侯及苻堅自率兵次于項城眾號百萬而涼州之師始達咸陽蜀漢順流幽并係至堅進屯陰陽列陣臨肥水玄軍不得渡玄使謂苻融曰君遠涉吾境而臨水為陣是不欲速戰諸君稍卻令將士得周旋僕與諸君緩轡而觀之不亦樂乎堅曰但卻軍令得過而我以鐵騎數十萬向水逼而殺之融亦以為然遂麾使卻陣眾因亂不能止於是玄與琰伊等以精銳八千涉渡肥水石軍距張蚝小退琰玄仍進決戰肥水南堅中流矢臨陣斬融堅眾奔潰自相蹈藉投水死者不可勝計肥水為之不流餘眾棄甲宵遁聞風聲鶴唳皆以為王師已至草行露宿重以飢凍死者十七八獲堅乘輿雲母車儀服器械軍資珍寶山積牛馬驢騾駱駞十萬餘卷七十九案謝玄謝尚子也新唐書馬璘傳馬璘岐州扶風人至德初王室多難統精甲三千自二庭赴鳳翔肅宗奇之委以東討初戰衛南以百騎破賊五千眾從李光弼攻洛陽史朝義眾十萬陣北邙山旗鎧照日諸將冘疑未敢擊璘率部士五百薄賊屯出入三反眾披靡乘之賊遂潰光弼曰吾用兵三十年未見以少擊眾雄捷如馬將軍者降第四前漢蒯通傳通且見信武軍而說之曰必將戰勝而後略也攻得而後下城臣切以為殆矣用臣之計毋戰而略地不攻而下城傳檄而千里定可乎武臣曰何謂也對曰范陽令怯而畏死貪而好富貴故欲以其城先下君先下君而君不利則邊地之城皆將相告曰范陽令先降而身死必將嬰城固守皆為金城湯池不可攻也為君計者莫若以黃屋未輪迎范陽令使馳騖於燕趙之郊則邊城皆將相告曰范陽令先下而身富貴必相率而降猶如阪上走丸也此臣所謂傳檄而千里定者也武臣以車百乘騎二百侯印迎徐公燕趙聞之降者二十餘城如通策焉前漢廣與望氣王朔語曰自漢征匈奴廣未嘗不在其中而而諸妄校尉已下材能不及中以軍功取侯者數十人廣終無尺寸功以得封邑者何也豈吾相不得侯邪朔曰將軍自念豈嘗有恨者乎廣曰吾為隴西守羌嘗反吾誘降者八百餘人詐而同日殺之至今恨獨此耳朔曰禍莫大於殺已降此迺將軍所以不得侯者也廣歷七郡太守前後四十餘年後漢劉盆子傳樊崇乃將盆子及丞相徐宣以下三十餘人肉祖降上憐赦之耳謂崇等曰得無悔降乎朕今遣卿歸營勒兵鳴鼓相攻決其勝負不欲強相服也徐宣等叩頭曰臣等出長安東都門君臣計議歸命聖德今日得降猶去虎口歸慈母誠歡誠喜無所恨也後漢寇恂傳峻遣軍師皇甫文出謁辭禮不屈恂怒將誅文諸將諫曰高峻精兵萬人率多強弩西遮隴道連年不下今欲降之而返戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城門降諸將曰敢問殺其使而降其賊何也恂曰皇甫文峻之腹心其所取計者也今來意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也後漢班超傳時于寘王廣德新攻破莎車遂雄張南道而匈奴遣使監護其國超既西先至干寘廣德禮意甚疏且其俗信巫巫言神怒何故欲向漢漢使有騧馬急求取以祠我廣德乃遣使就超請馬超密知其狀報許之而令巫自來取馬有頃巫至超即斬其首以送廣德因辭讓之廣德素聞超在鄯善誅滅魯使大惶恐即攻殺匈奴使者而降超超重賜其王以下因鎮撫焉蜀譙周傳景耀六年冬魏將鄧艾長驅而前而蜀本調敵不便至不作城守調度及聞艾已入陰平百姓擾擾皆迸山野不可禁制後主使群臣會議或以為蜀之與吳本為和國宜可奔吳或以為南中七郡阻險斗絕易以自守宜可奔南惟周以為自古已來無寄他國為天子者今若入吳固當臣服且政理不殊則大能吞小此數之自然也由此言之則魏能并吳吳不能并魏明矣等為小稱臣孰與為大再辱之恥何與一辱且若欲奔南則當早為之計然後可果今大敵以近群小之心無一可保恐發足之日其變不測何至南之有乎群臣或難周曰今艾以不遠恐不受降如之何周曰方今東吳未賓事勢不得不受之受之後不得不禮若陛下降魏魏不裂土以封陛下者周請身詣京都以古義爭之眾人無以易周之理於是遂從周策劉氏無虞一邦蒙賴周之謀也新唐溫彥博傳彥博被突厥執突厥問唐兵多少及國虛實彥博不肯對太宗立突厥歸款得還貞觀四年詔議安邊者彥博請如漢降匈奴五原塞以為捍蔽新唐裴度傳初蔡平王承宗懼度遣辯士柏耆脅說乃獻德棣二州納質子新唐裴行儉傳行儉既還阿史那伏念偽稱與溫傅合行儉還總諸軍頓代州之陘口縱反閒說伏念令與溫傅相貳伏念懼密送款且請縛傅自效行儉祕不布後數日煙塵漲天而南斥候惶駭行儉曰此伏念執溫傅來降非它也且受降如受敵乃敕嚴備遣單使往勞既而果然於是突厥餘黨悉平箋證漢書蒯通傳楚漢初起武臣略定趙地號武信君通說范陽令徐公曰臣范陽百姓蒯通也竊閔公之將死故弔之雖然賀公得通而生也徐公再拜曰何以弔之通曰足下為令十餘年矣殺人之父孤人之子斷人之足黥人之首甚眾慈父孝子所以不敢事刃於公之腹者畏秦法也今天下大亂秦政不施然則慈父孝子將爭接刃於公之腹以復其怨而成其名此通之所以弔者也曰何以賀得子而生也曰趙武信君不知通不肖使人候問其死生通且見武信君而說之曰必將戰勝而後略地攻得而後下城臣竊以為殆矣用臣之計毋戰而略地不攻而下城傳檄而千里定可乎彼將曰何謂也師古曰彼謂武信君也臣因對曰范陽令宜整頓其士卒以守戰者也怯而畏死貪而好富貴故欲以其城先下君先下君而君不利則邊地之城皆將相告曰范陽令先降而身死必將嬰城固守皆為金城湯池不可攻也為君計者莫若以黃屋朱輪迎范陽令使馳騖於燕趙之郊則邊城皆將相告曰范陽令先下而身富貴必相率而降猶如阪上走丸也此臣所謂傳檄而千里定者也徐公再拜具車馬遣通通遂以此說武臣武臣以車百乘騎二百侯印迎徐公燕趙聞之降者三十餘城如通策焉漢書李廣傳元狩二年代公孫弘為丞相蔡為人在下中師古曰在下輩之中名聲出廣下遠甚然廣不得爵邑官不過九卿廣之軍吏及士卒或取封侯廣與望氣王朔語云自漢擊匈奴廣未嘗不在其中而諸妄校尉已下張晏曰妄猶凡也材能不及中以軍功取侯者數十人廣不為後人然終無尺寸功以得封邑者何也豈吾相不當侯邪朔曰將軍自念豈嘗有恨者乎師古曰恨悔也廣曰吾為隴西守羌嘗反吾誘降者八百餘人詐而同日殺之至今恨獨此耳朔曰禍莫大於殺已降此迺將軍所以不得侯者也廣歷七郡太守前後四十餘年後漢書劉盆子傳劉盆子者太山式人城陽景王章之後也樊崇乃將盆子及丞相徐宣以下三十餘人肉袒降明旦大陳兵馬臨洛水令盆子君臣列而觀之謂盆子曰自知當死不對曰罪當應死猶幸上憐赦之耳帝笑曰兒大黠宗室無蚩者釋名曰蚩癡也又謂崇等曰得無悔降乎朕今遣卿歸營勒兵鳴鼓相攻決其勝負不欲強相服也徐宣等叩頭曰臣等出長安東都門君臣計議歸命聖德百姓可與樂成難與圖始故不告眾耳今日得降猶去虎口歸慈母誠歡誠喜無所恨也後漢書寇恂傳峻據寬平畏誅堅守建威大將軍耿弇率太中大夫竇士武威太守梁統等圍之一歲不拔十年帝入關將自征之進軍及汧峻猶不下帝議遣使降之乃謂恂曰卿前止吾此舉今為吾行也若峻不即降引耿弇等五營擊之恂奉璽書至第一峻遣軍師皇甫文出謁辭禮不屈恂怒將誅文諸將諫曰高峻精兵萬人率多彊弩西遮隴道連年不下今欲降之而反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也後漢書班超傳是時于寘王廣德新攻破莎車遂雄張南道而匈奴遣使監護其國超既西先至于寘廣德禮意甚疎且其俗信巫巫言神怒何故欲向漢漢使有騧馬急求取以祠我廣德乃遣使就超請馬超密知其狀報許之而令巫自來取馬有頃巫至超即斬其首以送廣德因辭讓之廣德素聞超在鄯善誅滅虜使大惶恐即攻殺匈奴使者而降超超重賜其王以下因鎮撫焉三國志蜀志譙周傳景耀六年冬魏大將軍鄧艾克江油長驅而前而蜀本謂敵不便至不作城守調度及聞艾已入陰平百姓擾擾皆迸山野不可禁制後主使群臣會議計無所出或以為蜀之與吳本為和國宜可奔吳或以為南中七郡阻險斗絕易以自守宜可奔南惟周以為自古已來無寄他國為天子者也今若入吳固當臣服且政理不殊則大能吞小此數之自然也由此言之則魏能并吳吳不能并魏明矣等為小稱臣孰與為大再辱之恥何與一辱且若欲奔南則當早為之計然後可果今大敵以近禍敗將及群小之心無一可保恐發足之日其變不測何至南之有乎群臣或難周曰今艾以不遠恐不受降如之何周曰方今東吳未賓事勢不得不受之受之後不得不禮若陛下降魏魏不裂土以封陛下者周請身詣京都以古義爭之眾人無以易周之理後主猶疑於入南周上疏曰於是遂從周策劉氏無虞一邦蒙賴周之謀也新唐書溫彥博傳突厥入寇彥博以并州道行軍長史戰大谷王師敗績被執突厥知近臣數問唐兵多少及國虛實彥博不肯對囚陰山苦寒地太宗立突厥歸款得還授雍州治中尋檢校吏部侍郎貞觀四年遷中書令封虞國公突厥降詔議所以安邊者彥博請如漢置降匈奴五原塞以為捍蔽新唐書裴度傳初蔡平王承宗懼度遣辯士柏耆脅說乃獻德棣二州納質子新唐書裴行儉傳裴行儉字守約絳州聞喜人調露元年突厥阿史德溫傅反詔行儉為定襄道行軍大總管討之行儉縱兵前後殺虜不勝計偽可汗泥熟匐為其下所殺持首來降又禽大首領奉職而還餘黨走狼山行儉既還阿史那伏念偽稱可汗復與溫傅合明年行儉還總諸軍頓代州之陘口縱反間說伏念令與溫傅相貳伏念懼密送且請縳傅自效行儉秘不布密以聞後數日煙塵漲天而南斥候惶駭行儉曰此伏念執溫傅來降非他也且受降如受敵乃敕嚴備遣單使往勞既而果然於是突厥餘黨悉平
