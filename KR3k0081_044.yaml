body:
  text: 卷第四十四儒將第一後漢伏湛傳父理為名儒湛少傳父業時賊徐異卿據富平連攻不下唯云願降伏公帝遣到平原異卿降湛雖在倉卒造次必於文德以為禮樂政化之首顛沛猶不可違是歲奏行鄉飲酒禮遂施行之後漢朱祐傳祐為人質直尚儒學將兵率衆多受降以克定城邑為本不存首級之功後漢盧植傳植與馬日磾蔡雍楊彪韓説等並在東觀校中書五經記傳中書言以別於外中平元年黃巾賊起四府舉植拜北中郎將持節以護烏桓連戰破賊帥張角斬獲万餘人後漢郭涼傳氣力壯猛雖武將然通經書多智略尤曉邊事有名北方後漢孔融傳劉備表領青州剌史建安元年為袁談所攻自春至夏戰士所餘裁數百人流矢兩集戈矛內接融隱几讀書談笑自若城夜陷乃奔東山妻子為談所虜後漢祭遵傳為將軍取士皆用儒術對酒設樂必雅歌投壺又建為孔子立後奏置五經大夫雖在軍旅不忘俎豆可為好禮悅樂守死善道者也後漢張奐傳奐遷使胸奴中郎將時休屠各屠音直於反及朔方烏桓並同反叛燒度遼將軍門煙火相望兵衆大恐各欲亡去奐安坐惟中與弟子講誦自若軍士稍安魏張郃傳郃雖武將而愛樂儒士嘗薦同鄉卑湛經明行修詔曰昔祭遵為將奏置五經大夫居軍中與諸生雅歌投壺今將軍外勒戎旅內存國朝朕嘉將軍之意今擢湛為博士魏夏侯惇傳文帝即王位拜惇大將軍惇雖在軍旅親迎師受業魏李典傳遷破虜將軍屯合肥典好學問貴儒雅不與諸將爭功禮賢士大夫恂恂若不及軍中稱其長者吳魯肅傳注肅治軍整頓禁令必行雖在軍陳手不釋卷又能屬文辭吳孫靜子瑜為丹陽太守濟陰人馬普篤學好古瑜厚禮之使二府將吏子弟數百人就受業遂立學宮臨饗講肄是時諸將皆以軍務為事而瑜好樂墳典雖在戎旅誦聲不絶吳呂蒙傳注初孫權謂蒙及蔣欽曰卿今並當塗掌事宜學問以自開益蒙曰在軍中常苦多務恐不容復讀書權曰孤豈欲卿治經為博士邪但當令涉獵見往事耳宜急讀孫子六韜左傳國語及三史孔子言終日不食終夜不寢以思無益不如學也光武當兵馬之務手不釋卷孟德亦自謂老而好學卿何獨不自勉勗邪蒙始就學篤志不倦其所覽見舊儒不勝晉羊祜傳帝將有滅吳之志以祜為都督荊州諸軍事祜率營兵出鎮南夏開設庠序綏懷遠近甚得江漢之心新唐書鄭畋傳賊將王璠率衆三万來攻畋使弘夫設伏以待璠內輕畋儒柔縱步騎鼓而前畋以鋭卒數千當賊疏陳而多旗幟乘高伐鼓賊不測衆寡陳未整伏發衆皆囂日暮軍四合鏖戰龍尾坡殺賊二万級積尸數十里多獲鎧仗璠遁去禽璠子斬之威動京師時諸鎮兵在寰內尚數方無所歸畋招來之厚加慰結乃與涇原程宗楚秦州仇公遇鄜延李孝恭夏州拓拔思恭約盟傳檄天下時王門不出劍門四方謂王室微不能復興及畋檄至遠近咸聳各治兵思立功奔問行在巢大懼不敢西謀當此時微畋天子幾殆帝聞捷曰朕知畋不盡儒者之勇乃爾蜀志王平傳云平生長戎旅手不能書而所識不過十字而口授作書皆有意理使人讀史漢諸記傳聽之備知其大義往往論説不失其指遵履法度言不戲謔從朝至夕端坐徹日㦎無武將之體箋證後漢書伏湛傳伏湛九世祖勝字子賤所謂濟南伏生者也父理為當世名儒以詩授成帝為高密太傅別自名學為高密王寬傅也寬武帝玄孫廣陵王胥後也前書儒林傳曰伏理字君遊受詩於匡衡由是齊詩有匡伏之學故言別自名學也湛性孝友少傳父業時賊徐異卿等萬餘人據富平連攻之不下唯云願降司徒伏公帝知湛為青徐所信向遣到平原異卿等即曰歸降獲送洛陽湛雖在倉卒造次必於文德以為禮樂政化之首顛沛猶不可違是歲奏行鄉飲酒禮遂施行之後漢書朱祐傳祐為人質直尚儒學將兵率衆多受降以克定城邑為本不存首級之功後漢書盧植傳植深達政宜務存清靜弘大體而已歲餘復徵拜議郎與諫議大夫馬日磾議郎蔡雍楊彪韓説等並在東觀校中書五經記傳補續漢記言中書以別於外也中平元年黃巾賊起四府舉植拜北中郎將持節以護烏桓連戰破賊帥張角斬獲萬餘人後漢書杜茂傳九年與鴈門太守郭涼擊盧芳將尹由於繁畤涼字公文右北平人也身長八尺氣力壯猛雖武將然通經書多智略尤曉邊事有名北方後漢書孔融傳融負其高氣志在靖難而才踈意廣迄無成功在郡六年劉備表領青州刺史建安元年為袁談所攻自春至夏戰士所餘裁數百人流矢雨集戈矛內接融隱几讀書談笑自若城夜陷乃奔山東妻子為談所虜後漢書祭遵傳祭遵字弟孫潁川潁陽人也少好經書家富給而遵恭儉惡衣服遵為將軍取士皆用儒術對酒設樂必雅歌投壺又建為孔子立後奏置五經大夫雖在軍旅不忘俎豆可謂好禮悅樂守死善道者也後漢書張奐傳張奐字然明敦煌酒泉人也遷使胸奴中郎將時休屠各屠音直於反及朔方烏桓並同反叛燒度遼將軍門引屯赤坑煙火相望兵衆大恐各欲亡去奐安坐帷中與弟子講誦自若軍士稍安三國志魏志張郃傳張郃字乂河間鄚人也郃雖武將而愛樂儒士嘗薦同鄉卑湛經明行修詔曰昔祭遵為將奏置五經大夫居軍中與諸生雅歌投壺今將軍外勒戎旅內存國朝朕嘉將軍之意今擢湛為博士九三國志魏志夏侯惇傳文帝即王位拜惇大將軍數月薨惇雖在軍旅親迎師受業三國志魏志李典傳李典字曼成山陽巨野人也遷破虜將軍與張遼樂進屯合肥典好學問貴儒雅不與諸將爭功敬賢士大夫恂恂若不及軍中稱其長者三國志吳志魯肅傳注引吳書曰肅為人方嚴寡於玩飾內外節儉不務俗好治軍整頓禁令必行雖在軍陳手不釋卷又善談論能屬文辭思度弘遠有過人之明周瑜之後肅為之冠三國志吳志孫靜傳附子孫瑜瑜字仲異建安九年領丹陽太守為衆所附至萬餘人濟陰人馬普篤學好古瑜厚禮之使二府將吏子弟數百人就受業遂立學宮臨饗講肄是時諸將皆以軍務為事而瑜好樂墳典雖在戎旅誦聲不絶三國志吳志呂蒙傳注引江表傳曰初權謂蒙及蔣欽曰卿今並當塗掌事宜學問以自開益蒙曰在軍中常苦多務恐不容復讀書權曰孤豈欲卿治經為博士邪但當令涉獵見往事耳卿言多務孰若孤孤少時歷詩書禮記左傳國語惟不讀易至統事以來省三史諸家兵書自以為大有所益如卿二人意性朗悟學必得之寧當不為乎宜急讀孫子六韜左傳國語及三史孔子言終日不食終夜不寢以思無益不如學也光武當兵馬之務手不釋卷孟德亦自謂老而好學卿何獨不自勉勗邪蒙始就學篤志不倦其所覽見舊儒不勝晉書羊祜傳羊祜字叔子泰山南城人也帝將有滅吳之志以祜為都督荊州諸軍事假節散騎常侍衛將軍如故祜率營兵出鎮南夏開設庠序綏懷遠近甚得江漢之心新唐書鄭畋傳鄭畋字台文系出滎陽中和元年賊將王璠率衆三萬來攻畋使弘夫設伏以待璠內輕畋儒柔縱步騎鼓而前畋以鋭卒數千當賊疏陳而多旗幟乘高伐鼓賊不測衆寡陳未整伏發衆皆囂日暮軍四合鏖戰龍尾坡殺賊二萬級積尸數十里多獲鎧仗璠遁去禽璠子斬之威動京師時諸鎮兵在寰內尚數萬無所歸畋招來之厚加慰結乃與涇原程宗楚秦州仇公遇鄜延李孝恭夏州拓拔思恭約盟傳檄天下時王命不出劍門四方謂王室微不能復興及畋檄至遠近咸聳各治兵思立功奔問行在巢大懼不敢西謀當此時微畋天子幾殆帝聞捷曰朕知畋不盡儒者之勇乃爾三國志蜀志王平傳王平字子均巴西宕渠人也平生長戎旅手不能書其所識不過十字而口授作書皆有意理使人讀史漢諸記傳聽之備知其大義往往論説不失其指遵履法度言不戲謔從朝至夕端坐徹日㦎無武將之體卷十三擇將第二前漢鼂錯傳兵法曰有必勝之將無必勝之民繇此觀之安邊境立功名在於良將不可不擇也前漢灌嬰傳楚騎來衆漢王乃擇軍中可為騎將者皆推胡秦騎士重泉人李必駱甲習騎兵今為校尉可為騎將漢王欲拜之必甲曰臣故秦民恐軍不信臣臣願得大王左右善騎者傅之嬰雖少然數力戰乃拜嬰為中大夫令李必駱甲為左右校尉將郎中騎兵擊楚騎於滎陽東大破之後漢寇恂傳并州未安光武難其守問於鄧禹曰諸將誰可使守河內者禹曰昔高祖任蕭何於關中無復西顧之憂所以得專靜山東終成大業今河內帶河為固戶口富實北通上黨南迫雒陽寇恂文武備足有牧人御衆之才非此子莫可使也乃拜恂河內太守行大將軍事新唐高瑀傳忠武軍節度使王沛死衛軍諸將多自謂得之宰相裴度韋處厚以瑀治陳蔡素有狀習軍中情偽欲任之會其軍表丐瑀乃檢校左散騎常侍領忠武節度使自大曆後擇師悉出宦人中尉所輸貨至巨万貧者假貸富人既得所欲則椎斫膏血倍以輸息十常六七及瑀有命士相告曰韋裴作相天下無債帥箋證漢書鼂錯傳是時胸奴強數寇邊上發兵以禦之錯上言兵事曰兵法曰有必勝之將無必勝之民繇此觀之安邊境立功名在於良將不可不擇也漢書灌嬰傳楚騎來衆漢王乃擇軍中可為騎將者皆推故秦騎士重泉人李必駱甲習騎兵今為校尉可為騎將漢王欲拜之必甲曰臣故秦民恐軍不信臣臣願得大王左右善騎者傅之嬰雖少然數力戰乃拜嬰為中大夫令李必駱甲為左右校尉將郎中騎兵擊楚騎於滎陽東大破之後漢書寇恂傳光武南定河內而更始大司馬朱鮪等盛兵據洛陽又并州未安光武難其守問於鄧禹曰諸將誰可使守河內者禹曰昔高祖任蕭何於關中無復西顧之憂所以得專精山東終成大業今河內帶河為固戶口殷實北通上黨南迫洛陽寇恂文武備足有牧人禦衆之才非此子莫可使也乃拜恂河內太守行大將軍事新唐書高瑀傳高瑀冀州蓨人纍遷陳蔡二州刺史入為太僕卿忠武節度使王沛死衛軍諸將多自謂得之宰相裴度韋處厚以瑀治陳蔡素有狀習軍中情偽欲任之會其軍表高瑀乃檢校左散騎常侍領忠武節度使自大歷後擇帥悉出宦人中尉所輸貨至巨萬貧者假貸富人既得所欲則椎斫膏血倍以酬息十常六七及瑀有命士相告曰韋裴作相天下無債帥將非其人第三史記趙奢傳奢之子括趙王因以括為將代廉頗藺相如曰王以名使括若膠柱而鼓琴瑟爾括徒能讀其父書傳不知合變也王不聽遂將之趙括自少時學兵法言兵事以天下莫能當嘗與父奢言兵事奢不能難然不謂善括母問奢其故奢曰兵死地也而括易言之使趙不將括即已若必將之破趙軍者必括也及括將行其母上書言於王曰括不可使將王以為何如其父父子異心願王勿遣王曰母置之吾已決矣括母因曰即有如不稱妾得無隨坐乎王許諾括既代廉頗悉更約束易置軍吏秦將白起聞之縱奇兵佯敗走絶其糧道分斷其軍為二趙括出鋭卒自摶戰秦軍射殺趙括括軍敗數十萬之衆秦悉坑之前漢高祖紀陳豨反高祖問將皆故賈人上曰吾知與之矣與如也言能如之何也乃多以金購豨將豨將多降後漢鄧禹傳説光武曰更始諸將皆庸人屈起志在財幣爭用威力朝夕自快而巳非有忠良明智深慮遠圖欲尊主安民者也魏陳思王植傳上疏曰羊質虎皮見草則悅見豺則戰忘其皮之虎也今置將不良有似於此蜀馬良傳先主臨薨謂亮曰馬謖言過其實不可大用君其察之亮猶不然以謖為參軍每引見談論自晝達夜建興六年亮出軍向祁山時有宿將魏延吳一等論者皆言以為宜令為先鋒而亮違衆拔謖統大衆在前與魏將張郃戰于街亭為郃所破士卒離散亮進無所據退軍還漢中謖下獄物故晉陳騫傳遷大司馬因入朝言於帝曰胡烈牽洪皆勇而無謀強於自用非綏邊之材將為國恥願陛下詳之時洪為楊州刺史不承順騫命帝以為不協相搆於是召洪既至尋復以為涼州刺史騫歎息以為必敗二人後果失羌戎之和皆被寇喪沒征討連歲僅而得定帝乃悔之新唐書韓全義傳德宗用為淮西行營招討使諸鎮兵皆屬全義無它方略號令悉稟監軍每議攻戰宦官十數紛爭帳中小人好自異互詆訾不能決賊知之數請戰遇賊廣利城方暑地沮洳士皆病癘全義未嘗存之既戰師皆潰退餘見世將項藉傳箋證史記廉頗藺相如列傳附趙奢七年秦與趙兵相距長平時趙奢已死而藺相如病篤趙使廉頗將攻秦秦數敗趙軍趙軍固壁不戰秦數挑戰廉頗不肯趙王信秦之間秦之間言曰秦之所惡獨畏馬服君趙奢之子趙括為將耳趙王因以括為將代廉頗藺相如曰王以名使括若膠柱而鼓瑟耳括徒能讀其父書傳不知合變也趙王不聽遂將之趙括自少時學兵法言兵事以天下莫能當嘗與其父奢言兵事奢不能難然不謂善括母問奢其故奢曰兵死地也而括易言之使趙不將括即已若必將之破趙軍者必括也及括將行其母上書言於王曰括不可使將王曰何以對曰始妾事其父時為將身所奉飯飲而進食者以十數所友者以百數大王及宗室所賞賜者盡以豫軍吏士大夫受命之日不問家事今括一旦為將東向而朝軍吏無敢仰視之者王所賜金帛歸藏於家而日視便利田宅可買者買之王以為何如其父父子異心願王勿遣王曰母置之吾已決矣括母因曰王終遣之即有如不稱妾得無隨坐乎王許諾趙括既代廉頗悉更約束易置軍吏秦將白起聞之縱奇兵佯敗走而絶其糧道分斷其軍為二士卒離心四十餘日軍餓趙括出鋭卒自搏戰秦軍射殺趙括括軍敗數十萬之衆遂降秦秦悉坑之漢書高帝紀十年九月代相國陳豨反上曰豨嘗為吾使甚有信代地吾所急故封豨為列侯以相國守代今乃與王黃等劫掠代地吏民非有罪也能去豨黃來歸者皆舍之上自東至邯鄲上喜曰豨不南據邯鄲而阻漳水吾知其亡能為矣趙相周昌奏常山二十五城亡其二十城請誅守尉上曰守尉反乎對曰不上曰是力不足亡罪上令周昌選趙壯士可令將者白見四人師古曰白於天子而召見也上嫚罵曰豎子能為將乎四人慚皆伏地上封各千戶以為將左右諫曰從入蜀漢伐楚賞未橫行今封此何功上曰非汝所知陳豨反趙代地皆豨有吾以羽檄徵天下兵未有至者今計唯獨邯鄲中兵耳吾何愛四千慚不以慰趙子弟皆曰善又求樂毅有後乎得其孫叔封之樂鄉號華成君問豨將皆故賈人上曰吾知與之矣師古曰與如也言能如之何也乃多以金購豨將豨將多降後漢書鄧禹傳漢兵起更始立豪傑多薦舉禹禹不肯從及聞光武安集河北即杖策北渡追及於鄴光武見之甚歡光武笑因留宿間語禹進説曰更始雖都關西今山東未安赤眉青犢之屬動以萬數三輔假號往往群聚更始既未有所挫而不自聽斷諸將皆庸人屈起志在財幣爭用威力朝夕自快而已非有忠良明智深慮遠圖欲尊主安民者也三國志魏志陳思王植傳植復上疏陳審舉之義曰臣聞羊質虎皮見草則悅見豺則戰忘其皮之虎也今置將不良有似於此三國志蜀志馬良傳附弟馬謖良弟謖字幼常以荊州從事隨先主入蜀除綿竹成都令越嶲太守才器過人好論軍計丞相諸葛亮深加器異先主臨薨謂亮曰馬謖言過其實不可大用君其察之亮猶不然以謖龐參軍每引見談論自晝達夜建興六年亮出軍向祁山時有宿將魏延吳一等論者皆言以為宜令為先鋒而亮違衆拔謖統大衆在前與魏將張郃戰于街亭為郃所破士卒離散亮進無所據退軍還漢中謖下獄物故晉書陳騫傳陳騫臨淮東陽人也咸寧初遷太尉轉大司馬騫因入朝言於帝曰胡烈牽弘皆勇而無謀強於自用非綏邊之材將為國之恥願陛下詳之時弘為揚州刺史不承順騫命帝為不協相構於是徵弘既至尋復以為涼州刺史騫竊歎息以為必敗二人後果失羌戎之和皆被寇喪沒征討連歲僅而得定帝乃悔之新唐書韓全義傳韓全義家素寒史以巧佞事宦者竇文場德宗以文場素為全義地因用為淮西行營招討使以陳許節度使上官涗副之諸鎮兵皆屬全義無它方略號令悉稟監軍每議攻戰宦豎十數紛爭帳中小人好自異互詆訾不能決賊知之數請戰遇賊廣利城方暑地沮洳士皆病癘全義未嘗存之既戰師皆潰退萬人之敵第四前漢項羽傳籍少時學書不成去學劍又不成去籍曰書足記姓名而已劍一人敵不足學學方人敵耳於是梁奇其意乃教以兵法籍大喜略知其意又不肯竟蜀張飛傳飛雄壯威猛亞於關羽魏謀臣程昱等咸稱羽飛萬人之敵也新唐書李晟傳事河西王忠嗣從擊吐蕃悍酋乘城殺傷士甚衆忠嗣怒募射者晟挾一矢殪之三軍歡奮忠嗣撫其背曰萬人敵也新唐回紇傳肅宗還西京葉護自東京至及辭歸蕃奏曰回紇戰兵留在沙苑今且須歸靈夏取馬更收范陽討除殘賊詔曰功濟艱難義存邦國萬里絶域一德同心求之古今所未聞也回紇葉護特稟英姿挺生奇略言必忠信行表溫良才為萬人之敵位列諸蕃之長封思義王箋證漢書項籍列傳籍少時學書不成去學劍又不成去梁怒之籍曰書足記姓名而已劍一人敵不足學學萬人敵耳於是梁奇其意乃教以兵法籍大喜略知其意又不肯竟三國志蜀志張飛傳張飛字益德涿郡人也初飛雄壯威猛亞於關羽魏謀臣程昱等咸稱羽飛萬人之敵也新唐書李晟傳李晟字良器洮州臨潭人年十八往事河西王忠嗣從擊吐蕃悍酋乘城殺傷士甚衆忠嗣怒募射者晟挾一矢殪之三軍歡奮忠嗣撫其背曰萬人敵也舊唐書回紇傳及肅宗還西京十一月癸酉葉護自東京至勑百官於長樂驛迎上御宣政殿宴勞之葉護升殿其餘酋長列於階下賜錦繡繒綵金銀器皿及辭歸蕃上謂曰能為國家就大事成義勇者卿等力也葉護奏曰回紇戰兵留在沙苑今且須歸靈夏取馬更收范陽討除殘賊己丑詔曰功濟艱難義存邦國萬里絶域一德同心求之古今所未聞也回紇葉護特稟英姿挺生奇略言必忠信行表溫良才為萬人之敵位列諸蕃之長仍封忠義王軍不內御第五史記司馬穰苴傳莊賈為監軍穰苴約曰日中會軍門夕時莊賈乃至穰苴曰何後期為賈謝曰大夫親戚送之故留穰苴曰將受命之日則忘其家臨軍約束則忘其親援枹鼓之急則忘其身今敵國深侵邦內騷動何謂相送乎召軍正問曰軍法朝而後至者云何對曰當斬遂斬莊賈景公遣使赦賈穰苴曰將在軍君令有所不受前漢馮唐傳文帝曰嗟乎吾獨不得廉頗李牧為將豈憂胸奴哉唐曰陛下雖有頗牧不能用也臣聞上古遣將跪而推轂曰闑以內寡人制之闑以外將軍制之軍功爵賞皆快於外歸而奏之李牧之為趙將居邊軍市之租皆自用饗士賞賜決於外不從中覆也覆白委任而責成功故李牧乃得盡其知能今聞魏尚為雲中守軍市租盡以給士卒出私養錢五日一殺牛以饗賓客軍吏舍人是以胸奴遠避不近雲中之塞虜嘗一入尚率車騎擊之所殺甚衆上功幕府一言不相應文吏以法繩之愚以為陛下法太明賞太輕罰太重且雲中守尚坐上功首虜差六級陛下下之吏削其爵繇此言之陛下雖得李牧不能用也文帝説是日令唐持節赦魏尚復以為雲中守後漢馮緄傳武陵蠻夷反拜緄為將軍討之詔策緄曰進赴之宜權時之策將軍一之出郊之事不復內御淮南子曰凡命將主親授鉞曰此從以至天將軍制之將答曰國不可從外理軍不可從中御也晉宣帝紀諸葛亮數挑戰帝不出因遺帝巾幗婦人之飾帝怒表請決戰天子遣辛毗仗節以制之蜀將薑維聞毗來謂亮曰辛毗仗節而至賊不復出矣亮曰彼本無戰情所以固請者以示武於其衆爾將在軍君命有所不受苟能制吾豈千里而請戰邪餘見將門周勃傳箋證史記司馬穰苴列傳齊景公時晉伐阿甄而燕侵河上齊師敗績景公患之晏嬰乃薦田穰苴曰穰苴雖田氏庶孽然其人文能附衆武能威敵願君試之景公召穰苴與語兵事大説之以為將軍將兵扞燕晉之師穰苴曰臣素卑賤君擢之閭伍之中加之大夫之上士卒未附百姓不信人微權輕願得君之寵臣國之所尊以監軍乃可於是景公許之使莊賈往穰苴既辭與莊賈約曰旦日日中會於軍門穰苴先馳至軍立表下漏待賈夕時莊賈乃至穰苴曰何後期為賈謝曰不佞大夫親戚送之故留穰苴曰將受命之日則忘其家臨軍約束則忘其親援枹鼓之急則忘其身今敵國深侵邦內騷動士卒暴露於境君寢不安席食不甘味百姓之命皆懸於君何謂相送乎召軍正問曰軍法期而後至者云何對曰當斬莊賈懼使人馳報景公請救既往未及反於是遂斬莊賈以徇三軍三軍之士皆振栗久之景公遣使者持節赦賈馳入軍中穰苴曰將在軍君令有所不受漢書馮唐傳馮唐祖父趙人也父徙代漢興徙安陵唐以孝著為郎中署長事文帝上既聞廉頗李牧為人良説如淳曰良善也師古曰説讀曰悅聞頗牧之善帝意大悅劉攽曰聞廉頗李牧為人即是知其實矣良説者甚喜也猶良久也乃拊髀曰嗟乎吾獨不得廉頗李牧為將豈憂胸奴哉唐曰主臣陛下雖有廉頗李牧不能用也上怒起入禁中良久召唐讓曰公衆辱我獨亡間處呼唐謝曰鄙人不知忌諱當是時胸奴新大入朝那殺北地都尉卬上以胡寇為意乃卒復問唐曰公何以言吾不能用頗牧也唐對曰臣聞上古王者遣將也跪而推轂曰闑以內寡人制之闑以外將軍制之韋昭曰門中橛為闑師古曰音牛列反軍功爵賞皆決於外歸而奏之此非空言也臣大父言李牧之為趙將居邊軍市之租皆自用饗士賞賜決於外不從中覆也師古曰覆謂覆白之也委任而責成功故李牧乃得盡其知能選車千三百乘彀騎萬三千匹百金之士十萬服虔曰良士直百金也可任使也是以北逐單于破東胡滅淡林西抑強秦南支韓魏當是時趙幾伯師古曰幾致於霸也伯讀曰霸後會趙王遷立其母倡也用郭開讒而誅李牧令顏聚代之是以為秦所滅今臣竊聞魏尚為雲中守軍市租盡以給士卒出私養錢五日一殺牛以饗賓客軍吏舍人是以胸奴遠避不近雲中之塞虜嘗一入尚帥車騎擊之所殺甚衆夫士卒盡家人子起田中從軍安知尺籍伍符終日力戰斬首捕虜上功莫府一言不相應文吏以法繩之其賞不行吏奉法必用愚以為陛下法太明賞太輕罰太重且雲中守尚坐上功首虜差六級陛下下之吏削其爵罰作之繇此言之陛下雖得李牧不能用也臣誠愚觸忌諱死罪文帝説是日令唐持節赦魏尚復以為雲中守後漢書馮緄傳馮緄字鴻卿巴郡宕渠人也延熹五年衆轉盛而零陵蠻賊復反應之合二萬餘人攻燒城郭殺傷長吏又武陵蠻夷悉反寇掠江陵間荊州刺史劉度南郡太守李肅並奔走荊南皆沒於是拜緄為車騎將軍將兵十餘萬討之詔策緄曰蠻夷猾夏久不討攝今非將軍誰與修復前迹進赴之宜權時之策將軍一之出郊之事不復內御一猶專也言出郊以外不復由內制御也淮南子曰凡命將主親授鉞曰從此上至天將軍制之將答曰國不可從外理軍不可從中御也晉書宣帝紀青龍二年亮又帥衆十餘萬出斜谷壘于郿之渭水南時朝廷以亮僑軍遠寇利在急戰每命帝持重以候其變亮數挑戰帝不出因遺帝巾幗婦人之飾帝怒表請決戰天子不許乃遣骨鯁臣衛尉辛毗杖節為軍師以制之後亮復來挑戰帝將出兵以應之毗杖節立軍門帝乃止初蜀將薑維聞毗來謂亮曰辛毗杖節而至賊不復出矣亮曰彼本無戰心所以固請者以示武於其衆耳將在軍君命有所不受苟能制吾豈千里而請戰邪偃兵第六史記周本紀營周居于雒邑縱馬於華山之陽放牛樂桃林之虛偃干戈振兵釋旅示天下不復用也史記秦本紀始皇收天下兵聚之咸陽以為鍾鐻音巨金人十二重各千石前漢刑法志孔子曰工欲善其事必先利其器文德者帝王之利器威武者文德之輔助也三代之盛至於刑錯兵寢者帝王之極功也刑錯兵寢皆謂置而弗用前漢武五子傳贊曰倉頡作書止戈為武聖人以武禁暴整亂止息兵戈非所以為殘而興縱之也餘見偃武修文門光武紀又見唐魏文正傳箋證史記周本紀營周居于雒邑而後去縱馬於華山之陽牧牛於桃林之虛偃干戈振兵釋旅示天下不復用也史記秦始皇本紀收天下兵聚之咸陽銷以為鍾鐻集解徐廣曰音巨金人十二重各千石漢書刑法志刑罰不可廢於國征伐不可偃於天下用之有本末行之有逆順耳孔子曰工欲善其事必先利其器文德者帝王之利器威武者文德之輔助也夫文之所加者深則武之所服者大德之所施者博則威之所制者廣三代之盛至於刑錯兵寢者其本末有序帝王之極功也師古曰刑錯兵寢皆謂置而弗用也漢書武五子傳贊曰故曰兵猶火也弗戢必自焚信矣是以倉頡作書止戈為武聖人以武禁暴整亂止息兵戈非以為殘而興縱之也
