body:
  text: 卷第三十二不食暗君之祿第一史記閔損字子騫孔子曰孝哉閔子騫人不間於父母昆弟之言不仕大夫不食汙君之祿如有復我者必在汶上矣前漢梅福傳福常讀書養性為事至元始中王莽顓政福一朝棄妻子去九江至今傳以為仙後漢卓茂傳孔休哀帝初守新都令後王莽秉權休去官歸家及莽篡位遣使齎束帛請為國師遂歐血託病杜門自絶後漢杜林傳隗囂素聞林志節以為持書平後因疾告去辭還祿食囂復欲令強起遂稱篤囂意相望且欲優容之乃出令曰杜伯山天子所不能臣諸侯所不能友蓋伯夷叔齊恥食周粟今且從師友之位林雖拘於囂而終不屈節林弟成物故囂乃聽林持喪車歸既遣而悔追令刺客楊賢遮殺之賢見林身推鹿車載致弟喪乃歎曰當今之世誰能行義我雖小人何忍殺義士因亡去望恨也伯山林之字後漢郭憲少師事東海王仲子時王莽為大司馬召仲子仲子欲往憲諫曰禮有來學無有往教今君賤道畏貴竊所不取今正臨講業且當訖事仲子從之日晏乃往莽問君來何遲仲子具以憲言對莽陰奇之及篡位拜憲郎中賜以衣服憲受衣焚之逃于東海之濱莽深忿恚討逐不知所在後漢陳寵傳曾祖父咸成哀間以律令為尚書平帝時王莽輔政多改漢制咸心非之及莽誅不附己者何武鮑宣等咸乃歎曰易稱君子見幾而作吾可以逝矣即去職及莽纂位召咸以為掌寇大夫謝病不肯應時三子參豐欽皆在位乃悉令解官父子相與歸鄉里閉門不出入猶用漢家祖臘人問其故咸曰我先人豈知王氏臘乎後漢徐璆傳璆再徵遷汝南太守轉東海相獻帝遷許以廷尉召道為袁術所劫授璆以上公之位璆乃歎曰龔勝鮑宣獨何人哉守之必死術不敢逼術死軍破璆得其盜國璽及還許上之并送前所假汝南東海二郡印綬司徒趙溫謂璆曰君遭大難猶存此邪璆曰昔蘇武困於胸奴不隊七尺之節況此方寸印乎後漢薑肱傳中常侍曹節等專執朝事新誅太傳陳蕃大將軍竇武欲借寵賢德以釋衆望乃白召肱為太守肱得詔乃私告其友曰明明在上猶當固其本志況今政在閹豎夫何為哉乃隱身遁命遠浮海濱即拜太中大夫詔書至門肱使家人對云久病就醫遂羸服間行竄伏青州界中賣卜給食召命得斷家亦不知其處歷年乃還後漢桓帝時安陽人魏桓亦數被召其鄉人勸之行桓曰夫干祿求進所以行其志也今後宮千數其可損乎廄馬萬匹其可減乎左右悉權豪其可去乎皆對曰不可桓乃慨然歎曰使桓生行死歸於諸子何有哉遂隱身不出後漢譙玄傳字君黃公孫述僭號於蜀連聘不詣述乃遣使者備禮召之若玄不肯起便賜以藥太守乃自齎璽書至君黃廬曰君高節已著朝廷垂意誠不宜復辭自招凶禍君黃仰天歎曰唐堯大聖許由恥仕周武至德伯夷守餓彼獨何人我亦何人保志全高死亦奚恨遂受毒藥玄子瑛泣血叩頭於太守曰願奉家錢千萬以贖父死太守為請述聽許之玄遂隱藏田野終述之世後漢李業傳公孫述僭號素聞業賢召之欲以為博士業不起述羞之乃使尹融持毒酒奉詔命以劫業若起則受公侯之位不起賜之以藥業乃歎曰危國不入亂國不居君子見危受命何乃誘以高位重餌哉飲毒而死箋證史記仲尼弟子列傳閔損字子騫少孔子十五歲孔子曰孝哉閔子騫人不間於其父母昆弟之言不仕大夫不食汙君之祿索隱論語季氏使閔子騫為費宰子騫曰善為我辭焉是不仕大夫不食汙君之祿也如有復我者必在汶上矣漢書梅福傳綏和元年立二王後推迹古文以左氏榖梁世本禮記相明遂下詔封孔子世為殷紹嘉公是時福居家常以讀書養性為事至元始中王莽顓政福一朝棄妻子去九江至今傳以為仙後漢書卓茂傳初茂與同縣孔休陳留蔡勳安衆劉宣楚國龔勝上黨鮑宣六人同志不仕王莽時並名重當時休字子泉哀帝初守新都令後王莽秉權休去官歸家及莽篡位遣使齎玄纁束帛請為國師遂歐血託病杜門自絶後漢書杜林傳隗囂素聞林志節深相敬待以為持書平後因疾告去辭還祿食囂復欲令強起遂稱篤囂意雖相望且欲優容之乃出令曰杜伯山天子所不能臣諸侯所不能友蓋伯夷叔齊恥食周粟今且從師友之位須道開通使順所志林雖拘於囂而終不屈節建武六年弟成物故囂乃聽林持喪東歸既遣而悔追令刺客楊賢於隴坻遮殺之賢見林身推鹿車載致弟喪乃歎曰當今之世誰能行義我雖小人何忍殺義士因亡去後漢書方術列傳郭憲傳郭憲字子橫汝南宋人也少師事東海王仲子時王莽為大司馬召仲子仲子欲往憲諫曰禮有來學無有往教之義今君賤道畏貴竊所不取仲子曰王公至重不敢違之憲曰今正臨講業且當訖事仲子從之日晏乃往莽問君來何遲仲子具以憲言對莽陰奇之及後歷位拜憲郎中賜以衣服憲受衣焚之逃于東海之濱莽深忿恚討逐不知所在後漢書陳寵傳陳寵曾祖父咸成哀間以律令為尚書平帝時王莽輔政多改漢制咸心非之及莽因呂寬事誅不附已者何武鮑宣等咸乃歎曰易稱君子見幾而作不俟終日吾可以逝矣即乞骸骨去職及莽歷位召咸以為掌寇大夫謝病不肯應時三子參豐欽皆在位乃悉令解官父子相與歸鄉里閉門不出入猶用漢家祖臘人問其故咸曰我先人豈知王氏臘乎後漢書徐璆傳徐璆字孟本廣陵海西人也稍遷荊州刺史再徵遷汝南太守轉東海相所在化行獻帝遷許以廷尉徵當詣京師道為袁術所劫授璆以上公之位璆乃歎曰龔勝鮑宣獨何人哉守之必死術不敢逼術死軍破璆得其盜國璽及還許上之并送前所假汝南東海二郡印綬司徒趙溫謂璆曰君遭大難猶存此邪璆曰昔蘇武困於胸奴不墜七尺之節况此方寸印乎後漢書薑肱傳薑肱字伯淮彭城廣戚人也中常侍曹節等專執朝事新誅太傅陳蕃大將軍竇武欲借寵賢德以釋衆望乃白徵肱為太守肱得詔乃私告其友曰吾以虛獲實遂藉聲價明明在上猶當固其本志况今政在閹鑒夫何為哉乃隱身遁命遠浮海內再以玄纁聘不就即拜太中大夫詔書至門肱使家人對云久病就醫遂羸服間行竄伏青州界中賣卜給食召命得斷家亦不知其處歷年乃還後漢書周黃徐薑申屠列傳序桓帝時安陽人魏桓字仲英亦數被徵其鄉人勸之行桓曰夫干祿求進所以行其志也今後宮千數其可損乎廄馬萬匹其可減乎左右悉權豪其可去乎皆對曰不可桓乃慨然歎曰使桓生行死歸於諸子何有哉遂隱身不出後漢書獨行列傳譙玄傳譙玄字君黃巴郡閬中人也王莽居攝玄於是縱縱舍也使者車變易姓名間竄歸家間私也因以隱遁後公孫述僣號於蜀連聘不詣述乃遣使者備禮徵之若玄不肯起便賜以毒藥太守乃自齎璽書至玄廬曰君高節已著朝廷垂意誠不宜復辭自招凶禍玄仰天歎曰唐堯大聖許由恥仕周武至德伯夷守餓彼獨何人我亦何人保志全高死亦奚恨遂受毒藥玄子瑛泣血叩頭於太守曰方今國家東有嚴敵兵師四出國用軍資或不常充足願奉家錢千萬以贖父死太守為請述聽許之玄遂隱藏田野終述之世後漢書獨行列傳李業傳李業字巨遊廣漢梓潼人也孫述僣號素聞業賢徵之欲以為博士業固疾不起數年述羞不致之乃使大鴻臚尹融持毒酒奉詔命以劫業若起則受公侯之位不起賜之以藥融譬旨曰方今天下分崩孰知是非而以區區之身試於不測之淵乎朝廷貪慕名德曠官缺位于今七年四時珍御不以忘君宜上奉知己下為子孫身名俱全不亦優乎今數年不起猜疑寇心凶禍立加非計之得者也業乃歎曰危國不入亂國不居親於其身為不善者義所不從君子見危授命何乃誘以歷位重餌哉融見業辭志不屈復曰宜呼室家計之業曰以丈夫斷之於心久矣何妻子之為遂飲毒而死辭爵位第二史記吳太伯世家季歷賢而有聖子昌大王欲立季歷以及昌於是大伯仲雍二人乃奔荊蠻文身斷髮示不可用以避季歷季歷果立是為王季而昌為文王前漢張安世傳魏相言安世宜為大將軍上亦用之安世聞指懼求見免冠頓首曰誠自量不足以居大位唯天子財與裁同哀以全老臣之命上笑曰君言泰謙君而不可尚誰可者安世深辭弗能得後竟拜大司馬薨子延壽嗣侯延壽自以身無功德何以能久堪先人大國數上書讓減戶邑前漢韋賢傳初元成兄洪為太常丞父賢以洪當為嗣及賢病篤洪竟坐宗廟事繫獄賢門下生博士義債等與宗家計議宗家賢之同族共矯賢令使家丞上書言以元成為後賢薨元成深知其非賢雅意即陽為病狂臥便利妄笑語昏亂既葬當襲爵以病狂不應召大鴻臚奏狀章下丞相御史案驗元成素有名聲士大夫多疑其欲讓爵辟兄者案事丞相史乃與元成書曰古之辭讓必有文義可觀故能垂榮於後今子獨壞容貌蒙恥辱為狂癡光曜暗而不宣微哉子之所託名也僕素愚陋過為宰相執事願少聞風聲不然恐子傷高而僕為小人也元成友人侍郎章亦上疏言聖王貴以禮讓為國宜優養元成勿枉其志使得自安衡門之下而丞相御史遂以元成實不病劾奏之有詔勿劾引拜元成不得已受爵宣帝高其節以元成為河南大守前漢孔光傳元帝即位召孔霸以師賜爵關內侯號褒成君加賜黃金二百斤第一區霸為人謙退不好權藝常稱爵位泰過何德以堪之上欲致霸相位自御史大夫貢禹卒及薛廣德免輒欲拜霸霸讓位自陳至三主深知其至誠乃弗用以是賞賜甚厚後漢劉玄傳更始先封宗室而後立朱鮪為膠東王鮪辭曰臣非劉宗不敢干典遂讓不受後漢郅惲傳時左隊大夫逯並素好士惲説之曰當今上天垂象智者以昌愚者以亡惲敢希伊尹之蹤應天人之變並奇之使署為吏惲曰昔文王拔呂尚於渭濱高宗禮傅説於巖築桓公取管仲於射鉤故能立鴻烈就元勳未聞師相仲父而可為吏位也非窺天者不可與圖遠君不授驥以重任驥亦俯首裹足而去耳遂不受署師呂望相傳説後漢梁竦傳嘗登高遠望歎息言曰大丈夫居世生當封侯死當廟食如其不然閉居可以養志詩書足以自娛州郡之職徒勞人耳後辟命交至並無所就後漢疾篤以書戒子曰吾雖無紱冕之緒頗有讓爵之高謂辟不就後漢崔駰傳大保甄豐舉崔篆為步兵校尉篆辭曰吾聞伐國不問仁人戰陳不訪儒士此舉奚其至哉遂投劾歸投辭自劾有過不合應舉後漢陳蕃傳竇太后封蕃高陽鄉侯蕃上疏讓曰臣孰自思省前後歷職旡它異能竊慕君子不以其道得之不居也若受爵不讓使皇天震怒災流下民於臣之身亦何所寄顧惟陛下哀臣杇老戒之在得竇太后不許蕃章前後十上竟不受封後漢鄧騭傳封騭上蔡侯悝葉侯閶西華侯食邑各萬戶騭以定策功增邑三千戶騭等辭讓不獲遂逃避使者間關詣闕間關猶崎嶇也上疏曰臣兄弟過以外戚遭值明時託日月之末光被雲雨之渥澤不能宣贊風美補助清化誠慚誠恐無以處心陛下遭國不造仍離大憂援立皇統奉承太宗本非臣等所能萬一而並享大封臣終不敢橫受爵土以增罪纍惶窘征營昧死陳乞太后不聽騭頻上疏至於五六乃許之魏田豫傳為衛尉屢乞遜位司馬宣王以豫克壯書偷未聽豫書答曰年過七十而居位譬由鍾鳴漏盡而夜行不休是罪人也晉鄭袤傳武帝踐位為司空固辭曰三公當上應天心苟非其人實傷和氣不敢以垂死之年纍辱朝廷也音辭不受晉魏舒傳舒為事必先行而後言遜位之際莫有知者時論以為晉興以來三公能辭榮善終者未之有也晉陶潛傳為彭澤令郡遣督郵至縣吏白應束帶見之潛歎曰吾不能為五斗米折腰拳拳事鄉里小人邪解印去縣乃賦歸去來晉周顗傳太興初更拜太子少傅顗上疏讓曰臣退自循省學不通一經智不效一官乃欲使臣內管銓衡外忝傅訓質輕蟬翼事重千鈞詔曰不宜讓唐蕭俯傳堅辭痼疾詔曰不待年而求謝於理身之道則至矣其如朝廷之望何新唐劉蕡傳李邰上言曰臣所對不及蕡遠甚內懷愧恥乞回臣所授以旌蕡直臣逃苟且之慚帝不納餘見功成身退疏廣傳箋證史記吳太伯世家吳太伯太伯弟仲雍周太王之子而王季歷之兄也季歷賢而有聖子昌太王欲立季歷以及昌於是太伯仲雍二人乃奔荊蠻文身斷髮示不可用以避季歷季歷果立是為王季而昌為文王漢書張湯傳附子張安世魏相上封事曰安世事孝武皇帝三十餘年忠信謹厚勤勞政事夙夜不怠與大將軍定策天下受其福國家重臣也宜尊其位以為大將軍安世聞指懼不敢當請間求見免冠頓首曰老臣耳妄聞言之為先事不言情不達誠自量不足以居大位繼大將軍後唯天子財哀以全老臣之命師古曰財與裁同上笑曰君言泰謙君而不可尚誰可者安世深辭弗能得後數日竟拜為大司馬車騎將軍領尚書事元康四年春安世病上疏歸侯乞骸骨安世復強起視事至秋薨諡曰敬侯賜塋杜東子延壽嗣延壽自以身無功德何以能久堪先人大國數上書讓減戶邑漢書韋賢傳附子韋玄成傳玄成字少翁以父任為郎初玄成兄弘為太常丞職奉宗廟典諸陵邑煩劇多罪過父賢以弘當為嗣故勑令自免師古曰恐其有罪見黜妨為繼嗣故令以病去官也弘懷謙不去官師古曰謂若欲代父為侯故避嫌不肯也及賢病篤弘竟坐宗廟事繫獄罪未決室家問賢當為後者賢恚恨不肯言於是賢門下生博士義倩等與宗家計議師古曰博士姓義名倩也宗家賢之同族也共矯賢令使家丞上書言大行以大河都尉玄成為後賢薨玄成在官聞喪又言當為嗣玄成深知其非賢雅意陰陽為病狂臥便利妄笑語昏亂徵至長安既葬當襲爵以病狂不應召大鴻臚奏狀章下丞相御史案驗玄成素有名聲士大夫多疑其欲讓爵辟兄者師古曰辟讀曰避案事丞相史乃與玄成書曰古之辭讓必有文義可觀故能垂榮於後今子獨壞容貌蒙恥辱為狂癡光曜暗而不宣微哉子之所託名也僕素愚陋過為宰相執事師古曰過猶謬也願少聞風聲不然恐子傷高而僕為小人也玄成友人侍郎章亦上疏言聖王貴以禮讓為國宜優養玄成勿枉其志使得自安衡門之下師古曰衡門謂橫一木於門上貧者之所居也而丞相御史遂以玄成實不病劾奏之有詔勿劾引拜玄成不得已受爵宣帝高其節以玄成為河南太守漢書孔光傳元帝即位黃霸以師賜爵關內侯食邑八百戶號褒成君給事中加賜黃金二百斤第一區徙名數于長安師古曰名數戶籍也霸為人謙退不好權藝常稱爵位泰過何德以堪之上欲致霸相位自御史大夫貢禹卒及薛廣德免輒欲拜霸霸讓位自陳至三上深知其至誠乃弗用以是敬之賞賜甚厚卷八十一案孔光孔霸子也後漢書劉玄傳李松與棘陽人趙萌説更始宜悉王諸功臣朱鮪爭之以為高祖約非劉氏不王更始乃先封宗室太常將軍劉祉為定陶王劉賜為宛王劉慶為燕王劉歙為元氏王大將軍劉嘉為漢中王劉信為汝陰王後遂立王匡為比陽王王鳳為宣城王朱鮪為膠東王唯朱鮪辭曰臣非劉宗不敢干典遂讓不受後漢書郅惲傳郅惲字君章汝南西平人也時左隊大夫逯並素好士王莽以潁川為左隊郡守為大夫逯姓並名也風俗通曰逯秦邑也其大夫氏焉逯音祿惲説之曰當今上天垂象智者以昌愚者以亡昔伊尹自鬻輔商立功全人惲竊不遜敢希伊尹之蹤應天人之變明府儻不疑逆俾成天德並奇之使署為吏惲不謁曰昔文王拔呂尚於渭濱高宗禮傅説於巖築桓公取管仲於射鉤故能立弘烈就元勳未聞師相仲父而可為吏位也師呂望也相傅説也仲父管仲也非窺天者不可與圖遠君不授驥以重任驥亦俯首裹足而去耳惲以驥自喻因自稱驥史記曰吳兵入郢申包胥走秦求救晝夜馳驅足腫跖盩裂裳裹足鵠立秦庭盩音戾遂不受署後漢書梁統傳附子梁竦傳竦字叔敬少習孟氏易竦生長京師不樂本土自負其才鬱鬱不得意嘗登高遠望歎息言曰大丈夫居世生當封侯死當廟食禮記曰諸侯五廟卿大夫三廟士一廟如其不然間居可以養志詩書足以自娛州郡之職徒勞人耳後辟命交至並無所就卷六十四案梁竦梁統次子也後漢書鄭玄傳鄭玄字康成北海內密人也常詣學官不樂為吏父數怒之不能禁玄後嘗疾篤自慮以書戒子益恩曰吾家舊貧不為父母昆弟所容去廝役之吏吾雖無紱冕之緒頗有讓爵之高謂頻被辟不就也後漢書崔駰傳崔駰字亭伯涿郡安平人也生子舒歷四郡太守所在有能名舒小子篆王莽時為郡文學以明經徵詣公車太保甄豐舉為步兵校尉篆辭曰吾聞伐國不問仁人戰陳不訪儒士此舉奚為至哉遂投劾歸投辭自劾有過不合應舉後漢書陳蕃傳永康元年帝崩竇后臨朝詔曰今封蕃陰陽侯食邑三百戶蕃上疏讓曰使者即臣廬授陰陽鄉侯印綬臣誠悼心不知所裁臣聞讓身之文德之昭也然不敢盜以為名竊惟割地之封功德是為臣熟自思省前後歷職無它異能合亦食祿不合亦食祿臣雖無素潔之行竊慕君子不以其道得之不居也若受爵不讓掩面就之使皇天震怒災流下民於臣之身亦何所寄顧惟陛下哀臣朽老戒之在得竇太后不許蕃復固讓章前後十上竟不受封後漢書鄧禹傳附孫鄧禹傳永初元年封騭上蔡侯悝葉侯弘西平侯閶西華侯食邑各萬戶騭以定策功增邑三千戶騭等辭讓不獲遂逃避使者間關詣闕間關猶崎嶇也上疏自陳曰臣兄弟汙穢無分可採過以外戚遭值明時託日月之末光被雲雨之渥澤並統列位光昭當世不能宣贊風美補助清化誠懼誠懼無以處心陛下躬天然之姿體仁聖之德遭國不造仍離大憂開日月之明運獨斷之慮援立皇統奉承太宗聖策定於神心休烈垂於不朽本非臣等所能萬一而猥推嘉美並享大封伏聞詔書驚惶慙怖追觀前世傾覆之誡退自惟念不寒而栗臣等雖無逮及遠見之慮猶有庶幾戒懼之情常母子兄弟內相勑厲冀以端愨畏慎一心奉戴上全天恩下完性命刻骨定分有死無二終不敢橫受爵土以增罪纍惶窘征營昧死陳乞太后不聽騭頻上疏至於五六乃許之卷四十六案鄧禹子鄧訓鄧隲鄧訓子鄧禹孫也鄧悝鄧弘鄧閶者鄧騭昆弟也三國志魏志田豫傳田豫字國讓漁陽雍奴人也徵為衛尉屢乞遜位太傅司馬宣王以為豫克壯書喻未聽豫書答曰年過七十而以居位譬猶鍾鳴漏盡而夜行不休是罪人也晉書鄭袤傳鄭袤字林叔滎陽開封人也高祖衆漢大司農父泰揚州刺史有高名袤少孤早有識鑒武帝踐阼進爵為侯雖寢疾十餘年而時賢並相推薦泰始中詔曰光祿大夫密陵侯袤履行純正守道沖粹退有清和之風進有素絲之節宜登三階之曜補袞職之闕今以袤為司空天子臨軒遣五官中郎將國坦就第拜授袤前後辭讓遣息稱上送印綬至于十數謂坦曰魏以徐景山為司空吾時為侍中受詔譬旨徐公語吾曰三公當上應天心苟非其人實傷和氣不敢以垂死之年纍辱朝廷也終於不就遵大雅君子之迹可不務乎固辭久之見許晉書魏舒傳魏舒字陽元任城樊人也舒為事必先行而後言遜位之際莫有知者時論以為晉興以來三公能辭榮祿終者未之有也晉書隱逸列傳陶潛傳陶潛字元亮大司馬侃之曾孫也以為彭澤令郡遣督郵至縣吏白應束帶見之潛歎曰吾不能為五斗米折腰拳拳事鄉里小人邪義熙二年解印去縣乃賦歸去來晉書周顗傳周顗字伯仁安東將軍浚之子也太興初更拜太子少傅尚書如故顗上疏讓曰臣退自循省學不通一經智不效一官止足良難未能守分遂忝顯任名位過量不悟天鑒忘臣頑弊乃欲使臣內管銓衡外忝傅訓質輕蟬翼事重千鈞此之不可不待識而明矣舊唐書蕭俯傳俯字思謙文宗徵詔懇以疾辭既致仕于家以洛都官屬賓友避歲時請謁之煩乃歸濟源別墅逍遙山野嘯詠窮年八年以莊恪太子在東宮上欲以耆德輔導復以少師徵之俯令弟傑奉表京師復納制書堅辭痼疾詔曰不待年而求謝於理身之道則至矣其如朝廷之望何新唐書劉蕡傳河南府參軍事李邰曰蕡逐我留吾顏其厚邪乃上疏曰陛下御正殿求直言使人得自奮臣才志懦劣不能質今古是非使陛下聞未聞之言行未行之事忽忽內思愧羞神明今蕡所對敢空臆盡言至皇王之成敗陛下所防間時政之安危不私所料又引春秋為據漢魏以來無與蕡比況臣所對不及蕡遠甚內懷愧恥自謂賢良奈人言何乞回臣所授以旌蕡直臣逃茍且之慙朝有公正之路陛下免天下之疑顧不美哉帝不納
