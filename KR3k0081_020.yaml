body:
  text: 卷第二十封建第一史記年表太史公曰商以前尚矣周封五等公侯伯子男然封伯禽康叔於魯衛地各四百里親親之義褒有德也太公於齊兼五侯地尊勤勞也史記褚先生曰諸侯王始封者必受土於天子之社歸立之以為國社以歲時祠之天子之國有泰社東方青南方赤西方白北方黑上方黃故將封於東方者取青土封於南方者取赤土封於西方者取白土封於北方者取黑土封於上方者取黃土裹以白茅封以為社此始受封於天子者也此之為土上主土者立社而奉之也前漢高惠高后文功臣表自古帝王之興曷嘗不建輔弼之臣所與共成天功者乎天功天下之功業也前漢賈誼傳上疏曰欲天下治安莫若眾建諸侯而少其力力少則易使以義國小則亡邪心令海內之埶如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻湊並進而歸命天子前漢偃說土曰古者諸侯地不過百里彊弱之形易制今諸侯或遲城數十地方千里緩則驕奢易為淫亂急則阻其疆而合從以逆京師今以法割削則逆節萌起晁錯是也今諸侯子弟或十數而適嗣代立餘雖骨肉無尺地之封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願土以德施實分其國必稍自銷弱矣上從其計前漢諸侯王表昔周監於二代三聖制法立爵五等封國八百同姓五十有餘周公康叔建於魯衛各數百里太公於齊亦五侯九伯之地所以親親賢賢褒表功德關諸盛衰深根固本為不可拔者也故盛則周邵相其治致刑錯衰則五伯扶其弱與共守歷載八百餘年數極德盡既於王赧降為庶人用天年終號位已絕於天下尚猶枝葉相持莫得居其虛位海內無主三十餘年秦據埶勝之地騁狙詐之兵蠶食山東壹切取勝因矜其所習自任私知姍音訕笑三代盪滅古法竊自號為皇帝而子弟為疋夫內亡骨肉本根之輔外亡尺土藩翼之衛陳吳奮其白挺劉項隨而斃之故曰周過其歷秦不及期國埶然也漢興之初海內新定同姓寡少懲戒亡秦孤立之敗於是剖裂疆土立二等之爵功臣侯者百有餘邑尊王子弟大啟九國而藩國大者夸州兼郡連城數十宮室百官同制京師可謂矯枉過其正矣雖然高祖創業日不暇給孝惠享國又淺高后女主攝政而海內晏如亡狂狡之憂卒折諸呂之難成太宗之業者亦賴之於諸侯也然諸侯原本以大末流濫以致溢小者淫荒越法大者睽孤橫逆以害身喪國故文帝采賈生之議分齊趙景帝用晁錯之計削吳楚武帝施主父之冊下推恩之令使諸侯王得分戶邑以封子弟不行黜陟而藩國自折自此以來齊分為七趙分為六梁分為五淮南分為三皇子始立者大國不過十餘城長沙燕代雖有舊名皆亡南北邊矣景遭七國之難抑損諸侯減黜其官武有衡山淮南之謀作佐官之律設附益之法諸侯惟得衣食租稅不與政事至於哀平之際皆繼體苗裔親屬疏遠生於帷牆之中不為士民所尊與富室亡異而本朝短世國統三絕是故王莽知漢中外殫微本末俱弱亡所忌憚生其姦心因母后之權假伊周之稱顓作威福廟堂之上不降階序而運天下詐謀既成遂據南面之尊分遣五威之吏馳傳天下班行符命漢諸侯王厥角首奉上璽韍惟恐在後或迺稱美頌德以求容媚豈不哀哉是以究其終始強弱之變明監戒焉與稽同前漢外戚恩澤侯表孝武元功宿將略盡會上亦興文學進拔幽隱公孫弘自海瀕而登宰相於是寵以列侯之爵又疇咨前代詢問耆老初得周後復加爵邑自是之後宰相畢侯矣元成之間晚得商世以備賓位漢興外戚與定天下侯者二人故誓曰非劉氏不王若有亡功非上所置而侯者天下共誅之是以高后欲王諸呂王陵廷爭孝景將侯王氏條侯犯色卒用廢黜是後薄昭竇嬰上官衛霍之侯以功受爵其餘后父據春秋褒紀之義帝舅緣大雅申伯之意寖廣慱矣後漢光武紀博士丁恭議曰古帝王封諸侯不過百里故利以建侯取法於雷強幹弱枝所以為治也今封諸侯四縣不合法制帝曰古之亡國皆以無道未嘗聞功臣地多而滅亡者乃遣謁者即授印綬策曰在上不驕高而不危制節謹度滿而不溢慎之戒之傳爾子孫長為漢藩後漢史弼傳論曰活千人者子孫必封史弼頡頏嚴吏終全平原之黨而其後不大斯亦未可論也前書王公孺曰聞活千人者有封子孫吾所活者千人後世其興乎頡頏猶上下也魏紀明帝詔曰古之帝王封建諸侯所以藩屏王室也詩不云乎懷德維寧宗子維城秦漢繼周或強或弱俱失厥中大魏創業諸王開國隨時之宜未有定制非所以永為後法也其改封諸侯王皆以郡為國晉劉頌論封建曰夫聖明不世及後嗣不必賢此天理之常也故為天下者任勢而不住人任勢者諸侯是也任人者郡縣是也郡縣察小政理而大勢危諸侯為邦近多遺而遠慮固聖王惟終始之弊權輕重之理包彼小違以據大安然後足以藩固內外維鎮九服隋有國王郡王國公郡公縣公侯伯子男凡九等新唐蕭瑀傳太宗帝問瑀朕欲長保社稷柰何瑀曰三代有天下所以長久者類封建諸侯以為藩屏秦置守令二世而絕漢分王子弟享國四百年魏晉廢之亡不旋踵此封建之明效也帝納之乃議封建新唐淮安王神通傳唐興務廣支蕃鎮天下故從昆弟子自勝衣以上皆爵郡王太宗即位舉屬籍問大臣曰盡王宗子於天下可乎封德彝曰漢所封惟帝子若親昆弟其屬遠非大功不王如周郇滕漢賈澤尚不得茆土所以別親疏也先朝一切封之爵命崇而力役多以天下為私奉非所以示至公帝曰朕君天下以安百姓不容勞百姓以養己之親於是疏屬王者皆降為公唯嘗有功者不降新唐諸王贊始唐興疏屬畢王至太宗稍稍降封時天下已定帝與名臣蕭瑀等喟然講封建事欲與三代比隆而魏知古李百藥皆謂不然徵意以唐承大亂民人彫喪始復生業遽起而瓜分之故有五不可之說百藥稱帝王自有命曆祚之短長不緣封建又舉春秋二百四十二年之禍亟於哀平桓靈而詆曹元首陸土衡之論以為謬悠而顏師古獨議建諸侯當少其力與州縣雜治以相維持然天子由是罷不復議至名儒劉秩自武后之禍以謂設爵無土署官不職非古之道故權移外家宗廟絕而更存存之之理在取順而難逆絕之之原在單弱而無所憚至謂郡縣可以小寧而不可以久安大抵與曹陸相上下而杜佑柳宗元深探其本據古驗今而反復焉佑之言曰夫為人置君欲其蕃息則在郡縣然而主胙常促為君置人不病其寡則在其國然而主胙常永建國利一宗列郡利百姓且立法未有不敝者聖人在度其患之長短而為之建國之制初若磐石然敝則鼎峙力爭陵遲而後已故為患也長列郡之制始天下一軌敝則世崩俱潰然而戡定者易為功故其為患也短又謂三王已來未見郡縣之利非不為也後世諸儒因泥古強為說非也宗元曰封建非聖人意然而歷堯舜三代莫能去之非不欲去之勢不可也秦破六國列都會置守宰據天下之圖攝制四海此其得也二世而亡有由矣暴威刑竭人力天下相合劫令殺守圜視而並起時則有叛民無叛吏漢矯秦枉剖海內立宗子功臣數十年間奔命扶傷不給時則有叛國無叛郡唐興制州縣而桀黠時起失不在州而在於兵時則有叛將無叛州以為矯而革之垂二百年不在諸侯明矣又言湯之興諸侯歸者三千資以勝夏武王興會者八百資之以滅商徇之為安故仍以為俗是湯武之不得己也不得已非公之大也私其力於己也秦革之者其制為公之大者也其情私也然而公天下之端自秦始云觀諸儒之言誠然建侯置守如質文遞救亦不可一概責也救土崩之難莫如建諸侯削尾大之埶莫如置守宰唐右領師古諸侯比也故王者視所救為之勿及於敝則善矣若乃百藥推天命佑言郡縣利百姓而主胙促乃臆說也箋證史記漢興以來諸侯年表太史公曰殷以前尚矣周封五等公侯伯子男然封伯禽康叔於魯衛地各四百里親親之義褒有德也太公於齊兼五侯地尊勤勞也史記三王世家褚先生曰臣幸得以文學為侍郎好覽觀太史公之列傳列傳中稱三王世家文辭可觀求其世家終不能得竊從長老好故事者取其封策書編列其事而傳之令後世得觀賢主之指意諸侯王始封者必受土於天子之社歸立之以為國社以歲時祠之春秋大傳曰天子之國有泰社東方青南方赤西方白北方黑上方黃故將封於東方者取青土封於南方者取赤土封於西方者取白土封於北方者取黑土封於上方者取赤土各取其色物裏以白茅封以為社此始受封於天子者也此之為主土主土者立社而奉之也漢書高惠高后文功臣表序自古帝王之興曷嘗不建輔弼之臣所與共成天功者乎師古曰天功天下之功業也虞書舜典曰欽哉惟時亮天功也漢書賈誼傳誼數上疏陳政事多所欲匡建其大略曰欲天下之治安莫若眾建諸侯而少其力力少則易使以義國小則亡邪心師古曰使以義使之遵禮義也令海內之埶如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻湊並進而歸命天子漢書主父偃傳偃說上曰古者諸侯地不過百里彊弱之形易制今諸侯或連城數十地方千里緩則驕奢易為淫亂急則阻其彊而合從以逆京師今以法割削則逆節萌起前日朝錯是也今諸侯子弟或十數而適嗣代立師古曰適讀曰嫡餘雖骨肉無尺地之封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以德施實分其國必稍自銷弱矣於是上從其計漢書諸侯王表昔周監於二代師古曰監視也二代夏殷也三聖制法師古曰三聖謂文王武王及周公也立爵五等封國八百同姓五十有餘周公康叔建於魯衛各數百里太公於齊亦五侯九伯之地所以親親賢賢褒表功德關諸盛衰深根固本為不可拔者也故盛則周邵相其治致刑錯衰則五伯扶其弱與共守歷載八百餘年數極德盡既於王赧降為庶人用天年終號位已絕於天下尚猶枝葉相持莫得居其虛位海內無主三十餘年秦據埶勝之地騁狙詐之兵蠶食山東壹切取勝因矜其所習自任私知姍笑三代盪滅古法師古曰姍古訕字也訕謗也竊自號為皇帝而子弟為匹夫內亡骨肉本根之輔外亡尺土藩翼之衛陳吳奮其白梃劉項隨而斃之故曰周過其歷秦不及期國埶然也漢興之初海內新定同姓寡少懲戒亡秦孤立之敗於是剖裂疆土立二等之爵功臣侯者百有餘邑尊王子弟大啟九國而藩國大者夸州兼郡連城數十宮室百官同制京師可謂矯枉過其正矣雖然高祖創業日不暇給孝惠享國又淺高后女主攝位而海內晏如亡狂狡之憂卒折諸將之難成太宗之業者亦賴之於諸侯也然諸侯原本以大末流濫以致溢小者淫荒越法大者睽孤橫逆以害身喪國故文帝采賈生之議分齊趙景帝用鼂錯之計削吳楚武帝施主父之冊下推恩之令使諸侯王得分戶邑以封子弟不行黜陟而藩國自析自此以來齊分為七趙分為六梁分為五淮南分為三皇子始立者大國不過十餘城長沙燕代雖有舊名皆亡南北邊矣景遭七國之難抑損諸侯減黜其官武有衡山淮南之謀作左官之律設附益之法諸侯惟得衣食稅租不與政事至於哀平之際皆繼體苗裔親屬踈遠生於帷墻之中不為士民所尊埶與富室亡異而本朝短世國統三絕師古曰謂成哀平皆早崩又無繼嗣是故王莽知漢中外殫微本末俱弱亡所忌憚生其姦心因母后之權假伊周之稱顓作威福廟堂之上不降階序而運天下作謀既成遂據南面之尊分遣五威之吏馳傳天下班行符命漢諸侯王厥角首奉上璽韍惟恐在後或迺稱美頌德以求容媚豈不哀哉是以究其終始彊弱之變明監戒焉漢書外戚恩澤侯表序至乎孝武元功宿將略盡會上亦興文學進拔幽隱公孫弘自海瀕而登宰相於是寵以列侯之爵又疇咨前代詢問耆老初得周後復加爵邑自是之後宰相畢侯矣元成之間晚得殷世以備賓位漢興外戚與定天下侯者二人故誓曰非劉氏不王若有亡功非上所置而侯者天下共誅之是以高后欲王諸將王陵廷爭孝景將侯王氏修侯犯色師古曰修音條卒用廢黜是後薄昭竇嬰上官衛霍之侯以功受爵其餘后父據春秋褒紀之義帝舅緣大雅申伯之意寖廣博矣後漢書光武帝紀大司馬吳漢率九將軍擊檀鄉賊於鄴東大破降之庚辰封功臣皆為列侯大國四縣餘各有差下詔曰博士丁恭議曰古帝王封諸侯不過百里故利以建侯取法於雷易屯卦震下坎上震為雷強幹弱枝所以為治也今封諸侯四縣不合法制帝曰古之亡國皆以無道未嘗聞功臣地多而滅亡者乃遣謁者即授印綬策曰在上不驕滿而不危制節謹度滿而不溢敬之戒之傳爾子孫長為漢藩後漢書史弼傳論曰夫剛烈表性鮮能優寬仁柔用情多乏貞直語曰活千人者子孫必封前書王翁孺曰聞活千人者有封子孫吾所活者萬人後世其興乎史弼頡頏嚴吏頡頏猶上下也終全平原之黨而其後不大不大謂子孫衰替也斯亦未可論也三國志魏志明帝紀六年春二月詔曰古之帝王封建諸侯所以藩屏王室也詩不云乎懷德維寧宗子維城秦漢繼周或彊或弱俱失厥中大魏創業諸王開國隨時之宜未有定制非所以永為後法也其改封諸侯王皆以郡為國晉書劉頌傳頌在郡上疏曰夫聖明不世及後嗣不必賢此天理之常也故善為天下者任勢而不任人任勢者諸侯是也任人者郡縣是也郡縣之察小政理而大勢危諸侯為邦近多違而遠慮固聖王推終始之弊權輕重之理包彼小違以據大安然後足以藩固內外維鎮九服隋書百官志下國王郡王國公郡公縣公侯伯子男凡九等新唐書蕭瑀傳帝問瑀朕欲長保社稷奈何瑀曰三代有天下所以能長久者類封建諸侯以為藩屏秦置守令二世而絕漢分王子弟享國四百年魏晉廢之亡不旋跬此封建之有明效也帝納之始議封建新唐書宗室列傳膠東郡王道德唐始興務廣支蕃鎮天下故從昆弟子凡勝衣以上皆爵郡王太宗即位舉屬籍問大臣曰盡王宗子於天下可乎封德彝曰漢所封惟帝子若親昆弟其屬遠非大功不王如周郇滕漢賈澤尚不得茆土所以別親疏也先朝一切封之爵命崇而力役多以天下為私奉非所以示至公帝曰朕君天下以安百姓不容勞百姓以養己之親於是疏屬王者皆降為公唯嘗有功者不降新唐書宗室列傳贊曰始唐興疏屬畢王至太宗稍稍降封時天下已定帝與名臣蕭瑀等喟然講封建事欲與三代比隆而魏徵李百藥皆謂不然徵意以唐承大亂民人彫喪始復生業遽起而瓜分之故有五不可之說百藥稱帝王自有命歷祚之短長不緣封建又舉春秋二百四十二年之禍亟於哀平桓靈而詆曹元首陸士衡之言以為繆悠而顏師古獨議建諸侯當少其力與州縣雜治以相維持然天子由是罷不復議至名儒劉秩目武氏之禍則建論以為設爵無土署官不職非古之道故權移外家家廟絕而更存存之之理在取順而難逆絕之之原在單弱而無所憚至謂郡縣可以小寧不可以久安大抵與曹陸相上下而杜佑柳宗元深探其本據古驗今而反復焉佑之言曰夫為人置君欲其蕃息則在郡縣然而主祚常促為君置人不病其寡則在建國然而主祚常永故曰建國利一宗列郡利百姓且立法未有不敝者聖人在度其患之長短而為之建國之制初若磐石然敝則鼎峙力爭陵遲而後已故為患也長列郡之制始天下一軌敝則世崩俱潰然而戡定者易為功故其為患也短又謂三王以來未見郡縣之利非不為也後世諸儒因泥古彊為之說非也宗元曰封建非聖人意然而歷堯舜三王莫能去之非不欲去之勢不可也秦破六國列都會置守宰據天下之圖攝制四海此其得也二世而亡有由矣暴威刑竭人力天下相合劫令殺守圜視而並起時則有叛民無叛吏漢矯秦枉剖海內立宗子功臣數十年間奔命扶傷不給時則有叛國無叛郡唐興制州縣而桀黠時起失不在州而在於兵時則有叛將無叛州以為矯而革之垂二百年不在諸侯明矣又言湯之興諸侯歸者三千資以勝夏武王之興會者八百資以滅商徇之為安故仍以為俗是湯武之不得己也不得己非公之大也私其力於己也秦革之者其為制公之大者也其情私也然而公天下之端自秦始云觀諸儒之言誠然然建侯置守如質文遞救亦不可一概責也救土崩之難莫如建諸侯削尾大之勢莫如置守宰唐有鎮帥古諸侯比也故王者視所救為之勿及於敝則善矣若乃百藥推天命佑言郡縣利百姓而主祚促乃臆論也封爵之誓第二史託酈商傳項羽既死漢王立為帝燕王臧荼反商以將軍從計荼戰龍脫先登陷陣破荼軍易下郤敵賜爵列侯與諸將剖符世世不絕史記灌嬰傳嬰者睢陽販繒者也漢王立為皇帝賜益嬰邑三千戶其秋以車騎將軍從擊破燕王藏荼明年從至陳取楚王信還剖符世世不絕食邑穎陰史記夏侯嬰傳漢王立為帝燕王藏荼反嬰以太僕從擊荼明年從至陳取楚王信更食汝陰剖符世世不絕前漢功臣年表曰漢王即帝位八載而天下迺平始論功而定封封爵之誓曰使黃河如帶泰山若厲國以永存爰及苗裔於是申以丹書之信重以白馬之盟前漢陳平傳有人上書言楚王韓信反高祖問陳平計請遊雲夢因擒之還至洛陽與功臣剖符定封封平為戶牖侯世世勿絕前漢樊會傳楚王韓信反噲從至陳取信定楚更賜爵列侯與剖符世世勿絕食舞陽號舞陽侯前漢靳歙傳定江陵降柱國大司馬以下八人身得江陵王致洛陽因定南郡從至陳取楚王信剖符世世勿絕為信武侯前漢傳寬傳以魏五大夫騎將從為舍人因定齊地剖符世世勿絕封陽陵侯餘見立制漢高紀箋證史記酈商列傳曲周侯酈商者陰陽人陳勝起時商聚少年東西略人得數千沛公略地至陳留六月餘商以將卒四千人屬沛公於岐二歲三月攻胡陵項羽既已死漢王為帝其秋燕王臧荼反商以將軍從擊荼戰龍脫先登陷陣破荼軍易下正義易州易縣郤敵遷為右丞相賜爵列侯與諸侯剖符世世勿絕史記灌嬰列傳潁陰侯灌嬰者雎陽販繒者也漢王立為皇帝賜益嬰邑三千戶其秋以車騎將軍從擊破燕王臧荼明年從至陳取楚王信還剖符世世勿絕食潁陰二千五百戶號曰潁陰侯史記夏侯嬰列傳汝陰侯夏侯嬰沛人也漢王立為帝其秋燕王臧荼反嬰以太僕從擊荼明年從至陳取楚王信更食汝陰剖符世世勿絕漢書高惠高后文功臣表三年然後西滅秦立漢王之號五年東克項羽即皇帝位八載而天下迺平始論功而定封封爵之誓曰使黃河如帶泰山若厲國以永存爰及苖裔於是申以丹書之信重以白馬之盟師古曰白馬之盟謂刑白馬歃其血以為盟也漢書陳平傳漢六年人有上書告楚王韓信反黃帝問諸將諸將曰亟發兵阬豎子耳高帝默然以問平平固辭謝曰諸將云何上具告之平曰人之上書言信反人有聞知者乎曰未有曰信知之乎曰弗知平曰陛下兵精孰與楚上曰不能過也平曰陛下將用兵有能敵韓信者乎上曰莫及也平曰今兵不如楚精將弗及而舉兵擊之是趣之戰也竊為陛下危之上曰為之奈何平曰古者天子巡狩會諸侯南方有雲夢陛下第出偽游雲夢會諸侯於陳陳楚之西界信聞天子以好出游其勢必郊迎謁而陛下因禽之特一力士之事耳高帝以為然迺發使告諸侯會陳吾將南游雲夢上因隨以行行至陳楚王信果郊迎道中黃帝豫具武士見信即執縛之還至雒陽與功臣剖符定封封平為戶牖侯世世勿絕漢書樊噲傳樊噲沛人也以屠狗為事後與高祖俱隱於芒碭山澤間陳勝初起蕭何曹參使噲求迎高祖立為沛公楚王韓信反噲從至陳取信定楚更賜爵列侯與剖符世世勿絕食舞陽號為舞陽侯漢書靳歙傳靳歙以中涓從起宛朐別定江陵降柱國大司馬以下八人身得江陵王致雒陽師古曰江陵王謂共敖之子共尉也得而送致於雒陽因定南郡從至陳取楚王信剖符世世勿絕定食四千六百戶為信武侯漢書傅爕傳傅爕以魏五大夫騎將從為舍人因定齊地剖符世世不絕封陽陵侯封功臣後第三史記滑稽優孟傳楚相孫叔敖知其賢人也善待之病且死屬其子曰我死汝必貧困若往見優孟言我孫叔敖之子也居數年其子困窮負薪逢優孟與言優孟即為孫叔敖衣冠抵掌談語歲餘像孫叔敖楚王左左不能別也莊王大驚以為孫叔敖復生也欲以為相優孟曰請歸與歸計之莊王許之優孟復來王曰婦言謂何孟曰婦言慎無為楚相如孫叔敖盡忠為廉以治楚楚王得以霸今死其子無之錐之地貧困負薪以自飲食必如孫叔敖不如自殺於是莊王謝優孟乃召孫叔敖子封之寢丘四百戶以奉其祀前漢三年夏封高祖功臣五人後為列侯前漢宣帝紀元康元年夏復高皇帝功臣絳侯周勃等百三十六人家子孫令奉祭祀世世勿絕其毋嗣者復其次前漢酈商傳元始中賜高祖時功臣自酈商以下子孫爵皆關內侯食邑凡百餘人前漢高惠高后文功巨表封爵之誓曰使黃河如帶泰山若厲國以永存爰及苗裔於是申以丹書之信重以白馬之盟又作十八侯之位次高后復詔陳平盡差列侯之功錄第下竟臧諸宗廟副在有司始未嘗不欲固根本而枝葉稍落也故逮文景四五世間流民既歸戶口亦息列侯大者至三四萬戶小國自倍富厚如之子孫驕逸亡其先祖之艱難多陷法禁隕命亡國訖孝武後元之年靡有孑遺耗矣罔亦少密焉故孝宣愍而錄之及開廟臧覽舊籍詔令有司求其子孫咸出庸保之中並受復除或加以金帛用章中興之德降及孝成復加卹問稍益衰微不絕如線善乎杜業之納說也於是成帝復紹蕭何哀平之世增修曹參周勃之屬得其宜矣前漢景武昭宣元成功臣表昔書稱蠻夷帥服詩云徐方既來春秋列潞子之爵許其慕諸夏也漢興至于孝文時乃有弓高襄城之封弓高侯穨當襄城侯桀龍皆從旬奴來降而相封也雖自外倈本功臣後後漢安帝下詔曰其條二十八將無嗣絕世若犯罪奪國其子孫應當統後者分別署狀上將及景風章敘舊德顯茲遺功焉宋均注景風至則封有功吳顧雍傳永安元年詔曰故丞相雍至德忠賢輔國以禮而侯統廢絕朕甚愍之其以雍次子裕襲爵為醴陵侯以明著舊勳晉文帝紀奏錄先世名臣元功之子孫隨才敘用卷第十六至二十箋證史記滑稽列傳優孟優孟者故楚之樂人也楚相孫叔敖知其賢人也善待之病且死屬其子曰我死汝必貧困若往見優孟言我孫叔敖之子也居數年其子窮困負薪逢優孟與言曰我孫叔敖之子也父且死時屬我貧困往見優孟優孟曰若無遠有所之即為孫叔敖衣冠抵掌談語歲餘像孫叔敖楚王左右不能別也莊王置酒優孟前為壽莊王大驚以為孫叔敖復生也欲以為相優孟曰請歸與婦計之三日而為相莊王許之三日後優孟復來王曰婦言謂何孟曰婦言慎無為楚相不足為也如孫叔敖之為楚相盡忠為廉以治楚楚王得以霸今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺於是莊王謝優孟乃召孫叔敖子封之寢丘四百戶以奉其祀漢書武帝紀三年夏五月封高祖功臣五人後為列侯漢書宣帝紀元康元年夏五月復高皇帝功臣絳侯周勃等百三十六人家子孫令奉祭祀世世勿絕其毋嗣者復其次漢書酈商傳元始中賜高祖時功臣自酈商以下子孫爵皆關內侯食邑凡百餘人漢書高惠高后文功臣表三年然後西滅秦立漢王之號五年東克項羽即皇帝位八載而天下迺平始論功而定封封爵之誓曰使黃河如帶泰山若厲國以永存爰及苖裔於是申以丹書之信重以白馬之盟又作十八侯之位次高后二年復詔丞相陳平盡差列侯之功錄第下竟臧諸宗廟副在有司始未嘗不欲固根本而枝葉稍落也故逮文景四五世間流民既歸戶口亦息列侯大者至三四萬戶小國自倍富厚如之子孫驕逸忘其先祖之艱難多陷法禁隕命亡國或云子孫訖於孝武後元之年靡有孑遺耗矣罔亦少密焉服虔曰法罔差益密也故孝宣皇帝愍而錄之乃開廟臧覽舊籍詔令有司求其子孫咸出庸保之中並受復除或加以金帛用章中興之德降及孝成復加卹問稍益衰微不絕如綫善乎杜業之納說也於是成帝復紹蕭何哀平之世增修曹參周勃之屬得其宜矣漢書景武昭宣元成功臣表昔書稱蠻夷帥服詩云徐方既倈春秋列潞子之爵許其慕諸夏也漢興至于孝文時乃有弓高襄城之封師古曰弓高侯穨當襄城侯桀龍皆從匈奴來降而得封也雖自外倈本功臣後後漢書馮異傳永初六年安帝下詔曰其條二十八將無嗣絕世若犯罪奪國其子孫應當統後者分別署狀上將及景風章敘舊德顯茲遺功焉春秋考異郵曰夏至四十五日景風至宋均注曰景風至則封有功也三國志吳志顧雍傳顧雍字元歎吳郡吳人也永安元年詔曰故丞相雍至德忠賢輔國以禮而侯統廢絕朕甚愍之其以雍次子裕襲爵為醴陵侯以明著舊勳晉書文帝紀秋七月奏錄先世名臣元功大勳之子孫隨才敘用
