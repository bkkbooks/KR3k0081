body:
  text: 卷第四五運第一前漢律曆志易曰炮犧氏之王天下也言炮犧繼天而王為百王先首德始於木故為帝大昊祭典曰共工氏伯九域言雖有水德在火木之間非其序也秦以水德在周漢木火之間周人遷其行序故易不載炎帝以火承木故為炎帝神農氏沒黃帝氏作火生土故為土德少昊土生金故為金德號曰金天氏顓頊金生水故為水德天下號曰高陽氏帝嚳水生木故為木德天下號曰高辛氏前漢郊祀志孝文始以夏郊而張倉據水德公孫臣賈誼更以為土德卒不能明孝武之世文章為盛大初改制而兒寬司馬遷等猶從公孫誼之言服色數度遂順黃德彼以五德之傳從所不勝秦在水德故謂漢據土而克之劉向父子以為帝出於震故包羲氏始受木德其後以母傳子終則復始自神農黃帝下歷唐虞三代而漢得火焉故高祖始起神母夜號著赤帝之符旗章遂赤自得天統矣箋證漢書律歷志太昊帝易曰炮犧氏之王天下也言炮犧繼天而王為百王先首德始於木故為帝太昊作罔罟以田漁取犧牲故天下號曰炮犧氏祭典曰共工氏伯九域師古曰祭典即禮經祭法也伯讀與霸同下亦類此言雖有水德在火木之間非其序也任知刑以強故伯而不王秦以水德在周漢木火之間師古曰志言秦為閏位亦猶共工不當五德之序周人遷其行序故易不載炎帝易曰炮犧氏沒神農氏作言共工伯而不王雖有水德非其序也以火承木故為炎帝教民耕農故天下號曰神農氏黃帝易曰神農氏沒黃帝氏作火生土故為土德與炎帝之後戰於阪泉遂王天下始垂衣裳有軒冕之服故天下號曰軒轅氏少昊帝考德曰少昊曰清師古曰考德者考五帝德之書也清者黃帝之子清陽也是其子孫名摯立土生金故為金德天下號曰金天氏周遷其樂故易不載序於行顓頊帝春秋外傳曰少昊之衰九黎亂德顓頊受之乃命重黎蒼林昌意之子也金生水故為水德天下號曰高陽氏周遷其樂故易不載序於行帝嚳春秋外傳曰顓頊之所建帝嚳受之清陽元囂之孫也水生木故為木德天下號曰高辛氏帝摯繼之不知世數周遷其樂故易不載周人禘之漢書郊祀志贊曰漢興之初庶事草創唯一叔孫生略定朝廷之儀若乃正朔服色郊望之事數世猶未章焉至于孝文始以夏郊而張蒼據水德公孫臣賈誼更以為土德卒不能明孝武之世文章為盛太初改制而兒寬司馬遷等猶從臣誼之言李奇曰公孫臣賈誼服色數度遂順黃德彼以五德之傳從所不勝服虔曰傳音亭傳之傳五帝相承代常以金木水火相勝之法若火滅金便以火代金師古曰傳音張戀反秦在水德故謂漢據土而克之劉向父子以為帝出于震故包羲氏始受木德其後以母傳子終而復始自神農黃帝下歷唐虞三代而漢得火焉故為祖始起神母夜號著赤帝之符旗章遂赤自得天統矣師古曰包讀曰庖鄧展曰向父子雖有此議時不施行至光武建武二年乃用火德色尚赤耳文質第二史記太史公曰物盛則衰時極而轉一質一文終始之變史記梁孝王傳太后謂帝曰吾聞商道親親周道尊尊其義一也安車大駕用孝王為寄景帝問大臣對曰太后意欲立梁王為帝太子帝問其狀袁盎等曰商道親親者立弟周道尊尊者立子商道質質者法天親其所親故立弟周道文文者法地尊者敬也敬其本始故立長子帝曰於公何如皆對曰漢家法周周道不得立弟當立子史記太史公曰夏之政尚忠忠之敝小人以野故商人承之以恭恭之敝小人以鬼故周人承之以文文之敝小人以僿故救僿莫若忠三王之道若循環終而復始周秦之間可謂文敝矣秦政不改反酷刑法豈不繆乎故漢興承敝易變使人不倦得天統矣文尊卑之差前漢董仲舒對策曰然夏上忠商上恭周上文者所繼之救當用此也夏因於虞而獨不言所損益者其道如一而所上同也前漢敘傳吾聞之一陰一陽天墜之方乃文乃質王道之綱有同有異聖德之常後漢崔駰達旨辭聖上之育斯人也朴以皇質雕以唐文後漢魯恭傳肅宗時斷獄皆以冬至之前恭議奏曰夫陰陽之氣相扶而行發動用事各有時節若不當其時則物隨而傷王者雖質文不同而茲道無變前漢杜欽對策今漢家承周秦之敞宜抑文尚質廢奢長全表實去偽後漢曹褒拜博士會肅宗欲制定禮樂詔曰制禮樂放唐之文魏明帝紀世之質文隨世而變魏夏侯玄傳曰文質之更用猶四時之迭興也王者體天理物必因弊而濟通之時彌質則文之以禮時泰侈則救之以質今承百王之末秦漢餘流世俗彌文宜大改之以易民望吳韋曜下獄華核上疏救曜曰事平之後當觀時設制三王不相因禮五帝不相沿樂質文殊塗損益異體宜得曜輩有所改立晉紀瞻舉秀才陸機策之曰昔三代明王啓建洪業文質殊制而令名一致然夏人尚忠忠之敝也朴救朴莫若恭商人革而修焉恭之敝也鬼救鬼莫若文周人矯而變焉文之敝也薄救薄則反之於忠然則三王之道反覆其無一定耶亦所祖之不同而功業之各異也瞻對曰忠敝質野恭失多儀周監二王之敝崇文以辨等差而流遁者歸薄而無款誠款誠之薄則又反之於忠三代相循如水濟火所謂隨時之義救敝之術也羲皇簡朴無為而化後聖因承所務或異非賢聖之不同世變使之然爾箋證史記平準書太史公曰農工商交易之路通而龜貝金錢刀布之幣興焉索隱錢本名泉言貨之流如泉也故周有泉府之官及景王乃鑄大錢布泉者言貨流布所從來久遠自高辛氏之前尚矣靡得而記云故書道唐虞之際詩述殷周之世安寧則長庠序先本絀末以禮義防于利事變多故而亦反是是以物盛則衰時極而轉集解徐廣曰時一作衰一質一文終始之變也史記梁孝王世家褚先生曰蓋聞梁王西入朝謁竇太后燕見與景帝俱侍坐於太后前語言私説太后謂帝曰吾聞殷道親親周道尊尊其義一也索隱殷人尚質親親謂親其弟而授之周人尚文尊尊謂尊祖之正體故立其子尊其祖也安車大駕用梁孝王為寄景帝跪席舉身曰諾罷酒出帝召袁盎諸大臣通經術者曰太后言如是何謂也皆對曰太后意欲立梁王為帝太子帝問其狀袁盎等曰殷道親親者立弟周道尊尊者立子殷道質質者法天親其所親故立弟周道文文者法地尊者敬也敬其本始故立長子周道太子死立適孫殷道太子死立其弟帝曰於公何如皆對曰方今漢家法周周道不得立弟當立子史記高祖本紀太史公曰夏之政忠忠之敝小人以野集解鄭玄曰忠質厚也野少禮節也故殷人承之以敬敬之敝小人以鬼集解鄭玄曰多威儀如事鬼神故周人承之以文文之敝小人以僿集解徐廣曰一作薄駰按史記音隱曰僿音西志反鄭玄曰文尊卑之差也薄苟習文法無悃誠也索隱鄭音先代反鄒本作薄音扶各反本一作僿而徐廣云一作薄是本互不同也然此語本出禮表記作其民之敝利而巧文而不慙賊而蔽也裴又引音隱云僿音西志者蔽僿聲相近故以蔽為僿爾故救僿莫若以忠三王之道若循環終而復始周秦之間可謂文敝矣秦政不改反酷刑法豈不繆乎故漢興承敝易變使人不倦得天統矣漢書董仲舒傳仲舒復對曰改正朔易服色以順天命而已其餘盡循堯道何更為哉故王者有改制之名亡變道之實然夏上忠殷上敬周上文者所繼之救當用此也師古曰繼謂所受先代之次也救謂救其弊也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也師古曰論語載孔子之言此言百王之用以此三者矣夏因於虞而獨不言所損益者其道如一而所上同也漢書敘傳顏耽樂於簞瓢孔終篇於西狩師古曰謂作春秋止於獲麟也聲盈塞於天淵真吾徒之師表也且吾聞之一陰一陽天墬之方師古曰墜古地字乃文乃質王道之綱有同有異聖德之常卷一百上後漢書崔駰傳崔駰字亭伯涿郡安平人也年十三能通詩易春秋博學有偉才盡通古今訓詁百家之言善屬文少遊太學與班固傅毅同時齊名常以典籍為業未遑仕進之事時人或譏其太玄靜將以後名失實駰擬揚雄解嘲作達旨以答焉其辭曰德讓不修則非忠也是以險則救俗平則守禮舉以公心不私其體今聖上之育斯人也朴以皇質雕以唐文孔子曰大哉堯之為君也煥乎其有文章故言唐文後漢書魯恭傳魯恭字仲康扶風平陵人也其先出於魯頃公為楚所滅遷於下邑因氏焉初和帝末下令麥秋得案驗薄刑而州郡好以苛察為政因此遂盛夏斷獄恭上疏諫曰臣伏見詔書敬若天時若順也尚書堯典曰乃命羲和欽若昊天敬授人時夫斷薄刑者謂其輕罪已正不欲令久繫故時斷之也臣愚以為今孟夏之制可從此令其決獄案考皆以立秋為斷以順時節育成萬物則天地以和刑罰以清矣初肅宗時斷獄皆以冬至之前自後論者互多駮異鄧太后詔公卿以下會議恭議奏曰夫陰陽之氣相扶而行發動用事各有時節若不當其時則物隨而傷王者雖質文不同而茲道無變漢書杜欽傳欽字子夏少好經書家富而目偏盲師古曰盲目無見也偏盲者患一目也今俗乃以兩目無見者始為盲語移轉也故不好為吏欽為人深博有謀上盡召直言之士詣白虎殿對策策曰天地之道何貴王者之法何如六經之義何上人之行何先取人之術何以師古曰以用也當世之治何務各以經對師古曰取經義以對欽對曰殷因於夏尚質周因於殷尚文今漢家承周秦之敝宜抑文尚質廢奢長儉表實去偽師古曰長謂崇貴之也表明也後漢書曹褒傳曹褒字叔通魯國薛人也父充持慶氏禮褒少篤志有大度結髮傳充業博雅疏通尤好禮初舉孝廉再遷圉令圉縣屬陳留故城在今汴州雍丘縣南也免官歸郡為功曹徵拜博士會肅宗欲制定禮樂元和二年下詔曰河圖稱赤九會昌十世以光十一以興九謂光武十謂明帝十一謂章帝也尚書璇璣鈐曰述堯理世平制禮樂放唐之文三國志魏志明帝紀太和四年春二月壬午詔曰世之質文隨教而變兵亂以來經學廢絶後生進趣不由典謨三國志魏志夏侯尚傳附子夏侯玄玄字太初少知名弱冠為散騎黃門侍郎嘗進見與皇后弟毛曾並坐玄恥之不悅形之於色明帝恨之左遷為羽林監正始初曹爽輔政玄爽之姑子也纍遷散騎常侍中護軍太傅司馬宣王問以時事玄議以為夫官才用人國之柄也又以為文質之更用猶四時之迭興也王者體天理物必因弊而濟通之時彌質則文之以禮時泰侈則救之以質今承百王之末秦漢餘流世俗彌文宜大改之以易民望三國志吳志韋曜傳韋曜字弘嗣吳郡雲陽人也曜本名昭史為晉諱改之少好學能屬文孫皓即位封高陵亭侯時有疾病醫藥監護持之愈急皓每饗宴無不竟日坐席無能否率以七升為限雖不悉入口皆澆灌取盡曜素飲酒不過三升初見禮異時常為裁減或密賜茶荈以當酒至於寵衰更見逼強輒以為罪又於酒後使侍臣難折公卿以嘲弄侵克發摘私短以為歡時有愆過或誤犯晧諱輒見收縛至於誅戮曜以為外相毀傷內長尤恨使不濟濟非佳事也故但示難問經義言論而已晧以為不承用詔命意不忠藎遂積前後嫌忿收曜付獄是歲鳳皇二年也華核連上疏救曜曰昔李陵為漢將軍敗不還而降胸奴司馬遷不加疾惡為陵遊説漢武帝以遷有良史之才欲使畢成所撰忍不加誅書卒成立垂之無窮今曜在吳亦漢之史遷也伏見前後符瑞彰著神指天應繼出纍見一統之期庶不復久事平之後當觀時設制三王不相因禮五帝不相沿樂質文殊塗損益異體宜得曜輩依準古義有所改立晉書紀瞻紀瞻字思遠丹陽秣陵人也祖亮吳尚書令父陟光祿大夫瞻少以方直知名吳平徙家歷陽郡察孝廉不行後舉秀才尚書郎陸機策之曰昔三代明王啓建洪業文質殊制而令名一致然夏人尚忠忠之弊也朴救朴莫若敬殷人革而修焉敬之弊也鬼救鬼莫若文周人矯而變焉文之弊也薄救薄則又反之於忠然則王道之反覆其無一定邪亦所祖之不同而功業各異也自無聖王人散久矣三代之損益百姓之變遷其故可得而聞邪今將反古以救其弊明風以蕩其穢三代之制將何所從太古之化有何異道瞻對曰瞻聞有國有家者皆欲邁化隆政以康庶績垂歌億載永傳于後然而俗變事弊得失隨時雖經聖哲無以易也故忠弊質野敬失多儀周鑒二王之弊崇文以辨等差而流遁者歸薄而無款誠款誠之薄則又反之於忠三代相循如水濟火所謂隨時之義救弊之術也羲皇簡朴無為而化後聖因承所務或異非賢聖之不同世變使之然耳撥亂反正第三前漢高祖紀群臣曰帝起細微撥亂世反之正平定天下為漢太祖功最高上尊號曰高皇帝後漢荀悅論漢四百有六載撥亂反正統武興文魏志明帝紀有司奏武皇帝撥亂反正為魏太祖樂用武始之舞魏鐘會檄蜀文往者漢祖衰微率土分崩生民之命幾於泯滅太祖武皇帝神武聖哲撥亂反正拯其將墜造我區夏魏鮑勛傳注父信與弟韜以兵應太祖太祖與袁紹相持信行破虜將軍韜裨將軍時紹衆最盛豪桀多向之信獨謂太祖曰夫略不世出總攬英雄撥亂反正者君也苟非其人雖強必斃太祖亦親異焉新唐傅奕傳奕謂承亂世之後當有變革故曰革之時大矣哉陛下撥亂反正而官名律令一用隋舊且懲沸羹者吟冷齏傷弓之鳥驚曲木況天下久苦隋暴安得不新其耳目哉箋證漢書高帝紀夏四月甲辰帝崩于長樂宮乃以丁未發喪大赦天下五月丙寅葬長陵已下蘇林曰下音下書之下鄭氏曰已下棺也師古曰蘇音鄭説是也下音胡亞反皇太子群臣皆反至太上皇廟群臣曰帝起細微撥亂世反之正平定天下為漢太祖功最高上尊號曰高皇帝師古曰尊號諡也後漢書荀悅傳附孫荀悅悅字仲豫儉之子也儉早卒悅年十二能説春秋家貧無書每之人間所見篇牘一覽多能誦記性沈靜美姿容尤好著述靈帝時閹官用權士多退身窮處悅乃託疾隱居時人莫之識從弟彧特稱敬焉初辟鎮東將軍曹操府遷黃門侍郎獻帝頗好文學悅與彧及少府孔融侍講禁中旦夕談論纍遷祕書監侍中帝好典籍常以班固漢書文繁難省乃令悅依左氏傳體以為漢紀三十篇辭約事詳論辨多美其序之曰漢四百有六載撥亂反正統武興文永惟祖宗之洪業思光啓乎萬嗣三國志魏志明帝紀景初元年春正月壬辰山茌縣言黃龍見五月己巳行還洛陽宮己丑大赦六月戊申京都地震己亥以尚書令陳矯為司徒尚書左僕射衛臻為司空丁未有司奏武皇帝撥亂反正為魏太祖樂用武始之舞文皇帝應天受命為魏高祖樂用咸熙之舞三國志魏志鍾會傳鍾會字士季潁川長社人太傅繇小子也少敏慧夙成壯有才數技藝而博學精練名理以夜續晝由是獲聲譽正始中以為祕書郎遷尚書中書侍郎景元三年冬以會為鎮西將軍假節都督關中諸軍事會徑過西出陽安口遣人祭諸葛亮之墓使護軍胡烈等行前攻破關城得庫藏積榖薑維自沓中還至陰平合集士衆欲赴關城未到聞其已破退趣白水與蜀將張翼廖化等合守劍閣拒會會移檄蜀將吏士民曰往者漢祚衰微率土分崩生民之命幾於泯滅太祖武皇帝神武聖哲撥亂反正拯其將墜造我區夏三國志魏志鮑勛傳注魏書曰信父丹官至少府侍中世以儒雅顯少有大節寬厚愛人沈毅有謀大將軍何進辟拜騎都尉遣歸募兵得千餘人還到成罪而進已遇害信至京師董卓亦始到信知卓必為亂勸袁紹襲卓紹畏卓不敢發語在紹傳信乃引軍還鄉里收徒衆二萬騎七百輜重五千餘乘是歲太祖始起兵於己吾信與弟韜以兵應太祖太祖與袁紹表信行破虜將軍韜裨將軍時紹衆最盛豪傑多向之信獨謂太祖曰夫略不世出能㧾攬英雄以撥亂反正者君也苟非其人雖強必斃君殆天之所啓遂深自結納太祖亦親異焉新唐書傅奕傳傅奕相州鄴人隋開皇中以儀曹事漢王諒高祖為扶風太守禮之及即位拜太史丞時國制草具多仍隋舊奕謂承亂世之後當有變更乃上言龍紀火官黃帝廢之咸池六英堯不相沿禹弗行舜政周弗襲湯禮易稱已日乃孚革而信也故曰革之時大矣哉有隋之季違天害民專峻刑法殺戮賢俊天下兆庶同心叛之陛下撥亂反正而官名律令一用隋舊且懲沸羹者吹冷齏傷弓之鳥驚曲木况天下久苦隋暴安得不新其耳目哉獨斷第四史記李斯傳凡聖主者必將能拂世摩俗而廢其所惡立其所欲故生則有尊重之勢死則有賢明之諡也是以明君獨斷故權不在臣也史記李斯傳明主聖王之所以能久處尊位長執重勢而獨擅天下之利者非有異道也能獨斷而審督責必深罰故天下不敢犯也史記始皇本紀天下之事無大小皆決於上上至以衡石量書日夜有程不中程不得休息前漢鄒陽曰聖王制世御俗獨化於陶鈞之上而不牽乎卑辭之語不奪乎衆多之口前漢翼奉傳觀性以歷觀情以律明主所宜獨用難與二人並也故曰顯諸仁藏諸用露之則不神獨行則自然魏劉廙傳太祖時上疏曰聖人不以智輕俗王者不以人廢言故能成功於千載者必以近察遠智周於獨斷者不恥於下問亦欲博采必盡於衆也吳志評曰曹公乘漢相之資挾天子而掃群桀新蕩荊城仗威東夏于時議者莫不疑二周瑜魯肅建獨斷之明出衆人之表實奇才也晉張實傳高昌隗瑾進言曰聖王將舉大事必崇三訊之法朝置諫官以正大理疑承輔弼以補闕拾遺今事無巨細盡決聖慮興軍布令朝中不知若有謬闕則下無分謗竊謂宜偃聰塞智聞納群言政刑大小與衆共之若常內斷聖心則群僚畏威而面從矣箋證史記李斯列傳李斯者楚上蔡人也索隱地理志汝南有上蔡縣云古蔡國周武王弟叔度所封至十八代平侯徙新蔡二蔡皆屬汝南後二代至昭侯徙下蔡屬沛六國時為楚地故曰楚上蔡也年少時為郡小吏索隱郡一作鄉劉氏云掌鄉內文書乃從荀卿學帝王之術學已成度楚王不足事而六國皆弱無可為建功者欲西入秦辭於荀卿故斯將西説秦王矣至秦會莊襄王卒李斯乃求為秦相文信侯呂不韋舍人不韋賢之任以為郎以書對曰凡賢主者必將能拂世摩俗而廢其所惡立其所欲索隱拂音扶弗反摩音莫何反拂世言與世情乖戾摩俗言磨礪於俗使從己也故生則有尊重之勢死則有賢明之諡也是以明君獨斷故權不在臣也史記李斯列傳明主聖王之所以能久處尊位長執重勢而獨擅天下之利者非有異道也能獨斷而審督責必深罰故天下不敢犯也史記秦始皇本紀盧生相與謀曰始皇為人天性剛戾自用起諸侯并天下意得欲從以為自古莫及已專任獄吏獄吏得親幸博士雖七十人特備員弗用丞相諸大臣皆受成事倚辦於上上樂以刑殺為威天下畏罪持祿莫敢盡忠上不聞過而日驕下懾伏謾欺以取容秦法不得兼方集解徐廣曰一云并力正義言秦施法不得兼方者令民之有方伎不得兼兩齊試不驗輒賜死言法酷不驗輒死然候星氣者至三百人皆良士畏忌諱諛不敢端言其過天下之事無大小皆決於上上至以衡石量書集解駰案石百二十斤正義衡稱衡也言表箋奏請稱取一石日夜有程期不滿不休息日夜有呈不中呈不得休息貪於權勢至如此未可為求仙藥於是乃亡去史記鄒陽列傳鄒陽者齊人也遊於梁與故吳人莊忌夫子淮陰枚生之徒交上書索隱忌會稽人姓莊氏字夫子後避漢明帝諱改姓曰嚴枚生名乘字叔其子罪漢書並有傳蓋以銜枚氏而得姓也而介於羊勝公孫詭之間索隱言鄒陽上書自達而遊於二人之間或往彼或往此介者言有隔於其間故杜預曰介猶間也勝等嫉鄒陽惡之梁孝王孝王怒下之吏將欲殺之鄒陽客遊以讒見禽恐死而負纍乃從獄中上書曰今夫天下布衣窮居之士身在貧賤雖包堯舜之術索隱言蒙被堯舜之道也挾伊管之辨懷龍逄比干之意欲盡忠當世之君而素無根柢之容雖竭精思欲開忠信輔人主之治則人主必有按劍相眄之迹是使布衣不得為枯木朽株之資也是以聖王制世御俗獨化於陶鈞之上而不牽於卑亂之語不奪於衆多之口漢書翼奉傳翼奉字少君東海下邳人也治齊詩與蕭望之匡衡同師上以奉為中郎召問奉來者以善日邪時孰與邪日善時奉對曰師法用辰不用日辰疏而時精其效同功必參五觀之然後可知故曰察其所繇省其進退參之六合五行則可以見人性知人情難用外察從中甚明故詩之為學情性而已五性不相害六情更興廢觀性以歷觀情以律明主所宜獨用難與二人共也故曰顯諸仁臧諸用露之則不神獨行則自然矣三國志魏志劉廙傳劉廙字恭嗣南陽安衆人也魏國初建為黃門侍郎太祖在長安欲親征蜀廙上疏曰聖人不以智輕俗王者不以人廢言故能成功於千載者必以近察遠智周於獨斷者不恥於下問亦欲博采必盡於衆也三國志吳志周瑜魯肅呂蒙傳評曰曹公乘漢相之資挾天子而掃群桀新蕩荊城仗威東夏于時議者莫不疑二周瑜魯肅建獨斷之明出衆人之表實奇才也晉書張軌傳附軌子張實傳高昌隗瑾進言曰聖王將舉大事必崇三訊之法朝置諫官以匡大理疑承輔弼以補闕拾遺今事無巨細盡決聖慮興軍布令朝中不知若有謬闕則下無分謗竊謂宜偃聰塞智開納群言政刑大小與衆共之若恆內聖心則群僚畏威而面從矣失斷第五史記春申君傳太史公曰當斷不斷反受其亂其春申失朱英之謂邪前漢元帝紀贊曰少而好儒及即位用儒生委之以政貢薛韋康迭為宰相而上牽制文義優遊不斷孝宣之業衰焉然寬鴻盡下出於恭儉號令溫雅有古之風烈前漢稚圭傳曰治性之道必審己之所有餘強其所不足勇猛剛強者戒於太暴仁愛溫良者戒於無斷前漢劉向上封事曰夫執狐疑之心者來讒賊之口持不斷之意者開群枉之門晉五行志太康元年五月上黨雁門雨雹傷禾麥三豆是時王濬有大功而權戚互加陷抑帝從容不斷陰脅陽之應也新唐江夏郡王道宗傳侯君集破高昌還頗怨望道宗言其必反帝問其狀對曰見其忌而矜功恥為房李下帝曰君集誠有功材無不堪朕寧惜爵位邪第未及耳既而君集反帝笑曰如公素揣新唐尉遲敬德傳敬德入白秦王曰大王不先決社稷危矣王曰我惟同氣所未忍伺其發而後以義討之敬德曰處事有疑非智臨難不決非勇請速誅太子新唐建成傳秦王既殺建成蕭瑀陳叔達曰臣聞內外無限父子不親失而弗斷反蒙其亂建成元吉自草昧以來未始立謀既立又無切德疑二相濟為蕭墻憂秦王功蓋天下內外歸心立為太子付軍國大務陛下釋重負矣帝曰此吾志也乃召秦王至慰撫之曰朕幾有投杼之惑秦王號泣不能止箋證史記春申君列傳太史公曰吾適楚觀春申君故城宮室盛矣哉初春申君之説秦昭王及出身遣太子歸何其智之明也後制於李園旄矣語曰當斷不斷反受其亂春申君失朱英之謂邪漢書元帝紀贊曰臣外祖兄弟為元帝侍中應劭曰元成帝紀皆班固父彪所作臣則彪自説也外祖金敞也如淳曰班固外祖樊叔皮也師古曰應説是語臣曰元帝多材藝善史書應劭曰周宣王太史史籀所作大篆鼓琴瑟吹洞簫自度曲被歌聲分刌節度窮極幼眇師古曰幼眇讀曰要妙少而好儒及即位徵用儒生委之以政貢薛韋匡迭為宰相師古曰貢禹薛廣德韋賢匡衡迭互而為丞相也迭音大結反而上牽制文義優遊不斷師古曰為文義所牽制故不斷決孝宣之業衰焉然寬弘盡下出於恭儉號令溫雅有古之風烈漢書匡衡傳衡復上疏曰臣聞治亂安危之機在乎審所用心傳曰審好惡理情性而王道畢矣能盡其性然後能盡人物之性能盡人物之性宋祁曰江南本二句中並無物字浙本有可以贊天地之化師古曰贊助也治性之道必審已之所有餘而強其所不足蓋聰明疏通者戒於大察寡聞少見者戒於雍蔽勇猛剛強者戒於大暴仁愛溫良者戒於無斷漢書楚元王傳附劉向向字子政本名更生年十二以父德任為輦郎既冠以行修飭擢為諫大夫更生見堪猛在位幾已得復進師古曰幾讀曰冀懼其傾危乃上封事諫曰夫執狐疑之心者來讒賊之口持不斷之意者開群枉之門師古曰枉曲也晉書五行志下太康元年三月河東高平霜雹傷桑麥五月東平平陽上黨鴈門濟南雨雹傷禾麥三豆是時王濬有大功而權戚互加陷抑帝從容不斷陰脅陽之應也新唐書宗室列傳江夏郡王道宗傳侯君集破高昌還頗怨望道宗嘗從容奏言君集智小言大且為戎首帝問所以知必反者對曰見其忌而矜功恥為房李下官尚書常鬱鬱不平帝曰君集誠有功材無不堪朕寧惜爵位邪第未及耳不宜輕億度使自猜危既而君集反帝笑曰如公素揣新唐書尉遲敬德傳尉遲敬德名恭以字行朔州善陽人隋大業末從軍隱太子嘗以書招之贈金皿一車辭曰敬德起幽賤會天下喪亂久陷逆地秦王實生之方以身徇恩今於殿下無功其敢當賜若私許則懷二心徇利棄忠殿下亦焉用之哉太子怒而止敬德以聞王曰公之心如山嶽然雖積金至斗豈能移之然恐非自安計巢王果遣壯士刺之敬德開門安臥賊至不敢入因譖於譖祖將殺之王固爭得免其後隱巢計日急敬德與長孫無忌入白曰大王不先決社稷危矣王曰我惟同氣所未忍伺其發而後以義討之如何敬德曰人情畏死衆以死奉王此天授也天與不取反得其咎大王德不聽請從此亡不能交手蒙戮無忌曰王不從敬德言敬德亦非王有今敗矣王曰寡人之謀未可全棄公更圖之敬德曰處事有疑非智臨難不決非勇新唐書高祖諸子列傳隱太子建成秦王射建成即死元吉中矢走敬德追殺之俄而東宮齊府兵三千攻玄武門閉不得入接戰久之矢及殿屋王左右數百騎至合擊之衆遂潰帝謂裴寂等曰事今奈何蕭瑀陳叔達曰臣聞內外無限父子不親失而弗斷反蒙其亂建成元吉自草昧以來未始與謀既立又無功德疑二相濟為蕭墻憂秦王功蓋天下內外歸心立為太子付軍國大務陛下釋重負矣帝曰此吾志也乃召秦王至慰撫之曰朕幾有投杼之惑秦王號泣不能止天子無戲言第六史記晉世家成王與叔虞戲削桐葉為圭以與叔虞曰以比封若史佚因請擇曰立叔虞成王曰吾與戲爾史佚曰天子無戲言言則史書之禮成之樂歌之於是遂封叔虞於唐前漢佞幸董賢傳上置酒麒麟殿上有酒所從容視賢笑曰吾欲法堯禪舜何如閎曰天下乃高皇帝天下非陛下之有也陛下承宗廟當傳子孫於亡窮統業至重天子亡戲言上不悅魏王肅上疏曰周公曰天子無戲言言則史書之工誦之士稱之言猶不戲而況行之乎魏蔣濟傳時有詔詔征南將軍夏侯尚曰卿腹心重將特當任使作威作福殺人活人尚以示濟帝問曰卿所聞見天下風教何如濟對曰未有他善但見亡國之語爾帝問其故濟曰夫作威作福書之明誡天子無戲言惟陛下察之於是帝遣追取前詔晉載記姚萇傳及符堅寇晉以萇為龍驤將軍謂曰朕本以龍驤建業龍驤之號未曾假人今特以相授竇衝進曰王者無戲言此將不祥之召也惟陛下察之晉載記慕容德傳德僭即皇帝位宴群臣酒酣曰朕可方自古何等主也鞠仲曰陛下中興之聖后少康光武之儔也德賜仲帛千匹仲以賜多為讓德曰卿知調朕朕不知調卿乎卿飾對非實故亦以虛言相賞賞不謬加何足謝也韓範進曰臣聞天子無戲言忠臣無妄對今日之論上下相欺可謂臣主俱失德大悅賜範絹五十匹自是昌言競進朝多直士矣新唐孫伏伽傳上疏曰臣聞王者無戲言書稱爾無不信朕不食言言之不可不慎也新唐張玄素傳始玄素與孫伏伽在隋皆為令史太宗嘗問玄素宦立所來深自羞汙褚遂良見帝曰君子不失言於人明王不失言於戲故言則史書之禮成之樂歌之居上能禮其臣乃盡力以奉其上箋證史記晉世家唐叔虞者周武王子而成王弟初武王與叔虞母會時夢天謂武王曰余命女生子名虞余與之唐及生子文在其手曰虞故遂因命之曰虞武王崩成王立唐有亂周公誅滅唐成王與叔虞戲削桐葉為圭以與叔虞曰以此封若史佚因請擇日立叔虞成王曰吾與之戲爾史佚曰天子無戲言言則史書之禮成之樂歌之於是遂封叔虞於唐唐在河汾之東方百里故曰唐叔虞漢書佞幸傳董賢傳後上置酒麒麟殿師古曰在未央宮賢父子親屬宴飲王閎兄弟侍中中常侍皆在側上有酒所師古曰言酒在體中從容視賢笑曰吾欲法堯禪舜何如閎進曰天下乃高皇帝天下非陛下之有也陛下承宗廟當傳子孫於亡窮統業至重天子亡戲言上默然不説師古曰説讀曰悅三國志魏志王朗傳附子王肅景初間宮室盛興民失農業期信不敦刑殺倉卒肅上疏曰大魏承百王之極生民無幾干戈未戢誠宜息民而惠之以安靜遐邇之時也漢時有犯蹕驚乘輿馬者廷尉張釋之奏使罰金文帝怪其輕而釋之曰方其時上使誅之則已今下廷尉廷尉天下之平也一傾之天下用法皆為輕重民安所措其手足臣以為大失其義非忠臣所宜陳也廷尉者天子之吏也猶不可以失平而天子之身反可以惑謬乎斯重於為己而輕於為君不忠之甚也周公曰天子無戲言言則史書之工誦之士稱之言猶不戲而况行之乎故釋之之言不可不察周公之戒不可不法也三國志魏志蔣濟傳蔣濟字子通楚國平阿人也仕郡計吏州別駕文帝即王位轉為相國長史及踐阼出為東中郎將濟請留詔曰高祖歌曰安得猛士守四方天下未寧要須良臣以鎮邊境如其無事乃還鳴玉未為後也濟上萬幾論帝善之入為散騎常侍時有詔詔征南將軍夏侯尚曰卿腹心重將特當任使恩施足死惠愛可懷作威作福殺人活人尚以示濟濟既至帝問曰卿所聞見天下風教何如濟對曰未有他善但見亡國之語耳帝忿然作色而問其故濟具以答因曰夫作威作福書之明誡天子無戲言古人所慎惟陛下察之於是帝意解遣追取前詔晉書載記姚萇傳萇字景茂弋仲第二十四子也少聰哲多權略廓落任率不修行業諸兄皆奇之及苻堅寇晉以萇為龍驤將軍督益梁州諸軍事謂萇曰朕本以龍驤建業龍驤之號未曾假人今特以相授山南之事一以委卿堅左將軍竇衝進曰王者無戲言此將不祥之徵也惟陛下察之堅默然晉書載記慕容德傳四年僣即皇帝位于南郊大赦改元為建平後因宴其群臣酒酣笑而言曰朕雖寡薄恭已南面而朝諸侯在上不驕夕惕於位可方自古何等主也其青州刺史鞠仲曰陛下中興之聖后少康光武之儔也德顧命左右賜仲帛千匹仲以賜多為讓德曰卿知調朕朕不知調卿乎卿飾對非實故亦以虛言相賞賞不謬加何足謝也韓範進曰臣聞天子無戲言忠臣無妄對今日之論上下相欺可謂君臣俱失德大悅賜範絹五十匹自是昌言競進朝多直士矣新唐書孫伏伽傳孫伏伽貝州武城人仕隋以小史纍勞補萬年縣法曹初帝受禪伏伽最先諫帝欲盡下情故不次見拔以示群臣是時軍興賦斂重伏伽數請釐損帝語裴寂曰隋為無道主驕於上臣諂於下下上蔽蒙至身死匹夫手寧不痛哉我今不然平亂責武臣守成責儒臣程能付事以佐不逮虛心盡下冀聞嘉言若李綱孫伏伽可謂誼臣矣俯首噤默豈朕所望哉東都平大赦天下又欲責賊支黨悉流徙惡地伏伽諫曰臣聞王者無戲言書稱爾無不信朕不食言言之不可不慎也新唐書張玄素傳太宗即位問以政對曰自古未有如隋亂者得非君自專法日亂乎且萬乘之尊身決庶務帝曰善拜侍御史遷給事中高宗時以老致仕麟德初卒始玄素與孫伏伽在隋皆為令史太宗嘗問玄素宦立所來深自羞汙褚遂良見帝曰君子不失言於人明主不失言於戲故言則史書之禮成之樂歌之居上能禮其臣乃盡力以奉其上廣聰明第七前漢朱博傳何武為大司空又與丞相方進共奏言古選諸侯賢者以為州伯書曰咨十有二牧所以廣聰明燭幽隱也前漢袁盎傳曰陛下從代來每朝郎官者上書疏未嘗不止輦受其言何也欲以致天下賢英日聞所不聞以益聖前漢董仲舒傳陛下并有天下海內莫不率服廣覽兼聽極群下之知盡天下之美至德昭然施于方外後漢胡廣傳上書曰君以兼覽博照為德臣以獻可替不為忠後漢何敞上疏曰聖王闢四門開四聰延直言之路下不諱之詔後漢靈帝時巨鹿張角偽託大道妖惑小民陶上疏曰聖王以天下耳目為視聽故能無不聞見後漢申屠剛傳與囂書曰愚聞專己者孤拒諫者塞孤塞之政亡國之風也雖有明聖之姿猶屈己從衆故慮無道策舉無過事夫聖人不以獨見為明而以萬物為心順人者昌逆人者亡此古今之所共也晉孔衍傳元明二帝並親愛之王敦專權衍私於太子曰殿下宜博延朝彥搜揚才俊詢謀時政以廣聰明新唐魏徵傳帝因問為君者何道而明何失而暗徵曰君所以明兼聽也所以暗偏信也堯舜氏闢四門雖有共鯀不能塞秦二世任趙高天下潰叛而不得聞故曰能兼聽則下情通矣箋證漢書朱博傳朱博字子元杜陵人也初何武為大司空又與丞相方進共奏言古選諸侯賢者以為州伯書曰咨十有二牧師古曰虞書舜典之辭也宋祁曰浙本云咨十有二牧配哉所以廣聰明燭幽隱也漢書爰盎傳爰盎字絲其父楚人也故為群盜徙安陵高后時盎為呂祿舍人孝文即位盎兄噲任盎為郎中盎即起説曰君為相自度孰與陳平絳侯丞相曰不如盎曰善君自謂弗如夫陳平絳侯輔翼高帝定天下為將相而誅諸呂存劉氏君乃為材官蹶張遷為隊帥如淳曰隊帥軍中小官師古曰帥音所類反積功至淮陽守非有奇計攻城野戰之功且陛下從代來每朝郎官者上書疏未嘗不止輦受其言不可用置之言可采未嘗不稱善何也欲以致天下賢英士大夫日聞所不聞以益聖漢書董仲舒傳仲舒對曰臣聞堯受命以天下為憂而未以位為樂也故孔子曰導之以政齊之以刑民免而無恥此之謂也今陛下并有天下海內莫不率服廣覽兼聽極群下之知盡天下之美至德昭然施于方外後漢書胡廣傳胡廣字伯始南郡華容人也廣少孤貧親執家苦襄陽耆舊記廣父名寵寵妻生廣早卒寵更娶江陵黃氏生康字仲始既到京師試以章奏安帝以廣為天下第一謝承書曰廣有雅才學究五經古今術藝皆畢覽之年二十七舉孝廉旬月拜尚書郎五遷尚書僕射時尚書令左雄議改察舉之制限年四十以上儒者試經學文吏試章奏廣復與敞虔上書駮之曰臣聞君以兼覽博照為德即明四目達四聰也臣以獻可替否為忠左傳曰齊晏子曰君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否後漢書郅惲傳附子郅壽郅惲字君章汝南西平人也壽字伯孝善文章以廉能稱憲及其弟篤景並起第宅驕奢非法百姓苦之壽以府藏空虛軍旅未休遂因朝會譏刺憲等厲音正色辭旨甚切憲怒陷壽以買公田誹謗下吏當誅侍御史何敞上疏理之曰臣聞聖王闢四門開四聰延直言之路下不諱之詔立敢諫之旗聽歌謠於路歌謠謂詩也禹置敢諫之幡禮記王制曰命太師陳詩觀民風鄭玄注云陳詩謂采其詩而示之後漢書劉陶傳劉陶字子奇一名偉潁川潁陰人濟北貞王勃之後陶為人居簡不修小節後陶舉孝廉除順陽長陶明尚書春秋為之訓詁推三家尚書三家謂夏侯建夏侯勝歐陽和伯也及古文是正文字三百餘事名曰中文尚書頃之拜侍御史靈帝宿聞其名數引納之時巨鹿張角偽託大道妖惑小民陶與奉車都尉樂松議郎袁貢連名上疏言之曰聖王以天下耳目為視聽故能無不聞見後漢書申屠剛傳申屠剛字巨卿扶風茂陵人也七世祖嘉文帝時為丞相剛質性方直常慕史鰌汲黯之為人史記曰史鰌字子魚衛大夫也論語孔子曰直哉史魚邦有道如矢邦無道如矢前漢書汲黯字長孺武帝時為主爵都尉好直諫時人謂之汲直建武七年詔書徵剛剛將歸與囂書曰愚聞專已者孤拒諫者塞孤塞之政亡國之風也雖有明聖之姿猶屈己從衆故慮無遺策舉無過事夫聖人不以獨見為明而以萬物為心順人者昌逆人者亡此古今之所共也晉書孔衍傳孔衍字舒元魯國人孔子二十二世孫也祖文魏大鴻臚父育征南軍司衍少好學年十二能通詩書元帝引為安東參軍明帝之在東宮領太子中庶子于時庶事草創衍經學深博又練識舊典朝儀軌制多取正焉由是元明二帝並親愛之王敦專權衍私於太子曰殿下宜博延朝搜搜揚才俊詢謀時政以廣聖聰新唐書魏徵傳帝曰善因問為君者何道而明何失而暗徵曰君所以明兼聽也所以暗偏信也堯舜氏闢四門明四目達四聰雖有共鯀不能塞也靖言庸違不能惑也秦二世隱藏其身以信趙高天下潰叛而不得聞梁武帝信朱異侯景向關而不得聞隋煬帝信虞世基賊遍天下而不得聞故曰君能兼聽則姦人不得壅蔽而下情通矣不能廣聰明第八新唐顏真卿傳時載引用私黨畏群臣論奏乃紿帝曰群臣奏事多挾讒毀請每論事皆先白長官長官以白宰相真卿上疏曰太宗勤勞庶政其司門式曰無門籍者有急奏令監司與仗家引對不得關礙防壅蔽也置立仗馬二須乘者聽此其平治天下也今天下瘡痏未平陛下豈得不慱聞讜言以廣視聽而杜絶忠諫乎且君子難進易退朝庭開不諱之路猶恐不言況懷厭怠令宰相宣進止御史臺作條目不得直進從此人不奏事矣新唐常袞傳比政事堂有門異時宰相遇舍人院咨逮政事至袞乃塞之以示尊大箋證新唐書顏真卿傳顏真卿字清臣祕書監師古五世從孫少孤母殷躬加訓導既長博學工辭章事親孝開元中舉進士又擢制科調醴泉尉再遷監察御史以檢校刑部尚書為朔方行營宣慰使未行留知省事更封魯郡公時載多引私黨畏群臣論奏乃紿帝曰群臣奏事多挾讒毀請每論事皆先白長官長官以白宰相宰相詳可否以聞真卿上疏曰昔太宗勤勞庶政其司門式曰無門籍者有急奏令監司與仗家引對不得關礙防擁蔽也置立仗馬二須乘者聽此其平治天下也今天下瘡痏未平干戈日滋陛下豈得不博聞讜言以廣視聽而塞絶忠諫乎陛下在陜時奏事者不限貴賤群臣以為太宗之治可跂而待且君子難進易退朝廷開不諱之路猶恐不言况懷厭怠令宰相宣進止御史臺作條目不得直進從此人不奏事矣新唐書常袞傳常袞京兆人天寶末及進士第性狷潔不妄交遊由太子正字纍為中書舍人袞建言代宗嘉納遷禮部侍郎元載死拜門下侍郎同中書門下平章事弘文崇文館大學士與楊綰同執政會綰卒袞始當國先是百官俸寡狹議增給之時韓滉使度支與袞皆任情輕重滉惡國子司業張參袞惡太子少詹事趙惎皆少給之其騁私崇怨類此故事日出內廚食賜宰相家可十人具袞奏罷之又將讓堂封它宰相不從乃止政事堂北門異時宰相過舍人院咨逮政事至袞乃塞之以示尊大
