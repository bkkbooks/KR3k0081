body:
  text: 卷第四十六兵法第一史記齊世家周西伯昌之脫羑里歸與呂尚陰謀修德以傾商政其事多兵權與奇計故後世之言兵及周之陰權皆宗太公為本謀史記孫子傳以兵法見於吳王闔廬曰子之十三篇吾盡觀之矣史記穰苴傳齊威王用兵行威大放穰苴之法使大夫追論古者司馬兵法而附穰苴於其中因號曰司馬穰苴兵法太史公曰余讀司馬兵法閎廓深遠雖三代征伐未能竟其義如其文也亦少褒矣若夫穰苴區區為小國行師何暇及司馬兵法之揖讓乎史記孫子傳田忌進孫臏於威王威王問以兵法遂以為師史記孫子傳太史公曰世俗所稱師旅皆道孫子十三篇吳起兵法世多有故弗論論其行事所施設者語曰能行之者未必能言能言之者未必能行前漢張良傳良遇一老父父曰孺子可教後五日平明與我會此良因怪之跪曰諾夜未半往有頃父亦來出一篇書讀此則為王者師遂去不復見旦日視其書乃太公兵法良異之常習讀之前漢霍去病傳上嘗欲教之孫吳兵法對曰顧方略何如耳不至學古兵法魏志太祖自統御海內行軍用兵依孫吳之法而用事設奇譎敵制勝變化如神自作兵書十餘萬言諸將征伐皆以新書從事餘見萬人之敵項羽傳又見兵門藝文志箋證史記齊太公世家周西伯昌之脫羑里歸與呂尚陰謀修德以傾商政其事多兵權與奇計故後世之言兵及周之陰權皆宗太公為本謀史記孫子列傳孫子武者齊人也以兵法見於吳王闔廬闔廬曰子之十三篇吾盡觀之矣史記司馬穰苴列傳其後及田常殺簡公盡滅高子國子之族至常曾孫和因自立為齊威王用兵行威大放穰苴之法而諸侯朝齊齊威王使大夫追論古者司馬兵法而附穰苴於其中因號曰司馬穰苴兵法太史公曰余讀司馬兵法閎廓深遠雖三代征伐未能竟其義如其文也亦少褒矣若夫穰苴區區為小國行師何暇及司馬兵法之揖讓乎史記孫子列傳於是忌進孫子於威王威王問兵法遂以為師史記孫子吳起列傳太史公曰世俗所稱師旅皆道孫子十三篇吳起兵法世多有故弗論論其行事所施設者語曰能行之者未必能言能言之者未必能行六漢書張良傳良嘗間從容步遊下邳圯上有一老父衣褐至良所直墮其履圯下顧謂良曰孺子下取履良愕然欲歐之為其老乃強忍下取履因跪進父以足受之笑去良殊大驚父去里所復還師古曰行一里許而還來曰孺子可教矣後五日平明與我期此良因怪跪曰諾五日平明良往父已先在怒曰與老人期後何也去後五日蚤會五日雞鳴往父又先在復怒曰後何也去後五日復蚤來五日良夜半往有頃父亦來喜曰當如是出一編書曰讀是則為王者師後十年興十三年孺子見我濟北穀城山下黃石即我已遂去不見旦日視其書乃太公兵法良因異之常習誦漢書霍去病傳上嘗欲教之吳孫兵法師古曰吳吳起也孫孫武也對曰顧方略何如耳不至學古兵法師古曰顧念也太平御覽皇王部魏太祖武皇帝引魏書曰太祖自御海內芟夷群醜其行軍用師大較依孫吳之法而因事設奇量敵制勝變化如神自作兵書十萬餘言諸將征伐皆以新書從事料敵第二史記蘇秦傳是故明主外料其敵之強弱內度其士卒賢不肖不待兩軍相當而勝敗存亡之機固巳形於胸中矣史記仲尼弟子列傳句踐頓首再拜曰孤嘗不料力乃與吳戰困於會稽痛入於骨髓日夜焦脣乾舌徒欲與吳王接踵而死孤之願也史記張儀傳聚群弱而功至強不料敵而輕戰國貧而數舉兵危亡之術也前漢婁恭傳韓王信反高帝自往擊至信陽聞信與胸奴欲擊漢上使人使胸奴胸奴匿其壯士肥牛馬徒見其老弱及羸畜使者十輩來皆言胸奴易擊上使婁恭復往使胸奴還報曰兩國相擊此宜夸矜見所長今臣往徒見羸胔老弱此必欲見短伏奇兵以爭利愚以為胸奴不可擊也上怒罵敬曰齊虜以舌得官乃今妄言沮吾軍械繫恭廣武遂往至平城胸奴果出奇兵圍高帝白登七日然後得解高帝赦恭曰吾已斬先使十輩言可擊者矣前漢黥布傳布反上問薛公對曰使布出於上計山東非漢之有也出於中計勝負之數未可知也出於下計陛下安枕而臥矣上曰何謂上計曰東取吳西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也何謂中計東取吳西取楚并韓取魏據敖倉之粟塞成皋之險勝敗之數未可知也何謂下計東取吳西取下蔡歸重於越身歸長沙重輜重也陛下安枕而臥漢無事矣上曰是計將安出薛公曰出下計上曰胡為廢上計而出下計薛公曰布故驪山之徒也致萬乘之主此皆為身不顧後為百姓萬世慮者也故出下計果如薛公揣之揣度遂滅之前漢周勃傳孝景帝三年吳楚反亞夫東擊吳楚至霸上趙涉遮説亞夫曰將軍勝則宗廟安不勝則天下危能用臣之言乎亞夫下車禮而問之涉曰吳王素富懷輯死士久矣此知將軍且行必置間人於殽黽厄狹之間且兵事上神密將軍何不從此右去走藍田出武關抵雒陽間不過差一二日直入武庫擊鳴鼓諸侯聞之以為將軍從天而下也太尉如其計至雒陽使吏侯殽黽間果得吳伏兵後漢馬援傳帝自西征囂諸將多以王師之重不宜遠入險阻計宄豫未決會召援夜至援因説隗囂將帥有土崩之藝兵進有必破之狀又聚米為山谷指晝形藝開示軍衆所從道徑往來分析曲折昭然可曉帝曰虜在吾目中矣明旦遂進軍囂衆大潰後漢孔融傳謂荀或曰袁紹城廣兵強田豐許攸智計之士為其謀審配逄紀盡忠之臣任其事顏良文醜勇冠三軍統其兵殆難克乎彧曰紹兵雖多而法不整田豐剛而犯上許攸貪而不正審配專而無謀逄紀果而自用顏良文醜匹夫之勇可一戰而擒也魏武帝紀時袁紹既并公孫瓚兼四州之地衆十餘万將進軍攻許諸將以為不可敵公曰吾知紹之為人志大而智小色厲而膽薄忌克而少威兵多而分畫不明將驕而政令不一土地雖廣糧食雖豐適足以為吾奉也魏何夔傳時有傳袁術軍亂者太祖問夔對曰天之所助者順人之所助者信術無信順之實而望天人之助此不可以得志於天下其亂必矣吳周瑜傳曹公人荊州得其水軍船步兵數十萬延見群下問以計策議者咸曰曹公挾天子以征四方動以朝廷為辭今日拒之事更不順且將軍大勢可以拒操者長江也今操得荊州掩有其地劉表治水軍蒙衝鬭艦乃以千數操悉浮以沿江兼有步兵水陸俱下此為長江之險已與我共之矣而勢力衆寡又不可論愚謂大計不如迎之瑜曰不然操雖託名漢相其實漢賊也將軍以神威雄材兼仗父兄之烈割據江東尚當為漢家除殘去穢況操自送死而可迎之邪今使北土已安操無內憂能曠日持久來爭疆場又能與我校勝負於船楫可也今北土既未平安加馬超韓遂尚在關西為操後患且舍鞍馬杖舟楫與吳越爭衡本非中國所長又今盛寒馬無藁草驅中國士衆遠涉江湖之間不習水土必生疾病此數四者用兵之患也而操皆冒行之將軍禽操宜在今日瑜請得精兵三万人進住夏口保為將軍破之時劉備為曹公所破遣諸葛亮詣權權遂遣瑜等與備并力逆曹公遇於赤壁時曹公軍衆已有疾病交戰遂敗退保南郊晉載記慕容德傳魏將托跋章攻鄴德遣南安王慕容青等夜擊敗之魏師退次新城青等追之別駕韓謨進曰古人先決勝廟堂然後攻戰今魏不可擊者四燕不宜動者三魏懸軍遠入利在野戰一不可擊也深入近畿頓兵死地二不可擊也前鋒既敗後軍方固三不可擊也彼衆我寡四不可墼也官軍自戰其地一不宜動動而不勝衆心難固二不宜動城隍未修敵來無備三不宜動此皆兵家所忌不如深溝高壘以逸待勞彼千里餽糧野無所掠久則三軍靡費攻則衆旅多斃師老釁生詳而圖之可以捷矣德於是召青還師新唐李道宗傳帝將伐高麗道宗請以百騎往帝許之約其還曰臣請二十日行留十日覽觀山川得還見天子因秣馬束兵入賊地謁帝如期餘見將高祖二年箋證史記蘇秦列傳蘇秦者東周雒陽人也求説周顯王顯王左右素習知蘇秦皆少之弗信乃西至秦秦孝公卒説惠王曰湯武之士不過三千車不過三百乘卒不過三萬立為天子誠得其道也是故明主外料其敵之強弱內度其士卒賢不肖不待兩軍相當而勝敗存亡之機固已形于胸中矣史記仲尼弟子列傳子貢之越越王除道郊迎身御至舍勾踐頓首再拜曰孤嘗不料力乃與吳戰困於會稽痛入於骨髓日夜焦脣乾舌徒欲與吳王接踵而死孤之願也史記張儀列傳懷王赦張儀厚禮之如故張儀既出未去聞蘇秦死乃説楚王曰聚群弱而攻至強不料敵而輕戰國貧而數舉兵危亡之術也漢書婁敬傳漢七年韓王信反高帝自往擊至晉陽聞信與胸奴欲擊漢上大怒使人使胸奴胸奴匿其壯士肥牛馬徒見其老弱及羸畜使者十輩來皆言胸奴易擊上使劉敬復往使胸奴還報曰兩國相擊此宜夸矜見所長師古曰見示也今臣往徒見羸胔老弱此必欲見短伏奇兵以爭利愚以為胸奴不可擊也是時漢兵以踰句注三十餘萬歲師古曰句注山名在鴈門兵已業行上怒罵敬曰齊虜以舌得官乃今妄言沮吾軍械繫敬廣武遂往至平城胸奴果出奇兵圍高帝白登七日然後得解高帝至廣武赦敬曰吾不用公言以困平城吾已斬先使十輩言可擊者矣漢書黥布傳上乃見問薛公對曰布反不足怪也使布出於上計山東非漢之有也出於中計勝負之數未可知也出於下計陛下安枕而臥矣上曰何謂上計薛公對曰東取吳西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也何謂中計東取吳西取楚并韓取魏據敖倉之粟塞成皋之險勝敗之數未可知也何謂下計東取吳西取下蔡歸重於越身歸長沙陛下安枕而臥漢無事矣上曰是計將安出薛公曰出下計上曰胡為廢上計而出下計薛公曰布故驪山之徒也致萬乘之主此皆為身不顧後為百姓萬世慮者也故出下計上曰善封薛公千戶遂發兵自將東擊布布之初反謂其將曰上老矣厭兵必不能來使諸將諸將獨患淮陰彭越今已死餘不足畏故遂反果如薛公揣之文頴曰揣度也遂滅之漢書周勃傳附子周亞夫孝景帝三年吳楚反亞夫以中尉為太尉東擊吳楚因自請上曰楚兵剽輕難與爭鋒願以梁委之絶其食道乃可制也上許之亞夫既發至霸上趙涉遮説亞夫曰將軍東誅吳楚勝則宗廟安不勝則天下危能用臣之言乎亞夫下車禮而問之涉曰吳王素富懷輯死士久矣此知將軍且行必置間人於殽黽厄狹之間且兵事上神密將軍何不從此右去走藍田出武關抵雒陽間不過差一二日直入武庫擊鳴鼓諸侯聞之以為將軍從天而下也太尉如其計至雒陽使吏搜殽黽間果得吳伏兵後漢書馬援傳八年帝自西征囂至漆諸將多以王師之重不宜遠入險阻計冘豫未決會召援夜至帝大喜引入具以群議質之援因説隗囂將帥有土崩之藝兵進有必破之狀又於帝前聚米為山谷指畫形藝開示衆軍所從道徑往來分析曲折昭然可曉帝曰虜在吾目中矣明旦遂進軍至第一囂衆大潰後漢書荀彧傳五年袁紹率大衆以攻許操與相距紹甲兵甚盛議者咸懷惶懼少府孔融謂彧曰袁紹地廣軍強田豐許攸智計之士為其謀審配逄紀盡忠之臣任其事顏良文醜勇冠三軍統其兵殆難克乎彧曰紹兵雖多而法不整田豐剛而犯上許攸貪而不正審配專而無謀逄紀果而自用顏良文醜匹夫之勇可一戰而擒也三國志魏志武帝紀是時袁紹既并公孫瓚兼四州之地衆十餘萬將進軍攻許諸將以為不可敵公曰吾知紹之為人志大而智小色厲而膽薄忌克而少威兵多而分畫不明將驕而政令不一土地雖廣糧食雖豐適足以為吾奉也三國志魏志何夔傳時有傳袁術軍亂者太祖問夔曰君以為信不夔對曰天之所助者順人之所助者信術無信順之實而望天人之助此不可以得志於天下夫失道之主親戚叛之而况於左右乎以夔觀之其亂必矣三國志吳志周瑜傳周瑜字公瑾廬江舒人也十三年春權討江夏瑜為前部大督其年九月曹公入荊州劉琮舉衆降曹公得其水軍船步兵數十萬將士聞之皆恐懼延見群下問以計策議者咸曰曹公豺虎也然託名漢相挾天子以征四方動以朝廷為辭今日拒之事更不順且將軍大勢可以拒操者長江也今操得荊州奄有其地劉表治水軍蒙衝鬭艦乃以千數操悉浮以沿江兼有步兵水陸俱下此為長江之險已與我共之矣而勢力衆寡又不可論愚謂大計不如迎之瑜曰不然操雖託名漢相其實漢賊也將軍以神武雄才兼杖父兄之烈割據江東地方數千里兵精足用英雄樂業尚當橫行天下為漢家除殘去穢况操自送死而可迎之邪請為將軍籌之今使北土已安操無內憂能曠日持久來爭疆場又能與我校勝負於船楫可乎今北土既未平安加馬超韓遂尚在關西為操後患且舍鞍馬杖舟楫與吳越爭衡本非中國所長又今盛寒馬無藁草驅中國士衆遠涉江湖之間不習水土必生疾病此數四者用兵之患也而操皆冒行之將軍禽操宜在今日瑜請得精兵三萬人進住夏口保為將軍破之時劉備為曹公所破欲引南渡江與魯肅遇於當陽遂共圖計因進住夏口遣諸葛亮詣權權遂遣瑜及程普等與備併力逆曹公遇於赤壁時曹公軍衆已有疾病初一交戰公軍敗退引次江北遂敗退還保南郡晉書載記慕容德傳慕容德字玄明皓之少子也魏徵拓拔章攻鄴德遣南安王慕容青等夜擊敗之魏師退次新城青等請擊之別駕韓𣽴進曰古人先決勝廟堂然後攻戰今魏不可擊者四燕不宜動者三魏懸軍遠入利在野戰一不可擊也深入近畿頓兵死地二不可擊也前鋒既敗後陳方固三不可擊也彼衆我寡四不可擊也官軍自戰其地一不宜動動而不勝衆心難固二不宜動城隍未修敵來無備三不宜動此皆兵家所忌不如深溝高壘以逸待勞彼千里餽糧野無所掠久則三軍靡資攻則衆旅多斃師老釁生詳而圖之可以捷矣德曰韓別駕之言良平之策也於是召青還師新唐書宗室列傳江夏郡王道宗帝將討高麗先遣營州都督張儉輕騎度遼窺形勢儉畏不敢深入道宗請以百騎往帝許之約其還曰臣請二十日行留十日覽觀山川得還見天子因秣馬束兵旁南山入賊地相易險度營陳便處將還會高麗兵斷其路更走間道謁帝如期卷七十八案李道宗李淵曾孫運籌帷幄第三前漢高祖紀夫運籌帷幄之忠決勝千里之外吾不如子房後漢光武紀贊曰明明廟謀糾糾雄斷運籌於廟堂之上後漢鄧禹傳策曰前將軍鄧禹深執中孝與朕謀謨帷幄決勝千里今封為瓚侯後漢荀彧傳操上書表彧曰昔袁紹作逆連兵官度時衆寡糧單圖欲還許彧深建宜往之便遠恢進討之略遂摧撲大寇濟危以安將舍河北之規改就荊南之策彧復備陳得失用移臣議故得反斾冀土克平四州彧建二策以亡為存以禍為福謀殊功異臣所不及是故先帝貴指縱之功薄摶獲之賞古人尚帷幄之規下攻扶之力原其績效臣享高爵於是增封千戶魏攸深密有智防自從太祖征伐常謨謀帷幄時人及子弟莫知其所言吳陸抗傳折衝於枕席之上校勝於帷幄之內傾敵不以甲兵之力保國不以溝池之固新唐杜如晦傳高祖平京師秦王引為府兵曹參軍時府屬多外遷因表留莫府從征伐常參帷幄機祕方象事裁處無留僚屬共才之莫見所涯新唐書江夏郡王傳從秦王討賊王登玉壁城以望謂道宗曰賊怙衆欲戰爾計何出對曰周武即賊也席勝剡然鋒未可當宜以計摧之且烏合之衆若堅壁以頓其鋭須食盡氣老可不戰而禽也王曰而意與我合既而賊敗餘見論功淮安王神通傳箋證漢書高帝紀上曰夫運籌帷幄之中決勝千里之外吾不如子房後漢書光武帝紀贊曰明明廟謨赳赳雄斷詩曰明明天子淮南子曰運籌於廟堂之上決勝千里之外赳赳武貌也於赫有命系隆我漢後漢書鄧禹傳光武即位於鄗使使者持節拜禹為大司徒策曰制詔前將軍鄧禹深執忠孝與朕謀謨帷幄決勝千里封為酇侯後漢書荀彧傳十二年操上書表彧曰昔袁紹作逆連兵官度時衆寡糧單圖欲還許尚書令荀彧深建宜往之便遠恢進討之略起發臣心革易愚慮堅營固守徼其軍實遂摧撲大寇濟危以安紹既破敗臣糧亦盡將舍河北之規改就荊南之策彧復備陳得失用移臣議故得反斾冀土克平四州彧建二策以亡為存以禍為福謀殊功異臣所不及是故先帝貴指縱之功薄搏獲之賞古人尚帷幄之規下攻拔之力原其績效足享高爵於是增封千戶三國志魏志荀攸傳荀攸字公達彧從子也魏國初建為尚書令攸深密有智防自從太祖征伐常謀謨帷幄時人及子弟莫知其所言三國志吳志陸遜傳附子陸抗注引習鑿齒曰折衝於枕席之上校勝於帷幄之內傾敵而不以甲兵之力保國而不浚溝池之固新唐書杜如晦傳高祖平京師秦王引為府兵曹參軍徙陜州總管府長史時府屬多外遷王患之房玄齡曰去者雖多不足吝如晦王佐才也大王若終守藩無所事必欲經營四方捨如晦無共功者王驚曰非公言我幾失之因表留幕府從征伐常參帷幄機密方多事裁處無留僚屬共才之莫見所涯八新唐書宗室列傳江夏郡王道宗道宗年十七從秦王討賊王登玉壁城以望謂道宗曰賊怙衆欲戰爾計謂何對曰武周席勝剡然鋒未可當正宜以計摧之且烏合之衆憚持久若堅壁以頓其鋭須食盡氣老可不戰禽也王曰而意與我合既而賊糧匱夜引去追戰滅之百戰百勝第四史記魏世家魏伐趙趙告急齊齊宣王用孫子計救趙擊魏魏遂大興師而令太子申為上將軍過外黃徐子謂太子曰臣有百戰百勝之術太子曰可得聞乎客曰固願效之曰太子自將攻齊大勝并莒則富不過有魏貴不益為王若戰不勝齊則万世無魏矣此臣之百戰百勝之術也太子曰諾請必從公之言而還矣前漢韓信傳廣武君謂韓信曰成安君有百戰百勝之計一日而失之軍敗鄗下音羹臛之臛後漢皇甫嵩傳梁州賊王國圍陳倉復拜嵩為左將軍督前將軍董卓各率二萬人拒之卓欲速進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全滅之執在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘有餘者動於九天之上不足者陷於九地之下今陳倉雖小城守固備非九地之陷也王國雖強而攻我之所不救非九天之藝也夫藝非九天攻者受害陷非九地守者不拔國今已陷受害之地而陳倉保不拔之城我可不煩兵動衆而取全勝之功將何救焉吳朱桓傳黃武初魏使大司馬曹仁步騎數万向濡須時桓手下及所部兵在者五千人諸將各有懼心桓喻之曰凡兩軍交對勝負在將不在衆寡諸君聞曹仁用兵行師孰與桓邪兵法所以稱客倍而主人半者謂俱在平原無城池之守又謂士衆勇怯齊等故耳今仁既非智勇加以士卒甚怯又千里步涉人馬罷困桓與諸軍共據高城南臨大江北背山陵以逸待勞為主制客此百戰百勝之勢也桓因偃旗鼓外示虛弱以誘致仁仁果分遣常雕王雙等襲中州桓拒梟雕生虜雙晉劉牢之傳太元初謝玄北鎮廣陵時符堅方盛玄以牢之為參軍領精鋭為前鋒百戰百勝號為北府兵敵人畏之晉蔡謨傳石勒新死欲移鎮石城為滅賊之漸事下公卿謨曰自勒初起則季龍為爪牙百戰百勝遂定中國境土所據同於魏世箋證史記魏世家三十年魏伐趙趙告急齊齊宣王用孫子計救趙擊魏魏遂大興師使龐涓將而令太子申為上將軍過外黃外黃徐子謂太子曰臣有百戰百勝之術太子曰可得聞乎客曰固願效之曰太子自將攻齊大勝并莒則富不過有魏貴不益為王若戰不勝齊則萬世無魏矣此臣之百戰百勝之術也太子曰諾請必從公之言而還矣漢書韓信傳廣武君曰臣聞智者千慮必有一失愚者千慮亦有一得故曰狂夫之言聖人擇焉顧恐臣計未足用願效愚忠故成安君有百戰百勝之計一日而失之軍敗鄗下李奇曰鄗音羹臛之臛常山縣也後漢書皇甫嵩傳五年梁州賊王國圍陳倉復拜嵩為左將軍督前將軍董卓各率二萬人拒之卓欲速進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全滅之藝在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘孫子之文有餘者動於九天之上不足者陷於九地之下今陳倉雖小城守固備非九地之陷也王國雖強而攻我之所不救非九天之藝也夫藝非九天攻者受害陷非九地守者不拔國今已陷受害之地而陳倉保不拔之城我可不煩兵動強而取全勝之功將何救焉三國志吳志朱桓傳朱桓字休穆吳郡吳人也黃武元年魏使大司馬曹仁步騎數萬向濡須仁欲以兵襲取州上偽先揚聲欲東攻羡溪桓分兵將赴羡溪既發卒得仁進軍拒濡須七十里問桓遣使追還羡溪兵兵未到而仁奄至時桓手下及所部兵在者五千人諸將業業各有懼心桓喻之曰凡兩軍交對勝負在將不在衆寡諸君聞曹仁用兵行師孰與桓邪兵法所以稱客倍而主人半者謂俱在平原無城池之守又謂士衆勇怯齊等故耳今仁既非智勇加其士卒甚怯又千里步涉人馬罷困桓與諸軍共據高城南臨大江北背山陵以逸待勞為主制客此百戰百勝之勢也雖曹丕自來尚不足憂况仁等邪桓因偃旗鼓外示虛弱以誘致仁仁果遣其子泰攻濡須城分遣將軍常雕督諸葛虔王雙等乘油船別襲中洲中洲者部曲妻子所在也仁自將萬人留橐皋復為泰等後拒桓部兵將攻取油船或別擊雕等桓等身自拒泰燒營而退遂梟雕生虜雙晉書劉牢之傳劉牢之字道堅彭城人也太元初謝玄北鎮廣陵時苻堅方盛玄多募徑勇牢之與東海何謙琅邪諸葛侃樂安高衡東平劉軌西河田洛及晉陵孫無終等以驍猛應選玄以牢之為參軍領精鋭為前鋒百戰百勝號為北府兵敵人畏之晉書蔡謨傳蔡謨字道明陳留考城人也石勒新死欲移鎮石城為滅賊之漸事下公卿謨議曰時有否泰道有屈伸自勒初起則季龍為爪牙百戰百勝遂定中國境土所據同於魏世
