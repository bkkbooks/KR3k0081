body:
  text: 卷第六十八陰德第一史記韓世家太史公曰韓厥之感晉景公紹趙孤之子武以成程嬰公孫杵曰之義此天下之陰德也史記田敬仲世家田釐子乞事齊景公為大夫其收賦稅於民以小斗受之其粟豫民以大斗行陰德於民前漢于定國傳始定國父于公其門閭壞父老方共治之于公謂曰少高大閭門令容駟馬高蓋車我治獄多陰德未嘗有所冤子孫必有興者至定國為丞相永為御史大夫封侯前漢丙吉傳上憂吉疾不起夏侯勝曰此未死也臣聞有陰德者必饗其樂以及子孫今吉未獲報而疾甚非其死疾也後病果愈後漢王忳傳忳嘗詣京師於空舍中見一書生疾困書生曰我當到洛陽而被疾命在須臾腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而命絶忳即鬻一斤營其殯葬餘金悉置棺下後歸數年縣署忳大度亭長初到之日有馬馳入亭中而止其日大風飄一繡被復墯忳前即言之於縣縣以歸忳忳後乘馬到雒縣馬遂奔走牽忳入他舍主人見之喜曰今禽盜矣問忳所由得馬忳具說其狀并及繡被主人悵然良久乃曰被隨旋風與馬俱亡卿何陰德而致此二物忳自念有葬書生事因說之并道書生形貌及埋金之處主人大驚號曰是我子也姓金名彥前往京師不知所在何意卿乃葬之大恩久不報天以此章卿德耳忳悉以被馬還之彥父不取又厚遺忳忳辭讓而去後漢袁安得論曰陳平多陰謀而知其後必廢邴言有陰德夏侯勝識其當封及子孫袁公及其理楚獄未嘗鞠人於贓罪其仁心足以覃乎後昆覃延子孫之成不亦宜乎魏何夔傳疾病乞遜位詔報曰禮賢親舊帝王之常務也以親則君有輔弼之勳焉以賢則君有醇固之茂焉大有陰德者必有陽報今君疾雖未瘳神明聽之矣君其即安以順朕意新唐蕭瑀傳贊曰梁蕭氏興江左實有功在民故餘祉及其後裔自瑀逮遘凡八葉宰相餘見著書淮南王安傳箋證史記韓世家太史公曰韓厥之感晉景公紹趙孤之子武以成程嬰公孫杵臼之義此天下之陰德也史記田敬仲完世家田釐子乞事齊景公為大夫其收賦稅於民以小斗受之其粟豫民以大斗行陰德於民而景公弗禁漢書于定國傳始定國父于公其閭門壞父老方共治之于公謂曰少高大門閭令容駟馬高蓋車我治獄多陰德未嘗有所冤子孫必有興者至定國為丞相永為御史大夫封侯傳世云漢書丙吉傳上憂吉疾不起太子太傅夏侯勝曰此未死也臣聞有陰德者必饗其樂以及子孫今吉未獲報而疾甚非其死疾也後病果愈後漢書獨行列傳王忳傳王忳字少林忳音純廣漢新都人也忳嘗詣京師於空舍中見一書生疾困愍而視之書生謂忳曰我當到洛陽而被病命在須臾腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而命絶忳即鬻一斤營其殯葬餘金悉置棺下人無知者後歸數年縣署忳大度亭長初到之日有馬馳入亭中而止其日大風飄一繡被復墮忳前即言之於縣縣以歸忳忳後乘馬到雒縣馬遂奔走牽忳入它舍主人見之喜曰今禽盜矣問忳所由得馬忳具說其狀并及繡被主人悵然良久乃曰被隨旋風與馬俱亡卿何陰德而致此二物忳自念有葬書生事因說之并道書生形貌及埋金之處主人大驚號曰是我子也姓金名彥前往京師不知所在何意卿乃葬之大恩久不報天以此章卿德耳忳悉以被馬還之彥父不取又厚遺忳忳辭讓而去後漢書袁安傳論曰陳平多金謀而知其後必廢邴吉有陰德夏侯勝識其當封及子孫袁公竇氏之間乃情帝室乃情猶竭情也引義雅正可謂王臣之烈及其理楚獄未嘗鞠人於臧罪其仁心足以覃乎後昆爾雅曰覃延也子孫之盛不亦宜乎三國志魏志何夔傳文帝踐阼封成陽亭侯邑三百戶疾病屢乞遜位詔報曰蓋禮賢親舊帝王之常務也以親則君有輔弼之勳焉以賢則君有醇固之茂焉夫有陰德者必有陽報今君疾雖未瘳神明聽之矣君其即安以順朕意新唐書蕭瑀傳贊曰梁蕭氏興江左實有功在民厥終無大惡以寖微而亡故餘祉及其後裔自瑀逮遘凡八葉宰相名德相望與唐盛衰世家之盛古未有也德及禽獸第二史記商本紀湯出見野張綱四面祝曰自天下四方皆入吾網湯曰嘻盡之矣乃去其三面祝曰欲左右欲右右不用命乃入吾網諸侯聞之曰湯德至矣及禽獸後漢卓茂魯恭傳贊曰卓魯款款情愨德滿款款忠我也仁感昆蟲愛及胎卵後漢魯恭為中牟令郡國螟傷稼犬牙緣界不入中牟河南尹袁安疑使仁恕掾主獄肥親往廉之恭隨行阡陌俱坐乘下有雉過止其傍傍有童兒親曰兒何不補兒言雉方將雛親起與恭訣曰所以來者欲察君之政跡耳今蟲不犯境一異也化及鳥獸二異也豎子有仁心三異也久留徒擾賢者耳後漢儒林劉昆傳昆遷洪農太守先是崤黽驛道多虎災行旅不通昆為政三年仁化大行虎皆負子度河帝聞而異之後漢法雄傳遷南郡太守郡濱帶江沔又有雲夢藪澤多虎狼之暴前太守賞募張捕反為所害者甚衆雄乃移書屬縣曰凡虎狼之在山林猶人之居城市古者至化之世猛獸不擾皆由恩信寬澤仁及飛走太守雖不德敢忘斯義其毀壞檻穽不得妄捕山林是後虎害稍息人以獲安箋證史記殷本紀湯出見野張網四面祝曰自天下四方皆入吾網湯曰嘻盡之矣乃去其三面祝曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯德至矣及禽獸後漢書卓茂魯恭魏霸劉寬傳贊曰卓魯款款情愨德滿款款忠誠也仁感昆蟲愛及胎卵後漢書魯恭傳建初七年郡國螟傷稼犬牙緣界不入中牟河南尹袁安聞之疑其不實使仁恕掾肥親往廉之仁恕掾主獄屬河南尹見漢官儀廉察也恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰兒何不捕之兒言雉方將雛親瞿然而起與恭訣曰所以來者欲察君之政迹耳今蟲不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也久留徒擾賢者耳後漢書儒林列傳劉昆傳徵拜議郎稍遷侍中弘農太守先是崤黽驛道多虎災行旅不通昆為政三年仁化大行虎皆負子渡河帝聞而異之後漢書法雄傳法雄字文彊扶風郿人也徵雄為青州刺史在州四年遷南郡太守斷獄省少戶口益增郡濱帶江沔又有雲夢藪澤永初中多虎狼之暴前太守賞募張捕反為所害者甚衆雄乃移書屬縣曰凡虎狼之在山林猶人之居城市古者至化之世猛獸不擾皆由恩信寬澤仁及飛走太守雖不德敢忘斯義記到其毀壞檻穽不得妄捕山林是後虎害稍息人以獲安世有名德第三前漢王吉傳自吉至崇世名清廉後漢伏湛傳九世祖勝所謂濟南伏生者也自伏生已後世傳經學清靜無競故東州號為伏不不鬭後漢楊彪傳彪與袁術婚姻誣以欲圖廢置奏收下獄孔融聞之不及朝服往見操曰楊公四世清德海內所瞻周書父子兄弟罪不相及況以袁氏歸罪楊公易稱積善餘慶徒欺人耳後漢楊彪傳曰震至彪四世太尉德業相繼與袁氏俱為東京名族云魏陳群傳祖父實父紀叔父諶皆有盛名晉羊祜傳祜九代並清德箋證漢書王吉傳自吉至崇世名清廉後漢書伏湛傳伏湛字惠公琅邪東武人也九世祖勝字子賤所謂濟南伏生者也自伏生以後世傳經學清靜無競故東州號為伏不鬭云後漢書楊震傳附曾孫楊彪時袁術僭亂操託彪與術婚姻誣以欲圖廢置奏收下獄劾以大逆將作大匠孔融聞之不及朝服往見操曰楊公四世清德海內所瞻周書父子兄弟罪不相及况以袁氏歸罪楊公易稱積善餘慶徒欺人耳易文言曰積善之家必有餘慶後漢書楊震傳附曾孫楊彪自震至彪四世太尉德業相繼與袁氏俱為東京名族云三國志魏志陳群傳陳群字長文潁川許昌人也祖父實父紀叔父諶皆有盛名箋證略孝第四前漢萬石君石奮傳奮長子建次甲次乙次慶皆以馴行孝謹官至二千石景帝曰石君及四子皆二千石人臣尊寵乃舉集其門凡號奮為萬石君前漢萬石君傳家以孝謹聞乎郡國雖齊魯諸儒質行皆自以為不及也前漢爰盎傳盎曰陛下居代時太后嘗病陛下不交睫解衣湯藥非陛下口所嘗弗進夫曾參以布衣猶難之今陛下親以王者修之過曾參遠矣後漢劉平傳曰安帝時汝南薛包孟嘗好學篤行喪母以至孝聞及父娶後妻而憎包分出之包日夜號泣不能去至被歐杖不得已廬於舍外旦入而灑掃父怒又逐之乃廬於里門昏晨不廢積歲餘父母慚而還之若二子者唯至誠以為行可謂能以孝養也若江革劉般數公之義行猶斯志也餘上文見祿養門後漢江革傳元和中天子思革至行制詔齊相曰諫議大夫江革前以病歸今起居何如夫孝百行之冠衆善之始也國宗每惟志士未嘗不及革縣以見穀千斛賜巨孝常以八月長吏存問致羊酒以終厥身如有不幸祠以中牢由是巨孝之稱行於天下後漢張霸傳年數歲而知孝讓雖出入飲食自然合禮鄉人號為張曾子後漢陳紀傳遭父憂每哀至輒歐血絶氣雖衰服已除而積毀消瘠殆將滅性豫州剌史嘉其至行表上尚書圖象百城以厲風俗魏陳思王植傳上疏曰士之生世入則事父出則事君事事父尚於榮親事君貴於興國故慈父不能愛無益之子仁君不能畜無用之臣新唐書建成傳帝以秦王王陝以東建天子旌旗如梁王故事王王泣曰非所願也不可遠膝下新唐孝友傳贊曰聖人治天下有道曰要在孝悌而已父父也子子也兄兄也弟弟也推而之國國而之天下建一善而百行從其失則以法繩之故曰孝者天下大本法其未也至匹夫軍人行孝一概而凶盜不敢凌天子喟而旌之者以其教孝而求忠也故裒而著于篇新唐書皇后傳文宗性孝謹事后有禮凡羞果鮮珍及四方奇奉以先獻宗廟三言而後御之新唐書房玄齡傳父疾綿十旬不解衣及喪勺飲不入口五日徐見祿養劉平傳箋證漢書萬石君石奮傳奮長子建次甲次乙次慶師古曰史失其名故云甲乙耳非其名皆以馴行孝謹官至二千石於是景帝曰石君及四子皆二千石人臣尊寵乃舉集其門凡號奮為萬石君漢書萬石君石奮傳萬石君家以孝謹聞乎郡國雖齊魯諸儒質行皆自以為不及也師古曰質重也漢書爰盎傳盎曰陛下居代時太后嘗病三年陛下不交睫解衣湯藥非陛下口所嘗弗進夫曾參以布衣猶難之今陛下親以王者修之過曾參遠矣後漢書劉平等傳序安帝時汝南薛包孟嘗好學篤行喪母以至孝聞及父娶後妻而憎包分出之包日夜號泣不能去至被歐杖不得已廬於舍外旦入而灑掃父怒又逐之乃廬於里門昏晨不廢積歲餘父母慙而還之若二子者推至誠以為行行信於心而感於人以成名受祿致禮斯可謂能以孝養也若夫江革劉般數公者之義行猶斯志也後漢書江革傳江革字次翁齊國臨淄人也少失父獨與母居遭天下亂盜賊並起革負母逃難備經阻險常採拾以為養元和中天子思革至行制詔齊相曰諫議大夫江革前以病歸今起居何如夫孝百行之冠衆善之始也國家每惟志士未嘗不及革縣以見穀千斛賜巨孝常以八月長吏存問致羊酒以終厥身華嶠書曰致羊一頭酒二斛如有不幸祠以中牢由是巨孝之稱行於天下後漢書張霸傳張霸字伯饒蜀郡成都人也年數歲而知孝讓雖出入飲食自然合禮鄉人號為張曾子卷六十六後漢書陳實傳附子陳紀紀字元方亦以至德稱兄弟孝養閨門雍和後進之士皆推慕其風遭父憂每哀至輒歐血絶氣雖衰服己除而積毀消瘠殆將滅性豫州刺史嘉其至行表上尚書圖象百城以厲風俗三國志魏志陳思王植傳太和元年徙封浚儀二年復還雍丘植常自憤怨抱利器而無所施上疏求自試曰臣聞士之生世入則事父出則事君事父尚於榮親事君貴於興國故慈父不能愛無益之子仁君不能畜無用之臣新唐書高祖諸子列傳隱太子建成建成等召秦王夜宴毒酒而進之王暴疾衉血數升淮安王扶掖還宮帝問疾因敕建成秦王不能酒毋夜聚又謂秦王曰吾起晉陽平天下皆爾力將定東宮爾亟讓故成而美志又太子立多歷年吾重奪之觀而兄弟終不相下同在京師忿且深爾還洛陽行臺自陜以東悉主之建天子旌旗如梁孝王故事王泣曰非所願也不可遠膝下新唐書孝友列傳贊曰聖人治天下有道曰要在孝悌而已父父也子子也兄兄也弟弟也推而之國國而之天下建一善而百行從其失則以法繩之故曰孝者天下大本法其末也至匹夫單人行孝一概而凶盜不敢凌天子喟而旌之者以其教孝而求忠也故裒而著于篇新唐書后妃列傳下文宗性謹孝事后有禮凡羞果鮮珍及四方奇奉必先獻宗廟三宮而後御之新唐書房玄齡傳中原方亂慨然有憂天下志會父疾綿十旬不解衣及喪勺飲不入口五日忠孝萃於一門第五前漢金日磾傳贊曰金日磾夷狄亡國羈虜漢廷而以篤恭寤主忠信自著勒功上將傳國後嗣世名忠孝七世內侍何其盛也後漢彪二議曰夫國以簡賢為務賢以孝行為首孔子曰事親孝故忠可移於君是以求忠臣必於孝子之門晉謝安子琰詔琰討孫恩琰敗張猛斫琰墮地死後劉裕生禽猛送琰小子混混刳肝生食之詔以琰父子死於君親忠孝卒於一門贈司空晉卞壺傳蘇峻稱兵詔以壺都督六軍既敗壺時發背創未合力疾而苦戰遂死二子眕盱見父沒相隨而死眕母裴氏撫二子尸哭曰父為忠臣汝為孝子夫何恨乎翟湯聞之歎曰父死於君子死於父忠孝之道萃於一門餘見社稷之臣郭子儀傳箋證漢書霍光金日磾傳贊曰金日磾夷狄亡國羈虜漢庭而以篤敬寤主忠信自著勒功上將傳國後嗣世名忠孝七世內侍何其盛也後漢書韋彪傳建初二年已封曹參後曹湛為平陽侯是時陳事者多言郡國貢舉率非功次故守職益懈而吏事寖疏咎在州郡有詔下公卿朝臣議彪上議曰伏惟明詔憂勞百姓垂恩選舉務得其人夫國以簡賢為務賢以敦行為首孔子曰事親孝故忠可移於君是以求忠臣必於孝子之門孝經緯之文也晉書謝安傳附子謝琰琰字瑗度弱冠以貞幹稱美風姿詔琰與輔國將軍劉牢之俱討孫恩恩逃于海島賊既至尚未食琰曰要當先滅此寇而後食也跨馬而出廣武將軍桓寶為前鋒摧鋒陷陳殺賊甚多而塘路迮狹琰軍魚貫而前賊於艦中傍射之前後斷絶琰至千秋亭敗績琰帳下都督張猛於後斫琰馬琰墮地與二子肇峻俱被害寶亦死之後劉裕左里之捷生擒猛送琰小子混混刳肝生食之詔以琰父子隕於君親忠孝萃於一門贈琰侍中司空晉書卞壼傳卞壼字望之濟陰冤句人也峻果稱兵壼復為尚書令右將軍領右衛將軍餘官如故峻至東陵口詔以壼都督大桁東諸軍事假節復加領軍將軍給事中壼率郭默趙允等與峻大戰於陵西為峻所破壼與鍾雅皆退還死傷者以千數壼雅並還節詣闕謝罪峻進攻青溪壼與諸軍距擊不能禁賊放火燒宮寺六軍敗績壼時發背創猶未合力疾而戰率厲散髮及左右吏數百人攻賊麾下苦戰遂死之時年四十八二子眕盱見父沒相隨赴賊同時見害眕母裴氏撫二子尸哭曰父為忠臣汝為孝子夫何恨乎徵士翟湯聞之歎曰父死於君子死於父忠孝之道萃于一門忠孝不兩立第六後漢袁紹傳紹上書曰冀州牧韓馥懷挾逆謀欲專權勢絶臣軍糧不得踵係至使猾虜肆毒害及一門尊卑大小同日并戮鳥戰之情猶知號呼臣所以蕩然志哀貌無隱戚者誠以忠孝之節道不兩立晉周處傳氐人齊萬年反朝臣惡處強直乃使西征孫秀知其將死謂之曰卿有老母可以此辭也處曰忠孝之道安得兩全既辭親事君父母復安得而子乎今日是我死所也晉劉斌議曰敦敘風俗以人倫為先人倫之教以忠孝為主忠故不忠其君孝故不遺其親若孝必專心於色養則明君不得而臣忠必不顧其親則父母不得而子也是以為臣者必以義斷其恩為子者必以情割其義在朝則從君之命在家則隨父之制然后君父兩齊忠孝各序新唐于志寧傳志寧為詹事詔起復帝遣岑文本敦譬曰忠孝不兩立今太子須人教約卿彊起為我卒輔道之餘見事不辭難王尊傳箋證後漢書袁紹傳建安元年曹操迎天子都許乃下詔書於紹責以地廣兵多而專自樹黨不聞勤王之師而但擅相討伐紹上書曰會故冀州牧韓馥懷挾逆謀欲專權勢絶臣軍糧不得踵係至使猾虜肆毒害及一門尊卑大小同日并戮鳥獸之情猶知號呼臣所以蕩然忘哀貌無隱戚者誠以忠孝之節道不兩立晉書周處傳入洛稍遷新平太守遷御史中丞凡所糾劾不避寵戚梁王肜違法處深文按之及氐人齊萬年反朝臣惡處彊直皆曰處吳之名將子也忠烈果毅乃使隸夏侯駿西征伏波將軍孫秀知其將死謂之曰卿有老母可以此辭也處曰忠孝之道安得兩全既辭親事君父母復安得而子乎今日是我死所也晉書庾純傳司徒西曹掾劉斌議以為敦敘風俗以人倫為先人倫之教以忠孝為主忠故不忘其君孝故不忘其親若孝必專心於色養則明君不得而臣忠必不顧其親則父母不得而子也是以為臣者必以義斷其恩為子也必以情割其義在朝則從君之命在家則隨父之制然後君父兩濟忠孝各序新唐書于志寧傳于志寧字仲謐京兆高陵人貞觀三年為中書侍郎加散騎常侍太子左庶子黎陽縣公俄兼詹事以母喪免有詔起復本官固請終喪帝遣中書侍郎岑文本敦譬曰忠孝不兩立今太子須人教約卿彊起為我卒輔道之仁孝第七後漢延篤傳論仁孝先後曰夫二致同源總率百行非復銖兩輕重必定前後之數也而如欲分其大較體而名之則孝在事親仁施品物施物則功濟於時事親則德歸於己於己則事寡濟時則功多推此以言仁則遠矣然物有出微而著事有由隱而章近取諸身則耳有聽受之用目有察見之明足有致遠之勞手有飾衛之功功雖顯外本之者心也遠取諸物則草木之生始於萌牙終於彌蔓枝葉扶疏榮華紛縟末雖繁蔚致之者根也夫仁人之有孝由四體之有心腹也枝葉之有根本也聖人知之故曰夫孝天之經也地之義也人之行也君子務本本立而道生孝悌也者其為仁之本歟然體大難備物性好偏故所施不同事少兩兼者也如必對其優劣則仁以枝葉扶疏為大孝以必體本根為心無可欲也或為先仁後孝非仲尼序回參之意蓋以仁孝同質而生純體之者則互以為稱虞舜顏回是也若偏而體之則各有其目公劉曾參是也魏董昭傳昭書與春卿曰孝者不背親以要則仁者不忘君以徇私箋證後漢書延篤傳篤以病免歸教授家巷時人或疑仁孝前後之證篤乃論之曰觀夫仁孝之辨紛然異端互引典文代取事據可謂篤論矣夫人二致同源總率百行非復銖兩輕重必定前後之數也而如欲分其大較體而名之則孝在事親仁施品物施物則功濟於時事親則德歸於己於己則事寡濟事則功多推此以言仁則遠矣然物有出微而著事有由隱而章近取諸身則耳有聽受之用目有察見之明足有致遠之勞手有飾衛之功功雖顯外本之者心也遠取諸物則草木之生始於萌牙終於彌蔓枝葉扶疏榮華紛縟末雖繁蔚致之者根也夫仁人之有孝猶四體之有心腹枝葉之有根本也聖人知之故曰夫孝天之經也地之義也人之行也君子務本本立而道生孝悌也者其為仁之本與然體大難備物性好偏故所施不同事少兩兼者也如必對其優劣則仁以枝葉扶疏為大孝以心體本根為先可無訟也或謂先孝後仁非仲尼序回參之意蓋以為仁孝同質而生純體之者則互以為稱虞舜顏回是也若偏而體之則各有其目公劉曾參是也三國志魏志董昭傳袁紹同族春卿為魏郡太守在城中其父元長在揚州太祖遣人迎之昭書與春卿曰蓋聞孝者不背親以要利仁者不忘君以徇私祿養第八後漢劉平傳孔子曰夫孝莫大於嚴父嚴父莫大於配天則周公其人也子路曰傷哉貧也生無以養死無以葬子曰啜菽飲水孝也夫鍾鼓非樂云之本而器不可去三牲非致孝之主而養不可廢存器而忘本樂之遁也調器以和聲樂之成也崇養以傷行孝之纍也修己以致祿養之大也故言能大養則周公之祀致四海之祭言以義養則仲由之菽甘於東鄰之牲夫患水菽之薄干祿以求養者是以恥祿親也存誠以盡行孝積而祿厚者此能以義養也廬江毛義家貧以孝行稱南陽人張奉慕其名往候之坐定而府檄適至以義守令義奉檄而入喜動顏色奉心賤之自恨來固辭而去及義母死去官行服數辟公府為縣令進退必以禮後舉賢良公車召遂不至張奉歎曰賢者固不可測往日之喜乃為親屈也斯蓋所謂家貧親老不擇官而仕者也後漢張酺傳酺為太尉雖衽公位而父常居田里酺每有遷職輒一詣京師嘗來候酺適會歲節公卿罷朝俱詣酺府奉酒上壽極歡卒日衆人皆慶羡之晉虞潭母孫氏拜武昌侯太夫人加金章紫綬潭立養堂於家箋證後漢書劉平等傳序孔子曰夫孝莫大於嚴父嚴父莫大於配天則周公其人也子路曰傷哉貧也生無以養死無以葬子曰啜菽飲水孝也夫鐘鼓非樂云之本而器不可去三牲非致孝之主而養不可廢存器而亡本樂之遁也調器以和聲樂之成也崇養以傷行孝之纍也修己以致祿養之大也故言能大養則周公之祀致四海之祭言以義養則仲由之菽甘於東鄰之牲夫患水菽之薄干祿以求養者是以恥祿親也存誠以盡行孝積而祿厚者此能以義養也中興廬江毛義少節家貧以孝行稱南陽人張奉慕其名往候之坐定而府檄適至以義守令義奉檄而入喜動顏色奉者志尚士也心賤之自恨來固辭而去及義母死去官行服數辟公府為縣令進退必以禮後舉賢良公車徵遂不至張奉歎曰賢者固不可測往日之喜乃為親屈也斯蓋所謂家貧親老不擇官而仕者也後漢書張酺傳酺雖在公位而父常居田里酺每有遷職輒一詣京師嘗來候酺適會歲節公卿罷朝俱詣酺府奉酒上壽極歡卒日衆人皆慶羡之晉書烈女列傳虞潭母孫氏拜武昌侯太夫人加金章紫綬潭立養堂於家
