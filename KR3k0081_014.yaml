body:
  text: 卷第十四政第一史記周公世家伯禽之初受封之魯三年而後報政周公周公曰何遲也伯禽曰變其俗革其禮喪三年然后除之故遲太公亦封於齊五月而報政周公周公曰何疾也曰吾簡其君臣禮從其俗為也及後聞伯禽報政遲乃歎曰嗚呼魯後世其北面事齊矣夫政不簡不易民不有近平易近民民必歸之史記孔子世家魯哀公問政對曰政在選臣史記孔子世家景公問政於孔子對曰政在節財前漢刑法志詩云宜民宜人受祿于天書曰立功立事可以永年言為政而宜於民者功成事立則受天祿而永年命所謂一人有慶兆民賴之者也前漢鮑宣傳復召何武師丹彭宣傅喜曠然使民易視以應天心建立大政以興太平之端也後漢吳漢等論曰有德之君以所樂樂人無德之君以所樂樂身樂人者其樂長樂身者不久而亡舍近謀遠者勞而無功舍遠謀近者逸而有終逸政多忠臣勞政多亂人後漢賈瓊上疏諫曰臣聞天者務剛其氣君者務彊其政蜀志蔣琬傳除廣都長先主嘗因游觀見琬眾事不理如罪戮諸葛亮請曰蔣琬其為政以安民為本不以修飾為先願重加察之晉刑法志夫為政也猶張琴瑟大弦急者小弦絕故子貢非臧孫之猛法而美鄭僑之仁政晉劉頌傳上疏曰故善為政者網舉而網疏綱舉則所羅者廣網疏則小必漏所羅者廣則為政不苛此為政之要也晉東皙曰誠曰誠感神明晉劉毅傳上表曰臣聞天以盈虛為運政以損益為道時否而政不革人凋而事不損則無以救急病於已危拯塗炭於將絕箋證史記魯周公世家魯公伯禽之初受封之魯三年而後報政周公周公曰何遲也伯禽曰變其俗革其禮喪三年然後除之故遲大公亦封於齊五月而報政周公周公曰何疾也曰吾簡其君臣禮從其俗為也及後聞伯禽報政遲乃歎曰嗚呼魯後世其北面事齊矣夫政不簡不易民不有近平易近民民必歸之集解徐廣曰一本云政不簡不行不行不樂不樂則不平易平易近民民必歸之又一本云夫民不簡不易有近乎簡易民必歸之索隱言為政簡易者民必附近之近謂親近也史記孔子世家孔子之去魯凡十四歲而反乎魯魯哀公問政對曰政在選臣史記孔子世家景公問政孔子孔子曰君君臣臣父父子子他日又復問政於孔子孔子曰政在節財漢書刑法志成康刑錯雖未可致孝文斷獄庶幾可及詩云宜民宜人受祿于天師古曰大雅假樂之詩也蓋嘉成王之德云書曰立功立事可以永年師古曰今文泰誓之辭也永長也言為政而宜於民者功成事立則受天祿而永年命所謂一人有慶萬民賴之者也師古曰呂刑之辭也一人天子也言天子用刑詳審有福慶之惠則眾庶咸賴之也漢書鮑宣傳正月朔日蝕上乃徵孔光免孫寵息夫躬罷侍中諸曹黃門郎數十人宣復上書言復徵何武師丹彭宣傅喜曠然使民易視以應天心師古曰易改也建立大政以興太平之端後漢書臧宮傳臧宮字君翁潁川郟人也宮以謹信質樸故常見任用二十七年宮乃與楊虛侯馬武上書詔報曰黃石公記曰柔者德也剛者賊也弱者仁之助也彊者怨之歸也故曰有德之君以所樂樂人無德之君以所樂樂身樂人者其樂長樂身者不久而亡舍近謀遠者勞而無功舍遠謀近者逸而有終逸政多忠臣勞政多亂人後漢書黃瓊傳梁冀既誅瓊首居公位舉奏州郡素行貪汙至死徙者十餘人海內由是翕然望之尋而五侯擅權傾動輒外自度力不能匡乃稱疾不起四年以寇賊免其年復為司空秋以地震免七年疾篤上疏諫曰臣聞天者務剛其氣君者務彊其政三國志蜀志蔣琬傳琬以州書佐隨先主入蜀除廣都長先主嘗因游觀奄至廣都見琬眾事不理時又沉醉先主大怒將加罪戮軍師將軍諸葛亮請曰蔣琬社稷之器非百里之才也其為政以安民為本不以修飾為先願主公重加察之晉書刑法志夫為政也猶張琴瑟大絃急者小絃絕故子貢非臧孫之猛法而美鄭僑之仁政晉書劉頌傳劉頌字子雅廣陵人漢廣陵厲王胥之後也除淮南相在官嚴整甚有政績在郡上疏曰故善為政者綱舉而網疏綱舉則所羅者廣網疏則小必漏所羅者廣則為政不苛此為政之要也此說未見晉書劉毅傳劉毅字希樂彭城沛人也轉衛將軍開府儀同三司江州都督毅上表曰臣聞天以盈虛為運政以損益為道時否而政不革人凋而事不損則無以救急病於已危拯塗炭於將絕善政第二前漢杜欽傳召詣大將軍莫府國家政謀鳳常與欽慮之數稱達名士王駿韋安世王延世等救解馮野王王尊胡嘗之罪過及繼功臣絕世填撫四夷當世善政多出於欽前漢李尋傳上疏曰古之王者尊天地重陰陽敬四時嚴月令順之以善政則和氣可立致猶枹鼓之相應也後漢桓譚上疏曰蓋善政者視俗而施教察失而立防威德更興文武迭用晉劉琰傳琰歎曰古之善政司契而已豈不以其敦本正源鎮靜流末乎箋證漢書杜周傳附杜欽欽以前事病賜帛罷後為議郎復以病免徵詣大將軍莫府國家政謀鳳常與欽慮之師古曰慮計也數稱達名士王駿韋安世王延世等師古曰王駿王陽子也韋安世韋賢之孫方山之子也王延世即成帝時塞河堤者也宋祁曰一本只云王延無世字救解馮野王王尊胡常之罪過及繼功臣絕世填撫四夷當世善政多出於欽漢書李尋傳哀帝初即位召尋待詔黃門使侍中衛尉傅喜問尋尋對曰古之王者尊天地重陰陽敬四時嚴月令順之以善政則和氣可立致猶枹鼓之相應也後漢書桓譚傳桓譚字君山沛國相人也大司空宋弘薦譚拜議郎給事中因上疏陳時政所宜曰蓋善政者視俗而施教察失而立防威德更興文武迭用晉書劉惔傳劉惔字真長沛國相人也累遷丹陽尹為政清整門無雜賓時百姓頗有訟官長者諸郡往往有相舉正惔歎曰夫居下訕上此弊道也古之善政司契而已豈不以其敦本正源鎮靜流末乎卷七十五勤政第三史記秦始皇紀天下之事無小大皆決於上上至以衡石量書石百二十斤日夜有呈不中呈不得休息前漢鄒陽曰始孝文皇帝據關入立寒心銷志不明求衣前漢董仲舒傳紂尚在上尊卑昏亂百姓散亡故文王悼痛而欲安之是以日昊而不暇食也箋證史記秦始皇本紀侯生盧生相與謀曰始皇為人天性剛戾自用起諸侯并天下意得欲從以為自古莫及己專任獄吏獄吏得親幸博士雖七十人特備員弗用丞相諸大臣皆受成事倚辦於上上樂以刑殺為威天下畏罪持祿莫敢盡忠上不聞過而日驕下懾伏謾欺以取容秦法不得兼方不驗輒死然候星氣者至三百人皆良士畏忌諱諛不敢端言其過天下之事無大小皆決於上上至以衡石量書集解駰案石百二十斤正義衡秤衡也言表牋奏請秤取一石日夜有程期不滿不休息日夜有呈不中呈不得休息貪於權勢至如此未可為求僊藥於是乃亡去漢書鄒陽傳吳王以太子事怨望稱疾不朝陰有邪謀陽奏書諫為其事尚隱惡指斥言故先引秦為諭因道胡越齊趙淮南之難然後迺致其意其辭曰臣聞始孝文皇帝據關入立寒心銷志不明求衣漢書董仲舒傳仲舒對曰當此之時紂尚在上尊卑昏亂百姓散亡故文王悼痛而欲安之是以日昃而不暇食也虐政第四前漢伍被傳興萬乘之駕作阿房之宮收太半之賦發閭左之戍父不寧子兄不安弟政苛刑慘民皆引領而望傾耳而聽悲號仰天叩心怨上叩擊也前漢賈山傳秦以熊羆之力虎狼之心蠶食諸侯并吞海內而不篤禮義故天殃已加矣後漢孝章紀夫以苛為察以刻為明以輕為德以重為威四者或興則下有怨心後漢左雄上疏曰典城百里轉動無常各懷一切莫慮長久謂殺害不辜為威風聚斂整辨為賢能以理己安民為劣弱以奉法循理為不化髡鉗之戮生於睚眥覆尸之禍成於喜怒視民如寇讎稅之如豺虎箋證漢書伍被傳被曰往者秦為無道殘賊天下興萬乘之駕作阿房之宮收太半之賦發閭左之戍父不寧子兄不安弟師古曰言不能相保政苛刑慘民皆引領而望傾耳而聽悲號仰天叩心怨上師古曰叩擊也漢書賈山傳孝文時言治亂之道借秦為諭名曰至言其辭曰秦以熊羆之力虎狼之心蠶食諸侯并吞海內而不篤禮義師古曰篤厚也故天殃已加矣後漢書章帝紀二年春正月又詔三公曰今富姦行賂於下貪吏枉法於上使有罪不論而無過被刑甚大逆也夫以苛為察以刻為明以輕為德以重為威四者或興則下有怨心吾詔書數下冠盖接道而吏不加理人或失職其咎安在後漢書左雄傳拜雄尚書再遷尚書令上疏陳事曰漢初至今三百餘載俗浸彫敝巧偽滋萌下飾其詐上肆其殘典城百里轉動無常各懷一切莫慮長久謂殺害不辜為威風聚斂整辦為賢能以理己安民為劣弱以奉法循理為不化髡鉗之戮生於睚眥覆尸之禍成於喜怒視民如寇讎稅之如豺虎政如神明第五前漢循吏黃霸傳嘗欲有所司察擇長年廉吏遣行屬令周密吏出不敢舍郵亭食於道旁烏攫其肉民有欲詣府口言事者適見之霸與語道此後日吏還謁霸霸見迎勞之曰甚苦食於道旁乃為烏所盜肉吏大驚以霸具知其起居所問豪釐不敢有所隱鰥寡孤獨有死無以葬者鄉部書言霸具為區處某所大木可以為棺某亭豬子可以祭吏往皆如言其識事聰明如此吏民不知所出咸稱神明前漢敘傳定襄大姓石李群輩報怨殺追損吏上即拜伯為定襄太守定襄聞伯素貴年少畏其下車作威伯至請問耆老父祖故人有舊恩者迎延滿堂日為供具執子孫禮郡中益弛諸所賓禮皆名豪懷恩醉酒共諫伯宜頗攝錄盜賊具言本謀亡匿處伯曰是所望於父師矣迺召屬縣長吏選精進掾史分部收捕及它隱伏旬日盡得郡中震栗咸稱神明後漢公沙穆傳穆遷洪農令縣界有螟蟲食稼百姓惶懼穆乃設壇謝曰百姓有過罪穆之由請以身禱於是暴雨不終日既霽而螟蟲自銷百姓稱曰神明晉樂志改上邪為大晉承運期言聖皇應籙受圖化家神明也箋證漢書循吏傳黃霸黃霸字次公淮陽陽夏人也霸為人明察內敏又習文法然溫良有讓足知善御眾為丞處議當於法合人心太守甚任之吏民愛敬焉自武帝末用法深宣帝即位在民間時知百姓苦吏急也聞霸持法平召以為廷尉嘗欲有所司察擇長年廉吏遣行屬令周密吏出不敢舍郵亭食於道旁烏攫其肉民有欲詣府口言事者適見之霸與語道此後日吏還謁霸霸見迎勞之曰甚苦食於道旁乃為烏所盜肉吏大驚以霸具知其起居所問豪釐不敢有所隱鰥寡孤獨有死無以葬者鄉部書言霸具為區處某所大木可以為棺某亭豬子可以祭吏往皆如言其識事聰明如此吏民不知所出咸稱神明漢書敘傳河平中單于來朝上使伯持節迎於塞下會定襄大姓石季群輩報怨殺追捕吏師古曰報私怨而殺人吏追捕之又殺吏伯上狀因自請願試守期月師古曰欲守定襄太守期音基上遣侍中中郎將王舜馳傳代伯護單于并奉璽書印綬即拜伯為定襄太守定襄聞伯素貴年少自請治劇畏其下車作威吏民竦息伯至請問耆老父祖故人有舊恩者迎延滿堂日為供具執子孫禮郡中益弛諸所賓禮皆名豪懷恩醉酒共諫伯宜頗攝錄盜賊具言本謀亡匿處伯曰是所望於父師矣師古曰齒為諸父尊之如師故曰父師迺召屬縣長吏選精進掾史分部收捕及它隱伏旬日盡得郡中震栗咸稱神明後漢書公沙穆傳公沙穆字文乂北海膠東人也遷弘農令縣界有螟蟲食稼百姓惶懼穆乃設壇謝曰百姓有過罪穆之由請以身禱於是暴雨不終日既霽而螟蟲自銷百姓稱曰神明晉書樂志改上邪為大晉承運期言聖皇應籙受圖化象神明也政感陰陽第六前漢杜欽傳變應以類相應人事失於下變象見於上能應之以德則咎異消亡不能應之以善則禍敗至前漢李尋乃說王根曰政治感陰陽猶鐵炭之低卬見效可信者也天文志云縣土炭也以鐵易土耳先冬夏至縣鐵炭於衡各一端令適停冬陽氣至炭仰而鐵低夏陰氣至炭低而鐵仰以此候二至也前漢李尋曰古之王者尊天地重陰陽恭四時嚴月令順之以善政則和氣可立致猶枹鼓之相應也前漢稚圭上疏曰臣聞天人之際精祲有以相盪善惡有以相推事作乎下者象動乎上陰陽之理各應其感陰變則靜者動陽蔽則明者晻水旱之災隨類而至後漢盛夏多寒又上疏臣聞政化之本必順陰陽伏見立夏以來當暑而寒殆以刑罰刻急郡國不奉時令之所致也魏程曉上疏論校事放橫曰昔桑弘羊為漢求利卜式以為獨烹桑羊天乃可雨若使政治得失必感天地臣恐水旱之災未必非校事之由也箋證漢書杜周傳附子杜欽欽字子夏少好經書家富而目偏盲後有日蝕地震之變詔舉賢良方正能直言士合陽侯梁放舉欽欽上對曰變感以類相應人事失於下變象見於上能應之以德則異咎消亡不能應之以善則禍敗至漢書李尋傳帝舅曲陽侯王根為大司馬票騎將軍厚遇尋是時多災異根輔政數虛已問尋尋見漢家有中衰阸會之象其意以為且有洪水為災乃說根曰政治感陰陽猶鐵炭之低卬見效可信者也孟康曰天文志云縣土炭也以鐵易土耳先冬夏至縣鐵炭於衡各一端令適停冬陽氣至炭仰而鐵低夏陰氣至炭低而鐵仰以此候二至也漢書李尋傳哀帝初即位召尋待詔黃門使侍中衛尉傅喜問尋尋對曰古之王者尊天地重陰陽敬四時嚴月令順之以善政則和氣可立致猶枹鼓之相應也漢書匡衡傳上問以政治得失衡上疏曰臣聞天人之際精祲有以相盪善惡有以相推事作乎下者象動乎上陰陽之理各應其感陰變則靜者動陽蔽則明者晻鄧展曰靜者動謂地震也明者晻謂日蝕也師古曰晻與暗同蕭該案字林曰晻不明也應劭曰晻音闇水旱之災隨類而至後漢書韋彪傳韋彪字孟達扶風平陵人也彪以世承二帝更化之後多以苛刻為能二帝光武明帝也又置官選職不必以才因盛夏多寒上疏諫曰臣聞政化之本必順陰陽伏見立夏以來當暑而寒殆以刑罰刻急郡國不奉時令之所致也三國志魏志程昱傳附孫程曉曉嘉平中為黃門侍郎世語曰曉字季明有通識時校事放橫曉上疏曰昔桑弘羊為漢求利卜式以為獨烹弘羊天乃可雨若使政治得失必感天地臣恐水旱之災未必非校事之由也政事以經對第七前漢成帝元延元年詔曰迺者日蝕星隕公卿大夫博士議郎其各悉心惟思變意明以經對無有所諱前漢平當傳每有災異當輒傅經術言得失文雅雖不能及蕭望之稚圭然指意略同前漢稚圭傳為少傅數年數上疏陳便宜及朝廷有政義傅經以對言多法義上以為任公卿由是代韋玄成為丞相傅讀曰附前漢孔光傳凡典樞機十餘年守法度修故事上有所問據經法以心所安而對不希指苟合如或不從不敢強諫爭以是久而安前漢薛宣傳谷永上疏曰臣聞賢材莫大於治人宣已有效其法律任廷尉有餘經術文雅足以謀王體斷國論身兼數器有退食自公之節後漢魯恭傳恭性謙退奏議依經潛有補益後漢趙典傳典遷大常朝廷每有災異疑議輒諮問之典據經正對無所曲折後漢鄭興傳帝嘗問興郊祀事曰吾欲以讖斷之如何興對曰臣不為讖帝怒曰卿之不為讖非之邪曰臣於書有所未學而無所非也帝意乃解興數言政事依經守義文章溫雅然以不善讖故不能任後漢蔡邕傳詔問曰比災變互生未知厥咎朝廷焦心載懷恐懼每訪群公卿士庶聞忠言而各存括囊莫肯盡心以邕經學深奧故密特稽問宜披露失得指陳政要勿有依違自生疑諱具對經術以皁囊封上凡章表皆啟封其言密事得皁囊也蜀譙周傳以儒行見禮時訪大議輒據經以對箋證漢書成帝紀元延元年秋七月有星孛于東井詔曰迺者日蝕星隕謫見于天大異重仍師古曰仍頻也重音直用反在位默然罕有忠言今孛星見于東井朕甚懼焉公卿大夫博士議郎其各悉心惟思變意明以經對無有所諱漢書平當傳平當字子思祖父以訾百萬自下邑徙平陵以明經為博士每有災異當輒傅經術言得失師古曰傅讀曰附文雅雖不能及蕭望之匡衡然指意略同漢書匡衡傳衡為少傅數年數上疏陳便宜及朝廷有政議傅經以對師古曰傅讀曰附附依也言多法義上以為任公卿師古曰任堪也由是為光祿勳御史大夫建昭三年代韋玄成為丞相漢書孔光傳孔光凡典樞機十餘年守法度修故事上有所問據經法以心所安而對不希指苟合師古曰希指希望天子旨意也如或不從不敢強諫爭以是久而安漢書薛宣傳谷永上疏曰臣聞賢材莫大於治人宣已有效其法律任廷尉有餘經術文雅足以謀王體斷國論身兼數器有退食自公之節後漢書魯恭傳恭性謙退奏議依經潛有補益然終不自顯故不以剛直為稱後漢書趙典傳趙典字仲經蜀郡成都人也轉太僕遷太常朝廷每有災異疑議輒諮問之典據經正對無所曲折後漢書鄭興傳鄭興字少贛河南開封人也帝嘗問興郊祀事曰吾欲以讖斷之何如興對曰臣不為讖帝怒曰卿之不為讖非之邪興惶恐曰臣於書有所未學而無所非也帝意乃解興數言政事依經守義文章溫雅然以不善讖故不能任後漢書蔡邕傳光和元年遂置鴻都門學畫孔子及七十二弟子像其諸生皆勑州郡三公舉用辟召或出為刺史太守入為尚書侍中乃有封侯賜爵者士君子皆恥與為列焉時妖異數見人相驚擾其年七月詔召邕與光祿大夫楊賜諫議大夫馬日磾議郎張華太史令單颺詣金商門引入崇德殿使中常侍曹節王甫就問災異及消改變故所宜施行邕悉心以對又特詔問曰比災變互生未知厥咎朝廷焦心載懷恐懼每訪群公卿士庶聞忠言而各存括囊莫肯盡心括囊喻閉口而不言易曰括囊無咎王弼注云括結也以邕經學深奧故密特稽問宜披露失得指陳政要勿有依違自生疑諱具對經術以皁囊封上漢官儀曰凡章表皆啟封其言密事得皁囊也三國志蜀志譙周傳譙周字允南巴西西充國人也後遷光祿大夫位亞九列周雖不與政事以儒行見禮時訪大議輒據經以對
