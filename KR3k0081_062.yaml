body:
  text: 卷第六十二婦人預政第一前漢高后紀贊曰高后女主制政不出房闥而天下晏然刑罰罕用民務稼穡衣食滋殖前漢五行志京房易傳曰婦人顓政國不靜牝雞雄鳴主不榮前漢地理志陳本太昊之虛周武王封舜後媯滿於陳是為胡公妻以元女大姬婦人尊貴好祭祀用史巫故其俗巫鬼陳詩曰坎其擊鼓宛丘之下亡冬亡夏值其鷺羽又曰東門之枌宛丘之栩子仲之子婆娑其下此其風也吳扎聞陳之歌曰國亡主其能久乎言政由婦人不以君為主也前漢李尋傳對哀帝曰月數以春夏與日同道過軒轅上后受氣入太微帝廷楊光輝犯上將近臣列星皆失色厭厭如滅烏點反此為母后與政亂朝陰陽俱傷兩不相便前漢孔光傳成帝母太皇太后自居長樂宮而帝祖母定陶傅太后在國邸有詔問丞相大司農定陶共王太后宜當何居光心恐傳太后與政士不欲令與帝旦夕相近即議以為宜改築宮大司空何武曰可居北宮上從武言北宮有紫房復道通未央宮傳太后果從復道朝夕而帝所求欲稱尊號貴寵其親屬使上不得直道行不得依正直之道又傳太后欲與武帝母俱稱尊號群下多順指言母以子貴令立尊號以厚孝道唯師丹與光持不可上重違大臣之議又內迫傳太后猗違者連歲不決事之言也後漢皇后紀曰自古雖主幼時艱主家多釁必委成家宰簡求忠良未有專任婦人斷割重器惟秦芊太后始攝政事故穰侯權重於昭王家富於嬴國漢仍其繆知思莫改東京皇統屢絶權歸女主外立者四帝安質桓靈臨朝者六后竇鄧閻梁竇何莫不定策惟奕委事父兄貪孩童以久其政抑明賢以專其威後漢五行志安帝永初元年雨雹二年雨雹大如雞子三年雨雹大如雁子傷稼劉向以為雹陰脅陽也是時鄧太后以陰專陽政後漢五行志安帝永初二年大水三年大水四年大水五年大水六年河東池水變色皆赤如血是時鄧太后猶專政後漢五行志質帝本初元年五月海水溢樂安北海溺殺人物是時帝幼梁太后專政後漢楊震傳安帝乳母王聖因保養之勤緣恩放恣聖子女伯榮出入宮掖傳通姦賂震上疏曰夫女子小人近之喜遠之怨實為難養易曰旡由遂在中饋言婦人不得與於政事也宜速出阿母令居外舍晉惠賈皇后傳后專制天下威服內外更與粲午專為姦謀誣害太子晉五行志穆帝永和元年地震是時嗣主幼沖母后稱制政在臣下所以地震新唐則天皇后武氏傳已得志即盜威福施施旡憚避帝亦懦昏舉能鉗勒使不得專久稍不平云云及儀誅則政歸房幃天子拱手矣群臣朝四方奏章皆曰二聖每視朝殿中垂簾帝與后偶坐生殺賞罰惟所命新唐長孫后傳帝與言或及天下事辭曰牝雞之晨家之窮也可乎帝固要之訖不對新唐諸王公主傳太平公主方額廣頤多陰謀后常謂類我而主內與謀外檢畏新唐桓彥範傳中宗復位彥範上書戒帝曰詩以關睢為始言后妃者人倫之本治亂之端也故舜之興以皇英而周之興以任舛桀奔南巢禍階末嬉魯桓滅國惑始齊姜伏見陛下臨朝視政皇后必施帷殿上預聞政事臣愚謂古王者謀及婦人皆破國亡身傾輈繼路且以陰乘陽違天也以婦凌夫違人也違天不祥違人不義餘見人臣擅權范睢傳又見抑外戚魏文帝紀箋證漢書高后紀贊曰孝惠高后之時海內得離戰國之苦君臣俱欲無為故惠帝拱已高后女主制政不出房闥而天下晏然刑罰罕用民務稼穡衣食滋殖漢書五行志京房易傳曰賢者居明夷之世知時而傷或衆在位厥妖雞生角雞生角時主獨又曰婦人顓政國不靜牝雞雄鳴主不榮漢書地理志陳本太昊之虛周武王封舜後媯滿於陳是為胡公妻以元女大姬婦人尊貴好祭祀用史巫故其俗巫鬼陳詩曰坎其擊鼓宛丘之下亡冬亡夏值其鷺羽又曰東門之枌宛丘之栩子仲之子婆娑其下此其風也吳札聞陳之歌曰國亡主其能久乎師古曰言政由婦人不以君為主也漢書李尋傳哀帝初歷位召尋待詔黃門使侍中衛尉傅喜問尋曰間者水出地動日月失度星辰亂行災異仍重極言母有所諱尋對曰春夏南秋冬北間者月數以春夏與日同道過軒轅上后受氣入太微帝廷揚光輝犯上將近臣列星皆失色厭厭如滅鄭氏曰厭音檿桑之檿師古曰音烏點反此為母后與政亂朝陰陽俱傷兩不相便漢書孔光傳哀帝初即位躬行儉約省減諸用政事由己出朝廷翕然望至治焉時成帝母太皇太后自居長樂邸而帝祖母定陶傅太后在國邸有詔問丞相大司空定陶共王太后宜當何居光素聞傅太后為人剛暴長於權謀自帝在襁褓而養長教道至於成人帝之立又有力光心恐傅太后與政事不欲令與帝旦夕相近即議以為定陶太后宜改築宮大司空何武曰可居北宮上從武言北宮有紫房復道通未央宮傅太后果從復道朝夕至帝所求欲稱尊號貴寵其親屬使上不得直道行師古曰不得依正直之道又傅太后欲與成帝母俱稱尊號群下多順指言母以子貴宜立尊號以厚孝道唯師丹與光持不可上重違大臣正議師古曰重難也又內迫傅太后猗違者連歲如淳曰不決事之言也師古曰猗違猶依違猗音於奇反後漢書后紀序自古雖主幼時艱王家多釁必委成冢宰簡求忠賢未有專任婦人斷割重器唯秦芊太后始攝政事故穰侯權重於昭王家富於嬴國太后昭王母也號宣太后史記曰昭王立年少宣太后自知事以同母弟魏冉為將軍任政封為穰侯太后攝政始於此也漢仍其謬知患莫改東京皇統屢絶權歸女主外立者四帝謂安質桓靈臨朝者六后章帝竇太后和熹鄧太后安思閻太后順烈梁太后桓思竇太后靈思何太后也莫不定策帷帟委事父兄貪孩童以久其政抑明賢以專其威後漢書五行志安帝永初元年雨雹二年雨雹大如雞子三年雨雹大如雁子傷稼劉向以為雹陰脅陽也是時鄧太后以陰專陽政後漢書五行志安帝永初二年大水三年大水四年大水五年大水六年河東池水變色皆赤如血水變占曰水化為血者好任殘賊殺戮不辜延及親戚水當為血是時鄧太后猶專政後漢書五行志質帝本初元年五月海水溢樂安北海溺殺人物是時帝幼梁太后專政後漢書楊震傳鄧太后崩內寵始橫安帝乳母王聖因保養之勤緣恩放恣聖子女伯榮出入宮掖傳通姦賂震上疏曰夫女子小人近之喜遠之怨實為難養易曰無攸遂在中饋言婦人不得與於政事也宜速出阿母令居外舍晉書后妃列傳惠賈皇后惠賈皇后諱南風平陽人也宜城臨終執后手令盡意於太子言甚切至又曰趙粲及午必亂汝事我死後勿復聽入深憶吾言后不能遵之遂專制天下威服內外更與粲午專為姦謀誣害太子晉書五行志下穆帝永和元年六月癸亥地震是時嗣主幼沖母后稱制政在臣下所以連年地震新唐書后妃列傳高宗則天順聖皇后武氏已得志即盜威福施施無憚避帝亦懦昏舉能鉗勒使不得專久稍不平麟德初后召方士郭行真入禁中為蠱祝宦人王伏勝發之帝怒因是召西臺侍郎上官儀儀指言后專恣失海內望不可承宗廟與帝意合乃趣使草詔廢之左右馳告后遽從帝自訴帝羞縮待之如初猶意其恚且曰是皆上官儀教我后諷許敬宗構儀殺之及儀見誅則政歸房帷天子拱手矣群臣朝四方奏章皆曰二聖每視朝殿中垂簾帝與后偶坐生殺賞罰惟所命新唐書后妃列傳太宗皇后長孫氏傳與帝言或及天下事辭曰牝雞司晨家之窮也可乎帝固要之訖不對新唐書諸公主列傳太平公主太平公主則天皇后所生后愛之傾諸女主方額廣頤多陰謀后常謂類我而主內與謀外檢畏新唐書桓呂範傳中宗復位以呂範為侍中封譙郡公賜實封五百戶上書戒帝曰詩以關睢為始言后妃者人倫之本治亂之端也故舜之興以皇英而周之興以任姒桀奔南巢禍階末嬉魯桓滅國惑始齊姜伏見陛下臨朝視政皇后必施帷殿上預聞政事臣愚謂古王者謀及婦人皆破國亡身傾輈繼路且以陰乘陽違天也以婦凌夫違人也違天不祥違人不義卷一百二十抑外戚第二前漢申屠嘉傳文帝以皇后弟竇廣國賢有行欲相之曰恐天下以吾私廣國乃以嘉為丞相前漢李尋對哀帝曰今汝頴畎澮皆川水漂踊與雨水並為民害此詩所謂燁燁震電不寧不令百川沸騰者也其咎在於皇甫卿士之屬皇甫卿士周室女寵之族也唯陛下留意詩人之言少抑外戚大臣前漢馮野王傳御史大夫李延壽病卒在位多舉野王上使尚書選第中二千石而野王行能第一上曰吾用野王為三公後世必謂我私後宮親屬乃下詔曰剛彊堅固確然亡欲大鴻臚野王是也心辦善辭可使四方少府五鹿充宗是也廉潔節儉太子少傅張談是也其以少傅為御史大夫上繇下弟而用談越次避嫌不用野王以昭義兄故也野王乃歎曰人皆有女寵貴我兄弟獨以賤野王雖不為三公甚見器重有名當世前漢劉向傳帝元舅陽平侯王鳳為大將軍秉政倚太后專國權兄弟七人皆封為列侯時數有大異向以為外戚貴盛鳳兄弟用事之咎而上方精於詩書觀古文詔向領校中五經祕書向見尚書洪範箕子為武王陳五行陰陽休咎之應向乃集合上古以來歷春秋六國至秦漢符瑞災異之記推跡行事連傳禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向忠精故為鳳兄弟起此論也然終不能奪王氏權椒房之家數因恩藝干犯吏禁殺人不死易人而崇臣恐繩墨棄而不用斤斧廢而不舉光武然之肅宗以明德太后故尊崇舅氏馬廖兄弟並居職任倫以后族過盛欲令朝廷抑損其權上疏云范曄曰永元之際天子幼弱太后臨朝竇氏憑盛戚之權將有呂霍之變幸漢德未衰人臣方忠袁任正色立朝樂何抗議柱下故能挾弱主斷勦姦回之逼不然國家危矣永平中常令陰黨陰博鄧疊三人更相糾察故諸豪戚更敢犯法者故詔書切切猶以舅氏田宅為言後漢馬皇后紀夏大旱言事者以為不封外戚之故有司因此上奏宜依舊典太后詔曰凡言事者皆欲媚朕以要福耳昔王氏五侯同日俱封其時黃霧四塞不聞澍雨之應又田蚡竇嬰寵貴橫恣傾覆之禍為世所傳故先帝防慎舅氏不令在樞機之位諸子之封裁令半楚淮陽諸國常謂我子不當與先帝子等今有司奈何欲以馬氏比陰氏乎吾為天下母而身服大練食不求甘左右但著帛布無香薰之飾者欲身率下也以為外親見之當傷心自勑但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如游龍倉頭衣緑褠領神正白顧視御者不及遠矣故不加譴怒但絶歲用而已冀以默愧其心而猶懈怠旡憂國忘家之慮知臣莫若君況親屬乎吾豈可上負先帝之旨下虧先人之德重襲西京敗亡之禍哉固不許後漢第五倫傳馬防為車騎將軍當出征西羌倫又上疏曰臣愚以為貴戚可封侯以富之不當職事以任之何者繩以法則傷恩私以親則違憲後漢第五倫傳及諸馬得罪歸國竇氏始貴倫復上疏曰三輔論議者至云以貴戚廢錮當復以貴戚浣濯之猶解酲當以酒也病酒曰酲臣愚願陛下嚴勑憲等無妄交通士大夫防其未萌令憲永保福祿後漢虞延傳遷洛陽令是時陰氏有客馬成者常為姦盜延收考之陰氏屢請獲一書輒加篣二百篣捶也音彭信陽侯陰就乃訴帝譖延多所冤枉帝乃臨御道之館親録囚徒延陳其獄狀可論者在東旡理者居西成乃回欲趨東延前執之謂曰爾人之巨蠹久依城社不畏熏燒今考實未竟宜當盡法成大呼稱枉陛戟郎以戟剌延叱使置之帝知延不私謂成曰汝犯王法身自取之呵使速去後數月伏誅於是外戚斂手莫敢于法齊景公問晏子曰理國何患對曰患社鼠社鼠不可熏人君之左右亦國之社鼠後漢翟酺傳酺上疏諫曰今外戚寵幸臣恐威權外假歸之良難虎翼一奮卒不可制老子稱國之利器不可以示人箋證者案以下闕文依門目及文字當闕婚姻第三箋證漢書申屠嘉傳張蒼免相文帝以皇后弟竇廣國賢有行欲相之曰恐天下以吾私廣國久念不可而高帝時大臣餘見無可者乃以御史大夫嘉為丞相漢書李尋傳哀帝初歷位召尋待詔黃門使侍中衛尉傅喜問尋曰間者水出地動日月失度星辰亂行災異仍重極言母有所諱尋對曰河出圖洛出書故河洛決溢所為最大今汝潁畎澮皆川水漂涌與雨水並為民害此詩所謂燁燁震電不寧不令百川沸騰者也師古曰詩小雅十月之交之詩也其咎在於皇甫卿士之屬師古曰皇甫卿士周室女寵之族也唯陛下留意詩人之言少抑外親大臣漢書馮奉世傳附子馮野王御史大夫李延壽病卒在位多舉野王上使尚書選第中二千石而野王行能第一上曰吾用野王為三公後世必謂我私後宮親屬以野王為比乃下詔曰剛彊堅固確然亡欲大鴻臚野王是也心辨善辭可使四方少府五鹿充宗是也廉潔節儉太子少傅張談是也其以少傅為御史大夫上繇下第而用談越次避嫌不用野王以昭儀兄故也野王乃歎曰人皆以女寵貴我兄弟獨以賤野王雖不為三公甚見器重有名當世漢書楚元王傳附劉向是時帝元舅陽平侯王鳳為大將軍秉政倚太后專國權兄弟七人皆封為列侯時數有大異向以為外戚貴盛鳳兄弟用事之咎而上方精於詩書觀古文詔向領校中五經祕書向見尚書洪範箕子為武王陳五行陰陽休咎之應向乃集合上古以來歷春秋六國至秦漢符瑞災異之記推橫行事連傳禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向忠精故為鳳兄弟起此論也然終不能奪王氏權後漢書蔡茂傳蔡茂字子禮河內懷人也徵復拜議郎再遷廣漢太守有政績會洛陽令董宣舉紏湖陽公主帝始怒收宣既而赦之茂喜宣剛正欲令朝廷禁制貴戚乃上書曰頃者貴戚椒房之家數因恩藝干犯吏禁殺人不死傷人不論臣恐繩墨棄而不用斧斤廢而不舉今者外戚憍逸賓客放濫宜勑有司案理姦罪使執平之吏永申其用以厭遠近不緝之情光武納之後漢書第五倫傳肅宗初立擢自遠郡代牟融為司空帝以明德太后故尊崇舅氏馬廖兄弟並居職任廖等傾身交結冠蓋之士爭赴趣之倫以后族過盛欲令朝廷抑損其權上疏曰後漢書朱樂何傳論曰永元之際天子幼弱太后臨朝竇氏馮盛戚之權將有呂霍之變呂祿呂産也霍光之子禹幸漢德未衰大臣方忠袁任二公正色立朝袁安任隗也樂何之徒抗議柱下故能挾幼主斷勦姦回之逼不然國家危矣後漢書竇融傳附曾孫竇憲憲字伯度父勳被誅憲少孤建初二年女弟立為皇后拜憲為郎稍遷侍中虎賁中郎將弟篤為黃門侍郎兄弟親幸並侍宮省賞賜纍積寵貴日盛自王主及陰馬諸家莫不畏憚憲恃宮掖聲藝遂以賤直請奪沁水公主園田主逼畏不敢計後肅宗駕出過園指以問憲憲陰喝不得對後發覺帝大怒召憲切責曰深思前過奪主田園時何用愈趙高指鹿為馬久念使人驚怖昔永平中常令陰黨彥博鄧疊三人更相糾察以陰鄧皆外戚恐其踰侈故使更相糾察也博陰興之子故諸豪戚莫敢犯法者而詔書切切猶以舅氏田宅為言今貴主尚見枉奪何況小人哉國家棄憲如孤雛腐鼠耳後漢書后紀馬皇后紀建初元年欲封爵諸舅太后不聽明年夏大旱言事者以為不封外戚之故有司因此上奏宜依舊典太后詔曰凡言事者皆欲媚朕以要福耳昔王氏五侯同日俱封其時黃霧四塞不聞澍雨之應又田蚡竇嬰寵貴橫恣傾覆之禍為世所傳故先帝防傎舅氏不令在樞機之位諸子之封裁令半楚淮陽諸國常謂我子不當與先帝子等今有司奈何欲以馬氏比陰氏乎吾為天下母而身服大練食不求甘左右但著帛布無香薰之飾者欲身率下也以為外親見之當傷心自勑但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如游龍倉頭衣緑褠領袖正白顧視御者不及遠矣故不加譴怒但絶歲用而已冀以默愧其心而猶懈怠無憂國忘家之慮知臣莫若君况親屬乎吾豈可上負先帝之旨下虧先人之德重襲西京敗亡之禍哉固不許後漢書第五倫傳及馬防為車騎將軍當出征西羌倫又上疏曰臣愚以為國戚可封侯以富之不當職事以任之何者繩以法則傷恩私以親則違憲後漢書第五倫傳及諸馬得罪歸國而竇氏始貴倫復上疏曰三輔議論者至云以貴戚廢錮當復以貴戚浣濯之猶解酲當以酒也病酒曰酲詖險趣藝之徒誠不可親近臣愚願陛下中宮嚴勑憲等閉門自守無妄交通士大夫防其未萌慮於無形令憲永保福祿後漢書虞延傳建武時元正朝賀帝望而識延遣小黃門馳問之即日召拜公車令明年遷洛陽令是時陰氏有客馬成者常為姦盜延收考之陰氏屢請獲一書輒加篣二百篣棰也音彭信陽侯陰就乃訴帝譖延多所冤枉帝乃臨御道之館親録囚徒延陳其獄狀可論者在東無理者居西成乃回欲趨東延前執之謂曰爾人之巨蠹久依城社不畏熏燒齊景公問晏子曰理國何患對曰患社鼠公曰何謂社鼠對曰社鼠不可熏人君之左右亦國之社鼠也今考實未竟宜當盡法成大呼稱枉陛戟郎以戟刺延叱使置之帝知延不私謂成曰汝犯王法身自取之呵使速去後數日伏誅於是外戚斂手莫敢干法後漢書翟酺傳時安帝始親政事追感祖母宋貴人悉封其家又元舅耿寶及皇后兄弟閻顯等並用威權酺上疏諫曰今外戚寵幸功均造化漢元以來未有等比陛下誠仁恩周洽以親九族然祿去公室政移私門覆車重尋寧無摧折而朝臣在位莫肯正議翕翕訾訾更相佐附臣恐威權外假歸之良難虎翼一奮卒不可制故孔子曰吐珠於澤誰能不含老子稱國之利器不可以示人
