body:
  text: 卷第九十五夷狄第一前漢胸奴傳贊曰書戒蠻夷猾夏詩稱戎狄是膺春秋有道守在四夷久矣夷狄之為患也故自漢興忠言嘉謀之臣曷嘗不運籌策相與爭於廟堂之上乎高祖時則婁恭呂后時樊噲季布孝文時賈誼朝錯孝武時王恢韓安國朱買臣公孫洪董仲舒人持所見各有同異然總其要歸兩科而已縉紳之儒則守和親介胄之士則言征伐皆偏見一時之利害而未究胸奴之終始也自漢興以至于今曠世歷年多於春秋其與胸奴有修文而和親之矣有用武而克伐之矣有卑下而承事之矣有威服而臣畜之矣詘伸異變強弱相反是故其詳可得而言也昔和親之論發於婁恭是時天下初定新遭平城之難故從其言約結和親賂遺單于冀以救安邊境孝惠高后時遵而不違胸奴寇盜不為衰止而單于反以加驕倨逮至孝文與通關市妻以漢女增厚其賂歲以千金而胸奴數背約束邊境屢被其害是以文帝中年發憤遂躬戎服親御廄馬從六郡良家材力之士馳射上林講習戰陳聚天下精兵軍於廣武顧問馮唐與論將帥喟然歎息思古名臣此則和親無益已然之明效也仲舒親見四世之事猶復欲守舊文頗增其約以為義動君子利動貪人如胸奴者非可以仁義説也獨可説以厚利結之於天耳故與之厚利以沒其意與盟於天以堅其約質其愛子以纍其心胸奴雖欲展轉奈失重利何奈欺上天何奈殺愛子何夫賦斂行賂不足以當三軍之費城郭之固無以異於正士之約而使邊城守境之民父母緩帶稚子咽哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎察仲舒之論者諸行事乃知其未合於當時而有闕於後世也當孝武時雖征伐克獲而士馬物故亦略相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里胸奴人民每來降漢單于亦輒拘留漢使以相報復其桀驁尚如斯安肯以愛子而為質乎此不合當時之言也若不置質空約和親是襲孝文既往之悔而長胸奴無已之詐也夫邊城不選守境武略之臣修障隧備塞之具厲長戟徑弩之械恃吾所以待邊寇而務賦斂於民遠行貨賂割剝百姓以奉寇讎信甘言守空約而冀胡馬之不窺不已過乎至孝宣之世承武帝奮擊之威直胸奴百年之運因其壞亂幾亡之厄權時施宜覆以威德然後單于稽首臣服遣子入侍三世稱藩賓於漢庭是時邊城晏閉牛馬布野三世無大吠之警藜庶亡干戈之役後六十餘載遭王莽篡位始開邊隙單于由是歸惡自絶莽遂斬其侍子邊境之禍構矣故呼韓邪始朝於漢漢議其儀而蕭望之曰戎狄荒服言其來服荒忽無常時至時去宜待以客禮讓而不臣如其後嗣遁逃竄伏使於中國不為叛臣及孝元時議罷守塞之備侯應以為不可可謂盛不忘衰安必思危遠見識微之明矣至單于咸棄其愛子昧利不顧侵掠所獲歲詎萬計而和親賂遺不過千金安在其不棄質而失重利也仲舒之言漏於是矣夫規事建議不圖萬世之固而偷恃一時之事者未可以經遠也若乃征伐之功秦漢行事嚴尤論之當矣故先王度土中立封畿分九州列五服物土貢制外內或修刑政或昭文德遂於之藝異也是以春秋內諸夏而外夷狄夷狄之人貪而好利被髮左衽人心其與中國殊章服異習俗飲食不同言語不通辟居北垂寒露之野逐草隨畜射獵為生隔以山谷雍以沙莫天地所以絶內外也是故聖王不與約誓不就攻伐約之則費賂而見欺攻之則勞師而招寇其地不可耕而食也其民不可臣而畜也是以外而不內疏而不戚政教不及其人正朔不加其國來則懲而御之去則備而守之其慕義而貢獻則接之以禮讓羇靡不絶使曲在彼蓋聖王制御蠻夷之常道也前漢賈誼傳贊曰誼之所陳略施行矣及以漢為土德色上黃數用五及欲試屬國施五餌三表以係單于賈誼書謂愛人之狀好人之技仁道也信為大操常義也愛好有實已諾可期十死一生彼將必至此三表也賜之盛服車乘以壞其目賜之盛食珍味以壞其口賜之音樂婦人以壞其耳賜之高堂邃宇倉庫奴婢以壞其腹於來降者上以召幸之相朕樂親酌而手食之以壞其心此五餌也其術固以疏矣前漢賈捐之傳詩曰蠢爾荊蠻大邦為讎言聖人起則後服中國衰則先畔動為國家難自古而患之後漢魯恭上疏諫曰夫夷狄者四方之異氣也蹲夷踞肆與鳥獸無別若雜居中國則錯亂天氣汙辱善人是以聖王之制羈縻而絶而已新唐溫彥博傳高麗貢方物高祖欲讓而不臣彥博執不可曰遼東本周箕子國漢玄菟郡不使北面則四夷何所瞻仰帝納而止新唐狄仁傑傳戍疏勒四鎮曰天生四夷皆在先王封疆之外東拒滄海西隔流沙北橫大漠南阻五嶺天所以限中外也自典籍所紀聲教所暨三代不能至者國家兼之正觀中克平九姓册拜李思摩為可汗使叛則伐降則撫得推之固存之義新唐贊曰夷狄資悍貪人外而獸內惟剽奪是視故湯武之興未嘗與共功蓋疏而不戚也太宗初興嘗用突厥矣不勝其暴卒縛而臣之肅宗用回紇矣至略華人辱太子笞殺近臣求索無倪德宗又用吐蕃矣劫平涼敗上將空破西陲所謂引外禍平內亂者也夫用之以權制之以謀唯太宗能之若二主懦皆狃而狎之烏勝其弊哉彼親之則責償也多慊而不滿則滋怨化以也義則頑示以法則分熟我險易則為患也博而慘療餒以治葛何時可哉故春秋許夷狄者不一而足信矣新唐沙陀傳贊曰沙陀始歸命天子仰哺于邊世喋血助征討常為邊兵雄至克用逢王室亂遂有太原虜性惇固少它腸自負材果欲經營天下而不克也兵雖勝然數敗地雖得輒復失故熟視帝劫遷縮頸羞汗偷景待僵不亦鄙乎賴其子慓鋭抑而復振是時提兵託勤王者五族然卒亡朱氏為唐滌恥者沙陀也使克用稍知古今能如齊桓晉文唐遽亡乎哉新唐突厥傳序劉貺以為嚴尤辨而未詳班固詳而未盡榷其至當周得上策秦得其中漢無策何以言之荒服之外聲教所不逮其叛不為之勞師其降不為之釋備嚴守禦險走集使其為寇不能也為臣不得也惠此中夏以綏四方周之道也故曰周得上策易稱王侯設險以固其國築長城修障塞所以設險也趙簡子起長城備胡燕秦亦築長城限中外益理城塹城全國滅人歸咎焉後魏築長城議者以為人治一步方千里役三十萬人不旬朔而獲久逸故曰秦得中策漢以宗女嫁胸奴而高祖亦審魯元不能止趙王之逆謀謂能息胸奴之叛非也且冒頓手弒其親而冀其不與外祖爭強豈不惑哉然則知和親非久安計而為之者以天下初定紓歲月之禍耳武帝時中國艾安胡寇益希疏而絶之此其時也方更糜耗華夏連兵積年故嚴尤以為下策箋證漢書胸奴傳贊曰書戒蠻夷猾夏詩稱戎狄是膺春秋有道守在四夷久矣夷狄之為患也故自漢興忠言嘉謀之臣曷嘗不運籌策相與爭於廟堂之上乎高祖時則劉敬呂后時樊噲季布孝文時賈誼朝錯孝武時王恢韓安國朱買臣公孫洪董仲舒人持所見各有同異然總其要歸兩科而已縉紳之儒則守和親介胄之士則言征伐皆偏見一時之利害而未究胸奴之終始也自漢興以至於今曠世歷年多於春秋其與胸奴有修文而和親之矣有用武而克伐之矣有卑下而承事之矣有威服而臣畜之矣詘伸異變強弱相反是故其詳可得而言也昔和親之論發於劉敬是時天下初定新遭平城之難故從其言約結和親賂遺單于冀以救安邊境孝惠高后時遵而不違胸奴寇盜不為衰止而單于反以加驕倨逮至孝文與通關市妻以漢女增厚其賂歲以千金而胸奴數背約束邊境屢被其害是以文帝中年赫然發憤遂躬戎服親御廄馬從六郡良家材力之士馳射上林講習戰陳聚天下精兵軍於廣武顧問馮唐與論將帥喟然歎息思古名臣此則和親無益已然之明效也仲舒親見四世之事猶復欲守舊文頗增其約以為義動君子利動貪人如胸奴者非可以仁義説也獨可説以厚利結之於天耳故與之厚利以沒其意與盟於天以堅其約質其愛子以纍其心胸奴雖欲展轉奈失重利何奈欺上天何奈殺愛子何夫賦斂行賂不足以當三軍之費城郭之固無以異於貞士之約而使邊城守境之民父兄緩帶稚子咽哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎察仲舒之論考諸行事乃知其未合於當時而有闕於後世也當孝武時雖征伐克獲而士馬物故亦略相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里胸奴人民每來降漢單于亦輒拘留漢使以相報復其桀驁尚如斯安肯以愛子而為質乎此不合當時之言也若不置質空約和親是襲孝文既往之悔而長胸奴無已之詐也夫邊城不選守境武略之臣修障隧備塞之具厲長戟徑弩之械恃吾所以待邊寇而務賦斂於民遠行貨賂割剝百姓以奉寇讎信甘言守空約而幾胡馬之不窺不已過乎至孝宣之世承武帝奮擊之威直胸奴百年之運因其壞亂幾亡之厄權時施宜覆以威德然後單于稽首臣服遣子入侍三世稱藩賓於漢庭是時邊城晏閉牛馬布野三世無犬吠之警藜庶亡干戈之役後六十餘載之間遭王莽篡位始開邊隙單于由是歸怨自絶莽遂斬其侍子邊境之禍構矣故呼韓邪始朝於漢漢議其儀而蕭望之曰戎狄荒服言其來服荒忽無常時至時去宜待以客禮讓而不臣如其後嗣遁逃竄伏使於中國不為叛臣及孝元時議罷守塞之備侯應以為不可可謂盛不忘衰安必思危遠見識微之明矣至單于咸棄其愛子昧利不顧侵掠所獲歲巨萬計而和親賂遺不過千金安在其不棄質而失重利也仲舒之言漏於是矣夫規事建議不圖萬世之固而偷恃一時之事者未可以經遠也若乃征伐之功秦漢行事嚴尤論之當矣故先王度土中立封畿分九州列五服物土貢制外內或修刑政或昭文德遠近之勢異也是以春秋內諸夏而外夷狄夷狄之人貪而好利被髮左袵人面獸心其與中國殊章服異習俗飲食不同言語不通辟居北垂寒露之野逐草隨畜射獵為生隔以山谷雍以沙幕天地所以絶外內也是故聖王禽獸畜之不與約誓不就攻伐約之則費賂而見欺攻之則勞師而招寇其地不可耕而食也其民不可臣而畜也是以外而不內疏而不戚政教不及其人正朔不加其國來則懲而御之去則備而守之其慕義而貢獻則接之以禮讓羇靡不絶使曲在彼蓋聖王制御蠻夷之常道也漢書賈誼傳贊曰誼之所陳略施行矣及欲改定制度以漢為土德色上黃數用五及欲試屬國施五餌三表以係單于師古曰賈誼書謂愛人之狀好人之技仁道也信為大操常義也愛好有實已諾可期十死一生彼將必至此三表也賜之盛服車乘以壞其目賜之盛食珍味以壞其口賜之音樂婦人以壞其耳賜之高堂邃宇倉庫奴婢以壞其腹于來降者上以召幸之相娛樂親酌而手食之以壞其心此五餌也其術固以疏矣漢書賈捐之傳詩云蠢爾蠻荊大邦為讎言聖人起則後服中國衰則先畔動為國家難自古而患之久矣何況乃復其南方萬里之蠻乎後漢書魯恭傳魯恭上疏諫曰夫戎狄者四方之異氣也蹲夷踞肆與鳥獸無別若雜居中國則錯亂天氣汙辱善人是以聖王之制羈縻不絶而已新唐書溫彥博傳高麗貢方物高祖欲讓而不臣彥博執不可曰遼東本周箕子國漢玄菟郡不使北面則四夷何所瞻仰帝納而止新唐書狄仁傑傳召拜鸞臺侍郎復同鳳閣鸞臺平章事時發兵戍疏勒四鎮百姓怨苦仁傑諫曰天生四夷皆在先王封域之外東距滄海西隔流沙北橫大漠南阻五嶺天所以限中外也自典籍所紀聲教所暨三代不能至者國家既已兼之貞觀中克平九姓册拜李思摩為可汗使統諸部夷狄叛則伐降則撫得推亡固存之義無遠戍勞人之役新唐書回鶻列傳贊曰夷狄資悍貪人外而獸內惟剽奪是視故湯武之興未嘗與共功蓋疏而不戚也太宗初興嘗用突厥矣不勝其暴卒縛而臣之肅宗用回紇矣至略華人辱太子笞殺近臣求索無倪德宗又用吐蕃矣劫平涼敗上將空破西陲所謂引外禍平內亂者也夫用之以權制之以謀唯太宗能之若二主懦昏狃而狎之烏勝其弊哉彼親之則責償也多慊而不滿則滋怨化以仁義則頑示以法則忿熟我險易則為患也博而慘療餒以野葛何時可哉故春秋許夷狄者不一而足信矣新唐書沙陀傳贊曰沙陀始歸命天子仰哺于邊世喋血助征討常為邊兵雄至克用逢王室亂遂有太原虜性惇固少它腸自負材果欲經營天下而不克也兵雖勝然數敗地雖得輒復失故熟視帝劫遷縮頸羞汗偷景待僵不亦鄙乎賴其子慓鋭抑而復振是時提兵託勤王者五族然卒亡朱氏為唐滌恥者沙陀也使克用稍知古今能如齊桓晉文唐遽亡乎哉新唐書突厥傳劉貺以為嚴尤辨而未詳班固詳而未盡榷其至當周得上策秦得其中漢無策何以言之荒服之外聲教所不逮其叛不為之勞師其降不為之釋備嚴守禦險走集使其為寇不能也為臣不得也惠此中夏以綏四方周之道也故曰周得上策易稱王侯設險以固其國築長城修障塞所以設險也趙簡子起長城備胡燕秦亦築長城限中外益理城塹城全國滅人歸咎焉後魏築長城議者以為人治一步方千里役三十萬人不旬朔而獲久逸故曰秦得中策漢以宗女嫁胸奴而高祖亦審魯元不能止趙王之逆謀謂能息胸奴之叛非也且冒頓手弒其親而冀其不與外祖爭強豈不惑哉然則知和親非久安計而為之者以天下初定紓歲月之禍耳武帝時中國艾安胡寇益希疏而絶之此其時也方更糜耗華夏連兵積年故嚴尤以為下策懷遠第二前漢西南夷王傳贊曰追觀太宗填撫尉他豈古所謂招攜以禮懷遠以德者哉左僖七年管仲言於齊侯文攜謂離二懷來也前漢嚴助傳詩云王猶允塞徐方既來言王道甚大而遠方懷之也後漢孝明紀公卿百官以帝威德懷遠祥物顯應乃並集朝堂奉觴上壽制曰天生神物以應王者遠人慕化實由有德朕以虛薄何以享斯唯高祖光武聖德所被不敢有辭其恭箋證漢書西南夷兩粵朝鮮傳贊曰追觀太宗填撫尉他豈古所謂招攜以禮懷遠以德者哉師古曰春秋左氏傳僖七年管仲言於齊侯曰臣聞之招攜以禮懷遠以德攜謂離二者也懷來也漢書嚴助傳詩云王猶允塞徐方既來言王道甚大而遠方懷之也後漢書孝明紀夏五月戊子公卿百官以帝威德懷遠祥物顯應乃並集朝堂奉觴上壽制曰天生神物以應王者遠人慕化實由有德朕以虛薄何以享斯惟高祖光武聖德所被不敢有辭其敬舉觴太常擇吉日策告宗廟
