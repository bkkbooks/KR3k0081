body:
  text: 卷第三十三得衆第一前漢趙廣漢傳蕭望之劾奏廣漢摧辱大臣宣帝下廣漢廷尉獄又坐賊殺不辜鞠獄故不以實擅午余騎士之軍興數罪天子可其奏吏民守闕號泣者數萬人或言臣生無益縣官願代趙京兆死使牧養小民廣漢竟坐要斬廣漢為京兆拜廉明威制豪彊小民得職百姓追思歌之至今前漢魏相傳人有告相賊殺不辜事下有司河南卒戍中都官者二三千人遮大將軍自言願復留作一年以贖太守罪何南老弱萬餘人守關欲入上書關史以間前漢蓋寬饒傳初拜為言馬躬案行士卒盧室規其飲食居處有疾病者身自撫循臨問加致醫藥遇之甚有恩及歲盡交代上臨饗罷衛卒衛卒數千人皆叩頭自請願復留共更一年以報寬饒厚德宣帝嘉之以寬饒為太中太夫使行風俗後漢劉虞傳虞拜幽州牧務存寬政勸督農植開上谷胡市之利通漁陽鹽鐵之饒民悅年登穀石三十青徐士庶避黃巾之難歸虞者百餘萬口皆收視溫恤為安立生業流民皆忘其遷徙後漢賈逵傳子汝郁性仁孝後纍遷為魯相以德教化百姓稱之流人歸者八九千戶後漢龐參傳參夫人疾前妻子投於井而殺之參素與洛陽令祝艮不平良率吏卒入太尉府案實其事乃上參罪遂因災異策免有司以良不先聞奏輒折辱宰相坐繫詔獄良能得百姓心洛陽吏人守闕請代其罪者日有數千万人詔乃原刑魏杜畿傳拜河東太守太祖征漢中遣五千人運運者自率勉曰人生有一死不可負我府君終無一人逃亡其得人心知此晉武紀詔曰劉毅裴楷以質直見容稽紹許奇雖仇讎不棄仁以御物寬而得衆宏略大度有帝王之量焉晉祖逖傳為豫州剌史嘗致酒大會耆老中坐流涕曰吾等老矣更得父母死將何恨乃歌曰幸哉遺黎免浮虜三辰既明遇茲父玄酒忘勞甘瓠脯何以詠德歌且舞其得人心如此餘見柱石之臣辛慶忌傳又見饑饉皇甫嵩傳箋證漢書趙廣漢傳蕭望之劾奏廣漢摧辱大臣欲以劫持奉公逆節傷化不道宣帝惡之下廣漢廷尉獄又坐賊殺不辜鞠獄故不以實擅斥除騎士乏軍興數罪天子可其奏吏民守闕號泣者數萬人或言臣生無益縣官願代趙京兆死使得牧養小民廣漢竟坐要斬廣漢雖坐法誅為京兆尹廉明威制豪彊小民得職百姓追思歌之至今漢書魏相傳後人有告相賊殺不辜事下有司河南卒戍中都官者二三千人遮大將軍自言願復留作一年以贖太守罪河南老弱萬餘人守關欲入上書關吏以聞大將軍用武庫令事遂下相廷尉獄漢書蓋寬饒傳蓋寬饒字次公魏郡人也寬饒初拜為司馬未出殿門斷其襌衣令短離地師古曰襌音單其字從衣冠大冠帶長劍躬案行士卒廬室視其飲食居處有疾病者身自撫循臨問加致醫藥遇之甚有恩及歲盡交代上臨饗罷徫卒師古曰得代當歸者也徫卒數千人皆叩頭自請願復留共更一年以報寬饒厚德宣帝嘉之以寬饒為太中大夫使行風俗後漢書劉虞傳虞初舉孝廉稍遷幽州刺史初平元年復徵代袁隗為太傅道路隔塞王命竟不得達舊幽部應接荒外資費甚廣歲常割青冀賦調二億有餘以給足之時處處斷絶委輸不至而虞務存寬政勸督農植開上谷胡市之利通漁陽鹽鐵之饒民悅年登穀石三十青徐士庶避黃巾之難歸虞者百餘萬口皆收視溫恤為安立生業流民皆忘其遷徙後漢書賈逵傳逵薦東宮司馬均陳國汝郁帝即徵之並蒙優禮郁字叔異性仁孝及親歿遂隱處山澤後纍遷為魯相以德教化百姓稱之流人歸者八九千戶又東觀漢記汝郁汝郁字叔異陳國人年五歲母被病不能飲食郁常抱持啼泣亦不飲食母憐之強為餐飯欺言已愈郁視母色未平輒不食宗親共異之郁再徵載病詣公車尚書敕郁自力受拜郁乘輂白衣詣止車門臺遣兩當關扶郁入拜郎中後漢書龐參傳後參夫人疾前妻子投於井而殺之參素與洛陽令祝良不平良聞之率吏卒入太尉府案實其事乃上參罪遂因災異策免有司以良不先聞奏輒折辱宰相坐繫詔獄良能得百姓心洛陽吏人守闕請代其罪者日有數千萬人詔乃原刑三國志魏志杜畿傳杜畿字伯侯京兆杜陵人也太祖謂荀彧曰河東被山帶河四鄰多變當今天下之要地也君為我舉蕭何寇恂以鎮之彧曰杜畿其人也於是遂拜畿為河東太守太祖征漢中遣五千人運運者自率勉曰人生有一死不可負我府君終無一人逃亡其得人心如此晉書武帝紀制曰武皇承基誕膺天命劉毅裴楷以質直見容嵇紹許奇雖仇讎不棄仁以御物寬而得衆宏略大度有帝王之量焉晉書祖逖傳祖逖字士稚范陽遒人也帝乃以逖為奮威將軍豫州刺史嘗置酒大會耆老中坐流涕曰吾等老矣更得父母死將何恨乃歌曰幸哉遺黎免俘虜三辰既朗遇慈父玄酒忘勞甘瓠脯何以詠恩歌且舞其得人心如此能治煩劇第二前漢王尊傳守京兆尹坐免吏民多稱惜之湖三老公乘興等上書訟尊撥劇整亂誅暴禁邪皆前世所稀有名將所不及前漢尹賞傳舉茂才粟邑令左馮翊薛宣奏言賞能治劇徙為頻陽令前漢張敞傳元帝初即位待詔鄭朋薦敞先帝名臣宜傅輔皇太子上以問蕭望之望之以為敞能吏任治煩亂材輕非師傅之器後漢胡廣傳陳留郡缺職尚書史敞等上書薦廣曰廣才略深茂堪能撥煩新唐王播進刑部侍郎領諸道鹽鐵轉運使是時天下多故大理議讞科條叢繁播剖決如流吏不能竄其私箋證漢書王尊傳鳳薦尊徵為諫大夫守京輔都尉行京兆尹事旬月閒盜賊清遷光祿大夫守京兆尹御史大夫中奏尊暴虐不改宋祁曰中諸本皆改作忠謂張忠也外為大言倨嫚姍上師古曰姍古訕字也威信日廢不宜備位九卿尊坐免吏民多稱惜之湖三老公乘興等師古曰湖縣名也今虢州湖城縣取其名上書訟尊治京兆功效日著尊撥劇整亂誅暴禁邪皆前所稀有名將所不及漢書酷吏傳尹賞傳尹賞字子心巨鹿楊氏人也以郡吏察廉為樓煩長舉茂材粟邑令左馮翊薛宣奏賞能治劇徙為頻陽令漢書張敞傳宣帝崩元帝初即位待詔鄭朋薦敞先帝名臣宜傅輔皇太子上以問前將軍蕭望之望之以為敞能吏任治煩亂材輕非師傅之器後漢書胡廣傳時陳留郡缺職尚書史敞等薦廣曰廣才略深茂堪能撥煩新唐書王播傳王播字明敡其先太原人時禁屯列畿內者出入屬鞬佩劍姦人冒之以剽劫又勳戚家馳獵近郊播請一切呵止盜賊不能隱皆走出境憲宗以為能進刑部侍郎領諸道鹽鐵轉運使是時天下多故大理議讞科條叢繁播悉置格律坐隅商處重輕剖決如流吏不能竄其私道不拾遺第三史記循吏列傳子産相鄭一年豎子不戲狎班白不提挈僮子不犁畔二年市不豫賈三年門不夜關道不拾遺史記孔子世家孔子攝行相事三月粥羔豚者弗飾賈男女行者別於塗塗不拾遺齊人聞而懼曰孔子為政必霸霸則吾地近焉我之為先并矣前漢循吏傳是時鳳皇神爵數集郡國頴川尤多天子以霸治行終長者下詔曰霸宣布詔令百姓鄉化田者讓畔道不拾遺其賜爵關內侯黃金百斤前漢酷吏義縱傳為河內都尉族滅其豪穰氏之屬河內道不拾遺前漢嚴延年傳為涿郡太守大姓西高氏東高氏自郡吏已下皆畏避之賓客放為盜賊道路張弓拔刃然後敢行延年窮竟誅殺各數十人郡中震恐道不拾遺後漢滕撫傳為涿令太守以其能委任郡職風政修明流愛于人在事七年道不拾遺魏田疇傳義兵起董卓遷帝于長安幽州牧劉虞遣疇奉使得報馳還未至虞為公孫瓚所害疇得北歸率舉宗族他附從數百人盟曰君仇不報吾不可以立於世遂入徐無山中躬耕以養父母百姓歸之數年間至五千餘家疇謂其父老曰諸君遠來相就衆成都邑而莫相統一恐非久安之道願推擇其賢長者以為之主皆曰善同僉推疇疇乃為約束相殺復犯盜諍訟之法法重者至死其次抵罪二十餘條又制為婚姻嫁娶之禮興舉學校講授之業班行其衆衆皆便之至道無拾遺北邊翕然服其威信蜀志諸葛亮傳亮為丞相外連東吳內平南越立法施度整理戎旅工械技巧物究其極科教嚴明賞罰必言無惡不懲無善不顯至於吏不容姦人懷自厲道不拾遺彊不侵弱風化肅然也吳呂蒙傳蒙入據城盡得關羽及將士家屬皆撫慰約令軍中不得干歷人家有所求取蒙麾下士是汝南人取民家一笠以覆官鎧官鎧雖公蒙猶以為犯軍令不可以鄉里故而廢法遂垂涕斬之於是軍中震栗道不拾遺晉載記符堅傳一猛為京兆尹其持進強德健之妻弟也昏酒豪橫為百姓之患猛捕殺之其中丞鄧羌性鯁直不撓與猛協規齊志數月之間貴戚豪強誅免者二十有餘人於是百寮震肅豪右屏氣路不拾遺風化大行堅歎曰吾今始知天子之為尊也新唐張元濟仕隋為武陽令有行人夜發遺袍道中行十餘里乃寤人曰吾境未嘗拾遺可還取之既而得袍餘見抑豪強郅都傳又見無求備於一人呂蒙傳又見市無二價宋登傳箋證史記循吏列傳子産者鄭之列大夫也以子産為相為相一年豎子不戲狎班白不提挈僮子不犁畔二年市不豫賈索隱賈音價謂臨時評其貴賤不豫定賈三年門不夜關道不拾遺史記孔子世家孔子年五十六由大司寇行攝相事於是誅魯大夫亂政者少正卯與聞國政三月粥羔羊者弗飾賈男女行者別於塗塗不拾遺四方之客至乎邑者不求有司皆豫之以歸齊人聞而懼曰孔子為政必霸霸則吾地近焉我之為先并矣漢書循吏傳黃霸霸以外寬內明得吏民心戶口歲增治為天下第一徵守京兆尹秩二千石坐發民治馳道不先以聞又發騎士詣北軍馬不適士孟康曰關西人謂補滿為適馬少士多不相補滿也劾乏軍興連貶秩有詔歸潁川太守官以八百石居治如其前前後八年郡中愈治是時鳳凰神爵數集郡國潁川尤多天子以霸治行終長者下詔稱揚曰潁川太守霸宣布詔令百姓鄉化孝子弟弟貞婦順孫日以衆多田者讓畔道不拾遺其賜爵關內侯黃金百斤秩中二千石漢書酷吏傳義縱義縱河東人也遷為長陵及長安令直法行治不避貴戚上以為能遷為河內都尉至則族滅其豪穰氏之屬河內道不拾遺漢書酷吏傳嚴延年嚴延年字次卿東海下邳人也神爵中西羌反彊弩將軍許延壽請延年為長史從軍敗西羌還為涿郡太守大姓西高氏東高氏師古曰兩高氏各以所居東西為號者自郡吏以下皆畏避之莫敢與牾師古曰牾逆也音悟咸曰寧負二千石無負豪大家賓客放為盜賊發輒入高氏吏不敢追浸浸日多道路張弓拔刃然後敢行其亂如此延年至遣掾蠡吾趙繡按高氏得其死罪更遣吏分考兩高窮竟其姦誅殺各數十人郡中震恐道不拾遺後漢書滕撫傳滕撫字叔輔北海劇人也初仕州郡稍遷為涿令有文武才用太守以其能委任郡職兼領六縣風政修明流愛于人在事七年道不拾遺三國志魏志田疇傳田疇字子泰右北平無終人也好讀書善擊劍初平元年義兵起董卓遷帝于長安幽州牧劉虞歎曰賊臣作亂朝廷播蕩四海俄然莫有固志身備宗室遺老不得自同於衆今欲奉使展效臣節安得不辱命之士乎衆議咸曰田疇雖年少多稱其奇疇時年二十二矣虞乃備禮請與相見大悅之遂署為從事具其車騎橫行虞自出祖而遣之既取道疇乃更上西關出塞傍北山直趣朔方循閒徑去遂至長安致命詔拜騎都尉疇以為天子方蒙塵未安不可以荷佩榮寵固辭不受朝廷高其義三府並辟皆不就得報馳還未至虞已為公孫瓚所害疇得北歸率舉宗族他附從數百人掃地而盟曰君仇不報吾不可以立於世遂入徐無山中營深險平敞地而居躬耕以養父母百姓歸之數年間至五千餘家疇謂其父老曰諸君不以疇不肖遠來相就衆成都邑而莫相統一恐非久安之道願擇其賢長者以為之主皆曰善同僉推疇疇曰今來在此非苟安而已將圖大事復怨雪恥竊恐未得其志而輕薄之徒自相侵侮偷快一時無深計遠慮疇有愚計願與諸君共施之可乎皆曰可疇乃為約束相殺傷犯盜諍訟之法法重者至死其次抵罪二十餘條又制為婚姻嫁娶之禮興舉學校講授之業班行其衆衆皆便之至道不拾遺北邊翕然服其威信三國志蜀志諸葛亮傳及備殂沒嗣子幼弱事無巨細亮皆專之於是外連東吳寬平南越立法施度整理戎旅工械技巧物究其極科教嚴明賞罰必信無惡不懲無善不顯至於吏不容姦人懷自厲道不拾遺彊不侵弱風化肅然也三國志吳志呂蒙傳呂蒙字子明汝南富陂人也及蒙代肅初至陸口外倍修恩厚與羽結好後羽討樊留兵將備公安南郡蒙上疏曰羽討樊而多留備兵必恐蒙圖其後故也蒙常有病乞分士衆還建業以治疾為名羽聞之必撤備兵盡赴襄陽大軍浮江晝夜馳上襲其空虛則南郡可下而羽可禽也遂稱病篤權乃露檄召蒙還陰與圖計羽果信之稍撤兵以赴樊魏使于禁救樊羽盡禽禁等人馬數萬託以糧乏擅取湘關米權聞之遂行先遣蒙在前蒙至尋陽盡伏其精兵䠠軟中使白衣搖櫓作商賈人服晝夜兼行至羽所置江邊屯候盡取縳之是故羽不聞知遂到南郡士仁麋芳皆降蒙入據城盡得羽及將士家屬皆撫慰約令軍中不得干歷人家有所求取蒙麾下士是汝南人取民家一笠以覆官鎧官鎧雖公蒙猶以為犯軍令不可以鄉里故而廢法遂垂涕斬之於是軍中震栗道不拾遺晉書苻堅傳上於是酣飲極歡命群臣賦詩大赦復改元曰甘露以王猛為侍中中書令京兆尹其特進強德健妻之弟也昏酒豪橫為百姓之患猛捕而殺之陳尸於市其中丞鄧羌性鯁直不撓與猛協規齊志數旬之間貴戚強豪誅死者二十有餘人於是百寮震肅豪右屏氣路不拾遺風化大行堅歎曰吾今始知天下之有法也天子之為尊也新唐書循吏列傳張允濟張允濟青州北海人仕隋為武陽令以愛利為行有行人夜發遺袍道中行十餘里乃寤人曰吾境未嘗拾遺可還取之既而得袍市無二價第四前漢食貨志王莽乃下詔曰夫周禮有賒貸樂語有五均鄭展曰樂語樂元語河間獻王所傳道五均事臣瓚曰其文云天子取諸侯之土以立五均則市無二價四民常均彊者不得困弱富者不得要貧則公家有餘恩及小民矣傳記各有斡焉今開賒貸張五均設諸斡者所以齊衆庶抑并兼遂於長安及五都立五均官後漢宋登傳為戚川太守市無二價道不拾遺後漢西域傳曰大秦國與安息天竺交市於海中利有十倍其人質直市無二價晉陸雲傳補浚儀令縣居都會之要名為難理雲到官肅然下不能欺市無二價箋證漢書食貨志國師公劉歆言周有泉府之官收不讎與欲得師古曰讎讀曰售言賣不售者官收取之無而欲得者官出與之即易所謂理財正辭禁民為非者也莽乃下詔曰夫周禮有賒貸樂語有五均鄧展曰樂語樂元語河問獻王所傳道五均事臣瓚曰其文云天子取諸侯之土以立五均則市無二賈四民常均彊者不得困弱富者不得要貧則公家有餘恩及小民矣傳記各有斡焉今開賒貸張五均設諸斡者所以齊衆庶抑并兼也遂於長安及五都立五均官後漢書儒林列傳宋登傳宋登字叔陽京兆長安人也順帝以登明識禮樂使持節臨太學奏定典律轉拜侍中數上封事抑退權臣由是出為潁川太守市無二價道不拾遺後漢書西域傳大秦國一名犂鞬以在海西亦云海西國地方數千里與安息天竺交市於海中利有十倍其人質直市無二價晉書陸機傳附陸雲俄以公府掾為太子舍人出補浚儀令縣居都會之要名為難理雲到官肅然下不能欺市無二價貪市望風而去第五後漢波雄為青州剌史每行部録囚徒察顏色多得情僞長吏不奉法者皆解印綬去後漢賈琮傳琮為冀州刺史舊典傳車驂駕垂赤帷裳及琮升車言曰當遠視廣聽糾察美惡何垂帷裳自掩塞乎乃命褰之百城聞風踈震其諸臧過者望風解印緩而去後漢黨錮范滂傳冀州飢荒盜賊群起乃以滂為清詔使案察之滂登車攬轡慨然有澄清天下之志及至州境守令自知臧汙望風解印綬去後漢黨錮傳李膺遷青州刺史守令畏威明多望風棄官晉王濬傳州郡辟河東從事守令有不廉潔者皆望風自引而去晉劉毅傳遷司隸校尉糾正豪右京邑肅然司部守令望風投印綬者甚衆時人以毅方之諸葛豐蓋寬饒箋證後漢書法雄傳法雄字文彊扶風郿人也雄初仕郡功曹永初三年乃徵雄為青州刺史雄每行部録囚徒察顏色多得情僞長吏不奉法者皆解印綬去後漢書賈琮傳賈琮字孟堅東郡聊城人也時黃巾新破兵凶之後郡縣重斂更選清能吏乃以琮為冀州刺史舊與傳車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當遠視廣聽糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰之百城聞風自然竦震其諸臧過者望風解印綬去後漢書黨錮列傳范滂傳范滂字孟博汝南征羌人也少厲清節為州里所服舉孝廉光祿四行漢官儀曰光祿舉敦厚質朴遜讓節儉此為四行也時冀州饑荒盜賊群起乃以滂為清詔使案察之滂登車攬轡慨然有澄清天下之志及至州境守令自知臧汙望風解印綬去後漢書黨錮列傳李膺傳李膺字元禮潁川襄城人也初舉孝廉為司徒胡廣所辟舉高第再遷青州刺史守令畏威明多望風棄官晉書王濬傳王濬字士治弘農湖人也州郡辟河東從事守令有不廉潔者皆望風自引而去晉書劉毅傳劉毅字仲雄東宮掖人咸寧初復為散騎常侍博士祭酒轉司隸校尉糾正豪右京師肅然司部守令望風投印綬者甚衆時人以毅方之諸葛豐蓋寬饒三不欺第六史記滑稽傳傳曰子産治鄭民不能欺子賤治單父民不忍欺西門豹治鄴民不敢欺三子之才能誰最賢哉辨治者當能別之魏文帝問群臣三不欺於君德孰優太尉鍾繇司徒華歆司空王景興對曰臣以為君任德則臣感義而不忍欺君任察則臣畏覺而不能欺君任刑則臣畏罪而不敢欺任德感義與夫導德齊禮有恥且格等趨者也任察畏罪與夫導政齊刑免而無恥同歸者也孔子曰為政以德譬如北辰居其所而衆星拱之考以斯言論以斯義臣等以為不忍欺不能欺優劣之縣在於權衡非徒低印之差乃鈞銖之覺也且前志稱仁者安仁智者利仁畏罪者強仁校其仁者功則無以殊核其為仁者則不得不異安仁者性善者也利仁者力行者也強仁者不得已者也三仁相比則安仁優矣易稱神而化之使民宜之若君化使民然也然則安仁之化與夫強仁之化優劣亦不得不相縣絶也然則三臣之不欺雖同所以不欺異矣則純以恩義崇不欺與以威察成不欺既不可同概而比量又不得錯綜而易處箋證史記滑稽列傳傳曰子産治鄭民不能欺子賤治單父民不忍欺西門豹治鄴民不敢欺三子之才能誰最賢哉辨治者當能別之集解駰案魏文帝問群臣三不欺於君德孰優太尉鍾繇司徒華歆司空王朗對曰臣以為君任德則臣感義而不忍欺君任察則臣畏覺而不能欺君任刑則臣畏罪而不敢欺任德感義與夫導德齊禮有恥且格等趨者也任察畏罪與夫導政齊刑免而無恥同歸者也孔子曰為政以德譬如北辰居其所而衆星共之考以斯言論以斯義臣等以為不忍欺不能欺優劣之縣在於權衡非徒低卬之差乃鈞銖之覺也且前志稱仁者安仁智者利仁畏罪者強仁校其仁者功則無以殊核其為仁者則不得不異安仁者性善者也利仁者力行者也強仁者不得已者也三仁相比則安仁優矣易稱神而化之使民宜之若君化使民然也然則安仁之化與夫強仁之化優劣亦不得不相縣絶也然則三臣之不欺雖同所以不欺異矣則純以恩義崇不欺與以威察成不欺既不可同概而比量又不得錯綜而易處不忍欺第七史記子賤治單父民不忍欺前漢韓延壽傳入守右馮翊恩信周遍二十四縣莫復以辭訟自言者推其至誠使民不忍欺紿紿誑也後漢卓茂傳遷密令勞心醇醇視人如子舉善而教口無惡言吏人親愛而不忍欺之魏楊阜傳為政舉大綱而已下不忍欺也箋證已見三不欺第六箋證漢書韓延壽傳韓延壽字長公燕人也徙杜陵在東郡三歲令行禁止斷獄大減為天下最入守左馮翊滿歲稱職延壽恩信周遍二十四縣莫復以辭訟自言者推其至誠吏民不忍欺紿師古曰紿誑也後漢書卓茂傳卓茂以儒術舉為侍郎給事黃門遷密令勞心諄諄視人如子舉善而教口無惡言吏人親愛而不忍欺之三國志魏志楊阜傳楊阜字義山天水冀人也為政舉大綱而已下不忍欺也不能欺第八史記鄭子産治鄭民不能欺晉陸雲傳補浚儀令郡居都會之要名為難理雲到官肅然下不能欺前漢朱博傳每遷徙易官所到輒出奇譎以明示下為不可欺者箋證見本卷三不欺第六箋證晉書陸機傳附陸雲出補浚儀令縣居都會之要名為難理雲到官肅然下不能欺市無二價漢書朱博傳每遷徙易官所到輒出奇譎如此以明示下為不可欺者不敢欺第九史記西門豹治鄴人不敢欺晉苟睎傳睎行兗州剌史練於官事文簿盈積斷決如流人不敢欺新唐李巽傳貞元元年徙江西勸於使巽持下以法吏不敢少紿餘見辨獄周紆傳箋證見本卷三不欺第六箋證晉書苟晞傳苟晞字道將河南山陽人也惠帝征成都王頴以為北軍中候及帝還洛陽晞奔范陽王虓虓承制用晞行荊州刺史晞練於官事文簿盈積斷絶如流人不敢欺新唐書李巽傳李巽字令叔趙州贊皇人貞元五年徙江西巽鋭於為治持下以法察無遺私吏不敢少紿
