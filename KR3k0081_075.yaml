body:
  text: 卷第七十五祠孔子第一前漢高祖紀十二年過魯以太牢祠孔子前漢梅福傳臣聞存人所以自立也壅人所以自塞也善惡之報各如其事昔者秦滅二周夷六國絶三統滅天道是以身危子殺厥孫不嗣所謂壅人以自塞者也故武王克商未下車存五帝之後封商於宋紹夏於杞明著三統示不獨有也是以姬姓半天下遷廟之主流出於戶李奇曰言其多所謂存人以自立者也今成陽不祀商人亡後陛下繼嗣久微殆為此也春秋經曰宋殺其大夫榖梁傳曰其不稱名姓以其在祖位尊之也此言孔子故商後也雖不正統封其子孫以為商後禮亦宜之傳曰賢者子孫宜有土而況聖人又商之後哉昔成王以諸侯禮葬周公而皇天動威雷風著災今仲尼之廟不出闕里孔氏子孫不免編戶以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天亡極何者退聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉前漢孔光傳光父霸以初元元年為關內侯食邑霸上書求奉孔子祭祀元帝下詔曰其令師褒成君關內侯霸以所食邑八百戶祀孔子焉三後漢儒林孔僖傳春帝東巡狩還過魯辛闕里以太牢祠孔子及七十二人作六代之樂大會孔氏男子二十以上者六十三人命儒者講論僖因自陳謝帝曰今日之會寧於卿宗有光榮乎對曰臣聞明王聖主莫不尊師貴道今陛下親屈方乘辱臨敝里此乃崇禮先師增輝聖德至於光榮非所敢承帝大笑曰非聖者子孫焉有斯言乎遂拜僖郎中賜褒成侯魏文帝黃初二年詔曰昔仲尼資大聖之才懷帝王之器當衰世之未無受命之運乃退考五代之禮修素王之事因魯史而制春秋就大師而正雅頌俾千載之後莫不宗其文以述作仰其聖以成謀咨可謂命世之大聖億載之師表者也遭天下之大亂百祀墮壞舊居之廟毀而不修褒成之後絶而莫繼闕里不聞講頌之聲四時不覩蒸嘗之位斯豈所謂崇禮報功盛德百世必祀者哉其以議郎孔蓋為宗聖侯邑百戶奉孔子祀令魯郡修起舊廟置百戶吏卒以守衛之魏齊王紀正始二年帝初通論語使太常以太牢祭孔子於辟雍以顏淵配新唐禮樂志開元八年司業李元瓘奏先聖廟為十哲象以先師顏子配則配象當坐今乃立侍餘弟子列象廟堂不豫享而范寧等皆從祀請釋十哲享於上而圖七十子於壁曾參以孝受經於夫子請享之如二十二賢乃詔十哲為坐象悉豫祀曾參特為之象坐亞之圖七十子及二十二賢於廟壁新唐儒學傳序正觀六年詔罷周公祠更以孔子為先聖顏子為先師云新唐歸崇敬傳贊曰韓愈稱郡邑通得祀社稷孔子獨孔子用王者事以門人為配天子以下北面拜跪薦祭孔如親弟子者句龍棄以功孔子以德固自有次跪祭或作拜跪薦祭進退誠敬禮如親弟子者句龍棄以功孔子以德固自有次第哉第崇敬乃請東揖以殺太重方是時公卿無韓愈之賢無有折其非是者道州剌反薛伯高堂謂夫子稱顏回為庶幾其從於陳蔡者亦各有號出於一時後世坐祀十人以為哲豈夫子志哉觀七十子之賢未有加於十人坐而祀之始於開元非特牽於一時之稱號記曰祭有其舉之莫敢廢也箋證漢書高帝紀十二年十一月行自淮南還過魯以太牢祠孔子漢書梅福傳成帝久亡繼嗣福以為宜建三統封孔子之世以為殷後復上書曰臣聞存人所以自立也壅人所以自塞也善惡之報各如其事昔者秦滅二周夷六國隱士不顯佚民不舉絶三統滅天道是以身危子殺厥孫不嗣所謂壅人以自塞者也故武王克殷未下車存五帝之後封殷於宋紹夏於杞明著三統示不獨有也是以姬姓半天下遷廟之主流出於戶所謂存人以自立者也今成湯不祀殷人亡後陛下繼嗣久微殆為此也春秋經曰宋殺其大夫榖梁傳曰其不稱名姓以其在祖位尊之也此言孔子故殷後也雖不正統封其子孫以為殷後禮亦宜之何者諸侯奪宗聖庶奪適傳曰賢者子孫宜有土而况聖人又殷之後哉昔成王以諸侯禮葬周公而皇天動威雷風著災今仲尼之廟不出闕里孔氏子孫不免編戶師古曰列為庶人也以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天亡極何者追聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉漢書孔光傳始光父霸以初元元年為關內侯食邑霸上書求奉孔子祭祀元帝下詔曰其令師褒成君關內侯霸以所食邑八百戶祀孔子焉後漢書儒林列傳孔僖傳孔僖字仲和魯國魯人也元和二年春帝東巡狩還過魯幸闕里以太牢祠孔子及七十二弟子作六代之樂黃帝曰雲門堯曰咸池舜曰大韶禹曰大夏湯曰大濩周曰大武大會孔氏男子二十以上者六十三人命儒者講論僖因自陳謝帝曰今日之會寧於卿宗有光榮乎對曰臣聞明王聖主莫不尊師貴道今陛下親屈萬乘辱臨敝里此乃崇禮先師增輝聖德至於光榮非所敢承帝大笑曰非聖者子孫焉有斯言乎遂拜僖郎中賜褒成侯三國志魏志文帝丕黃初二年春正月郊祀天地明堂壬午復潁川郡一年田租改許縣為許昌縣以魏郡東部為陽平郡西部為廣平郡詔曰昔仲尼資大聖之才懷帝王之器當衰周之末無受命之運在魯衛之朝教化乎洙泗之上悽悽焉遑遑焉欲屈己以存道貶身以救世于時王公終莫能用之乃退考五代之禮修素王之事因魯史而制春秋就太師而正雅頌俾千載之後莫不宗其文以述作仰其聖以成謀咨可謂命世之大聖億載之師表者也遭天下大亂百祀墮壞舊居之廟毀而不修褒成之後絶而莫繼闕里不聞講頌之聲四時不覩蒸嘗之位斯豈所謂崇禮報功盛德百世必祀者哉其以議郎孔羡為宗聖侯邑百戶奉孔子祀令魯郡修起舊廟置百戶吏卒以守衛之三國志魏志齊王芳正始二年春二月帝初通論語使太常以太牢祭孔子於辟雍以顏淵配新唐書禮樂志開元七年皇太子齒胄於學謁先聖明年司業李元瓘奏先聖廟為十哲象以先師顏子配則配象當坐今乃立侍餘弟子列象廟堂不豫享而范寧等皆從祀請釋奠十哲享於上而圖七十子於壁曾參以孝受經於夫子請享之如二十二賢乃詔十哲為坐象悉豫祀曾參特為之象坐亞之圖七十子及二十二賢於廟壁新唐書儒學列傳上序貞觀六年詔罷周公祠更以孔子為先聖顏氏為先師新唐書歸崇敬傳歸崇敬字正禮蘇州吳人治禮家學多識容典擢明經遭父喪孝聞鄉里調國子直講天寶中舉博通墳典科對策第一遷四門博士贊曰韓愈稱郡邑通得祀社稷孔子獨孔子用王者事以門人為配天子以下北面拜跪薦祭禮如親弟子者句龍棄以功孔子則以德固自有次第崇敬乃請東揖以殺太重方是時公卿無韓愈之賢無有折其非是者道州刺史薛伯高嘗謂夫子稱顏回為庶幾其從於陳蔡者亦各有號出於一時後世坐祀十人以為哲豈夫子志哉觀七十子之賢未有加於十人坐而祀之始於開元非特牽於一時之稱號記曰祭有其舉之莫敢廢也四海助濟弟二前漢韋賢傳立廟京師之居躬親承事四海之內各以其職來助祭尊親之大義五帝三王所共不易之道也後漢孝明紀宗祀光武皇帝於明堂以配五帝禮備法物樂和八音詠祉福舞功德其班時令勑群后群僚藩輔宗室子孫衆郡奉計百蠻貢賦烏桓濊貌咸來助祭單于侍子骨都侯亦皆陪位斯固聖祖功德之所致也後漢孝章紀詔曰朕巡狩岱宗柴望山川告祀明堂以章先勳其二王之後先聖之裔東后蕃衛伯父伯兄仲叔季弟幼子童孫百僚從臣宗室衆子要荒四裔沙漠之北蔥領之西冒耐之類駿奔郊畤咸來助祭祖宗功德延及朕躬豫一人盥洗享薦慚愧祗栗箋證漢書韋賢傳永光四年乃下詔先議罷郡國廟丞相玄成御史大夫鄭弘太子太傅嚴彭祖少府歐陽地餘諫大夫尹更始等七十人皆曰臣聞祭非自外至者也繇中出生於心也故唯聖人為能饗帝孝子為能饗親立廟京師之居躬親承事四海之內各以其職來助祭宋祁曰浙本無助字尊親之大義五帝三王所共不易之道也後漢書明帝紀永平二年春正月辛未宗祀光武皇帝於明堂帝及公卿列侯始服冠冕衣裳玉佩絇屨以行事禮畢登靈臺使尚書令持節詔驃騎將軍三公曰今令月吉日宗祀光武皇帝於明堂以配五帝禮備法物樂和八音詠祉福舞功德其班時令勑群后事畢升靈臺望元氣吹時律觀物變群僚藩輔宗室子孫衆郡奉計百蠻貢職烏桓濊貊咸來助祭單于侍子骨都侯亦皆陪位斯固聖祖功德之所致也後漢書章帝紀元和二年二月壬申宗祀五帝于汶上明堂癸酉告祠二祖四宗二祖謂高祖世祖四宗謂文帝為太宗武帝為世宗宣帝為中宗明帝為顯宗大會外內群臣丙子詔曰朕巡狩岱宗柴望山川告祠明堂以章先勳其二王之後先聖之胤東后蕃衛東后謂東方國君也諸侯為天子蕃屏故曰蕃衛伯父伯兄仲叔季弟幼子童孫百僚從臣宗室衆子要荒四裔沙漠之北絶嶺之西冒耐之類跋涉懸度陵踐阻絶駿奔郊畤咸來助祭祖宗功德延及朕躬豫一人空虛多疚纂承尊明盥洗享薦慙愧祗栗絶淫祠第三前漢平帝紀元始元年二月班教化禁淫祀放鄭聲前漢稚圭傳復奏正南北郊罷諸淫祀語在郊祀志後漢鄧皇后紀常以鬼神難徵淫祀無福乃詔有司罷諸祠宮不合典禮者後漢弟五倫傳拜會稽太守會稽俗多淫祀好卜筮民常以牛祭神百姓財産以之困匱其自食牛肉而不以薦祠者發病且死先為牛鳴前後郡將莫敢禁倫到官移書屬縣曉告百姓其巫祝有依託鬼神詐怖愚民皆按論之有妄屠牛者吏輒行罰民初恐懼或祝詛妄言倫按之愈急後遂斷絶百姓以安魏文帝紀詔曰先王制禮所以昭孝事祖大則郊社次則宗廟三神五行名山大川非此族也不在祀典叔世衰亂崇信巫史至乃宮殿之內戶牖之間無不沃酹甚矣其惑也自今其敢設非祀之祭巫祝之言皆以執左道論著于令典晉武帝紀泰始二年遣循省風俗除穰祝之不在祀典者新唐狄仁傑傳充江南巡撫使吳楚俗多淫祠仁傑一禁止凡毀千七百房止留夏禹吳太伯季札伍員四祠而已新唐于頔傳改蘇州罷淫祠新唐李德裕為浙西觀察使云云按屬州非經祠者毀千餘所撤私邑山房千四百舍冠無所瘦蔽天子下詔褒揚箋證漢書平帝紀元始元年二月置羲和官秩二千石外史閭師秩六百石班教化禁淫祀放鄭聲漢書匡衡傳頃之衡復奏正南北郊罷諸淫祀語在郊祀志後漢書后紀鄧皇后紀常以鬼神難徵淫祀無福乃詔有司罷諸祠官不合典禮者後漢書第五倫傳二十九年從王朝京師隨官屬得會見帝問以政事倫因此酬對政道帝大悅明日復特召入與語至夕倫出有詔以為扶夷長未到官追拜會稽太守雖為二千石躬自斬芻養馬妻執炊爨受俸裁留一月糧餘皆賤貿與民之貧羸者會稽俗多淫祀好卜筮民常以牛祭神百姓財産以之困匱其自食牛肉而不以薦祠者發病且死先為牛鳴前後郡將莫敢禁倫到官移書屬縣曉告百姓其巫祝有依託鬼神詐怖愚民皆案論之有妄屠牛者吏輒行罰民初恐懼或祝詛妄言倫案之愈急後遂斷絶百姓以安三國志魏志文帝丕黃初五年十二月詔曰先王制禮所以昭孝事祖大則郊社其次宗廟三辰五行名山大川非此族也不在祀典叔世衰亂崇信巫史至乃宮殿之內戶牖之間無不沃酹甚矣其惑也自今其敢設非祀之祭巫祝之言皆以執左道論著于令典晉書武帝紀泰始二年春正月景戌遣兼侍中侯史光等持節四方循省風俗除禳祝之不在祀典者新唐書狄仁傑傳狄仁傑字懷英并州太原人出為寧州刺史撫和戎落得其歡心郡人勒碑以頌入拜冬官侍郎持節江南巡撫使吳楚俗多淫祠仁傑一禁止凡毀千七百房止留夏禹吳太伯季札伍員四祠而已新唐書于頔傳于頔字允元後周太師謹七世孫蔭補千牛調華陰尉纍勞遷侍御史為吐蕃計會使有專對材擢長安令駕部郎中出為湖州刺史部有湖陂異時溉田三千頃久廞廢頔行縣命修復隄閼歲獲粳稻蒲魚無慮萬計州地庳薄葬者不掩柩頔為坎瘞枯骨千餘人賴以安未幾改蘇州罷淫祠濬溝澮端路衢為政有績然暴橫少恩新唐書李德裕傳李德裕字文饒元和宰相吉甫子也出德裕為浙西觀察使俄而僧孺入相由是牛李之憾結矣初潤州承王國清亂竇易直傾府庫賚軍資用空殫而下益驕德裕自檢約以留州財贍兵雖儉而均故士無怨再期則賦物儲牣南方信禨巫雖父母癘疾子棄不敢養德裕擇長老可語者諭以孝慈大倫患難相收不可棄之義使歸相曉敕違約者顯置以法數年惡俗大變又按屬州非經祠者毀千餘所撤私邑山房千四百舍寇無所廋蔽天子下詔褒揚淫祠第四後漢五行志永康元年八月六州大水勃海海溢沒殺人是時桓帝奢侈淫祀新唐劉禹錫傳貶朗州司馬州接夜郎諸夷風俗陋甚家喜巫鬼每祠歌竹枝鼓吹裴回其聲傖儜禹錫謂屈原居沅湘間作九哥使楚人迎送神乃倚其聲作竹板辭十餘篇於是武陵夷俚悉歌之箋證後漢書五行志永康元年八月六州大水勃海海溢沒殺人是時桓帝奢侈淫祀其十一月崩無嗣又後漢書桓帝紀永康元年八月六州大水勃海海溢詔州郡溺死者七歲以上錢人二千一家皆被害者悉為收斂其亡失榖食稟人三斛新唐書劉禹錫傳劉禹錫字夢得自言系出中山世為儒憲宗立叔文等敗禹錫貶連州刺史未至斥朗州司馬州接夜郎諸夷風俗陋甚家喜巫鬼每祠歌竹枝鼓吹裴回其聲傖儜禹錫謂屈原居沅湘間作九歌使楚人以迎送神乃倚其聲作竹枝辭十餘篇於是武陵夷俚悉歌之祭祀僣逆第五史記六國表太史公讀秦記至犬戎敗幽王東周徙洛邑秦襄公始封為諸侯作西畤用事上帝僭端見矣禮曰天地諸侯祭其域內名山大川今秦雜戎翟之俗先暴戾後仁義位在藩臣而臚於郊祀君子懼焉後漢梁太后臨朝詔以殤帝幼崩廟次宜在順帝下太常馬訪奏宜如詔書諫議大夫呂勃以為應依昭穆之序先殤帝後順帝詔下公卿舉議曰春秋魯閔公無子庶兄僖公代立其子文公遂躋僖於閔上孔子譏之今殤帝在先於秩為父順帝在後於親為子先後之義不可改昭穆之序不可亂呂勃議是也箋證史記六國表太史公讀秦記至犬戎敗幽王周東徙洛邑秦襄公始封為諸侯作西畤用事上帝僭端見矣禮曰天子祭天地諸侯祭其域虛名山大川今秦雜戎翟之俗先暴戾後仁義位在藩臣而臚於郊祀君子懼焉後漢書周舉傳梁太后臨朝詔以殤帝幼崩廟次宜在順帝下太常馬訪奏宜如詔書諫議大夫呂勃以為應依昭穆之序先殤帝後順帝詔下公卿舉議曰春秋魯閔公無子庶兄僖公代立其子文公遂躋僖於閔上孔子譏之書曰有事於太廟躋僖公傳曰逆祀也及定公正其序經曰從祀先公為萬世法也今殤帝在先於秩為父順帝在後於親為子先後之義不可改昭穆之序不可亂呂勃議是也卷九十一配享第六後漢祭祀志大司農鄭康成説古者官有大功則配食其神故句龍配食於社棄配食於稷魏明帝青龍元年詔祀夏侯惇曹仁程昱於太祖廟庭若先王之禮於功臣存則顯其爵祿沒則祭于大蒸故漢氏功臣祠於廟庭大魏元功之臣功勳優著終始休明者其皆依禮祀之於是以惇等配饗魏齊王芳紀詔祀故尚書令荀攸放太祖廟庭松之以為故魏氏配享不及荀彧蓋以其末年異議又位非魏臣故也至於升程昱而遺郭嘉光鍾華而後荀攸則未詳厥趣也晉荀顗傳咸寧初詔論次功臣將配饗宗廟所司奏顗等十二人銘功太常配饗清廟晉鄭沖傳咸寧初有司奏沖與安平王孚等十二人皆存銘太常配食于廟新唐高祖嶠劉士會配享太宗房玄齡魏徵屈突通配享新唐裴冕宜配享代宗廟庭李晟段秀實宜配享德宗廟庭新唐憲宗廟以裴度杜黃裳李訴高崇文等配享新唐關播傳上元中詔擇古名將十人配享武成廟如十哲侑孔子播奏太公古賢臣今其下稱亞聖孔子十哲皆當時弟子今所配年世不同請罷之詔可箋證後漢書祭祀志下大司農鄭玄説古者官有大功則配食其神故勾龍配食於社棄配食於稷三國志魏志明帝睿青龍元年五月壬申詔祀故大將軍夏侯惇大司馬曹仁車騎將軍程昱於太祖廟庭魏書載詔曰昔先王之禮於功臣存則顯其爵祿沒則祭于大蒸故漢氏功臣祀於廟庭大魏元功之臣功勳優著終始休明者其皆依禮祀之於是以惇等配享之三國志魏志齊王芳正始五年冬十一月癸卯詔祀故尚書令荀攸於太祖廟庭臣松之以為故魏氏配饗不及荀彧蓋以其末年異議又位非魏臣故也至於升程昱而遺郭嘉先鍾繇而後荀攸則未詳厥趣也徐他謀逆而許褚心動忠義之至遠同於日磾且潼關之危非褚不濟褚之功烈有過典韋今祀韋而不及褚又所未達也晉書荀顗傳荀顗字景倩潁川人泰始十年薨帝為舉哀皇太子臨喪咸寧初詔論次功臣將配饗宗廟所司奏顗等十二人銘功太常配饗清廟晉書鄭沖傳鄭沖字文和滎陽開封人也咸寧初有司奏沖與安平王孚等十二人皆存銘太常配食于廟箋證略舊唐書憲宗本紀上元和三年八月癸卯贈太師裴冕宜配享代宗廟庭贈太師李晟贈太尉段秀實宜配享德宗廟庭舊唐書宣宗本紀十月勑太廟祫享合以功臣配其憲宗廟以裴度杜黃裳李訴高崇文等配享新唐書關播傳關播字務元衛州汲人初上元中詔擇古名將十人配享武成廟如十哲侑孔子播奏太公古賢臣今其下稱亞聖孔子十哲皆當時弟子今所配年世不同請罷之詔可鬼神第七前漢賈誼傳文帝思誼徵之至入見上方受釐坐宣室上因感鬼神事而問鬼神之本誼具道所以然之故至夜半文帝前席既罷曰吾久不見賈生自以為過之今不及也晉阮瞻傳瞻素執無鬼論每自謂理足可以辨正幽明忽有一客通名詣瞻甚有才辨瞻與之言良久及鬼神之事反覆甚苦客遂屈乃作色曰鬼神古今賢聖所共傳君何獨言無即僕便是鬼於是變為異形須臾消滅瞻默然意色惡之歲餘病卒晉阮修傳好易善清言嘗有論鬼神有無者皆以死有鬼修以為無曰今見鬼者云著生時衣服衣服有鬼乎論者服焉晉干寶傳寶父先有所寵侍婢母甚妬忌及父亡母乃生推婢於墓中寶兄弟年小不之審也後十餘年母喪開墓而而婢伏棺如生載還經日乃蘇言其父常取飲食而之恩情如初既而嫁之生子又寶兄嘗病氣絶積日不冷後遂悟云見天地間鬼神事如夢覺不自知死寶遂撰集古今神祇靈異人物變化名搜神記凡三十卷以示劉惔惔曰卿可謂鬼之董狐卷第七十一至七十五箋證漢書賈誼傳後歲餘文帝思誼徵之至入見上方受釐坐宣室蘇林曰宣室未央前正室也應劭曰釐祭餘肉也漢儀注祭天地五畤皇帝不自行祠還致福釐音禧師古曰禧福也借釐字為之耳言受神之福也上因感鬼神事而問鬼神之本誼具道所以然之故至夜半文帝前席師古曰漸促近誼聽説其言也既罷曰吾久不見賈生自以為過之今不及也晉書阮瞻傳瞻字千里性清虛寡欲自得於懷瞻素執無鬼論物莫能難每自謂此理足可以辨正幽明忽有一客通名詣瞻寒溫畢聊談名理客甚有才辨瞻與之言良久及鬼神之事反覆甚苦客遂屈乃作色曰鬼神古今聖賢所共傳君何得獨言無即僕便是鬼於是變為異形須臾消滅瞻默然意色大惡後歲餘病卒於倉垣時年三十晉書阮修傳修字宣子好易老善清言嘗有論鬼神有無者皆以人死者有鬼修獨以為無曰今見鬼者云著生時衣服若人死有鬼衣服有鬼邪論者服焉晉書干寶傳干寶字令升新蔡人也祖統吳奮武將軍都亭侯父瑩丹陽丞寶父先有所寵侍婢母甚妬忌及父亡母乃生推婢於墓中寶兄弟年少不之審也後十餘年母喪開墓而婢伏棺如生載還經日乃蘇言其父常取飲食與之恩情如生在家中吉凶輒語之考校悉驗地中亦不覺為惡既而嫁之生子又寶兄嘗病氣絶積日不冷後遂寤云見天地間鬼神事如夢覺不自知死寶以此遂撰集古今神祇靈異人物變化名為搜神記凡二十卷以示劉惔惔曰卿可謂鬼之董狐
