body:
  text: 卷第三正家而天下定第一前漢稚圭傳室家之道修則天下之理得故正始國風禮本冠婚始乎國風原情性而明人倫也本乎冠婚正基兆而防未然也福之興莫不本乎室家之道衰莫不始乎梱內以聖上必慎妃后之際別適長之位傳曰正家而天下定矣前漢谷永傳建始年待詔對曰夫妻之際王事綱紀安危之機聖王所致慎也昔舜飭正二女以崇至德楚莊忍絶丹姬以成伯功幽王惑於褒姒周德降亡魯桓脅於齊女社稷以傾誠修後宮之政明尊卑之序貴者不得嫉妬專寵賤者咸得秩進以廣結嗣之統息白華之怨後宮親屬饒之以財勿與政事以遠皇父之類損妻黨之權未有閨門治而天下亂者也魏郭皇后傳文帝欲立后中郎棧潛上疏曰在昔帝王之治天下不唯外輔亦有內助治亂所由盛衰從之故西陵配黃英娥降媯並以賢明流芳上世桀奔南巢禍階末喜紂以炮烙怡悅妲己是以聖哲慎立元妃必取先代世族之家擇其令淑以統六宮虔奉宗廟陰教聿修易曰家道正而天下定由內及外先王之令典也晉王導傳時軍旅不息學校未修導上書曰夫風化之本在於正人倫人倫之正存乎設庠序庠序設五教明父子兄弟夫婦長幼之序順而君臣之義固矣易所謂正家而天下定者也新唐書后妃傳曰禮本乎夫婦治亂因之興亡係焉盛德之君帷薄嚴奧裡謁不懺于朝外言不納諸閫關睢之風行彤史之化修箋證漢書匡衡傳臣又聞室家之道修則天下之理得故詩始國風師古曰關雎美后妃之德而為國風之首禮本冠婚師古曰禮記冠義曰冠者禮之始也婚義曰婚者禮之本也始乎國風原情性而明人倫也本乎冠婚正基兆而防未然也福之興莫不本乎室家道之衰莫不始乎梱內師古曰梱與閫同謂門橛也音苦本反故聖王必慎妃后之際別適長之位師古曰適讀曰嫡其下並同禮之於內也卑不隃尊親不先故所以統人情而理陰氣也其尊適而卑庶也適子冠乎阼禮之用醴適子不得與列所以貴正體而明嫌疑也非虛加其禮文而已乃中心與之殊異故禮探其情而見之外也聖人動靜遊燕所親物得其序得其序則海內自修百姓從化如當親者疏當尊者卑則巧佞之姦因時而動以亂國家故聖人慎防其端禁於未然不以私恩害公義陛下聖德純備莫不修正則天下無為而治詩云于以四方克定厥家傳曰正家而天下定矣師古曰易家人卦之彖辭漢書谷永傳谷永字子雲長安人也父吉為衛司馬使送郅支單于侍子師古曰為使而送之還本國也郅音質為郅支所殺語在陳湯傳永少為長安小史後博學經書建昭中御史大夫繁延壽師古曰即李延壽也一姓繁音蒲河反聞其有茂材除補屬舉為太常丞數上疏言得失建始三年冬日食地震同日俱發詔舉方正直言極諫之士太常陽城侯劉慶忌舉永待詔公車對曰夫妻之際王事綱紀安危之機聖王所致慎也昔舜飭正二女以崇至德楚莊忍絶丹姬以成伯功應劭曰楚莊王得丹姬三月不聽朝保申諫忍絶不復見乃勤政事遂為盟主也師古曰丹姬是楚文王姬也莊王用申公巫臣之諫不納夏姬谷永集丹字作夏是也今此傳作丹轉寫誤耳應氏就而謬釋非本實也伯讀曰霸幽王惑於褒姒周德降亡魯桓脅於齊女社稷以傾誠修後宮之政明尊卑之序貴者不得嫉妬專寵以絶驕嫚之端抑褒閻之亂賤者咸得秩進各得厥職以廣繼嗣之統息白華之怨後宮親屬饒之以財勿與政事以遠皇父之類損妻黨之權未有閨門治而天下亂者也三國志魏志文德郭皇后傳文德郭皇后安平廣宗人也祖世長吏后少而父永奇之曰此乃吾女中王也遂以女王為字早失二親喪亂流離沒在銅鞮侯家太祖為魏公時得入東宮后有智數時時有所獻納文帝定為嗣后有謀焉太子即王位后為夫人及踐阼為貴嬪甄后之死由后之寵也黃初三年將登后位文帝欲立為后中郎棧潛上疏曰在昔帝王之治天下不惟外輔亦有內助治亂所由盛衰從之故西陵配黃英娥降媯並以賢明流芳上世桀奔南巢禍階妹喜紂以炮烙怡悅妲己是以聖哲慎立元妃必取先代世族之家擇其令淑以統六宮虔奉宗廟陰教聿修易曰家道正而天下定由內及外先王之令典也晉書王導傳王導字茂弘光祿大夫覽之孫也父裁鎮軍司馬年十四陳留高士張公見而奇之謂其從兄敦曰此兒容貌志氣將相之器也愍帝即位徵吏部郎不拜俄拜右將軍揚州刺史監江南諸軍事遷驃騎將軍加散騎常侍都督中外諸軍領中書監録尚書事假節刺史如故導以敦統六州固辭中外都督後坐事除節于時軍旅不息學校未修導上書曰夫風化之本在於正人倫人倫之正存乎設庠序庠序設五教明德禮洽通彝倫攸敘而有恥且格父子兄弟夫婦長幼之序順而君臣之義固矣易所謂正家而天下定者也新唐書后妃傳上禮本夫婦詩始后妃治亂因之興亡係焉盛德之君帷簿嚴奧裏謁不忤于朝外言不忤諸閫關雎之風行彤史之化修遷都第二史記商本紀帝盤庚之時商已都河北盤庚渡河南復居成湯之故居乃五遷無定處商民咨胥皆怨不欲徙盤庚乃告諭諸侯大臣曰昔高后成湯與爾之先祖俱定天下法則可修舍而弗勉何以成德乃遂涉河南治亳行湯之政然后百姓由寧商道復興諸侯來朝以其遵成湯之德也前漢婁恭傳説曰陛下都雒陽豈欲與周室比隆哉上曰然恭曰陛下取天下與周異周之先自后稷堯封之邰積德絫善十餘世乃營成周都雒以為此天下中諸侯四方納貢職道里釣矣有德則易以王無德則易以亡凡居此者務令務以德致人不欲險阻令後世驕奢以虐民也及周之衰分而為二天下莫朝周周不能制非德薄形勢弱也今陛下起豐沛收卒三千人以之徑往卷蜀漢定三秦與項籍戰滎陽大戰七十小戰四十使天下之民肝腦塗地父子暴骸中野不可勝數哭泣之聲不絶傷夷者未起而欲比隆成康之時臣竊以為不侔矣且夫秦地被山帶河四塞以為固卒然有急百萬之衆可具因秦之故資甚美膏腴之地此所謂天府陛下入關而都之山東雖亂秦故地可全而有也夫與人鬭不其扼亢拊其背未能全勝今陛下入關而都垵秦之故此亦扼天下之亢而拊其背也高帝問群臣群臣皆山東人爭言周王數百年秦二世則亡不如都周上疑末能決及留侯明言入關便即日駕西都關中亢喉嚨前漢張良傳婁恭説上都關中上疑之左右大臣皆山東人多勸上都雒陽雖有此固其中小不過數百里地薄四面受敵此非用武之國夫關中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而固守獨以一面東制諸侯諸侯安定河渭漕挽天下西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國婁恭之説是也於是上即日駕西都關中後漢黃琬傳董卓議遷都長安琬駮議曰昔周公營洛邑以寧姬光武卜東都以隆漢天之所啓神之所安大業既定豈宜妄有遷動以虧四海之望晉王導傳賊平宗廟宮室並為灰燼溫嶠議遷都豫章三吳之豪請都會稽二論紛紜導曰建康古之金陵舊為帝里又孫仲謀劉元德俱言王者之宅古之帝王不必以豐儉移都新唐郭子儀傳程元振説帝都洛陽子儀奏曰雍州古稱天府右隴蜀左崤函襟馮終南太華之際背負清渭濁河之固地方數千里帶甲十餘萬兵疆士勇真用武之國秦漢所以成帝業也洛陽自大盜已來焚埃略盡何以奉萬乘牲餼供百官次舍哉乃已箋證史記殷本紀帝盤庚之時殷已都河北盤庚渡河南復居成湯之故居乃五遷無定處集解孔安國曰自湯至盤庚凡五遷都正義湯自南亳遷西亳仲丁遷敖河亶甲居相祖乙居耿盤庚渡河南居西亳是五遷也殷民咨胥皆怨不欲徙集解孔安國曰胥相也民不欲徙皆咨嗟憂愁相與怨其上也盤庚乃告諭諸侯大臣曰昔高后成湯與爾之先祖俱定天下法則可修舍而弗勉何以成德乃遂涉河南治亳集解鄭玄曰治於亳之殷地商家自此徙而改號曰殷亳皇甫謐曰今偃師是也行湯之政然後百姓由寧殷道復興諸侯來朝以其遵成湯之德也漢書婁敬傳婁敬齊人也漢五年戍隴西過雒陽高帝在焉敬脫挽輅見齊人虞將軍曰臣願見上言便宜虞將軍欲與鮮衣敬曰臣衣帛衣帛見衣褐衣褐見不敢易衣虞將軍入言上上召見賜食已而問敬敬説曰陛下都雒陽豈欲與周室比隆哉上曰然敬曰陛下王天下與周異周之先自后稷堯封之邰積德絫善十餘世師古曰絫古纍字公劉避桀居豳大王以狄伐故去豳杖馬箠去居岐師古曰箠馬策也杖謂拄之也云杖馬箠者以示無所攜持也箠音止蕊反國人爭歸之及文王為西伯斷虞芮訟文穎曰二國爭田見文王之德而自和也師古曰虞今虞州是也芮今芮城縣是也始受命呂望伯夷自海濱來歸之武王伐紂不期而會孟津上八百諸侯遂滅殷成王即位周公之屬傅相焉乃營成周都雒以為此天下中師古曰中音竹仲反宋祁曰雒字下一有陽字諸侯四方納貢職道里鈞矣有德則易以王無德則易以亡凡居此者欲令務以德致人不欲阻險令後世驕奢以虐民也及周之衰分而為二天下莫朝周周不能制非德薄形勢弱也今陛下起豐沛收卒三千人以之徑往卷蜀漢定三秦與項籍戰滎陽大戰七十小戰四十使天下之民肝腦塗地父子暴骸中野不可勝數哭泣之聲不絶傷夷者未起師古曰夷創也音痍而欲比隆成康之時臣竊以為不侔矣且夫秦地被山帶河四塞以為固卒然有急百萬之衆可具師古曰卒讀曰猝因秦之故資甚美膏腴之地此所謂天府陛下入關而都之山東雖亂秦故地可全而有也夫與人鬭不扼其亢拊其背未能全勝今陛下入關而都按秦之故此亦扼天下之亢而拊其背也高帝問群臣群臣皆山東人爭言周王數百年秦二世則亡不如都周上疑未能決及留侯明言入關便即日駕西都關中漢書張良傳劉敬説上都關中上疑之左右大臣皆山東人多勸上都雒陽雒陽東有成罪西有殽黽師古曰殽山也黽池也音湎宋祁曰注文當作殽殽山也黽黽池也背河鄉雒其固亦足恃師古曰鄉讀曰嚮良曰雒陽雖有此固其中小不過數百里田地薄四面受敵此非用武之國夫關中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而固守獨以一面東制諸侯諸侯安定河渭漕挽天下西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國劉敬説是也於是上即日駕西都關中後漢書黃琬傳琬字子琰少失父早而辨慧祖父瓊及董卓秉政以琬名臣徵為司徒遷太尉更封陽泉鄉侯卓議遷都長安琬與司徒楊彪同諫不從琬退而駮議之曰昔周公營洛邑以寧姬光武卜東都以隆漢天之所啓神之所安大業既定豈宜妄有遷動以虧四海之望晉書王導傳庾亮將徵蘇峻訪之於導導曰峻猜險必不奉詔且山藪藏疾宜包容之固爭不從亮遂召峻既而難作六軍敗績導入宮侍帝峻以導德望不敢加害猶以本官居己之右峻又逼乘輿幸石頭導爭之不得峻日來帝前肆醜言導深懼有不測之禍時路永匡術賈寧並説峻令殺導盡誅大臣更樹腹心峻敬導不納故永等二於峻導使參軍袁耽潛諷誘永等謀奉帝出奔義軍而峻衛禦甚嚴事遂不果導乃攜二子隨永奔于白石及賊平宗廟宮室並為灰燼溫嶠議遷都豫章三吳之豪請都會稽二論紛紜未有所適導曰建康古之金陵舊為帝里又孫仲謀劉玄德俱言王者之宅古之帝王不必以豐儉移都新唐書郭子儀傳代宗立程元振自謂於帝有功忌宿將難制離構百計因罷子儀副元帥以子儀為京城留守自變生倉卒賴子儀復安故天下皆咎程元振群臣數論奏元振懼乃説帝都洛陽帝可其計子儀奏曰雍州古稱天府右隴蜀左崤函襟馮終南太華之險背負清渭濁河之固地方數千里帶甲十餘萬兵強士勇真用武之國秦漢所以成帝業也後或處而泰去而亡者不一姓故高祖先入關定天下太宗以來居洛陽者亦鮮先帝興朔方誅慶緒陛下席西土戮朝義雖天道助順亦地勢則然比吐蕃馮陵而不能抗者臣能言其略夫六軍皆市井人竄虛名逃實賦一日驅以就戰有百奔無一前又宦豎掩迷庶政荒奪遂令陛下倣徨暴露越在陜服斯委任失人豈秦地非良哉今道路流言不識信否咸謂且都洛陽洛陽自大盜以來焚埃略盡百曹榛荒寰服不滿千戶井邑如墟豺狼群嗥東薄鄭汴南界徐北綿懷衛及相千里蕭條亭舍不煙何以奉萬乘牲餼供百官次舍哉徙民第三前漢婁恭傳言胸奴河南白羊樓煩王去長安近者七百里輕騎一日一夕可以至秦中新破少民地肥饒可益實夫諸侯初起時非齊諸田楚昭屈景莫與皆二國之王族今陛下雖都關中實近胡冠東有六國強族一日有變陛下亦未得安枕而臥也臣願陛下徙齊諸田楚昭屈景燕趙韓魏後及豪桀名家且實關中無事可以備胡諸侯有變亦足率以東伐此疆本弱末之術也上曰善乃使劉恭徙所言關中十餘萬口今高陵櫟陽諸田華陰好畤諸景及三車諸屈諸懷尚多皆此時所徙前漢鼂錯傳錯復言陛下幸募民相徙以實塞下使屯戍之事益省輸將之費益寡將送由甚大惠也下吏誠能稱厚惠奉明法存恤所徙之老弱善遇其壯士和輯其心而勿侵刻使先至者安樂而不思故鄉則貧民相募而勸往矣臣聞古之徙遠方以實廣虛也相其陰陽之和嘗其水泉之味審其土地之宜觀其草木之饒然後營邑立城製里割宅通田作道正阡陌之界先為築室家有一堂二內門戶之閉置器物焉民至有所居作有所用此民所以輕去故鄉而勸之新邑也為置醫巫以救疾病以修祭祀男女有婚生死相恤墳墓相從種樹畜長室屋完安此所以使民樂其處而有長居之心也前漢景帝紀元年春詔曰間者歲比不登民多乏食朕甚痛之郡國或磽狹無所農桑擊畜或地饒廣薦草莽水泉利而不得徙其議民欲徙寬大地者聽之草稠曰薦深曰莽前漢武帝紀元朔二年收河南地置朔方五原郡募民徙朔方十萬口又徙郡國豪傑及訾三百萬已上于茂陵前漢宣帝紀本始二年春以水衡錢為平陵徙民起第宅水衡與少府皆天子私藏前漢地理志漢興立都長安徙齊諸田楚昭屈景及諸功臣家於長陵後世世徙吏二千石高訾富人及豪桀并兼之家於諸陵蓋亦以強幹弱支非獨為奉山園也後漢仲長統昌言曰諸夏有十畝共桑之迫遠州有壙封不廢之田亦可以徒人便以守禦後漢崔實論曰宜徙貧民不能自業者於寬地此亦開草闢土振人之術也魏辛毗傳毗與朝臣俱求見帝知其欲諫作色以見之皆莫敢言毗曰陛下欲徙士家其計安出帝曰卿謂我放之非邪吾不與卿共議毗曰陛下不以臣不肖置之左右之得不與臣議邪臣所言非私也乃社稷之慮也帝不答起入內毗隨而引其裾帝遂奮衣不還良久乃出曰佐治卿持我何太急邪毗曰今徙既失民心又無以食也帝遂徙其半新唐志明皇詔移河曲六州殘胡五萬餘口於許汝唐鄧仙豫等州始空河南朔方千里之地箋證漢書劉敬傳高帝罷平城歸韓王信亡入胡當是時冒頓單于兵強控弦四十萬騎師古曰控引也謂皆引弓也音口弄反數苦北邊上患之問敬敬曰天下初定士卒罷於兵革師古曰罷讀曰疲陛下恐不能為上曰誠可何為不能顧為奈何師古曰顧思念也敬曰陛下誠能以適長公主妻單于厚奉遺之若陛下不能遣長公主而令宗室及後宮詐稱公主彼亦知不肯貴近無益也師古曰近音其靳反高帝曰善欲遣長公主呂后泣曰妾唯以一太子一女師古曰言唯以此自慰奈何棄之胸奴上竟不能遣長公主而取家人子為公主妻單于使敬往結和親約敬從胸奴來因言胸奴河南白羊樓煩王張晏曰白羊胸奴國名也去長安近者七百里輕騎一日一夕可以至師古曰言胸奴欲來為寇者秦中新破師古曰秦中謂關中故秦地也新破謂經兵革之後未殷實少民地肥饒可益實夫諸侯初起時非齊諸田楚昭屈景莫與師古曰皆二國之王族今陛下雖都關中實少人北近胡寇東有六國強族一日有變陛下亦未得安枕而臥也臣願陛下徙齊諸田楚昭屈景燕趙韓魏後及豪桀名家且實關中無事可以備胡諸侯有變亦足率以東伐此強本弱末之術也上曰善乃使劉敬徙所言關中十餘萬口師古曰今高陵櫟陽諸田華陰好畤諸景及三輔諸屈諸懷尚多皆此時所徙漢書鼂錯傳錯復言陛下幸募民相徙以實塞下使屯戍之事益省輸將之費益寡如淳曰將送也或曰將資也甚大惠也下吏誠能稱厚惠奉明法師古曰稱副也存恤所徙之老弱善遇其壯士和輯其心而勿侵刻使先至者安樂而不思故鄉則貧民相募而勸往矣臣聞古之徙遠方以實廣虛也相其陰陽之和嘗其水泉之味審其土地之宜觀其草木之饒然後營邑立城製里割宅通田作之道正阡陌之界先為築室家有一堂二內門戶之閉張晏曰二內二房也置器物焉民至有所居作有所用此民所以輕去故鄉而勸之新邑也為置醫巫以救疾病以修祭祀男女有昏生死相恤墳墓相從種樹畜長室屋完安此所以使民樂其處而有長居之心也卷四十九案明梅鼎祚編西漢文紀作復言募民徙塞下事題下注云文帝從錯言募民徙塞下錯復言徙塞下事見卷七漢書景帝紀元年春正月詔曰間者歲比不登民多乏食夭絶天年朕甚痛之郡國或磽狹無所農桑繫畜師古曰磽謂磽埆瘠薄也狹謂褊隘也繫謂食養之畜謂牧放也磽音苦交反狹音狹或地饒廣薦草莽水泉利而不得徙如淳曰莊周云麋鹿食曰薦一曰草稠曰薦深曰莽劉攽曰注麋鹿食曰薦衍一曰字其議民欲徙寬大地者聽之漢書武帝紀元朔二年冬賜淮南王災川王几杖毋朝春正月詔曰梁王城陽王親慈同生願以邑分弟其許之諸侯王請與子弟邑者朕將親覽使有列位焉於是藩國始分而子弟畢侯矣胸奴入上谷漁陽殺略吏民千餘人遣將軍衛青李息出雲中至高闕師古曰山名也一曰塞名也在朔方之北遂西至符離師古曰幕北塞名也獲首虜數千級收河南地置朔方五原郡三月己亥晦日有蝕之夏募民徙朔方十萬口又徙郡國豪傑及訾三百萬以上于茂陵漢書宣帝紀本始元年春正月募郡國吏民訾百萬以上徙平陵文穎曰昭帝陵遣使者持節詔郡國二千石謹牧養民而風德化師古曰以德化被於下故云風也詩序曰上以風化下二年春以水衡錢為平陵徙民起第宅應劭曰水衡與少府皆天子私藏耳縣官公作當仰給司農今出水衡錢言宣帝即位為異政也晉灼曰食貨志初大司農管鹽鐵官布多故置水衡欲以主鹽鐵及楊可告緡上林財物衆乃令水衡主上林上林三官主鑄錢也漢書地理志漢興立都長安徙齊諸田楚昭屈景及諸功臣家於長陵後世世徙吏二千石高訾富人及豪桀并兼之家於諸陵師古曰訾讀與資同高訾言多財也蓋亦以強幹弱支非獨為奉山園也如淳曰黃圖謂陵冢為山師古曰謂京師為幹四方為支也通典食貨一田制上後漢之初百姓虛耗率土遺黎十才一二順帝建康元年定墾田六百八十九萬六千二百七十一頃五十六畝九十四步仲長統昌言曰遠州縣界至數千而諸夏有十畝共桑之迫遠州有曠野不發之田代俗安土有死無去君長不使誰能自往緣邊之地亦可因罪徙人便以守禦通典食貨一田制上崔實政論曰昔聖人分口耕耦地各相副適使人飢飽不變勞逸齊均富者不足僭差貧者無所企慕始暴秦隳壞法度制人之財既無紀綱而乃尊獎并兼之人景帝六年詔郡國令人得去磽狹就寬肥至武帝遂徙關東貧人於隴西北地西河上郡會稽凡七十二萬五千口後加徙猾吏於關內今宜復遵故事徙貧人不能自業者於寬地此亦開草闢土振人之術也三國志魏志辛毗傳辛毗字佐治潁川陽翟人也其先建武中自隴西東遷毗隨兄評從袁紹太祖為司空辟毗毗不得應命及袁尚攻兄談於平原談使毗詣太祖求和文帝踐阼遷侍中賜爵關內侯帝欲徙冀州士家十萬戶實河南時連蝗民飢群司以為不可而帝意甚盛毗與朝臣俱求見帝知其欲諫作色以見之皆莫敢言毗曰陛下欲徙士家其計安出帝曰卿謂我徙之非邪毗曰誠以為非也帝曰吾不與卿共議也毗曰陛下不以臣不肖置之左右廁之謀議之官安得不與臣議邪臣所言非私也乃社稷之慮也安得怒臣帝不答起入內毗隨而引其裾帝遂奮衣不還良久乃出曰佐治卿持我何太急邪毗曰今徙既失民心又無以食也帝遂徙其半舊唐書玄宗紀上詔移河曲六州殘胡五萬餘口於許汝唐鄧仙豫等州始空河南朔方千里之地又新唐書張説傳時慶州方渠降胡康願子反自為可汗掠牧馬西涉河出塞説進討至木槃山禽之俘獲三千乃議徙河曲六州殘胡五萬於唐鄧仙豫間空河南朔方又舊唐書張説傳時有康待賓餘黨慶州方渠降胡康願子自立為可汗舉兵反謀掠監牧馬西涉河出塞説進兵討擒之并獲其家屬於木盤山送都斬之其黨悉平獲易女三千餘人於是移河曲六州殘胡五萬餘口配許汝唐鄧仙豫等州始空河南朔方千里之地養民第四史記奏本紀太史公曰先王見始終之變知存此之機是以牧民之好務在安之而已前漢武帝紀贊曰漢承百王之弊高祖撥亂反正文景務在養民至于稽古禮文之事猶多闕焉前漢宣帝紀本始元年春遣使者持節詔郡國二千石謹牧養民而風德化以德化被於下故云風也前漢魏相傳相奏曰明王謹于尊天慎于養人故立羲和之官以乘四時節授民事君動靜以道奉順陰陽則日月光明風雨時節寒暑調和三者得敘則災害不生五榖孰絲麻遂草木茂鳥獸蕃民不夭疾衣食有餘若是則君尊民説上下亡怨政教不違禮讓可興夫風雨不時則傷農桑農桑傷則民飢寒飢寒在身則亡廉恥冠賊姦宄所繇生也前漢鮑宣傳上書諫曰陛下上為皇天子下為黎庶父母為天收養元元視之當如一合尸鳩之詩注見思澤均平門前漢班固傳固作賓戲曰大漢君天下也炎之如日威之如神函之如海養之如春後漢陳蕃傳蕃上疏曰高祖創業万邦自肩撫養百姓同之赤子後漢主符浮侈篇曰明王之養民憂之勞之教之誨之慎微防萌以斷其邪魏王朗傳文帝即位遷御史大夫封安陵亭侯上疏勸育民省刑曰昔曹相國以獄市為寄路溫舒疾治獄之吏夫治獄者得其情則無冤死之囚丁壯者得盡地力則無飢饉之民窮老者得仰食倉廩則無餒餓之殍嫁娶以時則男女無怨曠之恨胎養必全則孕者無自傷之哀新生必復則孩者無不育之纍壯而後役則幼者無離家之思二毛不戎則老者無頓伏之患醫藥以療其疾寬繇以樂其義威罰以抑其強恩仁以濟其弱振貸以贍其乏十年之後既笄者必盈巷二十年之後升兵者必滿野矣箋證史記秦始皇本紀太史公曰秦之先伯翳嘗有勳於唐虞之際受土賜姓及殷夏之間微散至周之衰秦興邑于西垂自繆公以來稍蠶食諸侯竟成始皇始皇自以為功過五帝地廣三王而羞與之侔二世不行此術而重之以無道壞宗廟與民集解徐廣曰一無此上五字更始作阿房宮繁刑嚴誅吏治刻深賞罰不當賦斂無度天下多事吏弗能紀百姓困窮而主弗收恤然後姦偽並起而上下相遁蒙罪者衆刑戮相望於道而天下苦之自君卿以下至於衆庶人懷自危之心親處窮苦之實咸不安其位故易動也是以陳涉不用湯武之賢不藉公侯之尊奮臂於大澤而天下響應者其民危也故先王見始終之變知存亡之機是以牧民之道務在安之而已天下雖有逆行之臣必無響應之助矣故曰安民可與行義而危民易與為非此之謂也貴為天子富有天下身不免於戮殺者正傾非也是二世之過也漢書武帝紀贊曰漢承百王之弊高祖撥亂反正文景務在養民至于稽古禮文之事猶多闕焉漢書宣帝紀本始元年春正月募郡國吏民訾百萬以上徙平陵文穎曰昭帝陵遣使者持節詔郡國二千石謹牧養民而風德化師古曰以德化被於下故云風也詩序曰上以風化下漢書魏相傳魏相字弱翁濟陰定陶人也徙平陵少學易為郡卒史舉賢良以對策高第今歲不登榖暴騰踴師古曰價忽大貴也臨秋收斂猶有乏者至春恐甚亡以相恤西羌未平師旅在外兵革相乘臣竊寒心宜蚤圖其備唯陛下留神元元帥繇先帝盛德以撫海內師古曰帥循也繇與由同由從也上施行其策又數表采易陰陽及明堂月令奏之師古曰表謂標明之采撮取也曰臣相幸得備員奉職不修不能宣廣教化陰陽未和災害未息咎在臣等臣聞易曰天地以順動東方之卦不可以治西方南方之卦不可以治北方春興兌治則飢秋興震治則華冬興離治則泄師古曰天地之氣不閉密也夏興坎治則雹明王謹于尊天慎于養人故立羲和之官以乘四時師古曰乘治也節授民事師古曰各依其節而授以事君動靜以道奉順陰陽則日月光明風雨時節寒暑調和三者得敘則災害不生五榖熟絲麻遂師古曰遂成也草木茂鳥獸蕃民不夭疾衣食有餘若是則君尊民説上下亡怨師古曰説讀曰悅政教不違禮讓可興夫風雨不時則傷農桑農桑傷則民飢寒飢寒在身則亡廉恥寇賊姦宄所繇生也師古曰亂在外為姦在內為宄繇與由同下類此漢書鮑宣傳鮑宣字子都渤海高城人也好學明經為縣鄉嗇夫守束州丞師古曰束州渤海之縣也後為都尉太守功曹舉孝廉為郎病去官復為州從事大司馬衛將軍王商辟宣薦為議郎後以病去哀帝初大司空何武除宣為西曹掾甚敬重焉薦宣為諫大夫遷豫州牧上書諫曰陛下擢臣巖穴誠冀有益豪毛豈徒欲使臣美食大官重高門之地哉晉灼曰高門殿名也師古曰在未央宮中天下乃皇天之天下也陛下上為皇天子下為黎庶父母為天牧養元元視之當如一合尸鳩之詩師古曰尸鳩曹國風之篇也其詩云尸鳩在桑其子七兮淑人君子其儀一兮言尸鳩之鳥養其子七平均如一善人君子布德施惠亦當然也尸鳩拮鞠也拮音居黠反宋祁曰浙本無之詩二字漢書敘傳方今大漢灑掃群穢夷險芟荒廓帝紘恢皇綱基隆於羲農規廣於黃唐其君天下也炎之如日威之如神函之如海養之如春師古曰函容也讀與含同又答賓戲并序永平中為郎典校祕書專篤志於儒學以著述為業或譏以無功項岱曰或有譏班固雖篤志博學無功勞於時任不富貴也又感東方朔揚雄自喻以不遭蘇張范蔡之時曾不折之以正道明君子之所守故聊復應焉其辭曰賓戲主人曰蓋聞聖人有一定之論烈士有不易之分方今大漢灑掃群穢夷險芟荒善曰掃即今掃字也廓帝紘恢皇綱項岱曰紘張也皇君也善曰許慎淮南子注曰紘惟也基隆於羲農規廣於黃唐其君天下也炎之如日威之如神函之如海養之如春説文曰炎火也謂光照也史記曰帝堯其仁如天其智如神就之如日望之如雲據唐李善注文選本卷四十五案文選列答賓戲于對問中後漢書陳蕃傳陳蕃字仲舉汝南平輿人也祖河東太守蕃年十五嘗間處一室而庭宇蕪穢父友同郡薛勤來候之謂蕃曰孺子何不灑掃以待賓客蕃曰大丈夫處世當掃除天下安事一室乎勤知其有清世志甚奇之初仕郡舉孝廉除郎中遭母憂棄官行喪服闋刺史周景辟別駕從事續漢志曰別駕從事校尉行部奉引總録總事稍遷拜尚書時零陵桂陽山賊為害公卿議遣討之又詔下州郡一切皆得舉孝廉茂才蕃上疏駁之曰昔高祖創業萬邦息肩撫養百姓同之赤子尚書曰若保赤子惟民其康乂漢王符潛夫論浮侈第十二是故明王之養民也憂之勞之教之誨之慎微防萌以斷其邪三國志魏志王朗傳王朗字景興東海郡人也魏國初建以軍祭酒領魏郡太守遷少府奉常大理務文帝即王位遷御史大夫封安陵亭侯上疏勸育民省刑曰兵起已來三十餘年四海蕩覆萬國珍瘁賴先王芟除寇賊扶育孤弱遂令華夏復有綱紀鳩集兆民于茲魏土使封鄙之內雞鳴狗吠達于四境蒸庶欣欣喜遇升平今遠方之寇未賓兵戎之役未息誠令復除足以懷遠人良宰足以宣德澤阡陌咸修四民殷熾必復過於曩時而富於平日矣易稱勑法書著祥刑一人有慶兆民賴之慎法獄之謂也昔曹相國以獄市為寄路溫舒疾治獄之吏夫治獄者得其情則無怨死之囚丁壯者得盡地力則無飢饉之民窮老者得仰食倉廩則無餒餓之殍嫁娶以時則男女無怨曠之恨胎養必全則孕者無自傷之哀新生必復則孩者無不育之纍壯而後役則幼者無離家之思二毛不戎則老者無頓伏之患醫藥以療其疾寬繇以樂其業威罰以抑其強恩仁以濟其弱振貸以贍其乏十年之後既笄者必盈巷二十年之後勝兵者必滿野矣孤恤下民第五史記周本紀武王以商初定命南宮括散鹿臺之財發巨橋之粟以振貧窮史記齊世家頃公施苑囿薄賦斂振孤問疾虛積聚以救民民亦大悅前漢文帝紀元年三月詔曰方春和時草木群生之大皆有以自安而吾百姓鰥寡孤獨窮困之人或阽於死亡而莫之少憂為民父母將何如之議所以振貸之前漢武帝紀元狩六年遣博士大等六人分循行天下存問鰥寡廢疾無以自振業者貸與之前漢宣帝紀地節三年詔曰鰥寡孤獨高年貧困之民朕所憐也前下詔假公田貸積食其加賜鰥寡狐獨高年帛二千石嚴教吏謹視遇毋令失職前漢宣帝紀地節三年詔池籞未御幸者假與貧民前漢元帝紀初元元年夏詔曰關東今年榖不登民多困乏其令江海陂湖園池屬少府者以假貧民前漢循吏傳朱邑少時為舒桐鄉嗇夫存問耆老孤寡遇之有恩所部吏民愛敬焉後漢孝章紀詔曰蓋君人者視民如父母有憯怛之憂有忠和之教匍匐之救其嬰兒無父母親屬及有子不能養食者稟給如律後漢五行志後世聖人知恤民之憂思深大者必饗其樂勤仁育物使不夭折者必受其福晉武帝紀泰始四年班五條詔書於郡國正身勤百姓撫孤寡敦本息末去人事晉王蘊傳補矢興太守甚有德政屬郡荒人飢輒開倉贍恤主簿執諫請先列表上待報蘊曰今百姓嗷然路有飢饉若表上須報何以救將死之命乎專人之愆罪在太守且行仁義而敗無所恨也於是大振貸之朝庭以違科免蘊官士庶詣闕訟之詔特左降為晉陵太守新唐李罪傳初罪貶溫州長史俄攝州事州大飢發官廩數十萬石賑救僚吏叩庭請先以聞罪曰人日不再食且死可俟命後發哉苟殺我而活衆其利大矣既貸乃自劾優詔褒之新唐書員半千傳為武陵尉歲旱勸令殷子良發粟振民不從及子良謁州半千悉發之下賴以濟剌史大怒囚半千于獄會薛元超持節讓太守曰君有民不能恤使惠出一尉尚可罪邪釋之俄舉嶽牧箋證史記周本紀武王為殷初定未集乃使其弟管叔鮮蔡叔度相祿父治殷正義地理志云河內殷之舊都周既滅殷分其畿內為三國詩邶鄘衛是邶以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷民謂之三監帝王世紀云自殷都以東為衛管叔監之殷都以西為鄘蔡叔監之殷都以北為邶霍叔監之是為三監按二説各異未詳也已而命召公釋箕子之囚集解徐廣曰釋一作原命畢公釋百姓之囚表商容之閭命南宮括散鹿臺之財發巨橋之粟以振貧弱史記齊太公世家十一年晉初置六卿賞鞍之功齊頃公朝晉欲尊王晉景公索隱王劭按張衡曰禮諸侯朝天子執玉既授而反之若諸侯自相朝則不授玉齊頃公戰敗朝晉而授玉是欲尊晉侯為王太史公採其言而書之此文不云授玉王氏之説復有所依聊記異耳晉景公不敢受乃歸歸而頃公弛苑囿薄賦斂振孤問疾虛積聚以救民民亦大説漢書文帝紀文帝元年三月有司請立皇后皇太后曰立太子母竇氏為皇后詔曰方春和時草木群生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽於死亡服虔曰阽音反坫之坫孟康曰阽音屋簷之簷如淳曰阽近邊欲墮之意師古曰服孟二音並通而莫之省憂師古曰省視也為民父母將何如其議所以振貸之師古曰振起也為給貸之令其存立也諸振救振贍其義皆同今流俗作字從貝者非也漢書武帝紀元狩六年冬十月賜丞相以下至吏二千石百金六月詔曰日者有司以幣輕多姦農傷而末衆又禁兼并之塗今遣博士大等六人分循行天下師古曰褚大也行音下更反存問鰥寡廢疾無以自振業者貸與之漢書宣帝紀地節三年春三月詔曰蓋聞有功不賞有罪不誅雖唐虞猶不能以化天下又曰鰥寡孤獨高年貧困之民朕所憐也前下詔假公田貸種食其加賜鰥寡孤獨高年帛二千石嚴教吏謹視遇毋令失職師古曰職常也失職謂失其常業也漢書宣帝紀地節三年春三月詔曰朕既不德不能附遠是以邊境屯戍未息今復飭兵重屯久勞百姓師古曰飭讀與勑同飭整也非所以綏天下也其罷車騎將軍右將軍屯兵又詔池籞未御幸者假與貧民蘇林曰折竹以繩綿連禁禦使人不得往來律名為籞服虔曰籞在池水中作室可用棲鳥鳥入中則捕之應劭曰池者陂池也鞍者禁苑也臣瓚曰鞍者所以養鳥也設為籓落周覆其上令鳥不得出猶苑之畜獸池之畜魚也師古曰蘇應二説是漢書元帝紀初元元年春正月辛丑孝宣皇帝葬杜陵夏四月詔曰朕承先帝之聖緒獲奉宗廟戰戰兢兢宋祁曰唐本作栗栗又曰關東今年榖不登民多困乏其令郡國被災害甚者毋出租賦江海陂湖園池屬少府者以假貧民漢書循吏傳朱邑字仲卿廬江舒人也少時為舒桐鄉嗇夫廉平不苛以愛利為行師古曰仁愛於人而安利也未嘗笞辱人存問耆老孤寡遇之有恩所部吏民愛敬焉後漢書章帝紀三年春正月乙酉詔曰蓋人君者視民如父母有憯怛之憂有忠和之教匍匐之救周禮大司徒以鄉三物教萬民一曰六德謂智仁聖義忠和詩邶風曰凡民有喪匍匐救之其嬰兒無父母親屬及有子不能養食者稟給如律梁劉昭補并注後漢書輿服志輿服上書曰明試以功孔安國曰考試其居國為政以差其功車服以庸孔安國曰賜以車服以旌其德用所任也又一通諸侯四朝各使陳進治化之言明試其言以要其功功成則錫車服以表顯其能用言昔者聖人興天下之大利除天下之大害躬親其事身履其勤憂之勞之不避寒暑使天下之民物各得安其性命無夭昏暴陵之災是以天下之民敬而愛之若親父母則而養之若仰日月夫愛之者欲其長久不憚力役相與起作宮室上棟下宇以雍覆之欲其長久也敬之者欲其尊嚴不憚勞煩相與起作輿輪旌旗章表以尊嚴之斯愛之至敬之極也苟心愛敬雖報之至情由未盡或殺身以為之盡其情也奕世以祀之明其功也是以流光與天地比長後世聖人知恤民之憂思深大者必饗其樂勤仁育物使不夭折者必受其福晉書武帝紀泰始四年十二月班五條詔書於郡國一曰正身二曰勤百姓三曰撫孤寡四曰敦本息末五曰去人事晉書外戚列傳王蘊傳王蘊字叔仁孝武定皇后父司徒左長史濛之子也起家佐著作郎纍遷尚書吏部郎性平和補吳興太守甚有德政屬郡荒人飢輒開倉贍恤主簿執諫請先列表上待報蘊曰今百姓嗷然路有飢饉若表上須報何以救將死之命乎專輒之愆罪在太守且行仁義而敗無所恨也於是大振貸之賴蘊全者十七八焉朝廷以違科免蘊官士庶詣闕訟之詔特左降晉陵太守新唐書太宗諸子列傳罪字子蘭少補左司禦兵曹參軍上元初旱歉罪祿不足養請補外不許乃故抵輕法貶溫州長史俄攝州事州大飢發官稟數十萬石賑餓者僚史叩庭請先以聞罪曰人日不再食且死何俟命後發哉苟殺我而活衆其利大矣既貸乃自劾優詔開許就進少府監新唐書員半千傳員半千字榮期齊州全節人其先本彭城劉氏十世祖凝之事宋起部郎及齊受禪奔元魏以忠烈自比伍員因自姓員半千始名餘慶客晉州州舉童子房玄齡異之對詔高第已能講易老子長與何彥先同事王義方以邁秀見賞義方常曰五百歲一賢者生子宜當之因改今名凡舉八科皆中咸亨中上書自陳書奏不報調武陟尉歲旱勸令殷子良發粟賑民不從及子良謁州半千悉發之下賴以濟刺史大怒囚半千于獄會薛元超持節度河讓太守曰君有民不能恤使惠出一尉尚可罪邪釋之俄舉嶽牧求民瘼第六後漢循吏傳云光武數引公卿郎將列于禁坐廣求民瘼觀納風謠故能內外匪解百姓寬息前漢昭帝即位詔郡國舉賢良文學之士問以民所疾苦新唐則天垂拱中降九道大使巡察天下以求民瘼新唐李靖傳靖為桂州總管以嶺海陋遠久不見德非震威武示禮義則無以變風即帥兵南巡所過問疾苦延見長老宣布天子恩意遠近歡服箋證後漢書循吏列傳初光武長於民間頗達情偽左傳楚子曰晉侯在外十九年矣人之情偽盡知之矣見稼穡艱難百姓病害至天下已定務用安靜解王莽之繁密還漢世之輕法身衣大練色無重綵耳不聽鄭衛之音手不持珠玉之玩宮房無私愛左右無偏恩建武十三年異國有獻名馬者日行千里又進寶劍賈兼百金詔以馬駕鼓車劍賜騎士損上林池籞之官廢騁望弋獵之事其以手迹賜方國者皆一札十行細書成文勤約之風行于上下數引公卿郎將列于禁坐禁坐猶御坐也廣求民瘼觀納風謠故能內外匪懈百姓寬息漢書食貨志昭帝即位六年詔郡國舉賢良文學之士問以民所疾苦教化之要又漢荀悅前漢紀孝昭一始元六年春正月上耕於上林二月詔有司舉賢良文學問民疾苦宋王溥唐會要貢舉下垂拱元年祕書省正字陳子昂上疏曰臣伏見陛下憂勞百姓恐不得其所將降九道大使巡察天下諸州兼申黜陟以求人瘼臣竊以為未盡善也又陳拾遺集上軍國利害事三條出使臣伏見陛下憂勞天下百姓恐不得所又發明詔將降九道大使巡察天下諸州兼申黜陟以求人瘼甚大惠也天下百姓幸甚新唐書李靖傳李靖字藥師京兆三原人姿貌魁秀通書史嘗謂所親曰丈夫遭遇要當以功名取富貴何至作章句儒仕隋為殿內直長吏部尚書高祖已定京師將斬之靖呼曰公起兵為天下除暴亂欲就大事以私怨殺誼士乎秦王亦為請得釋引為三衛以功封永康縣公檢校荊州刺史乃度嶺至桂州授嶺南撫慰大使檢校桂州總管以嶺海陋遠久不見德非震威武示禮義則無以變風即率兵南巡所過問疾苦延見長老宣布天子恩意遠近歡服視民如子第七前漢路溫舒傳路溫舒上書文帝崇仁義省刑罰通關梁一遠近重賢如大賓愛民如赤子前漢召信臣傳以明經甲科為郎出補榖陽長舉高弟遷上蔡長其治視民如子所居見稱述前漢鮑宣上書曰陛下為黎庶父母視之當如一合尸鳩之詩後漢卓茂傳遷密令勞心醇醇視人如子後漢陳蕃傳蕃上疏曰皆高祖創業萬邦息肩撫養百姓同之赤子箋證漢書路溫舒傳路溫舒字長君巨鹿東里人也父為里監門使溫舒牧羊溫舒取澤中蒲截以為牒編用寫書稍習善求為獄小吏因學律令轉為獄史縣中疑事皆問焉太守行縣見而異之署決曹史又受春秋通大義舉孝廉為山邑丞坐法免復為郡吏元鳳中廷尉光以治詔獄請溫舒署奏曹掾師古曰光解光守廷尉史會昭帝崩昌邑王賀廢宣帝初即位溫舒上書言宜尚德緩刑其辭曰臣聞齊有無知之禍而桓公以興晉有驪姬之難而文公用伯師古曰伯讀曰霸近世趙王不終諸呂作亂而孝文為太宗繇是觀之師古曰繇讀與由同禍亂之作將以開聖人也故桓文扶微興壞尊文武之業澤加百姓功潤諸侯雖不及三王天下歸仁焉文帝永思至德以承天心崇仁義省刑罰通關梁一遠近敬賢如大賓愛民如赤子漢書循吏傳召信臣字翁卿九江壽春人也師古曰召讀曰邵以明經甲科為郎出補穀陽長舉高第遷上蔡長其治視民如子所居見稱述案此條已見本卷養民第四箋證如之後漢書卓茂傳卓茂字子康南陽宛人也父祖皆至郡守茂元帝時學於長安事博士江生江生魯人江翁也昭帝時為博士號魯詩宗見前書習詩禮及歷算究極師法稱為通儒初辟丞相府史事孔光光稱為長者時嘗出行有人認其馬茂問曰子亡馬幾何時對曰月餘日矣茂有馬數年心知其謬默解與之挽車去顧曰若非公馬幸至丞相府歸我他日馬主別得亡者乃詣府送馬叩頭謝之茂性不好爭如此後以儒術舉為侍郎給事黃門遷密令密今洛州密縣也勞心諄諄視人如子諄諄忠謹之貌也詩曰誨爾諄諄音之順反案此條已見於本卷養民第四詳亦見於此條箋證民歸其主第八史記舜本紀舜耕歷山歷山之人皆讓畔漁雷澤雷澤之人皆讓居陶河濱器皆不苦窳一年而所居成聚二年成邑三年成都史記周本紀古公亶父復修后稷公劉之業積德行義國人皆戴之薰育戎狄政之欲得財物與之已復攻欲得地與民民皆怒欲戰古公曰殺人父子而君之豫不忍為乃與私屬遂去豳止於歧下豳人舉國扶老攜弱盡復歸古公於歧下及他旁國聞古公仁亦多歸之史記周本紀公劉雖在戎狄之間復修后稷之業行者有資居者有畜積民賴其慶百姓懷之多徙而保歸焉周道之興自此後故詩人歌樂思其德史記齊世家太公至國修政因其俗簡其禮通商賈之業便魚鹽之利而民人多歸齊前漢刑法志夫人宵天地之貌音肖懷五常之性聰明精粹有生之最靈者也爪牙不足以供耆欲趨走不足以避利害無毛羽以禦寒暑必將役物以為養用智而不恃力故不仁愛則不能群不能群則不勝物不勝物則養不足群而不足爭心將作上聖卓然先行恭讓博愛之德者衆心説而從之從之成群是為君矣歸而往之是為王矣前漢禮樂志歌云大海蕩蕩水所歸高賢愈愈民所懷愈愈和樂貌王者有和樂之德民皆思附前漢董仲舒傳文王順天理物師用賢聖是以閎夭大顛散宜生等亦聚於朝廷愛施兆民天下歸之晉懷愍紀史臣曰大王為戎翟所逼而不忍百姓之命杖策而去之故從之如歸市一年成邑二年成都三年五倍其初箋證史記五帝本紀舜耕歷山歷山之人皆讓畔正義韓子歷云農相侵畔舜往耕期年耕者讓畔也漁雷澤雷澤上人皆讓居陶河濱河濱器皆不苦窳駰謂窳病也正義苦讀如盬音古盬粗也窳音庾一年而所居成聚正義聚在喻反謂村落也二年成邑三年成都正義周禮郊野法云九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都也史記周本紀古公亶父復修后稷公劉之業積德行義國人皆戴之薰育戎狄攻之欲得財物豫之已復攻欲得地與民民皆怒欲戰古公曰有民立君將以利之今戎狄所為攻戰以吾地與民民之在我與其在彼何異民欲以我故戰殺人父子而君之豫不忍為乃與私屬遂去豳踰梁山止於岐下豳人舉國扶老攜弱盡復歸古公於岐下及他旁國聞古公仁亦多歸之史記周本紀后稷之興在陶唐虞夏之際皆有令德后稷卒子不窋立不窋末年夏后氏政衰去稷不務不窋以失其官而奔戎狄之間不窋卒子鞠立鞠卒子公劉立公劉雖在戎狄之間復修后稷之業務耕種行地宜自漆沮渡渭取材用行者有資居者有畜積民賴其慶百姓懷之多徙而保歸焉周道之興自此始故詩人歌樂思其德索隱即詩大雅篇篤公劉是也史記齊太公世家武王已平商而王天下封師尚父於齊營邱正義營邱在青州臨淄北百步外城中東就國道宿行遲逆旅之人曰吾聞時難得而易失客寢甚安殆非就國者也太公聞之夜衣而行犁明至國索隱犁里奚反犁猶比也又犁猶遲也萊侯來伐與之爭營邱營邱邊萊萊人夷也會紂之亂而周初定未能集遠方是以與太公爭國太公至國修政因其俗簡其禮通商工之業便魚鹽之利而人民多歸齊漢書刑法志夫人宵天地之貌應劭曰宵類也頭圜象天足方象地孟康曰宵化也言稟天地氣化而生也師古曰宵義與肖同應説是也故庸妄之人謂之不肖言其狀貌無所象似也懷五常之性師古曰五常仁義禮智信聰明精粹師古曰精細也言其識性細密也粹淳也音先遂反有生之最靈者也爪牙不足以供耆欲趨走不足以避利害師古曰耆讀曰嗜無毛羽以禦寒暑必將役物以為養任智而不恃力此其所以為貴也故不仁愛則不能群不能群則不勝物不勝物則養不足群而不足爭心將作上聖卓然先行敬讓博愛之德者衆心説而從之師古曰説讀曰悅從之成群是為君矣歸而往之是為王矣漢書禮樂志安世房中歌十七章其詩曰劉敞曰按此言房中歌十七章推尋文理不見十七章疑本十二章撰為十七章也大海蕩蕩水所歸高賢愈愈民所懷李奇曰愈愈懌也師古曰蕩蕩廣大貌也愈愈和樂貌也懷思也言海以廣大之故衆水歸之王者有和樂之德則人皆思附也大山崔百卉殖民何貴貴有德師古曰言大山以崔嵬之故能生養百卉明君以崇高其德故為萬姓所尊也崔音才回反漢書董仲舒傳至於殷紂逆天暴物殺戮賢知殘賊百姓伯夷太公皆當世賢者隱處而不為臣守職之人皆奔走逃亡入於河海天下耗亂萬民不安故天下去殷而從周文王順天理物師用賢聖是以閎夭太顛散宜生等亦聚於朝廷臣瓚曰皆文王賢臣愛施兆民天下歸之晉書孝懷帝孝愍帝紀史臣曰昔周之興也后稷生於薑嫄而天命昭顯文武之功起於后稷至於公劉遭夏人之亂去邰之豳身服厥勞至於大王為戎翟所逼而不忍百姓之命杖策而去之故從之如歸市一年成邑二年成都三年五倍其初
