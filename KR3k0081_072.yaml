body:
  text: 卷第七十二矜伐第一史記商本紀帝紂人力過人手格猛獸知足以距諫言足以飾非矜人臣以能高天下以聲以為皆出己之下後漢彭寵傳自負其功意望甚高光武接之不能滿以此懷不平後漢鄭康成傳應劭曰故太山太守應中遠北面稱弟子何如康成笑曰仲尼之門考以四科回賜之徒不稱官閥劭有慚色魏鄧艾傳艾西征於綿竹築臺以為京觀用彰武功艾深自矜伐謂蜀人曰諸君賴遭我故得有今日耳若遇吳漢之徒已殄滅爾又曰姜維實一時雄兒也與我相值故窮耳有識者笑之新唐虞世南傳後星孛虛危歷氐餘百日帝訪群臣世南曰昔齊景公時彗見公問晏嬰嬰曰公穿池沼畏不深起臺榭畏不高行刑罰畏不重是以天見彗為戒耳景公懼而修德後十六日而滅臣願陛下勿以功高而自矜勿以太平久而自驕慎終于初彗雖見猶未足憂帝曰誠然吾良無景公之過但年十八舉義兵二十四平天下未三十即大位自謂三王以來撥亂之主莫吾若故負而矜之輕天下士上天見變其為是乎秦始皇剗除六國隋煬帝有四海之富卒以驕敗吾何得不戒邪新唐裴寂傳帝嘗從容夸語曰前王多興細微間我家隴西舊族西姻婭帝室一呼義唱不三月有天下公復華胃職宦光顯非劉季亭長蕭曹刀筆吏比也我與公無愧焉新唐秦瓊傳瓊事秦王每敵有驍將鋭士秦王輒命叔寶往取之躍馬挻槍利於万衆中莫不如志頗自負新唐鄭肅傳肅孫仁表纍擢起居郎嘗以門閥文章自高曰天瑞有五色雲人瑞有鄭仁表傲縱多所陵藉人畏薄之餘見改過魏公子傳箋證史記殷本紀帝紂資辨捷疾聞見甚敏材力過人手格猛獸正義帝王世紀云紂倒曳九牛撫梁易柱也知足以距諫言足以飾非矜人臣以能高天下以聲以為皆出己之下後漢書彭寵傳彭寵字伯通南陽宛人也光武承制封寵建忠侯賜號大將軍遂圍邯鄲寵轉糧食前後不絶及王郎死光武追銅馬北至薊寵上謁自負其功意望甚高光武接之不能滿以此懷不平不能滿其意故心不平也後漢書鄭玄傳時大將軍袁紹總兵冀州遣使要玄大會賓客玄最後至乃延升上坐時汝南應劭亦歸於紹因自贊曰故太山太守應中遠北面稱弟子何如玄笑曰仲尼之門考以四科四科謂德行言語政事文學顏淵閔子騫及子游子夏並見論語也回賜之徒不稱官閥劭有慙色三國志魏志鄧艾傳劉禪遣使奉皇帝璽綬為箋詣艾請降艾至成都禪率太子諸王及群臣六十餘人面縳輿櫬詣軍門艾執節解縳焚櫬受而宥之使於綿竹築臺以為京觀用彰戰功士卒死事者皆與蜀兵同共埋藏艾深自矜伐謂蜀士大夫曰諸君賴遭某故得有今日耳如遇吳漢之徒已殄滅矣又曰姜維自一時雄兒也與某相值故窮耳有識者笑之新唐書虞世南傳貞觀八年進封縣公會隴右山崩大蛇屢見山東及江淮大水帝憂之後星孛虛危歷氐餘百日帝訪群臣世南曰昔齊景公時彗見公問晏嬰嬰曰公穿池沼畏不深起臺榭畏不深行刑罰畏不重是以天見彗為戒耳景公懼而修德後十六日而滅臣願陛下勿以功高而自矜勿以太平久而自驕慎終于初彗雖見猶未足憂帝曰誠然吾良無景公之過但年十八舉義兵二十四平天下未三十即大位自謂三王以來撥亂之主莫吾若故負而矜之輕天下士上天見變其為是乎秦始皇剗除六國隋煬帝有四海之富卒以驕敗吾何得不戒邪新唐書裴寂傳帝嘗從容夸語曰前王多興細微間關行陳而後成功我家隴西舊族世姻婭帝室一呼倡義不三月有天下公復華胄職宦光顯非劉季亭長蕭曹刀筆吏比也我與公無愧焉新唐書秦瓊磚秦瓊字叔寶以字顯齊州歷城人後歸王世充署龍驤大將軍與程金計曰世充多詐數與下呪誓乃巫嫗非撥亂主也因約俱西走策其馬謝世充曰自顧不能奉事請從此辭賊不敢逼於是來降高祖俾事秦王府每敵有驍將鋭士震耀出入以夸衆者秦王輒命叔寶往取之躍馬挺槍刺於萬衆中莫不如志以是頗自負新唐書鄭肅傳附孫鄭仁表仁表纍擢起居郎嘗以門閥文章自高曰天瑞有五色雲人瑞有鄭仁表傲縱多所陵藉人畏薄之不矜伐第二史記老子傳吾聞之良賈深藏若虛君子盛德容貌若愚前漢游俠傳朱家魯人所藏活豪士以百數其餘庸人不可勝言然終不伐其能飲其德飲沒也謂不稱顯前漢丙吉傳宣帝初即位賜吉爵關內侯吉為人深厚不伐善自曾孫遭遇吉絶口不道前恩故朝廷莫能明其功也及霍氏誅上躬親政是時掖庭宮婢則令民夫上書自陳嘗有阿保之功舜引丙吉知狀吉識謂則曰汝嘗坐養皇曾孫不謹督笞汝安得有功獨渭城胡組淮陽郭詔鄉有恩耳分別奏組等共養勞苦狀詔吉求組詔鄉已死有子孫皆受厚賞然後知吉有舊恩而終不言上大賢之後漢皇甫嵩傳論曰時人說皇甫嵩之不代汝豫之戰歸功朱雋張角之捷本之於盧植收名斂策而已不有焉蓋功名者世之所甚重也誠能不爭天下之所甚重則怨禍之不深矣如皇甫公之赴履危亂而能終以歸全者其致不亦貴乎故顏子願不伐善為先斯亦行身之要歟後漢朱雋傳太守尹端以雋為主薄端坐討賊診昭失利為州所奏罪應棄市雋乃羸服間行輕齎數百金到京師賂主章吏遂得刊定州奏故端得輸作左校端喜於降免而不知其由雋亦終無所言後漢胡廣傳尚書史敞等薦廣曰不矜其能不伐其勞翼翼周慎行靡玷漏密勿夙夜十有餘年心不外顧志不苟進魏陳群傳太祖時劉廙坐弟與魏諷謀反當誅群言之太祖太祖曰廙名臣也吾亦欲赦之乃復位廙深德群群曰夫議刑為國非為私也且自明主之意吾何知焉其廣博不伐皆此類也魏荀攸字公達太祖每稱曰公達外愚內智外怯內勇外弱內彊不伐善無施勞智可及愚不可及雖顏子寧武不能過也晉周訪傳訪征杜韜威風既著遠近悅服智勇過人為中興名將性謙虛未嘗論功伐或問訪曰人有小善無不自稱如功勳如此無一言何也訪曰朝廷威靈將土用命訪何功之有士以此重之新唐李大亮傳嘗以張弼脫其死及貴念有以報之時弼為將作丞匿不見大亮求之不能得一日識諸涂持弼泣悉推家財與之弼拒不受乃言於帝曰臣及事陛下張弼力也願悉臣官爵授之帝為遷弼中郎將代州都督世皆賢大亮能報而多弼不自伐也新唐河間王傳孝恭佐高祖征伐有功後封河間然寬恕退讓無矜伐色餘見讓力馮異賈復傳箋證史記老子列傳孔子適周將問禮於老子老子曰吾聞之良賈深藏若虛君子盛德容貌若愚漢書游俠傳朱家魯人高祖同時也魯人皆以儒教而朱家用俠聞所臧活豪士以百數其餘庸人不可勝言然終不伐其能飲其德孟康曰有德於人而不自美也師古曰飲沒也謂不稱顯劉奉世曰飲其德飲字當蒙不字言沒非義也飲者猶飲物自飫言不飲有其德漢書丙吉傳宣帝初即位賜吉爵關內侯吉為人深厚不伐善自曾孫遭遇吉絶口不道前恩師古曰遭遇謂升大位也故朝廷莫能明其功也地節三年立皇太子吉為太子太傅數月遷御史大夫及霍氏誅上躬親政省尚書事是時掖庭宮婢則令民夫上書自陳嘗有阿保之功師古曰謂未為宮婢時有舊夫見在俗間者章下掖庭令考問則辭引使者丙吉知狀掖庭令將則詣御史府以視吉師古曰視讀曰示吉識謂則曰汝嘗坐養皇曾孫不謹督笞汝安得有功獨渭城胡組淮陽郭卿有恩耳分別奏組等共養勞苦狀詔吉求組徵卿已死有子孫皆受厚賞詔免則為庶人賜錢十萬上親見問然後知吉有舊恩而終不言上大賢之後漢書皇甫嵩朱傳論曰前史著平原華嶠稱其父光祿大夫表每言其祖魏太尉歆稱時人說皇甫嵩之不伐汝豫之戰歸功朱張角之捷本之於盧植收名斂策而已不有焉斂策不論其功蓋功名者世之所甚重也誠能不爭天下之所甚重則怨禍不深矣如皇甫公之赴履危亂而能終以歸全者其致不亦貴乎故顏子願不伐善為先斯亦行身之要與後漢書朱傳朱字公偉會稽上虞人也本縣長山陽度尚見而奇之薦於太守韋毅稍歷郡職後太守尹端以為主簿熹平二年端坐討賊許昭失利為州所奏罪應棄市乃羸服間行輕齎數百金到京師賂主章吏遂得刊定州奏故端得輸作左校端喜於降免而不知其由亦終無所言後漢書胡廣傳時陳留郡缺職尚書史敞等薦廣曰不矜其能不伐其勞翼翼周慎行靡玷漏密勿夙夜密勿黽勉十有餘年心不外顧志不苟進三國志魏志陳群傳初太祖時劉廙坐弟與魏諷謀反當誅群言之太祖太祖曰廙名臣也吾亦欲赦之乃復位廙深德群群曰夫議刑為國非為私也且自明主之意吾何知焉其弘博不伐皆此類也三國志魏志荀攸傳荀攸字公達彧從子也太祖每稱曰公達外愚內智外怯內勇外弱內強不伐善無施勞智可及愚不可及雖顏子寧武不能過也晉書周訪傳周訪字士達本汝南安城人也漢末避地江南至訪四世吳平因家廬江尋陽焉訪威風既著遠近悅服智勇過人為中興名將性謙虛未嘗論功伐或問訪曰人有小善鮮不自稱卿功勳如此初無一言何也訪曰朝廷威靈將士用命訪何功之有士以此重之新唐書李大亮傳李大亮京兆涇陽人祖琰為魏度支尚書大亮有文武才略隋末署龐玉行軍兵曹李密寇東都玉戰敗大亮被擒賊將張弼異之就執百餘人皆死獨釋大亮引與語遂定交高祖入關大亮自歸授土門令嘗以張弼脫其死及貴念有以報之時弼為將作丞匿不見大亮求之不能得一日識諸涂持弼泣悉推家財與之弼拒不受乃言於帝曰臣及事陛下張弼力也願悉臣官爵授之帝為遷弼中郎將代州都督世皆賢大亮能報而多弼不自伐也新唐書宗室列傳河間元王孝恭河間元王孝恭少沈敏有識量高祖己定京師詔拜山南招慰大使徇巴蜀下三十餘州進擊朱粲破之俘其衆貞觀初為禮部尚書改王河間性奢豪後房歌舞伎百餘然寬恕退讓無矜伐色戒慎第二前漢袁盎傳上從霸陵上欲西馳下峻阪盎攬轡曰臣聞千金之子不垂堂百金之子不騎衡聖主不乘危不徼幸今陛下騁六飛馳不測山有如馬驚車敗陛下縱自輕奈高廟太后何上乃止後漢崔駰傳竇太后臨朝憲以重戚出內詔命駰獻書誡之曰君子福大而愈懼爵隆而益恭遠察近覽俯卯有則銘諸几杖刻諸盤杅魏王景興傳時帝頗出游獵或昏夜還宮景興上疏曰夫帝王之居外則飾周衛內則重禁門將行則設兵而後出幄稱警而後踐墀張弧而後登輿清道而後奉引遮列而後轉轂靜室而後息駕皆所以顯至尊務戒慎垂法教也晉郭璞傳上疏曰木不生庭太戊無以隆雉不鳴鼎武丁不為宗夫寅畏者所以饗福怠傲者所以招患此自然之符應不可不察也箋證漢書爰盎傳上從霸陵上欲西馳下峻阪盎攬轡上曰將軍怯邪盎言曰臣聞千金之子不垂堂百金之子不騎衡如淳曰騎倚也衡樓殿邊欄楯也師古曰騎謂跨之耳非倚也聖主不乘危不徼幸今陛下騁六飛如淳曰六馬之疾若飛也馳不測山有如馬驚車敗陛下縱自輕奈高廟太后何上乃止後漢書崔駰傳元和中肅宗始修古禮巡狩方嶽駰上四巡頌以稱漢德辭甚典美文多故不載帝雅好文章自見駰頌後常嗟歎之謂侍中竇憲曰卿寧知崔駰乎對曰班固數為臣說之然未見也帝曰公愛班固而忽崔駰此葉公之好龍也試請見之適欲官之會帝崩竇太后臨朝憲以重戚出內詔命駰獻書誡之曰故君子福大而愈懼爵隆而益恭遠察近覽俯仰有則銘諸几杖刻諸盤杅三國志魏志王朗傳王朗字景興東海郡人也時帝頗出游獵或昏夜還宮朗上疏曰夫帝王之居外則飾周衛內則重禁門將行則設兵而後出幄稱警而後踐墀張弧而後登輿清道而後奉引遮列而後轉轂靜室而後息駕皆所以顯至尊務戒慎垂法教也晉書郭璞傳璞著江賦其辭甚偉為世所稱後復作南郊賦帝見而嘉之以為著作佐郎于時高陽錯繆而刑獄繁興璞上疏曰故木不生庭太戊無以隆雉不鳴鼎武丁不為宗夫寅畏者所以饗福怠慠者所以招患此自然之符應不可不察也慎密第四前漢史丹傳丹為人愷弟愛人貌若儻蕩不備儻蕩疏談無檢也然心甚謹密故無得信於上前漢石建傳奏事於上前即有可言屏人乃言極切至廷中見如不能言者上以是親而禮之前漢張安世傳職典樞機以謹慎周密自著每定大政已決輒移病出移病謂移書言病也聞有詔令乃驚使史之丞相府問焉自朝廷大臣莫知其豫議也前漢孔光傳時有所言輒削草藁以為章主之過以奸忠直人臣大罪也有所薦舉唯恐其人之聞知休日歸沭兄弟妻子燕語終不及朝省政事或問光溫室省中樹皆何木也光默不應更答以它語其不泄如是後漢皇甫嵩傳嵩為人愛慎盡勤前後上表陳諫有補益者五百餘事皆手書毀草不宣於外後漢陵寵傳寵性周密命稱人臣之義苦不畏慎自在樞機謝遣門人拒絶知友唯在公家而已朝廷器之後漢樊宏傳宏所上便宜及言得失輒手自書寫毀削草本公朝訪逮不敢衆對魏志荀攸傳自從征伐常密謀帷幄時人及子弟莫知其言吳志顧雍為丞相時訪逮民間及政職所宜輒密以聞若見納用則歸之於上不用終不宣泄權以此重之晉羊祜傳其嘉謀讜議皆焚其草故世莫聞凡所進達人皆不知所由或謂祜慎密太過者祜曰是何言歟新唐馬周傳疾甚取所上章奏悉焚之曰管晏暴君之過取身後名吾不為也新唐高儉字士廉奏議未嘗不焚槀家人無見者新唐楊師道傳正觀中拜侍中參豫朝政性周謹未嘗語禁省事嘗曰吾讀孔光傳想其餘風或庶幾云新唐戴至德傳遷尚書右僕射時劉仁軌為左人有所訴率優容之至德乃詰究本未理直者密為奏終不顯私恩由是當時多稱仁軌者號仁軌為解事僕射嘗更日聽訟有嫗詣省至德已收牒嫗乃復取曰初以為解事僕射今乃非是至德笑還之人伏其長者或以問至德答曰慶賞刑罰人主之柄為臣豈得與人主爭也帝知歎美之新唐高郢傳郢恭慎不與人交常掌制誥家無留槀或勸盍如前人傳制集者答曰王言不可藏私家箋證漢書史丹傳丹為人足知愷弟愛人師古曰愷樂也弟易也言有和樂簡易之德貌若儻蕩不備師古曰儻蕩疏誕無檢也然心甚謹密故尤得信於上漢書萬石君石奮傳奮長子建建奏事於上前即有可言屏人乃言極切師古曰有可言謂有事當奏諫至廷見如不能言者師古曰廷見謂當朝而見時上以是親而禮之漢書張湯傳附子張安世職典樞機以謹慎周密自著外內無間每定大政已決輒移病出師古曰移病謂移書言病也一曰以病而移居聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也師古曰與讀曰豫漢書孔光傳凡典樞機十餘年守法度修故事上有所問據經法以心所安而對不希指苟合如或不從不敢強諫爭以是久而安時有所言輒削草槀服虔曰言已繕書輒削壞其草也以為章主之過以奸忠直人臣大罪也師古曰奸求也奸忠直之名也奸音干有所薦舉唯恐其人之聞知沭日歸休兄弟妻子燕語終不及朝省政事或問光溫室省中樹皆何木也晉灼曰長樂宮中有溫室殿光默不應更答以它語其不泄如是後漢書皇甫嵩嵩為人愛慎盡勤前後上表陳諫有補益者五百餘事皆手書毀草不宣于外後漢書陳寵傳寵性周密常稱人臣之義苦不畏慎自在樞機謝遣門人拒絶知友惟在公家而已朝廷器之後漢書樊宏傳樊宏字靡卿南陽湖陽人也宏為人謙柔畏慎不求苟進每當朝會輒迎期先到俯伏待事時至乃起帝聞之常勑騶騎臨朝乃告勿令豫到宏所上便宜及言得失輒手自書寫毀削草本公朝訪逮不敢衆對三國志魏志荀攸傳攸深密有智防自從太祖征伐常謀謨帷幄時人及子弟莫知其所言吳志顧雍傳顧雍字元歎吳郡吳人也雍為人不飲酒寡言語舉動時當權嘗歎曰顧君不言言必有中至飲宴歡樂之際左右恐有酒失而雍必見之是以不敢肆情權亦曰顧公在坐使人不樂其見憚如此是歲改為太常進封醴陵侯代孫邵為丞相平尚書事其所選用文武將吏各隨能所任心無適莫時訪逮民間及政職所宜輒密以聞若見納用則歸之於上不用終不宣泄權以此重之晉書羊祜傳祜歷職二朝任典樞要政事損益皆咨訪焉勢利之求無所關與其嘉謀讜議皆焚其草故世莫聞凡所進達人皆不知所由或謂祜慎密太過者祜曰是何言歟新唐書馬周傳太子問疾疾甚周取所上章奏悉焚之曰管晏暴君之過取身後名吾不為也新唐書高儉傳高儉字士廉以字顯士廉進止詳華凡有獻納搢紳皆屬以目奏議未嘗不焚槀家人無見者新唐書楊師道傳師道字景猷恭仁弟清警有才思貞觀十年拜侍中參預朝政親遇隆渥性周謹未嘗語禁省事嘗曰吾讀孔光傳想其餘風或庶幾云新唐書戴胄傳附嗣子戴至德至德乾封中纍遷西臺侍郎同東西臺三品閲十數年遷尚書右僕射時劉仁軌為左人有所訴率優容之至德乃詰究本末理直者密為奏終不顯私恩由是當時多稱仁軌者號仁軌為解事僕射嘗更日聽訟有嫗詣省至德已收牒嫗乃復取曰初以為解事僕射今乃非至德笑還之人伏其長者或以問至德答曰慶賞刑罰人主之柄為臣豈得與人主爭也帝知歎美之新唐書高郢傳高郢字公楚其先自渤海徙衛州遂為衛州人郢恭慎不與人交常掌制誥家無留槀或勸盍如前人傳制集者答曰王言不可藏私家知幾第五前漢楚元王傳初元王禮申公等穆生不耆酒元王每置酒常為穆生設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市稱疾臥申公白生強起之曰獨不念先王之德歟今王一旦失小禮何足至此穆生曰易稱知幾其神乎幾者動之微吉凶之先見者也君子見幾而作不侯終日先王之所以禮吾三人者為道之有故也今而忽之是忘道也忘道之人胡可與久處豈為區區之禮哉遂謝病去申公白生獨留王戊稍淫暴二十年為薄太后服私姦削東海薛郡乃與吳通謀二人諫不聽胥靡之晉灼曰胥相也靡隨也師古曰聯繫使相隨而服役之故謂之胥靡猶今之役囚徒以銷聯綴耳晉宣帝紀從討張魯言於魏武曰劉備以詐力虜劉璋蜀人未附而遠爭江陵此禨不可失也今若曜威漢中益州震動進兵陵之勢必瓦解聖人不能違時亦不失時矣魏武曰人苦無足既得隴右復欲得蜀不從晉景皇帝字子元雅有風彩與夏侯玄何晏齊名晏嘗稱曰惟幾也能成天下之務司馬子元是也晉張翰傳齊王冏辟為大司馬東曹掾翰謂同郡顧榮曰天下紛紛禍難未已夫有四海之名者求退良難吾本山林間人無望於時子善以明防前以智慮後榮執其手愴然曰吾亦與子採南山蕨飲三江水耳翰因見秋風起乃思吳中菰菜蓴羹鱸魚鱠曰人生貴得適志何能羈官數千里之外要名爵乎遂命駕而歸俄而冏敗人皆謂之見機翰任心自適不求當世或謂之曰卿乃可縱適一時獨不為身後名邪答曰使我有身後名不如即時一杯酒時人貴其曠達晉董養傳永嘉中洛城東北步廣里中地陷有二鵝出焉其蒼者飛去白者不能飛養聞歎曰昔周時所盟會狄泉即此地也今有二鵝蒼者胡象白者國家之象其可盡言乎顧謂謝鯤阮孚曰易稱知機其神乎君等可深藏矣乃與妻荷擔入蜀莫知所終餘見不食暗君之祿陳寵傳箋證漢書楚元王傳初元王敬禮申公等穆生不耆酒元王每置酒常為穆生設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市稱疾臥申公白生強起之曰獨不念先王之德與師古曰與讀曰歟今王一旦失小禮何足至此穆生曰易稱知幾其神乎師古曰下繫之辭也幾者動之微吉凶之先見者也君子見幾而作不俟終日先王之所以禮吾三人者為道之存故也今而忽之是忘道也忘道之人胡可與久處豈為區區之禮哉遂謝病去申公白生獨留王戊稍淫暴二十年為薄太后服私姦削東海薛郡乃與吳通謀二人諫不聽胥靡之應劭曰詩云若此無罪淪胥以鋪胥靡刑名也晉灼曰胥相也靡隨也古者相隨坐輕刑之名師古曰聯繫使相隨而服役之故謂之胥靡猶今之役囚徒以鎖聯綴耳晉書宣帝紀宣皇帝諱懿字仲達河內溫縣孝敬里人姓司馬氏魏武為丞相又辟為文學掾遷黃門侍郎轉議郎丞相東曹屬尋轉主簿從討張魯言於魏武曰劉備以詐力虜劉璋蜀人未附而遠爭江陵此機不可失也今若曜威漢中益州震動進兵臨之勢必瓦解因此之勢易為功力聖人不能違時亦不失時矣魏武曰人苦無足既得隴右復欲得蜀言竟不從晉書景帝紀景皇帝諱師字子元宣帝長子也雅有風采沉毅多大略少流美譽與夏侯玄何晏齊名晏常稱曰惟幾也能成天下之務司馬子元是也晉書文苑列傳張翰傳張翰字季鷹吳郡吳人也齊王冏辟為大司馬東曹掾冏時執權翰謂同郡顧榮曰天下紛紛禍難未已夫有四海之名者求退良難吾本山林間人無望於時子善以明防前以智慮後榮執其手愴然曰吾亦與子採南山蕨飲三江水耳翰因見秋風起乃思吳中菰菜蓴羹鱸魚膾曰人生貴得適志何能羈宦數千里以要名爵乎遂命駕而歸著首丘賦文多不載俄而冏敗人皆謂之見機然府以其輒去除吏名翰任心自適不求當世或謂之曰卿乃可縱適一時獨不為身後名邪答曰使我有身後名不如即時一杯酒時人貴其曠達晉書隱逸列傳董養傳董養字仲道陳留浚儀人也泰始初到洛下不干祿求榮永嘉中洛城東北步廣里中地陷有二鵝出焉其蒼者飛去白者不能飛養聞歎曰昔周時所盟會狄泉即此地也今有二鵝蒼者胡象白者國家之象其可盡言乎顧謂謝鯤阮孚曰易稱知幾其神乎君等可深藏矣乃與妻荷擔入蜀莫知所終幾不密第六前漢京房贊曰京房區區不量淺深危言剌譏構怨彊臣罪辜不旋踵亦不密以失身悲夫後漢鮑永傳鮑永字君長為郡公曹莽以宣不附己欲滅其子孫太守苟諫擁護召以為吏常置府中永因數為諫陳興復漢室翦滅篡逆之策諫每戒永曰君長幾事不密禍倚人門永感其言餘見死節李固傳箋證漢書眭兩夏侯京翼李傳贊曰京房區區不量淺深危言刺譏構怨彊臣罪辜不旋踵亦不密以失身悲夫師古曰易上繫辭曰君不密則失臣臣不密則失身故贊引之也後漢書鮑永傳鮑永字君長上黨屯留人也父宣哀帝時任司隸校尉為王莽所殺初為郡功曹莽以宣不附已欲滅其子孫都尉路平承望風旨規欲害永太守苟諫擁護召以為吏常置府中永因數為諫陳興復漢室翦滅篡逆之策諫每戒永曰君長幾事不密禍倚人門永感其言
