body:
  text: 卷第九十四惇故舊第一前漢循吏朱邑傳為人惇厚篤於故舊然性公正不可交以私天子器之後漢嚴光傳光武復引光入論道舊故相對纍日因共偃臥光以足加帝腹上明日太史奏客星犯御坐甚急帝笑曰朕故人嚴子陵共臥耳蜀楊戲傳篤於舊故與韓儼黎韜童幼相親厚後儼痼疾廢頓韜無行見捐戲振恤恩好如初新唐薑皎傳玄宗在藩邸皎識其有非常度委心焉及即位召出內陪燕私詔與妃嬪連榻詔曰雖彭祖同書子陵共學不過也前漢陳勝傳初為王其故人嘗與傭耕者聞之乃之陳叩宮門宮門令不肯為通勝出遮道而呼涉載與歸客出入愈益發舒言勝故情或言客愚無知專妄言輕威勝斬之諸故人皆自引去由是無親勝者箋證漢書循吏朱邑傳為人淳厚篤於故舊然性公正不可交以私天子器之朝廷敬焉後漢書嚴光傳光武復引光入論道舊故相對纍日帝從容問光曰朕何如昔時對曰陛下差增於往因共偃臥光以足加帝腹上明日太史奏客星犯御座甚急帝笑曰朕故人嚴子陵共臥耳三國志蜀志楊戲傳戲性雖簡惰省略未嘗以甘言加人過情接物書符指事希有盈紙然篤於舊故居誠存厚與巴西韓儼黎韜童幼相親厚後儼痼疾廢頓韜無行見捐戲經紀振恤恩好如初新唐書薑皎傳皎長安中為尚衣奉御玄宗在藩邸皎識其有非常度委心焉及即位自潤州長史召授殿中少監出入臥內陪燕私詔許舍敬坐與妃嬪連榻詔曰雖彭祖同書子陵共學不過也漢書陳勝傳陳勝王凡六月初為王其故人嘗與傭耕者聞之乃之陳叩宮門曰吾欲見涉宮門令欲縛之自辨數乃置不肯為通勝出遮道而呼涉乃召見載與歸客出入愈益發舒言勝故情或言客愚無知專妄言輕威勝斬之諸故人皆自引去由是無親勝者客止可觀第二前漢薛宣傳宣為人好威儀進止雍容甚可觀也魏明帝紀景初三年注帝容止可觀望之儼然自在東宮不交朝臣不問政事惟潛思書籍而已箋證漢書薛宣傳宣為人好威儀進止雍容甚可觀也三國志魏志明帝注引魏書曰帝容止可觀望之儼然自在東宮不交朝臣不問政事唯潛思書籍而已不修威儀第三前漢張敞傳然敞無威儀時罷朝會過走馬章臺街使御吏驅自以便面扇之類拊馬魏管輅傳容貌粗醜無威儀而嗜酒飲食言戲不擇非類故人多愛之而不敬也晉郭璞傳性輕易不修威儀嗜酒好色干寶常戒之曰此非適性之道也璞曰吾所受有本限用之常恐不得盡卿乃憂酒色之為害乎箋證漢書張敞傳然敞無威儀時罷朝會過走馬章臺街使御吏驅自以便面便面所以障面蓋車扇之類也拊馬三國志魏志管輅傳管輅字公明平原人也容貌粗醜無威儀而嗜酒飲食言戲不擇非類故人多愛之而不敬也晉書郭璞傳然性輕易不修威儀嗜酒好色時或過度著作郎干寶常誡之曰此非適性之道也璞曰吾所受有本限用之恆恐不得盡卿乃憂酒色之為患乎兩雄相持第四史記廉頗傳相如為上卿位在廉頗之右廉頗曰我有攻城野戰之大功相如徒以口舌我見相如必辱之相如每朝時常稱病不欲與廉頗爭列出望見廉頗引車避匿舍人諫曰吾念之強秦之不敢加兵於趙者徒以吾兩人在也今兩虎共鬭其勢不俱生吾所以為此者以先國家之急而後私讎也前漢西南夷兩粵朝鮮傳南粵王趙他黃屋左纛文帝元年使陸賈賜他書陸賈至南粵王恐乃謝願奉明詔長為藩臣下令國中曰吾聞兩雄不俱立兩賢不並世漢皇帝賢天子自今以來去帝制因為書稱蠻夷後漢寇恂傳執金吾賈復在汝南部將殺人於穎川恂捕得繫獄時尚草創軍營犯法率多相容恂乃戮之於市復以為恥歎還過穎川謂左右曰吾與寇恂並列將師而今為其所陷大丈夫豈有懷侵怨而不決之者乎今見恂必手劍之恂知其謀曰昔藺相如不畏秦王而屈於廉頗者為國也吾安可以忘之乎乃勑屬縣盛供具儲酒醪執金吾軍入界一人皆兼二人之饌恂乃出迎於道稱疾而還賈復勒兵欲追之而吏士皆醉遂過去恂遣谷崇以狀聞帝乃召恂恂至引見時復先在坐欲起相避帝曰天下未定兩虎安得私鬭今日朕分之於是並坐極歡遂共車同出結友而去後漢劉表傳及曹操與袁紹相持於官渡紹遣人求助表許之不至亦不援曹操且欲觀天下之變韓嵩劉先説表曰今豪傑並事兩雄相持若欲有為起乘其弊可也如其不然固將擇所宜從豈可坐觀成敗求援而不能助見賢而不肯歸此兩怨必集於將軍恐不得中立矣箋證史記廉頗傳既罷歸國以相如功大拜為上卿位在廉頗之右廉頗曰我為趙將有攻城野戰之大功而藺相如徒以口舌為勞而位居我上且相如素賤人吾羞不認為之下宣言曰我見相如必辱之相如聞不肯與會相如每朝時常稱病不欲與廉頗爭列已而相如出望見廉頗相如引車避匿於是舍人相與諫曰吾念之強秦之所以不敢加兵於趙者徒以吾兩人在也今兩虎共鬭其勢不俱生吾所以為此者以先國家之急而後私讎也漢書西南夷兩粵朝鮮傳南粵王趙他乃乘黃屋左纛稱制與中國侔文帝元年使陸賈賜他書陸賈至南粵王恐乃頓首謝願奉明詔長為藩臣奉供職於是下令國中曰吾聞兩雄不俱立兩賢不並世漢皇帝賢天子自今以來去帝制黃屋左纛因為書稱蠻夷大長老夫臣他昧死再拜上書皇帝陛下老夫故粵吏也高皇帝幸賜臣他璽以為南粵王使為外臣時內供職後漢書寇恂傳執金吾賈復在汝南部將殺人於穎川恂捕得繫獄時尚草創軍營犯法率多相容恂乃戮之於市復以為恥歎還過穎川謂左右曰吾與寇恂並列將帥而今為其所陷大丈夫豈有懷侵怨而不決之者乎今見恂必手劍之恂知其謀曰不然昔藺相如不畏秦王而屈於廉頗者為國也區區之趙尚有此義吾安可以忘之乎乃恂屬縣盛供具儲酒醪執金吾軍入界一人皆兼二人之饌恂乃出迎於道稱疾而還賈復勒兵欲追之而吏士皆醉遂過去恂遣谷崇以狀聞帝乃徵恂恂至引見時復先在坐欲起相避帝曰天下未定兩虎安得私鬭今日朕分之於是並坐極歡遂共車同出結友而去後漢書劉表傳及曹操與袁紹相持於官度紹遣人求助表許之不至亦不援曹操且欲觀天下之變從事中郎南陽韓嵩別駕劉先説表曰今豪傑並爭兩雄相持天下之重在於將軍若欲有為起乘其敝可也如其不然固將擇所宜從豈可擁甲十萬坐觀成敗求援而不能助見賢而不肯歸此兩怨必集於將軍恐不得中立矣姦人之雄第五前漢朱博傳左將軍彭宣劾奏博執左道虧損上恩以結信貴戚背君嚮臣傾亂政治姦人之雄臣請詔謁者召博詣廷尉前漢原涉傳專以賑施貧窮赴人之急為務後人有毀涉姦人之雄也前漢鮑宣傳方陵侯孫龍宣陽侯息夫躬辨足以移衆強可用獨立姦人之雄也箋證漢書朱博傳玄辭服有詔左將軍彭宣與中朝者雜問宣等劾奏博執左道虧損上恩以結信貴戚背君鄉臣傾亂政治姦人之雄臣請詔謁者召博玄晏詣廷尉詔獄漢書原涉傳專以振施貧窮赴人之急為務後人有毀涉者曰姦人之雄也喪家子歲時刺殺言者漢書鮑宣傳方陽侯孫寵宜陵侯息夫躬辨足以移衆強可用獨立姦人之雄或世尤劇者也宜以時罷退少有才智第六史記甘羅傳年十二事秦相文信侯呂不韋秦使張唐往相燕欲共伐趙張唐謂文信侯曰臣嘗代趙趙怨臣曰得唐者與百里之地今之燕必經趙臣不可以行文信侯不快甘羅曰臣請行之文信侯叱曰去我身自請之而不肯汝焉能行之甘羅曰夫項橐生七歲為孔子師今臣年十二君其試臣何遽叱乎於是甘羅見張卿曰卿之功熟與武安君卿曰不如也應侯之用於秦也孰與文信侯專張卿曰應侯不如羅曰應侯欲攻趙武安君難之去咸陽七里而立死於社郵今文信侯自請卿相燕而不肯行臣不知卿死所處矣張唐曰請因孺子行餘見本傳前漢賈誼雒陽人也年十八以能誦詩書屬文稱於郡中何南守吳公聞其秀材召置門下文帝初立聞吳公治平為第一召以為廷尉乃言誼年少頗通諸家之書文帝召以為博士是時誼年二十餘最為少每詔令議下諸老先生未能言誼盡為之對人人各如其意所出諸生於是以為能文帝説之後漢郎顗傳曰夫有出倫之才不應限以官次昔顏子十八天下歸仁子奇稚齒化阿有聲子奇十八為阿邑宰後漢趙喜傳更始乃召喜喜年未二十既引見更始笑曰繭栗犢豈能附重致遠乎即除為郎中行偏將軍事使詣舞陰而李氏遂降喜因進入穎川擊諸不下者歷汝南界還宛更始大悅謂喜曰卿名家駒弩力勉之後漢張堪傳年十六受業長安志美行厲諸儒號曰聖童魏鄧哀王沖傳生五六歲智意所及有若成人之智時孫權曾致巨象太祖欲知其斤重訪之群下咸莫能出其理沖曰置象大船之上而刻其水痕所至稱物以載之則校可知矣吳陸績傳孫策在吳張昭張紘秦松為上賓共論四海未泰須當用武治之績年少未坐遙大聲言曰昔管夷吾相齊桓公九合諸侯一正天下不用兵車孔子曰遠人不服則修文德以來之今論者不務道德懷取之術而惟尚武績雖童蒙竊所未安也昭等異焉吳張昭傳昭弟子奮年二十造作攻城大攻車為步騭所薦昭不願曰汝年尚少何為自委於軍旅乎奮對曰昔童注死難子奇治阿奮實不才耳於年不為少也遂領兵為將軍連有功效封樂鄉亭侯晉陸雲傳尚書閔鴻見而奇之曰此兒若非龍駒當是鳳雛後舉雲賢良箋證史記甘羅傳甘羅者甘茂孫也茂既死後甘羅年十二事秦相文信侯呂不韋秦使張唐往相燕欲與燕共伐趙以廣河間之地張唐謂文信侯曰臣嘗為秦昭王伐趙趙怨臣曰得唐者與百里之地今之燕必經趙臣不可以行文信侯不快甘羅曰臣請行之文信侯叱曰去我身自請之而不肯女焉能行之甘羅曰夫項橐生七歲為孔子師今臣生十二歲於茲矣君其試臣何遽叱乎於是甘羅見張卿曰卿之功孰與武安君卿曰不如也甘羅曰應侯之用於秦也孰與文信侯專張卿曰應侯不如文信侯專甘羅曰應侯欲攻趙武安君難之去咸陽七里而立死於杜郵今文信侯自請卿相燕而不肯行臣不知卿所死處矣張唐曰請因孺子行餘見本傳漢書賈誼雒陽人也年十八以能誦詩書屬文稱於郡中河南守吳公聞其秀材召置門下甚幸愛文帝初立聞河南守吳公治平為天下第一故與李斯同邑而嘗學事焉徵以為廷尉廷尉乃言誼年少頗通諸家之書文帝召以為博士是時誼年二十餘最為少每詔令議下諸老先生未能言誼盡為之對人人各如其意所出諸生於是以為能文帝説之超遷歲中至太中大夫後漢書郎顗傳曰夫有出倫之才不應限以官次昔顏子十八天下歸仁子奇稚齒化阿有聲子奇齊人年十八為阿邑宰出倉廩以振貧之邑內大化後漢書趙喜傳更始乃徵喜喜年未二十既引見更始笑曰繭栗犢豈能負重致遠乎即除為郎中行偏將軍事使詣舞陰而李氏遂降喜因進入穎川擊諸不下者歷汝南界還宛更始大悅謂喜曰卿名家駒努力勉之後漢書張堪傳年十六受業長安志美行厲諸儒號曰聖童三國志魏志鄧哀王沖傳鄧哀王沖字倉舒少聰察岐嶷生五六歲智意所及有若成人之智時孫權曾致巨象太祖欲知其斤重訪之群下咸莫能出其理沖曰置象大船之上而刻其水痕所至稱物以載之則校可知矣三國志吳志陸績傳孫策在吳張昭張紘秦松為上賓共論四海未泰須當用武治而平之績年少末坐遙大聲言曰昔管夷吾相齊桓公九合諸侯一匡天下不用兵車孔子曰遠人不服則修文德以來之今論者不務道德懷取之術而惟尚武績雖童蒙竊所未安也昭等異焉三國志吳志張昭傳昭弟子奮年二十造作攻城大攻車為步騭所薦昭不願曰汝年尚少何為自委於軍旅乎奮對曰昔童汪死難子奇治阿奮實不才耳於年不為少也遂領兵為將軍連有功效至半州都督封樂鄉亭侯晉書陸雲傳幼時吳尚書廣陵閔鴻見而奇之曰此兒若非龍駒當是鳳雛後舉雲賢良時年十六卜筮第七史記龜榮傳太史公曰自古聖王將建國受命興動事業何嘗不寶卜筮以助善唐虞以上不可記已自三代之興各據其祥塗山之兆從而夏啓世飛燕之卜順故殷興百榖之筮吉故周王王者決定諸疑參以卜筮斷以蓍龜不易之道也蠻夷氐羌雖無君臣之序亦有決疑之卜或以金石或以草木國不同俗然皆可以戰伐攻擊推兵求勝各信其神以知來事略聞夏殷欲卜者乃取蓍龜已則棄去之以為龜藏則不靈蓍久則不神至周室之卜官常寶藏蓍龜又其大小先後各有所尚要其歸等耳或以為聖王遭事無不定決疑無不見其設稽神求問之道者以為後世衰微愚不師智人各自安化分為百室道收而無埌故推歸之至微要潔於精神也或以為昆蟲之所長聖人不能與爭其處吉凶別然否多中於人史記日者司馬季主傳曰今夫卜者必法天地象四時順於仁義分策定卦旋式正棋然後言天地之利害事之成敗史記日者傳自古受命王者之興何嘗不以卜筮決于天命哉前漢藝文志蓍龜者聖人之所用也書曰汝則有大疑謀及卜筮易曰定天下之吉凶成天下之亹亹者莫善於蓍龜是故君子將有為也將有行也問焉而已言其受命也如嚮無有遠近幽深遂知來物非天下之至精其孰能與於此及至衰世解於齊戒而婁煩卜筮神明不應故筮瀆不告易以為忌龜厭不告詩以為刺前漢嚴君平傳君平小筮於成都市以為卜筮者賤業而可以惠衆人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順各因藝導之以善從吾言者巳過半矣前漢張禹傳禹見時有變異若上體不安擇日縻齊露蓍正衣冠立筮得吉卦則獻其占如有不吉禹為感動憂色後漢許曼傳隴西太守馮緄始拜郡開綬笥有兩赤蛇分南北走緄令曼筮之卦成曼曰三歲之後君當為邊將官有東名當東北行二千里復五年更為大將軍南征延熹元年緄出為遼東太守討鮮卑至五年復拜車騎將軍擊武陵蠻賊皆如占魏管輅傳始輅過魏郡太守鍾育共論易義輅因言卜可知君死生之日育使筮其生日月如言無蹉跌育大愕然曰君可畏也死以付天不以付君遂不復筮餘事見本傳晉郭璞傳有郭公者客居河東精於卜筮璞從之受業公以青囊中書九卷與之由是遂洞五行天文卜筮之術攘災轉禍通致無方雖京房管輅不能過也晉杜不愆少就外祖郭璞學易卜屢有驗郗超年二十餘得重疾試令筮之不愆曰卿所苦尋除然宜於東北三十里上宮姓家索其所養雄雉籠盛置東簷下卻後九日景午日午時必當有雌雉飛來與交既而雙去若如此不出二十日病都除又是休應年將八十位極人臣若但雌逝雄留者病一周方差年半八十名位亦失超時正羸篤慮命在旦夕笑而答曰若保八十之半便有餘矣一周病差何足為淹使未之信或勸依其言索雉果得至景午日超臥南軒之下觀之至日晏果有雌雉飛入籠與雄雉交而去雄雉不動超歎息曰雖管郭之奇何以尚此超病彌年乃起至四十卒於中書郎晉隗照善於易臨終書版授其妻曰吾亡後當太荒窮雖爾慎莫賣宅也卻後五年春當有詔使來頓此亭姓龔此吾金即以此版往責之照亡後其家大困乏欲賣宅憶夫言輒止期日有龔使者此亭中妻遂齎版往責之使者執版惘然不知所以妻曰夫臨亡手書版見命如此不敢妄也使者沈吟良久而悟謂曰賢夫何善妻曰夫善於易而未曾為人卜也使者曰噫可知矣乃命取蓍筮之卦成撫掌而歎曰妙哉隗生含明隱迹可謂鏡窮達而洞吉凶者也於是告照妻曰吾不相負金也賢夫自有金耳知亡後當暫窮故藏金以待太平所以不告兒婦者恐金盡而困無日也知吾善易故書版以寄意耳金有五百斤盛以青甕覆以銅袢埋在堂屋東頭去壁一丈入地九尺妻還掘之皆如卜焉新唐盧藏用傳曰任賢使能不時日而利明法審令不卜筮而吉養勞貴功不禱祠而福乃為析滯論以暢其方新唐方伎傳序凡推步卜相醫巧皆枝也能以技自顯于一世亦悟之天非積習致然然士君子能之則不迂不泥不矜不神小人能之則迂而入諸拘礙泥而弗通大方矜以夸衆神以誣人故前聖不以為教蓋吝之也若李淳風諫太宗不濫誅許胤宗不著方劑書聲撰諫不合乾陵乃卓然有益于時者慈可珍也至遠知果撫等詭行初怪又技之下者焉箋證史記龜榮傳太史公曰自古聖王將建國受命興動事業何嘗不寶卜筮以助善唐虞以上不可記已自三代之興各據禎祥塗山之兆從而夏啓世飛燕之卜順故殷興百榖之筮吉故周王王者決定諸疑參以卜筮斷以蓍龜不易之道也蠻夷氐羌雖無君臣之序亦有決疑之卜或以金石或以草木國不同俗然皆可以戰伐攻擊推兵求勝各信其神以知來事略聞夏殷欲卜者乃取蓍龜已則棄去之以為龜藏則不靈蓍久則不神至周室之卜官常寶藏蓍龜又其大小先後各有所尚要其歸等耳或以為聖王遭事無不定決疑無不見其設稽神求問之道者以為後世衰微愚不師智人各自安化分為百室道散而無垠故推歸之至微要潔於精神也或以為昆蟲之所長聖人不能與爭其處吉凶別然否多中於人史記日者司馬季主傳述而不作君子義也今夫卜者必法天地象四時順於仁義分策定卦旋式正棋然後言天地之利害事之成敗史記日者傳自古受命而王王者之興何嘗不以卜筮決于天命哉漢書藝文志蓍龜者聖人之所用也書曰女則有