body:
  text: 卷第十賢愚分第一史記日者司馬季王傳故騏驥不能與罷驢為駟而鳳凰不與燕雀為群而賢者亦不與不肖者同列前漢五行志堯舜舉群賢而命之朝謂稷卨以下遠四佞而放諸埜孔子曰浸潤之譖膚受之訴不行焉可謂明矣賢佞分別官人有序欽重功勳殊別適庶如此則火得其性矣後漢傅燮傳傅燮上疏曰邪正之人不宜共國亦猶水炭不可同器後漢王符傳度遼將軍皇甫規鄉人有以貨得雁門大守者謁規規臥不迎既入而問卿前在郡食雁美乎有頃又白王符在門衣不及帶屣履出迎援符手而還與同坐極歡時人為之語曰徒見二千石不如一摓掖言書生道義之為貴也魏何夔傳夔言於太祖曰自今所用必先核之鄉間使長幼順敘無相踰越顯忠直之賞明公實之報則賢不肖之分居然別矣新唐裴度傳嘗語臣事君勵善底公朕惡夫樹朋黨者度曰君子小人以類而聚未有旡徒者君子之徒同德小人之徒同惡外甚類中實遠在陛下觀所行則辨帝曰言者大抵若此朕豈易辨之度退喜曰上以為難辨則易以為易辨則難君子小人行判矣箋證史記日者列傳司馬季主者楚人也卜于長安東市宋忠為中大夫賈誼為博士同日俱出洗沐相從論議誦易先王聖人之道術究徧人情相視而嘆賈誼曰吾聞古之聖人不居朝廷必在卜醫之中今吾已見三公九卿朝士大夫皆可知矣試之卜數中以觀采二人即同輿而之市游于卜肆中天新雨道少人司馬季主閒坐弟子三四人侍方辯天地之道日月之運陰陽吉凶之本二大夫再拜謁司馬季主視其狀貌如類有知者即禮之使弟子延之坐坐定司馬季主復理前語分別天地之終始日月星辰之紀差次仁義之際列吉凶之符語數千言莫不順理宋忠賈誼瞿然而悟獵纓正襟危坐索隱獵攬也攬其冠纓而正其衣襟謂變而自飾也危一作免謂俯俛為敬司馬季主曰今夫卜者導惑教愚也夫愚惑之人豈能以一言而知之哉言不厭多故騏驥不能與罷驢為駟而鳳凰不與燕雀為群而賢者亦不與不肖者同列漢書五行志傳曰棄法律逐功臣殺太子以妾為妻則火不炎上書云知人則悊能官人師古曰虞書咎繇謩之辭悊智也能知其材則能官之所以為智也故堯舜舉群賢而命之朝師古曰謂稷卨以下遠四佞而放諸將師古曰四佞即四凶也遠離也壄古野字孔子曰浸潤之譖膚受之訴不行焉可謂明矣賢佞分別官人有序帥由舊章師古曰帥循也敬重功德殊別適庶師古曰適讀曰嫡如此則火得其性矣後漢書傅爕傳傅爕字南容北地靈州人也本字幼起慕南容三復白圭乃易字焉少師事太尉劉寬再舉孝廉後為護軍司馬與左中郎皇甫嵩俱討賊張角爕素疾中官既行因上疏曰臣聞天下之禍不由於外皆興於內何者夫邪正之人不宜共國亦猶冰炭不可同器後漢書王符傳王符字節信安定臨涇人也少好學有志操與馬融竇章張衡崔瑗等友善符獨耿介不同於俗以此遂不得升進志意蘊憤乃隱居著書三十餘篇以譏當時失得不欲章顯其名故號曰潛夫論後度遼將軍皇甫規解官歸安定鄉人有以貨得鴈門太守者亦去職還家書刺謁規規臥不迎既入而問卿前在郡食鴈美乎有頃又白王符在門規素聞符名乃驚遽而起衣不及帶屣履出迎援符手而還與同坐極歡時人為之語曰徒見二千石不如一縫掖禮記儒行孔子曰丘少居魯衣逢掖之衣鄭玄注曰逢猶大也大掖之衣大袂單衣也言書生道義之為貴也三國志魏志何夔傳何夔字叔龍陳郡陽夏人也高祖父熙漢安帝時官至車騎將軍夔幼喪父與母兄居以孝友稱太祖以夔前在長廣有威信拜樂安太守到官數月諸城悉平入為丞相東曹掾夔言於太祖曰自軍興以來制度草創用人未詳其本自今所用必先核之鄉閭使長幼順敘無相踰越顯忠直之賞明公實之報則賢不肖之分居然別矣新唐書裴度傳帝嘗語臣事君當勵善底公朕惡夫樹黨者度曰君子小人以類而聚未有無徒者君子之徒同德小人之徒同惡外甚類中實遠在陛下觀所行則辨帝曰言者大抵若此朕豈易辨之度退喜曰上以為難辨則易以為易辨則難君子小人行判矣賢愚不分第二史記屈原傳變白為黑兮倒上而為下鳳凰在笯兮雞雉翔舞笯籠落也同糅玉石兮一概而相量史記賈誼傳鸞鳳伏竄兮鴟梟翱翔闒茸尊顯兮讒諛得志賢聖逆曳兮方正倒植世謂伯夷貪兮謂盜跖廉莫邪為鈍兮鈆刀為銛莫邪吳大天也作寶劍因以名銛思廉反謂利也史記日者傳司馬季主曰見夫被髮童子乎日月照之則行不照則止問之日月疪瑕吉凶則不能理由是觀之能知別賢與不肖者寡矣史記屈原傳人君無愚智賢不肖莫不欲求忠以自為舉賢以自佐然亡國破家相隨屬者其所謂忠者不忠而所謂賢者不賢也懷王以不知忠臣之分故內惑於鄭袖外欺於張儀疏屈平而信上官大夫令尹子蘭兵挫地削亡其六郡身客死於秦為天下笑此不知人之禍也前漢鄒陽曰人主沈諂諛之辭牽帷廧之制使不羈之士與牛驥同皁前漢董仲舒傳且古所謂功者以任官稱職為差非所謂積日絫久也故小材雖絫日不離於小官賢材雖未久不害為輔佐是以有司竭力盡知務治其業而以赴功今則不然累日以取貴積久以致官是以廉恥貿亂賢不肖渾殽未得其真前漢劉向上封事諫曰今賢不肖渾殽白黑不分邪正雜糅忠讒並進章交公車人滿北軍後漢黃瓊傳上書言黃門協邪自梁冀興盛共搆姦軌臨冀當誅復記其惡以要爵賞陛下不加清澂審別真偽復與忠臣並時顯封使朱紫共色粉墨雜蹂所謂扺金玉於沙礫碎珪璧於泥塗箋證史記屈原賈生列傳屈原者名平楚之同姓也上官大夫短屈原於頃襄王頃襄王怒而遷之屈原至於江濱被髮行吟澤畔顏色憔悴形容枯槁漁父見而問之曰子非三閭大夫歟何故而至此屈原曰舉世混濁而我獨清眾人皆醉而我獨醒是以見放乃作懷沙之賦其辭曰變白而為黑兮倒上以為下鳳凰在笯兮雞雉翔舞集解徐廣曰笯一作郊駰案王逸曰笯籠落也同糅玉石兮一概而相量史記屈原賈生列傳賈生名誼雒陽人也賈生任公卿之位絳灌東陽侯馮敬之屬盡害之於是天子後亦疏之不用其議乃以賈生為長沙王太傅賈生既辭往行聞長沙卑溼自以壽不得長又以適去意不自得及度湘水為賦以弔屈原其辭曰鸞鳳伏竄兮鴟梟翱翔闒茸尊顯兮讒諛得志賢聖逆曳兮方正倒植世謂伯夷貪兮謂盜跖廉莫邪為頓兮集解駰案莫邪吳大夫也作寶劍因以名頓讀為鈍鈆刀為銛集解徐廣曰思廉反駰案漢書音義曰銛謂利索隱鈆者錫也銛利也音纖言其暗惑也史記日者列傳司馬季主曰公且安坐公見夫被髮童子乎日月照之則行不照則止問之日月疵瑕吉凶則不能理由是觀之能知別賢與不肖者寡矣史記屈原賈生列傳人君無愚智賢不肖索隱此已下太史公傷楚懷王之不任賢信讒而不能反國之論也莫不欲求忠以自為舉賢以自佐然亡國破家相隨屬而聖君治國累世而不見者其所謂忠者不忠而所謂賢者不賢也懷王以不知忠臣之分故內惑於鄭袖外欺於張儀疏屈平而信上官大夫令尹子蘭兵挫地削亡其六郡身客死於秦為天下笑此不知人之禍也漢書鄒陽傳迺從獄中上書曰周文王獵涇渭載呂尚歸以王天下秦信左右而亡周用烏集而王何則以其能越攣拘之語馳域外之議獨觀乎昭曠之道也今人主沈諂諛之辭牽帷廧之制使不羈之士與牛驥同皁師古曰不羈言才識高遠不可羈係也皁櫪也楊雄方言云梁宋齊楚燕之間謂櫪曰皁皁音在早反漢書董仲舒傳仲舒對曰夫長吏多出於郎中中郎吏二千石子弟選郎吏又以富訾未必賢也且古所謂功者以任官稱職為差師古曰差次也非所謂積日絫久也故小材雖絫日不離於小官賢材雖未久不害為輔佐是以有司竭力盡知務治其業而以赴功今則不然絫日以取貴積久以致官是以廉恥貿亂賢不肖渾殽未得其真漢書楚元王傳附劉向向字子政本名更生年十二以父德任為輦郎既冠以行修飭擢為諫大夫是時宣帝循武帝故事招選名儒俊材置左右更生以通達能屬文辭與王褒張子僑等並進對望之自殺天子甚悼恨之乃擢周堪為光祿勳堪弟子張猛光祿大夫給事中大見信任恭顯憚之數譖毀焉更生見堪猛在位幾已得復進懼其傾危乃上封事諫曰今陛下開三代之業招文學之士優游寬容使得並進今賢不肖渾殽白黑不分邪正雜糅忠讒並進章交公車人滿北軍後漢書黃瓊傳黃瓊疾篤上疏諫曰臣聞天者務剛其氣君者務彊其政尚書周永昔為沛令素事梁冀幸其威埶坐事當罪越拜令職見冀將衰乃陽毀示忠遂因姦計亦取封侯又黃門協邪群輩相黨自冀興盛腹背相親朝夕圖謀共搆姦軌臨冀當誅無可設巧復記其惡以要爵賞陛下不加清徵審別真偽復與忠臣並時顯封使朱紫共色粉墨雜蹂所謂抵金玉於沙礫碎珪璧於泥塗進善退惡第三前漢成帝紀河平元年詔百寮各修其職惇任仁人退遠殘賊前漢劉向上對事諫曰夫執狐疑之心者來讒賊之口持不斷之意者開群枉之門讒邪進則眾賢退群枉盛則正士消故易有否泰小人道長君子道消君子道消則政日亂故為否否者閉而亂也君子道長小人道消小人道消則政日治故為泰泰者通而治也詩又云雨雪麃麃見睍聿消與易同義昔者鯀共工驩兜與舜禹雜處堯朝周公與管蔡並居周位當是時迭進相毀流言相謗豈可勝道哉帝堯成王能賢舜禹周公而消共工管蔡故以大治榮華至今孔子與季孟偕仕於魯李斯與叔孫俱宦於秦定公始皇賢季孟李斯而消孔子叔孫故以大亂污辱至今故治亂榮辱之端在所信任信任既賢在於堅固而不移也前漢薛宣為中丞舉奏部剌史郡國二千石所貶退稱進白黑分明白黑清濁也前漢五行志兩觀桓釐廟亳社四者皆不當立天皆燔其不當立者以示魯欲其去亂臣而用聖人也後漢光武紀詔曰中都官三輔郡國務進柔良退貪酷後漢孝章紀立秋案驗有司明慎選舉進柔良退貪猾後漢傅燮傳上疏曰臣聞虞舜升朝先除四凶然後用十六相明惡人不去則善人無由進也晉荀勗傳在尚書課試令史以下覈其才能有闇於文法不能決疑處事者即時遣出帝嘗謂曰魏武帝言荀文若之進善不進不止荀公達之退惡不退不休二令君之美亦望於君也新唐蘇安恒傳魏元忠為張易之兄弟所構安恒抗疏申救曰王者有容天下之量故濟其心能進天下之善故除其惡不然則神鬼馮怒陰陽紛舛餘見賢愚分門五行志箋證漢書成帝紀河平元年夏四月己亥晦日有蝕之既詔曰百寮各修其職惇任仁人退遠殘賊漢書楚元王傳附劉向更生見堪猛在位幾已得復進懼其傾危乃上封事諫曰夫執狐疑之心者來讒賊之口持不斷之意者開群枉之門讒邪進則眾賢退群枉盛則正士消故易有否泰小人道長君子道消君子道消則政日亂故為否否者閉而亂也君子道長小人道消小人道消則政日治故為泰泰者通而治也詩又云雨雪麃麃見晛聿消師古曰此小雅角弓篇與易同義昔者鯀共工驩兜與舜禹雜處堯朝周公與管蔡並居周位當是時迭進相毀流言相謗豈可勝道哉帝堯成王能賢舜禹周公而消共工管蔡故以大治榮華至今孔子與季孟偕仕於魯李斯與叔孫俱宦於秦定公始皇賢季孟李斯而消孔子叔孫故以大亂榮辱至今故治亂榮辱之端在所信任信任既賢在於堅固而不移漢書薛宣傳薛宣字贛君東海郯人也大將軍王鳳聞其能薦宣為長安令治果有名以明習文法詔補御史中丞是時成帝初即位宣為中丞宣數言政事便宜舉奏部刺史郡國二千石所貶退稱進白黑分明師古曰稱舉也白黑猶言清濁也繇是知名卷八十三漢書五行志哀公三年五月桓宮釐宮災二者同事所為一也若曰燔貴而去不義云爾哀公未能見故四年六月毫社災兩觀桓釐廟亳社四者皆不當立天皆燔其不當立者以示魯欲其去亂臣而用聖人也季氏亡道久矣前是天不見災者魯未有賢聖臣雖欲去季孫其力不能昭公是也師古曰前是謂此時之前也見顯示也音胡電反以下並同後漢書光武帝紀五月丙子詔曰久旱傷麥秋種未下朕甚憂之將殘吏未勝獄多冤結元元愁恨感動天氣乎其令中都官三輔郡國出繫囚罪非犯殊死一切勿案見徒免為庶人務進柔良退貪酷各正厥事焉後漢書章帝紀建初元年春正月丙寅詔曰比年牛多疾疫墾田減少穀價頗貴人以流亡群公庶尹各推精誠專急人事罪非殊死須立秋案驗有司明慎選舉進柔良退貪猾後漢書傅爕傳爕素疾中官既行因上疏曰臣聞天下之禍不由於外皆興於內是故虞舜升朝先除四凶然後用十六相明惡人不去則善人無由進也晉書荀勗傳荀勗字公曾潁川潁陰人漢司空爽曾孫也勗久在中書專管機事及失之甚惘惘悵悵或有賀之者勗曰奪我鳳凰池諸君賀我邪及在尚書課試令史以下覈其才能有闇於文法不能決疑處事者即時遣出帝嘗謂曰魏武帝言荀文若之進善不進不止荀公達之退惡不退不休二令君之美亦望於君也新唐書蘇安恒傳蘇安恒冀州武邑人博學尤明周官春秋左氏學武后末年太子雖還東宮政事一不與大臣畏禍無敢言安恒投匭上書明年復諫書聞不報於是魏元忠為張易之兄弟所搆獄方急安恒獨申救曰王者有容天下之量故濟其心能進天下之善故除其惡不然則神鬼馮怒陰陽紛舛退善進惡第四後漢張衡傳遷侍中帝引在惟幄諷誼左右嘗問衡天下所疾惡者宦官懼其毀己皆共目之遂作思玄賦曰珍蕭艾於重笥兮謂蕙芷之不香蕭蒿也笥篋也蕙芷並香草也貴蕭艾喻任小人謂蕙芷為不香喻棄賢人也斥西施而弗御兮羈要梟以服箱斥遠也西施越之美女也要音於皎反呂氏春秋曰要梟古之駿馬也服駕也箱車也言疎遠美女又以駿馬駕車並喻不能用賢也晉譚曰上官昵而屈原放宰嚭寵而伍員戮豈不哀哉餘見進善退惡劉向傳箋證後漢書張衡傳張衡字平子南陽西鄂人也自中興之後儒者爭學圖緯兼復附以妖言衡以圖緯虛妄非聖人之法乃上疏曰臣聞聖人明審律歷以定吉凶重之以卜筮雜之以九宮宜收藏圖讖一禁絕之則朱紫無所眩典籍無瑕玷矣後遷侍中帝引在帷幄諷議左右嘗問衡天下所疾惡者宦官懼其毀已皆共目之衡乃詭對而出閹豎恐終為其患遂共饞之衡常思圖身之事以為吉凶倚伏幽微難明乃作思玄賦以宣寄情志其辭曰珍蕭艾於重笥兮謂蕙芷之不香蕭蒿也笥篋也蕙芷並香草也貴蕭艾喻任小人謂蕙芷為不香喻棄賢人也斥西施而弗御兮羈要裊以服箱斥遠也西施越之美女也要音於皎反裊音奴了反呂氏春秋曰要裊古之駿馬也服駕也箱車也言踈遠美女又以駿馬駕車並喻不能用賢也劉攽曰案要裊古良馬當作褭從馬晉書華譚傳華譚字令思廣陵人也祖融吳左將軍錄尚書事父諝吳黃門郎譚朞歲而孤母年十八便守節鞠養勤勞備至及長好學不倦爽慧有口辯為鄰里所重嵇紹舉譚秀才將行別駕陳摠餞之因問曰思賢之主以求才為務進取之士以功名為先此吳晉之滯論可辯此理而後別譚曰上官昵而屈原放宰嚭寵而伍員戮豈不哀哉賢者奔亡第五史記越世家越王滅吳號令中國以尊周室句踐以霸而范蠡稱上將軍范蠡以為大名之下難以久居為書辭句踐句踐曰孤將與子分國而有之不然將加誅于子乃持其輕寶珠玉乘舟浮海出齊變名姓自謂鴟夷子前漢董仲舒傳商紂逆天暴物殺戮賢知伯夷太公皆當世賢者隱處而不為臣守職之人皆奔走逃亡入于河海前漢梅福傳王莽顓政福一朝棄妻子去九江至今傳以為仙其後人有見福於會稽者變名姓為吳市門卒云後漢逸民傳漢室中微王莽篡位士之蘊藉義慎甚矣是時裂冠毀冕相攜持而去之者蓋不可勝數揚雄曰鴻飛冥冥弋者何慕焉言其違患之速也箋證史記越王勾踐世家范蠡事越王勾踐既苦身戮力與勾踐深謀二十餘年竟滅吳號令中國以尊周室勾踐以霸而范蠡稱上將軍還反國范蠡以為大名之下難以久居且勾踐為人可與同患難與處安為書辭勾踐曰臣聞主憂臣勞主辱臣死昔者君王辱於會稽所以不死為此事也今既以雪恥臣請從會稽之誅勾踐曰孤將與子分國而有之不然將加誅于子范蠡曰君行令臣行意乃裝其輕寶珠玉自與其私徒屬乘舟浮海以行終不反於是勾踐表會稽山以為范蠡奉邑范蠡浮海出齊變姓名自謂鴟夷子二漢書董仲舒傳仲舒對曰臣聞至於殷紂逆天暴物殺戮賢知殘賊百姓伯夷太公皆當世賢者隱處而不為臣守職之人皆奔走逃亡入於河海漢書梅福傳福居家常以讀書養性為事至元始中王莽顓政師古曰顓讀與專同福一朝棄妻子去九江至今傳以為仙其後人有見福於會稽者變名姓為吳市門卒云師古曰其後謂棄妻子去之後後漢書逸民列傳漢室中微王莽篡位士之蘊藉義憤甚矣是時裂冠毀冕相攜持而去之者蓋不可勝數揚雄曰鴻飛冥冥弋者何篡焉言其違患之遠也篡字諸本或作慕法言作篡宋衷曰篡取也鴻高飛冥冥薄天雖有弋人何施巧而取也喻賢者隱處不離暴亂之害也然今人謂以計數取物為篡篡亦取也無賢為輔第六前漢鮑宣上書諫曰朝臣亡有大儒骨鯁白首耆艾魁壘之士論議通古今喟然動眾心憂國如飢渴者臣未見也魁壘壯貌上音口賄反下音磊前漢董仲舒傳陛下思惟往古而務以求賢此亦堯舜之用心也然而未云獲者士素不厲也前漢李尋對哀帝曰屋大柱小可為寒心言天下事重大臣之任當得賢能者後漢翟酺傳上疏於安帝昔成王之政周公在前邵公在後畢公在左史佚在右四子挾而維之目見正容耳聞正言一日即位天下曠然言其法度素定也今陛下有成王之尊而無致子之佐雖欲崇雍熙致太平其可得乎箋證漢書鮑宣傳董賢貴幸宣以諫大夫從其後上書諫曰朝臣亡有大儒骨鯁白首耆艾魁壘之士服虔曰魁壘壯貌也師古曰魁音口賄反壘音磊議論通古今喟然動輒心憂國如飢渴者臣未見也漢書董仲舒傳陛下親耕藉田以為農先夙寤晨興憂勞萬民思惟往古而務以求賢此亦堯舜之用心也然而未云獲者士素不厲也漢書李尋傳哀帝初即位召尋待詔黃門使侍中衛尉傅喜問尋曰間者水出地動日月失度星辰亂行災異仍重極言毋有所諱尋對曰屋大柱小可為寒心師古曰言天下事重大臣之任當得賢能者後漢書翟酺傳翟酺字子超廣漢雒人也四世傳詩酺好老子尤善圖緯天文歷算以報舅讎當徙日南亡於長安為卜相工後牧羊涼州遇赦還仕郡徵拜議郎遷侍中時安帝始親政事酺上疏諫曰昔成王之政周公在前召公在後畢公在左史佚在右四子挾而維之目見正容耳聞正言一日即位天下曠然言其法度素定也今陛下有成王之尊而無數子之佐雖欲崇雍熙致太平其可得乎不能進賢第七臣不以時退與恭並立深知羌學又不能達慚負二老無顏於世誦而不行知而不言不可開口以為人師願推博士以避恭羌帝不許然由是重之後漢世祖召桓榮說尚書拜議郎授太子會歐陽博士缺帝欲用榮榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎楊州從事辠鴻帝曰俞往汝諧因引閎鴻為議郎餘見殺戮賢智門後漢志卷第六至第十箋證後漢書范升傳范升字辯卿代郡人也少孤依外家居九歲通論語孝經及長習梁丘易老子教授後生宣帝時梁丘賀之易也建武二年光武德詣懷宮拜議郎遷博士上疏讓曰臣與博士梁恭山陽太守避羌俱脩梁丘易二臣年並耆艾經學深明而臣不以時退與恭並立深知羌學又不能達慙負二老無顏於世誦而不行知而不言不可開口以為人師願推博士以避恭羌帝不許然由是重之後漢書桓榮傳建武十九年年六十餘始辟大司徒府時顯宗始立為皇太子選求明經乃擢榮弟子豫章何湯為虎賁中郎將以尚書授太子世祖從容問湯本師為誰湯對曰事沛國桓榮帝即召榮令說尚書甚善之拜為議郎賜錢十萬入使授太子每朝會輒令榮於公卿前敷奏經書帝稱善曰得生幾晚會歐陽博士缺帝欲用榮榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎揚州從事辠弘帝曰俞往汝諧因拜榮為博士引閎弘為議郎
