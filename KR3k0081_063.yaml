body:
  text: 卷第六十三常侍騎諫盎曰君衆辱之後雖惡君上不復信於是上用東宮趙談驂乘盎伏車前曰臣聞天子所與共六尺輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸之餘共載於是上笑下趙談談泣下車前漢蓋寬饒傳是時上方用刑法信任中尚書宦官寬饒奏封事曰方今聖道寖廢儒術不行以刑餘為周召言使奄人當權軸也以法律為詩書言以刑法成教化也順帝陽嘉四年初聽中官得以養子為後世襲封爵桓帝永興三年初以小黃門為守官令前漢佞幸石顯傳初元中蕭望之周堪劉更生皆給事中望之領尚書事知顯專權邪辟建白以為尚書百官之本國家樞機宜以通明公正處之武帝游宴後庭故用宦者非古制也宜罷中書宦官應古不近刑人元帝不聽繇是大與顯忤後皆害焉望之自殺堪更生廢錮不得復進用前漢成帝紀建始四年春罷中書宦官臣瓚曰漢初中人有中謁者令孝武加中謁者令為中書謁者令置僕射宣帝時任中書官弘恭為令石顯為僕射元帝即位數年恭死顯代為中書令專權用事至成帝乃罷其官後漢孝靈紀使宦者為令列於內署自是諸署悉以閹人為丞令後漢宦者傳鄧后以女主臨政朝臣國議無由參斷帷幄稱制下令不出房闈之間宮中小門謂之闈不得不委用刑人寄之國命非復掖廷永巷之職閨牖房闥之任也永巷及掖廷並署名也爾雅曰小閨謂之闥後漢黨錮傳桓靈之閒主荒政謬國命委於閒寺士子羞與為伍故匹夫抗憤處士橫議遂乃激揚名聲互相題拂品核公卿裁量執政婞直之風於斯行矣後漢桓典傳時宦官秉權典執政無所回避常乘驄馬京師畏憚為之語曰行行且止避驄馬御史後漢竇武傳蕃復說武曰因日食斥罷宦官武乃白太后曰故事故事黃門常侍但當給事省內典門戶主近署財物耳今乃使與政事而任權重子弟布列專為貧暴天下胸胸正以此故宜悉誅廢以清朝廷後漢朱穆傳上疏曰漢家舊典置侍中中常侍各一人省尚書事省覽也黃門侍郎一人傳發書奏傳通也皆用族姓引用士人有族望者自和熹太后以女主稱制不接公卿乃以閹人為常侍少黃門通命兩宮自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿德與參政事帝怒不應後漢張處虛傅沉深有才略不仕司空張溫數以禮辟不能致中平二年溫出征涼州賊邊章等將行處虛自田廬被褐帶索要說溫曰天下寇賊雲起豈不以黃門常侍無道故乎聞中貴人公卿已下當出祖道於平樂觀明公總天下威重握六師之要若於中坐酒酣鳴金鼓整行陳召軍正執有罪者誅之引兵還屯都亭以次翦除中官解天下之倒縣報海內之怨毒然後顯用隱逸忠正之士則邊章之徒宛轉股掌之上矣溫聞大震不能對良久謂處虛曰非不悅子之言顧吾不能行處虛乃歎曰事行則為福不行則為賊蜀董允傳後主愛宦人黃皓皓便僻佞慧允常上則正色諫主下則數責於皓皓畏允不敢為非終允之世皓位不過黃門丞陳秪代允為侍中與黃皓互相表裏皓始預政事祗死後皓從黃門令為中常侍奉車都尉操弄威柄終至覆國蜀人無不追思允晉五行志蜀劉禪炎興元年蜀地震是時宦人黃皓專權按司馬彪說閹官旡陽施猶婦人也皓見任之應與漢和帝時同事也是冬蜀亡新唐宦者傳序唐制內侍省官有內侍四內常侍六內謁者監內給事各十謁者十二典引十八寺伯寺人各六又有五局一曰掖廷主宮嬪簿最二曰宮闈扈門闌三曰奚宮治宮中疾病死喪四曰內僕主供帳鐙燭五曰內府主中藏給納局有令有丞皆宦者為之太宗詔內侍省不立三品官以內侍為之長階弟四不任以事惟門閣守禦廷內掃除廩食而已武后時稍增其人至中宗黃衣乃二千員七品以上員外置千員然衣朱紫者尚少玄宗承平財用富足志大事奢不愛惜賞賜爵位開元天寶中宮嬪大率至四萬宦宮黃衣以上三千員衣朱紫千餘人其稱旨者輒拜三品將軍列戟于門新唐宦者傳序輔國以尚父顯元振以援立奮朝恩以軍密重然猶未得常主兵也德宗懲艾泚賊故以左右神策天威等軍委宦者主之置護軍中尉中護軍分提禁兵是以威柄下遷政在宦人舉手伸縮便有輕重至慓士奇材則養以為子巨鎮彊藩則爭出我門小人之情猥險旡顧藉又日多侍天子狎則旡威習則不疑故昏君蔽於所昵英上禍生所忽新唐書宦者高力士傳四方奏請皆先省後進小事即專決雖洗沐未嘗出眠息帷殿中徼幸者願一見如天人然帝曰力士當上我寢乃安當是時宇文融李林甫蓋嘉運韋堅楊填矜王鉷楊國忠安祿山安思順高仙芝等雖以才寵進然皆厚結力士故能踵至將相新唐書宦者李輔國傳陳玄禮蕁誅楊國忠輔國豫謀又勸太子分中軍趨朔方收河隴兵圖興復太子至靈武愈親近勸遂即位係天下心擢家令判元帥府行軍司馬肅宗稍稍任以肱膂事更名護國又改今名凡四方章奏軍符禁寶一委之輔國新唐劉蕡傳贊曰漢武帝三策董仲舒所對陳天人大概緩而不切也蕡與諸儒偕進獨譏切宦官然亦太疏直矣戒帝漏言而身誦語于廷何邪其後宋申錫以謀泄貶李訓以計不臧死宦者遂強可不戒哉意蕡之賢當先以忠結上後為帝謀天下所以安危者庶其紓患耶新唐劉蕡傳元和末閽寺權盛握兵宮闈橫制天下天子廢立由其可否干撓庶政當時自為南北司愛惡相攻有同水火箋證漢書爰盎傳宦者趙談以數幸常害盎盎患之盎兄子種為常侍騎諫盎曰君衆辱之後雖惡君上不復信於是上朝東宮趙談驂乘盎伏車前曰臣聞天子所與共六尺輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸之餘共載於是上笑下趙談談泣下車漢書蓋寬饒傳是時上方用刑法信任中尚書宦官寬饒奏封事曰方今聖道寖廢儒術不行以刑餘為周召師古曰言使奄人當權軸也周謂周公旦也召謂召公奭也召讀曰邵以法律為詩書師古曰言以刑法成教化也後漢書順帝紀陽嘉四年春二月丙子初聽中官得以養子為後世襲封爵後漢書桓帝紀永壽三年六月初以小黃門為守宮令漢書佞幸傳石顯初元中前將軍蕭望之及光祿大夫周堪宗正劉更生皆給事中望之領尚書事知顯專權邪辟建白以為尚書百官之本國家樞機宜以通明公正處之武帝游宴後庭故用宦者非古制也宜罷中書宦官應古不近刑人元帝不聽繇是大與顯忤後皆害焉望之自殺堪更生廢錮不得復進用漢書成帝紀建始四年春罷中書宦官臣瓚曰漢初中人有中謁者令孝武加中謁者令為中書謁者令置僕射宣帝時任中書官弘恭為令石顯為僕射元帝即位數年恭死顯代為中書令專權用事至成帝乃罷其官後漢書靈帝紀熹平四年使宦者為令列於內署自是諸署悉以閹人為丞令後漢書宦者列傳鄧后以女主臨政而萬機殷遠朝臣國議無由參斷帷幄稱制下令不出房闈之間爾雅曰宮中小門謂之闈也不得不委用刑人寄之國命手握王爵口含天憲非復掖廷永巷之職閨牖房闥之任也永巷及掖廷並署名也爾雅曰小閨謂之闥後漢書黨錮列傳逮桓靈之間主荒政謬國命委於閹寺士子羞與為伍故匹夫抗憤處士橫議遂乃激揚名聲互相題拂品核公卿裁量執政婞直之風於斯行矣婞狠也音刑鼎反後漢書桓榮傳附玄孫桓典拜侍御史是時宦官秉權典執政無所回避常乘驄馬京師畏憚為之語曰行行且止避驄馬御史後漢書竇武傳會五月日食蕃復說武曰蕃以八十之年欲為將軍除害今可且因日食斥罷宦官以塞天變武乃白太后曰故事黃門常侍但當給事省內典門戶主近署財物耳今乃使與政事而任權重子弟布列專為貪暴天下胸胸正以此故宜悉誅廢以清朝廷後漢書朱暉傳附孫朱穆後穆因進見口復陳曰臣聞漢家舊典置侍中中常侍各一人省尚書事省覽也黃門侍郎一人傳發書奏傳通也皆用姓族引用士人有族望者自和熹太后以女主稱制不接公卿乃以閹人為常侍小黃門通命兩宮自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿德與參政事帝怒不應後漢書張霸傳附孫張玄玄字處虛沉深有才略以時亂不仕司空張歷數以禮辟不能致中平二年溫以車騎將軍出征涼州賊邊章等將行玄自田廬被褐帶索要說溫曰天下盜賊雲起豈不以黃門常侍無道故乎聞中貴人公卿以下當出祖道於平樂觀明公總天下威重握六師之要若於中坐酒酣鳴金鼓整行陳召軍正執有罪者誅之引兵還屯都亭以次翦除中官解天下之倒懸報海內之怨毒然後顯用隱逸忠正之士則邊章之徒宛轉股掌之上矣溫聞大震不能對良久謂玄曰處虛非不悅子之言顧吾不能行如何玄乃歎曰事行則為福不行則為賊三國志蜀志董允傳董允字休昭掌軍中郎將和之子也後主漸長大愛宦人黃皓皓便僻佞慧欲自容入允常上則正色匡主下則數責於皓皓畏允不敢為非終允之世皓位不過黃門丞陳祗代允為侍中與黃皓互相表裏皓始預政事祗死後皓從黃門令為中常侍奉車都尉操弄威柄終至覆國蜀人無不追思允晉書五行志蜀劉禪炎興元年蜀地震是時宦人黃皓專權按司馬彪說閹官無陽施猶婦人也皓見任之應與漢和帝時同事也是冬蜀亡新唐書宦者列傳序唐制內侍省官有內侍四內常侍六內謁者監內給事各十謁者十二典引十八寺伯寺人各六又有五局一曰掖廷主宮嬪簿最二曰宮闈扈門闌三曰奚官治宮中疾病死喪四曰內僕主供帳鐙燭五曰內府主中藏給納局有令有丞皆宦者為之太宗詔內侍省不立三品官以內侍為之長階第四不任以事惟門閣守禦廷內掃除稟食而已武后時稍增其人至中宗黃衣乃二千員七品以上員外置千員然衣朱紫者尚少玄宗承平財用富足志大事奢不愛惜賞賜爵位開元天寶中宮嬪大率至四萬宦官黃衣以上三千員衣朱紫千餘人其稱旨者輒拜三品將軍列戟于門新唐書宦者列傳序肅代庸弱倚為扞衛故輔國以尚父顯元振以援立奮朝恩以軍容重然猶未得常主兵也德宗懲艾泚賊故以左右神策天威等軍委宦者主之置護軍中尉中護軍分提禁兵是以威柄下遷政在宦人舉手伸縮便有輕重至慓士奇材則養以為子巨鎮彊藩則爭出我門小人之情猥險無顧藉又日夕侍天子狎則無威習則不疑故昏君蔽於所昵英主禍生所忽新唐書宦者列傳高力士高力士馮盎曾孫也聖歷初嶺南討擊使李千里上二閹兒曰金剛曰力士武后以其彊悟內給事左右坐纍逐出之中人高延福養為子故冒其姓玄宗在藩力士傾心附結已平韋氏乃啓屬內坊擢內給事先天中以誅蕭岑等功為右監門衛將軍知內侍省事於是四方奏請皆先省後進小事即專決雖洗沐未嘗出眠息殿帷中徼幸者願一見如天人然帝曰力士當上我寢乃安當是時宇文融李林甫蓋嘉運韋堅楊慎矜王鉷楊國忠安祿山安思順高仙芝等雖以才寵進然皆厚結力士故能踵至將相新唐書宦者列傳李輔國李輔國本名靜忠以閹奴為間廄小兒陳玄禮等誅楊國忠輔國豫謀又勸太子分中軍趨朔方收河隴兵圖興復太子至靈武愈親近勸遂即位係天下心擢家令判元帥府行軍司馬肅宗稍稍任以肱膂事更名護國又改今名凡四方章奏軍符禁寶一委之輔國新唐書劉蕡傳贊曰漢武帝三策董仲舒仲舒所對陳天人大概緩而不切也蕡與諸儒偕進獨譏切宦官然亦太疏直矣戒帝漏言而身誦語于廷何邪其後宋申錫以謀泄貶李訓以計不臧死宦者遂彊可不戒哉意蕡之賢當先以忠結上後為帝謀天下所以安危者庶其紓患耶舊唐書劉蕡傳自元和末閽寺權盛握兵宮闈橫制天下天子廢立由其可否干撓庶政當時目為南北司愛惡相攻有同水火好德不好色第二史記平原君傳平原君家樓臨民家民家有躄者槃散音行汲平原君美人居樓上臨見大笑之明日躄者至門請曰臣聞君之喜士士不遠千里而至者以君能貴士而賤妾也臣不幸有罷癃之病而君之後宮臨而笑臣臣願得笑臣者頭平原君笑應曰諾躄者去平原笑曰觀此豎子乃欲以一笑之故殺吾美人不亦甚乎終不殺居歲餘賓客門下舍人稍稍引去者過半平原君怪之門下一人前對曰以君之不殺笑躄者以君為愛色而賤士士即去耳於是平原君乃斬笑躄者美人頭自造門進躄者因謝焉其後門下乃復稍稍來後漢宋仲子傳當宴見御坐新屏風圖畫列女帝數顧視之仲子曰未見好德如好色者帝即為徹之笑謂弘曰聞義則服可乎對曰陛下進德臣不勝其喜新唐弘素蹇縱陰挾賊自重且惡光顏忠力思有以撓衊之乃飭名姝教歌舞六博襦䙱珠琲舉止光麗費百巨萬遺使以遺光顏曰公以君暴露于外恭進侍者慰君征行之勤光顏約旦日納焉乃大合將校置酒引使者以侍姝至秀曼都雅一軍驚視光顏徐曰我去室家久以為公憂誠旡以報德然戰士皆棄妻子蹈白刃奈何獨以女色為樂為我謝公天子於光顏恩厚誓不與賊同生指心曰雖死不二因嗚咽泣下將卒數万皆感激流涕乃厚賂使者還之於是士氣益勵箋證史記平原君列傳平原君趙勝者趙之諸公子也平原君家樓臨民家民家有躄者槃散行汲集解駰案散亦作跚索隱躄音壁散音先寒反亦作珊音同正義躄跛也平原君美人居樓上臨見大笑之明日躄者至平原君門請曰臣聞君之喜士士不遠千里而至者以君能貴士而賤妾也臣不幸有罷癃之病而君之後宮臨而笑臣臣願得笑臣者頭平原君笑應曰諾躄者去平原君笑曰觀此豎子乃欲以一笑之故殺吾美人不亦甚乎終不殺居歲餘賓客門下舍人稍稍引去者過半平原君怪之曰勝所以待諸君者未嘗敢失禮而去者何多也門下一人前對曰以君之不殺笑躄者以君為愛色而賤士士即去耳於是平原君乃斬笑躄者美人頭自造門進躄者因謝焉其後門下乃復稍稍來後漢書宋弘傳宋弘字仲子京兆長安人也弘當宴見御坐新屏風圖畫列女帝數顧視之弘正容言曰未見好德如好色者帝即為徹之笑謂弘曰聞義則服可乎對曰陛下進德臣不勝其喜新唐書李光進傳附弟李光顏光顏字光遠弘素蹇縱陰挾賊自重且惡光顏忠力思有以撓衊之乃飭名姝教歌舞六博襦䙱珠琲舉止光麗費百巨萬遣使以遺光顏曰公以君暴露于外恭進侍者慰君征行之勤光隱約旦日納焉乃大合將校置酒引使者以侍姝至秀曼都雅一軍驚視光顏徐曰我去室家久以為公憂誠無以報德然戰士皆棄妻子蹈白刃奈何獨以女色為樂為我謝公天子於光顏恩厚誓不與賊同生指心曰雖死不二因嗚咽泣下將卒數萬皆感激流涕乃厚賂使者還之於是士氣益勵好色不好德第三史記孔子世家居衛月餘靈公與夫人同車宦者雍渠參乘出使孔子為次乘招搖而過之孔子曰吾未見好德如好色者也招搖猶鳳翔也史記樂書文侯曰敢問溺音者何從出也子夏答曰鄭音好濫淫志宋音燕女溺志燕歡悅也衛音趣數煩志齊音驁辟驕志四者皆淫於色而害於德是以祭祀不用也前漢成帝紀贊曰遭世承平上下和睦然湛乎酒色趙氏亂內外家擅朝言之可為於邑前漢杜欽傳上為太子時以好色聞及即位皇太后詔采良家女欽因說大將軍鳳曰禮一娶九女所以極陽數廣嗣重祖也必鄉舉求窕窈不問華色所以助德理內也娣姪雖缺不復補所以養壽塞爭也故后妃有正淑之行則嗣續有賢聖之君制度有威儀之節則人君有壽考之福廢而不由則女德不厭女德不厭則壽命不究於高年書云或三四年言夫欲之生害也男子五十好色未衰婦人四十容貌改前以改前之容侍於未衰之年而不以禮為制則其原不可救而後徠異態後徠異態則正后自疑而支庶有閒適之心是以晉獻被納讒之謗申生蒙無罪之辜今聖主富於春秋未有適嗣方鄉術入學未親后妃之儀將軍輔政宜建九女之制詳擇有行義之家求淑女之賢毋必有聲色音技能為万世大法夫少戒之在色小辨之作可為寒心唯將軍常以為憂鳳白之太后太后以為故事無有鳳不能自立法度循故事而已後漢劉玄傳更始納趙萌女為夫人有寵委政於萌日夜與婦人飲燕後庭群臣欲言事醉不能見乃令侍中坐帷內與語諸將識非更始聲出皆怨曰成敗未可知遽日縱若此後漢崔琦傳曰宣王晏起姜后脫簪列女傳曰周宣王嘗夜臥而晏起姜后乃脫簪珥待罪於永答使其傅母通言王曰妾不才妾之淫心見矣至使君失禮而晏朝以見君王樂色而亡德也敦請婢子之罪王乃勤於政早朝晏罷卒成中典焉箋證史記孔子世家居朞月餘靈公與夫人同車宦者雍渠參乘出使孔子為次乘招搖市過之集解徐廣曰招搖鳳翔也索隱家語作遊過市孔子曰吾未見好德如好色者也史記樂書子夏答曰天下大定然後正六律和五聲今君之所好者其溺音與文侯曰敢問溺音者何從出也子夏答曰鄭音好濫淫志宋音燕女溺志王肅曰燕歡悅鄭音趣數煩志齊音驁辟驕志四者皆淫於色而害於德是以祭祀不用也漢書成帝紀贊曰遭世承平上下和睦然湛于酒色趙氏亂內外家擅朝言之可為於邑師古曰於邑短氣貌讀如本字漢書杜周傳附杜欽欽為人深博有謀自上為太子時以好色聞及即位皇太后詔采良家女欽因是說大將軍鳳曰禮一娶九女所以極陽數廣嗣重祖也必鄉舉求窈窕不問華色所以助德理內也娣姪雖缺不復補所以養壽塞爭也故后妃有貞淑之行則胤嗣有賢聖之君制度有威儀之節則人君有壽考之福廢而不由則女德不厭女德不厭則壽命不究於高年書云或四三年言失欲之生害也師古曰失讀曰佚佚與逸同男子五十好色未衰婦人四十容貌改前以改前之容侍於未衰之年而不以禮為制則其原不可救而後徠異態後徠異態則正后自疑而支庶有間適之心是以晉獻被納讒之謗申生蒙無罪之辜今聖主富於春秋未有適嗣方鄉術入學未親后妃之議將軍輔政宜因始初之隆建九女之制詳擇有行義之家求淑女之質毋必有聲色音技能為萬世大法夫少戒之在色小辨之作可為寒心唯將軍常以為憂鳳白之太后太后以為故事無有欽復重言鳳不能自立法度循故事而已後漢書劉玄傳更始納趙萌女為夫人有寵遂委政於萌日夜與婦人飲宴後庭群臣欲言事輒醉不能見時不得已乃令侍中坐帷內與語諸將識非更始聲出皆怨曰成敗未可知遽自縱放若此後漢書文苑列傳崔琦傳崔琦字子瑋涿郡安平人河南尹梁冀聞其才請與交冀行多不軌琦數引古今成敗以戒之冀不能受乃作外戚針其辭曰宣王晏起姜后脫簪列女傳曰周宣王嘗夜臥而晏起姜后乃脫簪珥待罪於永巷使其傅母通言王曰妾不才妾之淫心見矣至使君王失禮而晏朝以見君王樂色而忘德也敢請婢子之罪王乃勤於政早朝晏罷卒成中興焉
