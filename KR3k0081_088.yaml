body:
  text: 卷第八十八朋友第一前漢張耳傳陳餘年少父事耳相與為刎頸交前漢灌夫傳夫與竇嬰其游如父子然相得歡甚無厭恨相知之晚前漢吉與貢禹為友世稱王陽在位貢公彈冠彈冠者且入仕也言其取舍同也取進趣也舍止息也前漢兩龔皆楚人也勝字君賓吉字君倩二人相友並著名節故世謂之楚兩龔後漢吳祐傳公沙穆來遊太學無資糧乃變服客傭為吳祐賃春祐與語大驚遂共定交於杵曰之閒後漢朱穆傳論曰朱穆見比周傷義偏黨毀俗忘抑朋游之私遂著絶交之論蔡雍以為穆正而孤又作正交而廣其致焉蓋孔子稱上交不諂下交不瀆又曰晏平仲善與人交子夏之門人亦問交於子張故易名斷金之義詩載宴朋之謠若夫文會輔仁直諒多聞之友時濟其益紵衣傾蓋彈冠結綬之夫遂隆其好斯固交者之方焉至乃田竇衛霍之游客竇嬰孝文皇后從兄子封魏其侯游士賓客爭歸之武帝時為丞相田蚡景帝王皇后同産弟為太尉蚡以太后故親幸數言事多效亡吏趨藝利者皆去嬰而歸蚡衛青拜大將軍青姊子霍去病為驃騎將單皆為大司馬去病秩祿與大將軍等自是後青日衰而去病益貴青故人門下多云事去病輒得官爵也廉頗翟公之門賓史記曰廉頗趙人封為信平君假相國長平之免歸也故客盡去及復用為將客又至廉頗曰客退矣客曰吁君何見之晚也夫以市道交君有藝我即從君無藝即去此其理也又何怨焉下邽翟公為廷尉賓客亦填門及廢門外可設爵羅後復為廷尉賓客欲往翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見也進由藝合退因衰異又專諸荊卿之感激侯生豫子之投身情為恩使命緣義輕皆以利害移心懷德成節非夫交照之本未可語失得之原也穆徒以友分少全因絶同志之求黨俠生敝而忘得朋之義蔡氏正孤之言其為然也古之善交者詳矣漢興稱王陽貢禹陳遵張竦中世有廉范慶鴻陳重靁義云後漢郅惲傳惲友人董子張者父先為鄉人所害及子張病將終惲往候之子張視惲歔欷不能言惲曰吾知子不悲天命而痛讎不復也子在吾憂而不手子亡吾手而不憂也子張但目擊而已惲即起將客遮仇人取其頭以示子張子張見而氣絶惲因而詣縣以狀自首令應之遲惲曰為友報讎吏之私也奉法不阿君之義也虧君以生非臣節也趨出就獄令跣而追惲不及遂自至獄令拔刃自向以要惲曰子不從我出敢以死明心惲乃出因病去魏胡質傳入為丞相東曹議令史州請為治中將軍張遼與其護軍武周有隙遼見剌史縕恢求請質質辭以疾遼出謂質曰僕委意於君何以相辜如此質曰古人之交也取多知其不貪奔北知其不怯聞流言而不信故可終也武伯南身為雅士往者將軍稱之不容於口今以睚眥之恨乃成嫌隙況質才薄豈能終好是以不願也遼感言復與周平蜀張裔傳少與犍為楊恭友善恭早死遺孤未數歲裔迎留與分屋而居事恭母如母恭之子息長大為之娶婦買田宅産業使立門戶晉戴若思傳少好遊俠不拘操行遇陸機赴洛船裝甚盛遂與其徒掠之若思登岸據胡牀指麾同旅皆得其宜機察見之知非常人在舫屋上遙謂之曰卿才器如此乃復作劫邪若思感悟因流涕投劍就之機與言深加賞異遂與定交焉若思後舉孝廉入洛機薦之於趙王倫新唐李大亮傳大亮隋末為寵二行軍兵曹李密寇東都玉戰敗大亮被禽賊將張弼異之就執百餘人皆死獨釋大亮引與語遂定交箋證漢書張耳陳餘傳陳餘亦大梁人好儒術遊趙苦陘富人公乘氏以其女妻之餘年少父事耳相與為刎頸交漢書灌夫傳夫家居卿相侍中賓客益衰及竇嬰失勢亦欲倚夫引繩排根生平慕之後棄者夫亦得嬰通列侯宗室為名將兩人相為引重其游如父子然相得歡甚無厭恨相知之晚漢書王吉傳吉與貢禹為友世稱王陽在位貢公彈冠師古曰彈冠者且入仕也言其取舍同也師古曰取進趣也舍止息也漢書兩龔傳兩龔皆楚人也勝字君賓舍字君倩二人相友並著名節故世謂之楚兩龔少皆好學明經勝為郡吏舍不仕後漢書吳祐傳時公沙穆來遊太學無資糧乃變服客傭為祐賃舂祐與語大驚遂共定交於杵臼之間後漢書朱穆傳論曰朱穆見比周傷義偏黨毀俗志抑朋游之私遂著絶交之論蔡雍以為穆貞而孤又作正交而廣其致焉蓋孔子稱上交不諂下交不黷又曰晏平仲善與人交子夏之門人亦問交於子張故易明黃金之義詩載宴朋之謠若夫文會輔仁直諒多聞之友時濟其益紵衣傾蓋彈冠結綬之夫遂隆其好斯固交者之方焉至乃田竇衛霍之游客竇嬰孝文皇后從兄子封魏其侯游士賓客爭歸之武帝時為丞相田蚡武帝王皇后同産弟為太尉蚡以太后故親幸數言事多效士吏趨藝利者皆去嬰而歸蚡衛青拜大將軍青姊子霍去病為驃騎將軍皆為大司馬去病秩祿與大將軍等自是後青日衰而去病益貴青故人門下多去事去病輒得官爵也廉頗翟公之門賓史記曰廉頗趙人封為信平君假相國長平之免歸也故客盡去及復用為將客又至廉頗曰客退矣客曰吁君何見之晚也夫以市道交君有藝我即從君無藝即去此其理也又何怨焉下邽翟公為廷尉賓客亦填門及廢門外可設爵羅後復為廷尉賓客欲往翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見也進由藝合退由衰異又專諸荊卿之感激侯生豫子之投身情為恩使命緣義輕皆以利害移心懷德成節非夫交照之本未可語失得之原也穆徒以友分少全因絶同志之求黨俠生敝而忘得朋之義蔡氏貞孤之言其為然也古之善交者詳矣漢興稱王陽貢禹陳遵張竦中世有廉范慶鴻陳重靁義云後漢書郅惲傳惲友人董子張者父先為鄉人所害及子張病將終惲往候之子張垂歿視惲歔欷不能言惲曰吾知子不悲天命而痛讎不復也子在吾憂而不手子亡吾手而不憂也子張但目擊而已惲即起將客遮仇人取其頭以示子張子張見而氣絶惲因而詣縣以狀自首令應之遲惲曰為友報讎吏之私也奉法不阿君之義也虧君以生非臣節也趨出就獄令跣而追惲不及遂自至獄令拔刃自向以要惲曰子不從我出敢以死明心惲得此乃出因病去三國志魏志胡質傳胡質入為丞相東曹議令史州請為治中將軍張遼與其護軍武周有隙遼見刺史溫恢求請質質辭以疾遼出謂質曰僕委意於君何以相辜如此質曰古人之交也取多知其不貪奔北知其不怯聞流言而不信故可終也武伯南身為雅士往者將軍稱之不容於口今以睚眥之恨乃成嫌隙况質才薄豈能終好是以不願也遼感言復與周平三國志蜀志張裔傳少與犍為楊恭友善恭早死遺孤未數歲裔迎留與分屋而居事恭母如母恭之子息長大為之娶婦買田宅産業使立門戶晉書戴若思傳戴若思廣陵人也名犯高祖廟諱祖烈吳左將軍父昌會稽太守若思有風儀性閒爽少好遊俠不拘操行遇陸機赴洛船裝甚盛遂與其徒掠之若思登岸據胡牀指麾同旅皆得其宜機察見之知非常人在舫屋上遙謂之曰卿才器如此乃復作劫耶若思感悟因流涕投劍就之機與言深加賞異遂與定交焉若思後舉孝廉入洛機薦之於趙王倫曰伏見處士廣陵戴若思年三十清沖履道德量允塞思理足以研幽才鑒足以辨物安窮樂志無風塵之慕砥節立行有井泄之潔誠東南之遺寶宰朝之奇璞也若得託迹康衢則能結軌驥騄曜質廊廟必能垂光璵璠矣惟明公垂神採察不使忠允之言以人而廢新唐書李大亮傳李大亮京兆涇陽人祖琰為魏度支尚書大亮有文武才略隋末署龐玉行軍兵曹李密寇東都玉戰敗大亮被擒賊將張弼異之就執百餘人皆死獨釋大亮引與語遂定交慎交第二後漢竇章傳居貧蓬戶蔬食躬勤孝養然講讀不輟太僕鄧康聞其名請欲與交章不肯往康以此益重焉後漢張霸傳四遷為侍中時皇后兄鄧騭當朝貴盛聞霸名行欲與為交霸逡巡不答衆人笑其不識時務後漢王丹傳徵為太子少傳時大司徒侯霸欲與交友遺子昱候於道昱拜迎車下丹下答之昱曰家公欲與君結交何為見拜丹曰君房有是言丹末之許也丹子有同門生喪親家在中山白丹欲往奔慰結侶將行丹怒而撻之令寄縑以祠焉或問其故丹曰交道之難未易言也世稱管鮑次則王貢張陳凶其終蕭朱隙其末故知全之者鮮矣時人服其言後漢王丹傳丹資性方潔疾惡彊豪時陳遵關西之大俠也其友人喪親遵賻助甚豐丹乃懷縑一四陳之於主人前曰如丹此縑出自機杼遵聞而有慙色自以知名欲結交於丹丹拒而不許吳朱績傳遷偏將軍魯王霸注意交績嘗至其廨就之坐欲與結好績下地住立辭而不當晉杜預子錫傳孫秀求交於錫而錫距之秀雖銜之憚其名高不敢害也箋證後漢書竇融傳附玄孫竇章永初中三輔遭羌寇章避難東國家於外黃居貧蓬戶蔬食躬勤孝養然講讀不輟太僕鄧康聞其名請欲與交章不肯往康以此益重焉後漢書張霸傳後徵四遷為侍中時皇后兄虎賁中郎將鄧騭當朝貴盛聞霸名行欲與為交霸逡巡不答衆人笑其不識時務後漢書王丹傳後徵為太子少傅時大司徒侯霸欲與交友及丹被徵遣子昱候於道昱迎拜車下丹下答之昱曰家公欲與君結交何為見拜丹曰君房有是言丹未之許也丹子有同門生喪親家在中山白丹欲往奔慰結髮將行丹怒而撻之令寄縑以祠焉或問其故丹曰交道之難未易言也世稱管鮑次則王貢張陳凶其終蕭朱隙其末故知全之者鮮矣時人服其言後漢書王丹傳丹資性方潔疾惡彊豪時河南太守同郡陳遵關西之大俠也其友人喪親遵為護喪事賻助甚豐丹乃懷縑一匹陳之於主人前曰如丹此縑出自機杼遵聞而有慙色自以知名欲結交於丹丹拒而不許三國志吳志朱然傳附子朱績績字公緒以父任為郎後拜建忠都尉叔父才卒績領其兵隨太常潘濬討五溪以膽力稱遷偏將軍營下督領盜賊事持法不傾魯王霸注意交績嘗至其廨就之坐欲與結好績下地住立辭而不當晉書杜預傳附子杜錫孫秀求交於錫而錫拒之秀雖銜之憚其名將不敢害也絶交第三前漢酈商傳其子寄字况與呂祿善及高后前大臣欲誅諸呂呂祿為將軍軍於北軍太尉勃不得入北軍於是乃使人劫商令其子寄紿呂祿呂祿信之與出游而太尉勃乃得入據北軍遂以誅諸呂天下稱酈况賣友前漢主父偃傳為齊相至齊散五百金與之數曰始吾貧時昆弟不我衣食賓客不我內門今吾與諸君絶矣無復入偃之門前漢魏其侯灌夫俱失勢賓客盡衰二人相引繩排擯平生慕之後棄之而已後漢來歙傳大將軍耿寶侍中周廣謝惲共讒陷大尉楊震震遂自殺歷謂侍御史虞詡曰耿寶託元舅之親榮寵過厚不念報國恩而傾側姦臣誣奏楊公傷害忠良其天禍亦將至矣遂絶周廣謝惲不與交通新唐于敖傳龐嚴為李紳薦為翰林學士李逢吉誣紳罪逐之而出嚴為信州剌史敖封還詔書搢紳意申嚴枉及駮奏下乃論貶嚴太輕衆皆嗤譟餘見朋友朱穆傳箋證漢書酈商傳商事孝惠帝呂后呂后崩商疾不治事其子寄字况與呂祿善及高后崩大臣欲誅諸呂呂祿為將軍軍於北軍太尉勃不得入北軍於是乃使人劫商令其子寄紿呂祿呂祿信之與出游而太尉勃乃得入據北軍遂以誅諸呂商是歲薨諡曰景侯子寄嗣天下稱酈況賣友漢書主父偃傳元朔中偃言齊王內有失之行上拜偃為齊相至齊遍召昆弟賓客散五百金豫之數曰始吾貧時昆弟不我衣食賓客不我黃門今我相齊諸君迎我或千里吾與諸君絶矣毋復入偃之門漢書灌夫傳夫不好文學喜任俠已然諾諸所與交通無非豪桀大猾家纍數千萬食客日數十百人波池田園宗族賓客為權利橫潁川潁川兒歌之曰潁水清灌氏濁潁水濁灌氏族夫家居卿相侍中賓客益衰及竇嬰失藝亦欲倚夫引繩排根生平慕之後棄者後漢書來歙傳明年中常侍樊豐與大將軍耿寶侍中周廣謝惲等共讒陷太尉楊震震遂自殺歷謂侍御史虞詡曰耿寶託元舅之親榮寵過厚不念報國恩而傾側姦臣誣奏楊公傷害忠良其天禍亦將至矣遂絶周廣謝惲不與交通新唐書于志寧傳附于敖龐嚴為元稹李紳所厚與蔣防俱薦為翰林學士李逢吉誣紳罪逐之而出嚴為信州刺史防汀州刺史敖封還詔書縉紳意申嚴枉及駮奏下乃論貶嚴太輕衆皆嗤譟勢利之交第四史記孟嘗君傳孟嘗君曰文常好客遇客無所敢失食客三千有餘人客見文一日廢皆背文而去莫顧文者今賴先生得復其位客亦有何面目復見文乎如復見文者必唾其面而大辱之馮歡曰富貴多士貧賤寡友事雲固然也君獨不見去趣市朝者乎明旦側肩爭門而入日暮之後過市朝者史辭而不顧非好朝而惡暮所期物忘其中今君失位賓客皆去不足以怨士而徒絶賓客之路願君遇客如故孟嘗君曰謹從命矣史記趙奢傳廉頗之免歸也失勢客盡去及後用客又復至廉頗曰客退矣客曰吁君何見之晚也夫天下以市道交君有勢我則從君君無勢則去此固其理也有何怨乎前漢張耳傳贊曰張耳陳餘世所稱賢及據國爭權卒相滅亡何鄉者慕用之誠後相背之盩也勢利之交古人羞之前漢當時始與汲黯列為九卿內行修兩人中廢賓客益落當時先是下邽翟公為廷尉賓客亦慎門及廢門外可設爵羅後復為廷尉客欲往翟公大署其門曰一死一生乃知交情一貧一富乃知交能一貴一賤交情乃見後漢劉梁傳梁宗室子孫而少以自資常疾世多利交以邪曲相黨乃著破産論時之覽者以為仲足作春秋亂臣知懼今此論之作俗士豈不愧心後漢范冉傳冉與李固王奐親善謝承書曰奐明五經負笈追業常賃灌園恥交勢利餘見朋友朱穆傳箋證史記孟嘗君傳自齊王毀廢孟嘗君諸客皆去後召而復之馮歡迎之未到孟嘗君太息歎曰文常好客遇客無所敢失食客三千有餘人先生所知也客見文一日廢皆背文而去莫顧文者今賴先生得復其位客亦有何面目復見文乎如復見文者必唾其面而大辱之馮歡結轡下拜孟嘗君下車接之曰先生為客謝乎馮歡曰非為客謝也為君之言失夫物有必至事有固然君知之乎孟嘗君曰愚不知所謂也曰生者必有死物之必至也富貴多士貧賤寡友事之固然也君獨不見夫趣市朝者乎明旦側肩爭門而入日暮之後過市朝者掉臂而不顧非好朝而惡暮所期物忘其中今君失位賓客皆去不足以怨士而徒絶賓客之路願君遇客如故孟嘗君再拜曰敬從命矣聞先生之言敢不奉教焉史記廉頗藺相如列傳廉頗之免長平歸也失勢之時故客盡去及復用為將客又復至廉頗曰客退矣客曰吁君何見之晚也夫天下以市道交君有勢我則從君君無勢則去此固其理也有何怨乎漢書張耳陳餘傳贊曰張耳陳餘世所稱賢其賓客廝役皆天下俊桀所居國無不取卿相者然耳餘始居約時相然信死豈顧問哉及據國爭權卒相滅亡何鄉者慕用之誠後相背之盩也勢利之交古人羞之蓋謂是矣漢書鄭當時傳當時始與汲黯列為九卿內行修兩人中廢賓客益落當時死家亡餘財先是下邽翟公為廷尉賓客亦黃門及廢門外可設爵羅後復為廷尉客欲往翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見後漢書劉梁傳劉梁字曼山一名岑東平寧陽人也梁宗室子孫而少孤貧賣書於市以自資常疾世多利交以邪曲相黨乃著破産論時之覽者以為仲尼作春秋亂臣知懼今此論之作俗士豈不愧心後漢書范冉傳冉好違時絶俗為激詭之行常慕梁伯鸞閔仲叔之為人與漢中李固河內王奐親善謝承書曰奐字子昌河內武德人明五經負笈追業常賃灌園恥交勢利為考城令遷漢陽太守徵拜議郎卒而鄙賈偉節郭林宗焉天子布衣之交第五魏夏侯尚字伯仁淵從子也文帝與之親友尚有籌畫智略文帝器之與為布衣之交晉庚亮傳中興初侍講東宮與溫嶠俱為太子布衣之好晉王導傳時元帝為琅邪王與導素相親善導知天下已亂遂傾心推奉潛有興復之志帝亦雅相器重契同友執晉溫嶠傳遷太子中庶子及在東宮深見寵遇太子與為布衣之交數陳規諷新唐太宗皇后長孫氏傳后兄無忌林帝本布衣之交箋證三國志魏志夏侯尚傳夏侯尚字伯仁淵從子也文帝與之親友魏書曰尚有籌畫智略文帝器之與為布衣之交晉書庾亮傳中興初拜中書郎領著作侍講東宮其所論釋多見稱述與溫嶠俱為太子布衣之好晉書王導傳時元帝為琅邪王與導素相親善導知天下已亂遂傾心推奉潛有興復之志帝亦雅相器重契同友執晉書溫嶠傳後歷驃騎王導長史遷太子中庶子及在東宮深見寵遇太子與為布衣之交數陳規諷又獻侍臣針甚有弘益舊唐書后妃列傳太宗文德皇后長孫氏傳時后兄無忌夙與太宗為布衣之交又以佐命元勳委以腹心出入臥內將任之朝政為王者師第六前漢張良傳良嘗閒從容步游下邳圯下圯音頤有一老父衣褐至良所直墯其履圯下顧謂良曰孺子下取履良下取履因跪進父以足受之笑去父去里所復還曰孺子可教矣後五日平明與我期此良因怪跪曰諾五日良夜半往有頃父亦來出一編書曰讀是則為王者師後十年興十三年孺子見我濟北榖城山下黃石即我已遂去不見旦日視其書乃太公兵法良因異之常習讀誦前漢儒林傳田子方段干木吳起禽滑敗尼之屬皆受業於子夏之倫為王者師餘見師臣箋證漢書張良傳良嘗閒從容步游下邳圯上服虔曰圯音頤楚人謂橋曰圯有一老父衣褐至良所直墮其履圯下顧謂良曰孺子下取履良愕然欲歐之為其老乃彊忍下取履因跪進父以足受之笑去良殊大驚父去里所復還曰孺子可教矣後五日平明與我期此良因怪跪曰諾五日平明良往父已先在怒曰與老人期後何也去後五日蚤會五日雞鳴往父又先在復怒曰後何也去後五日復蚤來五日良夜半往有頃父亦來喜曰當如是出一編書曰讀是則為王者師後十年興十三年孺子見我濟北穀城山下黃石即我已遂去不見旦日視其書乃太公兵法良因異之常習讀誦漢書儒林傳仲尼既沒七十子之徒散遊諸侯大者為卿相師傅小者友教士大夫或隱而不見故子張居陳淡臺子羽居楚子夏居西河子貢終於齊如田子方段干木吳起禽滑釐之屬皆受業於子夏之倫為王者師
