body:
  text: 卷第六十九孝感第一後漢列女傳詩事母至孝母好飲江水水去告六七里因遠汲溺死妻恐姑哀傷不敢言而託以行學不在姑嗜魚鱠又不能獨食夫婦常力作供鱠呼鄰母共之舍側忽有涌泉味如江水每旦輒出雙鯉魚常以供二母之膳晉王祥傳繼母不慈數譖之由是失愛於父每使掃除牛下祥愈恭謹母嘗欲生魚時天寒水凍祥解衣將剖冰求之冰忽自解雙鯉躍出持之而歸母又思黃雀灸復有黃雀飛入其幕復以供母鄉里驚歎以為孝感所致焉晉劉殷傳字長盛性至孝曾祖母王氏感冬思堇而不言食不飽者一旬矣長盛九歲乃於澤中慟哭聲不絶者半日於是忽若有人云止止聲長盛收淚視地便有堇生焉因得解餘而歸食而不減至時堇生乃盡又嘗夜夢人謂之曰西籬下有粟寤而掘之得粟十五鍾銘曰七年粟百石以賜孝子劉長盛自是食之七載方盡時人嘉其至性通感競以穀帛遺之長盛受而不謝直云待後貴當相酬耳晉王延九歲喪母泣血三年幾至滅性繼母卜氏遇之無道嘗盛冬思生魚勑延求而不獲杖之流血延尋汾叩凌而哭忽有一魚長五尺踊出冰上延取以進母卜氏食之於是心悟撫延如己生晉王裒父儀為文帝所殺裒痛父非命未嘗西向而坐示不臣朝廷也於是隱居教授三詔七辟皆不就廬于墓側旦夕常至墓所拜跪攀柏悲號涕淚著樹樹為之枯母性畏雷母沒每雷輒到墓曰裒在此及讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者並廢蓼莪之篇晉孫含傳性至孝其寡嫂樊氏因疾失明含課勵家人盡心奉養醫人疏方應須髯蛇膽而尋無由得之含憂歎纍時嘗晝獨坐忽有一青衣童子持一青囊授含含開視乃蛇膽也童子出戶化成青鳥飛去得膽藥成嫂病即愈晉許孜傳二親沒柴毀骨立杖而能起建墓於縣之東山躬自負土不受鄉人之助或愍孜羸憊苦求來助孜晝則不逆夜便除之每一悲號鳥獸翔集孜以方營大功乃棄其妻鎮宿墓所列植松柏亘五六里時有鹿犯其松栽孜悲歎曰鹿獨不念我乎明日忽見鹿為猛獸所殺置於所犯栽下孜惋息不已乃為作冢理於隧側猛獸即於孜前自撲而死孜益歎息又取埋之自後樹木滋茂而無犯者即二十餘年孜乃更娶妻立宅墓次蒸蒸朝夕奉亡如存鷹雉棲其梁檐鹿與猛獸擾其庭圃交頸同游不相搏噬元康中郡察孝廉不起巾褐終身新唐李大亮孫迥秀所居堂産芝草犬乳鄰猶中宗以為孝感旌大門閭新唐楊炎傳祖哲以孝行稱父播舉進士退居求志玄宗召拜諫議大夫棄官歸養云云炎美須眉峻風宇文藻雄蔚然豪爽尚氣云云李光弼表為判官不應召拜起居舍人固辭父喪廬墓側號墓不廢聲有紫芝白雀之祥詔表其閭炎三世以孝行聞至門樹六闕古所未有新唐張志寬傳居父喪而毀州里稱之王君廓兵略地不暴其閭倚全者百許姓新唐裴彝傳居母喪哭喪明有白烏巢冢樾兄弟八人皆為名孝詔表名闕世謂義門裴氏箋證後漢書列女傳姜詩妻廣漢姜詩妻者同郡龐盛之女也詩事母至孝妻奉順尤篤母好飲江水水去舍六七里妻嘗泝流而汲後值風不時得還母渴詩責而遣之妻乃寄止鄰舍晝夜紡績市珍羞使鄰母以意自遺其姑如是者久之姑怪問鄰母鄰母具對姑感慚呼還恩養愈謹其子後因遠汲溺死妻恐姑哀傷不敢言而託以行學不在姑嗜魚鱠又不能獨食夫婦常力作供鱠呼鄰母共之舍側忽有涌泉味如江水每旦輒出雙鯉魚常以供二母之膳晉書王祥傳王祥字休徵琅邪臨沂人祥性至孝早喪親繼母朱氏不慈數譖之由是失愛於父每使掃除牛下祥愈恭謹父母有疾衣不解帶湯藥必親嘗母常欲生魚時天寒冰凍祥解衣將剖冰求之冰忽自解雙鯉躍出持之而歸母又思黃雀炙復有黃雀數十飛入其幕復以供母鄉里驚嘆以為孝感所致焉晉書孝友列傳劉殷劉殷字長盛新興人也高祖陵漢光祿大夫殷七歲喪父哀毀過禮喪服三年未曾見齒曾祖母王氏盛冬思堇而不言食不飽者一旬矣殷怪而問之王言其故殷時年九歲乃於澤中慟哭曰殷罪釁深重幼丁艱罰王母在堂無旬月之養殷為人子而所思無獲皇天后土願垂哀憫聲不絶者半日於是忽若有人云止止聲殷收淚視地便有堇生焉因得斛餘而歸食而不減至時堇生乃盡又嘗夜夢人謂之曰西籬下有粟寤而掘之得粟十五鍾銘曰七年粟百石以賜孝子劉殷自是食之七載方盡時人嘉其至性通感競以榖帛遺之殷受而不謝直云待後貴當相酬耳晉書孝友列傳王延王延字延元西河人也九歲喪母泣血三年幾至滅性每至忌日則悲啼至旬繼母卜氏遇之無道恆以蒲穰及敗麻頭與延貯衣其姑聞而問之延知而不言事母彌謹卜氏嘗盛冬思生魚勑延求而不獲杖之流血延尋汾叩凌而哭忽有一魚長五尺踊出冰上延取以進母卜氏食之積日不盡於是心悟撫延如已生晉書孝友列傳王裒王裒字偉元城陽營陵人也祖修有名魏世父儀高亮雅直為文帝司馬東關之役帝問於衆曰近日之事誰任其咎儀對曰責在元帥帝怒曰司馬欲委罪於孤耶遂引出斬之痛父非命未嘗西向而坐示不臣朝廷也於是隱居教授三徵七辟皆不就廬于墓側旦夕常至墓所拜跪攀柏悲號涕淚著樹樹為之枯母性畏雷母沒每雷輒到墓曰裒在此及讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者並廢蓼莪之篇晉書孝友列傳顏含顏含字弘都琅邪莘人也含少有操行以孝聞含二親既終兩兄繼沒次嫂樊氏因疾失明含課勵家人盡心奉養每日自嘗省藥饌察問息耗必簪屨束帶醫人疏方應須髯蛇膽而尋求備至無由得之含憂歎纍時嘗晝獨坐忽有一青衣童子年可十三四持一青囊授含含開視乃蛇膽也童子逡巡出戶化成青鳥飛去得膽藥成嫂病即愈晉書孝友列傳許孜許孜字季義東陽吳寧人也孝友恭讓敏而好學二親沒柴毀骨立杖而能起建墓於縣之東山躬自負土不受鄉人之助或愍孜羸憊苦求來助孜晝則不逆夜便除之每一悲號鳥獸翔集孜以方營大功乃棄其妻鎮宿墓所列植松柏亘五六里時有鹿犯其松栽孜悲歎曰鹿獨不念我乎明日忽見鹿為猛獸所殺置於所犯栽下孜悵惋不已乃為作冢埋於隧側猛獸即於孜前自撲而死孜益歎息又取埋之自後樹木滋茂而無犯者積二十餘年孜乃更娶妻立宅墓次蒸蒸朝夕奉亡如存鷹雉棲其梁簷鹿與猛獸擾其庭圃交頸同游不相搏噬元康中郡察孝廉不起巾褐終身新唐書李大亮傳附族孫李迥秀迥秀少聰悟多通賓客喜飲酒雖多不亂當時稱其風流母少賤妻嘗詈媵婢母聞不樂迥秀即出其妻或問之答曰娶婦要欲事姑苟違顏色何可留武后嘗遣內人候其母或迎置宮中後所居堂産芝草犬乳鄰貓中宗以為孝感旌大門閭新唐書楊炎傳楊炎字公南鳳翔天興人曾祖大寶武德初為龍門令劉武周攻之死于守贈全節侯祖哲以孝行稱父播舉進士退居求志玄宗召拜諫議大夫棄官歸養肅宗時即家拜散騎常侍號玄靜先生炎美須眉峻風宇文藻雄蔚然豪爽尚氣河西節度使呂崇賁辟掌書記神烏令李太簡嘗醉辱之炎令左右反接搒二百餘幾死崇賁愛其才不問李光弼表為判官不應召拜起居舍人固辭父喪廬墓側號慕不廢聲有紫芝白雀之祥詔表其閭炎三世以孝行聞至門樹六闕古所未有新唐書孝友列傳張志寬張志寬蒲州安邑人居父喪而毀州里稱之王君廓兵略地不暴其閭倚全者百許姓新唐書孝友列傳裴敬彝裴敬彝絳州聞喜人曾祖子通隋開皇中以太中大夫居母喪哭喪明有白烏巢冢樾兄弟八人皆為名孝詔表門闕世謂義門裴氏又舊唐書孝友列傳裴敬彝裴敬彝絳州聞喜人也曾祖子通隋開皇中太中大夫母終廬於墓側哭泣無節目遂喪明俄有白鳥巢於墳樹子通弟兄八人復以友悌著名詔旌表其門鄉人至今稱為義門裴氏仁義第二前漢武帝元鼎二年秋詔曰仁不異遠義不辭難前漢賈誼傳夫仁義恩厚人主之芒刃也權藝法制人主之斤斧也芒刃謂刃之利如毫芒前漢司馬相如傳陛下仁育群生義征不譓譓順也前漢董仲舒傳策曰孔子曰天地之性人為貴明於天性知自貴於物知自貴於物然後知仁義知仁義然後重禮節重禮節然後安處善安處善然後樂循理樂循理然後謂之君子後漢荀悅傳作申鑒曰夫道之本仁義而已矣五典以經之群籍以緯之詠之歌之絃之舞之前鑒既明後復申之故古之帝王其於仁義也申重而已後漢仲岱與李固子燮同召議郎岱卒乃上書求加禮於岱曰臣聞仁義興則道德昌道德昌則政化明政化明而萬姓寧云云魏臧洪傳紹知洪終不為己用乃殺之陳容少為書生親慕洪謂紹曰將軍舉大事而先誅忠義豈合天意夫仁義豈有常蹈之則君子背之則小人今日寧與臧洪同日死不與將軍同日生復見殺晉刑法志人君之道仁義為主仁者愛人義者理務箋證漢書武帝紀二年秋九月詔曰仁不異遠義不辭難師古曰遠近如一是為仁也不憚艱難是為義也漢書賈誼傳誼數上疏陳政事多所欲匡建其大略曰夫仁義恩厚人主之芒刃也權藝法制人主之斤斧也漢書司馬相如傳相如已死家無遺書問其妻對曰長卿未嘗有書也時時著書人又取去長卿未死時為一卷書曰有使來求書奏之其辭曰陛下仁育群生義征不譓文頴曰譓順也漢書董仲舒傳仲舒對曰孔子曰天地之性人為貴師古曰孝經載孔子之言也性生也明於天性知自貴於物知自貴於物然後知仁誼知仁誼然後重禮節重禮節然後安處善師古曰處於善道以為安安處善然後樂循理樂循理然後謂之君子後漢書荀淑傳附孫荀悅悅志在獻替而謀無所用乃作申鑒五篇其所論辨通見政體既成而奏之其大略曰夫道之本仁義而已矣五典以經之群籍以緯之詠之歌之弦之舞之前監既明後復申之故古之聖王其於仁義也申重而已後漢書种皓傳附子种岱岱字公祖好學養志舉孝廉茂才辟公府皆不就公車特徵病卒初岱與李固子燮同徵議郎燮聞岱卒痛惜甚乃上書求加禮於岱曰臣聞仁義興則道德昌道德昌則政化明而萬姓寧三國志魏志臧洪傳臧洪字子源廣陵射陽人也紹本愛洪意欲令屈服原之見洪辭切知終不為己用乃殺之洪邑人陳容少為書生親慕洪隨洪為東郡丞城未敗洪遣出紹令在坐見洪當死起謂紹曰將軍舉大事欲為天下除暴而專先誅忠義豈合天意臧洪發舉為郡將奈何殺之紹慙左右使人牽出謂曰汝非臧洪儔空復爾為容顧曰夫仁義豈有常蹈之則君子背之則小人今日寧與臧洪同日而死不與將軍同日而生復見殺晉書刑法志君人之道仁義為主仁者愛人義者理務禮義第三史記禮書人生有欲欲而不得則不能無忿忿而無度量則爭爭則亂先王惡其亂故制禮義以養人之欲給人之求使欲不窮於物物不屈於欲二者相待而長是禮之所起也史記禮書故禮者養也云云孰知夫禮義文理之所以養情也人苟生之為見若者必死苟利之為見若者必害怠惰之為安若者必危情勝之為安若者必滅故聖人一之以禮義則兩得之矣一之於情性則兩失之矣故儒者將使人兩得之者也墨者將使人兩失之者也是儒墨之分治辨之極也強固之本也威行之道也功名之總也王公由之所以一天下臣諸侯也弗由之所以捐社稷也前漢賈誼上疏曰為人主計者莫如先審取舍取舍之極定於內而安危之萌應於外矣安者非一日而安也危者非一日而危也皆以積漸然不可不察也人主之積在其取舍以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨背禮義積而民和親前漢賈誼上疏曰上設廉恥禮義以遇其臣而臣不以節行報上者非人類也云云彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存彼且為我危故吾得與之皆安顧行而亡利守節而伏義故可以託不御之權可以寄六尺之孤此厲廉恥行禮義之所致也後漢王符傳愛日篇曰孔子稱既庶則富之既富則教之是故禮義生於富足盜竊起於貧窮晉阮冲傳上問經化之務對曰夫王道之本經國之務必先之以禮義而致人於廉恥禮義立則君子軌道而讓於善廉恥立則小人謹行而不淫於制度箋證史記禮書禮由人起人生有欲欲而不得則不能無忿忿而無度量則爭爭則亂先王惡其亂故制禮義以分之養人之欲給人之求使欲不窮於物物不屈於欲二者相待而長是禮之所起也故禮者養也稻粱五味所以養口也椒蘭芬茝所以養鼻也鍾鼓管絃所以養耳也刻鏤文章所以養目也疏房牀笫几席所以養體也孰知夫禮義文理之所以養情也人苟生之為見若者必死正義苟且若如此也苟利之為見若者必害怠惰之為安若者必危情勝之為安若者必滅故聖人一之於禮義則兩得之矣一之於情性則兩失之矣故儒者將使人兩得之者也墨者將使人兩失之者也是儒墨之分治辨之極也彊固之本也威行之道也功名之總也王公由之所以一天下臣諸侯也弗由之所以捐社稷也漢書賈誼傳誼數上疏陳政事多所欲匡建其大略曰為人主計者莫如先審取舍取舍之極定於內而安危之萌應於外矣安者非一日而安也危者非一日而危也皆以積漸然不可不察也人主之所積在其取舍以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨背禮義積而民和親漢書賈誼傳誼數上疏陳政事多所欲匡建其大略曰上設廉恥禮義以遇其臣而臣不以節行報其上者則非人類也彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存夫將為我危故吾得與之皆安顧行而忘利守節而仗義故可以託不御之權可以寄六尺之孤此厲廉恥行禮誼之所致也後漢書王符傳愛日篇曰孔子稱既庶則富之既富乃教之是故禮義生於富足盜竊起於貧窮晉書阮种傳又問經化之務對曰夫王道之本經國之務必先之以禮義而致人於廉恥禮義立則君子軌道而讓於善廉恥立則小人謹行而不淫於制度義士第四史記伯夷傳武王已平商亂天下宗周而伯夷叔齊恥之義不食周粟隱於首陽山采薇而食之及餓且死作歌云云前漢霍光傳殿中嘗有怪一夜群臣相驚光召尚符璽郎郎不肯授光光欲奪之郎按劍曰臣頭可得璽不可得也光甚誼之明日詔增此郎秩二等衆庶莫不多光後漢劉平傳更始時天下亂賊忽然而至與母俱匿野澤中平朝出求食逢餓賊將亨平叩頭曰今旦為老母求菜願得先歸食母畢還就死因涕泣賊見其至誠哀而遣之平還既食母訖因白曰屬與賊期義不可欺遂還詣賊衆皆大驚相謂曰常聞烈士乃今見之子去矣吾不忍食子於是得全後漢耿恭傳論曰余初讀蘇武傳感其茹毛窮海不為大漢差後覽耿恭疏勒之事喟然不覺涕之無從嗟哉義重於生以至是乎恭鑿山為井煮弩為糧後漢劉茂傳詔書求天下義士福言茂曰臣前為赤眉所圍命如絲髮賴茂負臣踰城出保盂縣茂與弟觸冒兵刃緣山負食臣及妻子得度死命節義元高宜蒙表擢以厲義士詔書即拜議郎後漢趙孝傳天下亂人相食孝弟禮為餓賊所得孝聞之即自縛詣賊曰禮久餓羸瘦不如孝肥飽賊大驚並放之謂曰可且歸更持米糒來孝求不能得復往報賊願就亨衆異之遂不害鄉黨服其義後漢彭修傳年十五時父為郡吏得休與修俱歸道為盜所劫修困迫乃拔佩刀前持盜帥曰父辱子死鄉不顧死邪盜相謂曰此童子義士也不宜逼之遂辭謝而去蜀志張嶷傳得疾病困篤家素貧匱廣漢太守何祗名為通厚嶷宿與踈闊乃自輿詣祗託以治疾祗傾財醫療數年除愈其黨道信義皆此類也蜀志關羽傳建安五年曹公東征先主奔袁紹曹公禽羽以歸禮之甚厚紹遣大將軍顏良攻東郡太守劉延於白馬曹公使張遼及羽為先鋒擊之羽望見良麾蓋策馬剌良於萬衆之中斬其首還紹諸將莫能當者遂解白馬圍曹公即表封羽為漢壽亭侯初曹公壯羽為人而察其心神無久留之意謂張遼曰卿試以情問之既而遼以問羽羽歎曰吾極知曹公待我厚然吾受劉將軍厚恩誓以共死不可背之吾終不留吾要當立效以報曹公乃去遼以羽言報曹公曹公義之及羽殺顏良曹公知其必去重加賞賜羽盡封其所賜拜書告辭而奔先主於袁軍左右欲追之曹公曰彼各為其主勿追也新唐忠義傳張巡贊曰張巡許遠可謂烈丈夫矣以疲卒數萬嬰孤墉抗方張不制之虜鯁其喉牙使不得搏食東南牽掣首尾豗隤梁宋間大小數百戰雖力盡乃死而唐全得江淮財用以濟中興引利償害以百易萬可矣巡先死不為遽遠後死不為屈巡死三日而救至十日而賊亡天以完節付二人畀名無窮不待留生而後顯也新唐卓行傳贊曰節義為天下大間士不可不勉觀皋濟不汙賊據忠自完而亂臣為沮計天下士知大分所在故傾朝復支不有君子果能國乎德秀以德城以鯁峭圖知命其志凜凜與秋霜爭嚴真丈夫哉箋證史記伯夷列傳武王已平殷亂天下宗周而伯夷叔齊恥之義不食周粟隱於首陽山采薇而食之及餓且死作歌漢書霍光傳殿中嘗有怪一夜群臣相驚光召尚符璽郎郎不肯授光光欲奪之郎按劍曰臣頭可得璽不可得也光甚誼之明日詔增此郎秩二等衆庶莫不多光師古曰多猶重也以此事為多足重也後漢書劉平傳劉平字公子楚郡彭城人也本名曠顯宗後改為平更始時天下亂平弟仲為賊所殺其後賊復忽然而至平扶侍其母奔走逃難仲遺腹女始一歲平抱仲女而棄其子母欲還取之平不聽曰力不能兩活仲不可以絶類遂去不顧與母俱匿野澤中平朝出求食逢餓賊將烹平叩頭曰今旦為老母求萊老母待曠為命願得先歸食母畢還就死因涕泣賊見其至誠哀而遣之平還既食母訖因白曰屬與賊期義不可欺遂還詣賊衆皆大驚相謂曰嘗聞烈士乃今見之子去矣吾不忍食子於是得全後漢書耿弇傳附從子耿恭論曰余初讀蘇武傳感其茹毛窮海不為大漢羞後覽耿恭疏勒之事喟然不覺涕之無從嗟哉義重於生以至是乎後漢書獨行列傳劉茂傳建武二年歸為郡門下掾時赤眉二十餘萬衆攻郡縣殺長吏及府掾史茂負太守孫福踰墻藏空穴中得免明年詔書求天下義士福言茂曰臣前為赤眉所攻吏民壞亂奔走趣山臣為賊所圍命如絲髮賴茂負臣踰城出保盂縣茂與弟觸冒兵刃緣山負食臣及妻子得度死命節義尤高宜蒙表擢以厲義士詔書即徵茂拜議郎後漢書趙孝傳及天下亂人相食孝弟禮為餓賊所得孝聞之即自縛詣賊曰禮久餓羸瘦不如孝肥飽賊大驚並放之謂曰可且歸更持米糒來孝求不能得復往報賊願就烹衆異之遂不害鄉黨服其義後漢書獨行列傳彭修傳彭修字子陽會稽毗陵人也年十五時父為郡吏得休休假也與修俱歸道為盜所劫修困迫乃拔佩刀前持盜帥曰父辱子死卿不顧死邪盜相謂曰此童子義士也不宜逼之遂辭謝而去三國志蜀志張嶷傳張嶷字伯岐巴西郡南充國人也後得疾病困篤家素貧匱廣漢太守蜀郡何祗名為通厚嶷宿與踈闊乃自輿詣祗託以治疾祗傾財醫療數年除愈其黨道信義皆此類也三國志蜀志關羽傳建安五年曹公東征先主奔袁紹曹公禽羽以歸拜為偏將軍禮之甚厚紹遣大將軍顏良攻東郡太守劉延於白馬曹公使張遼及羽為先鋒擊之羽望見良麾蓋策馬刺良於萬衆之中斬其首還紹諸將莫能當者遂解白馬圍曹公即表封羽為漢壽亭侯初曹公壯羽為人而察其心神無久留之意謂張遼曰卿試以情問之既而遼以問羽羽歎曰吾極知曹公待我厚然吾受劉將軍厚恩誓以共死不可背之吾終不留吾要當立效以報曹公乃去遼以羽言報曹公曹公義之及羽殺顏良曹公知其必去重加賞賜羽盡封其所賜拜書告辭而奔先主於袁軍左右欲追之曹公曰彼各為其主勿追也新唐書忠義列傳中贊曰張巡許遠可謂烈丈夫矣以疲卒數萬嬰孤墉抗方張不制之虜鯁其喉牙使不得搏食東南牽掣首尾豗潰梁宋間大小數百戰雖力盡乃死而唐全得江淮財用以濟中興引利償害以百易萬可矣巡先死不為遽遠後死不為屈巡死三日而救至十日而賊亡天以完節付二人畀名無窮不待留生而後顯也新唐書卓行列傳贊曰節誼為天下大間士不可不勉觀皋濟不汙賊據忠自完而亂臣為沮計天下士知大分所在故傾朝復支不有君子果能國乎德秀以德城以鯁峭圖知命其志凜凜與秋霜爭嚴真丈夫哉
