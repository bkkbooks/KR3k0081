body:
  text: 卷第十八賞罰第一前漢賈誼傳慶賞以勸善刑罰以懲惡先王執此之政堅如金石行此之令信如四時據此之公無私如天地耳前漢公孫弘傳策曰上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也末世貴爵厚賞而民不勸深刑重罰而姦不止其上不正遇民不信也夫厚賞重刑未足以勸善而禁非必信而已矣云云罰當罪則姦邪止賞當賢則臣下勸前漢公孫洪傳曰法之所罰義之所去和之所賞禮之所取也禮義者民之所服也而賞罰順之則民不犯禁矣前漢馮野王傳欽奏記王鳳為野王言曰傳曰賞疑從豫所以廣恩勸功也罰疑從去所以慎刑闕難知也前漢藝文志法家者流蓋出理官信賞必罰以輔禮制後漢馬援傳夫明主醲於用賞約於用刑後漢申屠剛傳王者承天順地典主爵刑不敢以天官私其宗不敢以天罰輕其親後漢荀悅傳五政曰明賞必罰審信慎令賞以勸善罰以懲惡人主不妄賞非徒愛其財也賞妄行則善不勸矣不妄罰非矜其人也罰妄行則惡不懲矣賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣後漢上封曰言行君子之樞機賞罰理國之綱紀蜀諸葛亮傳評曰諸葛亮之為相國也撫百姓示儀軌約官職從權制開誠心布公道盡忠益時者雖讎必賞犯法怠慢者雖親必罰服罪輸情者雖重必釋遊辭巧飾者雖輕必戮善無微而不賞惡無纖而不貶庶事精練物理其本循名責實虛偽不齒終於邦域之內咸畏而愛之刑政雖峻而無怨者以其用心平而勸戒明也可謂識洽之良才管蕭之亞匹矣然連年動衆未能成功蓋應變將略非其所長歟蜀樊建為給事中晉武帝問諸葛亮之治國建對曰聞惡必改而不矜過賞罰之信足感神明蜀張裔傳亮出駐漢中裔以射聲校尉領留府長史常稱曰公賞不遺遠罰不阿近爵不可以無功取刑不可以貴勢免此賢愚之所以僉忘其身者也新唐侯君集傳岑文本諫曰且古之出師克敵有重賞不勝蒙顯戮當其有功也雖貪財縱欲尚蒙爵邑其無功也雖勤躬潔己不免鈇鉞新唐魏元忠上卦事曰賞者禮之基罰者刑之本禮崇則謀夫竭其能賞厚則義士輕其死刑正故君子勗其心罰重則小人懲其過賞罰者軍國之綱紀政教之藥石新唐李朝隱傳固請曰生殺之柄人主專之條別輕重有司當守新唐韋澳傳御史周墀節度鄭滑表署幕府會墀人相弘謂曰何以教我澳曰願公無權墀愣眙澳曰爵賞刑罰人主之柄公無以喜怒行之俾庶官各舉其職則公斂衽廟堂上天下治矣烏用權墀歎曰吾先居此得無愧乎餘見恩澤下流崔昭緯傳箋證漢書賈誼傳夫禮者禁於將然之前而法者禁於已然之後是故法之所用易見而禮之所為生難知也若夫慶賞以勸善刑罰以懲惡先王執此之政堅如金石行此之令信如四時據此之公無私如天地耳漢書公孫弘傳弘對曰臣聞上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也末世貴爵厚賞而民不勸深刑重罰而姦不止其上不正遇民不信也夫厚賞重刑未足以勸善而禁非必信而已矣罰當罪則姦邪止賞當賢則臣下勸故法之所罰義之所去也和之所賞禮之所取也禮義者民之所服也而賞罰順之則民不犯禁矣漢書馮奉世傳附子馮野王野王字君卿受業博士通詩少以父任為太子中庶子王鳳為大司馬大將軍輔政八九年矣時數有災異京兆尹王章譏鳳顓權不可任用薦野王代鳳上初納其言而後誅章於是野王懼不自安遂病滿三月賜告與妻子歸杜陵就醫藥大將軍鳳風御史中丞劾奏野王師古曰風讀曰諷杜欽時在大將軍莫府欽素高野王父子行能奏記於鳳為野王言曰傳曰賞疑從豫所以廣恩勸功也師古曰疑當賞不當賞則與之疑厚薄則從厚罰疑從去所以慎刑闕難知也師古曰疑當罰不當罰則赦之疑輕重則從輕漢書藝文志法家者流蓋出於理官信賞必罰以輔禮制後漢書馬援傳初援在交址常餌薏苡實用能輕身省欲以勝瘴氣南方薏苡實大援欲以為種軍還載之一車時人以為南土珍怪權貴皆望之援時方有寵故莫以聞及卒後有上書譖之者以為前所載還皆明珠文犀帝益怒援妻孥惶懼不敢以喪還舊塋裁買城西數畝地稿葬而已裁僅也與才同稿草也以不歸舊塋時權葬故稱稿前雲陽令同郡朱勃詣闕上書曰夫明主醲於用賞約於用刑後漢書申屠剛傳申屠剛字巨卿扶風茂陵人也及舉賢良方正因對策曰臣聞王者承天順地典爵主刑不敢以天官私其宗不敢以天罰輕其親後漢書荀淑傳附孫荀悅時政移曹氏天子恭己而已悅志在獻替而謀無所用乃作申鑒五篇其大略曰致政之術先屏四患乃崇五政興農桑以養其性審好惡以正其俗宣文教以章其化立武備以秉其威明賞罰以統其法是謂五政明賞必罰審信慎令賞以勸善罰以懲惡人主不妄賞非徒愛其財也賞妄行則善不勸矣不妄罰非矜其人也妄罰行則惡不懲矣賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣後漢書袁安傳乃獨上封事曰夫言行君子之樞機賞罰理國之綱紀三國志蜀志諸葛亮傳評曰諸葛亮之為相國也撫百姓示儀軌約官職從權制開誠心布公道盡忠益時者雖讎必賞犯法怠慢者雖親必罰服罪輸情者雖重必釋遊辭巧飾者雖輕必戮善無微而不賞惡無纖而不貶庶事精練物理其本循名責實虛偽不齒終於邦域之內咸畏而愛之刑政雖峻而無怨者以其用心平而勸戒明也可謂識治之良才管蕭之亞匹矣然連年動輒未能成功蓋應變將略非其所長歟三國志蜀志諸葛亮傳注引漢晉春秋曰樊建為給事中晉武帝問諸葛亮之治國建對曰聞惡必改而不矜過賞罰之信足感神明又册府元龜樊建為給事中武帝問諸葛之治國建對曰聞惡必改而不矜過賞罰之信足感神明又明楊時偉編諸葛忠武書引漢晉春秋曰樊建為給事中晉武帝問諸葛亮之治國建對曰聞惡必改而不矜過賞罰之信足感神明三國志蜀志張裔傳張裔字君嗣蜀郡成都人也亮出駐漢中裔以射聲校尉領留府長史常稱曰公賞不遺遠罰不阿近爵不可以無功取刑不可以貴勢免此賢愚之所以僉忘其身者也新唐書侯君集傳侯君集豳州三水人岑文本諫曰高昌之罪議者以其遐遠欲置度外唯陛下奮獨見之明授決勝之略君集得指期平殄今推勞將帥從征之人悉蒙重賞未踰數日更以屬吏天下聞之謂陛下録過遺功無以勸後且古之出師克敵有重賞不勝蒙顯戮當其有功也雖貪財縱欲尚蒙爵邑其無功也雖勤躬潔己不免鈇鉞新唐書魏元忠傳魏元忠宋州宋城人儀鳳中吐蕃數盜邊元忠上封事洛陽宮言命將用兵之要曰賞者禮之基罰者刑之本禮崇則謀夫竭其能賞厚則義士輕其死刑正故君子最其心罰重則小人懲其過賞罰者軍國之綱紀政教之藥石新唐書李朝隱傳李朝隱字光國京兆三原人武強令裴景仙丐贓五千匹亡命帝怒詔殺之朝隱固請曰生殺之柄人主專之條別輕重有司當守新唐書韋貫之傳附子韋澳子澳字子裴第進士復擢宏辭高元裕與其兄溫善欲薦用之諷澳謁己溫歸以告澳不答澳曰元裕端士若輕之邪澳曰然恐無呈身御史周墀節度鄭滑表署幕府會墀入相私謂曰何以教我澳曰願公無權墀愕眙澳曰爵賞刑罰人主之柄公無以喜怒行之俾庶官各舉其職則公斂袵廟堂上天下治矣烏用權墀歎曰吾先居此得無愧乎賞罰殉情第二前漢王莽傳諸東帝外戚及大臣居位素所不説者莽皆傅致其罪傳讀曰付於是附順者拔擢忤恨者誅滅前漢鼂錯對策曰妄賞以隨喜意妄誅以快怒心後漢杜喬傳梁異子弟無功並封喬上書諫曰古之明君褒罰必以功過未世暗主誅賞各緣其私蜀諸葛亮傳上疏曰宮中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之理不宜偏私使內外異法也箋證漢書王莽傳諸哀帝外戚及大臣居位素所不説者師古曰説讀曰悅莽皆傅致其罪師古曰傅讀曰附附益而引致之令入罪於是附順者拔擢忤恨者誅滅漢書鼂錯傳臣聞秦始并天下之時其主不及三王而臣不及其佐然功力不遲者何也地形便山川利財用足民利戰其所與並者六國六國者臣主皆不肖謀不輯民不用故當此之時秦最富強夫國富強而鄰國亂者帝王之資也故秦能兼六國立為天子當此之時三王之功不能進焉及其末塗之衰也任不肖而信讒賊宮室過度耆欲亡極民力罷盡賦斂不節矜奮自賢群臣恐諛驕溢縱恣不顧患禍妄賞以隨喜意妄誅以快怒心後漢書杜喬傳漢安元年以喬守光祿大夫使徇察袞州表奏太山太守李固政為天下第一陳留太守梁讓濟陰太守泛宮濟北相崔瑗等臧罪千萬以上讓即大將軍梁冀季父宮瑗皆冀所善還拜太子太傅遷大司農時梁冀子弟五人及中常侍等以無功並封喬上書諫曰臣聞古之明君褒罰必以功過末世暗主誅賞各緣其私三國志蜀志諸葛亮傳五年率諸軍北駐漢中臨發上疏曰宮中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之理不宜偏私使內外異法也賞罰不中第三前漢刑法志凡爵列官職賞慶刑罰皆以類相從者也一物失稱亂之端也德不稱位能不稱官賞不當功刑不當罪不祥莫大焉隋文帝性猜忌素不悅學既任智而獲大位因以文法自矜明察臨下恆令左右覘視內外小有過失則加以重罪餘見賞罰荀悅傳箋證漢書刑法志凡爵列官職賞慶刑罰皆以類相從者也一物失稱亂之端也德不稱位能不稱官賞不當功刑不當罪不祥莫大焉隋書刑法志高祖性猜忌素不悅學既任智而獲大位因以文法自矜明察臨下恆令左右覘視內外有小過失則加以重罪惜封賞第四史記晉世家壺叔曰君三行賞賞不及臣敢請罪文公報曰天導我以仁義防我以德惠此受上賞輔我以行卒以成立此受次賞矢石之難汗馬之勞此復受次賞若以力事我而無補吾缺者此受次賞三賞之後故且及子晉人聞之皆悅前漢酈食其説齊曰項王有背約之名殺義帝之負於人之功無所記於人之罪無所忘言項羽吝爵賞而念舊惡戰勝而不得其賞拔城而不得其封非項氏莫得用事為人刻印玩而不能授攻城得賂積財而不能賞天下畔之賢材怨之而莫為之用故天下之士歸於漢王前漢周亞夫傳竇太后曰皇后兄王信可侯也上讓曰始南皮及章武先帝不侯及臣即位乃侯之信未得封也竇太后曰人生各以時行耳竇長君在時竟不得侯死後乃其子彭祖顧得侯吾甚恨之帝趣侯信也上曰請得與丞相計之亞土曰高帝約非劉氏不得王非有功不得侯不如約天下共墼之今信雖皇后兄無功侯之非約也上默然而沮前漢陳平傳漢王謂平曰天下紛紛何時定乎平曰項王為人恭肅愛人士之廉節好禮者多歸之至於行功賞爵邑重之士亦以此不附今大王嫚而少禮士之廉節者不來然大王能饒人以爵邑士之頑頓耆利無恥者亦多歸漢誠各去兩短集兩長天下指麾即定矣箋證史記晉世家從亡賤臣壺叔曰君三行賞賞不及臣敢請罪文公報曰夫導我以仁義防我以德惠此受上賞輔我以行卒以成立此受次賞矢石之難汗馬之勞此復受次賞若以力事我而無補吾缺者此受次賞三賞之後故且及子晉人聞之皆説漢書酈食其傳使食其説齊王齊王曰天下何歸食其曰天下歸漢齊王曰先生何以言之曰漢王與項王戮力西面擊秦項王有背約之名殺義帝之負於人之功無所記於人之罪無所忘師古曰言項羽吝爵賞而念舊惡戰勝而不得其賞拔城而不得其封非項氏莫得用事為人刻印玩而不能授攻城得賂積財而不能賞天下畔之賢材怨之而莫為之用故天下之士歸於漢王漢書周勃傳附弟周亞夫梁孝王每朝常與太后言亞夫之短竇太后曰皇后兄王信可侯也上讓曰始南皮及章武先帝不侯及臣即位乃侯之信未得封也竇太后曰人生各以時行耳竇長君在時竟不得侯死後乃其子彭祖顧得侯吾甚恨之帝趣侯信也師古曰趣讀曰促上曰請得與丞相計之亞夫曰黃帝約非劉氏不得王非有功不得侯不如約天下共擊之今信雖皇后兄無功侯之非約也上默然而沮漢書陳平傳漢王謂平曰天下紛紛何時定乎平曰項王為人恭敬愛人士之廉節好禮者多歸之至於行功賞爵邑重之士亦以此不附今大王嫚而少禮士之廉節者不來然大王能饒人以爵邑士之頑頓耆利無恥者亦多歸漢如淳曰頑頓謂無廉隅也師古曰頓讀曰鈍耆讀曰嗜誠各去兩短集兩長天下指麾即定矣購賞第五史記荊軻傳私見樊於期曰秦戮足下父母宗族購將軍首金千斤邑万家今有一言可以解燕國之患報將軍之仇者何如於期曰奈何荊軻曰願得將軍之首以獻秦王秦王必喜而見臣臣左手把其袖右手揕張鳩反其胸然則將軍仇報而燕見陵之愧除矣樊於期偏袒扼腕曰此臣日夜切齒痛心也遂自刎史記項羽傳顧見漢騎呂馬童曰君非吾故人乎吾聞漢購我頭千金邑万戶乃自刎而死王翳取其頭餘騎亂相蹂踐爭羽相殺者數十人前漢韓信傳漢軍夾擊大破虜趙軍斬成安君汦上音祇擒趙王歇信乃令軍中無斬廣武君有生得者購千金須之有縛而至戲下者信乃解其縛東向坐西向對而師之前漢季布傳為任俠有名項籍使將兵數窘漢王項藉滅高祖購求布千金布匿濮陽周氏周氏乃髡鉗布與其家僮之魯朱家所賣之箋證史記刺客列傳荊軻荊軻者衛人也其先乃齊人徙於衛衛人謂之慶卿荊軻知太子不忍乃遂私見樊於期曰秦之遇將軍可謂深矣父母宗族皆為戮沒今聞購將軍首金千斤邑萬家將奈何於期仰天太息流涕曰於期每念之常痛於骨髓顧計不知所出耳荊軻曰今有一言可以解燕國之患報將軍之仇者何如於期乃前曰為之奈何荊軻曰願得將軍之首以獻秦王秦王必喜而見臣臣左手把其袖右手揕其胸然則將軍之仇報而燕見陵之愧除矣將軍豈有意樊於期偏袒扼捥而進曰此臣之日夜切齒腐心也乃今得聞教遂自剄史記項羽本紀項王身亦被十餘創顧見漢騎司馬呂馬童曰若非吾故人乎馬童面之如淳曰面不正視也指王翳曰此項王也項王乃曰吾聞漢購我頭千金邑萬戶吾為若德乃自刎而死王翳取其頭餘騎相蹂踐爭項王相殺者數十人史記淮陰侯列傳於是漢兵夾擊大破虜趙軍斬成安君泜水上禽趙王歇信乃令軍中毋殺廣武君有能生得者購千金於是有縛廣武君而致戲下者信乃解其縛東鄉坐西鄉對師事之漢書季布傳季布楚人也為任俠有名項籍使將兵數窘漢王項籍滅高祖購求布千金敢有舍匿罪三族布匿濮陽周氏周氏曰漢求將軍急迹且至臣家能聽臣臣敢進計即否願先自剄布許之乃髡鉗布衣褐置廣柳車中并與其家僮數十人之魯朱家所賣之賜豫第六前漢東方朔傳伏日詔賜從官肉大官丞日晏不來朔獨拔劍割肉謂其同官曰伏日當蚤歸請受賜即懷肉去大官奏之朔入上曰昨賜肉不待詔以劍割肉而去之何也朔免冠謝上曰先生起自責也朔再拜曰朔來朔來受賜不待詔何無禮也拔劍割肉一何壯也割之不多又何廉也歸遺細君又何仁也細君朔妻之名上笑曰使先生自責乃反自譽復賜酒一石肉百斤歸遺細君前漢孔光傳太后詔曰書曰無遺耇老國之將興尊師而重傅其令太師母朝十日一賜餐賜大師靈壽杖孟康曰扶老杖也服虔曰靈壽木名師古曰木似竹有長節長不過八九尺圍三四寸自然有合杖制不削治也後漢循吏傳光武以手迹賜方國者皆一札十行細書成文後漢鍾離意為尚書時交趾太守張恢坐臧詔班賜群臣意得珠璣悉以委地而不拜賜對曰臣聞孔子忍渴於盜泉之水曾參回車於勝母之閭惡其名也邑名勝母此臧穢之寶誠不敢拜帝嗟嘆曰清乎尚書之言乃更以庫錢三十萬賜意後漢桓榮傳以榮為少傳賜以輜車乘馬榮大會諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉乎後漢杜詩遷御史安集洛陽時將軍蕭廣放縱兵士暴掠百姓惶擾詩敕曉不改遂格殺廣還以狀聞世祖賜以棨戟後漢靈帝又以袁逢為三老賜以玉杖魏毛玠傳太祖以素屏風素馮几賜玠曰君有古人之風故賜君古人之服魏鍾繇傳繇遷相國文帝在東宮賜繇五熟釜為之銘曰於赫有魏作漢藩輔厥相惟鍾實幹心膂靖恭夙夜匪遑安處百寮師師楷茲度矩魏華歆傳公卿嘗並賜沒入生口唯歆出而嫁之帝歎息孫盛曰歆當公言皇朝以彰天澤而默受嘉賜獨為君子匹夫之仁蹈道則未也新唐高季輔傳為吏部侍郎善銓敘人物帝賜金背鏡一況其清鑒焉新唐魏徵傳帝曰正觀以前從我定天下間關草昧玄齡功也正觀以後納忠諫正朕違為國家長利徵而已雖古名臣亦何以加親解佩刀以賜二人新唐戴至德傳高宗嘗為飛白書賜侍臣賜至德曰泛洪源俟舟楫郝處俊曰飛九霄假六翮李敬玄曰資啓沃罄丹誠崔知悌曰竭忠節贊皇猷皆見意於辭云新唐牛僧孺傳賜彝樽龍勺詔曰精金古器以比況君子箋證漢書東方朔傳上以朔為常侍郎遂得愛幸久之伏日詔賜從官肉大官丞日晏不來師古曰晏晚也朔獨拔劍割肉謂其同官曰伏日當蚤歸請受賜即懷肉去大官奏之朔入上曰昨賜肉不待詔以劍割肉而去之何也劉攽曰而去之何也之衍字朔免冠謝上曰先生起自責也朔再拜曰朔來朔來受賜不待詔何無禮也拔劍割肉一何壯也割之不多又何廉也歸遺細君又何仁也師古曰細君朔妻之名一説細小也朔輒自比於諸侯謂其妻曰小君上笑曰使先生自責乃反自譽復賜酒一石肉百斤歸遺細君漢書孔光傳明年徙為太師而莽為太傅光常稱疾不敢與莽並光愈恐固稱疾辭位太后詔曰太師光聖人之後先師之子德行純淑道術通明書曰無遺耇老師古曰周書召誥之辭也言不遺老成之人也國之將興尊師而重傅其令太師每朝十日一賜餐賜太師靈壽杖孟康曰扶老杖也服虔曰靈壽木名師古曰木有枝節長不過八九尺圍三四寸自然有合杖制不似竹須削治也後漢書循吏列傳初光武長於民間頗達情偽其以手迹賜方國者皆一札十行細書成文勤約之風行于上下後漢書鍾離意傳顯宗即位徵為尚書時交址太守張恢坐臧千金徵還伏法以資物簿入大司農簿文記也詔班賜群臣意得珠璣悉以委地而不拜賜帝怪而問其故對曰臣聞孔子忍盜於盜泉之水曾參回車於勝母之閭惡其名也説苑曰邑名勝母曾子不入水名盜泉仲尼不飲醜其名也尸子又載其言也此臧穢之寶誠不敢拜帝嗟歎曰清乎尚書之言乃更以庫錢三十萬賜意後漢書桓榮傳拜佚為太子太傅而以榮為少傅賜以輜車乘馬榮大會諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉哉通典職官二三老五更靈帝又以袁逢為三老賜以玉杖三國志魏志毛玠傳毛玠字孝先陳留平邱人也初太祖平柳城班所獲器物特以素屏風素馮几賜玠曰君有古人之風故賜君古人之服三國志魏志鍾繇傳鍾繇字元常頴川長社人也魏國初建為大理遷相國文帝在東宮賜繇五熟釜為之銘曰於赫有魏作漢藩輔厥相惟鍾實幹心膂靖恭夙夜匪遑安處百寮師師楷茲度矩三國志魏志華歆傳華歆字子魚平原高唐人也文帝即王位拜相國封安樂鄉侯及踐阼改為司徒歆素清貧祿賜以振施親戚故人家無擔石之儲公卿嘗並賜沒入生口唯歆出而嫁之帝歎息孫盛曰歆居股肱之任同元首之重則當公言皇朝以彰天澤而默受嘉賜獨為君子既犯作福之嫌又違必去之義可謂匹夫之仁蹈道則未也新唐書高馮傳高馮字季輔以字行德州蓨人貞觀初拜監察御史彈治不避權要進授太子右庶子數上書言得失辭誠切至帝賜鍾乳一劑曰而進藥石之言朕以藥石相報後為吏部侍郎善銓敘人物帝賜金背鏡一況其清鑒焉新唐書魏徵傳帝曰貞觀以前從我定天下間關草昧玄齡功也貞觀之後納忠諫正朕違為國家長利徵而已雖古名臣亦何以加親解佩刀以賜二人新唐書戴胄傳附從子戴至德至德乾封中纍遷西臺侍郎同東西臺三品閲十數年高宗嘗為飛白書賜侍臣賜至德曰泛洪源俟舟楫郝處俊曰飛九霄假六翮李敬玄曰資啓沃罄丹誠崔知悌曰仗忠節贊皇猷皆見意於辭云新唐書牛僧孺傳賜彝樽龍勺詔曰精金古器以比况君子
