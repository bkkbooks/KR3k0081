body:
  text: 卷第四十論功第一史記吳起依魏置相相田文吳起不悅謂田文曰請與子論功曰將三軍使士卒樂死敵國不敢謀子孰與起文曰不如子起曰治百官親万民實府庫子孰與起文曰不如子起曰守西河而秦兵不敢東向韓趙賓從子孰與起文曰不如子起曰此子三者皆出吾下而位加吾上何也文曰主少國疑大臣未附百姓不信方是之時屬之於子乎屬之於我乎起良久曰屬之子矣文曰此乃吾所以居子之上也吳起乃自知弗如田文史記越世家越王使范蠡治國蠡對曰兵甲之事種不如蠡鎮撫國家親附百姓蠡不如種前漢張良傳漢六年封功臣良未嘗有戰鬭功高帝曰運籌策帷幄中決勝千里外子房功也乃封良為留侯上已封大功臣一十餘人其餘日夜爭功而不決未得行封上居雒陽南宮從復道望見諸將往往數人偶語上曰此何語良曰陛下起布衣與此屬取天下今陛下已為天子而所封皆蕭曹故人所親愛而所誅者皆平生仇怨今軍吏計功天下不足以遍封此屬畏陛下不能盡封又恐見疑過失及誅故相聚謀反耳上乃憂曰為將奈何良曰上平生所憎群臣所共知誰最甚者上曰雍齒與我有故怨數窘辱我我欲殺之為功多不忍良曰今急先封雍齒以示群臣見雍齒先封則人人自堅矣於是上置酒封雍齒什邡侯而急趣丞相御史定功行封群臣罷酒皆喜曰雍齒且侯我屬無患矣前漢蕭何傳漢五年已殺項羽即皇帝位論功行封群臣爭功歲餘不決上以何功最盛先封為酇侯食邑八百戶功臣皆曰臣等身被堅執兵多者百餘戰少者數十合攻城略地大小各有差今蕭何未有汗馬之勞徒持文墨議論不戰顧居臣等上何也上曰諸君知獵乎夫獵追殺獸者狗也而發縱指示獸處者人也今諸君徒能走得獸耳功狗也至如蕭何發縱指示功人也前漢蕭何傳列侯畢已受封奏位次皆曰平陽侯曹參身被七十創攻城略地功最多宜第一關內侯鄂秋曰群臣議皆誤夫曹參雖有野戰略地之功此特一時之事夫上與楚相距五歲失軍亡衆跳身遁者數矣然蕭何常從關中遣軍補其處非上所詔令召而數万衆會上乏絶者數矣夫漢與楚相守滎陽數年軍旡見糧蕭何轉漕關中給食不乏陛下雖數亡山東蕭何常全關中待陛下此万世功也蕭何謂以一旦之功加万世之功哉蕭何當第一曹參次之上曰善乃令何賜帶劍履上殿入朝不趨上曰吾聞進賢受上賞蕭何功雖高待鄂君乃得明於是封為安平侯前漢王陵傳高后欲立諸呂為王問陵陵曰高皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王呂氏非約也問左丞相平及絳侯周勃等皆曰高皇帝定天下王子弟今太后稱制欲王昆弟諸呂旡所不可陵讓平勃曰始與高帝唼而盟諸君不在邪今高帝崩太后女主欲王呂民諸君縱欲阿意背約何面目見高帝於地下乎平曰於面折廷爭臣不如君全社稷安劉氏後君亦不如臣陵無以應之吳孫策傳呼權謂曰舉江東之衆決機於兩陳之間與天下爭衡卿不如我舉賢任能各盡其心以保江東我不如卿新唐房玄齡傳敘封拜太宗顧群臣曰朕論公等功定封邑恐不能盡當旡有諱各為朕言之淮安王神通曰義師起臣兵最先至今玄齡等以刀筆吏居第一臣所未喻帝曰叔父兵誠先至然未嘗躬行陳勞故建德之南軍敗不振討黑聞反動望風輒奔今玄齡等有決勝帷幄定社稷功此蕭何所以先諸將也叔父以親宜無愛者顧不可緣私與功臣競先後爾初將軍丘師利等皆怙跋攘袂或指畫自陳説見神通愧屈乃曰陛下至不私其親吾屬可妄訴耶餘見衆官相讓王陵傳箋證史記吳起列傳武侯即封吳起為西河守甚有聲名魏置相相田文吳起不悅謂田文曰請與子論功可乎田文曰可起曰將三軍使士卒樂死敵國不敢謀子孰與起文曰不如子起曰治百官親萬民實府庫子孰與起文曰不如子起曰守西河而秦兵不敢東鄉韓趙賓從子孰與起文曰不如子起曰此子三者皆出吾下而位加吾上何也文曰主少國疑大臣未附百姓不信方是之時屬之於子乎屬之於我乎起默然良久曰屬之子矣文曰此乃吾所以居子之上也吳起乃自知弗如田文史記越王勾踐世家越王勾踐反國乃苦身焦思欲使范蠡治國政蠡對曰兵甲之事種不如蠡鎮撫國家親附百姓蠡不如種漢書張良傳漢六年封功臣良未嘗有戰鬭功高帝曰運籌策帷幄中決勝千里外子房功也自擇齊三萬戶良曰始臣起下邳與上會留此天以臣授陛下陛下用臣計幸而時中臣願封留足矣不敢當三萬戶乃封良為留侯與蕭何等俱封上已封大功臣二十餘人其餘日夜爭功而不決未得行封上居雒陽南宮從復道望見諸將往往數人偶語上曰此何語良曰陛下不知乎此謀反耳上曰天下屬安定何故而反師古曰屬近也言近始安良曰陛下起布衣與此屬取天下今陛下已為天子而所封皆蕭曹故人所親愛而所誅者皆平生仇怨今軍吏計功天下不足以遍封此屬畏陛下不能盡封又恐見疑過失及誅故相聚而謀反耳上乃憂曰為將奈何良曰上平生所憎群臣所共知誰最甚者上曰雍齒與我有故怨數窘辱我我欲殺之為功多不忍良曰今急先封雍齒以示群臣群臣見雍齒先封則人人自堅矣於是上置酒封雍齒為什方侯而急趣丞相御史定功行封群臣罷酒皆喜曰雍齒且侯我屬無患矣漢書蕭何傳漢五年已殺項羽即皇帝位論功行封群臣爭功歲餘不決上以何功最盛先封為酇侯食邑八千戶功臣皆曰臣等身被堅執兵多者百餘戰少者數十合攻城略地大小各有差今蕭何未有汗馬之勞徒持文墨議論不戰顧居臣等上何也上曰諸君知獵乎曰知之知獵狗乎曰知之上曰夫獵追殺獸者狗也而發縱指示獸處者人也今諸君徒能走得獸耳功狗也至於蕭何發縱指示功人也列侯畢已受封奏位次皆曰平陽侯曹參身被七十創攻城略地功最多宜第一上已橈功臣多封何應劭曰橈屈也至位次未有以復難之然心欲何第一關內侯鄂秋時為謁者進曰群臣議皆誤夫曹參雖有野戰略地之功此特一時之事夫上與楚相距五歲失軍亡衆跳身遁者數矣師古曰跳身謂輕身走出也然蕭何常從關中遣軍補其處非上所詔令召而數萬衆會上乏絶者數矣夫漢與楚相守滎陽數年軍無見糧蕭何轉漕關中給食不乏陛下雖數亡山東蕭何常全關中待陛下此萬世功也今雖無曹參等百數何缺於漢漢得之不必待以全奈何欲以一旦之功加萬世之功哉蕭何當第一曹參次之上曰善於是乃令何第一賜帶劍履上殿入朝不趨上曰吾聞進賢受上賞蕭何功雖高待鄂君乃得明於是因鄂秋故所食關內侯邑二千戶封為安平侯漢書王陵傳惠帝崩高后欲立諸呂為王問陵陵曰高皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王呂氏非約也太后不説問左丞相平及絳侯周勃等皆曰高帝定天下王子弟今太后稱制欲王昆弟諸呂無所不可太后喜罷朝陵讓平勃曰始與高帝唼血而盟諸君不在邪今高帝崩太后女主欲王呂氏諸君縱欲阿意背約何面目見高帝於地下乎平曰於面折廷爭臣不如君全社稷安劉氏後君亦不如臣陵無以應之三國志吳志孫策傳先是策殺貢貢小子與客亡匿江邊策單騎出卒與客遇客擊傷策創甚請張昭等謂曰中國方亂夫以吳越之衆三江之固足以觀成敗公等善相吾弟呼權佩以印綬謂曰舉江東之衆決機於兩陳之間與天下爭衡卿不如我舉賢任能各盡其心以保江東我不如卿新唐書房玄齡傳太子即位為中書令第功班賞與如晦長孫無忌尉遲敬德侯君集功第一進爵邗國公食邑千三百戶餘皆次敘封拜帝顧群臣曰朕論公等功定封邑恐不能盡當無有諱各為朕言之淮安王神通曰義師起臣兵最先至今玄齡等以刀筆吏居第一臣所未喻帝曰叔父兵誠先至然未嘗躬行陳勞故建德之南軍敗不振討黑闥反動望風輒奔今玄齡等有決勝帷幄定社稷功此蕭何所以先諸將也叔父以親宜無愛者顧不可緣私與功臣競先後爾初將軍丘師利等皆怙跋攘袂或指畫自陳説見神通愧屈乃曰陛下至不私其親吾屬可妄訴邪讓功第二後漢馮異傳異為人謙退不伐行與諸將相逢輒引車避道進正皆有表識軍中號為整齊每所止舍諸將並坐論功異常獨屏樹平軍中號曰大樹將軍後漢賈復傳諸將每論功自伐復未嘗有言帝輒曰賈君之功我自知之十三年定封膠東侯後漢朱雋傳黃巾起雋與皇甫嵩討頴川汝南陳國諸賊悉破平之嵩乃上言其狀而以功歸雋於是進封西鄉侯魏任城威王彰傳破烏丸還時太祖在長安召彰詣行在所彰自代過鄴笑子謂彰曰卿新有功今見上宜勿自伐應對常若不足者如太子言歸功諸將太祖喜持彰鬚曰黃鬚兒竟大奇也晉庾亮受命討郭默回不受爵賞侃移書曰夫賞罰黜陟國之大信竊怪矯然獨為君子亮曰元師指揮武臣效命亮何功之有遂苦辭不受晉唐彬與王濬伐吳彬為前驅彬知孫皓將降稱疾遲留示不競果有先到者爭功議者高之前漢趙充國傳征罕羌振旅而還所善浩星賜迎説充國浩星姓賜名曰衆人皆以破羌強弩出擊多斬首獲降虜以破壞然有識者以為虜勢窮困兵雖不出必自服矣將軍即見宜歸功於二將軍出擊非愚臣所及如此將軍計未失也充國曰吾年老矣爵位已極豈嫌伐一時事以欺明主哉兵勢國之大事當為後法老臣不以餘命一為陛下明言兵之利害卒死誰當復言之者卒讀曰猝卒以意對卒終也餘見舉賢受賞陳平傳箋證後漢書馮異傳異為人謙退不伐行與諸將相逢輒引車避道進止皆有表識軍中號為整齊每所止舍諸將並坐論功異常獨屏樹下軍中號曰大樹將軍後漢書賈復傳賈復字君文南陽冠軍人也諸將每論功自伐復未嘗有言帝輒曰賈君之功我自知之十三年定封膠東侯後漢書朱傳朱字公偉會稽上虞人也及黃巾起公卿多薦有才略拜為右中郎將持節與左中郎將皇甫嵩討潁川汝南陳國諸賊悉破平之嵩乃上言其狀而以功歸於是進封西鄉侯三國志魏志任城威王彰傳二十三年代郡烏丸反以彰為北中郎將行驍騎將軍與虜相及擊大破之斬首獲生以千數時鮮卑大人軻比能將數萬騎觀望強弱見彰力戰所向皆破乃請服北方悉平時太祖在長安召彰詣行在所彰自代過鄴太子謂彰曰卿新有功今西見上宜勿自伐應對常若不足者彰到如太子言歸功諸將太祖喜持彰鬚曰黃鬚兒竟大奇也晉書庾亮傳亮遂受命鎮蕪湖頃之後將軍郭默據湓口以叛亮表求親征於是以本官加征討都督率將軍路永毛寶趙胤匡術劉仕等步騎二萬會太尉陶侃俱討破之亮還蕪湖不受爵賞侃移書曰夫賞罰黜陟國之大信竊怪矯然獨為君子亮曰元帥指撝武臣效命亮何功之有遂苦辭不受晉書唐彬傳唐彬字儒宗魯國鄒人也詔彬監巴東諸軍事加廣武將軍上征吳之策甚合帝意後與王濬共伐吳彬屯據衝要為衆軍前驅每設疑兵應機制勝陷西陵樂鄉多所禽獲自巴陵沔口以東諸賊所聚莫不震懼倒戈肉袒彬知賊寇已殄孫皓將降未至建業二百里稱疾遲留以示不競果有先到者爭物後到者爭功于時有識莫不高彬此舉漢書趙充國傳充國振旅而還所善浩星賜迎説充國鄧展曰浩星姓賜名也曰衆人皆以破羌強弩出擊多斬首獲降虜以破壞然有識者以為虜藝窮困兵雖不出必自服矣將軍即見宜歸功於二將軍出擊非愚臣所及如此將軍計未失也充國曰吾年老矣爵位已極豈嫌伐一時事以欺明主哉兵藝國之大事當為後法老臣不以餘命一為陛下明言兵之利害卒死誰當復言之者師古曰卒讀曰猝卒以其意對師古曰卒終也歸功於下第三前漢趙廣漢傳為二千石以和顏接士其尉薦待遇吏甚備事推功善歸之於下曰某掾卿所為非二千石所及行之發於至載吏見者皆輸寫心腹旡所隱匿咸願為用僵仆旡所避前漢龔遂傳遂為渤海太守上召遂議曹王生曰天子問君何以治渤海對曰皆聖主之德非小臣之力也上果問治狀遂對如王生言上曰君安得長者之言而稱之遂曰乃臣議曹教戒臣也上拜王生為水衡丞前漢張湯傳奏事上善之曰臣非知為此奏乃監椽史某所為其欲薦吏揚人之善如此前漢薛宣傳宣守左馮翊得郡中吏民罪名輒召告其縣長吏使自行罰曉曰府所以不自發舉者不欲代縣治奪賢令長名也長吏莫不喜懼免官謝宣歸恩受戒者魏志武帝紀令曰吾起義兵誅暴亂於今十九年所征必克豈吾功哉乃賢士大夫之力也其促定功行封於是大封功臣二十餘人皆為列侯新唐王世充傳世充以偏將募江都万人頻擊破之每捷必歸功於下虜獲盡推與士卒故人爭為效新唐李績傳其用兵多籌算料敵應變皆契事機聞人善抵掌嗟嘆及戰勝必推功于下得金帛盡散士卒旡私貯然持法嚴故人為之用餘見任賢王渙傳箋證漢書趙廣漢傳廣漢為二千石以和顏接士其尉薦待遇吏殷勤甚備如淳曰尉亦薦籍也師古曰尉薦謂安尉而薦達之事推功善歸之於下曰某掾卿所為非二千石所及行之發於至誠吏見者皆輸寫心腹無所隱匿咸願為用僵仆無所避師古曰僵偃也仆頓也僵音疆仆音赴漢書循吏傳龔遂上以為勃海太守數年上遣使者徵遂議曹王生願從功曹以王生素耆酒亡節度不可使遂不忍逆從至京師王生日飲酒不視太守會遂引入宮王生醉從後呼曰明府且止願有所白遂還問其故王生曰天子即問君何以治勃海君不可有所陳對宜曰皆聖主之德非小臣之力也遂受其言既至前上果問以治狀遂對如王生言天子産其有讓笑曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹教戒臣也上以遂年老不任公卿拜為水衡都尉議曹王生為水衡丞以褒顯遂云漢書張湯傳間即奏事上善之曰臣非知為此奏乃監掾史某所為師古曰間謂非當朝奏者其欲薦吏揚人之善解人之過如此漢書薛宣傳上徙宣為陳留太守盜賊禁止吏民敬其威信入守左馮翊滿歲稱職宣得郡中吏民罪名輒召告其縣長吏使自行罰曉曰府所以不自發舉者不欲代縣治奪賢令長名也長吏莫不喜懼免冠謝宣歸恩受戒者三國志魏志武帝紀十二年春二月公自淳于還鄴丁酉令曰吾起義兵誅暴亂于今十九年所征必克豈吾功哉乃賢士大夫之力也天下雖未悉定吾當要與賢士大夫共定之而專饗其勞吾何以安焉其促定功行封於是大封功臣二十餘人皆為列侯新唐書王世充傳世充觀隋政方亂而江左浮剽易動乃陰結豪傑有繫獄者皆撓法貸減以樹私恩楊玄感反吳人朱燮晉陵人管崇起江南應之兵十餘萬隋將吐萬緒魚俱羅討之不克世充以偏將募江都萬人頻擊破之每捷必歸功於下虜獲盡推與士卒故人爭為效新唐書李績傳李績其用兵多籌算料敵應變皆契事機聞人善抵掌嗟嘆及戰勝必推功于下得金帛盡散之士卒無私貯然持法嚴故人為之用功成身退第四史記越世家范蠡喟然嘆曰居家則致千金居官則至卿相此布衣之極也久受尊名不祥乃歸相印盡散其財以分與知友鄉黨而懷其重寶間行以去止于陶史記蔡澤傳吾聞之鑒於水者見面之容鑒於人者知吉與凶書曰成功之下不可久處前漢張良傳良乃稱曰家世相韓及韓滅不愛万金之資為韓報仇強秦天下震動今以三寸舌為帝者師封万戶位列侯此布衣之極於良足矣願棄人間事欲從赤松子遊耳乃學道欲輕舉高帝崩呂后德良乃強食之曰人生一世間如白駒之過隙何自苦如此良不得已強聽食後薨前漢周勃傳文帝即位以勃為右丞相賜金五千斤邑万戶居十餘月人或説勃曰君既誅諸呂立代王威震天下而君受厚賞處尊位以厭之則禍及身矣厭謂當之也言既有大功又受厚賞而居尊位以久當之不去則禍及矣厭音一涉反勃懼乃謝請歸相印上許之前漢疏廣傳廣為太傅兄子受為少傅在位五歲太子年十二通論語孝經廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕官至二千石官成名立如此不法懼有後悔豈如父子相隨出關歸老故鄉以壽命終不亦善乎受從議即日父子俱移病滿三月賜告廣遂稱篤上疏乞骸骨上以其年篤老皆許之加賜黃金二十斤皇太子贈以五十斤公卿大夫故人邑子設祖道供帳東都門外送者車數百兩辭決而去及道路觀者皆曰賢哉二大夫或歎息為之下泣後漢李通傳時天下略定通思欲避榮寵以病上書乞身詔下公卿群臣議大司徒侯霸等曰王莽篡漢傾亂天下通懷伊呂蕭曹之謀建造大策扶助神靈輔成聖德破家為國忘身奉主有扶危存亡之義功德最高海內所聞通以天下平定謙讓辭位夫安不忘危宜令通居職療疾欲就諸侯不可聽於是詔通勉致醫藥以時視事其夏引拜為大司空通布衣唱義助成大業重以寧平公主故特見親重然性謙恭常欲避權藝素有消疾自為宰相謝病不視事連年乞骸骨帝每優寵之令以公位歸弟養疾通復固辭積二歲乃聽上大司空印綬新唐解琬傳以年老乞骸骨拜表訖不待報而去史臣曰功遂身退深知止足也餘見物極則反李固傳箋證史記越王勾踐世家范蠡浮海出齊變姓名自謂鴟夷子皮耕于海畔苦身戮力父子治産居無幾何致産數千萬齊人聞其賢以為相范蠡喟然嘆曰居家則致千金居官則至卿相此布衣之極也久受尊名不祥乃歸相印盡散其財以分與知友鄉黨而懷其重寶間行以去止于陶史記蔡澤列傳蔡澤者燕人也蔡澤乃西入秦將見昭王使人宣言以感怒應侯蔡澤曰鑒於水者見面之容鑒於人者知吉與凶書曰成功之下不可久處漢書張良傳良乃稱曰家世相韓及韓滅不愛萬金之資為韓報仇強秦天下震動今以三寸舌為帝者師封萬戶位列侯此布衣之極於良足矣願棄人間事欲從赤松子遊耳乃學道欲輕舉高帝崩呂后德良乃強食之曰人生一世間如白駒之過隙何自苦如此良不得已強聽食後六歲薨諡曰文成侯漢書周勃傳文帝即位以勃為右丞相賜金五千斤邑萬戶居十餘月人或説勃曰君既誅諸呂立代王威震天下而君受厚賞處尊位以厭之則禍及身矣師古曰厭謂當之也言既有大功又受厚賞而居尊位以久當之不去則禍及矣厭音一涉反勃懼亦自危乃謝請歸相印上許之漢書疏廣傳疏廣字仲翁東海蘭陵人也少好學明春秋家居教授學者自遠方至廣為博士太中大夫地節三年立皇太子選丙吉為太傅廣為少傅數月吉遷御史大夫廣徙為太傅廣兄子受字公子亦以賢良舉為太子家令好禮恭謹敏而有辭宣帝幸太子産受迎謁應對及置酒宴奉觴上壽辭禮間雅上甚歡説頃之拜受為少傅在位五歲皇太子年十二通論語孝經廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕官至二千石宦成名立如此不去懼有後悔豈如父子相隨出關歸老故鄉以壽命終不亦善乎受叩頭曰從大人議即日父子俱移病師古曰移病謂移書言病也一曰以病而移居滿三月賜告廣遂稱篤上疏乞骸骨上以其年篤老皆許之加賜黃金二十斤皇太子贈以五十斤公卿大夫故人邑子設祖道供張東都門外送者車數百兩辭決而去及道路觀者皆曰賢哉二大夫或歎息為之下泣後漢書李通傳時天下略定通思欲避榮寵以病上書乞身詔下公卿群臣議大司徒侯霸等曰王莽篡漢傾亂天下通懷伊呂蕭曹之謀建造大策扶助神靈輔成聖德破家為國忘身奉主有扶危存亡之義功德最高海內所聞通以天下平定謙讓辭位夫安不忘危宜令通居職療疾欲就諸侯不可聽於是詔通勉致醫藥以時視事其夏引拜為大司空通布衣唱義助成大業重以寬平公主故特見親重然性謙恭常欲避權藝素有消疾自為宰相謝病不視事連年乞骸骨帝每優寵之令以公位歸第養疾通復固辭積二歲乃聽上大司空印綬舊唐書解琬傳解琬魏州元城人也以年老乞骸骨拜表訖不待報而去史臣曰解琬總兵朔野料敵如神功遂身退深知止足茲亦有足多也
