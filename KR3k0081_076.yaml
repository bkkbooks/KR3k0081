body:
  text: 卷第七十六務農第一前漢食貨志鼂錯復說上曰商賈大者積貯倍息小者坐列販賣操其奇贏日游都市奇贏謂有餘財而蓄聚奇異之物也乘上之急所賣必倍故其男不耕耘女不蠶織衣必文采食必梁肉亡農夫之苦有阡伯之得乘堅策肥履絲曳縞此商人所以兼并農人農人所以流亡者也今法律賤商人商人已富貴矣尊農夫農夫已貧賤矣故俗之所貴主之所賤也吏之所卑法之所簿也上下相反好惡乖迕而欲國富法立不可得也方今之務莫若使民務農而已矣欲民務農在於使民以粟為賞罰前漢食貨志賈誼說上曰今歐民而歸之農使天下各食其力末技游食之民轉而緣南畝則畜積足而人樂其所前漢食貨志武帝未年悔征伐之事迺封丞相為富民侯下詔曰方今之務在於力農以趙過為搜粟都尉前漢宣帝紀本始四年詔曰農者興德之本也今歲不登其令樂府減樂人使歸就農業前漢元帝詔曰烝庶之飢寒遠離父母妻子勞於非業之作衛於不居之宮恐非所以佐陰陽之道也其罷甘泉建章宮衛令就農前漢賈山傳曰陛下省廄馬以賦縣傳去諸苑以賦農夫後漢任延傳為九真太守九真俗以射獵為業不知牛耕民常告糴交趾每致困乏延乃令鑄作田器教之懇闢田疇歲歲開廣百姓充給後漢王景傳遷廬江太守先是百姓不知牛耕致地力有餘而食常不足郡累有楚相孫叔敖所起芍陂稻田景乃驅率吏民修起蕪廢教用犁耕由是塞闢倍多境內豐給晉酒苞傳苞為司徒奏州郡農烝未有賞罰之制宜遣掾屬循行皆當均其土宜與其殿最然後黜陟焉詔曰古者稼穡樹蓺司徒掌之故陶唐之世稷官為重今司徒位當其任乃心王事其使司徒督察州郡播殖其增置掾屬十人聽取王官更練事業者晉陶侃傳為荊州剌史嘗出遊見人持一把未孰稻侃問用此何為人云行道所見聊取之耳侃大怒曰汝既不佃而戲賊人稻執而鞭之是以百姓勤於農殖家給人足晉束晢傳時欲廣農晢上議曰伏見詔書以倉廩不實關右饑窮欲大興田農以蕃嘉榖此誠有虞戒大禹盡力之謂然農穰可致所由者三一曰天時不諐二曰地利無失三曰人力咸用若必春無霢霂之潤秋繁滂沱之患水旱失中雩穰有請雖使羲和平秩后稷親農理疆甽於原隰勒藨蔉於中田猶不足以致倉庾盈億之積也新唐李渤傳立言渭南長源鄉戶四百今纔四十闅鄉戶三千而今千它州縣大抵類此推其敝始於攤逃人之賦假令十室五逃則均責未逃者若抵石于井非極泉不止誠繇聚斂之臣割下媚上願下詔一賜禁止計不三年人必歸于農夫農國之本本立而太平可議矣箋證漢書食貨志於是上感誼言始開藉田躬耕以勸百姓鼂錯復說上曰商賈大者積貯倍息小者坐列販賣操其奇贏日游都市師古曰奇贏謂有餘財而畜聚奇異之物也一說奇謂殘餘物也音居宜反乘上之急所賣必倍故其男不耕耘女不蠶織衣必文采食必粱肉亡農夫之苦有仟伯之得因其富厚交通王侯力過吏埶以利相傾千里游敖冠蓋相望乘堅策肥履絲髮縞此商人所以兼并農人農人所以流亡者也今法律賤商人商人已富貴矣尊農夫農夫已貧賤矣故俗之所貴主之所賤也吏之所卑法之所尊也上下相反好惡乖迕而欲國富法立不可得也方今之務莫若使民務農而已矣欲民務農在於貴粟貴粟之道在於使民以粟為賞罰漢書食貨志文帝即位躬脩儉節思安百姓時民近戰國皆背本趨末賈誼說上曰筦子曰倉廩實而知禮節今毆民而歸之農皆著於本師古曰毆亦驅字著音直略反使天下各食其力末技游食之民轉而緣南畮則畜積足而人樂其所矣漢書食貨志武帝末年悔征伐之事迺封丞相為富民侯下詔曰方今之務在於力農以趙過為搜粟都尉漢書宣帝紀本始四年春正月詔曰蓋聞農者興德之本也今歲不登已遣使者振貸困乏其令太官損膳省宰樂府減樂人使歸就農業漢書元帝紀初元三年六月詔曰盖聞安民之道本繇高陽間者高陽錯謬風雨不時朕之不德庶幾群公有敢言朕之過者今則不然媮合苟從未肯極言師古曰媮與偷同朕甚閔焉永惟蒸庶之饑寒宋祁曰一本無永字遠離父母妻子勞於非業之作衛於不居之宮恐非所以佐高陽之道也其罷甘泉建章宮衛令就農漢書賈山傳陛下即位親自勉以厚天下損食膳不聽樂減外徭衛卒止歲貢省廄馬以賦縣傳師古曰賦給與也傳音張戀反去諸苑以賦農夫後漢書循吏列傳任延傳建武初延上書願乞骸骨歸拜王庭詔徵為九真太守光武引見賜馬雜繒令妻子留洛陽九真俗以射獵為業不知牛耕東觀漢記曰九真俗燒草種田前書曰搜粟都尉趙過教人牛耕也民常告糴交阯每致困乏延乃令鑄作田器教之墾闢田疇歲歲開廣百姓充給後漢書循吏列傳王景傳王景字仲通樂浪𩘻邯人也建初七年遷徐州刺史明年遷廬江太守先是百姓不知牛耕致地力有餘而食常不足郡界有楚相孫叔敖所起芍陂稻田陂在今壽州安豐縣東陂徑百里灌田萬頃芍音鵲景乃驅率吏民修起蕪廢教用犂耕由是墾闢倍多境內豐給晉書石苞傳石苞字仲容渤海南皮人也苞奏州郡農桑未有賞罰之制宜遣掾屬循行皆當均其土宜舉其殿最然後黜陟焉詔曰農殖者為政之本有國之大務也雖欲安時興化不先富而教之其道無由而至今四海多事軍國用廣加承征伐之後屢有水旱之事倉庫不充百姓無積古者稼穡樹藝司徒掌之今雖登論道然經國立政惟時所急故陶唐之世稷官為重今司徒位當其任乃心王事有毀家紓國乾乾匪躬之志其使司徒督察州郡播殖將委事任成垂拱仰辦若宜有所循行者其增置掾屬十人盜取王官更練事業者晉書陶侃傳陶侃字士行本鄱陽人也太興初進號平南將軍尋加都督交州軍事時交州刺史王諒為賊梁碩所陷侃遣將高寶進擊平之以侃領交州刺史錄前後功封次子夏為都亭侯進號征南大將軍開府儀同三司及王敦平遷都督荊雍益梁州諸軍事領護南蠻校尉征西大將軍荊州刺史嘗出遊見人持一把未熟稻侃問用此何為人云行道所見聊取之耳侃大怒曰汝既不佃而戲賊人稻執而鞭之是以百姓勤於農殖家給人足晉書束晳傳時欲廣農晳上議曰伏見詔書以倉廩不實關右饑窮欲大興田農以蕃嘉榖此誠有虞戒大禹盡力之謂然農穰可致所由者三一曰天時不諐二曰地利無失三曰人力咸用若必春無霡霂之潤秋繁滂沱之患水旱失中雩禳有請雖使羲和平秩后稷親農理疆甽於原隰勤藨蔉於中田猶不足以致倉庾盈億之積也新唐書李渤傳李渤字濬之魏橫野將軍申國公發之裔父鈞殿中侍御史以不能養母廢于世渤恥之不肯仕刻志於學與仲兄涉偕隱廬山渤雖處外然志存朝廷表疏凡四十五獻擢為庫部員外郎會皇甫鎛輔政務剝下佐用度而渤奉詔弔郗士美喪在道上言渭南長源鄉戶四百今纔四十閺鄉戶三千而今千它州縣大抵類此推其弊始於攤逃人之賦假令十室五逃則均責未逃者若抵石于井非極泉不止誠繇聚歛之臣割下媚上願下詔一賜禁止計不三年人必歸于農夫農國之本本立而太平可議矣勸農第二前漢文帝紀二年詔曰農天下之大本也民所特以生也而民或不務本而事末故生不遂朕今茲親率群臣農以勸之其賜天下民今年田租之半免不收之前漢文帝紀十二年詔曰吾詔書數十歲勸民種樹而功未興是吏奉吾詔不勤而勸民不明也且吾農民甚苦而吏莫之省將何以勸焉其賜民今年租稅之半前漢成帝陽朔四年詔曰夫洪範八政以食為首斯誠家給刑錯之本也先帝劭農薄其租稅寵其強力令與孝弟同科間者民彌惰怠鄉本者少趍末者眾將何以矯之方東作時其令二千石勉勸農桑出入阡陌致勞來之書不云乎服田力穡乃亦有秋其勗之哉後漢王丹傳每歲農時輒載酒肴於田間候勤者而勞之其墮嬾者恥不致丹皆兼功自厲嬾力亶反晉桓宣傳宣攻拔石勒襄陽而鎮之招懷初附勸課農桑簡刑罰略威儀或載鉏耒於軺軒或親芸穫於隴畝風教大行論者以為次於祖逖唐肅宗紀有事于籍田上行九推禮官奏太過上曰朕勸農率下所恨不終千畝耳箋證漢書文帝紀二年九月初與郡守為銅虎符竹使符應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聽受之竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之圭璋從簡易也師古曰與郡守為符者謂各分其半右留京師左以與之使音所吏反詔曰農天下之大本也民所恃以生也而民或不務本而事末故生不遂師古曰衣食乏絕致有夭喪故不遂其生朕憂其然故今茲親率群臣農以勸之其賜天下民今年田租之半師古曰免不收之漢書文帝紀十二年詔曰道民之路在於務本朕親率天下農十年于今而野不加辟師古曰辟讀曰闢開也歲一不登民有飢色是從事焉尚寡而吏未加務也師古曰從事從農事也吾詔書數下歲勸民種樹師古曰樹謂蓺殖也而功未興是吏奉吾詔不勤而勸民不明也且吾農民甚苦而吏莫之省將何以勸焉其賜農民今年租稅之半漢書成帝紀陽朔四年春正月詔曰夫洪範八政以食為首師古曰洪範尚書篇名箕子為周武王所說洪大也範法也八政一曰食盖王政之所先故以為首斯誠家給刑錯之本也先帝劭農蘇林曰劭音翹精異之意也晉灼曰劭勸勉也師古曰晉說是也其字從力音時召反薄其租稅寵其強力令與孝弟同科間者民彌惰怠鄉本者少趨末者眾將何以矯之師古曰鄉讀曰嚮矯正也方東作時應劭曰東作耕也師古曰春位在東耕者始作故曰東作虞書堯典曰平秩東作其令二千石勉勸農桑出入阡陌致勞來之書不云乎服田力嗇乃亦有秋應劭曰農夫服田厲其膂力乃有秋收也師古曰此商書盤庚之辭其勗之哉後漢書王丹傳王丹字仲回京兆下邽人也哀平時仕州郡王莽時連徵不至家累千金隱居養志好施周急周急謂周濟困急也孔子曰君子周急不繼富每歲農時輒載酒肴於田間候勤者而勞之東觀記曰載酒肴便於田頭大樹下飲食勸勉之因留其餘酒肴而去其墯孏者恥不致丹皆兼功自厲孏與嬾同音力亶反晉書桓宣傳桓宣譙國銍人也宣與陽遂平襄陽侃使宣鎮之以其淮南部曲立義成郡宣招懷初附勸課農桑簡刑罰略威儀或載鉏耒於軺軒或親芸穫於隴畝十餘年間石季龍再遣騎攻之宣能得眾心每以寡弱距守論者以為次於祖逖周訪舊唐書肅宗本紀丁丑上親祀九宮貴神齋宿於壇所戊寅有事於籍田上行九推禮官奏太過上曰朕勸農率下所恨不終于頔耳農桑第三前漢文帝紀十三年詔曰朕親率天下農耕以供粢盛皇后親桑以奉祭服其具禮儀前漢景帝紀二年夏詔曰雕文刻鏤傷農事者也錦繡纂組害女紅者也農事傷則飢之本也女紅害則寒之原也夫飢寒並至而能亡為非者寡矣朕親耕后親桑以奉宗廟粢盛祭服為天下先前漢景帝紀三年春詔曰農天下之本也黃金珠玉飢不可食寒不可衣以為幣用不識其終始間歲或不登意為未者眾農民寡也其令郡國務勸農桑益種樹可得衣食物後漢孝明紀詔曰方春戒節人以耕桑其勑有司務順時氣使無煩擾後漢孝明紀詔曰比者水旱不節邊人食寡政失於上人受其咎有司其勉順時氣勸督農桑去其螟蜮以及蝥賊以稱朕意後漢孝章紀詔曰比年牛多疾疫墾田減少榖價頗貴人以流亡方春東作宜及時務二千石勉勸農桑魏志高堂隆傳景初元年帝愈增崇宮殿彫飾觀閣鑿太行之石英采榖城之文石起景陽山於芳林之園建昭陽殿於太極之北鑄作黃龍鳳皇奇偉之獸飾金墉陵雲臺陵霄闕百役繁興作者万數公卿以下至于學生莫不展力帝乃躬自掘土以率之而遼東不朝悼皇后崩天作淫雨冀州水出漂沒民物隆上疏切諫曰士民者乃國家之鎮也榖帛者乃士民之命也榖帛非造化不育非人力不成是以帝耕以勸農后桑以成服所以昭事上帝告虔報施也餘見務農石苞傳又見勸農成帝紀并桓宣傳箋證漢書文帝紀十三年春二月甲寅詔曰朕親率天下農耕以供粢盛皇后親桑以奉祭服其具禮儀師古曰令立耕桑之禮制也漢書景帝紀二年夏四月詔曰雕文刻鏤傷農事者也錦繡纂組害女紅者也農事傷則飢之本也女紅害則寒之原也夫飢寒並至而能亡為非者寡矣朕親耕后親桑以奉宗廟粢盛祭服為天下先漢書景帝紀三年春正月詔曰農天下之本也黃金珠玉饑不可食寒不可衣以為幣用不識其終始間歲或不登意為末者眾農民寡也其令郡國務勸農桑益種樹可得衣食物後漢書明帝紀中元二年十二月甲寅詔曰方春戒節人以耕桑其勑有司務順時氣使無煩擾禮記孟春之月布德和令行慶施惠仲春無作大事以妨農事後漢書明帝紀永平三年春正月癸巳詔曰夫春者歲之始也始得其正則三時有成正謂日月五星不失其次也三時謂春夏秋左傳曰務其三時比者水旱不節邊人食寡政失於上人受其咎有司其勉順時氣勸督農桑去其螟蜮以及蝥賊詳刑罰罰明察單辭單辭猶偏辭也夙夜匪懈以稱朕意後漢書章帝紀建初元年春丙寅詔曰比年牛多疾疫墾田減少穀價頗貴人以流亡方春東作宜及時務二千石勉勸農桑三國志魏志高堂隆傳高堂隆字升平泰山平陽人魯高堂生後也時軍國多事用法深重隆上疏隆又以為改正朔易服色殊徽號異器械自古帝王所以神明其政變民耳目故三春稱王明三統也於是敷演舊章奏而改焉帝從其議改青龍五年春三月為景初元年帝愈增崇宮殿彫飾觀閣鑿太行之石英采榖城之文石起景陽山於芳林之園建昭陽殿於太極之北鑄作黃龍鳳皇奇偉之獸飾金墉陵雲臺陵霄闕百役繁興作者萬數公卿以下至于學生莫不展力帝乃躬自掘土以率之而遼東不朝悼皇后崩天作淫雨冀州水出漂沒民物隆上疏切諫曰蓋天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財然則士民者乃國家之鎮也榖帛者乃士民之命也榖帛非造化不育非人力不成是以帝耕以勸農后桑以成服所以昭事上帝告虔報施也豐年第四前漢宣帝元康四年詔曰比年豐榖石五錢後漢光武紀初王莽末天下旱蝗黃金一斤易粟一斛至是野榖旅生麻菽尤盛野蚕成繭被於山阜人收其利焉後漢孝明紀十二年是歲天下安平人無徭役歲比登稔百姓豊富粟斛三十牛羊被野餘見水旱史記里不持兵刃箋證漢書宣帝紀元康四年比年豐穀石五錢師古曰比頻也後漢書光武帝紀初王莽末天下旱蝗黃金一斤易粟一斛至是野榖旅生旅寄也不因播種而生故曰旅今字書作穭音呂古字通麻尗尤盛野蠶成繭被於山阜人收其利焉後漢書明帝紀永平十二年是歲天下安平人無徭役歲比登稔百姓殷富粟斛三十牛羊被野饑饉第五前漢高祖紀二年六月關中大饑米斛萬錢人相食令民就食蜀漢前漢景帝紀二年春以歲不登禁內郡食馬粟沒入之前漢貢禹傳奏曰方今天下饑饉可亡大自損減以救之稱天意乎天生聖人蓋為萬民非獨使自娛樂而已後漢劉玄傳王莽末南方饑饉人庶群入野澤掘鳧茈而食之後漢皇甫嵩傳嵩奏請冀州一年田租以贍饑民帝從之百姓歌曰天下大亂兮市為墟母不保子兮妻失夫賴得皇甫兮復安居後漢馮異傳時百姓饑餓人相食黃金斤易豆五升後漢獻帝紀興平元年三月大旱至秋七月遣使者洗囚徒是時榖一斛五十万豆麥二十万人相食啖箋證漢書高帝紀二年六月關中大饑米斛萬錢師古曰一斛直萬錢人相食令民就食蜀漢漢書景帝紀二年春以歲不登禁內郡食馬粟沒入之師古曰食讀曰飤沒入者沒入其馬漢書貢禹傳元帝初即位徵禹為諫大夫數虛己問以政事是時年歲不登郡國多困禹奏言方今天下饑饉可亡大自損減以救之稱天意乎天生聖人蓋為萬民非獨使自娛樂而已也後漢書劉玄傳王莽末南方饑饉人庶群入野澤掘鳧茈而食之更相侵奪爾雅曰芍鳧茈郭璞曰生下田中苗似龍鬚而細根如指頭黑色可食芍音胡了反鳧茈續漢書作符訾後漢書皇甫嵩傳以黃巾既平故改年為中平嵩奏請冀州一年田租以贍饑民帝從之百姓歌曰天下大亂兮市為墟母不保子兮妻失夫賴得皇甫兮復安居後漢書馮異傳時百姓饑餓人相食黃金一斤易豆五升後漢書獻帝紀興平元年春正月辛酉大赦天下改元興平秋七月三輔大旱自四月至于是月帝避正殿請雨遣使者洗囚徒原輕繫洗謂蕩滌也是歲榖一斛五十萬豆麥一斛二十萬人相食啖白骨委積水旱第六史記貨殖傳故歲在金穰水毀木饑火旱旱則資舟水則資車物之理也前漢文帝紀十六年冬詔曰間者數年風不登又有水旱疾疾之災朕甚憂之意者朕之政有所失而行有過歟乃天道有不順地利或不得人事多失和鬼神廢不享與何以致者率意遠思無有所隱前漢公孫洪傳對曰堯遭鴻水使禹治之未聞禹之有水也若湯之旱則桀之餘烈也後漢和帝紀永元六年詔曰朕以眇末承奉鴻烈陰陽不和水旱違度有司不念寬和而競為苛刻非所以上當天心下濟元元也餘見儲畜食貨志又見天人相通稚圭傳箋證史記貨殖列傳計然曰知鬭則修備時用則知物索隱言知時所用之物二者形則萬貨之情可得而觀已故歲在金穰水毀木饑火旱旱則資舟水則資車索隱國語大夫種曰賈人旱資舟水資車以待也物之理也漢書文帝紀後元年詔曰間者數年比不登又有水旱疾疫之災朕甚憂之愚而不明未達其咎意者朕之政有所失而行有過與乃天道有不順地利或不得人事多失和鬼神廢不享與何以致此將百官之奉養或費無用之事或多與何其民食之寡乏也夫度田非益寡而計民未加益以口量地其於古猶有餘而食之甚不足者其咎安在無乃百姓之從事於末以害農者蕃為酒醪以靡榖者多六畜之食焉者眾與細大之義吾未能得其中其與丞相列侯吏二千石博士議之有可以佐百姓者率意遠思無有所隱漢書公孫弘傳弘對曰臣聞堯遭鴻水使禹治之未聞禹之有水也若湯之旱則桀之餘烈也後漢書和殤帝紀永元六年三月丙寅詔曰朕以眇末奉承鴻烈高陽不和水旱違度濟河之域凶饉流亡而未獲忠言至謀所以匡救之策寤寐永歎用思孔疚惟官人不得於上黎民不安於下有司不念寬和而競為苛刻覆案不急以妨民事甚非所以上當天心下濟元元也旱第七前漢文帝紀六年夏大旱蝗令諸侯無入貢弛山澤減諸服御損郎吏員發倉庾以振民民得賣爵前漢食貨志武帝歲小旱上令百官求雨卜式言曰縣官當食租衣稅而巳今桑羊令吏坐市列販物求利亨桑羊天乃雨前漢武帝元封四年夏大旱民多暍死暍音謁中熱而死晉懷帝紀永嘉三年大旱江漢河洛皆竭可涉晉束晢傳太康中郡界云旱晢為邑人請雨三日而降眾謂晢誠感作歌曰束先生通神明請天三日甘雨零我黍以育我稷以生何以疇之報束長生新唐劉蕡傳臣前所謂救災旱在乎致精誠者臣謹案春秋魯僖公一年之中三書不雨者以其人君有恤人之志也文公三年之中一書不雨者以其人君無閔人之心也故僖致誠而旱不害物文無卹潣而變則成災陛下有閔人之志則無成災之變矣餘見饑饉獻帝紀箋證漢書文帝紀六年夏四月大旱蝗令諸侯無入貢弛山澤減諸服御損郎吏員發倉庾應劭曰水漕倉曰庾胡公曰在邑曰倉在野曰庾以振民民得賣爵漢書食貨志是歲小旱上令百官求雨卜式言曰縣官當食租衣稅而已今弘羊令吏坐市列販物求利師古曰市列謂列肆亨弘羊天乃雨師古曰亨鬻也音普庚反漢書武帝紀元封四年夏大旱民多暍死如淳曰暍音謁師古曰中熱而死也晉書孝懷帝紀永嘉三年大旱江漢河洛皆竭可涉晉書束晳傳太康中郡界大旱晳為邑人請雨三日而雨注眾為晳誠感為作歌曰束先生通神明請天三日甘雨零我黍以育我稷以生何以疇之報束長生新唐書劉蕡傳太和二年舉賢良方正能直言極諫帝引諸儒百餘人于廷策曰蕡對曰欲人之化在脩已以先之欲氣之和在遂性以導之捄災旱在致精誠廣播殖在視食力臣前所謂捄災旱在乎致精誠者臣謹按春秋魯僖公一年之中三書不雨者以其人君有恤人之志也文公三年之中一書不雨者以其人君無閔人之心也故僖致誠而旱不害物文無卹閔而變則成災陛下有閔人之志則無成災之變矣
