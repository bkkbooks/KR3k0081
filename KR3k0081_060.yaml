body:
  text: 卷第六十讒毀第一史記南本紀紂用費中為政費中善諛好利商人弗親用惡之惡來善毀讒諸侯以此益疏史記趙世家曰姦臣在朝國之殘也讒臣在中主之蠹也史記屈原傳懷王使屈原造為憲令屬草藁未定上官大夫見而欲奪之不與因讒之王怒而疏屈平屈平疾王聽之不聰也讒諂之蔽明也邪曲之害公也方正之不容也故幽愁幽思而作離騷史記甘茂傳魯人有與曾參同姓名者殺人人告其母曰曾參殺人其母織自若也頃之一人又告之其母尚織自若也又一人告之其母投杼下機踰墻而走夫以曾參之賢與其母信之也三人疑之其母懼焉今臣之賢不若曾參王之信臣又不如曾參之母信曾參也疑臣者非特三人臣恐大王之投杼也魏文侯令樂羊將而攻中山三年而拔之樂羊返而論功文侯示之謗書一篋樂羊再拜稽首曰此非臣之功也主之力也史記張儀傳臣聞積羽沈舟群輕折軸衆口鑠金積毀銷骨前漢賈誼傳天子議以誼任公卿絳灌之屬毀誼曰雒陽之人年少初學專欲擅權紛亂諸事於是天子疏之不用其議以誼為長沙王大傳贊曰劉向稱賈誼言三代與秦治亂其論甚美通達國體雖古之伊管未能遠過也使時見用功化必盛為庸臣所害甚可悼痛前漢賈誼傳自諭曰鳳凰翔于千仞兮覽德輝而下之見細德之險微兮遙增擊而去之彼尋常之汙瀆兮豈容吞舟之魚橫江湖之鱣鯨兮固將制於螻蟻鱣鯨皆大魚也小水不容大魚而橫鱣鯨必為螻蟻所制以況少朝王暗不容受忠逆之言亦為讒賊小臣所害前漢鄒陽傳曰女無美惡入宮見妒士無賢不肖入朝見嫉前漢鄒陽曰魯聽季孫之説逐孔子宋任子冉之計囚黑翟夫以孔墨之辨不能自免於讒諛而二國以危何則衆口鑠金積毀銷骨也前漢東方朔傳曰鼱鼩之襲狗鼱鼩小鼠也音精劬孤豚之咋虎咋嚙也仕客反至則靡耳何功之有靡碎滅也耳語辭今以下愚而非處士雖欲勿困故不得已此適足以明其不知權變而終惑於大道也前漢馮奉世傳贊曰馮參鞠躬履方擇地而行可謂淑人君子然卒死於非罪不能自免哀哉讒邪交亂正良被害自古而然故伯奇放流孟子宮刑申失雉經屈原赴湘小辨之詩作離騷之辭興經曰心之憂矣涕既隕之馮參姊弟亦云悲矣前漢息夫躬傳躬既愧近數進見言事論議亡所避衆畏其口見之庂目躬上疏歷詆公卿大臣曰方今丞相王嘉健而蓄縮不可用御史大夫賈延惰弱不任職左將軍公孫祿司隸鮑宣皆外有直項之名內實騃不曉政事諸曹以下僕遫不足數卒有強弩圍城長戟指闕陛下誰與備之如使狂夫嘄呼於東崖胸奴飲馬於渭水邊境雷動四野風起京師雖有武蜂精兵未有能跬左足跬半步也言一舉足而先應者也軍書交馳而輻湊羽檄重迹而押至小夫懦臣之徒憒耗不知所為其有犬馬之決者仰藥而伏刃雖加夷滅之誅何益禍敗之至哉押音狎習之狎言相因而至後漢五行志延光三年大水流殺民人傷苗稼是時安帝信江京樊豐及阿母主聖等讒言免太尉楊震廢皇太子後漢馬援傳援在交趾常餌薏苡實用能輕身省欲以勝瘴氣南方薏苡實大援欲以為種軍還載軍將入以為南土殄怪權貴皆望之援時方有寵莫敢言及卒後有上書譖之以為前所載還皆明珠文犀帝益怒援妻子不敢以喪還舊塋藁葬而已詣闕訴冤前後六上辭甚哀切乃得葬新唐虞群傳贊曰詩人斥譖人最甚投之豺虎有北不置也如群栖楚輩則然肆訐以示公構黨以植私其言纚纚君可聽卒而入于敗亂也孔子所謂順非而澤者歟利口覆邦家者歟耆掩衆取功自速其死哀哉箋證史記殷本紀紂囚西伯羑里西伯之臣閎夭之徒求美女奇物善馬以獻紂紂乃赦西伯西伯出而獻洛西之地以請除炮烙之刑紂乃許之賜弓矢斧鉞使得征伐為西伯而用費中為政費中善諛好利殷人弗親紂又用惡來索隱秦之祖蜚廉子惡來善毀讒諸侯以此益疏史記趙世家肥義謂信期曰吾聞之也姦臣在朝國之殘也讒臣在中主之蠹也史記屈原列傳懷王使屈原造為憲令屈平屬草藁未定上官大夫見而欲奪之屈平不與因讒之曰王使屈平為令衆莫不知每一令出平伐其功曰以為非我莫能為也王怒而疏屈平屈平疾王聽之不聰也讒諂之蔽明也邪曲之害公也方正之不容也故憂愁幽思而作離騷史記甘茂列傳王迎甘茂於息壤甘茂至王問其故對曰昔曾參之處費魯人有與曾參同姓名者殺人人告其母曰曾參殺人其母織自若也頃之一人又告之曰曾參殺人其母尚織自若也頃又一人告之曰曾參殺人其母投杼下機踰墻而走夫以曾參之賢與其母信之也三人疑之其母懼焉今臣之賢不若曾參王之信臣又不如曾參之母信曾參也疑臣者非特三人臣恐大王之投杼也始張儀西并巴蜀之地北開西河之外南取上庸天下不以多張子而以賢先王魏文侯令樂羊將而伐中山三年而拔之樂羊返而論功文侯示之謗書一篋樂羊再拜稽首曰此非臣之功也主君之力也史記張儀列傳張儀復説魏王曰臣聞之積羽沉舟群輕折軸衆口鑠金積毀銷骨漢書賈誼傳天子議以誼任公卿之位絳灌東陽侯馮敬之屬盡害之乃毀誼曰雒陽之人年少初學專欲擅權紛亂諸事于是天子後亦疏之不用其議以誼為長沙王太傅贊曰劉向稱賈誼言三代與秦治亂之意其論甚美通達國體雖古之伊管未能遠過也使時見用功化必盛為庸臣所害甚可悼痛漢書賈誼傳誼為長沙王太傅誼既以適去意不自得及渡湘水為賦以弔屈原誼追傷之因以自諭其辭曰鳳皇翔于千仞兮覽德輝而下之見細德之險微兮遙增擊而去之彼尋常之汙瀆兮豈容吞舟之魚橫江湖之鱣鯨兮固將制於螻蟻如淳曰鱣鯨皆大魚也臣瓚曰鱣魚無鱗口在腹下鯨魚長者長數里晉灼曰小水不容大魚而橫鱣鯨于汙瀆必為螻蟻所制以况小朝主暗不容受忠逆之言亦為讒賊小臣所害師古曰鱣音竹連反字或作鱏鱏亦大魚也音淫又音尋螻音樓謂螻蛄也漢書鄒陽傳陽客遊以讒見禽恐死而負絫乃從獄中上書曰故女無美惡入宮見妒士無賢不肖入朝見嫉昔魯聽季孫之説逐孔子宋任子冉之計囚墨翟夫以孔墨之辨不能自免於讒諛而二國以危何則衆口鑠金積毀銷骨也漢書東方朔傳譬猶鼱鼩之襲狗服虔曰音蹤劬如淳曰鼱鼩小鼠也音精劬孤豚之咋虎師古曰孤豚孤特之豚也咋嚙也音仕客反至則靡耳何功之有師古曰靡碎滅也耳語辭今以下愚而非處士雖欲勿困固不得已此適足以明其不知權變而終惑於大道也卷六十五案此節選于答客難之文漢書馮奉世傳附子馮參贊曰詩稱抑抑威儀惟德之隅師古曰大雅抑之詩也宜鄉侯參鞠躬履方擇地而行可謂淑人君子然卒死於非罪不能自免哀哉讒邪交亂貞良被害自古而然故伯奇放流孟子産刑張晏曰寺人孟子賢者被讒見宮刑作巷伯之詩也申生雉經屈原赴湘小辨之詩作離騷之辭興經曰心之憂矣涕既隕之馮參姊弟亦云悲矣漢書息夫躬傳躬既親近數進見言事論議亡所避衆畏其口見之庂目師古曰庂古側字躬上疏歷詆公卿大臣曰方今丞相王嘉健而蓄縮不可用御史大夫賈延墮弱不任職左將軍公孫祿司隸鮑宣皆外有直項之名內實騃不曉政事諸曹以下僕遫不足數卒有強弩圍城長戟指闕陛下誰與備之如使狂夫嘄呼於東崖胸奴飲馬於渭水邊竟雷動四野風起京師雖有武蜂精兵未有能窺左足而先應者也蘇林曰窺音跬師古曰跬半步也言一舉足也音口婢反軍書交馳而輻湊羽檄重迹而押至文穎曰押音狎習之狎師古曰押至言相因而至也羽檄檄之插羽者也小夫懦臣之徒憒眊不知所為其有犬馬之決者仰藥而伏刃雖加夷滅之誅何益禍敗之至哉後漢書五行志三延光三年大水流殺民人傷苖稼是時安帝信江京樊豐及阿母王聖等讒言免太尉楊震廢皇太子後漢書馬援傳初援在交址常餌薏苡實用能輕身省欲以勝瘴氣南方薏苡實大援欲以為種軍還載之一車時人以為南土珍怪權貴皆望之援時方有寵故莫以聞及卒後有上書譖之者以為前所載還皆明珠文犀馬武與於陵侯侯昱等皆以章言其狀帝益怒援妻孥惶懼不敢以喪還舊塋裁買城西數畝地稿葬而已賓客故人莫敢弔會嚴與援妻子草索相連詣闕請罪帝乃出松書以示之方知所坐上書訴冤前後六上辭甚哀切然後得葬新唐書竇群二張楊熊柏傳贊曰詩人斥譖人最甚投之豺虎有北不置也如群栖楚輩則然肆訐以示公構黨以植私其言纚纚若可聽卒而入于敗亂也孔子所謂順非而澤者歟利口覆邦家者歟耆掩輒取功自速其死哀哉不聽讒毀第二前漢鄒陽從梁孝王遊介於羊勝公孫詭之間勝等疾陽惡之孝王孝王怒下陽吏將殺之乃從獄中上書奏孝王孝王立出之卒為上客新唐書尉遲敬德傳敬德與尋相舉地降引為右一府統軍從擊王世充會尋相叛諸將疑敬德且亂囚之行臺左僕射屈通尚書殷開山曰敬德慓敢今執之猜二已結不即殺後悔無及也王曰不然敬德必叛寧肯後尋相者邪釋之新唐書皇甫無逸傳蜀新定吏多橫恣人不聊詔無逸持節巡撫得承制除吏既至黜貪暴用廉善法令嚴明蜀人以安皇甫希仁憸人也誣告無逸為母故陰交世充帝判其許斬希仁餘見君不疑臣鄒陽傳并班超傳又見委任大臣昭帝贊箋證漢書鄒陽傳是時景帝少弟梁孝王貴盛亦待士於是鄒陽枚乘嚴忌知吳不可説皆去之梁從孝王遊陽為人有智略慷慨不茍合介於羊勝公孫詭之間勝等疾陽惡之孝王師古曰惡謂讒毀也其下亦同孝王怒下陽吏將殺之陽客遊以讒見禽恐死而負絫乃從獄中上書曰書奏孝王孝王立出之卒為上客新唐書尉遲敬德傳武德二年秦王戰柏壁金剛敗奔突厥敬德合餘衆守介休王遣任城王道宗宇文士及諭之乃與尋相舉地降引為右一府統軍從擊王世充會尋相叛諸將疑敬德且亂囚之行臺左僕射屈突通尚書殷開山曰敬德慓敢今執之猜二已結不即殺後悔無及也王曰不然敬德必叛寧肯後尋相者邪釋之新唐書皇甫無逸傳皇甫無逸字仁儉京兆萬年人高祖以無逸本隋勳舊尊遇之拜刑部尚書封滑國公歷陝東道行臺民部尚書遷御史大夫時蜀新定吏多橫恣人不聊詔無逸持節巡撫得承制除吏既至黜貪暴用廉善法令嚴明蜀人以安皇甫希仁憸人也誣告無逸為母故陰交世充帝判其詐斬希仁去讒佞第三前漢孔光傳上乃知光前免非其罪以過近臣毀短光者復免傳嘉曰前為侍中毀譖仁賢誣訴大臣令俊艾者久失其位嘉傾覆巧偽挾姦以罔上崇黨以蔽朝傷善以肆意詩不云乎讒人罔極交亂四國其免嘉為庶人前漢李尋説王根曰諸闒茸佞讇抱虛求進及用殘賊酷虐聞者若此之徒皆嫉善憎忠壞天文敗地理涌躍邪陰湛溺大陽為主結怨於民宜以時廢退不當得居位魏志武帝紀令曰阿黨比周先聖所疾也聞冀州俗父子異部更相毀譽昔直不疑無兄世人謂之盜嫂弟五伯魚三娶孤女謂之撾婦翁王鳳擅權谷永比之申伯王商忠議張康謂之左道此皆以白為黑欺天罔君者也吾欲整齊風俗四者不除吾以為羞前漢劉向傳上疏曰今二府奏佞讇不當在位歷年而不去用賢則如轉石去佞則如拔山如此望陰陽之調不亦難乎二府丞相御史也餘見不聽讒皇甫無逸傳箋證漢書孔光傳上乃知光前免非其罪以過近臣毀短光者復免傅嘉曰前為侍中毀譖仁賢誣訴大臣令俊艾者久失其位師古曰艾讀曰乂嘉傾覆巧偽挾姦以罔上崇黨以蔽朝傷善以肆意詩不云乎讒人罔極交亂四國其免嘉為庶人歸故郡漢書李尋傳帝舅曲陽侯王根為大司馬票騎將軍厚遇尋是時多災異根輔政數虛己問尋尋見漢家有中衰厄會之象其意以為且有洪水為災乃説根曰諸闒茸佞讇抱虛求進及用殘賊酷虐聞者若此之徒皆嫉善憎忠壞天文敗地理涌躍邪陰湛溺太陽為主結怨於民宜以時廢退不當得居位三國志魏志武帝操十年九月令曰阿黨比周先聖所疾也聞冀州俗父子異部更相毀譽昔直不疑無兄世人謂之盜嫂第五伯魚三娶孤女謂之撾婦翁王鳳擅權谷永比之申伯王商忠議張匡謂之左道此皆以白為黑欺天罔君者也吾欲整齊風俗四者不除吾以為羞漢書楚元王傳附劉向更生見堪猛在位幾已得復進懼其傾危乃上封事諫曰今二府奏佞讇不當在位歷年而不去如淳曰二府丞相御史也師古曰讇古諂字故出令則如反汗用賢則如轉石去佞則如拔山如此望陰陽之調不亦難乎忠信獲罪第四史記蘇秦傳人有毀蘇秦者曰左右賣國反覆之臣也將作亂蘇秦恐得罪見燕王曰今臣為王卻齊之兵而攻得十城宜以益親今來而王不官臣者人必有以不信傷臣於王者且今有孝如曾參廉如伯夷信如尾生得此三人者以事大王何若燕王曰足矣蘇秦曰孝如曾參義不離其親一宿於外王又安能使之步行千里而事弱燕之危王哉廉如伯夷義不為孤竹君之嗣不肯為武王臣有廉如此王文安能使之步行千里而行進取於齊哉信如尾生與女子期於梁下女子不來水至不去抱柱而死有信如此王又安能使之步行千里卻齊之強兵哉臣所謂以忠信得罪於上者也燕王曰若不忠信耳豈有以忠信而得罪者乎蘇秦曰臣聞客有遠為吏而其妻私於人者其夫將來其私者憂之妻曰勿憂吾已作藥酒待之矣其夫果至妻使妾舉藥酒進之妾欲言酒之有藥則恐其逐主母也欲勿言乎則恐殺其主父也於是乎佯僵而棄酒主父大怒笞之五十故妾一僵而覆酒上存主父下存主母然而不免於笞惡在乎忠信之無罪也夫臣之過不幸而類是乎燕主曰先生復就故官益厚遇之史記屈原傳屈平正道直行竭忠盡智以事其君讒人間之可謂窮矣信而見疑忠而被謗能無怨乎後漢黃瓊傳上疏曰即位以來未有勝政諸梁秉權豎宮充朝言之者必族附之者必榮忠臣懼死而杜口萬失怖禍而木舌塞陛下耳目之明更為聾瞽之主前白馬令李雲指言宦官罪穢宜誅杜衆知雲所言宜行懼雲以忠獲罪故上書陳理之乞同日而死所以感悟國家庶雲獲兔而雲既不辜衆又并坐天下尤痛益以怨結故朝野之人以忠為諱新唐書長孫旡忌傳曰高宗之不君可與為治邪內牽嬖陰外劫讒言以無忌之親遂良之忠皆顧命大臣一旦誅斥忍而不省反天之剛撓陽之明卒使牝咮鳴辰胙移后家可不哀哉新唐禮儀志丘明修春秋悉以君子定褒貶至陳泄以忠獲罪晉文以臣召君於此數條復稱君子將評得失特以宣尼斷之傳曰危疑之理須聖言以明也晉閻纘父卒繼母不慈纘恭事彌謹而母疾之愈甚乃誣纘盜父時金寶訟于右司遂被清議十餘年纘無怨色孝謹不怠母後意解更移中正乃得復品為太博揚駿舍人箋證史記蘇秦列傳人有毀蘇秦者曰左右賣國反覆之臣也將作亂蘇秦恐得罪歸而燕王不復官也蘇秦見燕王曰臣東周之鄙人也無有分寸之功而王親拜之於廟而禮之於廷今臣為王卻齊之兵而攻得十城宜以益親今來而王不官臣者人必有以不信傷臣於王者臣之不信王之福也臣聞忠信者所以自為也進取者所以為人也且臣之説齊王曾非欺之也臣棄老母於東周固去自為而行進取也今有孝如曾參廉如伯夷信如尾生得此三人者以事大王何若王曰足矣蘇秦曰孝如曾參義不離其親一宿於外王又安能使之步行千里而事弱燕之危王哉廉如伯夷義不為孤竹君之嗣不肯為武王臣不受封侯而餓死首陽山下有廉如此王又安能使之步行千里而行進取於齊哉信如尾生與女子期於梁下女子不來水至不去抱柱而死有信如此王又安能使之步行千里卻齊之強兵哉臣所謂以忠信得罪於上者也燕王曰若不忠信耳豈有以忠信而得罪者乎蘇秦曰不然臣聞客有遠為吏而其妻私於人者其夫將來其私者憂之妻曰勿憂吾已作藥酒待之矣居三日其夫果至妻使妾舉藥酒進之妾欲言酒之有藥則恐其逐主母也欲勿言乎則恐其殺主父也於是乎詳僵而棄酒索隱詳音佯詳詐也僵仆也音薑主父大怒笞之五十故妾一僵而覆酒上存主父下存主母然而不免於笞惡在乎忠信之無罪也夫臣之過不幸而類是乎燕王曰先生復就故官益厚遇之史記屈原列傳屈平正道直行竭忠盡智以事其君讒人間之可謂窮矣信而見疑忠而被謗能無怨乎後漢書黃瓊傳七年疾篤上疏諫曰陛下初從藩國爰升帝位天下拭目謂見太平而即位以來未有勝政諸梁秉權豎宦充朝重封纍職傾動朝廷卿校牧守之選皆出其門羽毛齒革明珠南金之寶殷滿其室富擬王府藝回天地言之者必族附之者必榮忠臣懼死而杜口萬夫怖禍而木舌塞陛下耳目之明更為聾瞽之主故太尉李固杜喬忠以直言德以輔政念國忘身隕歿為報而坐陳國議遂見殘滅賢愚切痛海內傷懼又前白馬令李雲指言宦官罪穢宜誅皆因衆人之心以救積薪之敝弘農杜衆知雲所言宜行懼雲以忠獲罪故上書陳理之乞同日而死所以感悟國家庶雲獲免而雲既不辜衆又并坐天下尤痛益以怨結故朝野之人以忠為諱新唐書長孫褚韓來李上官傳贊曰高宗之不君可與為治邪內牽嬖陰外劫讒言以無忌之親遂良之忠皆顧命大臣一旦誅斥忍而不省反天之剛撓陽之明卒使牝咮鳴晨祚移后家可不哀哉舊唐書禮儀志六丘明修春秋悉以君子定褒貶至陳泄以忠獲罪晉文以臣召君於此數條復稱君子將評得失特以宣尼斷之傳曰危疑之理須聖言以明也晉書閻纘傳閻纘字續伯巴西安漢人也博覽墳典該通物理父卒繼母不慈纘恭事彌謹而母疾之愈甚乃誣纘盜父時金寶訟于有司遂被清議十餘年纘無怨色孝謹不怠母後意解更移中正乃得復品為太傅楊駿舍人嫉惡如讎第五後漢禰衡傳孔融上疏薦衡曰忠果正直志懷霜雪見善若驚疾惡若讎後漢孔奮傳為政明斷甄善疾非見有美德愛之如親其無行者忿之若讎晉傳咸傳剛簡有大節風格俊整識性明悟疾惡如讎晉秦秀傳司徒而日薨議諡曰曾驕奢過度不修軌則不履道德壞人倫之教謹按諡法名與實爽曰繆恬亂肆行曰醜曾宜諡謬醜公時雖不同秀議聞者懼焉秀性忌讒佞疾之如讎素輕鄙賈充及充薨秀議曰充舍宗族弗受而以異姓為後昔鄫養外孫莒公子為後春秋書莒人滅鄫豈不知外孫親邪但以義推之無父子耳悖禮溺情以亂大倫諡法昏亂紀度曰荒請諡荒公不從新唐孔緯傳為御史中丞緯器志方雅嫉惡如讎既總憲綱中外不繩而自肅箋證後漢書文苑列傳禰衡傳衡始弱冠而融年四十遂與為交友上疏薦之曰忠果正直志懷霜雪見善若驚疾惡如讎後漢書孔奮傳孔奮字君魚扶風茂陵人也為政明斷甄善疾非見有美德愛之如親其無行者忿之若讎晉書傅玄傳附子傅咸咸字長虞剛簡有大節風格峻整識性明悟疾惡如讎晉書秦秀傳秀少敦學行以忠直知名咸寧中為博士何曾卒下禮官議諡秀議曰故太宰何曾雖階世族之胤然資性驕奢不循軌則詩云節彼南山惟石巖巖赫赫師尹民具爾瞻言其德行高峻動必以禮耳丘明有言儉德之恭侈惡之大也大晉受命勞謙隱約曾受寵二代顯赫纍世暨乎耳順之年身兼三公之位食大國之租荷保傅之貴執司徒之均二子皆金貂卿校列于帝側方之古人責深負重雖舉門盡死猶不稱位而乃驕奢過度名被九域行不履道而享位非常以古義言之非惟失輔相之宜違斷金之利也穢皇代之美壞人倫之教生天下之醜示後生之傲莫大於此謹按諡法名與實爽曰繆怙亂肆行曰醜曾之行己皆與此同宜諡繆醜公時雖不同秀議而聞者懼焉秀性惡讒佞疾之如讎素輕鄙賈充及充薨秀議曰充舍宗族弗授而以異姓為後悖禮溺情以亂大倫昔鄫養外孫莒公子為後春秋書莒人滅鄫聖人豈不知外孫親邪但以義推之則無父子耳絶父祖之血食開朝廷之禍門諡法昏亂紀度曰荒請諡荒公不從舊唐書孔緯傳孔緯字化文魯曲阜人宣尼之裔乾符中罷學士出為御史中丞緯器志方雅嫉惡如讎既總憲綱中外不繩而自肅
