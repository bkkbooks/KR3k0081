body:
  text: 卷第二十四獄第一史記曹參傳蕭何薨參聞之告舍人趣治行吾且入相居無何使者果召參參去屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大於此者乎參曰獄市者所以并容也今君擾之姦人安所容乎吾是以先之前漢路溫舒曰俗語曰畫地為獄議不入刻木為吏期不對此皆疾吏之風悲痛之辭也前漢路溫舒曰獄者天下之大命也死者不可復生斷者不可復屬䱤古絕字屬連也前漢刑法志今之聽獄者求所以殺之古之聽獄者求所以生之與其殺不辜寧失有罪前漢刑法志今之聽獄者求所以殺之古之聽獄者求所以生之與其殺不辜寧失有罪前漢刑法志今之聽獄者求所以殺之古之聽獄者求所以生之與其殺不辜寧失有罪箋證史記曹相國世家惠帝二年蕭何卒參聞之告舍人趣治行吾將入相居無何使者果召參參去屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大於此者乎參曰不然夫獄市者所以并容也今君擾之姦人安所容也吾是以先之漢書路溫舒傳路溫舒字長君鉅鹿東里人也宣帝初即位溫舒上書言宜尚德緩刑其辭曰俗語曰畫地為獄議不入刻木為吏期不對此皆疾吏之風悲痛之辭也漢書路溫舒傳宣帝初即位溫舒上書言宜尚德緩刑其辭曰夫獄者天下之大命也死者不可復生䱤者不可復屬師古曰䱤古絕字屬連也漢書刑法志至孝宣元康四年又下詔曰又曰今之聽獄者求所以殺之古之聽獄者求所以生之與其殺不辜寧失有罪經義決獄第二前漢五行志淮南衡山王謀反發覺上思仲舒前言使仲舒弟子呂步舒持斧鉞治淮南獄以春秋誼顓斷於外不請既還奏事上皆是之前漢兒寬傳張湯為廷尉以寬為奏讞掾以古法義決疑獄甚重之前漢雋不疑傳始元五年有一男子乘黃犢車建黃旐衣黃襜褕著黃冒詣北闕自謂衛太子公車以聞公車主受章奏者詔使公卿將軍中二千石雜識視長安中吏民聚觀者數萬人右將軍勒兵闕下以備非常丞相御史中二千石至者立莫敢發言京兆尹不疑後到叱從吏收縳或曰是非夫可知且安之不疑曰諸軍何患於衛太子昔蒯瞶違命出奔輒距而不納春秋是之衛太子得死先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用經術明於大誼繇是聲重於朝廷在位者皆自以不及也後漢應劭傳刪定律令為漢儀建安元年乃奏之曰董仲舒老病致仕朝廷每有政議數遣廷尉張湯親至陋巷問其得失於是作春秋決獄二百三十二事動以經對言之詳矣臣竊不自揆輒撰具律本章句尚書舊事廷尉板令決事比例司徒都目五曹詔書及春秋斷獄凡二百五十篇蠲去復重為之節文後漢陳寵傳代郭躬為廷尉性仁矜及為理官數議疑獄常親自為奏每附經典務從寬恕帝輒從之濟活者甚眾其深文刻敝於此少衰後漢何敞傳為汝南太守以寬和為政立春日常召督郵還府分遣儒術大吏案行屬縣顯孝弟有義行者及舉冤獄以春秋義斷之於是郡中無怨聲百姓化其恩後漢霍諝少為諸生明經有人誣諝舅宋光於大將軍梁商者以為妄刊章文坐繫洛陽詔獄掠考困極諝時年十五奏記於商曰諝聞春秋之義原情定過赦事誅意故許止雖殺君而不罪趙盾以縱賊而見書此仲尼所以垂王法漢世所宜遵前修也晉劉頌傳遷廷尉每大事及疑議輒參以經典處決多皆施行唐呂諲傳獨孤及諡議曰呂諲能以才智潤飾吏道至德中與三司同鞫大獄獨引律文附會經義而平反之當時卒用中典箋證漢書五行志淮南衡山王遂謀反膠東江都王皆知其謀陰治兵弩欲以應之至元朔六年迺發覺而伏辜時田蚡已死不及誅上思仲舒前言使仲舒弟子呂步舒持斧鉞治淮南獄以春秋誼顓斷於外不請既還奏事上皆是之漢書兒寬傳寬為人溫良有廉知自將師古曰將衛也以智自衛護也善屬文然懦於武口弗能發明也時張湯為廷尉廷尉府盡用文史法律之吏以寬為奏讞掾以古法義決疑獄甚重之漢書雋不疑傳始元五年有一男子乘黃犢車建寧旐衣黃襜褕著黃冒詣北闕自謂衛太子公車以聞師古曰公車主受章奏者詔使公卿將軍中二千石雜識視長安中吏民聚觀者數萬人右將軍勒兵闕下以備非常丞相御史中二千石至者立莫敢發言京兆尹不疑後到叱從吏收縛或曰是非未可知且安之不疑曰諸君何患於衛太子昔蒯聵違命出奔輒距而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用經術明於大誼繇是名聲重於朝廷在位者皆自以不及也後漢書應奉傳附子應劭又刪定律令為漢儀建安元年乃奏之曰夫國之大事莫尚載籍也載籍也者決嫌疑明是非賞刑之宜允獲厥中俾後之人永為監焉故膠東相董仲舒老病致仕朝廷每有政議數遣廷尉張湯親至陋巷問其得失於是作春秋決獄二百三十二事動以經對言之詳矣臣累世受恩榮祚豐衍竊不自揆貪少云補輒撰具律本章句尚書舊事廷尉板令決事比例司徒都目五曹詔書及春秋斷獄凡二百五十篇蠲去復重為之節文後漢書陳寵傳永元六年寵代郭躬為廷尉性仁矜及為理官數議疑獄常親自為奏每附經典務從寬恕帝輒從之濟活者甚眾其深文刻敝於此少衰後漢書何敞傳何敞字文高扶風平陵人也時濟南王康尊貴驕甚康光武少子也出敞為濟南太傅敞至國輔康以道義數引法度諫正之康敬禮焉歲餘遷汝南太守敞疾文俗吏以苛刻求當時名譽故在職以寬和為政立春日常召督郵還府分遣儒術大吏案行屬縣顯孝悌有義行者及舉冤獄以春秋義斷之是以郡中無怨聲百姓化其恩後漢書霍諝傳霍諝字叔智魏郡鄴人也少為諸生明經有人誣諝舅宋光於大將軍梁商者以為妄刊章文坐繫洛陽詔獄掠考困極諝時年十五奏記於商曰諝聞春秋之義原情定過赦事誅意故許止雖弒君而不罪趙盾以縱賊而見書此仲尼所以垂王法漢世所宜遵前脩也晉書劉頌傳太熙初遷廷尉再遷中書郎每大事及疑議輒參以經典處決多皆施行宋姚鉉編唐文粹呂諲任職從政聰敏肅給能以才智潤飾吏道至德中與三司同鞫大獄獨引律文附會經義而平反之當時卒用中典卷四十一案此文為唐獨孤及撰唐丞相故江陵尹御史大夫呂諲諡議之節錄議獄第三史記釋之為廷尉上行出中渭橋有一人從橋下走出乘輿馬驚於是使騎捕屬之廷尉釋之治問曰縣人來聞蹕匿橋下久之以為行以過即出見乘輿車騎即走耳廷尉奏當此人犯蹕當罰金文帝怒曰此人親驚吾馬吾馬賴柔和令他馬固不敗傷我乎而廷尉迺當之罰金釋之曰法者天子所與天下公共也今法如此而更重之是法不信於民也且方其時上使立誅之則已今既下廷尉廷尉天下之平也一傾而天下用法皆為輕重民安所錯其手足上曰廷尉當是也云云前漢張釋之傳為廷尉人有盜高廟坐前玉環得捕得文帝怒下廷尉治當棄市上大怒曰吾欲致之族而君以法奏之謂常法非吾所以共承宗廟意也釋之謝曰法如是足矣假令愚民取長陵一抔士陛下且何以加其法乎前漢景帝紀後元年春正月詔曰獄重事也人有智愚官有上下獄疑者讞有司有司所不能決移廷尉有令讞而後不當讞者不為失欲令治獄者務先寬前漢朱博傳遷廷尉職典決疑當讞平天下獄博恐為官屬所誣召見正監典法掾史謂曰廷尉本起武吏不通法律幸有眾賢亦何憂然三尺律令人事出其中掾吏試與其正監共撰前世決事吏議難知者數十事持以問廷尉得為諸君覆意之欲用意覆之不近法律也正監以為博苟強意未必能然即共條白焉博皆召掾史並坐而問為平處其輕重十中八九官屬咸服後漢郭躬傳有兄弟共殺人者帝以兄不訓弟故報兄重而滅弟死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當腰斬帝復召躬問之躬對章應罰金帝曰章矯詔殺人何謂罰金躬曰法令有故誤章傳命之謬於事為誤誤者其文則輕帝曰章與囚同縣疑其故也躬曰周道如砥其直如矢君子不逆詐君王法天刑不可以委曲生意帝曰善後漢孔融傳張儉為中常侍侯覽以名捕儉儉與融兄褒有舊亡抵於褒不遇時融年十六謂曰兄雖在外吾獨不能為君主邪因留舍之後事泄收褒融送獄二人未知所坐融曰保納舍藏者融也當坐之褒曰彼來求我非弟之過請甘其罪吏問其母母曰家事任長妾當其辜一門爭死郡縣不能決乃上讞之宜傑反詔坐褒焉襃晉五行志元康中梁國女子許嫁巳受禮娉尋而其夫戍長安經年不歸女家更以適人女不樂行其父母逼彊而去尋得病亡後其夫還問其家具說之其夫徑至女墓不勝哀情便發冢開棺女遂活因與俱歸後壻聞之詣官爭之所在不能決祕書郎王導議曰此是非常事不得以常理斷之宜還前夫朝廷從其議新唐初太宗以古者斷獄必訊於三槐九棘之官乃詔大辟罪中書門下五品已上及尚書等議之餘見寬刑魏明紀又見經義決獄雋不疑傳箋證史記張釋之列傳文帝拜釋之為廷尉頃之上行出中渭橋有一人從橋下走出乘輿馬驚於是使騎捕屬之廷尉釋之治問曰縣人來聞蹕匿橋下久之以為行已過即出見乘輿車騎即走耳廷尉奏當一人犯蹕當罰金文帝怒曰此人親驚吾馬吾馬賴柔和令他馬固不敗傷我乎而廷尉乃當之罰金釋之曰法者天子所與天下公共也今法如此而更重之是法不信於民也且方其時上使立誅之則已今既下廷尉廷尉天下之平也一傾而天下用法皆為輕重民安所錯其手足唯陛下察之良久上曰廷尉當是也漢書張釋之傳釋之曰法者天子所與天下公共也民安所錯其手足唯陛下察之上良久曰廷尉當是也其後人有盜高廟座前玉環得師古曰得者盜環之人為吏所捕得也文帝怒下廷尉治案盜宗廟服御物者為奏當棄市上大怒曰人亡道迺盜先帝器吾屬廷尉者欲致之族而君以法奏之師古曰法謂常法非吾所以共承宗廟意也釋之免冠頓首謝曰法如是足也且罪等然以逆順為基今盜宗廟器而族之有如萬分一假令愚民取長陵一抔土陛下且何以加其法虖漢書景帝紀後元年春正月詔曰獄重事也人有智愚官有上下獄疑者讞有司有司所不能決移廷尉有令讞而後不當讞者不為失欲令治獄者務先寬漢書朱博傳先是南蠻若兒數為寇盜博厚結其昆弟使為反間襲殺之郡中清徙為山陽太守病免官復徵為光祿大夫遷廷尉職典決疑當讞平天下獄博恐為官屬所誣視事召見正監典法掾史謂曰廷尉本起於武吏不通法律幸有眾賢亦何憂然廷尉治郡斷獄以來且二十年亦獨耳剽日久三尺律令人事出其中掾史試與正監共撰前世決事吏議難知者數十事持以問廷尉得為諸君覆意之如淳曰但欲用意覆之不近法律事故也正監以為博苟強意未必能然即共條白焉博皆召掾史並坐而問為平處其輕重十中八九官屬咸服博之疏略後漢書郭躬傳郭躬字仲孫潁川陽翟人也又有兄弟共殺人者而罪未有所歸帝以兄不訓弟故報兄重而減弟死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當腰斬帝復召躬問之躬對章應黃金帝曰章矯詔殺人何謂黃金躬曰法令有故誤章傳命之繆於事為誤誤者其文則輕帝曰章與囚同縣疑其故也躬曰周道如砥其直如矢詩小雅也如砥貢賦平如矢賞罰平君子不逆詐論語孔子之言君王法天刑不可以委曲生意帝曰善後漢書孔融傳山陽張儉為中常侍侯覽所怨覽為刊章下州郡以名捕儉刊削也謂削去告人姓名儉與融兄褒有舊亡抵於褒不遇時融年十六儉少之而不告融見其有窘色謂曰兄雖在外吾獨不能為君主邪因留舍之舍止也後事泄國相以下密就掩捕儉得脫走遂并收褒融送獄二人未知所坐融曰保納舍藏者融也當坐之褒曰彼來求我非弟之過請甘其罪吏問其母母曰家事任長妾當其辜一門爭死郡縣疑不能決乃上讞之詔書竟坐褒焉晉書五行志元康中梁國女子許嫁已受禮聘尋而其夫戍長安經年不歸女家更以適人女不樂行其父母逼彊不得已而去尋得病亡後其夫還問其女所在其家具說之其夫徑至女墓不勝哀情便發冢開棺女遂活因與俱歸後壻聞知詣官爭之所在不能決祕書郎王導議曰此是非常事不得以常理斷之宜還前夫朝廷從其議舊唐書刑法志初太宗以古者斷獄必訊於三槐九棘之官乃詔大辟罪中書門下五品已上及尚書等議之又新唐書刑法志初太宗以古者斷獄訊於三槐九棘乃詔死罪中書門下五品以上及尚書等平議之辨獄第四後漢酷吏周紆傳遷召陵侯相廷掾憚紆嚴明欲損其威乃晨取死人斷手足立寺門紆聞便往至死人邊若與死人共語狀陰察視口眼有稻芒乃密問守門人曰悉誰載藁入城者悉猶知也門者對惟有廷掾耳乃取廷掾考問具服不殺人取道邊死人後人莫敢欺者魏高柔傳護軍營士竇禮近出不還營以為亡表言逐捕沒其妻盈及男女為官奴婢盈連至州府稱冤自訟莫有省者乃辭詣廷尉柔問曰汝何以知夫不亡盈垂泣對曰夫少單特養一老嫗為母事甚恭謹又哀兒女撫視不離非是輕狡不顧室家者也柔重問曰汝夫不與人有怨讎乎對曰夫良善與人無讎又曰汝夫不與人交錢財乎對曰嘗出錢與同營士焦子文求不得時子文適坐小事繫獄柔乃見子文問所坐言次曰汝頗曾舉人錢不子文曰自以單貧初不敢舉人錢物也柔察子文色動遂曰汝昔舉竇禮錢何言不邪子文怪知事露應對不次柔曰汝已殺禮便宜早服子文於是叩頭具首殺禮本末理藏處所柔便遣吏卒承子文辭往掘禮即得其屍詔書復盈母子為平民班下天下以禮為戒晉陸雲傳補浚儀令人有見殺者主名不立雲錄其妻而無所問十許日遣出密令人隨後謂曰其去不出十里當有男子候之與語便縛來既而果然問之具服云與妻通共殺其夫聞妻得出欲與語憚近縣故遠相要候於是一縣稱為神明新唐顏真卿傳監察御史使河隴時五原有冤獄久不決天且旱真卿辨獄而雨郡人呼御史雨箋證後漢書酷吏列傳周紆傳周紆字文通下邳徐人也為人刻削少恩好韓非之術少為廷尉紆廉潔無資常築墼以自給肅宗聞而憐之復以為郎再遷召陵侯相廷掾憚紆嚴明欲損其威乃晨取死人斷手足立寺門紆聞便往至死人邊若與死人共語狀陰察視口眼有稻芒乃密問守門人曰悉誰載藁入城者悉猶知也門者對唯有廷掾耳又問鈴下漢官儀曰鈴下侍閣辟車此皆以名自定者也外頗有疑令與死人語者不對曰廷掾疑君乃收廷掾考問具服不殺人取道邊死人後人莫敢欺者三國志魏志高柔傳高柔字文惠陳留圉人也護軍營士竇禮近出不還營以為亡表言逐捕沒其妻盈及男女為官奴婢盈連至州府稱冤自訟莫有省者乃辭詣廷尉柔問曰汝何以知夫不亡盈垂泣對曰夫少單特養一老嫗為母事甚恭謹又哀兒女撫視不離非是輕狡不顧室家者也柔重問曰汝夫不與人有怨讎乎對曰夫良善與人無讎又曰汝夫不與人交錢財乎對曰嘗出錢與同營士焦子文求不得時子文適坐小事繫獄柔乃見子文問所坐言次曰汝頗曾舉人錢不子文曰自以單貧初不敢舉人錢物也柔察子文色動遂曰汝昔舉竇禮錢何言不邪子文怪知事露應對不次柔曰汝已殺禮便宜早服子文於是叩頭具首殺禮本末埋藏處所柔便遣吏卒承子文辭往掘禮即得其屍詔書復盈母子為平民班下天下以禮為戒晉書陸雲傳雲字士龍六歲能屬文性清正有才理少與兄機齊名俄以公府掾為太子舍人出補浚儀令縣居都會之要名為難理雲到官肅然下不能欺市無二價人有見殺者主名不立雲錄其妻而無所問十許日遣出密令人隨後謂曰其去不出十里當有男子候之與語便縛來既而果然問之具服云與此妻通共殺其夫聞妻得出欲與語憚近縣故遠相要候於是一縣稱其神明新唐書顏真卿傳開元中舉進士又擢制科調醴泉尉再遷監察御史使河隴時五原有冤獄久不決天且旱真卿辨獄而雨郡人呼御史雨決獄寬正第五前漢宣帝紀元康二年夏詔曰獄者萬民之命所以禁暴止邪養育群生也能使生者不怨死者不恨則可謂文吏矣今用法或持巧心祈律貳端深淺不平增辭飾非以成其罪奏不如實上亦亡繇知此朕之不明吏之不稱四方黎民將何仰哉二千石各察官屬勿用此人吏務平法前漢刑法志曰宣帝下詔曰吏用法巧文寖深朕甚傷之於是選于定國為廷尉黃霸等以為廷平季秋後請讞時上常幸宣室齋居而決事獄刑號為平矣前漢于定國傳其決疑平法務在哀鰥寡罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無冤民于定國為廷尉民自以不冤言知其寬平皆無冤枉之慮前漢循吏黃霸傳昭帝立幼霍光秉政大臣爭權光遂遵武帝法度以刑罰痛繩群下繇是俗吏上嚴酷以為能而霸獨用寬和為名會宣帝即位在民間時知百姓苦吏急也聞霸持法平召以為廷尉正數決疑獄庭中稱焉後漢郭躬傳元和元年拜為廷尉躬家世掌法務在寬平及典理官決獄斷刑多依矜恕乃條諸重文可從輕者四十一事奏之事皆施行魏高柔傳時獵法甚峻宜陽典農劉龜竊於禁內射免其功曹張京詣校事言之帝匿京名收龜付獄柔表請告者名帝大怒曰劉龜當死廷尉便當考掠何復請告者主名吾豈妄收龜邪柔曰廷尉天下之平也安得以至尊喜怒而毀法乎重復為奏辭指深切帝意寤乃下京名即還訊各當其罪蜀志楊戲傳戲年二十餘從州書佐為督軍從事職曲刑獄論法決疑號為平當蜀志廖理敕反立傳云云亮表立曰長水校尉廖立誹謗先帝疵毀眾臣羊之亂群猶能為害況立託在大位中人以下識真偽邪於是廢立為民徙汶山郡立躬率妻子耕殖自守聞諸葛亮卒垂泣歎曰吾終為左衽矣餘見下注蜀志李嚴傳改名為平亮表平曰自先帝崩後平所在治家尚為小惠安身求名無憂國之事乃廢平為民徙梓潼郡十二年平聞亮率發病死平常冀亮當自補復策後人不能故以激憤也習鑿齒曰昔管仲奪伯氏駢邑三百沒齒而無怨言聖人以為難諸葛亮之使廖立垂泣李平至死豈徒無怨言而已哉夫水至平而邪者取法鏡至明而醜者亡怒水鏡之所以能窮物而無怨者以其無私也水鏡無私猶以免謗況大人君子懷樂生之心流矜恕之德法行於不可不用刑加乎自犯之罪爵之而非私誅之而不怒天下有不服者乎諸葛亮於是可謂能用刑矣自秦漢巳來亨知有也前漢刑法志古人有言滿堂而飲酒有一人鄉隅而悲泣則一堂皆為之不樂王者之於天下譬猶一堂之上也故一人不得其平為之悽悽於心今郡國被刑而死者歲以萬數天下獄二千餘所其冤死者多少相覆獄不減一人此和氣所以未洽者也原獄刑所以蕃若此者禮教不立刑法不明民多貧窮豪桀務私姦不輒得獄犴不平之所致也新唐宗室傳鄭惠王元懿數斷大獄務寬平高宗嘉之箋證漢書宣帝紀元康二年夏五月詔曰獄者萬民之命所以禁暴止邪養育群生也能使生者不怨死者不恨則可謂文吏矣今則不然用法或持巧心析律貳端深淺不平增辭飾非以成其罪奏不如實上亦亡繇知此朕之不明吏之不稱四方黎民將何仰哉二千石各察官屬勿用此人吏務平法漢書刑法志宣帝自在閭閻而知其若此及即尊位迺下詔曰間者吏用法巧文寖深是朕之不德也夫決獄不當使有罪興邪不辜蒙戮父子悲恨朕甚傷之今遣廷史與郡鞠獄任輕祿薄其為置廷平秩六百石員四人其務平之以稱朕意於是選于定國為廷尉求明察寬恕黃霸等以為廷平季秋後請讞時上常幸宣室齋居而決事獄刑號為平矣漢書于定國傳定國乃迎師學春秋身執經北面備弟子禮為人謙恭尤重經術學士咸稱焉其決疑平法務在哀鰥寡罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無冤民于定國為廷尉民自以不冤師古曰言知其冤平皆無冤枉之慮漢書循吏傳黃霸昭帝立幼大將軍霍光秉政大臣爭權上官桀等與燕王謀作亂光既誅之遂遵武帝法度以刑罰痛繩群下繇是俗吏尚嚴酷以為能而霸獨用寬和為名會宣帝即位在民間時知百姓苦吏急也聞霸持法平召以為廷尉正數決疑獄庭中稱平後漢書郭躬傳元和三年拜為廷尉躬家世掌法務在寬平及典理官決獄斷刑多依矜恕乃條諸重文可從輕者四十一事奏之事皆施行三國志魏志高柔傳時獵法甚峻宜陽典農劉龜竊於禁內射冤其功曹張京詣校事言之帝匿京名收龜付獄柔表請告者名帝大怒曰劉龜當死乃敢獵吾禁地送龜廷尉廷尉便當考掠何復請告者主名吾豈妄收龜邪柔曰廷尉天下之平也安得以至尊喜怒而毀法乎重復為奏辭指深切帝意寤乃下京名即還訊各當其罪三國志蜀志楊戲傳楊戲字文然犍為武陽人也丞相亮深識之戲年二十餘從州書佐為督軍從事職典刑獄論法決疑號為平當三國志蜀志廖立傳廖音理救反立字公淵武陵臨沅人立本意自謂才名宜為諸葛亮之貳而更游散在李嚴等下常懷怏怏亮表立曰長水校尉廖立坐自貴大臧否群士公言國家不任賢達而任俗吏又言萬人率者皆小子也誹謗先帝疵毀眾臣人有言國家兵眾簡練部伍分明者立舉頭視屋憤咤作色曰何足言凡如是者不可勝數羊之亂群猶能為害况立託在大位中人以下識真偽邪於是廢立為民徙汶山郡立躬率妻子耕殖自守聞諸葛亮卒垂泣歎曰吾終為左袵矣三國志蜀志李嚴傳李嚴字正方南陽人也少為郡職吏以才幹稱亮以明年當出軍命嚴以中都護署府事嚴改名為平亮表平曰自先帝崩後平所在治家尚為小惠安身求名無憂國之事乃廢平為民徙梓潼郡十二年平聞亮卒發病死平常冀亮當自補復策後人不能故以激憤也習鑿齒曰昔管仲奪伯氏駢邑三百沒齒而無怨言聖人以為難諸葛亮之使廖立垂泣李平致死豈徒無怨言而已哉夫水至平而邪者取法鏡至明而醜者亡怒水鏡之所以能窮物而無怨者以其無私也水鏡無私猶以免謗况大人君子懷樂生之心流矜恕之德法行於不可不用刑加乎自犯之罪爵之而非私誅之而不怒天下有不服者乎諸葛亮於是可謂能用刑矣自秦漢以來未之有也漢書刑法志古人有言滿堂而飲酒有一人鄉隅而悲泣則一堂皆為之不樂王者之於天下譬猶一堂之上也故一人不得其平為之悽愴於心今郡國被刑而死者歲以萬數天下獄二千餘所其冤死者多少相覆獄不減一人此和氣所以未洽者也原獄刑所以蕃若此者禮教不立刑法不明民多貧窮豪桀務私姦不輒得獄豻不平之所致也新唐書高祖諸子列傳鄭惠王元懿鄭惠王元懿始王滕貞觀中出為兗州刺史喜經術數斷大獄務寬平高宗嘉之
