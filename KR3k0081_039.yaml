body:
  text: 卷第三十九諫獵第一前漢賈山傳曰今從豪俊之臣方正之士直與之日日獵射擊免伐狐以傷大業臣竊悼之古者大臣不得與宴游方正修潔之士不得從射獵使皆務其方以高其節則群臣莫敢不正身修行盡心以稱大禮前漢司馬相如傳嘗從上至長楊獵是時天子方好自擊熊豕馳逐疏獸相如因上疏諫曰今陛下好陵阻險射猛獸卒然遇逸材之獸駭不存之地不存不可得安存也輿不及還轅人不暇施巧雖有烏獲逢蒙之技不得用枯木朽株盡為難矣是胡越起於轂下而羌夷接軫也豈不殆哉且夫清道而後行中路而馳猶時有銜橛之變況乎涉豐草騁丘墟前有利獸之樂而內旡存變之意其為害也不難矣前漢薛廣德傳為三公直言諫爭上幸甘泉郊泰畤禮畢因留射獵上書曰關東困柂人民流離陛下日撞亡秦之鍾聽鄭衛之樂今士卒暴露從官勞倦願陛下亟反宮思與百姓同憂樂上即日還前漢王吉為昌邑中尉而王好游獵吉上疏諫曰大王不好書術而樂游逸馮式撙銜馳騁不止口倦乎叱咤手苦於箠轡身勞乎車輿朝則冒霧露暮則被塵埃夏則為大暑之所暴矣冬則為風寒之所偃薄數以耎脆之玉體犯勤勞之煩毒非所以全壽命之宗也又非所以進仁義之隆也夫廣夏之下細旃之上明師居前勸誦在後上論唐虞之際下及商周之盛考仁聖之風習治國之道欣欣焉發憒忘食日新厥德其樂豈銜橛之間哉前漢張敬傳王太后數出游獵敞奏書諫曰臣間秦王好淫聲葉陽后為不聽鄭衛之樂葉陽秦昭王后葉音式涉反楚莊好田獵焚姬為不食鳥獸之肉口非惡旨甘耳非憎絲竹也所以抑心意絶耆欲者將以率二君而全宗祀也吳張昭傳孫權每田獵常乘馬射虎虎嘗突前攀持馬鞍昭變色而前曰夫為人君者謂能駕御英雄驅使群賢豈謂馳逐於原野校勇於猛獸者乎如有一且之患奈天下笑何權謝昭然猶不能已乃作射虎車為方目間不置蓋一人為御自於中射之時有逸群之獸輒復犯車而權每手擊以為樂昭雖諫爭常笑而不答晉羊祜傳祜在軍常輕裘緩帶身不被甲鈴閣之下侍衛者不過十數人而頗以畋漁廢政常欲夜出軍司徐生執棨當營門曰將軍都督萬里安可輕脫將軍之安危亦國家之安危也胤今日若死此門乃開耳祜改容謝之此後稀出矣新唐書蘇世長傳從獵涇陽大獲帝入旌門詫左右曰今日畋樂乎世長曰陛下廢萬機事游獵不滿十旬未為樂也帝色變既而笑曰狂態發邪曰為臣討則狂為陛下計忠矣新唐唐儉傳從獵洛陽苑群豕突出手林帝射四發輒殪四豕一豕躍及鐙儉投馬搏之帝拔劍斷豕顧笑曰天策長史不見上將擊賊耶何懼之甚對曰漢祖以馬上得之不以馬上治之陛下以神武定四方豈復逞雄心於一獸太宗為罷獵新唐書劉栖楚傳敬宗立視朝常晏數游畋失德栖楚陳曰惟前世王者初嗣位皆親庶政坐以待旦陛下新即位安臥寢內日晏乃作陛下以少主踐阼未幾惡德流布恐福祚之不長也臣以諫為官使陛下負天下譏請碎首以謝遂額叩龍墀血被面餘見諫諍受賞薛收傳箋證漢書賈山傳孝文時言治亂之道借秦為諭名曰至言其辭曰今從豪俊之臣方正之士直與之日日獵射擊兔伐狐以傷大業絶天下之望臣竊悼之古者大臣不媟故君子不常見其齊嚴之色肅敬之容大臣不得與宴游方正修潔之士不得從射獵使皆務其方以高其節則群臣莫敢不正身修行盡心以稱大禮漢書司馬相如傳嘗從上至長楊獵是時天子方好自擊熊豕馳逐壄獸相如因上疏諫其辭曰今陛下好陵阻險射猛獸卒然遇逸材之獸駭不存之地師古曰卒讀曰猝音千忽反謂暴疾也不存不可得存安也劉攽曰不存猶言不虞下文云存變之意犯屬車之清塵輿不及還轅人不暇施巧雖有烏獲逢蒙之技不得用枯木朽株盡為難矣是胡越起於轂下而羌夷接軫也豈不殆哉雖萬全而無患然本非天子之所宜近也且夫清道而後行中路而馳猶時有銜橛之變况乎涉豐草騁丘虛前有利獸之樂而內無存變之意其為害也不難矣漢書薛廣德傳廣德為人溫雅有醞藉及為三公直言諫爭始拜旬日間上幸甘泉郊泰畤禮畢因留射獵廣德上書曰竊見關東困極人民流離陛下日撞亡秦之鐘聽鄭衛之樂臣誠悼之今士卒暴露從官勞倦願陛下亟反宮思與百姓同憂樂天下幸甚上即日還漢書王吉傳王吉少好學明經以郡吏舉孝廉為郎遷雲陽令舉賢良為昌邑中尉而王好游獵驅馳國中動作亡節吉上疏諫曰大王不好書術而樂逸游馮式撙銜臣瓚曰撙促也師古曰撙挫也馳騁不止口倦乎叱咤手苦於箠轡身勞乎車輿朝則冒霧露晝則被塵埃夏則為大暑之所暴炙冬則為風寒之所匽薄數以耎脆之玉體犯勤勞之煩毒非所以全壽命之宗也又非所以進仁義之隆也夫廣夏之下細旃之上明師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道欣欣焉發憤忘食日新厥德其樂豈徒銜橛之閒哉漢書張敞傳王太后數出游獵敞奏書諫曰臣聞秦王好淫聲葉陽后為不聽鄭衛之樂孟康曰葉陽秦昭王后也師古曰葉音式涉反楚嚴好田獵樊姬為之不食鳥獸之肉口非惡旨甘耳非憎絲竹也所以抑心意絶耆欲者將以率二君而全宗祀也三國志吳志張昭傳權每田獵常乘馬射虎虎常突前攀持馬鞍昭變色而前曰將軍何有當爾夫為人君者謂能駕御英雄驅使群賢豈謂馳逐於原野校勇於猛獸者乎如有一且之患奈天下笑何權謝昭曰年少慮事不遠以此慚君然猶不能已乃作射虎車為方目間不置蓋一人為御自於中射之時有逸群之獸輒復犯車而權每手擊以為樂昭雖諫爭常笑而不答晉書羊祜傳祜在軍常輕裘緩帶身不被甲鈴閣之下侍衛者不過十數人而頗以畋漁廢政嘗欲夜出軍司徐胤執棨當營門曰將軍都督萬里安可輕脫將軍之安危亦國家之安危也胤今日若死此門乃開耳祜改容謝之此後稀出矣新唐書蘇世長傳蘇世長京兆武功人從獵涇陽大獲帝入旌門詫左右曰今日畋樂乎世長曰陛下廢萬機事游獵不滿十旬未為樂也帝色變既而笑曰狂態發邪曰為臣計則狂為陛下計忠矣新唐書唐儉傳唐儉字茂約并州晉陽人從獵洛陽苑群豕突出于林帝射四發輒殪四豕一豕躍及鐙儉投馬搏之帝拔劍斷豕顧笑曰天策長史不見上將擊賊邪何懼之甚對曰漢祖以馬上得之不以馬上治之陛下神武定四方豈復快心于一獸帝為罷獵新唐書劉栖楚傳敬宗立視朝常晏數游畋失德栖楚諫曰惟前世王者初嗣位皆親庶政坐以待旦陛下新歷位安臥寢內日晏乃作大行殯宮密邇鼓吹之聲日聞諸朝且憲宗及先帝皆長君朝夕恪勤四方猶有叛者陛下以少主踐阼未幾惡德流布恐福祚之不長也臣以諫為官使陛下負天下譏請碎首以謝遂額叩龍墀血被面虛己接物第二前漢五行志曰禹治洪水賜雒書法而陳之洪範是也降及于商箕子在父師之位而典之周既克商以箕子歸武王親虛己而問焉前漢貢禹傳元帝初即位召禹為諫大夫數虛己問以政事後漢劉寵傳族子岱從侍中出為兗州剌史虛己愛物為土人所附前漢楊雄傳十二月羽獵雄從以為昔二帝三王宮館臺榭沼池苑囿林麓藪澤財足以奉郊廟御賓客充庖廚而已不奪百姓膏腴榖土桑柘之地女有餘布男有餘粟國家豐富上下交足咸陽好田而天下用足文王囿百里民以為尚小齊宣王囿四十里民以為大裕民之與奪民也武帝廣開周袤數百里游觀侈靡窮妙極麗雖頗割其三垂以贍齊民然至羽獵田車戎馬器械儲偫禁御所營尚泰奢麗誇詡詡大也非堯舜成湯文王三驅之意也又恐後世復修前好不折中以泉臺魯時公築泉臺非禮也今楊雄以宮觀之盛當以泉臺折中也故聊因校獵賦以風前漢楊雄傳上將大誇胡人以多禽獸秋命右扶風發民人南山西自褒斜東至洪農南歐漢中張羅罔置罘捕熊羆豪豬虎豹狖玃狐菟麋鹿載以檻車輸長楊射熊館以罔為周阹縱禽獸其中令胡人手摶之自取其獲是時農民不得收斂雄從至射熊館還上長楊賦聊以為風後漢郅惲傳帝嘗出獵車駕夜還惲拒關不開帝令從者見面於門間惲曰火明遼遠遂不受詔帝乃回從東中門入明日惲上書諫曰昔文王不敢槃于游田以萬人惟憂而陛下遠獵山林夜以繼晝其如社稷宗廟何暴虎馮河水至之戒誠小臣所竊憂也書奏賜布百匹貶東中門候為尉後漢延熹傳車駕幸廣城校獵陳蕃上疏諫曰人君有事於苑囿唯仲秋西郊順時講武殺禽助祭以敦孝恭如或違此則為肆縱故皋陶戒舜旡放逸遊周公戒成王旡槃于遊田虞舜成王猶有此戒況德不及二主者乎魏崔琰傳太祖征并州留琰傅文帝於鄴世子仍出田獵變易服乘志在驅逐琰書諫曰盤于游田書之所戒魯隱觀漁春秋譏之此周孔之格言二經之明義魏辛毗傳嘗從帝射雉帝曰射雉樂哉毗曰於陛下甚樂於群下甚苦帝默然後遂為之稀出晉帝性簡儉沖素容納直言虛己待物晉導因進計曰古之王者莫不賓禮故老存問風俗虛己傾心以招俊乂晉齊獻王攸降身虛己待物以信新唐溫大有傳與兄大雅共掌機近不自安請徙他職高祖曰我虛心待卿何所自疑餘見委任大臣梁商傳又見不侮大臣直宗紀又見聘賢董卓傳箋證漢書五行志禹治洪水賜雒書法而陳之洪範是也聖人行其道而寶其真降及于殷箕子在父師位而典之師古曰父師即太師殷之三公也箕子紂之諸父而為太師故曰父師周既克殷以箕子歸武王親虛己而問焉漢書貢禹傳元帝初即位徵禹為諫大夫數虛己問以政事師古曰虛己謂聽受其言也後漢書循吏列傳劉寵傳弟方官至山陽太守方有二子岱字公山董卓入洛陽岱從侍中出為兗州刺史虛己愛物為士人所附漢書揚雄傳上其十二月羽獵雄從以為昔在二帝三王應劭曰二帝堯舜三王夏殷周宮館臺榭沼池苑囿林麓藪澤財足以奉郊廟御賓客充庖廚而已不奪百姓膏腴榖土桑柘之地女有餘布男有餘粟國家殷富上下交足故甘露零其庭醴泉流其唐應劭曰爾雅廟中路謂之唐鳳凰巢其樹黃龍游其沼麒麟臻其囿神爵棲其林昔者禹任益虞而上下和屮木茂師古曰益臣名也任以為虞虞主山澤之官也成湯好田而天下用足文王囿百里民以為尚小齊宣王囿四十里民以為大裕民之與奪民也武帝廣開上林南至宜春鼎胡御宿昆吾旁南山而西至長楊五柞北繞黃山瀕渭而東周袤數百里師古曰袤長也音茂穿昆明池象滇河營建章鳳闕神明馺娑漸臺泰液象海水周流方丈瀛洲蓬萊游觀侈靡窮妙極麗雖頗割其三垂以贍齊民然至羽獵田車戎馬器械儲偫禁禦所營尚泰奢麗誇詡師古曰詡大也非堯舜成湯文王三驅之意也又恐後世復修前好不折中以泉臺服虔曰魯莊公築泉臺非禮也至文公毀之公羊譏云先祖為之而毀之勿居而已今楊雄以宮觀之盛非成帝所造勿修而已當以泉臺折中也故聊因校獵賦以風漢書揚雄傳下明年上將大誇胡人以多禽獸秋命右扶風發民入南山西自褒斜東至弘農南驅漢中張羅罔罝罘捕熊羆豪豬虎豹狖玃狐菟麋鹿載以檻車輸長楊射熊館以罔為周阹縱禽獸其中令胡人手搏之自取其獲上親臨觀焉是時農民不得收斂雄從至射熊館還上長楊賦聊因筆墨之成文章故藉翰林以為主人子墨為客卿以風其辭曰後漢書郅惲傳惲遂客居江夏教授郡舉孝廉為上東城門候帝嘗出獵車駕夜還惲拒關不開帝令從者見面於門間惲曰火明遼遠遂不受詔帝乃乃從東中門入明日惲上書諫曰昔文王不敢槃于游田以萬人為憂而陛下遠獵山林夜以繼晝其如社稷宗廟何暴虎馮河未至之戒誠小臣所竊憂也書奏賜布百匹貶東中門候為參封尉後漢書陳蕃傳延熹六年車駕幸廣城校獵廣城苑名在今汝州梁縣西也蕃上疏諫曰臣聞人君有事於苑囿唯仲秋西郊順時講武殺禽助祭以敦孝敬如或違此則為肆縱故皋陶戒舜無教逸遊周公戒成王無槃于遊田虞舜成王猶有此戒况德不及二主者乎三國志魏志崔琰傳崔琰字季圭清河東武城人也太祖征并州留琰傅文帝於鄴世子仍出田獵變易服乘志在驅逐琰書諫曰蓋聞盤于游田書之所戒魯隱觀魚春秋譏之此周孔之格言二經之明義三國志魏志辛毗傳嘗從帝射雉帝曰射雉樂哉毗曰於陛下甚樂而於群下甚苦帝默然後遂為之稀出晉書元帝紀帝性簡儉冲素容納直言虛己待物晉書王導傳導因進計曰古之王者莫不賓禮故老存問風俗虛已傾心以招俊乂晉書宣五王傳齊獻王攸降身虛己待物以信新唐書溫大雅傳附溫大有大有字彥將與兄大雅同掌機近不自安請徙它職帝曰我虛心待卿何所自疑芻蕘第三前漢賈山傳至言曰置直諫之士者恐不得聞其過也學問至於芻蕘者求善旡饜也前漢楊震上疏曰堯舜之世諫鼓謗木立之於朝所以博採負薪盡極下情也後漢順帝時趙騰上言災變譏剌朝政黨輩八十餘人皆以誹謗當伏重法張皓所諫曰臣聞堯舜立敢諫之鼓三王樹誹謗之木春秋採善書惡聖主不罪芻蕘云云吳周顗曰臣聞唐虞博詢芻蕘以成盛勳晉王沉傳為豫州剌史至鎮乃下教曰自古賢聖樂聞誹謗之言聽輿人之論芻蕘有可録之事負薪有廊廟之語故也魏志高堂隆上疏曰書曰天聰明自我民聰明天明畏自我民明威輿人作頌則嚮以五福民怒吁嗟則惑以六極新唐書王圭傳進曰古者天子有爭臣七人諫不用則相繼以死今陛下開聖德收采芻言臣願竭狂瞽佐萬分一帝可箋證漢書賈山傳孝文時言治亂之道借秦為諭名曰至言其辭曰立輔弼之臣者恐驕也置直諫之士者恐不得聞其過也學問至於芻蕘者求善無饜也後漢書楊震傳楊震字伯起弘農華陰人也有河間男子趙騰詣闕上書指陳得失帝發怒遂收考詔獄結以罔上不道震復上疏救之曰臣聞堯舜之世諫鼓謗木立之於朝殷周哲王小人怨詈則還自敬德所以達聰明開不諱博採負薪盡極下情也後漢書張晧傳張晧字叔明犍為武陽人也順帝即位拜晧司空時清河趙騰上言災變譏刺朝政章下有司收騰繫考所引黨輩八十餘人皆以誹謗當伏重法晧上疏諫曰臣聞堯舜立敢諫之鼓三王樹誹謗之木春秋採善書惡聖主不罪芻蕘三國志吳志周魴傳周魴字子魚吳郡陽羡人也黃武中鄱陽大帥彭綺作亂攻沒屬城乃以魴為鄱陽太守與胡綜戮力攻討遂生禽綺送詣武昌加昭義校尉被命密求山中舊族名帥為北敵所聞知者令譎挑魏大司馬揚州牧曹休魴答恐民帥小醜不足杖任事或漏泄不能致休乞遣親人齎箋七條以誘休其七曰臣聞唐堯先天而天弗違博詢芻蕘以成盛勳晉書王沉傳王沉字處道太原晉陽人也及高貴鄉公將攻文帝召沉及王業告之沉業馳白帝以功封安平侯邑二千戶沉既不忠於主甚為衆論所非尋遷尚書出監豫州諸軍事奮武將軍豫州刺史至鎮乃下教曰自古賢聖樂聞誹謗之言聽輿人之論芻蕘有可録之事負薪有廊廟之語故也三國志魏志高堂隆傳高堂隆字升平泰山平陽人有星孛于大辰隆上疏曰書曰天聰明自我民聰明天明畏自我民明威輿人作頌則嚮以五福民怒吁嗟則威以六極新唐書王圭傳圭進曰古者天子有爭臣七人諫不用則相繼以死今陛下開聖德收采芻言臣願竭狂瞽佐萬分一帝可患難相救第四前漢朱慱傳伉俠好交隨從士大夫不避風雨是時前將軍望之子蕭育御史大夫萬年子陳咸以公卿子著材知名博皆友之矣而陳咸為御史中丞坐漏泄省中語下獄博去吏間步至廷尉下候司咸事咸掠治困篤博詐得為醫入獄得見咸具知其所坐罪博出獄又變姓名為咸驗治數百卒免咸死罪咸得論出而博以此顯名吳志張昭傳與趙昱友善剌史陶謙舉荿才不應謙以為輕己遂見拘執昱傾身營救方以得免吳太史慈傳慈避禍於遼東北海相孔融聞而奇之數遣人訊問其母并致餉遺時融以黃巾冠暴出屯都昌為賊管亥所圍母謂慈曰汝與孔北海未嘗相見至汝行後贍恤殷勤過於故舊今為賊所圍汝宜赴之融欲告急平原相劉備城中人旡由得出慈自請求行須明便帶鞬攝弓上馬將兩騎自隨各作一的持之開門直出至城下塹內植所持的各一出射之射之畢徑入門明晨復如此圍下人或起或臥慈復植的射之畢復入門明晨復出如此旡復起者於是下鞭馬直突圍中馳去比賊覺知慈行已過又射殺數人皆應弦而倒故旡敢追者遂到平原說備備斂容答曰孔北海知世間有劉備邪即遣精兵三千人隨慈賊聞兵至解圍散走事畢還啓其母母曰我喜汝有以報孔北海也吳吳範傳範為人剛宜然與親故交接有終始素與魏滕同邑相善滕嘗有罪權責怒甚嚴敢有諫者死範因突入叩頭流血言與涕並良久權意釋乃免滕滕見範謝曰父母能主長我不能免我於死丈夫相知如汝足矣何用多為晉顧榮傳初榮與同寮宴飲見執炙者貌狀不凡有欲炙之色榮割炙啖之坐者問其故榮曰豈有終日執之而不知其味及倫敗榮被執將誅而執炙者為督率遂救之得免箋證漢書朱博傳朱博家貧少時給事縣為亭長好客少年捕搏敢行稍遷為功曹伉俠好交隨從士大夫不避風雨是時前將軍望之子蕭育御史大夫萬年子陳咸以公卿子著材知名博皆友之矣時諸陵縣屬太常博以太常掾察廉補安陵丞後去官入京兆歷曹史列掾出為督郵書掾所部職辦郡中稱之而陳咸為御史中丞坐漏泄省中語下獄博去吏間步至廷尉中師古曰去吏自解職也間步謂步行而伺間隙以去候伺咸事咸掠治困篤博詐得為醫入獄得見咸具知其所坐罪博出獄又變姓名為咸驗治數百師古曰謂被掠笞也卒免咸死罪咸得論出而博以此顯名三國志吳志張昭傳張昭與琅邪趙昱東海王朗俱發名友善弱冠察孝廉不就與朗共論舊君諱事州里才士陳琳等皆稱善之刺史陶謙舉茂才不應謙以為輕己遂見拘執昱傾身營救方以得免三國志吳志太史慈傳太史慈字子義東萊黃人也少好學仕郡奏曹史會郡與州有隙曲直未分以先聞者為善時州章已去郡守恐後之求可使者慈年二十一以選行晨夜取道到洛陽詣公車門見州吏始欲求通慈既與出城因遁還通郡章州家聞之更遣吏通章有司以格章之故不復見理州受其短由是知名而為州家所疾恐受其禍乃避之遼東北海相孔融聞而奇之數遣人訊問其母并致餉遺時融以黃巾寇暴出屯都昌為賊管亥所圍慈從遼東還母謂慈曰汝與孔北海未嘗相見至汝行後贍恤殷勤過於故舊今為賊所圍汝宜赴之慈留三日單步徑至都昌時圍尚未密夜伺間隙得入見融因求兵出斫賊融不聽欲待外救外救未有至者而圍日逼融欲告急平原相劉備城中人無由得出慈自請求行融曰今賊圍甚密城人皆言不可卿意雖壯無乃實難乎慈對曰昔府君傾意於老母老母感遇遣慈赴府君之急固以慈有可取而來必有益也今衆人言不可慈亦言不可豈府君愛顧之義老母遣慈之意邪事已急矣願府君無疑融乃然之於是嚴行蓐食須明便帶鞬攝弓上馬將兩騎自隨各作一的持之開門直出外圍下左右人並驚駭兵馬互出慈引馬至城下塹內植所持的各一出射之射之畢徑入門明晨復如此圍下人或起或臥慈復植的射之畢復入門明晨復出如此無復起者於是下鞭馬直突圍中馳去比賊覺知慈行已過又射殺數人皆應弦而倒故無敢追者遂到平原說備曰慈東宮之鄙人也與孔北海親非骨肉比非鄉黨特以名志相好有分災共患之義今管亥暴亂北海被圍孤窮無援危在旦夕以君有仁義之名能救人之急故北海區區延頸恃仰使慈冒白刃突重圍從萬死之中自託於君惟君所以存之備斂容答曰孔北海知世間有劉備邪即遣精兵三千人隨慈賊聞兵至解圍散走融既得濟益奇貴慈曰卿吾之少友也事畢還啓其母母曰我喜汝有以報孔北海也三國志吳志吳範傳吳範字文則會稽上虞人也範為人剛直頗好自稱然與親故交接有終始素與魏滕同邑相善滕嘗有罪權責怒甚嚴敢有諫者死範謂滕曰與汝偕死滕曰死而無益何用死為範曰安能慮此坐觀汝邪乃髡頭自縳詣門下使鈴下以聞鈴下不敢曰必死不敢白範曰汝有子邪曰有曰使汝為吳範死子以屬我鈴下曰諾乃排閣入言未卒權大怒欲便投以戟逡巡走出範因突入叩頭流血言與涕並良久權意釋乃免滕滕見範謝曰父母能生長我不能免我于死丈夫相知如汝足矣何用多為晉書顧榮傳初榮與同寮宴飲見執炙者貌狀不凡有欲炙之色榮割炙啖之坐者問其故榮曰豈有終日執之而不知其味及倫敗榮被執將誅而執炙者為督率遂救之得免
