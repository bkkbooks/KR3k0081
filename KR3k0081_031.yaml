body:
  text: 卷第三十一不畏強禦第一前漢張釋之傳為公車令太子與梁王臣車入朝不下司馬門釋之追止太子梁王母入殿門遂劾不下公門不恭奏之薄太后聞之文帝免冠謝曰教兒子不謹薄太后使使承詔赦太子梁王然後得入文帝繇是奇釋之前漢公孫賀等傳贊曰九江祝生奮史魚之節發憤滿譏公卿介然直而不撓可謂不畏彊圉矣前漢盍寬饒傳自以行清能高有益於國而為凡庸所越數上疏諫爭太子庶子王生非其如此豫書曰明主知君潔白公正不畏彊禦故命君以司察之位擅君以奉使之權尊官厚祿已施於君矣云云前漢王莽傳崇奏曰孝哀即位高昌侯董宏希指求美造作二統公手劾之以定大綱建白定陶太后不宜在乘輿握坐以明國體詩曰柔亦不茹剛亦不吐不畏彊禦公之謂矣後漢鮑永傳召為司隸校尉帝叔父趙王良永以事劾良大不恭由是朝廷肅然乃辟扶風鮑恢為都官從事恢亦抗直不避彊禦帝常曰貴戚且宜斂手以避二鮑其見憚如此後漢第五種傳種遷兗州刺史中常侍單超兄子康為濟陰太守負藝貪放種欲牧舉會聞從事衛羽素抗厲乃召羽謂曰聞公不畏彊禦今欲相委以重事若何對曰願庶幾於一割以鉛刀諭羽出遂馳至定陶閉門收康賓客親吏四十餘人糾發其臧五六千萬後漢應奉傳為司隸校尉糾舉姦違不避豪戚以嚴厲為名後漢黨錮傳太學諸生三萬餘人郭林宗賈偉節為其冠並與李膺陳蕃王暢更相褒重學中語曰天下模楷李元禮不畏彊禦陳重舉晉李喜傳遷御史中丞當官正色不憚彊禦百僚震肅焉新唐李朝隱傳擢河南尹息太子舅趙常奴怙藝橫閭里朝隱曰此不繩不可為政執而榜辱之新唐辛雲京傳世為將家有膽決以禽生斬馘常冠軍新唐裴諝傳右金吾將軍時禁屠殺尚父郭子儀家奴宰羊諝列奏帝謂不畏彊禦或曰尚父有社稷功豈不為庇之諝笑曰尚父方貴盛上新即位必謂黨附者衆今發其細過以明不恃權耳吾上以盡事君之道下以安大臣不亦可乎箋證漢書張釋之傳上拜釋之為公車令頃之太子與梁王共車入朝不下司馬門於是釋之追止太子梁王毋入殿門遂劾不下公門不敬奏之薄太后聞之文帝免冠謝曰教兒子不謹薄太后使使承詔赦太子梁王然後得入文帝繇是奇釋之漢書公孫賀劉屈氂車千秋王欣楊敞蔡義陳萬年鄭弘傳贊曰九江祝生奮史魚之節發憤悶譏公卿介然直而不撓可謂不畏彊圉矣漢書蓋寬饒傳蓋寬饒字次公魏郡人也師古曰蓋音公盍反好言事刺譏奸犯上意師古曰奸音干上以其儒者優容之然亦不得遷同列後進或至九卿寬饒自以行清能高有益於國而為凡庸所越愈失意不快數上疏諫爭太子庶子王生高寬饒節而非其如此豫書曰明主知君潔白公正不畏彊禦故命君以司察之位擅君以奉使之權尊官厚祿已施於君矣漢書王莽傳陳崇時為大司徒司直與張敞孫竦相善竦者博通士為崇草奏稱莽功德崇奏之曰孝哀即位高昌侯董宏希指求美造作二統晉灼曰欲令丁姬為帝太后也公手劾之以定大綱建白定陶太后不宜在乘輿幄坐以明國體詩曰柔亦不茹剛亦不吐不侮鰥寡不畏彊圉師古曰大雅蒸民之詩美仲山甫之德茹食也強圉強梁圉扞也宋祁曰監本越本無不侮鰥寡四字公之謂矣後漢書鮑永傳建武十一年徵為司隸校尉帝叔父趙王良尊戚貴重永以事劾良大不敬由是朝廷肅然莫不戒懼乃辟扶風鮑恢為都官從事恢亦抗直不避彊禦帝常曰貴戚且宜斂手以避二鮑其見憚如此後漢書第五倫附曾孫第五種種字興先遷兗州刺史中常侍單超兄子匡為濟陰太守負藝貪放種欲收舉未知所使會聞從事衛羽素抗厲乃召羽具告之謂曰聞公不畏彊禦今欲相委以重事若何對曰願庶幾於一割以鉛刀諭羽出遂馳至定陶閉門收匡賓客親吏四十餘人六七日中糾發其臧五六十萬後漢書應奉傳延熹中武陵蠻復寇亂荊州車騎將軍馮緄以奉有威恩為蠻夷所服上請與俱征拜從事中郎奉勤設方略賊破軍罷緄推功於奉薦為司隸校尉紏舉姦違不避豪戚以嚴厲為名後漢書黨錮列傳初桓帝為蠡吾侯受學於甘陵周福及即帝位擢福為尚書時同郡河南尹房植有名當朝鄉人為之謠曰天下規矩房伯武因師獲印周仲進二家賓客互相譏揣遂各樹朋徒漸成尤隙由是甘陵有南北部黨人之議自此始矣後汝南太守宗資任功曹范滂南陽太守成瑨亦委功曹岑晊音質二郡又為謠曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝弘農成瑨但坐嘯因此流言轉入太學諸生三萬餘人郭林宗賈偉節為其冠並與李膺陳蕃王暢更相褒重學中語曰天下模楷李元禮不畏強禦陳仲舉天下俊秀王叔茂晉書李喜傳李喜字季和上黨銅鞮人也從討毌丘儉還遷御史中丞當官正色不憚強禦百僚震肅焉新唐書李朝陰傳李朝陰字光國京兆三原人元宗東幸召見慰勞賜以衣帛擢河南尹政嚴清姦人不容息太子舅趙常奴怙勢橫閭里朝陰曰此不繩不可為政執而搒辱之新唐書辛雲京傳辛雲京蘭州金城人客籍京兆世為將家雲京有膽決以禽生斬馘常冠軍新唐書裴漼傳附裴諝諝字士明擢明經歷饒盧亳三州除右金吾將軍德宗新即位以刑名治天下百吏震服時大行將蕆陵事禁屠殺尚父郭子儀家奴宰羊諝列奏帝謂不畏彊禦善之或曰尚父有社稷功豈不為庇之諝笑曰非君所知尚父方貴盛上新即位必謂黨附者衆今發其細過以明不恃權耳吾上以盡事君之道下以安大臣不亦可乎卷一百三十案裴諝裴漼從祖弟裴寬子也不附權貴第二後漢梁冀傳吳樹為宛令之官辭冀冀賓客布在縣界以情託樹樹對曰將軍以椒房之重處上將之位宜崇賢善以補朝闕自侍坐以來未聞稱一長者而多託非人誠非敢聞樹到縣遂誅殺冀客為人害者數十人魏辛毗傳時中書監劉放令孫資見信於主制斷時政大臣莫不交好而毗不與往來毗子敞諫曰今劉孫用事衆皆影附大人宜小降意和光同塵不然必有謗言毗曰主上不為暗劣吾之立身自有本末就與劉孫不平不過令吾不作三公而已何危害之有大丈夫欲為公而毀其高節者邪晉卞壺傳父粹以清辨鑒察稱惠帝初為尚書郎楊駿執政人多附會而粹正直不附及駿誅超拜右丞封成陽子新唐楊嗣復子損傳家在新昌里與宰相路巖第相接巖欲易其廄以廣第損族仕者十餘人相與議曰家世盛衰繫權者喜怒不可拒損曰今尺寸土皆先人舊資安可以奉權臣窮達命也卒不與新唐穆寧傳性不能貴權右毅然寡合執政者惡之置散位寧默不樂唶曰時不我容我不時徇又何以進遂移疾親友彊之輒復一朝箋證後漢書梁統傳附玄孫梁冀下邳人吳樹為宛令之官辭冀冀賓客布在縣界以情託樹樹對曰小人姦蠹比屋可誅明將軍以椒房之重處上將之位宜崇賢善以補朝闕宛為大都士之淵藪自侍坐以來未聞稱一長者而多託非人誠非敢聞冀默然不悅樹到縣遂誅殺冀客為人害者數十人三國志魏志辛毗傳明帝即位進封潁鄉侯邑三百戶時中書監劉放令孫資見信於主制斷時政大臣莫不交好而毗不與往來毗子敞諫曰今劉孫用事衆皆影附大人宜小降意和光同塵不然必有謗言毗正色曰主上雖未稱聰明不為暗劣吾之立身自有本末就與劉孫不平不過令吾不作三公而已何危害之有焉有大丈夫欲為公而毀其高節者邪晉書卞壼傳卞壼字望之濟陰冤句人也祖統琅邪內史父粹以清辨鑒察稱惠帝初為尚書郎楊駿執政人多附會而粹正直不阿及駿誅超拜右丞封成陽子新唐書楊嗣復傳附子楊損損字子默繇蔭補藍田尉至殿中侍御史家新昌里與路巖第接巖方為相欲易其廄以廣第損族仕者十餘人議曰家世盛衰繫權者喜怒不可拒損曰今尺寸土皆先人舊資非吾等所有安可奉權臣耶窮達命也卒不與新唐書穆寧傳穆寧荊州河內人寧性不能事權右毅然寡合執政者惡之雖直其誣猶置散位寧默不樂唶曰時不我容我不時徇又可以進乎遂移疾滿百日屢矣親友彊之輒復一朝抑彊輔弱第三前漢王尊傳以高第櫂為安定太守到官出教告屬縣曰令長丞尉奉法守城抑彊扶弱甚勞苦矣願勉力正身以率下母以身試法後漢龐參傳為漢陽太守郡人任棠者有奇節隱居教授參到先候之棠不與言但以薤一大本水一盂置戶屏前自抱孫兒伏於戶下主簿白以為倨參思其微意良久曰棠是欲曉太守也水者欲吾清也拔大本薤者欲吾擊彊宗也抱兒當戶欲吾開門恤孤也於是歎息而還參在職果能抑彊助弱以惠政得民魏王修傳太祖破鄴籍沒審配等家財物資以萬數及破南皮閲修家穀不滿十斛有書數百卷太祖歎曰士不妄有名乃禮辟為司空掾遷魏郡太守為治抑彊扶弱明賞罰百姓稱之箋證漢書王尊傳王尊以高第擢為安定太守到官出教告屬縣曰令長丞尉奉法守城為民父母抑彊扶弱宣恩廣澤甚勞苦矣太守以今日至府願諸君卿勉力正身以率下故行貪鄙能變更者與為治明慎所職毋以身試法後漢書龐參傳龐參拜參為漢陽太守郡人任棠者有奇節隱居教授參到先候之棠不與言但以薤一大本水一盂置戶屏前自抱孫兒伏於戶下主簿白以為倨參思其微意良久曰棠是欲曉太守也水者欲吾清也拔大本薤者欲吾擊強宗也抱兒當戶欲吾開門恤孤也於是歎息而還參在職果能抑強助弱以惠政得民三國志魏志王修傳王修字叔治北海營陵人也太祖破鄴籍沒審配等家財物資以萬數及破南皮閲修家榖不滿十斛有書數百卷太祖歎曰士不妄有名乃禮辟為司空掾行司金中郎將遷魏郡太守為治抑彊扶弱明賞罰百姓稱之抑豪彊第四前漢杜延年傳拜為此地太守乃選用良吏捕繫豪強郡中清靜前漢趙廣漢傳潁川太守豪桀大姓相與為婚姻吏俗朋黨廣漢患之厲使其中可用者受記受相訟箋記也擇其中可使者獎厲而使之出有案問既得罪名行法罰之廣漢故泄漏其語令相怨咎遣知其事由某人發故結怨又教吏為缿筒缿音項如鉼可受投書筒竹筒也如今官受密事筒也師古曰缿若今盛錢臧瓶為小孔可入而不可出或缿或筒皆為此制而用受書令投於其中也筒音同及得投書削其主名而託以為豪桀大姓子弟所言其後強宗大族家家結為仇讎姦黨散落風俗大改吏民相告訐廣漢得以為耳目盜賊以故不發發又輒得一切治理威名流聞又胸奴降者言胸奴中皆聞廣漢前漢翟方進傳時起昌陵營作陵邑貴戚近臣子弟賓客多辜榷為姦利者方進部掾史覆案發大姦臧數千萬工以為任公卿欲試以治民徙方進為京兆尹搏擊豪強京師畏之前漢酷吏傳濟南瞷音間氏宗人三百餘家豪猾二千石莫能制景帝拜都為守至則誅瞷氏首惡餘皆股栗居歲餘郡中不拾遺後漢陳龜傳拜京兆尹時三輔彊豪之族多侵枉小民龜到厲威嚴悉平理其怨屈者郡內大悅後漢酷吏董宣傳字少平為洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行而以奴驂乘宣於夏門亭候之乃駐車叩馬以刀畫地大言數主之失叱奴下車因格殺之主即還宮訴帝帝大怒召宣欲箠殺之宣曰陛下聖德中興而縱奴殺良人將何以理天下乎臣不須箠請得自殺即以頭擊楹流血被面帝令小黃門持之使宣叩頭謝主宣不從強使頓之宣兩手據地終不肯俯主曰文叔為白衣時藏亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因勑強項令出賜錢三十萬宣悉以班諸吏由是搏擊豪強莫不震栗京師號為臥虎歌之曰抱鼓不鳴董少平抱擊鼓杖也音孚餘見道不拾遺義縱并嚴延年傳箋證漢書杜周傳附少子杜延年延年坐免官削戶二千後數月復召拜為北地太守延年以故九卿外為邊吏治郡不進上以璽書讓延年師古曰讓責也延年乃選用良吏捕繫豪強郡中清靜漢書趙廣漢傳趙廣漢字子都涿郡蠡吾人也立宣帝廣漢以與議定策賜爵關內侯遷潁川太守郡大姓原褚宗族橫恣賓客犯為盜賊前二千石莫能禽制廣漢既至數月誅原褚首惡郡中震栗先是潁川豪桀大姓相與為婚姻吏俗朋黨廣漢患之厲使其中可用者受記服虔曰受相訟箋記也師古曰擇其中可使者獎厲而使之出有案問既得罪名行法罰之廣漢故漏泄其語令相怨咎師古曰遣知其事由某人發故結怨咎也又教吏為缿筒蘇林曰缿音項如瓶可受投書孟康曰筒竹筒也如今官受密事筒也師古曰缿若今盛錢臧瓶為小孔可入而不可出或缿或筒皆為此制而用受書令投於其中也筒音同及得投書削其主名而託以為豪桀大姓子弟所言其後彊宗大族家家結為仇讎姦黨散落風俗大改吏民相告訐廣漢得以為耳目盜賊以故不發發又輒得一切治理威名流聞及胸奴降者言胸奴中皆聞廣漢漢書翟方進傳是時起昌陵營作陵邑貴戚近臣子弟賓客多辜榷為姦利者方進部掾史覆案發大姦臧數千萬上以為任公卿師古曰任堪也欲試以治民徙方進為京兆尹搏擊豪彊京師畏之漢書酷吏傳郅都濟南瞷氏宗人三百餘家豪猾二千石莫能制於是景帝拜都為濟南守至則誅瞷氏首惡餘皆股栗師古曰言懼之甚至於股股戰栗也居歲餘郡中不拾遺後漢書陳龜傳拜京兆尹時三輔強豪之族多侵枉小民龜到厲威嚴悉平理其怨屈者郡內大悅後漢書酷吏列傳董宣傳董宣字少平陳留圉人也外戚陰氏為郡都尉宣輕慢之坐免後特徵為洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行而以奴驂乘宣於夏門亭候之乃駐車叩馬以刀畫地大言數主之失叱奴下車因格殺之主即還宮訴帝帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖德中興而縱奴殺良人將何以理天下乎臣不須箠請得自殺即以頭擊楹流血被面帝令小黃門持之使宣叩頭謝主宣不從彊使頓之宣兩手據地終不肯俯主曰文叔為白衣時藏亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因勑彊項令出賜錢三十萬宣悉以班諸吏由是搏擊豪彊莫不震栗京師號為臥虎歌之曰枹鼓不鳴董少平枹擊鼓杖也音孚其字從木也抑兼并第五前漢武帝紀元狩六年詔曰日者有司以幣輕多姦農傷而未衆又禁兼并之塗故改幣以約之前漢食貨志孝文承亡周亂秦兵革之後天下空虛故務勸農桑帥以節儉民始充實未有并兼之害故不為民田及奴婢為限今纍世承平豪富吏民訾數巨萬而貧弱愈困宜略為限前漢食貨志漢興古井田法雖難卒行宜少近古限民名田以贍不足塞并兼之路餘見市無二價貨食志箋證漢書武帝紀元狩六年六月詔曰日者有司以幣輕多姦農傷而末衆又禁兼并之塗故改幣以約之漢書食貨志哀帝即位師丹輔政建言古之聖王莫不設井田然後治乃可平孝文皇帝承亡周亂秦兵革之後天下空虛故務勸農桑帥以節儉民始充實未有并兼之害故不為民田及奴婢為限今纍世承平豪富吏民訾數巨萬而貧弱愈困蓋君子為政貴因循而重改作師古曰重難也然所以有改者將以救急也亦未可詳宜略為限漢書食貨志董仲舒說上曰至秦則不然用商鞅之法改帝王之制除井田民得賣買富者田連阡伯貧者亡立錐之地漢興循而未改古井田法雖難卒行宜少近古限民名田以淡不足師古曰名田占田也各為立限不使富者過制則貧弱之家可足也塞并兼之路發摘姦伏第六前漢趙廣漢傳性精於吏職發姦摘伏如神後漢法雄傳除平氏長發摘姦伏盜賊稀發吏人畏愛之後漢王渙傳為洛陽令以平正居身得寬猛之宜曲盡情詐壓塞群疑又能以譎數發摘姦伏譎詐數術也京師稱歎以為渙有神算新唐賈敦頤傳遷洛州刺史洛多豪右敦頤發姦摘伏下旡能欺新唐李勉傳調開封尉沐州水陸一都會俗龐錯號難理勉摧姦抉隱為有名餘見羌胡不人界賈復傳又見得情則哀矜而勿喜倉慈傳箋證漢書趙廣漢傳廣漢為人彊力天性精於吏職廣漢嘗記召湖都亭長湖都亭長西至界上界上亭長戲曰至府為我多謝問趙君亭長既至廣漢與語問事畢廣漢因曰還為吾謝界上亭長勉思職事有以自效京兆不忘卿厚意其發姦擲伏如神皆此類也後漢書法雄傳法雄字文彊扶風郿人也除平氏長平氏縣屬南陽郡故城今唐州平氏縣也善政事好發擲姦伏盜賊稀發吏人畏愛之後漢書循吏列傳王渙傳永元十五年從駕南巡還為洛陽令以平正居身得寬猛之宜其寬嫌久訟歷政所不斷法理所難平者莫不曲盡情詐壓塞群疑又能以譎數發擲姦伏譎詐數術也京師稱歎以為渙有神算智算若神也新唐書循吏列傳賈敦頤賈敦頤曹州冤句人永徽中遷洛州洛多豪右占田類踰制敦頤舉沒者三千餘頃以賦貧民發姦擲伏下無能欺新唐書宗室宰相列傳李勉李勉字元卿鄭惠王元懿曾孫始調開封尉汴州水陸一都會俗厖錯號難治勉摧姦決隱為有名歸美於君第七史記滑稽傳武帝時召北海太守詣行在所王先生曰天子即問君何以治北海令無盜賊對曰選擇賢才各任之以其能賞異等罰不肖王先生曰是自譽自伐功不可也願君對言非臣之力盡陛下神靈威武所變化也太守龔遂新唐劉禕之傳房先敏坐纍貶訴于相府內史騫味道曰謂太后旨褘之曰乃上從有司所奏云后聞以味道歸非於君貶青州刺史加褘之太中大夫后因曰君為元首臣為股肱以手足疾移於腹背尚為一體乎褘之引咎於己忠臣也箋證史記滑稽列傳武帝時徵北海太守詣行在所索隱漢書宣帝徵勃海太守龔遂非武帝時此褚先生記謬耳王先生曰天子既問君何以治北海令無盜賊君對曰何哉對曰選擇賢材各任之以其能賞異等罰不肖王先生曰對如是是自譽自伐功不可也願君對言非臣之力盡陛下神靈威武所變化也新唐書劉褘之傳劉褘之字希美常州晉陵人司門員外郎房先敏坐纍貶衛州司馬訴于相府內史騫味道謂曰太后旨褘之曰乃上從有司所奏云后聞以味道歸非於上貶青州刺史加褘之太中大夫賜物百段后因曰君為元首臣為股肱以手足疾移於腹背尚為一體乎褘之引咎於已忠臣也
