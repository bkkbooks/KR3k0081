body:
  text: 卷第四十五兵第一史記田單傳太史公曰兵以正合以奇勝善之者出奇無窮奇正還相生如環之無端夫始如處女適音敵人開戶後如脫兔適不及距其田單之謂邪前漢刑法志吳有孫武齊有孫臏頻忍反魏有吳起秦有商鞅合縱連衡轉相攻伐代為雌雄齊愍以技擊彊魏惠以武卒奮秦昭以鋭士勝世方爭於功利而馳說者以孫吳為宗時為孫卿明於王道而非之曰彼孫吳者上勢利而貴變詐施於暴亂昏嫚之國君臣有間不和上下離心政謀不良故可變而詐也至于齊桓晉文之兵可謂入其域而有節制矣然猶未本仁義之統也故齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之鋭士秦之鋭士不可當桓文之節制桓文之節制不可敵湯武之仁義前漢刑法志曰善師者不陳善陳者不戰善戰者不敗善敗者不亡若夫舜循百寮皋陶作士刑無所用所謂善師不陳者也湯武陳師誓衆而放擒桀紂所謂善陳不戰者也齊桓南服強楚使貢周室北伐山戎為燕開路所謂善戰不敗者也楚昭王遭闔廬之禍國滅出亡父老相與從之或奔走赴秦號哭請救秦人為之出兵昭王返國所謂善敗不亡者也若秦因四代之勝據山河之阻任用白起王翦豺狼之徒奮其爪牙禽獵六國以并天下窮武極詐士民不附卒隸之徒還為讎敵猋起雲合果共軋之斯為下矣凡兵所以存亡繼絶救亂除害也故伊呂之將子孫有國與商周並至於末世詐力貪殘爭城殺人盈城爭地殺人滿野孫吳商白之徒皆身誅戮於前而國滅亡於後報應之藝各以類至其道然矣漢興高祖誅秦項天下既定踵秦置材官於郡國京師有南北軍之屯至武帝平百粵內增七校外有樓船元帝時以貢禹議始罷角抵而未正治兵振旅之事也古人有言天生五材民並用之廢一不可誰能去兵鞭撲不可弛於家刑罰不可廢於國征伐不可偃於天下用之有本未行之有逆順爾前漢藝文志兵家者蓋出於古司馬之職王官之武備也鴻範八政八曰師孔子曰為國者足食足兵不教民戰是謂棄之明兵之重也易曰古者弦木為弧剡木為矢弧矢之利以威天下其用上矣後世耀金為刃割革為甲器械甚備下及湯武受命以師克亂而濟百姓動之以仁義行之以禮讓司馬法是其遺事也白春秋至戰國出奇設伏變詐之兵並作漢興張良韓信序次兵法三十五家前漢鼂錯傳孝文時胸奴入寇上書曰臣又聞用兵臨戰合刃之急者三一曰得地形二曰卒服習三曰器用利兵法曰文五之溝漸車之水漸謂浸也子廉反山林積石經川丘阜經所常流之水也大陸曰阜草木所在此步兵之地也車騎二不當一土山丘陵曼衍相屬平原廣野此車騎之地步兵十不當一平陵相遠川谷居間仰高臨下此弓弩之地也短兵百不當一兩陳相近平地淺草可前可後此長戟之地也劍楯三不當一萑葦竹簫草木蒙蘢支葉茂接此矛鋋之地也長戟二不當一曲道相伏險隘相薄此劍楯之地也弓弩三不當一士不選練卒不服習起居不精動靜不集集齊也趨利弗及避難不畢前擊後解與金鼓之指相失此不習勒卒之過也百不當十兵不完利與空手同甲不堅密與袒裼同弩不可以及遠與短兵同射不能中與亡矢同中不能入與亡鏃同此將不省兵之禍也五不當一故兵法曰器械不利以其卒豫敵也卒不可用以其將豫敵也將不知兵以其主豫敵也四者兵之至要也前漢魏相傳上與後將軍趙充國等議欲因胸奴衰弱出兵擊其右地使不敢復擾西域相上書諫曰臣聞之救亂誅暴謂之義兵兵義者王敵加於己不得已而起者謂之應兵兵應者勝爭恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威於敵者謂之驕兵兵驕者滅此五者非但人事乃天道也宋文帝元嘉中始與太守徐豁上表曰武吏年滿十六便課米六十斛五十至三十皆課三十斛一戶內隨丁多少悉皆輸米且十三歲兒未堪田作成是單逈便自逃匿戶口歲減實此之由宜更量課限使得存立今若減其米課雖有交損考之將來理有深益詔善之也魏袁渙傳渙得歸太祖渙言曰兵者凶器也不得已而用之鼓之以道德征之以仁義兼撫其民而除其害夫然故可與之死而可與之生新唐員半千傳高宗御武成殿問兵家府三陳何謂邪衆未對半千進曰臣聞古者星宿孤虛天陳也山川向背地陳也偏伍彌縫人陳也臣謂不然夫師以義出沛若時雨得天之時為天陳足食約費且耕且戰得地之利為地陳舉三軍士如子弟從父兄得人之和為人陳捨是則何以戰帝曰善隋漢王諒據并州反隋將揚素率衆數萬討諒時晉絳呂三州並為城守素各以二千人縻之而去諒遣將趙子開領衆十餘萬柵絶徑路屯據高壁嶺布陳五十里素令諸將以兵臨之殺獲數萬隋煬帝征高麗隋將于仲文率軍從樂浪道軍次鳥骨城仲文簡羸馬驢數千置於軍後既而率衆東過高麗出兵掩襲輜重仲文回擊新唐書魏元忠傳引齊段孝玄有言持大兵如擎盤水一致蹉跌求止可得哉新唐劉蕡對策曰臣聞古者因井田而制軍賦間農事以修武備隄封約卒乘之數命將在公卿之列故兵農一致而文武同方以保乂邦家式遏亂略太宗置府兵臺省軍衛文武參掌間歲則橐弓力穡有事則釋耒荷戈所以修復古制不廢舊物今則不然夏官不知兵籍止於奉朝請六軍不主武事止於養勳階軍容合中官之政戎律附內臣之職首一載武辨嫉文吏如仇讎足一蹈軍門視農夫如草芥謀不足以翦除凶逆而詐足以抑揚威福勇不足以鎮衛社稷而暴足以侵害里閭新唐兵志唐立府兵之制頗有足稱焉蓋古者兵法起於井田自周衰王制壞而不復至於府兵始一寓之於農其居處教養畜材待事動作休息皆有節目雖不能盡合古法蓋得其大意焉此高祖太宗之所以盛也至其後世子孫驕弱不能謹守屢變其制夫置兵所以止亂及其弊也適足為亂又其甚也至困天下以養亂而遂至於亡焉蓋唐有天下二百餘年而兵之大勢三變其始盛時有府兵府兵後廢而為彍騎又廢而方鎮之兵盛矣及其未也彊臣悍將兵布天下而天子亦自置兵於京師曰禁軍其後天子弱方鎮彊而唐遂以亡滅者措置之勢使然也府兵之制起自西魏後周而備於隋唐興因之隋制十二衛曰翊衛曰驍衛曰武衛曰屯衛曰禦衛曰候衛為左右皆有將軍以分統諸府之兵武德初始制軍府以驃騎車騎兩將軍府領之折關中為十二道皆置府六年以天下既定遂廢十二軍改驃騎曰統軍車騎曰別將居歲餘十二軍復而軍置將軍一人太宗正觀十年更號統軍為折衝都尉別將為果毅都尉諸府總曰折衝府凡天下十道置府六百三十四皆有名號而關內二百六十有一皆以隸諸衛凡府三等兵千二百人為上千人為中八百人為下并其介胄戎具藏於庫有所征行則視其入而出給之凡民年二十為兵六十而免其能騎而射者為越騎其餘為步兵武騎排欑手步射其隸於衛也左右衛皆領六十府諸衛領五十至四十其餘以隸東宮六率先天二年誥曰往者分建府衛計戶充兵裁足周事二十一入募六十一出軍多憚勞以規避匿今宜取年二十五已上五十而免屢征鎮者十年免之雖有其言而事不克行玄宗開元六年始詔折衝府兵每六歲一簡自高宗武后時天下久不用兵府兵之法寖壞番役更代多不以時衛士稍稍亡匿至是益耗散宿衛不能紿宰相張說乃請一切募士宿衛十一年取京兆蒲同岐華府兵及白丁而益以潞州長從兵共十二萬號長從宿衛歲二番命尚書左丞蕭嵩與州吏共選之明年更號曰彍騎自是諸府士益多不補折衝將又積歲不得遷士人皆恥為之自天寶已後彍騎之法又稍變廢士皆失拊循八載所衝諸府至無兵可交李林甫遂請停上下魚書其後徒有兵額官吏而戎器馱馬鍋幕糗糧並廢矣故時府人目番上宿衛者曰侍官言侍衛天子至是衛佐悉以假人為童奴京師人恥之至相罵辱必曰侍官而六軍宿衛皆市人富者販繒綵食梁肉壯者為角抵拔河翹木杠鐵之戲及祿山反皆不能受甲矣箋證史記田單列傳太史公曰兵以正合以奇勝善之者出奇無窮奇正還相生如環之無端夫始如處女適人開戶後如脫肘兔適不及距其田單之謂邪漢書刑法志吳有孫武齊有孫臏師古曰臏音頻忍反魏有吳起秦有商鞅皆禽敵立勝垂著篇籍當此之時合從連衡轉相攻伐代為雌雄齊愍以技擊彊魏惠以武卒奮秦昭以鋭士勝世方爭於功利而馳說者以孫吳為宗時唯孫卿明於王道而非之曰彼孫吳者上藝利而貴變詐施於暴亂昏嫚之國君臣有間師古曰言有間隙不諧和上下離心政謀不良故可變而詐也至乎齊桓晉文之兵可謂入其域而有節制矣然猶未本仁義之統也故齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義故曰善師者不陳善陳者不戰善戰者不敗善敗者不亡若夫舜修百僚咎繇作士命以蠻夷猾夏寇賊姦軌刑無所用所謂善師不陳者也湯武征伐陳師誓衆而放禽桀紂所謂善陳不戰者也齊桓南服彊楚使貢周室北伐山戎為燕開路存亡繼絶功為伯首所謂善戰不敗者也楚昭王遭闔廬之禍國滅出亡父老送之王曰父老反矣何患無君父老曰有君如是其賢也相與從之或奔走赴秦號哭請救秦人憐之為之出兵二國并力遂走吳師昭王返國所謂善敗不亡者也若秦因四世之勝據河山之阻任用白起王翦豺狼之徒奮其爪牙禽獵六國以并天下窮武極詐士民不附卒隸之徒還為敵讎猋起雲合果共軋之斯為下矣凡兵所以存亡繼絶救亂除害也故伊呂之將子孫有國與商周並至於末世苟任詐力以快貪殘爭城殺人盈城爭地殺人滿野孫吳商白之徒皆身誅戮於前而國滅亡於後報應之藝各以類至其道然矣漢興高祖躬神武之材行寬仁之厚總攬英雄以誅秦項任蕭曹之文用良平之謀騁陸酈之辨明叔孫通之儀文武相配大略舉焉天下既定踵秦而置材官於郡國京師有南北軍之屯至武帝平百粵內增七校外有樓船皆歲時講肄修武備云至元帝時以貢禹議始罷角抵而未正治兵振旅之事也古人有言天生五材民並用之廢一不可誰能去兵鞭撲不可弛於家刑罰不可廢於國征伐不可偃於天下用之有本末行之有逆順耳漢書藝文志兵家者蓋出古司馬之職王官之武備也洪範八政八曰師孔子曰為國者足食足兵以不教民戰是謂棄之明兵之重也易曰古者弦木為弧剡木為矢弧矢之利以威天下其用上矣後世耀金為刃割革為甲器械甚備下及湯武受命以師克亂而濟百姓動之以仁義行之以禮讓司馬法是其遺事也自春秋至於戰國出奇設伏變詐之兵並作漢興張良韓信序次兵法凡百八十二家刪取要用定著三十五家漢書鼂錯傳是時胸奴彊數寇邊上發兵以禦之錯上言兵事曰臣又聞用兵臨戰合刃之急者三師古曰合刃謂交兵一曰得地形二曰卒服習三曰器用利兵法曰丈五之溝漸車之水師古曰漸讀曰瀻謂浸也音子産反山林積石經川丘阜師古曰經川常流之水也大陸曰阜草木所在此步兵之地也車騎二不當一土山丘陵曼衍相屬平原廣野此車騎之地步兵十不當一平陵相遠川谷居閒仰高臨下此弓弩之地也短兵百不當一兩陳相近平地淺草可前可後此長戟之地也劍楯三不當一萑葦竹蕭草木蒙蘢支葉茂接此矛鋋之地也長戟二不當一曲道相伏險隘相薄此劍楯之地也弓弩三不當一士不選練卒不服習起居不精動靜不集師古曰集齊也趨利弗及避難不畢前擊後解與金鼓之音相失此不習勒卒之過也百不當十兵不完利與空手同甲不堅密與袒裼同弩不可以及遠與短兵同射不能中與亡矢同中不能入與亡鏃同此將不省兵之禍也五不當一故兵法曰器械不利以其卒豫敵也卒不可用以其將與敵也將不知兵以其主豫敵也君不擇將以其國豫敵也四者兵之至要也漢書魏相傳元康中胸奴遣兵擊漢屯田車師者不能下上與後將軍趙充國等議欲因胸奴衰弱出兵擊其右地使不敢復擾西域相上書諫曰臣聞之救亂誅暴謂之義兵兵義者王敵加於己不得已而起者謂之應兵兵應者勝爭恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威於敵者謂之驕兵兵驕者滅此五者非但人事乃天道也七通典食貨四賦稅上宋文帝元嘉中始興太守孫豁上表曰武吏年滿十六便課米十六斛五十以下至十三皆課三十斛一戶內隨丁多少悉皆輸米且十三歲兒未堪田作或是單逈便是逃匿戶口歲減實此之由宜更量課限使得存立今若減其米課雖有交損考之將來理有深益詔善之也又宋書良吏列傳徐豁徐豁字萬同東莞姑幕人也元嘉初為始興太守三年遣大使橫行四方并使郡縣各言損益豁因此表陳三事其一曰郡大田武吏年滿十六便課米六十斛十五以下至十三皆課米三十斛一戶內隨丁多少悉皆輸米且十三歲兒未堪田作或是單逈無相兼通年及應輸便自逃逸既遏接蠻俚去就益易或乃斷截支體産子不養戶口歲減實此之由謂宜更量課限使得存立今若減其米課雖有交損考之將來理有深益太祖嘉之三國志魏志袁渙傳布破渙得歸太祖渙言曰夫兵者凶器也不得已而用之鼓之以道德征之以仁義兼撫其民而除其害夫然故可與之死而可與之生新唐書員半千傳高宗御武成殿問兵家有三陳何謂邪衆未對半千進曰臣聞古者星宿孤虛天陳也山川向背地陳也偏伍彌縫人陳也臣謂不然夫師以義出沛若時雨得天之時為天陳足食約費且耕且戰得地之利為地陳舉三軍士如子弟從父兄得人之和為人陳捨是則何以戰帝曰善通典兵九兩軍相對取背破之隋漢王諒據并州反隋將楊素率衆數萬討諒時晉綘呂三州並為諒城守素各以二千人縻之而去諒遣將趙子開擁衆十餘萬柵絶徑路屯據高璧嶺布陳五十里素令諸將以兵臨之自引兵入霍山緣崖谷而進直指其營一戰破之殺獲數萬通典兵九餌敵取勝隋煬帝征高麗隋將于仲文率衆從樂浪道軍次烏骨城仲文簡羸馬驢數千置於軍後既而率衆東過高麗出兵掩襲輜重仲文回擊大破之新唐書魏元忠傳魏元忠宋州宋城人儀鳳中吐蕃數盜邊元忠上封事洛陽宮言命將用兵之要曰齊段孝元有言持大兵如擎盤水一致蹉跌求止可得哉新唐書劉蕡傳太和二年舉賢良方正能直言極諫帝引諸儒百餘人于廷策曰蕡對曰臣聞古者因井田而制軍賦間農事以修武備提封約卒乘之數命將在公卿之列故兵農一致而文武同方以保乂邦家式遏禍亂太宗置府兵臺省軍衛文武參掌間歲則櫜弓力穡有事則釋耒荷戈所以修服古制不廢舊物今則不然夏官不知兵籍止於奉朝請六軍不主兵事止於養勳階軍容合中官之政戎律附衆臣之職首一戴武辨嫉文吏如仇讎足一蹈軍門視農夫如草芥謀不足以翦除姦凶而詐足以抑揚威福勇不足以鎮衛社稷而暴足以侵害里閭新唐書兵志惟唐立府兵之制頗有足稱焉蓋古者兵法起於井田自周衰王制壞而不復至於府兵始一寓之於農其居處教養畜材待事動作休息皆有節目雖不能盡合古法蓋得其大意焉此高祖太宗之所以盛也至其後世子孫驕弱不能謹守屢變其制夫置兵所以止亂及其弊也適足為亂又其甚也至困天下以養亂而遂至於亡焉蓋唐有天下二百餘年而兵之大勢三變其始盛時有府兵府兵後廢而為彍騎彍騎又廢而方鎮之兵盛矣及其末也彊臣悍將兵布天下而天子亦自置兵於京師曰禁軍其後天子弱方鎮彊而唐遂以亡滅者措置之勢使然也若乃將卒營陳車旗器械征防守衛凡兵之事不可以悉記記其廢置得失終始治亂興滅之迹以為後世戒云府兵之制起自西魏後周而備於隋唐興因之隋制十二衛曰翊衛曰驍騎衛曰武衛曰屯衛曰禦衛曰候衛為左右皆有將軍以分統諸府之兵府有郎將副郎將坊主團主以相統治又有驃騎車騎二府皆有將軍後更驃騎曰鷹揚郎將車騎曰副郎將別置折衝果毅自高祖初起開大將軍府以建成為左領大都督領左三軍燉煌公為右領大都督領右三軍元吉統中軍發自太原有兵三萬人及諸起義以相屬與降群盜得兵二十萬武德初始置軍府以驃騎車騎兩將軍府領之析關中為十二道曰萬年道長安道富平道醴泉道同州道華州道荊州道岐州道豳州道西麟州道涇州道宜州道皆置府三年更以萬年道為參旗軍長安道為鼓旗軍富平道為玄戈軍醴泉道為井鉞軍同州道為羽林軍華州道為騎官軍寧州道為折威軍岐州道為平道軍豳州道為招搖軍西麟州道為苑游軍涇州道為天紀軍宜州道為天節軍軍置將副各一人以督耕戰以車騎府統之六年以天下既定遂廢十二軍改驃騎曰統軍車騎曰別將居歲餘十二軍復而軍置將軍一人軍有坊置主一人以檢察戶口勸課農桑太宗貞觀十年更號統軍為折衝都尉別將為果毅都尉諸府總曰折衝府凡天下十道置府六百三十四皆有名號而關內二百六十有一皆以隸諸衛凡府三等兵千二百人為上千人為中八百人為下并其介胄戎具藏於庫有所征行則視其入而出給之其番上宿衛者惟給弓矢橫刀而已凡民年二十為兵六十而免其能騎而射者為越騎其餘為步兵武騎排䂎手步射其隸於衛也左右衛皆領六十府諸衛領五十至四十其餘以隸東宮六率先天二年誥曰往者分建府衛計戶充兵裁足周事二十一入募六十一出軍多憚勞以規避匿今宜取年二十五以上五十而免屢征鎮者十年免之雖有其言而事不克行玄宗開元六年始詔折衝府兵每六歲一簡自高宗武后時天下久不用兵府兵之法寖壞番役更代多不以時衛士稍稍亡匿至是益耗散宿衛不能給宰相張說乃請一切募士宿衛十一年取京兆蒲同岐華府兵及白丁而益以潞州長從兵共十二萬號長從宿衛歲二番命尚書左丞蕭嵩與州吏共選之明年更號曰彍騎自是諸府士益多不補折衝將又積歲不得遷士人皆恥為之自天寶以後彍騎之法又稍變廢士皆失拊循八載折衝諸府至無兵可交李林甫遂請停上下魚書其後徒有兵額官吏而戎器馱馬鍋幕糗糧並廢矣故時府人目番上宿衛者曰侍官言侍衛天子至是衛佐悉以假人為童奴京師人恥之至相罵辱必曰侍官而六軍宿衛皆市人富者販繒綵食粱肉壯者為角抵拔河翹木扛鐵之戲及祿山反皆不能受甲矣仁義之兵第二前漢刑法志夫仁人在上為下所仰猶子弟之衛父兄在手足之扞頭目何可當也鄰國望我歡若親戚芬若椒蘭顧視其上猶焚灼仇讎人情豈肯為其所惡而攻其所好哉故以桀攻桀猶有巧拙以桀攻堯若卯投石夫何幸之有詩曰武王載斾有虔秉鉞如火烈烈則莫我敢遏言以仁誼綏民者無敵於天下也前漢藝文志湯武受命以師克亂而濟百姓動之以仁義行之以禮讓司馬法是其遺事蜀志諸葛亮傳亮與司馬宣王對於渭南為屯田久駐之基耕者雜於渭濱居民之間而百姓安晉羊祜傳每與吳人交兵剋日方戰不為掩襲之計將師有欲進譎詐之策者輒飲以醇酒使不得言人有略吳二兒為俘者祜遣送還其家後吳將夏祥邵顗等來降二兒之父亦率其屬與俱吳將陳尚潘景來寇祜追斬之美其死節而厚加殯斂景尚子弟迎喪祜以禮遣還吳將鄧香掠夏口祜募生縳香既至宥之香感其恩甚率部曲而降祜出軍行吳境刈榖為糧皆計所侵送絹償之每會衆江沔遊獵常止晉地若禽獸先為吳人所傷而為晉兵所得者皆封還之與陸抗相對使命交通抗稱祜之德量雖樂毅諸葛孔明不能過也抗嘗病祜饋之藥抗服之無疑心人多諫抗抗曰羊祜豈鴆人者時談以為華元子反復見於今日抗每告其戍曰彼專為德我專為暴是不戰而自服也各保分界而已無求細利孫皓聞二境交和以詰抗抗曰一邑一鄉不可以無信義況大國乎臣不如此正是彰其德於祜無傷也新唐蕭俯傳穆宗謂宰臣曰兵法有必勝乎俯曰兵凶器聖主不得已而用之故武不可玩玩則無震夫以仁討不仁以義討不義先招懷後掩襲故有不殺厲不禽二毛不犯田稼其救人如免水火此必勝術也若乃以小不忍輕任干戈師曲而敵怨非徒不勝又將自危是以聖王慎於兵新唐書李靖傳蕭銑據江陵靖分孝恭軍繼進靖入其都或請靖籍銑將拒戰者家資以賞軍靖曰王者之兵弔人而取有罪彼有脅驅以來藉以拒師本非所情宜示寬大以慰其心若降而籍之非計之善也餘見兵門刑法志箋證漢書刑法志夫仁人在上為下所卬卬讀曰仰猶子弟之衛父兄若手足之扞頭目何可當也鄰國望我歡若親戚芬若椒蘭顧視其上猶焚灼仇讎人情豈肯為其所惡而攻其所好哉故以桀攻桀猶有巧拙以桀詐堯若卵投石夫何幸之有詩曰武王載斾有虔秉鉞如火烈烈則莫我敢遏師古曰殷頌長發之詩也武王湯也言以仁誼綏民者無敵於天下也漢書藝文志下及湯武受命以師克亂而濟百姓動之以仁義行之以禮讓司馬法是其遺事也三國志蜀志諸葛亮傳十二年春亮悉大衆由斜谷出以流馬運據武功五丈原與司馬宣王對於渭南亮每患糧不繼使己志不伸是以分兵屯田為久住之基耕者雜於渭濱居民之間而百姓安堵軍無私焉晉書羊祜傳祜以孟獻營武牢而鄭人懼每與吳人交兵尅日方戰不為掩襲之計將帥有欲進譎詐之策者輒飲以醇酒使不得言人有略吳二兒為俘者祜遣送還其家後吳將夏詳邵顗等來降二兒之父亦率其屬與俱吳將陳尚潘景來寇祜追斬之美其死節而厚加殯斂景尚子弟迎喪祜以禮遣還吳將鄧香掠夏口祜募生縛香既至宥之香感其恩甚率部曲而降祜出軍行吳境刈榖為糧皆計所侵送絹償之每會衆江沔游獵常止晉地若禽獸先為吳人所傷而為晉兵所得者皆封還之於是吳人翕然悅服稱為羊公不之名也祜與陸抗相對使命交通抗稱祜之德量雖樂毅諸葛孔明不能過也抗嘗病祜饋之藥抗服之無疑心人多諫抗抗曰羊祜豈鴆人者時談以為華元子反復見於今日抗每告其戍曰彼專為德我專為暴是不戰而自服也各保分界而已無求細利孫皓聞二境交和以詰抗抗曰一邑一鄉不可以無信義况大國乎臣不如此正是彰其德於祜無傷也新唐書蕭俯穆宗立吐蕃寇涇州調兵護邊帝因問兵法有必勝乎俯曰兵凶器聖人不得已用之故武不可玩玩則無震夫以仁討不仁以義討不義先招搖後掩襲故有不殺厲不禽二毛不犯田稼其救人如免水火此必勝術也若乃以小不忍輕任干戈師曲而敵怨非徒不勝又將自危是以聖王慎於兵新唐書李靖傳武德四年八月大閲兵夔州時秋潦濤瀨漲惡銑以靖未能下不設備九月舟師叩夷陵銑將文士弘以卒數萬屯清江孝恭欲擊之孝恭軍繼進銑大懼檄召江南兵不及到明日降靖入其都號令靜嚴軍無私焉或請靖籍銑將拒戰者家資以賞軍靖曰王者之兵弔人而取有罪彼其脅驅以來籍以拒師本非所情不容以叛逆比之今新定荊郢宜示寬大以慰其心若降而籍之恐自荊而南堅城劇屯驅之死守非計之善也不仁之兵第三史記白起傳趙括出鋭卒自摶戰秦軍射殺趙括括軍敗卒四十萬人降武安君計曰前秦已拔上黨上黨民不樂為秦而歸趙非盡殺之恐為亂乃挾詐而盡坑殺之遺其小者二百四十人歸趙前後斬首虜四十五萬人趙人大震前漢高祖紀懷王諸老將皆曰項羽為人慓悍禍賊嘗攻襄城襄城無噍類所過無不殘滅前漢高祖紀二年項羽大破漢軍多殺士卒雎水為之不流前漢刑法志末世詐力貪殘爭城殺人盈城爭地殺人滿野後漢陶謙傳曹操擊謙拔取慮取慮音秋閭雎陵夏丘皆屠之凡殺男女數十萬人雞犬無餘泗水為之不流蜀龐統傳先主向成都所過輒克於涪大會置酒作樂謂統曰今日之會可謂樂矣統曰伐人之國而以為歡非仁者之兵也先主醉怒曰武王伐紂前歌後舞非仁者邪卿言不當宜速起出先主尋悔請還謂曰向者之論阿誰為失統對曰君臣俱失先主大笑宴樂如初箋證史記白起王翦列傳四十七年秦使左庶長王齕攻韓取上黨上黨民走趙六月陷趙軍取二鄣四尉七月趙軍築壘壁而守之秦又攻其壘取二尉敗其陳至九月趙卒不得食四十六日其將軍趙括出鋭卒自搏戰秦軍射殺趙括括軍敗卒四十萬人降武安君武安君計曰前秦已拔上黨上黨民不樂為秦而歸趙趙卒反覆非盡殺之恐為亂乃挾詐而盡坑殺之遺其小者二百四十人歸趙前後斬首虜四十五萬人趙人大震漢書高帝紀當是時秦兵彊常乘勝逐北諸將莫利先入關師古曰不以入關為利言畏秦也獨羽怨秦破項梁奮勢願與沛公西入關懷王諸老將皆曰項羽為人慓悍禍賊嘗攻襄城襄城無噍類如淳曰噍音祚笑反無復有活而噍食者也青州俗呼無孑遺為無噍類所過無不殘滅漢書高帝紀二年東伐楚到外黃彭越將三萬人歸漢漢王拜越為魏相國令定梁地漢王遂入彭城收羽美人貨賂置酒高會羽聞之令其將擊齊而自以精兵三萬人從魯出胡陵至蕭晨擊漢軍大戰彭城靈壁東睢水上大破漢軍多殺士卒雎水為之不流漢書刑法志至於末世苟任詐力以快貪殘爭城殺人盈城爭地殺人滿野後漢書陶謙傳初平四年曹操擊謙破彭城傅陽謙退保郯操攻之不能克乃還過拔取慮睢陵夏丘皆屠之取慮音秋閭縣名屬下邳郡故城在今泗州下邳縣西南睢陵縣在下邳縣東南夏丘縣屬沛郡故城今泗州虹縣是凡殺男女數十萬人雞犬無餘泗水為之不流三國志蜀志龐統傳亮留鎮荊州統隨從入蜀益州牧劉璋與先主會涪統進策先主然其中計即斬懷沛還向成都所過輒克於涪大會置酒作樂謂統曰今日之會可謂樂矣統曰伐人之國而以為歡非仁者之兵也先主醉怒曰武王伐紂前歌後舞非仁者邪卿言不當宜速起出於是統逡巡引退先主尋悔請還統復故位初不顧謝飲食自若先主謂曰向者之論阿誰為失統對曰君臣俱失先主大笑宴樂如初講武第四前漢刑法志周立司徒之官設六軍之衆因井田而制軍賦春振旅以搜夏拔舍以苗秋治兵以獮冬大閲以狩皆於農隙以講事焉至齊桓任管仲作內政而寓軍令焉故卒伍定乎里而軍政成乎郊外攘四夷內尊天子以安諸夏齊桓既沒晉文接之亦先定其民作被廬之法總率諸侯迭為盟主然其禮已頗僭差又隨時苟合以求欲速之功故不能充王制二伯之後寖以陵夷至魯成作兵甲哀公用田賦搜狩治兵大閲之事皆失其正春秋書而譏之以存王道春秋之後滅弱侵小並為戰國稍增講武之禮以為戲樂用相夸視而秦更名角抵先王之禮沒於淫樂中矣前漢鼂錯傳臣又聞古之制邊縣以備敵也使五家為伍伍有長十長一里里有假士四里一連連有假五百十連一邑邑有假候皆擇其邑之賢材有護有保護之能者習地形知民心者居則習民於射法出則教民於應敵故卒伍成於內則軍正定於外服習已成勿令遷徙各守其業幼則同遊長則共事夜戰聲相知則足以相救晝戰目相見則足以相識歡愛之心足以相死如此而勸以厚賞威以重罰則前死不還踵矣後漢志立秋之日武官肄兵習戰陳之儀斬牲之禮名曰貙劉兵官皆肄孫吳兵法後漢馬融傳時鄧太后臨朝騭兄弟輔政而俗儒世上以為文德可興武功宜廢遂寢搜狩之禮息戰陳之法故猾賊從橫乘此無備融乃感激以為文武之道聖賢不墜五才之用無或可廢上廣成頌曰方涉冬節農事間隙宜幸廣成覽原隰觀秀麥勸收藏因講武校獵使寮庶百姓復覩羽毛之美聞鍾鼓之音後漢何進傳中平五年天下滋亂望氣者以為京師當有大兵兩宮流血大將軍司馬許涼假司馬伍宕說進曰太公六韜有天子將兵事可以威厭四方進以為然入言之於帝於是乃詔進大發四方兵講武於平樂觀下起大壇上建十二重五采華蓋高十丈壇東北為小壇復建九重華蓋高九丈列步兵騎士數萬人結營為陳天子親出臨軍駐大華蓋下進駐小華蓋下禮畢帝躬擐甲介馬擐音宦稱無上將軍行陳三匝而還魏杜畿為河東太守百姓勤農家家豐實畿乃曰民富矣不可不教也於是冬月修戎講武又開學宮親自執經教授郡中化之箋證漢書刑法志殷周以兵定天下矣天下既定戢臧干戈教以文德而猶立司馬之官設六軍之衆因井田而制軍賦春振旅以搜夏拔舍以苗秋治兵以獮冬大閲以狩皆於農隙以講事焉至齊桓公任用管仲作內政而寓軍令焉故卒伍定呼里而軍政成呼郊外攘夷狄內尊天子以安諸夏齊桓既沒晉文接之亦先定其民作被廬之法總帥諸侯迭為盟主然其禮已頗僭差又隨時苟合以求欲速之功故不能充王制二伯之後寖以陵夷至魯成公作丘甲哀公用田賦搜狩治兵大閲之事皆失其正春秋書而譏之以存王道春秋之後滅弱吞小並為戰國稍增講武之禮以為戲樂用相夸視而秦更名角抵先王之禮沒於淫樂中矣漢書鼂錯