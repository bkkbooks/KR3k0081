body:
  text: 卷第三十五名器不假第一史記魯世家趙簡子曰魯君失國政政在季氏於今四君矣民不知君何以得國是以為君慎器與名不可以假人前漢竇嬰傳時上未立太子酒酣上曰千秋萬歲後傳王太后灌嬰引卮酒進曰天下者高祖天下父子相傳漢之約也上何以得傳梁王太后由此憎嬰後漢鄭興傳囂廣置職位以自尊高興復止囂曰夫中郎將大中大夫使持節官皆王者之器非人臣所當制也孔子曰惟器與名不可以假人不可以假人者亦不可以假於人也旡益於實有損於名非尊上之意也囂病之而止病難後漢李固傳昔館陶公主為子求郎明帝不許賜錢千萬所以輕厚賜重薄位者為官人失才害及百姓也新唐馬周傳上疏喏名與器不以假人是言慎舉之為重也臣伏見王長通白明達本自樂工輿皂雜類韋槃提斛斯正則更旡他材獨解調馬縱使術踰夷等可厚賜金帛以富其家今超授高爵與外廷朝會騶乎倡人鳴玉曳履臣竊恥之太宗善其言新唐長孫旡忌進册司空旡忌辭又因高士廉以外戚位二公嫌議者謂天子以私后家帝曰朕任官必以不者雖親若襄邑王神符不妄受右才雖仇如魏微不棄也夫緣后兄愛跜厚以玉帛豈不得以其兼文武兩器朕故相之公等孰不曰然新唐睿宗紀景雲元年先是中宗時官爵渝濫因依妃主墨勑而授宮者謂之斜封至是並令罷色新唐蕭至忠傳上疏陳時政曰官爵公器也恩幸私惠也王者正可金帛富之梁肉食之以存私澤也若公器而私用之則公議不行而勞人解體私謁開而正言塞日削月朘卒見凋弊箋證史記魯周公世家趙簡子問史墨集解服虔曰史墨晉史蔡墨曰季氏亡乎史墨對曰不亡季友有大功於魯受鄪為上卿至于文子武子世增其業魯文公卒東門遂殺適立庶魯君於是失國政政在季氏於今四君矣民不知君何以得國是以為君慎器與名不可以假人集解杜預曰器車服名爵號漢書竇嬰傳竇嬰孝景即位為詹事帝弟梁孝王母竇太后愛之孝王朝因燕昆弟飲師古曰序家人昆弟之親不為君臣禮也是時上未立太子酒酣上從容曰千秋萬歲後傳王太后歡嬰引卮酒進上曰天下者高祖天下父子相傳漢之約也上何以得傳梁王太后由此憎嬰後漢書鄭興傳時赤眉入關東道不通興乃西歸隗囂虛心禮請而興恥為之屈稱疾不起囂矜己自飾常以為西伯復作乃與諸將議自立為王興聞而矜囂囂竟不稱王後遂廣置職位以自尊高興復止囂曰夫中郎將太中大夫使持節官皆王者之器非人臣所當制也孔子曰惟器與名不可以假人不可以假人者亦不可以假於人也無益於實有損於名非尊上之意也囂病之而止病猶難也後漢書李固傳陽嘉二年有地動山崩火災之異公卿舉固對策詔又特問當世之敝為政所宜固對曰臣聞昔皋陶公主為子求郎皋陶公主光武第三女也明帝不許賜錢千萬所以輕厚賜重薄位者為官人失才害及百姓也新唐書馬周傳明年拜監察御史奉使稱職周上疏曰臣聞致化之道在求賢審官孔子曰惟名與器不可以假人是言慎舉之為重也臣伏見王長通白明達本樂工輿皂雜類韋槃提斛斯正無他材獨解調馬雖術踰等夷可厚賜金帛以富其家今超授高爵與外廷朝會騶豎倡子鳴玉曳履臣竊恥之帝善其言新唐書長孫無忌傳無忌亦自懼貴且亢后又數言之遂解僕射授開府儀同三司與房玄齡杜如晦尉遲敬德皆以元勳封一子郡公進册司空知門下尚書省事無忌辭又因高士廉口陳以外戚位三公嫌議者謂天子以私后家帝曰朕任官必以才不者雖親若襄邑王神符不妄授若才雖仇如魏徵不棄也夫緣后兄愛昵厚以子女玉帛豈不得以其兼文武兩器朕故相之公等孰不曰然舊唐書睿宗紀景雲元年八月癸巳新除集州刺史譙王重福潛入東都構逆州縣討平之先是中宗時官爵渝濫因依妃主墨勑而授官者謂之斜封至是並令罷免新唐書蕭至忠傳蕭至忠沂州承人上疏陳時政曰夫官爵公器也恩幸私惠也王者正可金帛富之梁肉食之以存私澤也若公器而私用之則公義不行而勞人解體私謁開而正言塞日朘月削卒見凋弊小人乘君子之器第二前漢董仲舒對策曰皇皇求財利常恐之匱者庶人之意也皇皇求仁義常恐不能化民者大夫之意也易曰負且乘致寇至乘車者君子之位也負簷者小人之事也此言居君子之位而為庶人之行者其患禍必至也後漢謝弼傳夫台相重器國命所斷今之四公唯司空劉寵斷斷守善餘皆素餐致寇之人必有折足覆餗之凶四公謂劉矩許訓明廣及寵後漢張皓傳順帝時張網上書曰自大漢初隆及中興之世文明二帝德化尤盛但恭儉守節約身尚德而已中官常侍不過兩人近幸賞賜裁滿數金惜費重人故家給人足夷狄聞中國優富任信道德所以姦謀自消而和氣感應而頃者以來不遵舊典無功小人皆有官爵富之驕之而復害之非愛人重器承天順道者也後漢王符傳貴忠篇曰夫帝王之所尊奉者天也皇天之所愛育者人也今人臣受君之重位牧天之所愛焉可以不安而利之養而濟之哉是以君子任職則思利人達上則思進賢故居上而下不怨在前而後不恨也書稱天工人其代之王者法天而建官故明主不敢以私授忠臣不敢以虛受竊人之財猶謂之盜況偷天官以私己乎以罪犯人必加誅罰況乃犯天得旡咎乎夫五世之臣以道事君澤及草木仁被率土是以福祚流衍本支百世季世之臣以諂媚主不思順天專杖殺伐白起蒙恬秦以為功天以為賊息夫董賢主以為忠天以為盜易曰德薄而位尊智小而謀大鮮不及矣是故德不稱其禍必酷能不稱其殃必大夫竊位之人天奪其鑒雖有明察之資仁義之志一旦富貴則背親捐舊喪其本心疏骨肉而親便辟薄知友而厚犬馬寧見朽貫千萬而不忍貸人一錢情知積粟腐倉而不忍貸人一斗骨肉怨望於家細人謗讟於道前人以敗後爭襲之誠可傷也蜀劉璋傳評曰璋才非人雄而據土亂世負乘致寇自然之理其見奪取非不幸也晉衛瓘傳杜預聞瓘殺鄧艾言於衆曰伯玉其不免乎身為名上位居總帥既無德音又不御下以正是小人而乘君子之器當何以堪其責乎瓘聞之不俟駕而謝終如預言伯玉瓘字新唐閻立本以晝見名既輔政但以應務俗材無宰相器時薑格以戰功擢左相故時人有左相宣威沙漠右相馳譽丹青之嘲新唐李綱傳高祖以舞工安叱奴為散騎常侍綱諫曰謹案周禮均工樂胥不得預仕伍雖復才如子野妙如師襄才如子野皆皆繼世不易業故魏武使禰衡擊鼓衡先解朝服而擊之云不敢以先王之法服為伶人衣齊高緯封曹妙達為王以安馬駒開府有國家者可為鑒戒今新造天下開太平之基功臣賞未及遍高才猶伏草茅而先令舞胡鳴玉曳組趨丹地殆非創業垂統貽子孫之道也帝不納綱新唐曹礭傳懿宗擢優人李可及為威衛將軍礭曰太宗著令文武官共六百四十三顧謂房喬曰朕設此待天下賢士士商雜流假使技出等夷正當厚給以財不可假以官與朝賢者比肩立同坐食也文宗欲以樂工尉遲璋為王府率拾遺竇洵直固爭卒授光州長史今而位將軍不可帝不聽箋證漢書董仲舒傳仲舒復對曰夫皇皇求財利常恐乏匱者庶人之意也師古曰皇皇急速之貌也皇皇求仁義常恐不能化民者大夫之意也易曰負且乘致寇至師古曰此易解卦六三爻辭也乘車者君子之位也負擔者小人之事也此言居君子之位而為庶人之行者其患禍必至也後漢書謝弼傳謝弼字輔宣東郡武陽人也建寧二年青蛇見前殿大風拔木詔公卿以下陳得失弼上封事曰夫台宰重器國命所繼今之四公唯司空劉寵斷斷守善餘皆素餐致寇之人四公謂劉矩為大尉許訓為司徒胡廣為太傅及寵也必有折足覆餗之凶可因災異並加罷黜易曰鼎折足覆公餗鼎以喻三公餗鼎實也折足覆餗言不勝其任後漢書張晧傳附子張綱綱字文紀少明經學雖為公子而厲布衣之節舉孝廉不就司徒高第辟為御史時順帝委縱宦官有識危心綱常感激慨然歎曰穢惡滿朝不能奮身出命掃國家之難雖生吾不願也退而上書曰尋大漢初隆及中興之世文明二帝德化尤盛觀其理為易循易見但恭儉守節約身尚德而已中官常侍不過兩人近幸賞賜裁滿數金惜費重人故家給人足夷狄聞中國優富任信道德所以姦謀自消而和氣感應而頃者以來不遵舊典無功小人皆有官爵富之驕之而復害之非愛人重器承天順道者也後漢書王符傳貴忠篇曰夫帝王之所尊敬者天也皇天之所愛育者人也今人臣受君之重位牧天之所愛焉可以不安而利之養而濟之哉是以君子任職則思利人達上則思進賢故居上而下不怨在前而後不恨也書稱天工人其代之王者法天而建官故明主不敢以私授忠臣不敢以虛受竊人之財猶謂之盜况偷天官以私己乎以罪犯人必加誅罰况乃犯天得無咎乎夫五世之臣以道事君澤及草木仁被率土是以福祚流衍本支百世季世之臣以諂媚主不思順天專仗殺伐白起蒙恬秦以為功天以為賊息夫董賢主以為忠天以為盜易曰德薄而位尊智小而謀大鮮不及矣是故德不稱其禍必酷能不稱其殃必大夫竊位之人天奪其鑒雖有明察之資仁義之志一旦富貴則背親捐舊喪其本心疏骨肉而親便辟薄知友而厚犬馬寧見朽貫千萬而不忍貸人一錢情知積粟腐倉而不忍貸人一斗骨肉怨望於家細人謗讟於道前人以敗後爭襲之誠可傷也三國志蜀志二牧劉焉子璋傳評曰璋才非人雄而據土亂世負乘致寇自然之理其見奪取非不幸也晉書衛瓘傳衛瓘字伯玉河東安邑人也初杜預聞瓘殺鄧艾言於衆曰伯玉其不免乎身為名士位居總帥既無德音又不御下以正是小人而乘君子之器當何以堪其責乎瓘聞之不俟駕而謝終如預言新唐書閻讓傳附閻立本初太宗與侍臣泛舟春苑池見異鳥容與波上悅之詔坐者賦詩而召立本侔狀閣外傳呼畫師閻立本是時已為主爵郎中俯伏池左研吮丹粉望坐者羞悵流汗歸戒其子曰吾少讀書文辭不減儕輩今獨以畫見名既輔政但以應務俗材無宰相器時薑恪以戰功擢左相故時人有左相宣威沙漠右相馳譽丹青之嘲新唐書李綱傳李綱字文紀觀州蓨人少慷慨尚風節始名瑗慕張綱為人改焉帝以舞工安叱奴為散騎常侍綱諫曰周家均工樂胥不得預士伍雖復妙如師襄才如子野皆繼世不易業故魏武使禰衡擊鼓衡先解朝衣曰不敢以先王法服為伶人衣齊高緯封曹妙達為王以安馬駒開府有國家者可為鑒戒今新造天下開太平之基功臣賞未及遍高才猶伏草茅而先令舞胡嗚玉曳組位五品趨丹地殆非創業垂統貽子孫之道也帝不納綱在東宮太子建成尤加禮又舊唐書李綱傳高祖拜舞人安叱奴為散騎常侍綱上疏諫曰謹案周禮均工樂胥不得預於仕伍雖復才如子野妙等師襄皆身終子繼不易其業故魏武使禰衡擊鼓衡先解朝服露體而擊之云不敢以先王法服為伶人之衣雖齊高緯封曹妙達為王授安馬駒為開府既招物議大斁彝倫有國有家者以為殷鑒方今新定天下開太平之基起義功臣行賞未遍高才碩學猶滯草萊而先令舞胡致位五品鳴玉曳組趨馳廊廟顧非創業垂統貽厥子孫之道也高祖不納新唐書曹確傳曹確字剛中河南人確邃儒術器識方重動循法度可及憑恩橫甚人無敢斥遂擢為威衛將軍確曰太宗著令文武官六百四十三謂房玄齡曰朕設此待天下賢士工商雜流假使技出等夷正當厚給以財不可假以官與賢者比肩立同坐食也文宗欲以樂工尉遲璋為王府率拾遺竇洵直固爭卒授光州長史今而位將軍不可帝不聽又舊唐書曹確傳曹確字剛中河南人確精儒術器識謹重動循法度懿宗以伶官李可及為威衛將軍確執奏曰臣覽貞觀故事太宗初定官品令文武官共六百四十三員顧謂房玄齡曰朕設此官員以待賢士工商雜色之流假令術踰儕類止可厚給財物必不可超授官秩與朝賢君子比肩而立同坐而食太和中文宗欲以樂官尉遲璋為王府率拾遺竇洵直極諫乃改授光州長史伏乞以兩朝故事別授可及之官帝不之聽矯制第三前漢汲黯傳河內失火燒千餘家上使黯往視之還報曰家人失火屋比延燒不足憂臣過河內貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河內倉粟以振貧民請歸節伏矯制罪上賢而釋之前漢陳湯傳詔曰胸奴郅友單于背畔禮義劉殺漢使者吏士今延壽湯睹便宜乘時利結城郭諸國擅興師矯制而征之斬獲其首及閼氏貴人名王以下千數雖踰義干法內不煩一夫之役不開府庫之藏立功萬里之外威震百蠻名顯四海為國除殘然由不免死亡之患罪當在於奉憲朕甚閔之其赦延壽湯罪詔公卿議封焉前漢馮奉世傳漢數出使西域多辱命不稱或貪汙為外國所苦是時烏孫大有擊胸奴之功而西域諸國新輯漢方善遇欲以安之選可使外國者前將軍增舉奉世送大宛諸國客至伊修城都尉宋將言莎車與旁國共攻殺漢所置莎車王萬年并殺漢使者奚充國時胸奴又發兵攻車師城不能下而去莎車遣使揚言北道諸國已屬胸奴矣於是攻劫南道與歃盟畔漢從鄯善以西皆絶不通奉世與其副嚴昌計以為不亟擊之則莎車日強其執難制必危西域遂以節諭告諸國王因發其兵南北道合萬五千人進擊莎車攻拔其城莎車王自殺傳首詣長安諸國悉平威震西域奉世乃罷兵以聞宣帝召見韓增曰賀將軍所舉得其人奉世遂西至大宛大宛禮之異於它使得其名馬象龍而還上甚説丞相將軍皆曰春秋之義大夫出疆有可以安國家則顓之可也奉世功效尤著宜加爵土之賞少府蕭望之獨以奉世奉使有指而擅矯制違命發諸國兵雖有功效不可以為後世法不宜受封上善望之議以奉世為光祿大夫水衡都使前漢終軍傳元鼎中博士徐偃使行風俗偃矯制使膠東魯國鼓鑄鹽鐵還御史大夫張湯劾偃矯制大害法至死偃以為春秋之義大夫出疆有可以安社稷存萬物顓之可也湯以致其法不能詘其義有詔下軍問狀軍詰偃曰古者諸侯國異俗分百里不通時有聘會之事安危之勢呼吸成變故有不受辭造命顓己之宜今天下為一萬里同風故春秋王者旡外偃巡封域之中稱以出疆何也且鹽鐵郡有餘臧正二國廢國家不足以為利害而以安社稷存萬民為辭何也偃自豫必死而為之邪將幸誅不加欲以采名也偃窮詘服罪當死軍奏偃矯制顓行非奉使體請下御史召偃即罪奏可上善其詰有詔示御史大夫後漢宋均傳武陵蠻反詔令均監軍會伏波馬援卒士多病死乃矯制奉詔入虜營告以恩信勒兵隨之即斬其帥而降乃散其賊歸本郡置長吏而還先自劾矯制之罪世祖嘉其功賜金帛魏鄧艾自陰平進軍到雒劉禪降艾依鄧禹故事承制拜禪驃騎將軍太子奉車諸王駙馬蜀群司各隨高下拜為王官文王使監軍衛瓘喻艾吏當須報不宜輒行艾曰銜命征行元惡既服至於承制拜假以安初附謂合權宜今蜀歸命地盡南海東接吳會宜早鎮定君待國命往復道除延引日月春秋之義大夫出疆有可以安國家利社稷專之可也今吳未賓勢與蜀連不可拘常以失事機晉陶侃傳初郭默矯詔襲殺平南將軍劉胤輒領江州侃聞之曰此必詐也以大軍繼進默遣使奴婢絹百匹寫中詔呈侃參佐多諫曰默不被詔豈敢為此事侃厲色曰國家年小不出胸懷且劉胤為朝廷所禮何緣猥加極刑郭默虓勇所在暴掠以大難新除威綱寬簡欲因隙會騁其縱橫耳發使上表討默默將宗侯縳默父子詣侃降侃斬默等箋證漢書汲黯傳河內失火燒千餘家上使黯往視之還報曰家人失火屋比延燒不足憂臣過河內河內貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河內倉粟以振貧民請歸節伏矯制罪上賢而釋之漢書陳湯傳天子下詔曰胸奴郅支單于背畔禮義留殺漢使者吏士甚逆道理朕豈忘之哉所以優遊而不征者重動師衆勞將率師古曰重難也故隱忍而未有云也今延壽湯睹便宜乘時利結城郭諸國擅興師矯制而征之賴天地宗廟之靈誅討郅支單于斬獲其首及閼氏貴人名王以下千數雖踰義干法內不煩一夫之役不開府庫之藏因敵之糧以贍軍用立功萬里之外威震百蠻名顯四海為國除殘兵革之原息邊竟得以安師古曰竟讀曰境然猶不免死亡之患罪當在於奉憲朕甚閔之其赦延壽湯罪勿治詔公卿議封焉漢書馮奉世傳馮奉世字子明上黨潞人也先是時漢數出使西域多辱命不稱或貪汙為外國所苦師古曰苦謂困辱之是時烏孫大有擊胸奴之功而西域諸國新輯師古曰輯與集同集和也漢方善遇欲以安之選可使外國者前將軍增舉奉世以衛候使持節送大宛諸國客至伊修城都尉宋將言莎車與旁國共攻殺漢所置莎車王萬年師古曰莎車國名萬年其王名也莎音素和反宋祁曰宋字疑是宗字并殺漢使者奚充國時胸奴又發兵攻車師城不能下而去莎車遣使揚言北道諸國已屬胸奴矣於是攻劫南道與歃盟畔漢從鄯善以西皆絶不通都護鄭吉校尉司馬意皆在北道諸國間奉世與其副嚴昌計以為不亟擊之則莎車日強其藝難制必危西域遂以節諭告諸國王因發其兵南北道合萬五千人進擊莎車攻拔其城莎車王自殺傳其首詣長安諸國悉平威振西域奉世乃罷兵以聞宣帝召見韓增曰賀將軍所舉得其人奉世遂西至大宛大宛聞其斬莎車王敬之異於他使得其名馬象龍而還上甚説下議封奉世丞相將軍皆曰春秋之義大夫出疆有可以安國家則顓之可也奉世功效尤著宜加爵土之賞少府蕭望之獨以奉世奉使有指而擅矯制違命發諸國兵雖有功效不可以為後法即封奉世開後奉使者利以奉世為比爭逐發兵要功萬里之外為國家生事於夷狄漸不可長奉世不宜受封上善望之議以奉世為光祿大夫水衡都尉漢書終軍傳元鼎中博士徐偃使行風俗偃矯制師古曰矯託也託言受詔也使膠東魯國鼓鑄鹽鐵如淳曰鑄銅鐵扇熾火謂之鼓還奏事徙為太常丞御史大夫張湯劾偃矯制大害法至死偃以為春秋之義大夫出疆有可以安社稷存萬民顓之可也湯以致其法不能詘其義有詔下軍問狀軍詰偃曰古者諸侯國異俗分百里不通時有聘會之事安危之藝呼吸成變故有不受辭造命顓已之宜今天下為一萬里同風故春秋王者無外偃巡封域之中稱以出疆何也且鹽鐵郡有餘臧正二國廢國家不足以為利害而以安社稷存萬民為辭何也又詰偃偃自豫必死而為之邪將幸誅不加欲以采名也偃窮詘服罪當死軍奏偃矯制顓行非奉使體請下御史徵偃即罪奏可上善其詰有詔示御史大夫後漢書宋均傳會武陵蠻反圍武威將軍劉尚詔使均乘傳發江夏奔命三千人往救之既至而尚已歿會伏波將軍馬援至詔因令均監軍與諸將俱進賊拒厄不得前及馬援卒於師軍士多溫濕疾病死者太半均慮軍遂不反乃與諸將議曰今道遠士病不可以戰欲權承制降之何如諸將皆伏地莫敢應均曰夫忠臣出竟有可以安國家專之可也乃矯制調伏波司馬呂种守沅陵長命种奉詔書入虜營告以恩信因勒兵隨其後蠻夷震怖即共斬其大帥而降於是入賊營散其衆遣歸本郡為置長吏而還均未至先自劾矯制之罪光武嘉其功迎賜以金帛三國志魏志鄧艾傳冬十月艾自寬平道行無人之地七百餘里進軍到雒劉禪遣使奉皇帝璽綬為箋詣艾請降艾至成都禪率太子諸王及群臣六十餘人面縳輿櫬詣軍門艾執節解縳焚櫬受而宥之檢御將士無所虜略綏納降附使復舊業蜀人稱焉輒依鄧禹故事承制拜禪行驃騎將軍太子奉車諸王駙馬都尉蜀群司各隨高下拜為王官文王使監軍衛瓘喻艾事當須報不宜輒行艾重言曰銜命征行奉指授之策元惡既服至於承制拜假以安初附謂合權宜今蜀舉衆歸命地盡南海東接吳會宜早鎮定若待國命往復道途延引日月春秋之義大夫出疆有可以安社稷利國家專之可也今吳未賓勢與蜀連不可拘常以失事機晉書陶侃傳郭默矯詔襲殺平南將軍劉胤輒領江州侃聞之曰此必詐也遣將軍宋夏陳修率兵據湓口侃以大軍繼進默遣使奴婢絹百匹寫中詔呈侃參佐多諫曰默不被詔豈敢為此事若進軍宜待詔報侃厲色曰國家年小不出胸懷且劉胤為朝廷所禮雖方任非才何緣猥加極刑郭默虓勇所在暴掠以大難新除威網寬簡欲因隙會騁其縱橫耳發使上表討默侃既至默將宗侯縛默父子五人及默將張丑詣侃降侃斬默等要君第四史記晉世家文公元年春秦送重耳至河咎犯曰臣從君周旋天下過亦多矣臣猶知之況於君乎請從此去矣重耳曰若反國所不與子犯共者河伯視之乃投壁河中以與子犯盟是時介子推從在船中乃笑曰天實開公子而子犯以為己功而要市於君固足羞也吾不忍與同位乃自隱後漢賈彪傳岑晊以黨事逃亡親友多匿焉彪獨閉門不納時人望之彪曰傳言相時而動旡纍後人公孝以要君致釁自遺其咎吾以不能奮戈相待反可容隱之乎於是咸服其裁正箋證史記晉世家文公元年春秦送重耳至河咎犯曰臣從君周旋天下過亦多矣臣猶知之况於君乎請從此去矣重耳曰若反國所不與子犯共者河伯視之乃投璧河中以與子犯盟是時介子推從在船中乃笑曰天實開公子而子犯以為己功而要市於君固足羞也吾不忍與同位乃自隱後漢書黨錮列傳賈彪傳先是岑晊以黨事逃亡親友多匿焉彪獨閉門不納時人望之望怨也彪曰傳言相時而動無纍後人公孝以要君致釁自遺其咎吾以不能奮戈相待反可容隱之乎於是咸服其裁正
