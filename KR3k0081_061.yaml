body:
  text: 卷第六十一后妃第一前漢稚圭傳曰孔子論詩以關睢為始言后夫人之行不侔乎天地則無以奉神靈之統而理万物之宜故詩曰窈窕淑女君子好仇言能致其正淑不二其橾情欲之感無介乎容儀宴私之意不形乎動靜夫然後可以配至尊而為宗廟主此綱紀之首王教之端也自土世以來三代興廢未有不由此者也後漢應奉傳鄧皇后敗而田貴人見幸桓帝有建立之議奉以田氏微賤不宜超登后位上書諫曰臣聞周納狄女襄王出居于鄭漢立飛燕成帝繼嗣泯絶母后之重興廢所因宜思關睢之所求遠五禁之所忌帝納其言竟立竇皇后晉志曰后妃躬行四教尊崇師傅服浣濯之衣修煩辱之事化天下以成婦道新唐后妃傳唐制皇后而下有貴妃淑妃德妃賢妃是為夫人昭儀昭容昭媛修儀修容修媛充儀充容充媛是為九嬪婕妤美人才人各九合二十七是代世婦寶林御女采女各二十七合八十一是代御妻自餘六尚分典乘輿服御皆有員次後世故復不常開元時以后下復有四妃非是乃置惠麗華二妃六儀四美人七才人而尚宮尚儀尚服各二參合前號大抵踵周官相損益云然則尚矣禮本夫婦詩始后妃治亂因之興亡係焉盛德之君帷薄嚴奧裡謁不懺于朝外言不內諸閫關睢之風行彤史之化修故淑範懿行更為內助箋證漢書匡衡傳衡上疏曰孔子論詩以關雎為始言太上者民之父母后夫人之行不侔乎天地則無以奉神靈之統而理萬物之宜故詩曰窈窕淑女君子好仇言能致其貞淑不二其操情欲之感無介乎容儀宴私之意不形乎動靜夫然後可以配至尊而為宗廟主此綱紀之首王教之端也自上世已來宋祁曰已當作以三代興廢未有不由此者也後漢書應奉傳及鄧皇后敗而田貴人見幸桓帝有建立之議奉以田氏微賤不宜超登后位上書諫曰臣聞周納狄女襄王出居于鄭漢立飛燕成帝胤嗣泯絶母后之重興廢所因宜思關雎之所求遠五禁之所忌帝納其言竟立竇皇后晉書孝懷帝孝愍帝紀史臣曰周家世積忠厚仁及草木內隆九族外尊事黃耇以成其福祿者也而其妃后躬行四教尊敬師傅服浣濯之衣修煩辱之事化天下以成婦道四新唐書后妃列傳上唐制皇后而下有貴妃淑妃德妃賢妃是為夫人昭儀昭容昭媛修儀修容修媛充儀充容充媛是為九嬪婕妤美人才人各九合二十七是代世婦寶林御女采女各二十七合八十一是代御妻自餘六尚分典乘輿服御皆有員次後世改復不常開元時以后下復有四妃非是乃置惠麗華三妃六儀四美人七才人而尚宮尚儀尚服各二參合前號大抵踵周官相損益云然則尚矣禮本夫婦詩始后妃治亂因之興亡係焉盛德之君帷簿嚴奧裏謁不忤于朝外言不內諸閫關雎之風行彤史之化修故淑範懿行更為內助賢后第二後漢馬皇后紀永平有司奏立長秋宮帝未有所言皇太后曰馬貴人德冠後宮即其人也遂立為皇后既正位宮闈愈自謙肅能誦易好讀春秋楚辭尤善周官董仲舒書常衣大練裙不加緣朔望諸姬主朝請望見后袍衣疏粗反以為綺縠就視乃笑后辭曰此繒特宜染色故用之耳六宮莫不歎息後漢馬皇后紀諸將奏事及公卿較議難平者帝數以試后后輒分解趣理各得其情每於侍執之際輒言及政事多所裨補而未嘗以家私干欲寵遇日隆始終無衰後漢皇后紀鄧皇后六歲能史書十二通詩論語諸兄每讀經傳輒下意難問志在典籍不問居家之事母常非之曰汝不習女工以供衣服乃更務學寧當舉博士邪后重違母言晝修婦業暮誦經典家人號曰諸生父訓異之事無大小輒與詳議後漢皇后紀梁皇后少善女工好史書九歲能誦論語治韓詩大義略舉常以列女圖畫置於左右以自監誡劉向撰列女傳八篇圖畫其象晉列女傳劉聰妻劉氏名娥字麗華幼而聰慧晝營女工夜誦書籍每與諸兄論經義理趣超遠性孝友善風儀進止聰既僭位召為右貴嬪甚寵之俄拜為后將起凰儀殿以居之其廷尉陳元達切諫聰大怒將斬之娥時在後堂私勑左右停刑手疏啓曰伏聞將為妾營殿今昭德足居凰儀非急四海未一禍難猶繁廷尉之言國家大政宜賞廷尉以美爵酬廷尉以列土如何不惟不納而反欲誅之陛下此怒由妾而起廷尉之禍由妾而招人怨國疲咎歸於妾距諫害忠亦妾之由自古敗國喪家未始不由婦人者也妾每覽古事忿之忘食何意今日妾自為之後人觀妾亦由妾之視前人也復何面目仰視巾櫛請歸死此堂以塞陛下誤惑之過聰覽之色變謂其群下曰朕比得風疾喜怒過常元達忠臣也朕甚愧之以娥表示元達曰外輔如公內輔如此后朕無憂矣新唐書太宗皇后長孫氏傳皇后性約素服御取給則止益觀書雖容櫛不少廢與帝言或及天下事辭曰牝雞司晨家之窮也可乎帝固要之訖不對新唐書太宗皇后長孫氏傳后常采古婦人事著女則十篇又為論斥漢之馬后不能撿抑外家使與政事乃戒其車馬之侈此謂開本源恤末事常誡守者吾以自檢故書無條理勿令至尊見之新唐太宗皇后長孫氏傳太子承乾乳母請增東宮什器后曰太子患無德與名器何請為箋證後漢書馬皇后紀永平三年春有司奏立長秋宮帝未有所言皇太后曰馬貴人德冠後宮即其人也遂立為皇后先是數日夢有小飛蟲無數赴著身又入皮膚中而後飛出既正位宮闈愈自謙肅身長七尺二寸方口美髮能誦易好讀春秋楚辭尤善周官董仲舒書常衣大練裙不加緣朔望諸姬主朝請望見后袍衣疏粗反以為綺縠就視乃笑后辭曰此繒特宜染色故用之耳六宮莫不歎息時諸將奏事及公卿較議難平者帝數以試后后輒分解趣理各得其情每於侍執之際輒言及政事多所毗補而未嘗以家私干故寵敬日隆始終無衰後漢書鄧皇后紀和熹鄧皇后諱綏太傅禹之孫也父訓護羌校尉母陰氏光烈皇后從弟女也后年五歲太傅夫人愛之自為翦髮夫人年翦目冥誤傷后額忍痛不言左右見者怪而問之后曰非不痛也夫人哀憐為斷髮難傷老人意故忍之耳六歲能史書十二通詩論語諸兄每讀經傳輒下意難問下意猶出氣也志在典籍不問居家之事母常非之曰汝不習女工以供衣服乃更務學寧當舉博士邪后重違母言晝修婦業暮誦經典家人號曰諸生父訓異之事無大小輒與詳議後漢書梁皇后紀順烈梁皇后諱妠大將軍商之女恭懷皇后弟之孫也后生有光景之祥少善女工好史書九歲能誦論語治韓詩大義略舉常以列女圖畫置於左右以自監戒劉向撰列女傳八篇圖畫其象晉書烈女列傳劉聰妻劉氏劉聰妻劉氏名娥字麗華僞太保殷女也幼而聰慧晝營女工夜誦書籍傅母恆止之娥敦習彌厲每與諸兄論經義理趣超遠諸兄深以歎伏性孝友善風儀進止聰既僭位召為右貴嬪甚寵之俄拜為后將起凰儀殿以居之其廷尉陳元達切諫聰大怒將斬之娥時在後堂私勑左右停刑手疏啓曰伏聞將為妾營殿今昭德足居凰儀非急四海未一禍難猶繁動須人力資財尤宜慎之廷尉之言國家大政夫忠臣之諫豈為身哉帝王距之亦非顧身也妾仰謂陛下上尋明君納諫之昌下忿暗主距諫之禍宜賞廷尉以美爵酬廷尉以列土如何不惟不納而反欲誅之陛下此怒由妾而起廷尉之禍由妾而招人怨國疲咎歸於妾距諫害忠亦妾之由自古敗國喪家未始不由婦人者也妾每覽古事忿之忘食何意今日妾自為之後人之觀妾亦猶妾之視前人也復何面目仰侍巾櫛請歸死此堂以塞陛下誤惑之過聰覽之色變謂其群下曰朕比得風疾喜怒過常元達忠臣也朕甚愧之以娥表示元達曰外輔如公內輔如此后朕無憂矣新唐書后妃列傳太宗皇后長孫氏傳太宗文德順聖皇后長孫氏河南洛陽人其先魏拓拔氏後為宗室長因號長孫尋為皇太子妃俄為皇后性約素服御取給則止益觀書雖容櫛不少廢與帝言或及天下事辭曰牝雞司晨家之窮也可乎帝固要之訖不對后嘗采古婦人事著女則十篇又為論斥漢之馬后不能檢抑外家使與政事乃戒其車馬之侈此謂開本源恤末事常誡守者吾以自檢故書無條理勿令至尊見之新唐書后妃列傳太宗皇后長孫氏傳太子承乾乳媼請增東宮什器后曰太子患無德與名器何請為賢妃第三前漢外戚傳成帝遊於後庭嘗欲與班倢妤同輦載倢妤辭曰觀古圖畫賢聖之君皆有名臣在側三代末主乃有嬖女今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班倢妤後漢皇后紀梁后為貴人常時被引御從容辭於帝曰夫陽以博施為德陰以不專為義螽斯則百福之所由興也詩國風序曰言后妃若螽斯不妬忌則子孫衆多也願陛下思雲雨之均澤識貫魚之次序剝卦曰貫魚以宮人寵無不利使小妾得免罪謗之纍由是帝加重焉新唐書太宗賢妃徐惠傳生五月而能言四歲通論語詩八歲自曉屬文太宗聞之召為才人手未嘗廢卷而辭致贍蔚又無淹思帝益禮顧目觀末數調兵討定四夷稍稍治宮室百姓勞怨惠上疏極諫新唐書德宗韋賢妃不知氏策為賢妃性敏惠言無苟容動必由禮德宗深重之六宮師其德行箋證漢書外戚列傳成帝遊於後庭嘗欲與倢妤同輦載倢妤辭曰觀古圖畫聖賢之君皆有名臣在側三代末主乃有嬖女今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班倢妤張晏曰楚王好田樊姬為不食禽獸之肉後漢書梁皇后紀順烈梁皇后永建三年與姑俱選入掖庭時年十三相工茅通見后驚再拜賀曰此所謂日角偃月相之極貴臣所未嘗見也遂以為貴人常特被引御從容辭於帝曰夫陽以博施為德陰以不專為義螽斯則百福之所由興也詩國風序曰言后妃若螽斯不妬忌則子孫衆多也詩大雅曰大姒嗣徽音則百斯男也願陛下思雲雨之均澤識貫魚之次序易曰雲行雨施品物流形剝卦曰貫魚以宮人寵無不利剝坤下艮上五陰而一陽衆陰在下駢頭相次似貫魚也使小妾得免罪謗之纍由是帝加敬焉新唐書后妃列傳賢妃徐氏傳太宗賢妃徐惠湖州長城人生五月能言四歲通論語詩八歲自曉屬文父孝德嘗試使擬離騷為小山篇曰仰幽巖而流盻撫桂枝以凝想將千齡兮此遇荃何為兮獨往孝德大驚知不可掩於是所論著遂盛傳太宗聞之召為才人手未嘗廢卷而辭致贍蔚又無淹思帝益禮顧擢孝德水部員外郎惠再遷充容貞觀末數調兵討定四夷稍稍治宮室百姓勞怨惠上疏極諫舊唐書后妃列傳德宗韋妃傳德宗韋賢妃不知氏族所出初為良娣貞元二年冊為賢妃性敏惠言無苟容動必由禮德宗深重之六宮師其德行宗室第四前漢文帝紀宋昌進曰高帝王子弟地犬牙相制所謂盤石之宗也天下服其彊前漢昭帝紀元始二年春以宗室毋在位者舉茂材劉辟彊劉長樂皆為光祿大夫前漢宣帝地節元年詔曰蓋聞堯親九族以和萬國朕蒙遺德奉承聖業惟念宗室屬未盡而以罪絶若有賢材改行勸善其復屬使得自新前漢楚元王傳昭帝即位或說大將軍霍光曰將軍不見諸呂之事乎處伊尹周公之位攝政擅權而背宗室不與共職是以天下不信卒至於滅亡今將軍當盛位帝春秋富宜納宗室又多與大臣共事反諸呂道如是則可以免患光然之乃擇宗室可用者前漢劉向傳向每召見數言公族者國之枝葉枝葉落則本恨無所庇廕方今同姓疏遠母黨專政祿去王室權在外家非所以彊漢宗卑私門保守社稷安固後嗣也向自見得信於上故常顯訟宗室譏剌王氏及在位大臣其言多痛切發於至誠顯宗即世拜東平王蒼為驃騎將軍位在三公上自漢興以來宗室子弟無在公卿位者至明帝始用蒼焉北海靖王興章弟嗣守平陰令遷梁郡太守光武兄仲亦誠守緱氏令遷弘農太守及就國以魯國益東海後漢劉虞傳論曰自帝室王公之胄皆生長脂腴不知稼穡其能厲行飭身卓然不群者或未顯焉劉虞守道慕名以忠厚自牧美哉乎季漢之名宗子也晉武帝紀咸寧三年詔曰宗室戚屬國之枝葉欲令奉率德義為天下式然處富貴而能慎行者寡召穆公糾合兄弟而賦棠棣之詩此姬氏所以本支百世池今以衛將軍扶風王亮為宗師所當施行皆咨之於宗師也新唐宗室傳漢王郡王瓌為荊州都督政務清淨嶺外囚豪數相攻瓌遣使諭威德皆如約不敢動新唐宗室傳韓王元嘉與弟靈夔友愛燕見終日如布衣禮閨門整肅當時稱之新唐宗室傳道宗晚好學接士大夫不泥于貴國初宗室推道宗孝恭為最賢餘見人臣擅權劉向傳箋證漢書文帝紀宋昌進曰夫秦失其政豪傑並起人人自以為得之者以萬數然卒踐天子位者劉氏也天下呂望一矣高帝王子弟地犬牙相制所謂盤石之宗也天下服其彊二矣漢書昭帝紀二年春正月大將軍光左將軍桀皆以前捕斬反虜重合侯馬通功封光為博陸侯桀為安陽侯以宗室毋在位者舉茂材劉辟彊劉長樂皆為光祿大夫辟彊守長樂衛尉漢書宣帝紀地節元年夏六月詔曰蓋聞堯親九族以和萬國朕蒙遺德奉承聖業惟念宗室屬未盡而以罪絶若有賢材改行勸善其復屬使得自新漢書楚元王傳附劉辟彊辟彊字少卿亦好讀詩能屬文清靜少欲常以書自娛不肯仕昭帝即位或說大將軍霍光曰將軍不見諸呂之事乎處伊尹周公之位攝政擅權而背宗室不與共職是以天下不信卒至於滅亡今將軍當盛位帝春秋富宜納宗室又多與大臣共事反諸呂道如是則可以免患光然之乃擇宗室可用者卷三十六劉辟彊者劉富子也劉富者楚元王子也漢書楚元王傳附劉向向每召見數言公族者國之枝葉枝葉落則本根無所庇廕方今同姓疏遠母黨專政祿去公室權在外家非所以彊漢宗卑私門保守社稷安固後嗣也向自見得信於上故常顯訟宗室譏刺王氏及在位大臣其言多痛切發於至誠未知出處或據後漢書之載記編之未知出處北海靖王興後漢書有傳後漢書劉虞公孫瓚列傳論曰自帝室王公之胄皆生長脂腴不知稼穡其能厲行飭身卓然不群者或未聞焉劉虞守道慕名以忠厚自牧美哉乎季漢之名宗子也晉書武帝紀三年詔曰宗室戚屬國之枝葉欲令奉率德義為天下式然處富貴而能慎行者寡召穆公糾合兄弟而賦棠棣之詩此姬氏所以本支百世也今以衛將軍扶風王亮為宗師所當施行皆咨之於宗師也新唐書宗室列傳漢陽郡王瓌漢陽郡王瓌始為郡公代孝恭為荊州都督政務清靜嶺外酋豪數相攻瓌遣使諭威德皆如約不敢亂新唐書高祖諸子列傳韓王元嘉韓王元嘉字元嘉少好學藏書至萬卷皆以古文字參定同異與弟靈夔友愛燕見終日如布衣禮閨門修整當世稱之新唐書宗室列傳江夏郡王道宗道宗晚好學接士大夫不倨于貴國初宗室唯道宗孝恭為最賢放宮女第五文帝後元七年歸夫人以下至少使應劭曰夫人以下有美人良人八子七子長使少使皆遣歸家重絶人類禹貢曰高祖孝文帝孝景皇帝宮女不過千餘武帝時又多取好女至數千人以填後宮及棄天下霍光秉政以後宮女置於園陵昭帝晏駕光後行之至孝宣帝亦隨故事故使天下承化取女皆太過度諸侯妻妾或至數百人豪富吏人畜歌者至數十人景帝後三年出宮人歸其家復終身武帝擇宮人不中用者斥出之新唐書柳公權傳召問得失因言郭旻領邠寧而議者頗有臧否帝曰旻尚父從子太皇太后季父官旡玷郵自大金吾位方鎮何所更議答曰旻誠勳舊然人謂獻二女乃有是除信乎帝曰女自參承太后豈獻哉公權曰疑嫌間不可戶曉因引王圭諫盧江王妃事是日帝命中官自南內送女還旻家劉瑜言諸侯之位上法四七垂文炳耀關之盛衰今中官邪孽比肩列土皆競立胤嗣傳爵或乞子疏屬或買兒市道殆乖開國承家之義前漢景帝紀詔曰孝文除宮刑出美人重絶人之世也魏楊阜傳上疏欲省宮人諸不見幸者乃召御府吏問後宮人數吏守舊令對曰禁密不得宣露阜怒杖一百數之曰國家不與九卿為密反與小吏為密乎帝聞而愈重新唐書柳公權傳召問得失因言郭旻領邠寧而議者頗有臧否帝曰旻尚父從子太皇太后季父官旡玷郵自大金吾位方鎮何所更議答曰旻誠勳舊然人謂獻二女乃有是除信乎帝曰女自參承太后豈獻哉公權曰疑嫌間不可戶曉因引王圭諫盧江王妃事是日帝命中官自南內送女還旻家餘見積宮女郎顗傳箋證漢書文帝紀七年夏六月己亥帝崩于未央宮遺詔曰歸夫人以下至少使應劭曰夫人以下有美人良人八子七子長使少使皆遣歸家重絶人類漢書貢禹傳元帝初即位徵禹為諫大夫數虛己問以政事是時年歲不登郡國多困禹奏言古者宮室有制宮女不過九人秣馬不過八匹至高祖孝文孝景皇帝循古節儉宮女不過十餘廄馬百餘匹武帝時又多取好女至數千人以填後宮及填天下昭帝幼弱霍光專事不知禮正妄多臧金錢財物鳥獸魚鱉牛馬虎豹生禽凡百九十物盡瘞臧之又皆以後宮女置於園陵大失禮逆天心又未必稱武帝意也昭帝晏駕光復行之至孝宣皇帝時陛下惡有所言群臣亦隨故事甚可痛也故使天下承化取女皆大過度師古曰取讀曰娶諸侯妻妾或至數百人豪富吏民畜歌者至數十人是以內多怨女外多曠夫箋證略箋證略後漢書劉瑜傳劉瑜字季節廣陵人也高祖父廣陵靖王父辨清河太守延熹八年太尉楊秉舉賢良方正及到京師上書陳事曰誠願陛下且以須臾之慮覽今往之事人何為咨嗟天曷為動變蓋諸侯之位上法四七垂文炳耀關之盛衰者也四七二十八宿也諸侯為天子守四方猶天之有二十八宿漢官儀曰天子建侯上法四七也今中官邪孽比肩裂土皆競立胤嗣繼體傳爵或乞子産屬或買兒市道殆乖開國承家之義易曰大君有命開國承家漢書景帝紀元年冬十月詔曰孝文皇帝臨天下除誹謗去肉刑賞賜長老收恤孤獨以遂群生減耆欲不受獻師古曰耆讀曰嗜罪人不帑不誅無罪不私其利也除宮刑出美人重絶人之世也三國志魏志楊阜傳又上疏欲省宮人諸不見幸者乃召御府吏問後宮人數吏守舊令對曰禁密不得宣露阜怒杖吏一百數之曰國家不與九卿為密反與小吏為密乎帝聞而愈敬憚阜新唐書柳公綽傳附弟柳公權開成三年轉工部侍郎召問得失因言郭旻領邠寧而議者頗有臧否帝曰旻尚父從子太皇太后季父官無玷郵自大金吾位方鎮何所更議答曰旻誠勳舊然人謂獻二女乃有是除信乎帝曰女自參承太后豈獻哉公權曰疑嫌間不可戶曉因引王圭諫廬江王妃事是日帝命中宮自南內送女還旻家積宮女第六元帝時翼奉奏君未央建章甘泉宮才人各以百數皆不得天性若杜陵園其已御見者臣子不敢有言雖然太皇太后之事也及諸侯王國與其後宮宜為設員出其過制者以損陰氣應天救邪之道也今異至不應災將隨之其法大水極陰生陽反為大旱甚則有火災春秋姬是也後漢郎顗傳禮天子一娶九女嫡勝畢具今宮人侍御動以千計或生而幽隔人道不通鬱積之氣上感皇天故遣熒惑入軒轅垂象見異以悟主之昔武王下車出傾宮之女表商容之閭以理人倫以表賢德故天授以聖子成王是也今陛下多積宮人以違天意故皇嗣多夭宜簡出宮人恣其姻嫁則天自降福子孫千億唯陛下留神於此後漢荀爽傳臣竊聞後宮采女五六千人從官侍使復在其外冬夏衣服朝夕稟糧耗費縑帛空竭府藏徵調增倍十而稅一空賦不辜之民以供無用之女百姓困窮於外陰陽隔塞于內故感動和氣災異屢臻臣愚以為諸非禮聘未幸遇者一皆遣出後漢陳蕃傳上疏諫曰比年收斂十傷五六萬人飢寒不聊生活而采女數千食肉衣綺脂油粉黑不可資計資量也鄙諺言盜不過五女門以女貧家也今後宮之女豈不貧國乎是以傾宮嫁而天下化紂作傾宮多采美女以充之武王代商歸傾宮之女於諸侯楚女悲而西宮災魯僖公為齊桓所脅以齊媵為嫡楚女廢居西宮而不見恤悲愁怨曠生且聚而不御必生憂悲之感以致并隔水旱之困晉武帝紀二年賜王公以下吳生口各有差詔選孫皓妓妾五千人入宮晉武元楊皇后傳泰始中帝博選良家以充後宮先下書禁天下嫁娶使宦者乘使車給騶騎馳傳州郡召充選者名家盛族子女多敗衣瘁貌以避之晉胡貴嬪傳時帝多內寵平吳之後復納孫皓宮人數千自此掖庭殆將萬人而並寵者甚衆帝莫知所適常乘羊車恣其所之至便宴寢宮人乃取竹葉插戶以鹽汁灑地而引帝車新唐開元天寶中長安大內大明興廢三宮皇子十宅院皇孫百孫院東都大內上陽兩宮大率宮女四万人新唐王圭傳它日進見有美人侍側本廬江王瑗姬也太宗指之曰廬江殺其夫而納其室暴虐之甚何有不亡乎圭曰陛下以廬江為是邪非耶太宗曰殺人而取妻乃問朕是非何也對曰臣聞於管子曰齊桓公之郭問其父老曰郭何故亡父老曰以其善善而惡惡也桓公曰若子之言乃賢君也何至於亡父老曰不然郭君善善而不能用惡惡而不能去所以亡今陛下知廬江之亡其姬尚在竊謂陛下以為是審知其非所謂知惡而不去也帝嗟美其言箋證漢書翼奉傳翼奉又疏二后之黨滿朝非特處位藝尤奢僭過度臣又聞未央建章甘泉高才人各以百數皆不得天性師古曰言絶男女之好也若杜陵園其已御見者臣子不敢有言雖然太皇太后之事也及諸侯王園與其後宮宜為設員出其過制者此損陰氣應天救邪之道也今異至不應災將隨之其法大水極陰生陽反為大旱甚則有火災春秋宋伯姬是矣師古曰伯姬魯成公女宋恭公之夫人也幽居守寡既久而遇火災極陰生陽也後漢書郎顗傳禮天子一娶九女嫡媵畢具今宮人侍御動以千計或生而幽隔人道不通鬱積之氣上感皇天故遣熒惑入軒轅理人倫垂象見異以悟主上昔武王下車出傾宮之女表商容之閭尚書大傅曰武王入殷表商容之閭歸傾宮之女以理人倫以表賢德故天授以聖子成王是也今陛下多積宮人以違天意故皇胤多夭嗣體莫寄詩云敬天之怒不敢戲豫詩大雅板篇之文也注云戲豫逸豫也方今之福莫若廣嗣廣嗣之術可不深思宜簡出宮女恣其姻嫁則天自降福子孫千億惟陛下丁寧再三留神於此後漢書荀淑傳附子荀爽延熹元年太常趙典舉爽至孝拜郎中對策陳便宜曰臣竊聞後宮采女五六千人從官侍使復在其外冬夏衣服朝夕稟糧耗費縑帛空竭府藏徵調增倍十而稅一空賦不辜之民以供無用之女百姓窮困於外陰陽隔塞於內故感動和氣災異屢臻臣愚以為諸非禮聘未曾幸御者一皆遣出後漢書陳蕃傳會白馬令李雲抗疏諫桓帝怒當伏重誅蕃上書救雲坐免歸田里復徵拜議郎數日遷光祿勳時封賞踰制內寵猥盛蕃乃上疏諫曰又比年收斂十傷五六萬人饑寒不聊生活而采女數千食肉衣綺脂油粉黛不可資計資量也鄙諺云盜不過五女門以女貧家也今後宮之女豈不貧國乎是以傾宮嫁而天下化帝王紀曰紂作傾宮多采美女以充之武王伐殷乃歸傾宮之女於諸侯也楚女悲而西宮災公羊傳曰西宮災何休注云時僖公為齊桓所脅以齊媵為嫡楚女廢居西宮而不見恤悲愁怨曠所生且聚而不御必生憂悲之感以致并隔水旱之困晉書武帝紀二年安平王敦薨賜王公以下吳生口各有差詔選孫晧妓妾五千人入宮晉書后妃列傳武元楊皇后泰始中帝博選良家以充後宮先下書禁天下嫁娶使宦者乘使車給騶騎馳傳州郡召充選者名家盛族子女多敗衣瘁貌以避之晉書后妃列傳胡貴嬪時帝多內寵平吳之後復納孫晧宮人數千自此掖庭殆將萬人而並寵者甚衆帝莫知所適常乘羊車恣其所之至便宴寢宮人乃取竹葉插戶以鹽汁灑地而引帝車舊唐書宦官列傳序開元天寶中長安大內大明興慶三宮皇子十宅院皇孫百孫院東都大內上陽兩宮大率宮女四萬人新唐書王圭傳它日進見有美人侍帝側本廬江王瑗姬也帝指之曰廬江不道賊其夫而納其室何以不亡乎圭避席曰陛下以廬江為是邪非邪帝曰殺人而取妻乃問朕是非何也對曰臣聞齊桓公之郭問父老曰郭何故亡曰以其善善而惡惡也公曰若子之言乃賢君也何至於亡父老曰不然郭君善善不能用惡惡不能去所以亡今陛下知廬江之亡其姬尚在竊謂陛下以為是審知其非所謂知惡而不去也帝嗟美其言
