body:
  text: 卷第九十六四夷歸化第一前漢宣帝紀本始二年夏詔曰念孝武皇帝躬履仁義選明將討不服匈奴遠遁平氐羌昆明南越百蠻鄉風款塞來享前漢宣帝紀甘露二年秋匈奴呼韓邪單于款五原塞願奉國珍朝三年正月詔有司議咸曰聖王之制施德行禮先京師而後諸夏先諸夏而後夷狄單于非正朔所加王者所客也禮儀宜如諸侯王位次諸侯王下詔曰朕之不逮德不能鴻覆其以客禮待之位在諸侯王上前漢司馬相如傳檄曰陛下即位存撫天下集安中國然後興師出兵北征匈奴單于怖駭交臂受事屈膝請和康居西域重譯納貢稽首來享移師東指閩越相誅右吊番禺太子入朝南夷之君西僰之長常效貢職不敢惰怠延頸舉踵喁喁然皆鄉風慕義欲為臣妾前漢司馬相如傳曰而夷狄殊俗之國遼絕異黨之域舟車不通人跡罕至內鄉而怨曰蓋聞中國有至仁焉德洋恩普物靡不得其所今獨曷為遺已舉踵思慕若枯旱之望雨前漢仲舒對曰陛下至德昭然夜郎康居殊方万里說德歸誼前漢西域傳贊曰自建武以來西域思漢威德咸樂內屬唯其小邑鄯善車師界迫匈奴尚為所拘而其大國莎車于闐之屬數遣使置質于漢願請屬都護聖上遠覽古今因時之宜羇縻不絕辭而未許雖大禹之序西戎周公之讓白雉太宗之郤走馬義兼之矣後漢孝明紀西南夷哀牢澹耳僬僥槃木白狼動黏諸種前後慕義貢獻西域諸國遣子入侍後漢祭彤傳彤之威聲暢於北方西自武威東盡玄菟及樂浪胡夷皆來內附野無風塵乃悉罷緣邊屯兵後漢南蠻傳交阯之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻白雉曰道路遙遠山川阻深音使不通故重譯而朝成王以歸周公公曰德不加焉則君子不饗其質質亦贄也政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黃耇曰久矣天之無烈風雷雨意者中國有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦于宗廟後漢南蠻傳永寧元年禪國王雍由調復遣使者詣闕朝賀獻樂及幼人能變化吐火自支解易牛馬頭晉裨離國在肅慎西北養雲國寇莫汗國一群國牟奴國未利蒲都國澠餘國沙樓國各遣使詣東夷校尉何龕歸化晉載記符堅傳鄯善王車師前部王來朝大宛獻汗血馬肅慎貢楛矢天竺獻火浣布康居于寘及海東諸國凡六十有二王皆遣使貢其方物晉石季龍傳史臣曰禠毯裘襲冠帶釋介冑開庠序鄰敵畏威而獻款絕域承風而納貢則古之為國曷以加諸新唐高祖夷狄傳大宗閱武於域西高祖親自臨視勞將士而還置酒於未央宮三品已上咸侍高祖命突厥頡利可汗起舞又遣南越酋長馮智戴詠詩既而笑曰胡越一家自古未之有也新唐契丹傳贊曰唐之德大矣際天所覆悉臣而屬之蒲海內外無不州縣遂尊天子曰天可汗三王以來未有以過之至荒區君長待唐璽纛乃能國一為不賓隨輒夷縳故蠻琛夷寶踵相逮于廷極熾而衰厥禍內移天寶之後區夏痍破王官之戍北不踰河西止秦邠凌夷百年逮於亡顧不痛哉故曰治人推聖人能之新唐西域傳贊曰西方之戎古未嘗通中國至漢始載烏孫諸國後以名字見者寖多唐興以次脩貢蓋百餘皆冒万里而至亦已勤矣然中國有報贈冊弔程糧傳驛之費東至高麗南至真臘西至波斯吐蕃堅昆北至突厥契丹靺鞨謂之入蕃其外謂之絕域視地遠近而給費開元盛時稅西域商胡以供四鎮出北道者納賦輪臺地廣則費倍此盛王之鑒也餘見天下治平昭宗紀箋證漢書宣帝紀本始二年夏五月詔曰朕以眇身奉承祖宗夙夜惟念孝武皇帝躬履仁義選明將討不服匈奴遠遁平氐羌昆明南越百蠻鄉風款塞來享建太學修郊祀定正朔協音律封泰山塞宣房符瑞應寶鼎出白麟獲漢書宣帝紀甘露二年秋匈奴呼韓邪單于款五原塞願奉國珍朝三年正月詔有司議咸曰聖王之制施德行禮先京師而後諸夏先諸夏而後夷狄單于非正朔所加王者所客也禮儀宜如諸侯王稱臣昧死再拜位次諸侯王下詔曰朕之不逮德不能弘覆其以客禮待之位在諸侯王上漢書司馬相如傳檄曰陛下即位存撫天下集安中國然後興師出兵北征匈奴單于怖駭交臂受事屈膝請和康居西域重譯納貢稽首來享移師東指閩越相誅右弔番禺太子入朝南夷之君西僰之長常效貢職不敢惰怠延頸舉踵喁喁然皆鄉風慕義欲為臣妾道里遼遠山川阻深不能自致漢書司馬相如傳使者曰而夷狄殊俗之國遼絕異黨之域舟車不通人迹罕至內鄉而怨曰蓋聞中國有至仁焉德洋恩普物靡不得其所今獨曷為遺已舉踵思慕若枯旱之望雨盭夫為之垂涕況乎上聖又烏能已漢書董仲舒傳仲舒對曰陛下至德昭然施於方外夜郎康居殊方万里說德歸誼此太平之致也漢書西域傳贊曰故自建武以來西域思漢威德咸樂內屬唯其小邑鄯善車師界迫匈奴尚為所拘而其大國莎車于闐之屬數遣使置質于漢願請屬都護聖上遠覽古今因時之宜羇縻不絕辭而未許雖大禹之序西戎周公之讓白雉太宗之郤走馬義兼之矣亦何以尚玆後漢書孝明紀西南夷哀牢儋耳僬僥槃木白狼動黏諸種前後慕義貢獻西域諸國遣子入侍後漢書祭彤傳彤之威聲暢於北方西自武威東盡玄菟及樂浪胡夷皆來內附野無風塵乃悉罷緣邊屯兵後漢書南蠻傳交阯之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻白雉曰道路悠遠山川岨深音使不通故重譯而朝成王以歸周公公曰德不加焉則君子不饗其質質亦贄也政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黃耇曰久矣天之無烈風雷雨意者中國有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦于宗廟後漢書南蠻傳永寧元年撣國王雍由調復遣使者詣闕朝賀獻樂及幻人能變化吐火自支解易牛馬頭晉書四夷列傳裨離等十國裨離國在肅慎西北馬行可二百日領戶二萬養雲國去裨離馬行又五十日領戶二萬寇莫汗國去養雲又百日行領戶五萬餘一群國去莫汗又百五十日計去肅慎五萬餘里其風俗土壤並未詳泰始三年各遣小部獻其方物至太熙初復有牟奴國帥逸芝惟離模盧國帥沙支臣芝于離未利國帥加牟臣芝蒲都國帥因末繩余國帥馬路沙樓國帥釤加各遣正副使詣東夷校尉何龕歸化晉書載記符堅傳鄯善王車師前部王來朝大宛獻汗血馬肅慎貢楛矢天竺獻火浣布康居於闐及海東諸國凡六十有二王皆遣使貢其方物晉書石季龍傳史臣曰於是跨躡燕趙并吞韓魏杖奇材而竊徽號擁舊都而抗王室禠毯裘襲冠帶釋介冑開庠序鄰敵懼威而獻款絕域承風而納貢則古之為國曷以加諸舊唐書高祖夷狄傳太宗是歲閱武於城西高祖親自臨視勞將士而還置酒於未央宮三品已上咸侍高祖命突厥頡利可汗起舞又遣南越酋長馮智戴詠詩既而笑曰胡越一家自古未之有也新唐書契丹傳贊曰唐之德大矣際天所覆悉臣而屬之薄海內外無不州縣遂尊天子曰天可汗三王以來未有以過之至荒區君長待唐璽纛乃能國一為不賓隨輒夷縳故蠻琛夷寶踵相逮于廷極熾而衰厥禍內移天寶之後區夏痍破王官之戍北不踰河西止秦邠凌夷百年逮於亡顧不痛哉故曰治己治人惟聖人能之新唐書西域傳贊曰西方之戎古未嘗通中國至漢始載烏孫諸國後以名字見者寖多唐興以次脩貢蓋百餘皆冒萬里而至亦已勤矣然中國有報贈冊弔程糧傳驛之費東至高麗南至真臘西至波斯吐蕃堅昆北至突厥契丹靺鞨謂之八蕃其外謂之絕域視地遠近而給費開元盛時稅西域商胡以供四鎮出北道者納賦輪臺地廣則費倍此盛王之鑒也羌胡避境第一前漢廣為右北平太守匈奴號曰漢飛將軍避之數歲不入界前漢酷吏郅都傳景帝拜都為雁門太守匈奴素聞郅都節舉邊為引兵去竟都死不近雁門後漢賈復傳復宗為朔方太守舊內郡徙人在邊者率多貧弱為居人所僕役不得為吏宗擢用其任職者與邊吏參選轉相監司以擿發其姦匈奴畏之不敢入塞後漢郭伋傳轉為漁陽太守時匈奴數抄郡界邊境苦之伋整勒士馬設攻守之略匈奴畏憚遠跡不敢復入塞民得安業後漢張堪傳於狐奴開稻田八千餘頃勸民耕種以致豊富百姓歌白桑無附枝麥穗兩岐張君為政樂不可支視事八年匈奴不敢犯塞後漢廉范傳遷為雲中太守會匈史大入范兵不敵乃令軍中蓐食晨往赴之斬首數百級虜自相轔藉死者千餘人由此不敢復向雲中後漢范遷為漁陽太守以智略安邊匈奴不敢入界餘見軍不內御馮唐傳箋證漢書廣為右北平太守匈奴號曰漢飛將軍避之數歲不入界漢書酷吏郅都傳景帝乃使使即拜都為雁門太守便道之官得以便宜從事匈奴素聞郅都節舉邊為引兵去竟都死不近雁門後漢書賈復傳復宗字武孺少有操行多智略初拜郎中稍遷建中初為朔方太守舊內郡徙人在邊者率多貧弱為居人所僕役不得為吏宗擢用其任職者與邊吏參選轉相監司以擿發其姦或以功次補長吏故各願盡死匈奴畏之不敢入塞後漢書郭伋傳郭伋字細侯扶風茂陵人也建武四年出為中山太守明年彭寵滅轉為漁陽太守時匈奴數抄郡界邊境苦之伋整勒士馬設攻守之略匈奴畏憚遠迹不敢復入塞民得安業後漢書張堪傳於狐奴開稻田八千餘頃勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張君為政樂不可支視事八年匈奴不敢犯塞後漢書廉范傳廉范遷為雲中太守會匈奴大入塞烽火日通故事虜入過五千人移書傍郡吏欲傳檄求救范不聽自率士卒拒之虜眾盛而范兵不敵乃令軍中蓐食晨往赴之斬首數百級虜自相轔藉死者千餘人由此不敢復向雲中後漢書郭丹傳以河南尹范遷有清行代為司徒遷字子廬沛國人初為漁陽太守以智略安邊匈奴不敢入界和親第三前漢婁敬傳冒頓單于兵彊控弦四十万騎數苦北邊上患之敬曰天下初定士卒罷於兵革未可以武服也冒頓殺父代立妻群母以力為威未可以仁義說也獨可以計久遠子孫為臣耳陛下誠能以適長公主妻單于厚奉遺之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子代單于何者貪漢重幣陛下以歲時漢所餘彼所鮮數問遺使辯士風諭以禮節冒頓在固為子外死外孫為單于豈曾聞外孫敢與大父亢禮哉可母戰以漸臣也若陛下不能遣長公主而令宗室及後宮詐稱公主彼亦知不肯貴近無益也高帝曰善欲遣長公主呂后泣曰妾唯以一太子一女奈何棄之匈奴上竟不能遣長公主而取家人子為公主妻單于使敬往結和親約高帝罷渠城歸是時冒頓單于兵強控弦四十丙騎數苦伯邊上患之問奉春軍對曰獨可以計久遠子孫為臣爾誠能以適長公主妻單于厚奉遺之生子必為太子代單于高帝取家人子為公主妻單于使奉春君往結和親約二年春以宗室女為公主嫁匈奴單于二年匈奴和親前漢匈奴傳孝惠高后時冒頓寖驕迺為書使使遺高后曰孤僨之君願遊中國陛下獨立孤僨獨居兩主不樂無以自虞願以所有易其所無高后大怒召丞相平及樊噲季布等議斬其使者發兵而擊之布曰得其善言不足喜惡言不足怒也高后曰善令大謁者張澤報書曰單于不忘弊邑賜之以書弊邑恐懼退日自圖年老氣衰髮齒墮落行步失度單于過聽不足以自汙弊邑無罪宜在見赦冒頓復使使來謝曰未嘗聞中國禮義陛下幸而赦之因獻馬遂和親僨方問反什也前漢文帝紀二年匈奴和親詔曰今單于反古之道計社稷之安便万民之利新與朕俱棄細過偕之大道結兄弟之義以全天下元元之民和親以定始于今年前漢汲黯傳是時漢方征匈奴招懷四夷黯務少事間常言與胡和親母起兵前漢韓安國傳匈奴來請和親上下其議大行王恢議曰漢與匈奴和親率不過數歲即背約不如勿許舉兵擊之安國曰千里而戰即兵不獲利今匈奴負戎馬足懷鳥獸心遷徙鳥集難得而制得其地不足為廣有其眾不足為彊自上古弗屬漢數千里爭利則人馬罷虜以全制其敝勢必危殆臣故以為不如和親群臣議多附安國前漢元帝紀竟寧元年匈奴虖韓邪單于來朝賜單于待詔掖庭王嬙為閼氏五年遺公主嫁匈奴單于武帝方征匈奴招四方汲黯務少事間常言與和親母起兵前漢宣帝紀神爵二年匈奴單于遣名王奉獻賀正月始和親烏孫昆彌翁歸靡為副得復尚少主結昏內附畔去匈奴詔下公卿議望之以為烏孫絕域信其美言萬里結昏非長策也天子不聽神爵二年遣長羅侯惠使送公主配元貴靡未作寒翁歸靡死其兄子狂王背約自立惠從塞下上書願留少主敦煌郡惠至烏孫責以負約因立元貴靡還迎少主詔下公卿議望之復以為不可天子從其議召少主詔下公卿議望之復以為不可天子從其議召少主還漢遂不復與結婚前漢西域烏孫傳武帝元封中遣江都王建女細君為公主以妻烏孫昆莫以為右夫人匈奴亦遣女妻昆莫昆莫以為左夫人公主至其國自治宮室居歲時一再與昆莫會昆莫年老言語不通公主悲愁自為作歌曰吾家嫁我兮天一方遠託異國兮烏孫王穹廬為室兮旃為牆以肉為食兮酪為漿居常士思兮心內傷願為黃鵠兮歸故鄉天子聞而憐之間歲遣使者持帷帳錦繡給遺焉昆莫年老欲使其孫岑陬尚公主公主不聽上書言狀天子報曰從其國俗欲與烏孫共滅胡岑陬遂妻公主昆莫死岑陬代立新唐張柬之傳突厥默啜有女請和親武后欲令武延秀娶之柬之奏古無天子取夷狄女者忤旨出為合蜀剌史新唐書吐蕃傳太宗八年弄贊聞突厥吐谷渾並得尚公主乃遣使求昏帝不許使者還妄語曰天子遇我厚幾得公主會吐谷入朝殆有間我乎弄贊怒擊吐谷渾贊始固請昏十王年妻以宗女文成公主新唐書突厥默啜傳眷宗初立又請和親詔取宋王成器女為金山公主下嫁玄宗立絕和親默啜乃遣子楊我支入求昏以蜀王女縣主妻之新唐書突厥默啜傳詔淮陽王武延秀聘其女為妃詔知微攝送默啜猥曰我以女嫁唐天子子今乃后家子乎且我世附唐今聞其子孫獨二人在我當立之即囚延秀等蜀志後主傳建興元年吳王孫權與蜀和親箋證漢書婁敬傳高帝罷平城歸韓王信亡入胡當是時冒頓單于兵彊控弦四十萬騎數苦北邊上患之問敬敬曰天下初定士卒罷於兵革未可以武服也冒頓殺父代立妻群母以力為威未可以仁義說也獨可以計久遠子孫為臣耳然陛下恐不能為上曰誠可何為不能顧為奈何敬曰陛下誠能以適長公主妻單于厚奉遺之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子代單于何者貪漢重幣陛下以歲時漢所餘彼所鮮數問遺使辯士風諭以禮節冒頓在固為子壻死外孫為單于豈曾聞外孫敢與大父亢禮哉可毋戰以漸臣也若陛下不能遣長公主而令宗室及後宮詐稱公主彼亦知不肯貴近無益也高帝曰善欲遣長公主呂后泣曰妾唯以一太子一女奈何棄之匈奴上竟不能遣長公主而取家人子為公主妻單于使敬往結和親約漢書婁敬傳高帝罷平城歸韓王信亡入胡當是時冒頓單于兵彊控弦四十萬騎數苦北邊上患之問敬敬曰天下初定士卒罷於兵革師古曰罷讀曰疲未可以武服也冒頓殺父代立妻群母以力為威未可以仁義說也獨可以計久遠子孫為臣耳然陛下恐不能為上曰誠可何為不能顧為奈何敬曰陛下誠能以適長公主妻單于厚奉遺之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子代單于何者貪漢重幣陛下以歲時漢所餘彼所鮮數問遺使辯士風諭以禮節冒頓在固為子壻死外孫為單于豈曾聞外孫敢與大父亢禮哉可毋戰以漸臣也若陛下不能遣長公主而令宗室及後宮詐稱公主彼亦知不肯貴近無益也高帝曰善欲遣長公主呂后泣曰妾唯以一太子一女奈何棄之匈奴上竟不能遣長公主而取家人子為公主妻單于使敬往結和親約漢書惠帝紀三年春以宗室女為公主嫁匈奴單于又漢書文帝紀二年夏行幸雍棫陽宮六月代王參薨匈奴和親漢書匈奴傳孝惠高后時冒頓寖驕乃為書使使遺高后曰孤僨之君生於沮澤之中長於平野牛馬之域數至邊境願遊中國陛下獨立孤僨獨居兩主不樂無以自虞願以所有易其所無高后大怒召丞相平及樊噲季布等議斬其使者發兵而擊之樊噲曰臣願得十萬眾橫行匈奴中問季布布曰得其善言不足喜惡言不足怒也高后曰善令大謁者張澤報書曰單于不忘弊邑賜之以書弊邑恐懼退日自圖年老氣衰髮齒墮落行步失度單于過聽不足以自汙弊邑無罪宜在見赦冒頓得書復使使來謝曰未嘗聞中國禮義陛下幸而赦之因獻馬遂和親僨方問反什也漢書文帝紀二年匈奴和親詔曰今單于反古之道計社稷之安便萬民之利新與朕俱棄細過偕之大道結兄弟之義以全天下元元之民和親以定始于今年漢書汲黯傳是時漢方征匈奴招懷四夷黯務少事間常言與胡和親毋起兵漢書韓安國傳匈奴來請和親上下其議大行王恢燕人數為邊吏習胡事議曰漢與匈奴和親率不過數歲即背約不如勿許舉兵擊之安國曰千里而戰舉兵不獲利今匈奴負戎馬足懷鳥獸心遷徙鳥集難得而制得其地不足為廣有其眾不足為彊自上古弗屬漢數千里爭利則人馬罷虜以全制其敝勢必危殆臣故以為不如和親群臣議多附安國於是上許和