body:
  text: 卷第八十三名譽第一史記伯夷傳伯夷叔齊雖賢得夫子而名益彰顏淵雖篤學附驥尾而行益顯巖穴之士趣舍有時若此類名堙滅而不稱悲夫閭巷之人欲砥行立名者非附青雲之士惡能施於後世哉前漢季布傳辨士曹丘生數招權顧金錢言招求貴人威權因以請託故得他人顧金錢也事貴人趙同等與竇長君善布聞寄書諫長君曰吾聞曹丘生非長者勿與通及曹丘欲得下請布竇長君曰季將軍不說足下固請書遂行布果大怒待曹丘曹丘至則揖布曰楚人諺曰得黃金百不如得季布諾足下何以得此聲梁楚之間哉且僕與足下皆楚人使僕游揚足下名於天下顧不美乎何足下距僕之深也布乃大說留數月為上客布名所以益聞者曹丘揚之也前漢趙廣漢傳京兆政清吏民稱之不容口長老傳以為自漢興治京兆者莫能及前漢司馬遷傳答任安書曰修身者智之府也愛施者仁之端也取豫者義之符也恥辱者勇之決也立名者行之極也士有此五者然後可以列於君子之林也前漢韋元成傳以父任為郎少好學修父業尤謙遜下士出遇知識步行輒下從者與載送之以為常其接人貧賤者益加謹繇是名譽日廣前漢敘傳慎修所志守爾天符委命共己味道之腴神之聽之名其舍諸魏曹爽傳何晏鄧揚李勝丁謐畢軌咸有聲名進趣於時明帝以其浮華皆抑黜之魏盧育傳為吏部尚書前此諸葛誕鄧揚等馳名譽有四聰八達之誚帝疾之時舉中書郎詔曰得其人與否在盧生耳選舉莫取有名名如畫地作餅不可啖也育對曰名不足以致異人而可以得常士常士畏教慕善然後有名非所當疾也愚臣既不足以識異人又主者正以循名案常為職但當有以驗其後故古者數奏以言明試以功今考績之法廢而以毀譽相進退故真僞渾雜虛實相蒙帝納其言即詔作考課法晉年祜傳祜樂山水每風景必造峴山置酒言詠終日不倦嘗慨然歎息顧謂從事中郎鄒湛等曰自有宇宙便有此山由來賢達勝士登此遠望如我與卿者多矣皆湮滅無聞使人悲傷如百歲後有知魂魄猶應登此也湛曰公德冠四海道嗣前哲令問令望必與此山俱傳至若湛輩乃當如公言耳晉杜預傳預好為後世名常言高岸為谷深谷為陵刻石為二碑紀其勳績一沈萬山之下一立峴山之上曰焉知此後不為陵谷乎晉羊曼傳時州里稱阮放為宏伯郤鑒為方伯胡母輔之為達伯卞壼為裁伯蔡謨為明伯阮孚為誕伯劉綏為委伯而曼為濌伯凡八人號兗州八伯蓋擬古之八也晉薛兼傳清素有器宇少與紀瞻閔鴻顧榮賀循齊名號為五晉王坦之字文度弱冠與郗超俱有重名時人為之語曰盛德絶倫郗嘉賓江東獨步王文度嘉賓超小字也晉諸葛恢字道明時穎川荀闓字道明陳留蔡謨字道明與恢俱有名號號曰中興三明人為之語曰京都三明各有名蔡氏儒雅荀葛清新唐書李雍傳拜左拾遺御史中丞宋璟劾張昌宗等反狀武后不應雍立階下大言曰璟所陳社稷大計陛下當聽后色解即可璟奏雍出或讓曰子位卑一忤旨禍不測雍曰不如是名亦不傳箋證史記伯夷傳伯夷叔齊雖賢得夫子而名益彰顏淵雖篤學附驥尾而行益顯巖穴之士趣舍有時若此類名堙滅而不稱悲夫閭巷之人欲砥行立名者非附青雲之士惡能施於後世哉漢書季布傳辨士曹丘生數招權顧金錢師古曰二家之說皆非也言招求貴人威權因以請託故得他人顧金錢也事貴人趙談等與竇長君善布聞寄書諫長君曰吾聞曹丘生非長者勿與通及曹丘生歸欲得書請布竇長君曰季將軍不說足下足下無往固請書遂行使人先發書布果大怒待曹丘曹丘至則揖布曰楚人諺曰得黃金百不如得季布諾足下何以得此聲梁楚之間哉且僕與足下俱楚人使僕游揚足下名於天下顧不美乎何足下距僕之深也布乃大說引入留數月為上客厚送之布名所以益聞者曹丘揚之也漢書趙廣漢傳廣漢奏請令長安游徼獄吏秩百石其後百石吏皆差自重不敢枉法妄繫留人京兆政清吏民稱之不容口長老傳以為自漢興以來治京兆者莫能及漢書司馬遷傳僕聞之修身者智之府也愛施者仁之端也取豫者義之符也恥辱者勇之決也立名者行之極也士有此五者然後可以託於世列於君子之林矣漢書韋賢傳附子韋玄成玄成字少翁以父任為郎常侍騎少好學修父業尤謙遜下士出遇知識步行輒下從者與載送之以為常其接人貧賤者益加敬繇是名譽日廣漢書敘傳故曰慎修所志守爾天符委命共已味道之腴神之聽之名其舍諸三國志魏志曹爽傳南陽何晏鄧揚李勝沛國丁謐東平畢軌咸有聲名進趣於時明帝以其浮華皆抑黜之及爽秉政乃復進敘任為腹心三國志魏志盧育傳詔曰官人秩才聖帝所難必須良佐進可替否侍中育稟性貞固心平體正可謂明試有功不懈于位者也其以育為吏部尚書使育自選代曰得如卿者乃可育舉常侍鄭冲帝曰文和吾自知之更舉吾所未聞者乃舉阮武孫雍帝於是用雍前此諸葛誕鄧揚等馳名譽有四聰八達之誚帝疾之時舉中書郎詔曰得其人與否在盧生耳選舉莫取有名名如畫地作餅不可啖也育對曰名不足以致異人而可以得常士常士畏教慕善然後有名非所當疾也愚臣既不足以識異人又主者正以循名案常為職但當有以驗其後故古者敷奏以言明試以功今考績之法廢而以毀譽相進退故真僞渾雜虛實相蒙帝納其言即詔作考課法晉書羊祜傳祜樂山水每風景必造峴山置酒言詠終日不倦嘗慨然歎息顧謂從事中郎鄒湛等曰自有宇宙便有此山由來賢達勝士登此遠望如我與卿者多矣皆湮滅無聞使人悲傷如百歲後有知魂魄猶應登此也湛曰公德冠四海道嗣前哲令聞令望必與此山俱傳至若湛輩乃當如公言耳晉書杜預傳預好為後世名常言高岸為谷深谷為陵刻石為二碑紀其郤績一沈萬山之下一立峴山之上曰焉知此後不為陵谷乎晉書羊曼傳時州里稱陳留阮放為宏伯高平郤鑒為方伯泰山胡毋輔之為達伯濟陰卞壼為裁伯陳留蔡謨為朗伯阮孚為誕伯高平劉綏為委伯而曼為濌伯凡八人號兗州八伯蓋擬古之八雋也晉書薛兼傳兼清素有器宇少與同郡紀瞻廣陵閔鴻吳郡顧榮會稽賀循齊名號為五晉書王湛傳附曾孫王坦之坦之字文度弱冠與郗超俱有重名時人為之語曰盛德絶倫郗嘉賓江東獨步王文度嘉賓超小字也晉書諸葛恢傳諸葛恢字道明于時潁川荀闓字道明陳留蔡謨字道明與恢俱有名譽號曰中興三明人為之語曰京都三明各有名蔡氏儒雅荀葛清新唐書李雍傳嶠為內史與監察御史張廷圭薦雍文高氣方直才任諫諍乃召拜左拾遺御史中丞宋璟劾張昌宗等反狀武后不應雍立階下大言曰璟所陳社稷大計陛下當聽后色解即可璟奏雍出或讓曰子位卑一忤旨禍不測雍曰不如是名亦不傳名播異域第二前漢趙廣漢傳遷穎川太守威名流聞及胸奴降者言胸奴中皆聞廣漢後漢承宮傳宮遷左中郎將數納忠言陳政論朝臣憚其節名播胸奴時比單于遣使求得見宮顯宗勑自整飾宮對曰夷狄眩名臣狀醜不耳以示遠帝乃以大臚魏應代之晉庾闡傳父柬以勇力聞武帝時有西域健胡趫捷無敵晉人莫敢與校帝募勇士惟柬應選遂撲殺之名震殊俗新唐書歐陽詢傳高祖微時數與游既即位纍擢給事中詢初敬王羲之書後險徑過之因自名其體尺牘所傳人以為法高麗嘗遺使求之帝歎曰彼觀其書固謂形貌魁梧邪新唐書裴度傳神觀邁爽操守堅正善占對既有功名震四夷使外國者其君長必問度年今幾狀貌孰似天子用否其威譽德業比郭汾陽箋證漢書趙廣漢傳遷潁川太守威名流聞及胸奴降者言胸奴中皆聞廣漢後漢書承宮傳永平中徵詣公車車駕臨辟雍召宮拜博士遷左中郎將數納忠言陳政論議切愨朝臣憚其節名播胸奴時北單于遣使求得見宮顯宗勑自整飾宮對曰夷狄眩名非識實者也臣狀醜不可以示遠宜選有威容者帝乃以大鴻臚魏應代之晉書文苑列傳庾闡傳庾闡字仲初潁川鄢陵人也祖輝安北長史父東以勇力聞武帝時有西域健胡趫捷無敵晉人莫敢與校帝募勇士惟東應選遂撲殺之名震殊俗新唐書歐陽詢傳高祖微時數與游既即位纍擢給事中詢初倣王羲之書後險徑過之因自名其體尺牘所傳人以為法高麗嘗遣使求之帝歎曰彼觀其書固謂形貌魁梧邪新唐書裴度傳度退然才中人而神觀邁爽操守堅正善占對既有功名震四夷使外國者其君長必問度年今幾狀貌孰似天子用否其威譽德業比郭汾陽而用不用常為天下重輕匿名遠勢第三前漢張安世傳嘗有所薦其人來謝安世大恨以為舉賢達能豈有私謝邪絶弗復為通有郎功高不調自言安世應曰君之功高明主所知人臣執事何長短而自言乎絶至許已而郎梁遷莫府長史遷辭去之官安世問以過失長史曰將軍為明主股肱而士無所進論者以為譏安世曰明主在上賢不肖較然臣下自修而已何知士而薦之其欲匿名將遠權勢如此前漢直不疑傳不疑學老子言其所臨為官唯恐人之知其為吏迹也不好立名稱為長者後漢逸民傳韓康字伯休常採藥賣於長安市中不二價三十餘年時有女子從康買藥康守價不移女子怒曰公是韓伯休邪乃不二價乎康歎曰我本欲避名今小女子皆知有我何用藥為乃遁入霸陵山中後漢鄧禹傳定封禹為高密侯禹內文明篤行淳備事母至孝天下既定常欲遠名勢箋證漢書張湯傳附子張安世嘗有所薦其人來謝安世大恨以為舉賢達能豈有私謝邪絶勿復為通有郎功高不調自言安世應曰君之功高明主所知人臣執事何長短而自言乎絶不許已而郎果遷莫府長史遷辭去之官安世問以過失長史曰將軍為明主股肱而士無所進論者以為譏安世曰明主在上賢不肖較然臣下自修而已何知士而薦之其欲匿名將迹權勢如此漢書直不疑傳不疑學老子言其所臨為官如故唯恐人之知其為吏迹也不好立名稱為長者後漢書逸民列傳韓康傳韓康字伯休一名恬休京兆霸陵人家世著姓常采藥名山賣於長安市口不二價三十餘年時有女子從康買藥康守價不移女子怒曰公是韓伯休邪乃不二價乎康歎曰我本欲避名今小女子皆知有我何用藥為乃遁入霸陵山中後漢書鄧禹傳十三年天下平定諸功臣皆增戶邑定封禹為慎密侯食慎密昌安夷安淳于四縣帝以禹功高封高弟為密親侯其後左右將軍官罷以特進奉朝請禹內文明篤行淳備事母至孝天下既定常欲虛名勢名浮於行第四前漢東方朔傳贊曰楊雄亦以為朔言不純師行不純德其流風遺書蔑如也然朔名過實者以其談達多端不名一行應諧似優不窮似智正諫似直穢德似隱非夷齊而是柳下惠戒其子以上容首陽為拙柱下為工飽食安步以仕易農依隱玩世詭持不逢其滑稽之雄也後漢符融傳時漢中晉文經梁國黃子艾並恃其才智炫曜上京臥託養疾無所通接洛中士大夫好事者承其聲名坐門問疾猶不得見三公所辟召者輒以詢訪之隨所臧否以為與奪融察其非真乃到太學并見李膺曰二子行業無聞以豪桀自置遂使公卿問疾王臣坐門融恐其小道破義空譽違實特宜察焉膺然之二人自是名論漸衰賓徒稍省旬日之間慙歎逃去後漢樊英傳論曰漢世之所謂名士者其風流可知矣雖弛張趣舍時有未純於刻情修容依倚道藝以就其聲價非所能通物方廣時務也及召樊英揚厚朝廷若待神明終無他異英名最高毀最甚李固朱穆等以為處士純盜虛名無益於用故其所以然也後漢郭太傳史淑賓少有盛名林宗見而告人曰牆高基下雖得必失後果以論議阿枉敗名云後漢郭太傳黃允以才知名林宗見而謂曰卿有絶人之才足成偉器然恐守道不篤將失之矣後司徒袁隗欲為從女求妃見允而歎曰得壻如是足矣允聞而黜遣其妻婦謂姑曰今當見棄乞一會親屬以展離訣之情於是大集賓客三百餘人婦中坐攘袂數允隱匿穢惡十五事言畢登車而去蜀志諸葛亮子瞻工書畫彊識念蜀人追思亮咸愛其才敏每朝廷有一善政佳事雖非瞻所建倡百姓皆傳相告曰葛侯之所為也是以美聲溢譽有過其實蜀法正傳十九年進圍成都正說曰天下有獲虛譽而無其實者許靖是也然今王公始創大業天下之人不可戶說靖之浮稱播流四海若其不禮天下之人謂主公為賤賢也宜追昔燕王之待郭隗先主於是乃厚待靖箋證漢書東方朔傳楊雄亦以為朔言不純師行不純德其流風遺書蔑如也然朔名過實者以其詼達多端不名一行應諧似優不窮似智正諫似直穢德似隱非夷齊而是柳下惠戒其子以上容首陽為拙柱下為工飽食安步以仕易農依隱玩世詭時不逢其滑稽之雄乎後漢書符融傳時漢中晉文經梁國黃子艾並恃其才智炫曜上京臥託養疾無所通接洛中士大夫好事者承其聲名坐門問疾猶不得見三公所辟召者輒以詢訪之隨所臧否以為與奪融察其非真乃到太學并見李膺曰二子行業無聞以豪傑自置遂使公卿問疾王臣坐門融恐其小道破義空譽違實特宜察焉膺然之二人自是名論漸衰賓徒稍省旬日之間慙歎逃去後漢書方術列傳樊英傳論曰漢世之所謂名士者其風流可知矣雖弛張趣舍時有未純於刻情修容依倚道藝以就其聲價非所能通物方弘時務也及徵樊英楊厚朝廷若待神明至竟無它異英名最高毀最甚李固朱穆等以為處士純盜虛名無益於用故其所以然也後漢書郭太傳史叔賓者陳留人也少有盛名林宗見而告人曰牆高基下雖得必失後果以論議阿枉敗名云後漢書郭太傳黃允字子艾濟陰人也以才知名林宗見而謂曰卿有絶人之才足成偉器然恐守道不篤將失之矣後司徒袁隗欲為從女求姻見允而歎曰得壻如是足矣允聞而黜遣其妻夏侯氏婦謂姑曰今當見弃方與黃氏長辭乞一會親屬以展離訣之情於是大集賓客三百餘人婦中坐攘袂數允隱匿穢惡十五事言畢登車而去三國志蜀志諸葛亮傳附子諸葛瞻瞻工書畫彊識念蜀人追思亮咸愛其才敏每朝廷有一善政佳事雖非瞻所建倡百姓皆傳相告曰葛侯之所為也是以美聲溢譽有過其實三國志蜀志法正傳十九年進圍成都璋蜀郡太守許靖將踰城降事覺不果璋以危亡在近故不誅靖璋既稽服先主以此薄靖不用也正說曰天下有獲毀譽而無其實者許靖是也然今主公始創大業天下之人不可戶說靖之浮稱播流四海若其不禮天下之人以是謂主公為賤賢也宜加敬重以眩絶近追昔燕王之待郭隗先主於是乃厚待靖有言無行第五史記孫子吳起傳太史公曰世俗所稱師旅皆道孫子十三篇吳起兵法世多有故弗論論其行事所施設者語曰能行之者未必能言能言之者朱必能行孫子籌策龐涓明矣然不能蚤救患於被刑吳起說武侯以形勢不如德然行之於楚以刻暴少恩亡其軀悲夫前漢谷永杜鄴傳贊曰孝成之世委政外家諸舅持權重於丁傳在孝哀時故杜鄴敢譏丁傳而欽永不敢言王氏其藝然也及欽欲挹損鳳權而鄴附會音商永陳三七之戒斯為忠焉至其引申伯之阿鳳隙平阿於車騎指金火以求合可謂諒不足而誤有餘者孔子稱支多聞三人近之矣贊言杜鄴杜欽谷永無直諒之德但多聞也箋證史記孫子吳起傳太史公曰世俗所稱師旅皆道孫子十三篇吳起兵法世多有故弗論論其行事所施設者語曰能行之者未必能言能言之者未必能行孫子籌策龐涓明矣然不能蚤救患於被刑吳起說武侯以形勢不如德然行之於楚以刻暴少恩亡其軀悲夫漢書谷永杜鄴傳贊曰孝成之世委政外家諸舅持權重於丁傅在孝哀時故杜鄴敢譏丁傅而欽永不敢言王氏其藝然也及欽欲挹損鳳權而鄴附會音商永陳三七之戒斯為忠焉至其引申伯以阿鳳隙平阿於車騎指金火以求合可謂諒不足而談有餘者孔子稱友多聞三人近之矣師古曰孔子云友直友諒友多聞益矣贊言杜鄴杜欽谷永無直諒之德但多聞也
