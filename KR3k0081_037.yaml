body:
  text: 卷第三十七開言路第一前漢文帝紀二年詔曰古之治天下朝有進善之旌誹謗之木所以通治道而來諫者也今法有誹謗妖言之罪是使衆臣不敢盡情而上無由聞過失也將何以來遠方之賢良其除之前漢元帝紀詔曰安民之道本繇陰陽間者陰陽錯謬風雨不時朕之不德庶幾群公有敢言朕之過者今則不然偷合苟從未肯極言朕甚閔焉丞相御史舉天下明陰陽災異者各三人於是言事者衆或進擢召見人人自以得上意前漢魏相傳故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屏去不奏相復因詐伯白去副封以防雍蔽宣帝善之前漢賈山傳其言多激切善指事意然終不加罰所以廣諫爭之路前漢杜欽傳上令尚書劾奏京兆尹章章死詔獄衆庶冤之以譏朝延欽復說鳳曰章所坐事密吏民見章素好言事以為日蝕見對有所言也如是塞爭引之原損寬明之德欽愚以為宜因章秦舉直言極諫使天下咸知主上聖明不以言罪下也若此則流言消釋疑惑著明鳳白行其策後漢陳忠傳上疏曰言事者見杜根成翊世等新蒙表録顯列二臺必承風響應爭為切直若嘉謀異策宜輒納用如妄有譏刺且優游寬容以示聖朝無諱之美若有道之士對問高者特遷一等以廣直言之路後漢何敞上疏理郅壽曰臣聞聖王闢四門開四聰延直言之路下不諱之詔立敢諫之旗聽歌謠於路魏文帝紀延康元年令曰軒轅有明臺之議放勛有衢室之問此皆所以廣詢于下也百官有司其務以職盡規諫將率陳軍法朝士明制度牧守由政事搢紳考六藝吾將兼覽焉晉元帝紀大興元年詔置諫鼓謗木新唐魏徵傳時上封者衆或不切事帝厭之欲加譙黜徵曰古者立謗木欲聞己過封事其謗木之遺乎陛下思聞得失當恣其所陳言而是乎為朝庭之益非乎無損於政帝悅皆勞遣之新唐劉洎傳太宗忽謂群臣曰朕今欲聞己過卿等為朕言之長孫無忌李績楊師道同辭對曰陛下以盛德致太平臣等愚不見其過洎曰然頃上書有不稱旨或面窮詰無不羞汗恐非所以進言者路帝曰卿言善朕能改之新唐王圭傳帝使太常祖孝孫以樂律授宮中音家伎不進數被讓圭與彥博同進曰孝孫修謹士陛下使教女樂又責譙之天下其以士為輕乎帝怒曰卿皆我腹心乃附下罔上為人游說耶彥博懼謝罪圭不謝曰臣本事前宮罪當死陛下矜其性命引置樞密責以忠效今疑臣以私是陛下負臣臣不負陛下帝默然慚遂罷明日語房玄齡曰昔武王不用夷齊宣王殺杜伯自古帝王納諫固難矣朕夙夜庶幾于前聖昨責圭等痛自悔公等勿懲是不進諫也新唐則天皇后傳臨朝乃治銅匭為一室署東曰延恩受干賞自言南曰招諫受時政失得西曰申冤受抑枉所欲言北曰通玄受讖步祕策詔中書門下一官典領餘見懼災光武紀箋證漢書文帝紀二年五月詔曰古之治天下朝有進善之旌應劭曰旌幡也堯設之五達之道令民進善也如淳曰欲有進者立於旌下言之誹謗之木服虔曰堯作之橋梁交午柱頭也應劭曰橋梁籩板所以書政治之愆失也至秦去之今乃復施也師古曰應說是也所以通治道而來諫者也今法有誹謗訞言之罪是使衆臣不敢盡情而上無由聞過失也將何以來遠方之賢良其除之漢書元帝紀三年六月詔曰蓋聞安民之道本繇陰陽間者陰陽錯謬風雨不時朕之不德庶幾群公有敢言朕之過者今則不然偷合苟從未肯極言師古曰偷與偷同朕甚閔焉丞相御史舉天下明陰陽災異者各三人於是言事者衆或進擢召見人人自以得上意漢書魏相丙吉傳宣帝即位徵相入為大司農遷御史大夫四歲大將軍霍光薨上思其功德以其子禹為右將軍相因平恩侯許伯奏封事言春秋譏世卿惡宋三世為大夫又故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屏去不奏相復因許伯白去副封以防雍蔽宣帝善之漢書賈山傳其後文帝除鑄錢令山復上書諫以為變先帝法非是其言多激切善指事意然終不加罰所以廣諫爭之路也漢書杜周傳附杜欽鳳復起視事上令尚書劾奏京兆尹章章死詔獄語在元后傳章既死衆庶冤之以譏朝廷欽欲救其過復說鳳曰京兆尹章所坐事密吏民見章素好言事以為不坐官職疑其以日蝕見對有所言也假令章內有所犯雖陷正法事不暴揚自京師不曉况於遠方恐天下不知章實有罪而以為坐言事也如是塞爭引之原損寬明之德欽愚以為宜因章事舉直言極諫並見郎從官展盡其意加於往前以明示四方使天下咸知主上聖明不以言罪下也若此則流言消釋疑惑著明鳳白行其策後漢書陳寵傳附子陳忠忠字伯始永初中辟司徒府安帝始親朝事忠以為臨政之初宜徵聘賢才以宣助風化於是公車禮聘良燮等後連有災異詔舉有道公卿百僚各上封事乃上疏豫通帝意曰言事者見杜根成翊世等新蒙表録顯列二臺必承風饗應爭為切直若嘉謀異策宜輒納用如其管穴妄有譏刺雖苦口逆耳不得事實且優游寬容以示聖朝無諱之美若有道之士對問高者宜垂省覽特遷一等以廣直言之路卷七十六後漢書郅惲傳附子郅壽壽字伯孝善文章以廉能稱舉孝廉稍遷冀州刺史三遷尚書令以公事免復徵為尚書僕射是時大將軍竇憲以外戚之寵威傾天下上書陳憲驕恣引王莽以誡國家是時憲征胸奴海內供其役費而憲及其弟篤景並起第宅驕奢非法百姓苦之壽以府藏空虛軍旅未休遂因朝會譏刺憲等厲音正色辭旨甚切憲怒陷壽以買公田誹謗下吏當誅侍御史何敞上疏理之曰臣聞聖王闢四門開四聰延直言之路下不諱之詔立敢諫之旗聽歌謠於路三國志魏志文帝紀延康元年秋七月庚辰令曰軒轅有明臺之議放勛有衢室之問皆所以廣詢於下也管子曰黃帝立明臺之議者上觀於兵也堯有衢室之問者下聽於民也舜有告善之旌而主不蔽也禹立建鼓於朝而備訴訟也湯有總街之廷以觀民非也武王有靈臺之囿而賢者進也此古聖帝明王所以有而勿失得而勿忘也百官有司其務以職盡規諫將率陳軍法朝士明制度牧守申政事縉紳考六藝吾將兼覽焉晉書元帝紀太興元年初置諫鼓謗木新唐書魏徵傳時上封者衆或不切事帝厭之欲加譙黜徵曰古者立謗木欲聞己過封事其謗木之遺乎陛下思聞得失當恣其所陳言而是乎為朝廷之益非乎無損於政帝悅皆勞遣之新唐書劉洎傳帝忽謂群臣曰朕今欲聞己過卿等為朕言之長孫無忌李績楊師道同辭對曰陛下以盛德致太平臣等愚不見其過洎曰然頃上書有不稱旨或面窮詰無不羞汗恐非所以進言者路帝曰卿言善朕能改之新唐書王圭傳帝使太常少卿祖孝孫以樂律授宮中音家伎不進數被讓圭與溫彥博同進曰孝孫修謹士陛下使教女樂又責譙之天下其以士為輕乎帝怒曰卿皆我腹心乃附下罔上為人游說邪彥博懼謝罪圭不謝曰臣本事前宮罪當死陛下矜其性命引置樞密責以忠效今疑臣以私是陛下負臣臣不負陛下帝默然慚遂罷明日語房玄齡曰昔武王不用夷齊宣王殺杜伯自古帝王納諫固難矣朕夙夜庶幾于前聖昨責圭等痛自悔公等勿懲是不進諫也新唐書后妃列傳則天順聖皇后太后曰朕輔先帝踰三十年憂勞天下爵位富貴朕所與也群臣頓首不敢仰視曰惟陛下命久之下詔陽若復辟者睿宗揣非情固請臨朝制可乃冶銅匭為一室署東曰延恩受干賞自言南曰招諫受時政失得西曰申冤受抑枉所欲言北曰通玄受讖步祕策詔中書門下一官典領諫諍第二史記韓非傳昔者彌子瑕見愛於衛君衛國之法竊駕君車者罪至則既而彌子之母病人聞往夜告之彌子矯駕君車而出君聞之而賢之曰孝哉為母之故而犯刖罪與君游果園彌子食桃而甘不盡而奉君君曰愛我哉忘其口而念我及彌子色衰而愛弛得罪於君君曰是嘗矯駕吾車又嘗食我以其餘桃故彌子之行未變於初也前見賢而後獲罪者愛憎之至變也故有愛於主則知當而加親見憎於主則罪當而加疏故諫說之士不可不察愛憎之主而後說之矣史記韓非傳夫龍之為蟲也可擾狎而騎也然其喉下有逆鱗徑尺人有嬰之則必殺人人主亦有逆鱗說之者能無嬰人主之逆鱗則幾矣前漢儒林王式傳昌邑王嗣立以行淫亂廢昌邑群臣皆下獄誅唯中尉王吉郎中令龔遂以數諫減死論式繫獄當死治事使者責問曰師何以亡諫書式對曰臣以詩三百五篇朝夕授王至於忠臣孝子之篇未嘗不為王反復誦之至於危亡失道之君未嘗不流涕為王深陳之也臣以三百五篇諫是以亡諫書使者以聞亦得減死論前漢鄭崇傳哀帝擢為尚書僕射數求見諫諍上納用之每見曳革履上笑曰我識鄭尚書履聲前漢鄭昌傳昌為涿郡大守上疏曰聖王置諫諍之臣者非以為德防逸豫之生也立法明刑者非以為治救衰亂之起也前漢王吉傳諫諍甚得輔弼之義國中莫不重焉後漢張湛傳光武臨朝或有惰容湛輒陳諫常乘白馬帝每見湛輒言白馬生且復諫矣新唐魏文正傳帝後臨朝嘆曰以銅為鑑可正衣冠以古為鑑可知興替以人為鑑可明得失朕常保此三鑑內防己過今魏徵逝一鑑亡矣新唐書褚遂良傳帝嘗怪舜造漆器禹雕其俎諫者十餘不止小物何必爾邪遂良曰雕琢害力農纂繡傷女工奢靡之始危亡之漸也漆器不止必金為之金又不止必玉為之故諫者救其源不使得開及夫橫流則無復事矣新唐書魏徵傳帝幸九成宮宮御舍圍川宮下僕射李靖侍中王圭繼至吏改館宮御以舍靖圭帝聞怒曰威福由是等邪何輕我宮人詔并按之徵曰靖圭皆陛下腹心大臣宮人止後宮掃除隸耳方大臣出官吏咨朝庭法式歸來陛下問人間疾苦夫官舍固靖等見官吏之所吏不可不謁也至宮人則不然供饋之餘無以參承以此按吏且駭天下耳目帝悟寢不問新唐狄仁傑傳權善才范懷義坐誤斧昭陵柏罪當免高宗詔誅之仁傑奏不應死帝怒曰是使我為不孝子必殺之仁傑曰漢有盜高廟玉環文帝欲當之族張釋之廷諍曰假令取長陵一抔土何以加其法於是罪之棄市陛下之法在象魏固有差等犯不至死而致之死何哉今誤伐一柏殺二臣後世謂陛下為何如主帝意解遂免死箋證史記韓非列傳說難曰昔者彌子瑕見愛於衛君衛國之法竊駕君車者罪至刖既而彌子之母病人聞往夜告之彌子矯駕君車而出君聞之而賢之曰孝哉為母之故而犯刖罪與君游果園彌子食桃而甘不盡而奉君君曰愛我哉忘其口而念我及彌子色衰而愛弛得罪於君君曰是嘗矯駕吾車又嘗食我以其餘桃故彌子之行未變於初也前見賢而後獲罪者愛憎之至變也故有愛於主則知當而加親見憎於主則罪當而加疏故諫說之士不可不察愛憎之主而後說之矣夫龍之為蟲也正義龍蟲類也故言龍之為蟲可擾狎而騎也然其喉下有逆鱗徑尺人有嬰之則必殺人人主亦有逆鱗說之者能無嬰人主之逆鱗則幾矣漢書儒林傳王式傳昭帝崩昌邑王嗣立以行淫亂廢昌邑群臣皆下獄誅唯中尉王吉郎中令龔遂以數諫減死論式繫獄當死治事使者責問曰師何以亡諫書式對曰臣以詩三百五篇朝夕授王至於忠臣孝子之篇未嘗不為王反復誦之也至於危亡失道之君未嘗不流涕為王深陳之也臣以三百五篇諫是以亡諫書使者以聞亦得減死論漢書鄭崇傳鄭崇字子游本高密大族世與王家相嫁娶喜為大司馬薦崇哀帝擢為尚書僕射數求見諫爭上初納用之每見曳革履上笑曰我識鄭尚書履聲漢書刑法志時涿郡太守鄭昌上疏言聖王置諫爭之臣者非以崇德防逸豫之生也立法明刑者非以為治救衰亂之起也漢書王吉傳吉輒諫爭甚得輔弼之義雖不治民國中莫不敬重焉後漢書張湛傳張湛字子孝扶風平陵人也建武初為左馮翊在郡修典禮設條教政化大行五年拜光祿勳光武臨朝或有惰容湛輒陳諫其失常乘白馬帝每見湛輒言白馬生且復諫矣新唐書魏徵傳帝後臨朝歎曰以銅為鑑可正衣冠以古為鑑可知興替以人為鑑可明得失朕嘗保此三鑑內防己過今魏徵逝一鑑亡矣新唐書褚遂良傳帝嘗怪舜造漆器禹雕其俎諫者十餘不止小物何必爾邪遂良曰雕琢害力農纂繡傷女工奢靡之始危亡之漸也漆器不止必金為之金又不止必玉為之故諫者救其源不使得開及夫橫流則無復事矣新唐書魏徵傳帝幸九成宮宮御舍湋川宮下僕射李靖侍中王圭繼至吏改館宮御以舍靖圭帝聞怒曰威福由是等邪何輕我宮人詔并按之徵曰靖圭皆陛下腹心大臣宮人止後宮掃除隸耳方大臣出官吏咨朝廷法式歸來陛下問人間疾苦夫官舍固靖等見官吏之所吏不可不謁也至宮人則不然供饋之餘無所參承以此按吏且駭天下耳目帝悟寢不問新唐書狄仁傑傳左威衛大將軍權善才右監門中郎將范懷義坐誤斧昭陵柏罪當免高宗詔誅之仁傑奏不應死帝怒曰是使我為不孝子必殺之仁傑曰漢有盜高廟玉環文帝欲當之族張釋之廷諍曰假令取長陵一抔土何以加其法於是罪止棄市陛下之法在象魏固有差等犯不至死而致之死何哉今誤伐一柏殺二臣後世謂陛下為何如主帝意解遂免死直諫第三史記商君傳趙良曰千羊之皮不如一狐之掖千人之諾諾不如一士之諤諤武王諤諤以昌商紂墨墨以亡前漢周昌傳昌為人強力敢直言自蕭曹等皆卑下之前漢主父偃上書曰臣聞明主不惡切諫以博觀忠臣不避重誅以直諫是故事無遺策而功流萬世前漢薛廣德傳上酎祭宗廟出便門欲御樓船廣德當乘輿車免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汙車輪陛下不得入廟矣上不說先歐光祿大夫張猛進曰臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是邪乃從橋前漢循吏傳龔遂以明經為官至昌邑郎中令事王賀賀動作多不正遂內諫諍於王外責傅相引經義陳禍福至於涕泣蹇蹇亡已面剌王過王至掩耳起走曰郎中令善愧人及國中皆畏憚焉前漢朱雲傳雲曰臣願請尚方斬馬劍斷佞臣一人以厲其餘上問誰也對曰張禹上怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逢比干遊於地下足矣未知聖朝何如耳左將軍辛慶忌免冠叩頭曰此臣素著狂直於世敢以死爭上意解然後得已及後當治殿檻上曰勿易因而輯之以旌直臣後漢鍾離意寒朗論曰左丘明有言仁人之言其利慱哉晏子一言齊侯省刑若鍾離意之就格請過寒朗之廷爭冤獄篤矣乎仁者之情也夫正直本於忠誠則不詭本於諫諍則絞切孔子曰直而無禮則絞絞急也彼二子之所本得乎天故言信而志行也言而見信諫而必從故曰志行後漢鮑永傳太守趙興署永功曹時有矯稱侍中止傳舍者興欲謁之永疑其詐諫不聽永乃拔佩刀截馬當胸乃止後數日莽詔書果下捕矯稱者永由是知名後漢張酺傳帝每見諸王師傅常言張酺前入侍講屢有諫正誾誾惻惻出於誠心可謂有史魚之風誾誾忠正也惻惻懇切也史魚衛大夫名鰌字子魚孔子曰直哉史魚邦有道如矢邦無道如矢也魏衛覬傳上疏曰夫變情厲性彊所不能人臣言之既不易人主受之又艱難且人之所樂者富貴顯榮也所惡者貧賤死亡也然此四者君上之所制也君愛之則富貴顯榮君惡之則貧賤死亡順指者愛所由來逆意者惡所從至也故人臣皆爭順指而辟逆意非破家為國殺身成君者誰能犯顏色觸忌諱建一言開一說哉晉閻纘傳為西戎校尉司馬愍懷太子之廢也纘輿棺上書理其冤曰臣老母見臣為表乃為臣卜卦云書御即死妻子守臣涕泣見止臣獨以為頻見拔擢嘗為近職此恩難忘何以報德唯當陳誠以死獻忠輒具棺絮伏須刑誅書御不省新唐魏徵傳徵狀貌不逾中人有志膽每犯顏進諫雖逢帝甚怒神色不徙而天子亦為霽威新唐柳澤傳先是中宗時墨敕受官皆號斜封及姚元崇宋璟輔政白罷斜封官數千員元崇等罷去大平公主奏盡復之澤上疏曰臣聞藥不毒不可以蠲疾詞不初不可以補過是以習甘旨者非攝養之方邇諛佞者非治安之宜餘見徒民辛毗傳箋證史記商君列傳商君者衛之諸庶孽公子也名鞅姓公孫氏其祖本姬姓也商君相秦十年宗室貴戚多怨望者趙良見商君趙良曰千羊之皮不如一狐之掖千人之諾諾不如一士之諤諤武王諤諤以昌殷紂墨墨以亡漢書周昌傳周昌者沛人也昌為人強力敢直言自蕭曹等皆卑下之漢書主父偃傳乃上書闕下朝奏暮召入見所言九事其八事為律令一事諫伐胸奴曰臣聞明主不惡切諫以博觀忠臣不避重誅以直諫是故事無遺策而功流萬世漢書薛廣德傳薛廣德字長卿沛郡相人也廣德為人溫雅有醞藉及為三公直言諫爭其秋上酎祭宗廟出便門欲御樓船廣德當乘輿車免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汙車輪陛下不得入廟矣上不說先驅光祿大夫張猛進曰師古曰先驅導乘輿也驅與驅同猛張騫之孫臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是邪乃從橋漢書循吏傳龔遂龔遂以明經為官至昌邑郎中令事王賀賀動作多不正遂為人忠厚剛毅有大節內諫爭於王外責傅相引經義陳禍福至於涕泣蹇蹇亡已師古曰蹇蹇不阿順意也易蹇卦曰王臣蹇蹇面刺王過王至掩耳起走曰郎中令善愧人及國中皆畏憚焉漢書朱雲傳朱雲字游魯人也終元帝之世至成帝時丞相故安昌侯張禹以帝師位特進甚尊重雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下亡以益民皆尸位素餐臣願賜尚方斬馬劍斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逄比干遊於地下足矣未知聖朝何如耳御史遂將雲去於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得已及後當治殿檻上曰勿易因而輯之以旌直臣師古曰輯與集同謂補合之也旌表也後漢書第五鍾離宋寒列傳論曰左丘明有言仁人之言其利博哉晏子一言齊侯省刑若鍾離意之就格請過寒朗之廷爭冤獄篤矣乎仁人之情也夫正直本於忠誠則不詭本於諫爭則絞切論語孔子曰直而無禮則絞絞急也彼二子之所本得乎天故言信而志行也言而見信諫而必從故曰志行後漢書鮑永傳太守趙興復署永功曹時有矯稱侍中止傳舍者興欲謁之永疑其詐諫不聽而出興遂駕往永乃拔佩刀截馬當胸乃止後數日莽詔書果下捕矯稱者永由是知名後漢書張酺傳張酺字孟侯汝南細陽人趙王張敖之後也敖父耳自楚降漢高祖封為趙王敖嗣後有罪廢為宣平侯帝每見諸王師傅嘗言張酺前入侍講屢有諫正誾誾惻惻出於誠心可謂有史魚之風矣誾誾忠正也惻惻懇切也史魚衛大夫名鰌字子魚孔子曰直哉史魚邦有道如矢邦無道如矢也三國志魏志衛覬傳衛覬字伯儒河東安邑人也明帝即位進封閺鄉侯三百戶閺音聞時百姓凋匱而役務方殷覬上疏曰夫變情厲性彊所不能人臣言之既不易人主受之又艱難且人之所樂者富貴顯榮也所惡者貧賤死亡也然此四者君上之所制也君愛之則富貴顯榮君惡之則貧賤死亡順指者愛所由來逆意者惡所從至也故人臣皆爭順指而避逆意非破家為國殺身成君者誰能犯顏色觸忌諱建一言開一說哉晉書閻纘傳閻纘字續伯巴西安漢人也河間王顒引為西戎校尉司馬有功封平樂鄉侯愍懷太子之廢也纘輿棺詣闕上書理太子之廢曰臣老母見臣為表乃為臣卜卦云書御即死妻子守臣涕泣見止臣獨以為頻見拔擢嘗為近職此恩難忘何以報德唯當陳誠以死獻忠輒具棺絮伏須刑誅書御不省新唐書魏徵傳徵狀貌不逾中人有志膽每犯顏進諫雖逄帝甚怒神色不徙而天子亦為霽威新唐書柳澤傳柳澤蒲州解人澤耿介少言笑風度方嚴先是中宗時長寧宜城安定諸公主及后女弟昭容上官與其母鄭尚宮柴隴西夫人趙及姻聯數十族皆能降墨敕授官號斜封及姚元崇宋璟輔政白罷斜封官數千員元崇等罷去太平公主盡奏復之澤詣闕上疏曰臣聞藥不毒不可以蠲疾詞不切不可以補過故習甘旨者非攝養之方邇諛佞者非治安之宜
