body:
  text: 卷第二十八以儒術飾吏事第一前漢循吏傳江都相董仲舒內史公孫弘兒寬居官可紀三人皆儒者通於世務明習文法以經術潤飾吏事天子器之前漢翟方進傳方進知能有餘兼通文法吏事以儒雅緣飾法律號為通明相天子甚器重之前漢公孫洪傳每朝會議開陳其端使人主自擇不肯面折庭爭習文法吏事緣飾以儒術上說之前漢張敞傳治京兆略循趙廣漢之跡方略耳目發伏禁姦不如廣漢然敞本治春秋以經術自輔其政頗雜儒雅往往表賢顯善不醇用誅罰以此能自全新唐房喬傳玄齡當國明達吏治而緣飾以文雅議法處令務為寬平箋證漢書循吏傳序孝武之世外攘四夷內改法度民用彫敝姦軌不禁師古曰不可禁時少能以化治稱者唯江都相董仲舒內史公孫弘兒寬居官可紀三人皆儒者通於世務明習文法以經術潤飾吏事天子器之漢書翟方進傳方進知能有餘兼通文法吏事以儒雅緣飭法律號為通明相天子甚器重之漢書公孫弘傳每朝會議開陳其端使人主自擇不肯面折庭爭於是上察其行慎厚辯論有餘習文法吏事緣飾以儒術上說之漢書張敞傳敞為人敏疾賞罰分明其治京兆略循趙廣漢之迹方略耳目發伏禁姦不如廣漢然敞本治春秋以經術自輔其政頗雜儒雅往往表賢顯善不醇用誅罰以此能自全新唐書房玄齡傳玄齡當國夙夜勤彊任公竭節不欲一物失所無媢忌聞人善若己有之明達吏治而緣飾以文雅議法處令務為寬平閑習典故第二前漢魏相傳相明易經有師法好觀漢故事及便宜章奏以為古今異制方今務在奉行故事而已前漢邴吉傳曰杜延年明於法度曉國家故事前漢孔光傳為尚書觀故事品式數歲明習漢制及法令上信任之後漢侯霸傳光武召霸與車駕會壽春拜尚書令時無故典朝廷又少舊臣霸明習故事收錄遺文條奏前世善政法度有益於時者皆施行之後漢應劭傳詔拜劭為袁紹軍謀校尉時始遷都於許舊章堙沒書記穻存劭乃綴集所聞著漢官禮儀故事凡朝廷制度百官典式多劭所立後漢張純傳純在朝歷世明習故事建武初舊章多闕每疑議輒以訪純自郊廟昏冠喪紀禮儀多所正定後漢黃瓊傳遷尚書僕射初隨父在臺閤習見故事及後居職達練官曹爭議朝堂莫敢抗奪後漢胡廣為太傳時年已八十四達練事體明解朝章雖無謇直之風屢有補闕之益故京師號曰萬事不理問伯始天下中庸有胡公伯始廣字晉孔衍傳明帝之在東宮領太子中庶子于時庶事草創衍經學深博又練識舊典朝儀軌制多取正焉新唐竇威傳方天下亂禮典湮缺威多識朝廷故事乃裁定制度帝語裴寂曰威今之叔孫通也新唐杜如晦傳時天下新定臺閣制度憲物容典率二人討裁每議事帝所玄齡必曰非如晦莫籌之及如晦至卒用玄齡策也新唐鄭餘慶傳帝謂餘慶淹該前載乃詔為詳定使俾參裁訂正凡損增儀矩號桃詳衷新唐孔若思傳中宗初敬暉桓彥範當國以若思多識古今凡大政事必咨質後行餘見殺戮賢知蔡邕傳箋證漢書魏相傳相明易經有師法好觀漢故事及便宜章奏師古曰既觀國家故事又觀前人所奏便宜之章也以為古今異制方今務在奉行故事而已漢書丙吉傳五鳳三年春吉病篤上自臨問吉曰君即有不諱誰可以自代者吉辭謝曰群臣行能明主所知愚臣無所能識上固問吉頓首曰西河太守杜延年明於法度曉國家故事漢書孔光傳是時博士選三科高為尚書次為刺史其不通政事以久次補諸侯太傅光以高第為尚書觀故事品式數歲明習漢制及法令上甚信任之後漢書侯霸傳侯霸字君房河南密人也建武四年光武徵霸與車駕會壽春拜尚書令時無故典朝廷又少舊臣霸明習故事收錄遺文條奏前世善政法度有益於時者皆施行之後漢書應奉傳附應劭二年詔拜劭為袁紹軍謀校尉時始遷都於許舊章堙沒書記罕存劭慨然歎息乃綴集所聞著漢官禮儀故事凡朝廷制度百官典式多劭所立後漢書張純傳張純字伯仁京兆杜陵人也純在朝歷世明習故事建武初舊章多闕每有疑議輒以訪純自郊廟婚冠喪紀禮儀多所正定後漢書黃瓊傳瓊至即拜議郎稍遷尚書僕射初瓊隨父在臺閣習見故事及後居職達練官曹爭議朝堂莫能抗奪後漢書胡廣傳胡廣字伯始南郡華容人也靈帝立與太傅陳蕃參錄尚書事復封故國以病自乞會蕃被誅代為太傅總錄如故時年已八十而心力克壯盛弘之荊州記曰菊水出穰縣芳菊被涯水極甘香谷中皆飲此水上壽百二十七八十者猶以為夭太尉胡廣所患風疾休沐南歸恒飲此水後疾遂瘳年八十二薨也繼母在堂朝夕瞻省傍無几杖言不稱老及母卒居喪盡哀率禮無愆性溫柔謹素常遜言恭色達練事體明解朝章雖無謇直之風屢有補闕之益故京師諺曰萬事不理問伯始天下中庸有胡公晉書儒林列傳孔衍孔衍字舒元魯國人孔子二十二世孫也中興初與庾亮俱補中書令明帝之在東宮領太子中庶子于時庶事草創衍經學深博又練識舊典朝儀軌制多取正焉卷九十一新唐書竇威傳竇威字文蔚岐州平陸人高祖入關召補大丞相府司錄參軍方天下亂禮典湮缺威多識朝廷故事乃裁定制度帝語裴寂曰威今之叔孫通也新唐書杜如晦傳杜如晦字克明京兆杜陵人方為相時天下新定臺閣制度憲物容典率二人討裁每議事帝所玄齡必曰非如晦莫籌之及如晦至率用玄齡策也新唐書鄭餘慶傳鄭餘慶字居業鄭州滎陽人帝患典制不倫謂餘慶淹該前載乃詔為詳定使俾參裁訂正餘慶引韓愈李程為副崔郾陳佩楊嗣復庾敬休為判官凡損增儀矩號稱詳衷新唐書儒學列傳孔若思孔若思越州山陰人中宗初敬暉桓彥範當國以若思多識古今凡大政事必咨質後行知外國事第三前漢趙充國為人沈勇有大略少好將帥之節而學兵法通知四夷事前漢鄭吉傳吉為人強摯習外國事前漢陳湯傳西域都護段會宗為烏孫兵所圍驛騎上書願發城郭燉煌兵以自救王商王鳳及百僚議數日不決鳳言湯多籌策習外國事可問上召湯見宣室湯知烏孫瓦合不能久攻不過數日因對曰已解矣詘指計其日曰不出五日當有吉語聞居四日軍書到言已解前漢常惠傳後代蘇武典屬國明習外國事新唐賈耽傳耽好觀書尤悉地理四方之人與使夷狄者見之必從詢索風俗故天下地土區產山川夷岨必究知之箋證漢書趙充國傳趙充國始為騎士以六郡良家子善騎射補羽林為人沈勇有大略少好將帥之節而學兵法通知四夷事漢書鄭吉傳鄭吉會稽人也以卒伍從軍數出西域由是為郎吉為人彊執習外國事師古曰彊力而有執志者漢書陳湯傳西域都護段會宗為烏孫兵所圍驛騎上書願發城郭燉煌兵以自救丞相王商大將軍王鳳及百僚議數日不決鳳言湯多籌策習外國事可問上召湯見宣室湯知烏孫瓦合不能久攻師古曰瓦合謂碎瓦之雜居不齊同故事不過數日師古曰故事謂以舊事測之因對曰已解矣詘指計其日曰不出五日當有吉語聞居四日軍書到言已解漢書常惠太原人也後代蘇武為典屬國明習外國事新唐書賈耽傳賈耽字敦詩滄州南皮人耽嗜觀書老益勤尤悉地理四方之人與使夷狄者見之必從詢索風俗故天下地土區產山川夷岨必究知之憂公如家第四前漢賈誼傳上疏曰上設廉恥禮義以遇其臣而臣不以節行報其上者則非人類也故化成俗定則為人臣者主耳忘身國耳忘家公耳忘私利不苟就害不苟去唯義所在上之化也後漢胡廣傳尚書史敞薦廣曰柔而不犯文而有禮忠正之性憂公如家後漢黃香傳管樞機甚見尊重而香亦祗勤物務憂公如家蜀志楊洪傳洪少不好學問而忠清款亮憂公如家晉陸曄傳詔曰曄清操忠正歷職顯允且其兄弟事君如父憂國如家既委以六軍可錄尚書事晉虞潭母孫氏忠順有婦德憂國如家拜武昌侯太夫人加金章紫綬箋證漢書賈誼傳誼數上疏陳政事多所欲匡建其大略曰上設廉恥禮義以遇其臣而臣不以節行報其上者則非人類也故化成俗定則為人臣者主耳忘身國耳忘家公耳忘私利不苟就害不苟去唯義所在上之化也後漢書胡廣傳時陳留郡缺職尚書史敞等薦廣曰竊見尚書僕射胡廣體具履規謙虛溫雅博物洽聞探賾窮理六經典奧舊章憲式無所不覽柔而不犯文而有體忠貞之性憂公如家後漢書文苑列傳黃香傳黃香字文彊江夏安陸人也年九歲失母思慕憔悴殆不免喪免喪終喪鄉人稱其至孝年十二太守劉護聞而召之署門下孝子甚見愛敬帝亦惜香幹用久習舊事復留為尚書令增秩二千石賜錢三十萬是後遂管樞機甚見親重而香亦祗勤物務憂公如家三國志蜀志楊洪傳楊洪字季休犍為武陽人也洪少不好學問而忠清款亮憂公如家晉書陸曄傳陸曄字士光吳郡吳人也曄少有雅望從兄機每稱之明帝即位轉光祿勳遷太常代紀瞻為尚書左僕射領太子少傅尋加金紫光祿大夫代卞壼為領軍將軍以平錢鳳功進爵江陵伯帝不豫曄與王導卞壼庾亮溫嶠郄鑒並受顧命輔皇太子更入殿將兵直宿遺詔曰曄清操忠貞歷職顯允且其兄弟事君如父憂國如家歲寒不凋體自門風既委以六軍可錄尚書事加散騎常侍晉書烈女列傳虞潭母孫氏虞潭母孫氏吳郡富春人孫權族孫女也初適潭父忠恭順貞和甚有婦德永嘉末潭為南康太守值杜弢構逆率眾討之孫氏勉潭以必死之義俱傾其資產以餽戰士其憂國之誠如此拜武昌侯太夫人加金章紫綬吏久其職第五前漢張敞傳京兆典京師長安中浩穰於三輔尤為劇郡國二千石以高第入守及為真久者不過三二年近者數月一歲輒毀傷失名以罪過罷唯廣漢及敞為久任職前漢循吏傳孝宣以為太守吏民之本也數變易則下不安民知其將久不可欺罔乃服從其教化故二千石有治理效輒以璽書勉厲增秩賜金或爵至關內侯公卿缺則選諸所表以次用之後漢朱浮傳日食之異浮因上疏曰今牧人之吏多未稱職小違理實輒見斥罷然以堯舜之盛猶加三考大漢之興亦累功效吏皆積久養老於官至名子孫因其氏姓當時吏職何能悉理論議之徒豈不諠譁蓋以為天地之功不可倉卒艱難之業當累日也而間者守宰數見換易迎新相代疲勞道路尋其視事日淺未足昭見其職夫物暴長者必夭折功卒成者必亟壞如摧長久之業而造速成之功非陛下之福也願陛下遊意於經年之外望化於一世之後帝下其議群臣多同於浮自是牧守易代頗簡舊制後漢左雄傳上疏以為吏數變易則下不安業久於其事則民服教化新唐劉祥道傳上疏曰唐虞三載考績黜陟幽明兩漢用人亦久其職今任官率四考罷官知秩滿則懷去就民知遷徙則苟且以去就之官臨苟且之民欲移風振俗烏可得乎請四考階進八考聽選以息迎新送故之弊新唐盧懷慎傳上疏曰昔子產相鄭更法令布刑書一年人怨思殺之三年人德而歌之子產賢者也其為政尚累年而後成況常材乎比州牧上佐兩畿令或一二歲或三五月即遷曾不論以課最使未遷者傾耳以聽企踵以望冒進亡廉亦何暇為陛下宣風恤人哉人知吏之不久不率其教吏知遷之不遙不究其力箋證漢書張敞傳敞為人敏疾賞罰分明見惡輒取時時越法縱舍有足大者其治京兆略循趙廣漢之迹方略耳目發伏禁姦不如廣漢然敞本治春秋以經術自輔其政頗雜儒雅往往表賢顯善不醇用誅罰以此能自全竟免於刑戮京兆典京師長安中浩穰於三輔尤為劇師古曰浩大也穰盛也言人眾之多也穰音人掌反郡國二千石以高第入守及為真久者不過三二年近者數月一歲輒毀傷失名以罪過罷唯廣漢及敞為久任職漢書循吏傳序及至孝宣繇仄陋而登至尊興于閭閻知民事之艱難以為太守吏民之本也數變易則下不安民知其將久不可欺罔迺服從其教化故二千石有治理效輒以璽書勉厲增秩賜金或爵至關內侯公卿缺則選諸所表以次用之師古曰所表謂增秩賜金爵也後漢書朱浮傳朱浮字叔元沛國蕭人也時有纖微之過者必見斥罷交易紛紜百姓不寧六年有日食之異浮因上疏曰今牧人之吏多未稱職小違理實輒見斥罷豈不粲然黑白分明哉然以堯舜之盛猶加三考大漢之興亦累功效吏皆積久養老於官至名子孫因為氏姓當時吏職何能悉理論議之徒豈不諠譁盖以為天地之功不可倉卒艱難之業當累日也而間者守宰數見換易迎新相代疲勞道路尋其視事日淺未足昭見其職既加嚴切人不自保各相顧望無自安之心有司或因睚眥以騁私怨苟求長短求媚上意二千石及長吏迫於舉劾懼於刺譏故爭餙詐偽以希虛譽斯皆群陽騷動日月失行之應夫物暴長者必夭折功卒成者必亟壞如摧長久之業而造速成之功非陛下之福也天下非一時之用也海內非一旦之功也願陛下遊意於經年之外望化於一世之後天下幸甚帝下其議群臣多同於浮自是牧守易代頗簡舊制後漢書左雄傳虞詡以雄有忠公節上疏薦之由是拜雄尚書再遷尚書令上疏陳事曰及宣帝興於仄陋綜覈名實知時所病刺史守相輒親引見考察言行信賞必罰帝乃歎曰民所以安而無怨者政平吏良也與我共此者其唯良二千石乎以為吏數變易則下不安業久於其事則民服教化新唐書劉祥道傳劉祥道字同壽魏州觀城人顯慶中遷吏部黃門侍郎上疏陳六事五曰唐虞三載考績黜陟幽明二漢用人亦久其職今任官率四考罷官知秩滿則懷去就民知遷徙則苟且以去就之官臨茍且之民欲移風振俗烏可得乎請四考進階八考聽選以息迎新送故之弊新唐書盧懷慎傳盧懷慎滑州人神龍中遷右御史臺中丞上疏陳時政曰昔子產相鄭更法令布刑書一年人怨思殺之三年人德而歌之子產賢者也其為政尚累年而後成況常材乎比州牧上佐兩畿令或一二歲或三五月即遷曾不論以課最使未遷者傾耳以聽企踵以望冒進亡廉亦何暇為陛下宣風恤人哉禮義不能興戶口益以流倉庫愈匱百姓日敝職為此耳人知吏之不久不率其教吏知遷之不遙不究其力事不辭難第六後漢虞詡傳鄧騭兄弟欲以吏法中傷詡後朝歌賊甯季等數千人攻殺長吏乃以詡為朝歌長故舊皆弔詡詡笑曰志不求易事不避難臣之職也不遇槃根錯節何以知利器乎後賊駭散後漢張宗傳王莽敗赤眉眾至禹引師進就堅城而眾人多畏賊追憚為後拒禹乃書諸將名於竹簡署其前後亂著笥中令各探之宗獨不肯探曰死生有命張宗豈辭難就逸乎禹歎息謂曰將軍有親弱在營奈何不顧宗曰愚聞一卒畢力百人不當萬夫致死可以橫行宗今擁兵數千以承大威何遽其必敗乎遂留為後拒赤眉卒至宗與戰卻之於是諸將服其勇後漢黨錮李膺傳張儉事起收捕鉤黨鄉人謂膺曰可去矣對曰事不辭難罪不逃刑臣之節也吾年已六十死生有命去將安之乃詣詔獄考死前漢王尊遷益州剌史先是王陽為剌史行部至邛郲九折阪歎曰奉先人遺體奈何數乘此險後以病去及尊至其阪問吏曰此非王陽所畏道邪吏曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣箋證後漢書虞詡傳鄧騭兄弟以詡異其議因此不平欲以吏法中傷詡後朝歌賊甯季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長故舊皆弔詡曰得朝歌何衰詡笑曰志不求易事不避難臣之職也不遇槃根錯節何以別利器乎及到官設令三科以募求壯士自掾史以下各舉所知其攻劫者為上傷人偷盜者次之帶喪服而不事家業為下收得百餘人詡為饗會悉貰其罪使入賊中誘令劫掠乃伏兵以待之遂殺賊數百人又潛遣貧人能縫者傭作賊衣以采綖縫其裾為幟幟記也續漢書曰以絳縷縫其裾也有出市里者吏輒禽之賊由是駭散後漢書張宗傳張宗字諸君南陽魯陽人也王莽時為縣陽泉鄉佐會莽敗義兵起宗乃率陽泉民三四百人起兵略地西至長安更始以宗為偏將軍宗見更始政亂因將家屬客安邑及大司徒鄧禹西征定河東宗詣禹自歸禹聞宗數多權謀乃表為偏將軍禹軍到栒邑赤眉大眾且至禹以栒邑不足守欲引師進就堅城而眾人多畏賊追憚為後拒禹乃書諸將名於竹簡署其前後亂著笥中令各探之宗獨不肯探曰死生有命張宗豈辭難就逸乎禹歎息謂曰將軍有親弱在營奈何不顧宗曰愚聞一卒畢力百人不當萬夫致死可以橫行宗今擁兵數千以承大威何遽其必敗乎遂留為後拒赤眉卒至宗與戰郤之乃得歸營於是諸將服其勇後漢書黨錮列傳李膺傳陳蕃為太傅與大將軍竇武共秉朝政連謀誅諸宦官故引用天下名士乃以膺為長樂少府及陳竇之敗膺等復廢後張儉事起收捕釣黨鄉人謂膺曰可去矣對曰事不辭難罪不逃刑臣之節也吾年已六十死生有命去將安之乃詣詔獄考死漢書王尊傳王尊字子贛師古曰贛音貢治尚書論語略通大義遷益州刺史先是琅邪王陽為益州刺史行部至卭郲九折阪歎曰奉先人遺體奈何數乘此險後以病去及尊為刺史至其阪問吏曰此非王陽所畏道邪吏對曰是尊叱其馭曰驅之師古曰驅馬令疾行也王陽為孝子王尊為忠臣眾官相讓第七前漢楚元王傳上封事諫曰臣聞舜命九官濟濟相讓和之至也眾賢和於朝則万物和於野前漢王陵傳太尉勃親以兵誅呂氏功多平欲讓勃位迺謝病文帝初立怪平病問之平曰高帝時勃功不如臣及誅諸呂臣功亦不如勃願以相讓勃於是乃以太尉勃為右丞相位第一平徙為左丞相位第二後漢陳蕃傳代楊秉為太尉蕃讓曰不愆不忘率由舊章臣不如太常胡廣齊七政訓五典臣不如議郎王暢聰明亮達文武兼姿臣不如弛刑徒李膺帝不許後漢暉又與同郡陳揖交善揖早卒有遺腹子友暉常哀之及司徒桓虞為南陽太守召暉子駢為吏暉辭駢而薦友虞嘆息遂召之其義烈如此餘見賢者彙征門後漢桓榮傳箋證漢書楚元王傳附劉向更生見堪猛在位幾已得復進懼其傾危乃上封事諫曰臣聞舜命九官濟濟相讓和之至也眾賢和於朝則萬物和於野漢書王陵傳及呂太后崩平與太尉勃合謀卒誅諸呂立文帝平本謀也審食其免相文帝立舉以為相太尉勃親以兵誅呂氏功多平欲讓勃位迺謝病文帝初立怪平病問之平曰高帝時勃功不如臣及誅諸呂臣功亦不如勃願以相讓勃於是乃以太尉勃為右丞相位第一平徙為左丞相位第二後漢書陳蕃傳陳蕃八年代楊秉為太尉蕃讓曰不愆不忘率由舊章詩大雅也言成王令德不過誤不遺失循用舊典文章謂周公之禮法也臣不如太常胡廣齊七政訓五典臣不如議郎王暢聰明亮達文武兼姿臣不如弛刑徒李膺帝不許後漢書朱暉傳朱暉字文季南陽宛人也暉又與同郡陳揖交善揖早卒有遺腹子友暉常哀之及司徒桓虞為南陽太守召暉子駢為吏暉辭駢而薦友虞歎息遂召之其義烈若此
