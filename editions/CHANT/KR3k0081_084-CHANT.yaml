body:
  text: 卷第八十四言第一史記商君傳相秦十年趙良曰僕請正言而無誅可乎商君曰語有之矣貌言華也至言實也苦言藥也甘言疾也夫子果肯終日正言鞅之藥也前漢東方朔傳夫談有悖於目拂於耳謬於心而便於身者或有說於目順於耳快於心而毀於行者非有明王聖主孰能聽之晉王獻之傳嘗共兄徽之操之俱詣謝安二兄多言俗事獻之寒溫而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡以其少言故知之新唐徐彥伯傳彥伯著樞機論以謂言者德之柄行之主志之端身文之也君子之樞機動則物應得失之見也可以濟身亦以覆身否泰榮辱一繫之能審思而應精慮而動擇其交以後談則悔吝何由而至如此乃可以言也以為戒世云新唐書杜正倫傳知起居注帝嘗曰朕坐朝不敢多言必待有利于民乃出諸口正倫曰臣職左史陛下一言失非止損百姓且筆之書千載累德帝悅箋證史記商君傳商君相秦十年宗室貴戚多怨望者趙良曰千羊之皮不如一狐之掖千人之諾諾不如一士之諤諤武王諤諤以昌殷紂墨墨以亡君若不非武王乎則僕請終日正言而無誅可乎商君曰語有之矣貌言華也至言實也苦言藥也甘言疾也夫子果肯終日正言鞅之藥也鞅將事子子又何辭焉漢書東方朔傳夫談有悖於目拂於耳謬於心而便於身者或有說於目順於耳快於心而便於行者非有明王聖主孰能聽之晉書王羲之傳附子王獻之嘗與兄徽之操之俱詣謝安二兄多言俗事獻之寒溫而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡以其少言故知之新唐書徐彥伯傳彥伯著樞機論以謂言者德之柄行之主志之端身之文也君子之樞機動則物應得失之見也可以濟身亦以覆身否泰榮辱一繫之能審思而應精慮而動擇其交以後談則悔吝何由而生怨惡何由而至如此乃可以言也以為戒世云新唐書杜正倫傳俄遷給事中知起居注帝嘗曰朕坐朝不敢多言必待有利于民乃出諸口正倫曰臣職左史陛下一言失非止損百姓且筆之書千載累德帝悅賜綵縀二百辯第二史記端木賜傳故子貢一出存魯亂齊破吳彊晉而霸越子貢一使使勢相破十年之中五國各有變前漢張釋之傳從行上登虎圈問上林尉禽獸簿十餘門盡不能對虎圈嗇夫從旁代尉對甚悉欲以觀其能口對嚮應亡窮者文帝曰吏不當如此邪詔釋之拜嗇夫為上林令釋之前曰陛下以絳侯固勃何如人也上曰長者又復問東陽侯張相如何如人也上復曰長者釋之曰夫絳侯東陽侯稱為長者此二人言事曾不能出口豈效此嗇夫喋喋利口捷給哉今陛下以嗇夫口辯而超遷之臣恐天下隨風靡爭口辯亡其實且下之化上疾於景嚮舉錯不可不察也文帝曰善前漢蒯通傳贊曰仲尼惡利口之覆邦家蒯通一說而喪三烹酈食其敗田橫驕韓信也其得不亨者幸也後漢黨錮傳霸德既衰狙詐萌起強者以決勝為雄弱者以詐劣受屈至有畫半策而綰萬金開一說而錫琛瑞或起徒步而仕執珪解草衣而升卿相士之飾巧馳辯以要能釣利者不期而景從矣晉裴頠傳樂廣嘗與頠濤言欲以理服之而頠辭論豐博廣笑而不言時人謂頠為言談之林藪晉輿為魏邵太守東海王越將召之輿密視天下兵簿及倉庫牛馬器械水陸之形皆默識之是時軍國多事每會議自潘滔以下笑知所對輿既見越應機辯畫越傾膝酬接即以為左長史晉祖納傳納嘗問梅陶曰君鄉里立月旦評何如陶曰善褒惡貶則佳法也納曰未益時王隱在坐因曰尚書稱三載考績黜陟幽明何得一月便行褒貶陶曰此官法也月旦私法也隱曰易云積善之家必有餘慶積惡之家必有餘殃稱家者豈不是官必須積久善惡乃著公私何異古人有言正良而亡先人之殃酷烈而存先人之勳累世乃著豈但一月若必月旦則顏回食埃不免貪污盜跖引少則為清廉朝種暮穫善惡未定矣時梅陶及鍾雅數說餘事納輒困之因曰君汝潁之士利如錐我幽冀之士鈍如鎚持我鈍鎚捶君利錐皆當摧矣陶雅並稱有神錐不可得鎚納曰假有神錐必有神錟椎無以對新唐王世充傳人或辨駮世充以口舌緣飾眾知其非亦不能屈也箋證史記仲尼弟子列傳端沐賜傳故子貢一出存魯亂齊破產彊晉而霸越子貢一使使勢相破十年之中五國各有變漢書張釋之傳從行上登虎圈問上林尉禽獸簿十餘問尉左右視盡不能對虎圈嗇夫從旁代尉對上所問禽獸簿甚悉欲以觀其能口對嚮應亡窮者文帝曰吏不當如此邪尉亡窮詔釋之拜嗇夫為上林令釋之前曰陛下以絳侯周勃何如人也上曰長者又復問東陽侯張相如何如人也上復曰長者釋之曰夫絳侯東陽侯稱為長者此兩人言事曾不能出口豈效此嗇夫喋喋利口捷給哉且秦以任刀筆之吏爭以亟疾苛察相高其敝徒文具亡惻隱之實以故不聞其過陵夷至於二世天下土崩今陛下以嗇夫口辯而超遷之臣恐天下隨風靡爭口辯亡其實且下之化上疾於景嚮舉錯不可不察也文帝曰善乃止不拜嗇夫漢書蒯通伍被江充息夫躬傳贊曰仲尼惡利口之覆邦家蒯通一說而喪三應劭曰亨酈食其敗田壄驕韓信也其得不亨者幸也後漢書黨錮列傳霸德既衰狙詐萌起彊者以決勝為雄弱者以詐劣受屈至有畫半策而綰萬金開一說而錫琛瑞或起徒步而仕執珪解草衣以升卿相士之飾巧馳辯以要能釣利者不期而景從矣晉書裴秀傳附子裴頠樂廣嘗與頠清言欲以理服之而頠辭論豐博廣笑而不言時人謂頠為言談之林藪晉書劉琨傳附兄劉輿虓之敗輿與之俱奔河北虓既鎮鄴以輿為征虜將軍魏郡太守虓薨東海王越將召之或曰輿猶膩也近則污人及至越疑而御之輿密視天下兵簿及倉庫牛馬器械水陸之形皆默識之是時軍國多事每會議自潘滔以下莫知所對輿既見越應機辯畫越傾膝酬接即以為左長史晉書祖逖傳附兄祖納納嘗問梅陶曰君鄉里立月旦評何如陶曰善褒惡貶則佳法也納曰未益時王隱在坐因曰尚書稱三載考績三考黜陟幽績何得一月便行褒貶陶曰此官法也月旦私法也隱曰易稱積善之家必有餘慶積不善之家必有餘殃稱家者豈不是官必須積久善惡乃著公私何異古人有言貞良而亡先人之殃酷烈而存先人之勳累世乃著豈但一月若必月旦則顏回食埃不免貪污盜蹠引少則為清廉朝種暮穫善惡未定矣時梅陶及鍾雅數說餘事納輒困之因曰君汝潁之士利如錐我幽冀之士鈍如鎚持我鈍槌捶君利錐皆當摧矣陶雅並稱有神錐不可得槌納曰假有神錐必有神槌雅無以對卒於家新唐書王世充傳大業初為民部侍郎善占對習法敢舞文上下人或辨駮世充以口舌緣飾眾知其非亦不能屈也言訥行敏第三史記李斯傳高曰高受詔教習胡亥數年矣未嘗見過失慈仁篤厚輕財重士辯於心而詘於口秦之諸子未有及此者可以為嗣前漢周勃傳勃為人木強敦厚高帝以為可屬大事勃不好文學每召諸生說士東鄉坐責之趣為我語其椎少文如此服虔曰謂訥鈍也椎謂樸鈍如椎也音直推反前漢萬石君傳贊曰仲尼有言君子欲訥於言而敏於行其萬石君建陵侯塞侯張叔之謂歟建陵侯衛綰塞侯直不疑後漢儒林何休傳休為人質朴訥口而雅有心思精研六經世儒無及者後漢高彪傳家本單寒至彪為諸生遊太學有雅才而訥於言後漢黨錮劉儒傳郭林宗常謂儒口訥心辨有珪璋之質蜀譙周傳體貌素朴性推誠不飾無造次辨論之才然潛識內敏餘見辯張釋之傳箋證史記李斯傳高曰高受詔教習胡亥使學以法事數年矣未嘗見過失慈仁篤厚輕財重士辯於心而詘於口盡禮敬士秦之諸子未有及此者可以為嗣君計而定之漢書周勃傳勃為人木強敦厚高帝以為可屬大事勃不好文學每召諸生隱士東鄉坐責之趣為我語其椎少文如此服虔曰謂訥鈍也應劭曰今俗名拙語為椎儲師古曰椎謂樸鈍如椎也音直推反漢書萬石君衛綰直不疑周仁張敺傳贊曰仲尼有言君子欲訥於言而敏於行其萬石君建陵侯塞侯張叔之謂與後漢書儒林列傳何休傳何休字邵公任城樊人也父豹少府休為人質朴訥口而雅有心思精研六經世儒無及者後漢書文苑列傳高彪傳高彪字義方吳郡無錫人也家本單寒至彪為諸生遊太學有雅才而訥於言後漢書黨錮列傳劉儒傳劉儒字叔林東郡陽平人也郭林宗常謂儒口訥心辯有珪璋之質察孝廉舉高第三遷侍中桓帝時數有災異下策博求直言儒上封事十條極言得失辭甚忠切三國志蜀志譙周傳周幼孤與母兄同居既長耽古篤學家貧未嘗問產業誦讀典籍欣然獨笑以忘寢食研精六經尤善書札頗曉天文而不以留意諸子文章非心所存不悉徧視也身長八尺體貌素朴性推誠不飾無造次辯論之才然潛識內敏燕語不及國事第四前漢孔光傳典樞機十餘年休日歸休兄弟妻子燕語終不及朝省政事或問光溫室省中樹皆何木也光嘿不應更答以他語後漢陰識傳識入雖極言正議及與賓客語未常及國事顯宗益重之箋證漢書孔光傳凡典樞機十餘年沭日歸休兄弟妻子燕語終不及朝省政事或問光宮室省中樹皆何木也光嘿不應更答以它語其不泄如是後漢書陰識傳帝每巡郡國識常留鎮守京師委以禁兵入雖極言正議及與賓客語未嘗及國事帝敬重之常指識以勑戒貴戚激厲左右焉口無擇言第五後漢馬援傳初兄子嚴敦並嘉譏議援前在交趾還書戒之曰龍伯高敦厚周慎口無擇言吾愛之重之願汝曹效之後漢劉般傳封居巢侯就國數年揚州剌史觀恂薦般在國口無擇言行無怨惡顯宗嘉之魏邴原傳注原亦以高遠清白頤志澹泊口無擇言身無擇行故英偉之士向焉晉庾袞傳袞敦詩閱禮口無擇言箋證後漢書馬援傳初兄子嚴敦並喜譏議而通輕俠客援前在交阯還書誡之曰龍伯高敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之願汝曹效之後漢書劉般傳永平元年以國屬沛徙封居巢侯復隨諸侯就國數年揚州刺史觀恂薦般在國口無擇言行無怨惡宜蒙旌顯顯宗嘉之三國志魏志邴原傳註原亦以高遠清白頤志澹泊口無擇言身無擇行故英偉之士向焉晉書孝友列傳庾袞庾袞字叔褒明穆皇后伯父也少履勤儉篤學好問事親以孝稱袞學通詩書非法不言非道不行尊事耆老惠訓蒙幼揚人之美第六史記端木賜傳子貢喜揚人之美不能匿人之過前漢夏侯勝傳嘗見出道上語又見天子而以其言為外人道之上聞而讓勝勝曰陛下所言善臣故揚之堯言布於天下至今見誦臣以為可傳故傳耳前漢張湯傳奏事上善之曰臣非知為此奏乃監椽史某所為其欲薦吏揚人之善如此新唐書鄭惟忠傳制舉召見廷中武后問舉者何所事為忠對皆不合旨惟忠曰外揚君之美內正君之惡后曰善箋證史記仲尼弟子列傳端沐賜傳子貢好廢舉與時轉貨貲喜揚人之美不能匿人之過漢書夏侯勝傳勝為人質樸守正簡易亡威儀見時謂上為君誤相字於前上亦以是親信之嘗見出道上語師古曰入見天子而以其言為外人道之上聞而讓勝勝曰陛下所言善臣故揚之堯言布於天下至今見誦臣以為可傳故傳耳漢書張湯傳間即奏事上善之曰臣非知為此奏乃監掾史某所為其欲薦吏揚人之善解人之過如此新唐書鄭惟忠傳鄭惟忠宋州宋城人第進士補井陘尉天授中以制舉召見廷中武后問舉者何所事為忠對皆不合旨惟忠曰外揚君之美內正君之惡后曰善遏惡揚善第七前漢丙吉傳代魏相為丞相上寬大好禮讓掾史有罪臧不稱職輒予長休告終無所案驗客或謂吉曰君侯為漢相姦吏成其私然無所懲艾吉曰夫以三公之府有案吏之名吾竊陋焉後人代吉因以為故事公府不案吏自吉始於官屬掾史務掩過揚善箋證漢書丙吉傳後五歲代魏相為丞相吉本起獄法小吏後學詩禮皆通大義及居相位上寬大好禮讓掾史有罪臧不稱職輒予長休告終無所案驗客或謂吉曰君侯為漢相姦吏成其私然無所懲艾吉曰夫以三公之府有案吏之名吾竊陋焉後人代吉因以為故事公府不案吏自吉始於官屬掾史務掩過揚善積惡滅身第八前漢董仲舒對策曰積善在身猶長日加益而人不知也積惡在身猶火之銷膏而人不見也非明虖情性察虖流俗者孰能知之此唐虞之所以得令名而桀紂之可為悼懼者也前漢董仲舒傳對策曰桀紂暴慢讒賊並進賢知隱伏惡日顯國日亂晏然自以如日在天終陵夷而大壞夫暴逆不仁者非一日而亡也亦以漸至故桀紂雖無道然猶享國十餘年此其寖微寖滅之道也箋證漢書董仲舒傳積善在身猶長日加益而人不知也積惡在身猶火之銷膏而人不見也非明虖情性察虖流俗者孰能知之此唐虞之所以得令名而桀紂之可為悼懼者也漢書董仲舒傳故桀紂暴謾讒賊並進賢知隱伏惡日顯國日亂晏然自以如日在天終陵夷而大壞夫暴逆不仁者非一日而亡也亦以漸至故桀紂雖亡道然猶享國十餘年此其寖微寖滅之道也自薦第九前漢東方朔傳武帝初即位舉方正賢良文學材力之士四方士多上書言得失自衒鬻者以千數朔初來上書曰臣朔少失父母長養兄嫂年十三學書三冬文史足用十五學擊劍十六學詩書誦二十二万言十九學孫吳兵法戰陣之具鉏鼓之教亦誦二十二万言臣朔年二十二長九尺三寸目若懸珠齒若編貝勇若孟賁捷若慶忌廉若鮑叔信若尾生若此可以為天子大臣矣朔文辭不遜高自稱譽上偉之令待詔公車前漢張敞傳勃海膠東盜賊並起敞上書自請治之後漢耿純傳純自請曰臣本吏家子孫幸遭大漢復興聖帝受命備位列將爵為通侯天下略定臣無所用志願試治一郡盡力自效帝笑曰卿既治武復欲修文邪迺拜純為東郡太守蜀李恢傳章武元年庲降都督鄧方卒先主問恢誰可代者恢對曰人之才能名有長短故孔子曰其使人也器之且夫明主在上則臣下盡情是以西零之役趙充國曰莫若老臣臣竊不自量惟陛下察之先主笑曰孤之本意亦已在卿矣遂以恢為庲降都督新唐宗室傳遷江西節度使至豫章大令曰有功未申與懷器謀不發者皆自言得裨校伊慎李伯潛劉旻悉補大將新唐皇紀十五年制草澤有文武高才令詣闕自舉箋證漢書東方朔傳東方朔字曼倩平原厭次人也武帝初即位徵天下舉方正賢良文學材力之士待以不次之位四方士多上書言得失自衒鬻者以千數其不足采者輒報聞罷朔初來上書曰臣朔少失父母長養兄嫂年十二學書三冬文史足用十五學擊劍十六學詩書誦二十二萬言十九學孫吳兵法戰陣之具鉦鼓之教亦誦二十二萬言凡臣朔固已誦四十四萬言又常服子路之言臣朔年二十二長九尺三寸目若懸珠齒若編貝勇若孟賁捷若慶忌廉若鮑叔信若尾生若此可以為天子大臣矣臣朔昧死再拜以聞朔文辭不遜高自稱譽上偉之令待詔公車奉祿薄未得省見漢書張敞傳久之勃海膠東盜賊並起敞上書自請治之後漢書耿純傳純還京師因自請曰臣本吏家子孫幸遭大漢復興聖帝受命備位列將爵為通侯天下略定臣無所用志願試治一郡盡力自效帝笑曰卿既治武復欲脩文邪迺拜純為東郡太守時東郡未平純視事數月盜賊清寧三國志蜀志李恢傳章武元年庲降都督鄧方卒先主問恢誰可代者恢對曰人之才能各有長短故孔子曰其使人也器之且夫明主在上則臣下盡情是以先零之役趙充國曰莫若老臣臣竊不自揆惟陛下察之先主笑曰孤之本意亦已在卿矣遂以恢為庲降都督使持節領交州刺史住平夷縣新唐書太宗諸子傳李希烈反遷江西節度使受命日不宿家至豫章大令將吏曰有功未申與懷器謀不發者皆自言得裨校伊慎李伯潛劉旻悉補大將舊唐書玄宗本紀開元十五年春正月戊寅制草澤有文武高才令詣闕自舉更相薦譽第十史記魏其侯傳灌夫家雖富然失勢卿相侍中賓客益衰及魏其侯失勢亦欲倚灌夫引繩批根生平慕之後棄之者二人相倚引繩直之意批根賓客也去之者不與交通根根括引繩以持彈灌夫亦倚魏其而通列侯宗室為名高兩人相為引重相薦達為聲勢前漢劉向傳昔孔子與顏淵子貢更相稱譽不為朋黨禹稷與皋陶傳相汲引不為比周餘見賢者彙征前漢賈捐之傳字君房時石顯用事捐之數短顯而長安令楊興與捐之相善捐之謂興曰京兆尹缺使我得見言君蘭楊興字興曰縣官嘗言興瘉勝也薛大夫我易助也使君房以尚書令勝五鹿充宗捐之曰令我得代充宗君蘭為京兆京兆郡國首尚書百官本天下真大治矣興曰我復見言君房也捐之復短石顯薦興奏曰竊見長安興事父母有曾氏之孝事師有顏閔之材下筆屬文則董仲舒進談動辭則東方生置之爭臣則汲直用之介胄則冠軍侯施之治民則趙廣漢抱公絕私則尹翁歸可試守京兆尹石顯聞知白之上乃下興捐之獄令皇后父陽平侯禁與顯共雜治奏興捐之懷詐偽以上語相風更相薦譽欲得大位漏泄省中語罔上不道請論如法捐之竟坐棄市興髡鉗為城且前漢何武傳武舉公孫祿可大司馬而祿亦舉武太后竟自用莽為大司馬莽諷有司劾奏武公孫祿互相稱薦皆免武就後漢竇章傳少好學有文章與馬融崔瑗同好更相推薦箋證史記魏其武傳灌夫家居雖富然失勢卿相侍中賓客益衰及魏其侯失勢亦欲倚灌夫引繩批根生平慕之後棄之者集解蘇林曰二人相倚引繩直之意批根賓客也棄之者不與交通孟康曰根根括引繩以持彈灌夫亦倚魏其而通列侯宗室虛名高兩人相為引重集解張晏曰相薦達為聲勢其游如父子然相得驩甚無厭恨相知晚也漢書楚元王傳附劉向是以群小窺見間隙緣飾文字巧言醜詆流言飛文譁於民間故詩云憂心悄悄慍于頔小小人成群誠足慍也昔孔子與顏淵子貢更相稱譽不為朋黨禹稷與皋陶傳相汲引不為比周師古曰事見尚書舜典比音頻寐反漢書賈捐之傳捐之數召見言多納用時中書令石顯用事捐之數短顯以故不得官後稀復見而長安令楊興新以材能得幸與捐之相善捐之欲得召見謂興曰京兆尹缺使我得見言君蘭張晏曰楊興字京兆尹可立得興曰縣官嘗言興瘉薛大夫張晏曰瘉勝也薛廣德為御史大夫師古曰瘉與愈同我易助也君房下筆言語妙天下使君房為尚書令勝五鹿充宗遠甚捐之曰令我得代充宗君蘭為京兆京兆郡國首尚書百官本天下真大治士則不隔矣捐之前言平恩侯可為將軍期思侯並可為諸曹皆如言又薦謁者滿宣立為冀州刺史言中謁者不宜受事宦者不宜入宗廟立止相薦之信不當如是乎興曰我復見言君房也捐之復短石顯薦興奏曰竊見長安令興幸得以知名數召見興事父母有曾氏之孝事師有顏閔之材榮名聞於四方明詔舉茂材列侯以為首為長安令吏民敬鄉道路皆稱能觀其下筆屬文則董仲舒進談動辭則東方生置之爭臣則汲直用之介胄則冠軍侯施之治民則趙廣漢抱公絕私則尹翁歸興兼此六人而有之守道堅固執義不回大節而不可奪國之良臣也可試守京兆尹石顯聞知白之上乃下興捐之獄令皇后父陽平侯禁與顯共雜治奏興捐之懷詐偽以上語相風更相薦譽欲得大位漏泄省中語罔上不道書曰讒說殄行震驚朕師王制順非而澤不聽而誅請論如法捐之竟坐棄市興減死罪一等髡鉗為城旦漢書何武傳於是武舉公孫祿可大司馬而祿亦舉武太后竟自用莽為大司馬莽風有司劾奏武公孫祿互相稱舉皆免武就國後莽寖盛為宰衡陰誅不附已者後漢書竇融傳附玄孫竇章章字伯向少好學有文章與馬融崔瑗同好更相推薦
