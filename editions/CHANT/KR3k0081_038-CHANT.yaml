body:
  text: 卷第三十八諷諫第一史記滑稽傳淳于髡曰酒極則亂樂極則悲萬事盡然言不可極極之而衰以諷諫焉齊王曰善乃罷長夜之飲後漢李雲傳論曰禮有五諫諷為上五諫謂諷諫順諫闚諫指諫陷諫也諷諫者知患禍之萌而諷告也順諫者出辭遜順不逆君心也闚諫者視君顏色而諫也指諫者質指其事而諫也陷諫者言國之害忘生為君也若夫託物見情因文載旨使言之者旡罪聞之者足以自戒貴在於意達言從理歸乎正曷其絞訐摩上以衒沽成名哉李雲草茅之生不識失身之義遂乃露布帝者班檄三公至於誅死而不顧斯豈古之往也夫未信而諫則以為謗己故說者識其難焉韓非有說難魏劉劭傳明帝詔作許都洛都賦時外興軍旅內營宮室劭作二賦皆諷諫焉蜀簡雍傳時大旱禁酒釀者吏於人家索得釀具論者欲令與作酒同罰雍從先主遊觀見一男女行道曰彼欲行淫何以不縛先主曰卿何以知之雍對曰彼有其具與欲釀者同先主大笑而原欲釀者晉桓伊傳時謝安女婿王國寶專利無檢行安惡其為人每抑制之及孝武末年嗜酒好肉而會稽王道子昏醟尢甚惟狎昵諂邪於是國寶讒諛之計稍行於主相之間而好利險詖之徒以安功名盛極而構會之嫌隙遂成帝召伊飲讌安侍坐帝命伊吹笛伊即吹為一弄乃放笛云臣於箏分乃不及笛然自足以韻合歌管請以箏歌并請一吹笛人帝乃勑御妓奏笛伊又云御府人於臣必自不合臣有一奴善相便串帝乃許召之奴既吹笛伊便撫箏而歌怨詩曰為君既不易為臣良獨難忠信事不顯乃有見疑患用宜佐文武金縢功不刊推心輔王政二叔反流言聲節慷慨俯仰可觀安泣下沾衿乃越席而就之捋其鬚曰使君於此不凡帝甚有愧色新唐柳公權傳帝問公權用筆法對曰心正則筆正筆正乃可法矣時帝荒縱故公權及之帝改容悟其以筆諫矣新唐魏徵傳帝本以兵定天下雖已治不忘經略四夷也徵待宴奏破陣舞德舞則俛首不顧至慶善樂則諦玩旡斁舉有所諷切如此餘見辭賦司馬相如傳并邊讓傳又見諫獵楊雄傳箋證史記滑稽列傳淳于髡者齊之贅壻也齊威王之時喜隱索隱喜隱謂好隱語好為淫樂長夜之飲沈湎不治委政卿大夫百官荒亂諸侯並侵國且危亡在於旦暮左右莫敢諫威王八年楚大發兵加齊齊王使淳于髡之趙請救兵趙王與之精兵十萬革車千乘楚聞之夜引兵而去威王大悅置酒後宮召髡賜之酒問曰先生能飲幾何而醉對曰臣飲一斗亦醉一石亦醉威王曰先生飲一斗而醉惡能飲一石哉其說可得聞乎髡曰酒極則亂樂極則悲萬事盡然言不可極極之而衰以諷諫焉齊王曰善乃罷長夜之飲後漢書李雲傳論曰禮有五諫諷為上五諫謂諷諫順諫闚諫指諫陷諫也諷諫者知患禍之萌而諷告也順諫者出辭遜順不逆君心也闚諫者視人君顏色而諫也指諫者質指其事而諫也陷諫者言國之害忘生為君也見大戴禮若夫託物見情因文載旨使言之者無罪聞之者足以自戒貴在於意達言從理歸乎正曷其絞訐摩上以衒沽成名哉絞直也訐正也沽賣之也李雲草茅之生不識失身之義遂乃露布帝者班檄三公至於誅死而不顧斯豈古之狂也夫未信而諫則以為謗己論語曰事君信而後諫其君未信則以為謗己故說者識其難焉韓非有說難篇三國志魏志劉劭傳劉劭字孔才廣平邯鄲人也劭嘗作趙都賦明帝美之詔劭作許都洛都賦時外興軍旅內營宮室劭作二賦皆諷諫焉三國志蜀志簡雍傳簡雍字憲和涿郡人也時天旱禁酒釀者有刑吏於人家索得釀具論者欲令與作酒者同罰雍與先主游觀見一男女行道謂先主曰彼人欲行淫何以不縳先主曰卿何以知之雍對曰彼有其具與欲釀者同先主大笑而原欲釀者晉書桓宣傳附族子桓伊伊字叔夏性謙素雖有大功而始終不替善音樂盡一時之妙為江左第一時謝安女壻王國寶專利無檢行安惡其為人每抑制之及孝武末年嗜酒好內而會稽王道子昏醟尤甚惟狎昵諂邪於是國寶讒諛之計稍行於主相之間而好利險詖之徒以安功名盛極而構會之嫌隙遂成帝召伊飲讌安侍坐帝命伊吹笛伊神色無迕即吹為一弄乃放笛云臣於箏分乃不及笛然自足以韻合歌管請以箏歌并請一吹笛人帝善其調達乃勑御妓奏笛伊又云御府人於臣必自不合臣有一奴善相便串帝彌賞其放率乃許召之奴既吹笛伊便撫箏而歌怨詩曰為君既不易為臣良獨難忠信事不顯乃有見疑患周旦佐文武金縢功不刊推心輔王政二叔反流言聲節慷慨俯仰可觀安泣下沾衿乃越席而就之捋其鬚曰使君於此不凡帝甚有愧色新唐書柳公權傳帝問公權用筆法對曰心正則筆正筆正乃可法矣時帝荒縱故公權及之帝改容悟其以筆諫也新唐書魏徵傳帝本以兵定天下雖已治不忘經略四夷也故徵侍宴奏破陣武德舞則俛首不顧至慶善樂則諦玩無斁舉有所諷切如此納諫第二前漢路溫舒曰烏鳶之卯不毀而後鳳皇集誹謗之罪不誅而後良言進故古人有言山藪藏疾川澤納汙瑾瑜匿惡國君含詬前漢張良傳沛公入秦宮室帷帳狗馬重寶婦女以千數意欲留居之樊噲諫不聽良曰夫秦為旡道故沛公得至此為天下除殘去賊宜縞素為資今始入秦則安其樂此所為助桀為虐且忠言逆耳利於行毒藥苦口利於病願沛公聽樊噲言沛公迺還軍霸上前漢文帝時袁盎說申屠嘉曰陛下從代來每朝郎官者上書疏未嘗不止輦受其言不可用置之言可采未嘗不稱善何也欲以致天下賢英日聞所不聞以益聖後漢蔡邕傳邕上封事臣聞國將興至言數聞內知己政外見民情晉武帝紀帝與右將軍皇甫陶論事陶與帝爭言鄭徽表請罪之帝曰讜言謇諤所望於左右也人主常以阿媚為患豈以爭臣為損哉徽越職妄奏起朕之意遂免徽官晉劉毅為司肄挍尉武帝嘗南郊禮畢喟然問毅曰卿以朕方漢何帝也對曰可方桓靈帝曰吾雖德不及古人猶克己為政又平吳會混一天下方之桓靈其已甚乎對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之殆不如也帝大笑曰桓靈之世不聞此言今有直臣故不同也鄒湛進曰世談以陛下比漢文帝昔馮唐答文帝云不能用頗牧而文帝怒今劉毅言犯順而陛下歡然以此相校乃過之矣帝曰我平天下而不封禪焚雉頭裘行布衣禮卿初旡言今於小事何見褒之甚湛曰臣聞猛獸在田荷戈而出凡人能之蜂蠆作於懷袖勇夫為之驚駭出於意外故也向劉毅始言臣等莫不變色陛下發不世之詔出思慮之表臣之喜慶不亦宜乎史記商鞅傳相秦趙良曰僕請終曰正言而旡誅可乎商君曰語有之矣貌言華也至言實也苦言藥也甘言疾也夫子果肯終日正言鞅之藥也鞅將事子子又何辭焉新唐劉洎傳太宗曰朕始得魏公朝夕進諫徵亡劉洎岑文本馬周褚遂良繼之新唐書魏徵傳公多病辭職帝曰公獨不見金在礦何足貴耶善冶鍜而為器人乃寶之朕方自比於金以卿為良匠而加礪焉新唐魏徵傳左右有毀徵阿黨親戚者帝使溫彥博按訊非是彥博曰徵為人臣不能著形跡遠嫌疑而被飛謗是宜責也帝謂彥博行讓徵徵見帝謝曰臣聞君臣同心是謂一體豈有置至公事形跡若上下共由茲路邦之興喪未可知也帝矍然曰吾悟之矣餘見直諫薛廣德傳箋證漢書路溫舒傳路溫舒字長君鉅鹿東里人也宣帝初即位溫舒上書言宜尚德緩刑其辭曰臣聞烏鳶之卵不毀而後鳳皇集誹謗之罪不誅而後良言進故古人有言山藪臧疾川澤納汙瑾瑜匿惡國君含詬漢書張良傳秦王子嬰降沛公沛公入秦宮室帷帳狗馬重寶婦女以千數意欲留居之樊噲諫沛公不聽良曰夫秦為無道故沛公得至此為天下除殘去賊宜縞素為資今始入秦即安其樂此所謂助桀為虐且忠言逆耳利於行毒藥苦口利於病願沛公聽樊噲言沛公迺還軍霸上漢書爰盎傳盎告歸道逢丞相申屠嘉下車拜謁丞相從車上謝盎還媿其吏師古曰慙不見禮也乃之丞相舍上謁求見丞相師古曰上謁若今通名也丞相良久乃見因跪曰願請間師古曰欲因間隙私有所白也丞相曰使君所言公事之曹與長史掾議之吾且奏之則私吾不受私語盎即起說曰君為相自度孰與陳平絳侯丞相曰不如盎曰善君自謂弗如夫陳平絳侯輔翼高帝定天下為將相而誅諸呂存劉氏君迺為材官蹶張遷為隊帥積功至淮陽守非有奇計攻城野戰之功且陛下從代來每朝郎官者上書疏未嘗不止輦受其言不可用置之言可采未嘗不稱善何也欲以致天下賢英士大夫日聞所不聞以益聖後漢書蔡邕傳邕上疏曰謹條宜所施行七事表左臣聞國之將興至言數聞內知己政外見民情晉書武帝紀帝與右將軍皇甫陶論事陶與帝爭言散騎常侍鄭徽表請罪之帝曰讜言謇諤所望於左右也人主常以阿媚為患豈以爭臣為損哉徽越職妄奏豈朕之意遂免徽官晉書劉毅傳帝嘗南郊禮畢喟然問毅曰卿以朕方漢何帝也對曰可方桓靈帝曰吾雖德不及古人猶克己為政又平吳會混一天下方之桓靈其已甚乎對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之殆不如也帝大笑曰桓靈之世不聞此言今有直臣故不同也散騎常侍鄒湛進曰世談以陛下比漢文帝人心猶不多同昔馮唐答文帝云不能用頗牧而文帝怒今劉毅言犯順而陛下歡然以此相校聖德乃過之矣帝曰我平天下而不封禪焚雉頭裘行布衣禮卿初無言今於小事何見褒之甚湛曰臣聞猛獸在田荷戈而出凡人能之蜂蠆作於懷袖勇夫為之驚駭出於意外故也夫君臣有自然之尊卑言語有自然之逆順向劉毅始言臣等莫不變色陛下發不世之詔出思慮之表臣之喜慶不亦宜乎史記商君列傳趙良曰僕請終日正言而無誅可乎商君曰語有之矣貌言華也至言實也苦言藥也甘言疾也夫子果肯終日正言鞅之藥也鞅將事子子又何辭焉新唐書劉洎傳帝喜曰朕始得魏徵朝夕進諫徵亡劉洎岑文本馬周褚遂良繼之新唐書魏徵傳進左光祿大夫鄭國公多病辭職帝曰公獨不見金在鑛何足貴耶善冶鍜而為器人皆寶之朕方自比於金以卿為良匠而加礪焉新唐書魏徵傳左右有毀徵阿黨親戚者帝使溫彥博按訊非是彥博曰徵為人臣不能著形迹遠嫌疑而被飛謗是宜責也帝謂彥博行讓徵徵見帝謝曰臣聞君臣同心是謂一體豈有置至公事形迹若上下共由茲路邦之興喪未可知也帝矍然曰吾悟之矣諫不見從第三史記吳世家吳王夫差興師伐齊子胥諫曰越王句踐食不重味衣不重采弔死問疾且欲有所用其眾此人不死必為吳患今越在心腹疾而王不先而務齊不亦謬乎吳王不聽越王率其眾以朝吳厚獻遺之吳王喜唯子胥懼曰是棄吳也諫曰越在心腹今得志於齊猶石田旡所用石田不可耕吳王不聽大怒賜子胥屬鏤之劍以死將死曰樹吾墓上以梓令可以為器抉吾眼置之吳東門以觀越之滅吳也二十三年越敗吳遷夫差於甬道予百家居之吳王曰吾悔不用子胥之言自令陷此遂自剄死史記宋微子世家紂始為象著箕子歎曰彼為象著必為玉柸為柸則必思遠方珍怪之物而御之矣輿馬宮室之漸自此始不可震也紂為淫泆箕子諫不聽人或曰可以去矣箕子曰為人臣諫不聽而去是彰君之惡而自說於民吾不忍為也乃被髮佯狂而為奴遂隱而鼓琴以自悲故傳之曰箕子操史記晉世家靈公壯侈厚斂以彫牆從臺上彈人觀其逃丸者宰夫胹熊蹯不熟靈公怒殺宰夫使婦人持其屍出棄之過朝趙盾隨會前數諫不聽已又見死人手二人前諫隨會先諫不聽靈公患之使鉏麑剌趙盾盾閨門開居處節鉏麑退歎曰殺忠臣棄君命罪一也遂觸樹而死前漢項藉傳項梁再破秦君羽等又殺李由益輕秦有驕色宋義諫曰戰勝而將驕卒惰者敗今少惰矣秦兵日益臣為君畏之梁不聽秦果悉起兵益章邯夜銜枚擊楚大破之梁死前漢伍被傳淮南王陰有邪謀被數微諫後王坐東宮召被欲與計事呼之曰將軍上被曰王安得亡國之言乎昔子胥諫吳王吳王不用迺曰臣今見麋鹿游姑蘇之臺也今臣亦將見宮中生荊棘露霑衣也於是王怒繫被父母囚之前漢梅福傳故京兆尹王章資質忠直敢面引廷爭孝元皇帝擢之以厲具臣而矯曲朝及至陛下戮及妻子且惡惡止其身王章非有反畔之辜而殃及家折直士之節結諫臣之舌群臣皆知其非然不敢爭天下以言為戒最國家之大患也前漢梅福傳臣聞齊桓之時有以九九見者桓公不逆欲以致大也九九筭術若今九曹王章之輩今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩關自鬻繆公行伯繇余歸德今欲致天下之士民有上書求見者輒使詣尚書問其所言言可采取者秩以升斗之祿賜以一束之帛若此則天下之士發憤懣吐忠言嘉謀日聞於上天下條貫國家表裡爛然可睹矣前漢賈山傳雷霆之所擊旡不摧折者萬鈞之所厭旡不麋滅者今人主之威非特雷霆也埶重非特萬鈞也開道而求諫和顏色而受之用其言而顯其身士猶恐懼而不敢日盡又迺況於縱欲恣行暴虐惡聞其過乎後漢申屠剛傳光武嘗欲出游申屠剛以隴蜀未平不宜宴安逸豫諫不見聽遂以頭軔乘輿輪帝遂為止軔謂以頭枝車輪也王逸曰軔止輪木後漢馮豹傳拜豹尚書郎忠勤不懈每奏事未報常俯伏省閣或從昏至明肅宗聞而嘉之使黃門持被覆豹勑令勿驚由是數加賞賜魏鮑勛傳文帝將出游獵勛停車上疏帝手毀其表而競行獵中道頓息問侍臣曰獵之為樂何如八音侍中劉曄對曰獵勝於樂勛抗辭曰夫樂上通神明下和人理隆治致化萬邦咸乂故移風易俗莫善於樂況獵暴華蓋於原野傷生育之至理櫛風沐雨不以時隙哉因奏曄佞諛請有司議罪帝怒作色罷還即出勛為右中郎將晉符堅夫人張氏明辨有才識堅將入寇江左群臣功諫不從張氏進曰妾聞天地之生萬物聖人之御天下莫不順其性故黃帝服牛乘馬皆因其性也禹鑿龍門決洪河因水勢也后稷之播殖百榖因地之氣也湯武之滅夏商因人之欲也是以有因成旡因敗今朝臣上下皆言不可陛下復何所因乎諺云雞夜鳴者不利行師復聞廄馬驚逸武庫兵器有聲吉凶之理願陛下思之堅不從遂大敗於淮南新唐李綱傳綱在東宮太子建成寖狎旡賴猜間朝廷綱頻諫不見聽遂乞骸骨帝罵曰卿為潘仁長史而羞朕尚書耶綱頓首曰潘仁賊也志殘殺然每諫輒止為其長史故旡愧陛下功成厚自伐臣言如持水內石敢久為尚書乎且臣事東宮東宮又與臣忤是以上印綬帝謝曰知公直士幸卒輔吾兒乃拜太子少保新唐贊曰德宗猜忌刻薄以強明自任恥見屈於正論而忘受欺於姦諛故其疑蕭復之輕己謂姜公輔為買直而不能容用盧杞趙贊則至於敗亂而終不悔及奉天之難深自懲艾遂行姑息之政由是朝廷益弱而方鎮愈彊至於唐亡其亂以此箋證史記吳太伯世家七年吳王夫差聞齊景公死而大臣爭寵新君弱乃興師北伐齊子胥諫曰越王句踐食不重味衣不重采弔死問疾且欲有所用其眾此人不死必為吳患今越在腹心疾而王不先而務齊不亦謬乎吳王不聽十一年復北伐齊越王句踐率其眾以朝吳厚獻遺之吳王喜唯子胥懼曰是棄吳也索隱左氏作豢吳豢養也諫曰越在腹心今得志於齊猶石田無所用集解王肅曰石田不可耕吳王不聽使子胥於齊子胥屬其子於齊鮑氏還報吳王吳王聞之大怒賜子胥屬鏤之劍以死將死曰樹吾墓上以梓令可為器抉吾眼置之吳東門以觀越之滅吳也二十三年十一月丁卯越敗吳越王句踐欲遷吳王夫差於甬東予百家居之吳王曰孤老矣不能事君王也吾悔不用子胥之言自令陷此遂自剄死史記宋微子世家紂始為象箸箕子歎曰彼為象箸必為玉桮為桮則必思遠方珍怪之物而御之矣輿馬宮室之漸自此始不可振也紂為淫泆箕子諫不聽人或曰可以去矣箕子曰為人臣諫不聽而去是彰君之惡而自說於民吾不忍為也乃被髮佯狂而為奴遂隱而鼓琴以自悲故傳之曰箕子操史記晉世家靈公壯侈厚斂以彫牆從臺上彈人觀其避丸也宰夫胹熊蹯不熟靈公怒殺宰夫使婦人持其屍出棄之過朝趙盾隨會前數諫不聽已又見死人手二人前諫隨會先諫不聽靈公患之使鉏麑刺趙盾盾閨門開居處節鉏麑退歎曰殺忠臣棄君命罪一也遂觸樹而死漢書項籍傳沛公羽攻定陶定陶未下去西略地至雍丘大破秦軍斬李由還攻外黃外黃未下梁起東阿比至定陶再破秦軍羽等又斬李由益輕秦有驕色宋義諫曰戰勝而將驕卒惰者敗今少惰矣秦兵日益臣為君畏之梁不聽迺使宋義於齊道遇齊使者高陵君顯曰公將見武信君乎曰然義曰臣論武信君軍必敗公徐行則免疾行則及禍秦果悉起兵益章邯夜銜枚擊楚大破之定陶梁死漢書伍被傳伍被楚人也或言其先伍子胥後也被以材能稱為淮南中郎是時淮南王安好術學折節下士招致英雋以百數被為冠首久之淮南王陰有邪謀被數微諫師古曰私諫之後王坐東宮召被欲與計事呼之曰將軍上被曰王安得亡國之言乎昔子胥諫吳王吳王不用迺曰臣今見麋鹿游姑蘇之臺也今臣亦將見宮中生荊棘露霑衣也於是王怒繫被父母囚之漢書梅福傳是時成帝委任大將軍王鳳鳳專埶擅朝而京兆尹王章素忠直譏刺鳳為鳳所誅王氏浸盛災異數見群下莫敢正言福復上書曰故京兆尹王章資質忠直敢面引廷爭孝元皇帝擢之以厲具臣而矯曲朝師古曰具臣具位之臣無益者也矯正也及至陛下戮及妻子且惡惡止其身王章非有反畔之辜而殃及家折直士之節結諫臣之舌群臣皆知其非然不敢爭天下以言為戒最國家之大患也漢書梅福傳是時成帝委任大將軍王鳳鳳專埶擅朝而京兆尹王章素忠直譏刺鳳為鳳所誅王氏浸盛災異數見群下莫敢正言福復上書曰臣聞齊桓之時有以九九見者桓公不逆欲以致大也師古曰九九算術若今九章五曹之輩今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩關自鬻師古曰任鄙力士也繆公行伯繇余歸德師古曰即秦穆公伯讀曰霸繇讀曰由今欲致天下之士民有上書求見者輒使詣尚書問其所言言可采取者秩以升斗之祿賜以一束之帛若此則天下之士發憤懣吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣漢書賈山傳孝文時言治亂之道借秦為諭名曰至言其辭曰雷霆之所擊無不摧折者萬鈞之所壓無不糜滅者今人主之威非特雷霆也埶重非特萬鈞也開道而求諫和顏色而受之用其言而顯其身士猶恐懼而不敢自盡又迺况於縱欲恣行暴虐惡聞其過乎後漢書申屠剛傳光武嘗欲出游剛以隴蜀未平不宜宴安逸豫諫不見聽遂以頭軔乘輿輪帝遂為止軔謂以頭止車輪也王逸注楚辭曰軔止輪木也後漢書馮衍傳附馮豹豹字仲文舉孝廉拜尚書郎忠勤不懈每奏事未報常俯伏省閤或從昏至明肅宗聞而嘉之使黃門持被覆豹勑令勿驚由是數加賞賜卷五十八下案馮豹馮衍子也三國志魏志鮑勛傳鮑勛字叔業泰山平陽人也康元年太祖崩太子即王位勛以駙馬都尉兼侍中文帝受禪勛每陳今之所急唯在軍農寬惠百姓臺榭苑囿宜以為後文帝將出游獵勛停車上疏帝手毀其表而竟行獵中道頓息問侍臣曰獵之為樂何如八音也侍中劉曄對曰獵勝於樂勛抗辭曰夫樂上通神明下和人理隆治致化萬邦咸乂故移風易俗莫善於樂况獵暴華盖於原野傷生育之至理櫛風沐雨不以時隙哉因奏劉曄佞諛不忠阿順陛下過戲之言昔梁邱據取媚於遄臺曄之謂也請有司議罪以清皇朝帝怒作色罷還即出勛為右中郎將晉書烈女列傳苻堅妾張氏苻堅妾張氏不知何許人明辯有才識堅將入寇江左群臣切諫不從張氏進曰妾聞天地之生萬物聖王之馭天下莫不順其性而暢之故黃帝服牛乘馬因其性也禹鑿龍門決洪河因水之勢也后稷之播殖百榖因地之氣也湯武之滅夏商因人之欲也是以有因成無因敗今朝臣上下皆言不可陛下復何所因也書曰天聰明自我民聰明天猶若此况于人主乎妾聞人君有伐國之志者必上觀乾象下採眾祥天道崇遠非妾所知以人事言之未見其可諺言雞夜鳴者不利行師犬群嗥者宮室必空兵動馬驚軍敗不歸秋冬以以每夜群犬大嗥眾雞夜鳴伏聞廄馬驚逸武庫兵器有聲吉凶之理誠非微妾所論願陛下詳而思之堅曰軍旅之事非婦人所豫也遂興兵張氏請從堅果大敗於壽春新唐書李綱傳綱在東宮太子建成尤加禮後太子寖狎亡賴猜間朝廷綱頻諫不見聽遂乞骸骨帝罵曰卿為潘仁長史而羞朕尚書邪綱頓首曰潘仁賊也志殘殺然每諫輒止為其長史故無愧陛下功成厚自伐臣言如持水內石敢久為尚書乎且臣事東宮東宮又與臣忤是以上印綬帝謝曰知公直士幸卒輔吾兒乃拜太子少保新唐書德宗紀贊曰德宗猜忌刻薄以彊明自任恥見屈于正論而忘受欺於姦諛故其疑蕭復之輕已謂姜公輔為賣直而不能容用盧杞趙贊則至於敗亂而終不悔及奉天之難深自懲艾遂行姑息之政由是朝廷益弱而方鎮愈彊至於唐亡其患以此
