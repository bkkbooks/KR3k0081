body:
  text: 卷第七十廉潔第一史記屈原傳屈平之作離騷蓋自怨生也國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之良上稱帝嚳下道齊桓中述武湯以剌世事明道德之廣崇治亂之條貫靡不畢見其文約其辭微其志潔其行廉其稱文小而其指極大舉類邇而見義遠其志潔故其稱物芳其行廉故死而不容自疎濯淖汙泥之中蟬蛻於濁穢以浮游塵埃之外不獲世之滋垢皭然泥而不淄者也推此志也雖與日月爭光可也史記屈原傳行吟澤畔漁父問之屈原曰舉世混濁而我獨清眾人皆醉而我獨醒是以見放浼父曰夫聖人者不凝滯於物而能與世推移舉世混濁何不隨其流而楊其波眾人皆醉何不餔其糟而啜其醨何故懷墐握瑜而自令見放為屈原曰吾聞之新沐者必彈冠新浴者必振衣人又誰能以身之察察受物之汶汶者乎前漢景帝紀二年詔曰人不患其不知患其為詐也不患其不勇患其為暴也不患其不富患其亡厭也其唯廉士寡欲易足今訾筭十以上迺得官古者疾吏之貪衣食足知榮辱限訾十筭迺得為吏十筭十万也賈人有財不得為吏廉士旡訾又不得官故減訾四筭得官矣訾讀與貲同廉士筭不必眾有市籍不得官旡訾又不得官朕甚愍之訾筭四得官亡令廉士久失職前漢儒林傳歐陽地餘元帝即位貴幸至少府戒其子曰我死官屬即送汝財物慎毋受汝九卿儒者子孫以廉潔者可以自成及地餘死少府官屬共送百万其子不授天子文而嘉之前漢尹翁歸傳為政雖任刑清潔自守語不及私前漢董仲舒對策曰公儀子相魯之其家見織帛怒而出其妻食於舍而茹葵慍而拔其葵曰又奪園夫紅女利乎古之賢人君子在列位者皆如是是故下高其行而從其教民化其廉而不貪鄙後漢李恂傳拜謁者使持節領西域副校尉西域豐富多珍寶諸國侍子及督使賈胡督使主蕃國之使也賈故胡之商賈也數遺恂奴婢宛馬金銀香罽之屬一旡所受恂設購賞遂斬虜帥縣首軍門自是道路夷清威恩並行遷武威太守後坐事免去歸鄉里潛居山澤結草為廬獨與諸生織席自給時歲荒司空張敏司徒魯恭等各遣子饋糧悉旡所受徙居新安關下拾橡實以自資後漢孔奮傳為姑臧長隴蜀既平河西守令咸被徵召財貨連轂彌音川澤唯奮旡資單車就路姑臧吏民及羌胡更相謂曰孔君清廉仁賢舉縣蒙恩如何今去不共報德遂相賦斂牛馬器物千萬以上追送數百里奮謝之而已一旡所受後漢向長傳隱居不仕性向中和好通老易貧旡資食好事者更饋焉受之取足而反其餘後漢楊秉傳自為剌史二千石計日受奉餘祿不入私門故吏齋錢百萬遺之閉門不受以廉潔稱晉吳隱之傳廣州包帶山海珍異所出一篋之寶可資數世然多瘴疫人情憚焉唯貧窶不能自立者求補長吏以前後刺史皆多黷貨朝廷欲革嶺南之弊以隱之為廣州刺史未至州二十里地名石門有水曰貪泉飲者懷云胠之欲隱之既至語其親人曰不見可欲使心不亂越嶺喪清吾知之矣乃至泉所酌而飲之因賦詩曰古人云此水一飲懷千金試使夷齋飲終當不易心及在州清操愈厲常食不過菜及乾魚而已帷帳器服皆付外庫時人頗謂其矯然亦始終不易帳下人進魚每剔去骨存肉隱之覺罰而出焉後清節既著詔褒美之晉鄧攸為吳郡大守載米之郡俸祿旡所受唯飲吳水而已在郡刑政清明百姓歡悅為中興良守後稱疾去職郡常有送迎錢數百萬攸去郡不受一錢百姓數千人留牽攸船不得進攸乃小停夜中發去吳人歌之曰紞如打五鼓雞鳴天欲曙鄧侯拖不留謝令推不去百姓詣臺乞留一歲不聽晉陶侃母湛氏初侃父丹娉為妾生侃而陶氏貧賤湛氏每紡績資給之使交結勝已侃少為尋陽吏嘗監魚梁以一坩鮓遺母湛氏封鮓及書責侃曰爾為吏以官物遺我非唯不能益吾乃以增吾憂矣新唐書李勉傳拜嶺南節度使云云五嶺平西南夷舶歲至纔四五譏視苛謹勉既廉絜又不暴征明年至者乃四十餘柁居官久未嘗枚飾器用車服後召歸至石門盡搜家人所蓄犀珍投江中時人謂可繼宋璟盧奐李朝隱部人叩關請立碑頌德代宗許之餘見子孫楊震傳又見奢侈王吉傳又見見得思義鍾離意傳箋證史記屈原列傳屈平正道直行竭忠盡智以事其君讒人間之可謂窮矣信而見疑忠而被謗能無怨乎屈平之作離騷蓋自怨生也國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之矣上稱帝嚳下道齊桓中述湯武以刺世事明道德之廣崇治亂之條貫靡不畢見其文約其辭微其志潔其行廉其稱文小而其指極大舉類邇而見義遠其志潔故其稱物芳其行廉故死而不容自疎濯淖汙泥之中蟬淖於濁穢以浮游塵埃之外不獲世之滋垢皭然泥而不滓者也推此志也雖與日月爭光可也史記屈原列傳屈原至於江濱被髮行吟澤畔顏色憔悴形容枯槁漁父見而問之曰子非三閭大夫歟何故而至此屈原曰舉世混濁而我獨清眾人皆醉而我獨醒是以見放漁父曰夫聖人者不凝滯於物而能與世推移舉世混濁何不隨其流而揚其波眾人皆醉何不餔其糟而啜其醨何故懷瑾握瑜而自令見放為屈原曰吾聞之新沐者必彈冠新浴者必振衣人又誰能以身之察察受物之汶汶者乎漢書景帝紀二年五月詔曰人不患其不知患其為詐也不患其不勇患其為暴也不患其不富患其亡厭也其唯廉士寡欲易足今訾算十以上迺得官服虔曰訾萬錢算百二十七也應劭曰古者疾吏之貪衣食足知榮辱限訾十算迺得為吏十算十萬也賈人有財不得為吏廉士無訾又不得官故減訾四算得官矣師古曰訾讀與貲同他皆類此廉士算不必眾有市籍不得官無訾又不得官朕甚愍之訾算四得官亡令廉士久失職漢書儒林傳歐陽生歐陽生字和伯千乘人也事伏生授兒寬寬授歐陽生子世世相傳至曾孫高子陽為博士師古曰名高字子陽高孫地餘長賓以太子中庶子授太子後為博士論石渠元帝即位地餘侍中貴幸至少府戒其子曰我死官屬即送汝財物慎毋受汝九卿儒者子孫以廉潔著可以自成及地餘死少府官屬共送數百萬宋祁曰越本無數字其子不受天子聞而嘉之漢書尹翁歸傳尹翁歸字子兄師古曰兄讀曰況河東平陽人也徙杜陵翁歸為政雖任刑其在公卿之間清絜自守語不及私漢書董仲舒傳仲舒對曰受祿之家食祿而已不與民爭業然後利可均布而民可家足此上天之理而亦太古之道天子之所宜法以為制大夫之所當循以為行也故公儀子相魯師古曰公儀休之其家見織帛怒而出其妻食於舍而茹葵慍而拔其葵曰吾已食祿又奪園夫紅女利虖師古曰紅讀曰工古之賢人君子在列位者皆如是是故下高其行而從其教民化其廉而不貪鄙後漢書李恂傳恂奉公不阿為憲所奏免後復徵拜謁者使持節領西域副校尉西域殷富多珍寶諸國侍子及督使賈胡督使主蕃國之使也賈胡胡之商賈也數遺恂奴婢宛馬金銀香罽之屬一無所受北匈奴數斷西域車師伊吾隴沙以西使命不得通恂設購賞遂斬虜帥縣首軍門自是道路夷清威恩並行遷武威太守後坐事免步歸鄉里潛居山澤結草為廬獨與諸生織席自給會西羌反叛恂到田舍為所執獲羌素聞其名放遣之恂因詣洛陽謝時歲荒司空張敏司徒魯恭等各遣子饋糧悉無所受徙居新安關下拾橡實以自資後漢書孔奮傳孔奮字君魚扶風茂陵人也建武五年河西大將軍竇融請奮署議曹掾守姑臧長八年賜爵關內侯時天下擾亂唯河西獨安而姑臧稱為富邑通貨羌胡市日四合隴蜀既平河西守令咸被徵召財貨連轂彌竟川澤唯奮無資單車就路姑臧吏民及羌胡更相謂曰孔君清廉仁賢舉縣蒙恩如何今去不共報德遂相賦歛牛馬器物千萬以上追送數百里奮謝之而已一無所受後漢書逸民列傳向長傳向長字子平高士傳向字作尚河內朝歌人也隱居不仕性尚中和好通老易貧無資食好事者更饋焉受之取足而反其餘後漢書楊震傳附子楊秉秉字叔節少傳父業兼明京氏易博通書傳常隱居教授年四十餘乃應司空辟拜侍御史頻出為豫荊徐袞四州刺史遷任城相自為刺史二千石計日受奉餘祿不入私門故吏齎錢百萬遺之閉門不受以廉潔稱晉書良吏列傳吳隱之吳隱之字處默濮陽鄄城人廣州包帶山海珍異所出一篋之寶可資數世然多瘴疫人情憚焉唯貧窶不能自立者求補長史故前後刺史皆多黷貨朝廷欲革嶺南之弊隆安中以隱之為龍驤將軍廣州刺史假節領平越中郎將未至州二十里地名石門有水曰貪泉飲者懷無厭之欲隱之既至語其親人曰不見可欲使心不亂越嶺喪清吾知之矣乃至泉所酌而飲之因賦詩曰古人云此水一歃懷千金試使夷齊飲終當不易心及在州清操踰厲常食不過菜及乾魚而已帷帳器服皆付外庫時人頗謂其矯然亦始終不易帳下人進魚每剔去骨存肉隱之覺其用意罰而黜焉元興初詔曰夫孝行篤於閨門清節厲乎風霜實立人之所難而君子之美致也龍驤將軍廣州刺史吳隱之孝友過人祿均九族菲已絜素儉愈魚飱夫處可欲之地而能不改其操饗唯錯之富而家人不易其服革奢務嗇南域改觀朕有嘉焉晉書良吏列傳鄧攸鄧攸字伯道平陽襄陵人也元帝以攸為太子中庶子時吳郡闕守人多欲之帝以授攸攸載米之郡俸祿無所受唯飲吳水而已攸在郡刑政清明百姓歡悅為中興良守後稱疾去職郡常有送迎錢數百萬攸去郡不受一錢百姓數千人留牽攸船不得進攸乃小停夜中發去吳人歌之曰紞如打五鼓雞鳴天欲曙鄧侯挽不留謝令推不去百姓詣臺乞留一歲不聽晉書烈女列傳陶侃母湛氏陶侃母湛氏豫章新淦人也初侃父丹娉為妾生侃而陶氏貧賤湛氏每紡績資給之使交結勝已侃少為尋陽縣吏嘗監魚梁以一蚶鮓遺母湛氏封鮓及書責侃曰爾為吏以官物遺我非唯不能益吾乃以增吾憂矣新唐書宗室宰相列傳李勉尋拜嶺南節度使番禺賊馮崇道桂叛將朱濟時等負險為亂殘十餘州勉遣將李觀率容州刺史王翃討斬之五嶺平西南夷舶歲至纔四五譏視苛謹勉既廉潔又不暴征明年至者乃四千餘柁居官久未嘗枚飾器用車服後召歸至石門盡搜家人所蓄犀珍投江中時人謂可繼宋璟盧奐李朝隱部人叩闕請立碑頌德代宗許之廉忠第二史記周公世家季文子卒家旡衣帛之妾廄無食粟之馬府旡金王以相三君君子曰季文子廉忠矣前漢衛綰傳土以為廉忠實旡它腸乃拜綰為河間王太傅內無他惡箋證史記魯周公世家季文子卒家無衣帛之妾廄無食粟之馬府無金玉以相三君索隱宣成襄也君子曰季文子廉忠矣漢書衛綰傳衛綰代大陵人也以戲車為郎事文帝上以為廉忠實無它腸師古曰心腸之內無它惡宋祁云一本它作心乃拜綰為河間王太傅廉儉第三前漢朱博傳博為人廉儉不好酒色游宴自微賤至富貴食不重味案上不過三桮前漢陳萬年傳咸三公子少顯名於朝廷而薛宣朱博翟方進孔光等仕官絕在咸後皆以廉儉先至公卿而咸滯於郡守後漢祭遵傳為人廉約小心克己奉公賞賜輒盡與士卒家旡私財身衣韋絝布被夫人裳不加緣帝重焉後漢祭彤傳在遼東幾三十年衣旡兼副顯宗既嘉其功又美彤清約拜日賜錢百萬馬三匹衣被刀劍下至居室什物大小旡不悉備箋證漢書朱博傳博為人廉儉不好酒色游宴自微賤至富貴食不重味案上不過三桮漢書陳萬年傳子咸字子康年十八以萬年任為郎有異材抗直咸三公子少顯名於朝廷而薛宣朱博翟方進孔光等仕宦絕在咸後皆以廉儉先至公卿而咸滯於郡守後漢書祭遵傳祭遵字弟孫潁川潁陽人也遵為人廉約小心克己奉公賞賜輒盡與士卒家無私財身衣韋絝布被夫人裳不加緣帝以是重焉緣或作綵祭遵傳附從弟祭彤彤字次孫早孤以至孝見稱彤在遼東幾三十年衣無兼副顯宗既嘉其功又美彤清約拜日賜錢百萬馬三匹衣被刀劍下至居室什物大小無不悉備節儉第四史記晏平仲傳事齊以節儉力行重於齊既相齊食不重肉妾不衣帛史記堯之有天下也堂高三尺采椽不斲茅茨不翦前漢文帝紀贊曰孝文皇帝即位三十三年宮室苑囿車騎服御旡所增益有不便輒弛以利民嘗欲作露臺召匠計之直百金上曰百金中人十家之產也吾奉先帝宮室常恐羞之何以臺為身衣弋綈所幸慎夫人衣不曳地帷帳旡文繡以示敦朴為天下先前漢蕭何傳何賈田宅必居窮辟處為家不治垣屋曰令後世賢師吾儉不賢毋為埶家所奪前漢董仲舒傳對策曰孔子曰奢則不遜儉則固儉非聖人之中制也前漢藝文志墨家者流蓋出於清廟之守茅屋采掾是以貴儉前漢司馬遷傳強本節用則人給家足此墨子之所長雖百家不能廢也前漢王吉傳上疏曰去角抵減樂府省尚方明視天下以儉民見儉則歸本本立而末成後漢宣秉傳字巨公秉性節約常服布被蔬食瓦器帝嘗幸其府舍見而嘆曰楚國二龔不如雲陽宣巨公即賜布帛帷帳什物後漢王良傳良代宣秉為大司徒司直在位恭儉妻子不入官舍布被瓦器時司徒史鮑恢以事到東海過候其家而良妻布裙曳柴從田中歸恢告曰我司徒史也故來受書欲見夫人妻曰妾是也苦椽旡書椽即謂鮑恢司徒之椽史也言勞苦相過更無書信恢乃下拜歎息而還聞者莫不嘉之後漢宣秉王良傳論曰夫利仁者或借仁以從利體義者不期體以合義季文子妾人衣帛魯人以為美談公孫洪身服布被汲黯譏其多詐事實未殊而譽毀別議何也將體之與利之異乎宣秉王良處位優重而秉甘疏薄良妻荷薪可謂行過乎儉然當世咨其清人君高其節豈非臨之以誠哉後漢翟酺傳夫儉德之恭政存約節故文帝愛百金於露臺飾帷帳於皁囊或有譏其儉者上曰朕為火下守財耳豈得妄用之哉至倉榖腐而不可食錢貫朽而不可校後漢劉虞傳拜幽州牧雖為上公天性節約敝衣繩履食旡兼肉遠近豪俊夙僣奢者莫不改操而歸心焉晉武紀承魏氏奢侈乃勵以恭儉有司嘗奏御牛青絲紖斷詔以青麻代之晉元帝紀有司嘗奏太極殿廣室施絳帳帝曰漢文集上書皁囊為帷遂令冬施青布夏施青綀帷帳將拜貴人有司請市雀釵帝以煩費不許所幸鄭貴人衣旡文綵晉成帝紀頗留心萬機務在簡約嘗欲於後園作射堂計用四十金以勞費乃止雄武之度雖有媿於前正恭儉之德足追蹤於往烈矣晉高密文獻王泰傳泰性廉靜不近聲色雖為宰輔食大國之租服餘肴膳如布衣寒士任真簡率每朝會不識者不知其王公也新唐楊行密傳贊曰行密興賤微及得志仁怒善御眾治身節儉旡大過失可謂賢矣新唐書王珪傳珪薄於自奉獨不作家廟四持祭於寢為有司所劾帝為立廟媿之不罪也世以珪儉不中禮少之新唐楊綰傳綰儉約末嘗問生事祿稟分姻舊隨多寡輒盡云云始輔政御史中丞崔寬本豪侈城南別墅池觀堂皇為當時第一即日遣人毀之京兆尹黎幹出入從騶馭百數省損才留十餘騎中書令郭子儀在邠州行營方大會除書至音樂散五之四它聞風靡然自化者不可勝紀世以比楊震山濤謝安云卷第六十六至七十卷第七十一箋證史記晏平仲列傳晏平仲嬰者萊之夷維人也集解駰案劉向別錄曰萊者今東萊地也索隱名嬰平謚仲字父桓子名弱也事齊靈公莊公景公以節儉力行重於齊既相齊食不重肉妾不衣帛史記李斯列傳李斯曰吾有私議而有所聞於韓子也曰堯之有天下也堂高三尺采椽不斲茅茨不翦雖逆旅之宿不勤於此矣又韓非子五蠹堯之王天下也茅茨不翦采椽不斲糲粢之食藜藿之羹冬日麑裘夏日葛衣雖監門之服養不虧於此矣漢書文帝紀贊曰孝文皇帝即位二十三年宮室苑囿車騎服御無所增益有不便輒弛以利民師古曰弛廢嘗欲作露臺召匠計之直百金上曰百金中人十家之產也吾奉先帝宮室嘗恐羞之何以臺為身衣弋綈所幸慎夫人衣不曳地帷帳無文繡以示敦朴為天下先漢書蕭何傳何買田宅必居窮辟處為家不治垣屋曰令後世賢師吾儉不賢毋為埶家所奪漢書董仲舒傳故孔子曰奢則不遜儉則固儉非聖人之中制也漢書藝文志墨家者流蓋出於清廟之守茅屋采椽是以貴儉漢書司馬遷傳乃論六家之要指曰彊本節用則人給家足之道也此墨子之所長雖百家不能廢也漢書王吉傳又言去角抵減樂府省尚方師古曰尚方主巧作明視天下以儉師古曰視讀曰示古者工不造琱瑑商不通侈靡非工商之獨賢政教使之然也民見儉則歸本本立而末成後漢書宣秉傳宣秉字巨公馮翊雲陽人也少修高節顯名三輔秉性節約常服布被蔬食瓦器帝嘗幸其府舍見而歎曰楚國二龔不如雲陽宣巨公即賜布帛帳帷什物後漢書王良傳王良字仲子東海蘭陵人也徵拜太中大夫六年代宣秉為大司徒司直在位恭儉妻子不入官舍布被瓦器時司徒史鮑恢以事到東海過候其家而良妻布裙曳柴自田中歸恢告曰我司徒史也故來受書欲見夫人妻曰妾是也苦掾無書掾即謂鮑恢司徒之掾史也言勞苦相過更無書信恢乃下拜歎息而還聞者莫不嘉之後漢書宣秉王良傳論曰夫利仁者或借仁以從利體義者不期體以合義季文子妾不衣帛魯人以為美談公孫弘身服布被汲黯譏其多詐事實未殊而譽毀別議何也將體之與利之異乎宣秉王良處位優重而秉甘疏薄良妻荷薪可謂行過乎儉然當世咨其清人君高其節豈非臨之以誠哉後漢書翟酺傳翟酺字子超廣漢雒人也時安帝始親政事追感祖母宋貴人悉封其家又元舅耿寶及皇后兄弟閻顯等並用威權酺上疏諫曰夫儉德之恭政存約節故文帝愛百金於露臺飾帷帳於皁囊或有譏其儉者上曰朕為天下守財耳豈得妄用之哉至倉榖腐而不可食錢貫朽而不可校後漢書劉虞傳初舉孝廉稍遷幽州刺史復拜幽州牧虞雖為上公天性節約敝衣繩履食無兼肉遠近豪俊夙僭奢者莫不改操而歸心焉晉書武帝紀帝宇量弘厚造次必於仁恕承魏氏奢侈刻弊之後百姓思古之遺風乃厲以恭儉敦以寡慾有司嘗奏御牛青絲紖斷詔以青麻代之晉書元帝紀帝性簡儉冲素容納直言虛己待物初鎮江東頗以酒廢事王導深以為言帝命酌引觴覆之於此遂絕有司嘗奏太極殿廣室施絳帳帝曰漢文集上書皁囊為帷遂令冬施青布夏施青綀帷帳將拜貴人有司請市雀釵帝以煩費不許所幸鄭夫人衣無文綵晉書成帝紀帝少而聰敏有成人之量少為舅氏所制不親庶政及長頗留心萬機務在簡約常欲於後園作射堂計用四十金以勞費乃止雄武之度雖有愧於前王恭儉之德足追蹤於前烈矣晉書宗室列傳高密文獻王泰泰性廉靜不近聲色雖為宰輔食大國之租服飾肴膳如布衣寒士任真簡率每朝會不識者不知其王公也新唐書楊行密傳贊曰行密興賤微及得志仁恕善御眾治身節儉無大過失可謂賢矣新唐書王珪傳珪少孤且貧乏或饋遺初無讓及貴厚報之薄於自奉獨不作家廟四時祭于寢為有司所劾帝為立廟媿之不罪也世以珪儉不中禮少之新唐書楊綰傳綰儉約未嘗問生事祿稟分姻舊隨多寡輒盡始輔政御史中丞崔寬本豪侈城南別墅池觀堂皇為當時第一即日遣人毀之京兆尹黎幹出入從騶馭百數省損才留十餘騎中書令郭子儀在邠州行營方大會除書至音樂散五之四它聞風靡然自化者不可勝紀世以比楊震山濤謝安云
