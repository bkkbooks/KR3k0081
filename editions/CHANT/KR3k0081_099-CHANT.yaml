body:
  text: 卷第九十九九流第一前漢司馬遷傳太史公仕於建元元封之間愍學者不達其意而師誖乃論六家之要指曰易大傳曰天下一致而百慮同歸而殊塗夫陰陽儒墨名法道德此務為治者也陰陽之術大詳而眾忌諱使人拘而多畏然其敘四時之大順不可失也儒者博而寡要勞而少功是以其事難盡從然其敘君臣父子之禮列夫婦長幼之別不可易也墨者儉而難遵是以其事不可徧循然其彊本節用不可廢也法家嚴而少恩然其正君臣上下之分不可改也名家使人儉而善失真然其正名實不可不察也道家使人精神專一動合無形澹足萬物其為術也因陰陽之大順采儒墨之善撮名法之要與時遷徙應物變化立俗施事無所不宜指約而易操事小而功多儒者則不然以為人主天下之儀表也君唱臣和主先臣隨如此則主勞而臣佚至於大道之要去健羨黜聰明釋此而任術夫神大用則竭形大勞則敝神形蚤衰欲與天地長久非所聞也夫陰陽四時八位十三度二十四節各有教令曰順之者昌逆之者亡未必然也故曰使人拘而多畏夫春生夏長秋收冬藏此天道之大經也弗順則無以為天下紀綱故曰四時之大順不可失也夫儒者以六蓺為法六蓺經傳以千万數累世不能通其學當年不能究其禮故曰博而寡要勞而少功若夫列君臣父子之禮序夫婦長幼之別雖百家弗能易也墨者亦上堯舜言其德行曰堂高三尺土階三等茅茨不翦棌椽不斲飯土簋歠土刑糲梁之食藜藿之羹夏日葛衣冬日鹿裘其送死桐棺三寸舉音不盡其哀教喪禮必以此為萬民率故天下法若此則尊卑無別也夫世異時移事業不必同故曰儉而難遵也要曰彊本節用則人給家足之道也此墨子之所長雖百家不能廢也法家不別親疏不殊貴賤壹斷於法則親親尊尊之恩絕矣可以行一時之計而不可長用也故曰嚴而少恩若尊主卑臣明分職不得相踰越雖百家不能改也名家苛察繳繞使人不得反其意剸決於名時失人情故曰使人儉而善失真若夫控名責實參伍不失此不可不察也道家無為又曰無不為其實易行其辭難知其術以虛無為本以因循為用無成勢無常形故能究万物之情不為物先後故能為万物主有法無法因時為業有度無度因物興舍故曰聖人不巧時變是守虛者道之常也因者君之綱也群臣並至使各自明也其實中其聲者謂之端實不中其聲者謂之款款言不聽姦迺不生賢不肖自分白黑迺形在所欲用耳何事不成迺合大道混混冥冥光燿天下復反無名凡人所生者神也所託者形也神大用則竭形大勞則敝形神離則死死者不可復生離者不可復合故聖人重之由此觀之神者生之本形者生之具不先定其神形而曰我有以治天下何由哉前漢蓺文志諸子十家其可觀者九家而已皆起於王道既微諸侯力政時君世主好惡殊方是以九家之術蠭出並作各引一端崇其所善以此馳說取合諸侯其言雖殊譬猶水火相滅亦相生也仁之與義恭之與和相反而皆相成也易曰天下同歸而殊塗一致而百慮今異家者各推所長窮知究慮以明其指雖有蔽短合其要歸亦六經之支與流裔使其人遭明王聖主得其所折中皆股肱之材已仲尼有言禮失而求諸野方今去聖久遠道術缺廢無所更索彼九家者不猶瘉於野乎若能修六蓺之術而觀此九家之言舍短取長則可以通万方之略矣箋證漢書司馬遷傳太史公學天官於唐都受易於楊何習道論於黃子太史公仕於建元元封之間愍學者不達其意而師誖乃論六家之要指曰易大傳曰天下一致而百慮同歸而殊塗夫陰陽儒墨名法道德此務為治者也直所從言之異路有省不省耳嘗竊觀陰陽之術大詳而眾忌諱使人拘而多畏然其序四時之大順不可失也儒者博而寡要勞而少功是以其事難盡從然其敘君臣父子之禮列夫婦長幼之別不可易也墨者儉而難遵是以其事不可徧循然其彊本節用不可廢也法家嚴而少恩然其正君臣上下之分不可改也名家使人儉而善失真然其正名實不可不察也道家使人精神專一動合無形澹足萬物其為術也因陰陽之大順采儒墨之善撮名法之要與時遷徙應物變化立俗施事無所不宜指約而易操事少而功多儒者則不然以為人主天下之儀表也君唱臣和主先臣隨如此則主勞而臣佚至於大道之要去健羨黜聰明釋此而任術夫神大用則竭形大勞則敝神形蚤衰欲與天地長久非所聞也夫陰陽四時八位十二度二十四節各有教令曰順之者昌逆之者亡未必然也故曰使人拘而多畏夫春生夏長秋收冬臧此天道之大經也弗順則無以為天下紀綱故曰四時之大順不可失也夫儒者以六蓺為法六蓺經傳以千万數累世不能通其學當年不能究其禮故曰博而寡要勞而少功若夫列君臣父子之禮序夫婦長幼之別雖百家弗能易也墨者亦上堯舜言其德行曰堂高三尺土階三等茅茨不翦棌椽不斲飯土簋歠土刑糲粱之食藜藿之羹夏日葛衣冬日鹿裘其送死桐棺三寸舉音不盡其哀教喪禮必以此為萬民率故天下共若此則尊卑無別也夫世異時移事業不必同故曰儉而難遵也要曰彊本節用則人給家足之道也此墨子之所長雖百家不能廢也法家不別親疏不殊貴賤壹斷於法則親親尊尊之恩絕矣可以行一時之計而不可長用也故曰嚴而少恩若尊主卑臣明分職不得相踰越雖百家不能改也名家苛察繳繞使人不得反其意剸決於名時失人情故曰使人儉而善失真若夫控名責實參伍不失此不可不察也道家無為又曰無不為其實易行其辭難知其術以虛無為本以因循為用無成勢無常形故能究萬物之情不為物先後故能為萬物主有法無法因時為業有度無度因物興舍故曰聖人不巧時變是守虛者道之常也因者君之綱也群臣並至使各自明也其實中其聲者謂之端實不中其聲者謂之款款言不聽姦乃不生賢不肖自分黑白乃形在所欲用耳何事不成乃合大道混混冥冥光燿天下復反無名凡人所生者神也所託者形也神大用則竭形大勞則敝形神離則死死者不可復生離者不可復合故聖人重之由此觀之神者生之本形者生之具不先定其神形而曰我有以治天下何由哉漢書蓺文志諸子十家其可觀者九家而已皆起於王道隱微諸侯力政時君世主好惡殊方是以九家之術蠭出並作各引一端崇其所善以此馳說取合諸侯其言雖殊辟猶水火相滅亦相生也仁之與義敬之與和相反而皆相成也易曰天下同歸而殊塗一致而百慮今異家者各推所長窮知究慮以明其指雖有蔽短合其要歸亦六經之支與流裔使其人遭明王聖主得其所折中皆股肱之材已仲尼有言禮失而求諸野方今去聖久遠道術缺廢無所更索彼九家者不猶瘉於野乎若能修六蓺之術而觀此九家之言舍短取長則可以通萬方之略矣黃老弟二史記老子傳世之學老子者則絀儒學儒學亦絀老子道不同不相為謀豈謂是邪李耳無為自化清靜自正前漢田蚡傳竇太后好黃老言而嬰竇嬰蚡趙綰等務隆推儒術貶道家言竇太后滋不說前漢儒林傳竇太后好老子書召問固固曰此家人言矣太后怒迺使固入圈擊彘上知太后怒而固直言無辠迺假固利兵下固刺彘正中其心彘應手而到太后默然亡以復辠後上以固廉直拜為清河太傅前漢楚元王傳少脩黃老術有智略數言事召見甘泉宮武帝謂之千里駒言若駿馬可致千里也年齒幼少故謂之駒前漢敘傳嗣雖脩儒學然貴老嚴之術桓生欲借其書嗣報曰若夫嚴子者絕聖棄智修生保真清虛澹泊歸之自然獨師友造化而不為世俗所役者也漁釣於一壑則万物不姦其志栖遲於一丘則天下不易其樂不絓音掛聖人之罔不嗅驕君之餌蕩然肆志談者不得而名焉故可貴也今吾子已貫仁誼之羈絆繫名聲之韁鎖伏周孔之軌躅馳顏閔之極摯既繫攣於世教矣何用大道為自昡曜昔有學步於邯鄲者曾未得其髣髣又復失其故步遂匍匐而歸耳恐似此類故不進嗣之行已持論如此晉向秀傳好老莊之學莊周著內外數十篇歷世才士雖有覲者莫適論其旨統也秀乃為之隱解發明奇趣振起玄風讀之者超然心悟惠帝之世郭象又述而廣之儒墨之跡見鄙道家之言遂盛焉晉陸雲傳初雲嘗行逗宿故人家夜闇迷路莫知所從忽望草中有火光於是趣之至一家便寄宿見一年少美風姿共談老子辭致深遠向曉辭去行十許里至故人家云此數十里中無人居雲意始悟卻尋昨宿處乃王弼冢雲本無玄學自此談老殊進新唐宗室傳讓皇帝憲傳玄宗以書賜憲等曰魏文帝詩西山一何高高高殊無極上有兩僊童不飲亦不食賜我一丸藥光耀有五色服之四五日身體生羽翼朕每言服藥求羽翼寧如兄弟天生之羽翼乎新唐吳筠傳玄宗遣使召見與語甚悅敕待詔翰林帝嘗聞道對曰深於道者無知老子五千文其餘徒喪紙札耳復問神仙治鍊法對曰此野人事積歲月求之非人主宜留意新唐李泌傳開元十六年悉召能言佛道者相答難禁中新唐房琯傳琯有遠器好談老子浮屠法不切事故功名隳損云新唐李抱真傳抱真好方士謂不死可致有孫季長者為治丹且曰服此當僊去抱真表署幕府嘗語左右曰秦漢君不偶此我乃得之後秋天不復見公等矣夜夢駕鶴寤而刻寓鶴衣羽服習乘之後益感餌丹三万九不能食且死新唐李佖傳天寶中召講老子有法餘見著書老子傳并莊周韓非傳又見治道清淨曹參傳箋證史記老子傳世之學老子者則絀儒學儒學亦絀老子道不同不相為謀豈謂是邪李耳無為自化清靜自正漢書田蚡傳諸外家為列侯列侯多尚公主皆不欲救國以故毀日至竇太后太后好黃老言而嬰竇嬰蚡趙綰等務隆推儒術貶道家言是以竇太后滋不說漢書儒林傳竇太后好老子書召問固固曰此家人言耳太后怒曰安得司空城旦書乎乃使固入圈擊彘上知太后怒而固直言無辠乃假固利兵下固刺彘正中其心彘應手而倒太后默然亡以復辠後上以固廉直拜為清河太傅疾免漢書楚元王傳德字路叔少修黃老術有智略少時數言事召見甘泉宮武帝謂之千里駒師古曰言若駿馬可致千里也年齒幼少故謂之駒漢書敘傳嗣雖修儒學然貴老嚴之術桓生欲借其書嗣報曰若夫嚴子者絕聖棄智修生保真清虛澹泊歸之自然獨師友造化而不為世俗所役者也漁釣於一壑則万物不奸其志栖遲於一丘則天下不易其樂不絓音掛聖人之罔不嗅驕君之餌蕩然肆志談者不得而名焉故可貴也今吾子已貫仁誼之羈絆繫名聲之韁鎖伏周孔之軌躅馳顏閔之極摯既繫攣於世教矣何用大道為自昡曜昔有學步於邯鄲者曾未得其髣髴又復失其故步遂匍匐而歸耳恐似此類故不進嗣之行已持論如此晉書向秀傳向秀字子期河內懷人也清悟有遠識少為山濤所知雅好老莊之學莊周著內外數十篇歷世才士雖有覲者莫適論其旨統也秀乃為之隱解發明奇趣振起玄風讀之者超然心悟莫不自足一時也惠帝之世郭象又述而廣之儒墨之迹見鄙道家之言遂盛焉晉書陸雲傳初雲嘗行逗宿故人家夜暗迷路莫知所從忽望草中有火光於是趣之至一家便寄宿見一年少美風姿共談老子辭致深遠向曉辭去行十許里至故人家云此數十里中無人居雲意始悟卻尋昨宿處乃王弼冢雲本無玄學自此談老殊進新唐書宗室傳讓皇帝憲傳玄宗憲尤謹畏未嘗干政而與人交帝益信重嘗以書賜憲等曰魏文帝詩西山一何高高高殊無極上有兩仙童不飲亦不食賜我一丸藥光耀有五色服之四五日身體生羽翼朕每言服藥求羽翼寧如兄弟天生之羽翼乎新唐書吳筠傳玄宗遣使召見大同殿與語甚悅敕待詔翰林獻玄綱三篇帝嘗問道對曰深於道者無如老子五千文其餘徒喪紙札耳復問神仙冶鍊法對曰此野人事積歲月求之非人主宜留意新唐書李泌傳李泌字長源魏八柱國弼六世孫徙居京兆七歲知為文玄宗開元十六年悉召能言佛道孔子者相答難禁中新唐書房琯傳琯有遠器好談老子浮屠法喜賓客高談有餘而不切事故功名隳損云新唐書李抱真傳抱真好方士謂不死可致有孫季長者為治丹且曰服此當僊去抱真表署幕府嘗語左右曰秦漢君不偶此我乃得之後升天不復見公等矣夜夢駕鶴寤而刻寓鶴衣羽服習乘之後益惑厭勝因疾請降官七讓司空還為左僕射餌丹二萬丸不能食且死醫以彘肪穀漆下之新唐書李泌傳天寶中詣闕獻復明堂九鼎議帝憶其早惠召講老子有法得待詔翰林仍供奉東宮皇太子遇之厚釋老第三後漢襄楷傳上疏曰又聞宮中立黃老浮屠之祠此道清虛貴尚無為好生惡殺省慾去奢今陛下嗜欲不去殺罰過理既乖其道豈獲其祚哉或言老子入夷狄為浮屠浮屠不三宿桑下不欲久生恩愛精之至也天神遺以好女浮屠曰此但革囊盛血遂不眄之其守一如此乃能成道今陛下婬女艷婦極天下之麗甘肥飲美單天下之味奈何欲如黃老乎後漢孝桓紀論設華蓋以祠浮圖老子浮圖今佛也續漢志曰祠老子於濯龍宮文罽為壇飾淳金銘器設華蓋之座用郊天樂新唐楊琯傳琯有遠志好談老子浮圖箋證後漢書襄楷傳上疏曰又聞宮中立黃老浮屠之祠此道清虛貴尚無為好生惡殺省慾去奢今陛下嗜慾不去殺罰過理既乖其道豈獲其祚哉或言老子入夷狄為浮屠浮屠不三宿桑下不欲久生恩愛精之至也天神遺以好女浮屠曰此但革囊盛血遂不眄之其守一如此乃能成道今陛下婬女艷婦極天下之麗甘肥飲美單天下之味奈何欲如黃老乎後漢書孝桓紀論曰前史稱桓帝好音樂善琴笙飾芳林而考濯龍之宮設華蓋以祠浮圖老子斯將所謂聽於神乎浮圖今佛也續漢志曰祀老子於濯龍宮文罽為壇飾淳金銀器設華蓋之坐用郊天樂新唐書房琯傳琯有遠器好談老子浮屠法喜賓客高談有餘而不切事
