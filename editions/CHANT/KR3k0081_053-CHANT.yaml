body:
  text: 卷第五十三著書第一史記孔子世家孔子生鯉字伯魚伯魚生伋字子思嘗困於宋子思作中庸史記孟軻傳天下方務於合從連衡以攻伐為賢而孟軻乃述三代唐虞之德是以所如者不合退而與萬章之徒序詩書述仲尼之意作孟子七篇史記荀卿傳荀卿嫉濁世之政不遂大道而營於巫祝信機祥鄙儒小拘如莊周等又滑稽亂俗於是推儒墨道德之行事興壞列序著數萬言史記老子傳令尹喜曰子將隱矣強為我著書於是老子迺著書上下篇言道德之意五十餘言而去莫知其所終史記莊周傳周其學旡所不闚然其要本歸於老子之言故其著書十餘萬言大坻率寓言也史記韓非傳喜刑名法術之學而其歸本於黃老非為人口吃不能道說而善著書與李斯俱仕荀卿史記太史公自序曰昔周伯拘久里演周易孔子產陳蔡作春秋屈原放逐著離騷左丘失明厥有國語孫子臏腳而論兵法不韋遷蜀世傳呂覽韓非囚秦說難孤憤詩三百篇大抵賢聖發憤之所為作也此人皆意有所鬱結不得通其道也前漢儒林傳韓嬰推詩人之意而作內外傳數萬言其語頗與齊魯間殊然歸一也前漢蒯通傳通論戰國時說士權變亦自序其說凡八十一首號曰雋永雋音字兗反肥肉也永長也言其所論甘美而義深長也前漢董仲舒傳仲舒所著皆明經術之意及上疏條教凡百二十三篇而說春秋事得失聞舉玉杯蕃露清明竹林之屬皆所著書名也復數十篇十餘萬言前漢賈山傳孝文時言治亂之道借秦為諭名曰至言前漢淮南王安傳為人好書鼓琴不喜弋獵狗馬馳騁亦欲以行陰德拊循百姓流名譽招致賓客方術之士數千人作為內書二十一篇外書甚眾又有中篇八卷言神仙黃白之術亦二十餘萬言時武帝方好藝文以安屬為諸父辯博善為文辭甚尊重之前漢司馬遷傳太史公曰予死爾必為太史毋忘吾所欲諭著矣太史而不論載廢天下之文予甚懼焉爾其念哉遷俯首流涕曰小子不敏請悉論先人所次舊文不敢闕前漢劉向傳采傳記行事著新序說苑凡五十篇奏之前漢劉向傳贊曰劉氏洪範論發明大傳著天人之應七略剖判蓺文總百家之緒三統歷譜者日月五星之度有意其推本之也言其究極根本深有意也後漢班固傳父彪卒歸鄉里固以彪所續前史未詳乃潛精研思欲就其業既而有人上書顯宗告固私改作國史者有詔下郡收固繫京兆獄盡取其家書先是扶風人蘇明偽言圖讖事下獄死固弟超恐固為郡所覈考不能自明乃馳詣闕上書得召見具言故所著述意而郡亦上其書顯宗甚奇之召詣校書郎除蘭臺令史與陳宗尹敏孟異共成世祖本紀帝乃復使終成前所著書固以為漢紹堯運以建帝業至於六世史臣乃追述功德私作本紀編於百王之未廁於秦項之列太初以後闕而不錄故探撰前記綴集所聞以為漢書後漢王符傳自和安之後游宦當塗者更相薦引而符獨耿介不同於俗遂不得升進乃隱居著書三十餘篇以譏當時失得不欲章顯其明故號曰潛夫論其指訐時短討讁物情訐攻也讁責也足以觀見當時風政後漢仲長統傳每論說古今及時俗行事恒發憤歎息因著論名曰昌言凡三十四篇後漢王充傳充好論說始若詭異終有理實以為俗儒守文多失其真乃閉門潛思絕慶弔之禮戶牖牆壁各置刀筆著論衡八十五篇釋物類同異正時俗嫌疑後漢崔寔傳能明政體吏才有餘論當世便事數十條名曰政論指切時要言辯而確確堅正也當世稱之仲長統曰凡為人主宜寫一通置之坐側論曰政論言當世理亂雖鼂錯之徒不能過也後漢荀悅傳帝好典籍常以班固漢書文煩難省乃令荀悅依左氏傳體以為漢紀三十篇詔尚書給筆札辭約事詳論辨多美後漢鄭康成傳注周易尚書毛詩儀禮禮記論語孝經尚書大傳中侯乾象歷又著天文七政論魯禮禘祫義六蓺論毛詩譜駮許慎五經異義答臨孝存周禮難凡百餘萬言玄質於辭訓通人頗譏其繁後漢鄭康成傳時何休好公羊學遂著公羊墨守左氏膏肓榖梁廢疾康成乃發墨守鍼膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我乎蜀李譔傳著古文易尚書毛詩三禮左傳太淵指歸皆依準賈馬異於鄭康成與王氏殊隔初不見其所述而意歸多同晉杜預傳立功之後從容旡事乃耽思經籍為春秋左氏經傳集解又參考眾家譜弟謂之釋例又作盟會圖春秋長歷備成一家之學晉習鑿齒傳著漢晉春秋起漢光武終於晉愍帝於三國之時蜀以宗室為正魏武雖受漢禪晉尚為篡逆至文帝平蜀乃為漢亡而晉始興焉引世祖諱炎興而為禪授明天心不可以勢力彊也凡五十四卷晉王沉傳與荀顗阮籍共撰魏書多為時諱未若陳壽之實錄也晉陳壽傳撰魏吳蜀三國志凡六十五篇時人稱其善敘事有良史才夏侯湛時著魏書見壽所作便壞己書而罷張華深善之謂壽曰當以晉書相付耳或云丁儀丁廙有盛名於魏壽謂其子曰可覓千斛米當為尊公作佳傳丁不與之竟不為立傳壽父為馬謖參軍謖為諸葛亮所誅壽父亦坐被髡由是怨亮諸葛瞻又輕壽壽為亮立傳言亮將略非長無應變之才言瞻唯工書名過其實議者以此少之晉司馬彪以漢氏中興訖于建安忠臣義士亦以昭著而時旡良史記述煩雜安順以下亡鈌者多彪乃討論眾書起於世祖終於孝獻編年二百錄世十二凡八十一篇號曰續漢書晉華嶠傳為秘書監以漢紀煩穢慨然有改作之意會為臺郎典官制事由是得徧觀祕籍遂就其緒起于光武終於孝獻一百九十五年為帝紀十二卷皇后紀二卷十典十卷傳七十卷及三譜序傳曰錄凡九十七卷嶠以皇后配天作合前史作外戚傳以繼未編非其義也故易為皇后紀以次帝紀又改志為典以有堯典故也而改名漢後書奏之詔朝臣會議時荀勗和嶠張華王濟咸以嶠文質事核有遷固之規實錄之風藏之祕府新唐令狐德棻始請重購求天下遺書置吏補錄不數年圖典略備又建言近代無正史梁陳齊文籍猶可據至周隋事多脫捐今耳目尚相及史有所馮一易世事皆汩暗無所掇拾陛下受禪于隋隋承周二祖功業多在周今不論次各為一王史則先列世庸無光明後旡傳焉帝謂然於是詔中書令蕭瑀給事中王敬業著作郎殷聞禮主魏中書令封德彝舍人顏師古主隋大理卿崔善為中書舍人孔紹安太子洗馬蕭德言主梁太子詹事裴矩吏部郎中祖孝孫祕書丞魏徵主齊祕書監竇璡給事中歐陽詢文學姚思廉主陳侍中陳叔達太史令庾儉及德棻主周整扼論譔多歷年不能就罷之正觀三年復詔譔定議者以魏有魏收魏澹二家書而已詳惟五家史當立德棻更與祕書郎岑文本殿中侍御史崔仁師次周史中書舍人李百藥次齊史姚思廉次梁陳二史魏徵次隋史房玄齡總監修撰之原自德棻發之新唐孔頴達傳與顏師古司馬才章王恭王琰等諸儒受詔撰定五經義訓凡百餘篇號義贊詔改為正義新唐王勃字子安絳州龍門人六歲善文辭九歲得顏師古所注漢書讀之作指瑕以擿其失新唐藝文志贊曰夫王跡熄而詩亡離騷作而文辭之士興歷代盛衰文章與時高下然其變態百出不可窮極何其多也自漢以來史官列其名氏篇第以為六藝大種七略至唐始分為四類曰經史子集而藏書之盛於開元其著錄者五萬三千九百一十五卷而唐之學者自為之書者又二萬八千四百六十九卷鳴呼可謂盛矣離婁章句下離婁章句下餘見不與民爭利公孫賀傳箋證史記孔子世家孔子生鯉字伯魚伯魚年五十先孔子死伯魚生伋字子思年六十二嘗困於宋子思作中庸史記孟子列傳天下方務於合從連衡以攻伐為賢而孟軻乃述唐虞三代之德是以所如者不合退而與萬章之徒序詩書述仲尼之意作孟子七篇史記荀卿列傳荀卿嫉濁世之政亡國亂君相屬不遂大道而營於巫祝信禨祥鄙儒小拘如莊周等又滑稽亂俗於是推儒墨道德之行事興壞序列著數萬言而卒史記老子列傳老子者楚苦縣厲鄉曲仁里人也姓李氏名耳字伯陽謚曰聃老子修道德其學以自隱無名為務居周久之見周之衰迺遂去至關關令尹喜曰子將隱矣強為我著書于是老子迺著書上下篇言道德之意五千餘言而去莫知其所終史記莊周列傳莊子者蒙人也名周周嘗為蒙漆園吏與梁惠王齊宣王同時其學無所不闚然其要本歸於老子之言故其著書十餘萬言大抵率寓言也史記韓非列傳韓非者韓之諸公子也喜刑名法術之學而其歸本於黃老非為人口吃不能道說而善著書與李斯俱事荀卿史記太史公自序昔西伯拘羑里演周易孔子產陳蔡作春秋屈原放逐著離騷左丘失明厥有國語孫子臏腳而論兵法不韋遷蜀世傳呂覽韓非囚秦說難孤憤詩三百篇大抵聖賢發憤之所為作也此人皆意有所鬱結不得通其道也漢書儒林傳韓嬰燕人也孝文時為博士景帝時至常山太傅嬰推詩人之意而作內外傳數萬言其語頗與齊魯間殊然歸一也漢書蒯通傳通論戰國時說士權變亦自序其說凡八十一首號曰雋永師古曰雋音字兗反雋肥肉也永長也言其所論甘美而義深長也漢書董仲舒傳仲舒所著皆明經術之意及上疏條教凡百二十三篇而說春秋事得失聞舉玉杯蕃露清明竹林之屬師古曰皆其所著書名也復數十篇十餘萬言漢書賈山傳孝文時言治亂之道借秦為諭名曰至言漢書淮南王安傳淮南王安為人好書鼓琴不喜弋獵狗馬馳騁亦欲以行陰德拊循百姓流名譽招致賓客方術之士數千人作為外書二十一篇外書甚眾又有中篇八卷言神仙黃白之術亦二十餘萬言時武帝方好藝文以安屬為諸父辯博善為文辭甚尊重之漢書司馬遷傳子遷適反見父於河雒之間太史公執遷手而泣曰予死爾必為太史為太史毋忘吾所欲論著矣予為太史而不論載廢天下之文予甚懼焉爾其念哉遷俯首流涕曰小子不敏請悉論先人所次舊聞不敢闕漢書楚元王傳附劉向采傳記行事著新序說苑凡五十篇奏之漢書楚元王傳附劉歆贊曰劉氏洪範論發明大傳著天人之應七略剖判蓺文總百家之緒三統歷譜考步日月五星之度有意其推本之也師古曰言其究極根本深有意也後漢書班彪傳附子班固父彪卒歸鄉里固以彪所續前史未詳乃潛精研思欲就其業既而有人上書顯宗告固私改作國史者有詔下郡收固繫京兆獄盡取其家書先是扶風人蘇朗偽言圖讖事下獄死固弟超恐固為郡所覈考不能自明乃馳詣闕上書得召見具言固所著述意而郡亦上其書顯宗甚奇之召詣校書部前書固敘傳曰永平中為郎典校秘書除蘭臺令史與前雎陽令陳宗長陵令尹敏司隸從事孟異共成世祖本紀遷為郎典校秘書帝乃復使終成前所著書固以為漢紹堯運以建帝業至於六世史臣六代謂武帝史臣謂司馬遷也乃追述功德私作本紀編於百王之末廁於秦項之列太初以後闕而不錄故探撰前紀綴集所聞以為漢書後漢書王符傳自和安之後世務游宦當塗者更相薦引而符獨耿介不同於俗以此遂不得升進志意蘊憤乃隱居著書三十餘篇以譏當時失得不欲章顯其名故號曰潛夫論其指訐時短討讁物情訐攻也讁責也足以觀見當時風政後漢書仲長統傳仲長統字公理山陽高平人也尚書令荀彧聞統名奇之舉為尚書郎後參丞相曹操軍事每論說古今及時俗行事恒發憤歎息因著論名曰昌言凡三十四篇後漢書王充傳充好論說始若詭異終有理實以為俗儒守文多失其真乃閉門潛思絕慶弔之禮戶牖牆壁各置刀筆著論衡八十五篇二十餘萬言釋物類同異正時俗嫌疑後漢書崔駰傳附孫崔寔桓帝初詔公卿郡國舉至孝獨行之士寔以郡舉徵詣公車病不對策除為郎明於政體吏才有餘論當世便事數十條名曰政論指切時要言辯而确确堅正也音口角反當世稱之仲長統曰凡為人主宜寫一通置之坐側其辭曰寔之政論言當世理亂雖鼂錯之徒不能過也後漢書荀淑傳附孫荀悅帝好典籍常以班固漢書文繁難省乃令悅依左氏傳體以為漢紀三十篇詔尚書給筆札辭約事詳論辨多美後漢書鄭玄傳凡玄所注周易尚書毛詩儀禮禮記論語孝經尚書大傳中候乾象歷又著天文七政論魯禮禘祫義六蓺論毛詩譜駮許慎五經異義答臨孝存周禮難凡百餘萬言玄質於辭訓通人頗譏其繁後漢書鄭玄傳時任城何休好公羊學遂著公羊墨守左氏膏肓榖梁廢疾玄乃發墨守鍼膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我乎三國志蜀志李譔傳李譔字欽仲梓潼涪人也延熙元年後主立太子太子愛其多知甚悅之然體輕脫好戲啁故世不能重也著古文易尚書毛詩三禮左氏傳太玄指歸皆依莊賈馬異於鄭玄與王氏殊隔初不見其所述而意歸多同晉書杜預傳既立功之後從容無事乃耽思經籍為春秋左氏經傳集解又參考眾家譜第謂之釋例又作盟會圖春秋長歷備成一家之學晉書習鑿齒傳習鑿齒字彥威襄陽人也宗族富盛世為鄉豪鑿齒少有志氣博學洽聞以文筆著稱鑿齒在郡著漢晉春秋以裁正之起漢光武終於晉愍帝於三國之時蜀以宗室為正魏武雖受漢禪晉尚為篡逆至文帝平蜀乃為漢亡而晉始興焉引世祖諱炎興而為禪受明天心不可以勢力強也凡五十四卷晉書王沉傳正元中遷散騎常侍侍中典著作與荀顗阮籍共撰魏書多歲時諱未若陳壽之實錄也晉書陳壽傳陳壽字承祚巴西安漢人也撰魏吳蜀三國志凡六十五篇時人稱其善敘事有良史之才夏侯湛時著魏書見壽所作便壞己書而罷張華深善之謂壽曰當以晉書相付耳其為時所重如此或云丁儀丁廙有盛名於魏壽謂其子曰可覓千斛米見與當為尊公作佳傳丁不與之竟不為立傳壽父為馬謖參軍謖為諸葛亮所誅壽父亦坐被髡諸葛瞻又輕壽壽為亮立傳謂亮將略非長無應敵之才言瞻惟工書名過其實議者以此少之晉書司馬彪傳司馬彪字紹統高陽王睦之長子也初拜騎都尉泰始中為祕書郎轉丞注莊子作九州春秋以為先王立史官以書時事載善惡以為沮勸撮教世之要也是以春秋不修則仲尼理之關雎既亂則師摯修之前哲豈好煩哉蓋不得已故也漢氏中興訖于建安忠臣義士亦以昭著而時無良史記述煩雜譙周雖已刪除然猶未盡安順以下亡缺者多彪乃討論眾書綴其所聞起於世祖終于孝獻編年二百錄世十二通綜上下旁貫庶事為紀志傳凡八十篇號曰續漢書晉書華表傳附子華嶠嶠字叔駿才學深博少有令聞元康初封宣昌亭侯誅楊駿改封樂鄉侯遷尚書後以嶠博聞多識屬書典實有良史之志轉秘書監初嶠以漢紀煩穢慨然有改作之意會為臺郎典官制事由是得徧觀秘籍遂就其緒起于光武終於孝獻一百九十五年為帝紀十二卷皇后紀二卷十典十卷傳七十卷及三譜序傳目錄凡九十七卷嶠以皇后配天作合前史作外戚傳以繼末編非其義也故易為皇后紀以次帝紀又改志為典以有堯典故也而改名漢後書奏之詔朝臣會議時中書監荀勗令和嶠太常張華侍中王濟咸以嶠文質事核有遷固之規實錄之風藏之祕府新唐書令狐德棻傳德棻始請帝重購求天下遺書置吏補錄不數年圖典略備又建言近代無正史梁陳齊文籍猶可據至周隋事多脫損今耳目尚相及史有所馮一易世事皆汨暗無所掇拾陛下受禪于隋隋承周二祖功業多在周今不論次各為一王史則先烈世庸不光明後無傳焉帝謂然於是詔中書令蕭瑀給事中王敬業著作郎殷聞禮主魏中書令封德彝舍人顏師古主隋大理卿崔善為中書舍人孔紹安太子洗馬蕭德言主梁太子詹事裴矩吏部郎中祖孝孫祕書丞魏徵主齊祕書監竇璡給事中歐陽詢文學姚思廉主陳侍中陳叔達太史令庾儉及德棻主周整振論譔多歷年不能就罷之貞觀三年復詔撰定議者以魏有魏收魏澹二家書為已詳惟五家史當立德棻更與祕書郎岑文本殿中侍御史崔仁師次周史中書舍人李百藥次齊史著作郎姚思廉次梁陳二史祕書監魏徵次隋史左僕射房玄齡總監修撰之原自德棻發之新唐書儒學孔頴達傳初頴達與顏師古司馬才章王恭王琰受詔譔五經義訓凡百餘篇號義贊詔改為正義新唐書文藝王勃傳王勃字子安絳州龍門人六歲善文辭九歲得顏師古注漢書讀之作指瑕以擿其失新唐書藝文志夫王迹熄而詩亡離騷作而文辭之士興歷代盛衰文章與時高下然其變態百出不可窮極何其多也自漢以來史官列其名氏篇第以為六藝九種七略至唐始分為四類曰經史子集而藏書之盛莫盛於開元其著錄者五萬三千九百一十五卷而唐之學者自為之書者又二萬八千四百六十九卷嗚呼可謂盛矣辭賦第二史記屈原作懷沙賦其辭甚怨後楚有宋玉唐勒景差之徒皆好辭賦前漢司馬相如傳贊曰相如雖多虛辭濫說然要其歸引之於節儉此亦詩之風諫何異楊雄以為靡麗之賦勸百而風一猶騁鄭衛之聲曲終而奏雅不已戲乎輕戲前漢王褒傳是時上頗好仙故褒對及之上令褒與張子僑等並待詔數從褒等放獵所幸宮館輒為歌頌第其高下以差賜帛議者多以淫靡不急上曰不有博弈者乎為之猶賢於已辭賦大者與古詩同義小者辯麗可嘉辟如女工有綺縠音樂有鄭衛今世俗猶皆以此虞說耳目辭賦比之尚有仁義風諭鳥獸草木多聞之觀賢於倡優博弈達矣前漢枚乘傳乘子皋上書北闕自陳枚乘之子召入見待詔皋因賦殿中詔使賦平樂館善之拜為朗皋不通經術詼笑類俳倡詼嘲也音恢俳音排倡樂人也為賦頌好嫚戲以故得媟贖貴幸比東方朔郭舍人等從行至甘泉游觀二輔離宮館臨山澤弋獵射馭上有所感輒使賦之後漢邊讓傳少能屬文作章華賦雖多淫麗之辭而終之以正亦如相如之諷也司馬相如作上林賦發倉廩以敕貧窮補不足恤鰥寡存孤獨出德號省刑罰此為諷也晉左思傳左思欲賦三都構思十年門庭藩溷皆著紙筆遇得一句即使疏之及賦成時人未之重思自以其文不謝班張恐以人廢言皇甫謐有高譽思造而示之謐稱善為其賦序張載為注魏都劉達注吳蜀衛瓘又為作略解自是之後盛重於時文多不載司空張華見而歎曰班張之流也使讀之者盡而有餘久而更新於是豪貴之家競皆傳寫洛陽為之紙貴初陸機入洛欲為此賦聞思作之撫掌而笑與弟雲書曰此間有傖父欲作三都賦須其成當以覆酒瓮耳及思賦出機絕歎服以為不能加遂輟筆焉餘見王佐才張華傳箋證史記屈原列傳頃襄王怒而遷之屈原至於江濱被髮行吟澤畔顏色憔悴形容枯槁漁父見而問之乃作懷沙之賦其辭曰屈原既死之後楚有宋玉唐勒景差之徒者皆好辭而以賦見稱漢書司馬相如傳贊曰相如雖多虛辭濫說然要其歸引之於節儉此亦詩之風諫何異揚雄以為靡麗之賦勸百而諷一猶騁鄭衛之聲曲終而奏雅不已戲乎張揖曰不亦輕戲乎哉漢書王褒傳是時上頗好神僊故褒對及之上令褒與張子僑等並待詔數從褒等放獵所幸宮館輒為歌頌第其高下以差賜帛議者多以為淫靡不急上曰不有博奕者乎為之猶賢乎已辭賦大者與古詩同義小者辯麗可喜辟如女工有綺縠音樂有鄭衛今世俗猶皆以此虞說耳目辭賦比之尚有仁義風諭鳥獸草木多聞之觀賢於倡優博奕遠矣漢書枚乘傳附子枚皋皋字少孺乘在梁時取皋母為小妻乘之東歸也皋母不肯隨乘乘怒分歷數千錢留與母居年十七上書梁共王得召為郎三年為王使與冗從爭師古曰冗從散職之從王者也見讒惡遇罪家室沒入皋亡至長安會赦上書北闕自陳枚乘之子上得之大喜召入見待詔皋因賦殿中詔使賦平樂館善之拜為郎使匈奴皋不通經術詼笑類俳倡李奇曰詼嘲也師古曰俳雜戲也倡樂人也詼音恢俳音排嘲竹交反宋祁曰注文嘲南本作後人不識改從嘲耳為賦頌好嫚戲以故得媟黷貴幸師古曰媟狎也黷垢濁也音瀆比東方朔郭舍人等而不得比嚴助等得尊官從行至甘泉雍河東東宮狩封泰山塞決河宣房游觀三輔離宮館臨山澤弋獵射馭狗馬蹴鞠刻鏤上有所感輒使賦之後漢書邊讓傳邊讓字文禮陳留浚儀人也少辯博能屬文作章華賦雖多淫麗之辭而終之以正亦如相如之諷也司馬相如作上林賦發倉廩以救貧窮補不足恤鰥寡存孤獨出德號省刑罰此為諷也晉書文苑列傳左思傳左思造齊都賦一年乃成復欲賦三都會妺芬入宮移家京師乃詣著作郎張載訪岷卭之事遂構思十年門庭藩溷皆著筆紙遇得一句即便疏之自以所見不博求為秘書郎及賦成時人未之重思自以其作不謝班張恐以人廢言安定皇甫謐有高譽思造而示之謐稱善為其賦序張載為注魏都劉逵注吳蜀陳留衛瓘又為思賦作略解自是之後盛重於時文多不載司空張華見而歎曰班張之流也使讀之者盡而有餘久而更新於是豪貴之家競相傳寫洛陽為之紙貴初陸機入洛欲為此賦聞思作之撫掌而笑與弟雲書曰此間有傖父欲作三都賦湏其成當以覆酒甕耳及思賦出機密歎伏以為不能加也遂輟筆焉
