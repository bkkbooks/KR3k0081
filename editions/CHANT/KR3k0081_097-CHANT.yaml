body:
  text: 卷第九十七中國盛而夷狄衰第一後漢西域傳開河西四郡以隔絕南羌收三十六國斷匈奴右臂是以單于孤特鼠竄遠藏至於宣元之世遂備蕃臣關徼不閉羽檄不行由此察之戎狄可以威服難以化狎新唐突厥列傳頡利獻馬三千疋羊萬口帝不納詔歸所俘於我新唐突厥列傳贊曰太宗身勒兵顯責而陰間之戎始內阻不三年縳頡利獻北闕下霆掃風除其國遂墟箋證後漢書西域傳開河西四郡以隔絕南羌收三十六國斷匈奴右臂是以單于孤特鼠竄遠藏至於宣元之世遂備蕃臣關徼不閉羽檄不行由此察之戎狄可以威服難以化狎新唐書突厥列傳頡利乃詔殿中監豆盧寬將軍趙綽護送突厥頡利獻馬三千匹羊萬頭帝不納詔歸所俘於我新唐書突厥列傳贊曰太宗身勒兵顯責而陰間之戎始內阻不三年縳頡利獻北闕下霆掃風除其國遂墟中國征四夷第二史記蒙恬傳秦已并天下乃使蒙恬將三十萬眾北逐戎狄收河南築長城因地形用制險塞起臨洮至遼東延袤萬餘里於是渡河據陽山逶蛇而北暴師於外十餘年前漢匈奴傳莽將嚴尤諫曰匈奴為害所從來久矣未聞上世有必征之者周秦漢征之然皆未有得上策者也周得中策漢得下策秦無策焉當周宣王時獫允內侵至于涇陽命將征之盡境而還其視戎狄之侵譬猶蚊虻之螫敺之而已故天下稱明是為中策漢武帝選將練兵約齎輕糧深入遠戍雖有克獲之功胡輒報之兵連禍結三十餘年中國罷耗匈奴亦創艾而天下稱武是為下策秦始皇不忍小恥而輕民力築長城之固延袤萬里轉輸之行起於負海疆境既完中國內竭以喪社稷是為無策前漢鼂錯傳孝文時匈奴入錯上曰臣又聞小大異形彊弱異埶險易異備夫卑身以事彊小國之形也合小以攻大敵國之形也彼我力均不能相勝則須連結外援共制之也以蠻夷攻蠻夷中國之形也今匈奴地形技蓺與中國異上下山阪出入溪澗中國之馬弗與也與猶如險道傾仄且馳且射中國之騎弗與也風雨罷勞飢渴不困中國之人弗與也此匈奴之長技也若夫平原易地輕車突騎則匈奴之眾易橈亂也勁弩長戟射疏及遠則匈奴之弓弗能格也堅甲利刃長短相雜遊弩往來什伍俱前則匈奴之兵弗能當也材官騶發矢道同的騶謂矢之善者也春秋左氏傳作菆字其音茸耳材官有材內者騶發發騶矢以射也手工矢射故中則同的的謂所射之隼臬也臬音牛列仄即謂橛也則匈奴之革笥木薦弗能支也革笥以皮作如鎧者被之木薦以木板作如楯下馬地鬭劍戟相接去就相薄則匈奴之足弗能給也此中國之長技也以此觀之匈奴之長技三中國之長技五陛下又興數十万之眾以誅數万之匈奴眾寡之計以一擊十之術也前漢韓安國傳上問公卿曰朕飾子女以配單于幣帛文錦賂之甚厚單于侵盜無已今欲舉兵攻之何如恢對曰臣聞全代之時六國之時全代為一國北有彊胡之敵內連中國之兵然尚得養老長幼種樹以時倉廩常實匈奴不輕侵也今以陛下之威海內為一又遣子弟乘邊守塞轉粟輓輸以為之備然匈奴侵盜不已者無它以不恐之故耳臣竊以為擊之便安國曰不然臣聞高皇帝嘗圍於平城七日不食及解圍反位而無忿怒之心夫聖人以天下為度不以已私怒傷天下之功故迺遣婁恭奉金千斤以結和親至今為五世利孝文又嘗壹擁天下之精兵聚之廣武常谿然終無尺寸之功而天下黔首無不憂者孝文寤於兵之不可宿故復合和親之約此二聖之跡足以為效矣臣竊以為勿擊便恢曰不然五帝不相襲禮三王不相復樂非固相反也各因世宜也且高帝身被堅執銳蒙霧露沭霜雪行幾十年不報平城之怨者非力不能所以休天下之心也今邊竟數驚士卒傷死中國槥車相望此仁人之所隱也臣故曰擊之便安國曰不然利不十者不易業功不百者不變常是以古之人君謀事必就祖發政占古語重作事也且自三代之盛夷狄不與正朔服色非威不能制彊弗能服也以為遠方絕地不牧之民不足煩中國也且匈奴輕疾悍亟之兵也至如猋風去如收電畜牧為業弧弓射獵逐獸隨草居處無常難得而制今使邊郡久廢耕織以支胡之常事其埶不相權也臣故曰勿擊便恢曰不然鳳鳥乘於風聖人因於時昔秦繆公都雍地方三百里知時宜之變攻取西戎辟地千里并國十四隴西北地是也及後蒙恬為秦侵胡辟數千里以河為竟累石為城樹榆為塞匈奴不敢飲馬於河置燧㝝然後敢牧馬夫匈奴獨可以威服不可以仁畜也今以中國之盛萬倍之資遣百分之一以攻匈奴譬猶以彊弩射且潰之癰也必不留行矣若是則北發月氏可得而臣也臣故曰擊之便安國曰不然用兵者以飽待饑正治以待其亂定舍以得其勞故接兵覆眾伐國墮城常坐而役敵國此聖人之兵也且臣聞之衝風之衰不能起毛羽疾風之衝突彊弩之末力不能人魯縞夫盛之有衰猶朝之必莫也今將卷甲輕舉深入長敺難以為功從行則迫脅衡行則中絕疾則糧乏徐則後利不至千里人馬乏食兵法曰遺人獲也言以軍遺敵人令其虜獲意者有它繆巧可以禽之則臣不知也不然則未見深人之利也臣故曰勿擊便恢曰不然夫草木遭霜者不可以風過清水明鏡不可以形逃通方之士不可以文亂今臣言擊之者固非發而深入也將順因單于之欲誘而致之邊吾選梟騎壯士陰伏而處以為之備審遮險阻以為其戒吾埶已定或營其左或營其右或當其前或絕其後單于可禽百全必取上曰善迺從恢議前漢匈奴傳楊雄上書諫曰夫前世豈樂傾無量之費役無罪之人快心於狼望之北哉以為不壹勞者不久佚不暫費者不永寧是以忍百萬之師以摧餓虎之喙運府庫之財填慮山之壑而不悔也摧百万之師於獸口也慮山匈奴中山也狼望亦地名前漢嚴助傳周易曰高宗伐鬼方三年而克之鬼方小蠻夷高宗殷之盛天子也以盛天子伐小蠻夷三年而後克言用兵之不可不重也後漢竇憲傳憲求擊匈奴會南單于請兵北伐乃拜憲車騎將軍以耿秉為副與北單于戰於稽落山大玻之遂臨私渠北鞮海斬名王已下萬級獲生口馬牛羊橐駝百餘萬頭於是八十一部率眾降憲秉遂登燕然山刻石紀漢盛德令班固作銘後漢耿秉傳秉數上言兵事常以中國虛費邊陲不寧其患專在匈奴以戰去戰盛王之道顯宗既有志北伐陰然其言晉阮种傳又問戎蠻猾夏對曰昔漢武之世承文帝之業資海內之富役其材臣以甘心匈奴夭百姓之命填餓狼之口及其以眾制寡令匈奴遠跡取功祁連飲馬瀚海天下之耗以過太半矣夫虛中國以事夷狄誠非計之得者也是以盜賊蜂起山東不振暨宣元之時趙充國征西零馮奉世征南羌皆兵不血刃摧抑彊暴擒其首惡北則折衝厭難勝敗相辨中世之明效也新唐書封倫傳突厥寇太原且遣使和親帝問計群臣咸請許之可紓戰倫曰不然彼有輕中國心謂我不能戰若乘其怠擊之勢必勝勝而後和威德兩全令雖不戰後必復來臣以謂擊之便蜀志諸葛亮傳三年春亮率眾南征其秋悉平漢晉春秋曰亮至南中所在戰捷聞孟獲者為夷漢並所服募生致之既得使觀於營車之間問曰此軍何如獲對曰向者不知虛實故敗今蒙賜觀看營陣若秪如此即定易勝耳亮笑縱使更戰七縱七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣遂至滇池南中平皆即其渠率而用之餘見中興之主匈奴傳箋證史記蒙恬傳始皇二十六年蒙恬因家世得為秦將攻齊大破之拜為內史秦已并天下乃使蒙恬將三十萬眾北逐戎狄收河南築長城因地形用制險塞起臨洮至遼東延袤萬餘里於是渡河據陽山逶蛇而北暴師於外十餘年居上郡漢書匈奴傳莽將嚴尤諫曰臣聞匈奴為害所從來久矣未聞上世有必征之者也後世三家周秦漢征之然皆未有得上策者也周得中策漢得下策秦無策焉當周宣王時獫允內侵至于涇陽命將征之盡境而還其視戎狄之侵譬猶蟁蝱之螫敺之而已故天下稱明是為中策漢武帝選將練兵約齎輕糧深入遠戍雖有克獲之功胡輒報之兵連禍結三十餘年中國罷耗匈奴亦創艾而天下稱武是為下策秦始皇不忍小恥而輕民力築長城之固延袤萬里轉輸之行起於負海疆境既完中國內竭以喪社稷是為無策漢書鼂錯傳孝文時匈奴入錯上曰臣又聞小大異形彊弱異勢險易異備夫卑身以事彊小國之形也合小以攻大敵國之形也師古曰彼我力均不能相勝則須連結外援共制之也以蠻夷攻蠻夷中國之形也今匈奴地形技蓺與中國異上下山阪出入溪澗中國之馬弗與也師古曰與猶如險道傾仄且馳且射中國之騎弗與也風雨罷勞飢渴不困中國之人弗與也此匈奴之長技也若夫平原易地輕車突騎則匈奴之眾易橈亂也勁弩長戟射疏及遠則匈奴之弓弗能格也堅甲利刃長短相雜遊弩往來什伍俱前則匈奴之兵弗能當也材官騶發矢道同的騶謂矢之善者也春秋左氏傳作菆字其音同耳材官有材力者騶發發騶矢以射也手工矢善故中則同的的謂所射之隼臬也蘇音失之矣臬音牛列反即謂橛也則匈奴之革笥木薦弗能支也孟康曰革笥以皮作如鎧者被之木薦以木板作如楯下馬地鬭劍戟相接去就相薄則匈奴之足弗能給也此中國之長技也以此觀之匈奴之長技三中國之長技五陛下又興數十万之眾以誅數万之匈奴眾寡之計以一擊十之術也漢書韓安國傳上乃召問公卿曰朕飾子女以配單于幣帛文錦賂之甚厚單于待命加嫚侵盜無已邊竟數驚朕甚閔之今欲舉兵攻之何如大行恢對曰陛下雖未言臣固願效之臣聞全代之時李奇曰六國之時全代為一國尚能以擊匈奴況今加以漢之大乎北有彊胡之敵內連中國之兵然尚得養老長幼種樹以時倉廩常實匈奴不輕侵也今以陛下之威海內為一天下同任又遣子弟乘邊守塞轉粟輓輸以為之備然匈奴侵盜不已者無它以不恐之故耳臣竊以為擊之便御使大夫安國曰不然臣聞高皇帝嘗圍於平城七日不食天下歌之及解圍反位而無忿怒之心夫聖人以天下為度者也不以已私怒傷天下之功故乃遣劉敬奉金千斤以結和親至今為五世利孝文皇帝又嘗壹擁天下之精兵聚之廣武常谿然終無尺寸之功而天下黔首無不憂者孝文寤於兵之不可宿故復合和親之約此二聖之迹足以為效矣臣竊以為勿擊便恢曰不然臣聞五帝不相襲禮三王不相復樂非固相反也各因世宜也且高帝身被堅執銳蒙霧露沭霜雪行幾十年所以不報平城之怨者非力不能所以休天下之心也今邊竟數驚士卒傷死中國槥車相望此仁人之所隱也臣故曰擊之便安國曰不然臣聞利不十者不易業功不百者不變常是以古之人君謀事必就祖發政占古語重作事也且自三代之盛夷狄不與正朔服色非威不能制彊弗能服也以為遠方絕地不牧之民不足煩中國也且匈奴輕疾悍亟之兵也至如猋風去如收電畜牧為業弧弓射獵逐獸隨草居處無常難得而制今使邊郡久廢耕織以支胡之常事其勢不相權也臣故曰勿擊便恢曰不然臣聞鳳鳥乘於風聖人因於時昔秦繆公都雍地方三百里知時宜之變攻取西戎辟地千里并國十四隴西北地是也及後蒙恬為秦侵胡辟數千里以河為竟累石為城樹榆為塞匈奴不敢飲馬於河置燧㝝然後敢牧馬夫匈奴獨可以威服不可以仁畜也今以中國之盛萬倍之資遣百分之一以攻匈奴譬猶以彊弩射且潰之癰也必不留行矣若是則北發月氏可得而臣也臣故曰擊之便安國曰不然臣聞用兵者以飽待饑正治以待其亂定舍以待其勞故接兵覆眾伐國墮城常坐而役敵國此聖人之兵也且臣聞之衝風之衰不能起毛羽師古曰衛風疾風之衝突者也彊弩之末力不能入魯縞夫盛之有衰猶朝之必莫也今將卷甲輕舉深入長敺難以為功從行則迫脅衡行則中絕疾則糧乏徐則後利不至千里人馬乏食兵法曰遺人獲也師古曰言以軍遺敵人令其虜獲也遺音弋季反意者有它繆巧可以禽之則臣不知也不然則未見深入之利也臣故曰勿擊便恢曰不然夫草木遭霜者不可以風過清水明鏡不可以形逃通方之士不可以文亂今臣言擊之者固非發而深入也將順因單于之欲誘而致之邊吾選梟騎壯士陰伏而處以為之備審遮險阻以為其戒吾勢已定或營其左或營其右或當其前或絕其後單于可禽百全必取上曰善乃從恢議漢書匈奴傳揚雄上書諫曰夫前世豈樂傾無量之費役無罪之人快心於狼望之北哉以為不壹勞者不久佚不蹔費者不永寧是以忍百萬之師以摧餓虎之喙運府庫之財填盧山之壑而不悔也師古曰喙口也摧百万之師於獸口也盧山匈奴中山也狼望亦地名漢書嚴助傳周易曰高宗伐鬼方三年而克之鬼方小蠻夷高宗殷之盛天子也以盛天子伐小蠻夷三年而後克言用兵之不可不重也後漢書竇憲傳憲懼誅自求擊匈奴以贖死會南單于請兵北伐乃拜憲車騎將軍金印紫綬官屬依司空以執金吾耿秉為副與北單于戰於稽落山大破之遂臨私渠北鞮海斬名王已下萬級獲生口馬牛羊橐駝百餘萬頭於是八十一部率眾降憲秉遂登燕然山刻石勒功紀漢威德令班固作銘後漢書耿秉傳秉數上言兵事常以中國虛費邊陲不寧其患專在匈奴以戰去戰盛王之道顯宗既有志北伐陰然其言晉書阮种傳又問戎蠻猾夏對曰昔漢武之世承文帝之業資海內之富役其材臣以甘心匈奴競戰勝之功貪攻取之利良將勁卒屈於沙漠勝敗相若克不過當夭百姓之命填餓狼之口及其以眾制寡令匈奴遠迹收功祁連飲馬瀚海天下之耗已過太半矣夫虛中國以事夷狄誠非計之得者也是以盜賊蜂起山東不振暨宣元之時趙充國征西零馮奉世征南羌皆兵不血刃摧抑彊暴擒其首惡此則折衝厭難勝敗相辨中世之明效也新唐書封倫傳頃之突厥寇太原且遣使和親帝問計群臣咸請許之可紓戰倫曰不然彼有輕中國心謂我不能戰若乘其怠擊之勢必勝勝而後和威德兩全今雖不戰後必復來臣以為擊之便三國志蜀志諸葛亮傳三年春亮率眾南征其秋悉平漢晉春秋曰亮在南中所在戰捷聞孟獲者為夷漢並所服募生致之既得使觀於營陣之間問曰此軍何如獲對曰向者不知虛實故敗今蒙賜觀看營陣若秪如此即定易勝耳亮笑縱使更戰七縱七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣遂至滇池南中平皆即其渠率而用之
