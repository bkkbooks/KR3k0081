body:
  text: 卷第五十七王佐才第一前漢贊曰劉向稱董仲舒有王佐才雖伊呂亡以加管晏之屬霸者之佐殆不及也後漢王允傳郭林宗嘗見允而奇之曰王生一日千里王佐才也史記曰田光謂燕太子丹曰臣聞驥壯盛之時一日千里至其老也駑馬先之遂與定交後漢延篤傳李文德素善於篤時在京師謂公卿曰延叔堅有王佐之才奈何屈千里之足乎後漢郎顗傳上書伏見處士李固通游夏之蓺履顏閔之仁絜白之節情同曒日元精所上王之佐臣天之生固必為聖漢宜蒙特召以示四方後漢荀彧傳何顒名知人見彧而異之曰王佐才也晉張華傳張華初未知名著鷦鷯賦以自寄陳留阮籍見之歎曰王佐之才也由是聲名始著晉載記符堅傳性至孝博學多才藝有經濟大志王猛呂婆樓強汪梁平老等並有王佐之才為其羽翼新唐杜如晦傳高祖平京師秦王徙陝州總管府長史時府屬多外遷王患之房玄齡曰去者雖多不足吝如晦王佐才也大王若終守藩無所事必欲經營四方捨如晦無共功者箋證漢書董仲舒傳贊曰劉向稱董仲舒有王佐之材雖伊呂亡以加筦晏之屬伯者之佐殆不及也後漢書王允傳王允字子師太原祁人也世仕州郡為冠盖同郡郭林宗嘗見允而奇之曰王生一日千里王佐才也史記曰田光謂燕太子丹曰臣聞驥壯盛之時一日千里至其老也駑馬先之遂與定交後漢書延篤傳延篤字叔堅南陽犨人也前越巂太守李文德素善於篤時在京師謂公卿曰延叔堅有王佐之才奈何屈千里之足乎後漢書郎顗傳顗對曰又處士漢中李固年四十通游夏之蓺履顏閔之仁絜白之節情同皦日忠貞之操好是正直卓冠古人當世莫及元精所生王之佐臣天之生固必為聖漢宜蒙特徵以示四方後漢書荀彧傳南陽何顒名知人見彧而異之曰王佐才也晉書張華傳張華初未知名著鷦鷯賦以自寄陳留阮籍見之歎曰王佐之才也由是聲名始著晉書載記苻堅傳上性至孝博學多才藝有經濟大志要結英豪以圖緯世之宜王猛呂婆樓強汪梁平老等並有王佐之才為其羽翼新唐書杜如晦傳高祖平京師秦王引為府兵曹參軍徙陜州總管府長史時府屬多外遷王患之房玄齡曰去者雖多不足吝如晦王佐才也大王若終守藩無所事必欲經營四方捨如晦無共功者才難第二前漢劉向傳贊曰仲尼稱才難不其然與自孔子後綴文之士眾矣唯孟軻孫況董仲舒司馬遷劉向楊雄此數公者皆博物洽聞通達古今其言有補於世傳曰聖人不出其間必有命世者焉豈近是乎後漢王渙傳永初二年鄧太后詔曰夫忠良吏國家所以為理也求之甚勤得之至寡故孔子曰才難不其然乎箋證漢書楚元王傳附劉向劉歆贊曰仲尼稱材難不其然與自孔子後綴文之士眾矣唯孟軻孫況師古曰孫況即荀卿也董仲舒司馬遷劉向揚雄此數公者皆博物洽聞通達古今其言有補於世傳曰聖人不出其間必有命世者焉豈近是乎後漢書循吏列傳王渙傳永初二年鄧太后詔曰夫忠良之吏國家所以為理也求之甚勤得之至寡故孔子曰才難不其然乎大材不可小用第三後漢邊讓傳蔡邕薦於何進曰使讓生在唐虞則元凱之次運值仲尼則顏冉之亞豈徒俗之凡遇近器而已傳曰函牛之鼎以亨雞多汁則淡而不可食少汁則熬而不可熟此言大器之於小用固有所不宜也後漢酈炎傳州郡辟命皆不就有志氣作詩二篇曰大道夷且長窘路狹且促脩翼無畀栖遠趾不步局窘迫也魏杜襲傳許攸擁部曲不附太祖太祖先欲伐之襲曰千鈞之弩不為鼷鼠發機万石之鍾不以莛撞起音蜀志龐統傳統守耒陽令在縣不治免官吳將魯肅遺先主書曰龐士元非百里才也使處治中別駕之任始當展其驥足耳晉載記禿髮利鹿孤傳雖僣位尚臣於姚興楊桓有德望召之利鹿孤餞桓謂之曰本期與卿共成大業事乖本圖但鯤非溟海無以運其軀鳳非脩梧無以睎其翼卿有佐時之器夜光之寶當振纓雲閣曜價東城區區河右未足以逞卿才力善勗日新以成大美新唐韋安石傳安石舉明經調乾封尉長史蘇良嗣器之永昌元年遷雍州司兵參軍良嗣當國謂安石曰大才當大用徒勞州縣可乎餘見以德化民仇覽傳又見社稷之臣蔣琬傳又見任德不任刑伏湛傳箋證後漢書邊讓傳議郎蔡邕深敬之以為讓宜處高任乃薦於何進曰竊見令史陳留邊讓天授逸才聰明賢智使讓生在唐虞則元凱之次運值仲尼則顏冉之亞豈徒俗之凡偶近器而已者哉劉攽曰案文多一者字階級名位亦宜超然若復隨輩而進非所以章瓌偉之高價昭知人之絕明也傳曰函牛之鼎以烹雞多汁則淡而不可食少汁則熬而不可熟此言大器之於小用固有所不宜也後漢書文苑列傳酈炎傳酈炎字文勝范陽人酈食其之後也炎有文才解音律言論給捷多服其能理給敏也靈帝時州郡辟命皆不就有志氣作詩二篇曰大道夷且長窘路狹且促脩翼無卑栖遠趾不步局窘迫也三國志魏志杜襲傳時將軍許攸擁部曲不附太祖而有慢言太祖大怒先欲伐之襲曰臣聞千鈞之弩不為鼷鼠發機萬石之鐘不以莛撞起音三國志蜀志龐統傳先主領荊州統以從事守耒陽令在縣不治免官吳將魯肅遺先主書曰龐士元非百里才也使處治中別駕之任始當展其驥足耳晉書載記禿髮利鹿孤傳利鹿孤以隆安三年即偽位時利鹿孤雖僣位尚臣姚興楊桓兄經佐命姚萇早死興聞桓有呂望徵之利鹿孤餞桓于城東謂之曰本期與卿共成大業事乖本圖分岐之感實情深古人但鯤非溟海無以運其軀鳳非脩梧無以晞其翼卿有佐時之器夜光之寶當振纓雲閣耀價連城區區河右未足以逞卿才力善勗日新以成大美新唐書韋安石傳安石舉明經調乾封尉雍州長史蘇良嗣器之永昌元年遷雍州司兵參軍良嗣當國謂安石曰大才當大用徒勞州縣可乎小材不可大用第四前漢敘傳駑騫之乘不騁千里之塗燕雀之疇不奮六翮之用楶梲之材不荷棟梁之任斗筲之子不秉帝王之重前漢彼吏傳召黃霸為太子太傳遷御史大夫代邴吉為丞相封建成侯霸材長於治民及為丞相總綱紀號令風采不及丙魏于定國功名損於治郡時前漢枚乘傳吳王謀為逆也乘上書諫曰以一縷之任係千釣之重上縣無極之高下垂不測之淵雖甚愚之人猶知哀其將絕也前漢薛宣傳贊曰宣所在而治為世吏師及居太位以苛察失名器誠有極也後漢馬援傳勃年十二能誦詩書言辭閑雅援見之自失況慰援曰朱勃小器速成智盡此耳勿畏也朱勃未二十試右扶風守渭城宰及援為將軍而勃位不過縣令晉秦秀傳秀素輕鄙賈充及伐吳之役秀曰充文案小才居國大任惜哉及孫皓降於王濬充未之知方以吳未可平抗表請班師充表與告捷同至朝野以充位居人上智出人下僉以秀為知言晉楊駿傳以后父超居重位封臨晉侯尚書褚䂮郭奕並表駿小器不肉以任社稷之重武帝不從晉何充傳翼臨終表以後任委息爰之論者許之充曰不然荊楚國之西門戶口百万北帶強胡西鄰勁蜀得賢則中原可定勢弱則社稷同憂陸抗所謂存則吳存亡則吳亡者豈可以白面年少猥當此任哉餘見賢愚不分門前漢董仲舒箋證漢書敘傳是故駑蹇之乘不騁千里之塗燕雀之疇不奮六翮之用楶梲之材不荷棟梁之任斗筲之子不秉帝王之重漢書循吏傳黃霸傳徵霸為太子太傅遷御史大夫五鳳三年代丙吉為丞相封建成侯食邑六百戶霸材長於治民及為丞相總綱紀號令風采不及丙魏于定國功名損於治郡時漢書枚乘傳枚乘為吳王濞郎中吳王之初怨望謀為逆也乘奏書諫曰以一縷之任係千鈞之重上縣無極之高下垂不測之淵雖甚愚之人猶知哀其將絕也漢書薛宣朱博傳贊曰薛宣朱博皆起佐史歷位以登宰相宣所在而治為世吏師及居大位以苛察失名器誠有極也後漢書馬援傳勃字叔陽年十二能誦詩書常候援兄況勃衣方領能矩步辭言嫺雅援裁知書見之自失況知其意乃自酌酒慰援曰朱勃小器速成智盡此耳卒當從汝稟學勿畏也朱勃未二十右扶風請試守渭城宰及援為將軍封侯而勃位不過縣令晉書秦秀塼秦秀字玄良新興雲中人也秀性惡讒佞疾之如讎素輕鄙賈充及伐吳之役聞其為大都督謂所親者曰充文案小才乃居伐國大任吾將哭以送師或止秀曰昔蹇叔知秦軍必敗故哭送其子耳今吳君無道國有自亡之形群率踐境將不戰而潰子之哭也既為不智乃不赦之罪於是乃止及孫皓降于王濬充未知之方以吳未可平抗表請班師充表與告捷同至朝野以充位居人上智出人下僉以秀為知言晉書楊駿傳楊駿字文長弘農華陰人也少以王官為高陸令後以后父超居重任自鎮軍將軍遷車騎將軍封臨晉侯識者議之曰夫封建諸侯所以藩屏王室也后妃所以供粢盛弘內教也后父始封而以臨晉為侯兆於亂矣尚書褚䂮郭奕並表駿小器不可以任社稷之重武帝不從晉書何充傳翼臨終表以後任委息爰之于時論者並以諸庾世在西藩人情所歸宜依翼所請以安物情充曰不然荊楚國之西門戶口百萬北帶彊胡西鄰勁蜀經略險阻周旋萬里得賢則中原可定勢弱則社稷同憂所謂陸抗存則吳存抗亡則吳亡者豈可以白面年少猥當此任哉以才殺身第五史記蔡澤傳夫商君為秦孝公明法令禁姦本平權衡正度量調輕重決裂阡陌以靜生民之業而一其俗勸民耕農利土一室無二事力田蓄積習戰陣之事是以兵動而地廣兵休而國富故秦無敵於天下立威諸侯成秦國之業功已成矣而遂以車裂史記蔡澤傳吳起為楚悼王立法卑減大臣之威重罷無能廢無用損不急之官塞私門之請一楚國之俗禁游客之民精耕戰之士南收揚越北并陳蔡破橫散從使馳說之士無所開其口禁朋黨以厲百姓定楚國之政兵震天下威服諸侯功巳成矣而卒枝解前漢晁錯傳錯衣朝衣斬東市鄧公為校尉擊吳楚還上問曰晁錯死吳楚罷不鄧公曰吳為反數十歲矣發怒削地以誅錯為名其意不在錯也且臣恐天下之士拑口不敢復言矣上曰何哉鄧公曰夫晁錯患諸侯彊大不可制故請削之以尊京師万世之利也計畫始行卒受大戮內杜忠臣之口外為諸侯報仇臣竊為陛下不取也景帝喟然長息曰公言善吾亦恨之前漢京房傳治易事梁人焦延壽延壽常曰得我道以亡身者京生也前漢兩龔傳莽復遣使者奉璽書太子師友祭酒印綬安車駟馬迎勝即拜勝謂門人高暉等吾受漢家厚恩亡以報今年老矣旦暮入地誼豈以一身事二姓下見故主哉勝因敕以棺斂喪事遂不復飲食積十四自死死時七十九矣門人衰絰治喪香百數有老父來弔哭甚哀既而曰嗟乎薰以香自燒膏以明自銷龔生竟夭天年非吾徒也遂趨而出莫其誰晉孫登傳嵇康又從之游三年問其所圖終不答康每歎息將別謂曰先生竟無言乎登乃曰子識火乎火生而有光而不用其光果在於用光人生而有才而不用其才而果在於用才故用光在乎得薪所以保其耀用才在乎識真所以全其年今子才多識寡難乎免於今之世矣康果遭非命仍作幽墳詩曰昔慚柳下今愧孫登或謂登以魏晉去就易生嫌疑故或嘿者也竟不知所終箋證史記蔡澤列傳蔡澤曰夫商君為秦孝公明法令禁姦本尊爵必賞有罪必罰平權衡正度量調輕重決裂阡陌以靜生民之業而一其俗勸民耕農利土一室無二事力田蓄積習戰陳之事是以兵動而地廣兵休而國富故秦無敵於天下立威諸侯成秦國之業功已成矣而遂以車裂吳起為楚悼王立法卑減大臣之威重罷無能廢無用損不急之官塞私門之請一楚國之俗禁游客之民精耕戰之士南收揚越北并陳蔡破橫散從使馳說之士無所開其口禁朋黨以厲百姓定楚國之政兵震天下威服諸侯功已成矣而卒枝解漢書鼂錯傳錯衣朝衣斬東市錯已死謁者僕射鄧公為校尉擊吳楚為將還上書言軍事見上上問曰道軍所來聞鼂錯死吳楚罷不鄧公曰吳為反數十歲矣發怒削地以誅錯為名其意不在錯也且臣恐天下之士拑口不敢復言矣上曰何哉鄧公曰夫鼂錯患諸侯彊大不可制故請削之以尊京師萬世之利也計畫始行卒受大戮內杜忠臣之口外為諸侯報仇臣竊為陛下不取也於是景帝喟然長息曰公言善吾亦恨之漢書京房傳京房字君明東郡頓丘人也治易事梁人焦延壽延壽字贛贛貧賤以好學得幸梁王王共其資用令極意學贛常曰得我道以亡身者京生也漢書兩龔傳後二年莽復遣使者奉璽書太子師友祭酒印綬安車駟馬迎勝即拜秩上卿先賜六月祿使者五日一與太守俱問起居為勝兩子及門人高暉等言朝廷虛心待君以茅土之封雖疾病宜動移至傳舍示有行意必為子孫遺大業暉等白使者語勝自知不見聽即謂暉等吾受漢家厚恩亡以報今年老矣旦暮入地誼豈以一身事二姓下見故主哉勝因敕以棺斂喪事衣周於身棺周於衣勿隨俗動吾冢種柏作祠堂語畢遂不復開口飲食積十四日死死時七十九矣使者太守臨斂賜複衾祭祠如法門人衰絰治喪者百數有老父來弔哭甚哀既而曰嗟乎薰以香自燒膏以明自銷龔生竟夭天年非吾徒也遂趨而出莫知其誰晉書隱逸孫登傳孫登字公和汲郡共人也無家屬於郡北山為土窟居之夏則編草為裳冬則被髮自覆好讀易文帝聞之使阮籍往觀既見與語亦不應嵇康又從之游三年問其所圖終不答康每歎息將別謂曰先生竟無言乎登乃曰子識火乎火生而有光而不用其光果在於用光人生而有才而不用其才而果在於用才故用光在乎得薪所以保其耀用才在乎識寡所以全其年今子才多識寡難乎免於今之世矣子無求乎康不能用果遭非命仍作幽憤詩曰昔慙柳下今愧孫登或謂登以魏晉去就易生嫌疑故或嘿者也竟不知所終長者第六前漢田叔傳叔為漢中守十餘年孝文帝初立召叔問曰公知天下長者乎對曰故雲中守孟舒長者也是時孟舒坐虜大入雲中免上曰先帝置孟舒雲中十餘年虜常一入孟舒不能堅守旡故士辛戰死者數百人長者固殺人乎叔叩頭曰夫貫高等謀反天子下明詔趙有敢隨張王者罪三族然孟舒自髡鉗隨張王以身死之豈自知為雲中守哉漢與楚相距士卒罷敝而匈奴冒頓新服北夷來為邊冠孟舒知士卒罷敝不忍出言士爭臨城死敵如子為父以故死者數百人豈歐之哉是乃孟舒所以為長者於是上曰賢哉孟舒復召以為雲中守前漢袁盎傳梁王欲來為嗣盎進說其後語塞塞不行梁王使人剌盎剌者至關中問盎稱之皆不容口稱美其德口不能容迺見盎曰臣受梁王金剌君君長者不忍剌君然後剌者十餘曹備之前漢主父偃傳齊王以自殺聞上大怒以為偃劫其王令自殺迺召下吏治偃服受諸侯之金實不劫齊王令自殺上欲勿誅公孫洪爭曰齊王自殺無後國除為郡入漢偃本首惡非誅偃無以謝天下迺遂族偃偃方貴幸時客以千數及族死無一人視獨孔車收葬焉上聞之以車為長者後漢章帝紀論曰魏文帝稱明帝察察章帝長者章帝厭明帝苛切事從寬厚感陳寵之義除慘酷之相深元元之愛著胎養之令奉承太后崇建周親平徭簡賦人賴其慶又體之以忠恕文之以禮樂故乃蕃輔克諧群后德讓謂之長者不亦宜乎後漢儒林劉昆傳昆代杜林為光祿勳詔問昆曰前在江陵反風滅火後守洪農虎北度河行何德政而致是事昆對曰偶然耳左右皆笑其質訥帝歎曰此乃長者之言也後漢劉寵傳字祖榮前後歷宰二郡累登卿相而清約省素家無貨積嘗出京師欲息亭舍亭吏止之曰整頓洒埽以持劉公不可得也寵無言而去時人稱其長者後漢劉寬傳夫人欲試寬令恚伺當朝會裝嚴已訖使侍婢奉肉羹翻汙朝衣婢遽收之寬神色不異乃徐言曰羹爛汝手其性度如此海內稱為長者吳陸遜傳遜討費棧會稽太守淳于式表遜枉取民人愁擾所在遜後詣都言次稱式佳吏權曰式白君而君薦之何也遜對曰式意欲養民是以白遜若遜復毀式以亂聖聽不可長也權曰此誠長者之事顧人不能為爾新唐武元衡傳李吉甫李絳數爭事帝前不叶元衡獨持正無所違附帝稱其長者箋證漢書田叔傳田叔趙陘城人也其先齊田氏也叔好劍學黃老術於樂鉅公為人廉直喜任俠叔為漢中守十餘年孝文帝初立召叔問曰公知天下長者乎對曰臣何足以知之上曰公長者宜知之叔頓首曰故雲中守孟舒長者也是時孟舒坐虜大入雲中免上曰先帝置孟舒雲中十餘年矣虜嘗一入孟舒不能堅守無故士卒戰死者數百人長者固殺人乎叔叩頭曰夫貫高等謀反天子下明詔趙有敢隨張王者罪三族然孟舒自髡鉗隨張王以身死之豈自知為雲中守哉漢與楚相距士卒罷敝而匈奴冒頓新服北夷來為邊寇孟舒知士卒罷敝不忍出言士爭臨城死敵如子為父以故死者數百人孟舒豈歐之哉是乃孟舒所以為長者於是上曰賢哉孟舒復召以為雲中守漢書爰盎傳梁王欲求為嗣盎進說其後語塞師古曰塞不行也梁王以此怨盎使人刺盎刺者至關中問盎稱之皆不容口師古曰稱美其德口不能容也迺見盎曰臣受梁王金刺君君長者不忍刺君然後刺者十餘曹備之漢書主父偃傳及齊王以自殺聞上大怒以為偃劫其王令自殺迺徵下吏治偃服受諸侯之金實不劫齊王令自殺上欲勿誅公孫弘爭曰齊王自殺無後國除為郡入漢偃本首惡非誅偃無以謝天下迺遂族偃偃方貴幸時客以千數及族死無一人視獨孔車收葬焉上聞之以車為長者後漢書章帝紀論曰魏文帝稱明帝察察章帝長者以上華嶠之辭章帝素知人厭明帝苛切事從寬厚感陳寵之義除慘獄之科深元元之愛著胎養之令元和二年令諸懷妊者賜穀人三斛奉承明德太后盡心孝道割裂名都以崇建周親平徭簡賦而人賴其慶又體之以忠恕文之以禮樂故乃蕃輔克諧群后德讓謂之長者不亦宜乎後漢書儒林列傳劉昆傳劉昆字桓公陳留東昏人先是崤黽驛道多虎災行旅不通昆為政三年仁化大行虎皆負子渡河帝聞而異之二十二年歷代杜林為光祿勳詔問昆曰前在江陵反風滅火後守弘農虎北渡河行何德政而致是事昆對曰偶然耳左右皆笑其質訥帝歎曰此乃長者之言也後漢書循吏列傳劉寵傳劉寵字祖榮東萊牟平人齊悼惠王之後也寵前後歷宰二郡累登卿相而准約省素劉攽曰按文言准都無義蓋本是廉字家無貨積嘗出京師欲息亭舍亭吏止之曰整頓灑埽以待劉公不可得也寵無言而去時人稱其長者後漢書劉寬傳劉寬典歷三郡溫仁多恕雖在倉卒未嘗疾言遽色夫人欲試寬令恚伺當朝會裝嚴己訖使侍婢奉肉羹翻汙朝衣婢遽收之寬神色不異乃徐言曰羹爛汝手其性度如此海內稱為長者三國志吳志陸遜傳會丹陽賊帥費棧受曹公印綬扇動山越為作內應權遣遜討棧還屯蕪湖會稽太守淳于式表遜枉取民人愁擾所在遜後詣都言次稱式佳吏權曰式白君而君薦之何也遜對曰式意欲養民是以白遜若遜復毀式以亂聖德不可長也權曰此誠長者之事顧人不能為耳新唐書武元衡傳李吉甫李絳數爭事帝前不叶元衡獨持正無所違附帝稱其長者
