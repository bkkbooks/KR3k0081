body:
  text: 卷第八十九隱逸第一前漢王吉等傳漢興有園公綺里季夏黃公角里先生此四人者當秦之世避而入商雒深山以待天下之定也自高祖聞而召之不至其後呂后用留侯計使皇太子卑辭束帛致禮安車迎而致之四人既至從太子見高祖客而禮焉太子得以為重遂用自安語在留侯傳其後谷口有鄭子真蜀有嚴君平皆脩身自保非其服弗服非其食弗食成帝時元舅大將軍王鳳以禮聘子真子真遂不屈而終君平卜筮於成都市以為卜筮者賤業而可以惠眾人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因執導之以善從吾言者已過半矣裁日閱數人得百錢足自養則閉肆下簾而授老子博覽亡不通依老子嚴莊之指著書十餘萬言自園公綺里季夏黃公角里先生鄭子真嚴君平皆未嘗仕然其風聲足以激貪厲俗近古之逸民也後漢張楷傳楷字公超通嚴氏春秋古文尚書門徒常百人賓客慕之自父黨夙儒偕造門焉司隸舉茂才除長陵令不至官隱居洪農山中學者隨之所居成市後華陰山南遂有公超市後漢楊震傳父寶哀平之世隱居教授居攝二年與兩龔蔣詡俱召遂遁逃不知所處光武高其節建武中公車特徵老病不到後漢周黨傳光武詔曰自古明王聖主必有不賓之士伯夷叔齊不食周粟太原周黨不受朕祿亦各有志焉後漢周勰傳前後三辟竟不能屈後舉賢良万正不應又公車召玄緟備禮固辭廢疾常隱處竄身慕老聃清靜杜絕人事巷生荊棘後漢逸民傳梁鴻字伯鸞歸鄉里勢家慕其高節多欲女之鴻並絕不娶同縣孟氏有女狀肥醜而黑力舉石曰擇對不嫁至年三十父母問其故女曰欲得賢如梁伯鸞者鴻聞而聘之女求作布衣麻屨織作之具及嫁始以裝飾入門七日而鴻不荅妻乃跪請曰竊聞夫子高義簡斥數婦妾亦偃蹇數夫矣今而見擇敢不請罪鴻曰吾欲裘褐之人可與俱隱深山者爾今乃衣綺縞傳粉墨豈鴻所願哉妻曰以觀夫子之志耳妾自有隱居之服乃更為推髻著布衣操作而前鴻大喜曰此真梁鴻妻也有頃妻曰常聞天子欲隱居避患今何為默默無乃欲低頭就之乎鴻乃共入霸陵山中以耕織為業詠詩書彈琴以自娛仰慕前世高士而為匹皓以來二十四人作頌後漢逸民法真傳順帝西巡羽又薦之帝前後四詔真曰吾既不能遯形遠世豈飲洗耳之水哉遂深自隱絕郭正稱之曰法真名可得聞身難得而見逃名而名我隨避名而名我追可謂百世之師蜀志評曰杜微修身隱靜不役當世庶幾夷皓之概晉節粲傳高絜著名與劉尚公同志友善並不應辟命荊州剌史桓寬厚禮請粲為別駕粲嘉其好賢乃起尚公謂之曰卿忽然改節誠失所望粲笑答曰足下可謂有志於隱而未知隱之為道朝亦可隱市亦可隱隱初在我不在於物尚無以難之然粲亦名譽減半矣晉隱士董京字威輦至洛陽宿白社中後數年遁去莫知所之於其所寢處惟有一石竹子及詩二篇其一曰乾道剛簡坤體敦密芒芒太素是則是述末世流奔以文代質悠悠世目孰知其實逝將去此至虛歸我自然之室又曰孔子不遇時彼感麟麟乎麟胡不遁世以存真新唐陽城傳家貧不能得書乃求為吏集賢院竊院書讀之晝夜不出戶六年無所不通及進士第乃去隱中條山遠近慕其行來學者跡接于道閭里爭訟不詣官而詣城史之箋證漢書王吉等傳漢興有園公綺里季夏黃公甪里先生宋祁曰季字下當有公字甪不成字當作角此四人者當秦之世避而入商雒深山以待天下之定也自高祖聞而召之不至其後呂后用留侯計使皇太子卑辭束帛致禮安車迎而致之四人既至從太子見高祖客而敬焉太子得以為重遂用自安語在留侯傳其後谷口有鄭子真蜀有嚴君平皆修身自保非其服弗服非其食弗食成帝時元舅大將軍王鳳以禮聘子真子真遂不詘而終君平卜筮於成都市以為卜筮者賤業而可以惠眾人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢導之以善從吾言者已過半矣裁日閱數人得百錢足自養則閉肆下簾而授老子博覽亡不通依老子嚴周之指著書十萬餘言自園公綺里季夏黃公甪里先生鄭子真嚴君平皆未嘗仕然其風聲足以激貪厲俗近古之逸民也後漢書張楷傳楷字公超通嚴氏春秋古文尚書門徒常百人賓客慕之自父黨夙儒偕造門焉司隸舉茂才除長陵令不至官隱居洪農山中學者隨之所居成市後華陰山南遂有公超市後漢楊震傳父寶習歐陽尚書哀平之世隱居教授居攝二年與兩龔蔣詡俱徵遂遁逃不知所處光武高其節建武中公車特徵老病不到卒於家後漢書逸民列傳周黨傳詔曰自古明王聖主必有不賓之士伯夷叔齊不食周粟太原周黨不受朕祿亦各有志焉其賜帛四十匹黨遂隱居黽池著書上下篇而終邑人賢而祠之後漢書周舉傳附子周勰勰字巨勝少尚玄虛以父任為郎自免歸家父故吏河南召夔為郡將卑身降禮致敬於勰勰恥交報之因杜門自絕後太守舉孝廉復以疾去時梁冀貴盛被其徵命者莫敢不應唯勰前後三辟竟不能屈後舉賢良方正不應又公車徵玄纁備禮固辭廢疾常隱處竄身慕老聃清淨杜絕人事巷生產棘十有餘歲後漢書逸民列傳梁鴻傳梁鴻字伯鸞扶風平陵人也因為執勤不懈朝夕鄰家耆老見鴻非恒人乃共責讓主人而稱鴻長者於是始敬異焉悉還其豕鴻不受而去歸鄉里勢家慕其高節多欲女之鴻並絕不娶同縣孟氏有女狀肥醜而黑力舉石臼擇對不嫁至年三十父母問其故女曰欲得賢如梁伯鸞者鴻聞而聘之女求作布衣麻屨織作筐緝績之具及嫁始以裝飾入門七日而鴻不荅妻乃跪牀下請曰竊聞夫子高義簡斥數婦妾亦偃蹇數夫矣今而見擇敢不請罪鴻曰吾欲裘褐之人可與俱隱深山者爾今乃衣綺縞傅粉墨豈鴻所願哉妻曰以觀夫子之志耳妾自有隱居之服乃更為椎髻著布衣操作而前鴻大喜曰此真梁鴻妻也能奉我矣字之曰德曜名孟光居有頃妻曰常聞夫子欲隱居避患今何為默默無乃欲低頭就之乎鴻曰諾乃共入霸陵山中以耕織為業詠詩書鼓琴以自娛仰慕前世高士而為四皓以來二十四人作頌後漢書逸民列傳法真傳會順帝西巡弱又薦之帝虛心欲致前後四徵真曰吾彥不能遯形遠世豈飲洗耳之水哉遂深自隱絕終不降屈友人郭正稱之曰法虛名可得聞身難得而見逃名而名我隨避名而名我追可謂百世之師者矣三國志蜀志杜微周群杜瓊許慈孟光來敏尹默李譔譙周郤正傳評曰杜微脩身隱靜不役當世庶幾夷皓之概晉書鄧粲傳鄧粲長沙人少以高潔著名與南陽劉驎之南郡劉尚公同志友善並不應州郡辟命荊州刺史桓寬卑辭厚禮請粲為別駕粲嘉其好賢乃起應召驎之尚公謂之曰卿道廣學深眾所推懷忽然改節誠失所望粲笑答曰足下可謂有志於隱而未知隱夫隱之為道朝亦可隱市亦可隱隱初在我不在於物尚公等無以難之然粲亦於此名譽減半矣晉書隱逸列傳董京傳董京字威輦不知何郡人也初與隴西計吏俱至洛陽被髮而行逍遙吟詠常宿白社中後數年遁去莫知所之於其所寢處惟有一石竹子及詩二篇其一曰乾道剛簡坤體敦密茫茫太素是則是述末世流奔以文代質悠悠世目孰知其實逝將去此至虛歸我自然之室又曰孔子不遇時彼感麟麟乎麟胡不遁世以存真新唐書陽城傳陽城字亢宗定州北平人徙陜州夏縣世為官族資好學貧不能得書求為吏𨶎集賢院竊院書讀之晝夜不出戶六年無所不通及進士第乃去隱中條山與弟絕域常易衣出年長不肯娶謂弟曰吾與若孤惸相育既娶則間外姓雖共處而益疏我不忍弟義之亦不娶遂終身城謙恭簡素遇人長幼如一遠近慕其行來學者跡接于道閭里有爭訟不詣官而詣城決之舉逸民第二前漢律曆志孔子陳後王之法曰謹權量審法度修廢官舉逸民四方之政行矣後漢丕遷東郡太守丕在二郡數薦達幽隱名士帷幄近臣後漢逸民傳光武側席幽人求之若不及旌帛蒲車之所微賁相望於巖中矣若薛方逢萌聘而不肯至嚴光周黨玉霸至而不能屈群方咸遂志士懷仁斯固所謂舉逸民天下歸心者乎後漢逸民傳肅宗亦禮鄭均而召高鳳以成其節晉李重傳為吏部郎又上疏曰凡山林避寵之士雖違世背時出處殊軌而先王許之者嘉其服膺高義也昔先帝患風流之弊而思反純朴乃諮詢朝眾搜求隱逸咸寧二年始以太子中庶子召安定皇甫謐四年又以博士召南安朱沖雖皆以病疾不至而朝野悅服陛下遠邁先帝禮賢之旨臣訪沖州邑言其雖年近耋耄志氣克壯耽道窮藪老而彌新操尚正純所居成化誠山栖耆德足以表世篤俗者也臣以為宜垂聖恩及其未沒顯加優命竟不能從五箋證漢書律曆志周衰官失孔子陳後王之法曰謹權量審法度修廢官舉逸民四方之政行矣後漢書魯恭傳附弟魯丕丕字叔陵性沉深好學孳孳不倦遂杜絕交游不答候問之禮士友常以此短之而丕欣然自得遷東郡太守丕在二郡為人修通溉灌百姓殷富數薦達幽隱名士續漢書曰薦王龔等皆備帷幄近臣後漢書逸民傳光武側席幽人求之若不及旌帛蒲車之所徵賁相望於巖中矣若薛方逢萌聘而不肯至嚴光周黨王霸至而不能屈群方咸遂志士懷仁斯固所謂舉逸民天下歸心者乎後漢書逸民傳肅宗亦禮鄭均而徵高鳳以成其節五晉書李重傳李重字茂曾江夏鍾武人也重少好學有文辭早孤與群弟居以友愛著稱弱冠為本國中正遜讓不行遷尚書吏部郎又上疏曰凡山林避寵之士雖違世背時出處殊軌而先王許之者嘉其服膺高義也昔先帝患風流之弊而思反純朴乃諮詢朝眾搜求隱逸咸寧二年始以太子中庶子徵安定皇甫謐四年又以博士徵南安朱沖太康元年復以太子庶子徵沖雖皆以病疾不至而朝野悅服陛下遠邁先帝禮賢之旨臣訪沖州邑言其雖年近耋耄而志氣克壯耽道窮藪老而彌新操尚貞純所居成化誠山栖耆德足以表世篤俗者也臣以為宜垂聖恩及其未沒顯加優命時朝廷政亂竟不能從高尚其事第三史記魯仲連傳救趙秦君遂引而去於是平原君欲封魯連魯連辭讓使者三終不肯受平原君乃置酒酒酣起前以千金為魯連壽魯連笑曰所貴於天下之士者為人排患釋難解紛亂而旡取也即有取者是商賈之士也而連不忍為也遂辭平原君而去終身不復見史記淳于髡傳客有見髡於梁惠王惠王屏左右獨坐而再見之終旡言也惠王讓客謂髡髡曰吾前見王王志在驅逐後復見王王志在音聲吾是以默然客具以報王王大駭曰嗟乎淳于先生誠聖人也前人有獻善馬者寡人未及試會先生至後人有獻謳者未及試亦會先生來寡人雖屏人然私心在彼有之後淳于髡見壹語連三日三夜旡倦惠王欲以卿相位待之髡因謝去於是送以安車駕駟束帛加壁黃金百鎰終身不仕後漢李傳論曰任棠姜歧世著其清結甕牖而辭三命殆漢陽之幽人乎龐參躬求賢之禮故民悅其政橋玄厲邦君之威而眾失其情夫豈力不足歟將有道在焉橋玄之舍姜歧以道不可違故不得以威力通也如令其道可忘則彊梁勝矣語曰三軍可奪帥匹夫不可奪志子貢曰寧喪千金不失志心昔段干木踰牆而避文侯之命泄柳閉門不納穆公之請貴必有所屈賤亦有所申矣後漢橋玄傳為漢陽太守郡人上邽姜歧守道隱居名聞西州玄召以為吏稱疾不就玄怒勑督郵尹益逼致之曰歧若不至趣嫁其母益固爭不能得遽曉譬歧歧堅臥不起郡內士大夫亦競往諫玄乃止時頗以為譏後漢逸民傳易稱遯之時義大矣哉又曰不事王侯高尚其事是以堯稱則天不屈潁陽之高潁陽謂許巢也武盡美矣終全孤竹之絜孤竹謂夷齊也後漢逸民法真傳太守請見之真乃幅巾詣謁太守曰昔魯哀公雖為不肖而仲尼稱臣太守虛薄欲以公曹相屈光贊本朝何如真曰以明府見待有禮故敢自同賓末若欲吏之真將在北山之北南山之南矣太守不敢復言晉王羲之傳羲之稱疾去郡於父母墓前自誓既去官與東土人士盡山水之遊弋釣為娛又與道士許邁共修服食採藥石不遠千里遍遊東中諸郡窮諸名山泛滄海歎曰我卒當以樂死晉阮裕有肥遁之志有以問王羲之曰此公近不驚寵辱雖古之沉冥何以過此晉劉伶傳縱情肆志常以細宇宙齊萬物為心淡默少言不妄交遊與嵇阮相遇欣然神解攜手入林初不以家產有旡介意九晉皇甫謐傳史臣曰皇甫謐素履幽正閑居養疾留情筆削敦悅立憤軒冕未足為榮貧賤不以為恥確乎不拔斯固有晉之高人者歟晉陶潛傳不營生業家務悉委之兒僕未嘗有喜慍之色惟遇酒則飲時式旡酒亦雅詠不輟嘗言夏月虛閑高臥北窗之下清風颯至自謂羲皇上人性不解音而畜素琴一張絃徽不具每朋酒之會則撫而和之曰但識琴中趣何勞絃上聲晉宋纖隱居於酒泉南山明究經緯弟子受業三千餘人不應州郡辟命太守楊宣畫其象於閣上出入視之作頌曰為枕何石為漱何流身不可見名不可求酒泉太守馬岌高尚之士也具威儀鳴鐃鼓造焉纖高樓重閣距而不見岌歎曰名可聞而身不可見德可仰而形不可覩吾而今而後知先生人中之龍也銘詩于石壁曰丹崖百丈青壁萬尋奇木蓊鬱蔚若鄧林其人如玉維國之琛室邇人遐實勞我心纖注論語及為詩頌數萬言新唐隱逸傳序古之隱者大抵有三概上焉者身藏而德不晦故自放草野而名往從之雖萬乘之貴猶尋軌而委聘也其次挈治世具弗得伸或持峭行不可屈于俗雖有所應其於爵祿也汎然受悠然辭使人君常有所慕企怊然如不足其可貴也未焉者資槁薄樂山林內審其才終不可當世取捨故逃丘園而不返使人常高其風而不敢加訾焉且世未嘗旡隱有之未嘗不旌賁而先焉者以孔子所謂舉逸民天下之人歸焉唐興賢人在丘眾多其遁戢不出者纔班明可述然皆下概者也雖然各保其素非託默于誥足崖壑而志誠闕也然放利之徒假隱自名以詭祿仕肩相摩於道至號中南嵩少為仕塗捷徑高尚之節喪焉故裒可喜慕者類于篇箋證史記魯仲連傳適會魏公子無忌奪晉鄙軍以救趙擊秦軍秦軍遂引而去於是平原君欲封魯連魯連辭讓使者三終不肯受平原君乃置酒酒酣起前以千金為魯連壽魯連笑曰所貴於天下之士者為人排患釋難解紛亂而無取也即有取者是商賈之士也而連不忍為也遂辭平原君而去終身不復見史記孟子荀卿列傳客有見髡於梁惠王惠王屏左右獨坐而再見之終旡言也惠王怪之以讓客客以謂髡髡曰固也吾前見王王志在驅逐後復見王王志在音聲吾是以默然客具以報王王大駭曰嗟乎淳于先生誠聖人也前淳于先生之來人有獻善馬者寡人未及視會先生至後先生之來人有獻謳者未及試亦會先生來寡人雖屏人然私心在彼有之後淳于髡見壹語連三日三夜無倦惠王欲以卿相位待之髡因謝去於是送以安車駕駟束帛加璧黃金百鎰終身不仕後漢書李恂陳禪龐參陳龜橋玄傳論曰任棠姜歧世著其清結甕牖而辭三命殆漢陽之幽人乎龐參躬求賢之禮故民悅其政橋玄厲邦君之威而眾失其情夫豈力不足歟將有道在焉橋玄之舍姜歧以道不可違故不得以威力逼也如令其道可忘則彊梁勝矣語曰三軍可奪帥匹夫不可奪志子貢曰寧喪千金不失士心昔段干木踰牆而避文侯之命泄柳閉門不納穆公之請貴必有所屈賤亦有所伸矣後漢書橋玄傳刑竟徵再遷上谷太守又為漢陽太守郡人上邽姜歧守道隱居名聞西州玄召以為吏稱疾不就玄怒勑督郵尹益逼致之曰歧若不至趣嫁其母益固爭不能得遽曉譬歧歧堅臥不起郡內士大夫亦競往諫玄乃止時頗以為譏後漢書逸民傳易稱遯之時義大矣哉又曰不事王侯高尚其事是以堯稱則天不屈潁陽之高潁陽謂巢許也武盡美矣終全孤竹之潔孤竹謂夷齊也後漢書逸民法真傳性恬靜寡欲不交人閒事太守請見之真乃幅巾詣謁太守曰昔魯哀公雖為不肖而仲尼稱臣太守虛薄欲以公曹相屈光贊本朝何如真曰以明府見待有禮故敢自同賓末若欲吏之真將在北山之北南山之南矣太守戄然不敢復言晉書王羲之傳羲之深恥之遂稱病去郡於父母墓前自誓既去官與東土人士盡山水之游弋釣為娛又與道士許邁共修服食採藥石不遠千里徧游東中諸郡窮諸名山泛滄海歎曰我卒當以樂死晉書阮裕傳還剡山有肥遁之志有以問王羲之羲之曰此公近不驚寵辱雖古之沉冥何以過此九晉書劉伶傳放情肆志常以細宇宙齊萬物為心澹默少言不妄交游與嵇阮嵇康相遇欣然神解攜手入林初不以家產有無介意晉書皇甫謐傳史臣曰皇甫謐素履幽貞閑居養疾留情筆削敦悅丘墳軒冕未足為榮貧賤不以為恥確乎不拔斯固有晉之高人者歟晉書陶潛傳又不營生業家務悉委之兒僕未嘗有喜慍之色惟遇酒則飲時或無酒亦雅詠不輟嘗言夏月虛閑高臥北窗之下清風颯至自謂羲皇上人性不解音而畜素琴一張絃徽不具每朋酒之會則撫而和之曰但識琴中趣何勞絃上聲晉書宋纖傳宋纖字令艾敦煌效穀人也少有遠操沈靖不與世交隱居於酒泉南山明究經緯弟子受業三千餘人不應州郡辟命惟與陰顒齊好友善張祚時太守楊宣畫其象於閣上出入視之作頌曰為枕何石為漱何流身不可見名不可求酒泉太守馬岌高尚之士也具威儀鳴鐃鼓造焉纖高樓重閣距而不見岌歎曰名可聞而身不可見德可仰而形不可覩吾而今而後知先生人中之龍也銘詩于石壁曰丹崖百丈青壁萬尋奇木蓊鬱蔚若鄧林其人如玉維國之琛室邇人遐實勞我心纖注論語及為詩頌數萬言新唐書隱逸傳古之隱者大抵有三概上焉者身藏而德不晦故自放草野而名往從之雖萬乘之貴猶尋軌而委聘也其次挈治世具弗得伸或持峭行不可屈于俗雖有所應其於爵祿也汎然受悠然辭使人君常有所慕企怊然如不足其可貴也末焉者資槁薄樂山林內審其才終不可當世取捨故逃丘園而不返使人常高其風而不敢加訾焉且世未嘗無隱有之未嘗不旌賁而先焉者以孔子所謂舉逸民天下之人歸焉唐興賢人在位眾多其遁戢不出者纔班班可述然皆下概者也雖然各保其素非託默于語足崖壑而志城闕也然放利之徒假隱自名以詭祿仕肩相摩於道至號終南嵩少為仕塗捷徑高尚之節喪焉故裒可喜慕者類于篇聘召不起第四後漢申屠蟠傳中平五年爽等十四人並博士召不至明年董卓廢立蟠及爽等復俱公車召惟蟠不到後漢姜肱傳肱兼通五經兼明星緯諸公爭加辟命皆不就二弟名聲相次亦不應召聘時人慕之後漢逢萌字子康北海人也王莽殺其子宇將家屬浮海客於遼東及光武即位召萌託以老耄迷路東西語使者云朝廷召我者以其有益於政尚不知方面安能濟時乎即便駕歸連召不起以壽終魏管寧傳黃初四年高祖文皇帝疇諮群公思求俊乂故司徒華歆舉寧應選公車特召每輒辭疾拒違不至晉子庄少以孝友著名以弋釣為事及長不復獵或問漁獵同是害生而去其一何也庄曰獵自我釣自物且夫貪餌吞鉤豈我哉時人以為知言晚節亦不復釣端居歠菽飲水禮命晉虞喜傳帝以博士召不起復下詔褒美而召為散騎常待又辭病時朝廷大議不決者遣就諮訪焉餘見好學皇甫謐傳箋證後漢書申屠蟠傳中平五年復與爽玄及穎川韓融陳紀等十四人並博士徵不至明年董卓廢立蟠及爽融紀等復俱公車徵唯蟠不到後漢書姜肱傳肱博通五經兼明星緯士之遠來就學者三千餘人諸公爭加辟命皆不就二弟名聲相次亦不應徵聘時人慕之後漢書逢萌傳逢萌字子慶北海都昌人也王莽殺其子宇將家屬浮海客於遼東及光武即位徵萌託以老耄迷路東西語使者云朝廷所以徵我者以其有益於政尚不知方面所在安能濟時乎即便駕歸連徵不起以壽終三國志魏志管寧傳黃初四年高祖文皇帝疇諮群公思求乂故司徒華歆舉寧應選公車特徵振翼遐裔翻然來翔每輒辭疾拒違不至晉書翟湯傳附子翟莊子莊字祖休少以孝友著名遵湯之操不交人物耕而後食語不及俗惟以弋釣為事及長不復獵或問漁獵同是害生之事而先生止去其一何哉莊曰獵自我釣自物未能頓盡故先節其甚者且夫貪餌吞鉤豈我哉時人以為知言晚節亦不復釣端居篳門歠菽飲水州府禮命及公車徵並不就晉書儒林列傳虞喜虞喜字仲寧會稽餘姚人喜少立操行博學好古諸葛恢臨郡屈為功曹察孝廉州舉秀才司徒辟皆不就元帝初鎮江左上疏薦喜懷帝即位公車徵拜博士不就太寧中與臨海任旭俱以博士徵不就復下詔曰臨海任旭會稽虞喜並絜靜其操歲寒不移研精墳典居今行古志操足以勵俗博學足以明道前雖不至其更以博士徵之咸康初內史何充上疏詔曰尋陽翟湯會稽虞喜並守道清貞不營世務耽學高尚其並以散騎常侍徵之又不起永和初有司奏稱十月殷祭京兆府君當遷祧室征西豫章頴川二府君初毀主內外博議不能決時喜在會稽朝廷遣就喜諮訪焉其見重如此
