body:
  text: 卷第十二薦舉第一史記魏世家李克過翟璜之家翟璜曰今者聞君召先生而卜相果誰為之李克曰魏成子為相矣翟璜忿然曰臣何負於魏成子西河之守臣之所進也君內以鄴為憂臣進西門豹君謀欲伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈侯鮒臣何以負於魏成子李克曰且子之言克於子之君者豈將比周以求大官哉君問而置相非成則璜二子何如克對曰君不察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉是以知魏成子之為相也且子安得與魏成子比乎魏成子以食祿千鍾什九在外什一在內是以東得卜子夏田子方段干木此三人者君皆師之子之所進五人者君皆臣之子惡得與魏成子比也翟璜拜曰璜鄙人也失對願卒為弟子前漢蒯通傳齊悼惠王時曹參為相禮下賢人請通為客初齊王田榮怨項羽謀舉兵畔之劫齊士不與者死齊處士東郭先生梁石君在劫中強從及田榮敗二人醜之相與入深山隱居客謂通曰先生之於曹相國拾遺舉過顯賢進能齊國莫若先生者先生知梁石君東郭先生世俗所不及何不進之於相國乎通曰臣之里婦與里之諸母相善也里婦夜亡肉姑以為盜怒而逐之婦晨去過所善諸母語以事而謝之里母曰女安行我今令而家追女矣即束縕請火於亡肉家曰昨暮夜犬得肉爭鬭相殺請火治之亡內家遽追呼其婦故里母非談說之士也束縕乞火非還婦之道也然物有相感事有適可臣請乞火於曹相國迺見曹相曰婦人有夫死三日而嫁者有幽居守寡不出門者足下即欲求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士也隱居不嫁未嘗卑節下意以求仕也願足下使人禮之曹相國曰謹受命皆以為上賓前漢通之降漢從弟子百餘人然無所進剸言諸故群盜壯士進之弟子皆曰事先生數年幸得從降漢今不進臣等剸言大猾何也通迺謂曰漢王方蒙矢石爭天下諸生寧能鬭乎故先言斬將搴旗之士諸生且待我我不忘矣及共起朝儀通因進曰諸弟子儒生隨臣久矣與共為儀願陛下官之高帝悉以為郎通出皆以五百金賜諸生迺喜曰叔孫生聖人知當世務前漢竇嬰傳吳楚反拜嬰為大將軍賜金千斤嬰言爰盎欒布諸名將賢士在家者進之前漢蚡新用事卑下賓客進名士家居者貴之欲以傾諸將相傾謂踰越而勝之前漢贊曰湯雖酷烈及身蒙咎其推賢楊善固宜有後前漢韓安國傳所推舉皆廉士賢於己者於梁舉壺遂臧固至它皆天下名士士亦以此稱慕之唯天子以為國器前漢鄭當時傳其推轂及官屬丞史誠有味其言也推轂言薦舉人如車轂之運轉也有味者其言甚美也常引以為賢於己未嘗名吏與官屬言若恐傷之聞人之善言進之上唯恐後天下不名人之至它皆天名士亦以為子前漢稚圭傳元帝初即位史高以外屬領尚書事蕭望之為副望之名儒多所貢薦高充位而已楊興說高曰將軍貴重於天下然眾庶論議令問休譽不專在將軍者何也以將軍所舉不過私門賓客乳母子弟然一夫竊議語流天下夫富貴在身而列士不譽呂入有狐白之裘而反衣之也古人病其若此故卑體勞心以求賢為務傳曰以賢難得之故因曰事不待賢以食難得之故而曰飽不待食或之甚者也平原文學稚圭材智有餘經學絕倫將軍誠召置莫府與參事議觀其所有貢之朝庭必為國器以此顯示眾庶名流於世高然其言辟衡為議曹史薦衡於上上以為郎中後漢鄧騭傳時飢荒盜賊四夷侵叛騭等崇節儉罷力役推進天下賢士何熙祋風祋姓也音丁外反羊浸李郃陶敦等列於朝廷辟楊震朱寵陳禪置之幕府故天下復安後漢張皓等傳論曰張皓王龔稱為推士若其好通級善明發升薦仁人之情也夫士進則世收其器賢用即人獻其能能獻既已厚其功器牧亦理兼天下賢人見用則人競獻其所能但有能既獻動必有功功多賞厚故言已厚其功有大器必被收用用則海內蒙福故曰理兼天下其利甚博而人莫知先豈同折枝於長者以不為為難乎後漢龐參傳樊準上疏薦參曰臣聞鷙鳥累百不如一鶚後漢孟嘗傳同郡楊喬上書薦嘗曰且南海多珍財產易積掌握之內價盈兼金而嘗單身謝病躬耕壟次匿景藏采不楊華藻實羽融之美用非盈腹背之毛也而沉淪草莽好爵莫及廊廟之寶棄於溝渠嘗竟不見用後漢荀彧傳操每征伐在外其軍國之事皆與彧籌焉彧又進操謀計之士從子攸及鍾繇郭嘉陳群杜襲司馬懿戲志才等皆稱其舉後漢孔融傳融聞人之善若出諸己言有可採必演而成之面告其短而退稱所長薦達賢士多所獎進知而未言以為己過故海內英俊皆信服之魏盧毓傳會司徒缺毓舉處士管寧帝不能用毓於人及選舉先舉性行而後言才黃門李豐嘗以問毓毓曰才所以為善也故大才成大善小才成小善今稱之有才而不能為善是才不中器也豐等服其言唐韋表微曰進賢不計私唐蘇詵曰內舉不避親唐韋貫之曰內舉人不謂之私晉陸玩傳玩雖為公輔謙讓不辟掾屬成帝聞而勸之玩乃從命所辟皆寒素有行之士由是搢紳之徒莫不廕其德宇新唐李綰傳歷禮部侍郎建復古孝廉力田等科天下高其議餘見舉賢受賞陳平傳前漢蕭望之曰中書宜用賢明之選南史庾於陵曰清宮恒其人而非論族望箋證史記魏世家魏文侯謂李克曰先生嘗教寡人曰家貧則思良妻國亂則思良相今所置非成則璜集解徐廣曰文侯弟名成二子何如李克對曰臣聞之卑不謀尊疎不謀戚臣在闕門之外不敢當命李克趨而出過翟璜之家翟璜曰今者聞君召先生而卜相果誰為之李克曰魏成子為相矣翟璜忿然作色曰以耳目之所覩記臣何負於魏成子西河之守臣之所進也君內以鄴為憂臣進西門豹君謀欲伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈侯鮒臣何以負於魏成子李克曰且子之言克於子之君者豈將比周以求大官哉君問而置相非成則璜二子何如克對曰君不察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉是以知魏成子之為相也且子安得與魏成子比乎魏成子以食祿千鍾什九在外什一在內是以東得卜子夏田子方段干木此三人者君皆師之子之所進五人者君皆臣之子惡得與魏成子比也翟璜逡巡再拜曰璜鄙人也失對願卒為弟子漢書蒯通傳蒯通范陽人也本與武帝同諱師古曰本名為徹其後史家追書為通齊悼惠王時曹參為相禮下賢人請通為客初齊王田榮怨項羽謀舉兵畔之劫齊士不與者死師古曰劫而取之不從則殺也齊處士東郭先生梁石君在劫中強從及田榮敗二人醜之相與入深山隱居客謂通曰先生之於曹相國拾遺舉過顯賢進能齊國莫若先生者先生知梁石君東郭先生世俗所不及何不進之於相國乎通曰諾臣之里婦與里之諸母相善也里婦夜亡肉姑以為盜怒而逐之婦晨去過所善諸母語以事而謝之師古曰謝謂告辭也里母曰女安行師古曰安徐也我今令而家追女矣師古曰而亦汝即束縕請火於亡肉家曰昨暮夜犬得肉爭鬭相殺請火治之師古曰治謂燖治死犬亡肉家遽追呼其婦故里母非談說之士也束縕乞火非還婦之道也然物有相感事有適可臣請乞火於曹相國迺見相國曰婦人有夫死三日而嫁者有幽居守寡不出門者足下即欲求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士也隱居不嫁未嘗卑節下意以求仕也願足下使人禮之曹相國曰敬受命皆以為上賓漢書叔孫通傳通之降漢從弟子百餘人然無所進剸言諸故群盜壯士進之弟子皆曰事先生數年幸得從降漢今不進臣等剸言大猾何也師古曰狡猾之人通乃謂曰漢王方蒙矢石爭天下諸生寧能鬭乎故先言斬將搴旗之士諸生且待我我不忘矣漢王拜通為博士號稷嗣君漢王已并天下諸侯共尊為皇帝於定陶通就其儀號師古曰就成也高帝悉去秦儀法為簡易群臣飲爭功醉或妄呼按劍擊柱宋祁曰按當作拔上患之通知上益饜之說上曰夫儒者難與進取可與守成臣願徵魯諸生與臣弟子共起朝儀拜通為奉常賜金五百斤通因進曰諸弟子儒生隨臣久矣與共為儀願陛下官之高帝悉以為郎通出皆以五百金賜諸生諸生乃喜曰叔孫生聖人知當世務漢書竇嬰傳竇嬰字王孫孝文皇后從兄子也孝景三年吳楚反上察宗室諸竇無如嬰賢師古曰宗室帝之同姓親也諸竇總謂帝外家也以吳楚之難故欲用內外之親為將也召入見固讓謝稱病不足任太后亦慙於是上曰天下方有急王孫寧可以讓邪迺拜嬰為大將軍賜金千斤嬰言爰盎欒布諸名將賢士在家者進之漢書田蚡孝景王皇后同母弟也孝景崩武帝初即位蚡以舅封為武安侯弟勝為周陽侯蚡新用事卑下賓客進名士家居者貴之晉灼曰滯在里巷未仕者欲以傾諸將相師古曰傾謂踰越而勝之也漢書張湯傳贊曰漢興以來侯者百數保國持寵未有若富平者也湯雖酷烈及身蒙咎其推賢揚善固宜有後漢書韓安國傳韓安國字長孺梁成安人也安國為人多大略知足以當世取舍師古曰舍止也取舍言可取則取可止則止而出於忠厚貪耆財利師古曰耆讀若嗜然所推舉皆廉士賢於己者於梁舉壺遂臧固至它皆天下名士師古曰於梁舉二人至於他餘所舉亦皆名士也士亦以此稱慕之唯天子以為國器漢書鄭當時傳每朝候上間說未嘗不言天下長者師古曰候天子間隙之時其所稱說皆言長者也其推轂士及官屬丞史誠有味其言也師古曰推轂言薦舉人如推轂之運轉也有味者其言甚美也常引以為賢於已未嘗名吏與官屬言若恐傷之聞人之善言進之上唯恐後漢書匡衡傳宣帝崩元帝初即位樂陵侯史高以外屬為大司馬車騎將軍領尚書事前將軍蕭望之為副望之名儒有師傅舊恩天子任之多所貢薦高充位而已與望之有隙長安令楊興說高曰將軍以親戚輔政貴重於天下無二然眾庶論議令問休譽不專在將軍者何也師古曰令善問名休美也彼誠有所聞也以將軍之莫府海內莫不卬望師古曰卬讀曰仰而所舉不過私門賓客乳母子弟人情忽不自知然一夫竊議語流天下夫富貴在身而列士不譽是有狐白之裘而反衣之也古人病其若此故卑體勞心以求賢為務傳曰以賢難得之故因曰事不待賢以食難得之故而曰飽不待食惑之甚者也平原文學匡衡材智有餘經學絕倫但以無階朝廷故隨牒在遠方將軍誠召置莫府學士歙然歸仁與參事議觀其所有貢之朝廷必為國器以此顯示眾庶名流於世高然其言辟衡為議曹史薦衡於上上以為郎中後漢書鄧禹傳附孫鄧騭騭字昭伯東觀記隲作陟時遭元二之災人士荒饑死者相望盜賊群起四夷侵畔騭等崇節儉罷力役推進天下賢士何熙祋諷祋姓也音丁外反又音丁活反羊䘲李郃陶敦等列於朝廷辟楊震朱寵陳禪置之幕府故天下復安卷四十六案鄧禹之後漢書張王等列傳論曰張晧王龔稱為推士若其好通汲善明發升薦仁人之情也夫士進則世收其器賢用則人獻其能能獻既已厚其功器收亦理兼天下言賢人見用即人競獻其所能但有能即獻動必有功功多賞厚故言已厚其功有才器必被收用用則海內蒙福故曰理兼天下其利甚博而人莫之先豈同折枝於長者以不為為難乎後漢書龐參傳龐參字仲達河南緱氏人也會御史中丞樊準上疏薦參曰臣聞鷙鳥累百不如一鶚前書鄒陽諫吳王之辭也鶚大鵬也後漢書循吏列傳孟嘗傳孟嘗字伯周會稽上虞人也桓帝時尚書同郡楊喬上書薦嘗曰且南海多珍財產易積掌握之內價盈兼金而嘗單身謝病躬耕壟次匿景藏采不揚華藻實羽翮之美用非徒腹背之毛也而沈淪草莽好爵莫及廊廟之寶棄於溝渠嘗竟不見用年七十卒于家後漢書荀彧傳荀彧字文若袁宏漢紀彧作郁潁川潁陰人操每征伐在外其軍國之事皆與彧籌焉彧又進操計謀之士從子攸及鍾繇郭嘉陳群杜襲司馬懿戲志才等皆稱其舉後漢書孔融傳孔融字文舉魯國人孔子二十世孫也七世祖霸為元帝師位至侍中融聞人之善若出諸已言有可採必演而成之面告其短而退稱所長薦達賢士多所獎進知而未言以為己過故海內英俊皆信服之三國志魏志盧毓傳盧毓字子家涿郡涿人也父植有名於世會司徒缺毓舉處士管寧帝不能用更問其次毓對曰敦篤至行則太中大夫韓暨亮直清方則司隸校尉崔林貞固純粹則太常常林帝乃用暨毓於人及選舉先舉性行而後言才黃門李豐嘗以問毓毓曰才所以為善也故大才成大善小才成小善今稱之有才而不能為善是才不中器也豐等服其言新唐書韋表微傳韋表微字子明隋郿城公元禮七世孫學士缺人人爭薦丞相所善者表微獨薦韋處厚人服其公進知制誥後與處厚議增選學士復薦路隋處厚以諸父事表微因曰隋位崇入且居翁右奈何答曰選德進賢初不計私也新唐書蘇詵傳詵字廷言舉賢良方正高第補汾陰尉遷祕書詳正學士累轉給事中時頲為紫微侍郎固辭帝曰古有內舉不避親者乎對曰晉祁奚是也新唐書韋貫之傳韋貫之名純避憲宗諱以字行永貞時始為監察御史舉其弟纁自代及為右補闕纁代為御史議者不謂之私卷一百六十九晉書陸玩傳玩字士瑤器量淹雅弱冠有美名玩雖登公輔謙讓不辟掾屬成帝聞而勸之玩不得已而從命所辟皆寒素有行之士玩翼亮累世常以弘重為人主所貴加性通雅不以名位格物誘納後進謙若布衣由是搢紳之徒莫不廕其德宇新唐書楊綰傳楊綰字公權華州華陰人天寶亂肅宗即位綰脫身見行在拜起居舍人知制誥累遷中書舍人歷禮部侍郎建復古孝廉力田等科天下高其議漢書蕭望之傳望之以為中書政本宜以賢明之選梁書庾於陵傳東宮官屬通為清選洗馬掌文翰尤其清者近世用人皆取甲族有才望時於陵與周捨並擢充職高祖曰官以人而清豈限以甲族時論以為美薦賢自代第二史記孫叔敖者楚之處士也虞丘相進之於楚莊王以自代也三月為楚相前漢邴吉傳上問吉曰君即有不諱可以自代者誰吉曰杜延年明於法度曉國家故事于定國執法詳平天下自以不冤陳萬年事後母孝敦厚備於行止此三人能皆在臣右唯上察之上以吉言皆是而許焉及吉薨召延年定國萬年為御史大夫居位皆稱職上稱吉為知人後漢鍾皓傳同郡陳寔年不及皓皓引與為友皓為郡功曹會辟司徒府太守問誰可代卿者皓曰西門亭長陳寔可唐敏曰中曰以勳德而進中令唐薛稷曰胥吏以勳不可進中令後漢張酺傳為大尉數上疏薦魏郡太守徐防自代帝不許後漢郭丹傳因歸鄉里太守杜詩請為功曹丹薦鄉人長者自代而去詩乃嘆曰昔明王興化卿士讓位今功曹推賢可謂至德勑以丹事編署黃堂以為後法黃堂太守之廳事魏盧毓傳詔以毓為吏部尚書使毓自選代曰得如卿者乃可毓舉常侍鄭沖帝曰文和吾自知之更舉吾所未聞者乃舉阮武孫邕帝於是用邕晉何曾曰不以私昔憾廢至公之體魏李典曰不可以私憾忘公義蜀蔣琬傳五年亮住漢中琬為長史亮數出外琬常足食足兵以相供給亮每言公琰託志忠雅當與吾共贊王業密表後主曰臣若不幸後事宜以付琬晉何充傳嘗詣導導以塵尾指床呼充共坐曰此是君坐也明帝亦友昵之王導及庾亮並言於帝曰何充器局方概有萬夫之望必能總錄朝端為老臣之副臣死之後願引充內侍社稷無虞矣新唐李吉甫傳德宗時吉甫為相病固乞免薦裴垍自代新唐劉晏傳晏領江淮轉運租庸鹽鐵常平使兼戶部侍郎晏以戶部讓顏真卿新唐元載傳載初為轉運使及拜門下平章事載以度支繁浩有吏事督責損威重乃悉天下錢榖委劉晏餘見臣不嚴而治李勉傳箋證史記循吏列傳孫叔敖孫叔敖者正義說苑云孫叔敖為令尹一國吏民皆來賀有一老父衣麤衣冠白冠後來弔曰有身貴而驕人者民亡之位已高而擅權者君惡之祿已厚而不知足者患處之叔敖再拜敬受命願聞餘教父曰位已高而意益下官益大而心益小祿已厚而慎不取君謹守此三者足以治楚楚之處士也虞丘相進之於楚莊王以自代也三月為楚相漢書丙吉傳丙吉字少卿魯國人也五鳳三年春吉病篤上自臨問吉曰君即有不諱誰可以自代者師古曰不諱言死不可復諱也吉辭謝曰群臣行能明主所知愚臣無所能識上固問吉頓首曰西河太守杜延年明於法度曉國家故事前為九卿十餘年今在郡治有能名廷尉于定國執憲詳平天下自以不冤太僕陳萬年事後母孝惇厚備於行止此三人能皆在臣右唯上察之上以吉言皆是而許焉及吉薨御史大夫黃霸為丞相徵西河太守杜延年為御史大夫會其年老乞骸骨病免以廷尉于定國代為御史大夫霸霸薨而定國為丞相太僕陳萬年代定國為御史大夫居位皆稱職上稱吉為知人後漢書鍾皓傳鍾皓字季明潁川長社人也為郡著姓世善刑律皓少以篤行稱公府連辟為二兄未仕避隱密山密縣山也以詩律教授門徒千餘人同郡陳寔年不及皓皓引與為友皓為郡功曹會辟司徒府臨辭太守問誰可代卿者皓曰明府欲必得其人西門亭長陳寔可新唐書白敏中傳敏中字用晦少孤承學諸兄長慶初第進士辟義成節度使未幾加敏中中書令自裴度以勳德居而敏中以恩澤進未見後漢書張酺傳永元五年遷酺為太僕數月代尹睦為太尉漢官儀曰睦字伯師河南鞏人也數上疏以疾乞身薦魏郡太守徐防自代帝不許後漢書郭丹傳郭丹字少卿南陽穰人也建武二年因歸鄉里太守杜詩請為功曹丹薦鄉人長者自代而去詩乃歎曰昔明王興化卿士讓位今功曹推賢可謂至德勑以丹事編署黃堂以為後法黃堂太守之廳事三國志魏志盧毓傳詔曰官人秩才聖帝所難必須良佐進可替否侍中毓稟性貞固心平體正可謂明試有功不懈于位者也其以毓為吏部尚書使毓自選代曰得如卿者乃可毓舉常侍鄭冲帝曰文和吾自知之更舉吾所未聞者乃舉阮武孫邕帝於是用邕晉書何曾傳何曾字穎考陳國陽夏人也劉享嘗奏曾華侈後曾辟享為掾或勸勿應享謂至公之體不以私憾遂應辟三國志魏志李典傳李典字曼成山陽鉅野人也遷破虜將軍與張遼樂進屯合肥孫權率眾圍之遼欲奉教出戰進典遼皆素不睦遼恐其不從典慨然曰此國家大事顧君計何如耳吾可以私憾而忘公義乎三國志蜀志蔣琬傳蔣琬字公琰零陵湘鄉人也建興元年丞相亮開府辟琬為東曹掾五年亮住漢中琬與長史張裔統留府事八年代裔為長史加撫軍將軍亮數外出琬常足食足兵以相供給亮每言公琰託志忠雅當與吾共贊王業者也密表後主曰臣若不幸後事宜以付琬晉書何充傳何充字次道廬江灊人魏光祿大夫禎之曾孫也充即王導妻之姊子充妻明穆皇后之妹也故少與導善早歷顯官嘗詣導導以麈尾指牀呼充共坐曰此是君坐也導繕揚州廨舍顧而言曰正為次道耳明帝亦友昵之成帝即位遷給事黃門侍郎蘇峻作亂京都傾覆導從駕在石頭充東奔義軍其後導奔白石充亦得還賊平封都鄉侯拜散騎常侍出為東陽太守仍除建威將軍會稽內史在郡甚有德政薦徵士虞喜拔郡人謝奉魏顗等以為佐吏後以墓被發去郡詔徵侍中不拜改葬畢除建威將軍丹陽尹王導庾亮並言於帝曰何充器局方概有萬夫之望必能總錄朝端為老臣之副臣死之日願引充內侍則外譽唯緝社稷無虞矣新唐書李吉甫傳載曰吉甫病醫者夜宿其第群捕醫者劾吉甫交通術士帝大駭訊之無狀群等皆貶而吉甫亦固乞免因薦裴垍自代卷一百四十六案會史所云即據此割裂而成新唐書劉晏傳劉晏字士安曹州南華人祿山亂避地褒陽永王璘署晏右職固辭詔拜度支郎中兼侍御史領江淮租庸事代宗立復為京兆尹戶部侍郎領度支鹽鐵轉運鑄錢租庸使晏以戶部讓顏真卿改國子祭酒新唐書元載傳元載字公輔鳳翔岐山人累遷戶部侍郎充度支江淮轉運等使帝不豫李輔國用事輔國妻載宗女也因相締昵會京兆尹缺輔國白用載載意屬國柄固辭輔國曉之翌日拜同中書門下平章事領使如故代宗立輔國勢愈重數稱其才進拜中書侍郎許昌縣子載以度支繁浩有吏事督責損威寵乃悉天下錢榖委劉晏舉非其人第三史記范睢傳應侯任鄭安平使將擊趙安平為趙所急困以兵二萬人降趙應侯席藁請罪後二歲又舉王稽為河東守與諸侯通坐法誅而應侯曰益以不懌前漢陳湯傳元帝詔列侯舉茂材勃舉湯湯待遷父死不犇喪司隸奏湯無循行勃選舉故不以實坐削戶會薨因賜謚曰繆侯以其繆舉人也前漢嚴延年傳察獄史廉有臧不入身延年察舉其獄史為廉而此人乃有臧罪然臧不入身也延年坐選舉不實貶秩笑曰後敢復有舉人者矣前漢朱雲傳華陰守丞嘉上封事言朱雲可使試守御史大夫稚圭對以為大臣者國家之股肱萬姓所瞻仰明王所慎擇也傳曰下輕其上爵賤人圖柄臣則國家搖動而民不靜矣今嘉從守丞而圖大臣之位欲以匹夫徒步之人而超九卿之右非所以重國家而尊社稷也妄相稱舉疑有姦心漸不可長宜下有司案驗嘉竟坐之後漢王丹傅客初有薦士於丹者因選舉之而後所舉者陷罪丹坐以免客慚懼自絕而丹終無所言乃呼客謂曰子之自絕何量丹之薄也不為設食以罰之相待如舊後漢宋洪傳洪薦桓譚為議郎給事中帝乃讌輔令鼓琴好其繁聲洪聞之不悅悔於薦舉召譚責而遣之後帝大會群臣使譚鼓琴譚見洪失其常度帝怪而問之洪免冠謝曰臣所薦譚者望能以忠正導主而令朝廷耽悅鄭聲臣之罪也帝改容謝洪後漢陳寔傳寔轉功曹時中常侍侯覽託太守高倫用吏倫教署為文學掾寔知非其人懷檄請見檄反書也言曰此人不宜用而侯常侍不可違寔乞從外署不足以塵明德倫從之於是鄉論怪其非舉寔終無所言新唐薛登上疏曰方今舉士尤怪其本明詔方下固已驅馳府寺之庭出入王公之第陳篇希恩奏記誓報故俗號舉人皆稱覓舉覓者自求也箋證史記范雎列傳范雎者魏人也字叔游說諸侯欲事魏王家貧無以自資昭王四十三年秦攻韓汾陘拔之因城河上廣武後五年昭王用應侯謀縱反間賣趙秦大破趙於長平遂圍邯鄲已而與武安君白起有隙言而殺之任鄭安平使將擊趙鄭安平為趙所圍急以兵二萬人降趙應侯席藁請罪秦之法任人而所任不善者各以其罪罪之於是應侯罪當收三族秦昭王恐傷應侯之意乃下令國中有敢言鄭安平事者以其罪罪之而加賜相國應侯食物日益厚以順適其意後二歲王稽為河東守與諸侯通坐法誅而應侯日益以不懌漢書陳湯傳陳湯字子公山陽瑕丘人也少好書博達善屬文家貧匄貣無節不為州里所稱師古曰匄乞也貣音吐得反西至長安求官得太官獻食丞數歲富平侯張勃與湯交高其能初元二年元帝詔列侯舉茂材勃舉湯湯待遷父死不犇喪師古曰犇古奔字司隸奏湯無循行勃選舉故不以實坐削戶二百會薨因賜諡曰繆侯師古曰以其繆舉人也漢書酷吏傳嚴延年嚴延年字次卿東海下邳人也又延年察獄史廉有臧不入身師古曰延年察舉其獄史為廉而此人乃有臧罪然臧不入身也宋祁曰越本刪有字延年坐選舉不實貶秩笑曰後敢復有舉人者矣漢書朱雲傳朱雲字游魯人也元帝時琅邪貢禹為御史大夫而華陰守丞嘉上封事師古曰守華陰縣丞者其人名嘉言治道在於得賢御史之官宰相之副九卿之右師古曰右言在上也不可不選平陵朱雲兼資文武忠正有智略可使以六百石秩試守御史大夫以盡其能上迺下其事問公卿太子少傅匡衡對以為大臣者國家之股肱萬姓所瞻仰明王所慎擇也傳曰下輕其上爵賤人圖柄臣則國家搖動而民不靜矣師古曰上爵大官也圖謀也柄臣執權之臣今嘉從守丞而圖大臣之位欲以匹夫徒步之人而超九卿之右非所以重國家而尊社稷也自堯之用舜文王於太公猶試然後爵之又况朱雲者乎雲素好勇數犯法亡命受易頗有師道其行義未有以異今御史大夫禹絜白廉正經術通明有伯夷史魚之風海內莫不聞知而嘉猥稱雲師古曰猥曲也欲令為御史大夫妄相稱舉疑有姦心漸不可長宜下有司案驗以明好惡嘉竟坐之後漢書王丹傳王丹字仲回京兆下邽人也客初有薦士於丹者因選舉之而後所舉者陷罪丹坐以免客慚懼自絕而丹終無所言尋復徵為太子太傅乃呼客謂曰子之自絕何量丹之薄也不為設食以罰之相待如舊後漢書宋弘傳宋弘字仲子京兆長安人也光武即位徵拜太中大夫建武二年代王梁為大司空封栒邑侯所得租奉分贍九族家無資產以清行致稱徙封宣平侯帝嘗問弘通博之士弘乃薦沛國桓譚才學洽聞幾能及揚雄劉向父子於是召譚拜議郎給事中帝每讌輒令鼓琴好其繁聲弘聞之不悅悔於薦舉伺譚內出正朝服坐府上遣吏召之譚至不與席而讓之曰吾所以薦子者欲令輔國家以道德也而今數進鄭聲以亂雅頌非忠正者也能自改邪將令相舉以法乎譚頓首辭謝良久乃遣之後大會群臣帝使譚鼓琴譚見弘失其常度帝怪而問之弘乃離席免冠謝曰臣所以薦桓譚者望能以忠正導主而令朝廷耽悅鄭聲臣之罪也帝改容謝使反服其後後漢書陳寔傳陳寔字仲弓潁川許人也家貧復為郡西門亭長尋轉功曹時中常侍侯覽託太守絕倫用吏倫教署為文學掾寔知非其人懷檄請見檄板書謂以絕倫之教書之於檄而懷之者懼洩事也言曰此人不宜用而侯常侍不可違寔乞從外署不足以塵明德倫從之請從外署之舉不欲陷倫於請託也於是鄉論怪其非舉寔終無所言新唐書薛登傳薛登常州義興人天授中累遷左補闕時選舉濫甚乃上疏曰比觀舉薦類不以才馳聲假譽互相推引非所謂報國求賢者也古之取士考素行之原詢鄉邑之譽方今舉士尤乖其本明詔方下固已驅馳府寺之廷出入王公之第陳篇希恩奏記誓報故俗號舉人皆稱覓舉覓者自求也內舉不避親第四晉玄字幼度少為叔父安所器重符堅侵冠朝廷求良將可以鎮禦北方者安乃以幼度應舉郗超聞而嘆之曰安違眾舉親明也幼度必不負舉才也晉周浚遷侍中武帝問浚卿宗後生稱誰為可答曰臣叔父子恢稱重臣宗從父子馥稱清臣宗帝並召用魏辛毗曰不阿意苟進唐裴行險曰銓選有能名新唐徐浩曰循名責實新唐狄仁傑傳初子光嗣為司府丞詔宰相各舉尚書郎一人仁傑薦光嗣由是拜地官員外郎以稱職聞后曰奚祁內舉果得人新唐崔祐甫傳祐甫則薦舉惟其人不自疑畏推至公以行未踰年除吏幾八百員莫不諧允帝嘗謂曰人言卿擬官多親舊何邪對曰陛下令臣薦擬庶官夫進擬者必悉其才行如不與聞知何由得其實帝然之唐徐浩曰典選受託而擬受唐張九齡曰論銓選之弊箋證晉書謝安傳附從子謝玄玄字幼度少頴悟與從兄朗俱為叔父安所器重于時苻堅彊盛邊境數被侵寇朝廷求文武良將可以鎮禦北方者安乃以玄應舉中書郎郄超雖素與玄不善聞而歎之曰安違眾舉親明也玄必不負舉才也晉書周浚傳周浚字開林汝南安成人也遷侍中武帝問浚卿宗後生稱誰為可答曰臣叔父子恢稱重臣宗從父子馥稱清臣宗帝並召用三國志魏志辛毗有傳然會史此云則未見也新唐書裴行儉傳裴行儉字守約絳州聞喜人麟德二年擢累安西都護西域諸國多慕義歸附召為司文少卿遷吏部侍郎與李敬玄馬載同典選有能名時號裴馬新唐書徐浩有傳然亦未見循名責實語也新唐書狄仁傑傳附子狄光嗣光嗣聖德初為司府丞武后詔宰相各舉尚書郎一人仁傑薦光嗣由是拜地官員外郎以稱職聞后曰祁奚內舉果得人新唐書崔祐甫傳崔祐甫字貽孫太子賓客孝公沔之子也祐甫則薦舉惟其人不自疑畏推至公以行未踰年除吏幾八百員莫不諧允帝嘗謂曰人言卿擬官多親舊何邪對曰陛下令臣進擬庶官夫進擬者必悉其才行如不與聞知何由得其實帝以為然會史此云者未見也案會史所謂唐張九齡曰論銓選之弊亦未見是說所由出唐魏玄同有言銓選之弊文它則不知也外舉不避讎第五前漢韓信傳信為楚王召辱己之少年令出跨下者為中慰告諸將相曰方辱我時寧不能殺之為名故忍就於此前漢何武傳兄弟五人皆為郡吏郡縣敬憚之武弟顯家有而籍租常不入縣數負其課市嗇夫求商補辱顯家顯怒欲以吏事中商武曰以吾家租賦徭役不為眾先奉公吏不亦宜乎武卒白太守召商為卒吏州里聞之皆服焉後漢樂恢傳同郡楊政數眾毀恢後舉政子為孝廉由是鄉里歸之後漢陰興傳興與同郡張宗上谷鮮于裒不相好知其有用猶稱所長而達之後漢喬玄傳橋玄轉司徒素與南陽太守陳球有隙及在公位而薦球為廷尉吳呂蒙傳常以部曲事為江夏太守蔡遺所白蒙無恨意及豫章太守顧邵卒權問所用蒙因薦遺奉職佳吏權笑曰君欲為祁奚邪於是用之吳蔣欽傳初欽屯宣城嘗討豫章賊蕪湖令徐盛牧欽屯吏表斬之權以欽在遠不許盛由是自嫌於欽曹公出濡須欽與呂蒙持諸軍節度盛常畏欽因事害己而欽每稱其善盛既服德論者美焉新唐長孫忌傳太宗曰朕任官必以才雖仇如魏徵不棄也箋證漢書韓信傳高祖襲奪信軍徙信為楚王都下邳信至國召所從食漂母賜千金及下鄉亭長錢百師古曰以恥辱之曰公小人為德不竟師古曰言晨炊蓐食召辱己少年令出跨下者以為中尉告諸將相曰此壯士也方辱我時寧不能死死之無名故忍而就此師古曰就成也成今日之功漢書何武傳何武字君公蜀郡郫縣人也武兄弟五人皆為郡吏郡縣敬憚之武弟顯家有市籍租常不入縣數負其課師古曰以顯家不入租故每令縣負課殿市嗇夫求商捕辱顯家師古曰求姓商名也顯怒欲以吏事中商師古曰中傷之也武曰以吾家租賦繇役不為眾先奉公吏不亦宜乎武卒白太守召商為卒吏州里聞之皆服焉後漢書樂恢傳樂恢字伯奇京兆長陵人也同郡楊政數眾毀恢後舉政子為孝廉由是鄉里歸之後漢書陰興傳附弟陰興興字君陵光烈皇后母弟也雖好施接賓然門無俠客與同郡張宗上谷鮮于裒不相好知其有用猶稱所長而達之後漢書橋玄傳橋玄字公祖梁國睢陽人也建寧三年遷司空轉司徒素與南陽太守陳球有隙及在公位而薦球為廷尉三國志吳志呂蒙字子明汝南富陂人也蒙少不脩書傳每陳大事常口占為牋疏常以部曲事為江夏太守蔡遺所白蒙無恨意及豫章太守顧邵卒權問所用蒙因薦遺奉職佳吏權笑曰君欲為祁奚耶於是用之三國志吳志蔣欽傳蔣欽字公奕九江壽春人也初欽屯宣城嘗討豫章賊蕪湖令徐盛收欽屯吏表斬之權以欽在遠不許盛由是自嫌於欽曹公出濡須欽與呂蒙持諸軍節度盛常畏欽因事害己而欽每稱其善盛既服德論者美焉江表傳曰權謂欽曰盛前白卿卿今舉盛欲慕祁奚邪欽對曰臣聞公舉不挾私怨盛忠而勤彊有膽略器用好萬人督也今大事未定臣當助國求才豈敢挾私恨以蔽賢乎權嘉之新唐書長孫無忌傳帝曰朕任官必以才不者雖親若襄邑王神符不妄授若才雖仇如魏徵不棄也
