body:
  text: 卷第五十一師第一史記孔子世家孔子以詩書禮樂教弟子蓋三千焉身通六藝者七十有二人如顏濁鄒之徒頗受業者甚眾前漢夏侯勝曰制服為相傳之恩南史何修曰贈官為儒者之榮前漢董仲舒傳孝景時為博士下帷講誦弟子傳以久次相受業或莫見其面進退容止非禮不行學士皆師尊之前漢朱雲傳其教授擇諸生然後為弟子後漢桓焉傳弟子者數百人黃瓊楊賜最為顯貴後漢鄭康成傳應劭自贊曰故太守應中遠北面稱弟子何如康成笑曰仲尼之門考以四科回賜之徒不稱官閥劭有慚色後漢鄭康成傳事馬融融門徒四百餘人升堂進者五十餘生融素驕貴康成在門下三年不得見乃使高業弟子傳授康成康成日夜尋誦未嘗怠倦會融集諸生考論圖緯聞康成善筭乃召見於樓上康成因從質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣箋證史記孔子世家孔子以詩書禮樂教弟子蓋三千焉身通六藝者七十有二人如顏濁鄒之徒頗受業者甚眾未見疑為訛文未見疑為訛文漢書董仲舒傳董仲舒少治春秋孝景時為博士下帷講誦弟子傳以久次相授業或莫見其面盖三年不窺園其精如此進退容止非禮不行學士皆師尊之漢書朱雲傳其教授擇諸生然後為弟子後漢書桓榮傳附孫桓焉弟子傳業者數百人黃瓊楊賜最為顯貴後漢書鄭玄傳時汝南應劭亦歸於紹因自贊曰故太山太守應中遠北面稱弟子何如玄笑曰仲尼之門考以四科回賜之徒不稱官閥劭有顏色後漢書鄭玄傳乃西入關因涿郡盧植事扶風馬融融門徒四百餘人升堂進者五十餘生融素驕貴玄在門下三年不得見乃使高業弟子傳受於玄玄日夜尋誦未嘗怠倦會融集諸生考論圖緯聞玄善算乃召見於樓上玄因從質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣求師第二前漢于定國傳超為廷尉乃迎師學春秋身執經北面備弟子禮為人謙恭尤重經術後漢張霸傳霸博覽五經諸生孫林劉固段著等慕之各市宅其傍以就學焉後漢李固傳少好學常步行尋師不遠千里後漢周變傳良出於孤微少作縣吏年三十為尉從佐從佐謂隨從而已不主案牘也奉檄迎督郵即路慨然恥在廝役廝賤也因壞車殺馬毀裂衣冠乃遁至犍為從杜撫學妻子求索蹤跡斷絕後乃見草中有敗車死馬衣裳腐朽謂為虎狼盜賊所害發喪制服積十許年乃還鄉里志行高整非禮不動遇妻子如君臣鄉黨以為儀表後漢范丹傳少為小吏奉檄迎督郵丹恥之乃遁去受業於樊英又遊三輔就馬融通經歷年乃還魏邴原傳注原十一而喪父家貧早孤鄰有書舍原過其傍而泣師問曰童子何悲原曰孤者易傷貧者易感夫書者必皆具有父兄者一則羨其不孤二則羨其得學心中惻然而為涕零也師亦哀原之言而為之泣曰欲書可耳答曰無錢資師曰童子苟有志我徒相教不求資也於是遂就書一冬之間誦孝經論語魏邴原傳注及長金玉其行欲遠游學詣安丘孫崧崧辭曰君鄉里鄭君學覽古今博聞強識誠學者之師模也君乃舍之躡屣千里所謂以鄭為東家丘者也原曰先生之說誠可謂苦藥良鍼矣然猶未達僕之微趣也人各有志所規不同故乃有登山而採王者有入海而採珠者豈可謂登山者不知海之深入海者不知山之高哉君謂僕以鄭為東家丘君以僕為西家愚夫邪崧辭謝焉箋證漢書于定國傳大將軍光領尚書事條奏群臣諫昌邑王者皆超遷定國繇是為光祿大夫平尚書事甚見任用數年遷水衡都尉超為廷尉定國乃迎師學春秋身執經北面備弟子禮為人謙恭尤重經術後漢書張霸傳張霸七歲通春秋復欲進餘經父母曰汝小未能也霸曰我饒為之故字曰饒焉後就長水校尉樊儵受嚴氏公羊春秋遂博覽五經諸生孫林劉固段著等慕之各市宅其傍以就學焉後漢書李固傳李固字子堅漢中南鄭人少好學常步行尋師不遠千里後漢書周爕傳良字君郎出於孤微少作縣吏年三十為尉從佐從佐謂隨從而已不主案牘也奉檄迎督郵即路慨然恥在廝役廝賤也因壞車殺馬毀裂衣冠乃遁至犍為從杜撫學妻子求索蹤迹斷絕後乃見草中有敗車死馬衣裳腐朽謂為虎狼盜賊所害發喪制服積十許年乃還鄉里志行高整非禮不動遇妻子如君臣鄉黨以為儀表後漢書獨行列傳范冉傳范冉字史雲冉或作丹陳留外黃人也少為縣小吏年十八奉檄迎督郵冉恥之乃遁去到南陽受業於樊英又遊三輔就馬融通經歷年乃還三國志魏志邴原傳註引邴原別傳曰原十一而喪父家貧早孤鄰有書舍原過其旁而泣師問曰童子何悲原曰孤者易傷貧者易感夫書者必皆具有父兄者一則羡其不孤二則羡其得學心中惻然而為涕零也師亦哀原之言而為之泣曰欲書可耳答曰無錢資師曰童子苟有志我徒相教不求資也於是遂就書一冬之間誦孝經論語自在童齓之中嶷然有異及長金玉其行欲遠游學詣安邱孫崧崧辭曰君鄉里鄭君君知之乎原答曰然崧曰鄭君學覽古今博文彊識釣深致遠誠學者之師模也君乃舍之躡屣千里所謂以鄭為東家邱者也君似不知而曰然者何原曰先生之說誠可謂苦藥良鍼矣然猶未達僕之微趣也人各有志所規不同故乃有登山而採玉者有入海而採珠者豈可謂登山者不知海之深入海者不知山之高哉君謂僕以鄭為東家邱君以僕為西家愚夫邪崧辭謝焉學無常師第三後漢班固傳固博貫載籍百家九流之言無不窮究所學無常師後漢法真傳好學而無常家博通內外圖典為關西大儒弟子自遠方至箋證後漢書班彪傳附子班固固字孟堅年九歲能屬文誦詩書及長遂博貫載籍九流百家之言無不窮究所學無常師後漢書逸民列傳法真傳法真字高卿高一作喬扶風郿人好學而無常家博通內外圖典為關西大儒弟子自遠方至者立學校第四前漢循吏文翁傳修起學宮於成都市中招下縣子弟以為學官弟子為除更繇高者以補郡縣吏次為孝弟力田常選學官童子使在便坐受事每出行縣益從學官諸生明經飭行者與俱使傳教令出入閨閤縣邑吏民見而榮之數年爭欲為學官弟子富人至出錢以求之繇是大化蜀地學於京師者比齊魯焉至武帝時乃令天下郡國皆立學校官自文翁為始云前漢成帝紀陽朔二年詔曰古之立太學將以傳先王之業流化於天下也儒林之官四海之淵原宜皆明於古今溫故知新通達國體故謂之博士前漢賈山上言願少衰射獵以夏歲二月定明堂造太學修先王之道風行俗化萬邦之基定然后唯陛下所辛耳前漢董仲舒傳對曰古之王者南面而治天下莫不以教化為大務立太學以教於國設庠序以化於邑漸民以仁摩民以義節民以禮後漢孝明紀為四姓小侯開立學校置五經師袁宏漢紀同永平中崇尚儒學自皇太子諸王侯及功臣子弟莫不受經又為外戚樊氏郭氏陰氏馬氏諸弟子立學號四姓小侯置五經師以非列侯故曰小侯後漢儒林傳明帝時復為功臣子孫四姓末屬別立校舍搜選高能以受其業自期門羽林之士悉令通孝經章句匈奴亦遣子入學濟濟乎洋洋乎盛於永平矣後漢朱浮傳上書曰夫太學者禮義之宮教化所由興也陛下尊崇先聖垂意古典宮室禾飾干戈未休而先建太學造立橫舍橫學也或作黌比日車駕親臨觀饗將以廣時雍之化顯勉進之功也尋博士之官為天下宗師使孔聖之言傳而不絕後漢任延傳拜武威太守造立校官自掾吏子孫皆令詣學受業復其徭役章句既通悉顯拔榮進之郡遂有儒雅之士後漢循吏衛颯傳遷桂陽太守郡與交州接境頗染其俗不知禮則颯下車條年序之教設婚姻之禮期年間邦俗從化颯音立後漢應奉傳武陵蠻詹山等四千餘人反叛拜武陵太守到官慰納山等皆悉降散於是興學校舉仄陋政稱變俗後漢左雄傳上言宜崇經術繕修太學帝從之陽嘉元年太學新成詔試明經者補弟子增甲乙之科召十人後漢鮑昱傳子德為南陽太守郡學久廢德乃修起橫舍備之豆黻冕行禮奏樂又尊饗國老宴會諸儒百姓觀者莫不勸服魏志武帝紀令曰喪亂已來十有五年後生者不見仁義禮讓之風吾甚傷之其令郡國各修文學縣滿五百戶置校官選其鄉之俊造而敦學之庶幾先王之道不廢而有以益於天下晉范甯傳始解褐為餘杭令在縣敦學校養生徒潔己修禮志行之士莫不宗之風化大行自中興已來崇學敦教未有知甯者新唐儒學傳序高祖始受命鉏纇夷荒天下略定即詔有司立周公孔子廟于國學四時祠求其後議加爵土國學始置生七十二員取三品以上子弟若孫為之太學百四十員取五品已上四門學百三十員取士品已上郡縣三等上郡學置生六十員中下以十為差上縣學置生四十員中下亦以十為差又詔宗室功臣子孫就秘書外省別為小學餘見治遠自近史記儒林傳箋證漢書循吏傳文翁文翁少好學通春秋以郡縣吏察舉景帝末為蜀郡守仁愛好教化見蜀地辟陋有蠻夷風文翁欲誘進之又脩起學官於成都市中招下縣子弟以為學官弟子為除更繇師古曰不令從役也高者以補郡縣吏次為孝弟力田常選學官僮子使在便坐受事每出行縣益從學官諸生明經飭行者與俱使傳教令出入閨閤師古曰閨閤內中小門也縣邑吏民見而榮之數年爭欲為學官弟子富人至出錢以求之繇是大化蜀地學於京師者比齊魯焉至武帝時乃令天下郡國皆立學校官自文翁為之始云漢書成帝紀陽朔二年詔曰古之立太學將以傳先王之業流化於天下也儒林之官四海淵原宜皆明於古今溫故知新通達國體故謂之博士漢書賈山傳孝文時言治亂之道借秦為諭名曰至言其辭曰臣不勝大願願少衰射獵以夏歲二月定明堂造太學修先王之道風行俗成萬世之基定然後唯陛下所幸耳漢書董仲舒傳武帝即位舉賢良文學之士前後百數而仲舒以賢良對策焉仲舒對曰古之王者明於此是故南面而治天下莫不以教化為大務立太學以教於國設庠序以化於邑漸民以仁摩民以誼節民以禮後漢書明帝紀九年是歲大有年為四姓小侯開立學校置五經師袁宏漢記曰永平中崇尚儒學自皇太子諸王侯及功臣子弟莫不受經又為外戚樊氏郭氏陰氏馬氏諸子弟立學號四姓小侯置五經師以非列侯故曰小侯後漢書儒林列傳其後復為功臣子孫四姓末屬別立校舍搜選高能以受其業自期門羽林之士悉令通孝經章句匈奴亦遣子入學濟濟乎洋洋乎盛於永平矣後漢書朱浮傳七年轉太僕浮又以國學既興宜廣博士之選乃上書曰夫太學者禮義之宮教化所由興也陛下尊敬先聖垂意古典宮室未飾干戈未休而先建太學造立橫舍橫學也或作黌義亦同比日車駕親臨觀饗將以弘時雍之化顯勉進之功也尋博士之官為天下宗師使孔聖之言傳而不絕後漢書循吏列傳任延傳拜武威太守河西舊少雨澤乃為置水官吏修理溝渠皆蒙其利又造立校官自掾吏子孫皆令詣學受業復其徭役章句既通悉顯拔榮進之郡遂有儒雅之士後漢書循吏列傳衛颯傳衛颯政有名迹遷桂陽太守郡與交州接境頗染其俗不知禮則颯下車修庠序之教設婚姻之禮期年間邦俗從化後漢書應奉傳先是武陵蠻詹山等四千餘人反叛執縣令屯結連年詔下公卿議四府舉奉才堪將帥永興元年拜武陵太守到官慰納山等皆悉降散於是興學校舉側陋政稱變俗後漢書左雄傳又上言宜崇經術繕脩太學帝從之陽嘉元年太學新成詔試明經者補弟子增甲乙之科員各十人後漢書鮑永傳附子鮑昱子德修志節有名稱累官為南陽太守時歲多荒災唯南陽豐穰吏人愛悅號為神父時郡學久廢德乃修起橫舍備俎豆黼冕行禮奏樂又尊饗國老宴會諸儒百姓觀者莫不勸服三國志魏志武帝紀八年秋七月令曰喪亂已來十有五年後生者不見仁義禮讓之風吾甚傷之其令郡國各修文學縣滿五百戶置校官選其鄉之俊造而教學之庶幾先王之道不廢而有以益於天下晉書范汪傳附子范甯甯崇儒抑俗率皆如此溫薨之後始解褐為餘杭令在縣興學校養生徒絜己脩禮志行之士莫不宗之朞年之後風化大行自中興已來崇學敦教未有如甯者也新唐書儒學列傳上序高祖始受命鉏纇夷荒天下略定即詔有司立周公孔子廟于國學四時祠求其後議加爵土國學始置生七十二員取三品以上子弟若孫為之太學百四十員取五品以上四門學百三十員取七品以上郡縣三等上郡學置生六十員中下以十為差上縣學置生四十員中下亦以十為差又詔宗室功臣子孫就祕書外省別為小學毀學校第五後漢翟酺傳明帝時辟雍始成欲毀太學太尉趙熹以為太學辟雍皆宜兼存故並傳至今而頃者頹廢至為園採芻牧之處宜更修繕誘進後學帝從之後漢襄楷傳上疏曰臣以為太學天子教化之官其門無故自壞者文德將喪教化廢也箋證後漢書翟酺傳明帝時辟雍始成欲毀太學太尉趙熹以為太學辟雍皆宜兼存故並傳至今而頃者頹廢至為園採芻牧之處宜更脩繕誘進後學帝從之後漢書襄楷傳桓帝時宦官專朝政刑暴濫又比失皇子災異尤數延熹九年楷自家詣闕上疏曰臣以為太學天子教化之宮其門無故自壞者言文德將喪教化廢也勸學第六前漢武帝紀詔曰其令禮官勸學講義洽聞舉遺興禮以為天下先太常其議予博士弟子崇鄉黨之化以厲賢材焉後漢左雄傳雄又奏召海內名儒為博士使公卿子弟為諸生有志操者加俸祿及謝廉趙建年始十二各能通經雄並奏拜童子郎於是負書來學雲集京師後漢張霸傳永元中為會稽太守表用郡人處士顧奉公孫松等奉後為潁川太守松為司隸校尉並有名稱其餘有業行者皆見擢用郡中爭厲志節習經者以千數道路但聞誦聲後漢郭太傳茅容年四十餘耕於野時與等輩避雨樹下眾皆夷踞相對夷平踞蹲也容獨危坐愈恭太共言因請寓宿旦日容殺雞為饌太謂為己設既而以共其母自以草蔬與客同飯草麤也太起拜之曰卿賢乎哉因勸令學卒以成德後漢郭太傳庾乘少給事縣廷為門士太見而拔之勸遊學宮遂為諸生傭後能講論自以卑第每處下坐諸生博士皆就讎問由是學中以下坐為貴詔辟並不起後漢郭太傳孟敏荷甑墯地不顧而去太見而問其意對曰甑以破矣視之何益太異之因勸令遊學十年知名後漢樂羊子妻傳羊子遠尋師學一年來歸妻跪問其故羊子曰久行懷思無它異也妻乃引刀趨機而言曰此織生自蚕繭成於機杼一絲而累以至於寸累寸不已遂成丈匹今若斷斯織也則捐失成功稽廢時日夫子積學當日知其所亡以就懿德若中道而歸何異斷斯織乎羊乎感其言復還終業後漢高彪傳遷內黃令帝勑同僚臨送祖於上東門詔東觀畫彪像以勸學者後漢皇后紀太后詔徵和帝弟濟北河間王子男女年五歲以上四十餘人又鄧氏近親子孫三十餘人並為開邸第邸舍也教學經書躬自監試乃詔從兄河南尹豹越騎校尉康等曰方今承百王之敝時俗淺薄巧偽滋生五經衰缺不有化道將遂陵遲故欲褒崇聖道以正失俗今貴戚食祿之家溫衣美飯乘堅驅良而面牆術學不識臧否斯故禍敗所從來也永平中四姓小侯皆令入學所以矯俗厲薄反之忠孝先公既以武功書之竹帛兼以文德教化子孫先公鄧禹也故能束脩不觸羅網誠令兒曹上述祖考休烈下念詔書本意則足矣其勉之哉魏高柔傳上疏曰博士者道之淵藪六藝所宗宜隋學行優劣待以不次之位敦崇道教以勸學者帝納之晉虞漙傳遷鄱陽內史大修庠序廣招學徒移告屬縣生徒至者七百餘人漙乃作誥以獎訓之曰夫聖人之道淡而寡味故始學者不好也及至朞月所觀彌博日聞所不聞日見所不見然后心開意明忽然不覺大化之陶已至道之入神也故學之染人甚於丹青丹青吾見其久而渝矣未見久學而渝者者也令名宣流雅譽日新州府交命擇官而仕不亦美乎若乃含章舒藻揮翰流離稱述世務探賾究奇使楊班韜筆仲舒結舌亦唯才所居固無常人也然積一勺以成江河累微塵以崇峻極匪勤理無由濟也新唐韓愈傳作進學解曰國子先生晨入太學召諸生立館下誨之曰業精于勤荒于嬉行成于思毀于隨方今聖賢相逢治具必張拔去兇邪登崇畯良占小善者率以錄名一藝者無不庸杷羅剔抉刮垢磨光蓋有幸而獲選孰云多而不揚諸生業患不能精無患有司之不明行患不能成無患有司之不公餘見明經夏侯勝傳又見勉勵桓榮傳又見立學校文翁傳又見博覽百家皇甫謐傳箋證漢書武帝紀五年夏六月詔曰其令禮官勸學講議洽聞舉遺興禮以為天下先太常其議予博士弟子崇鄉黨之化以厲賢材焉後漢書左雄傳雄又奏徵海內名儒為博士使公卿子弟為諸生有志操者加其俸祿及汝南謝廉河南趙建年始十二各能通經雄並奏拜童子郎於是負書來學雲集京師後漢書張霸傳張霸字伯饒蜀郡成都人也永元中為會稽太守表用郡人處士顧奉公孫松等奉後為潁川太守松為司隸校尉並有名稱其餘有業行者皆見擢用郡中爭厲志節習經者以千數道路但聞誦聲後漢書郭太傳郭太字林宗太原界休人也茅容字季偉陳留人也年四十餘耕於野時與等輩避雨樹下眾皆夷踞相對夷平也說文曰踞蹲也容獨危坐愈恭林宗行見之而奇其異遂與共言因請寓宿旦日容殺雞為饌林宗謂為己設既而以共其母自以草蔬與客同飯草麤也林宗起拜之曰卿賢乎哉因勸令學卒以成德後漢書郭太傳庾乘字世遊頴川鄢陵人也少給事縣庭為門士林宗見而拔之勸遊學宮遂為諸生傭後能講論自以卑第每處下坐諸生博士皆就讎問由是學中以下坐為貴徵辟並不起後漢書郭太傳孟敏字叔達鉅鹿楊氏人也客居太原荷甑墮地不顧而去林宗見而問其意對曰甑已破矣視之何益林宗以此異之因勸令遊學十年知名三公俱辟並不屈云後漢書列女傳樂羊子妻河南樂羊子之妻者不知何氏之女也羊子遠尋師學一年來歸妻跪問其故羊子曰久行懷思無它異也妻乃引刀趨機而言曰此織生自蠶繭成於機杼一絲而累以至於寸累寸不已遂成丈匹今若斷斯織也則捐失成功稽廢時日夫子積學當日知其所亡以就懿德若中道而歸何異斷斯織乎羊子感其言復還終業後漢書文苑列傳高彪傳高彪字義方吳郡無錫人也無錫今常州縣家本單寒至彪為諸生遊太學有雅才而訥於言後遷內黃令帝勑同僚臨送祖於上東門詔東觀畫彪像以勸學者卷一百十下後漢書后紀鄧皇后紀六年太后詔徵和帝弟濟北河間王子男女年五歲以上四十餘人又鄧氏近親子孫三十餘人並為開邸第倉頡篇曰邸舍也教學經書躬自監試尚幼者使置師保朝夕入宮撫循詔導恩愛甚渥乃詔從兄河南尹豹越騎校尉康等曰吾所以引納群子置之學官者實以方今承百王之敝時俗淺薄巧偽滋生五經衰缺不有化導將遂陵遲故欲褒崇聖道以匡失俗傳不云乎飽食終日無所用心難矣哉今末世貴戚食祿之家溫衣美飯乘堅驅良而面牆術學不識臧否斯故禍敗所從來也永平中四姓小侯皆令入學所以矯俗厲薄反之忠孝先公既以武功書之竹帛兼以文教德化子孫先公謂鄧禹禹有子十三人各使守一蓺故曰文德也故能束脩不觸羅網誠令兒曹上述祖考休烈下念詔書本意則足矣其勉之哉三國志魏志高柔傳明帝即位封柔延壽亭侯時博士執經柔上疏曰臣以為博士者道之淵藪六藝所宗宜隨學行優劣待以不次之位敦崇道教以勸學者帝納之晉書虞溥傳虞溥字允源高平昌邑人也除鄱陽內史大修庠序廣招學徒移告屬縣曰於是至者七百餘人溥乃作誥以獎訓之曰文學諸生皆冠帶之流年盛志美始涉學庭講修典訓此大成之業立德之基也夫聖人之道淡而寡味故始學者不好也及至朞月所觀彌博所習彌多日聞所不聞日見所不見然後心開意朗敬業樂群忽然不覺大化之陶已至道之入神也故學之染人甚於丹青丹青吾見其久而渝矣未見久學而渝者也令名宣流雅譽日新朋友欽而樂之朝士敬而歎之於是州府交命擇官而仕不亦美乎若乃含章舒藻揮翰流離稱述世務探賾究奇使楊班韜筆仲舒結舌亦惟才所居固無常人也然積一勺以成江河累微塵以崇峻極匪志匪勤理無由濟也新唐書韓愈傳韓愈既才歷數黜官又下遷乃作進學解以自喻曰國子先生晨入太學召諸生立館下誨之曰業精于勤荒于嬉行成于思毀于隨方今聖賢相逢治具畢張拔去兇邪登崇畯良占小善者率以錄名一藝者無不庸爬羅剔抉刮垢磨光蓋有幸而獲選孰云多而不揚諸生業患不能精無患有司之不明行患不能成無患有司之不公勉勵第七前漢董仲舒傳對策曰強勉學問則聞見博而知益明強勉行道則德日起而大有功詩曰夙夜匪懈書曰茂哉茂哉皆強勉之謂也前漢東方朔傳曰太公體行仁義七十有二迺設用於文武得信厥說封於齊七百歲而不絕此士所以日夜孜孜敏行而不敢怠也後漢桓榮傳為少傳賜以緇車乘馬榮大會諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉哉箋證漢書董仲舒傳仲舒對曰彊勉學問則聞見博而知益明彊勉行道則德日起而大有功此皆可使還至而立有效者也詩曰夙夜匪解書云茂哉茂哉師古曰虞書咎繇謨之辭也茂勉也皆彊勉之謂也漢書東方朔傳朔上書陳農戰彊國之計因自訟獨不得大官欲求試用其言專商鞅韓非之語也指意放蕩頗復詼諧辭數萬言終不見用朔因著論設客難已用位卑以自慰諭其辭曰太公體行仁義七十有二迺設用於文武得信厥說封於齊七百歲而不絕此士所以日夜孳孳敏行而不敢怠也後漢書桓榮傳以榮為少傅賜以輜車乘馬榮大會諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉哉
