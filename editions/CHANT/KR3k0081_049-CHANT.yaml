body:
  text: 卷第四十九時令第一前漢魏相數表采易陰陽及明堂月令奏之曰東方之神太昊乘震執規司春南方之神炎帝乘離執衡司夏西方之神少昊乘兌執矩司秋北方之神顓頊乘坎執權司冬中央之神黃帝乘坤艮執繩司下土茲五帝所司各有時也東方之卦不可以治西方南方之卦不可以治北方春興兌治則饑秋興震治則華冬興離治則泄夏興坎治則雹後漢律歷志若夫用天因地揆時施教頒諸明堂以為民極者莫大乎月令帝王之大司備矣天下之能事畢矣晉志漢儀太史每歲上其年曆先立春立夏大暑立秋立冬常讀五時令皇帝所服各順五時之色帝升御坐尚書令已下就席位尚書三公郎以令置案上奉以入就席伏讀訖賜酒一巵晉律歷志仲尼之作春秋日以繼月月以繼時時以繼年年以首事明天時者人事之本是以王者重之新唐禮儀志王方慶奏議略曰天子以孟春正月上辛日於南郊總受十二月之政還藏於祖廟月取一政頒於明堂諸侯孟春之月朝於天子受十二月之政藏於祖廟月取一政而行之蓋所以和陰陽順天道也箋證漢書魏相傳又數表采易陰陽及明堂月令奏之曰萬物之性成各有常職不得相干東方之神太昊乘震執規司春南方之神炎帝乘離執衡司夏西方之神少昊乘兌執矩司秋北方之神顓頊乘坎執權司冬中央之神黃帝乘坤艮執繩司下土茲五帝所司各有時也東方之卦不可以治西方南方之卦不可以治北方春興兌治則饑秋興震治則華冬興離治則泄夏興坎治則雹後漢書律歷志下若夫用天因地揆時施教頒諸明堂以為民極者莫大乎月令帝王之大司備矣天下之能事畢矣晉書禮志上漢儀太史每歲上其年曆先立春立夏大暑立秋立冬常讀五時令皇帝所服各隨五時之色帝升御坐尚書令以下就席位尚書三公郎以令置案上奉以入就席伏讀訖賜酒一巵晉書律歷志下後秦姚興時當孝武太元九年歲在甲申天水姜岌造三紀甲子元歷其略曰治歷之道必審日月之行然後可以上考天時下察地化一失其本則四時變移故仲尼之作春秋日以繼月月以繼時時以繼年年以首事明天時者人事之本是以王者重之舊唐書禮儀志二鳳閣侍郎王方慶又奏議曰天子以孟春正月上辛日於南郊總受十二月之政還藏於祖廟月取一政班於明堂諸侯孟春之月朝於天子受十二月之政藏於祖廟月取一政而行之盖所以和陰陽順天道也順時令第二前漢成帝紀陽朔二年春寒詔曰昔在帝堯立羲和之官命以四時之事令不失其序故書云黎民於變時雍明以陰陽為本也今公卿大夫或不信陰陽薄而小之所奏請多違時政傳以不知周行天下而欲望陰陽和調豈不謬哉其務順四時月令前漢魏相上書自天子王侯能順四時以治國家身亡禍殃年壽永究餘見不順時令後漢孝章紀詔曰春秋於春每月書王者重三正慎三微也律十二月立春不以報囚月令冬至之後有順陽助生之文而旡鞠獄斷刑之政朕咨訪儒雅稽之典籍以為王者生殺宜順時氣其定律旡以十一月十二月報囚後漢魯恭傳上疏諫曰臣伏見詔書欽若天時憂念萬民為崇和氣罪非殊死且勿案驗進柔良退貪殘奉時令所以助仁德順昊天致和氣利黎民者也餘見善政李尋傳箋證漢書成帝紀陽朔二年春寒詔曰昔在帝堯立羲和之官命以四時之事令不失其序故書云黎民於蕃時雍明以陰陽為本也今公卿大夫或不信陰陽薄而小之所奏請多違時政傳以不知周行天下而欲望陰陽和調豈不謬哉其務順四時月令漢書魏相傳又數表采易陰陽及明堂月令奏之曰春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君下及兆民能法天地順四時以治國家身亡禍殃年壽永究後漢書章帝紀秋七月庚子詔曰春秋於春每月書王者重三正慎三微也律十二月立春不以報囚月令冬至之後有順陽助生之文而無鞫獄斷刑之政朕咨訪儒雅稽之典籍以為王者生殺宜順時氣其定律無以十一月十二月報囚後漢書魯恭傳和帝末下令麥秋得案驗薄刑而州郡好以苛察為政因此遂盛夏斷獄恭上疏諫曰臣伏見詔書敬若天時憂念萬民為崇和氣罪非殊死且勿案驗進柔良退貪殘奉時令所以助仁德順昊天致和氣利黎民者也不順時令第三前漢李尋傳上言請侍中尚書近臣自通知月令之意若陛下出令有繆於時者皆知爭之以順時氣前漢成帝詔公卿大夫所奏請多違時政餘見順時令前漢魏相上書曰天子之義必純取法天地而觀於先聖高皇帝令群臣議天子所服以安治天下相國臣何等議五陵叔孫通也春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君下及兆民能法天地順四時以治國家身亡禍殃年壽永究是奉宗廟安天下之大禮也臣請法之中謁者趙堯舉春主一時衣服禮物朝祭百事也李舜舉夏兒湯舉秋貢禹舉冬高帝時自有一貢禹兒五奚反四人各職一時大謁者襄章奏制曰可孝文以二月施恩惠於天下賜孝弟力田及罷軍卒祠死事者頗非時節御史大夫朝錯時為太子家令奏言其狀臣相伏念陛下恩澤甚厚然而災氣未息竊恐詔令未有合當時者也願陛下選明經通知陰陽者四人各主一時時至明言所職以和陰陽箋證漢書李尋傳哀帝初歷位召尋待詔黃門使侍中衛尉傅喜問尋尋對曰今朝廷忽於時月之令諸侍中尚書近臣宜皆令通知月令之意設群下請事若陛下出令有謬於時者當知爭之以順時氣案此條已見順時令第二箋證漢書魏相傳又數表采易陰陽及明堂月令奏之曰天子之義必純取法天地而觀於先聖高皇帝所述書天子所服第八曰大謁者臣章受詔長樂宮曰令群臣議天子所服以安治天下相國臣何御史大夫臣昌師古曰蕭何周昌也謹與將軍臣陵太子太傅臣通等議師古曰陵王陵通叔孫通春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君下及兆民能法天地順四時以治國家身亡禍殃年壽永究是奉宗廟安天下之大禮也臣請法之中謁者趙堯舉春應劭曰四時各舉所施行政事服虔曰主一時衣服禮物朝祭百事也師古曰服說是也李舜舉夏兒湯舉秋貢禹舉冬師古曰高帝時自有一貢禹也兒音五奚反四人各職一時大謁者襄章奏制曰可孝文皇帝時以二月施恩惠於天下賜孝弟力田及罷軍卒祠死事者頗非時節御史大夫鼂錯時為太子家令奏言其狀臣相伏念陛下恩澤甚厚然而災氣未息竊恐詔令有未合當時者也願陛下選明經通知陰陽者四人各主一時時至明言所職以和陰陽天下幸甚天令不時第四前漢高后紀元年秋桃李華前漢惠帝紀五年冬十月雷桃李華棗實前漢文帝紀六年冬十月桃李華前漢元帝紀三月雨雪隕霜傷麥前漢成帝紀四年秋桃李實前漢五行志獻帝初平四年六月寒氣如冬時新唐王求禮傳都城三月雨雪鳳閣侍郎蘇味道以為瑞率群臣入賀求禮讓曰宰相爕和陰陽而季春雨雪乃災也果以為瑞則冬月雷渠為瑞雷邪后為罷朝餘見災異劉向傳箋證漢書高后紀元年秋桃李華漢書惠帝紀五年冬十月靁桃李華棗實漢書文帝紀六年冬十月桃李華漢書元帝紀永光元年三月是月雨雪隕霜傷麥漢書成帝紀四年秋桃李實後漢書五行志三獻帝初平四年六月寒風如冬時新唐書王求禮傳王求禮許州長杜人武后時為左拾遺監察御史二年三月大雨雪鳳閣侍郎蘇味道等以為瑞率群臣入賀求禮讓曰宰相爕和陰陽而季春雨雪乃災也果以為瑞則冬月雷渠為瑞雷邪后為罷朝災異第五史記天官書五星者天之五佐為經緯見伏有時所過行嬴縮有度日變修德月變省刑星變結和凡天變過度乃占國君強大有德者昌弱小飾詐者亡太上修德其次修政其次修救其次修穰史記太公世家彗星見景公嘆群臣皆泣晏子笑公怒晏子曰臣笑群臣諛甚景公曰彗星當齊分野寡人以為憂晏子曰君高臺深池賦斂如弗得刑罰恐弗勝茀星將出彗星何懼乎公曰可穰否晏子曰使神可祝而來亦可穰而去也百姓苦怨以萬數而君令一人穰之安能勝眾口乎是時景公好治宮室聚狗馬奢侈厚賦重刑故晏子以此諫之史記楚世家昭王病於軍中有赤雲如鳥夾日而蜚昭王問周太史太史曰是害於楚王然可移於將相將相聞是言乃請自以身禱於神昭王曰將相孤之股肱也今移禍庸去是身乎弗聽卜而河為祟大夫請禱河昭王曰自吾先王受封望不過江漢而河非所獲罪也止不許孔子在陳聞是言曰楚昭王通大道矣其不失國宜哉前漢董仲舒傳對曰臣謹案春秋之中視前世已行之事以觀天人相與之際甚可畏也國家將有失道之敗而天迺先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗迺至以此見天心之仁愛人君而欲止其亂也自非大亡道之世者天盡欲扶持而全安之事在彊勉而已矣前漢董仲舒傳對曰後世廢德教而任刑罰刑罰不中則生邪氣邪氣積於下怨惡畜於上上下不和則陰陽繆盭而妖孽生矣此災異所緣而起也前漢息夫躬傳建言往年熒惑守心太白高而芒光又角星茀於河鼓其法為有兵亂可遣大將軍行邊兵勑武備斬一郡守以立威震四夷因以厭應變異上然之以問丞相嘉對曰臣聞動民以行不以言應天以實不以文下民微細猶不可詐況於上天神明而可欺哉天之見異所以敕戒人君欲令覺悟反正推誠行善民心說而天意得矣辯士見一端或妄以意傅著星歷虛造匈奴烏孫西羌之難謀動干戈設為權變非應天之道也唯陛下觀覽古戒反覆參考旡以先入之言為主前漢劉向傳春秋日食三十六山陵崩阤二彗星三見夜常星不見夜中星隕如雨一火災十四長狄入三國五石隕墜六鶂退飛多麋有蜮蜚鸐鵒來巢者皆一見晝冥晦雨木冰李梅冬實七月霜降草木不死八月殺菽大雨雹雨雪雷霆失序相乘水旱饑蝝螽螟螽午並起當是時禍亂輒應弒君三十六亡國五十二諸侯日走不得保其社稷者不可勝數也後漢郎顗傳皇天感物不為偽動災異應人要在責己後漢孝和紀京師蝗吏民言事者多歸責有司詔曰蝗蟲之異殆不虛生萬方有罪在予一人而言事者專咎自下非助我者也朕寤寐恫矜思弭憂釁恫痛也矜病也言如痛病在身欲除之也矜音古頑反昔楚嚴旡災而懼成王出郊而反風將何以輔朕不逮以塞災變百寮師尹勉修厥職剌史二干石詳刑辟理冤虐恤鰥寡矜孤弱思惟致災興蝗之咎晉張華傳惠帝年武庫火華懼因此變作列兵固守然後救之故累代之寶及漢高斬蛇劍王莽頭孔子屐等盡焚焉時華見劍穿屋而飛莫知所向晉書明帝太和初日應蝕太史奏於靈星祈禳帝曰朕即位以來施化有不合於皇神故上天有以寤之宜勑政自修有以報於神明天之於人猶父之於子不有父欲責其子而可獻盛饌以求免也群公卿士大夫其各勉修厥職有可以補朕不逮者各封上之晉五行志高堂隆曰夫災異之發皆所以明教誡也惟率禮修德可以勝之新唐五行志正觀二年京畿旱蝗食稼太宗在苑中掇蝗咒之曰人以榖為命百姓有過在予一人汝若通靈但當蝕我旡害百姓將吞之侍臣懼帝致疾遽以為諫帝曰所冀移災朕躬何疾之避遂吞之是歲蝗不為患新唐書宋務光傳神龍元年大水詔文武九品以上官直言極諫務光上書曰臣聞三五之君不能免淫亢顧備禦存乎人耳災興細微安之不怪及禍變已成駭而圖之猶水決治防病困求藥雖復僶俛尚何救哉餘見天人相通鮑宣傳又見妖不勝德封禪書箋證史記天官書水火金木填星此五星者天之五佐正義言水火金木土五星佐天行德也為經緯正義五星行南北為經東西為緯也見伏有時所過行贏縮有度日變脩德月變省刑星變結和凡天變過度乃占國君彊大有德者昌弱小飾詐者亡太上修德其次修政其次修救其次修禳正下無之史記齊太公世家三十二年彗星見景公坐柏寢嘆曰堂堂誰有此乎集解服虔曰景公自恐德薄不能久享齊國故曰誰有此也群臣皆泣晏子笑公怒晏子曰臣笑群臣諛甚景公曰彗星出東北當齊分野寡人以為憂晏子曰君高臺深池賦歛如弗得刑罰恐弗勝茀星將出彗星何懼乎公曰可禳否晏子曰使神可祝而來亦可禳而去也百姓苦怨以萬數而君令一人禳之安能勝眾口乎是時景公好治宮室聚狗馬奢侈厚賦重刑故晏子以此諫之史記楚世家二十七年春吳伐陳楚昭王救之軍城父十月昭王病於軍中有赤雲如鳥夾日而蜚昭王問周太史太史曰是害於楚王然可移於將相將相聞是言乃請自以身禱於神昭王曰將相孤之股肱也今移禍庸去是身乎弗聽卜而河為祟大夫請禱河昭王曰自吾先王受封望不過江漢而河非所獲罪也止不許孔子在陳聞是言曰楚昭王通大道矣其不失國宜哉漢書董仲舒傳仲舒對曰陛下發德音下明詔求天命與情性皆非愚臣之所能及也臣謹案春秋之中視前世已行之事以觀天人相與之際甚可畏也國家將有失道之敗而天迺先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗迺至以此見天心之仁愛人君而欲止其亂也自非大亡道之世者天盡欲扶持而全安之事在彊勉而已矣及至後世淫佚衰微不能統理群生諸侯背畔殘賊良民以爭壤土廢德教而任刑罰刑罰不中則生邪氣邪氣積於下怨惡畜於上上下不和則陰陽繆盭而妖孽生矣師古曰盭古戾字孽災也此災異所緣而起也漢書息夫躬傳息夫躬字子微河內河陽人也董賢貴幸日盛丁傅害其寵孔鄉侯晏與躬謀欲求居位輔政會單于當來朝遣使言病願朝明年躬因是而上奏書奏上引見躬召公卿將軍大議左將軍公孫祿以為中國常以威信懷伏夷狄躬欲逆詐造不信之謀不可許乃罷群臣獨與躬議因建言往年熒惑守心太白高而芒光又角星茀於河鼓其法為有兵亂是後訛言行詔籌經歷郡國天下騷動恐必有非常之變可遣大將軍行邊兵敕武備斬一郡守以立威震四夷因以厭應變異上然之以問丞相丞相嘉對曰臣聞動民以行不以言應天以實不以文下民微細猶不可詐况於上天神明而可欺哉天之見異所以敕戒人君欲令覺悟反正推誠行善民心說而天意得矣辯士見一端或妄以意傅著星歷虛造匈奴烏孫西羌之難謀動干戈設為權變非應天之道也唯陛下觀覽古戒反覆參考無以先入之語為主漢書楚元王傳附劉向更生見堪猛在位幾已得復進懼其傾危乃上封事諫曰諸侯背畔而不朝周室卑微二百四十二年之間日食三十六地震五山陵崩阤二彗星三見夜常星不見夜中星隕如雨一火災十四長狄入三國五石隕墜六鶂退飛多麋有蜮蜚鸜鵒來巢者皆一見晝冥晦雨木冰李梅冬實七月霜降草木不死八月殺菽大雨雹雨雪雹霆失序相乘水旱饑蝝螽螟蠭午並起當是時禍亂輒應弒君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數也後漢書郎顗傳臣聞皇天感物不為偽動災變應人要在責己後漢書和殤帝紀八年九月京師蝗吏民言事者多歸責有司詔曰蝗蟲之異殆不虛生萬方有罪在予一人而言事者專咎自下非助我者也朕寤寐恫矜思弭憂釁尚書曰恫矜乃身孔安國注曰恫痛也矜病也言如痛病在身欲除之也矜音古頑反昔楚嚴無災而懼成王出郊而反風將何以匡朕不逮以塞災變百僚師尹勉修厥職刺史二千石詳刑辟理冤虐恤鰥寡矜孤弱思惟致災興蝗之咎晉書張華傳武庫火華懼因此變作列兵固守然後救之故累代之寶及漢高斬蛇劍王莽頭孔子履等盡焚焉時華見劍穿屋而飛莫知所向晉書天文志中明帝太和初太史令許芝奏日應蝕與太尉於靈星祈禳帝曰蓋聞人主政有不德則天懼之以災異所以譴告告使得自修也故日月薄蝕明治道有不當者朕即位以來既不能光明先帝聖德而施化有不合於皇神故上天有以寤之宜勑政自修有以報於神明天之於人猶父之於子未有父欲有責其子而可獻盛饌以求免也今外欲遣上公與太史令俱禳之於義未聞也群公卿士大夫其各勉修厥職有可以補朕不逮者各封上之晉書五行志上青龍元年六月洛陽宮鞠室災二年四月崇華殿災延於南閣繕復之至三年七月此殿又災帝問高堂隆此何咎也於禮寧有祈禳之義乎對曰夫災變之發皆所以明教誡也惟率禮脩德可以勝之新唐書五行志貞觀二年六月京畿旱蝗太宗在苑中掇蝗祝之曰人以榖為命百姓有過在予一人但當蝕我無害百姓遂吞之侍臣懼帝致疾遽以為諫帝曰所冀移災朕躬何疾之避遂吞之是歲蝗不為患又舊唐書五行志貞觀二年六月京畿旱蝗食稼太宗在苑中掇蝗咒之曰人以穀為命而汝害之是害吾民也百姓有過在予一人汝若通靈但當食我無害吾民將吞之侍臣恐上致疾遽諫止之上曰所冀移災朕躬何疾之避遂吞之是歲蝗不為患新唐書宋務光傳神龍元年大水詔文武九品以上官直言極諫務光上書曰臣聞三五之君不能免淫亢顧備禦存乎人耳災興細微安之不怪及禍變已成駭而圖之猶水決治防病困求藥雖復僶俛尚何救哉懼災第六史記封禪書稱高宗有雉登鼎耳雊武丁懼祖已曰修德武丁從之位以永寧前漢成帝紀詔曰天生眾民不能相治為之立君以統理之君道得則草木昆虫咸得其所人君不德謫見天地災異屢發以告不治乃日蝕地震朕甚懼焉公卿其各思朕過失以陳之前漢谷永傳建始三年冬日食地震同日俱發劉慶忌舉永待詔公車對曰陛下秉至聖之純德懼天地之戒異飭身修政納問公卿前漢谷永傳待詔公車對曰災異皇天所以譴告人君過失猶嚴父之明誡畏懼而改則禍銷福降忽然簡易則咎罰不除後漢光武紀日食詔曰吾德薄致災謫見日月戰慄恐懼百僚各上封事旡有所諱其上書者不得言聖後漢光武紀九月地震裂制詔曰日者地震南陽尤甚夫地者任物至重靜而不動者也而今震裂咎在君上鬼神不順無德災殃將及吏人朕甚懼焉新唐虞世南傳貞觀八年隴右山崩大蛇屢見大水帝憂之以問世南對曰春秋時梁山崩晉侯召伯宗問焉伯宗曰國主山川故山崩川竭君為之不舉祝幣以禮焉晉侯從之故得旡害新唐虞世南傳貞觀八年星孛虛危歷氐餘百日帝曰吾良旡景公之過未三十即大位自謂三王以來撥亂之主莫吾若故負而矜之輕天下士上天見變其為是乎箋證史記封禪書後十四世帝武丁得傅說為相殷復興焉稱高宗有雉登鼎耳雊武丁懼祖已曰脩德武丁從之位以永寧漢書成帝紀三年冬十二月戊申朔日有蝕之夜地震未央宮殿下詔曰蓋聞天生眾民不能相治為之立君以統理之君道得則草木昆蟲咸得其所人君不德謫見天地災異屢發以告不治朕涉道日寡舉錯不中乃戊申日蝕地震朕甚懼焉公卿其各思朕過失明白陳之漢書谷永傳建始三年冬日食地震同日俱發詔舉方正直言極諫之士太常陽城侯劉慶忌舉永待詔公車對曰陛下秉至聖之純德懼天地之戒異飭身修政師古曰飭與敕同敕整也納問公卿臣聞災異皇天所以譴告人君過失猶嚴父之明誡畏懼敬改則禍銷福降忽然簡易則咎罰不除後漢書光武帝紀七年三月癸亥晦日有食之避正殿寢兵不聽事五日詔曰吾德薄致災謫見日月戰慄恐懼夫何言哉今方念愆庶消厥咎其令有司各修職任奉遵法度惠茲元元百僚各上封事無有所諱其上書者不得言聖後漢書光武帝紀二十二年九月戊辰地震裂制詔曰日者地震南陽尤甚夫地者任物至重靜而不動者也而今震裂咎在君上鬼神不順無德災殃將及吏人朕甚懼焉新唐書虞世南傳貞觀八年進封縣公會隴右山崩大蛇屢見山東及江淮大水帝憂之以問世南對曰春秋時梁山崩晉侯召伯宗問焉伯宗曰國主山川故山崩川竭君為之不舉降服乘縵徹樂出次祝幣以禮焉梁山晉所主也晉侯從之故得無害帝然之於是遣使賑飢民申挺獄訟多所原赦後星孛虛危歷氐餘百日帝訪群臣帝曰誠然吾良無景公之過但年十八舉義兵二十四平天下未三十即大位自謂三王以來撥亂之主莫吾若故負而矜之輕天下士上天見變其為是乎遇災不懼第七前漢孔光傳臣聞師曰天左與王者故災異數見以譴告之欲其改更若不畏懼有以塞除而輕忽簡誣則凶罰加焉晉孝武紀溺於酒色殆為長夜之飲末年長星見帝惡之於華林園舉酒祝之曰長星勸汝一杯酒自古何有萬歲天子邪餘見懼災谷永傳又見災異董仲舒傳箋證漢書孔光傳會元壽元年正月朔日有蝕之後十餘日傅太后崩是月徵光詣公車問日蝕事光對曰臣聞師曰天右與王者師古曰右讀曰佑佑助也宋祁曰右景佑本作左注亦作左故災異數見以譴告之欲其改更若不畏懼有以塞除而輕忽簡誣則凶罰加焉晉書孝武帝紀溺於酒色始為長夜之飲末年長星見帝心甚惡之於華林園舉酒祝之曰長星勸汝一杯酒自古何有萬歲天子邪
