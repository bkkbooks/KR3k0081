body:
  text: 卷第六十七樂第一史記樂書凡作樂者以為州異國殊情習不同故博采風俗協比聲律以補短移化助流政教天子躬於明堂臨觀而萬民咸蕩滌邪穢斟酌飽滿以飾厥性故云雅頌之音理而民正嘄噭之聲興而士奮鄭衛之曲動而心淫及其調和諧合鳥獸盡感而況懷五常含好惡自然之勢也史記樂書太史公曰夫上古明王舉樂者非以娛心自樂快意恣欲將欲為治也正教者皆始於音音正而行正故音樂者所以動盪血脈通流精神而和正心也故宮動脾而和正聖商動肺而和正義角動肝而和正仁徵動心而和正智羽動腎而和正禮故樂所以內輔正心而外異貴賤也上以事宗廟下以變化黎庶也夫古者天子諸侯聽鍾磬未嘗離於廷卿大夫聽琴瑟之音未嘗離於前所以養行義而防淫佚也夫淫佚生於無禮故聖王使人耳聞雅頌之音目視威儀之禮足行恭謹之容口言仁義之道故君子終日言而邪辟無由入也前漢禮樂志昔黃帝作咸池顓頊作六莖帝嚳作五英堯作大章舜作韶禹作夏湯作護武王作武周公作勺自夏已往其流不可聞巳商頌猶有存者周詩既備而其器用張陳周官具焉典者自卿大夫師瞽巳下皆選有道德之人朝久習業以教國子皆學歌九德習六舞五聲八音之和又以外賞諸侯德盛而教尊者其威儀足以充目音聲足以動耳詩語足以感心是以薦之郊廟則鬼神饗作之朝廷則群臣和立之學官則萬民協聽者無不虛已竦神說而承流至於萬物不夭天地順而嘉應降書云擊石拊石百獸率舞鳥獸猶且感應而況於人乎況於鬼神乎故樂者聖人之所以感天地通神明安萬民成性類者也商紂斷棄先祖之樂迺作淫聲以悅婦人樂官師瞽抱其器而犇散或適諸侯或入河海夫樂本情性浹肌膚而藏骨髓雖經乎千載其遺風餘烈尚猶不絕至春秋時陳公子完犇齊陳舜之後韶樂存焉故孔子適齊聞韶三月不知肉味曰不圖為樂之至於斯美之甚也周道始缺怨剌之詩起王澤既竭而詩不能作王官失業雅頌相錯孔子論而定之故曰吾自衛反魯然后樂正雅頌各得其所是時周室大壞諸侯恣行設兩觀乘大路陪臣管季氏之屬三歸雍徹八佾舞庭制度遂壞陵夷而不反桑間濮上鄭衛宋趙之聲並出故秦穆遺戎而由余去齊人餽魯而孔子行至於六國魏文侯最為好古而謂子夏曰寡人聽古樂則欲寐及聞鄭衛余不知倦子夏辭而辨之終不見納自此禮樂喪矣漢興樂家有制氏以雅樂聲律世世在太樂官但能紀其鏗鎗鼓舞而不能言其義高祖時叔孫通因秦樂人制宗廟樂云云文景之間禮樂肄業而已至武帝定郊祀之禮祠太一於甘泉祭后土於汾陰乃立樂府采詩夜誦有趙代秦楚之謳以李延年為協律都尉多舉司馬相如等數十人造為詩賦略論律呂以合八音之調作十九章之歌以正月上辛用事甘泉圜丘百官侍祠者數百人皆肅然動心焉前漢志曰時貴戚五侯王鳳已下淫侈至與人主爭女樂哀帝疾之又性不好音及即位下詔曰惟世俗奢泰文巧而鄭衛之聲興而欲黎庶敦朴家給猶濁其源而求其清流豈不難哉孔子不云乎放鄭聲鄭聲淫其罷樂府官郊祭樂及古兵法武樂在經非鄭衛之樂者條奏別屬它官後漢曹衰傳父充顯宗即位上疏曰大漢當自制禮以視百世帝問制禮樂云何充對曰河圖括地象曰有漢世禮樂文雅出尚書琁機鈐曰有帝漢出德洽作樂名予帝善之下詔曰今且改太樂官曰太予樂歌詩曲操以俟君子拜充侍中作章句辨難於是遂有慶氏學魏杜夔傳太祖以夔為軍謀祭酒參太樂事因令創制雅樂夔善鍾律聰思過人絲竹八音靡所不能惟歌舞非所長時散郎鄧靜尹齊善詠雅樂歌師尹胡能歌宗廟郊祀之曲舞師馮肅服養曉知先代諸舞夔總統研精遠考諸經近采故事教習講肄備作樂器紹復先代古樂皆自夔始自左延年等雖妙於音咸善鄭聲其好古存正莫及夔陳初武帝詔求宋齊故事太常卿周弘讓奏曰齊氏承朱武用元徽舊式宗祀朝饗奏樂俱同唯北郊之祀頗有增益皇帝入壝門奏永至飲福酒奏嘉胙太尉亞獻奏凱容埋牲奏幽隸帝還便殿奏休成眾官出並奏肅成此乃元徽所闕永明六年之所如也晉苟勗傳既掌樂事又脩律呂並行於世初勗於路逢趙賈人牛鐸識其聲及掌樂音韻未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者晉謝尚傳鎮壽陽尚採拾樂人并制石磬以備太樂江表有鍾石之樂自尚始也梁武帝思弘古樂天監元年下詔求學術通明者皆陳所見時對樂者七十八家咸言樂之宜改不言改樂之法帝素善音律遂自制四器名之隋文帝開皇二年尚因周樂工人齊樹提撿校樂府改換聲律益不能通俄而沛公鄭譯奏上請更脩正於是詔太常卿牛弘國子祭酒幸彥之國子博士何妥等議正樂新唐書禮樂志聲無形而樂有器古之作樂者知夫器之必有弊而聲不可以言傳懼夫器失而聲遂亡也乃多為之法以著之故始求聲者以律而造律者以黍自一黍之廣積而為分寸一黍之多積而為龠合一黍之重積而為銖兩此造律之本也故為之長短之法而著之於度為之多少之法而著之於量為之輕重之法而著之於權衡是三物者亦必有時而弊則又總其法而著之於數使其分寸龠合銖兩皆起於黃鐘然後律度量衡相用為表裡使得律者可以制度量衡因度量衡亦可以制律不幸而皆亡則推其法數而制之用其長短多少輕重以相參考四者皆同而聲必至聲至而后樂可作矣夫物用於有形而必弊聲藏於無形而不竭以有數之法求無形之聲其法具存無作則已苟有作者雖去聖人之千萬歲後無不得焉此古之君子知物之終始而憂世之慮深其多為之法而丁寧纖悉可謂至矣自漢已來歷代莫不有樂作者各因其所學雖清濁高下時有不同然不能出於法數至其所以用於郊廟朝廷以接人神之歡其金石之響歌舞之容則各因其功業治亂之所起而本其風俗之所由新唐書禮樂志武德九年姶詔太常少卿祖孝孫協律郎竇璡等定樂初隋用黃鍾一宮惟擊七鐘其五鐘設而不擊謂之啞鐘唐協律郎張文收乃依古斷竹為十二律高祖命與孝孫吹調五鐘叩之而應由是十二鐘皆用新唐書禮樂志張文收復請重正餘樂帝不許曰朕聞人和則樂和隋末喪亂雖改音律而樂不和若百姓安樂金石自諧矣樂事別集多載此不重錄佗皆倣此箋證史記樂書凡作樂者所以節樂正義音洛言不樂至荒淫也君子以謙退為禮以損減為樂樂其如此也以為州異國殊情習不同故博采風俗協比聲律以補短移化助流政教天子躬於明堂臨觀而萬民咸蕩滌邪穢斟酌飽滿以飾厥性故云雅頌之音理而民正嘄噭之聲興而士奮鄭衛之曲動而心淫及其調和諧合鳥獸盡感而況懷五常含好惡自然之勢也史記樂書太史公曰夫上古明王舉樂者非以娛心自樂快意恣欲將欲為治也正教者皆始於音音正而行正故音樂者所以動盪血脈通流精神而和正心也故宮動脾而和正聖商動肺而和正義角動肝而和正仁徵動心而和正禮羽動腎而和正智故樂所以內輔正心而外異貴賤也上以事宗廟下以變化黎庶也琴長八尺一寸正度也弦大者為宮而居中央君也商張右傍其餘大小相次不失其次序則君臣之位正矣故聞宮音使人溫舒而廣大聞商音使人方正而好義聞角音使人惻隱而愛人聞徵音使人樂善而好施聞羽音使人整齊而好禮夫禮由外入樂自內出故君子不可須臾離禮須臾離禮則暴慢之行窮外不可須臾離樂須臾離樂則姦邪之行窮外故樂音者君子之所養義也夫古者天子諸侯聽鐘磬未嘗離於庭卿大夫聽琴瑟之音未嘗離於前所以養行義而防淫佚也夫淫佚生於無禮故聖人使人耳聞雅頌之音目視威儀之禮足行恭敬之容口言仁義之道故君子終日言而邪辟無由入也漢書禮樂志昔黃帝作咸池顓頊作六莖帝嚳作五英堯作大章舜作招師古曰招讀曰韶下皆類此禹作夏湯作濩師古曰濩音護武王作武周公作勺勺言能勺先祖之道也師古曰勺讀曰酌酌取也武言以功定天下也濩言救民也夏大承二帝也招繼堯也大章章之也五英英華茂也六莖及根莖也師古曰澤及下也咸池備矣自夏以往其流不可聞已殷頌猶有存者周詩既備而其器用張陳周官具焉典者自卿大夫師瞽以下皆選有道德之人朝夕習業以教國子國子者卿大夫之子弟也皆學歌九德誦六詩習六舞五聲八音之和故帝舜命夔曰女典樂教胄子直而溫寬而栗剛而無虐簡而無敖詩言志歌咏言聲依咏律和聲八音克諧此之謂也又以外賞諸侯德盛而教尊者其威儀足以充目音聲足以動耳詩語足以感心故聞其音而德和省其詩而志正論其數而法立是以薦之郊廟則鬼神饗作之朝廷則群臣和立之學官則萬民協聽者無不竦已竦神說而承流是以海內徧知上德被服其風光煇日新化上遷善而不知所以然至於萬物不夭天地順而嘉應降故詩曰鐘鼓鍠鍠磬管鏘鏘降福穰穰書云擊石拊石百獸率舞鳥獸且猶感應而况於人乎况於鬼神乎故樂者聖人之所以感天地通神明安萬民成性類者也然自雅頌之興而所承衰亂之音猶在是謂淫過凶嫚之聲為設禁焉世衰民散小人乘君子心耳淺薄則邪勝正故書序殷紂斷棄先祖之樂迺作淫聲用變亂正聲以說婦人樂官師瞽抱其器而犇散或適諸侯或入河海夫樂本情性浹肌膚而臧骨髓雖經乎千載其遺風餘烈尚猶不絕至春秋時陳公子完犇齊陳舜之後招樂存焉故孔子適齊聞韶三月不知肉味曰不圖為樂之至於斯美之甚也周道始缺怨刺之詩起王澤既竭而詩不能作王官失業雅頌相錯孔子論而定之故曰吾自衛反魯然後樂正雅頌各得其所是時周室大壞諸侯恣行設兩觀乘大路陪臣管仲季氏之屬三歸雍徹八佾舞廷制度遂壞陵夷而不反桑間濮上鄭衛宋趙之聲竝出內則致疾損壽外則亂政傷民巧偽因而飾之以營亂富貴之耳目庶人以求利列國以相間故秦穆遺戎而由余去齊人餽魯而孔子行至於六國魏文侯最為好古而謂子夏曰寡人聽古樂則欲寐及聞鄭衛余不知倦焉子夏辭而辨之終不見納自此禮樂喪矣漢興樂家有制氏以雅樂聲律世世在太樂官但能紀其鏗鎗鼓舞而不能言其義高祖時叔孫通因秦樂人制宗廟樂文景之間禮官肄業而已至武帝定郊祀之禮祠太一於甘泉就乾位也祭后土於汾陰澤中方丘也乃立樂府采詩夜誦有趙代秦楚之謳以李延年為協律都尉多舉司馬相如等數十人造為詩賦略論律賦以合八音之調作十九章之歌以正月上辛用事甘泉圜丘使童男女七十人俱歌昏祠至明夜常有神光如流星止集于祠壇天子自竹宮而望拜百官侍祠者數百人皆肅然動心焉漢書禮樂志至成帝時謁者常山王禹世受河間樂能說其義是時鄭聲尤甚黃門名倡丙彊景武之屬富顯於世貴戚五侯定陵富平外戚之家師古曰五侯王鳳以下也定陵淳于長也富平張放淫侈過度至與人主爭女樂哀帝自為定陶王時疾之又性不好音及即位下詔曰惟世俗奢泰文巧而鄭衛之聲興夫奢泰則下不孫而國貧師古曰孫讀曰遜文巧則趍末背本者眾鄭衛之聲興則淫辟之化流而欲黎庶敦朴家給猶濁其源而求其清流豈不難哉孔子不云乎放鄭聲鄭聲淫其罷樂府官郊祭樂及古兵法武樂在經非鄭衛之樂者條奏別屬他官後漢書曹褒傳曹褒字叔通魯國薛人也父充持慶氏禮顯宗即位充上言漢再受命仍有封禪之事而禮樂崩闕不可為後嗣法五帝不相沿樂三王不相襲禮大漢當自制禮以示百世帝問制禮樂云何充對曰河圖括地象曰有漢世禮樂文雅出尚書璇璣鈐曰有帝漢出德洽作樂名予帝善之下詔曰今且改太樂官曰太予樂歌詩曲操以俟君子拜充侍中作章句辯難於是遂有慶氏學三國志魏志杜夔傳杜夔字公良河南人也以知音為雅樂郎太祖以夔為軍謀祭酒參太樂事因令創制雅樂夔善鍾律聰思過人絲竹八音靡所不能惟歌舞非所長時散郎鄧靜尹齊善詠雅樂歌師尹胡能歌宗廟郊祀之曲舞師馮肅服養曉知先代諸舞夔總統研精遠考諸經近采故事教習講肄備作樂器紹復先代古樂皆自夔始也自左延年等雖妙於音咸善鄭聲其好古存正莫及夔隋書音樂志上陳初武帝詔求宋齊故事太常卿周弘讓奏曰齊氏承宋咸用元徽舊式宗祀朝饗奏樂俱同唯北郊之禮頗有增益皇帝入壝門奏永至飲福酒奏嘉胙太尉亞獻奏凱容埋牲奏隸幽帝還便殿奏休成眾官並出奏肅成此乃元徽所闕永明六年之所加也晉書荀勗傳進位光祿大夫既掌樂事又修律呂並行於世初勗於路逄趙賈人牛鐸識其聲及掌樂音韻未調乃曰得趙之牛鐸則諧矣遂下郡國悉送牛鐸果得諧者晉書謝尚傳尋進號鎮西將軍鎮壽陽尚於是採拾樂人并制石磬以備太樂江表有鍾石之樂自尚始也通典樂二梁武帝思弘古樂天監元年下詔求學術通明者皆陳所見時對樂者七十八家咸言樂之宜改不言改樂之法帝素善音律遂自制四器名之通典樂二隋文帝開皇二年尚因周樂命工人齊樹提檢校樂府改換聲律益不能通俄而沛公鄭譯奏上請更修正於是詔太常卿牛弘國子祭酒辛彥之國子博士何妥等議正樂新唐書禮樂志聲無形而樂有器古之作樂者知夫器之必有敝而聲不可以言傳懼夫器失而聲遂亡也乃多為之法以著之故始求聲者以律而造律者以黍自一黍之廣積而為分寸一黍之多積而為龠合一黍之重積而為銖兩此造律之本也故為之長短之法而著之於度為之多少之法而著之於量為之輕重之法而著之於權衡是三物者亦必有時而敝則又總其法而著之於數使其分寸龠合銖兩皆起於黃鍾然後律度量衡相用為表裏使得律者可以制度量衡因度量衡亦可以制律不幸而皆亡則推其法數而制之用其長短多少輕重以相參考四者既同而聲必至聲至而後樂可作矣夫物用於有形而必敝聲藏於無形而不竭以有數之法求無形之聲其法具存無作則已苟有作者雖去聖人於千萬歲後無不得焉此古之君子知物之終始而憂世之慮深其多為之法而丁寧纖悉可謂至矣三代既亡禮樂失其本至其聲器有司之守亦以散亡自漢以來歷代莫不有樂作者各因其所學雖清濁高下時有不同然不能出於法數至其所以用於郊廟朝廷以接人神之歡其金石之響歌舞之容則各因其功業治亂之所起而本其風俗之所由卷二十一新唐書禮樂志武德九年始詔太常少卿祖孝孫協律郎竇璡等定樂初隋用黃鍾一宮惟擊七鍾其五鍾設而不擊謂之啞鍾唐協律郎張文收乃依古斷竹為十二律高祖命與孝孫吹調五鍾叩之而應由是十二鍾皆用新唐書禮樂志十一年張文收復請重正餘樂帝不許曰朕聞人和則樂和隋末喪亂雖改音律而樂不和若百姓安樂金石自諧矣雅樂第二前漢景十三王傳武帝時獻王來朝獻雅樂對三雍官前漢禮樂志河間獻王有雅材亦以為治道非禮樂不成因獻所集雅樂天子下大樂官常存隸之歲時以備數然不常御常御及郊廟皆非雅聲前漢禮樂志河閒獻王聘求幽隱脩興雅樂以助化時大儒公孫洪董仲舒皆以為音中正雅立之大樂春秋鄉射作於學官希闊不講後漢孝明紀南巡狩幸南陽祠章陵又祠舊宅禮畢召校官弟子作雅樂奏鹿鳴帝自御塤箎和之以娛嘉賓新唐書禮樂志初祖孝孫巳定樂乃曰大樂與天地同和者也製士一和以法天之成數號大唐雅樂一曰豫和二曰煩和三曰永和四曰肅和五曰雍和六曰壽和七曰舒和八曰太和九曰昭和十曰休和十一曰正和十二曰承和用於郊廟朝廷以和人神新唐書禮樂志開元雅樂製雲韶法曲及霓裳羽衣舞曲雲韶樂有玉磬四虞琴瑟筑簫箎籥跋膝笙竽皆一登歌四人分立堂上下童子五人繡衣執金蓮花以導舞者三百人階下設錦筵過內宴乃奏餘見樂杜夔傳箋證漢書景十三王傳河間獻王武帝時獻王來朝獻雅樂對三雍宮應劭曰辟雍明堂靈臺也雍和也言天地君臣人民皆和也漢書禮樂志河間獻王有雅材亦以為治道非禮樂不成因獻所集雅樂天子下大樂官常存肄之歲時以備數然不常御常御及郊廟皆非雅聲漢書禮樂志至成帝時謁者常山王禹世受河間樂能說其義其弟子宋畢等上書言之以為漢承秦滅道之後賴先帝聖德博受兼聽修廢官立太學河間獻王聘求幽隱修興雅樂以助化時大儒公孫弘董仲舒等皆以為音中正雅立之大樂春秋鄉射作於學官希闊不講師古曰講謂習也後漢書明帝紀十年南巡狩幸南陽祠章陵日北至又祠舊宅北至夏至也禮畢召校官弟子作雅樂奏鹿鳴帝自御塤箎和之以娛嘉賓新唐書禮樂志初祖孝孫已定樂乃曰大樂與天地同和者也製十二和以法天之成數號大唐雅樂一曰豫和二曰順和三曰永和四曰肅和五曰雍和六曰雍和七曰太和八月舒和九曰昭和十曰休和十一曰正和十二曰承和用於郊廟朝廷以和人神新唐書禮樂志文宗好雅樂詔太常卿馮定采開元雅樂製雲韶法曲及霓裳羽衣舞曲雲韶樂有玉磬四虡琴瑟筑簫篪籥跋膝笙竽皆一登歌四人分立堂上下童子五人繡衣執金蓮花以導舞者三百人階下設錦筵遇內宴乃奏淫樂第三史記樂書衛靈公之時將之晉至於濮水之上舍夜半時聞鼓琴聲問左右皆曰不聞乃召師涓曰吾聞鼓琴音問左右皆不聞其狀似鬼神為我聽而寫之師涓曰諾因端坐援琴聽而寫之明日曰臣得之矣然未習也請宿習之靈公曰可因復宿明日報曰習矣即去之晉見晉平公平公置酒於施惠之臺酒酣靈公曰今者來聞新聲請奏之平公曰可即令師涓坐師曠旁援琴鼓之未終師曠撫而止之曰此亡國之聲也不可聽平公曰何道出師曠曰師延所作也與紂為靡靡之樂武王伐紂師延東走自投濮水之中故聞此聲必於濮水之上先聞此聲者國削平公曰寡人所好者音也願遂聞之師涓鼓而終之前漢哀帝紀綏和二年六月詔曰鄭聲淫而亂樂聖王所放其罷樂府前漢禮樂志河間獻王云今漢郊廟詩歌未有祖宗之事八音調均又不協於鍾律而內有掖庭材人外有上林樂府皆以鄭聲施於朝廷前漢敘傳夫啾發投曲感耳之聲合之律度淫䵷而不可聽者非韶夏之樂也啾發啾啾小聲而發也投曲趣合屈曲也感耳動應眾庶之耳也然而不合律度君子所不聽也淫䵷非正之聲也後漢宋弘傳薦桓譚拜議郎給事中帝每讌輒令鼓琴好其繫聲弘聞之不悅悔於薦舉伺譚內出正朝服坐府士遣吏召之譚至不與席而讓之曰吾所以薦子者欲令輔國家以道德也而今數進鄭聲以亂雅頌非忠正者也箋證史記樂書衛靈公之時將之晉至於濮水之上舍夜半時聞鼓琴聲問左右皆對曰不聞乃召師涓曰吾聞鼓琴音問左右皆不聞其狀似鬼神為我聽而寫之師涓曰諾因端坐援琴聽而寫之明日曰臣得之矣然未習也請宿習之靈公曰可因復宿明日報曰習矣即去之晉見晉平公平公置酒於施惠之臺酒酣靈公曰今者來聞新聲請奏之平公曰可即令師涓坐師曠旁援琴鼓之未終師曠撫而止之曰此亡國之聲也不可聽平公曰何道出師曠曰師延所作也與紂為靡靡之樂武王伐紂師延東走自投濮水之中故聞此聲必於濮水之上先聞此聲者國削平公曰寡人所好者音也願遂聞之師涓鼓而終之漢書哀帝紀綏和二年六月詔曰鄭聲淫而亂樂聖王所放其罷樂府漢書禮樂志河間獻王有雅材亦以為治道非禮樂不成因獻所集雅樂天子下大樂官常存肄之今漢郊廟詩歌未有祖宗之事八音調均又不協於鐘律而內有掖庭材人外有上林樂府皆以鄭聲施於朝廷漢書敘傳夫啾發投曲感耳之聲合之律度淫䵷而不可聽者非韶夏之樂也李奇曰䵷不正之音也師古曰啾發啾啾小聲而發也投曲趣合屈曲也感耳動應眾庶之耳也然而不合律度君子所不聽也淫䵷非正之聲也不謂䵷黽之鳴也後漢書宋弘傳光武即位徵拜太中大夫建武二年代王梁為大司空封栒邑侯徙封宣平侯帝嘗問弘通博之士弘乃薦沛國桓譚才學洽聞幾能及揚雄劉向父子於是召譚拜議郎給事中帝每讌輒令鼓琴好其繁聲弘聞之不悅悔於薦舉伺譚內出正朝服坐府上遣吏召之譚至不與席而讓之曰吾所以薦子者欲令輔國家以道德也而今數進鄭聲以亂雅頌非忠正者也
