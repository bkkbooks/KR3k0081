body:
  text: 卷第九十上所好者下必甚第一後漢馬廖傳時皇太后躬履節儉事從簡約廖慮美業難終上疏長樂宮以勸成德政曰臣案前世詔令以百姓不足起於世尚奢靡故元帝罷服官成帝御浣衣哀帝去樂府然而侈費不息至於衰亂者百姓從行不從言也夫改政移風必有其本傳曰吳王好劍客百姓多瘡瘢楚王好細腰宮中多餓死長安語曰城中好高結四方高一尺城中好廣眉四方且半額城中好大袖四方全匹帛斯言如戲有切事實前下制度未幾後稍不行雖或吏不奉法良由慢起京師今陛下躬服厚繒斥去華飾素簡所安發自聖性此誠上合天心下類民望浩大之福莫尚於此後漢孝靈紀帝作列肆於後宮使諸采女販賣更相盜竊爭鬭帝著商估服飲宴為樂又於西園弄狗著進賢冠帶綬又駕四驢帝躬自操轡驅馳周旋京師轉相放效新唐五行志樂安公主使尚方合百鳥毛織二裙正視為一色傍視為一色日中為一色影中為一色而百鳥之狀皆見自作毛裙貴臣富家多效之江嶺奇禽異獸毛羽採之殆盡餘見下之化上稚圭傳箋證後漢書馬廖傳時皇太后躬履節儉事從簡約廖慮美業難終上疏長樂宮以勸成德政曰臣案前世詔令以百姓不足起於世尚奢靡故元帝罷服官成帝御浣衣哀帝去樂府然而侈費不息至於衰亂者百姓從行不從言也夫改政移風必有其本傳曰吳王好劍客百姓多創瘢楚王好細腰宮中多餓死長安語曰城中好高髻四方高一尺城中好廣眉四方且半額城中好大袖四方全匹帛斯言如戲有切事實前下制度未幾後稍不行雖或吏不奉法良由慢起京師今陛下躬服厚繒斥去華飾素簡所安發自聖性此誠上合天心下順民望浩大之福莫尚於此後漢書孝靈紀是歲帝作列肆於後宮使諸采女販賣更相盜竊爭鬭帝著商估服飲宴為樂又於西園弄狗著進賢冠帶綬又駕四驢帝躬自操轡驅馳周旋京師轉相放效新唐書五行志安樂公主使尚方合百鳥毛織二裙正視為一色傍視為一色日中為一色影中為一色而百鳥之狀皆見自作毛裙貴臣富家多效之江嶺奇禽異獸毛羽採之殆盡奢侈第二前漢王吉傳自吉至崇世名清廉然材器名稱稍不能及父而祿位彌隆皆好車馬衣服其自奉養極為鮮明而亡金銀錦繡之物及遷徙去處所載不過囊衣不畜積餘財去位家居亦布衣疏食天下服其廉而怪其奢故俗傳王陽能作黃金前漢張禹傳性習知音聲內奢淫身居大第後堂理絲竹筦弦禹成就弟子尤著者彭宣至大司空戴崇至少府九卿宣為人恭儉有法度而崇愷弟多智二人異行禹心親愛崇敬宣而疏之崇每候禹禹將崇入後堂飲食婦人相對優人筦弦鏗鏘極樂昏夜乃罷而宣之來也禹見之於便坐講論經義日晏賜食不過一肉巵酒相對宣未嘗得至後堂及兩人皆聞知各自得也後漢虞延傳後去官還鄉里太守富宗召署功曹宗姓奢靡車服器物多不中節延諫曰昔晏嬰輔齊鹿裘不完季文子相魯妾不衣帛以約失之者鮮矣宗不悅延即辭退宗果以侈縱被誅臨刑嘆曰恨不用功曹虞延之諫光武聞而奇之後漢宦者呂強傳上疏曰上之化下猶風之靡草今上無去奢之儉下有縱欲之敝至使禽獸食民之甘土木衣民之帛昔師曠諫晉平公曰梁柱衣繡民無褐衣池有棄酒士有渴死廄馬秣粟民有飢色近臣不敢諫遠臣不得暢此之謂也後漢王符傳浮侈篇曰王者以四海為家兆人為子一夫不耕天下受其飢一婦不織天下受其寒今舉俗舍本農趨商賈牛馬車輿填塞道路游手為巧充盈都邑務本者少浮食者眾商邑翼翼四方是極今察洛陽資末業者什於農夫虛偽游手什於末業是則一夫耕百人食之一婦桑百人衣之以一奉百孰能供之天下百郡千縣市邑万數類皆如此本末不足相供則民安得不飢寒飢寒並至則民安能無姦軌姦軌繁多則吏安能無嚴酷嚴酷數加則下安能無愁怨愁怨者多則咎驗並臻下民無聊而上天降災則國危矣夫貧生於富弱生於強亂生於化危生於安是故明王之養民憂之勞之教之誨之慎微防萌以斷其邪今人奢衣服侈飲食事口舌而習詐欺或以謀姦合任為業或以游博持掩為事丁夫不扶犁鋤而懷丸挾彈攜手上山遨遊或好取土作丸賣之外不足禦寇盜內不足禁眾雀或作浞車瓦狗諸戲弄之具以巧詐小兒此皆無益也詩剌不績其麻市也婆娑又婦人不脩中饋休其蚕織而起學巫祝鼓舞事神以欺誣細民勞惑百姓妻女羸弱疾病之家憂懷憤憤易為恐懼至使奔走便時去離正宅崎嶇路側風寒所傷姦人所利盜賊所中或增禍重崇至於死亡而不知巫所欺誤反恨事神之晚此妖妄之甚者也或刻畫好繒以書祝辭或虛飾巧言希致福祚或糜折金綵令廣分寸或斷截眾縷繞帶手腕或裁切綺縠縫紩成幡皆單費百縑用功千倍破牢為偽以易就難坐食嘉榖消損白日夫山林不能給野火江海不能實漏卮皆所宜禁也昔孝文皇帝躬衣弋綈革舄韋帶而今京師貴戚衣服飲食車輿廬第奢過王制固亦甚矣且其徒御僕妾皆服文組綵牒錦繡綺紈葛子升越筩中女布犀象珠玉琥魄瑇瑁石山隱飾金銀錯鏤窮極麗靡轉相誇咤其嫁娶者車軿數里緹帷竟道騎奴侍童夾轂並引富者競欲相過貧者恥其不逮饗之所費破終身之業古者必有命然後乃得衣繒絲而乘車馬今雖不能復古宜令細民略用孝文之制古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨桐木為棺葛采為緘下不及泉上不泄臭中世以後轉用楸梓槐柏杶樗之屬各因方士裁用膠漆使其堅足恃其用足任如此而已今者京師貴戚必欲江南檽梓豫章之木邊遠下士亦競相放效夫檽梓豫章所出殊遠伐之高山引之窮谷入海乘淮逆河泝洛工匠彫刻連累日月會眾而後動多牛而後致重且千斤功將萬夫而東至樂浪西達敦煌費力傷農於万里之地古者墓而不墳中世墳而不崇仲尼喪母家高四尺遇雨而崩弟子請脩之夫子泣曰古不脩墓及鯉也死有棺無椁文帝葬芷陽明帝葬洛南皆不藏珠寶不起山陵墓雖卑而德最高今京師貴戚郡縣豪家王不及養死乃崇喪或至金鏤玉匣檽梓楩柟多埋珍寶偶人車馬造起大冢廣種松柏廬舍祠堂務崇華侈案鄗畢之陵南城之家周公非不忠曾子非不孝以為褒君愛父不在於聚財揚名顯親無取於車馬昔晉靈公多賦以彫牆春秋以為非君華元樂舉厚葬文公君子以為不臣況於群司士庶乃可僭侈主上過天道乎晉王湷平吳之後以勳高位重乃玉食錦服縱奢侈以自逸晉傳咸傳為車騎司馬咸以世俗奢侈又上書曰臣以為榖帛難生而用之不節無緣不匱故先王之化天下食肉衣帛皆有其制竊謂奢侈之費甚於天災古者堯有茅茨今之百姓競豐其屋古者臣無玉食今之賈豎皆厭梁肉古者后妃乃有殊飾今之婢妾被服綾羅古者大夫乃不徒行今之賤隸乘輕驅肥古者人稠地狹而有儲蓄由於節也今者土曠人稀而患不足由於奢也欲時之儉當詰其奢奢不見詰轉相高尚昔毛玠為吏部尚書時無敢好衣美食者魏武帝歎曰孤之法不如毛尚書令使諸部用心各如毛玠風俗之移在不難矣晉石崇傳財產豐積室宇宏麗後房百數皆曳紈繡珥金翠絲竹盡當時之選庖膳窮水陸之珍與貴戚王愷羊琇之徒以奢靡相尚愷以飴澳釜崇以蠟代薪愷作紫絲布步鄣四十里崇作錦步障五十里以敵之崇塗屋以椒愷用赤石脂崇愷爭豪如此武帝每助愷嘗以珊瑚樹賜之高二尺許枝柯扶疏世所罕比愷以示崇崇便以鐵如意擊之碎愷以為疾己之寶聲色方厲崇曰今還卿乃命左右悉取珊瑚樹有高三四尺者六七株條幹絕俗光彩耀日如愷比者甚眾愷怳然自失矣晉何曾傳然性奢豪務在華侈帷帳車服窮極綺麗廚膳滋味過於王者每燕見不食太官所設帝輒命取其食蒸餅上不坼作十字不食食日万錢猶曰無下箸處晉劭驕奢簡貴亦有父風衣裘服玩新故巨積食必盡四方珍異一日之供以錢二万為限時論以為太官御膳無以加之晉載記符堅傳堅自平諸國之後國內豐實遂示人以侈垂珠簾於正殿以朝群臣宮宇車乘器物服御悉以珠璣琅玕奇寶珍怪飾之箋證漢書王吉傳自吉至崇世名清廉然材器名稱稍不能及父而祿位彌隆皆好車馬衣服其自奉養極為鮮明而亡金銀錦繡之物及遷徙去處所載不過囊衣不畜積餘財去位家居亦布衣疏食天下服其廉而怪其奢故俗傳王陽能作黃金漢書張禹傳禹性習知音聲內奢淫身居大第後堂理絲竹筦弦禹成就弟子尤著者淮陽彭宣至大司空沛郡戴崇至少府九卿宣為人恭儉有法度而崇愷弟多智二人異行禹心親愛崇敬宣而疏之崇每候禹常責師宜置酒設樂與弟子相娛禹將崇入後堂飲食婦女相對優人筦弦鏗鏘極樂昏夜乃罷而宣之來也禹見之於便坐講論經義日晏賜食不過一肉巵酒相對宣未嘗得至後堂及兩人皆聞知各自得也後漢書虞延傳後去官還鄉里太守富宗聞延名召署功曹宗性奢靡車服器物多不中節延諫曰昔晏嬰輔齊鹿裘不完季文子相魯妾不衣帛以約失之者鮮矣宗不悅延悅辭退居有頃宗果以侈縱被誅臨當伏刑擥涕而歎曰恨不用功曹虞延之諫光武聞而奇之後漢書宦者呂強傳上疏曰上之化下猶風之靡草今上無去奢之儉下有縱欲之敝至使禽獸食民之甘土木衣民之帛昔師曠諫晉平公曰梁柱衣繡民無褐衣池有棄酒士有渴死廄馬秣粟民有饑色近臣不敢諫遠臣不得暢此之謂也後漢書王符傳浮侈篇曰王者以四海為家兆人為子一夫不耕天下受其飢一婦不織天下受其寒今舉俗舍本農趨商賈牛馬車輿填塞道路游手為巧充盈都邑務本者少浮食者眾商邑翼翼四方是極今察洛陽資末業者什於農夫虛偽游手什於末業是則一夫耕百人食之一婦桑百人衣之以一奉百孰能供之天下百郡千縣市邑万數類皆如此本末不足相供則民安得不飢寒飢寒並至則民安能無姦軌姦軌繁多則吏安能無嚴酷嚴酷數加則下安能無愁怨愁怨者多則咎徵並臻下民無聊而上天降災則國危矣夫貧生於富弱生於彊亂生於化危生於安是故明王之養民憂之勞之教之誨之慎微防萌以斷其邪今人奢衣服侈飲食事口舌而習詐欺或以謀姦合任為業或以游博持掩為事丁夫不扶犁鋤而懷丸挾彈攜手上山遨遊或好取土作丸賣之外不足禦寇盜內不足禁鼠雀或作泥車瓦狗諸戲弄之具以巧詐小兒此皆無益也詩刺不績其麻市也婆娑又婦人不脩中饋休其蠶織而起學巫祝鼓舞事神以欺誣細民熒惑百姓妻女羸弱疾病之家懷憂憤憤易為恐懼至使奔走便時去離正宅崎嶇路側風寒所傷姦人所利盜賊所中或增禍重祟至於死亡而不知巫所欺誤反恨事神之晚此妖妄之甚者也或刻畫好繒以書祝辭或虛飾巧言希致福祚或糜折金綵令廣分寸或斷截眾縷繞帶手腕或裁切綺縠縫紩成幡皆單費百縑用功千倍破牢為偽以易就難坐食嘉榖消損白日夫山林不能給野火江海不能實漏巵皆所宜禁也昔孝文皇帝躬衣弋綈革舄韋帶而今京師貴戚衣服飲食車輿廬第奢過王制固亦甚矣且其徒御僕妾皆服文組綵牒錦繡綺紈葛子升越筩中女布犀象珠玉虎魄玳瑁石山隱飾金銀錯鏤窮極麗靡轉相誇咤其嫁娶者車駢數里緹帷竟道騎奴侍童夾轂並引富者競欲相過貧者恥其不逮一饗之所費破終身之業古者必有命然後乃得衣繒絲而乘車馬今雖不能復古宜令細民略用孝文之制古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨桐木為棺葛采為緘下不及泉上不泄臭中世以後轉用楸梓槐柏杶樗之屬各因方土裁用膠漆使其堅足恃其用足任如此而已今者京師貴戚必欲江南檽梓豫章之木邊遠下土亦競相放效夫檽梓豫章所出殊遠伐之高山引之窮谷入海乘淮逆河泝洛工匠彫刻連累日月會眾而後動多牛而後致重且千斤功將萬夫而東至樂浪西達敦煌費力傷農於万里之地古者墓而不墳中世墳而不崇仲尼喪母冢高四尺遇雨而崩弟子請修之夫子泣曰古不脩墓及鯉也死有棺無椁文帝葬芷陽明帝葬洛南皆不臧珠寶不起山陵墓雖卑而德最高今京師貴戚郡縣豪家生不及養死乃崇喪或至金鏤玉匣檽梓楩柟多埋珍寶偶人車馬造起大冢廣種松柏廬舍祠堂務崇華侈案鄗畢之陵南城之冢周公非不忠曾子非不孝以為褒君愛父不在於聚財揚名顯親無取於車馬昔晉靈公多賦以雕牆春秋以為不君華元樂舉厚葬文公君子以為不臣況於群司士庶乃可僭侈主上過天道乎晉書王濬傳王濬字士治弘農湖人也家世二千石濬博涉墳典美姿貌不修名行不為鄉曲所稱晚乃變節疎通亮達恢廓有大志濬平吳之後以勳高位重不復素業自居乃玉食錦服縱奢侈以自逸晉書傳咸傳舒奏咸激訕不直詔轉咸為車騎司馬咸以世俗奢侈又上書曰臣以為榖帛難生而用之不節無緣不匱故先王之化天下食肉衣帛皆有其制竊謂奢侈之費甚於天災古者堯有茅茨今之百姓競豐其屋古者臣無玉食今之賈豎皆厭粱肉古者后妃乃有殊飾今之婢妾被服綾羅古者大夫乃不徒行今之賤隸乘輕驅肥古者人稠地狹而有儲蓄由於節也今者土廣人稀而患不足由於奢也欲時之儉當詰其奢奢不見詰轉相高尚昔毛玠為吏部尚書時無敢好衣美食者魏武帝歎曰孤之法不如毛尚書令使諸部用心各如毛玠風俗之移在不難矣晉書石崇傳財產豐積室宇宏麗後房百數皆曳紈繡珥金翠絲竹盡當時之選庖膳窮水陸之珍與貴戚王愷羊琇之徒以奢靡相尚愷以飴澳釜崇以蠟代薪愷作紫絲布步障四十里崇作錦步障五十里以敵之崇塗屋以椒愷用赤石脂崇愷爭豪如此武帝每助愷嘗以珊瑚樹賜之高二尺許枝柯扶疏世所罕比愷以示崇崇便以鐵如意擊之應手而碎愷既惋惜又以為嫉己之寶聲色方厲崇曰不足多恨今還卿乃命左右悉取珊瑚樹有高三四尺者六七株條幹絕俗光彩曜日如愷比者甚眾愷怳然自失矣晉書何曾傳何曾字穎考陳國陽夏人也然性奢豪務在華侈帷帳車服窮極綺麗廚膳滋味過於王者每燕見不食太官所設帝輒命取其食蒸餅上不坼作十字不食食日萬錢猶曰無下箸處晉書何曾傳附子何曾王倫篡位以劭為太宰及三王交爭劭以軒冕而游其間無怨之者而驕奢簡貴亦有父風衣裘服翫新故巨積食必盡四方珍異一日之供以錢二萬為限時論以為太官御膳無以加之晉書載記符堅傳堅自平諸國之後國內殷實遂示人以侈懸珠簾於正殿以朝群臣宮宇車乘器物服御悉以珠璣琅玕奇寶珍怪飾之抑奢侈第三後漢孝安紀詔曰舊令制度各有科品欲令百姓務崇節約遭永初之際人離荒戹朝廷躬自菲薄去絕奢飾食不兼味衣不二綵比年雖獲豐穰尚之儲積而小人旡慮不圖久長嫁娶送終紛華靡麗至有走卒奴婢被綺榖著珠璣京師尚若斯何以示四遠設張法禁懇惻分明而有司惰任訖不奉行秋節既立鷙鳥將用且復重申以觀後效新唐賢妃徐惠傳正觀末治宮室百姓勞怨惠上疏言伎巧為喪國斧斤珠玉為蕩心酖毒侈麗纖美不可以不遏志驕於業泰體逸於時安其剴切精詣大略如此帝善其言餘見贖罪江充傳又見奢侈王符傳箋證後漢書孝安紀丙子詔曰舊令制度各有科品欲令百姓務崇節約遭永初之際人離荒戹朝廷躬自菲薄去絕奢飾食不兼味衣無二綵比年雖獲豐穰尚乏儲積而小人無慮不圖久長嫁娶送終紛華靡麗至有走卒奴婢被綺榖著珠璣京師尚若斯何以示四遠設張法禁懇惻分明而有司惰任訖不奉行秋節既立鷙鳥將用且復重申以觀後效新唐書賢妃徐惠傳貞觀末數調兵討定四夷稍稍治宮室百姓勞怨惠上疏又言伎巧為喪國斧斤珠玉為蕩心鴆毒侈麗纖美不可以不遏志驕於業泰體逸於時安其剴切精詣大略如此帝善其言優賜之
