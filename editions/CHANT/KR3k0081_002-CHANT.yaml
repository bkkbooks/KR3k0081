body:
  text: 卷第二王者受命第一史記齊世家周西伯政平及斷虞芮之訟而詩人稱西伯受命史記秦楚年表太史公讀秦楚之際曰初作難發於陳涉虐戾滅秦自項氏撥亂誅暴平定海內卒踐帝祚成於漢家五年之間號令三嬗音善自生民以來未始有受命若斯之亟也史記壺遂曰漢興以來至明天子改正朔易服色受命於穆清受天命清和之氣史記太史公曰或言古者太平萬民和喜瑞應辨至乃采風俗定制作制詔御史曰蓋受命而主各有所由興殊路而同歸謂因民而作追俗為制也前漢律歷志曰帝王必改正朔易服色所以明受命於天也前漢儒林傳轅固與黃生爭論於上前黃生曰湯武非受命迺殺也固曰桀紂荒亂天下之心皆歸湯武湯武固天下之心而誅桀紂桀紂之民弗為使而歸湯武湯武不得已而立非受命何為後漢劉永盧芳傳論曰傳稱盛德必百世祀孔子曰寬則得眾夫能得眾心則百世不忘矣觀更始之際劉氏之遺恩餘烈英雄豈能抗之哉然則知高祖孝文之寬仁結於人心深矣周人之思邵公愛其甘棠又況其子孫哉劉氏之再受命蓋以此乎魏劉曄傳詔曰尊嚴祖孝所以宗孝成湯文武寔造商周詩書之義追尊稷契歌頌有娀姜嫄之事明盛德之源流受命所由興也新唐蘇世長傳高祖責世長來晚世長謝曰古帝王受命以比逐鹿一人得禽萬夫歛手豈有獲鹿後忿同獵者問爭肉罪耶新唐張九齡傳時帝未行親郊之禮九齡上疏曰伏以天者百神之君而王者之所由受命也自古繼統之主必有郊配之義蓋以重天命以報所受政於郊之義則不以德澤未洽年榖不登凡事之故而闕其禮新唐劉文靜裴寂傳贊曰應龍之翔雲雺滃然而從震風博怒萬空不約而號物有自然相動耳觀二子非有卓越之資當高祖受命赫然利見於世故能或翼或從尸天之功云箋證史記齊太公世家周西伯昌之脫羑里歸與呂尚陰謀修德以傾商政其事多兵權與奇計故後世之言兵及周之陰權皆宗太公為本謀周西伯政平及斷虞芮之訟而詩人稱西伯受命曰史記秦楚之際月表太史公讀秦楚之際曰初作難發於陳涉虐戾滅秦自項氏撥亂誅暴平定海內卒踐帝祚成於漢家五年之間號令三嬗音善索隱古禪字音市戰反三嬗謂陳涉項氏漢高祖也自生民以來未始有受命若斯之亟也史記太史公自序壺遂曰孔子之時上無明君下不得任用故作春秋垂空文以斷禮義當一王之法今夫子上遇明天子下得守職萬事既具咸各序其宜夫子所論欲以何明太史公曰唯唯否否集解晉灼曰唯唯謙應也否否不通者也不然余聞之先人曰伏羲至純厚作易八卦堯舜之盛尚書載之禮樂作焉湯武之隆詩人歌之春秋采善貶惡推三代之德褒周室非獨刺譏而已也漢興以來至明天子獲符瑞建封禪改正朔易服色受命於穆清澤流罔極海外殊俗重譯款塞史記禮書今上即位招致儒術之士令共定儀十餘年不就或言古者太平萬民和喜瑞應辨至乃采風俗定制作上聞之制詔御史曰蓋受命而王各有所由興殊路而同歸謂因民而作追俗為制也漢書律歷志元封七年漢興百二歲矣大中大夫公孫卿壺遂太史令司馬遷等言歷紀壞廢宜改正朔是時御史大夫兒寬明經術上乃詔寬曰與博士共議今宜何以為正朔服色何上寬與博士賜等議皆曰帝王必改正朔易服色所以明受命於天也創業變改制不相復漢書儒林傳轅固齊人也以治詩孝景時為博士與爭生爭論於上前黃生曰湯武非受命乃殺也固曰不然夫桀紂荒亂天下之心皆歸湯武湯武因天下之心而誅桀紂桀紂之民弗為使而歸湯武湯武不得已而立非受命為何師古曰此非受命更何為後漢書劉永盧芳傳論曰傳稱盛德必百世祀孔子曰寬則得眾夫能得眾心則百世不忘矣觀更始之際劉氏之遺恩餘烈英雄豈能抗之哉然則知高祖孝文之寬仁結於人心深矣周人之思召公愛其甘棠詩序曰甘棠美召伯也召伯聽訟於廿棠之下周人思之不伐其樹又況其子孫哉劉氏之再受命蓋以此乎三國志魏志劉曄傳劉曄字子揚淮南成惪人也明帝即位進爵東亭侯邑三百戶詔曰尊嚴祖考所以崇孝表行也追本敬始所以篤教流化也是以成湯文武實造商周詩書之義追尊稷契歌頌有娀姜嫄之事明盛德之源流受命所由興也卷十四新唐書蘇世長傳蘇世長京兆武功人祖彤仕後魏通直散騎常侍父振周宕州刺史建威縣侯高祖與之舊數遣使者諭降輒殺之洛陽平始與弘烈歸帝誅褒而誚世長頓首謝曰古帝王受命以比逐鹿一人得禽萬夫歛手豈有獲鹿後忿同獵者問爭肉罪邪今陛下應天順民安可忘管仲雍齒事且武功舊人亂離以來死亡略盡唯臣得見太平若殺之是絕其類帝笑釋之授玉山屯監舊唐書張九齡傳張九齡字子壽一名博物九齡幼聰敏善屬文年十三以書干廣州刺史王方慶大嗟賞之曰此子必能致遠登進士第應舉登乙第拜校書郎玄宗在東宮舉天下文藻之士親加策問九齡對策高第遷右拾遺時帝未行親郊之禮九齡上疏曰伏以天者百神之君而王者之所由受命也自古繼統之主必有郊配之義蓋以敬天命以報所受故於郊之義則不以德澤未洽年榖不登凡事之故而闕其禮又新唐書張九齡傳玄宗即位未郊見九齡建言天百神之君王者所由受命也自古繼統之主必有郊配蓋敬天命報所受也不以德澤未洽年榖未登而闕其禮新唐書劉文靜裴寂傳贊曰應龍之翔雲雺滃然而從震風薄怒萬空不約而號物有自然相動耳觀二子非有踔越之姿當高祖受命赫然利見於世故能或翼或從尸天之功云受命之符第二史記黃帝紀官名皆以雲命為雲師黃帝受命有雲瑞故以雲紀事前漢天文志漢元年十月五星聚于東井以歷推之從歲星也此高皇帝受命之符也前漢敘傳高祖始受命則白蛇分西入關則五星聚故淮陰留侯謂之天授非人力也前漢董仲舒傳天之所大奉使之王者必有非人力所能致而自至者此受命之符也天下之人同心歸之若歸父母故天瑞應誠而至書曰白魚入于王舟有火復于王屋流為烏此蓋受命之符也前漢哀帝紀夏賀良等言赤精子之讖漢家曆運中衰當再受命宜改元易號語曰漢興二百載再獲受命之符其大赦天下以建平二年為太初元年號曰陳聖留太平皇帝如淳曰陳舜後王莽陳之後謬語以明莽當纂立而不知韋昭曰敷陳聖劉之德漏刻以百二十為度八月詔曰夏賀良等建言改元易號增益漏刻可以永安國家朕過聽卒亡嘉應皆違經背古皆蠲除之後漢光武帝紀光武先在長安時同舍生彊菙自關中奉赤伏符曰劉秀發兵捕不道四夷雲集龍鬥野四七之際火為主群臣因奏曰受命之符人應為大萬里合信不議同情周之白魚曷足比焉後漢光武帝紀論曰後望氣者蘇伯阿為王莽使至南陽遙望見春陵郭唶曰氣佳哉鬱鬱蔥蔥然及始起兵還春陵遠望舍南火光赫然屬天有頃不見初道士西門君惠李守等亦云劉秀當為天子其王者受命信有符乎不然何以能乘時龍而御天哉唶歎也音子夜反晉樂志改黃爵行為伯益言赤烏銜書有周以興今聖皇受命神雀來也箋證史記五帝本紀黃帝者少典之子姓公孫名曰軒轅生而神靈弱而能言官名皆以雲命為雲師集解應劭曰黃帝受命有雲瑞故以雲紀事也春官為青雲夏官為縉雲秋官為白雲冬官為黑雲中官為黃雲張晏曰黃帝有景雲之應因以名師與官漢書天文志漢元年十月五星聚于東井以歷推之從歲星也此高皇帝受命之符也漢書敘傳初劉媼任高祖而夢與神遇師古曰任謂懷任也震電晦冥有龍蛇之怪及其長而多靈有異於眾是以王武感物而折券呂公覩形而進女秦皇東游以厭其氣呂后望雲而知所處始受命則白蛇分西入關則五星聚故淮陰留侯謂之天授非人力也漢書董仲舒傳臣聞天之所大奉使之王者必有非人力所能致而自至者此受命之符也天下之人同心歸之若歸父母故天瑞應誠而至書曰白魚入于王舟有火復于王屋流為烏師古曰今文尚書泰誓之辭也謂伐紂之時有此瑞也此盖受命之符也漢書哀帝紀二年春三月待詔夏賀良等言赤精子之讖應劭曰諸以材技徵召未有正官故曰待詔夏姓也賀良名也高祖感赤龍而生自謂赤帝之精良等因是作此讖文漢家歷運中衰當再受命宜改元易號詔曰漢興二百載歷數開元皇天降非材之佑應劭曰哀帝自言不才天降之佑漢國再獲受命之符朕之不德曷敢不通夫基事之元命必與天下自新其大赦天下以建平二年為太初元年號曰陳聖劉太平皇帝李斐曰陳道也言得神道聖者劉也如淳曰陳舜後王莽陳之後謬語以明莽當篡立而不知韋昭曰敷陳聖劉之德也師古曰如韋二說是也宋祁曰予按王莽傳以讖文解釋當作太初元將元年後人不曉四字為號輒削去元將二字非是後得唐本元將字果存漏刻以百二十為度七月以渭城西北原上永陵亭部為初陵勿徙郡國民使得自安八月詔曰待詔夏賀良等建言改元易號增益漏刻可以永安國家朕過聽賀良等言師古曰過誤也冀為海內獲福卒亡嘉應皆違經背古不合時宜六月甲子制書非赦令也皆蠲除之後漢書光武帝紀光武先在長安時同舍生彊華續漢書曰彊華潁川人也彊音其兩反自關中奉赤伏符曰劉秀發兵捕不道四夷雲集龍鬭野四七之際火為主四七二十八也自高祖至光武初起合二百二十八年即四七之際也漢火德故火為主也群臣因復奏曰受命之符人應為大謂彊華奉赤伏符也萬里合信不議同情周之白魚曷足比焉尚書中侯曰武王伐紂度孟津中流白魚躍入王舟長三尺赤文有字告以伐紂之意也後漢書光武帝紀論曰皇考南頓君初為濟陽令以建平元年十二月甲子夜生光武於縣舍是歲縣界有嘉禾生一莖九穗因名光武曰秀及王莽篡位忌惡劉氏以錢文有金刀故改為貨泉或以貨泉字文為白水真人後望氣者蘇伯阿為王莽使至南陽遙望見舂陵郭唶曰唶歎也音子夜反氣佳哉鬱鬱䓤䓤然及始起兵還舂陵遠望舍南火光赫然屬天有頃不見初道士西門君惠李守等亦云劉秀當為天子其王者受命信有符乎不然何以能乘時龍而御天哉晉書樂志下改黃爵行為伯益言赤烏銜書有周以興今聖皇受命神雀來也中興之主第三前漢匈奴傳宣王興師命將以征伐之詩人美大其功曰薄伐獫允至于太原出車彭彭城彼朔方是時四夷賓服稱為中興前漢宣帝紀贊曰孝宣之治信賞必罰綜核名實政事文學法理之士咸精其能自元成間鮮能及之亦足以知吏稱其職民安其業也遭值匈奴乖亂推亡固存信威北夷單于慕義稽首稱藩功光祖宗業垂後嗣可謂中興侔德商宗周宣矣後漢左雄傳上疏曰宣帝興於仄陋綜覆名實知時所病剌史守相輒親引見考察言行信賞必罰是以吏稱其職人安其業故能降來儀之瑞建中興之功宣帝時鳳皇五至因以紀年後漢祭祀志光武受命中興黎庶得居爾田安爾宅書同文車同軌人同倫舟輿所通人跡所至靡不貢職後漢黃瓊傳光武以聖武天挺繼統興業創基冰泮之上立足枳棘之林擢賢於眾愚之中畫功於無形之世興復洪祚開建中興晉元帝紀有王策見於臨安白玉麒麟神璽出於江寧其文曰長壽萬年日有重暈皆以為中興之象焉晉王導傳帝策曰昔我中宗肅祖之基中興也下帷委誠而策定江左拱己宅心而庶績咸熙新唐郭子儀傳上書曰陛下斥素餐去冗食折閹寺任直臣委宰相以簡賢任能付臣以訓兵禦侮則中興之功日月可冀箋證漢書匈奴傳武王伐紂而營雒邑復居于酆鎬放逐戎夷涇洛之北以時入貢名曰荒服其後二百有餘年周道衰而周穆王伐畎戎得四白狼四白鹿以歸自是之後荒服不至於是作呂刑之辟師古曰即尚書呂刑篇是也辟法也音闢至穆王之孫懿王時王室遂衰戎狄交侵暴虐中國中國被其苦詩人始作疾而歌之曰靡室靡家獫允之故豈不日戒獫允孔棘師古曰小雅采薇之詩也至懿王曾孫宣王興師命將以征伐之詩人美大其功曰薄伐獫允至於太原師古曰小雅六月之詩也出車彭彭城彼朔方師古曰小雅出車之詩也是時四夷賓服稱為中興漢書宣帝紀贊曰孝宣之治信賞必罰師古曰有功必賞有罪必罰綜核名實政事文學法理之士咸精其能至于技巧工匠器械自元成間鮮能及之亦足以知吏稱其職民安其業也遭值匈奴乖亂推亡固存信威北夷師古曰信讀為申古通用字一說恩信及威並著北夷單于慕義稽首稱藩功光祖宗業垂後嗣可謂中興侔德殷宗周宣矣師古曰侔等殷之高宗及周宣王也後漢書左雄傳左雄字伯豪南郡涅陽人也安帝時舉孝廉稍遷冀州刺史永建初公車徵拜議郎時順帝新立大臣懈怠朝多闕政雄數言事其辭深切尚書僕射虞詡以雄有忠公節上疏薦之由是拜雄尚書再遷尚書令上疏陳事曰臣聞柔遠和邇莫大寧人寧人之務莫重用賢用賢之道必存考黜是以辠陶對禹貴在知人安人則惠黎民懷之降及宣帝興於仄陋綜覈名實知時所病刺史守相輒親引見考察言行信賞必罰帝乃歎曰民所以安而無怨者政平吏良也與我共此者其唯良二千石乎以為吏數變易則下不安業久於其事則民服教化其有政理者輒以璽書勉勵增秩賜金或爵至關內侯公卿缺則以次用之是以吏稱其職人安其業漢世良吏於茲為盛故能降來儀之瑞建中興之功宣帝時鳳皇五至因以紀年後漢書祭祀志王莽以舅后之家三司鼎足冢宰之權勢依託周公霍光輔幼歸政之義遂以篡叛僭號自立宗廟隳壞社稷喪亡皇帝以匹庶受命中興年二十八載興兵起是以中次誅討十有餘年罪人則斯得黎庶得居爾田安爾宅書同文車同軌人同倫舟輿所通人跡所至靡不貢職後漢書黃瓊傳黃瓊字世英江夏安陸人魏郡太守香之子也瓊初以父任為太子舍人辭病不就遭父憂服闋五府俱辟連年不應永建中公卿多薦瓊者四年上疏諫曰臣聞天者務剛其氣君者務彊其政是以王者處高自持不可不安履危任力不可不據夫自持不安則顛任力不據則危故聖人升高據上則以德義為首涉危蹈傾則以賢者為力唐堯以德化為冠冕以稷契為筋力高而益崇動而愈據此先聖所以長守萬國保其社稷者也昔高皇帝應天順民奮劍而王埽除秦項革命創制降德流祚至於哀平則帝道不綱秕政日亂遂使姦佞擅朝外戚專恣所冠不以仁義為冕所蹈不以賢佐為力終至顛蹶滅絕光武以聖武天挺繼統興業創基冰泮之上立足枳棘之林冰泮喻危陷枳棘喻艱難擢賢於眾愚之中畫功於無形之世形兆也言未有天下之兆畫或作書也崇禮義於交爭循道化於亂離是自歷高而不傾任力危而不跌興復洪祚開建中興光被八極垂名無窮晉書元帝愍帝即位帝出師露次躬擐甲胄移檄四方徵天下之兵尅日進討于時有玉冊見於臨安白玉麒麟神璽出於江寧其文曰長壽萬年日有重暈皆以為中興之象焉晉書王導傳王導字茂弘光祿大夫覽之孫也父裁鎮軍司馬導少有風鑒識量清遠咸和五年薨時年六十四帝舉哀於朝堂三日冊曰昔我中宗肅祖之基中興也下帷委誠而策定江左拱已宅心而庶績咸熙新唐書郭子儀傳臣願陛下斥素餐去冗食抑閹寺任直臣薄征弛役卹隱撫鰥委宰相以簡賢任能付臣以訓兵禦侮則中興之功日月可冀守成第四前漢平津侯歸乞骸骨上報曰古者守成上文遭遇右武前漢稚圭傳上疏曰受命之王務在創業垂統傳之無窮繼體之君心存於承宣先王之德而褒其大功議者爭言制度不可用務變更之臣竊恨國家釋樂成之業而虛為此紛紛也前漢叔孫通傳說上曰夫儒者難與進取可與守成臣願召魯諸生共臣弟子共起朝儀新唐房喬傳帝嘗問創業守文熟難玄齡曰方時草昧群雄競逐攻破乃降戰勝不剋創業則難魏徵曰王者之興必乘衰亂覆昏暴殆天授人與者既得天下則安于驕佚則守文為難帝曰玄齡從我定天下冒百死遇一生見創業之難徵與我安天下畏富貴則驕驕則怠怠則亡見守文之不為易新唐孫伏伽傳帝語裴寂曰隋為無道主驕於上臣諂於下上下蔽蒙至死匹夫手寧不痛哉我今不然平亂責武臣守成責儒臣程能付事以佐不怠新唐劉蕡對策曰夫帝業艱難而成之故不可容易而守之餘見封建唐地理志又見天下治平昭宗紀箋證漢書公孫弘傳公孫弘加有負薪之疾恐先狗馬填溝壑終無以報德塞責願歸侯乞骸骨避賢者路上報曰古者賞有功褒有德守成上文遭禍右武師古曰右亦上也禍亂時則上武耳漢書匡衡傳時上好儒術文辭頗改宣帝之政言事者多進見人人自以為得上意衡復上疏曰臣聞治亂安危之機在乎審所用心蓋受命之王務在創業垂統傳之無窮繼體之君心存於承宣先王之德而褒大其功昔者成王之嗣位思述文武之道以德其心休烈盛美皆歸之二后而不敢專其名師古曰休亦美也烈業也后君也二君文王武王也陛下聖德天覆子愛海內然陰陽未和姦邪未禁者殆論議者未丕揚先帝之盛功爭言制度不可用也務變更之所更或不可行而復復之是以群下更相是非吏民無所信臣竊恨國家釋樂成之業而虛為此紛紛也師古曰釋廢也樂成謂已成之業人情所樂也漢書叔孫通傳叔孫通薛人也秦時以文學徵待詔博士漢王已并天下諸侯共尊為皇帝於定陶通就其儀號高帝悉去秦儀法為簡易群臣飲爭功醉或妄呼按劍擊柱宋祁曰按當作拔上患之通知上益饜之說上曰夫儒者難與進取可與守成臣願徵魯諸生與臣弟子共起朝儀新唐書房玄齡傳房玄齡字喬齊州臨淄人帝嘗問創業守文孰難玄齡曰方時草昧群雄競逐攻破乃降戰勝乃剋創業則難魏徵曰王者之興必乘衰亂覆昏暴殆天授人與者既得天下則安于驕逸人欲靜徭役毒之世方敝裒刻窮之國由此衰則守文為難帝曰玄齡從我定天下冒百死遇一生見創業之難徵與我安天下畏富貴則驕驕則怠怠則亡見守文之不為易然創業之不易既往矣守文之難方與公等慎之新唐書孫伏伽傳孫伏伽貝州武城人仕隋以小史累勞補萬年縣法曹高祖武德初上言三事其一臣聞天子有爭臣雖無道不失其天下其二百戲散樂本非正聲隋末始見崇用此謂淫風不得不變其三臣聞性相近習相遠帝大悅其以伏伽為治書侍御史賜帛三百匹初帝受禪伏伽最先諫帝欲盡下情故不次見拔以示群臣是時軍興賦歛重伏伽數請釐損帝語裴寂曰隋為無道主驕於上臣諂於下下上蔽蒙至身死匹夫手寧不痛哉我今不然平亂責武臣守成責儒臣程能付事以佐不逮虛心盡下冀聞嘉言若李綱孫伏伽可謂誼臣矣新唐書劉蕡傳劉蕡字去華幽州昌平人客梁汴間明春秋能言古興亡事沈健于謀浩然有捄世意文宗即位思洗元和宿恥太和二年舉賢良方正能直言極諫帝引諸儒百餘人于廷策曰蕡對曰夫帝業艱難而成之固不可容易而守之立太子第五史記魯世家昭公年十九猶有童心穆叔不欲立曰太子死有母弟可立不即立長年鈞擇賢義鈞則卜之前漢張良傳上欲廢太子立戚夫人子趙王如意呂后恐使呂澤劫良曰上日欲易太子君安得高枕而臥良曰顧上有所不能致者四人因公綺里季夏黃公角里先生誠能母愛金玉璧帛令太子為書卑辭安車因使辯士固請宜來時從入朝令上見之則一助也於是使人奉太子書迎此四人四人至上欲易太子良諫不聽因疾不視事叔孫太傳稱說引古以死爭上陽許之及宴置酒太子侍四人者從太子上怪問曰何為者四人前對各言其姓名上乃驚曰吾求公避我今公何自從吾兒游乎四人曰陛下輕士善罵臣等義不辱故恐而亡匿今聞太子仁孝愛士天下莫不引頸願為太子死者故臣等來上召戚夫人指視曰彼四人為之輔羽翼巳成難動矣戚夫人泣涕上曰為我楚舞吾為若楚歌歌曰鴻鵠高飛一舉千里羽翼以就橫絕四海橫絕四海又可奈何雖有矰繳尚安所施歌數闋竟不易大子者良本招此四人之力也前漢叔孫通傳通為太子大傳高帝欲以趙王如意易大子通諫曰昔者晉獻公以驪姬故廢太子立奚齊晉國亂者數十年為天下笑秦以不早定扶蘇胡亥詐立自使滅祀今太子仁孝天下皆聞之陛下必欲廢適而立少臣願先伏誅以頸血汙地高帝曰吾特戲耳通曰太子天下本本壹搖天下震動奈何以天下戲高帝曰吾聽公前漢枚乘傳武帝春秋二十九迺得皇子群臣喜故辠與東方朔作皇太子生賦及立皇子禖祝死詔所為皆不從故事重皇子也前漢史丹傳元帝時傅昭儀尺定時主常在左右而皇后太子希得雉見數問尚書以景帝時立膠東王故事丹直入臥內頓首伏青蒲上涕泣言曰皇太子以適長立積十餘年名號繫於百姓天下莫不歸心臣子見定陶王雅素愛幸今者道路流言以為太子有動搖之議審若此公卿以下必以死爭不奉詔臣願先賜死以示群臣天子素仁不忍見丹涕泣言又切至上意大感喟然謂丹曰善輔導太子太子遂為嗣矣新唐鬱林王恪傳初帝以晉王為太子又欲立恪長孫無忌固爭帝曰公豈以非己甥耶無忌曰晉王仁厚守文之良主且舉棊不定則敗況儲位乎帝乃止新唐讓皇帝憲傳睿宗將建東宮以憲適長又嘗為太子而楚王有大功故久不定憲辭曰儲副天下公器時平則先嫡國難則先功重社稷也使副授非宜海內失望新唐十一宗諸子列傳惠昭太子寧傳時國嗣未立李絳等建言聖人以天下為大器知一人不可以獨化四海不可以無本故建太子以自副陛下即位四年而家子不立是開窺覦之端非所以承列聖示萬世帝曰善乃以寧為太子新唐褚遂良傳是時魏王泰禮秩如嫡帝曰問方今何事尤急遂良曰今四海方仰德誰不率者唯太子諸王宜有定分帝然之新唐宋務光傳臣聞太守者君之貳國之本所以守廟承祧養民贊業願擇賢良早建諸副安社稷慰黎元箋證史記魯周公世家三十一年六月襄公卒其九月太子卒魯人立齊歸之子裯為君是為昭公昭公年十九猶有童心集解服虔曰言無成人之志而有童子之心穆叔不欲立曰太子死有母弟可立不即立長集解服虔曰無母弟則立庶子之長年鈞擇賢義鈞則卜之集解杜預曰先人事後卜筮義鈞謂賢等漢書張良傳張良字子房其先韓人也上欲廢太子立戚夫人子趙王如意大臣多爭未能得堅決也呂后恐不知所為或謂呂后曰留侯善畫計上信用之呂后乃使建成侯呂澤劫良曰君常為上謀臣今上日欲易太子君安得高枕而臥良曰始上數在急困之中幸用臣策今天下安定以愛欲易太子骨肉之間雖臣等百人何益呂澤彊要曰為我畫計良曰此難以口舌爭也顧上有所不能致者四人師古曰顧念也四人謂園公綺里季夏黃公角里先生所謂商山四皓也四人年老矣皆以上嫚娒士故逃匿山中義不為漢臣然上高此四人今公誠能毋愛金玉璧帛令太子為書卑辭安車因使辨士固請宜來來以為客時從入朝令上見之則一助也於是呂后令呂澤使人奉太子書卑辭厚禮迎此四人四人至客建成侯所愈欲易太子良諫不聽因疾不視事叔孫太傅稱說引古以死爭太子上陽許之猶欲易之及宴置酒太子侍四人者從太子年皆八十有餘須眉皓白衣冠甚偉上怪問曰何為者四人前對各言其姓名上迺驚曰吾求公避逃我今公何自從吾兒游乎四人曰陛下輕士善罵臣等義不辱故恐而亡匿今聞太子仁孝恭敬愛士天下莫不延頸願為太子死者故臣等來上曰煩公幸卒調護太子四人為壽已畢趨去上目送之召戚夫人指視曰我欲易之彼四人為之輔羽翼已成難動矣呂氏真迺主矣戚夫人泣涕上曰為我楚舞吾為若楚歌歌曰鴻鵠高飛一舉千里羽翼以就橫絕四海橫絕四海又可奈何雖有矰繳尚安所施歌數闋戚夫人歔欷流涕上起去罷酒竟不易太子者良本招此四人之力也漢書叔孫通傳叔孫通薛人也秦時以文學徵待詔博士九年高帝徙通為太子太傅十二年高帝欲以趙王如意易太子通諫曰昔者晉獻公以驪姬故廢太子立奚齊晉國亂者數十年為天下笑秦以不早定扶蘇胡亥詐立自使滅祀此陛下所親見今太子仁孝天下皆聞之呂后與陛下攻苦食啖如淳曰食無菜茹為啖師古曰啖當作淡淡謂無味之食也言共攻擊勤苦之事而食無味之食也淡音大噉反其可背哉陛下必欲廢適而立少師古曰適讀曰嫡臣願先伏誅以頸血汙地高帝曰公罷矣吾特戲耳通曰太子天下本本壹搖天下震動奈何以天下戲高帝曰吾聽公漢書枚乘傳武帝春秋二十九迺得皇子群臣喜故辠與東方朔作皇太子生賦及立皇子禖祝師古曰禮記月令祀於高禖高禖求子之神也武帝晚得太子喜而立此禖祠而令辠作祭祝之文也宋祁曰皇子禖祝浙本皇字下有太字受詔所為皆不從故事重皇子也漢書史丹傳史丹字君仲魯國人也徙杜陵竟寧元年上寑疾傅昭儀及定陶王常在左右而皇太子希得進見上疾稍侵意忽忽不平數問尚書以景帝時立膠東王故事是時太子長舅陽平侯王鳳為衛尉侍中與皇太子皆憂不知所出丹以親密臣得侍視疾候上間獨寑時丹直入臥內頓首伏青蒲上涕泣言曰皇太子以適長立積十餘年名號繫於百姓天下莫不歸心臣子見定陶王雅素愛幸今者道路流言為國生意以為太子有動搖之議審若此公卿以下必以死爭不奉詔臣願先賜死以示群臣天子素仁不忍見丹涕泣言又切至上意大感喟然太息曰吾日困劣而太子兩王幼少意中戀戀亦何不念乎然無有此議且皇后謹慎先帝又愛太子吾豈可違指駙馬都尉安所受此語丹即卻頓首曰愚臣妄聞罪當死上因納謂丹曰吾病寖加恐不能自還善輔道太子毋違我意丹噓唏而起太子由是遂為嗣矣新唐書太宗諸子列傳鬱林王恪傳鬱林王恪始王長沙俄進封漢貞觀二年徙蜀與越燕二王同封不之國久乃為齊州都督恪善騎射有文武才帝初以晉王為太子又欲立恪長孫無忌固爭帝曰公豈以非己甥邪且兒英果類我若保護舅氏未可知無忌曰晉王仁厚守文之良主且舉棊不定則敗况儲位乎帝乃止新唐書三宗諸子列傳讓皇帝憲傳讓皇帝憲始王永平文明元年武后以睿宗為皇帝故憲立為皇太子睿宗降為皇嗣更冊為孫與諸王皆出閣開府置官屬長壽二年降王壽春與衡陽巴陵彭城三王同封復詔入閣中宗立改王蔡固辭不敢當唐隆元年進封宋睿宗將建東宮以憲嫡長又嘗為太子而楚王有大功故久不定憲辭曰儲副天下公器時平則先嫡國難則先功重社稷也使付授非宜海內失望臣以死請囚新唐書十一宗諸子列傳惠昭太子寧憲宗二十子紀美人生寧惠昭太子寧貞元二十一年始王平原與同安彭城高密文安四王同封帝即位進王鄧與澧深洋絳四王同封於是國嗣未立李絳等建言聖人以天下為大器知一人不可獨化四海不可無本故建太子以自副然後人心定宗祏安有國不易之常道陛下受命四年而蒙子未建是開窺覦之端乖慎重之義非所以承列聖示萬世帝曰善以寧為皇太子新唐書褚遂良傳帝曰朕行有三一監前代成敗以為元龜二進善人其成政道三斥遠群小不受讒言朕能守而勿失亦欲史氏不能書吾惡也是時魏王泰禮秩如嫡群臣未敢諫帝從容訪左右曰方今何事尤急岑文本汛言禮義為急帝以不切未領可遂良曰今四方仰德誰弗率者惟太子諸王宜有定分帝曰有是哉朕年五十日以衰怠雖長子守器而弟支子尚五十人心常念焉自古宗姓無良則傾敗相仍公等為我簡賢者保傅之新唐書宋務光傳宋務光字子昂一名烈汾州西河人舉進士及第調洛陽尉遷右衛騎曹參軍神龍元年大水詔文武九品以上官直言極諫務光上書曰今人貧而奢不息法設而偽不止長吏貪昌選舉以私稼穡之人少商旅之人眾願坦然更化以身先之凋殘之後緩其力役久弊之極訓以敦龐十年之外生聚方足臣聞太子者君之貳國之本所以守器承祧養民贊業願擇賢能早建儲副安社稷慰黎元教太子第六前漢賈誼傳上疏曰太子迺生固舉以禮使士負之有司齊肅人冕見之南郊見于天也過闕則下過廟則趨孝子之道也故自為赤子而教固巳行矣昔者成王幼在繈抱之中召公為太保周公為太傳太公為太師保保其身體傅傅之德義師道之教訓此三公之職也於是為置三少皆上大夫也曰少保少傅少師是與太子宴者也故迺孩提有識三公三少固明孝仁禮義以道習之逐去邪人不使見惡行於是皆選天下之端士孝悌博聞有道術者以衛翼之使與太子居處出入故太子迺生而見正事聞正言行正道左右前後皆正人也夫習與正人居之不能毋正猶生長於齊地不能不齊言也習與不正人居之不能毋不正猶生長於楚地不能不楚言也孔子曰少成若天性習貫如自然及太子少長知妃色則入于學學者所學之官也學禮曰帝入東學上親而貴仁則親疏有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學上賢而貴德則聖智在位而功不遺矣帝入北學上貴而尊爵則貴賤有等而下不隃矣帝入太學承師問道退習而考於太傳太傳罰其不則而正其不及則惪智長而治道得矣此五學者既成於上則百新唐蕭瑀傳晉王為太子拜太保帝曰三師導事子者也禮不尊則無所取法乃詔師入謁太子入門迎拜師答拜新唐元稹傳始王叔文王伾蒙倖太子宮稹上書賈生有言三代之君仁且久者教之然也周成王本中才近管蔡則讒入任周召則善聞豈天聰明哉夫以匹士之愛子猶求明哲慈惠之師豈天下元良而反不及乎百姓黎民化輯於下矣及太子既成人免於保傳之嚴則有記過之史徹膳之宰進善之旌誹謗之木敢諫之鼓瞽史誦詩工誦箴諫大夫進謀士傳民語習與智長故切而不媿化與心成故中道若性夫三代之所以長久者以其輔翼太子有此具也及秦而不然其俗固非貴辭讓也所上者告訐也固非貴禮義也所上者刑罰也使趙高傅胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然豈惟胡亥之性惡哉彼其所以道之者非其理故也後漢班彪傳東宮初建師保多闕彪上言曰聖人審所與居而戒慎所習昔成王之為孺子出則周公邵公太公史佚入則大顛閎夭南宮括散宜生左右前後禮無違者故成王一日即位天下矌然太平是以春秋愛子教以義方不納於邪驕奢淫佚所自邪也詩云詒厥孫謀以宴翼子言武王之謀遺子孫也漢興太宗使晁錯導太子以法術賈誼教梁王以詩書及至中宗亦令劉向王褒蕭望之周堪之徒以文章儒學保訓東宮以下莫不崇簡其人就成德器今皇太子宜博選名儒以為太子太傳後漢皇太子嘗問攻戰之事帝曰昔衛靈公問陳孔子不對此非爾所及每旦工一朝日側乃罷數引公卿郎將講論經理後漢明帝永平中東巡守幸孔子宅祠仲己親御講堂命皇太子諸二也王之新唐王珪傳珪為魏王泰師王謂何以為忠孝珪曰陛下王之君事思盡忠陛下王之父事思盡孝忠孝可以立身可以成名王曰願聞所習珪曰東平王蒼稱為善最樂願王志之帝聞喜曰兒司以无過矣新唐劉洎傳皇太子初立洎上書曰太子宗祧是繫善惡之習興亡在焉弗勤于始將悔于末故朝錯上書令通政術賈誼奏計務知禮教陛下每退朝引見群臣訪以今古咨以得失而太子處內不接正人不聞正論臣所未諭臣愚以為授以良書娛以佳賓使聞所未聞睹所未睹儲德愈光群生之福也箋證漢書賈誼傳夏為天子十有餘世而殷受之殷為天子二十餘世而周受之周為天子三十餘世而秦受之秦為天子二世而亡人性不甚相遠也何三代之君有道之長而秦無道之暴也其故可知也古之王者太子迺生固舉以禮使士負之有司齊肅端冕見之南郊見于天也過闕則下過廟則趨孝子之道也故自為赤子而教固已行矣昔者成王幼在繈抱之中召公為太保周公為太傅太公為太師保保其身體傅傅之德義師道之教訓此三公之職也于是為置三少皆上大夫也曰少保少傅少師是與太子宴者也故迺孩提有識三公三少固明孝仁禮義以道習之逐去邪人不使見惡行于是皆選天下之端士孝悌博聞有道術者以衛翼之使與太子居處出入故太子迺生而見正事聞正言行正道左右前後皆正人也夫習與正人居之不能毋正猶生長于齊不能不齊言也習與不正人居之不能毋不正猶生長于楚之地不能不楚言也故擇其所耆必先受業迺得嘗之擇其所樂必先有習迺得為之孔子曰少成若天性習貫如自然及太子少長知妃色師古曰妃色妃匹之色則入于學學者所學之官也學禮曰帝入東學上親而貴仁則親疏有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學上賢而貴德則聖智在位而功不遺矣帝入北學上貴而尊爵則貴賤有等而下不隃矣帝入太學承師問道退習而考於太傅太傅罰其不則而匡其不及則德智長而治道得矣此五學者既成于上則百唐書蕭瑀傳蕭瑀字時文後梁明帝子也九歲封新安王國除以女兄為隋晉王妃故入長安瑀愛經術善屬文帝常曰武德季太上皇有廢立議顧朕挾不賞之功於昆弟弗見容瑀於爾時不可以利怵死懼社稷臣也因賜詩曰疾風知勁草版蕩識誠臣又曰公守道耿介古無以過然善惡太明或有時而失瑀頓首謝曰既蒙教又許以忠亮雖死日猶生年也魏徵曰臣有逆眾持法主恕之以公孤特守節主恕之以介昔聞其言乃今見之使瑀不遇陛下庸能自保邪晉王為皇太子拜太子太保同中書門下三品帝曰三師以德導太子者也禮不尊則無所取法乃詔師入謁太子出門迎拜師答拜新唐書元稹傳元稹字微之河南河內人六代祖巖為隋兵部尚書稹幼孤母鄭賢而文親授書傳九歲工屬文十五擢明經判入等補校書郎元和元年舉制科對策第一拜左拾遺性明銳遇事輒舉始王叔文王伾蒙幸太子宮而橈國政稹謂宜選正人輔導因獻書曰伏見陛下降明詔脩廢學增胄子然而事有先於此臣敢昧死言之賈誼有言三代之君仁且久者教之然也周成王本中才近管蔡則讒入任周召則善聞豈天聰明哉夫以匹士之愛其子猶求明哲慈惠之師豈天下元良而反不及乎百姓黎民化輯于下矣及太子既冠成人免于保傅之嚴則有記過之史徹膳之宰進善之旌師古曰進善言者立于旌下誹謗之木師古曰譏惡事者書之于木敢諫之鼓瞽師古曰欲顯諫者則擊鼓史誦詩工誦箴諫大夫進謀士傳民語習與智長故切而不媿化與心成故中道若性三代之禮春朝朝日秋暮夕月所以明有敬也師古曰朝日以朝夕月以暮皆迎其初出也下朝音直遙反春秋入學坐國老執醬而親餽之所以明有孝也行以鸞和步中采齊趣中肆夏所以明有度也其于禽獸見其生不食其死聞其聲不食其肉故遠庖廚所以長恩且明有仁也夫三代之所以長久者以其輔翼太子有此具也及秦而不然其俗固非貴辭讓也所上者告訐也固非貴禮義也所上者刑罰也使趙高傅胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然豈惟胡亥之性惡哉彼其所以道之者非其理故也師古曰道讀曰導後漢書班彪傳班彪字叔皮扶風安陵人也祖況成帝時為越騎校尉父稚哀帝時為廣平太守彪復辟司徒玊況府時東宮初建諸王國並開建武二十三年玊況為司徒十九年建明帝為太子十七年封諸王而官屬未備師保多闕彪上言曰孔子稱性相近習相遠也賈誼以為習與善人居不能無為善猶生長于齊不能無齊言也習與惡人居不能無惡猶生長于楚不能無楚言也賈誼上疏之辭是以聖人審所與居而戒慎所習昔成王之為孺子出則周公召公太公史佚入則太顛閎夭南宮括散宜生左右前後禮無違者故成王一日即位天下曠然太平是以春秋愛子教以義方不納於邪驕奢淫佚所自邪也詩云詒厥孫謀以宴翼子言武王之謀遺子孫也漢興太宗使鼂錯導太子以法術賈誼教梁王以詩書及至中宗亦令劉向王褒蕭望之周堪之徒以文章儒學保訓東宮以下莫不崇簡其人就成德器今皇太子諸王雖結髮學問脩習禮樂而傅相未置賢才官屬多闕舊典宜博選名儒有威重明通政事者以為太子太傅後漢書光武帝紀初帝在兵間久厭武事且知天下疲耗思樂息肩左傳曰息肩于晉自隴蜀平後非儆急未嘗復言軍旅皇太子嘗問攻戰之事帝曰昔衛靈公問陳孔子不對此非爾所及論語衛靈公問陳於孔子曰俎豆之事則嘗聞之矣軍旅之事未之學也每旦視朝日側乃罷數引公卿郎將講論經理夜分乃寐後漢書明帝紀永平十五年春二月庚子東巡狩三月徵琅邪王京會良成徵東平王蒼會陽都又徵廣陵侯及其三弟會魯祠東海恭王陵還幸孔子宅祠仲尼及七十二弟子親御講堂命皇太子諸王說經新唐書王珪傳王珪字叔玠祖僧辯梁太尉尚書令父顗北齊樂陵郡太守世居郿性沈澹志量隱正恬於所遇交不苟合隋開皇十三年召入秘書內省讎定群書為太常治禮郎季父頗通儒有鑒裁尤所器許頗坐漢王諒反誅珪亡命南山十餘年高祖入關李綱薦署世子府諮議參軍事建成為皇太子授中舍人遷中允禮遇良厚太子與秦王有隙帝責珪不能輔導流嶲州太子已誅太宗召為諫議大夫帝念名臣俄召拜禮部尚書兼魏王泰師王見之為先拜珪亦以師自居王問珪何以為忠孝珪曰陛下王之君事思盡忠陛下王之父事思盡孝忠孝可以立身可以成名王曰忠孝既聞命矣願聞所習珪曰漢東平王蒼稱為善最樂願王志之帝聞喜曰兒可以無過矣新唐書劉洎傳劉洎字思道荊州江陵人初為蕭銑黃門侍郎南略地嶺表下五十城未還而銑敗遂以城自歸授南康州都督府長史貞觀七年擢給事中封清苑縣男皇太子初立洎謂宜尊賢重道上書曰太子宗祧是繫善惡之習興亡在焉弗勤于始將悔于末故俎錯上書令通政術賈誼奏計務知禮教今太子孝友仁愛挺自天姿然春秋鼎盛學當有漸以陛下多才多藝尚垂精厲志以博異聞而太子優游坐棄白日陛下每退朝引見群臣訪以今古咨以得失而太子處內不接正人不聞正論臣所未諭古者問安而退以廣敬也異宮而處以遠嫌也間者太子一入侍逾旬不出師傅寮寀具員而已非所謂愛之也臣愚以為授以良書娛以佳賓使耳所未聞睹所未見儲德愈光群生之福也
