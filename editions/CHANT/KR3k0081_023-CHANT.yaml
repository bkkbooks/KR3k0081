body:
  text: 卷第二十三刑罰徇情第一前漢杜周傳周為廷尉其治大抵放張湯而善候伺上所欲擠者因而陷之上所以欲釋久繫待問而微見其冤狀客有謂周曰君為天下決平不循三尺法專以人主意指為獄獄者固如是乎周曰三尺安出哉前主所是著為律後主所是疏為令當時為是何古之法乎至周為廷尉詔獄亦益多矣前漢張敞傳敞為京兆尹賞罰分明時越法縱捨也前漢酷吏嚴延年傳務在摧折豪彊扶助貧弱貧弱雖陷法曲文以出之其豪桀侵小民者以文內之眾人所謂當死者一朝出之所謂當生者詭殺之吏民莫能測其意深淺戰栗不敢犯禁前漢酷吏傳周陽由為郡守所愛者撓法活之所增者曲法滅之箋證漢書杜周傳周為廷尉其治大抵放張湯而善候司師古曰觀望天子意上所欲擠者因而陷之上所欲釋久繫待問而微見其冤狀客有謂周曰君為天下決平不循三尺法專以人主意指為獄獄者固如是乎周曰三尺安出哉前主所是著為律後主所是疏為令當時為是何古之法乎至周為廷尉詔獄亦益多矣漢書張敞傳敞為人敏疾賞罰分明見惡輒取時時越法縱舍有足大者漢書酷吏傳嚴延年其治務在摧折豪彊扶助貧弱貧弱雖陷法曲文以出之其豪桀侵小民者以文內之眾人所謂當死者一朝出之所謂當生者詭殺之吏民莫能測其意深淺戰栗不敢犯禁漢書酷吏傳周陽由周陽由其父趙兼以淮南王舅侯周陽師古曰封為周陽侯故因氏焉武帝即位吏治尚修謹然由居二千石中最為暴酷驕恣所愛者撓法活之所憎者曲法滅之刑罰不中第二前漢于定國傳東海有孝婦少寡亡子養姑甚謹姑欲嫁之終不肯姑謂鄰人曰孝婦事我勤苦哀其亡子守寡我老久絫丁壯奈何其後姑自經死姑女告吏婦殺我母吏捕孝婦孝婦辭不殺吏驗治孝婦自誣服具獄上府于公以為此婦養姑十餘年以孝聞必不殺也太守不聽竟論殺孝婦郡中枯旱三年後太守至卜筮其故于公曰孝婦不當死前太守彊斷之咎黨在是乎於是太守殺牛自祭孝婦冢因表其墓夫立於雨歲熟後漢崔駰傳祖篆王莽時為建新大尹強起班春所至之縣獄犴填滿篆垂涕曰刑罰不中及陷人於穽遂平理所出二千餘人掾吏諫曰朝廷初政州牧峻則宥過申枉誠仁者之心然獨為君子將有悔乎篆曰邾文公不以一人易其身君子謂之知命如殺一大尹贖二千人蓋所願也後漢循吏孟嘗傳仕郡為戶曹吏有寡婦至孝養姑姑年老壽終夫女弟先懷嫌忌乃巫婦厭告供養加鴆其母列訟縣庭郡不加尋察遂結竟其罪嘗先知枉狀備言之於太守太守不為理自是郡中連旱二年後太守商丹訪問其故嘗具陳寡婦冤誣之事因曰昔東海孝婦感天致旱于公一言甘澤時降宜戮訟者以謝冤魂庶幽枉獲申時雨可期丹從之即刑訟女而祭婦簊天應澍雨榖稼以登箋證漢書于定國傳于定國字曼倩東海郯人也其父于公為縣獄史東海有孝婦少寡亡子養姑甚謹姑欲嫁之終不肯姑謂鄰人曰孝婦事我勤苦哀其亡子守寡我老久絫丁壯奈何其後姑自經死姑女告吏婦殺我母吏捕孝婦孝婦辭不殺姑吏驗治孝婦自誣服具獄上府于公以為此婦養姑十餘年以孝聞必不殺也太守不聽于公爭之弗能得乃抱其具獄哭於府上因辭疾去太守竟論殺孝婦郡中枯旱三年後太守至卜筮其故于公曰孝婦不當死前太守彊斷之咎黨在是乎於是太守殺牛自祭孝婦冢因表其墓天立大雨歲熟後漢書崔駰傳崔駰字亭伯涿郡安平人也高祖父朝生子舒歷四郡太守所在有能名舒小子篆王莽時為郡文學以明經徵詣公車太保後以篆為建新大尹莽改千乘郡曰建新守曰大尹乃遂單車到官稱疾不視事三年不行縣門下掾倪敞諫篆乃強起班春班布春令所至之縣獄犴填滿篆垂涕曰嗟乎刑罰不中乃陷人於穽此皆何罪而至於是遂平理所出二千餘人掾吏叩頭諫曰朝廷初政州牧峻刻宥過申枉誠仁者之心然獨為君子將有悔乎篆曰邾文公不以一人易其身君子謂之知命如殺一大尹贖二千人蓋所願也後漢書循吏列傳孟嘗傳嘗少修操行仕郡為戶曹史上虞有寡婦至孝養姑姑年老壽終夫女弟先懷嫌忌乃誣婦厭苦供養加鴆其母列訟縣庭郡不加尋察遂結竟其罪嘗先知枉狀備言之於太守太守不為理嘗哀泣外門因謝病去婦竟冤死自是郡中連旱二年禱請無所獲後太守殷丹到官訪問其故嘗詣府具陳寡婦冤誣之事因曰昔東海孝婦感天致旱于公一言甘澤時降宜戮訟者以謝冤魂庶幽枉獲申時雨可期丹從之即刑訟女而祭婦墓天應澍雨榖稼以登贖罪第三史記晏平仲傳越石父賢在縲紲中晏嬰出遭之塗解左驂贖之前漢食貨志晁錯曰今募天下入粟縣官得以拜爵得以除罪如此富人有爵農民有錢粟有所渫渫散也前漢貢禹傳武帝始臨天下尊賢用士闢地廣境數千里自見功大威行遂從耆欲用度不足乃行一切之變使犯法者贖罪入榖者補吏是以天下奢侈官亂民貧盜賊並起亡命者眾郡國恐伏其誅則擇便巧史書習於計簿能欺上府者以為右職姦軌不勝則取勇猛能操切百姓者以苛暴威服下者使居大位故亡義而有財者顯於世欺謾而善書者尊於朝誖逆而勇猛者貴於官故俗皆曰何以孝弟為財多而先榮何以禮義為史書而仕宦何以謹慎為勇而臨官故黥劓而髡鉗者猶復攘臂為政於世行雖犬彘家富埶足目指氣使是為賢耳故謂居官而致富者為雄桀處姦而得利者為壯士兄勸其弟父勉其子俗之壞敗乃至於是察其所以然者皆以犯法得贖罪求士不得真賢相守崇財利誅不行之所致也今欲興至治致太平宜除贖罪之法相守選舉不以實及有臧者輒行其誅亡但免官則爭盡力為善貴孝弟賤賈人進真賢舉實廉而天下治矣前漢江充傳督三輔盜賊禁察踰侈貴戚近臣多奢潛充皆舉劾奏請沒入車馬令身待北軍擊匈奴奏可於是貴戚子弟皆見上叩頭求哀願入賢贖罪上許之前漢蕭望之傳西羌反漢遣後將軍征之張敞上書言國兵在外榖度不足願令非盜受財殺人及犯法不得赦者皆得入榖贖罪望之與李彊議以為民函陰陽之氣有仁義欲利之心在教化之所助堯在上不能去民欲利之心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也故堯桀之分在於義利而已道民不可不慎也今欲令民量粟以贖罪如此則富者得生貧者獨死是貧富異刑而法不壹也人情貧窮父兄囚執聞出財得以生活為人子弟者將不顧死亡之患敗亂之行以赴財利求救親戚一人得生十人以喪如此則伯夷之行壞公綽之名滅論語曰公綽之不欲政教一傾恐不能復前漢劉向傳上復興神僊方術之事而淮南有枕中鴻寶死祕書書言神僊使鬼物為金之術而更生父德武帝時治淮南獄得其書更生幼而讀誦以為奇獻之言黃金可成上令典尚方鑄作事費甚多方不驗吏劾更生鑄偽黃金繫當死更生兄陽成侯安民上書入國戶半贖更生罪上亦奇其材得踰冬減死論後漢明帝紀詔曰亡命自誅死已下贖死罪縑三十疋右趾至髡鉗城且舂十疋完城且至司寇五疋未發覺自告者半入贖後漢虞詡傳詡遷尚書僕射是時長吏二千石聽百姓謫罰者輸贖號為義錢託為貧人錢而守令因以聚斂詡上疏論之切責州郡謫罰輸贖自此而止晉廷尉奏殿中張吏郡廣盜官幔三張合布三十疋有司正刑棄市廣二子宗年十三雲年十一撾登聞鼓求為奚官奴以贖父命尚書郎朱暎議曰宜特聽左丞堅駮之曰刑之所以止刑殺之所以止殺小不忍而輕易典刑人之愛人誰不如宗此為施一恩於今開萬怨於後也遂正廣刑餘見肉刑前漢刑法志又見使功不如使過竇憲傳箋證史記晏平仲傳晏平仲嬰者萊之夷維人也越石父賢在縲紲中晏子出遭之途解左驂贖之漢書食貨志於是上感誼言始開藉田躬耕以勸百姓鼂錯復說上曰今募天下入粟縣官得以拜爵得以除罪如此富人有爵農民有錢粟有所渫師古曰渫散也音先列反下同漢書貢禹傳自禹在位數言得失書數十上禹又言武帝始臨天下尊賢用士闢地廣境數千里自見功大威行遂從耆欲師古曰從讀曰縱耆讀曰嗜用度不足乃行壹切之變使犯法者贖罪入穀者補吏是以天下奢侈官亂民貧盜賊並起亡命者眾郡國恐伏其誅則擇便巧史書習於計簿能欺上府者以為右職師古曰上府謂所屬之府右職高職也姦軌不勝則取勇猛能操切百姓者以苛暴威服下者使居大位故亡義而有財者顯於世欺謾而善書者尊於朝誖逆而勇猛者貴於官故俗皆曰何以孝弟為財多而光榮何以禮義為史書而仕宦何以謹慎為勇猛而臨官故黥劓而髡鉗者猶復攘臂為政於世行雖犬彘家富埶足目指氣使是為賢耳師古曰動目以指物出氣以使人故謂居官而置富者為雄桀處姦而得利者為壯士兄勸其弟父勉其子俗之壞敗乃至於是察其所以然者皆以犯法得贖罪求士不得真賢相守崇財利誅不行之所致也今欲興至治致太平宜除贖罪之法相守選舉不以實及有臧者輒行其誅亡但免官則爭盡力為善貴孝弟賤賈人進真賢舉實廉而天下治矣漢書江充傳江充字次倩趙國邯鄲人也上以充為謁者使匈奴還拜為直指繡衣使者督三輔盜賊禁察踰侈貴戚近臣多奢僭充皆舉劾奏請沒入車馬令身待北軍擊匈奴文穎曰令貴戚身待於北軍也奏可於是貴戚子弟惶恐皆見上叩頭求哀願得入錢贖罪上許之漢書蕭望之傳西羌反漢遣後將軍征之京兆尹張敞上書言國兵在外軍以夏發隴西以北安定以西吏民並給轉輸田事頗廢素無餘積雖羌虜以破來春民食必之窮辟之處買亡所得師古曰辟讀曰僻縣官穀度不足以振之願令諸有辠非盜受財殺人及犯法不得赦者皆得以差入穀此八郡贖罪務益致穀以豫備百姓之急事下有司望之與少府李彊議以為民函陰陽之氣有好義欲利之心在教化之所助堯在上不能去民欲利之心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也故堯桀之分在於義利而已道民不可不慎也今欲令民量粟以贖罪如此則富者得生貧者獨死是貧富異刑而法不壹也人情貧窮父兄囚執聞出財得以生活為人子弟者將不顧死亡之患敗亂之行以赴財利求救親戚一人得生十人以喪如此伯夷之行壞公綽之名滅師古曰公綽魯大夫孟公綽也論語稱孔子曰若臧武仲之智公綽之不欲政教壹傾雖有周召之佐恐不能復漢書楚元王傳附劉向上復興神僊方術之事而淮南有枕中鴻寶苑祕書師古曰鴻寶苑祕書並道術篇名臧在枕中言常存錄之不漏泄也書言神僊使鬼物為金之術及鄒衍重道延命方世人莫見而更生父德武帝時治淮南獄得其書更生幼而讀誦以為奇獻之言黃金可成上令典尚方鑄作事費甚多方不驗上乃下更生吏吏劾更生鑄偽黃金繫當死更生兄陽城侯宋祁曰城一作成安民上書入國戶半贖更生罪上亦奇其材得踰冬減死論後漢書明帝紀十八年春三月丁亥詔曰其令天下亡命自殊死已下贖死罪縑三十匹右趾至髡鉗城旦舂十匹完城旦至司寇五匹吏人犯罪未發覺詔書到自告者半入贖後漢書虞詡傳程復上書陳詡有大功語甚切激帝感悟復徵拜議郎數日遷尚書僕射是時長吏二千石聽百姓謫罰者輸贖號為義錢託為貧人儲而守令因以聚歛詡上疏於是詔書下詡章切責州郡謫罰輸贖自此而止晉書范堅傳堅字子常博學善屬文永嘉中避亂江東累遷尚書右丞時廷尉奏殿中帳吏邵廣盜官幔三張合布三十匹有司正刑棄市廣二子宗年十三雲年十一黃幡撾登聞鼓乞恩辭求自沒為奚官奴以贖父命尚書郎朱暎議以為天下之人父無子者少一事遂行便成永制懼死罪之刑於此而弛堅亦同暎議時議者以廣為鉗徒二兒沒入既足以懲又使百姓知父子之道聖朝有垂恩之仁可特聽減廣死罪為五歲刑宗等付奚官為奴而不為永制堅駁之曰刑之所以止刑殺之所以止殺雖時有赦過宥罪議獄緩死未有行小不忍而輕易典刑者也人之愛父誰不如宗今既居然許宗之請將來訴者何獨匪民特聽之意未見其益不以為例交興怨讟此為施一恩于今而開萬怨於後也成帝從之正廣死刑誅元惡第四史記孔子世家由大司寇攝相事誅魯大夫亂政者少正卯前漢王莽傳商人杜吳殺莽取其絞校尉東海公賓就斬莽首傳詣更始贊曰王莽始起外戚折節力行以要名譽宗族稱孝師友歸仁及其居位輔政成哀之際勤勞國家直道而行動見稱述豈所謂在家必聞在國必聞色取仁而行違者邪遭漢中微國統三絕而太后壽考為之宗主故得肆其姦慝以成篡盜之禍及其竊位南面處非所據顛覆之埶險於桀紂而莽晏然自以黃虞復出也云云自書傳所載亂臣賊子無道之人考其禍敗未有若莽之甚者也後漢梁冀傳中外宗親送詔獄無長少皆棄市所連及公卿列校剌史二千石死者數十人故吏賓客免黜者三百餘人朝廷為空唯尹勳袁盱及廷尉邯鄲義在焉官府市里鼎沸數日乃定百姓莫不稱慶收冀財貨縣官斥賣合三十餘萬萬以充王府用後漢李膺傳拜司隸校尉時張讓弟朔為野王令貪殘無道至乃殺孕婦聞膺厲威嚴懼罪逃還京師因匿兄讓弟含藏於合柱中膺知其狀率將吏卒破柱取朔付洛陽獄受辭畢即殺之讓訴冤於帝詔膺入殿詰以不先請便加誅辟之意膺對曰昔晉文公執衛成公歸于京師春秋是焉禮云公族有罪雖曰宥之有司執憲不從昔仲尼為魯司寇七日而誅少正卯今臣到官已積一旬私懼以稽留為愆不意獲速疾之罪誠自知釁責死不旋踵特乞留五日剋殄元惡退就鼎鑊始生之願也後漢董卓傳呂布誅卓馳齎赦書以令宮陛內外士卒皆稱萬歲百姓歌舞於道長安中士女賣其珠玉衣裝市酒肉相慶者填湔街肆則狐假鴟張自謂驍雄莫敵旋則鳥焚魚爛無非破敗而終新唐桓彥範傳張柬之將誅易之等引與定策於是以彥範敬暉為左右羽林將軍屬以禁兵時中宗每北門起居因得謁陳祕討神龍元年正月彥範暉率羽林兵與將軍李湛等千騎五百人討賊令湛就東宮迎中宗至玄武門彥範等斬關入士皆鼓譟斬易之等廡下箋證史記孔子世家定公十四年孔子年五十六由大司寇行攝相事有喜色門人曰聞君子禍至不懼福至不喜孔子曰有是言也不曰樂其以貴下人乎於是誅魯大夫亂政者少正卯漢書王莽傳商人杜吳殺莽取其綬校尉東海公賓就故大行治禮師古曰公賓姓也就名也以先經治禮故識天子綬也見吳問綬主所在曰室中西北陬閒就識斬莽首軍人分裂莽身支節肌骨臠分爭相殺者數十人公賓就持莽首詣王憲𢫬傳莽首詣更始贊曰王莽始起外戚折節力行以要名譽宗族稱孝師友歸仁及其居位輔政成哀之際勤勞國家直道而行動見稱述豈所謂在家必聞在國必聞色取仁而行違者邪莽既不仁而有佞邪之材又乘四父歷世之權遭漢中微國統三絕而太后壽考為之宗主故得肆其姦慝以成篡盜之禍推是言之亦天時非人力之致矣及其竊位南面處非所據顛覆之埶險於桀紂而莽晏然自以黃虞復出也自書傳所載亂臣賊子無道之人考其禍敗未有如莽之甚者也後漢書梁統傳附玄孫梁冀冀字伯車為人鳶肩豺目初為黃門侍郎轉侍中虎賁中郎將越騎步兵校尉執金吾永和元年拜河南尹冀居職暴恣多非法父商所親客洛陽令呂放頗與商言及冀之短商以讓冀冀即遣人於道刺殺放又諷眾人共薦其子允為河南尹允一名胡狗時年十六容貌甚陋不勝冠帶道路見者莫不嗤笑焉冀一門前後七封侯三皇后六貴人二大將軍夫人女食邑稱君者七人尚公主三人其餘卿將尹校五十七人在位二十餘年窮極滿盛威行內外百僚側目莫敢違命帝大怒遂與中常侍單超具瑗唐衡左悺徐璜等五人成謀誅冀共圍冀第使光祿勳袁盱持節收冀大將軍印綬徙封比景都鄉侯冀及妻壽即日皆自殺悉收子河南尹允叔父屯騎校尉讓及親從衛尉淑越騎校尉忠長水校尉戟等諸梁及孫氏中外宗親送詔獄無長少皆棄市不疑蒙先卒其它所連及公卿列校刺史二千石死者數十人故吏賓客免黜者三百餘人朝廷為空唯尹勳袁盱及廷尉邯鄲義在焉是時事卒從中發使者交馳公卿失其度官府市里鼎沸數日乃定百姓莫不稱慶收冀財貨縣官斥賣合三十餘萬萬以充王府用後漢書黨錮列傳李膺傳李膺字元禮潁川襄城人也祖父脩安帝時為太尉父益趙國相膺性簡亢無所交接唯以同郡荀淑陳寔為師友初舉孝廉為司徒胡廣所辟舉高第再遷青州刺史守令畏威明多望風棄官復徵再遷漁陽太守尋轉蜀郡太守以母老乞不之官復拜司隸校尉時張讓弟朔為野王令貪殘無道至乃殺孕婦聞膺厲威嚴懼罪逃還京師因匿兄讓第舍藏於合柱中膺知其狀率將吏卒破柱取朔付洛陽獄受辭畢即殺之讓訴冤於帝詔膺入殿御親臨軒詰以不先請便加誅辟之意膺對曰昔晉文公執衛成公歸于京師春秋是焉禮云公族有罪雖曰宥之有司執憲不從昔仲尼為魯司寇七日而誅少正卯今臣到官已積一旬私懼以稽留為愆不意獲速疾之罪誠自知釁責死不旋踵特乞留五日剋殄元惡退就鼎鑊始生之願也後漢書董卓傳董卓字仲穎隴西臨洮人也肅以戟刺之衷甲不入傷臂墮車顧大呼曰呂布何在布曰有詔討賊臣卓大罵曰庸狗敢如是邪布應聲持矛刺卓趣兵斬之馳齎赦書以令宮陛內外士卒皆稱萬歲百姓歌舞於道長安中士女賣其珠玉衣裝市酒肉相慶者填滿街肆新唐書桓彥範傳桓彥範字士則潤州丹陽人張柬之將誅易之等引與定策於是以彥範敬暉為左右羽林將軍屬以禁兵時中宗每北門起居因得謁陳祕計神龍元年正月彥範暉率羽林兵與將軍李湛李多祚楊元琰薛思行等千騎五百人討賊令湛多祚就東宮迎中宗至玄武門彥範等斬關入士皆鼓譟時武后處迎仙宮之集仙殿斬易之等廡下
