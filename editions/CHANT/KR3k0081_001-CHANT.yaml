body:
  text: 卷第一君無為而治第一荀子曰守至約而詳事至佚而功垂衣裳不下簟席之上而海內之民莫不願得以為帝王夫是之謂至約身佚而國治功大而名美老子云聖人執左契而不責於人莊子曰夫帝王之德以天地為宗以道德為主以無為為亂莊子曰知雖落天地不自慮也古之王天下者知雖落天地不自慮也辦雖彫萬物不自悅也能雖窮海內不自為也莊子曰帝王無為而天下功前漢董仲舒傳制曰蓋聞虞舜之時游於巖廊之上垂拱無為而天下太平周文王至於日昊不暇食而宇內亦治何勞逸之殊也仲舒對曰孔子曰無為而治者其舜乎改正朔易服色以順天命而已其餘盡循堯道何更為哉嚴助傳云玩心神明秉執聖道負黼扆憑王凡南面而聽斷號令天下王褒云雍容拱已楊雄傳云天子穆然蜵蜎蠖濩之中儲精垂思王吉云凡南面之君何言哉後漢荀悅作申鑒五篇曰致政之術先屏四患乃崇五政行之以誠守之以固簡而不怠疎而不失無為為之使自施之無事事之使自交之不肅而成不嚴而化垂拱揖讓而海內平矣後漢班固傳東都賦曰以建武之治永平之事監于太清建武光武年號永平明帝年號監示也無為而化也後漢左雄上封事曰陛下宜循古法寧靜無為以求天意以銷災異晉郭璞傳上疏曰夫以區區之曹參猶能遵蓋公之一言倚清淨以鎮俗寄市獄以容非夫無為而為之不宰以宰之固陛下之所體者也晉紀瞻傳對策曰羲皇簡朴無為而化後聖因承所務或異非賢聖之不同世變使之然爾晉志云晉武帝垂拱總網責成於良二千石晉書荀勗以謂省史不如省官省官不如省事不如清心昔蕭曹相漢載其清淨致畫一之歌比清淨之本也漢文垂拱幾致刑措北省事也今欲求之於本宜以省事為先唐白居易曰無使人臣掠美於上唐劉洎曰王者不可難詰公卿進對新唐杜黃裳傳憲宗嘗問前古王者所以治亂云云黃裳知帝銳於治恐不得其要因推言王者之道在脩己任賢而已操執網領要得其大者至簿書獄訟百吏能否本非人主所自任昔秦始皇帝親程決事見蚩前世魏文帝欲按尚書事陳矯不從隋文帝日昃聽政衛士傳飡太宗笑之故王者擇人任而責成見功必賞有罪信罰孰敢不力孔子之稱帝舜恭己南面以其能舉十六相去四凶而至無為豈必刓神疫體勞耳目之察然後為治哉新唐令狐德棻傳高宗曰今茲何為而要德棻對曰古者為政清心簡事為本今天下無虞年榖豐衍惟薄賦斂少征役為要高宗曰政道莫尚於無為也新唐道士司馬承正禎傳帝曰理身無為則清高矣理國無為如何對曰國猶身也老子曰游心於淡合氣於漠順物自然而無私焉而天下理易曰聖人者與天地合其德是知天不言而信不為而成無為之旨理國之道也新唐張玄素傳太宗即位問以政對曰自古未有如隋亂者得非君自專法日亂乎且萬乘之尊身決庶務日斷十事五不中者何也善有如不中者何一失日萬機積其失不止何待若上賢右能使百司善職則高居深拱疇敢犯之新唐長孫無忌傳初無忌與遂良悉心奉國帝亦賓禮老臣拱己以聽綱紀設張此二人維持之力也新唐劉贄曰惟陛下調元氣以煦育扇大和於仁壽可以逍遙無為垂拱成化隋楊尚希曰煩碎之務非人主之宜親也箋證荀子王霸篇第十一守至約而詳事至佚而功垂衣裳不下簟席之上而海內之民莫不願得以為帝王夫是之謂至約樂莫大焉人主者以官人為能者也匹夫者以自能為能者也人主得使人為之匹夫則無所移之百畝一守事業窮無所移之也則身佚而國治功大而名美老子道德經任契第七十九和大怨必有餘怨安可以為善是以聖人執左契河上公注古者聖人執左契合符信也無文書法律刻契合符以為信也而不責於人河上公注但刻契之信不責人以他事也有德司契有德之君司察契信而已無德司徹天道無親常與善人據文淵閣四庫全書河上公章句本老子道德經卷下案方括號河上公注四字為引者加又老子注和大怨必有餘怨王弼注不明理其契以致大怨已至而德和之其傷不復故有餘怨也安可以為善是以聖人執左契王弼注左契防怨之所由生也而不責于人有德司契王弼注有德之人念思其契不念怨生而後責於人也無德司徹王弼注徹司人之過也天道無親常與善人據諸子集成本下篇案方括號王弼注三字為引者加莊子天地第十二夫帝王之德以天地為宗以道德為主以無為為常無為也則用天下而有餘郭象注有餘者閒暇之謂也有為也則為天下用而不足據文淵閣四庫全書本莊子注卷五案方括號郭象注三字為引者加庄子天地篇故古之王天下者知雖落天地不自慮也辯雖彫萬物不自說也能雖窮海內不自為也郭象注夫在上者患於不能無為而代人臣之所司使咎繇不得行其明斷后稷不得施其播殖則群才失其任而主上困於役矣故冕旒垂目而付之天下天下皆得其自為斯乃無為而無不為者也故上下皆無為矣但上之無為則用下下之無為則自用也天不產而萬物化地不長而萬物育帝王無為而天下功據諸子集成本郭慶藩莊子集釋卷五案郭象注為引者加漢書董仲舒傳制曰盖聞虞舜之時游於巖廊之上垂拱無為而天下太平周文王至於日昃不暇食而宇內亦治夫帝王之道豈不同條共貫與何逸勞之殊與三王之道所祖不同非其相反將以捄溢扶衰所遭之變然也師古曰捄古救字仲舒對曰故孔子曰亡為而治者其舜虖師古曰論語載孔子之言改正朔易服色以順天命而已其餘盡循堯道何更為哉故王者有改制之名亡變道之實然夏上忠殷上敬周上文者所繼之捄當用此也漢書嚴助傳租稅之收足以給乘輿之御玩心神明秉執聖道負黼依師古曰負背也白與黑畫為斧文謂之黼也依讀曰扆扆形如屏風而曲之畫以黼文張於戶牖之間馮玉几顏師古曰馮讀曰凭南面而聽斷號令天下拱巳李善注文選六臣注文選均作垂拱王褒聖主得賢臣頌遵游自然之勢恬淡無為之場休徵自至壽考無疆雍容垂拱永永萬年李善注尚書曰垂拱而天下治據中華書局一九七七年影印胡克家刻本唐李善注文選卷四十七漢書楊雄傳上蓋天子穆然珍臺閒館琁題玉英蜵蜎蠖濩之中應劭曰題頭也榱椽之頭皆以玉飾言其英華相燭也張晏曰蜵蜎蠖濩刻鏤之形師古曰穆然天子之容也蜵蜎蠖濩言屋中之深廣也閒讀曰閑蜵音一袞反蜎音下袞反蠖音烏郭反濩音胡郭反蕭該音義曰琁題案左思蜀都賦曰金鋪相映玉題交輝是也蜵蜎予案字書蜵蜎好印也上一甸反下一軟反所以澄心清魂儲精垂思師古曰言絜以待冀神降漢書王吉傳今大王以喪事徵宜日夜哭泣悲哀而已慎毋有所發且何獨喪事凡南面之君何言哉天不言四時行焉百物生焉卷七十二案會史所引者乃王吉勸諫昌邑王語後漢書荀淑傳附荀悅時政移曹氏天子恭己而已悅志在獻替而謀無所用乃作申鑒五篇其所論辨通見政體既成而奏之其大略曰夫道之本仁義而已矣五典以經之群籍以緯之詠之歌之弦之舞之前監既明後復申之故古之聖王其於仁義也申重而已致政之術先屏四患乃崇五政行之以誠守之以固簡而不怠怠而不失無為為之使自施之無事事之使自交之唐李賢注老子曰為無為事無事又曰故德交歸也不肅而成不嚴而化垂拱揖讓而海內平矣後漢書班固列傳下今將語子以建武之理永平之事監乎泰清以變子之或志李賢注淮南子曰太清之化也和順以寂漠質直以素樸高誘注曰太清無為之化也又班固東都賦東都主人喟然而歎曰痛乎風俗之移人也今將語子以建武之治永平之事監於太清以變子之惑志李善注東觀漢記曰建武光武年號也永平孝明年號也淮南子曰太清之化也和順以寂寞質直以素樸高誘曰太清無為之化後漢書左雄傳雄上封事曰夫裂土封侯王制所重高皇帝約非劉氏不王非有功不侯孝安皇帝封江京王聖等遂致地震之異永建二年封陰謀之功又有日食之變數術之士咸歸咎於封爵今青州饑虛盜賊未息民有乏絕上求稟貸陛下乾乾勞思以濟民為務宜循古法寧靜無為以求天意以消災異晉書郭璞傳臣竊為陛下惜之夫以區區之曹參猶能遵蓋公之一言倚清靖以鎮俗寄市獄以容非德音不忘流詠于今漢之中宗聰悟獨斷可謂令主然厲意刑名用虧純德老子以禮為忠信之薄况刑又是禮之糟粕者乎夫無為而為之不宰以宰之固陛下之所體者也晉書紀瞻傳周鑒二王之弊崇文以辯等差而流遁者歸薄而無款誠款誠之薄則又反之於忠三代相循如水濟火所謂隨時之義救弊之術也羲皇簡朴無為而化後聖因承所務或異非賢聖之不同世變使之耳晉書武帝紀揚清激濁舉善彈違此朕所以垂拱總綱責成於良二千也卷一案此為晉武帝泰始四年詔令文晉書荀勗傳勗議以為省吏不如省官省官不如省事省事不如清心昔蕭曹相漢載其清靜致畫一之歌此清心之本也漢文垂拱幾致刑措此省事也今必欲求之於本則宜以省事為先又明楊士奇等編歷代名臣奏議曰晉武帝時議省州郡縣半吏以赴農功光祿大夫荀勗議以為省吏不如省官云云新唐書白居易傳李師道上私錢六百萬為魏徵孫贖故第居易言徵任宰相太宗用殿材成其正寢後嗣不能守陛下猶宜以賢者子孫贖而賜之師道人臣不宜掠美帝從之卷一百一十九新唐書劉洎傳太宗好持論與公卿言古今事必往復難詰究臧否洎諫曰帝王之與臣庶聖哲之與庸愚等級遼絕勢不倫擬故課愚對聖持卑抗尊雖思自彊不可得已陛下降慈旨假柔顏虛心聽納猶恐群臣惴縮不敢進況以神機天辯飾辭援古而迮其議哉夫天以無言為尊聖以不言為德皆弗欲煩也新唐書杜黃裳傳帝嘗問前古王者所以治亂云云黃裳知帝銳於治恐不得其要因推言王者之道在修己任賢而已操執綱領要得其大者至簿書獄訟百吏能否本非人主所自任昔秦始皇帝親程決事見嗤前世魏明帝欲按尚書事陳矯不從隋文帝日昃聽政衛士傳飡太宗笑之故王者擇人任而責成見功必賞有罪信罰孰敢不力孔子之稱帝舜恭己南面以其能舉十六相去四凶而至無為豈必刓神疲體勞耳目之察然後為治哉帝以黃裳言忠嘉納之舊唐書令狐德棻傳高宗曰今之所行何政為要德棻對曰古者為政清其心簡其事以此為本當今天下無虞年榖豐稔薄賦歛少征役此乃合於古道為政之要道莫過於此高宗曰政道莫尚於無為也據二十五史本卷七十三舊唐書司馬承禎傳帝曰理身無為則清高矣理國無為如何對曰國猶身也老子曰遊心於澹合氣於漠順物自然而無私焉而天下理易曰聖人者與天地合其德是知天不言而信無為而成無為之旨理國之道也睿宗歎息曰廣成之言即斯是也承禎固辭還山仍賜寶琴一張及霞紋帔而遣之據二十五史本卷一百九十二案會史引司馬承禎禎作正會史游心於淡淡舊唐書作澹無為而成無會史作不又案新唐書司馬承禎傳亦載此事然文字有異新唐書張玄素傳張玄素蒲州虞鄉人仕隋為景城縣戶曹太宗即位問以政對曰自古未有如隋亂者得非君自專法日亂乎且萬乘之尊身決庶務日斷十事五不中中者信善有如不中者何一日萬機積其失不亡何待若上賢右能使百司善職則高居深拱疇敢犯之新唐書長孫無忌傳初無忌與遂良悉心奉國以天下安危自任故永徽之政有貞觀風帝亦賓禮老臣拱已以聽綱紀設張此兩人維持之也新唐書劉蕡傳伏惟陛下事天地以教人恭奉宗廟以教人孝養高年以教人悌長字百姓以教人慈幼調元氣以煦育扇太和以仁壽可以消遙無為垂拱成化隋書楊尚希傳上時每旦臨朝日側不倦尚希諫曰周文王以憂勤損壽武王以安樂延年願陛下舉大綱責成宰輔繁碎之務非人主所宜親也臣無為而治第二前漢汲黯為東海太守黯學黃老言治官民好清靜擇丞史任之責大指而已黯多病臥閤內不出歲餘東海大治召為主爵都尉列於九卿治務在無為而已前漢薛宣傳宣守左馮翊奏賞與薛恭換縣二人視事數月而兩縣皆治宣因移書勞免之曰屬縣各有賢君馮翊垂拱蒙成言端拱無為而受縣之成功願勉所職卒功業餘見量材授職門後漢岑彭子熙遷魏郡太守招聘隱逸與參政事無為而化視事二年輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之唐郭承嘏曰宰相不親簿書新唐陸象先傳為劍南按察使為政尚仁恕嘗曰天下本無事庸人撓之為煩耳弟澄其源無憂不簡耶箋證漢書汲黯傳汲黯字長孺濮陽人也其先有寵於古之寵君也至黯十世世為卿大夫以父任孝景時為太子洗馬遷為滎陽令黯恥為令稱疾歸田里上聞迺召為中大夫以數切諫不得久留內遷為東海太守黯學黃老言治官民好清靜擇丞史任之責大指而已不細苛黯多病臥閤內不出歲餘東海大治稱之上聞召為主爵都尉列於九卿治務在無為而已漢書薛宣傳薛宣字贛君東海郯人也上徙宣為陳留太守盜賊禁止吏民敬其威信入守左馮翊滿歲稱職為真宣即以令奏賞與恭換縣師古曰時令條有材不稱職得改之二人視事數月而兩縣皆治宣因移書勞勉之曰昔孟公綽優於趙魏而不宜滕薛故或以德顯或以功舉君子之道焉可憮也屬縣各有賢君馮翊垂拱蒙成願勉所職卒功業後漢書岑彭傳杞卒子熙嗣尚安帝妹涅陽長公主少為侍中虎賁中郎將朝廷多稱其能遷魏郡太守招聘隱逸與參政事無為而化視事二年輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之舊唐書郭承嘏傳文宗以淮南諸道累歲大旱租賦不登國用多闕及是以度支戶部分命宰臣鎮之承嘏論之曰宰相者上調陰陽下安黎庶致君堯舜致時清平俾之閱簿書算緡帛非所宜也帝深嘉之遷刑部侍郎新唐書陸象先傳陸象先罷為益州大都督府長史劍南按察使為政尚仁恕司馬韋抱真諫曰公當峻扑罰以示威不然民慢且無畏答曰政在治之而已必刑法以樹威乎卒不從而蜀化累徙蒲州刺史兼河東按察使小吏有罪誡遣之大吏白爭以為可杖象先曰人情大抵不相遠謂彼不曉吾言邪必責者當以汝為始大吏慙而退嘗曰天下本無事庸人擾之為煩耳第澄其源何憂不簡邪君不嚴而治第三吳陸績曰懷遠不以德雖童蒙亦不安魏傅嘏曰治以德教為本昭帝曰輕繇薄賦與民休息董仲舒曰天下樂其政歸其德望之若父母從之若流水左傳曰慈惠以布政唐馬燧傳云德宗賜銘序曰每賢上古之書及唐虞之際君臣相得聖賢同時日夕敢教論講至道陳其鑒誡或煩以詠歌熳于典謨百伐是式有以見啟沃之首檀化之端前漢稚圭上疏曰公卿大夫相與循禮恭讓則民不爭好仁樂施則下不暴上義高節則民興行寬柔和惠則眾相愛四者明主之所以不嚴而成化也七前漢貨殖傳古之四民不得雜處在民上者道之以德齊之以禮故民有恥而且恭貴誼而賤利此三代之所以直道而行不嚴而治之大略也餘見君無為而治荀悅傳箋證三國志吳志陸績傳孫策在吳張昭張紘秦松為上賓共論四海未泰須當用武治而平之績年少末坐遙大聲言曰昔管夷吾相齊桓公九合諸侯一匡天下不用兵車孔子曰遠人不服則修文德以來之今論者不務道德懷取之術而惟尚武績雖童蒙竊所未安也三國志魏志傅嘏字蘭石北地泥陽人傅介子之後也伯父巽黃初中為侍中尚書嘏官起家拜滎陽太守不行太傅司馬宣王請為從事中郎曹爽誅為河南尹裴松之注曰傅子曰河南尹內掌帝都外統京畿兼古六鄉六遂之士其民異方雜居多豪門大族商賈胡貊天下四方會利之所聚而姦之所生前尹司馬芝舉其綱而太簡次尹劉靜綜其目而太密後尹李勝毀常法以收一時之聲嘏立司馬氏之綱統裁劉氏之綱目以經緯之李氏所毀以漸補之郡有七百吏半非舊也河南俗黨五官掾功曹典選職皆授其本國人無用異邦人者嘏各舉其良而對用之官曹分職而後以次考核之其治以德教為本然持法有恒簡而不可犯見理識情獄訟不加榎楚而得其實不為小惠有所薦達及大有益於民事皆隱其端又唐歐陽詢藝文類聚傅子曰傅嘏為河南尹治以德教為本然持法有恒簡而不可犯見理識情獄訟不任檟楚而得其實又宋章定名賢氏族言行類稿魏志傅瑕字蘭石弱冠知名遷黃門侍郎為河南尹其治以德教為本持法有常簡而不可犯獄訟不加夏楚而得其實吏民安之漢書漢昭帝紀贊曰昔周成以孺子繼統而有管蔡四國流言之變孝昭幼年即位亦有燕蓋上官逆亂之謀成王不疑周公孝昭委任霍光各因其時以成名大矣哉承孝武奢侈餘敝師旅之後海內虛耗戶口減半光知時務之要輕繇薄賦與民休息至始元元鳳之間匈奴和親百姓充實舉賢良文學問民所疾苦議鹽鐵而罷榷酤尊號曰昭不亦宜乎漢書鼂錯傳臣錯昧死再拜言臣竊聞古之賢主莫不求賢以為輔翼人情莫不欲安三王扶而不危也人情莫不欲逸三王節其力而不盡也其為法令也合於人情而後行之其動眾使民也本於人事然後為之取人以已內恕及人情之所惡不以彊人情之所欲不以禁民是以天下樂其政歸其德望之若父母從之若流水百姓和親國家安寧名位不失左傳成公十二年於是乎有享宴之禮享以訓共儉宴以示慈惠共儉以行禮而慈惠以布政政以禮成民是以息百官承事朝而不夕舊唐書馬燧傳德宗賜燧宸扆台衡二銘序曰朕每覽上古之書及唐虞之際君臣相得聖賢同時日夕孜孜講論至道或陳其鑒誡或諷以詠歌煥乎典謨百代是式有以見啟沃之道理化之端又太平御覽御製下德宗以馬燧平河中詔賜所撰宸扆台衡二銘并序曰朕每讀上古之事及唐虞之際君臣相得聖賢同時日夕孜孜講論古道或陳其鑒戒或諷以詠歌煥乎典謨百代是式有以見啟沃之道理化之蹟漢書匡衡傳上問以政治得失衡上疏曰臣聞五帝不同禮三王各異教民俗殊務所遇之時異也朝廷者天下之楨幹也公卿大夫相與循禮恭讓則民不爭好仁樂施則下不暴上義高節則民興行寬柔和惠則眾相愛四者明王之所以不嚴而成化也前漢書貨殖傳管子云古之四民不得雜處於是在民上者道之以德齊之以禮故民有恥而且敬貴誼而賤利此三代之所以直道而行不嚴而治之大略也臣不嚴而治第四前漢萬石君等贊曰仲尼有言君子欲訥於言而敏於行其萬石君建陵侯塞侯張叔之謂與是以其教不肅而成不嚴而治建陵侯衛綰塞侯直不疑前漢循吏傳序如河南守吳公蜀守文翁皆謹身帥先居以廉平不至於嚴而民從化魏司馬伯達傳為堂陽長其治務寬惠不行鞭杖而民不犯禁晉王戎子衍補元成令終日清談而縣自理新唐李勉傳滑毫節度使令狐彰且死表勉為代從之勉居鎮且八年以舊德方重不威而治東諸帥暴桀者皆尊憚之新唐王珪傳珪性不苛察臨官務舉綱維去甚不可者亦大治新唐徐有功傳有功補蒲州司法為政仁不忍杖罰民服其恩更相約曰犯徐參軍杖者必斥之新唐李元紘傳王遷萬年縣令賦役平允不嚴而理新唐盧鈞傳擢嶺南節度使海道商舶始至異時帥府爭先往賤售其珍鈞一不取南方服其德不懲而化新唐孔緯傳為御史中丞緯器志方雅嫉惡如讎既總憲綱中外不繩而自肅新唐孔緯傳為御史中丞緯器志方雅嫉惡如讎既總憲綱中外不繩而自肅箋證漢書萬石衛直周張傳贊曰仲尼有言君子欲訥於言而敏於行師古曰論語載孔子之言也訥遲也敏疾也其萬石君建陵侯塞侯張叔之謂與師古曰與讀曰歟是以其教不肅而成不嚴而治至石建之澣衣周仁為垢汙君子譏之又史記萬石張叔列傳太史公曰仲尼有言君子欲訥於言而敏於行其萬石建陵張叔之謂邪是以其教不肅而成不嚴而治塞侯微巧而周文處讇君子譏之為其近於佞也然斯可謂篤行君子矣漢書循吏傳漢興之初反秦之敝與民休息凡事簡易禁罔疏闊而相國蕭曹以寬厚清靜為天下帥民作畫一之歌孝惠垂拱高后女主不出房闥而天下晏然民務稼穡衣食滋殖至于文景遂移風易俗是時循吏如河南守吳公蜀守文翁之屬皆謹身帥先居以廉平不至於嚴而民從化三國志魏志司馬朗傳復為堂陽長其治務寬惠不行鞭杖而民不犯禁晉書王戎傳附從弟衍衍字夷甫神情明秀風姿詳雅總角嘗造山濤濤嗟歎良久既去目而送之曰何物老嫗生寧馨兒然誤天下蒼生者未必非此人也後為太子舍人遷尚書郎出補元城令終日清談而縣務亦理新唐書宗室宰相列傳李勉傳李勉字元卿鄭惠王元懿曾孫父擇言累為州刺史封安德郡公以吏治稱勉少喜學內沈雅外清整滑亳節度使令狐彰且死表勉為代從之勉居鎮且八年以舊德方重不威而治東諸帥暴桀者皆尊憚之新唐書王珪傳王珪字叔玠祖僧辯梁太尉尚書令父顗北齊樂陵郡太守世居郿隋開皇十三年召入秘書內省讎定群書為太常治禮郎珪少孤且貧乏或饋遺初無讓及貴厚報之雖已亡必酬贍其家性不苛察臨官務舉綱維去甚不可者新唐書徐有功傳徐有功名弘敏避孝敬皇帝諱以字行國子博士文遠孫也舉明經累補蒲州司法參軍襲封東莞縣男為政仁不忍杖罰民服其恩更相約曰犯徐參軍杖者必斥之舊唐書李元紘傳李元紘其先滑州人世居京兆之萬年本姓丙氏曾祖粲隋大業中屯衛大將軍屬關中賊起煬帝令粲往京城以西二十四郡逐捕盜賊粲撫循士眾甚得其心及義旗入關粲率其眾歸附拜宗正卿封應國公賜姓李氏元紘少謹厚初為涇州司兵累遷雍州司戶俄轉好畤令遷順州司馬所歷咸有聲績開元初三遷萬年縣令賦役平允不嚴而理又王仁裕編開元天寶遺事禽擁行車李元紘開元初年為邑令賦役平允不嚴而治大有政聲遷潤州司馬出郊百里士民號泣遮路禽獸之類飛擁行車有詔褒美之新唐書盧鈞傳盧鈞字子和系出范陽徙京兆藍田舉進士中第以拔萃補秘書正字從李絳為山南府推官調長安尉又從裴度為太原觀察支使遷監察御史擢嶺南節度使海道商舶始至異時帥府爭先往賤售其珍鈞一不取南方服其德不懲而化又宋費樞廉吏傳盧鈞盧鈞字子和系出范陽舉進士累官監察御史爭宋申錫獄知名後擢嶺南節度使海道商舶始至異時帥府爭先賤售其珍鈞一不取時稱廉潔歷位將相所居官必有績大抵根仁恕至誠而施於事玩服不為鮮明其沒也家無贏財以太保致仕卒年八十七贈太傅諡曰元論曰宋申錫承帝旨鉏宦官不幸謀泄反陷於獄鈞乃能雪其冤然則鈞之大節乃東漢李固楊震李膺陳蕃之流歟有力於清議多矣舊唐書孔緯傳孔緯字化文魯曲阜人宣尼之裔父遵孺終華陰縣丞緯少孤依諸父溫裕溫業皆居方鎮與名公交故緯聲籍早達大中十三年進士擢第釋褐秘書省校書郎乾符中罷學士出為御史中丞緯器志方雅嫉惡如讎既總憲綱中外不繩而自肅天下治平第五史記東方朔傳聚會博士論議方朔曰聖帝在上德流天下諸侯賓服威振四夷連四海之外以為帶安於覆盂天下平均合為一家如帶之相連盂不可傾搖史記相如遺札書言封禪事曰大漢之德明而九垓下泝八埏懷生之類霑濡浸潤協氣橫流武節飄逝前漢文帝紀贊曰海內豐富興於禮義斷獄數百幾致刑措前漢晁錯對策曰五帝神聖故眾生之類亡不覆也根著之徒亡不載也燭以光明亡偏異也德上及飛鳥下至水蟲草木諸產皆被其澤也然後陰陽調四時節日月光風雨時甘露降五榖孰祅孽滅賊氣息民不疾疫河出圖洛出書神龍至鳳鳥翔德澤滿天下靈光施四海前漢董仲舒傳制曰何脩何飾而膏露降百榖登德潤四海澤臻草木三光全寒暑平受天之祐享鬼神之靈德澤洋溢施乎方外延及群生前漢公孫弘對策曰臣聞之氣同則從聲比則應今人主和德於上百姓和泠於下故心和則氣和氣和則形和形和則聲和聲和則天地之和應矣故陰陽和風雨時甘露降五榖登六畜蕃嘉禾興朱草生山不童澤不涸此和之至也故形和則無疾無疾則不夭故父不喪子兄不哭弟德配天地明並日月則麟鳳至龜龍在郊河出圖洛出書遠方之君莫不悅義奉幣而來朝此和之極也前漢嚴助傳陛下以四海為境九州為家八藪為囿江漢為池生民之屬皆為臣妾陛下垂德惠以覆露之使元元之民安生樂業則澤被萬世傳之子孫施之無窮天下之安猶泰山而四維之前漢班固作賓戲曰大漢君天下也炎之如日威之如神函之如海養之如春是以六合之內莫不同原共流沐浴元德魏司馬伯達傳鍾繇王粲著論云非聖人不能致太平伯達以為伊顏之徒雖非聖人使得數世相承太平可致新唐魏徵傳帝即位四年歲斷死二十九幾至措刑冰斗三錢至是蠻夷君長襲衣冠帶刀宿衛戶闔不閉行旅不齎糧取給於道新唐長孫無忌傳正觀十一年帝欲以功臣共襲剌史無忌辭曰今四海混一誠不願遠違左右新唐長孫無忌傳初無忌與遂良悉心奉國以天下安危自任故永徽之政有正觀風帝亦賓禮老臣拱己以聽紀綱張設此兩人之力也新唐辛替否傳上疏曰太宗陛下之祖賞必待功官必得才為無不成征無不服萬里歸服百蠻歸款願陛下監之新唐牛僧孺傳文宗召見宰相曰公等有意於太平乎何道以致之僧孺曰臣待罪宰相不能康濟然太平亦無象今四夷不內擾百姓安生業私室無彊家上不壅蔽下不怨讟雖未及至盛亦足為治矣更永太平非臣所及箋證史記滑稽列傳時會聚宮下博士諸先生與論議共難之東方生曰是固非子之所能備也彼一時也此一時也豈可同哉聖帝在上德流天下諸侯賓服威振四夷連四海之外以為帶安於覆盂天下平均合為一家史記司馬相如列傳大漢之德㷭涌原泉集解韋昭曰漢德㷭涌如泉原也索隱張揖曰逢遇也喻其德盛若遇泉原之流也又作峰胡廣曰自此已下論漢家之德也沕潏漫衍旁魄四塞雲專霧散上暢九垓下泝八埏懷生之類霑濡浸潤協氣橫流武節飄逝漢書文帝紀贊曰孝文皇帝即位二十三年宮室苑囿車騎服御無所增益有不便宋祁曰便字下疑有者字輒弛以利民是以海內殷富興於禮義斷獄數百幾致刑措應劭曰措置也民不犯法無所刑也師古曰斷獄數百者言普天之下死罪人不過數百幾近也烏呼仁哉漢書晁錯傳愚臣竊以古之五帝明之臣聞五帝神聖其臣莫能及故自親事處於法宮之中明堂之上動靜上配天下順地中得人故眾生之類亡不覆也根著之徒亡不載也燭以光明無偏異也德上及飛鳥下至水蟲草木諸產皆被其澤也然後陰陽調四時節日月光風雨時膏露降五穀熟祅孽滅賊氣息民不疾疫河出圖洛出書神龍至鳳鳥翔德澤滿天下靈光施四海漢書董仲舒傳董仲舒廣川人也少治春秋孝景時為博士下帷講誦弟子傳以久次相授業或莫見其面盖三年不窺園其精如此進退容止非禮不行學士皆師尊之武帝即位舉賢良文學之士前後百數良對策焉制曰朕獲承至尊休德傳之亡窮而施之罔極何脩何飾而膏露降百榖登德潤四海澤臻草木三光全寒暑平受天之祜享鬼神之靈德澤洋溢施乎方外延及群生漢書公孫弘傳公孫弘菑川薛人也少時為獄吏有罪免家貧牧豕海上年四十餘乃學春秋雜說武帝初即位招賢良文學士是時弘年六十以賢良徵為博士對曰臣聞上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也臣聞之氣同則從聲比則應今人主和德於上百姓和合於下故心和則氣和氣和則形和形和則聲和聲和則天地之和應矣故陰陽和風雨時甘露降五穀登六畜蕃嘉禾興朱草生山不童澤不涸此和之至也故形和則無疾無疾則不夭故父不喪子兄不哭弟德配天地明並日月則麟鳳至龜龍在郊河出圖洛出書遠方之君莫不說義奉幣而來朝此和之極也漢書嚴助傳淮南王安上書諫曰雖得越王之首臣猶竊為大漢羞之陛下以四海為境九州為家八藪為囿江漢為池生民之屬皆為臣妾人徒之眾足以奉千官之共租稅之收足以給乘輿之御玩心神明秉執聖道負黼依馮玉几南面而聽斷號令天下四海之內莫不嚮應陛下垂德惠以覆露之使元元之民安生樂業則澤被萬世傳之子孫施之無窮天下之安猶泰山而四維之也漢書敘傳賓戲主人曰蓋聞聖人有壹定之論列士有不易之分亦云名而已矣方今大漢洒埽群穢夷險芟荒廓帝紘恢皇綱基隆於羲農規廣於黃唐其君天下也炎之如日威之如神函之如海養之如春是以六合之內莫不同原共流沐浴玄德三國志魏志司馬朗傳司馬朗遷袞州刺史政化大行百姓稱之雖在軍旅常麤衣惡食儉以率下雅好人倫典籍鄉人李覿等盛得名譽朗常顯貶下之後覿等敗時人服焉鍾繇王粲著論云非聖人不能致太平朗以為伊顏之徒雖非聖人使得數世相承太平可致新唐書魏徵傳帝即位四年歲斷死二十九幾至刑措米斗三錢先是帝嘗嘆曰今大亂之後其難治乎徵曰大亂之易治譬饑人之易食也帝曰古不云善人為邦百年然後勝殘去殺邪答曰此不為聖哲論也徵曰五帝三王不易民以教行帝道而帝行王道而王顧所行何如爾高帝逐蚩尤七十戰而勝其亂因致無為九黎害德顓頊征之已克而治桀為亂湯放之紂無道武王伐之湯武身及太平若人漸澆詭不復返朴今當為鬼為魅尚安得而化哉德彝不能對然心以為不可帝納之不疑至是天下大治蠻夷君長襲衣冠帶刀宿衛東薄海南踰嶺戶闔不閉行旅不齎糧取給於道新唐書長孫無忌傳帝欲功臣並世襲刺史貞觀十一年乃詔有司朕憑明靈之祐賢佐之力克翦多難清宇內無忌等辭曰群臣披荊棘事陛下今四海混一誠不願違遠左右而使世牧外州與遷徙等新唐書長孫無忌傳初無忌與遂良悉心奉國以天下安危自任故永徽之政有貞觀風帝亦賓禮老臣拱已以聽綱紀設張此兩人維持之也新唐書辛替否傳替否以左補闕上疏曰臣謂古之用度不時爵賞不當國破家亡者口說不若身逢耳聞不若目見臣請以有唐治道得失陛下所及見者言之太祖陛下之祖撥亂立極得至治之體省官清吏舉天下職司無虛授用天下財帛無枉費賞必待功官必得才為無不成征無不服不多寺觀而福祿至不度僧尼而咎殃滅陰陽不愆五榖遂成粟腐帛爛萬里貢賦百蠻歸款享國久長新唐書牛僧孺傳牛僧孺字思黯隋僕射奇章公弘之裔召見宰相曰公等有意於太平乎何道以致之僧孺曰臣待罪宰相不能康濟然太平亦無象今四夷不內擾百姓安生業私室無彊家上不壅蔽下不怨讟雖未及至盛亦足為治矣而更求太平非臣所及退謂它宰相曰上責成如是吾可久處此耶治道清淨第六前漢曹參傳參相齊聞膠西有蓋公善治黃老言使人厚幣請之蓋公為言治道貴清淨而民自定參於是避正堂舍蓋公焉其治要用黃老術故相齊九年齊國安集大稱賢相前漢汲黯為東海太守黯學黃老言治官民好清淨擇丞史任之責大指而已餘見臣無為而治後漢蔡荿傳郭賀拜荊州剌史有殊政顯宗巡守賜以三公之服以清淨稱晉王導從元帝過江為政務在清淨新唐漢王郡王瓌傳瓌為荊州都督政務清淨嶺外囚豪數相攻瓌遣使諭威德皆如約不敢亂新唐盧鈞傳擢嶺南節度使海道商舶始至異時帥府爭先往賤售其珍鈞一不取時稱潔廉專以清淨治唐張鎰傳除亳州剌史政條清簡講教生徒比去州升明經者四十人箋證漢書曹參傳孝惠元年除諸侯相國法更以參為齊丞相參之相齊齊七十城天下初定悼惠王富於春秋參盡召長老諸先生問所以安集百姓而齊故諸儒以百數言人人殊參未知所定聞膠西有蓋公善治黃老言使人厚幣請之既見蓋公蓋公為言治道貴清靜而民自定推此類具言之參於是避正堂舍蓋公焉其治要用黃老術故相齊九年齊國安集大稱賢相漢書汲黯傳汲黯字長孺濮陽人也其先有寵於古之衛君也至黯十世世為卿大夫以父任孝景時為太子洗馬遷為滎陽令黯恥為令稱疾歸田里上聞迺召為中大夫以數切諫不得久留內遷為東海太守黯學黃老言治官民好清靜擇丞史任之責大指而已不細苛黯多病臥閤內不出歲餘東海大治稱之上聞召為主爵都尉列於九卿治務在無為而已後漢書蔡茂傳附郭賀賀字喬卿雒陽人祖父堅伯父游君並修清節不仕王莽賀能明法累官建武中為尚書令在職六年曉習故事多所匡益拜荊州刺史引見賞賜恩寵隆異及到官有殊政百姓便之歌曰厥德仁明郭喬卿忠正朝廷上下平顯宗巡狩至南陽特見嗟歎賜以三公之服黼黻冕旒勑行部去䄡帷使百姓見其容服以章有德每所經過吏人指以相示莫不榮之永平四年徵拜河南尹以清靜稱晉書王導傳王導字茂弘導少有風鑒識量清遠導為政務在清靜每勸帝剋已勵節匡主寧邦於是尤見委杖情好日隆朝野傾心號為仲父新唐書宗室列傳漢陽郡王瓌漢陽郡王瓌始為郡公進王高祖使持幣遺突厥頡利可汗言和親事頡利始見瓌倨甚瓌開說示以厚幣乃大喜改容加禮因遣使隨入獻名馬後復聘頡利謂其下曰前瓌來悔不少屈之當使拜我瓌伺知之既見頡利即長揖頡利怒留不遣瓌意象自若不為屈虜知不可劫卒以禮遣遷左武侯將軍代孝恭為荊州都督政務清靜嶺外酋豪數相攻瓌遣使諭威德皆如約不敢亂新唐書盧鈞傳盧鈞從李絳為山南府推官調長安尉又從裴度為太原觀察支使遷監察御史擢嶺南節度使海道商舶始至異時帥府爭先往賤售其珍鈞一不取時稱絜廉專以清靜治新唐書張鎰傳張鎰字季權一字公度國子祭酒後胤五世孫也父齊丘朔方節度使東都留守鎰以蔭授左衛兵曹參軍郭子儀表為元帥府判官遷累殿中侍御史大歷初出為濠州刺史政條清簡延經術士講教生徒比去州升明經者四十人治遠自近第七史記儒林傳大常臧博士平等議孔臧也曰三代之道鄉里有教夏曰校商曰庠周曰序其勸善也顯之朝廷其懲惡也加之刑罰故教化之行也建首善自京師始繇內及外前漢稚圭傳臣聞教化之流非家至而人說之也賢者在位能者布職朝廷崇禮百寮恭讓道德之行由內及外自近者始今長安天子之都親承聖化然其習俗無以異於遠方郡國來者無所法則或見侈靡而放故之此教化之原本風俗之樞機宜先正者也前漢董仲舒傳為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正遠近莫敢不壹於正前漢王吉傳聖王宣德流化必自近始朝廷不備難以言治左右不正難以化遠民者弱而不可勝愚而不可欺也聖王獨行於深宮得則天下稱誦之失則天下咸言之行發於近必見於遠故謹選左右審擇所使左右所以正身也所使所以宣德也後漢鍾離意傳少為郡督郵時部縣亭長有受人酒禮者府下記案考之記文符也案察之意封還記入言於太守曰春秋先內後外明政化之本由近及遠今宜先清府內且闊略遠縣細後之愆太守甚賢之箋證史記儒林列傳太常議與博士弟子崇鄉里之化以廣賢材馬謹與太常臧集解駰案漢書百官表孔臧也博士平等議曰聞三代之道鄉里有教夏曰校殷曰序周曰庠其勸善也顯之朝廷其懲惡也加之刑罰故教化之行也建首善自京師始由內及外漢書匡衡傳匡衡父世農夫至衡好學家貧庸作以供資用尤精力過絕人諸儒為之語曰無說詩匡鼎來匡語詩解人頤衡射策甲科以不應令除為太常掌故調補平原文學衡上疏曰臣聞五帝不同禮三王各異教臣竊考國風之詩周南召南被賢聖之化深故篤於行而廉於色由此觀之治天下者審所上而已師古曰上謂崇尚也今之偽薄忮害不讓極矣臣聞教化之流非家至而人說之也賢者在位能者在職朝廷崇禮百僚敬讓道德之行由內及外自近者始然後民知所法遷善日進而不自知是以百姓安陰陽和神靈應而嘉祥見今長安天子之都親承聖化然其習俗無以異於遠方郡國來者無所法則或見侈靡而放效之此教化之原本風俗之樞機宜先正者也漢書董仲舒傳臣謹案故為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正遠近莫敢不壹於正而亡有邪氣奸其間者漢書王吉傳臣聞聖王宣德流化必自近始朝廷不備難以言治左右不正難以化遠民者弱而不可勝愚而不可欺也聖主獨行於深宮得則天下稱誦之失則天下咸言之行發於近必見於遠故謹選左右審擇所使左右所以正身也所使所以宣德也後漢書鍾離意傳鍾離意字子阿會稽山陰人也少為郡督郵時部縣亭長有受人酒禮者府下記案考之記文符也案察之意封還記入言於太守曰春秋先內後外詩云刑于寡妻以御于家邦明政化之本由近及遠今宜先清府內且闊略遠縣細微之愆太守甚賢之遂任以縣事以文為治第八前漢董始舒傳臣謹案春秋謂一元之意一方之萬物之所從始也元者辭之所謂大也謂一方元者視大始布而其本也春秋深探樑其本而萬物曰負者姶前漢禮樂志禮節民心樂和民聲政以行之刑以防之禮樂刑前漢平津侯乞骸骨上報曰古者守成上文遭遇右武後漢梁懂傳論曰時政平則文德用而武略之士無所奮其力能故漢世有發憤張瞻爭膏身於夷秋以安功名多矣魏袁渙傳魏國初建渙言於太祖曰可大收篇籍明先聖之教以易民視聽使海內斐然向風則遠人不服可以文德來之晉戴邈傳夫平世尚文遭亂尚武文武迭用長久之道譬之天地昏明之迭自古以來未有不由之者也新唐禮樂志秦主破陣樂太宗為秦王破劉武周軍中相與作秦王破陣樂曲及即位宴會必奏之謂侍臣曰雖發揚蹈厲異乎文容然功業由之被於樂章示不忘本也封德彝曰陛下以聖武戡難陳樂象德文容豈足道也帝矍然曰朕雖以武功興終以文德綏海內謂文容不如蹈厲斯過矣新唐令狐德棻傳高祖承大亂後經籍之散祕書湮缺德棻始新唐魏徵傳帝本以兵定天下雖已治不忘經略四夷也徵侍晏奏破陣舞則俛首不顧至慶善樂則諦玩無斁箋證漢書董仲舒傳臣謹案春秋謂一元之意一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也春秋深探其本而反自貴者始禮記樂記禮節民心樂和民聲政以行之刑以防之禮樂刑政四達而不悖則王道傋矣漢書公孫弘傳加有負薪之疾恐先狗馬填溝壑終無以報德塞責願歸侯乞骸骨避賢者路上報曰古者賞有功褒有德守成上文遭禍右武師古曰右亦上也禍亂時則上武耳又史記平津侯列傳弘行能不足以稱素有負薪之疾恐先狗馬填溝壑終無以報德塞責願歸侯印乞骸骨避賢者路天子報曰古者賞有功褒有德守成尚文遭遇右武後漢書梁慬傳論曰時政平則文德用而武略之士無所奮其力能故漢世有發憤張膽爭膏身於夷狄以要功名多矣祭肜耿秉啟匈奴之權班超梁慬奮西域之略卒能成功立名享受爵位薦功祖廟勒勳于後亦一時之志士也三國志魏志袁渙傳魏國初建為郎中令行御史大夫事渙言於太祖曰今天下大難已除文武並用長久之道也以為可大收篇籍明先聖之教以易民視聽使海內斐然向風則遠人不服可以文德來之太祖善其言晉書戴若思附戴邈邈字望之少好學尤精漢史才不逮若思儒博過之弱冠舉秀才尋遷太子洗馬出補西陽內史永嘉中凡百草創學校未立邈上疏曰夫平世尚文遭亂尚武文武遞用長久之道譬之天地昏明之迭自古以來未有不由之者也新唐書禮樂志唐之自製樂凡三大舞一曰七德舞二曰九功舞三曰上元舞七德舞者本名秦王破陣樂太宗為秦王破劉武周軍中相與作秦王破陣樂曲及即位宴會必奏之謂侍臣曰雖發揚蹈厲異乎文容然功業由之被於樂章示不忘本也右僕射封德彝曰陛下以聖武戡難陳樂象德文容豈足道哉帝矍然曰朕雖以武功興終以文德綏海內謂文容不如蹈厲斯過矣新唐書令狐德棻令狐德棻宜州華原人武德初為起居舍人遷祕書丞方是時大亂後經籍亡散祕書湮缺德棻始請帝重購求天下遺書置吏補錄不數年圖典略備新唐書魏徵傳始喪亂後典章湮散徵奏引諸儒校集祕書國家圖籍粲然完整嘗以小戴禮綜彙不倫更作類禮二十篇數年而成帝美其書錄寘內府帝本以兵定天下雖已治不忘經略四夷也故徵侍宴奏破陣武德舞則俛首不顧至慶善樂則諦玩無斁卷九十七王道第九前漢董仲舒傳陰陽調而風雨時群生和而萬民殖五榖熟而草木茂天地之間被潤澤而大豐美四海之內聞盛德而皆倈臣諸福之物可致之祥莫不畢至而王道終矣前漢稚圭上疏曰傳曰審好惡理情性而王道畢矣前漢禮樂志曰聖人取類以正名而謂君為父母明仁愛德讓王道之本也前漢李尋傳臣聞五行以水為本水為準平王道公正脩明則百川理落脈通偏黨失綱則踊溢為敗前漢楊雄傳雄作法言序譔曰降周迄孔成於王道前漢禮樂志世方爭於功利而馳說者以孫吳為宗時惟孫卿明於王道史記貨殖傳曰周室既衰諸侯恣行仲尼悼禮廢樂崩追脩經術以達王道撥亂世反之於正前漢敘傳吾聞一陰一陽天墬之方迺文迺質王道之綱有同有異聖喆之常新唐魏徵傳帝以謂漢雜伯道皆欲治不能非能治不欲徵曰五帝三王不易民而教行帝道而帝王道而王顧所行如何耳新唐陳子昂傳垂拱中天后問調元氣當以何道子昂曰元氣天地之始萬物之祖王政之大端也王政莫先於安人安人則陰陽和箋証漢書董仲舒傳故為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正遠近莫敢不壹於正而亡有邪氣奸其間者是以陰陽調而風雨時群生和而萬民殖五榖孰而草木茂天地之間被潤澤而大豐美四海之內聞盛德而皆倈臣諸福之物可致之祥莫不畢至而王道終矣漢書匡衡傳大雅曰無念爾祖聿修厥德師古曰大雅文王之詩也無念念也聿述也孔子著之孝經首章蓋至德之本也傳曰審好惡理情性而王道畢矣漢書刑法志第三洪範曰天子作民父母為天下王聖人取類以正名而謂君為父母明仁愛德讓王道之本也愛待敬而不敗德須威而久立故制禮以崇敬作刑以明威也漢書李尋傳李尋字子長平陵人也治尚書與張孺鄭寬中同師寬中等守師法教授尋獨好洪範災異又學天文月令陰陽哀帝初即位召尋待詔黃門使侍中衛尉傅喜問尋曰間者水出地動日月失度星辰亂行災異仍重極言母有所諱尋對曰陛下聖德尊天敬地畏命重民故古之王者尊天地重陰陽敬四時嚴月令順之以善政則和氣可立致猶枹鼓之相應也今朝廷忽於時月之令諸侍中尚書近臣宜皆令通知月令之意設群下請事若陛下出令有謬於時者當知爭之以順時氣臣聞五行以水為本其星玄武婺女天地所紀終始所生水為準平王道公正脩明則百川理落脈通偏黨失綱則涌溢為敗漢書楊雄傳述法言曰降周迄孔成于王道師古曰周周公旦也迄至也孔孔子也言自周公以降至於孔子設教垂法皆帝王之道譔吾子第二漢書刑法志春秋之後滅弱吞小並為戰國稍增講武之禮以為戲樂用相夸視而秦更名角抵先王之禮沒於淫樂中矣雄桀之士因埶輔時作為權詐以相傾覆吳有孫武齊有孫臏魏有吳起秦有商鞅皆禽敵立勝垂著篇籍當此之時合從連衡轉相攻伐代為雌雄齊愍以技擊彊魏惠以武卒奮秦昭以銳士勝世方爭於功利而馳說者以孫吳為宗時唯孫卿明於王道史記太史公自序周室既衰諸侯恣行仲尼悼禮廢樂崩追修經術以達王道匡亂世反之於正見其文辭為天下制儀法垂六蓺之統紀於後世作孔子世家第十七漢書敘傳顏耽樂於簞瓢孔終篇於西狩聲盈塞於天淵真吾徒之師表也且吾聞之壹陰壹陽天墬之方師古曰墜古地字迺文迺質王道之綱有同有異聖喆之常新唐書魏徵傳封德彝曰三代之後澆詭日滋秦任法律漢雜霸道皆欲治不能非能治不欲徵曰五帝三王不易民以教行帝道而帝行王道而王顧所行何如爾新唐書陳子昂傳陳子昂字伯玉梓州射洪人子昂十八未知書以富家子尚氣決弋博自如他日入鄉校感悔即痛修飭文明初舉進士武后奇其才召見金華殿子昂貌柔野少威儀而占對慷慨擢麟臺正字垂拱初詔問群臣調元氣當以何道子昂因是勸后興明堂太學即上言臣聞之於師曰元氣天地之始萬物之祖王政之大端也天地莫大於陰陽萬物莫靈於人王政莫先於安人故人安則陰陽和陰陽和則天地平天地平則元氣正先王以人之通於天也於是養成群生順天德使人樂遂業甘其食美其服然後天瑞降地符升風雨時草木茂王霸第十史記主父偃曰伯者常佑天子興利除害誅暴禁邪匡正海內以尊天子史記商君傳甘龍曰三王不同禮而王五霸不同法而霸史記范雎曰天以秦卒之勇車騎之眾以治諸侯譬若馳韓盧而搏蹇兔霸王之業可致也前漢高祖詔曰蓋聞王者莫高於周文伯者莫高於齊桓皆待賢人而成名前漢董仲舒對策曰仲尼之門五尺之童羞稱五伯為其先詐力而後仁誼故不足稱於大君子之門也五伯比於他諸侯為賢其比三王猶武夫之與美玉也前漢王莽傳下書曰夫三皇象春五帝象夏三王象秋五霸象冬皇王德運也伯者繼空續之以成歷數故其道駮前漢晁錯對策曰五帝其臣莫能及則自親之三王臣主俱賢則共憂之五伯不及其臣則任使之此所以神明不遺而賢聖不廢也故各當其世而立功德焉後漢陳元傳上疏曰臣聞師臣者帝賓臣者霸故武王以太公為師齊桓以夷吾為仲父魏張範傳弟承見袁術術問曰今孤以土地之廣士民之眾欲徼福齊桓擬跡高祖何如承對曰在德不在彊夫能用德以同天下之欲雖由匹夫之資而興霸王之功不足為難苟僭擬于時而動眾之所棄誰能與之蜀習鑿齒曰夫霸王者必體仁義以為本杖信順以為宗一物不具則其道乖矣新唐褚遂良傳時有飛雉集宮中太宗問何祥也對曰昔秦文公時有童子化為雉雌鳴於陳倉雄者鳴於南陽童子曰得雄者王得雌者霸文公遂以為寶雞後漢光武得其雄起南陽而有天下陛下舊封秦故雄雉並見以告明德也太宗悅新唐令狐德棻傳時高宗初嗣位留心政道常召宰臣及弘文館學士座中華殿問何脩而王若而霸又當孰先德棻曰王任德霸任刑夏商周純用德而王秦專刑而伯至漢雜用之魏晉以降王伯兩失若用之王為先而莫難焉箋證史記主父偃列傳嚴安上書曰臣聞周有天下其治三百餘歲成康其隆也刑錯四十餘年而不用及其衰也亦三百餘歲故五伯更起五伯者常佐天子興利除害誅暴禁邪匡正海內以尊天子五伯既沒賢聖莫續天子孤弱號令不行諸侯恣行史記商君列傳商君者衛之諸庶孽公子也名鞅姓公孫氏其祖本姬姓也甘龍曰聖人不易民而教知者不變法而治因民而教不勞而成功緣法而治者吏習而民安之衛鞅曰龍之所言世俗之言也常人安於故俗學者溺於所聞以此兩者居官守法可也非所與論於法之外也三代不同禮而王五伯不同法而霸智者作法愚者制焉賢者更禮不肖者拘焉史記范雎列傳范雎曰大王之國四塞以為固北有甘泉谷口南帶涇渭右隴蜀左關阪奮擊百萬戰車千乘利則出攻不利則入守此王者之地也民怯於私鬭而勇於公戰此王者之民也王并此二者而有之夫以秦卒之勇車騎之眾以治諸侯譬若馳韓盧而搏蹇兔也索隱戰國策云韓盧者天下之壯犬也是韓盧為犬謂馳韓盧而搏蹇兔以喻秦強言取諸侯之易也霸王之業可致也漢書高帝紀春正月淮陰侯韓信謀反長安夷三族將軍柴武斬韓王信於參合上還雒陽詔曰蓋聞王者莫高於周文伯者莫高於齊桓皆待賢人而成名今天下賢者智能豈特古之人乎漢書董仲舒傳王問仲舒仲舒對曰臣愚不足以奉大對聞昔者魯君問柳下惠吾欲伐齊何如柳下惠曰不可歸而有憂色曰吾聞伐國不問仁人此言何為至於我哉徒見問爾且猶羞之况設詐以伐吳虖繇此言之粵本無一仁夫仁人者正其誼不謀其利明其道不計其功是以仲尼之門五尺之童羞稱五伯為其先詐力而後仁誼也苟為詐而已故不足稱於大君子之門也五伯比於他諸侯為賢其比三王猶武夫之與美玉也漢書王莽傳王莽字巨君孝元皇后之弟子也霸橋災數千人以水沃救不滅莽惡之下書曰夫三皇象春五帝象夏三王象秋五伯象冬皇王德運也伯者繼空續乏以成歷數故其道駁漢書鼂錯傳臣聞五帝其臣莫能及則自親之三王臣主俱賢則共憂之五伯不及其臣則任使之此所以神明不遺而賢聖不廢也故各當其世而立功德焉後漢書陳元傳陳元字長孫蒼梧廣信人也父欽習左氏春秋事黎陽賈護與劉歆同時而別自名家元少傳父業為之訓詁銳精覃思至不與鄉里通以父任為郎建武初元與桓譚杜林鄭興俱為學者所宗元以才高著名辟司空李通府時大司農江馮上言宜令司隸校尉督察三公事下三府元上疏曰臣聞師臣者帝賓臣者霸故武王以太公為師齊桓以夷吾為仲父魏志張範傳附弟承弟承字公先亦知名以方正徵拜議郎遷伊闕都尉董卓作亂承欲合徒眾與天下共誅卓弟昭時為議郎適從長安來謂承曰今欲誅卓眾寡不敵且起一朝之謀戰阡陌之民士不素撫兵不練習難以成功卓阻兵而無義固不能久不若擇所歸附待時而動然後可以如志承然之乃解印綬間行歸家與範避地揚州袁術備禮招請範稱疾不往術不彊屈也遣承與相見術問曰昔周室陵遲則有桓文之霸秦失其政漢接而用之今孤以土地之廣士民之眾欲徼福齊桓擬迹高祖何如承對曰在德不在彊夫能用德以同天下之欲雖由匹夫之資而興霸王之功不足為難若苟僭擬于時而動眾之所棄誰能與之術不悅三國志蜀志龐統傳即斬懷沛還向成都所過輒克於涪大會置酒作樂謂統曰今日之會可謂樂矣統曰伐人之國而以為歡非仁者之兵也先主醉怒曰武王伐紂前歌後舞非仁者邪卿言不當宜速起出於是統逡巡引退先主尋悔請還統復故位先主謂曰向者之論阿誰為失統對曰君臣俱失先主大笑宴樂如初裴松之注引曰習鑿齒曰夫霸王者必體仁義以為本杖信順以為宗一物不具則其道乖矣新唐書褚遂良傳謂大臣曰泰昨自投我懷中云臣今日始得為陛下子更生之日也臣惟有一子百年後當殺之傳國晉王朕甚憐之遂良曰陛下失言安有為天下主而殺其愛子授國晉王乎陛下昔以承乾為嗣復寵愛泰嫡庶不明紛紛至今若必立泰非別置晉王不可帝泣曰我不能即詔長孫無忌房玄齡李勣與遂良等定策立晉王為皇太子時飛雉數集宮中帝問是何祥也遂良曰昔秦文公時有侲子化為雉雌鳴陳倉雄鳴南陽侲子曰得雄者王得雌者霸文公遂雄諸侯始為寶雞祠漢光武得其雄起南陽有四海陛下本封秦故雄雌並見以告明德帝悅曰人之立身不可以無學遂良所謂多識君子哉又舊唐書褚遂良傳遂良進曰陛下今日既立魏王伏願陛下別安置晉王始得安全耳太宗涕泗交下曰我不能即日召長孫無忌房玄齡李勣與遂良等定策立晉王為皇太子時頻有飛雉集於宮殿之內太宗問群臣曰是何祥也對曰昔秦文公時有童子化為雉雌者鳴於陳倉雄者鳴於南陽童子曰得雄者王得雌者霸文公遂以為寶雞後漢光武得雄遂起南陽而有四海陛下舊封秦王故雄雉見於秦地此所以彰表明德也太宗悅曰立身之道不可無學遂良博識深可重也新唐書令狐德棻傳高宗嘗召宰相及弘文學士坐中華殿問何修而王若而霸又當孰先德棻曰王任德霸任刑夏殷周純用德而王秦專刑而霸至漢雜用之魏晉以降王霸兩失若用之王為先而莫難焉
