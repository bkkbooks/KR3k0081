body:
  text: 卷第四十三將第一史記司馬穰苴傳齊景公時晉伐阿甄而燕侵河上景公患之晏嬰乃薦田穰苴曰其人文能附眾武能威敵景公召與語兵事大說之以為將軍扞燕晉之師史記孫子傳孫子以兵法見於吳王闔廬吳王曰子之十三篇吾盡觀之矣可以試婦人乎曰可於是出宮中美人分為二隊以王之寵姬為隊長因笑遂斬二隊長以徇用其次為隊長於是復鼓之婦人左右前後跪起皆中規矩準繩無敢出聲孫子使使報王曰兵既整齊王可試下觀之雖赴水火猶可也於是闔廬知孫子能用兵卒以為將西破彊楚入郢北威齊晉顯名諸侯前漢高祖紀韓信為治粟都尉亦亡去蕭何追還之因薦於漢王曰必欲爭天下非信無可與計事者於是漢王齊戒設壇場拜信為大將軍問以計策前漢高祖紀二年漢王問魏大將誰也對曰柏直王曰是口尚乳臭不能當韓信騎將誰也曰馮恭曰是秦將馮無擇子也雖賢不能當灌嬰步卒將誰也曰項它曰是不能當曹參吾無患矣九月信等定魏地前漢韓信傳上嘗與信言諸將能各有差上問曰如我能將幾何信曰不過能將十万上曰如公幾何曰如臣多多益辨耳上笑曰何為為我禽信曰陛下不能將兵而善將將北乃信之為陛下禽也前漢周勃傳文帝擇勃子賢者皆推亞夫迺封為條侯後匈奴大入邊以劉禮為將軍軍霸上徐厲為將軍軍棘門以亞夫為將軍軍細柳以備胡上自勞軍至霸上及棘門軍直馳入將以下騎出入送迎已而之細柳軍軍士吏被甲銳兵刃彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔有頃上至又不得入於是上使使持節詔將軍曰吾欲勞軍亞夫迺傳言開壁門壁門土請車騎曰將軍約軍中不得驅馳於是天子迺按轡徐行至中營將軍亞夫揖曰介胄之士不拜請以軍禮見天子為動改容式車使人稱謝皇帝謹勞將軍成禮而去既出軍門群臣皆驚文帝曰嗟乎此真將軍矣鄉者霸上棘門如兒戲耳其將固可襲而虜也至於亞夫可得而犯邪稱善者久之前漢李廣傳武帝即位左右言廣名將也由是入為未央衛尉而程不識時亦為長樂衛尉程不識故與廣俱以邊太守將屯及出擊胡而廣行無部曲行陳就善水草頓舍人人自便不擊刁斗自衛孟康曰刁斗以銅作鐎受一斗晝炊飯食夜擊持行蘇林曰形如鋗無緣師古曰鐎音譙溫器也鋗音火玄反鋗即銚也莫府省文書莫府者以軍幕為義軍旅無常居止故以帳幕言之省少也然亦遠斥候未嘗遇害程不識正部曲行伍營陳擊刁斗吏治軍簿至明軍不得自便不識曰李將軍極簡易然虜卒犯之無以禁而其士亦佚樂為之死我軍雖煩擾虜亦不得犯我是時漢邊郡李廣程不識為名將然匈奴畏廣士卒多樂從而苦程不識前漢李廣傳上報曰將軍者國之爪牙也司馬法曰登車不式遭喪不服振旅撫師以征不服率三軍之心同戰士之力故怒形則千里竦威振則万物伏是以名聲暴於夷貉威稜憺乎鄰國前漢趙充國辛慶忌傳贊曰秦漢已來山東出相山西出將秦將軍白起郿人王翦頻陽人漢興郁郅王圍甘延壽義渠公孫賀傳介子成紀李廣李蔡杜陵蘇建蘇武上邽上官桀趙充國襄武廉褒狄道辛武賢慶忌皆以勇武顯聞蘇辛父子著節此其可稱列者也其餘不可勝數何則山西天水隴西安定北地處埶迫近羌胡民俗脩習戰備高上勇力鞍馬騎射故秦詩曰王于興師修我甲兵與子皆行其風聲氣俗自古而然今之歌謠慷慨風流猶存耳前漢陳湯傳谷永上疏訟湯曰臣聞楚有子玉得臣文公為之仄席而坐子玉楚大夫也得臣其名也春秋僖二十八年子玉帥師與晉文公戰于成濮楚師敗績晉師三日館榖而文公有憂色曰得臣猶在憂未駇也及楚殺子玉公喜而後可知也禮記曰有憂者仄席而坐蓋自貶也趙有廉頗馬服彊秦不敢窺兵井陘廉頗趙將馬服君趙奢亦趙將也井陘趙之西界山險道也近漢有郅都魏向匈奴不敢南鄉沙幕由是言之戰克之將國之爪牙不可不重也後漢賈復傳論曰中興將帥立功名者眾矣唯岑彭馮異建方面之號自函谷以西方城以南兩將之功實為大焉若馮賈之不伐岑公之義信乃足以感三軍而懷敵人故能剋成遠業終全其慶信言朱鮪降義謂荊人奉牛酒讓不受後漢論曰中興二十八將前世以為上應二十八宿未之詳也然咸能感會風雲奮其智勇稱為佐命亦為志能之士也議者多非光武不以功臣任職至使英姿茂績委而勿用然深圖遠筭固將有以焉爾若乃王道既衰降自秦漢翼扶王運皆武人屈起亦有鬻繒屠狗輕猾之徒或崇以連城之賞或任以阿衡之地故埶疑則隙生力侔則亂起蕭樊且猶縲紲信越終見葅戮故光武鑒前事之違存橋枉之志雖寇鄧之高勳耿賈之鳴烈分士不過大縣之四所加特進朝請而已莫不終以功名延慶于後後漢竇憲傳論曰衛青霍去病資強能之眾連年以事匈奴國耗太半矣而猾虜未之勝後世猶傳其良將豈非以身名自終邪竇憲率羌胡邊雜之師一舉而空朔庭至乃追奔稽落之表飲馬北鞮之曲銘石負鼎薦告清廟列其功庸兼茂於前多矣而後世莫稱者章末釁以降其實也是以下流君子所甚惡焉蜀志諸葛亮傳十二年春亮悉大眾由斜谷出以流馬運據武功五丈原與司馬宣王對於渭南亮每患糧不繼使己志不申是以分兵屯田為久駐之基耕者雜於渭濱居民之間而百姓安堵軍無私者蜀志諸葛亮傳六年春楊聲由斜谷道取郿魏大將軍曹真舉眾拒之亮身率諸軍攻祁山戎陣整齊賞罰肅而號令明蜀志諸葛亮傳注魏軍始陳幡兵適交參佐咸以賊眾彊盛非力不制宜權停下兵一月以并聲勢亮曰吾統武行師以大信為本得原失信古人所惜去者束裝以待期妻子鶴望而計日雖臨征難義所不廢皆催遣令去於是去者咸悅願留一戰住者憤踊思致死命相謂曰諸葛公之恩死猶不報也臨戰之日莫不拔刃爭先以一當十殺張郃卻宣王一戰大剋此信之由也晉宣帝紀制曰殄公孫於百日檎孟達分盈旬自以兵動若神謀無再計矣既而與諸葛相持抑其甲兵本無鬥志遣其巾幗方發憤心杖節當門雄圖頓屈且秦蜀之人勇懦非敵夷險之路勞逸不同以此爭功其利可見而返閉軍固壘莫敢爭鋒生怯實而末前死疑虛而猶遁良將之道失在斯乎新唐薛登傳上疏曰吳起將戰左右進劍吳子辭之諸葛亮臨戎不親戎服蓋不取弓劍之用也新唐裴玢傳徙山南西道玢為治嚴稜畏遠權勢不務貢奉蔬食弊衣居處取避風雨而已倉廩完實百姓安之當世將帥末有及者箋證史記司馬穰苴列傳司馬穰苴者田完之苗裔也齊景公時晉伐阿甄而燕侵河上齊師敗績景公患之晏嬰乃薦田穰苴曰穰苴雖田氏庶孽然其人文能附眾武能威敵願君試之景公召穰苴與語兵事大說之以為將軍將兵扞燕晉之師史記孫子列傳孫子武者齊人也以兵法見於吳王闔廬闔廬曰子之十三篇吾盡觀之矣可以小試勒兵乎對曰可闔廬曰可試以婦人乎曰可於是許之出宮中美女得百八十人孫子分為二隊以王之寵姬二人各為隊長於是鼓之右婦人大笑孫子曰約束不明申令不熟將之罪也復三令五申而鼓之左婦人復大笑孫子曰約束不明申令不熟將之罪也既已明而不如法者吏士之罪也乃欲斬左右隊長遂斬隊長二人以徇用其次為隊長於是復鼓之婦人左右前後跪起皆中規矩繩墨無敢出聲於是孫子使使報王曰兵既整齊王可試下觀之唯王所欲用之雖赴水火猶可也於是闔廬知孫子能用兵卒以為將西破彊楚入郢北威齊晉顯名諸侯漢書高帝紀漢王既至南鄭諸將及士卒皆歌謳思東歸多道亡還者韓信為治粟都尉亦亡去蕭何追還之因薦於漢王曰必欲爭天下非信無可與計事者於是漢王齊戒設壇場拜信為大將軍問以計策漢書高帝紀二年秋八月漢王如滎陽謂酈食其曰緩頰往說魏王豹張晏曰緩頰徐言引譬喻也能下之以魏地萬歲封生食其往豹不聽漢王以韓信為左丞相與曹參灌嬰俱擊魏食其還漢王問魏大將誰也對曰柏直王曰是口尚乳臭不能當韓信騎將誰也曰馮敬曰是秦將馮無擇子也雖賢不能當灌嬰步卒將誰也曰項它曰是不能當曹參吾無患矣九月信等虜豹傳詣滎陽定魏地漢書韓信傳上嘗從容與信言諸將能各有差上問曰如我能將幾何信曰陛下不過能將十萬上曰如公何如曰如臣多多益辦耳上笑曰多多益辦何為為我禽信曰陛下不能將兵而善將將此乃信之為陛下禽也漢書周勃傳文帝擇勃子賢者皆推亞夫迺封為條侯文帝後六年匈奴大入邊以宗正劉禮為將軍軍霸上祝茲侯徐厲為將軍軍棘門以河內守亞夫為將軍軍細柳以備胡上自勞軍至霸上及棘門軍直馳入將以下騎出入送迎已而之細柳軍軍士吏被甲銳兵刃彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔有頃上至又不得入於是上使使持節詔將軍曰吾欲勞軍亞夫迺傳言開壁門壁門士請車騎曰將軍約軍中不得驅馳於是天子產按轡徐行至中營將軍亞夫揖曰介胄之士不拜請以軍禮見應劭曰禮介者不拜天子為動改容式車使人稱謝皇帝敬勞將軍成禮而去既出軍門群臣皆驚文帝曰嗟乎此真將軍矣鄉者霸上棘門如兒戲耳其將固可襲而虜也至於亞夫可得而犯邪稱善者久之漢書李廣傳武帝即位左右言廣名將也由是入為未央衛尉而程不識時亦為長樂衛尉程不識故與廣俱以邊太守將屯及出擊胡而廣行無部曲行陳就善水草頓舍人人自便不擊刁斗自衛孟康曰刁斗以銅作鐎受一斗晝炊飯食夜擊持行故名曰刁斗今在滎陽庫中也蘇林曰形如鋗無緣師古曰鐎音譙郡之譙溫器也鋗音火玄反鋗即銚也今俗或呼銅銚音姚莫府省文書晉灼曰將軍職在征行無常處所在為治故言莫府也莫大也或曰衛青征匈奴絕大莫大克獲帝就拜大將軍於幕中府故曰莫府莫府之名始於此也師古曰二說皆非也莫府者以軍幕為義古字通單用耳軍旅無常居止故以帳幕言之廉頗李牧市租皆入幕府此則非因衛青始有其號又莫訓大於義乖矣省少也音所領反宋祁曰晉灼二字史記作如淳說然亦遠斥候未嘗遇害程不識正部曲行伍營陳擊刁斗吏治軍簿至明軍不得自便不識曰李將軍極簡易然虜卒犯之無以禁師古曰卒讀曰猝而其士亦佚樂為之死我軍雖煩擾虜亦不得犯我是時漢邊郡李廣程不識為名將然匈奴畏廣士卒多樂從而苦程不識漢書李廣傳上乃召拜廣為右北平太守廣請霸陵尉與俱至軍而斬之上書自陳謝罪上報曰將軍者國之爪牙也司馬法曰登車不式遭喪不服振旅撫師以征不服率三軍之心同戰士之力故怒形則千里竦威振則萬物伏是以名聲暴於夷貉威稜憺乎鄰國漢書趙充國辛慶忌傳贊曰秦漢已來山東出相山西出將秦將軍白起郿人王翦頻陽人漢興郁郅王圍甘延壽義渠公孫賀傅介子成紀李廣李蔡杜陵蘇建蘇武上邽上官桀趙充國襄武廉褒狄道辛武賢慶忌皆以勇武顯聞蘇辛父子著節此其可稱列者也其餘不可勝數何則山西天水隴西安定北地處埶迫近羌胡民俗修習戰備高上勇力鞍馬騎射故秦詩曰王于興師修我甲兵與子皆行其風聲氣俗自古而然今之歌謠慷慨風流猶存耳漢書陳湯傳後湯上書言康居王侍子非王子也按驗寔王子也湯下獄當死太中大夫谷永上疏訟湯曰臣聞楚有子玉得臣文公為之仄席而坐師古曰子玉楚大夫也得臣其名也春秋僖二十八年子玉帥師與晉文公戰于城濮楚師敗繢晉師三日館榖而文公猶有憂色曰得臣猶在憂未歇也及楚殺子玉公喜而後可知也禮記曰有憂者仄席而坐盖自貶也仄古側字也趙有廉頗馬服彊秦不敢窺兵井陘師古曰廉頗趙將也馬服君趙奢亦趙將也井陘之口趙之西界山險道也近漢有郅都魏尚匈奴不敢南鄉沙幕由是言之戰克之將國之爪牙不可不重也後漢書賈復傳論曰中興將帥立功名者眾矣唯岑彭馮異建方面之號自函谷以西方城以南兩將之功實為大焉若馮賈之不伐岑公之信義信謂朱鮪知其誠而降義謂荊人奉牛酒讓不受乃足以感三軍而懷敵人故能尅成遠業終全其慶也後漢書朱景王杜馬劉傅堅馬列傳論曰中興二十八將前世以為上應二十八宿未之詳也然咸能感會風雲奮其智勇稱為佐命亦各志能之士也議者多非光武不以功臣任職至使英姿茂績委而勿用然原夫深圖遠算固將有以焉爾若乃王道既衰降自秦漢世資戰力至於翼扶王運皆武人屈起亦有鬻繒屠狗輕猾之徒灌嬰雎陽販繒者樊噲沛人以屠狗為事皆從高祖或崇以連城之賞或任以阿衡之地故勢疑則隙生力侔則亂起蕭樊且猶縲紲信越終見葅戮不其然乎自茲以降迄于孝武宰輔五世莫非公侯遂使縉紳道塞賢能蔽壅朝有世及之私下多抱關之怨其懷道無聞委身草莽者亦何可勝言故光武鑒前事之違存矯枉之志雖寇鄧之高勳耿賈之鴻烈分土不過大縣數四所加特進朝請而已莫不終以功名延慶于後後漢書竇融傳附竇憲論曰衛青霍去病資強漢之眾連年以事匈奴國耗太半矣而猾虜未之勝後世猶傳其良將豈非以身名自終邪竇憲率羌胡邊雜之師一舉而空朔庭至乃追奔稽落之表飲馬北鞮之曲銘石負鼎薦告清廟列其功庸兼茂於前多矣而後世莫稱者章末釁以降其實也是以下流君子所甚惡焉卷五十三案竇憲竇融曾孫也三國志蜀志諸葛亮傳十二年春亮悉大眾由斜谷出以流馬運據武功五丈原與司馬宣王對於渭南亮每患糧不繼使己志不伸是以分兵屯田為久住之基耕者雜於渭濱居民之間而百姓安堵軍無私焉三國志蜀志諸葛亮傳六年春楊聲由斜谷道取郿使趙雲鄧芝為疑軍據箕谷魏大將軍曹真舉眾拒之亮身率諸軍攻祁山戎陣整齊賞罰肅而號令明三國志蜀志諸葛亮傳注郭冲五事曰魏明帝自征蜀幸長安遣宣王督張郃諸軍雍涼勁卒三十餘萬潛軍密進規向劍閣亮時在祁山旌旗利器守在險要十二更下在者八萬時魏軍始陳幡兵適交參佐咸以賊眾強盛非力不制宜權停下兵一月以并聲勢亮曰吾統武行師以大信為本得原失信古人所惜去者束裝以待期妻子鶴望而計日雖臨征難義所不廢皆催遣令去於是去者感悅願留一戰住者憤踊思致死命相謂曰諸葛公之恩死猶不報也臨戰之日莫不拔刃爭先以一當十殺張郃郤宣王一戰大尅此信之由也晉書宣帝紀制曰宣皇以天挺之姿應期佐命文以績治武以稜威殄公孫於百日擒孟達於盈旬自以兵動若神謀無再計矣既而擁眾西舉與諸葛相持抑其甲兵本無人鬭志遺其巾幗方發憤心杖節當門雄啚頓屈請戰千里詐欲示威且秦蜀之人勇懦非敵夷阻之路勞逸不同以此爭功其利可見而反閉軍固壘莫敢爭鋒生怯實而未前死疑虛而猶遁良將之道失在斯乎新唐書薛登傳薛登常州義興人登通貫文史善議論根證該審與徐堅劉子玄齊名調閬中主簿天授中累遷左補闕時選舉濫甚乃上疏曰昔吳起將戰左右進劍吳子辭之諸葛亮臨陣不親戎服蓋不取弓劍之用也新唐書諸夷蕃將列傳裴玢裴玢五世祖紏本玉疏勒武德中來朝拜鷹揚大將軍封天山郡公留不去遂籍京兆初事金吾將軍論惟明為傔力以同州刺史劉公濟領節度擢玢為司馬踰年公濟卒乃授玢節度使元和三年徙山南西道玢為治嚴稜畏遠權勢不務貢奉蔬食敝衣居處取避風雨而已倉庫完實百姓安之當時將帥未有及者世將第二史記蒙恬傳恬家世為秦將史記王翦傳陳勝之反秦秦使王翦孫王離擊趙或曰王離秦之名將也今將強秦之兵攻新造之趙舉之必矣客曰不然夫為將三世者必敗以其所殺伐多矣今王離已三世將矣居無何項羽救趙擊秦軍果虜王離王離軍遂降諸侯前漢項籍傳陳嬰者東陽少年相聚得二萬人欲立嬰為王嬰母曰吾為迺家婦聞先故未曾貴今暴得大名不祥不如有所屬事成猶得封侯事敗易以亡非世所指名也嬰乃謂其軍吏曰項氏世世將家有功於楚今欲舉大事將非其人不可我倚名族亡秦必矣以其兵屬梁前漢李廣傳贊曰李將軍恂恂如鄙人口不能出辭及死之日天下知與不知皆為流涕彼其中心誠信於士大夫也諺曰桃李不言下自成蹊此言雖小可以喻大然三代之將道家所忌自廣至陵遂亡其宗哀哉後漢耿弇傳論曰弇決策河北之計南陽亦見光武之業成矣然三世為將道家所忌而耿氏累葉以功名自終將其用兵欲以殺止殺乎何其獨能隆也後漢馬援傳其先趙奢為趙將號曰馬服君子孫因為氏後漢陳龜傳龜世為邊將桓帝拜為度遼將軍晉陸機傳祖遜吳丞相父抗吳大司馬父祖世為將相有大勳於江表後成都王頴勞謙下士機謂頴必能康隆晉室遂委身焉頴討長沙王乂假機河北大都督機以三世為將道家所忌又羇旅入宦頓居群士之右固辭不許遂譖機於頴言其有異志遂遇害制曰蘭植中塗必無經時之翠桂生幽壑終保彌年之丹非蘭怨而桂親豈塗害而壑利而生滅有殊者隱顯之勢異也故曰衒美非所罕有常安韜奇擇居故能全世機雲機弟誡自以智足安時才堪佐命庶保名位無忝前基不知世屬未通運鍾方否進不能闢昏正亂退不能屏跡全身而奮力危邦竭心庸主忠抱實而不諒謗緣虛而見疑生在己而難長死因人而易促覆宗絕祀良可悲夫然則三世為將釁鍾來葉誅降不祥殃及後昆是知西陵結其凶端河橋收其禍末其天意也豈人事乎餘見不畏強禦辛雲京傳箋證史記蒙恬列傳蒙恬者其先齊人也恬大父蒙驁自齊事秦昭王官至上卿秦莊襄王元年蒙驚為秦將始皇七年蒙驁卒驁子曰武武子曰恬始皇二十六年蒙恬因家世得為秦將攻齊大破之拜為內史史記王翦列傳王翦者頻陽東鄉人也秦二世之時王翦及其子賁皆已死而又滅蒙氏陳勝之反秦秦使王翦之孫王離擊趙圍趙王及張耳鉅鹿城或曰王離秦之名將也今將彊秦之兵攻新造之趙舉之必矣客曰不然夫為將三世者必敗必敗者何也以其所殺伐多矣其後受其不祥今王離已三世將矣居無何項羽救趙擊秦軍果虜王離王離軍遂降諸侯漢書項籍列傳陳嬰者故東陽令史居縣素信為長者師古曰素立恩信號為長者東陽少年殺其令相聚數千人欲立長無適用迺請陳嬰嬰謝不能遂強立之縣中從之者得二萬人欲立嬰為王異軍蒼頭特起嬰母謂嬰曰吾為迺家婦聞先故未曾貴今暴得大名不祥不如有所屬事成猶得封侯事敗易以亡非世所指名也嬰迺不敢為王謂其軍吏曰項氏世世將家有功於楚今欲舉大事將非其人不可我倚名族亡秦必矣其眾從之迺以其兵屬梁漢書李廣蘇建傳贊曰李將軍恂恂如鄙人口不能出辭及死之日天下知與不知皆為流涕彼其中心誠信於士大夫也諺曰桃李不言下自成蹊此言雖小可以喻大然三代之將道家所忌自廣至陵遂亡其宗哀哉後漢書耿弇傳論曰弇決策河北定計南陽亦見光武之業成矣然弇自剋拔全齊而無復尺寸功夫豈不懷將時之度數不足以相容乎三世為將道家所忌而耿氏累葉以功名自終將其用兵欲以殺止殺乎何其獨能隆也六後漢書馬援傳馬援字文淵扶風茂陵人也其先趙奢為趙將號曰馬服君子孫因為氏馬服者言能服馭馬也史記曰趙惠文王以奢有功賜爵號為馬服君後漢書陳龜傳桓帝以龜世諳邊俗拜為度遼將軍晉書陸機傳陸機祖遜吳丞相父抗吳大司馬祖父世為將相有大勳於江表時成都王頴推功不居勞謙下士機既感全濟之恩又見朝廷屢有變難謂頴必能康隆晉室遂委身焉頴以機參大將軍軍事表為平原內史太安初頴與河間王顒起兵討長沙王乂假機後將軍河北大都督督北中郎將王粹冠軍牽秀等諸軍二十餘萬人機以三世為將道家所忌又羈旅入宦頓居群士之右而王粹牽秀等皆有怨心固辭都督頴不許宦人孟玖弟超並為頴所嬖寵遂譖機於頴言其有異志遂遇害於軍中時年四十三制曰是知蘭植中塗必無經時之翠桂生幽壑終保彌年之丹非蘭怨而桂親豈塗害而壑利而生滅有殊者隱顯之勢異也故曰衒美非所罕有常安韜奇擇居故能全性觀機雲之行已也智不逮言矣覩其文章之誡何知易而行難自以智足安時才堪佐命庶保名位無忝前基不知世屬未通運鍾方否進不能闢昏匡亂退不能屏跡全身而奮力危邦竭心庸主忠抱實而不諒謗緣虛而見疑生在己而難長死因人而易足上蔡之犬不誡於前華亭之鶴方悔於後卒令覆宗絕祀良可悲夫然則三世為將釁鍾來葉誅降不祥殃及後昆是知西陵結其凶端河橋收其禍末其天意也豈人事乎
