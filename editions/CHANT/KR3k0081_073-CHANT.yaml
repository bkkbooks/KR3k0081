body:
  text: 卷第七十三以德報怨第一前漢游俠傳郭解折節為儉以德報怨厚施而薄望前漢韓安國傳安國坐法抵罪蒙獄吏田甲辱安國安國曰死灰獨不復然乎甲曰然即溺之居無幾漢使使者拜安國為梁內史起徒中為二千石田甲亡安國曰甲不就官我滅而宗甲肉袓謝安國笑曰公等足與治乎卒善遇之魏蘇則傳注則興平中飢窮避難客安定依富室師亮亮待遇不足則歎曰天下會安當不久爾必還為此郡守折庸輩士也後隱於太白山中及為安定太守而師亮等皆欲逃走則聞之豫使人解語以禮報之前漢傅介子謂大將軍霍光曰樓蘭龜茲數反覆而不誅無所懲艾願往剌之大將軍於是白遣之介子與士卒俱齎金幣揚言以賜外國為名至樓蘭王貪漢物來見使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王王起隨介子入帳中屏語壯士二人從後剌之刃交胸立死介子告諭以王負漢罪天子遣我來誅王當更立前太子質在漢者漢兵方至毋敢動動滅國矣遂持王首還詣闕上迺下詔曰傅介子持節使誅斬樓蘭王以直報怨不煩師眾其封為義陽侯新唐李吉甫傅李泌竇參器其才厚遇之陸贄疑有黨出為明州長史贄之貶忠州宰相欲害之起吉甫為忠州剌史使甘心焉既至置怨與結懽人益重其量新唐鄭畋傳始為虞部員郎右丞鄭薰誣畋罪不可任郎官出之云云鄭縠者薰子也方畋秉政擢為給事中至侍郎其損怨類如此餘見外舉不避讎箋證漢書游俠傳郭解郭解河內軹人也及解年長更折節為儉以德報怨厚施而薄望漢書韓安國傳安國坐法抵罪蒙師古曰蒙梁國之縣也獄吏田甲辱安國安國曰死灰獨不復然乎甲曰然即溺之師古曰溺讀曰尿居無幾梁內史缺漢使使者拜安國為梁內史起徒中為二千石田甲亡安國曰甲不就官我滅而宗師古曰而汝也甲肉袒謝安國笑曰公等足與治乎卒善遇之三國志魏志蘇則傳註魏略曰則世為著姓興平中三輔亂饑窮避難北地客安定依富室師亮亮待遇不足則慨然歎曰天下會安當不久爾必還為此郡守折庸輩士也後與馮翊吉茂等隱於郡南太白山中以書籍自娛及為安定太守而師亮等皆欲逃走則聞之豫使人解語以禮報之漢書傅介子傳傅介子北地人也介子謂大將軍霍光曰樓蘭龜茲數反復而不誅無所懲艾師古曰艾讀曰乂介子過龜茲時其王近就人易得也願往刺之以威示諸國大將軍曰龜茲道遠且驗之於樓蘭於是白遣之介子與士卒俱齎金幣揚言以賜外國為名至樓蘭樓蘭王意不親介子介子陽引去至其西界使譯謂曰漢使者持黃金錦繡行賜諸國王不來受我去之西國矣即出金幣以示譯譯還報王王貪漢物來見使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王王起隨介子入帳中屏語壯士二人從後刺之刃交胸立死其貴人左右皆散走介子告諭以王負漢罪天子遣我來誅王當更立前太子質在漢者漢兵方至毋敢動動滅國矣遂持王首還詣闕公卿將軍議者咸嘉其功上迺下詔曰樓蘭王安歸常為匈奴間候遮漢使者發兵殺略衛司馬安樂光祿大夫忠期門郎遂成等三輩及安息大宛使盜取節印獻物甚逆天理平樂監傅介子持節使誅斬樓蘭王安歸首縣之北闕以直報怨不煩師眾其封介子為義陽侯新唐書李栖筠傳附子李吉甫吉甫字弘憲以蔭補左司禦率府倉曹參軍自天寶後中宮虛卹禮廢缺吉甫草具其儀德宗稱善李泌竇參器其才厚遇之陸贄疑有黨出為明州長史贄之貶忠州宰相欲害之起吉甫為忠州刺史使甘心焉既至置怨與結懽人益重其量新唐書鄭畋傳鄭畋字台文宣宗時白敏中令狐綯繼當國皆怨德裕其賓客竝廢斥故畋不調幾十年外更帥鎮幕府綯去位始為虞部員外郎右丞鄭薰誣畋罪不可任郎官出之畋為人仁恕姿采如峙玉凡與布衣交至貴無少易鄭縠者薰子也方畋秉政擢為給事中至侍郎其損怨類如此責己第二前漢游俠傳郭解解出人皆避有一人獨箕踞視之客欲殺之解曰居邑民不見禮是吾德不脩也彼何辠後漢吳祐傳官至酒泉太守民有爭訴者輒閑閤自責然後斷其訟以道譬之或身到閭里重相和解自是之後爭隙省息吏人懷而不欺後漢郎顗傳上疏皇天感物不為偽動災變應人要在責己若令雨可請降水可攘止則歲無隔并太平可待後漢周舉傳對曰昔武王入商出傾宮之女成湯遭災以六事剋己魯僖遇旱而自責祈雨皆以精誠轉禍為福魏文帝紀三年詔曰災異之作以遣元首而歸過股肱豈禹湯罪己之義乎其令百官各處厥職後有天地之眚勿復劾三公晉武泰始五年西平人趍路伐登聞鼓言多祅謗有司奏棄市帝曰朕之過也捨而不明新唐蘇世長傳初在陝邑里犯法不能禁乃引咎自撻於廛五伯嫉其詭鞭之流血世長不勝痛呼而走人笑其不情餘見攻過魏公子傳商本紀箋證漢書游俠傳郭解解出人皆避有一人獨箕踞視之解問其姓名客欲殺之解曰居邑屋不見敬是吾德不脩也彼何辠後漢書吳祐傳吳祐字季英陳留長垣人也祐以光祿四行遷膠東侯相時濟北戴宏父為縣丞宏年十六從在丞舍祐每行園常聞諷誦之音奇而厚之亦與為友卒成儒宗知名東夏官至酒泉太守祐政唯仁簡以身率物民有爭訴者輒閉閤自責然後斷其訟以道譬之或身到閭里重相和解自是之後爭隙省息吏人懷而不欺後漢書郎顗傳臣聞皇天感物不為偽動災變應人要在責己若令雨可請降水可禳止則歲無隔并太平可待後漢書周舉傳河南三輔大旱五穀災傷天子親自露坐德陽殿東廂請雨又下司隸河南禱祀河神名山大澤詔書以舉才學優深特下策問舉對曰昔武王入殷出傾宮之女成湯遭災以六事剋己魯僖遇旱而自責祈雨皆以精誠轉禍為福三國志魏志文帝二年詔曰災異之作以譴元首而歸過股肱豈禹湯罪己之義乎其令百官各處厥職後有天地之眚勿復劾三公晉書武帝紀五年西平人麴路伐登聞鼓言多祅謗有司奏棄市帝曰朕之過也捨而不問新唐書蘇世長傳蘇世長京兆武功人初在陜邑里犯法不能禁乃引咎自撻于廛伍伯疾其詭鞭之流血世長不勝痛呼而走人笑其不情改過第三史記商本紀帝太甲既立三年不明伊尹放之於桐宮三年伊尹攝行政當國以朝諸侯帝太甲悔過自責反善於是伊尹迺迎太甲而授之政史記滑稽傳楚莊王之時有所愛馬衣以文繡置之華屋下席以露床啗以棗脯馬病肥死使群臣喪之欲以大夫禮葬之左右爭之王下令曰有敢以馬諫者死優孟聞之入殿門仰天大哭王驚而問孟曰馬者王之所愛也以楚國堂堂之大何求不得而以大夫禮葬之薄請以人君禮葬之王曰何如對曰臣請以彫玉為棺文梓為椁發兵卒為穿壙老弱負土齊趙陪位於前韓魏翼衛其後廟食太牢奉以萬戶之邑諸侯聞之皆以大王賤人而貴馬也王曰寡人之過一至此乎為之奈何優孟曰請為大王六畜葬之以壟竈為椁銅歷為棺齎以薑棗薦用木蘭祭以粳稻衣以火光葬之於人腹腸於是王乃使以馬屬太官無令天下久聞也史記魏公子傳公子之矯奪晉鄙兵而存趙乃與平原君計以五城封公子公子聞之意矯矜而有自功之色客有說公子曰夫人有德於公子公子不可忘也公子有德於人願公子忘之也且矯魏王令奪晉鄙兵以救趙於趙則有功矣於魏則未為忠臣也公子立自責似若無所容者前漢宣元六王東平王傳天子詔曰蓋聞仁以親親古之道也前東平王有闕今聞王改行自新尊脩經術親近仁人非法之求不以奸吏朕甚嘉焉傳不云乎朝過夕改君子與之其復前所削縣如故前漢賈山傳古者聖王之制史在前書過失工誦箴諫瞽誦詩諫公卿比諫士傳言諫過庶人謗於道商旅議於市然後君得聞其過失也聞其過失而改之見義而從之所以永有天下也前漢李尋傳說王根曰昔秦穆公說諓諓之言任仡仡之勇元受大辱社稷幾亡悔過自責思惟黃髮任用百里奚卒伯西域德列王道二者禍福如此可不慎哉諓音踐小善仡巨乙反壯健也前漢西域傳贊曰孝武之世圖制匈奴患其兼從西國結當南羌迺表河曲列四郡開王門通西域以斷匈奴右臂值文景養民五世財力有餘士馬強盛故能諸犀布瑇瑁則建珠崖七郡感枸醬竹杖則開牂牁越雋聞氏為用陶則通大宛安息殊方異物四面而至於是廣開上林穿昆明池營千門萬戶之宮立神明通天之臺興造甲乙之悵落以隋珠和璧天子負黼依馮玉几而處其中設酒池肉林以享四夷之客作巴俞都盧海中碭極漫衍魚龍角抵之戲以觀視之及賂遺贈送萬里相奉師旅之費不可勝計至於用度不足迺榷酒酤管鹽鐵鑄白金造皮幣筭至車船租及六畜民力屈財用竭因之以凶年寇賊並起直指之使始出衣繡杖斧斷斬於郡國然後勝之是以未年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉前漢李尋遂白賀良召見陳說漢歷中衰當更受命宜急改元易號乃得延年益壽皇子生災異息矣哀帝從議於是詔大赦天下以建平二年為太初元年號曰陳聖劉太平皇帝漏刻以百二十為度下詔曰賀良等建言改元易號朕信道不篤過聽其言幾為百姓獲福卒無嘉應夫過而不改是謂過矣六月甲子詔書非赦令也皆蠲除之後漢河間惠王不奉憲法順帝命御史沈景為相景謁王不正服箕踞景請王傳責之曰諸君而無訓導之義因奏治罪詔書讓王而詰責傅王遂為改節悔過自修後漢王烈字彥方以義行稱鄉里有盜牛者主得之盜請罪曰刑戮是甘乞不使王彥方知也烈聞而遺布一端或問其故烈曰盜懼吾聞其過是有恥惡之心既懷恥惡必能改善故以此激之後有老婦遺劍於路行道一人見而守之至暮老父還尋得劍怪而問其姓名以事告烈烈使推求乃先盜牛者也後漢郭太傳賈淑雖世有冠冕而性險害邑里患之林宗遭母憂淑來修弔既而孫威直亦至成直以林宗賢而受惡人弔心怪之不進而去林宗追而謝之曰賈子厚誠實凶德然洗心向善仲尼不逆互鄉故吾許其進也淑聞之改過自厲終成善士後漢郭太傳宋果性輕悍熹與人報讎為郡縣所疾林宗乃訓之義方懼以禍敗果感悔叩頭謝負遂改節自勑後以烈氣聞辟公府侍御史并州剌史晉周處傳好馳騎田獵不修細行縱情肆欲州里患之處自知為人所患乃慨然有改厲之志謂父老曰今時和歲豐何苦而不樂邪父老歎曰三害未除何樂之有處曰何為也荅曰南山白額猛獸長橋下蛟并子為三矣處乃入山射殺猛獸因投水縛蛟蛟或浮或況行數十里而處與之俱經三日三夜人謂死皆相慶賀果殺蛟而反聞鄉里相慶始知人患己之甚乃入吳尋二陸時機不在見雲具以情告云欲自修而年已蹉跎恐將無及雲曰古人貴朝聞夕死君前塗尚可但患志之不立何憂名之不彰處遂自勵志好學有文思志存義烈言必忠信克己期年州府交辟晉劉寔傳或謂寔曰君行高一世而諸子不能遵何不旦夕切瑳使知過而自改邪寔曰吾之所行是所聞見不相祖習豈復教誨之所得乎世以寔言為當新唐李皋傳扶風馬彝未知名皋識之卒以正直稱張柬之有園圃在襄陽皋嘗宴集將市取之彝曰漢陽有中興功今遺業當百世共保奈何使其子孫鬻乎皋謝曰主吏失詞以為君羞微君安得聞此言新唐李絳傳上曰凡人舉事病不通於理追咎其失古人處此有道耶絳曰事或過差聖哲所不免天子有諫臣所以救過上下同體猶手足之於心膂交相為用但矜能護失常情所蔽聖人改過不吝願陛下以此處之餘見化人以德仇覽傳箋證史記殷本紀帝太甲既立三年不明暴虐不遵湯法亂德於是伊尹放之於桐宮三年伊尹攝行政當國以朝諸侯帝太甲居桐宮三年悔過自責反善於是伊尹迺迎帝太甲而授之政史記滑稽列傳楚莊王之時有所愛馬衣以文繡置之華屋之下席以露床啗以棗脯馬病肥死使群臣喪之欲以棺椁大夫禮葬之左右爭之以為不可王下令曰有敢以馬諫者罪至死優孟聞之入殿門仰天大哭王驚而問其故優孟曰馬者王之所愛也以楚國堂堂之大何求不得而以大夫禮葬之薄請以人君禮葬之王曰何如對曰臣請以彫玉為棺文梓為椁楩楓豫章為題湊發甲卒為穿壙老弱負土齊趙陪位於前韓魏翼衛其後廟食太牢奉以萬戶之邑諸侯聞之皆知大王賤人而貴馬也王曰寡人之過一至此乎為之柰何優孟曰請為大王六畜葬之以壠竈為椁銅歷為棺索隱歷即釜鬲也齎以薑棗薦以木蘭祭以粳稻衣以火光葬之於人腹膓於是王乃使以馬屬太官無令天下久聞也史記信陵君列傳魏公子無忌者魏昭王少子而魏安釐王異母弟也昭王薨安釐王即位封公子為信陵君趙孝成王德公子之矯奪晉鄙兵而存趙乃與平原君計以五城封公子公子聞之意驕矜而有自功之色客有說公子曰物有不可忌或有不可不忘夫人有德於公子公子不可忘也公子有德於人願公子忘之也且矯魏王令奪晉鄙兵以救趙於趙則有功矣於魏則未為忠臣也公子乃自驕而功之竊為公子不取也於是公子立自責似若無所容者漢書宣元六王傳東平思王宇天子詔有司曰盖聞仁以親親古之道也前東平王有闕有司請廢朕不忍又請削朕不敢專惟王之至親未嘗忘於心今聞王改行自新尊修經術親近仁人非法之求不以奸吏朕甚嘉焉傳不云乎朝過夕改君子與之其復前所削縣如故漢書賈山傳古者聖王之制史在前書過失工誦箴諫李奇曰古有誦詩之工記過之史常在君側也師古曰箴戒也音之林反瞽誦詩諫師古曰瞽無目之人公卿比諫李奇曰相親比而諫也或曰比方事類以諫也師古曰比方是也士傳言諫過庶人謗於道商旅議於市然後君得聞其過失也聞其過失而改之見義而從之所以永有天下也漢書李尋傳帝舅曲陽侯王根為大司馬票騎將軍厚遇尋是時多災異根輔政數虛已問尋尋見漢家有中衰阸會之象其意以為且有洪水為災乃說根曰昔秦穆公說諓諓之言任仡仡之勇身受大辱社稷幾亡師古曰諓諓小善也仡仡壯健也悔過自責思惟黃髮任用百里奚卒伯西域德列王道二者禍福如此可不慎哉漢書西域傳贊曰孝武之世圖制匈奴患其兼從西國結黨南羌迺表河曲列西郡開玉門通西域以斷匈奴右臂隔絕南羌月氏單于失援由是遠遁而幕南無王庭遭值文景玄默養民五世天下殷富財力有餘士馬彊盛故能睹犀布瑇瑁則建珠崖七郡感枸醬竹杖則開牂柯越嶲師古曰枸音矩聞天馬蒲陶則通大宛安息自是之後明珠文甲通犀翠羽之珍盈於後宮蒲梢龍文魚目汗血之馬充於黃門孟康曰四駿馬名也鉅象師子猛犬大雀之群食於外囿師古曰鉅亦大殊方異物四面而至於是廣開上林穿昆明池營千門萬戶之宮立神明通天之臺興造甲乙之帳落以隨珠和璧師古曰落與絡同天子負黼依襲翠被馮玉几而處其中設酒池肉林以饗四夷之客作巴俞都盧海中碭極漫衍魚龍角抵之戲以觀視之及賂遺贈送萬里相奉師旅之費不可勝計至於用度不足迺榷酒酤筦鹽鐵鑄白金造皮幣算至車船租及六畜民力屈財用竭因之以凶年寇盜並起道路不通直指之使始出衣繡杖斧斷斬於郡國然後勝之是以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉漢書李尋傳哀帝初立司隸校尉解光亦以明經通災異得幸白賀良等所挾忠可書事下奉車都尉劉歆歆以為不合五經不可施行而李尋亦好之光曰前歆父向奏忠可下獄歆安肯通此道時郭昌為長安令勸尋宜助賀良等尋遂白賀良等皆待詔黃門數召見陳說漢歷中衰當更受命成帝不應天命故絕嗣今陛下久疾變異屢數天所以譴告人也宜急改元易號乃得延年益壽皇子生災異息矣得道不得行咎殃且亡師古曰言知道不能行之必有殃咎將至滅亡宋祁曰下得字可刪劉攽曰得道不得行下得字衍不有洪水將出災火且起滌盪民人哀帝久寢疾幾其有益師古曰幾讀曰冀遂從賀良等議於是詔制丞相御史其大赦天下以建平二年為太初元年號曰陳聖劉太平皇帝漏刻以百二十為度布告天下使明知之下詔曰朕獲保宗廟為政不德變異屢仍恐懼戰栗未知所繇待詔賀良等建言改元易號增益漏刻可以永安國家朕信道不篤過聽其言幾為百姓獲福卒無嘉應久旱為災以問賀良等對當復改制度皆背經誼違聖制不合時宜夫過而不改是為過矣宋祁曰為字當作謂六月甲子詔書非赦令也皆蠲除之師古曰唯赦令不改餘皆除之後漢書章帝八王傳河間孝王開傳河間孝王開以永元二年封分樂成勃海涿郡為國延平元年就國奉遵法度吏人敬之永寧元年鄧太后封開子翼為平原王奉懷王勝祀子德為安平王奉樂成王黨祀開立四十二年薨子惠王政嗣政慠狠不奉法憲順帝以侍御史吳郡沈景有彊能稱故擢為河間相景到國謁王王不正服箕踞殿上侍郎贊拜景峙不為禮峙立也問王所在虎賁曰是非王邪景曰王不服常人何別今相謁王豈謁無禮者邪王慙而更服景然後拜出住黃門外請王傅責之曰前發京師陛下見受詔以王不恭使相檢督諸君空受爵祿而無訓導之義因奏治罪詔書讓政而詰責傅景因捕諸姦人上案其罪殺戮尤惡者數十人出冤獄百餘人政遂為改節悔過自脩後漢書獨行列傳王烈傳王烈字彥方太原人也少師事陳寔以義行稱鄉里有盜牛者主得之盜請罪曰刑戮是甘乞不使王彥方知也烈聞而使人謝之遺布一端或問其故烈曰盜懼吾聞其過是有恥惡之心既懷恥惡必能改善故以此激之後有老父遺劍於路行道一人見而守之至暮老父還尋得劍怪而問其姓名以事告烈烈使推求乃先盜牛者也後漢書郭太傳附賈淑賈淑字子原林宗鄉人也雖世有冠冕而性險害邑里患之林宗遭母憂淑來修弔既而鉅鹿孫威直亦至威直以林宗賢而受惡人弔心怪之不進而去林宗追而謝之曰賈子厚誠實凶德然洗心向善仲尼不逆互鄉故吾許其進也淑聞之改過自厲終成善士後漢書郭太傳附宋果宋果字仲乙謝承書乙作文扶風人也性輕悍憙與人報讎為郡縣所疾林宗乃訓之義方懼以禍敗果感悔叩頭謝負遂改節自勑後以烈氣聞辟公府侍御史并州刺史所在能化晉書周處傳處少孤未弱冠膂力絕人好馳騁田獵不脩細行縱情肆慾州曲患之處自知為人所惡乃慨然有改勵之志謂父老曰今時和歲豐何苦而不樂邪父老歎曰三害未除何樂之有處曰何謂也答曰南山白額猛獸長橋下蛟并子為三矣處曰若此為患吾能除之父老曰子若除之則一郡之大慶非徒去害而已處乃入山射殺猛獸因投水搏蛟蛟或沉或浮行數十里而處與之俱經三日三夜人謂死皆相慶賀處果殺蛟而反聞鄉里相慶始知人患己之甚乃入吳尋二陸時機不在見雲具以情告曰欲自修而年已蹉跎恐將無及雲曰古人貴朝聞夕改君前途尚可且患志之不立何憂名之不彰處遂勵志好學有文思志存義烈言必忠信克已期年州府交辟晉書劉寔傳或謂寔曰君行高一世而諸子不能遵何不旦夕切磋使知過而自改邪寔曰吾之所行是所聞見不相祖習豈復教誨之所得乎世以寔言為當新唐書太宗諸子列傳曹王明附子李皋皋字子蘭少補左司禦兵曹參軍天寶十一載嗣王事母太妃鄭以孝聞皋性勤儉能知人疾苦參聽微隱盡得吏下短長其賞罰必信扶風馬彝未知名皋識之卒以正直稱張柬之有園圃在襄陽皋嘗宴集將市取之彝曰漢陽有中興功今遺業當百世共保奈何使其子孫鬻乎皋謝曰主吏失詞以為君羞微君安得聞此言新唐書李絳傳帝曰凡人舉事病不通於理追咎其失古人處此有道耶絳曰事或過差聖哲所不免天子有諫臣所以救過上下同體猶手足之於心膂交相為用但矜能護失常情所蔽聖人改過不吝願陛下以此處之觀過知人第四後漢吳祐傳遷膠東侯相嗇夫孫性私賦民錢市衣以進其父父得而怒曰有君如是何忍欺之促歸伏罪性慚懼詣閤持衣自首祐屏左右問其故性具談父言祐曰掾以親故受污穢之名所謂觀過斯知人矣使歸謝其父還以衣遺之新唐狄仁傑舉明經調汴州參軍為吏誣訴黜陟使閻立本召詔異其才謝曰仲尼稱觀過知仁可謂倉侮貴味矣薦受并州法曹箋證後漢書吳祐傳祐以光祿四行遷膠東侯相祐政唯仁簡以身率物民有爭訴者輒閉閤自責然後斷其訟以道譬之或身到閭里重相和解自是之後爭隙省息吏人懷而不欺嗇夫孫性私賦民錢市衣以進其父父得而怒曰有君如是何忍欺之促歸伏罪性慙懼詣閤持衣自首祐屏左右問其故性具談父言祐曰掾以親故受污穢之名所謂觀過斯知仁矣論語載孔子之言也使歸謝其父還以衣遺之新唐書狄仁傑傳舉明經調汴州參軍為吏誣訴黜陟使閻立本召訊異其才謝曰仲尼稱觀過知仁君可謂滄海遺珠矣薦授并州法曹參軍
