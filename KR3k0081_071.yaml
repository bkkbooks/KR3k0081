body:
  text: 卷第七十一讓第一前漢翟方進傳遷議郎是時宿儒有胡常與方進同經常為先進名譽出方進下心害其能論議不右方進方進知之候伺當大都授時遣門下諸生至常所問大義疑難因記其說如是者久之常知方進之宗讓己內不自得其後居士大夫之間未嘗不稱述方進前漢藝文志道家者流蓋出於史官歷記成敗存亡禍福古今之道然後知秉要執本清虛自守卑弱以自持此人君南面之術也合於堯之克讓易之謙謙一謙而四益此其所長也後漢陳蕃傳轉太中大夫代楊秉為太尉蕃讓曰不愆不亡率由舊章臣不如太常胡廣齊七政訓五典臣不如議郎王暢聰明亮達文武兼姿臣不如弛刑徒李膺帝不許後漢陳蕃傳封蕃高陽侯上疏讓曰讓身之文德之昭也然不敢盜以為名晉華談傳或謂談曰諺言人之相去如九牛毛寧有此理乎談對曰昔許由巢父讓天子之貴市道小人爭半錢之利此之相去何啻九牛毛也晉王導傳加輔國將軍導上箋曰今者臨郡不問賢愚豪賤皆加重號輒有鼓蓋動見相準時有不得者或為恥辱天官混雜朝望頽毀導忝荷重任取紊彝典謹送鼓蓋加崇之物請從導始庶令雅俗區別群望無惑餘見辭爵祿箋證漢書翟方進傳方進讀經博士受春秋積十餘年經學明習徒衆日廣諸儒稱之以射策甲科為郎二三歲舉明經遷議郎是時宿儒有清河胡常與方進同經常為先進名譽出方進下心害其能論議不右方進方進知之候伺常大都授時師古曰都授謂總集諸生大講授也遣門下諸生至常所問大義疑難因記其說如是者久之常知方進之宗讓己內不自得其後居士大夫之間未嘗不稱述方進遂相親友漢書藝文志道家者流蓋出於史官歷記成敗存亡禍福古今之道然後知秉要執本清虛以自守卑弱以自持此君人南面之術也合於堯之克攘師古曰虞書堯典稱堯之德曰允恭克讓言其信恭能讓也故志引之云攘古讓字易之嗛嗛一謙而四益此其所長也師古曰四益謂天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙也此謙卦彖辭嗛字與謙同後漢書陳蕃傳蕃為光祿勳與五官中郎將黃琬共典選舉不偏權富而為藝家郎所譖訴坐免歸頃之徵為尚書僕射轉太中大夫八年代楊秉為太尉蕃讓曰不愆不忘率由舊章臣不如太常胡廣齊七政訓五典臣不如議郎王暢聰明亮達文武兼姿臣不如弛刑徒李膺帝不許後漢書陳蕃傳靈帝即位竇太后復優詔蕃曰太傅陳蕃輔弼先帝出內纍年忠孝之美德冠本朝謇愕之操華首彌固今封蕃高陽侯食邑三百戶蕃上疏讓曰使者即臣廬授高陽鄉侯印綬臣誠悼心不知所裁臣聞讓身之文德之昭也然不敢盜以為名晉書華談傳華談字令思廣陵人也或問談曰諺言人之相去如九牛毛寧有此理乎談對曰昔許由巢父讓天子之貴市道小人爭半錢之利此之相去何啻九牛毛也晉書王導傳永嘉末遷丹陽太守加輔國將軍導上箋曰昔魏武達政之主也荀文若功臣之最也封不過亭侯倉舒愛子之寵贈不過別部司馬以此格萬物得不局跡乎今者臨郡不問賢愚豪賤皆加重號輒有鼓蓋動見相準時有不得者或為恥辱天官混雜朝望頽毀導忝荷重任不能崇浚山海而開導亂源叨竊名位取紊彝典謹送鼓蓋加崇之物請從導始庶令雅俗區別群望無惑德感民讓第二史記舜紀舜耕歷山歷山之人皆讓畔漁雷澤雷澤之人皆讓居史記周本紀西伯陰行善諸侯皆來決平於是虞芮之人有獄不能決乃如周入界耕者皆讓畔民俗皆讓長虞芮未見西伯皆慙相謂曰吾所爭周人所恥何往為秖取辱耳遂還俱讓而去後漢魯恭傳拜中牟令專以德化為理不任刑罰訟人許伯等爭田纍守令不能決恭為平理曲直皆退而自責輟耕相讓箋證史記五帝本紀虞舜者名曰重華舜耕歷山歷山之人皆讓畔漁雷澤雷澤上人皆讓居史記周本紀西伯陰行善諸侯皆來決平於是虞芮之人有獄不能決乃如周入界耕者皆讓畔民俗皆讓長虞芮之人未見西伯皆慙相謂曰吾所爭周人所恥何往為秪取辱耳遂還俱讓而去後漢書魯恭傳肅宗集諸儒於白虎觀恭特以經明得召與其議熹復舉恭直言待詔公車拜中牟令恭專以德化為理不任刑罰訟人許伯等曲田纍守令不能決恭為平理曲直皆退而自責輟耕相讓文武兼備第三史記司馬穰苴傳齊景公時燕侵河上景公患之晏嬰乃薦田穰苴曰其人文能附衆武能威敵前漢尹翁歸河東平陽人也為獄小吏田延年為河東太守行縣至平陽悉召故吏五六十人延年親臨見令有文者東有武者西閲數十人次到翁歸獨伏不肯起對曰翁歸文武兼備唯所施設功曹以為此吏倨傲不遜延年曰何傷遂召上辭問甚奇其對除補卒史便從歸府按事發姦窮極事情延年大重之自以能不及後漢龐參傳馬融曰竊見前護羌校尉龐參文武照備智略洪遠後漢盧植傳九江蠻反四府選植才兼文武拜九江太守魏蔣濟傳詔曰夫骨鯁之臣人主之所杖也濟才兼文武服勤盡節每軍國大事輒有奏議忠誠奮發吾甚壯之蜀關羽傳羽聞馬超來降舊非故人羽書與諸葛亮問超人才可誰比類亮知羽護前乃答之曰孟起兼資文武雄烈過人黥彭之徒當與益德並驅爭先猶未及髯之絶倫逸群也羽美鬚髯故亮謂之髯羽省書二悅以示賓客益德張飛也新唐魏元忠傳上封事洛陽宮言命將用兵之要曰天下之柄有二文武而已至制勝御人其道一也今言武者先騎射不稽之權略言文者首篇章不取之經綸臣觀養由基射能穿扎不止鄢陵之奔陸機識能辨亡無殺河橋之敗斷可見矣餘見擇將寇恂傳箋證史記司馬穰苴列傳齊景公時晉伐阿甄而燕侵河上齊師敗績景公患之晏嬰乃薦田穰苴曰穰苴雖田氏庶孽然其人文能附衆武能威敵願君試之漢書尹翁歸傳尹翁歸字子兄河東平陽人也徙杜陵翁歸少孤與季父居為獄小吏會田延年為河東太守行縣至平陽悉召故吏五六十人延年親臨見令有文者東有武者西閲數十人次到翁歸獨伏不肯起對曰翁歸文武兼備唯所施設功曹以為此吏倨敖不遜延年曰何傷遂召上辭問甚奇其對除補卒史便從歸府案事發姦窮竟事情延年大重之自以能不及後漢書龐參傳時先零羌豪僣號北地詔參將降羌及湟中義從胡七千人與行征西將軍司馬鈞期會北地擊之參於道為羌所敗既已失期乃稱病引兵還坐以詐疾徵下獄校書郎中馬融上書請之曰竊見前護羌校尉龐參文武昭備智略弘遠後漢書盧植傳熹平四年九江蠻反四府選植才兼文武拜九江太守三國志魏志蔣濟傳詔曰夫骨鯁之臣人主之所仗也濟才兼文武服勤盡節每軍國大事輒有奏議忠誠奮發吾甚壯之三國志蜀志關羽傳羽聞馬超來降舊非故人羽書與諸葛亮問超人才可誰比類亮知羽護前乃答之曰孟起兼資文武雄烈過人一世之傑黥彭之徒當與益德並驅爭先猶未及髯之絶倫逸群也羽美鬚髯故亮謂之髯羽省書大悅以示賓客新唐書魏元忠傳魏元忠宋州宋城人為太學生跌蕩少檢久不調盩厔人江融曉兵術元忠從之游盡傳所學儀鳳中吐蕃數盜邊元忠上封事洛陽宮言命將用兵之要曰天下之柄有二文武而已至制勝御人其道一也今言武者先騎射不稽之權略言文者首篇章不取之經綸臣觀魏晉齊梁才固不乏然何益治亂哉養由基射能穿札不止鄢陵之奔陸機識能辨亡無救河橋之敗斷可見已臨大節不可奪第四前漢霍光傳贊曰霍光以結髮內侍起於階闥之間確然秉志義形於主受襁褓之託任漢室之寄當廟堂擁幼君摧燕王仆上官因權制敵以成其忠處廢置之際臨大節而不可奪遂定國家安社稷擁昭立宣光為師保雖周公阿衡何以加此魏袁渙傳帝聞渙昔拒呂布之事問渙從弟敏渙勇怯何如敏對曰渙貌似和柔然其臨大節處危難雖賁育不過也新唐忠義列傳序夫有生所甚重者身也得輕用者忠與義也後身先義仁也身可殺名不可死志也大凡捐生以趣義者寧豫期垂名不朽而為之雖一世成敗亦未必濟也要為重所與終始一操雖頽嵩岱不吾壓也夷齊排周存商商不害亡而周以興兩人至餓死不肯屈卒之武王蒙慙德而夷齊為得仁仲尼變色言之不敢少損焉故忠義者真天下之大間歟姦鈇逆鼎摶人而肆其毒然殺一義士則四方解情故亂臣賊子赩然疑沮而不得逞何哉欲所以為彼者而為我也義在與在義亡與亡故王者常推而褒之所以砥礪生民而窒不軌也雖然非烈丈夫曷克為之彼委靡軟熟偷生自私者真畏人也哉餘見社稷之臣師丹傳箋證漢書霍光金日磾傳贊曰霍光以結髮內侍起於階闥之間確然秉志誼形於主受襁褓之託任漢室之寄當廟堂擁幼君摧燕王仆上官因權制敵以成其忠處廢置之際臨大節而不可奪遂匡國家安社稷擁昭立宣光為師保雖周公阿衡何以加此三國志魏志袁渙傳又帝聞渙昔拒呂布之事問渙從弟敏渙勇怯何如敏對曰渙貌似和柔然其臨大節處危難雖賁育不過也新唐書忠義列傳上序夫有生所甚重者身也得輕用者忠與義也後身先義仁也身可殺名不可死志也大凡捐生以趣義者寧豫期垂名不朽而為之雖一世成敗亦未必濟也要為重所與終始一操雖頽嵩岱不吾壓也夷齊排周存商商不害亡而周以興兩人至餓死不肯屈卒之武王蒙慙德而夷齊為得仁仲尼變色言之不敢少損焉故忠義者真天下之大間歟姦鈇逆鼎搏人而肆其毒然殺一義士則四方解情故亂臣賊子赩然疑沮而不得逞何哉欲所以為彼者而為我也義在與在義亡與亡故王者常推而褒之所以砥礪生民而窒不軌也雖然非烈丈夫曷克為之彼委靡軟熟偷生自私者真畏人也哉不拘細行第五史記管夷吾傳管仲曰吾幽囚受辱鮑叔不以我為無恥知我不羞小節而恥功名不顯於天下也生我者父母知我者鮑子也後漢虞延傳性敦朴不拘小節又無鄉曲之譽後漢儒林傳楊政傳為人嗜酒不拘小節果敢自矜然篤於義後漢文苑杜篤傳少博學不修小節不為鄉人所禮晉郤詵傳詵博學多才瓖偉倜儻不拘細行州郡禮命並不應晉唐彬傳有經國大度而不拘行檢新唐元万頃傳萬頃敏文辭然放達不治細檢無儒者風箋證史記管仲列傳管仲曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗三戰三走鮑叔不以我為怯知我有老母也公子糾敗召忽死之吾幽囚受辱鮑叔不以我為無恥知我不羞小節而恥功名不顯於天下也生我者父母知我者鮑子也後漢書虞延傳虞延字子大陳留東昏人也性敦朴不拘小節又無鄉曲之譽後漢書儒林列傳楊政傳楊政字子行京兆人也為人嗜酒不拘小節果敢自矜然篤於義後漢書文苑列傳杜篤傳杜篤字季雅京兆杜陵人也篤少博學不修小節不為鄉人所禮晉書郤詵傳郤詵字廣基濟陰單父人也詵博學多才瓌偉倜儻不拘細行州郡禮命並不應晉書唐彬傳唐彬字儒宗魯國鄒人也父臺泰山太守彬有經國大度而不拘行檢新唐書文藝列傳元萬頃傳元萬頃後魏京兆王子推裔萬頃敏文辭然放達不治細檢無儒者風勇第六史記太史公曰藺相如引璧晲柱及叱秦王左右勢不過誅然士或怯懦而不敢發相如一奮其氣威信敵國退而讓頗名重太山其處智勇可謂兼之矣前漢樊噲傳項羽在戲下欲攻沛公沛公從百餘騎因項伯面見項羽謝無有閉關事項羽既饗軍士中灑亞父謀欲殺沛公令項莊拔劍舞坐中欲擊沛公噲屈營水聞事急乃持盾入初入營營衛止噲噲直撞入立帳下項羽問為誰張良曰沛公參乘樊噲也項羽曰壯士賜之卮灑彘肩噲既飲酒拔劍切肉食之項羽曰能復飲乎噲曰臣死且不辭豈羽卮酒乎且沛公先入定咸陽暴師霸上以待大王大王今日至聽小人之言與沛公有隙臣恐天下解心疑大王也項羽默然無誅沛公之心是日微噲奔入營譙讓項羽沛公幾殆前漢蒯通傳曰猛虎之猶與不如蜂蠆之致蠚孟賁之狐疑不如童子之必至此言貴能行之也蠆丑界反蠚呼各反前漢灌夫傳吳楚反時夫身中大創十餘適有万金良藥故得無死創少瘳又復請將軍曰吾益知吳壁曲折請復往將軍壯而義之恐亡夫乃言太尉太尉召固止之晉馬隆傳初涼州刺史楊欣失羌戎之和隆陳其必敗俄而欣為虜所沒河西斷絶帝每有西顧之憂臨朝歎曰誰能為我討此虜通涼州者乎朝臣莫對隆進曰陛下若能任臣臣能平之帝曰必能滅賊何為不任顧卿方略何如耳隆曰陛下若能任臣當聽臣自任帝曰云何隆曰臣請募士三千人無問所從來率之鼓行而西稟陛下威德醜虜何足滅哉帝許之乃以隆為武威太守公卿僉曰六軍既衆州郡兵多但當用之不宜橫設賞募以亂常典隆小將妄說不可從也帝弗納隆募限腰引弩三十六鈞弓四鈞立標簡試自旦至中得三千五百人隆曰足矣因請自至武庫選杖武庫令與隆忿爭御史中丞奏劾隆隆曰臣當亡命戰場以報所受武庫令乃以魏時朽杖見給不可復用非陛下使臣滅賊意也帝從之晉石虔小字鎮惡有才幹趫捷絶倫從父在荊州於獵圍中見猛獸被數箭而伏諸督將素知其勇戲令拔箭石虔因急往拔得一箭猛獸跳石虔亦跳高於猛獸猛獸伏復拔一箭以歸從溫入關沖為符健所圍垂沒石虔躍馬赴之拔沖於數万衆之中而還莫敢抗者三軍歎息威震敵人時有患瘧疾者謂曰桓石虔來以怖之病者多愈其見畏如此晉蔡裔傳勇氣聲若雷震嘗有二偷入室裔拊牀一呼而盜俱隕故浩委以軍鋒焉晉吾彥傳初為小將給吳大司馬陸抗抗奇其勇略將拔用之患衆情不允乃會諸將密使人陽狂拔刀跳躍而來坐上諸將皆懼而走唯彥不動舉几禦之衆服其勇乃擢用焉箋證史記廉頗藺相如列傳太史公曰知死必勇非死者難也處死者難方藺相如引璧睨柱及叱秦王左右勢不過誅然士或怯懦而不敢發相如一奮其氣威信敵國索隱信音申退而讓頗名重太山其處智勇可謂兼之矣漢書樊噲傳項羽在戲下欲攻沛公沛公從百餘騎因項伯面見項羽謝無有閉關事項羽既饗軍士中酒張晏曰酒酣也師古曰飲酒之中也不醉不醒故謂之中亞父謀欲殺沛公令項莊拔劍舞坐中欲擊沛公項伯常屏蔽之時獨沛公與張良得入坐樊噲居營外聞事急乃持盾入初入營營衛止噲噲直撞入立帳下項羽目之問為誰張良曰沛公參乘樊噲也項羽曰壯士賜之巵酒彘肩噲既飲酒拔劍切肉食之項羽曰能復飲乎噲曰臣死且不辭豈特巵酒乎且沛公先入定咸陽暴師霸上以待大王大王今日至聽小人之言與沛公有隙臣恐天下解心疑大王也項羽默然沛公如廁麾噲去既出沛公留車騎獨騎馬噲等四人步從從山下走歸霸上軍而使張良謝項羽羽亦因遂已無誅沛公之心是日微樊噲奔入營譙讓項羽沛公幾殆師古曰微無也譙責也殆危也漢書蒯通傳數日通復說曰計誠知之而決弗敢行者百事之禍也故猛虎之猶與不如蜂蠆之致蠚師古曰與讀曰豫蠆蝎也蠚毒也蠆音丑界反蠚音呼各反孟賁之狐疑不如童子之必至師古曰孟賁古之勇力士賁音奔此言貴能行之也漢書灌夫傳灌夫字仲孺潁陰人也父張孟常為潁陰侯灌嬰舍人得幸因進之至二千石故蒙灌氏姓為灌孟吳楚反時潁陰侯灌嬰為將軍屬太尉請孟為校尉夫以千人與父俱孟年老潁陰侯彊請之鬱鬱不得意故戰常陷堅遂死吳軍中漢法父子俱有死事得與喪歸夫不肯隨喪歸奮曰願取吳王若將軍頭以報父仇於是夫被甲持戟募軍中壯士所善願從數十人及出壁門莫敢前獨兩人及從奴十餘騎馳入吳軍至戲下所殺傷數十人不得前復還走漢壁亡其奴獨與一騎歸夫身中大創十餘適有萬金良藥故得無死師古曰萬金者言其價貴也金字或作全言得之者必生全也創少瘳又復請將軍曰吾益知吳壁曲折請復往將軍壯而義之恐亡夫乃言太尉太尉召固止之吳軍破夫以此名聞天下晉書馬隆傳馬隆字孝興東平平陸人少而智勇好立名節泰始中將興伐吳之役下詔曰吳會未平宜得猛士以濟武功州舉隆才堪良將稍遷司馬督初涼州刺史楊欣失羌戎之和隆陳其必敗俄而欣為虜所沒河西斷絶帝每有西顧之憂臨朝而歎曰誰能為我討此虜通涼州者乎朝臣莫對隆進曰陛下若能任臣臣能平之帝曰必能滅賊何為不任顧卿方略何如耳隆曰陛下若能任臣當聽臣自任帝曰云何隆曰臣請募勇士三千人無問所從來率之鼓行而西稟陛下威德醜虜何足滅哉帝許之乃以隆為武威太守公卿僉曰六軍既衆州郡兵多但當用之不宜橫設賞募以亂常典隆小將妄說不可從也帝弗納隆募限腰引弩三十六鈞弓四鈞立標簡試自旦至中得三千五百人隆曰足矣因請自至武庫選杖武庫令與隆忿爭御史中丞奏劾隆隆曰臣當亡命戰場以報所受武庫令乃以魏時朽杖見給不可復用非陛下使臣滅賊意也帝從之晉書桓彝傳附孫桓石虔石虔小字鎮惡有才幹趫捷絶倫從父在荊州於獵圍中見猛獸被數箭而伏諸督將素知其勇戲令拔箭石虔用急往拔得一箭猛獸跳石虔亦跳高於獸身猛獸伏復拔一箭以歸從溫入關沖為苻健所圍垂沒石虔躍馬赴之拔沖於數萬衆之中而還莫敢抗者三軍歎息威震敵人時有患瘧疾者謂曰桓石虔來以怖之病者多愈其見畏如此晉書蔡裔傳蔡裔者有勇氣聲若雷震嘗有二偷入室裔拊牀一呼而盜俱隕故浩委以軍鋒焉晉書吾彥傳吾彥字士則吳郡吳人也出自寒微有文武才幹初為小將給吳大司馬陸抗抗奇其勇略將拔用之患衆情不允乃會諸將密使人陽狂拔刀跳躍而來坐上諸將皆懼而走唯彥不動舉几禦之衆服其勇乃擢用焉不仁第七前漢翟方進傳方進復奏立黨友曰立素行積為不善衆人所共知邪臣自結附託為黨庶幾立與政事欲穫其利今立斥逐就國所交結尤著者不宜備大臣為郡守按後將軍朱博巨鹿太守孫閎故光祿大夫陳咸與立交通厚善相與為腹心有背公死黨之信故相攀援死而後已皆內有不仁之性而外有雋材過絶人倫勇猛果敢處事不疑所居皆尚殘賊酷虐苛刻慘毒以立威而亡纖介愛利之風天下所共智愚者猶惑孔子曰人而不仁如禮何人而不仁如樂何言不仁之人亡所施用不仁而多材國之患也臣幸得備宰相不敢不盡死請免博閎咸歸故郡以銷姦雄之黨絶群邪之望奏可前漢王莽傳贊曰王莽始起多歲折節力行以要名譽宗族稱孝師友歸仁及其居位輔政成哀之際勤勞國家直道而行動見稱述豈所謂在家必聞在國必聞色取仁而行違者邪莽既不仁而有佞邪之材又乘四父歷世之權遭漢中微國統三絶而太后壽考為之宗主故得肆其姦雄以成篡盜之禍推是言之亦天時非人力之致矣餘見不仁之兵箋證漢書翟方進傳於是方進復奏立黨友曰立素行積為不善衆人所共知邪臣自結附託為黨庶幾立與政事欲獲其利師古曰與讀曰豫今立斥逐就國所交結尤著者不宜備大臣為郡守案後將軍朱博巨鹿太守孫閎故光祿大夫陳咸與立交通厚善相與為腹心有背公死黨之信欲相攀援死而後已皆內有不仁之性而外有材過絶人倫勇猛果敢處事不疑所居皆尚殘賊酷虐苛刻慘毒以立威而亡纖介愛利之風師古曰愛利謂仁愛而欲安利人也天下所共知愚者猶惑孔子曰人而不仁如禮何人而不仁如樂何言不仁之人亡所施用不仁而多材國之患也此三人皆內懷姦猾國之所患而深相與結信於貴戚姦臣此國家大憂大臣所宜沒身而爭也昔季孫行父有言曰見有善於君者愛之若孝子之養父母也見不善者誅之若鷹鸇之逐鳥爵也師古曰事見左傳行父魯卿季文子也鸇似鷂而小今謂之土鸇鸇音之然反翅翼雖傷不避也貴戚彊黨之衆誠難犯犯之衆敵並怨善惡相冒臣幸得備宰相不敢不盡死請免博閎咸歸故郡以銷姦雄之黨絶群邪之望奏可漢書王莽傳贊曰王莽始起外戚折節力行以要名譽宗族稱孝師友歸仁及其居位輔政成哀之際勤勞國家直道而行動見稱述豈所謂在家必聞在國必聞色取仁而行違者邪莽既不仁而有佞邪之材又乘四父歷世之權遭漢中微國統三絶而太后壽考為之宗主故得肆其姦慝以成篡盜之禍推是言之亦天時非人力之致矣
