body:
  text: 卷第七師臣第一史記齊世家呂尚窮困年老矣以漁釣奸周西伯西伯將出獵卜之曰所獲非龍非酈勑知反非虎非罷霸王之輔於是獵果遇太公於渭之陽與語大說曰自吾先君太公曰當有聖人適周周以興子真是邪吾太公望子久矣故號之曰太公望載與俱歸立為師史記燕世家燕昭王於破燕之後即位卑身厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕誠得賢士以共國以雪先王之恥孤之願也郭隗曰王必欲致士先從隗始況賢於隗者豈遠千里哉於是昭王為隗改策宮而師事之樂毅自魏往鄒衍自齊往劇辛自趙往士爭趨燕史記孫子傳忌進孫臏於威王威王問以兵法遂以為師前漢元帝紀初元二年冬詔曰國之將興尊師而重傅故前將軍望之傅朕八年道以經書其賜爵關內侯前漢董仲舒傅文王師用聖賢是以閎夭大顛散宜生等亦聚於朝廷前漢張安世傳詔曰朕微眇時故掖廷令張賀輔道朕修文學經術其封賀弟子侍中關內侯賀安世兄前漢張禹傳初元中立皇太子而博士鄭寬中以尚書授太子薦言禹善論語詔令禹授太子論語成帝即位召禹寬中皆以師賜爵關內侯領尚書事是時帝舅王鳳輔政傳權而上富於春秋謙讓方鄉經學禮重師傅而禹內不自安數病上書乞骸骨欲退避鳳上報曰朕以幼年執政萬機懼失其中君以道德為師故委國政君何疑而數乞骸骨君其固心致思總秉諸事無違朕意加賜黃金百斤禹惶恐復起視事前漢孔光傳元帝即位召霸以師賜爵關內侯食邑八百戶號褒成君後漢桓榮傳顯宗即位尊桓榮以師禮榮年踰八十數上書乞身輒加賞賜乘輿嘗幸大常府令榮坐東面設几杖會百官驃騎將軍東平王蒼以下及榮門生數百人天子親自執業每言輒田大師在是時執經生避位發難上謙曰大師在是也後漢儒林傳包咸傳遷大鴻臚每進見錫以几杖入屏不趨贊事不名經傳有疑輒遺小黃門就舍即問顯宗以咸有師傅恩而素清苦常特賞賜珍玩束帛奉祿增於諸卿咸皆散與諸生之貧者後漢張酺傳元和二年東巡守幸東郡引酺及門生并郡縣椽史並會庭中帝先備弟子之儀使酺講尚書一篇然後修君曰之禮晉王祥傳天子幸太學命祥為三老祥南面几杖以師道自居天子北面乞言祥陳明王聖帝君臣政化之要以訓之間者莫不砥礪晉賀循傳史臣曰循位登保傅朝望特降遂使鑾蹕降臨承明下拜雖西漢之恩崇張禹東都之禮重桓榮弗是過也以循行太子太傳循讓命太子親往拜焉晉徐邈傳時皇太子尚幼帝甚鍾心文武之選皆一時之俊以邈授太子經帝謂邈曰雖未勑以師禮相待然不以博士相遇也古之帝王受經必恭自魏晉以來多使微人教授號為博土不復尊以為師故帝有云晉元籍傳蔣濟辟之奏記曰昔子夏在於西河之上而文侯擁篲鄒子處於泰谷之陰而昭王陪乘夫布衣韋帶之士孤居特立王公大人所以禮下之者為道在也新唐王圭傳圭為魏王太師王見之為先拜圭亦以師自居餘見薦舉魏世家又見賓臣陳元傳箋證史記齊太公世家太公望呂尚者東海上人其先祖嘗為四嶽佐禹平水土甚有功虞夏之際封於呂或封於申姓姜氏夏商之時申呂或封枝庶子孫或為庶人尚其後苗裔也本姓姜氏從其封姓故曰呂尚呂尚蓋嘗窮困年老矣以魚釣奸周西伯正義奸音干說苑云呂望年七十釣于渭渚三日三夜魚無食者望即忿脫其衣冠上有農人者古之異人謂望曰子姑復釣必細其綸芳其餌徐徐而投無令魚駭望如其言初下得鮒次得鯉刺魚腹得書書文曰呂望封于齊望知其異西伯將出獵卜之曰所獲非龍非酈集解徐廣曰勑知反索隱餘本亦作螭字非虎非羆所獲霸王之輔於是周西伯獵果遇太公於渭之陽與語大說曰自吾先君太公曰當有聖人適周周以興子真是邪吾太公望子久矣故號之曰太公望載與俱歸立為師史記燕召公世家二年而燕人共立太子平是為燕昭王燕昭王於破燕之後即位卑身厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕孤極知燕小力少不足以報然誠得賢士以共國以雪先王之恥孤之願也先生視可者得身事之郭隗曰王必欲致士先從隗始况賢於隗者豈遠千里哉於是昭王為隗改築宮而師事之樂毅自魏往鄒衍自齊往劇辛自趙往士爭趨燕史記孫子列傳孫子武者齊人也正義魏武帝云孫子者齊人事於吳王闔閭為吳將作兵法十三篇孫武既死後百餘歲有孫臏臏生阿鄄之間臏亦孫武之後世子孫也孫臏嘗與龐涓俱學兵法龐涓既事魏得為惠王將軍而自以為能不及孫臏乃陰使召孫臏臏至龐涓恐其賢於己疾之則以法刑斷其兩足而黥之欲隱勿見齊使者如梁孫臏以刑徒陰見說齊使齊使以為奇竊載與之齊齊將田忌善而客待之於是忌進孫子於威王威王問兵法遂以為師漢書元帝紀初元二年冬詔曰國之將興尊師而重傅故前將軍望之傅朕八年道以經書厥功茂焉師古曰茂美也其賜爵關內侯食邑八百戶漢書董仲舒傳至於殷紂逆天暴物殺戮賢知殘賊百姓伯夷太公皆當世賢者隱處而不為臣守職之人皆奔走逃亡入於河海天下耗亂萬民不安師古曰耗不明也音莫報反故天下去殷而從周文王順天理物師用賢聖是以閎夭太顛散宜生等亦聚於朝廷漢書張湯傳附子張安世安世字子孺少以父任為郎初安世兄賀幸於衛太子太子敗賓客皆誅安世為賀上書得下蠶室師古曰謂腐刑也凡養蠶者欲其溫而早成故為密室蓄火以置之而新腐刑亦有中風之患須入密室乃得以全因呼為蠶室耳後為掖庭令而宣帝以皇曾孫收養掖庭賀內傷太子無辜而曾孫孤幼所以視養拊循恩甚密焉宣帝即位而賀已死上追思賀恩欲封其冢為恩德侯置守冢二百家安世深辭賀封又求損守冢戶數稍減至三十戶遂下詔曰其為故掖庭令張賀置守冢三十家上自處置其里明年復下詔曰朕微眇時故掖庭令張賀輔道朕修文學經術恩惠卓異厥功茂焉詩云無言不讎無德不報師古曰大雅抑之詩其封賀弟子侍中關內侯漢書張禹傳張禹字子文河內軹人也至禹父徙家蓮勺禹為兒數隨家至市喜觀於卜相者前久之頗曉其別蓍布卦意及禹壯至長安學從沛郡施讎受易初元中立皇太子而博士鄭寬中以尚書授太子薦言禹善論語詔令禹授太子論語成帝即位徵禹寬中皆以師賜爵關內侯寬中食邑八百戶禹六百戶拜為諸吏光祿大夫秩中二千石給事中領尚書事是時帝舅陽平侯王鳳為大將軍輔政專權而上富於春秋謙讓方鄉經學敬重師傅師古曰鄉讀曰嚮而禹與鳳並領尚書內不自安數病上書乞骸骨欲退避鳳上報曰朕以幼年執政萬機懼失其中君以道德為師故委國政君何疑而數乞骸骨忽忘雅素欲避流言師古曰雅素故也謂師傅故舊之恩朕無聞焉君其固心致思總秉諸事推以孳孳無違朕意加賜黃金百斤養牛上尊酒太官致餐侍醫視疾使者臨問師古曰侍醫侍天子之醫禹惶恐復起視事漢書孔光傳孔光字子夏孔子十四世之孫也孔子生伯魚鯉鯉生子思伋伋生子上帛宋祁曰帛禮記作白漢書作帛古字通用監本浙本同帛生子家求求生子真箕箕生子高穿穿生順順為魏相順生鮒鮒為陳涉博士死陳下鮒弟子襄為孝惠博士長沙太傅襄生忠忠生武及安國武生延年延年生霸字次儒霸生光焉安國延年皆以治尚書為武帝博士安國至臨淮太守霸亦治尚書事太傅夏侯勝昭帝末年為博士宣帝時為大中大夫以選授皇太子經遷詹事高密相是時諸侯王相在郡守上元帝即位徵霸以師賜爵關內侯食邑八百戶號褒成君後漢書桓榮傳桓榮字春卿沛郡龍亢人也少學長安習歐陽尚書事博士九江朱普貧窶無資字林曰窶空也常客傭以自給精力不倦十五年不窺家園至王莽篡位乃歸會朱普卒榮奔喪九江負土成墳因留教授徒衆數百人莽敗天下亂榮抱其經書與弟子逃匿山谷雖常飢困而講論不輟後復客授江淮間建武十九年年六十餘始辟大司徒府時顯宗始立為皇太子選求明經乃擢榮弟子豫章何湯為虎賁中郎將以尚書授太子世祖從容問湯本師為誰湯對曰事沛國桓榮帝即召榮令說尚書甚善之顯宗即位尊以師禮甚見親重拜二子為郎榮年踰八十自以衰老數上書乞身輒加賞賜乘輿嘗幸太常府令榮坐東面設几杖會百官驃騎將軍東平王蒼以下及榮門生數百人天子親自執業每言輒曰太師在是凍觀記曰時執經生避位發難上謙曰太師在是也後漢書儒林列傳包咸傳包咸字子良會稽曲阿人也少為諸生受業長安師事博士右師細君姓右師習魯詩論語王莽末去歸鄉里於東海界光武即位乃歸鄉里建武中入授皇太子論語又為其章句拜諫議大夫侍中右中郎將永平五年遷大鴻臚每進見錫以几杖入屏不趨贊事不名經傳有疑輒遣小黃門就舍即問顯宗以咸有師傅恩而素清苦常特賞賜珍玩束帛奉祿增於諸卿咸皆散與諸生之貧者病篤帝親輦駕臨視八年年七十一卒於官後漢書張酺傳張酺字孟侯汝南細陽人趙王張敖之後也敖父耳自楚降漢高祖封為趙王敖嗣後有罪廢為宣平侯敖子壽封細陽之池陽鄉後廢因家焉酺少從祖父充受尚書能傳其業東觀記曰充與光武同門學光武即位求問充充已死又事太常桓榮勤力不怠永平九年酺以尚書教授數講於御前及肅宗即位擢酺為侍中虎賁中郎將數月出為東郡太守元和二年東巡狩幸東郡引酺及門生并郡縣掾史並會庭中帝先備弟子之儀使酺講尚書一篇然後修君臣之禮晉書王祥傳王祥字休徵琅邪臨沂人漢諫議大夫吉之後也祖仁青州刺史父融公府辟不就祥性至孝早喪親繼母朱氏不慈數譖之由是失愛於父每使掃除牛下祥愈恭謹父母有疾衣不解帶湯藥必親嘗母常欲生魚時天寒冰凍祥解衣將剖冰求之冰忽自解雙鯉躍出持之而歸母又思黃雀炙復有黃雀數十飛入其幕復以供母鄉里驚嘆以為孝感所致焉漢末遭亂扶母攜弟覽避地廬江隱居三十餘年不應州郡之命徐州刺史呂虔檄為別駕祥年垂耳順固辭不受覽勸之為具車牛祥乃應召虔委以州事于時寇盜充斥祥率勵兵士頻討破之州界清靜政化大行時人歌之曰海沂之康實賴王祥邦國不空別駕之功舉秀才除溫令纍遷大司農高貴鄉公即位與定策功封關內侯拜光祿勳轉司隸校尉從討毌丘儉增邑四百戶遷太常封萬歲亭侯天子幸太學命祥為三老祥南面几杖以師道自居天子北面乞言祥陳明王聖帝君臣政化之要以訓之聞者莫不砥礪晉書顧榮紀瞻賀循楊方薛兼傳史臣曰元帝樹基淮海百度權輿夢想群材共康庶績循位登保傅朝望特隆遂使鑾蹕降臨承明下拜雖西漢之恩崇張禹東都之禮重桓榮弗是過也晉書儒林傳徐邈徐邈東莞姑幕人也祖澄之為州治中屬永嘉之亂遂與鄉人臧琨等率子弟并閭里士庶千餘家南渡江家於京口父藻都水使者邈姿性端雅勤行勵學博涉多聞以慎密自居及孝武帝始覽典籍招延儒學之士邈既東州儒素太傅謝安舉以應選年四十四始補中書舍人邈常詣東府遇衆賓沉湎引滿喧譁道子曰君時有暢不邈對曰邈陋巷書生惟以節儉清修為暢耳道子以邈業尚道素笑而不以為忤也道子將用為吏部郎邈以波競成俗非己所能節制苦辭乃止時皇太子尚幼帝甚鍾心文武之選皆一時之俊以邈為前衛率領本郡太中正授太子經帝謂邈曰雖未勑以師禮相待然不以博士相遇也古之帝王受經必敬自魏晉以來多使微人教授號為博士不復尊以為師故帝有云晉書阮籍傳阮籍字嗣宗陳留尉氏人也父瑀魏丞相掾知名於世籍容貌瓌傑志氣宏放傲然獨得任性不羈而喜怒不形於色或閉戶視書纍月不出或登臨山水經日忘歸博覽群籍尤好莊老嗜酒能嘯善彈琴當其得意忽忘形骸時人多謂之癡太尉蔣濟聞其有雋才而辟之籍詣都亭奏記曰伏惟明公以含一之德據上台之位英豪翹首俊賢抗足開府之日人人自以為掾屬辟書始下而下走為首昔子夏在於西河之上而文侯擁篲鄒子處於黍谷之陰而昭王陪乘夫布衣韋帶之士孤居特立王公大人所以禮下之者為道存也新唐書王圭傳時圭與玄齡李靖溫彥博戴胄魏徵同輔政帝以圭善人物且知言因謂曰卿標鑒通晤為朕言玄齡等材且自謂孰與諸子賢對曰孜孜奉國知無不為臣不如玄齡兼資文武出將入相臣不如靖敷奏詳明出納惟允臣不如彥博濟繁治劇衆務必舉臣不如胄以諫諍為心恥君不及堯舜臣不如胄至激濁揚清疾惡好善臣於數子有一日之長帝稱善而玄齡等亦以為盡己所長謂之確論進封郡公坐漏禁近語左除同州刺史帝念名臣俄召拜禮部尚書兼魏王泰師王見之為先拜圭亦以師自居賓臣第二史記宋微子世家武王乃封箕子於朝鮮而不臣也前漢枚乘傳景帝召拜乘為洪農都尉乘久為大國上賓與英俊並游後漢陳元傳元士疏曰臣聞師臣者帝賓臣者霸故武王以太公為師齊桓以夷吾為仲父後漢楊彪傳魏文帝受禪欲以彪為太尉先遣使示旨彪辭曰彪備漢三公遭世傾亂不能有所補益耄年被病豈可贊惟新之朝遂固辭乃授光祿大夫賜几杖衣袍因朝會引見令彪著布單衣鹿皮冠杖而入待以賓客之禮新唐姜皎傳皎為少監出入臥內呼之不名也議者譏短皎任遇太過帝下詔曰楚國公皎往事朕於藩邸雖彭祖同書子陵共學不過也新唐姚崇傳帝每詔五日以參入閣供奉以疾不拜箋證史記宋微子世家微子開者集解孔安國曰微畿內國名子爵也為紂卿士索隱按尚書微子之命篇云命微子啓代殷後今此名開者避漢景帝諱也殷帝乙之首子而紂之庶兄也周武王伐紂克殷微子乃持其祭器造於軍門肉袒面縛左牽羊右把茅膝行而前以告於是武王乃釋微子復其位如故武王既克殷訪問箕子於是武王乃封箕子於朝鮮而不臣也漢書枚乘傳景帝即位御史大夫鼂錯為漢定制度損削諸侯吳王遂與六國謀反舉兵西鄉師古曰鄉讀曰嚮以誅錯為名漢聞之斬錯以謝諸侯枚乘復說吳王吳王不用乘策卒見禽滅漢既平七國乘由是知名景帝召拜乘為弘農都尉乘久為大國上賓與英俊並游得其所好不樂郡吏以病去官後漢書陳元傳陳元字長孫蒼梧廣信人也廣信故城在今梧州蒼梧縣父欽習左氏春秋事黎陽賈護與劉歆同時而別自名家王莽從欽受左氏學以欽為猒難將軍猒一葉反元少傳父業為之訓詁鋭精覃思至不與鄉里通以父任為郎建武初元與桓談杜林鄭興俱為學者所宗元以才高著名辟司空李通府時大司農江馮上言宜令司隸校尉督察三公事下三府元上疏曰臣聞師臣者帝賓臣者霸言以臣為師以臣為賓也故武王以太公為師齊桓以夷吾為仲父後漢書楊震傳附楊彪彪字文先少傳家學初舉孝廉州舉茂才辟公府皆不應熹平中以博習舊聞公車徵拜議郎華嶠書曰與馬日磾盧植蔡雍等著作東觀遷侍中京兆尹中平六年代董卓為司空其冬代為琬為司徒彪見漢祚將終遂稱腳攣不復行積十年後子修為曹操所殺操見彪問曰公何瘦之甚對曰愧無日磾先見之明猶懷老牛舐犢之愛前書曰金日磾子二人武帝所愛以為弄兒其後弄兒壯大不謹自殿下與人戲日磾適見之惡其淫亂遂殺弄兒及魏文帝受禪欲以彪為太尉先遣吏示旨彪辭曰彪備漢三公遭世傾亂不能有所補益耄年被病豈可贊惟新之朝遂固辭乃授光祿大夫賜几杖衣袍續漢書曰魏文帝詔曰先王制几杖之賜所以賓禮黃耇太尉楊彪乃祖以來世著名績其賜公延年杖延請之日便使杖入也因朝會引見令彪著布單衣鹿皮冠杖而入待以賓客之禮年八十四黃初六年卒于家自震至彪四世太尉德業相繼與袁氏俱為東京名族云新唐書姜謨傳附曾孫姜皎皎長安中為尚衣奉御玄宗在藩邸皎識其有非常度委心焉及即位自潤州長史召授殿中少監出入臥內陪燕私詔許捨敬坐與妃嬪連榻間擊毬鬭雞呼之不名也賜宮女廄馬及它珍物前後不勝計帝在殿廷玩一嘉樹皎盛贊之帝遽令徙植其家後將誅竇懷貞等皎與密議以功進殿中監楚國公食封四百戶議者譏短皎任遇太過帝以其藩邸舊思有以宣布之乃下詔曰殿中監楚國公皎往事朕於藩國雖彭祖同書子陵共學不過也又舊唐書姜謨傳附曾孫姜皎皎長安中纍遷尚衣奉御時玄宗在藩見而悅之皎察玄宗有非常之度尤委心焉尋出為潤州長史玄宗即位召拜殿中少監數召入臥內命之捨敬坐侍宴私與后妃連榻間以擊毬鬭雞常呼之為姜七而不名也兼賜以宮女名馬及諸珍物不可勝數玄宗又嘗與皎在殿庭玩一嘉樹皎稱其美玄宗遽令徙植於其家其寵遇如此及竇懷貞等潛謀逆亂玄宗將討之皎協贊謀議以功拜殿中監封楚國公實封四百戶玄宗以皎在藩之舊皎又有先見之明欲宣布其事乃下勑曰新唐書姚崇傳姚崇字元之陜州硤石人父懿字善懿貞觀中為嶲州都督贈幽州大都督諡文獻崇少倜儻尚氣節長乃好學帝以問崇對曰臣聞隋取苻堅故殿以營廟而唐因之且山有朽壞乃崩况木積年而木自當蠹乎但壞與行會不緣行而壞且陛下以關中無年輸餉告勞因以幸東都所以為人不為己也帝曰卿言正契朕意賜絹二百匹詔所司如崇言天子遂東因詔五日一參入閣供奉八年授太子少保以疾不拜明年卒年七十二贈揚州大都督諡曰文獻君下臣第三前漢張禹傳每病車駕自臨問之上親拜禹床下禹頊首謝恩後漢鄭均傳均乞骸骨帝東巡乃幸均舍勑賜尚書祿以終其身時人號為白衣尚書蜀諸葛亮傳上疏曰臣本布衣躬耕於南陽苟全性命於亂世不求聞達於諸侯先帝猥自枉屈三顧臣於草廬之中諸臣以當世之事晉皇甫謐傳若殷湯之於伊尹文王之於大公或身即莘野或就載以歸惟恐禮之不重新唐竇軌傳軌弟琮與秦王有憾不自安王方收天下豪英降禮接之與出入臥內琮意乃釋五箋證漢書張禹傳禹年老自治冢塋起祠室好平陵肥牛亭部處地師古曰肥牛亭名欲得置亭處之地為冢塋又近延陵奏請求之上以賜禹詔令平陵徙亭它所曲陽侯根聞而爭之此地當平陵寢廟衣冠所出游道禹為師傅不遵謙讓至求衣冠所游之道又徙壞舊亭重非所宜孔子稱賜愛其羊我愛其禮師古曰論語云子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮故引之宜更賜禹它地根雖為舅上敬重之不如禹根言雖切猶不見從卒以肥牛亭地賜禹根由是害禹寵數毀惡之天子愈益敬厚禹禹每病輒以起居聞師古曰謂其食飲寢臥之增損車駕自臨問之上親拜禹牀下禹頓首謝恩歸誠宋祁曰恩字下當有因字後漢書鄭均傳鄭均字仲虞東平任城人也少好黃老書兄為縣吏頗受禮遺均數諫止不聽則脫身為傭歲餘得錢帛歸以與兄曰物盡可復得為吏坐臧終身捐棄兄感其言遂為廉潔建初三年司徒鮑昱辟之後舉直言並不詣六年公車特徵再遷尚書數納忠言肅宗敬重之後以病乞骸骨拜議郎告歸因稱病篤帝賜以衣冠元和元年詔告廬江太守東平相曰以毛義廬江人鄭均東平人故告二郡守相也議郎鄭均束修安貧恭儉節整前在機密以病致仕守善貞固黃髮不怠又前安邑令毛義躬履遜讓比徵辭病淳潔之風東州稱仁書不云乎章厥有常吉哉章明也吉善也言為天子當明顯其有常德者優其稟餼則政之善也尚書咎繇謨之言其賜均義榖各千斛常以八月長吏存問賜羊酒顯茲異行東觀記曰賜羊一頭酒二斗終其身問遺賢良必以八月諸物老成故順其時氣助養育之也故月令仲秋之月養衰老授几杖行糜粥飲食鄭玄注云助老氣也明年帝東巡過任城乃幸均舍勑賜尚書祿以終其身時人號為白衣尚書永元中卒于家卷五十七案文中注所謂咎繇謨即尚書罪陶謨三國志蜀志諸葛亮傳五年率諸軍北駐漢中臨發上疏曰臣本布衣躬耕於南陽苟全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之事晉書皇甫謐傳皇甫謐字士安幼名靜安定朝那人漢太尉嵩之曾孫也出後叔父徙居新安年二十不好學游蕩無度或以為癡嘗得瓜果輒進所後叔母任氏任氏曰孝經云三牲之養猶為不孝汝今年餘二十目不存教心不入道無以慰我因歎曰昔孟母三徙以成仁曾父烹豕以存教豈我居不擇鄰教有所闕何爾魯鈍之甚也修身篤學自汝得之於我何有因對之流涕謐乃感激就鄉人席坦受書勤力不怠居貧躬自稼穡帶經而農遂博綜典籍百家之言沉靜寡欲始有高尚之志以著述為務自號玄晏先生舉賢良方正並不起自表就帝借書帝送一車書與之謐雖羸疾而披閲不怠初服寒食散而性與之忤每委頓不倫嘗悲恚叩刃欲自殺叔母諫之而止濟陰太守蜀人文立表以命士有贄為煩請絶其禮幣詔從之謐聞而歎曰亡國之大夫不可與圖存而以革歷代之制其可乎夫束帛戔戔易之明義玄纁之贄自古之舊也故孔子稱夙夜強學以待問席上之珍以待聘士於是乎三揖乃進明致之難也一讓而退明去之易也若殷湯之於伊尹文王之於太公或身即莘野或就載以歸唯恐禮之不重豈吝其煩費哉新唐書竇威傳附竇軌軌弟琮有武幹大業末犯法亡命太原依高祖與秦王有憾不自安王方收天下豪英降禮接之與出入臥內琮意乃釋尊顯其臣第四後漢來歙傳光武置酒高曾勞賜歙班坐絶席在諸將之右後漢王常傳光武封王常為橫野大將軍位次與諸將絶帝絶席謂尊顯之也漢官儀曰御史大夫尚書令司隸校尉皆專席號三獨坐後漢宣秉傳秉拜中丞詔御史中丞與司隸校尉尚書令會同並專席而坐故京師號三獨坐後漢祭茂傳郭賀拜荊州剌史有殊政顯宗巡守賜以三公之服黼黻冕旒勑行部去襜帷使百姓見其容服以章有德每所經行吏人指以相示莫不榮之新唐裴寂傳唐公即位曰使我至此者公也拜尚書右僕射視朝必引與同座言無不從呼為裴監不名也新唐房玄齡傳玄齡晚節多病許肩輿上殿新唐韋挺傳挺為總管許以便宜帝親解貂裘及中廄烏賜之箋證後漢書來歙傳來歙字君叔南陽新野人也六世祖漢有才力武帝世以光祿大夫副樓船將軍楊僕擊破南越朝鮮父仲東觀記仲作冲哀帝時為諫大夫娶光武祖姑生歙光武甚親敬之八年春歙與征虜將軍祭遵襲略陽遵道病還分精兵隨歙合二千餘人伐山開道從番須回中番須回中並地名也番音盤武帝元封四年幸雍通回中道前書音義曰回中在汧汧今隴州汧源縣也徑至略陽斬囂守將金梁因保其城囂大驚曰何其神也乃悉兵數萬人圍略陽斬山築堤激水灌城歙與將士固死堅守矢盡乃發屋斷木以為兵囂盡鋭攻之自春至秋其士卒疲弊帝乃大發關東兵自將上隴囂衆潰走圍解於是置酒高會勞賜歙班坐絶席在諸將之右賜歙妻縑千匹後漢書王常傳王常字顏卿潁川舞陽人也王莽末為弟報仇亡命江夏建武二年夏常將妻子詣洛陽肉袒自歸光武見常甚歡勞之六年春徵還洛陽令夫人迎常於舞陽歸家上冢西屯長安拒隗囂七年使使者持璽書即拜常為橫野大將軍位次與諸將絶席絶席謂尊顯之也漢官儀曰御史大夫尚書令司隸校尉皆專席號三獨坐後漢書宣秉傳宣秉字巨公馮翊雲陽人也少修高節顯名三輔哀平際見王氏據權專政侵削宗室有逆亂萌遂隱遁深山州郡連召常稱疾不仕王莽為宰衡辟命不應周公為太宰伊尹為阿衡莽欲兼之故以為號及莽篡位又遣使者徵之秉固稱疾病更始即位徵為侍中建武元年拜御史中丞前書曰御史中丞秦官秩千石在殿中蘭臺掌圖籍祕書外督部刺史內領侍御史糾察百僚光武特詔御史中丞與司隸校尉尚書令會同並專席而坐故京師號曰三獨坐明年遷司隸校尉務舉大綱簡略苛細百僚敬之後漢書蔡茂傳附郭賀賀字喬卿雒陽人祖父堅伯父游君並修清節不仕王莽賀能明法纍官建武中為尚書令在職六年曉習故事多所匡益拜荊州刺史引見賞賜恩寵隆異及到官有殊政百姓便之歌曰厥德仁明郭喬卿忠正朝廷上下平顯宗巡狩至南陽特見嗟歎賜以三公之服黼黻冕旒三公服袞冕黼若斧形黻若兩已相背冕以木為之衣以帛玄上纁下廣八寸長尺六寸旒謂冕前後所垂玉也天子十二旒上公九旒勑行部去襜帷使百姓見其容服以章有德每所經過吏人指以相示莫不榮之新唐書裴寂傳裴寂字玄真蒲州桑泉人幼孤兄鞠之年十四補郡主簿及長偉容貌涉知書傳隋開皇中調左親衛家貧徒步走京師過華山祠祈神自卜夜夢老人謂曰君年踰四十當貴大業中為齊州司戶參軍歷侍御史晉陽宮副監唐公雅與厚及留守太原契分愈密唐公即位曰使我至此者公也拜尚書右僕射賜服玩不資詔尚食日給御膳視朝必引與同坐入閣則延臥內言無不從呼為裴監不名也貴震當世新唐書房玄齡傳晉王為皇太子改太子太傅知門下省事固辭太子太傅見聽晚節多病時帝幸玉華宮詔玄齡居守聽臥治事稍棘召許肩輿入殿帝視流涕玄齡亦感咽不自勝新唐書韋挺傳韋挺京兆萬年人父沖仕隋為民部尚書挺少與隱太子善高祖平京師署隴西公府祭酒纍遷太子左衛驃騎檢校左衛貞觀初王圭數薦之遷尚書右丞歷吏部黃門侍郎拜御史大夫扶陽縣男帝將討遼東擇主餉運者周言挺才任粗使帝謂然挺父故為營州總管嘗經略高麗故札藏家挺上之帝悅曰自幽距遼二千里無州縣吾軍靡所仰食卿為朕圖之苟吾軍用不乏是公之功其自擇文武官四品十人為子使取幽易平三州鋭士若馬各三百以從即詔河北列州皆取挺節度許以便宜帝親解貂裘及中廄馬賜之咨訪老臣第五前漢董仲舒傳去位在家著書為事朝廷如有大議使使者及廷尉張湯就其家而問之其對皆有明法前漢趙充國傳乞骸骨賜安車駟馬黃金罷就弟每有四夷大議常與參兵謀問籌策焉後漢左雄議改察舉之制廣上書駮之曰國有大政必議之於前訓咨之於故老是以慮無失策舉無過事晉刑法志故膠東相董仲舒老病致仕朝廷每有政議數遣廷尉張湯親至陋巷問其得失於是作春秋折獄二百三十二事動以經對言之詳矣晉王祥傳武帝踐阼進爵為公帝新受命虛己以求讜言祥與何曾鄭沖等耆艾希復朝見帝遣侍中任愷咨問得失及政化所先晉鄭沖傳詔曰古之哲王欽祗國老憲行乞言以彌縫其闕若朝有大政皆就咨之新唐宋璟傳明皇東巡守將發謂璟曰卿國元老別方歷時宜有嘉謀以遺朕箋證漢書董仲舒傳及去位歸居終不問家産業以修學著書為事仲舒在家朝廷如有大議宋祁曰古本無如字使使者及廷尉張湯就其家而問之其對皆有明法漢書趙充國傳趙充國字翁孫隴西上邽人也後徙金城令居始為騎士以六郡良家子善騎射補羽林為人沈勇有大略少好將帥之節而學兵法通知四夷事初破羌將軍武賢在軍中時與中郎將卬宴語師古曰間宴時共語也卬道車騎將軍張安世始嘗不快上如淳曰所為行不可上意上欲誅之卬家將軍以為安世本持橐簪筆張晏曰橐契囊也近臣負橐簪筆從備顧問或有所紀也師古曰橐所以盛書也有底曰囊無底曰橐簪筆者插筆於首事孝武帝數十年見謂忠謹宜全度之安世用是得免充國乞骸骨賜安車駟馬黃金六十斤罷就第朝庭每有四夷大議常與參兵謀問籌策焉宋祁曰庭改作廷後漢書胡廣傳胡廣字伯始南郡華容人也少孤貧親執家苦襄陽耆舊記廣父名寵寵妻生廣早卒寵更娶江陵黃氏生康字仲始順帝欲立皇后而貴人有寵者四人莫知所建議欲探籌以神定選廣與尚書郭虔史敞上疏諫時尚書令左雄議改察舉之制限年四十以上儒者試經學文吏試章奏廣復與敞虔上書駮之曰臣聞君以兼覽博照為德即明四目達四聰也臣以獻可替否為忠左傳曰齊晏子曰君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否書載稽疑謀及卿士稽考也考正疑事謀及卿士見尚書詩美先人詢于芻蕘詩大雅曰先人有言詢于芻蕘注云詢謀也芻蕘薪采者也言有疑事嘗與薪采者謀之也國有大政必議之於前訓咨之於故老叔向曰國有大事必順於典刑訪於耇老而後行之是以慮無失策舉無過事晉書刑法志永元六年寵又代郭躬為廷尉復校律令刑法溢於甫刑者奏除之曰獻帝建安元年應劭又刪定律令以為漢議表奏之曰夫國之大事莫尚載籍載籍也者決嫌疑明是非賞刑之宜允執厥中俾後之人永有鑒焉故膠東相董仲舒老病致仕朝廷每有政議數遣廷尉張湯親至陋巷問其得失於是作春秋折獄二百三十二事動以經對言之詳矣晉書王祥傳武帝踐祚拜太保進爵為公加置七官之職帝新受命虛己以求讜言祥與何曾鄭沖等耆艾篤老希復朝見帝遣侍中任愷咨問得失及政化所先晉書鄭沖傳鄭沖字文和滎陽開封人也起自寒微卓爾立操清恬寡欲耽玩經史遂博究儒術及百家之言有姿望動必存禮任真自守不要鄉曲之譽由是州郡久不加禮及魏文帝為太子搜揚側陋命沖為文學纍遷尚書郎出補陳留太守沖以儒雅為德蒞職無幹局之譽簞食縕袍不營資産世以此重之大將軍曹爽引為從事中郎轉散騎常侍光祿勳嘉平三年拜司空及高貴鄉公即位拜太保位在三司之上封壽光侯武帝踐祚拜太傅進爵為公九年沖又抗表致仕詔曰太傅韞德深粹履行高潔恬遠清虛確然絶世公宜頤精養神保衛太和以究遐福其賜几杖不朝古之哲王欽祗國老憲行乞言以彌縫其闕若朝有大政皆就咨之新唐書宋璟傳宋璟邢州南和人元宗開元初以雍州為京兆府復為尹進御史大夫坐小纍為睦州刺史徙廣州都督廣人以竹茅茨屋多火璟教之陶瓦築堵列邸肆越俗始知棟梁利而無患災召拜刑部尚書四年遷吏部兼侍中纍封廣平郡公後以開府儀同三司罷政事十二年東巡泰山璟復為留守帝將發謂曰卿國元老別方歷時宜有嘉謀以遺朕委任大臣第六前漢高祖曰運籌帷幄之中決勝千里之外吾不如子房鎮國家撫百姓給餽餉不絶糧道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三者皆人傑吾能用之此吾所以取天下者也前漢昭帝紀贊曰昔周成以孺子繼統而有管蔡四國流言之變孝昭幼年即位亦有燕盍上官逆亂之謀成王不疑周公孝昭委任霍光各因其時以成名大矣哉前漢霍光傅昭帝既冠遂委任光訖十三年百姓充實四夷賓服後漢蔡雍傳雍對曰廷尉郭禧純厚老成故大尉劉寵忠實守正並宜為謀主數見訪問夫宰相大臣君之四體委任責成優劣已分不宜聽納小吏雕琢大臣雕琢猶鐫削以成其罪也後漢梁商傳自以戚屬居大位每存謙柔虛己進賢辟巨覽陳龜為掾屬李固周舉為從事中郎於是京師翕然稱為良輔帝委重焉蜀費褘傳褘當國功名略與琬比十一年出住漢中自琬及禕雖自身在外慶賞威刑皆遙先咨斷然後乃行其推任如此晉任愷傳晉國建為侍中愷有經國之幹萬小大多總管之性忠正以社稷為己任帝器而昵之政事多咨焉新唐杜如晦傳如晦與房喬共管朝政天下新定臺閣制度憲物容典率二人討裁新唐竇靜傳初平頡利詔處其衆河南下詔曰北方之務悉以相委以卿為寧朔大使朕無北顧憂矣新唐房玄齡傳太宗徇渭北杖策上謁軍門一見如故封臨淄侯征伐未嘗不從高祖曰若人機識是宜委任每謂五兒陳事千里外猶面對語新唐房玄齡傳帝伐遼東以玄齡守京師詔曰公當蕭何之任朕無西顧憂矣新唐魏徵傳鄭公多病辭職帝曰公獨不見金在礦何足貴耶善冶煆而為器人乃寶之朕方自比於金以卿為良匠而加礪焉新唐韋挻傳挺為總管帝曰自幽拒遼二千里吾軍無所仰食卿為朕圖之許以便宜新唐蕭瑀傳高祖委以樞管內外百務呼曰蕭郎瑀自力孜孜抑過繩違無所憚餘見中興之主憲宗箋證漢書高帝紀帝置酒雒陽南宮上曰通侯諸將應劭曰舊曰徹侯避武帝諱曰通侯通亦徹也通者言其功德通於王室也張晏曰後改為列侯列者見序列也毋敢隱朕皆言其情吾所以有天下者何項氏之所以失天下者何高起王陵對曰張晏曰詔使高官者起故陵先對孟康曰姓高名起臣瓚曰漢帝年紀高帝時有信平侯臣陵都武侯臣起魏相邴吉奏高帝時奏事有將軍臣陵臣起師古曰張說非也若言高官者起則丞相蕭何太尉盧綰及張良陳平之屬時皆在陵上陵不得先對也陛下嫚而侮人項羽仁而敬人然陛下使人攻城略地所降下者因以與之與天下同利也項羽妬賢嫉能有功者害之賢者疑之戰勝而不與人功得地而不與人利此其所以失天下也上曰公知其一未知其二夫運籌帷幄之中決勝千里之外吾不如子房填國家撫百姓給餉餽不絶糧道吾不如蕭何師古曰填與鎮同鎮安也餽亦饋字連百萬之衆戰必勝攻必取吾不如韓信三者皆人傑吾能用之此吾所以取天下者也漢書昭帝紀孝昭皇帝武帝少子也母曰趙倢妤本以有奇異得幸及生帝亦奇異武帝末戾太子敗燕王旦廣陵王胥行驕嫚後元二年劉攽曰檢前後文多元字二月上疾病遂立昭帝為太子年八歲以侍中奉車都尉霍光為大司馬大將軍受遺詔輔少主明日武帝崩戊辰太子即皇帝位贊曰昔周成以孺子繼統而有管蔡四國流言之變孝昭幼年即位亦有燕蓋上官逆亂之謀成王不疑周公孝昭委任霍光各因其時以成名大矣哉漢書霍光傳燕王旦自以昭帝兄常懷怨望及御史大夫桑弘羊建造酒榷鹽鐵為國興利伐其功師古曰伐矜也欲為子弟得官亦怨恨光於是蓋主上官桀安及弘羊皆與燕王旦通謀光聞之止畫室中不入如淳曰近臣所止計畫之室也或曰雕畫之室也師古曰雕畫是也上問大將軍安在左將軍桀對曰以燕王告其罪故不敢入有詔召大將軍光入免冠頓首謝上曰將軍冠朕知是書詐也將軍亡罪是時帝年十四尚書左右皆驚而上書者果亡捕之甚急桀等懼白上小事不足遂上不聽後桀黨與有譖光者上輒怒曰大將軍忠臣先帝所屬以輔朕身敢有毀者坐之自是桀等不敢復言乃謀令長公主置酒請光伏兵格殺之因廢帝迎立燕王為天子事發覺光盡誅桀安弘羊外人宗族燕王蓋主皆自殺光威震海內昭帝既冠遂委任光訖十三年百姓充實四夷賓服卷六十八後漢書蔡雍傳蔡雍字伯喈陳留圉人也雍性篤孝母常滯病三年雍自非寒暑節變未嘗解襟帶不寢寐者十旬母卒廬于冢側動靜以禮光和元年遂置鴻都門學時妖異數見人相驚擾其年七月詔召雍與光祿大夫楊賜諫議大夫馬日磾議郎張華太史令單揚詣金商門引入崇德殿洛陽記曰南宮有崇德殿太極殿西有金商門也使中常侍曹節王甫就問災異及消改變故所宜施行雍悉心以對事又特詔問曰比災變互生未知厥咎以雍經學深奧故密特稽問宜披露失得指陳政要勿有依違自生疑諱具對經術以皂囊封上漢官儀曰凡章表皆啓封其言密事得皂囊也雍對曰伏見廷尉郭禧純厚老成光祿大夫橋玄聰達方直故太尉劉寵忠實守正並宜為謀主數見訪問夫宰相大臣君之四體謂股肱也委任責成優劣已分不宜聽納小吏雕琢大臣也雕琢猶鐫削以成其罪也後漢書梁統傳附曾孫商商字伯夏雍之子也少以外戚拜郎中遷黃門侍郎永建元年襲父封乘氏侯三年順帝選商女及妹入掖庭遷侍中屯騎校尉陽嘉元年女立為皇后妹為貴人加商位特進更增國土賜安車駟馬其歲拜執金吾商自以戚屬居大位每存謙柔虛己進賢辟漢陽巨覽上黨陳龜為掾屬李固周舉為從事中郎於是京師翕然稱為良輔帝委重焉東觀漢記商少持韓詩兼讀衆書傳記天資聰敏昭達萬情舉措動作直推雅性務在誠實不為華飾孝友著於閭閾明信結於友朋其在朝廷儼恪矜嚴威而不猛退食私館接賓待客寬和肅敬憂人之憂樂人之樂皆若在己輕財貨不為畜積朝廷由是敬憚委任焉三國志蜀志費褘傳費褘字文偉江夏鄳人也鄳音盲少孤依族父伯仁伯仁姑益州牧劉璋之母也璋遣使迎仁仁將褘遊學入蜀會先主定蜀褘遂留益土與汝南許叔龍南郡董允齊名先主立太子褘與允俱為舍人遷庶子後主踐位為黃門侍郎吳建興八年轉為中護軍後又為司馬亮卒褘為後軍師頃之代蔣琬為尚書令褘當國功名略與琬比褘別傳曰褘雅性謙素家不積財兒子皆令布衣素食出入不從車騎無異凡人十一年出住漢中自琬及褘雖自身在外慶賞威刑皆遙先咨斷然後乃行其推任如此晉書任愷傳任愷字元褒樂安博昌人也父昊魏太常愷少有識量尚魏明帝女纍遷中書侍郎員外散騎常侍晉國建為侍中封昌國縣侯愷有經國之幹萬幾大小多管綜之性忠正以社稷為己任帝器而昵之政事多咨焉新唐書杜如晦傳高祖平京師秦王引為府兵曹參軍徙陜州總管府長史王為皇太子授左庶子遷兵部尚書進封蔡國公食三千戶別食益州千三百戶俄檢校侍中攝吏部尚書總監東宮兵進位尚書右僕射仍領選與玄齡共管朝政時天下新定臺閣制度憲物容典率二人討裁新唐書竇靜傳靜字元休在隋佐親衛以父得罪煬帝久不之進高祖入京師擢并州大總管府長史太宗即位授司農卿封信都縣男及禽頡利詔處其衆河南靜上書曰夷狄窮則搏噬飽則群聚不可以刑法繩仁義教也衣食仰給不恃耕桑今損有為之民資無知之虜得之無益於治失之不害於化帝雖不從然嘉其忠優詔答曰北方之務悉以相委以卿為寧朔大使朕無北顧憂矣新唐書房玄齡傳太宗以燉煌公徇渭北杖策上謁軍門一見如舊署渭北道行軍記室參軍公為秦王即授府記室封臨淄侯征伐未嘗不從衆爭取怪珍玄齡獨收人物致幕府與諸將密相申結人人願盡死力王嘗曰漢光武得鄧禹門人益親今我有玄齡猶禹也高祖曰若人機識是宜委任每為吾兒陳事千里外猶對面語新唐書房玄齡傳晉王為皇太子改太子太傅知門下省事以母喪賜塋昭陵園起復其官會伐遼留守京師詔曰公當蕭何之任朕無西顧憂矣新唐書魏徵傳徵不素習法但存大體處事以情人人悅服進左光祿大夫鄭國公多病辭職帝曰公獨不見金在礦何足貴耶善冶煆而為器人皆寶之朕方自比於金以卿為良匠而加礪焉新唐書韋挺傳初挺為大夫時馬周為監察御史挺不甚禮及周為中書令帝欲湔拭用之周言挺佷于自用非宰相器遂止帝將討遼東擇主餉運者周言挺才任粗使帝謂然挺父故為營州總管嘗經略高麗故札藏家挺上之帝悅曰自幽距遼二千里無州縣吾軍靡所仰食卿為朕圖之即詔河北列州皆取挺節度許以便宜新唐書蕭瑀傳秦王領右元帥攻洛陽署瑀府司馬武德元年遷內史令帝委以樞管內外百務悉關決或引升御榻呼曰蕭郎瑀自力孜孜抑過繩違無所憚不委任大臣第七前漢高祖曰項羽有一范增而不能用此所以為我擒也新唐裴度傳出度山南道節度使奪平章事韋處厚上疏曰臣聞汲黯在朝淮南寢謀干木處魏諸侯息兵王霸之理以一士止百万之師一賢制千里之難裴度元勳巨德文武兼備陛下當饋而歎恨無蕭曹今一裴度擯棄于外所以馮唐知漢文帝有頗牧不能用也新唐李漢傳寶曆中王政日僻漢與同列薛廷老因廷奏曰近曰除授不由中書擬議多是宣出施行臣恐自此紀綱大壞姦邪恣行願陛下各勑有司稍存典故新唐周上疏曰臣伏見詔宗室功臣悉就藩國云云漢光武不任功臣以吏事所以終全其世者良得其術也云箋證漢書高帝紀上曰公知其一未知其二項羽有一范增而不能用此所以為我禽也新唐書裴度傳裴度字中立河東聞喜人貞元初擢進士第以宏辭補校書郎舉賢良方正異等調河內尉遷監察御史論權嬖梗切出為河南功曹參軍武元衡帥西川表掌節度府書記召為起居舍人度數請到內殿求立太子翼日乃見帝遂立景王為嗣逢吉既代相乃出度山南西道節度使奪平章事長慶四年王庭湊屠元翼之家敬宗羞惋歎宰輔非其人使凶賊熾肆學士韋處厚上疏曰臣聞汲黯在朝淮南寢謀干木處魏諸侯息兵王霸之理以一士止百萬之師一賢制千里之難裴度元勳巨德文武兼備若位巖廟委參決必使戎虜畏威幽鎮自臣管仲曰人離而聽之則愚合而聽之則聖治亂之本非有他術陛下當饋而歎恨無蕭曹今一裴度擯棄于外所以馮唐知漢文帝有頗牧不能用也新唐書薛廷老傳廷老字商叟及進士第讜正有父風寶歷中為右拾遺敬宗政日僻嘗與舒元褒李漢入閣論奏曰比除拜不由宰司擬進恐綱紀寖壞姦邪放肆帝厲語曰更論何事元褒曰宮中興作太甚帝色變曰興作何所元褒不能對廷老曰臣等以諫為職有聞即應論奏舊唐書李漢傳李漢字南紀宗室淮陽王道明之後道明生景融景融生務該務該生思思生岌岌已上無名位至岌為蜀州晉原尉岌生荊為陜州司馬荊生漢漢元和七年登進士第纍辟使府長慶末為左拾遺敬宗好治宮室波斯賈人李蘇沙獻沈香亭子材漢上疏論之曰若以沈香為亭子即與瑤臺瓊室事同寶歷中王政日僻漢與同列薛延老因入閣廷奏曰近日除授不由中書擬議多是宣出施行臣恐自此紀綱大壞姦邪恣行願陛下各勑有司稍存典故新唐書馬周傳馬周字賓王博州茌平人少孤家窶狹嗜學善詩春秋資曠邁鄉人以無細謹薄之武德中補州助教不治事刺史達奚恕數咎讓周乃去客密州趙仁本高其才厚以裝使入關留客汴為浚儀令崔賢所辱遂感激而西舍新豐逆旅主人不之顧周命酒一斗八升悠然獨酌衆異之至長安舍中郎將常何家貞觀五年詔百官言得失何武人不涉學周為條二十餘事皆當世所切太宗怪問何何曰此非臣所能家客馬周教臣言之客忠孝人也帝即召之間未至遣使者四輩敦趣及謁見與語帝大悅詔直門下省明年拜監察御史奉使稱職帝以何得人賜帛三百匹周上疏曰臣每讀前史見賢者忠孝事未嘗不廢卷長想思履其迹臣不幸早失父母犬馬之養已無所施顧來事可為者惟忠義而已臣伏見詔宗室功臣悉就藩國遂貽子孫世守其政漢光武不任功臣以吏事所以終全其世者良得其術也臣難獨任第八前漢高祖紀呂后問曰陛下百歲後蕭相國既死誰令代之上曰曹參可問其次曰王陵可然少戇陳平可以助之陳平知有餘然難獨任周勃重厚少文然安劉氏者必勃也可令為太尉晉王濬傳羊祜深知待之祜兄子暨白祜濬為人志大奢侈不節不可專任宜有以裁之祜曰濬有大才將欲濟其所欲必可用也轉車騎從事中郎識者謂舉善焉晉謝安傳安常疑劉牢之既不可獨任又知王味之不宜專城牢之既以亂終而味之亦以貪敗由是識者服其知人箋證漢書高帝紀上擊布時為流矢所中行道疾疾甚呂后迎良醫醫入見上問醫曰疾可治不醫曰可治於是上嫚罵之曰吾以布衣提三尺取天下此非天命乎命乃在天雖扁鵲何益韋昭曰泰山盧人也名越人魏桓侯時醫也臣瓚曰史記云齊勃海人也魏無桓侯師古曰瓚說是也扁音步典反遂不使治疾賜黃金五十斤罷之呂后問曰陛下百歲後蕭相國既死誰令代之上曰曹參可問其次曰王陵可然少戇陳平可以助之陳平知有餘然難獨任周勃重厚少文然安劉氏者必勃也可令為太尉晉書王濬傳王濬字士治弘農湖人也家世二千石濬博涉墳典美姿貌不修名行不為鄉曲所稱晚乃變節疏通亮達恢廓有大志嘗起宅開門前路廣數十步人或謂之何太過濬曰吾欲使容長戟幡旗衆咸笑之濬曰陳勝有言燕雀安知鴻鵠之志州郡辟河東從事守令有不廉潔者皆望風自引而去刺史燕國徐邈有女才淑擇夫未嫁邈乃大會佐吏令女於內觀之女指濬告母邈遂妻之後參征南軍事羊祜深知待之祜兄子暨白祜濬為人志大奢侈不節不可專任宜有以裁之祜曰濬有大才將欲濟其所欲必可用也轉車騎從事中郎識者謂祜可謂能舉善焉晉書謝安傳謝安字安石尚從弟也父裒太常卿安年四歲時譙郡桓彝見而歎曰此兒風神秀徹後當不減王東海及總角神識沉敏風宇條暢善行書弱冠詣王濛清言良久既去濛子修曰向客何如大人濛曰此客亹亹為來逼人王導亦深器之由是少有重名好音樂自弟萬喪十年不聽音樂及登台輔期喪不廢樂王坦之書喻之不從衣冠效之遂以成俗又於土山營墅樓館林竹甚盛每攜中外子姪往來游集肴饌亦屢費百金世頗以此譏焉而安殊不以屑意常疑劉牢之既不可獨任又知王味之不宜專城牢之既以亂終而味之亦以貪敗由是識者服其知人不侮大臣第九前漢惠帝紀贊曰孝惠內修親親外禮宰相優寵齊悼趙隱恩恭篤矣聞叔孫通之諫則懼然納曹相國之對而心說可謂寬仁之主遭呂太后虧損至德悲夫前漢賈誼傳上疏曰體貌大臣而厲其節也今自王侯三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也體貌謂加禮容前漢汲黯傳丞相鴻宴見上或時不冠至如見黯不冠不見也上嘗坐武帳黯前奏事上不冠望見黯避帷中使人可其奏其見敬禮如此前漢賈山傳古之人君者於其臣也可謂盡禮矣服法服端容貌正顏色而後見之故臣下莫敢不竭力前漢翟方進奏曰臣聞春秋之義尊上公謂之宰海內無不統焉丞相進見聖主御坐為起在輿為下漢舊儀云皇帝見丞相起謁者贊稱曰皇帝為丞相起起立乃坐皇帝在道丞相迎謁謁者贊稱曰皇帝為丞相下輿立乃升車新唐宣帝紀凡對臣寮肅然拱揖鮮有輕易之言大臣或獻章疏即盥手而覽之箋證漢書惠帝紀贊曰孝惠內修親親外禮宰相優寵齊悼趙隱恩敬篤矣聞叔孫通之諫則懼然納曹相國之對而心說可謂寬仁之主遭呂太后虧損至德悲夫漢書賈誼傳淮南濟北王皆為逆誅誼數上疏陳政事多所欲匡建其大略曰所以體貌大臣而厲其節也師古曰體貌謂加禮容而敬之今自王侯三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也師古曰天子呼諸侯長者同姓則曰伯父異姓則曰伯舅伯長也漢書汲黯傳丞相弘宴見上或時不冠至如見黯不冠不見也上嘗坐武帳應劭曰武帳織成帳為武士象也孟康曰今御武帳置兵闌五兵於帳中也師古曰孟說是也黯前奏事上不冠望見黯避帷中使人可其奏其見敬禮如此漢書賈山傳賈山潁川人也祖父袪故魏王時博士弟子也師古曰六國時魏也山受學祛所言涉獵書記不能為醇儒嘗給事潁陰侯為騎師古曰為騎者常騎馬而從也孝文時言治亂之道借秦為諭名曰至言其辭曰故古之君人者於其臣也可謂盡禮矣服法服端容貌正顏色然後見之故臣下莫敢不竭力盡死以報其上漢書翟方進傳翟方進字子威汝南上蔡人也家世微賤至方進父翟公好學為郡文學方進年十二三失父孤學給事太守府為小史號遲頓不及事西至京師受經受春秋積十餘年經學明習徒衆日廣諸儒稱之以射策甲科為郎二三歲舉明經遷議郎初方進新視事而涓勳亦初拜為司隸不肯謁丞相御史大夫後朝會相見禮節又倨師古曰倨傲也方進陰察之於是方進舉奏其狀因曰臣聞國家之興尊尊而敬長爵位上下之禮王道綱紀師古曰言王道綱紀以尊卑上下之禮為大也春秋之義尊上公謂之宰海內無不統焉丞相進見聖主御坐為起在輿為下師古曰漢舊儀云皇帝見丞相起謁者贊稱曰皇帝為丞相起起立乃坐皇帝在道丞相迎謁謁者贊稱曰皇帝為丞相下輿立乃升車舊唐書宣宗紀宣宗聖武獻文孝皇帝諱忱憲宗第十三子母曰孝明皇后鄭氏元和五年六月二十二日生於大明宮會昌六年三月一日武宗疾篤遺詔立為皇太叔權勾當軍國政事翌日柩前即帝位帝雅好儒士留心貢舉有時微行人間採聽輿論以觀選士之得失每山池曲宴學士詩什屬和公卿出鎮亦賦詩餞行凡對臣寮肅然拱揖鮮有輕易之言大臣或獻章疏即燒香盥手而覽之侮慢大臣第一後漢河間惠王慠佷不奉法憲順帝以侍御史沈景為河間相景到國謁王王不正服箕踞殿上侍郎贊拜景峙不為禮峙立也問王所在虎賁曰是非王邪景曰王不服常人何別今相謁王豈謁無禮者邪王慙而更服景然后拜吳張昭傳權於武昌臨釣臺飲酒大醉權使人以水灑群臣曰今日酣飲惟醉墯臺中乃當止耳昭正色不言出外車中坐權遣人呼昭還謂曰為共樂耳公何為怒乎昭對曰昔紂為糟丘酒池長夜之飲當時亦以為樂不以為惡也權默然有慙色遂罷酒新唐張玄素傳玄素與孫伏伽在隋皆為令史太宗常問玄素官立所來深自羞汙褚遂良見帝曰君子不失言於人明主不失言於戲上能禮其臣乃盡力以奉其上近世宋武帝侮靳朝臣政其門戶至恥懼狼狽前史以為非陛下昨問玄素在隋任何官對曰縣尉又問未為尉時曰流外又問何曹司玄素出不能徙步顏若死灰唐家創業任官以才卜祝庸保量能並用陛下以玄素擢任三品佐皇儲豈宜復對群臣使辭窮負恥欲責其伏節死義安可得乎箋證後漢書河間孝王開傳河間孝王開以永元二年封分樂成勃海涿郡為國延平元年就國奉遵法度吏人敬之永寧元年鄧太后封開子翼為平原王奉懷王勝祀勝和帝子子德為安平王奉樂成王黨祀黨明帝子也開立四十二年薨子惠王政嗣政慠狠不奉法憲順帝以侍御史吳郡沈景有彊能稱故擢為河間相景到國謁王王不正服箕踞殿上侍郎贊拜景峙不為禮峙立也問王所在虎賁曰是非王邪景曰王不服常人何別劉攽曰王不服案文少一王字今相謁王豈謁無禮者邪王慙而更服景然後拜三國志吳志張昭傳張昭字子布彭城人也少好學善隸書從白侯子安受左氏春秋博覽衆書與琅邪趙昱東海王朗俱發名友善魏黃初二年遣使者邢貞拜權為吳王貞入門不下車昭謂貞曰夫禮無不敬故法無不行而君敢自尊大豈以江南寡弱無方寸之刃故乎貞即遽下車拜昭為綏遠將軍封由拳侯權於武昌臨釣臺飲酒大醉權使人以水灑群臣曰今日酣飲惟醉墮臺中乃當止耳昭正色不言出外車中坐權遣人呼昭還謂曰為共作樂耳公何為怒乎昭對曰昔紂為糟邱酒池長夜之飲當時亦以為樂不以為惡也權默然有慙色遂罷酒新唐書張玄素傳太宗即位歷太子少詹事遷右庶子高宗時以老致仕麟德初卒始玄素與孫伏伽在隋皆為令史太宗嘗問玄素宦立所來深自羞汙褚遂良見帝曰君子不失言於人明主不失言於戲故言則史書之禮成之樂歌之居上能禮其臣乃盡力以奉其上近世宋武帝侮靳朝臣攻其門戶至恥懼狼狽前史以為非陛下昨問玄素在隋任何官對曰縣尉又問未為尉時曰流外又問何曹司玄素出不能徒步顏若死灰精爽頓盡見者咸共驚怪唐家創業任官以才卜祝庸保量能並用陛下以玄素擢任三品佐皇儲豈宜復對群臣使辭窮負恥欲責其仗節死義安可得乎
