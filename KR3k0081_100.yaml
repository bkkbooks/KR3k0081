body:
  text: 卷第一百浮圖第一後漢西域傳天竺國其國臨大水乘象而戰其人弱於月氏修浮圖道不殺伐至明帝夢見金人長大項有光明以問群臣或曰西方有神名曰佛其形長丈六尺而黃金色帝遣使天竺問佛道法遂於中國圖畫形像焉楚王英始信其術中國因此頗有奉其道者至桓帝好神數祀浮圖老子百姓稍有奉者後遂轉盛後漢陶謙傳笮融笮音側聚衆數百往依於謙謙使督廣陵下邳彭城運糧遂斷三郡委輸大起浮屠寺上纍金盤下為重樓又堂閣周回可容三千許人作黃金塗像衣以錦綵每浴佛輒多設飲飯布席於路其有就食及觀者且五餘人後漢西域傳論曰至於佛道神化興自身毒而二漢方志莫有稱焉張騫但著地多暑濕乘象而戰班勇雖列其奉浮圖不殺伐而精文善法導達之功靡所傳述余聞之後説也其國則殷乎中土玉燭和氣靈聖之所降集賢懿之所挺生神迹詭怪則理絶人區感驗明顯則事出天外而騫超無聞者豈其道閉往運數開叔葉乎不然何誣異之甚也漢自楚英始盛齋戒之祀桓帝又修華蓋之飾將微義未譯而但神明之邪詳其清心釋纍之訓空有兼遣之宗道書之流也且好仁惡殺蠲敝崇善所以賢達君子多愛其法焉然好大不經奇譎無已雖鄒衍談天之辨莊周蝸角之論尚未足以概其萬一又精靈起滅因報相尋若曉而昧者故通人多感焉蓋導俗無方適物異會取諸同歸措夫疑説則大道通矣晉孝武紀帝初奉佛法立精舍於殿內引諸沙門以居之晉載記姚興傳興既託意於佛道公卿已下莫不欽附沙門自遠而至者五千餘人起浮國于永貴里立波若臺於中宮沙門坐禪者常有千數州郡化之事佛者十室而九焉新唐蕭瑀傳瑀好浮屠法間諸捨家為桑門帝許之箋證後漢書西域傳天竺國一名身毒在月氏之東南數千里俗與月氏同而卑溼暑熱其國臨大水乘象而戰其人弱於月氏修浮圖道不殺伐至明帝夢見金人長大頂有光明以問群臣或曰西方有神名曰佛其形長丈六尺而黃金色帝於是遣使天竺問佛道法遂於中國圖畫形像焉楚王英始信其術中國因此頗有奉其道者後桓帝好神數祀浮圖老子百姓稍有奉者後遂轉盛後漢書陶謙傳初同郡人笮融笮音側格反聚衆數百往依於謙謙使督廣陵下邳彭城運糧遂斷三郡委輸大起浮屠寺上纍金盤下為重樓又堂閣周回可容三千許人作黃金塗像衣以錦綵每浴佛輒多設飲飯布席於路其有就食及觀者且萬餘人後漢書西域傳論曰至於佛道神化興自身毒而二漢方志莫有稱焉張騫但著地多暑濕乘象而戰班勇雖列其奉浮圖不殺伐而精文善法導達之功靡所傳述余聞之後説也其國則殷乎中土玉燭和氣靈聖之所降集賢懿之所挺生神迹詭怪則理絶人區感驗明顯則事出天外而騫超無聞者豈其道閉往運數開叔葉乎不然何誣異之甚也漢自楚英始盛齋戒之祀桓帝又修華蓋之飾將微義未譯而但神明之邪詳其清心釋纍之訓空有兼遣之宗道書之流也且好仁惡殺蠲敝崇善所以賢達君子多愛其法焉然好大不經奇譎無已雖鄒衍談天之辨莊周蝸角之論尚未足以概其萬一又精靈起滅因報相尋若曉而昧者故通人多惑焉蓋導俗無方適物異會取諸同歸措夫疑説則大道通矣晉書孝武紀六年春正月帝初奉佛法立精舍於殿內引諸沙門以居之晉書載記姚興傳興既託意於佛道公卿已下莫不欽附沙門自遠而至者五千餘人起浮圖於永貴里立波若臺于中宮沙門坐禪者恆有千數州郡化之事佛者十室而九矣新唐書蕭瑀傳瑀好浮屠法間請捨家為桑門帝許之矣復奏自度不能為又足疾不入謁帝曰瑀豈不得其所邪抑浮圖第二晉蔡謨傳為祕書監彭城王紘上言樂賢堂有先帝手畫佛象經歷寇難而此堂猶存宜敕作頌帝下其議謀曰佛者夷狄之俗非經典之制先帝多才多藝聊因臨時而畫此象至於雅好佛道所未承聞也盜賊奔突王都隳敗而此堂塊然獨存斯誠神靈保祚之徵然未是大晉盛德之形容歌頌之所先也今欲發王命敕史官上稱先帝好佛之志下為夷狄作一象之頌於義有疑焉遂寢新唐書傅奕傳武德七年上疏極詆浮圖法曰西域之法無君臣父子以三塗六道嚇愚欺庸且死生壽夭本諸自然刑德威福繫之人主今其徒矯託皆云由佛攘天理五帝三王未有佛法年祚長久至漢明帝始立胡祠西晉以上不許中國髡髮事胡至石符亂華乃弛厥禁政虐祚短事佛致然昔褒姒一女熒惑幽王能亡其國況今僧尼十万刻繒泥像以惑天下有不亡乎帝下奕議蕭瑀曰佛聖人也非聖人者無法請誅之奕曰禮始事親終事君而佛逃父出家以匹夫抗天子以繼體悖所親瑀非出空桑乃尊其言瑀不答但合爪曰地獄正為是人設矣帝善奕對奕年八十五奕病志曰傅奕青山自雲人也以醉死遺言妖胡之法慎勿為新唐張鎬傳玄宗時引納浮屠數百居禁中號內道場鎬諫曰天子之福要在養人以一函寓美風化未聞區區佛法而致太平願陛下以天下為心不以小乘撓聖慮卒然之新唐書韓愈傳憲宗遣使者往鳳翔迎佛骨入禁中三日乃送佛祠至為夷法灼體膚委珍貝愈聞惡之乃上表曰佛者夷狄之一法耳自後漢時始入中國上古未嘗有也漢明帝時始有佛法明帝在位才十八年其後亂亡相繼運祚不長宋齊梁陳元魏已下事佛漸謹年代尤促唯梁武帝在位四十八年前後三捨身施佛宗廟祭不用牲牢晝日一食止於菜果後為侯景所逼餓死臺城國亦尋滅事佛求福乃更得福由此觀之佛不足信亦可知矣今無故取朽穢之物觀之巫祝不先排茢不用群臣不言其非御史不舉其罪臣實恥之乞以此骨付之水火永絶根本豈不快哉疏奏憲宗怒甚將加極法裴度崔群曰韓愈上怕尊聽誠宜然非內懷至忠安能至此願少寬假以來諫爭上曰愈言我奉佛太過猶可容至謂東漢奉佛之後帝王咸夭促何言之乖刺也愈人臣狂妄敢爾固不可赦於是愈乃貶潮州刺史贊曰自晉汔隨老佛顯行聖道不斷如帶愈獨引聖爭四海之惑昔孟軻拒揚墨愈排二家撥衰反正功與齊而力倍之所以過況雄為不少矣新唐李蔚傳贊曰人之惑怪神也甚哉若佛者特西域一稿人耳祼顛露足以乞食自資癯辱其身屏營山樊行一概之苦本無求于人徒屬稍稍從之然其言荒范漫靡夷功變現善推不驗無實之事以鬼神死生貫為一條據之不疑掊嗜欲棄親屬大抵與黃老相出入至漢十四葉書入中國迹夫生人之情以耳目不際為奇以不可知為神以物理之外為畏以變化無方為聖以生而死死復生回復償報歆豔其聞為或然以賤近貴遠為喜鞮譯差殊不可研詰華人之譎誕者又攘莊周列禦寇之説佐其高層纍架騰直出其表以無上不可加為勝妄相夸脅而倡其風於是自天子逮庶人皆震動而祠奉之初宰相王縉以緣業事佐代宗於是始作內道場晝夜梵唄異穰寇戍大作盂蘭肖祖宗像分供塔廟為賊臣嘻笑至憲宗世遂迎佛骨於鳳翔內之宮中韓愈指言其弊帝怒竄愈瀕死憲亦弗獲天年幸福而禍無亦左乎懿宗不君精爽奪迷復蹈前車而覆之興哀無知之場丐庇百解之胔以死自誓無有顧籍流淚拜伏雖事宗廟上帝旡以進焉屈万乘之貴自等於古胡數千載而遠以身為徇嗚呼運痑祚殫天告之矣懿不三月而徂唐德之不競厥有來哉悲夫新唐蕭傲傳咸通初遷左散騎常侍懿宗怠政事喜佛道引桑門入禁中數幸佛廬廣施豫傲諫以為天竺法割愛取滅非帝王所尚慕今筆梵言口佛音不若懲謬賞濫罰振殃祈福況佛者可以悟取不可以相求帝雖昏縱猶嘉歎其言箋證晉書蔡謨父克傳頃之遷太常領祕書監彭城王紘上言樂賢堂有先帝手畫佛象經歷寇難而此堂猶存宜敕作頌帝下其議謨曰佛者夷狄之俗非經典之制先帝量同天地多才多藝聊因臨時而畫此象至於雅好佛道所未承聞也盜賊奔突王都隳敗而此堂塊然獨存斯誠神靈保祚之徵然未是大晉盛德之形容歌頌之所先也人臣覩物興義私作賦頌可也今欲發王命敕史官上稱先帝好佛之志下為夷狄作一象之頌於義有疑焉於是遂寢新唐書傅奕傳武德七年上疏極詆浮圖法曰西域之法無君臣父子以三塗六道嚇愚欺庸且生死壽夭本諸自然刑德威福繫之人主今其徒矯託皆云由佛攘天理竊主權五帝三王未有佛法君明臣忠年祚長久至漢明帝始立胡祠然惟西域桑門自傳其教西晉以上不許中國髡髮事胡至石苻亂華乃弛厥禁主庸臣佞政虐祚短事佛致然梁武齊襄尤足為戒昔褒姒一女營惑幽王能亡其國况今僧尼十萬刻繒泥像以惑天下有不亡乎帝下奕議有司唯道源佐其請中書令蕭瑀曰佛聖人也非聖人者無法請誅之奕曰禮始事親終事君而佛逃父出家以匹夫抗天子以繼體悖所親瑀非出空桑乃尊其言蓋所謂非孝者無親瑀不答但合爪曰地獄正為是人設矣帝善奕對奕年八十五奕病志曰傅奕青山白雲人也以醉死嗚呼遺言戒子六經名教言若可習也妖胡之法慎勿為新唐書張鎬傳玄宗時引內浮屠數百居禁中號內道場諷唄外聞鎬諫曰天子之福要在養人以一函宇美風化未聞區區佛法而致太平願陛下以無為為心不以小乘撓聖慮帝然之新唐書韓愈傳憲宗遣使者往鳳翔迎佛骨入禁中三日乃送佛祠王公士人奔走膜唄至為夷法灼體膚委珍貝騰沓係路愈聞惡之乃上表曰佛者夷狄之一法耳自後漢時始入中國上古未嘗有也漢明帝時始有佛法明帝在位才十八年其後亂亡相繼運祚不長宋齊梁陳元魏以下事佛漸謹年代尤促唯梁武帝在位四十八年前後三捨身施佛宗廟祭不用牲牢晝日一食止於菜果後為侯景所逼餓死臺城國亦尋滅事佛求福乃更得禍由此觀之佛不足信亦可知矣今無故取朽穢之物親臨觀之巫祝不先桃茢不用群臣不言其非御史不舉其失臣實恥之乞以此骨付之水火永絶根本表入帝大怒持示宰相將抵以死裴度崔群曰愈言訐牾罪之誠宜然非內懷至忠安能及此願少寬假以來諫爭帝曰愈言我奉佛太過猶可容至謂東漢奉佛以後天子咸夭促言何乖刺耶愈人臣狂妄敢爾固不可赦於是中外駭懼雖戚裏諸貴亦為愈言乃貶潮州刺史贊曰自晉汔隋老佛顯行聖道不斷如帶諸儒依天下正議助為怪神愈獨喟然引聖爭四海之惑昔孟軻拒揚墨去孔子才二百年愈排二家乃去千餘歲撥衰反正功與齊而力倍之所以過況雄為不少矣新唐書李蔚傳贊曰人之惑怪神也甚哉若佛者特西域一稿人耳祼顛露足以乞食自資癯辱其身屏營山樊行一概之苦本無求于人徒屬稍稍從之然其言荒茫漫靡夷幻變現善推不驗無實之事以鬼神死生貫為一條據之不疑掊嗜欲棄親屬大抵與黃老相出入至漢十四葉書入中國迹夫生人之情以耳目不際為奇以不可知為神以物理之外為畏以變化無方為聖以生而死死復生回復償報歆豔其間為或然以賤近貴遠為喜鞮譯差殊不可研詰華人之譎誕者又攘莊周列禦寇之説佐其高層纍架騰直出其表以無上不可加為勝妄相夸脅而倡其風於是自天子逮庶人皆震動而祠奉之初宰相王縉以緣業事佐代宗於是始作內道場晝夜梵唄冀穰寇戎大作盂蘭肖祖宗像分供塔廟為賊臣嘻笑至憲宗世遂迎佛骨於鳳翔內之宮中韓愈指言其弊帝怒竄愈瀕死憲亦弗獲天年幸福而禍無亦左乎懿宗不君精爽奪迷復蹈前車而覆之興哀無知之場丐庇百解之胔以死自誓無有顧籍流淚拜伏雖事宗廟上帝旡以進焉屈萬乘之貴自等於古胡數千載而遠以身為徇嗚呼運痑祚殫