body:
  text: 卷第二十六社稷之臣第一前漢爰盎傳絳侯為丞相朝罷趨出盎進曰丞相何如人也上曰社稷臣盎曰絳侯所謂功臣非社稷臣社稷臣主在與在主亡與亡人主在時與共治在時之事人主雖亡其法度存當奉行之高祖誓非劉氏不王而勃等聽王諸呂是從生主之欲不與亡者也前漢黯多病嚴助為請告上曰黯何如人也曰使黯任職居官亡以愈人然至其輔少主守成雖自謂育賁弗能奪也上曰然古有社稷之臣至如汲黯近之矣前漢師丹傳詔曰丹霍然有柱石之固臨大節而不可奪可謂社稷之人矣吳陸遜傳評曰遜忠誠懇至憂國忘身庶幾社稷之臣矣蜀蔣琬傳琬除廣都長先主嘗因遊觀奄至廣都見琬衆事不理時又沈醉先主將加罪戮諸葛亮請曰蔣琬社稷之器非百里之才也其為政以安民為本不以修飾為先先主乃不加罪但免官而矣晉紀瞻傳明帝嘗獨引瞻於廣室慨然憂天下曰社稷之臣欲無復十人因屈指曰君便其一瞻才兼文武朝廷稱其中量雅正新唐公主傳長樂公主帝敕有司裝賚視長公主而倍之魏徵曰昔漢明帝封諸王曰朕子安得同先帝子也然則長公主者尊公主矣制有差等渠可趙也帝以語后后曰嘗門陛下厚禮徵而未知也今聞其語乃納主於義社稷臣也新唐蕭瑀傳太宗曰武德季太上皇有廢立議顧朕挾不賞之功於昆弟弗見容瑀於爾時不可以利怵死懼社稷臣也因賜詩曰疾風知徑草版蕩識誠臣餘見死節李固傳箋證漢書爰盎傳絳侯為丞相朝罷趨出意得甚上禮之恭常目送之盎進曰丞相何如人也上曰社稷臣盎曰絳侯所謂功臣非社稷臣社稷臣主在與在主亡與亡如淳曰人主在時與共治在時之事人主雖亡其法度存當奉行之高祖誓非劉氏不王而勃等聽王諸呂是從生主之欲不與亡者也漢書汲黯傳黯多病病且滿三月上常賜告者數終不愈最後嚴助為請告上曰汲黯何如人也曰使黯任職居官亡以愈人然至其輔少主守成雖自謂賁育弗能奪也師古曰孟賁夏育皆古之勇士也賁音奔上曰然古有社稷之臣至如汲黯近之矣漢書師丹傳太皇太后詔大司徒大司空曰夫褒有德賞元功先聖之制百王不易之道也關內侯師丹端誠於國不顧患難執忠節據聖法分明尊卑之制確然有柱石之固臨大節而不可奪可謂社稷之臣矣三國志吳志陸遜傳陸遜字伯言吳郡吳人也本名議世江東大族評曰及遜忠誠懇至憂國亡身庶幾社稷之臣矣三國志蜀志蔣琬傳琬以州書佐隨先主入蜀除廣都長先主嘗因遊觀奄至廣都見琬衆事不理時又沉醉先主大怒將加罪戮軍師將軍諸葛亮請曰蔣琬社稷之器非百里之才也其為政以安民為本不以修飾為先願主公重加察之先主雅敬亮乃不加罪倉卒但免官而已晉書紀瞻傳明帝嘗獨引瞻於廣室慨然憂天下曰社稷之臣欲無復十人如何因屈指曰君便其一瞻辭讓帝曰方欲與君善語復云何崇謙讓邪瞻才兼文武朝廷稱其忠亮雅正新唐書諸公主傳長樂公主長樂公主下嫁長孫沖帝以長孫皇后所生故勑有司裝齎視長公主而倍之魏徵曰昔漢明帝封諸王曰朕子安得同先帝子乎然則長公主者尊公主矣制有等差渠可越也帝以語后后曰嘗聞陛下厚禮徵而未知也今聞其言乃納主於義社稷臣也卷八十三新唐書蕭瑀傳帝常曰武德季太上皇有廢立議顧朕挾不賞之功於昆弟弗見容瑀於爾時不可以利怵死懼社稷臣也因賜詩曰疾風知徑草版蕩識誠臣柱石之臣第二前漢霍光傳延年曰將軍為國柱石梁人之柱石承柱礎也言大臣負國重任如屋之柱及其石也前漢辛慶忌傳王鳳薦之曰質行正直仁勇得衆心通於兵事明略威重住國柱石後漢伏湛傳柱詩上疏薦湛曰古者選擢諸侯以為公卿是故四方回首仰望京師柱石之臣宜居輔弼魏徐宣薨詔曰宣體履至實直內方外歷在三朝公亮正色有託孤寄命之節可謂柱石臣也吳陸凱曰宰相國之柱石不可不強晉陸玩傳遷司空玩既拜有人詣之索杯酒瀉置柱梁之間呪曰當今乏才以爾為柱石莫傾人梁棟邪玩笑曰感卿良針既而歎息謂賓客曰以我為三公是天下為無人談者以為知言箋證漢書霍光傳賀者武帝孫昌邑哀王子也既至即位行淫亂光憂悶獨以問所親故吏大司農田延年延年曰將軍為國柱石師古曰柱者梁下之柱石者承柱之礎也言大臣負國重任如屋之柱及其石也審此人不可何不建白太后更選賢而立之漢書辛慶忌傳大將軍王鳳薦慶忌前在兩郡著功德徵入歷位朝廷莫不信鄉質行正直仁勇得衆心通於兵事明略威重任國柱石師古曰任堪也後漢書伏湛傳後南陽太守杜詩上疏薦湛曰古者選擢諸侯以為公卿是故四方回首仰望京師柱石之臣宜居輔弼三國志魏志徐宣傳青龍四年薨遺令布衣疏巾斂以時服詔曰宣體履至實直內方外歷在三朝公亮正色有託孤寄命之節可謂柱石臣也三國志吳志陸凱傳凱上疏曰臣聞宰相國之柱也不可不強晉書陸曄傳附曄弟陸玩玩字士瑤器量淹雅弱冠有美名賀循每稱其清允平當以玩有德望乃遷侍中司空給羽林四十人玩既拜有人詣之索杯酒瀉置柱梁之間呪曰當今乏材以爾為柱石莫傾人梁棟邪玩笑曰戢卿良針既而歎息謂賓客曰以我為三公是天下為無人談者以為知言棟梁之臣第三晉和嶠傳從事中郎庾敳見而嘆曰和嶠森森如千丈松雖磊砢多節目施之大廈有梁棟之用稱於武帝遷中書令晉溫嶠傳明帝即位拜侍中機密大謀皆所參綜嶠有採梁之任帝親而倚之箋證晉書和嶠傳和嶠字長輿汝南西平人也纍遷潁川太守為政清簡甚得百姓歡心太傅從事中郎庾顗見而歎曰嶠森森如千丈松雖磊砢多節目施之大廈有棟梁之用賈充亦重之稱於武帝入為給事黃門侍郎遷中書令晉書溫嶠傳溫嶠字太真司徒羡弟之子也明帝即位拜侍中機密大謀皆所參綜詔命文翰亦悉豫焉俄轉中書令嶠有棟梁之任帝親而倚之甚為王敦所忌臣能勝任第四前漢魏相傳宣帝始親禹機厲精為治練群臣核名實而相總領衆職甚稱上意後漢楊震等論曰孔子稱危而不持顛而不扶則將焉用彼相矣誠以負荷之寄不可以虛冒崇高之位憂重責深也延光之間震為上相抗直方以臨權枉先公道而後身名可謂懷王臣之節識所任之體矣遂纍葉載德繼踵宰相信哉積善之家必有餘慶先世韋平方之蔑矣韋賢平當父子相繼為丞相後漢陳寵傳寵代徐防為司空寵雖傳法律而兼通經書奏議溫粹號為任職魏志評曰魏世事統臺閣重內輕外故八座尚書即古六卿之任矯陳矯宣徐宣剛斷骨鯁臻衛臻育盧育規鑒清理咸不忝厥職云新唐戴胃傳帝謂胄曰尚書總國綱維失一事天下有受其弊者今以今僕委卿宜副朕舉胄明敏長于操決無宿疑議者美其振職謂武德以來殆無其輩箋證漢書魏相傳宣帝始親萬機厲精為治練群臣核名實而相總領衆職甚稱上意漢書楊震傳附子秉孫賜曾孫彪玄孫修論曰孔子稱危而不持顛而不扶則將焉用彼相矣論語載孔子之言也相扶持者諭臣當輔君也誠以負荷之寄不可以虛冒崇高之位憂重責深也延光之間震為上相抗直方以臨權枉先公道而後身名可謂懷王臣之節識所任之體矣遂纍葉載德繼踵宰相信哉積善之家必有餘慶先世韋平方之蔑矣韋賢平當父子並相繼為丞相後漢書陳寵傳寵歷二郡三卿所在有迹見稱當時十六年代徐防為司空寵雖傳法律而兼通經書奏議溫粹號為任職三國志魏志桓階等傳評曰魏世事統臺閣重內輕外故八座尚書即古六卿之任也陳徐衛盧久居斯位矯宣剛斷骨鯁臻育規鑒清理咸不忝厥職云新唐書戴胄傳帝謂胄曰尚書總國綱維失一事天下有受其弊者今以令僕委卿宜副朕舉胄明敏長于操決無宿疑議者美其振職謂武德以來殆無其輩臣不勝任第五前漢宣帝紀二年語曰書云文王作罰刑茲無赦今吏修身奉法未有能稱朕意朕甚愍焉其赦天下與士大夫厲精更始前漢蚡雖不任職以王太后故親幸數言事多效士吏趨藝利者皆去嬰而歸蚡竇嬰前漢贊曰自孝武興學公孫弘以儒相其後蔡義韋賢稚圭張禹翟方進孔光平當馬宮及當子晏咸以儒宗居宰相位服儒衣冠傳先王語其醞藉可也然皆持祿保位被阿諛之譏彼以古人之迹見繩烏能勝其任乎前漢吾丘壽王傳東郡盜賊起上以壽王為都尉不復置太守是時年歲不熟多盜賊詔書壽王璽書曰子在朕前之時知略輻湊以為天下少雙海內寡二及至連十餘城之守征四千石之重職事並廢盜賊縱橫甚不稱在前時何也壽王謝罪前漢彭宣傳宣上書言三公鼎足承君一足不任則覆亂美實美實謂鼎中之實易鼎卦九四鼎折足覆公餗餗食也晉五行志太興元年武昌太守王諒牛生子兩頭八足兩尾共一腹三年後死又有牛一足三尾皆生而死案司馬彪説兩頭者政在私門上下無別之象也京房易傳曰足多者所任邪也足少者不勝任也其後王敦等亂政此其祥也箋證漢書宣帝紀二年春正月詔曰書云文王作罰刑茲無赦師古曰周書康誥之辭也言文王作法罰其有亂常違教者則刑之無放釋也今吏修身奉法未有能稱朕意朕甚愍焉其赦天下與士大夫厲精更始漢書田蚡傳蚡雖不任職以王太后故親幸數言事多效師古曰效謂見聽用士吏趨藝利者皆去嬰而歸蚡蚡日益橫漢書匡張孔馬傳贊曰自孝武興學公孫弘以儒相其後蔡義韋賢玄成匡衡張禹翟方進孔光平當馬宮及當子晏咸以儒宗居宰相位服儒衣冠傳先王語其醞藉可也然皆持祿保位被阿諛之譏彼以古人之迹見繩烏能勝其任乎漢書吾丘壽王傳吾丘壽王字子贛趙人也年少以善格五召待詔詔使從中大夫董仲舒受春秋高材通明遷侍中中郎坐法免復召為郎稍遷會東郡盜賊起拜為東郡都尉上以壽王為都尉不復置太守是時軍旅數發年歲不熟多盜賊詔賜壽王璽書曰子在朕前之時知略輻湊以為天下少雙海內寡二及至連十餘城之守任四千石之重職事並廢盜賊從橫甚不稱在前時何也壽王謝罪漢書彭宣傳彭宣字子佩淮陽陽夏人也會哀帝崩新都侯王莽為大司馬秉政專權宣上書言三公鼎足承君一足不任則覆亂美實師古曰美實謂鼎中之實也易鼎卦九四爻辭曰鼎折足覆公餗餗食也故宣引以為言覆音芳目反晉書五行志下太興元年武昌太守王諒牛生子兩頭八足兩尾共一腹三年後死又有牛一足三尾皆生而死案司馬彪説兩頭者政在私門上下無別之象也京房易傳曰足多者所任邪也足少者不勝任也其後王敦等亂政此其祥也臣道太盛第六前漢灌夫傳丞相亦言灌夫通姦猾侵細民家纍巨萬橫恣穎川輘轢宗室侵犯骨肉此所謂支大於幹脛大於股不折必披披音丕靡反前漢李尋傳説根曰將軍一門九侯二十朱輪漢興已來臣子貴盛未嘗至此夫物盛必衰自然之理唯有賢友強輔庶幾可以保身命全子孫安國家後漢王符傳貴忠篇歷觀前政貴人之用心也與嬰兒子其何異哉嬰兒有常病貴臣有常禍父母有常失人君有常過嬰兒常病傷於飽也貴臣常禍傷於寵也哺乳多則生癇病富貴盛而致驕疾愛子而賊之驕臣而滅之者非一也晉五行志孫休永安元年風四轉五復蒙霧連日是時孫綝一門五侯權傾吳主風霧之災與漢五侯丁傅同應也新唐元載傳載智略開果久得君以為文武才略莫己若外委主書卓英倩李待榮內劫婦言縱諸子關通貨賄京師要司及方面皆擠遣忠良進貪猥凡仕進于請不結子弟則謁主書城中開南北二弟室宇室宇奢廣當時為冠帝盡得其狀載嘗獨見帝深戒之謷然不悛後下詔賜載自盡新唐薑皎傳兄弟當朝有權寵宋璟以為非久安策請抑損之開元五年下詔放歸田里使自娛箋證漢書灌夫傳灌夫字仲孺潁陰人也御史大夫韓安國曰丞相亦言灌夫通姦猾侵細民家纍巨萬橫恣潁川輘轢宗室侵犯骨肉此所謂支大於幹脛大於股不折必披師古曰披音丕靡反漢書李尋傳尋見漢家有中衰厄會之象其意以為且有洪水為災乃説根曰夫士者國家之大寶功名之本也將軍一門九侯二十朱輪漢興以來臣子貴盛未嘗至此夫物盛必衰自然之理唯有賢友強輔庶幾可以保身命全子孫安國家後漢書王符傳貴忠篇曰歷觀前政貴人之用心也與嬰兒子何其異哉嬰兒有常病貴人有常禍父母有常失人君有常過嬰兒常病傷於飽也貴臣常禍傷於寵也哺乳多則生癇病富貴盛而致驕疾愛子而賊之驕臣而滅之者非一也晉書五行志下孫休永安元年十一月甲午風四轉五復蒙霧連日是時孫綝一門五侯權傾吳主風霧之災與漢五侯丁傅同應也新唐書元載傳載智略開果久得君以為文武才略莫已若外委主書卓英倩李待榮內劫婦言縱諸子關通貨賄京師要司及方面皆擠遣忠良進貪猥凡仕進干請不結子弟則謁主書城中開南北二第室宇奢廣當時為冠近郊作觀榭帳帟什器不徙而供膏腴別墅疆畛相望且數十區名姝異伎雖禁中不逮帝盡得其狀載嘗獨見帝深戒之謷然不悛乃下詔賜載自盡新唐書薑皎傳弟晦又為吏部侍郎有權寵宋璟以為非久安策請抑損之開元五年下詔放歸田里使自娛
