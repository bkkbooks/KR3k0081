body:
  text: 卷第六十五子孫第一前漢文帝紀子孫繼嗣世世不絶天下之大義也前漢疏廣傳為太傳乞骸骨上賜黃金二十斤太子贈五十斤廣既歸鄉里日令家共具設酒食請族人故舊賓客與相娛樂居歲餘廣子孫竊謂其昆弟老人廣所愛信者曰今日飲食賈且盡宜勸説君買田宅老人即以間暇時為廣言此計廣曰吾豈老悖不念子孫哉顧自有舊田廬令子孫勤力其中足以共衣食與凡人齊今復增益之以為嬴餘但教子孫怠情耳賢而多財則損其志愚而多財則益其過且夫富者衆之怨也吾既亡以教化子孫不欲益其過而生怨又此金者聖主所以惠養老臣也故樂與鄉黨宗族共享其賜以盡吾餘日不亦可乎於是族人説服前漢平當傳明年春上使使者召欲封當當病篤不應召室家或謂當不可強起受侯印為子孫邪當曰吾居大位已負素餐之責矣起受侯印還臥而死死有餘罪今不起者所以為子孫也遂上書乞骸骨後漢逸民龐公傳劉表問曰先生苦居畎畝而不肯官祿後世何以遺子孫乎龐公曰世人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也箋證漢書文帝紀有司固請曰古者殷周有國治安皆且千歲有天下者莫長焉用此道也立嗣必子所從來遠矣高帝始平天下建諸侯為帝者太祖諸侯王列侯始受國者亦皆為其國祖子孫繼嗣世世不絶天下之大義也漢書疏廣傳廣遂稱篤上疏乞骸骨上以其年篤老皆許之加賜黃金二十斤皇太子贈以五十斤公卿大夫故人邑子設祖道供張東都門外蘇林曰長安東郭門也師古曰祖道餞行也送者車數百兩辭決而去及道路觀者皆曰賢哉二大夫或歎息為之下泣廣既歸鄉里日令家共具設酒食請族人故舊賓客與相娛樂數問其家金餘尚有幾所趣賣以共具居歲餘廣子孫竊謂其昆弟老人廣所愛信者曰子孫幾及君時頗立産業基址今日飲食費且盡宜從丈人所勸説君買田宅老人即以間暇時為廣言此計師古曰間即間字也廣曰吾豈老悖不念子孫哉顧自有舊田廬令子孫勤力其中足以共衣食與凡人齊今復增益之以為贏餘但教子孫怠墯耳賢而多財則損其志愚而多財則益其過且夫富者衆之怨也吾既亡以教化子孫不欲益其過而生怨又此金者聖主所以惠養老臣也故樂與鄉黨宗族共饗其賜以盡吾餘日不亦可乎於是族人懷服師古曰説讀曰悅皆以壽終漢書平當傳哀帝即位徵當為光祿大夫諸吏散騎復為光祿勳御史大夫至丞相以冬月賜爵關內侯明年春上使使者召欲封當當病篤不應召室家或謂當不可強起受侯印為子孫邪當曰吾居大位已負素餐之責矣起受侯印還臥而死死有餘罪今不起者所以為子孫也遂上書乞骸骨後漢書逸民列傳金公傳龐公者南郡襄陽人也居峴山之南未嘗入城府夫妻相敬如賓荊州刺史劉表數延請不能屈表指而問曰先生苦居畎畝而不肯官祿後世何以遺子孫乎龐公曰世人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也誡子孫第二後漢鳥援傳與兄子嚴書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好論議人長短妄是非正法此吾所大惡也寧死不願聞子孫有此行也龍伯高敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂清濁無所失輕重合宜父喪致客數郡畢至吾愛之重之不願汝曹效也效伯高不得猶為謹勑之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也後漢陳實傳歲荒民儉有盜夜入其室止於梁上實陰見乃起自整拂呼命子孫正色訓之曰夫人不可不自勉不善之人未必本惡習以性成梁上君子者是矣盜大驚自投於地稽顙歸罪實徐譬之曰視君狀貌不似惡人宜深克己反善然此當由貧困令遺絹二匹自是一縣無復盜竊後漢陳寵傳曾祖父咸性仁恕常誡子孫曰為人議法當依於輕雖有百金之利慎無與人重比魏王昶傳為兄子及子作名字皆依謙實以見其意遂書戒之曰夫人為子之道莫大於寶身全行以顯父母此三者人知其善而或危身破家陷於滅亡之禍者何也由所祖習非其道也夫孝恭仁義百行之首而立身之本也孝恭則宗族安之仁義則鄉黨重之此行成於內名著於外者矣人若不篤於至行而背本逐末以陷浮華焉以成朋黨焉浮華則有虛偽之纍朋黨則有彼此之患此二者之戒昭然著明而循覆車滋衆逐末彌甚皆由惑當時之譽昧目前之利故也夫富貴聲名人情所樂而君子或得而不處何也惡不由其道耳患人知進而不知退知欲而不知足故有困辱之纍悔吝之咎語曰如不知足則失所欲故知足之足常足矣覽往事之成敗察將來之吉凶未有干名要利欲而不厭而能保世持家永全福祿者也欲使汝曹立身行己遵儒者之教履道家之言故以玄默沖虛為名欲使汝曹顧名思義不敢違越也古者盤杅有銘几杖有誡俯仰察焉用無過行況在己名可不戒之哉夫物速成則疾亡晚就則善終朝華之草夕而零落松柏之茂隆寒不衰是以大雅君子惡速成戒闕黨也夫人有善鮮不自伐有能者寡不自矜伐則掩人矜則陵人掩人者人亦掩之陵人者人亦陵之故三郤為戮於晉王叔負罪於周不惟矜善自伐好爭之咎乎故君子不自稱非以讓人惡其蓋人也夫能屈以為伸讓以為得弱以為強鮮不遂矣夫毀譽愛惡之原而禍福之機也是以聖人慎之孔子曰吾之於人誰毀誰譽如有所譽必有所試又曰子貢方人賜也賢乎哉我則不暇以聖人之德猶尚如此況庸庸之徒而輕毀譽哉人或毀己當退而求之於身若己有可毀之行則彼言當矣若己無可毀之行則彼言妄矣當則無怨於彼妄則無害於身又何反報焉且聞人毀己而忿者惡醜聲之加人也人報者滋甚不如默而自修已也諺曰救寒莫如重裘止謗莫如自修斯言信矣云云新唐鄭善果傳母崔賢明曉政治嘗坐閣內聽善果處決或當理則悅有不可則引至床下責愧之故善果所至有績號清吏新唐柳玭傳常述家訓以戒子孫曰夫門地高者一事墜先訓則異它人雖生可以苟爵位死不可見祖先地下門高則自驕族盛則人窺嫉實藝懿行人未必信纖瑕微纍十手爭指矣所以修己不得不至為學不得不堅夫士君子生於世己無能而望它人用己旡善而望它人愛猶農夫鹵莽種之而怨天澤不潤雖欲弗餒可乎余幼聞先公僕射言立己以孝悌為基恭默為本畏怯為務勤儉為法肥家以忍順保交以簡恭廣記如不及求名如儻來蒞官則潔己省事而後可以言家法家法備然後可以言養人直不近禍廉不沽名憂與禍不偕潔與富不並董生有云弔者在門賀者在閭言憂則恐懼恐懼則福至又曰賀者在門弔者在閭言受福則驕奢驕奢則禍至故世族遠長與命位豐約不假問龜耆星數在處心行事而已新唐李龍譽傳為太府卿謂子孫曰吾性不喜財遂至窶之然負京有賜田十頃能耕之足以食河內千樹桑蠶之可以衣江都書力讀可進求宦後能勤此無資於人矣新唐李績傳將死為弟曰房玄齡杜如晦皆辛苦立門戶悉為不肖子敗之我子孫今以付汝有不厲言行交非類者急榜殺以聞箋證後漢書馬援傳初兄子嚴敦並喜譏議而通輕俠客援前在交址還書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好論議人長短妄是非正法此吾所大惡也寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施襟結褵申父母之戒欲使汝曹不忘之耳龍伯高敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂清濁無所失輕重合宜父喪致客數郡畢至吾愛之重之不願汝曹效也效伯高不得猶為謹勑之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也後漢書陳實傳靈帝初大將軍竇武辟以為掾屬時歲荒民儉有盜夜入其室止於梁上實陰見乃起自整拂呼命子孫正色訓之曰夫人不可不自勉不善之人未必本惡習以性成遂至於此梁上君子者是矣盜大驚自投於地稽顙歸罪實徐譬之曰視君狀貌不似惡人宜深剋己反善然此當由貧困令遺絹二匹自是一縣無復盜竊後漢書陳寵傳陳寵字昭公曾祖父咸成哀間以律令為尚書咸性仁恕常戒子孫曰為人議法當依於輕雖有百金之利慎無與人重比三國志魏志王昶傳王昶字文舒太原晉陽人也其為兄子及子作名字皆依謙實以見其意故兄子産字處靜沉字處道其子渾字玄虛深字道沖遂書戒之曰夫人為子之道莫大於寶身全行以顯父母此三者人知其善而或危身破家陷於滅亡之禍者何也由所祖習非其道也夫孝敬仁義百行之首行之而立身之本也孝敬則宗族安之仁義則鄉黨重之此行成於內名著於外者也人若不篤於至行而背本逐末以陷浮華焉以成朋黨焉浮華則有虛偽之纍朋黨則有彼此之患此二者之戒昭然著明而循覆車滋衆逐末彌甚皆由惑當時之譽昧目前之利故也夫富貴聲名人情所樂而君子或得而不處何也惡不由其道耳患人知進而不知退知欲而不知足故有困辱之纍悔吝之咎語曰如不知足則失所欲故知足之足常足矣覽往事之成敗察將來之吉凶未有干名要利欲而不厭而能保身持家永全福祿者也欲使汝曹立身行已遵儒者之教履道家之言故以玄默沖虛為名欲使汝曹顧名思義不敢違越也古者盤杅有銘几杖有誡俯仰察焉用無過行况在己名可不戒之哉夫物速成則疾亡晚就則善終朝華之草夕而零落松柏之茂隆寒不衰是以大雅君子惡速成戒闕黨也若范丐對秦客至武子擊之折其委笄惡其掩人也夫人有善鮮不自伐有能者寡不自矜伐則掩人矜則陵人掩人者人亦掩之陵人者人亦陵之故三郤為戮於晉王叔負罪於周不惟矜善自伐好爭之咎乎故君子不自稱非以讓人惡其蓋人也夫能屈以為伸讓以為得弱以為強鮮不遂矣夫毀譽愛惡之原而禍福之機也是以聖人慎之孔子曰吾之於人誰毀誰譽如有所譽必有所試又曰子貢方人賜也賢乎哉我則不暇以聖人之德猶尚如此况庸庸之徒而輕毀譽哉昔伏波將軍馬援戒其兄子言聞人之惡當如聞父母之名耳可得而聞口不可得而言也斯戒至矣人或虛己當退而求之於身若己有可毀之行則彼言當矣若己無可毀之行則彼言妄矣當則無怨於彼妄則無害於身又何反報焉且聞人虛己而忿者惡醜聲之加人也人報者滋甚不如默而自修己也諺曰救寒莫如重裘止謗莫如自修斯言信矣新唐書鄭善果傳鄭善果鄭州滎澤人祖在魏為顯家隋開皇初進封武德郡公年十四為泝州刺史纍轉魯郡太守善果母崔賢明曉政治嘗坐閣內聽善果處決或當理則悅有不可則引至牀下責愧之故善果所至有績號清吏新唐書柳公綽傳附孫柳玭玭嘗述家訓以戒子孫曰夫門地高者一事墜先訓則異它人雖生可以苟爵位死不可見祖先地下門高則自驕族盛則人窺嫉實藝懿行人未必信纖瑕微纍十手爭指矣所以修己不得不至為學不得不堅夫士君子生於世己無能而望它人用己無善而望它人愛猶農夫鹵莽種之而怨天澤不潤雖欲弗餒可乎余幼聞先公僕射言立己以孝弟為基恭默為本畏怯為務勤儉為法肥家以忍順保交以簡恭廣記如不及求名如儻來蒞官則潔己省事而後可以言家法家法備然後可以言養人直不近禍廉不沽名憂與禍不偕潔與富不並董生有云弔者在門賀者在閭言憂則恐懼恐懼則福至又曰賀者在門弔者在閭言受福則驕奢驕奢則禍至故世族遠長與命位豐約不假問龜蓍星數在處心行事而已新唐書李襲志傳附弟李襲譽襲譽字茂實通敏有識度高祖已定長安召授太府少卿為人嚴愨以威肅聞居家儉厚于宗親祿稟隨多少散之以餘資寫書罷揚州書遂數車載嘗謂子孫曰吾性不喜財遂至寠乏然負京有賜田十頃能耕之足以食河內千樹桑事之可以衣江都書力讀可進求宦吾歿後能勤此無資於人矣新唐書李績傳李績字懋功曹州離狐人弟弼始為晉州刺史以績疾召為司衛卿使省視忽語曰我似少愈可置酒相樂於是奏樂宴飲列子孫于下將罷謂弼曰我即死欲有言恐悲哭不得盡故一訣耳我見房玄齡杜如晦高季輔皆辛苦立門戶亦望詒後悉為不肖子敗之我子孫今以付汝汝可慎察有不厲言行交非類者急搒殺以聞興滅繼絶第三前漢項籍傳范增説梁曰秦滅六國楚最亡罪自懷王入秦不反楚人憐之至今故南公稱曰楚雖三戶亡秦必楚今陳勝首事不立楚後其勢不長今君起江東楚蜂起之將皆爭附君者以君世世楚將為能復立楚之後也梁乃求楚懷王孫心在民間為人牧羊立以為楚懷王從民望也前漢高祖紀故粵王亡諸世奉粵祀秦侵奪其地使其社稷不得血食亡諸身今以為閩粵王前漢張良傳漢二年項羽急圍漢王於滎陽漢王憂恐與酈食其謀撓楚權酈生曰昔湯伐桀封其後杞武王誅為封其後宋今秦無德伐滅六國無立錐之地陛下誠復立六國後此皆爭戴陛下德義願為臣妾德義已行南面稱伯楚必斂衽而朝漢王曰善趣刻印先生因行佩之酈生未行良謁漢王漢王方食曰客有為我計橈楚權者具以酈生計告良良曰陛下事去矣漢王曰何哉良曰臣請借前箸以籌之誠用此謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗乃公事令趣銷印前漢武帝紀元鼎四年詔曰祭地冀州瞻望河洛巡省豫州觀于周室邈而無祀詢問耆老乃得孽子嘉其封嘉為周子南君以奉周祀前漢元帝紀初元五年以周子南君為周承休侯位次諸侯王前漢成帝綏和元年二月曰蓋聞王者必存二代之後所以通三統也昔成湯受命列為三代而祭祀廢絶考求其後莫正孔吉無若孔吉最正其封吉為商紹嘉侯三月進爵為公及周承休侯皆為公前漢樊噲傳平帝元始二年繼絶世封噲玄孫之子章為舞陽侯邑千戶餘見平帝紀前漢外戚恩澤侯表自古受命及中興之君必興滅繼絶修廢舉逸然後天下歸仁四方之政行焉傳稱武王克商追存賢聖至乎不及下車世代雖殊其揆一也高帝撥亂誅暴庶事草創日不暇給然猶修祀六國求聘四皓過魏則寵旡忌之墓適趙則封樂毅之後後漢孝和紀詔曰高祖功臣蕭曹為首有傳世不絶之義曹相國後容城侯無嗣朕望長陵東門見二臣之壠循其遠節每有感焉恐義獲寵古今所同可遣使者以中牢相大鴻臚求近親宜為嗣者須景風紹封以章厥功後漢馮異傳安帝下詔曰夫仁不遺親義不忘勞興滅繼絶善善及子孫古之典也昔建武元功二十八將佐命虎臣蓋蕭曹紹封傳繼於今況此未遠而或至之杞朕甚愍之其條二十八將無嗣絶世若犯罪奪國其子孫應當統後者分別署狀上將及景風章敘舊德顯茲遺功焉宋均注景風至則封有功也卷第六十一至六十五箋證漢書項籍傳居鄛人范增年七十素好奇計往説梁曰陳勝敗固當夫秦滅六國楚最亡罪自懷王入秦不反楚人憐之至今故南公稱曰楚雖三戶亡秦必楚今陳勝首事不立楚後其藝不長今君起江東楚蜂起之將皆爭附君者以君世世楚將為能復立楚之後也於是梁乃求楚懷王孫心在民間為人牧羊立以為楚懷王從民望也漢書高帝紀又曰故粵王亡諸世奉粵祀秦侵奪其地使其社稷不得血食師古曰祭者尚血腥故曰血食也諸侯伐秦亡諸身帥閩中兵以佐滅秦項羽廢而弗立今以為閩粵王王閩中地勿使失職漢書張良傳漢三年項羽急圍漢王於滎陽漢王憂恐與酈食其謀橈楚權酈生曰昔湯伐桀封其後杞武王誅紂封其後宋今秦無德伐滅六國無立錐之地陛下誠復立六國後此皆爭戴陛下德義願為臣妾德義已行南面稱伯楚必斂衽而朝漢王曰善趣刻印先生因行佩之酈生未行良從外來謁漢王漢王方食曰客有為我計橈楚權者具以酈生計告良曰於子房何如良曰誰為陛下畫此計者陛下事去矣漢王曰何哉良曰臣請借前箸以籌之誠用此謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗乃公事令趣銷印漢書武帝紀四年十一月甲子立后土祠于汾陰脽上禮畢行幸滎陽還至洛陽詔曰祭地冀州瞻望河洛巡省豫州觀于周室邈而無祀詢問耆老乃得孽子嘉其封嘉為周子南君以奉周祀漢書元帝紀五年春正月以周子南君為周承休侯文頴曰姓姬名延年其祖父姬嘉本周後武帝元鼎四年封為周子南君令奉周祀師古曰承休國在潁川位次諸侯王漢書成帝紀綏和元年二月又曰蓋聞王者必存二王之後所以通三統也昔成湯受命列為三代而祭祀廢絶考求其後莫正孔吉臣瓚曰無若孔吉最正也其封吉為殷紹嘉侯三月進爵為公及周承休侯皆為公地各百里漢書樊噲傳平帝元始二年繼絶世封噲玄孫之子章為舞陽侯邑千戶漢書外戚恩澤侯表自古受命及中興之君必興滅繼絶修廢舉逸然後天下歸仁四方之政行焉傳稱武王克殷追存賢聖至乎不及下車世代雖殊其揆一也高帝撥亂誅暴庶事草創日不暇給然猶修祀六國求聘四皓過魏則寵無忌之墓適趙則封樂毅之後後漢書和殤帝紀三年十一月癸卯祠高廟遂有事十一陵詔曰高祖功臣蕭曹為首有傳世不絶之義曹相國後容城侯無嗣朕望長陵東門見二臣之壠循其遠節每有感焉忠義獲寵古今所同可遣使者以中牢祠大鴻臚求近親宜為嗣者須景風紹封以章厥功後漢書