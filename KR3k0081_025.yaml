body:
  text: 卷第二十五執法第一史記秦本紀鞅之初為秦施法法不行太子犯禁鞅曰法之不行自於貴戚君必欲行法先於太子太子不可黥黥其傅師於是法大用秦人治史記趙奢傳趙奢趙之甲部吏也收租稅而平原君家不肯出趙奢以法治之殺九人平原君怒將殺奢奢因說曰君於趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵諸侯加兵是旡趙也君安得有此富乎以君之貴奉公如法則上下平上下平則國強國強則趙固而君為貴戚豈輕於天下邪前漢翟方進傳為相公潔請託不行郡國持法刻深舉奏牧守九卿峻文深詆中傷者尤多如陳咸朱慱蕭育逄信孫閎之屬皆京師世家以材能少歷牧守列卿知名當世而方進特立後起十餘年間至宰相據法以彈咸等皆罷退之後漢趙喜傳拜懷令大姓李子春先為琅邪相豪猾并兼為人所患喜下車聞其二孫殺人事未發覺即窮詰其姦收考子春二孫自殺京師為請者數十終不聽時趙王良疾病將終車駕親臨王問所欲言王曰素與李子春厚今犯罪懷令趙喜欲殺之願乞其命帝曰吏奉法律不可枉也更道他所欲王旡復言後漢祭遵傳為軍市令舍中兒犯法遵格殺之光武怒命收遵時主簿陳副諫曰明公常欲衆軍整齊令遵奉法不避是教令所行也光武謂諸將曰當備祭遵吾舍中兒犯法尚殺之必不私諸科也晉劉毅傳皇太子朝鼓吹將入東掖門毅以為不恭止之於門外奏劾保傳以下詔赦之然後入新唐王志愔傳為左臺侍御史以剛鷙為治所居人吏畏讋呼為皂鵰新唐徐有功傳有功明龐氏旡罪后召詰曰公比斷獄多失出何耶對曰失出臣小過好生陛下大德后默然新唐戴胄傅時選者盛集有詭資蔭冒牒取調者詔許自首不首當死俄有詐得者獄具胄以法當流帝曰朕詔不首者死而今當流是示天下以不信卿賣獄邪胄曰陛下登殺之非臣所及既屬臣敢虧法乎帝曰卿自守法而使我失信奈何胄曰法者布大信於人言乃一時喜怒所發陛下以一朝忿將殺之既知不可而置於法此忍小忿存大信也若阿忿違信臣為陛下惜之帝大感寤箋證史記秦本紀鞅之初為秦施法法不行太子犯禁鞅曰法之不行自於貴戚君必欲行法先於太子太子不可黥黥其傅師於是法大用秦人治史記廉頗藺相如列傳附趙奢趙奢者趙之田部吏也收租稅而平原君家不肯出趙奢以法治之殺平原君用事者九人平原君怒將殺奢奢因說曰君於趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵諸侯加兵是無趙也君安得有此富乎以君之貴奉公如法則上下平上下平則國彊國彊則趙固而君為貴戚豈輕於天下邪漢書翟方進傳永始二年擢方進為丞相封高陵侯食邑千戶為相公潔請託不行郡國持法刻深舉奏牧守九卿峻文深詆中傷者尤多如陳咸朱博蕭育逢信孫閎之屬皆京師世家以材能少歷牧守列卿知名當世而方進特立後起十餘年間至宰相據法以彈咸等皆罷退之後漢書趙喜傳趙喜字伯陽南陽宛人也後拜懷令大姓李子春先為琅邪相豪猾并兼為人所患喜下車聞其二孫殺人事未發覺即窮詰其姦收考子春二孫自殺京師為請者數十終不聽時趙王良疾病將終車駕親臨王問所欲言王曰素與李子春厚今犯罪懷令趙喜欲殺之願乞其命帝曰吏奉法律不可枉也更道它所欲王無復言後漢書祭遵傳祭遵字弟孫祭音側界反潁川潁陽人也及光武破王尋等還過潁陽遵以縣吏數進見光武愛其容儀署為門下史從征河北為軍市令舍中兒犯法遵格殺之光武怒命收遵時主簿陳副諫曰明公常欲將軍整齊今遵奉法不避是教令所行也光武乃貰之貰猶赦也以為刺姦將軍謂諸將曰當備祭遵吾舍中兒犯法尚殺之必不私諸卿也晉書劉毅傳劉毅字仲雄東萊掖人咸寧初復為散騎常侍博士祭酒轉司隸校尉糾正豪右京師肅然皇太子朝鼓吹將入東掖門毅以為不敬止之於門外奏劾保傅以下詔赦之然後入卷四十五案晉書中名劉毅者有二此劉毅見載卷四十五彼劉毅見載卷八十五新唐書王志愔傳王志愔博州聊城人擢進士第中宗神龍中為左臺侍御史以剛鷙為治所居人吏畏讋呼為皂鵰新唐書徐有功傳徐有功名弘敏避孝敬皇帝諱以字行竇孝諶妻龐為其奴怖以妖祟教為夜解因告以厭詛給事中薛季昶鞠之龐當死子希瑊訟冤有功明其枉季昶劾有功黨惡逆當棄市有功方視事令史泣以告有功曰豈獨吾死而諸人長不死耶安步去后召詰曰公比斷獄多失出何耶對曰失出臣小過好生陛下大德后默然龐得減死有功免為民新唐書戴胄傳戴胄字玄胤相州安陽人大理少卿缺太宗曰大理人命所繫胄清直其人哉即日命胄時選者盛集有詭資蔭冒牒取調者詔許自首不首罪當死俄有詐得者獄具胄以法當流帝曰朕詔不首者死而今當流是示天下不以信卿賣獄邪胄曰陛下登殺之非臣所及既屬臣敢虧法乎帝曰卿自守法而使我失信奈何胄曰法者布大信於人言乃一時喜怒所發陛下以一朝忿將殺之既知不可而置於法此忍小忿存大信也若阿忿違信臣為陛下惜之帝大感寤從其言專任刑罰第二前漢王吉傳今俗吏所以牧民者非有禮義科指可世世通行者也獨設刑法以守之其欲治者不知所繇以意穿鑿各取一切權譎自在故一變之後不可復修也是以百里不同風千里不同俗戶異政人殊服詐僞萌生刑罰亡極質朴日銷恩愛寖薄孔子曰安上治民莫善於禮非空言也前漢敞為京兆尹而敞弟武拜為梁相是時梁王驕貴民多豪彊號為難治敞問武欲何以治梁武敬憚兄謙不肯言敞使吏送之至關戒吏自問武武應曰馭黠馬者利其銜策梁國大都吏民凋敝且當以柱後惠文彈治之耳秦時獄法吏冠柱後惠文武意欲以刑法治梁吏還道之敞笑曰審如掾言武必辨治梁矣武既到官其治有跡亦能吏也宋文帝元嘉中王弘為衛將軍輔政上疏曰同伍犯法人士不罪科然每至誥謫轉有請訴若常垂恩宥即法廢不行依事糾責則物以為若謂宜便其制使得優苦之衷煬帝大業中外征四夷內窮嗜欲兵革歲動賦斂滋繁窮人無告聚為盜賊帝乃更立嚴刑勑天下竊盜以上罪無輕重不待聞奏皆斬百姓轉相群聚攻剽城邑誅罪不能禁帝以盜不息乃益肆淫刑新唐刑沈志吉甫言治天下必任賞罰陛下頻降赦令蠲逋員賑飢民恩德至矣然典刑未舉中外有懈怠心絳曰今天下雖未大治亦未甚亂乃古平國用中典之時箋證漢書王吉傳宣帝頗修武帝故事宮室車服盛於昭帝時外戚許史王氏貴寵而上躬親政事任用能吏吉上疏言得失曰今俗吏所以牧民者非有禮義科指可世世通行者也獨設刑法以守之其欲治者不知所繇以意穿鑿各取一切權譎自任故一變之後不可復修也是以百里不同風千里不同俗戶異政人殊服詐僞萌生刑罰亡極質朴日消恩愛寖薄孔子曰安上治民莫善於禮師古曰孝經載孔子之言非空言也漢書張敞傳初敞為京兆尹而敞弟武拜為梁相是時梁王驕貴民多豪彊號為難治敞問武欲何以治梁武敬憚兄謙不肯言敞使吏送至關戒吏自問武武應曰馭黠馬者利其銜策梁國大都吏民凋敝且當以柱後惠文彈治之耳應劭曰柱後以鐵為柱今法冠是也一名惠文冠秦時獄法吏冠柱後惠文武意欲以刑法治梁吏還道之敞笑曰審如掾言武必辨治梁矣武既到官其治有跡亦能吏也通典刑八宋文帝元嘉中王弘為衛將軍輔政上疏曰同伍犯法士人不科罪然每詰謫轉有請訴若常垂恩宥即法廢不行依事糾責則物以為苦謂宜更其制使得憂苦之衷通典刑八煬帝大業中外征四夷內窮嗜欲兵革歲動賦斂滋繁窮人無告聚為盜賊帝乃更立嚴刑勑天下竊盜以上罪無輕重不待聞奏皆斬百姓轉相群聚攻掠城邑誅罰不能禁帝以盜不息乃益肆淫刑新唐書刑法志是時李吉甫李絳為相吉甫言治天下必任賞罰陛下頻降赦令蠲逋員賑飢民恩德至矣然典刑未舉中外有懈怠心絳曰今天下雖未大治亦未甚亂乃古平國用中典之時罰不避親第三史記石奢傳石奢者楚昭王相也堅直廉正旡所阿避行縣道有殺人者相追之乃其父也縱其父而還自繫焉使人言之王曰殺人者臣之父也夫以父立政不孝也廢法縱罪非忠也臣罪當死王曰追而不及不當伏罪石奢曰不私其父非孝子也不奉王法非忠臣也王赦其罪晉苟晞傳字道將從母子求為將睎距之曰吾不以王法貸人將旡後悔邪固欲之晞乃以為督護後犯法晞斬之從母叩頭請救不得既而素服哭之流涕曰殺卿者兗州剌史哭弟者苟道將其杖法如此新唐文宗紀丁卯夜於咸泰殿觀燈作樂三宮太后諸公主畢會上性節儉延安公主衣裾寬大即時斥歸駙馬竇浣待罪詔曰公主入參衣服踰制從夫之義過有所歸浣宜奪兩月俸錢新唐荊王傳房遺愛謀反坐子則與往還繫獄高宗謂大臣曰朕欲從公丐叔及兄死侍郎崔敦禮曰陛下雖申恩不可詘天下法遂賜死箋證史記循吏列傳石奢石奢者楚昭王相也堅直廉正無所阿避行縣道有殺人者相追之乃其父也縱其父而還自繫焉使人言之王曰殺人者臣之父也夫以父立政不孝也廢法縱罪非忠也臣罪當死王曰追而不及不當伏罪子其治事矣石奢曰不私其父非孝子也不奉主法非忠臣也王赦其罪上惠也伏誅而死臣職也遂不受令自刎而死晉書苟晞傳苟晞字道將河南山陽人也其從母依之奉養甚厚從母子求為將晞拒之曰吾不以王法貸人將無後悔邪固欲之晞乃以為督護後犯法晞杖節斬之從母叩頭請救不聽既而素服哭之流涕曰殺卿者荊州刺史哭弟者茍道將其杖法如此舊唐書文宗紀下四年春正月丁卯夜於咸泰殿觀燈作樂三宮太后諸公等畢會上性節儉延安公主衣裾寬大即時斥歸駙馬竇浣待罪詔曰公主入參衣服踰制從夫之義過有所歸浣宜奪兩月俸錢新唐書高祖諸子列傳荊王元景荊王元景武德三年始王趙永徽初進位司徒賜實封至千五百戶房遺愛謀反坐子則與往還繫獄時吳王亦抵罪高宗謂大臣曰朕欲從公丐叔及兄死兵部侍郎崔敦禮曰陛下雖申恩不可詘天下法遂賜死不留獄第四後漢陳寵傳論曰陳公居理官則議獄緩死相幼主則正不僭寵可謂有宰相之器矣忠能承風亦庶乎明慎用刑而不留獄後漢劉平傳全椒長政有恩惠百姓懷感人或增資就賦或減年從役剌史太守行部獄旡繫囚人自以得所不知所問唯班詔書而去魏高柔傳高幹既降頃之以并州叛柔自歸太祖太祖欲因事誅之以為剌奸令史處法允當獄旡留滯辟為丞相倉曹屬魏杜畿傳年二十為郡功曹守鄭縣令縣囚繫數百人畿親臨獄裁其輕重盡決遣之雖未悉當郡中奇其年少而有大意也晉周處傳遷廣漢太守郡多滯訟有經三十年而不決者處計其枉直一朝決遣新唐狄仁傑傳大理寺丞歲中斷久獄萬七千人時稱平恕箋證後漢書陳寵傳論曰陳公居理官則議獄緩死相幼主則正不僣寵可謂有宰相之器矣忠能承風亦庶乎明慎用刑而不留獄後漢書劉平傳劉平字公子楚郡彭城人也本名曠後舉孝廉拜濟陰郡丞太守劉育甚重之任以郡職上書薦平會平遭父喪去官服闋拜全椒長政有恩惠百姓懷感人或增資就賦或減年從役刺史太守行部獄無繫囚人自以得所不知所問所或作何唯班詔書而去三國志魏志高柔傳高幹既降頃之以并州叛柔自歸太祖太祖欲因事誅之以為刺奸令史處法允當獄無留滯辟為丞相倉曹屬魏氏春秋曰柔既處法平允又夙夜匪懈至擁膝抱文書而寢太祖嘗夜微出觀察諸吏見柔哀之徐解裘覆柔而去自是辟焉三國志魏志杜畿傳杜畿字伯侯京兆杜陵人也少孤繼母苦之以孝聞年二十為郡功曹守鄭縣令縣囚繫數百人畿親臨獄裁其輕重盡決遣之雖未悉當郡中奇其年少而有大志也晉書周處傳周處字子隱義興陽羡人也入洛稍遷新平太守撫和戎狄叛羌歸附雍土美之轉廣漢太守郡多滯訟有經三十年而不決者處詳其枉直一朝決遣新唐書狄仁傑傳狄仁傑字懷英并州太原人稍遷大理丞歲中斷久獄萬七千人時稱平恕活囚第五史記淮陰侯韓信傳未得知名為連敖坐法當斬其輩十三人皆已斬次至信信乃仰視縢公夏侯嬰曰上不欲就天下乎何為斬壯士縢公奇其言壯其貌不斬與語大說之言於上上拜治粟都尉前漢張蒼傳有罪亡歸及沛公略地過陽武蒼以客從攻南陽蒼當斬解衣伏質質鍖也身長大肥白如瓠時王陵見而怪其美士乃言沛公赦勿斬前漢丙吉傳宣帝以皇曾孫坐衛太子事繫邸獄望氣者言長安獄中有天子氣於是上遣使者亡輕重皆殺之吉閉門拒使者不納前漢王欣傳為被陽令武帝末繡衣御史暴勝之使持斧逐捕盜賊誅二千石已下勝之過被陽欲斬欣欣已解衣伏質仰言曰使君專生殺之柄今斬一欣不足以增威不如時有所寬以明恩貸令盡死力勝之壯其言貰不誅後漢袁安傳永平年楚王英謀為逆安拜楚郡太守是時英辭所連及繫者數千人顯宗怒甚吏案之急迫痛自誣死者甚衆安到郡不入府先往案獄理其旡明驗者條上出之四百餘家後漢寒朗傳永平中以謁者守侍御史與三府掾屬共考案楚獄顏忠王平等辭連及劉建等四侯建等未嘗與忠平相見朗心傷其冤試以建等物色獨問忠平物色謂形狀而二人錯愕不能對朗知其詐乃上言建等旡姦專為忠平所誣疑天下旡辜類多如此是以考一連十考十連百又公卿朝會間以得失知其多冤帝意解詔遣朗出後二日車駕自幸洛陽獄録因徒理出千餘人後忠平死獄中餘見刑罰不中崔駰傳箋證史記淮陰侯列傳漢王之入蜀信亡楚歸漢未得知名為連敖坐法當斬其輩十三人皆已斬次至信信乃仰視適見滕公師古曰夏侯嬰曰上不欲就天下乎何為斬壯士滕公奇其言壯其貌釋而不斬與語大悅之言於上上拜以為治粟都尉漢書張蒼傳張蒼陽武人也秦時為御史主柱下方書有罪亡歸及沛公略地過陽武蒼以客從攻南陽蒼當斬解衣伏質師古曰質鍖也身長大肥白如瓠時王陵見而怪其美士乃言沛公赦勿斬漢書丙吉傳時宣帝生數月以皇曾孫坐衛太子事繫吉見而憐之又心知太子無事實重哀曾孫無辜吉擇謹厚女徒令保養曾孫置閒燥處吉治巫蠱事連歲不決後元二年武帝疾往來長楊五柞宮望氣者言長安獄中有天子氣於是上遣使者分條中都官詔獄繫者亡輕重一切皆殺之內謁者令郭穰夜到郡邸獄吉閉門拒使者不納漢書王欣傳王欣濟南人也以郡縣吏積功稍遷為被陽令武帝末軍旅數發郡國盜賊群起繡衣御史暴勝之使持斧逐捕盜賊以軍興從事誅二千石以下勝之過被陽欲斬欣欣已解衣伏質仰言曰使君顓殺生之柄威震郡國今復斬一欣不足以增威不如時有所寬以明恩貸令盡死力勝之壯其言貰不誅後漢書袁安傳永平十三年楚王英謀為逆事下郡覆考明年三府舉安能理劇拜楚郡太守是時英辭所連及繫者數千人顯宗怒甚吏案之急迫痛自誣死者甚衆安到郡不入府先往案獄理其無明驗者條上出之安曰如有不合太守自當坐之不以相及也遂分別具奏帝感悟即報許得出者四百餘家後漢書寒朗傳寒朗字伯奇魯國薛人也以尚書教授舉孝廉永平中以謁者守侍御史與三府掾屬共考案楚獄顏忠王平等辭連及隧鄉侯耿建朗陵侯臧信護澤侯鄧鯉曲成侯劉建建等辭未嘗與忠平相見是時顯宗怒甚吏皆惶恐諸所連及率一切陷入無敢以情恕者朗心傷其冤試以建等物色獨問忠平物色謂形狀也而二人錯愕不能對錯愕猶倉卒也朗知其詐乃上言建等無姦專為忠平所誣疑天下無辜類多如此帝乃召朗入問曰建等即如是忠平何故引之朗對曰忠平自知所犯不道故多有虛引冀以自明帝曰即如是四侯無事何不早奏獄竟而久繫至今邪朗對曰臣雖考之無事然恐海內別有發其姦者故未敢時上帝怒罵曰吏持兩端促提下左右方引去朗曰願一言而死小臣不敢欺欲助國耳帝問曰誰與共為章對曰臣自知當必族滅不敢多污染人誠冀陛下一覺悟而已臣見考囚在事者咸共言妖惡大故臣子所宜同疾今出之不如入之可無後責是以考一連十考十連百又公卿朝會陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩裁止於身天下幸甚及其歸舍口雖不言而仰屋竊歎莫不知其多冤無敢牾陛下者臣今所陳誠死無悔帝意解詔遣朗出後二日車駕自幸洛陽獄録囚徒理出千餘人後平忠死獄中朗乃自繫會赦免官復舉孝廉得情則哀矜而勿喜第六後漢郭躬傳論曰曾子曰上失其道民散久矣如得其情則哀矜而勿喜夫不喜於得情則恕心用恕心用則可寄枉直矣夫賢人君子斷獄其必主於此乎郭躬起自佐史小大之獄必察焉原其平刑審斷庶於勿喜者乎若乃推己以議物捨狀以貪情法家之能慶延于世蓋由此也魏倉慈傳自太祖迄於咸熙魏郡太守吳權清河太守任燠京兆太守顏斐洪農太守令狐邵濟南相孔乂或哀矜折獄或推誠惠愛或治身清白或擲姦發伏咸為良二千石箋證後漢書郭躬傳論曰曾子云上失其道民散久矣如得其情則哀矜而勿喜夫不喜於得情則恕心用恕心用則可寄枉直矣夫賢人君子斷獄其必主於此乎郭躬起自佐史小大之獄必察焉原其平刑審斷庶於勿喜者乎若乃推己以議物捨狀以貪情法家之能慶延于世蓋由此也三國志魏志倉慈傳倉慈字孝仁淮南人也自太祖迄于咸熙魏郡太守陳國吳瓘清河太守樂安任燠京兆太守濟北顏斐弘農太守太原令狐邵濟南相魯國孔乂或哀矜折獄或推誠惠愛或治身清白或擲姦發伏咸為良二千石
