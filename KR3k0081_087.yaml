body:
  text: 卷第八十七防滿第一前漢安世自見父子等顯懷不自安為子延壽求出補吏上以為北地太守贊曰安世履道滿而不溢前漢楚元王傳德常持老子知足之計妻死大將軍光欲以女妻之德不敢取畏盛滿也前漢公孫賀傳自公孫洪後丞相李蔡嚴青翟趙周三人比坐事死石慶雖以謹得終然數被譴初賀引拜為丞相不受印綬頓首涕泣曰臣本邊鄙以鞍馬騎射為官材誠不任宰相上與左右見賀悲哀感動下泣曰扶起丞相賀不肯起上乃起去賀不得已拜出左右問其故賀曰王上賢明臣不足以稱恐負重責從是殆矣後漢馬援傳援謂黃門郎梁松竇固曰凡人為貴當使可賤如卿等欲不可復賤吾高堅自持勉思鄙言松後果以貴滿致災固亦幾不免後漢陰興傳興遷待中賜爵閞內侯帝後召興欲封之置云云蒙爵土令天下觖望誠為盈溢觖音羌志反前書音義曰觖猶也一音決猶望之也臣蒙陛下貴人恩澤至厚富貴已極不可復加至誠不願帝嘉興之讓不奪其志貴人問其故興曰貴人不讀書記邪亢龍有梅後漢樊宏傳宏為人謙柔畏慎不求苟進常戒其子曰富貴盈溢未有能終者吾非不喜榮藝也天道惡滿而好謙前世貴戚皆明戒也保身全己豈不樂哉後漢崔駰傳夫謙德之光周易所美滿溢之位道家所戒故君子福大而愈懼爵隆而益恭遠察近覽俯仰有則銘諸几杖刻諸槃杅矜矜業業無怠無荒如此則百福是荷慶流無窮矣後漢張霸傳謂掾史曰大守起自孤生致位郡守蓋日中則移月滿則虧老氏有言知足不辱遂上病後召四遷為侍中晉羊祜傳嘗與從弟琇書曰既定邊事當角巾東路歸故里為容棺之墟以白士而居重位何能不以盛滿受責乎疏廣是吾師也新唐岑文本傳始為中書令有憂色母問之答曰非勳非舊責重位高所以憂也有來慶者輒曰今日受弔不受賀新出季義琰傳宅無正寢弟義璡為市堂材送之義琰曰以吾為國相且自愧尚營美宇是速吾禍豈愛我者耶答曰事難全遂物不兩興既處貴仕又廣居宇非有令德必受其殃卒不許餘見禍起於微陳忠傳箋證漢書張湯傳附子張安世安世自見父子尊顯懷不自安為子延壽求出補吏上以為北地太守贊曰安世履道滿而不溢漢書楚元王傳附劉德德常持老子知足之計妻死大將軍光欲以女妻之德不敢取畏盛滿也漢書公孫賀傳自公孫弘後丞相李蔡嚴青翟趙周三人比坐事死石慶雖以謹得終然數被譴初賀引拜為丞相不受印綬頓首涕泣曰臣本邊鄙以鞍馬騎射為官材誠不任宰相上與左右見賀悲哀感動下泣曰扶起丞相賀不肯起上乃起去賀不得已拜出左右問其故賀曰主上賢明臣不足以稱恐負重責從是殆矣後漢書馬援傳援謂黃門郎梁松竇固曰凡人為貴當使可賤如卿等欲不可復賤居高堅自持勉思鄙言松後果以貴滿致災固亦幾不免後漢書陰識傳附弟陰興遷侍中賜爵關內侯帝後召興欲封之置印綬於前興固讓曰臣未有先登陷陳之功而一家數人並蒙爵土令天下觖望誠為盈溢觖音羌志反前書音義曰觖猶冀也一音決猶望之也臣蒙陛下貴人恩澤至厚富貴已極不可復加至誠不願帝嘉興之讓不奪其志貴人問其故興曰貴人不讀書記邪亢龍有悔夫外戚家苦不知謙退嫁女欲配侯王取婦眄睨公主愚心實不安也富貴有極人當知足夸奢益為觀聽所譏後漢書樊宏傳宏為人謙柔畏慎不求茍進常戒其子曰富貴盈溢未有能終者吾非不喜榮藝也天道惡滿而好謙前世貴戚皆明戒也保身全已豈不樂哉後漢書崔駰傳竇氏之興肇自孝文二君以淳淑守道成名先日安豐以佐命著德顯自中興內以忠誠自固外以法度自守卒享祚國垂祉於今夫謙德之光周易所美滿溢之位道家所戒故君子福大而愈懼爵隆而益恭遠察近覽俯仰有則銘諸几杖刻諸盤杅矜矜業業無怠無荒如此則百福是荷慶流無窮矣後漢書張霸傳視事三年謂掾史曰太守起自孤生致位郡守蓋日中則移月滿則虧老氏有言知足不辱遂上病後徵四遷為侍中晉書羊祜傳嘗與從弟琇書曰既定邊事當角巾東路歸故里為容棺之墟以白士而居重位何能不以盛滿受責乎疏廣是吾師也新唐書岑文傳始為中書令有憂色母問之答曰非勳非舊責重位高所以憂也有來慶者輒曰今日受弔不受賀新唐書李義琰傳宅無正寢弟義璡為市堂材送之義琰曰以吾為國相且自愧尚營美宇是速吾禍豈愛我者邪義璡曰凡仕為丞尉且崇第舍兄位高安可逼下哉答曰不然事難全遂物不兩興既處貴仕又廣居宇非有令德必受其殃卒不許持滿第二史記越世家蠡對曰持滿者與天與天法天也天道盈而不溢定傾者與人節事者以地史記楚世家秦惠王初稱王六年楚使住國昭陽將兵而故魏破之於襄陵得八邑立移兵而攻齊齊士患之陳軫適為秦使齊齊王田為之奈何陳軫曰王弗憂請令罷之即往見昭陽軍中曰願聞楚國之法破軍殺將者何以貴之昭陽曰其官為上柱國封上爵執圭陳軫曰其有貴於此者乎昭陽曰令尹陳軫曰今君已為令尹矣此國冠之上臣請得譬之人有遺其舍人一巵酒者舍人相謂曰數人飲此不足以遍請遂畫地為蛇蛇先成者獨飲之一人曰吾蛇先成舉酒而起曰吾能為之足及其為之足而後成人奪之湍而飲之曰蛇固無足今為之足是非蛇也今君相楚而功魏破軍殺將功莫大焉冠之上不可以加矣今又移兵而攻齊攻齊勝之官爵不加於此攻之不勝身死爵奪有毀於楚此為蛇畫足之說也不若引兵而去以德齊此持滿之術也昭陽曰善引兵而去後漢申屠剛傳損益之際孔父攸歎說苑曰孔子讀易至損益歎子夏問曰夫子何為歎孔子曰夫自損者益自益者缺吾是以歎之矣持滿之戒老氏所慎老子曰持而盈之不如其已已止也言執滿必傾不如止也後漢梁統傳論曰順帝之世梁商稱為賢輔豈以其地居亢滿而能以願謹自終者乎魏真薨詔曰大司馬蹈履忠節佐命二祖內不恃親戚之寵外不驕白屋之士可謂能持盈守位勞謙其德者也箋證史記越王句踐世家越王謂范蠡曰以不聽子故至於此為之奈何蠡對曰持滿者與天集解韋昭曰與天法天也天道盈而不溢索隱與天天與也言持滿不溢與天同道故天與之定傾者與人節事者以地卑辭厚禮以遺之不許而身與之市史記楚世家秦惠王初稱王六年楚使柱國昭陽將兵而攻魏破之於襄陵得八邑又移兵而攻齊齊王患之陳軫適為秦使齊齊王曰為之奈何陳軫曰王勿憂請令罷之即往見昭陽軍中曰願聞楚國之法破軍殺將者何以貴之昭陽曰其官為上柱國封上爵執圭陳軫曰其有貴於此者乎昭陽曰令尹陳軫曰今君已為令尹矣此國冠之上臣請得譬之人有遺其舍人一卮酒者舍人相謂曰數人飲此不足以遍請遂畫地為蛇蛇先成者獨飲之一人曰吾蛇先成舉酒而起曰吾能為之足及其為之足而後成人奪之酒而飲之曰蛇固無足今為之足是非蛇也今君相楚而攻魏破軍殺將功莫大焉冠之上不可以加矣今又移兵而攻齊攻齊勝之官爵不加於此攻之不勝身死爵奪有毀於楚此為蛇為足之說也不若引兵而去以奔齊此持滿之術也昭陽曰善引兵而去後漢書申屠剛傳損益之際孔父攸歎說苑曰孔子讀易至損益則喟然而歎子夏問曰夫子何為歎孔子曰夫自損者益自益者缺吾是以歎之矣持滿之戒老氏所慎老子曰持而盈之不如其已已止也言藝滿必傾不如止也後漢書梁統傳論曰順帝之世梁商稱為賢輔豈以其地居亢滿而能以願謹自終者乎三國志魏志曹真傳真薨諡曰元侯子爽嗣帝追思真功詔曰大司馬蹈履忠節佐命二祖內不恃親戚之寵外不驕白屋之士可謂能持盈守位勞謙其德者也其悉封真五子羲訓則彥皚皆為列侯不能持滿第三史記穰侯傳太史公曰穰侯昭王親舅也而秦所以東益地弱諸侯嘗稱帝於天下天下皆西鄉稽首者穰侯之功也及其貴極富溢一夫開說身折勢奪而以憂死況於羈旅之臣乎前漢霍光傳贊曰霍光以結髮內侍起於階闥之間確然秉志誼形於主受襁褓之託任漢室之寄當廟堂擁幼君摧燕王仆上官因權制敵以成其忠處廢置之際臨大節而不可奪遂康國家安社稷擁昭立宣光為師保雖周公阿衡何以加此然光不學亡術暗於大理陰妻邪說立女為后湛溺盈溢之欲以增顛覆之禍死財三年宗族誅夷哀哉箋證史記穰侯傳太史公曰穰侯昭王親舅也而秦所以東益地弱諸侯嘗稱帝於天下天下皆西鄉稽首者穰侯之功也及其貴極富溢一夫開說身折勢奪而以憂死况於羈旅之臣乎漢書霍光金日磾傳贊曰霍光以結髮內侍起於階闥之間確然秉志誼形於主受襁褓之託任漢室之寄當廟堂擁幼君摧燕王仆上官因權制敵以成其忠處廢置之際臨大節而不可奪遂匡國家安社稷擁昭立宣光為師保雖周公阿衡何以加此然光不學亡術暗於大理陰妻邪謀立女為后湛溺盈溢之欲以增顛覆之禍死財三年宗族誅夷哀哉全身遠害第四前漢劉歆傳及歆親近欲建立左氏春秋及毛詩逸禮古人尚書皆列於學官哀帝令歆與五經博士講論其議諸博士或不肯置對歆因移書太常博士責讓之其言甚切諸儒皆怨恨是時名儒光祿大夫龔勝以歆移書上疏深自罪責願乞骸骨罷及儒者師丹為大司空亦大怒奏歆改亂舊章非毀先帝所立上曰歆欲廣道術亦何以為非毀哉歆由是忤執政大臣為衆儒所訕懼誅求出補吏為何內太守後漢齊武王縯傳縯孫敬王睦永平中法憲頗峻睦乃謝絶賓客放心音樂然性好讀書常為愛玩歲中遣中大夫奉璧朝賀召而謂之曰朝廷設問寡人大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士睦曰吁子危我矣此乃孤幼時進趣之行也大夫其對以孤襲爵以來志意衰惰聲色是娛犬馬是好使者受命而行其能屈申若此後漢郭太傳林宗雖善人倫而不為危言核論故宦官擅政而不能傷也及黨事起知名之士多被其害唯林宗及汝南袁閎得免焉後漢趙岐傳先是唐玹為京兆虎牙都尉郡人以玹進不由德皆輕侮之歧又數為貶議玹深毒恨延熹元年玹為京兆尹歧懼禍及乃與從子戩逃避之玹果收歧家屬宗親盡殺之歧遂逃難四方江淮海岱靡所不歷自匿姓名賣餅北海市中時孫嵩年二十餘遊市見歧察非常人停車呼與共載歸藏歧復壁中數年歧作厄屯歌二十三章後諸唐死滅因赦乃出後漢黨錮夏馥傳遂與范滂張儉等俱被誣陷詔下州郡捕為黨魁及儉等亡命經歷之處皆被收考辭所連引布遍天下馥乃頊足而歎曰孽自已作空汙良善一人逃死禍及萬家何以生為乃自翦須變形入林慮山中隱匿姓名為冶家傭親突煙炭形貌毀瘁積二三年人無知者後馥弟靜乘車馬載縑帛追之於涅陽市中遇馥不識聞其言聲乃覺而拜之馥避不與語靜追隨至客舍共宿夜中密呼靜曰吾以守道疾惡故為權宦所陷且念營苟全以庇性命弟奈何載物相求是以禍見追也明且別去吳步騭傳潁川周昭著書稱步騭及嚴畯等曰古今賢士大夫所以失名喪身傾家害國者其由非一也然要其大歸總其常患四者而已急論議一也爭名勢二也重朋黨三也務欲速四也急論議則傷人爭名勢則敗友重朋黨則蔽主務欲速則失德此四者不除未有能全也當世君子能不然者亦比有之豈獨古人乎然論其絶異未若顧豫章諸葛使君步丞相嚴衛尉張奮威之為美也論語言夫子恂恂然善誘人又曰成人之美不成人之惡豫章有之矣望之儼然即之也溫聽其言也厲使君體之矣恭而安威而不猛丞相履之矣學不求祿心無苟得衛尉奮威蹈之矣此五君者雖德實有荖輕重不同至於趣舍大檢不犯四者俱一揆也升降當世保全名行實有可師晉平原王幹傳史臣曰平原性理不常世莫之測及其處亂離之際屬交爭之秋而能遠害全身享茲介福其愚不可及也晉王戎子衍傳衍雖居宰輔之重不以經國為念而思自全之計說東海王越曰中國已亂當賴方伯宜得文武兼資以任之乃以弟澄為荊州族弟敦為青州因謂澄敦曰荊州有江漢之固青州有負海之嶮卿二人在外而吾留此足以為三窟矣識者鄙之晉阮籍傳魏晉之際天下多故名士少有全者籍由是不與世事遂酣飲為常文帝初欲為武帝求婚於籍籍醉六十日不得言而止鍾會數以時事問之欲因其可否而致之罪皆以酣醉獲免晉阮籍傳為尚書郎及曹爽輔政辭疾屏於田野俄而爽誅時人服其遠識後漢申屠蟠傳先是京師遊士范滂等非訐朝政自公卿已下皆折節下之太學生爭慕其風以為文學將興處士復用蟠獨歎曰昔戰國之世處士橫議列國之王至為推篲先驅卒有坑儒燒書之禍今之謂矣乃絶迹於梁碭之閒因樹為屋自同傭人居二年滂等果罹黨錮或死或刑者數百人蟠確然免於疑論箋證漢書楚元王傳劉歆傳及歆親近欲建立左氏春秋及毛詩逸禮古文尚書皆列於學官哀帝令歆與五經博士講論其義諸博士或不肯置對歆因移書太常博士責讓之其言甚切諸儒皆怨恨是時名儒光祿大夫龔勝以歆移書上疏深自罪責願乞骸骨罷及儒者師丹為大司空亦大怒奏歆改亂舊章非毀先帝所立上曰歆欲廣道術亦何以為非毀哉歆由是忤執政大臣為衆儒所訕懼誅求出補吏為河內太守後漢書齊武王縯傳附孫敬王睦永平中法憲頗峻睦乃謝絶賓客放心音樂然性好讀書常為愛玩歲終遣中大夫奉璧朝賀召而謂之曰朝廷設問寡人大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士臣雖螻蟻敢不以實睦曰吁子危我哉此乃孤幼時進趣之行也大夫其對以孤襲爵以來志意衰惰聲色是娛犬馬是好使者受命而行其能屈申若此後漢書郭太傳林宗雖善人倫而不為危言核論故宦官擅政而不能傷也及黨事起知名之士多被其害唯林宗及汝南袁閎得免焉遂閉門教授弟子以千數後漢書趙岐傳先是中常侍唐衡兄玹為京兆虎牙都尉郡人以玹進不由德皆輕侮之岐及從兄襲又數為貶議玹深毒恨延熹元年玹為京兆尹岐懼禍及乃與從子戩逃避之玹果收岐家屬宗親陷以重法盡殺之岐遂逃難四方江淮海岱靡所不歷自匿姓名賣餅北海市中時安丘孫嵩年二十餘遊市見岐察非常人停車呼與共載岐懼失色嵩乃下帷令騎屏行人密問岐曰視子非賣餅者又相問而色動不有重怨即亡命乎我北海孫賓石闔門百口藝能相濟岐素聞嵩名即以實告之遂以俱歸嵩先入白母曰出行乃得死友迎入上堂饗之極歡藏岐復壁中數年岐作厄屯歌二十三章後諸唐死滅因赦乃出後漢書黨錮列傳夏馥傳馥雖不交時宦然以聲名為中官所憚遂與范滂張儉等俱被誣陷詔下州郡捕為黨魁及儉等亡命經歷之處皆被收考辭所連引布遍天下馥乃頓足而歎曰孽自已作空汙良善一人逃死禍及萬家何以生為乃自剪須變形入林慮山中隱匿姓名為冶家傭親突煙炭形貌毀瘁積二三年人無知者後馥弟靜乘車馬載縑帛追之於高陽市中遇馥不識聞其言聲乃覺而拜之馥避不與語靜追隨至客舍共宿夜中密呼靜曰吾以守道疾惡故為權宦所陷且念營茍全以庇性命弟奈何載物相求是以禍見追也明旦別去黨禁未解而卒三國志吳志步騭傳潁川周昭著書稱步騭及嚴畯等曰古今賢士大夫所以失名喪身傾家害國者其由非一也然要其大歸總其常患四者而已急論議一也虛名勢二也重朋黨三也務欲速四也急論議則傷人爭名勢則敗友重朋黨則蔽主務欲速則失德此四者不除未有能全也當世君子能不然者亦比有之豈獨古人乎然論其絶異未若顧豫章諸葛使君步丞相嚴衛尉張奮威之為美也論語言夫子恂恂然善誘人又曰成人之美不成人之惡豫章有之矣望之儼然即之也溫聽其言也厲使君體之矣恭而安威而不猛丞相履之矣學不求祿心無茍得衛尉奮威蹈之矣此五君者雖德實有差輕重不同至於趣舍大檢不犯四者俱一揆也升降當世保全名行邈然絶俗實有所師晉書平原王幹傳史臣曰平原性理不恆世莫之測及其處亂離之際屬交爭之秋而能遠害全身享茲介福其愚不可及已晉書王戎傳附弟王衍衍雖居宰輔之重不以經國為念而思自全之計說東海王越曰中國已亂當賴方伯宜得文武兼資以任之乃以弟澄為荊州族弟敦為青州因謂澄敦曰荊州有江漢之固青州有負海之險卿二人在外而吾留此足以為三窟矣識者鄙之晉書阮籍傳籍本有濟世志屬魏晉之際天下多故名士少有全者籍由是不與世事遂酣飲為常文帝初欲為武帝求婚於籍籍醉六十日不得言而止鍾會數以時事問之欲因其可否而致之罪皆以酣醉獲免晉書阮籍傳復為尚書郎少時又以病免及曹爽輔政召為參軍籍因以疾辭屏於田里歲餘而爽誅時人服其遠識後漢書申屠蟠傳先是京師游士汝南范滂等非訐朝政自公卿以下皆折節下之太學生爭慕其風以為文學將興處士復用蟠獨歎曰昔戰國之世處士橫議列國之王至為擁篲先驅卒有坑儒燒書之禍今之謂矣乃絶迹於梁碭之間因樹為屋自同傭人居二年滂等果罹黨錮或死或刑者數百人蟠礭然免於疑論不能全身遠害第五史記孔子世家魯南宮敬叔言魯君曰請與孔子適周問禮老子曰仁人者送人以言吾竊仁人之號送子以言曰聰明深察而近於死者好議人者也博辨廣大危其身者發人之惡者也前漢鼂錯傳贊曰鼂錯鋭於為國遠慮而不見身害其父睹之經於溝瀆亡益救敗不如趙母指括以全其宗趙奢卒趙使趙括為將其母言之趙王曰願王易括王不許母要王括有罪願不坐王許之後括果敗於長平以母前約故卒不得坐悲夫錯雖不終世哀其忠故論其施行之語著于篇前漢司馬遷傳贊曰鳴呼以遷之博物洽聞而不能以知自全既陷極刑幽而發憤迹其所以自傷悼小雅巷伯之倫夫唯大雅既明且哲能保其身難矣哉後漢班固傳論曰固傷遷博物洽聞不能以智免極刑然亦身陷大戮智及之而不能守之嗚呼古人所以致論於目睫也如目見毫毛而不見其睫也魏志評曰崔琰高格最優鮑勛秉正無虧而皆不免其身惜哉大雅貴既明且哲虞書尚直而能溫自非兼才疇克備諸箋證史記孔子世家魯南畝敬叔言魯君曰請與孔子適周魯君與之一乘車兩馬一豎子俱適周問禮蓋見老子云辭去而老子送之曰吾聞富貴者送人以財仁人者送人以言吾不能富貴竊仁人之號送子以言曰聰明深察而近於死者好議人者也博辨廣大危其身者發人之惡者也為人子者毋以有已為人臣者毋以有已漢書爰盎鼂錯傳贊曰鼂錯鋭於為國遠慮而不見身害其父睹之經於溝瀆亡益救敗不如趙母指括以全其宗張晏曰趙奢卒趙使趙括為將其母言之趙王曰願王易括王不許母要王括有罪願不坐王許之後括果敗於長平以母前約故卒不得坐悲夫錯雖不終世哀其忠故論其施行之語著于篇漢書司馬遷傳贊曰嗚呼以遷之博物洽聞而不能以知自全既陷極刑幽而發憤書亦信矣迹其所以自傷悼小雅巷伯之倫夫唯大雅既明且哲能保其身難矣哉後漢書班固傳論曰固傷遷博物洽聞不能以智免極刑然亦身陷大戮智及之而不能守之嗚呼古人所以致論於目睫也史記齊使者至越曰幸也越之不亡也吾不遺其智之如目見毫毛而不見其睫也今越王知晉之失計不自知越人之過是目論也言班固譏遷被刑而不知身自遇禍三國志魏志崔琰毛玠徐奕何夔邢顒鮑勛司馬芝傳評曰崔琰高格最優鮑勛秉正無虧而皆不免其身惜哉大雅貴既明且哲虞書尚直而能溫自非兼才疇克備諸
