body:
  text: 卷第二十七一心第一前漢魏相時丙吉為御史大夫同心輔政之皆重之前漢周緤傳戰有利不利終亡離上心上以緤為信武侯以其忠信故加此號後漢孝桓紀皇帝稱制群公卿士虔恭爾仇戮力一意勉同斷金金者剛之物言人能同心則其利可以斷之易曰二人同心其利斷金箋證漢書魏相傳時丙吉為御史大夫同心輔政上皆重之相為人嚴毅不如吉寬視事九歲神爵三年薨諡曰憲侯漢書周緤傳周緤沛人也以舍人從高祖起沛至霸上西入蜀漢還定三秦常為參乘賜食邑池陽從東擊項羽滎陽絕甬道從出度平陰遇韓信軍襄國戰有利不利終亡離上心上以緤為信武侯師古曰以其忠信故加此號食邑三千三百戶後漢書桓帝紀和平元年春正月甲子大赦天下改元和平己亥詔曰及今令辰皇帝稱制群公卿士虔恭爾位戮力一意勉同斷金金者剛之物也言人能同心則其利可以斷之也易曰二人同心其利斷金卷七臣無二心第二前漢王陵傳始為縣豪高祖微時兄事陵及高祖起沛入咸陽陵亦聚黨數千人居南陽陵迺以兵屬漢項羽取陵母致軍中陵使至則東鄉坐陵母欲以招陵陵母既私送使者泣曰願語陵善事漢王漢王長者母以老妾故臣二心妾以死送使者遂伏劍而死項王怒烹陵母陵卒從漢王前漢蘇武不降單于曰武父子亡功德皆為陛下所成就位列將爵通侯兄弟親近常願肝腦塗地今得殺身自效雖蒙斧鉞湯鑊誠甘樂之臣事君猶子事父也子為父死無所限前漢衛綰傳孝景為太子時召上左右飲而綰稱病不行文帝且崩時屬孝景曰綰長者善遇之不行恐文帝謂豫有二心事太子後漢隗囂傳將王捷別在戎丘登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷請自殺以明之遂自刎頸死後漢宋均傳永平七年均拜尚書令均嘗刪翦疑事帝以為有姦大怒收郎縳格之均顧厲色曰蓋忠臣執義無有二心均雖死不易志小黃門入具以聞帝善其不撓遷均司隸校尉後漢皇甫嵩傳信都令漢陽閻忠干說嵩曰難得而易失者時也時至而不旋踵者幾也故聖人順時以動智者因機以發今將軍遭難得之運蹈易駭之機而踐運不撫臨機不發何以保大名乎嵩曰何謂也忠曰天道無親百姓與能今將軍兵動若神謀不再計摧強易於折枯消堅甚於湯雪旬月之間神兵電埽威德振本朝風聲馳海外雖湯武之舉未有高將軍者也今身建不賞之功體兼高人之德而北面庸主何以求安乎嵩曰夙夜在公心不忘忠何故不安忠曰不然昔韓信不忍一餐之遇而棄三分之業利劍揣其喉方發悔毒之歎者機失而謀乖也今主上勢弱於劉項將軍權重於淮陰指撝足以振風雲叱咤可以興雷電赫然奮斧因危抵頹音紙擊也崇恩以綏先附振武以臨後服召冀方之士動七州之眾羽檄先馳於前大軍響振於後蹈流漳河飲馬孟津誅閹官之罪除群凶之積雖僮兒可使奮拳以致力女子可使騫裳而用命況厲熊羆之卒因迅風之勢哉功業已就天下以順然後請呼上帝示以天命混齊六合南面稱制實神機之至會風發之良時也夫既朽不雕衰世難佐若欲輔難佐之朝雕朽敗之木是猶逆坂走丸迎風縱棹豈云易哉且今豎官群居同惡如市上命不行權歸近習昏主之下難以久居不賞之功讒人側目如不早圖後悔無及嵩懼曰非常之謀不施於有常之埶創圖大功豈庸才所致黃巾細孽敵非秦項新結易散難以濟業且人未忘主天不祐逆若虛造不冀之功以速朝夕之禍孰與委忠本朝守其臣節雖云多讒不過放廢猶有令名死且不朽反常之論所不敢聞忠知計不用因亡去晉周虓傳遷梓潼太守符堅將寇梓潼虓固守涪城遣步騎送母妻從漢水將抵江陵為堅所獲之虓遂降于堅堅欲以為尚書郎虓曰蒙國恩厚以至今日但老母見獲失節於此母子獲全秦之惠也雖公侯之貴不以為榮況郎任乎堅乃止自是每入見堅輒箕踞而坐呼之為氐賊屬元會威儀甚整堅曰晉家元會如何虓曰戎狄集聚譬猶犬羊相群何敢比天子及呂光征西域堅出餞之戎卒二十萬旌旗數百里又問虓曰朕眾力何如虓曰戎狄已來未之有也堅黨以虓不遜屢請除之賢二之彌厚虓與堅兄子苞謀襲堅事泄堅引虓問其狀虓曰昔漸離豫讓燕智之微臣猶漆身吞炭不忘忠節況虓累世蒙恩豈敢忘也生為晉臣死為晉鬼復何問乎堅曰今殺之適成其名矣遂撻之徙於太原後堅復陷順陽魏興獲二守皆執節不撓堅歎曰周孟威不屈於前丁彥遠潔己於後吉祖沖不食而死皆忠臣也虓後卒帝贈益州剌史新唐尉遲敬德傳元吉將謀害太宗密致書以招尉遲仍贈以金銀器物一車辭曰尉遲起自幽賤逢遇隋亡久淪逆地罪不容誅實荷秦王惠以生命今又隸名藩邸唯當以身報恩於殿下無功不敢謬當重賜若私許殿下便是二心徇利忘忠殿下亦何所用餘見徇公滅私李忠傳又見著書淮南王傳箋證漢書王陵傳王陵沛人也始為縣豪高祖微時兄事陵及高祖起沛入咸陽陵亦聚黨數千人居南陽不肯從沛公及漢王之還擊項籍陵迺以兵屬漢項羽取陵母置軍中陵使至則東鄉坐陵母欲以招陵陵母既私送使者泣曰願為老妾語陵善事漢王漢王長者毋以老妾故持二心妾以死送使者遂伏劍而死項王怒亨陵母陵卒從漢王定天下漢書蘇建傳附蘇武武字子卿少以父任兄弟竝為郎初武與李陵俱為侍中武使匈奴明年陵降不敢求武久之單于使陵至海上為武置酒設樂因謂武曰單于聞陵與子卿素厚故使陵來說足下武曰武父子亡功德皆為陛下所成就位列將爵通侯兄弟親近常願肝腦塗地今得殺身自效雖蒙斧鉞湯鑊誠甘樂之臣事君猶子事父也子為父死無所恨願勿復再言漢書衛綰傳衛綰代大陵人也以戲車為郎事文帝功次遷中郎將醇謹無它孝景為太子時召上左右飲而綰稱病不行張晏曰恐文帝謂豫有二心事太子文帝且崩時屬孝景曰綰長者善遇之後漢書隗囂傳月餘楊廣死囂窮困其大將王捷別在戎丘登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷請自殺以明之遂自刎頸死後漢書宋均傳宋均字叔庠南陽安眾人也永平七年徵拜尚書令每有駮議多合上旨均嘗刪翦疑事帝以為有姦大怒收郎縳格之諸尚書惶恐皆叩頭謝罪均顧厲色曰蓋忠臣執義無有二心若畏威失正均雖死不易志小黃門在傍入具以聞帝善其不撓即令貰郎遷均司隸校尉後漢書皇甫嵩傳信都令漢陽閻忠干說嵩曰干謂冒進難得而易失者時也時至不旋踵者幾也故聖人順時以動智者因幾以發今將軍遭難得之運蹈易駭之機而踐運不撫臨機不發將何以保大名乎嵩曰何謂也忠曰天道無親百姓與能今將軍受鉞於暮春收功於末冬兵動若神謀不再計摧強易於折枯消堅甚於湯雪旬月之間神兵電埽封尸刻石南向以報威德震本朝風聲馳海外雖湯武之舉未有高將軍者也今身建不賞之功體兼高人之德而北面庸主何以求安乎嵩曰夙夜在公心不忘忠何故不安忠曰不然昔韓信不忍一餐之遇而棄三分之業利劍已揣其喉方發悔毒之歎者機失而謀乖也今主上埶弱於劉項將軍權重於淮陰指撝足以振風雲叱咤可以興雷電赫然奮發因危抵頹抵音紙擊也崇恩以綏先附振武以臨後服徵冀方之士動七州之眾羽檄先馳於前大軍響振於後蹈流漳河飲馬孟津誅閹宦之罪除群凶之積雖僮兒可使奮拳以致力女子可使褰裳以用命况厲熊羆之卒因迅風之埶哉功業已就天下已順然後請呼上帝示以天命混齊六合南面稱制移閹器於將興推亡漢於已墜實神機之至會風發之良時也夫既朽不雕衰世難佐若欲輔難佐之朝雕朽敗之木是猶逆坂走丸迎風縱棹豈云易哉且今豎群居同惡如市上命不行權歸近習昏主之下難以久居不賞之功讒人側目如不早圖後悔無及嵩懼曰非常之謀不施於有常之埶創圖大功豈庸才所致黃巾細孽敵非秦項新結易散難以濟業且人未忘主天不祐逆若虛造不冀之功以速朝夕之禍孰與委忠本朝守其臣節雖云多讒不過放廢猶有令名死且不朽反常之論所不敢聞忠知計不用因亡去晉書周虓傳虓字孟威少有節操州召為祭酒後歷位至西夷校尉領梓潼太守寧康初苻堅將楊安寇梓潼虓固守涪城遣步騎數千送母妻從漢水將抵江陵為堅將朱彤邀而獲之虓遂降于安堅欲以為尚書郎虓曰蒙國厚恩以至今日但老母見獲失節於此母子獲全秦之惠也雖公侯之貴不足為榮况郎任乎堅乃止自是每入見堅輒箕踞而坐呼之為氐賊堅不悅屬元會威儀甚整堅因謂虓曰晉家元會何如此虓攘袂厲聲曰戎狄集聚譬猶犬羊相群何敢比天子及呂光征西域堅出餞之戎士二十萬旌旗數百里又問虓曰朕眾力何如虓曰戎夷以來未之有也堅黨以虓不遜屢請除之堅待之彌厚虓乃密書與桓沖說賊姦計太元三年虓潛至漢中堅追得之後又與堅兄子苞謀襲堅事泄堅引虓問其虓虓曰昔漸離豫讓燕智之微臣猶漆身吞炭不忘忠節况虓世荷晉恩豈敢忘也生為晉臣死為晉鬼復何問乎堅曰今殺之適成其名矣遂撻之徙于太原後堅復陷順陽魏興獲二守皆執節不撓堅歎曰周孟威不屈於前丁彥遠潔己於後吉祖沖不食而死皆忠臣也虓竟以病卒於太原孝武帝詔曰虓厲志貞亮無愧古烈未及拔身奄隕厥命甄表義節國之典也贈龍驤將軍益州刺史賻錢二十萬布百匹又贍賜其家舊唐書尉遲敬德傳元吉將謀害太宗密致書以招敬德曰願迂長者之眷敦布衣之交幸副所望也仍贈以金銀器物一車敬德辭曰敬德起自幽賤逢遇隋亡天下土崩竄身無所久淪逆地罪不容誅實荷秦王惠以生命今又隸名藩邸惟當以身報恩於殿下無功不敢謬當重賜若私許殿下便是二心徇利忘忠殿下亦何所用徇公滅私第三後漢左雄傳薦周舉為尚書舉既稱職議者咸稱焉及在司隸又舉故冀州剌史馮直以為將帥而直嘗坐臧受罪舉以此劾奏雄雄悅曰吾嘗事馮直之父而又與直善今周舉以此奏吾乃是韓厥之舉也由是天下服焉後漢李忠傳王郎遣將攻信都信都大姓馬寵等開城內之收太守及忠母妻而令親屬招呼忠時寵弟從忠為校尉忠即時召責殺之諸將皆驚曰家屬在人手中殺其弟何猛也忠曰若縱賊不誅則二心也世祖聞而美之魏李通傳為陽安都尉通妻伯父犯法朗陵長趙儼收治致之大辟是時殺生之柄決於牧守通妻子號泣以請其命通曰方與曹公戮力義不以私廢公嘉儼執憲不阿與為親交魏李典傳遷破虜將軍與張遼樂進屯合肥孫權率眾圍之遼欲奉教出戰進典遼皆素不睦遼恐其不從興惟然曰此國家大事顧君計何如耳吾不可以私憾而忘公義乎乃率眾與遼破走權蜀董和傳自和居官食祿外牧殊域內幹機衡二十餘年死之日家無儋石之財晉宣帝紀誅公孫文懿時有兵士寒凍乞襦帝不之與帝曰襦者官物人臣無私施也餘見臣能勝任楊震傳箋證後漢書左雄傳初雄薦周舉為尚書舉既稱職議者咸稱焉及在司隸又舉故冀州刺史馮直以為將帥而直嘗坐臧受罪舉以此劾奏雄雄悅曰吾嘗事馮直之父而又與直善今宣光以此奏吾乃是韓厥之舉也由是天下服焉韓厥韓獻子也後漢書李忠傳李忠字仲都東萊黃人也王郎遣將攻信都信都大姓馬寵等開城內之收太守宗廣及忠母妻而令親屬招呼忠時寵弟從忠為校尉忠即時召見責數以背恩反城因格殺之諸將皆驚曰家屬在人手中殺其弟何猛也忠曰若縱賊不誅則二心也世祖聞而美之三國志魏志李通傳李通字文達江夏平春人也封建功侯分汝南二縣以通為陽安都尉通妻伯父犯法朗陵長趙儼收治致之大辟是時殺生之柄決於牧守通妻子號泣以請其命通曰方與曹公戮力義不以私廢公嘉儼執憲不阿與為親交三國志魏志李典傳遷破虜將軍與張遼樂進屯合肥孫權率眾圍之遼欲奉教出戰進典遼皆素不睦遼恐其不從典慨然曰此國家大事顧君計何如耳吾可以私憾而忘公義乎乃率眾與遼破走權三國志蜀志董和傳先主定蜀徵和為掌軍中郎將與軍師將軍諸葛亮並署左將軍大司馬府事獻可替否共為歡交自和居官食祿外牧殊域內幹機衡二十餘年死之日家無儋石之財晉書宣帝紀初文懿所其叔父恭位而囚之及將反將軍綸直賈範等苦諫文懿皆殺之帝乃釋恭之囚封直等之墓顯其遺嗣令曰古之伐國誅其鯨鯢而已諸為文懿所詿誤者皆原之中國人欲還舊鄉恣聽之時有兵士寒凍乞襦帝弗之與或曰幸多故襦可以賜之帝曰襦者官物人臣無私施也守節第四前漢東方朔傳傳曰天不為人之惡寒而輟其冬地不為人之惡險而輟其廣君子不為小人之匈匈而易其行天有常度地有常形君子有常行君子道其常小人計其功道由也前漢傳喜傳莽白太后下詔曰高武侯喜姿性人愨論議忠直雖與故定陶太后有屬終不順指從邪介然守節以故斥逐就國傳不云乎歲寒然後知松柏之後凋也其還喜高安侯前漢律歷志銅為物之至精不為燥溼寒暑變其節不為風雨暴露改其形介然有常有似於士君子之行後漢朱暉傳永平初顯宗舅新陽侯陰就慕暉賢自往候之暉避不見復遣家丞致禮暉遂閉門不受就聞歎曰志士也勿奪其節箋證漢書東方朔傳朔上書陳農戰彊國之計因自訟獨不得大官欲求試用其言專商鞅韓非之語也指意放蕩頗復詼諧辭數萬言終不見用朔因著論設客難己用位卑以自慰諭其辭曰傳曰天不為人之惡寒而輟其冬地不為人之惡險而輟其廣君子不為小人之匈匈而易其行天有常度地有常形君子有常行君子道其常小人計其功師古曰道由也漢書傅喜傳莽白太后下詔曰高武侯喜姿性端愨論議忠直雖與故定陶太后有屬終不順指從邪介然守節以故斥逐就國傳不云乎歲寒然後知松柏之後凋也其還喜長安以故高安侯莫府賜喜漢書律歷志第一上凡律度量衡用銅者名自名也師古曰取銅之名以合於同也所以同天下齊風俗也銅為物之至精不為燥溼寒暑變其節不為風雨暴露改其形介然有常有似於士君子之行是以用銅後漢書朱暉傳朱暉字文季南陽宛人也永平初顯宗舅新陽侯陰就慕暉賢自往候之暉避不見復遣家丞致禮暉遂閉門不受就聞歎曰志士也勿奪其節死節第五前漢卜式傳呂嘉反式上書曰臣聞主媿臣死群臣宜盡死節其駑下者宜出財以佐軍如是則強國不犯之道也臣願與子男及臨菑習弩慱昌習船者請行死之以盡臣節上賢之下詔曰齊相日者北邊有興上書助官往年西河歲惡率齊人入粟今又首奮雖未戰可謂義形於內矣其賜爵關內侯後漢子固社喬傳論曰夫稱仁者其道深矣立言踐行豈徒徇名安己而已哉將以定去就之既正天下之風使生以理全死與義合也夫專為義則傷生專為生則騫義專為物則害智專為己則損仁若義重於生舍生可也生重於義全生可也上以殘闇失君道下以篤固盡臣節盡而死之則為殺身以成仁去之不為求生以害仁也順桓之間國統三絕太后稱制賊臣虎視李固據位持重以爭大義確乎而不可奪豈不知守節之觸禍恥夫覆折之傷任也觀其發正辭及所遺梁冀書雖機失謀乖猶戀戀而不能已至矣哉社稷之心乎後漢溫序傳遷護羌校尉序行部至襄武為隗囂別將苟宇所拘劫宇謂序曰子若與我并威同力天下可圖也序曰受國重任分當效死義不貪生苟背恩德宇等復曉譬之序叱宇等曰虜何敢迫脅漢將因以節撾殺數人賊眾爭欲殺之宇止之曰此義士死節可賜以劍序受劍銜鬚於口顧左右曰既為賊所迫殺無令鬚汙土遂伏劍而死後漢張酺傳東郡吏王青者祖父翁與前太守翟義起兵攻王莽及義敗餘眾悉降翁獨守節力戰父隆建武初為都尉功曹青為小吏俱從都尉行縣道遇賊隆死於難青亦被矢貫咽流喝乃上疏薦青三世死節宜蒙顯異由此為司空所辟箋證漢書卜式傳上以式朴忠拜為齊王太傅轉為相會呂嘉反式上書曰臣聞主媿臣死群臣宜盡死節其駑下者宜出財以佐軍如是則強國不犯之道也臣願與子男師古曰子男自謂其子也及臨菑習弩博昌習船者請行死之以盡臣節上賢之下詔曰齊相雅行躬耕隨牧畜蕃輒分昆弟更造不為利惑日者北邊有興師古曰日者往日也興謂發軍上書助官往年西河歲惡率齊人入粟今又首奮雖未戰可謂義形於內矣其賜式爵關內侯後漢書李杜列傳論曰夫稱仁者其道弘矣弘大也言非一塗也立言踐行豈徒徇名安己而已哉立其言必踐而行之將以定去就之概正天下之風使生以理全死與義合也概節也立身之道唯孝與忠全死生之義須得其所夫專為義則傷生專為生則騫義專為物則害智專為己則損仁若義重於生舍生可也生重於義全生可也上以殘闇失君道下以篤固盡臣節臣節盡而死之則為殺身以成仁去之不為求生以害仁也順桓之間國統三絕太后稱制賊臣虎視李固據位持重以爭大義確乎而不可奪豈不知守節之觸禍恥夫覆折之傷任也易曰鼎折足覆公餗言不勝其任也觀其發正辭及所遺梁冀書雖機失謀乖猶戀戀而不能已至矣哉社稷之心乎後漢書獨行列傳溫序傳溫序字次房太原祁人也六年拜謁者遷護羌校尉序行部至襄武為隗囂別將苟宇所拘劫宇謂序曰子若與我并威同力天下可圖也序曰受國重任分當效死義不貪生苟背恩德宇等復曉譬之序素有氣力大怒叱宇等曰虜何敢迫協漢將因以節撾殺數人賊眾爭欲殺之宇止之曰此義士死節可賜以劍序受劍銜鬚於口顧左右曰既為賊所迫殺無令鬚汙土遂伏劍而死後漢書張酺傳郡吏王青者謝承書曰青字公然東都聊城人也祖父翁與前太守翟義起兵攻王莽及義敗餘眾悉降翁獨守節力戰莽遂燔燒之父隆建武初為都尉功曹青為小史與父俱從都尉行縣道遇賊隆以身衛全都尉遂死於難青亦被矢貫咽音聲流喝流或作嘶喝音一介反廣蒼曰聲之幽也前郡守以青身有金夷竟不能舉酺見之歎息曰豈有一門忠義而爵賞不及乎遂擢用極右曹乃上疏薦青三世死節宜蒙顯異奏下三公由此為司空所辟視死如歸第六前漢季布欒布田叔傳贊曰欒布哭彭越田叔隨張敖赴死如歸彼誠知所處雖古烈士何以加之蜀蔣琬費褘姜維傳干寶曰姜維為蜀相國亡主辱弗之死而死於鍾會之亂惜哉非死之難處死之難也是以古之烈士見危受命投節如歸非不愛死也固知命之不長而懼不得其所也新唐段秀實傳鄭覃曰自古殺身利社稷未有如秀實者箋證漢書季布欒布田叔傳贊曰欒布哭彭越田叔隨張敖赴死如歸彼誠知所處雖古烈士何以加哉三國志蜀志蔣琬費褘姜維傳裴松之注引干寶曰姜維為蜀相國亡主辱弗之死而死於鍾會之亂惜哉非死之難處死之難也是以古之烈士見危授命投節如歸非不愛死也固知命之不長而懼不得其所也新唐書段秀實傳段秀實字成公本姑臧人曾祖師濬仕為隴州刺史留不歸更為汧陽人鄭覃曰自古殺身利社稷未有如秀實者
