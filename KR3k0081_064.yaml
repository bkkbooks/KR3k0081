body:
  text: 卷第六十四家道第一前漢石慶傳出為齊相齊國慕其家行不治而齊國大治不治言無所治罰前漢劉向傳向睹俗彌奢淫而趙衛之屬起微賤踰禮制向以為王教自內及外自近者始故採取詩書所載賢妃正婦興國顯家可法則及孽嬖亂亡者序次為列女傳凡八篇以戒天子後漢李通傳通父守為人嚴毅居家如官廷後漢繆彤傳少孤兄弟四人皆同財業及各娶妻諸婦遂求分異又數有鬭爭之言彤深懷憤歎乃掩戶自撾曰繆彤汝修身謹行學聖人之法將以齊整風俗奈何不能正其家乎弟及諸婦聞之悉叩頭謝罪遂更為敦睦之行新唐宗室傳韓元王嘉與弟靈夔友愛燕見終日如布衣禮閨門整肅當時稱之箋證漢書萬石君列傳慶為太僕出為齊相齊國慕其家行不治而齊國大治師古曰不治言無所治罰卷四十六案萬石慶乃萬石君少子也又史記萬石君列傳萬石君正義以父及四子皆二千石故號奮為萬石君名奮其父趙人也姓石氏漢書楚元王傳附劉向向睹俗彌奢淫而趙衛之屬起微賤踰禮制向以為王教由內及外自近者始故採取詩書所載賢妃貞婦興國顯家可法則及孽嬖亂亡者序次為列女傳凡八篇以戒天子後漢書李通傳李通字次元南陽宛人也世以貨殖著姓父守身長九尺容貌絶異為人嚴毅居家如官廷後漢書獨行列傳繆肜傳繆肜字豫公汝南召陵人也少孤兄弟四人皆同財産及各娶妻諸婦遂求分異又數有鬭爭之言肜深懷憤歎乃掩戶自撾曰繆肜汝修身謹行學聖人之法將以齊整風俗奈何不能正其家乎弟及諸婦聞之悉叩頭謝罪遂更為敦睦之行新唐書高祖諸子列傳韓王元嘉韓王元嘉與弟靈夔友愛燕見終日如布衣禮閨門修整當世稱之親親第二史記漢興諸侯年表太史公曰周封五等公侯伯子男然封伯禽康叔於魯衛地各四百里親親之義褒有德也前漢景十三王中山靖王勝傳武帝初大臣懲吳楚七國行事議者多冤鼂錯之策皆以諸侯連城數十泰強欲稍侵削數奏暴其過惡諸侯王自以骨肉至親先帝所以廣封連城犬牙相錯者為盤石宗也今或無罪為臣下所侵辱有司吹毛求疵笞服其臣使證其君多自以侵冤建元三年代王登長沙王發中山王勝濟川王明來朝天子置酒勝聞樂聲而泣問其故勝對曰今臣心結日久每聞幼眇之聲不知涕泣之橫集也夫衆煦漂山吹煦漂動聚蚊成靁朋黨執虎十夫橈椎是以文王拘於羑里孔子厄於陳蔡此乃蒸庶之成風增積之生害也臣身遠與寡黨與莫為之先衆口鑠金積毀銷骨叢輕折軸羽翮飛肉紛驚逢羅法岡潸然出涕臣聞白日曬光幽隱皆照明月曜夜蚊虻宵見然雲蒸列布沓冥晝昏塵埃抪覆昧不見泰山何則物有蔽之也今臣雍閼不得聞讒言之徒螽生道遼路遠曾莫為臣聞臣竊自悲也具以吏所侵聞於是上乃厚諸侯之禮省有司所奏諸侯事加親親之恩焉前漢梅福傳上書曰漢興以來社稷二危呂霍上官皆母后之家也親親之道全之為右當與之賢師良傅教以忠孝之道今乃尊寵其位授以魁柄使之驕逆至於夷滅此失親親之大者也魏明帝詔曰古者諸侯朝聘所以敦睦親親協和萬國也餘見前漢惠帝紀箋證史記漢興以來諸侯年表太史公曰殷以前尚矣周封五等公侯伯子男然封伯禽康叔於魯衛地各四百里親親之義褒有德也漢書景十三王傳中山靖王勝中山靖王勝以孝景前三年立武帝初即位大臣懲吳楚七國行事議者多冤鼂錯之策師古曰言錯策為是枉見殺也皆以諸侯連城數十泰彊欲稍侵削數奏暴其過惡諸侯王自以骨肉至親先帝所以廣封連城犬牙相錯者為盤石宗也今或無罪為臣下所侵辱有司吹毛求疵笞服其臣使證其君多自以侵冤建元三年代王登長沙王發中山王勝濟川王明來朝天子置酒勝聞樂聲而泣問其故勝對曰今臣心結日久每聞幼眇之聲不知涕泣之橫集也夫衆喣漂山應劭曰喣吹喣也師古曰漂動也喣音許句反又音許于反漂音匹遙反劉奉世曰喣吐沫也聚蚊成靁師古曰蚊古蚊字靁古雷字言衆蚊飛聲有若雷也朋黨執虎十夫橈椎是以文王拘於牖里孔子厄於陳蔡此乃蒸庶之成風增積之生害也臣身遠與寡莫為之先衆口鑠金積毀銷骨叢輕折軸羽翮飛肉紛驚逢羅潸然出涕晉灼曰言皆驚亂遇法罔可為出涕者也師古曰潸垂涕貌音所姦反臣聞白日曬光幽隱皆照明月曜夜蚊虻宵見然雲蒸列布杳冥晝昏塵埃抪覆昧不見泰山何則物有蔽之也今臣雍閼不得聞讒言之徒𧄪生道遼路遠曾莫為臣聞臣竊自悲也具以吏所侵聞於是上乃厚諸侯之禮省有司所奏諸侯事加親親之恩焉漢書梅福傳是時成帝委任大將軍王鳳鳳專藝擅朝而京兆尹王章素忠直譏刺鳳為鳳所誅王氏浸盛災異數見群下莫敢正言福復上書曰漢興以來社稷三危呂霍上官皆母后之家也親親之道全之為右當與之賢師良傅教以忠孝之道今乃尊寵其位授以魁柄使之驕逆至於夷滅此失親親之大者也三國志魏志明帝睿五年八月詔曰古者諸侯朝聘所以敦睦親親協和萬國也父子道絶第三前漢戾太子傳壺關三老茂上書曰臣聞父者猶天母者猶地子猶萬物也故天平地安陰陽和調物乃茂盛父慈母愛室家之中子乃孝順陰陽不和則萬物夭傷父子不和則室家喪亡後漢逢萌傳時王莽殺其子宇萌謂友人曰三綱絶矣謂君臣夫婦父子箋證漢書武五子傳戾太子戾太子據元狩元年立為皇太子年七歲矣壺關三老茂上書曰師古曰壺關上黨之縣也荀悅漢紀云令狐茂班史不載其姓不知於何得也臣聞父者猶天母者猶地子猶萬物也故天平地安陰陽和調物乃茂成父慈母愛室家之中子産孝順陰陽不和則萬物夭傷父子不和則室家喪亡後漢書逸民列傳逢萌傳逢萌字子慶北海都昌人也時王莽殺其子宇前書莽隔寬平帝外家衛氏宇恐帝大後見怨以為莽不可諫而好鬼神即夜持血灑莽第門吏發覺之莽執宇送獄飲藥而死萌謂友人曰三綱絶矣謂君臣夫婦父子父子為相第四前漢韋賢子元成復以明經歷位至丞相故鄒魯諺曰遺于黃金滿籯不如一經前漢平當傳平子晏以明經歷位大司徒封防鄉侯漢興唯韋平父子至宰相後漢楊震傳論曰延光之間震為上相抗方直以臨權枉先公道而後身名可謂懷王臣之節識所任之體矣遂纍葉載德繼踵宰相信哉積善之家必有餘慶先世韋平方之蔑矣新唐蕭瑀傳贊曰梁蕭氏興江左實有功在民故餘祉及其後裔自瑀逮遘凡八葉宰相名德相望與唐盛衰世家之盛古未有也箋證漢書韋賢傳韋賢字長孺魯國鄒人也賢為人質朴少欲篤志於學兼通禮尚書以詩教授號稱鄒魯大儒徵為博士給事中進授昭帝詩稍遷光祿大夫詹事至大鴻臚地節三年以老病乞骸骨賢四子長子方山為高寢令早終次子弘至東海太守次子舜留魯守墳墓少子玄成復以明經歷位至丞相故鄒魯諺曰遺子黃金滿籯不如一經漢書平當傳子晏以明經歷位大司徒封防鄉侯漢興唯韋平父子至宰相師古曰韋謂韋賢也後漢書楊震傳論曰延光之間震為上相抗直方以臨權枉先公道而後身名可謂懷王臣之節識所任之體矣遂纍葉載德繼踵宰相信哉積善之家必有餘慶先世韋平方之蔑矣韋賢平當父子並相繼為丞相新唐書蕭瑀傳贊曰梁蕭氏興江左實有功在民厥終無大惡以寖微而亡故餘祉及其後裔自瑀逮遘凡八葉宰相名德相望與唐盛衰世家之盛古未有也友于兄弟第五後漢姜肱傳肱與二弟仲海季江俱以孝行著聞其友愛天莫常共臥起以係嗣當立乃遞往就室後漢蔡雍傳與叔父從弟同居三世不分財鄉黨高其義新唐李績傳與弟弼特存友愛閨門之內肅若嚴君新唐讓皇帝憲傳帝嘗以書賜憲等曰魏文帝詩西山一何高高處殊無極上有兩仙童不飲亦不食賜我一丸藥光耀有五色服之四五日身輕生羽翼朕每言服藥而求羽翼寧如兄弟天生之羽翼乎陳思王之才足以經綸絶其朝謂卒使憂死魏作未終司馬氏奪之豈神丸效邪餘見求賢晉武紀箋證後漢書姜肱傳姜肱字伯淮彭城廣戚人也家世名族肱與二弟仲海季江俱以孝行著聞其友愛天至常共臥起及各娶妻兄弟相戀不能別寢以係嗣當立乃遞往就室後漢書蔡雍傳雍性篤孝與叔父從弟同居三世不分財鄉黨高其義舊唐書李績傳與弟弼特存友愛閨門之內肅若嚴君新唐書三宗諸子列傳讓皇帝憲時以鶺鴒千數集麟德殿廷樹翔棲浹日左清道率府長史魏光乘作頌以為天子友悌之祥帝喜亦為作頌憲尤謹畏未嘗干政而與人交帝益信重嘗以書賜憲等曰魏文帝詩西山一何高高高殊無極上有兩仙童不飲亦不食賜我一丸藥光耀有五色服之四五日身體生羽翼朕每言服藥而求羽翼寧如兄弟天生之羽翼乎陳思王之才足以經國絶其朝謁卒使憂死魏祚未終司馬氏奪之豈神丸效耶兄弟道絶第六史記鄭世家莊公封弟段於京祭仲曰京大於國非所以封庶也莊公曰武姜欲之我弗敢奪也段至京繕治甲兵與其母武姜謀襲鄭段果襲鄭武姜為內應莊公發兵伐段段走出奔共於是莊公遷其母武姜於城頴前漢淮南厲王長傳制曰其赦長死罪廢勿王有司奏請處蜀嚴道袁盎諫曰上素驕淮南王不為置嚴相傅以故至此且淮南王為人剛今暴摧折之臣恐其逢霧露病死陛下有後弟之名奈何上曰吾特苦之耳令復之淮南王乃不食而死悲哭謂袁盎曰吾不從公言卒亡淮南王民有作歌曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容上聞之曰昔堯舜放逐骨肉周公殺管蔡天下稱聖不以私害公天下豈以為我舍淮南地邪乃徙城陽王王淮南故地而追尊淮南王為厲王前漢田蚡傳召客飲坐其兄蓋侯北鄉自坐東鄉以為漢相尊不可以兄故私撓由此滋驕前漢主父偃傳上拜偃為齊相至齊遍召昆弟賓客散五百金豫之數曰始吾貧時昆弟不我衣食賓客不我內門今吾相齊諸君迎我或千里吾與諸君絶矣毋復入偃之門後漢袁紹傳袁談與曹操相拒黎陽為操所敗而謂弟尚曰及其未濟出兵掩之可令大潰此策不可失也尚疑而不許遂引兵攻尚戰於外門談敗乃引兵還南皮別駕王修率吏自青州往救談談還欲更攻尚問修曰計將安出修曰兄弟者左右手也譬人將鬭而斷其右手曰我必勝若如是者可乎夫棄兄弟而不親天下其誰親之晉郡續傳為成都王頴參軍頴將討長沙王乂續諫因兄弟如左右手今明公當天下之敵而欲去一手乎續竊成之頴不納箋證史記鄭世家二十七年武公疾夫人請公欲立段為太子公弗聽是歲武公卒寤生立是為莊公莊公元年封弟段於京號太叔祭仲曰京大於國非所以封庶也莊公曰武姜欲之我弗敢奪也段至京繕治甲兵與其母武姜謀襲鄭二十二年段果襲鄭武姜為內應莊公發兵伐段段走伐京京人畔段段出走鄢鄢潰段出奔共於是莊公遷其母武姜於城潁漢書淮南衡山王傳淮南厲王長高帝少子也十一年淮南王布反上自將擊滅布即立子長為淮南王制曰其赦長死罪廢勿王有司奏請處蜀嚴道卭郵爰盎諫曰上素驕淮南王不為置嚴相傅以故至此且淮南王為人剛今暴摧折之臣恐其逄霧露病死陛下有殺弟之名奈何上曰吾特苦之耳令復之淮南王謂侍者曰誰謂乃公勇者吾以驕不聞過故至此乃不食而死縣傳者不敢發車封孟康曰檻車有封也至雍雍令發之以死聞上悲哭謂爰盎曰吾不從公言卒亡淮南王乃以列侯葬淮南王于雍置守冢三十家孝文八年憐淮南王王有子四人年皆七八歲乃封子安為阜陵侯子勃為安陽侯子賜為陽周侯子良為東城侯十二年民有作歌歌淮南王曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容上聞之曰昔堯舜放逐骨肉周公殺管蔡天下稱聖不以私害公天下豈以為我貪淮南地邪乃徙城陽王王淮南故地而追尊諡淮南王為厲王漢書田蚡傳召客飲坐其兄蓋侯北鄉自坐東鄉師古曰自處尊位也鄉讀皆曰嚮以為漢相尊不可以兄故私橈師古曰橈曲也由此滋驕漢書主父偃傳上拜偃為齊相至齊遍召昆弟賓客散五百金豫之數曰師古曰數責也數音所具反始吾貧時昆弟不我衣食賓客不我黃門今我相齊諸君迎我或千里吾與諸君絶矣毋復入偃之門後漢書袁紹傳附子袁談曹操度河攻談談告急於尚尚乃留審配守鄴自將助談與操相拒於黎陽自九月至明年二月大戰城下談尚敗退操將圍之乃夜遁還鄴操進軍尚逆擊破操操軍還許談謂尚曰我鎧甲不精故前為曹操所敗今操軍退人懷歸志及其未濟出兵掩之可令大潰此策不可失也尚疑而不許既不益兵又不易甲談大怒郭圖辛評因此謂談曰使先公出將軍為兄後者皆是審配之所搆也談然之遂引兵攻尚戰於外門談敗乃引兵還南皮別駕王修率吏人自青州往救談談還欲更攻尚問修曰計將安出修曰兄弟者左右手也譬人將鬭而斷其右手曰我必勝若如是者可乎夫棄兄弟而不親天下其誰親之晉書邵續傳邵續字嗣祖魏郡安陽人也續朴素有志烈博覽經史善談理義妙解天文初為成都王龐參軍頴將討長沙王乂續諫曰續聞兄弟如左右手今明公當天下之敵而欲去一手乎續竊惑之頴不納嫡庶分第七前漢五行志欽重功勳殊別適庶如此則火得其性矣前漢稚圭傳曰禮之於內也卑不隃尊新不先故所以統人情而理陰氣也其尊適而卑庶也適子冠乎阼禮之用醴衆子不得與列所以貴正體而明嫌疑也非虛加其禮文而已如當親者疏當尊者卑則佞巧之姦因時而動以亂國家故聖人慎防其端禁於未然不以私思害公義後漢下邳惠王衍傳後病荒忽而太子邛有罪廢諸姬爭欲立子為嗣連上書相告言和帝憐之使彭城靖王恭至下邳正其嫡庶立子成為太子晉武帝紀詔曰嫡庶之別所以辨上下明貴賤而近世以來多皆內寵登妃后之職亂尊卑之序自今以後皆不得登用妾媵以為嫡正箋證漢書五行志孔子曰浸潤之讚膚受之訴不行焉可謂明矣師古曰論語載孔子之言也浸潤言積漸也膚受謂初入皮膚以至骨髓也賢佞分別官人有序帥由舊章敬重功德殊別適庶師古曰適讀曰嫡如此則火得其性矣漢書匡衡傳時上好儒術文辭頗改宣帝之政言事者多進見人人自以為得上意又傅昭儀及子定陶王愛幸寵於皇后太子師古曰寵踰也衡復上疏曰故聖王必慎妃后之際別適長之位禮之於內也卑不隃尊親不先故師古曰隃與踰同所以統人情而理陰氣也其尊適而卑庶也適子冠乎阼禮之用醴師古曰阼主階也醴甘酒也貴於衆酒衆子不得與列所以貴正體而明嫌疑也非虛加其禮文而已乃中心與之殊異故禮探其情而見之外也聖人動靜游燕所親物得其序得其序則海內自修百姓從化如當親者疏當尊者卑則巧佞之姦因時而動以亂國家故聖人慎防其端禁於未然不以私恩害公義後漢書孝明八王列傳下邳惠王衍傳帝崩其年就國衍後病荒忽而太子産有罪廢諸姬爭欲立子為嗣連上書相告言和帝憐之使彭城靖王恭至下邳正其嫡庶立子成為太子晉書武帝紀十年閏月丁亥詔曰嫡庶之別所以辨上下明貴賤而近世以來多皆內寵登妃后之職亂尊卑之序自今以後皆不得登用妾媵以為嫡正嫡庶不分第八史記晉世家獻公私謂驪姬曰吾欲廢太子以奚齊代之驪姬泣曰太子之立諸侯皆已知之而數將兵百姓附之奈何以賤妾之故廢適立庶君必行之妾自殺也驪姬詳舉太子而陰令人譖惡太子欲立其子魏毛玠傳時太子未定而臨菑侯植有寵玠密諫曰近者袁紹以嫡庶不分覆宗滅國廢立大事非所宜聞後群僚會玠起更衣太祖目指曰此古所謂國之司直我之周昌也新唐書褚遂良傳魏王忝禮秩如嫡群臣未敢諫帝從容訪左右曰方今何事尢急岑文本泛言禮義為急帝以不切未領可遂良曰今四方仰德誰弗率者唯太子諸王宜有定分帝曰有是哉朕年五十日以衰怠雖長子守器而弟支子尚五十人心常念焉自古宗姓無良則傾敗相仍公等為我柬賢者保傳之箋證史記晉世家獻公私謂驪姬曰吾欲廢太子以奚齊代之驪姬泣曰太子之立諸侯皆已知之而數將兵百姓附之奈何以賤妾之故廢適立庶君必行之妾自殺也驪姬詳譽太子而陰令人譖惡太子而欲立其子三國志魏志毛玠傳毛玠字孝先陳留平邱人也魏國初建為尚書僕射復典選舉時太子未定而臨菑侯植有寵玠密諫曰近者袁紹以嫡庶不分覆宗滅國廢立大事非所宜聞後群僚會玠起更衣太祖目指曰此古所謂國之司直我之周昌也新唐書褚遂良傳是時魏王泰禮秩如嫡群臣未敢諫帝從容訪左右曰方今何事尤急岑文本汛言禮義為急帝以不切未領可遂良曰今四方仰德誰弗率者惟太子諸王宜有定分帝曰有是哉朕年五十日以衰怠雖長子守器而弟支子尚五十人心常念焉自古宗姓無良則傾敗相仍公等為我簡賢者保傅之廢長立少第九史記商本紀商衰自中丁以來廢適而更立諸弟子弟子或爭相代立史記周公世家武公與長子括少子戲西朝周宣王宣王愛戲而欲立為魯太子周之樊仲山父諫宣王曰廢長立少不順不順必犯王命犯王命必誅之故出令不可不順也令之不行政之不立行而不順民將棄上夫不事上少事長所以為順今夫子建諸侯立其少是教民逆也後漢袁紹傳紹之少子尚少而美紹後妻劉有寵而偏愛尚數稱於紹紹亦奇其姿容欲使傳嗣乃以談繼兄後為青州刺史沮授諫曰世稱萬人逐免一人獲之貪者悉上分定故也且年釣以賢德均見卜古之制也願上惟先代成則之誠下思逐兔分定之義若其不所禍始此矣新唐書讓皇帝憲傳睿宗將建東宮以憲嫡長又嘗為太子而楚王有大功故久不定憲辭曰使副天下公器時平則先嫡國難則先功重社稷也使付授非宜海內失望臣以死請因涕泣固讓餘見立太子叔孫通傳箋證史記殷本紀帝陽甲之時殷衰自中丁以來廢適而更立諸弟子弟子或爭相代立史記魯周公世真公十四年周厲王無道出奔彘共和行政二十九年周宣王即位三十年真公卒弟敖立是為武公武公九年春武公與長子括少子戲西朝周宣王宣王愛戲欲立戲為魯太子周之樊仲山父諫宣王曰廢長立少不順不順必犯王命犯王命必誅之故出令不可不順也令之不行政之不立行而不順民將棄上夫下事上少事長所以為順今天子建諸侯立其少是教民逆也三後漢書袁紹傳紹有三子談字顯思熙字顯雍尚字顯甫談長而惠尚少而美紹後妻劉有寵而偏愛尚數稱於紹紹亦奇其姿容欲使傳嗣乃以談繼兄後出為青州刺史沮授諫曰世稱萬人逐兔一人獲之貪者悉止分定故也且年均以賢德均則卜古之制也願上惟先代成則之誡下思逐兔分定之義若其不改禍始此矣新唐書三宗諸子讓皇帝憲讓皇帝憲始王永平文明元年武后以睿宗為皇帝故憲立為皇太子睿宗降為皇嗣更冊為皇孫與諸王皆出閣開府置官屬睿宗將建東宮以憲嫡長又嘗為太子而楚王有大功故久不定憲辭曰儲副天下公器時平則先嫡國難則先功重社稷也使付授非宜海內失望臣以死請因涕泣固讓
