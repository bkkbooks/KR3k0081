body:
  text: 卷第十三教化第一前漢董仲舒傳天地未應而美祥莫至者何也凡以教化不立而萬民不正也夫萬民之從利也如水之走下不以教化隄防之不能止也是故教化立而姦邪皆止者其隄防完也教化廢而姦邪並出刑罰不能勝者其隄防壞也古之王者明於此是故南面而治天下莫不以教化為大務立大學以教於國設庠序以化於邑漸民以仁摩民以誼節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也前漢董仲舒傳聖王之繼亂世也掃除其跡而悉去之復修教化而崇起之教化已明習俗已成子孫循之行五六百歲尚未敗也前漢董仲舒傳武王行大誼平殘賊周公作禮樂以文之至於成康之隆囹圄空虛四十餘年此亦教化之漸而仁誼之流非獨傷肌膚之效也前漢董仲舒曰質樸之謂性性非教化不成餘見情性門前漢禮樂志夫教化之比於刑法刑法輕是捨所重而急所輕也且教化所恃以為治也刑法所以助治也今發所恃而獨立其所助非所以致太平也後漢楊終傳中庸之流在教化也詩曰皎皎練絲在所染之上智下愚謂之不移中庸之流要在教化後漢荀悅傳五政曰君子以情用小人以刑用榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭樸以加小人化其刑也君子不犯辱況於刑乎小人不忌刑況於辱乎若教化之廢推中人而墜於小人之域教化之行引中人而納君子之塗是謂章化章明箋證漢書董仲舒傳武帝即位舉賢良文學之士前後百數而仲舒以賢良對策焉仲舒對曰行高而恩厚知明而意美愛民而好士可謂誼主矣然而天地未應而美祥莫至者何也凡以教化不立而萬民不正也夫萬民之從利也如水之走下不以教化隄防之不能止也是故教化立而姦邪皆止者其隄防完也教化廢而姦邪並出刑罰不能勝者其隄防壞也古之王者明於此是故南面而治天下莫不以教化為大務立太學以教於國設庠序以化於邑漸民以仁摩民以誼師古曰漸謂浸潤之也摩謂砥礪之也節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也聖王之繼亂世也掃除其迹而悉去之復脩教化而崇起之教化已明習俗已成子孫循之師古曰循順也順而行之行五六百戶尚未敗也漢書董仲舒傳天子覽其對而異焉乃復冊之曰仲舒對曰臣聞武王行大誼平殘賊周公作禮樂以文之至於成康之隆囹圄空虛四十餘年此亦教化之漸而仁誼之流非獨傷肌膚之效也漢書董仲舒傳天子復冊之仲舒復對曰臣聞質樸之謂性性非教化不成前漢書禮樂志夫教化之比於刑法刑法輕是舍所重而急所輕也師古曰舍廢也且教化所恃以為治也刑法所以助治也今廢所恃而獨立其所助非所以致太平也後漢書楊終傳楊終字子山蜀郡成都人也時太后兄衛尉馬廖謹篤自守不訓諸子終與廖交善以書戒之曰終聞堯舜之民可比屋而封桀紂之民可比屋而誅何者堯舜為之隄防桀紂示之驕奢故也詩曰皎皎練絲在所染之逸詩曰皎皎白貌也墨子曰墨子見染絲者歎曰染於蒼則蒼染於黃則黃故染不可不慎也上智下愚謂之不移中庸之流要在教化後漢書荀淑傳附孫荀悅悅字仲豫儉之子也作申鑒五篇其所論辨通見政體既成而奏之其大略曰致政之術先屏四患乃崇五政興農桑以養其性審好惡以正其俗宣文教以章其化立武備以秉其威明賞罰以統其法是謂五政君子以情用小人以刑用榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭撲以加小人化其刑也君子不犯辱况於刑乎小人不忌刑况於辱乎若教化之廢推中人而墜於小人之域教化之行引中人而納於君子之塗是謂章化章明也化第二史記徐樂上書曰賢主獨觀萬化之原明於安危之機修之廟堂之上史記鄒陽曰聖王制世御俗獨化於陶鈞之上而不牽於卑亂之語不奪於眾多之口前漢伍被傳被曰布德施惠口雖未言聲疾雷震令雖未出化馳如神心所有懷威動千里下之應上猶景響也前漢董仲舒曰上之化下下之從上猶泥之在鈞餘見下之化上門前漢王吉傳曰聖王宣德流化必自近始前漢貢禹傳以漢地之廣陛下之德處南面之尊秉萬乘之權因天地之助其於變世易俗調和陰陽陶治萬物化正天下易於決流抑墜前漢稚圭傳令海內昭然咸見本朝之所貴道德鴻於京師淑問揚乎疆以然後大化可成禮讓可興也箋證史記主父偃列傳時趙人徐樂齊人嚴安俱上書言世務各一事索隱樂音岳嚴本姓莊明帝諱後並改姓嚴也安及徐樂並拜郎中樂後為中大夫徐樂曰臣聞天下之患在於土崩不在於瓦解古今一也故賢主獨觀萬化之原明於安危之機脩之廟堂之上而銷未形之患其要期使天下無土崩之勢而已矣史記鄒陽列傳從獄中上書曰聖王制世御俗獨化於陶鈞之上索隱張晏云陶冶鈞範也作器下所轉者名鈞韋昭曰陶燒瓦之灶鈞木長七尺有絃所以調為器具也崔浩云以鈞制器萬殊故如造化之運轉裁成也而不牽於卑亂之語不奪於眾多之口漢書伍被傳伍被楚人也師古曰被音皮義反或言其先伍子胥後也被以材能稱為淮南中郎是時淮南王安好術學折節下士招致英雋以百數被為冠首久之淮南王陰有邪謀被數微諫師古曰私諫之後王坐東宮召被欲與計事呼之曰將軍上被曰臣不敢避子胥之誅願大王無為吳王之聽布德施惠口雖未言聲疾雷震令雖未出化馳如神心有所懷威動千里下之應上猶景嚮也師古曰言如影之隨形響之應聲嚮讀曰響漢書董仲舒傳仲舒對曰孔子曰君子之德風也小人之德草也草上之風必偃故堯舜行德則民仁壽桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞漢書王吉傳吉上疏言得失曰臣聞聖王宣德流化必自近始漢書貢禹傳貢禹字少翁琅邪人也禹又言孔子匹夫之人耳以樂道正身不解之故師古曰解讀曰懈四海之內天下之君微孔子之言亡所折中况乎以漢地之廣陛下之德處南面之尊秉萬乘之權因天地之助其於變世易俗調和陰陽陶冶萬物化正天下易於決流抑隊師古曰決欲流之水抑將隊之物言其便易漢書匡衡傳衡上疏曰令海內昭然咸見本朝之所貴道德弘於京師淑問揚乎疆外師古曰淑善也問名也然後大化可成禮讓可興也上說其言化民以德第三前漢文帝紀贊曰南越尉佗自立為帝召貴佗兄弟以德懷之佗遂稱臣與匈奴結和親後而背約入盜令邊備守不發兵深入恐煩百姓吳王詐病不朝賜以几杖群臣袁盎等諫說雖切常假借納用焉張武等受賂金錢覺更加賞賜以媿其心專務以德化民前漢董仲舒傳古者修教訓之官務以德善化民民已大化之後天下常亡一人之獄矣後漢循吏傳仇覽為蒲亭長初到亭人有陳元者獨與母居而母詣覽告元不孝覽驚曰吾近過舍廬落整頓耕耘以時此非惡人當是教化未及至耳母守寡養孤苦身投老柰何肆忿於一朝欲致子以不義乎母聞感悔涕泣而去覽乃親到元家與其母子飲自為陳人倫孝行譬以禍福之言元卒成孝子鄉邑為之諺曰父母何在在我庭化我鳩裊哺所生時考城令河內王渙政尚嚴猛聞覽以德化人署為主簿謂覽曰主簿聞陳元之過不罪而化之得無少鷹鸇之志耶覽曰以為鷹鸇不若鸞鳳渙謝遣曰枳棘非鸞鳳所棲百里豈大賢之路時渙為縣令故自稱百里後漢蔡衍傳少明經講授以禮讓化鄉里鄉里有爭訟者輒詣衍決之其所平處皆曰無怨魏高貴鄉公紀幸太學命講禮記帝問曰太上立德其次務施報為治何由而教化各異皆修何政而能致於立德施而不報乎馬照對曰太上立德謂三皇五帝之世以德化民其女報施謂三王之世以禮為治也帝曰二者致化薄厚不同將主有優劣邪時使之然乎照曰誠由時有樸文故化有薄厚也後漢黃瓊傳為司空疾篤上疏諫曰聖人升高據上則以德義為首涉危蹈傾則以賢者為力唐堯以德化為冠冕以稷契為筋力高而益崇動而愈據此先聖所以長守萬國保其社稷者也箋證漢書文帝紀贊曰孝文白皇帝即位二十三年宮室苑囿車騎服御無所增益南越尉佗自立為帝召貴佗兄弟以德懷之佗遂稱臣與匈奴結和親後而背約入盜令邊備守不發兵深入恐煩百姓吳王詐病不朝賜以几杖群臣袁盎等諫說雖切常假借納用焉張武等受賂金錢覺更加賞賜以媿其心專務以德化民漢書董仲舒傳仲舒復對曰臣聞古者脩教訓之官務以德善化民民已大化之後天下常亡一人之獄矣後漢書循吏列傳仇覽傳仇覽字季智一名香陳留考城人也少為書生淳默鄉里無知者年四十縣召補吏選為蒲亭長初到亭人有陳元者獨與母居而母詣覽告元不孝覽驚曰吾近日過舍廬落整頓廣雅曰落居也案今人謂院為落也耕耘以時此非惡人當是教化未及至耳母守寡養孤苦身投老奈何肆忿於一朝欲致子以不義乎母聞感悔涕泣而去覽乃親到元家與其母子飲因為陳人倫孝行譬以禍福之言元卒成孝子鄉邑為之諺曰父母何在在我庭化我鳴梟哺所生鳴梟即鴟梟也時考城令河內王渙政尚嚴猛聞覽以德化人署為主簿謂覽曰主簿聞陳元之過不罪而化之得無少鷹鸇之志邪覽曰以為鷹鸇不若鸞鳳渙謝遣曰枳棘非鸞鳳所棲百里豈大賢之路時渙為縣令故自稱百里也後漢書蔡衍傳蔡衍字孟喜汝南項人也少明經講授以禮讓化鄉里鄉里有爭訟者輒詣衍決之其所平處皆曰無怨三國志魏志高貴鄉公紀高貴鄉公諱髦字彥士文帝孫東海定王霖子也正始五年封郯縣高貴鄉公少好學夙成齊王廢公卿議迎立公甘露元年夏四月丙辰帝幸太學於是復命講禮記帝問曰太上立德其次務施報為治何由而教化各異皆修何政而能致於立德施而不報乎博士馬照對曰太上立德謂三皇五帝之世以德化民其次報施謂三王之世以禮為治也帝曰二者致化薄厚不同將主有優劣邪時使之然乎照對曰誠由時有樸文故化有薄厚也後漢書黃瓊傳四年以寇賊免其年復為司空七年疾篤上疏諫曰臣聞天者務剛其氣君者務彊其政是以王者處高自持不可不安履危任力不可不據夫自持不安則顛任力不據則危故聖人升高據上則以德義為首涉危蹈傾則以賢者為力唐堯以教化為冠冕以稷契為筋力高而益崇動而愈據此先聖所以長守萬國保其社稷者也化民以躬第四史記五帝本紀帝高辛生而神靈自言其名普施科物不於其身聰以知遠明以察微順天之義知民之急仁而威惠而信修身而天下服前漢敘傳太宗穆穆允恭元默化民以躬師下以德農不供貢辠不收孥宮不新館陵不崇墓我德如風民應如草國富刑清登我漢道前漢公孫對曰堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也未世貴爵厚賞而民不勸深戒重罰而姦不止其上不正遇民不信也前漢循吏傳循吏如河南守吳公蜀守文翁皆謹身師先居以廉平不至於嚴而民從化後漢弟五倫上疏曰諸王主貴戚驕奢踰制京師尚然何以示遠故曰其身不正雖令不行以身放者從以言啟者訟餘見感化遷善董和傳箋證史記五帝本紀帝嚳高辛者黃帝之曾孫也高辛生而神靈自言其名普施利物不於其身聰以知遠明以察微順天之義知民之急仁而威惠而信脩身而天下服漢書敘傳太宗穆穆允恭玄默化民以躬帥下以德農不供貢辠不收孥張晏曰除民田租之稅是不供貢也宮不新館陵不崇墓我德如風民應如草國富刑清登我漢道述文紀第四漢書公孫弘傳弘對曰臣聞上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也末世貴爵厚賞而民不勸深刑重罰而姦不止其上不正遇民不信也漢書循吏傳漢興之初反秦之敝與民休息至于文景遂移風易俗是時循吏如河南守吳公蜀守文翁之屬皆謹身帥先居以廉平不至於嚴而民從化後漢書第五倫傳第五倫字伯魚京兆長陵人也其先齊諸田諸田徙園陵者多故以次第為氏倫少介然有義行及為三公黃帝長者屢有善政乃上疏褒稱盛美因以勸成風德曰又聞諸王主貴戚驕奢踰制京師尚然何以示遠故曰其身不正雖令不從論語孔子之言以身教者從以言教者訟下之化上弟五史記張釋之傳文帝登虎圈上問上林尉諸禽獸簿尉不能對嗇夫從旁代對響應無窮者詔拜為上林令釋之曰陛下以嗇夫口辯而超遷之臣恐天下隨風靡靡爭為口辯而無其實且下之化上疾於景響舉錯不可不審也前漢董仲舒傳孔子曰君子之德風也小人之德草也草上之風必偃故堯舜行德則民仁壽桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之所為猶金之在鎔唯冶者之所鑄綏之斯倈動之斯和此之謂也前漢公孫洪傳臣聞周公治天下朞年而變三年而化五年而定問洪洪對曰夫虎豹馬牛禽獸之不可制者也及其教馴服習之至可牽拜駕服唯人之從臣聞揉曲木者不累日銷金石者不累月夫人於利害好惡豈比禽獸木石之類哉朞年而變臣弘尚竊遲之前漢地理志南陽好商賈召父富以本業穎川好爭訟分異黃霸化以篤厚君子之德風也小人之德草也信矣前漢稚圭上疏曰保民者陳之以德義示之以好惡觀其失而制其宜故動之而和綏之而安朝廷者天下之楨幹也公卿大夫相與循禮恭儉則民不爭好仁樂施則下不暴上義高節則民興行寬柔和行則眾相愛四者明王之所以不嚴而成化也何者朝有變色之言則下有爭鬭之患上有自專之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盜竊之民此其本也今俗吏之治皆不本禮讓而上克暴或忮害好陷人於罪貪財而慕埶故犯刑者眾姦邪不止雖嚴刑峻法猶不為變此非其天性有由然也臣竊考國風之詩周南召南被賢聖之化深故篤於行而廉於色鄭伯好勇而國人暴虎秦穆貴信而士多從死陳夫人好巫而民淫祀晉侯好儉而民畜聚太王躬仁邠國貴恕由此觀之治天下者審所上而已上謂崇尚後漢劉虞傳初舉孝廉稍遷幽州剌史民夷感其德化自卑鮮烏桓夫餘穢貌之輩皆隨時朝貢無敢擾邊者百姓歌悅之後漢劉寬歷典三郡每行縣止息亭傳輒引學官祭酒及處士諸生執經對講見父老慰以農里之言少年勉以孝悌之訓人感德興行日有所化新唐薛登傳上疏曰故名勝於利則偷競日銷利勝於名則貪暴滋煽昔冀缺以禮讓升而晉人知禮文翁以經術教而蜀土多儒未有上之所好而下不從其化者也餘見立學校衛堸專箋證史記張釋之列傳張廷尉釋之者堵陽人也字季有兄仲同居以訾為騎郎釋之從行登虎圈上問上林尉諸禽獸簿索隱漢書表上林有八丞十二尉百官志云尉秩三百石十餘問尉左右視盡不能對虎圈嗇夫正義掌虎圈百官表有鄉嗇夫此其類也從旁代尉對上所問禽獸簿甚悉欲以觀其能口對響應無窮者文帝曰吏不當若是耶尉無賴集解張婁曰才無可恃乃詔釋之拜嗇夫為上林令釋之久之前曰陛下以嗇夫口辯而超遷之臣恐天下隨風靡靡爭為口辯而無其實且下之化上疾於景響舉錯不可不審也漢書董仲舒傳孔子曰君子之德風也小人之德草也草上之風必偃故堯舜行德則民仁壽桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之所為師古曰甄作瓦之人也鈞造瓦之法其中旋轉者猶金之在鎔唯冶者之所鑄師古曰鎔謂鑄器之模範也綏之斯倈動之斯和此之謂也師古曰論語載子貢對陳子禽之言也綏安也言治國家者安之則競來動之則和悅耳漢書公孫弘傳弘復上疏曰臣聞周公旦治天下期年而變三年而化五年而定唯陛下之所志書奏天子以冊書答曰宋祁曰答字下疑有焉字問弘稱周公之治弘之材能自視孰與周公賢弘對曰愚臣淺薄安敢比材於周公雖然愚心曉然見治道之可以然也夫虎豹馬牛禽獸之不可制者也及其教馴服習之至可牽持駕服唯人之從臣聞揉曲木者不累日銷金石者不累月夫人之於利害好惡豈比禽獸木石之類哉朞年而變臣弘尚竊遲之漢書地理志潁川南陽本夏禹之國五世而為秦所滅秦既滅韓徙天下不軌之民於南陽師古曰不軌不循法度者故其俗夸奢上氣力好商賈漁獵臧匿難制御也韓延壽為太守先之以敬讓黃霸繼之教化大行獄或八年亡重罪囚南陽好商賈召父富以本業師古曰召父謂召信臣也勸其務農以致富潁川好爭訟分異黃韓化以篤厚君子之德風也小人之德草也信矣師古曰論語載孔子之言也漢書匡衡傳是時有日蝕地震之變上問以政治得失衡上疏曰臣聞蓋保民者陳之以德義示之以好惡觀其失而制其宜故動之而和綏之而安朝廷者天下之楨幹也公卿大夫相與循禮恭讓則民不爭好仁樂施則下不暴上義高節則民興行寬柔和惠則眾相愛四者明王之所以不嚴而成化也何者朝有變色之言則下有爭鬭之患上有自專之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盜竊之民此其本也今俗吏之治皆不本禮讓而上克暴宋祁曰克當作刻或忮害好陷人於罪貪財而慕埶故犯法者眾姦邪不止雖嚴刑峻法猶不為變此非其天性有由然也臣竊考國風之詩周南召南被賢聖之化深故篤於行而廉於色鄭伯好勇而國人暴虎秦穆貴信而士多從死陳夫人好巫而民淫祀晉侯好儉而民畜聚太王躬仁邠國貴恕由此觀之治天下者審所上而已師古曰上謂崇尚也後漢書劉虞傳劉虞字伯安東海郯人也祖父嘉光祿勳虞初舉孝廉稍遷幽州刺史民夷感其德化自鮮卑烏桓夫餘穢貊之輩皆隨時朝貢無敢擾邊者百姓歌悅之後漢書劉寬傳劉寬字文饒弘農華陰人也延熹八年徵拜尚書令遷南陽太守典歷三郡溫仁多恕每行縣止息亭傳輒引學官祭酒及處士諸生執經對講續漢書曰博士祭酒秩六百石祭酒本僕射也中興改為祭酒處士有道蓺而在家者見父老慰以農里之言少年勉以孝悌之訓人感德興行日有所化新唐書薛登傳薛登常州義興人天授中累遷左補闕時選舉濫甚乃上疏曰比觀舉薦類不以才馳聲假譽互相推引非所謂報國求賢者也古之取士考素行之原詢鄉邑之譽崇禮讓明節義以敦樸為先雕文為後故人崇勸讓士去輕浮以計貢賢愚為州之榮辱昔李陵降而隴西慙干木隱而西河美名勝於利則偷競日銷利勝於名則貪暴滋煽蓋冀缺以禮讓升而晉人知禮文翁以經術教而蜀士多儒未有上好而下不從者也感化遷善第六後漢劉矩傳遷雍丘令以禮讓化之其無孝義者皆感悟自革民有爭訟矩常引之於前提耳訓告以為忿恚可忍縣官不可入使歸更尋思訟者感之輒各罷去蜀志董和傳劉璋以和為江原長成都令蜀土富實貨殖之家侯服玉食婚姻葬送傾家竭產和躬率以儉惡衣蔬食防遏踰僣為之軌制所在皆移風變善餘見化民以德仇覽傳箋證後漢書劉矩傳劉矩字叔方沛國蕭人也舉孝廉稍遷雍丘令以禮讓化之劉攽曰化之案文之字當作人其無孝義者皆感悟自革民有爭訟矩常引之於前提耳訓告毛詩曰匪面命之言提其耳以為忿恚可忍縣官不可入使歸更尋思訟者感之輒各罷去三國志蜀志董和傳董和字幼宰南郡枝江人也劉璋以為牛鞞音髀江原長成都令蜀土富實時俗奢侈貨殖之家侯服玉食婚姻葬送傾家竭產和躬率以儉惡衣蔬食防遏踰僭為之軌制所在皆移風變善教化不行第七前漢董仲舒傳古者修教訓之官務以德善化民民已大化之後天下常亡一人之獄矣今世廢而不修亡以化民民以故棄行義而死財利是以犯法而罪多前漢公孫洪傳復上疏曰陛下有先聖之位而無先聖之名有先聖之民而無先聖之吏是以勢同而治異先世之吏正故其民篤今世之吏邪故其民薄政弊而不行令倦而不聽夫使邪吏行弊政用倦令治薄民故不可得而化此治之所以異也後漢魯恭傳亭長從人借牛而不肯還之牛主訟於恭恭召亭長勑令歸牛者再三猶不從恭歎曰是教化不行也欲解印綬去掾史泣涕共留之亭長乃慚悔還牛詣獄受罪恭貰不問於是吏人信服貲寬貨也音時夜反後漢襄楷傳太學天子教化之宮其門無故自壞者言文德將喪教化廢也後漢許荊傳遷桂陽太守嘗行春到耒陽縣人有蔣均者均兄弟爭財互相言訟荊歎曰吾荷國重任而教化不行咎在太守乃顧使吏上書陳狀乞詣廷尉均兄弟感悔咎求受罪餘見教化門董仲舒傳并荀悅傳箋證漢書董仲舒傳仲舒復對曰古者脩教訓之官務以德善化民民已大化之後天下常亡一人之獄矣今世廢而不脩亡以化民民以故棄行誼而死財利是以犯法而罪多漢書公孫弘傳弘復上疏曰陛下有先聖之位而無先聖之民有先聖之民而無先聖之吏是以勢同而治異先世之吏正故其民篤師古曰篤厚也今世之吏邪故其民薄政弊而不行令倦而不聽夫使邪吏行弊政用倦令治薄民民不可得而化此治之所以異也後漢書魯恭傳恭專以教化為理不任刑罰訟人許伯等孚田累守令不能決恭為平理曲直皆退而自責輟耕相讓亭長從人借牛而不肯還之牛主訟於恭恭召亭長勑令歸牛者再三猶不從恭歎曰是教化不行也欲解印綬去掾史泣涕共留之亭長乃慙悔還牛詣獄受罪恭貰不問貰寬貸也音時夜反於是吏人信服後漢書襄楷傳延熹九年楷自家詣闕上疏曰臣以為河者諸侯位也孝經援神契曰五岳視三公四瀆視諸侯也清者屬陽濁者屬陰河當濁而反清者陰欲為陽諸侯欲為帝也太學天子教化之宮其門無故自壞者言文德將喪教化廢也後漢書許荊傳許荊字少張會稽陽羡人也和帝時稍遷桂陽太守郡濱南州風俗脆簿脆薄猶輕薄也不識學義荊為設喪紀婚姻制度使知禮禁嘗行春到耒陽縣人有蔣均者兄弟爭財互相言訟荊對之歎曰吾荷國重任而教化不行咎在太守乃顧使吏上書陳狀乞詣廷尉均兄弟感悔各求受罪
