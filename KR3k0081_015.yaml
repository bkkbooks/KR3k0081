body:
  text: 卷第十五正本第一前漢董仲舒傳案春秋謂一元之意一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也前漢東方朔傳朔曰陛下誠能推甲乙之帳燔之於四通之衢卻走馬示不復用則堯舜之隆宜可與比治矣傳曰正其本萬事理失之豪釐差以千里願陛下察之前漢枚乘曰人性有畏其景而惡其跡者卻背而走跡愈多景愈疾不知就陰而止景滅跡絶欲人多聞莫若勿言欲人勿知莫若勿為欲湯之滄一人炊之百人揚之無益也不如絶薪止火而已滄音悽愴之愴魏夏侯尚子玄傳玄又書曰漢文雖身衣弋綈而不革正法度內外有僭擬之服寵臣受無限之賜由是觀之似指立在身之名非篤齊治制之意也今公侯命世作宰追蹤上古將隆至治抑末正本若制定於上則化行於衆矣魏崔林傳劉劭作考課論林議曰且萬目不張舉其綱衆毛不整振其領餘見化民以躬五行志箋證漢書董仲舒傳臣謹案春秋謂一元之意一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也師古曰視讀曰示漢書東方朔傳陛下誠能用臣朔之計推甲乙之帳燔之於四通之衢却走馬示不復用則堯舜之隆宜可與比治矣易曰正其本萬事理失之毫釐差以千里師古曰今易無此文願陛下留意察之漢書枚乘傳吳王之初怨望謀為逆也乘奏書諫曰人性有畏其景而惡其跡者郤背而走迹愈多景愈疾不知就陰而止景滅迹絶欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之滄鄭氏曰音悽愴之愴寒也宋祁曰注文音字上當有滄字注須復文為訓故必待滄字乃足一人炊之百人揚之無益也不如絶薪止火而已三國志魏志夏侯尚傳附子夏侯玄玄字太初少知名弱冠為散騎黃門侍郎正始初曹爽輔政玄爽之姑子也纍遷散騎常侍中護軍玄又書曰漢文雖身衣弋綈而不革正法度內外有僭擬之服寵臣受無限之賜由是觀之似指立在身之名非篤齊治制之意也今公侯命世作宰追蹤上古將隆至治抑末正本若制定於上則化行於衆矣三國志魏志崔林傳崔林字德儒清河東武城人也散騎常侍劉劭作考課論制下百僚林議曰且萬目不張舉其綱衆毛不整振其領立制第二前漢高祇紀天下既定命蕭何次律令韓信申軍法張蒼定章程叔孫通制禮儀陸賈造新語又與功臣剖符作誓丹書鐵契金匱石室藏之宗廟雖日不暇給規摹鴻遠矣規摹謂立制垂範也前漢賈誼傳上疏曰夫立君臣等上下使父子有禮六親有紀此非天之所為人之所設也夫人之所設不為不立不植則僵不修則壞管子曰禮義廉恥是謂四維四維不張國乃滅亡秦滅四維而不張故君臣垂亂六親殃戮姦人並起萬民離叛今四維猶未備也故姦人幾幸而衆心疑惑豈如今定經制令君君臣臣上下有差父子六親各得其宜姦人亡所幾幸而群臣衆信上不疑惑此業一定世世常安而後有所持循矣若夫經制不定是猶度江河亡維楫中流而遇風波船必覆矣前漢誼以為漢興二十餘年天下和洽宜當改正朔易服色制度定官名興禮樂乃草具其儀法色上黃數周五為官名悉更奏之文帝謙讓未皇也然諸法令所更定及列侯就國其說皆誼發之新唐王涯傳文宗惡俗侈靡詔涯懲革涯條上其制凡衣服室宇使略如古貴戚皆不便謗訕囂然議遂格箋證漢書高帝紀天下既定命蕭何次律令韓信申軍法張蒼定章程叔孫通制禮儀陸賈造新語又與功臣剖符作誓丹書鐵契金匱石室藏之宗廟雖日不暇給規摹弘遠矣師古曰取喻規摹謂立制垂範也漢書賈誼傳天下初定制度疏闊誼數上疏陳政事多所欲匡建其大略曰夫立君臣等上下使父子有禮六親有紀此非天之所為人之所設也夫人之所設不為不立不植則僵不修則壞管子曰師古曰管與管同管子管仲也禮義廉恥是謂四維四維不張國乃滅亡使管子愚人也則可管子而少知治體則是豈可不為寒心哉秦滅四維而不張故君臣乖亂六親殃戮姦人並起萬民離叛凡十三歲而社稷為虛今四維猶未備也故姦人幾幸而衆心疑惑豈如今定經制令君君臣臣上下有差父子六親各得其宜姦人亡所幾幸而群臣衆信上不疑惑此業一定世世常安而後有所持循矣若夫經制不定是猶度江河亡維楫中流而遇風波船必覆矣漢書賈誼傳誼以為漢興二十餘年天下和洽宜當改正朔易服色制度定官名興禮樂乃草具其儀法色上黃數用五為官名悉更奏之文帝謙讓未皇也然諸法令所更定及列侯就國其說皆誼發之新唐書王涯傳王涯字廣津其先本太原人文宗惡俗侈靡詔涯懲革涯條上其制凡衣服室宇使略如古貴戚皆不便謗訕囂然議遂格稽古第三史記魯世家周宣王伐魯殺其君而問魯公子能道順諸侯者以為魯後樊穆仲曰魯懿公弟稱肅恭明神恭事耆老賦事行刑必問於遺訓而咨於固實固一作故故事也宣王乃立稱為孝公史記商君傳杜摯曰利不百不變法工不十不易器法古無過循禮無邪史記太史公曰君子為國觀之上古驗之當世參於人事察盛衰之興審權勢之宜去就有序變化應時故曠日長久而社稷安矣前漢律曆志自伏犧畫八卦由數起至黃帝堯舜而大備三代稽古法度章焉後漢李固傳初順帝時諸所除官多不以次及固在事奏免百餘人此等既怨遂共作飛章虛誣固罪曰臣聞君不稽古無以承天臣不述舊無以奉君昔堯殂之後舜仰慕三年坐則見堯於牆食則覩堯於羹斯所謂聿追來孝不失臣子之節也云云晉史臣曰陸曄等並以時望國華效彰歷試迭居端之參掌機衡然皆率由舊章得免祗悔箋證史記魯周公世家伯御即位十一年周宣王伐魯殺其君伯御而問魯公子能道順集解徐廣曰順一作訓正義道音導順音訓諸侯者以為魯後樊穆仲曰魯懿公弟稱肅恭明神敬事耆老賦事行刑必問於遺訓而咨於固實集解徐廣曰固一作故韋昭曰故實故事之是者不干所問不犯所知宣王曰然能訓治其民矣乃立稱於夷宮是為孝公史記商君列傳衛鞅曰三代不同禮而王五伯不同法而霸智者作法愚者制焉賢者更禮不肖者拘焉杜摰曰利不百不變法功不十不易器法古無過循禮無邪史記秦始皇本紀太史公曰野諺曰前事之不忘後事之師也是以君子為國觀之上古驗之當世參以人事察盛衰之理審權勢之宜去就有序變化有時故曠日長久而社稷安矣漢書律歷志虞書曰乃同律度量衡師古曰虞書舜典也同謂齊等所以齊遠近立民信也自伏戲畫八卦由數起至黃帝堯舜而大備三代稽古法度章焉後漢書李固傳初順帝時諸所除官多不以次及固在事奏免百餘人此等既怨又希望冀旨遂共作飛章虛誣固罪曰臣聞君不稽古無以承天臣不述舊無以奉君昔堯殂之後舜仰慕三年坐則見堯於牆食則覩堯於羹斯所謂聿追來孝不失臣子之節者聿述也詩大雅曰文王蒸哉遹追來孝言文王能述追王季勤孝之行也晉書陸曄何充褚翜蔡謨諸葛恢殷浩顧悅之蔡裔傳史臣曰陸曄等並以時望國華效彰歷試迭居端揆參掌機衡然皆率由舊章得免祗悔變法第四史記趙世家王曰先王不同俗何古之法帝王不相襲何禮之循虙戲神農教而不誅黃帝堯舜誅而不怒及至三王隨時制法因事制禮法度制令各順其宜衣服器械各便其用故禮也不必一道而便國不必古聖人之興也不相襲而王夏商之衰也不易禮而滅然則反古未可非而循禮未足多也史記商君傳孝公既用衛鞅鞅欲變法恐天下議己衛鞅曰疑行無名疑事無功且夫有高人之行者固見非於世有獨知之慮者必見敖於民愚者暗於成事知者見於未萌民不可與慮始而可與樂成論至德者不和於俗成大功者不謀於衆是以聖人苟可以彊國不法其故苟可以利民不循其禮孝公曰善甘龍曰不然聖人不易民而教知者不變法而治因民而教不勞而成功緣法而治者吏習而民安之衛鞅曰龍之所言世俗之言也常人安於故俗學者溺於所聞如此兩者居官守法可也非所與論於法之外也三代不同禮而王五伯不同法而霸智者作法愚者制焉賢者更禮不肖者拘焉杜摯曰利不百不變法功不十不易器法古無過循禮無邪衛鞅曰治世不一道便國不法古故湯武不循古而王夏商不易禮而亡反古者不可非而循禮者不足多孝公曰善卒定變法之令史記商君傳秦孝公以商鞅為左庶長卒定變法之令令之具未布恐民之不信己乃立三丈之木於國都市南門募民有能從置北門者豫十金民怪之莫敢徙復曰能徙者豫五十金有一人徙之輒豫五十金以明不欺卒下令前漢蕭何曹參贊曰蕭何曹參皆起秦刀筆吏當時録録未有奇節漢興依曰月之未光何以信謹守管籥參與韓信俱征伐天下既定因民之疾秦法順流與之更始二人同心遂安海內淮陰黥布等已滅唯何參擅功名位冠群后聲施後世為一代之宗臣慶流苗裔盛矣哉前漢鼂錯傳錯又言宜削諸侯事及法令可更定者書凡三十篇孝文雖不盡聽然太子善錯計策後漢仲長統傳損益篇曰作有利於時制有便於物者可為也事有乖於數法有玩於時者可改也故行於古有其跡用於今無其功者不可不變變而不如前易而多所敗者亦不可不復也前漢董仲舒策孔子曰亡為而治者其舜乎改正朔易服色以順天命而已其餘盡循堯道何更為哉故王者有改制之名亡變道之實然夏上忠商上恭周上文者所繼之救當用此也救弊箋證史記趙世家公子成再拜稽首乃賜胡服明日服而朝於是始出胡服令也趙文趙造周袑集解徐廣曰戰國策作紹袑音紹趙俊皆諫止王毋胡服如故法便王曰先王不同俗何古之法帝王不相襲何禮之循虙戲神農教而不誅黃帝堯舜誅而不怒及至三王隨時制法因事制禮法度制令各順其宜衣服器械各便其用故禮也不必一道而便國不必古聖人之興也不相襲而王夏殷之衰也不易禮而滅然則反古未可非而循禮未足多也史記商君列傳孝公既用衛鞅鞅欲變法恐天下議己衛鞅曰疑行無名疑事無功且夫有高人之行者固見非於世有獨知之慮者必見敖於民愚者暗於成事知者見於未萌民不可與慮始而可與樂成論至德者不和於俗成大功者不謀於衆是以聖人苟可以彊國不法其故苟可以利民不循其禮孝公曰善甘龍曰不然聖人不易民而教知者不變法而治因民而教不勞而成功緣法而治者吏習而民安之衛鞅曰龍之所言世俗之言也常人安於故俗學者溺於所聞以此兩者居官守法可也非所與論於法之外也三代不同禮而王五伯不同法而霸智者作法愚者制焉賢者更禮不肖者拘焉杜摰曰利不百不變法功不十不易器法古無過循禮無邪衛鞅曰治世不一道便國不法古故湯武不循古而王夏殷不易禮而亡反古者不可非而循禮者不足多孝公曰善以衛鞅為左庶長卒定變法之令史記商君列傳孝公曰善以衛鞅為左庶長卒定變法之令令既具未布恐民之不信己乃立三丈之木於國都市南門募民有能徙置北門者豫十金民怪之莫敢徙復曰能徙者豫五十金有一人徙之輒豫五十金以明不欺卒下令漢書蕭何曹參傳贊曰蕭何曹參皆起秦刀筆吏當時録録未有奇節師古曰録録猶鹿鹿言在凡庶之中也漢興依日月之末光何以信謹守管籥參與韓信俱征伐天下既定因民之疾秦法順流與之更始二人同心遂安海內淮陰黥布等已滅唯何參擅功名位冠群臣聲施後世為一代宗臣慶流苖裔盛矣哉漢書鼂錯傳賈誼已死對策者百餘人唯錯為高第繇是遷中大夫錯又言宜削諸侯事及法令可更定者書凡三十篇孝文雖不盡聽然奇其材當是時太子善錯計策後漢書仲長統傳損益篇曰作有利於時制有便於物者可為也事有乖於數法有玩於時者可改也故行於古有其迹用於今無其功者不可不變變而不如前易而多所敗者亦不可不復也漢書董仲舒傳仲舒復對曰故孔子曰亡為而治者其舜呼改正朔易服色以順天命而已其餘盡循堯道何更為哉故王者有改制之名亡變道之實然夏上忠殷上敬周上文者所繼之救當用此也師古曰繼謂所受先代之次也救謂救其弊也更弊第五前漢董仲舒傳曰繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文致用夏之忠者前漢董仲舒傳竊譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也當更張而不更張雖有良工不能善調也更當化而不更化雖有大賢不能善治也故漢得天下以來常欲善治而至今不可善治者失之於當更化而不更化古人有言曰臨淵羡魚不如退而結綱今臨政而願治七十餘歲矣不如退而更化更化則善治善治則災害日去福祿日來前漢異姓諸侯王表漢獨收孤秦之斃鐫金石者難為功摧枯朽者易為力其藝然也箋證漢書董仲舒傳繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文致師古曰致至極也用夏之忠者劉敞曰致當屬下句漢書董仲舒傳竊譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也故漢得天下以來常欲善治而至今不可善治者宋祁曰越本無上一善字然善治要須復語不容上言治而下言善治也浙本亦同有善字失之於當更化而不更化也古人有言曰臨淵羡魚不如退而結網今臨政而願治七十餘歲矣不如退而更化更化則可善治善治則災害日去福祿日來漢書異姓諸侯王表今漢獨收孤秦之弊鐫金石者難為功摧枯朽者易為力其藝然也不善更弊第六史記秦本紀太史公曰秦二世立天下莫不引領而觀其政夫寒者利短楬一作短小襦也音豎而飢者甘糟糠天下之嗸嗸新主之資也此言勞民易為仁也鄉使二世有庸主之行而任忠賢臣主一心而正先帝之過使天下之人皆得自新更節修行各慎其身塞萬民之望而以威德與天下天下集矣前漢王莽傳莽下令更天下田曰王田奴婢曰私屬皆不得賣買其男口不盈八而田過一井者分餘田與九族鄰里鄉黨故無田今當受田者如制度敢有非井田聖制無法惑衆者投諸四裔於是農商失業食貨俱廢百姓泣涕於市道坐賣買田宅奴婢自諸侯卿大夫至于庶人抵罪者不可勝數區慱諫莽曰井田雖聖王法其廢已久周道既衰而人不從秦知順人心改之可獲大利也故滅廬井而置阡陌遂王諸夏訖今海內未厭其弊今欲違人心追復千載絶跡雖堯舜復生而無百年之漸不能行也莽知人愁乃許賣其後百姓日凋殘新唐蕭俯傳穆宗初兩河底定俯與段文昌當國謂四方無虞遂議太平事以為武不可黷勸帝偃革尚文乃密詔天下鎮兵十之歲限一為逃死不補謂之銷兵既而籍卒逋亡無生業曹聚山林間為盜賊會朱克融王延湊亂燕趙一日悉收用之朝廷調兵不充乃召募市人烏合戰輒北遂復失河朔地矣新唐第五琦傳初琦請鑄乾元重寶錢以一代十既當國又鑄重規一代五十會物價騰踊餓饉相望議者以為非是詔貶忠州長史箋證史記秦始皇本紀太史公曰秦二世立天下莫不引領而觀其政夫寒者利裋褐集解徐廣曰一作短小襦也音豎索隱趙歧曰褐以毛毳織之若馬衣或以褐編衣也裋一音豎蓋謂褐布豎裁為勞役之衣短而且狹故謂之短褐亦曰豎褐而饑者甘糟糠天下之嗸嗸新主之資也此言勞民之易為仁也鄉使二世有庸主之行而任忠賢臣主一心而憂海內之患縞素而正先帝之過裂地分民以封功臣之後建國立君以禮天下虛囹圉而免刑戮除去收帑汙穢之罪使各反其鄉里發倉廩散財幣以振孤獨窮困之士輕賦少事以佐百姓之急約法省刑以持其後使天下之人皆得自新更節修行各慎其身塞萬民之望而以威德與天下天下集矣卷六漢書王莽傳莽曰時則有嘉禾之祥遭反虜逆賊且止今更名天下田曰王田奴婢曰私屬皆不得賣買其男口不盈八而田過一井者分餘田豫九族鄰里鄉黨故無田今當受田者如制度敢有非井田聖制無法惑衆者投諸四裔以禦魑魅於是農商失業食貨俱廢民人至涕泣於市道及坐賣買田宅奴婢鑄錢自諸侯卿大夫至于庶民抵罪者不可勝數區慱諫莽曰井田雖聖王法其廢久矣周道既衰而民不從秦知順民之心可以獲大利也故滅廬井而置阡陌遂王諸夏訖今海內未厭其敝今欲違民心追復千載絶迹雖堯舜復起而無百年之漸弗能行也莽知民怨乃下書曰諸名食王田皆得賣之勿拘以法犯私買賣庶人者且一切勿治新唐書蕭俯傳穆崇初兩河底定俯與段文昌當國謂四方無虞遂議太平事以為武不可黷勸帝偃革尚文乃密詔天下鎮兵十之歲限一為逃死不補謂之銷兵既而籍卒逋亡無生業曹聚山林間為盜賊會朱克融王庭湊亂燕趙一日悉收用之朝廷調兵不充乃召募市人烏合戰輒北遂復失河朔矣新唐書第五琦傳第五琦字禹圭京兆長安人初琦請鑄乾元重寶錢以一代十既當國又鑄重規一代五十會物價騰踊餓饉相望議者以為非是詔貶忠州長史不作無益害有益第七新唐魏知古傳會造金仙玉真觀雖盛夏工程嚴促知古諫曰臣聞古之君人必時視人之所勤人勤於力則功築罕人勤於財則貢賦少人勤於食則百事廢故曰不作無益害有益又曰罔咈百姓以從己之欲新唐韋嗣立傳伏見營立寺觀纍年不絶鴻侈繁麗務相矜勝大