body:
  text: 卷第三十六人臣擅權第一史記齊世家管仲病桓公問曰群臣誰可相者管仲曰知臣莫若君公曰易牙何如對曰殺子以適君非人情不可公曰開方何如對曰倍親以適君非人情難近公曰豎刀如何對曰自宮以適君非人情難親管仲死而桓公不用管仲言卒近用三子三子專權史記范睢傳說曰臣居山東時聞齊之有田文不聞有王也聞秦之有太后穰侯華陽高陵涇陽不聞其有王也夫擅國之謂王能利害之謂王制殺生之謂王今太后擅行不顧穰侯出使不報華陽涇陽等擊斷無諱高陵進退不請四貴備而國不危者未之有也為此四貴者下乃所謂旡王也然則權安得不傾令安得從王出乎史記晉世家獻公使士蒍為二公子築蒲屈城弗就夷吾以告公公怒士蒍士蒍謝曰邊城少寇安用之退而歌曰狐裘蒙茸一國三公吾誰適從蒙茸以言亂貌三公言君與三公子將敵故不知所從史記晉世家吳延陵季子來使與趙文子韓宣子魏獻子語曰晉國之政卒歸此三家十九年齊使晏嬰如晉與叔向語叔向曰晉季世也公厚賦為臺他而不恤政政在私門其可久乎晏子然之前漢田蚡為丞相人奏事語移日所言皆聽薦人或起家至二千石權移主上上乃曰君除吏盡未吾亦欲除吏前漢張敞傳霍光薨宣帝始親政事封光兄孫山雲皆為列侯以光子禹為大司馬敞上封事曰臣聞公子季友有功於魯大夫趙衰有功於晉大夫田完有功於齊皆疇其庸延及子孫終後田氏篡齊趙氏分晉季氏顓魯故仲尼作春秋迹盛衰譏世卿最甚乃者大將軍決大計安宗廟定天下功亦不細矣夫周公七年耳而大將軍二十歲海內之命斷於掌握方其隆時感動天地侵迫陰陽晝冥宵光地大震裂火生地中天文失度妖祥變怪不可勝記皆陰類盛長臣下顓制之所生也前漢劉向傳時上無繼嗣政由王氏出災異寖甚向遂上封事極諫曰臣聞人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫大臣操權柄持國政未有不為害者也昔晉有六卿齊有田崔衛有孫寧魯有季孟常掌國事世執朝柄終後田氏取齊六卿分晉崔杼弒其君光孫林父寧殖出其君衎弒其君剽季氏八佾舞於庭三家者以雍徹並專國柄卒逐昭公周大夫尹氏管朝事濁亂王室子朝子猛更亡連年乃定故經曰王室亂又曰尹氏弒王子克甚之也春秋舉成敗録禍福如此類甚衆皆陰盛而陽微下失臣道之所致也故書曰臣之有作威作福害于而家凶于而國孔子曰祿去王室政逮大夫危亡之兆秦昭王舅穰侯及涇陽葉陽君專國擅藝上假太后之威三人者權重於昭王家富於秦國國甚危殆賴寤范睢之言而秦復存二世季任趙高專權自恣壅蔽大臣閻樂望夷之禍秦遂以亡近事不遠即漢所代也漢興諸呂無道擅相尊王呂産呂祿席太后之寵據將相之位兼南北軍之衆擁梁趙王之尊驕盈無厭欲危劉氏賴忠正大臣絳侯朱虛侯等竭誠盡節以誅滅之然後劉氏復安今王氏一姓乘朱輪華轂者二十三人青紫貂蟬充盈幄內魚鱗左右大將軍秉事用權五侯驕奢僭盛尚書九卿州牧郡守皆出其門排擯宗室孤弱公族其有智能者尤非毀而不進恐其與己分權宜發明詔吐德音援近宗室親而納信黜遠外戚母授以政前漢杜欽傳見王鳳專政泰重戒之曰昔周公身有至聖之德屬有叔父之親而成王有獨見之明無信讒之聽然管蔡流言而周公懼穰侯昭王之舅也權重於秦威震鄰敵有旦莫偃伏之愛然范睢起徒步由異國無雅信開一朝之說而穰侯就封及近者武安侯之見退三事之跡不可不察願將軍由周公之謙懼損穰侯之威放武安之欲毋使范睢之徒得問其說頃之王章上封事言鳳專權蔽主之過天子感寤召見章與議欲退鳳鳳甚憂懼欽令鳳上疏乞骸骨文指甚哀太后泣涕為不食上少而親倚鳳亦不忍廢復起鳳就位後漢郎顗傳條四事曰尚書洪範詔曰月行中道移節應期德厚受福重華留之重華者謂歲星在心也今太白徙之交合明堂金木相賊而反同合此以陰陵陽臣下專權之異也晉郭彰傳賈后專朝彰豫參權勢物情歸附賓客盈門世人稱為賈郭謂諡及彰也晉王敦傳敦既得志暴慢愈甚四方貢獻皆入己府將相嶽牧悉出其門新唐鄭注傳藉權寵專鬻官射利李訓既附注進於是兩人權震天下矣新唐李義府傳攘取威柄天子斂袵矣前漢衛青傳蘇建趙信并軍三千餘騎獨逢單于兵與戰一日餘漢兵且盡信降單于蘇建盡亡其軍獨以身得亡去自歸青青問其罪正閎長史安議郎周霸等建當云何霸曰自大將軍出未嘗斬神將今建棄軍可斬以明將軍之威閎安曰不然兵法小敵之堅大敵之禽也今建以數千當單于數萬力戰一日餘士皆不敢有二心自歸而斬之是示後無反意也不當斬青曰青幸得以胏附待罪行間不患無威而霸說我以明威甚失臣意且使臣職雖當斬將以臣之尊寵而不敢自擅專誅於境外其歸天子天子自裁之於以風為人臣不敢專權不亦可乎軍吏皆曰善遂囚建行在所餘見名器不假史記魯世家箋證史記齊太公世家管仲病桓公問曰群臣誰可相者管仲曰知臣莫如君公曰易牙如何對曰殺子以適君非人情不可公曰開方如何對曰倍親以適君非人情難近公曰豎刁如何對曰自宮以適君非人情難親管仲死而桓公不用管仲言卒近用三子三子專權史記范雎列傳請間說曰正義間音間臣居山東時聞齊之有田文不聞其有王也聞秦之有太后穰侯華陽高陵涇陽不聞其有王也夫擅國之謂王能利害之謂王制殺生之威之謂王今太后擅行不顧穰侯出使不報華陽涇陽等擊斷無諱集解駰案諱畏也高陵進退不請四貴備而國不危者未之有也為此四貴者下乃所謂無王也然則權安得不傾令安得從王出乎史記晉世家初獻公使士蒍為二公子築蒲屈城弗就夷吾以告公公怒士蒍士蒍謝曰邊城少寇安用之退而歌曰狐裘蒙茸一國三公吾誰適從集解服虔曰蒙茸以言亂貌三公言君與二公子將敵故不知所從史記晉世家十四年吳延陵季子來使與趙文子韓宣子魏獻子語曰晉國之政卒歸此三家矣十九年齊使晏嬰如晉與叔嚮語叔嚮曰晉季世也公厚賦為臺池而不恤政政在私門其可久乎晏子然之漢書田蚡傳當是時丞相入奏事語移日所言皆聽薦人或起家至二千石權移主上上乃曰君除吏盡未吾亦欲除吏漢書張敞傳大將軍霍光薨宣帝始親政事封光兄孫山雲皆為列侯以光子禹為大司馬頃之山雲以過歸第霍氏諸壻親屬頗出補吏敞聞之上封事曰臣聞公子季友有功於魯大夫趙衰有功於晉大夫田完有功於齊皆疇其庸延及子孫終後田氏篡齊趙氏分晉季氏顓魯故仲尼作春秋迹盛衰譏世卿最甚乃者大將軍決大計安宗廟定天下功亦不細矣夫周公七年耳而大將軍二十歲海內之命斷於掌握方其隆時感動天地侵迫陰陽月朓日蝕晝冥宵光地大震裂火生地中天文失度祅祥變怪不可勝記皆陰類盛長臣下顓制之所生也漢書楚元王傳附劉向時上無繼嗣政由王氏出災異寖甚向遂上封事極諫曰臣聞人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫大臣操權柄持國政未有不為害者也昔晉有六卿齊有田崔衛有孫寧魯有季孟常掌國事世執朝柄終後田氏取齊六卿分晉崔杼弒其君光孫林父寧殖出其君衎弒其君剽季氏八佾舞於庭三家者以雍徹師古曰雍樂詩名徹饌奏之皆僣王者之禮並專國政卒逐昭公周大夫尹氏管朝事濁亂王室子朝子猛更立連年乃定故經曰王室亂又曰尹氏殺王子克甚之也師古曰言其惡大甚也劉敞曰今經文不見殺王子克但有立王子朝春秋舉成敗録禍福如此類甚衆皆陰盛而陽微下失臣道之所致也故書曰臣之有作威作福害于而家凶于而國師古曰周書洪範也而汝也孔子曰祿去公室政逮大夫危亡之兆秦昭王舅穰侯及涇陽葉陽君專國擅藝上假太后之威三人者權重於昭王家富於秦國國甚危殆賴寤范雎之言而秦復存二世委任趙高專權自恣壅蔽大臣終有閻樂望夷之禍鄭氏曰望夷秦宮名也秦遂以亡近事不遠即漢所代也漢興諸呂無道擅相尊王呂産呂祿席太后之寵師古曰席猶因也言若人之坐於席也據將相之位兼南北軍之衆擁梁趙王之尊驕盈無厭欲危劉氏賴忠正大臣絳侯朱虛侯等竭誠盡節以誅滅之然後劉氏復安今王氏一姓乘朱輪華轂者二十三人青紫貂蟬充盈幄內魚鱗左右大將軍秉事用權五侯驕奢僣盛並作威福擊斷自恣行汙而寄治身私而託公依東宮之尊假甥舅之親以為威重尚書九卿州牧郡守皆出其門管執樞機朋黨比周稱譽者登進忤恨者誅傷游談者助之說執政者為之言排擯宗室孤弱公族其有智能者尤非毀而不進遠絶宗室之任不令得給事朝省恐其與己分權宜發明詔吐德音援近宗室親而納信黜遠外戚毋授以政漢書杜周傳附杜欽見鳳專政泰重戒之曰昔周公身有至聖之德屬有叔父之親而成王有獨見之明無信讒之聽然管蔡流言而周公懼穰侯昭王之舅也文頴曰穰侯魏冉也權重於秦威震鄰敵有旦暮偃伏之愛心不介然有間然范睢起徒步由異國無雅信師古曰雅信謂素相任信開一朝之說而穰侯就封及近者武安侯之見退師古曰武安侯謂田蚡也退謂請考工地益宅上怒乃退之也三事之跡相去各數百歲若合符節甚不可不察願將軍由周公之謙懼損穰侯之威放武安之欲毋使范睢之徒得間其說頃之復日蝕京兆尹王章上封事求見果言鳳專權蔽主之過宜廢勿用以應天變於是天子感悟召見章與議欲退鳳鳳甚憂懼欽令鳳上疏謝罪乞骸骨文指甚哀太后涕泣為不食上少而親倚鳳亦不忍廢復起鳳就位卷六十案杜欽杜周中子也後漢書郎顗傳謹復條便宜四事附奏於左三事尚書洪範記曰月行中道移節應期德厚受福重華留之天官書曰歲星一曰攝提一曰重華也重華者謂歲星在心也今太白從之交合明堂金木相賊而反同合太白金也歲星木也金克木故相賊也此以陰陵陽臣下專權之異也晉書郭彰傳郭彰字叔武太原人賈后從舅也與賈充素相親遇充妻待彰若同生及賈后專朝彰豫參權勢物情歸附賓客盈門世人稱為賈郭謂謐及彰也晉書王敦傳敦既得志暴慢愈甚四方貢獻多入己府將相嶽牧悉出其門新唐書鄭注傳鄭注絳州翼城人世微賤以方伎游江湖間文宗暴眩守澄復薦注即日召入對浴堂門俄進太僕卿兼御史大夫注資貪沓既藉權寵專鬻官射利資積巨萬不知止李訓既附注進於是兩人權震天下矣新唐書姦臣列傳李義府傳李義府瀛州饒陽人攘取威柄天子斂袵矣漢書衛青傳蘇建趙信并軍三千餘騎獨逢單于兵與戰一日餘漢兵且盡信故胡人降為翕侯見急胸奴誘之遂將其餘騎可八百奔降單于蘇建盡亡其軍獨以身得亡去自歸青青問其罪正閎長史安議郎周霸等建當云何霸曰自大將軍出未嘗斬裨將今建棄軍可斬以明將軍之威閎安曰不然兵法小敵之堅大敵之禽也今建以數千當單于數萬力戰一日餘士皆不敢有二心自歸而斬之是示後無反意也不當斬青曰青幸得以胏附待罪行間不患無威而霸說我以明威甚失臣意且使臣職雖當斬將以臣之尊寵而不敢自擅專誅於境外其歸天子天子自裁之於以風為人臣不敢專權不亦可乎軍吏皆曰善遂囚建行在所臣作威福弟二後漢劉玄傳趙萌為右大司馬女為更始夫人有寵趙萌專權威福自己郎吏有說萌放縱者更始怒拔劍擊之萌私忿侍中引下斬之更始救請不得後漢襄楷傳自春夏以來連有霜雹及大雨靁而臣作威作福刑罰急刻之所感也後漢馬嚴傳上封事曰方今剌史太守專州典郡不務奉事盡心為國而司察偏阿取與自己同則舉為尤異異則中以刑法中書丁仲反不即垂頭塞耳採求財賂又選舉不實曾無貶坐是使臣下得作威福也晉五行志孫權嘉禾三年九月朔隕霜傷榖案劉向說誅罰不由君出在臣下之象也是時校事呂一專作威福與漢元帝時石顯用事隕霜同應晉賈諡好學有才思既為充嗣繼佐命之後又賈后專恣謐權過人主至乃鎖繫黃門侍郎其為威福如此箋證後漢書劉玄傳二年二月更始自洛陽而西以李松為丞相趙萌為右大司馬共秉內任更始納趙萌女為夫人有寵遂委政於萌趙萌專權威福自己郎吏有說萌放縱者更始怒拔劍擊之自是無復敢言萌私忿侍中引下斬之更始救請不從後漢書襄楷傳桓帝時宦官專朝政刑暴濫又比失皇子災異尤數延熹九年楷自家詣闕上疏曰臣聞自春夏以來連有霜雹及大雨靁而臣作威作福刑罰急刻之所感也後漢書馬援傳附兄子馬嚴嚴字威卿父余王莽時為揚州牧嚴少孤肅宗即位徵拜侍御史中丞其冬有日食之災嚴上封事曰臣伏見方今刺史太守專州典郡不務奉事盡心為國而司察偏阿取與自己同則舉為尤異異則中以刑法中音丁仲反不即垂頭塞耳採取財賂又選舉不實曾無貶坐是使臣下得作威福也晉書五行志下吳孫權嘉禾三年九月朔隕霜傷穀按劉向說誅罰不由君出在臣下之象也是時校事呂一專作威福與漢元帝時石顯用事隕霜同應晉書賈充傳附賈謐謐字長深母賈午充少女也父韓壽字德真南陽堵陽人謐好學有才思既為充嗣繼佐命之後又賈后專恣謐權過人主至乃鎖繫黃門侍郎其為威福如此聚斂之臣第三晉謝石傳石在職務存文刻既無他才望直以宰相弟兼有大勳遂居清顯而聚斂無饜取譏當世晉宗室義陽成王望為性儉吝而好聚斂身亡之後金帛盈溢以此獲譏於世晉王戎傳為三公性好興利廣收八方園田水碓周遍天下積實聚錢不知紀極每自執牙籌晝夜算計常若不足而又斂嗇不自奉養天下人謂之膏肓之疾女適裴顏貸錢數萬久而未還女後歸寧戎色不悅女遽還直然後乃歡從子將婚戎遺其一單衣婚訖而更責取家有好李常出貨之恐人得種乃鑽其核以此獲譏於世新唐宇文融贊曰開元中宇文融始以言利得幸於時天子見海內完治偃然有攘卻四夷之心融度帝方調兵食故議取隱戶剩田以中主欲利說一開天子恨得之晚不十年而取宰相雖後得罪而追恨融才有所未盡也孟子所謂上下征利而國危者可不信哉天寶以來外奉軍興內蠱艷妃所費愈不資計於是韋堅楊慎矜王鉷楊國忠各以裒剋進剝下益上歲進羡緡百億萬為天子私藏以濟橫賜而天下經費自如帝以為能故重官纍使尊顯烜赫然天下流亡日多於前有司備員不復事而堅等所欲既充還用權媢以相屠脅四族皆覆為天下笑夫民可安而不可擾利可通而不可竭觀數子乃欲擾而竭之斂怨基亡則向所謂利者顧不反哉鉷國忠後出橫虐最甚當方毒天下復思融云新唐楊國忠時海內豐熾請在所出滯積變輕齎內富京師又悉天下義倉及丁租地課易布帛以充天子禁藏明舉帝詔百官觀庫物積如丘山新唐李義甫傳杜元紀望義府第有獄氣曰發積錢二千萬可以猒勝義府信之裒索殊急新唐元載傳與諸子牟賊聚斂旡涯藝輕浮者爭奔走箋證晉書謝尚傳附謝石石字石奴石在職務存文刻既無他才望直以宰相弟兼有大勳遂居清顯而聚斂無饜取譏當世晉書宗室列傳義陽成王望義陽成王望字子初出繼伯父朗寬厚有父風望性儉吝而好聚斂身亡之後金帛盈溢以此獲譏晉書王戎傳戎以晉室方亂慕蘧伯玉之為人與時舒卷無蹇諤之節自經典選未嘗進寒素退虛名但與時浮沉戶調門選而已尋拜司徒雖位總鼎司而委事寮寀間乘小馬從便門而出游見者不知其三公也故吏多至大官道路相遇輒避之性好興利廣收八方園田水碓周遍天下積實聚錢不知紀極每自執牙籌晝夜算計恆若不足而又儉嗇不自奉養天下人謂之膏肓之疾女適裴頠貸錢數萬久而未還女後歸寧戎色不悅女遽還直然後乃歡從子將婚戎遺其一單衣婚訖而更責取家有好李常出貨之恐人得種恆鑽其核以此獲譏於世新唐書宇文融韋堅楊慎矜王鉷傳贊曰開元中宇文融始以言利得幸於時天子見海內完治偃然有攘郤四夷之心融度帝方調兵食故議取隱戶剩田以中主欲利說一開天子恨得之晚不十年而取宰相雖後得罪而追恨融才有所未盡也孟子所謂上下征利而國危者可不信哉天寶以來外奉軍興內蠱豔妃所費愈不資計於是韋堅楊慎矜王鉷楊國忠各以裒刻進剝下益上歲進羡緡百億萬為天子私藏以濟橫賜而天下經費自如帝以為能故重官纍使尊顯烜赫然天下流亡日多於前有司備員不復事而堅等所欲既充還用權媢以相屠脅四族皆覆為天下笑夫民可安而不可擾利可通而不可竭觀數子乃欲擾而竭之斂怨基亡則向所謂利者顧不反哉鉷國忠後出橫虐最甚當方毒天下復思融云新唐書外戚列傳楊國忠傳時海內豐熾州縣粟帛舉巨萬國忠因言古者二十七年耕餘九年食今天置太平請在所出滯積變輕齎內富京師又悉天下義倉及丁租地課易布帛以充天子禁藏明年帝詔百官觀庫物積如丘新唐書姦臣列傳李義府傳會術者杜元紀望義府第有獄氣曰發積錢二千萬可以厭勝義府信之裒索殊急新唐書元載傳元載字公輔鳳翔岐山人河西節度使忠嗣女悍驕戾沓載叵禁而諸子牟賊聚斂無涯藝輕浮者奔走爭蓄妓妾為倡優褻戲親族環觀不愧也賄賂第四前漢刑法志子産相鄭而鑄刑書晉叔嚮非之曰民之爭端矣將棄禮而徵於書錐刀之末將盡爭之亂獄滋豐貨賂並行終子之世鄭其敗乎後漢窅者傳侯覽傳桓帝初為中常侍以佞猾進倚藝貪放受納貨遺以巨萬計蜀劉焉傳建議言剌史太守貨賂為官害剝百姓可選清名重臣以為牧伯晉成帝紀咸和八年春正月景子石勒遣使致賂詔焚之晉惠帝紀政出群下綱紀大壞貨賂公行勢位之家以貴陵物忠賢路絶讒邪得志更相薦舉天下謂之互市焉晉王戎傳徵為侍中南郡太守劉肇賂戎筒中細布五十端為司隸所糾以知而未納故得不坐帝謂朝臣曰戎之為行豈懷私苟得正當不欲為異耳帝雖以是言釋之然為清慎者所鄙由是損名晉杜預傳預在鎮數餉遺洛中貴要或問其故預曰吾但恐為害不求益也晉劉聰傳朝廷內外無復經紀阿諛日進貨賄公行新唐裴矩傳太宗疾貪吏乃間遣人遺諸曹一史受饋縑帝怒詔殺之矩曰吏受賕死因宜然陛下以計紿之因即行法所謂罔人以罪非道之以德之誼帝悅不面從新唐國忠由御史至宰相凡領四十餘使而度支吏部事自叢夥不能盡故吏得顯賕公謁旡所忌新唐李逢吉傳張又新李續張權輿劉栖楚李虞程昔範姜治及訓八人而傳會者又八人皆住要劇故號八關十六子有所求請先賂關子後達於逢吉旡不得所欲餘見臣道太盛元載傳箋證漢書刑法志子産相鄭而鑄刑書晉叔嚮非之曰民知爭端矣將棄禮而徵於書師古曰取證於刑書錐刀之末將盡爭之師古曰喻微細亂獄滋豐貨賂並行終子之世鄭其敗呼後漢書宦者列傳侯覽傳侯覽者山陽防東人桓帝初為中常侍以佞猾進倚藝貪放受納貨遺以巨萬計三國志蜀志劉焉傳焉少仕州郡以宗室拜中郎後以師祝公喪去官臣松之案祝公司徒祝恬也居陽城山積學教授舉賢良方正辟司徒府辟雒陽令冀州刺史南陽太守宗正太常焉覩靈帝政治衰缺王室多故乃建議言刺史太守貨賂為官割剝百姓以致離叛可選清名重臣以為牧伯晉書成帝紀咸和八年春正月癸酉以張駿為鎮西大將軍景子石勒遣使致賂詔焚之晉書惠帝紀帝之為太子也朝廷咸知不堪政事武帝亦疑焉及居大位政出群下綱紀大壞貨賂公行勢位之家以貴陵物忠賢路絶讒邪得志更相薦舉天下謂之互市焉晉書王戎傳石偉方直不容皓朝稱疾歸家戎嘉其清節表薦之詔拜偉為議郎以二千石祿終其身荊土悅服徵為侍中南郡太守劉肇賂戎筒中細布五十端為司隸所糾以知而未納故得不坐然議者尤之帝謂朝臣曰戎之為行豈懷私苟得正當不欲為異耳帝雖以是言釋之然為清靜者所鄙由是損名晉書杜預傳時王濟解相馬又甚愛之而和嶠頗聚斂預常稱濟有馬癖嶠有錢癖武帝聞之謂預曰卿有何癖對曰臣有左傳癖預在鎮數餉遺洛中貴要或問其故預曰吾但恐為害不求益也魏書胸奴劉聰傳胸奴劉聰字元明一名載冒頓之後也漢高祖以宗女妻冒頓故其子孫以母姓為氏聰遣劉曜攻陷長安執晉愍帝改建元為麟嘉其武庫陷入地一丈五尺聰自去冬至足遂不受朝賀立市於後庭與宮人宴戲積日不醒立上皇后樊氏樊氏是聰張后之侍婢也時稱后者四人佩皇后璽綬者七人阿諛日進貨賄公行新唐書裴矩傳太宗即位疾貪吏欲痛懲乂之乃間遣人遺諸曹一史受饋縑帝怒詔殺之矩曰吏受賕死固宜然陛下以計紿之因即行法所謂罔人以罪非道之以德之誼帝悅為群臣言之曰矩遂能廷爭不面從物物若此天下有不治哉新唐書外戚列傳楊國忠傳國忠由御史至宰相凡領四十餘使而度支吏部事自叢夥第署一字不能盡故吏得輕重顯賕公謁無所忌新唐書李逄吉傳其黨有張又新李續張權輿劉栖楚李虞程昔範姜洽及訓八人而傅會者又八人皆任要劇故號八關十六子有所求請先賂關子後達於逢吉無不得所欲
